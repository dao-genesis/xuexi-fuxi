版 17 页\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **国家环境保护义务**：国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）\n- **环境行政主体**：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n- **环境行政执法**：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n- **环境行政复议**：公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n- **环境行政诉讼**：公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n- **环境审判**：人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n- **环境检察**：人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉讼等活动。（p015）\n\n#### 二、国家环境保护义务的三重结构（p002目录）\n\n1. **作为义务**（4.1.1）：国家必须积极采取行动保护环境\n2. **不作为义务**（4.1.2）：国家不得实施破坏环境的行为\n3. **给付义务**（4.1.3）：国家应向公民提供环境保护的公共物品和服务\n\n#### 三、环境行政的正当程序（p004）\n\n1. 信息公开\n2. 公众参与\n3. 说明决策的理由\n4. 公布周知\n\n#### 四、环境行政主体违法问题（p006-p009）\n\n**现实中存在的违法行政行为**：执法主体滥用职权、违反法定程序、越权行政、执法主体不适合、失职或不作为、证据不确实充分、定性不准确、适用法律不准确、行政处罚不恰当等。\n\n**违法行政行为的原因**：\n1. 环保立法障碍：部门本位主义思想严重；环境立法之间关系不协调\n2. 环境管理体制不完善：管理机构设置重复；政府行使了环保部门的部分职权\n3. 环保部门执法权限设置问题：各职能部门执法权配置不恰当；环保部门缺乏必要的强制执行权\n4. 环保部门的民主性、透明度不高\n5. 未形成强有力的监督机制\n6. 环保部门自身建设落后：法制机构欠缺；投入不足；人员专业化素养不高\n\n#### 五、环境行政复议与行政诉讼的区别（p012）\n\n| 区别点 | 行政复议 | 行政诉讼 |\n|--------|---------|---------|\n| 性质 | 行政行为 | 司法行为 |\n| 审查范围 | 合法性+合理性 | 仅合法性（一般） |\n| 审查结果 | 可维持或变更原决定 | 一般只能维持或撤销，不能变更 |\n| 不服后续 | 向法院起诉（一审程序） | 提起上诉（上诉程序） |\n\n**行政诉讼时效**：《环保法》15天；《森林法》《渔业法》30天\n\n#### 六、生态环境损害民事索赔权（p013）\n\n- 对生态破坏及其损失认识的发展——生态补偿制度\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n\n#### 七、重要案例\n\n- **林西县人民检察院诉林西县国土资源局行政公益诉讼案**（p016-p017）：李殿有自1999年起非法开采沸石，面积28亩，矿坑最深7.8米。林西县国土局多次下达行政处罚但违法行为人上交罚款后并未停止采矿，国土局存在怠于履行职责行为。检察院提起行政公益诉讼，法院当庭宣判支持全部诉讼请求，确认国土局未积极履行职责违法，判令继续履行监督管理法定职责。→ 环境行政公益诉讼的典型判例\n\n#### 八、高频考点（速记）\n\n1. 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n2. 环境行政执法的具体形式（选择）\n3. 环境行政正当程序的四个要素（简答）\n4. 环境行政违法的原因（论述）\n5. 环境行政复议与行政诉讼的区别（简答·高频）\n6. 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n7. 生态环境损害赔偿制度的适格主体（选择）\n8. 林西县行政公益诉讼案的法律意义（案例分析）\n\n#### 九、易错 / 易混点\n\n- ❌ 混淆\"环境行政复议\"与\"环境行政诉讼\"：前者审查合法性+合理性，后者一般仅审查合法性\n- ❌ 将\"环境审判\"等同于\"环境行政诉讼\"：环境审判包括行政、民事、刑事三类诉讼\n- ❌ 忽略\"给付义务\"：国家义务不仅是作为和不作为，还包括提供公共物品和服务\n- ❌ 混淆行政诉讼时效：环保法15天 vs 森林法/渔业法30天\n- ❌ 认为行政诉讼可以变更原决定：一般只能维持或撤销，不能变更\n\n#### 十、与前后章之关联\n\n- **← 第3章**：第3章开发利用行为人的义务对应本章国家的监督管理义务\n- **→ 第5章**：本章环境行政管理手段在第5章制度体系中具体展开\n- **→ 第6章**：本章环境行政处罚在污染控制法中具体适用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 国家的环境保护义务\n## 核心概念\n- 国家环境保护义务\n- 环境行政主体\n- 环境行政执法\n- 环境行政复议\n- 环境行政诉讼\n- 环境审判\n- 环境检察\n## 国家环境保护义务的三重结构\n- 作为义务\n- 不作为义务\n- 给付义务\n## 环境行政的正当程序\n- 信息公开\n- 公众参与\n- 说明决策的理由\n- 公布周知\n## 环境行政主体违法问题\n- 现实中存在的违法行政行为\n- 违法行政行为的原因\n## 环境行政复议与行政诉讼的区别\n- 行政诉讼时效\n## 生态环境损害民事索赔权\n- 对生态破坏及其损失认识的发展\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n## 高频考点\n- 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n- 环境行政执法的具体形式（选择）\n- 环境行政正当程序的四个要素（简答）\n- 环境行政违法的原因（论述）\n- 环境行政复议与行政诉讼的区别（简答·高频）\n- 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n- 生态环境损害赔偿制度的适格主体（选择）\n- 林西县行政公益诉讼案的法律意义（案例分析）\n## 易错 / 易混点\n- ❌ 混淆\"环境行政复议\"与\"环境行政诉讼\"\n- ❌ 将\"环境审判\"等同于\"环境行政诉讼\"\n- ❌ 忽略\"给付义务\"\n- ❌ 混淆行政诉讼时效\n- ❌ 认为行政诉讼可以变更原决定\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((国家的环境保护义务))\n    核心概念\n      国家环境保护义务\n      环境行政主体\n      环境行政执法\n      环境行政复议\n      环境行政诉讼\n      环境审判\n      环境检察\n    国家环境保护义务的三重结构\n      作为义务\n      不作为义务\n      给付义务\n    环境行政的正当程序\n      信息公开\n      公众参与\n      说明决策的理由\n      公布周知\n    环境行政主体违法问题\n      现实中存在的违法行政行为\n      违法行政行为的原因\n    环境行政复议与行政诉讼的区别\n      行政诉讼时效\n    生态环境损害民事索赔权\n      对生态破坏及其损失认识的发展\n      行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n      试行中的生态环境损害赔偿制度\n    高频考点\n      国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·…\n      环境行政执法的具体形式（选择）\n      环境行政正当程序的四个要素（简答）\n      环境行政违法的原因（论述）\n      环境行政复议与行政诉讼的区别（简答·高频）\n      环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n      生态环境损害赔偿制度的适格主体（选择）\n      林西县行政公益诉讼案的法律意义（案例分析）\n    易错 / 易混点\n      ❌ 混淆环境行政复议与环境行政诉讼\n      ❌ 将环境审判等同于环境行政诉讼\n      ❌ 忽略给付义务\n      ❌ 混淆行政诉讼时效\n      ❌ 认为行政诉讼可以变更原决定\n```\n\n<\/details>\n\n---\n\n### 第 5 章 · 环境基本法与综合性环境法律制度\n\n> 素材：[_第05章_环境基本法与综合性环境法律制度.md](./_第05章_环境基本法与综合性环境法律制度.md) · 主版 23 页\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境与资源保护法的基本制度**：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n- **环境标准制度**：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n- **环境质量标准**：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n- **污染物排放标准**：为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n- **环境规划制度**：为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n\n#### 二、环境法基本制度的分类（p005）\n\n- **环境保护基本法律制度**\n- **自然资源保护基本法律制度**\n\n> 划分是相对的，如规划制度、许可证制度既是环境保护的基本法律制度，又是自然资源保护的基本法律制度，只是侧重点不同。\n\n#### 三、环境法基本制度的确立依据（p008）\n\n1. 具体体现环境与资源保护法的基本原则\n2. 具体反映环境与资源保护法律的共通性和本质性的法律措施\n3. 依据基本国情和社会经济发展水平，通过对法的\"立、改、废\"逐步完善\n\n#### 四、环境标准制度（p009-p021）\n\n**环境标准分类**：\n- **强制性标准**：环境质量标准、污染物排放（控制）标准——必须执行\n- **推荐性标准**：环境监测方法标准、环境标准样品标准、环境基础标准——被强制性标准引用后也必须强制执行\n\n**环境质量标准**（p012-p017）：\n- 《环保法》第15条：国务院环保主管部门制定国家环境质量标准；省级政府可制定严于国标的地方标准，报国务院备案\n- 按环境要素分：水质量标准、大气质量标准、土壤质量标准、生物质量标准\n- 水质量标准按水体类型分：地面水、海水、地下水等；按用途分：生活饮用水、渔业用水、农业用水、娱乐用水、工业用水等\n- 大气环境质量标准：一类区（自然保护区、风景名胜区等）适用一级浓度限值；二类区（居住区、商业区、工业区、农村等）适用二级浓度限值\n\n**污染物排放标准**（p018）：\n- 《环保法》第16条：国务院环保主管部门根据国家环境质量标准和国家经济、技术条件制定国家污染物排放标准；省级政府可制定严于国标的地方标准，报国务院备案\n\n#### 五、环境规划制度（p022-p023）\n\n- 《环保法》第13条：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划\n- **三个层次**：\n  1. 国民经济和社会发展五年规划纲要（总体）→ 环境保护篇章\n  2. 重点专项规划（国务院主管部门）\n  3. 行业规划和地区规划（各部门、各地区）\n- 环境保护规划的内容应当包括生态保护和污染防治的目标、任务、保障措施等，并与主体功能区规划、土地利用总体规划和城乡规划等相衔接\n\n#### 六、环境保护法基本制度的历史发展（p006）\n\n- **1979年**《环境保护法（试行）》首先规定了：环境影响评价制度（第6条）、环境规划制度（第7条）、征收排污费制度（第18条）、\"三同时\"制度（第6条）、环境标准制度（第18、19条）\n- **1989年**《环境保护法》在第二章专章对环境法基本制度作出规定，使体系进一步丰富\n\n#### 七、五项基本制度（p007）\n\n1. 环境标准制度\n2. 环境规划制度\n3. 环境影响评价制度\n4. 环境费和环境税制度\n5. 突发环境事件应急管理制度\n\n#### 八、重要案例\n\n- **A精细材料有限公司诉B区人民政府环保行政处罚案**（p019-p021）：A公司排放废气臭气浓度超标，被限期治理后两次监测仍未达标《恶臭污染物排放标准》。B区政府作出停业、关闭处罚。A公司主张采样点与频次不合法。法院认定：采样点为厂界敏感点符合标准规定；频次间隔不足2小时存在瑕疵但不足以推翻结论。判决驳回原告诉讼请求，二审维持。→ 污染物排放标准在行政处罚中的适用\n\n**核心问题**：\n1. 《恶臭污染物排放标准》属于何种类型的环境标准？→ 污染物排放标准（强制性标准）\n2. 在行政处罚案件中是否需要其他类型环境标准配合使用？\n3. 标准适用的疑难问题由谁解释？\n\n#### 九、高频考点（速记）\n\n1. 环境法基本制度的分类与确立依据（简答）\n2. 环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n3. 环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n4. 地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n5. 环境规划制度的三个层次（简答）\n6. 五项基本制度的名称（选择）\n7. 1979年《环保法（试行）》首创的五项制度（选择）\n8. A精细材料案中环境标准的适用（案例分析）\n\n#### 十、易错 / 易混点\n\n- ❌ 混淆\"强制性标准\"与\"推荐性标准\"的范围：环境质量标准和污染物排放标准是强制性，其余为推荐性\n- ❌ 忽略推荐性标准被强制性标准引用后也必须强制执行\n- ❌ 混淆国家环境质量标准与国家污染物排放标准的制定依据：前者直接制定，后者需考虑\"国家经济、技术条件\"\n- ❌ 将环境规划仅理解为环境保护规划：还包括纳入国民经济和社会发展规划\n- ❌ 混淆环境质量标准按环境要素的分类与按用途的分类\n\n#### 十一、与前后章之关联\n\n- **← 第2章**：第2章基本原则在本章具体化为基本制度\n- **← 第4章**：第4章环境行政管理手段在本章制度体系中展开\n- **→ 第6章**：本章环境标准、排污许可等制度在污染控制法中具体适用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境基本法与综合性环境法律制度\n## 核心概念\n- 环境与资源保护法的基本制度\n- 环境标准制度\n- 环境质量标准\n- 污染物排放标准\n- 环境规划制度\n## 环境法基本制度的分类\n- 环境保护基本法律制度\n- 自然资源保护基本法律制度\n## 环境法基本制度的确立依据\n- 具体体现环境与资源保护法的基本原则\n- 具体反映环境与资源保护法律的共通性和本质性的法律措施\n- 依据基本国情和社会经济发展水平，通过对法的\"立、改、废\"逐步完善\n## 环境标准制度\n- 环境标准分类\n- 强制性标准\n- 推荐性标准\n- 环境质量标准\n- 污染物排放标准\n## 环境规划制度\n- 三个层次\n## 环境保护法基本制度的历史发展\n- 1979年\n- 1989年\n## 五项基本制度\n- 环境标准制度\n- 环境规划制度\n- 环境影响评价制度\n- 环境费和环境税制度\n- 突发环境事件应急管理制度\n## 高频考点\n- 环境法基本制度的分类与确立依据（简答）\n- 环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n- 环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n- 地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n- 环境规划制度的三个层次（简答）\n- 五项基本制度的名称（选择）\n- 1979年《环保法（试行）》首创的五项制度（选择）\n- A精细材料案中环境标准的适用（案例分析）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境基本法与综合性环境法律制度))\n    核心概念\n      环境与资源保护法的基本制度\n      环境标准制度\n      环境质量标准\n      污染物排放标准\n      环境规划制度\n    环境法基本制度的分类\n      环境保护基本法律制度\n      自然资源保护基本法律制度\n    环境法基本制度的确立依据\n      具体体现环境与资源保护法的基本原则\n      具体反映环境与资源保护法律的共通性和本质性的法律措施\n      依据基本国情和社会经济发展水平，通过对法的立、改、废逐步完善\n    环境标准制度\n      环境标准分类\n      强制性标  · 9 页 · 1"}, {"id": "study-00", "group": "总览资料", "title": "00 备考总纲", "md": "# 环境法学 · 期末备考总纲\n\n> 教师：杨建英 · 学期：2026春\n> 生成于 2026-06-12 · 目标考试日 **2026-07-03**（共 21 天）\n> 章数：4 · 已填要点：4 章\n\n> *为学者日益，闻道者日损。* —— 复习非求多读，而求记牢；记牢之法，已有实证。\n\n---\n\n## 一 · 复习之道（实证为据）\n\n> 据 Dunlosky et al. 2013（《Psychological Science in the Public Interest》）与 Carpenter, Pan & Butler 2022（《Nature Reviews Psychology》）：\n\n| 技法 | 效用 | 怎么做 |\n|---|---|---|\n| **提取练习**（自测/默写） | **高** | 合上书，先答 `自测题库.md`，再对照——别只重读 |\n| **间隔重复**（分散练习） | **高** | 按下方日历，隔日/隔周回提取，别考前突击一次 |\n| 交错练习 | 中 | 按下方“交错刷题序”混章做题，别一章刷到底 |\n| 自我解释 / 追问“为什么” | 中 | 每个考点问自己“为什么成立、与上一章何关” |\n| 双重编码（图像） | 中 | 看/画每章思维导图，文字配图记 |\n| 高亮 · 重读 · 摘抄 | **低** | 感觉努力实则低效，不作为主手段 |\n\n## 二 · 三段备考（先懂 → 后测 → 终模考）\n\n- **一轮·通读理解**（2026-06-12 → 2026-06-22 · 11 天）：逐章通读图文 + 画/看思维导图，求懂而非背\n- **二轮·提取自测**（2026-06-23 → 2026-06-29 · 7 天）：闭卷做自测题与填空卡，错题标记\n- **三轮·模考查漏**（2026-06-30 → 2026-07-03 · 4 天）：限时模拟卷 + 错点专项 + 易错点重背\n\n## 三 · 间隔重复日历（首学 + 1/3/7/14 天回提取）\n\n| 日期 | 当日任务 |\n|---|---|\n| 2026-06-12 | 📖 首学：第 2 章 环境保护法的基本原则 |\n| 2026-06-13 | 🔁 提取复习：第 2 章 环境保护法的基本原则 |\n| 2026-06-14 | 📖 首学：第 3 章 环境利用行为的主体及其权利义务 |\n| 2026-06-15 | 🔁 提取复习：第 2 章 环境保护法的基本原则<br>🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务 |\n| 2026-06-17 | 🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务<br>📖 首学：第 4 章 国家的环境保护义务 |\n| 2026-06-18 | 🔁 提取复习：第 4 章 国家的环境保护义务 |\n| 2026-06-19 | 🔁 提取复习：第 2 章 环境保护法的基本原则 |\n| 2026-06-20 | 🔁 提取复习：第 4 章 国家的环境保护义务<br>📖 首学：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-21 | 🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务<br>🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-23 | 🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-24 | 🔁 提取复习：第 4 章 国家的环境保护义务 |\n| 2026-06-26 | 🔁 提取复习：第 2 章 环境保护法的基本原则 |\n| 2026-06-27 | 🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-28 | 🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务 |\n| 2026-07-01 | 🔁 提取复习：第 4 章 国家的环境保护义务 |\n| 2026-07-02 | 🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n\n> 📖 = 首次学习（求懂）；🔁 = 闭卷提取复习（求牢）。错过某日，顺延即可，勿弃。\n\n## 四 · 交错刷题序（三轮 · 混章不连刷）\n\n1. 第 2 章 环境保护法的基本原则 → 第 3 章 环境利用行为的主体及其权利义务 → 第 4 章 国家的环境保护义务 → 第 5 章 环境基本法与综合性环境法律制度\n2. 第 3 章 环境利用行为的主体及其权利义务 → 第 4 章 国家的环境保护义务 → 第 5 章 环境基本法与综合性环境法律制度 → 第 2 章 环境保护法的基本原则\n3. 第 4 章 国家的环境保护义务 → 第 5 章 环境基本法与综合性环境法律制度 → 第 2 章 环境保护法的基本原则 → 第 3 章 环境利用行为的主体及其权利义务\n\n## 五 · 每日提取清单（贴在桌前）\n\n- [ ] 今日“首学”章：通读图文 + 看思维导图（求懂）\n- [ ] 今日“回提取”章：**闭卷**做 `自测题库.md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表"}, {"id": "web-00", "group": "真题与网络资源", "title": "一天冲刺路线图", "md": "# 环境法学 · 一天冲刺路线图\n\n> 只有一天怎么办？按本页的时间盒顺序走，先建立\"概念—原则—制度—责任—救济\"骨架，再回填要点。\n> 教材锚点：汪劲《环境法学》（第二版，北大社）。**重大更新**：2026《生态环境法典》已通过并将施行，务必加学（见\"生态环境法典2026要点\"专篇）。\n\n---\n\n## 一、一天时间分配（建议）\n\n| 时段 | 时长 | 做什么 | 用本站哪个板块 |\n| --- | --- | --- | --- |\n| ① 建立骨架 | 1.0 h | 通读主干：概念→原则→制度→责任→救济 | 期末冲刺 → **期末骨架**；总览资料 → **00 备考总纲** |\n| ② 法典专题（必加） | 0.75 h | 背 2026 法典：施行日期、5编、废止范围、意义 | 真题与网络资源 → **生态环境法典2026要点与新疆大学资料** |\n| ③ 核心名词 + 原则 | 1.25 h | 名词解释 + 五项基本原则，边看边默写 | 真题与网络资源 → **名词解释与简答速查** |\n| ④ 章节精讲（抓重点章） | 1.75 h | 基本原则、基本制度、法律责任、公益诉讼优先 | 章节精讲 → 各章 **知识精讲 + 例题** |\n| ⑤ 题型与真题 | 1.5 h | 按题型背简答/论述/案例模板 | 真题与网络资源 → **期末真题题型与高频考点** |\n| ⑥ 自测 + 临考扫雷 | 0.75 h | 闭卷默写、回看\"易错辨析\" | 期末冲刺 → **期末速查 / 期末模拟卷** + 本页 |\n\n> 时间更紧（半天）：做 ①②③⑤——骨架 + 法典 + 名词原则 + 题型。\n\n---\n\n## 二、必拿分的\"五条主线\"\n\n1. **概念与发展**：环境保护法的概念/调整对象/特征；世界四阶段、中国三阶段；习近平生态文明思想六项原则。\n2. **基本原则**：预防为主、协调发展（经济社会与环境保护相协调）、污染者负担（损害担责）、公众参与、**协同合作**——记住\"原则 → 一句内涵 → 一项体现制度\"。\n3. **基本制度**：EIA、三同时、排污许可、总量控制、环保税（原排污收费）、环境标准、生态保护补偿、按日连续处罚——能说出\"是什么 + 作用阶段\"。\n4. **法律责任与救济**：行政/民事/刑事三类责任；环境侵权（无过错责任、因果关系举证）；**环境公益诉讼**与**生态环境损害赔偿**。\n5. **2026《生态环境法典》**：2026-03-12 通过、2026-08-15 施行，5 编 1242 条，废止《环境保护法》等 10 部法律，单设\"绿色低碳发展编\"——名词/简答/论述高频新考点。\n\n---\n\n## 三、必背名词（最小集 · 务必默写）\n\n环境（保护）法、环境权、环境标准、环境影响评价、\"三同时\"制度、排污许可、总量控制、环境保护税、污染者负担（损害担责）原则、预防原则、环境公益诉讼、生态环境损害赔偿、（环境）法律责任、**生态环境法典**。\n\n> 名词解释答题公式：**定义 + 关键限定词 + 一句法律依据/意义**。\n\n---\n\n## 四、易错辨析（临考扫一眼）\n\n- **EIA**（事前预测）/ **三同时**（建设期同步）/ **排污许可**（运营期一证管理）——阶段不同，别混。\n- 环境侵权适用**无过错责任**，且就因果关系存在**举证责任倒置**（被告自证无因果或免责）。\n- **公益诉讼**（保护社会公共利益，主体为检察机关、符合条件的社会组织）≠ 私益侵权诉讼（保护个人权益）。\n- 原\"排污收费\"已由**环境保护税**取代；引用法律依据时注意 2026 法典施行后的更新口径。\n\n---\n\n## 五、考场答题节奏\n\n名词解释稳拿基本分 → 简答按\"原则/制度 → 内涵 → 法律依据/作用\"分条 → 论述先列框架（套五条主线，能引法典亮点加分） → 案例分析\"定性质 → 找依据 → 判责任 → 给救济\"。\n\n> 道法自然：抓住\"概念—原则—制度—责任—救济\"五块 + 法典专题，一天之内把高频名词与原则吃透，基本盘已稳。法以时移，紧扣 2026 最新坐标。"}, {"id": "web-01", "group": "真题与网络资源", "title": "期末真题题型与高频考点", "md": "# 环境法学 · 期末真题题型与高频考点\n\n> 汇编自公开教材（汪劲《环境法学》· 北京大学出版社；金瑞林/韩德培等环境法学教材）、各校期末与考研复习资料及出题规律。\n> **重大更新**：2026 年 3 月 12 日《中华人民共和国生态环境法典》通过，2026 年 8 月 15 日起施行——复习须同步关注（详见「生态环境法典2026要点与新疆大学资料」）。`[规律推断]` 为据出题习惯推断，以本校考纲为准。\n\n---\n\n## 一 · 课程与教材基本信息\n\n| 项 | 内容 |\n|---|---|\n| 主流教材 | 汪劲《环境法学》（北京大学出版社）；亦有金瑞林《环境与资源保护法学》、韩德培《环境保护法教程》 |\n| 教材结构 | 总论（概念、演变、主体、基本原则、基本制度）+ 各论（污染防治法、自然资源法、生态保护法、国际环境法、法律责任） |\n| 课程性质 | 法学/环境科学专业课，概念—原则—制度—责任—救济为主线 |\n\n---\n\n## 二 · 期末考试题型分布（规律）\n\n| 题型 | 分值区间 | 题量 | 备注 |\n|---|---|---|---|\n| 单项/多项选择 | 15–30 分 | 若干 | 法条与制度辨析 |\n| 名词解释 | 15–20 分 | 5–6 题 | 概念精准 |\n| 简答题 | 25–35 分 | 4–6 题 | 原则/制度要点 |\n| 论述题 | 15–25 分 | 1–2 题 | 原则展开、制度评析 |\n| 案例分析 | 10–20 分 | 1–2 题 | 责任认定、制度适用 |\n\n---\n\n## 三 · 高频考点梯队\n\n### 第一梯队（几乎必考）\n\n1. 环境法的概念、特征与渊源（分类）\n2. 环境法的基本原则：预防原则、协调发展原则、受益者负担（污染者负担）原则、公众参与原则、协同合作原则\n3. 环境法基本制度：环境标准、环境影响评价、\"三同时\"、排污许可、环境保护规划、排污收费/环境保护税、总量控制\n4. 环境权（概念、种类、特征）\n5. 环境法律责任：行政责任、民事责任（侵权/损害赔偿、因果关系与举证责任）、刑事责任\n6. **生态环境法典**的结构与意义（2026 新增高频）\n\n### 第二梯队（高频）\n\n7. 环境法律关系的主体（公众、企业、政府及其主管部门）的权利义务\n8. 环境影响评价制度的内容、范围与程序\n9. 排污许可制度（\"一证式\"管理）\n10. 环境公益诉讼（民事/行政公益诉讼、生态环境损害赔偿）\n11. 污染防治各单行法要点（大气、水、固废、噪声、土壤）\n12. 国际环境法基本原则（可持续发展、共同但有区别的责任、风险预防）\n\n### 第三梯队（中频）\n\n13. 环境法的产生与发展（中国环境法历史）\n14. 自然资源法与生态保护法概要\n15. 环境标准体系（质量标准/排放标准/基础标准/方法标准）\n16. 政府环境保护监督管理体制\n17. 环境纠纷处理与环境行政复议/诉讼\n\n---\n\n## 四 · 典型简答/论述/案例题清单（各校流传整理）\n\n1. 简述环境法的概念与特征。\n2. 简述环境法的基本原则及各自含义。\n3. 论述预防原则（含风险预防）在环境法中的体现与制度落实。\n4. 简述污染者负担原则（PPP）的含义与制度表现。\n5. 什么是环境权？其种类与特征如何？\n6. 简述环境影响评价制度的内容与程序。\n7. 简述\"三同时\"制度与排污许可制度的关系与作用。\n8. 简述环境民事责任的构成要件与举证责任的特殊性（因果关系推定、举证责任倒置）。\n9. 简述环境公益诉讼的类型与起诉主体。\n10. 论述我国环境法基本制度体系及其相互关系。\n11. `[规律推断]` 论述《生态环境法典》编纂的意义、结构与对原有单行法的整合。\n12. 案例：某企业违法排污致下游农户损失/致环境损害，分析其行政、民事、刑事责任及救济途径。\n\n---\n\n## 五 · 备考策略\n\n1. **原则—制度—责任三层抓**：基本原则（5 项）→ 基本制度（环评/三同时/许可/标准/规划/总量/收费）→ 法律责任（行/民/刑）层层落实，是简答与论述主框架。\n2. **概念背准**：环境权、环境法、各项制度的定义务必精确，名词解释稳拿分。\n3. **法典同步**：2026《生态环境法典》5 编 1242 条、2026-08-15 施行、废止环保法等 10 部法律——结构、亮点、与原单行法关系是新考点，单列一节专攻。\n4. **案例练责任**：重点练环境侵权（举证责任倒置、因果关系推定、惩罚性赔偿）与公益诉讼、生态环境损害赔偿。\n5. **关注时政**：生态文明入宪、\"双碳\"、生态环境损害赔偿制度改革、检察环境公益诉讼等。\n\n---\n\n> 法随时进。把\"概念—原则—制度—责任—救济\"打通，并紧跟法典化最新立法，期末与考研皆可从容。"}, {"id": "web-02", "group": "真题与网络资源", "title": "名词解释与简答速查", "md": "# 环境法学 · 名词解释与简答速查\n\n> 考前速背层：核心名词 + 高频简答得分要点。配合「核心例题精解」与「综合复习资料」使用。\n> 注：2026《生态环境法典》施行后，部分制度的法律依据由单行法转为法典相应编，答题可注明\"现由《生态环境法典》规定\"。\n\n---\n\n## 一 · 核心名词解释\n\n- **环境（保护）法**（韩德培教授定义）：调整因保护和改善生活环境和生态环境，防治污染和其他公害而产生的各种社会关系的法律规范的总称（三大特征：科技性、综合性、保护法益确立的共同性）。\n- **环境权**：公民、法人和其他主体享有的在良好、适宜环境中生活并合理利用环境资源的权利（含环境资源利用权、环境状况知情权、环境事务参与权、环境侵害请求权）。\n- **环境标准**：为保护环境、保障健康，对环境中有害因素及相关技术规范以法定程序制定的统一规定（含环境质量标准、污染物排放标准、基础标准、方法标准、样品标准）。\n- **环境影响评价（EIA）**：对规划和建设项目实施后可能造成的环境影响进行分析、预测和评估，提出预防或减轻不良影响的对策措施并跟踪监测的制度。\n- **\"三同时\"制度**：建设项目中防治污染和保护环境的设施，必须与主体工程同时设计、同时施工、同时投入使用。\n- **排污许可制度**：以排污许可证为载体，明确排污单位排放污染物的种类、浓度、总量、去向与监测要求的\"一证式\"管理制度。\n- **总量控制制度**：以区域允许排放总量为约束，对污染物排放实行总量分配与管理的制度。\n- **环境保护税**：对直接向环境排放应税污染物的企业事业单位和其他生产经营者征收的税（由排污收费改制而来）。\n- **污染者负担原则（PPP）**：污染环境造成损害者应承担治理、赔偿与修复责任（\"谁污染、谁治理/付费\"）。\n- **预防原则**：对可能产生的环境损害事先采取预防措施，防患于未然（含风险预防——对不确定风险也应审慎预防）。\n- **环境公益诉讼**：法律规定的机关和有关组织对损害社会公共利益的污染环境、破坏生态行为提起的诉讼（民事/行政公益诉讼）。\n- **生态环境损害赔偿**：因污染环境、破坏生态造成生态环境损害，由赔偿权利人（政府及其指定部门）请求赔偿义务人承担修复或赔偿责任的制度。\n- **环境法律责任**：违反环境法义务应承担的行政责任、民事责任与刑事责任。\n- **生态环境法典**：对现行生态环境法律制度系统整合、编订纂修形成的法典（2026 年 3 月 12 日通过，5 编 1242 条，2026 年 8 月 15 日施行）。\n\n---\n\n## 二 · 环境法基本原则（务必成体系背）\n\n| 原则 | 含义要点 | 制度落实 |\n|---|---|---|\n| 预防原则 | 事前预防 + 风险预防，防患未然 | 环评、\"三同时\"、规划、许可 |\n| 协调发展原则 | 经济社会发展与环境保护相协调（可持续发展） | 规划、总量控制、绿色低碳发展 |\n| 污染者负担/受益者负担原则 | 谁污染谁治理付费、谁开发谁保护、谁受益谁补偿 | 环境保护税、排污许可、生态补偿、损害赔偿 |\n| 公众参与原则 | 公众享有知情、参与、监督权 | 信息公开、听证、环境公益诉讼 |\n| 协同合作原则 | 政府、企业、公众及区域间协同 | 区域联防联控、府际合作 |\n\n---\n\n## 三 · 高频简答 · 得分要点\n\n### Q1 环境法的特征\n① 兼具**公法与私法**性质（以公法为主）；② 强烈的**科学技术性**（依赖环境标准与技术规范）；③ **综合性**（调整手段与法律部门交叉）；④ **共同性/国际性**（环境问题跨界）；⑤ 以**可持续发展**为价值取向。\n\n### Q2 环境影响评价制度的内容与程序\n**内容**：对规划/建设项目实施后的环境影响作分析、预测、评估，提出对策并跟踪监测。**程序**：筛选分类（报告书/报告表/登记表）→ 编制 → 公众参与 → 审批 → 跟踪监测与\"三同时\"衔接。核心是**预防原则**的制度化。\n\n### Q3 环境民事责任的特殊性\n① **归责原则**：污染环境、破坏生态适用**无过错责任**；② **举证责任**：因果关系实行**举证责任倒置**（由排污方证明行为与损害无因果关系）；③ 可适用**惩罚性赔偿**；④ 救济含停止侵害、排除妨碍、赔偿损失与**生态环境修复**。\n\n### Q4 环境公益诉讼\n**类型**：民事公益诉讼、行政公益诉讼。**起诉主体**：符合条件的社会组织（民事）、人民检察院（民事与行政）；生态环境损害赔偿由省市政府及其指定部门提起磋商或诉讼。**目的**：保护社会公共利益、督促依法履职。\n\n### Q5 我国环境法基本制度体系\n以**环境影响评价**（事前预防）、**\"三同时\"**（建设期）、**排污许可**（运营期\"一证式\"）为核心，辅以**环境标准、环境保护规划、总量控制、环境保护税、生态补偿、环境监测与信息公开**等，构成\"预防—控制—责任—救济\"的制度链。\n\n### Q6 《生态环境法典》的结构与意义\n**结构**：5 编 1242 条——总则、污染防治、生态保护、绿色低碳发展、法律责任和附则。**意义**：系统整合现行法律（同时废止环保法等 10 部法律），消除冲突、填补空白，以习近平生态文明思想为引领，标志我国生态环境法治进入\"法典化\"时代。\n\n---\n\n## 四 · 易错辨析\n\n| 易混对 | 关键区别 |\n|---|---|\n| 环境质量标准 vs 排放标准 | 前者针对环境介质的质量目标；后者针对污染源的排放限值 |\n| 预防原则 vs 风险预防 | 预防针对已知危害；风险预防针对**不确定**的潜在风险 |\n| \"三同时\" vs 排污许可 | 三同时管建设期设施；许可管运营期排放 |\n| 民事公益诉讼 vs 生态环境损害赔偿 | 前者由社会组织/检察院提起；后者由政府作为权利人提起 |\n| 行政责任 vs 刑事责任 | 行政责任由行政机关追究（罚款/责令停产）；刑事责任由司法机关追究（污染环境罪等） |\n| 无过错责任 vs 过错责任 | 环境侵权一般适用无过错责任 |\n\n---\n\n> 速查为术，体系为道。原则统领制度，制度落实责任，责任连接救济；并以法典为最新坐标，名词与简答皆有据可依。"}, {"id": "web-03-2026", "group": "真题与网络资源", "title": "生态环境法典2026要点与新疆大学资料", "md": "# 生态环境法典（2026）要点 · 新疆大学环境法学相关资料\n\n> 据全国人大、新华社、人民日报、生态环境部公开文本整理；新疆大学院校特色部分标 `[推断]`，以本校教学大纲与任课教师讲义为准。\n\n---\n\n## 一 · 《中华人民共和国生态环境法典》核心要点（重大立法更新）\n\n| 项 | 内容 |\n|---|---|\n| 通过 | 2026 年 3 月 12 日，第十四届全国人民代表大会第四次会议表决通过 |\n| 公布 | 国家主席令第 70 号 |\n| 施行 | **2026 年 8 月 15 日起施行** |\n| 体量 | 共 **5 编、1242 条** |\n| 同时废止 | 《环境保护法》等 **10 部法律** |\n| 指导思想 | 以习近平生态文明思想为引领 |\n\n### 1.1 法典编目（5 编）\n\n```mermaid\nflowchart TD\n    R[\"中华人民共和国生态环境法典 (5编1242条)\"] --> A[\"第一编 总则\"]\n    R --> B[\"第二编 污染防治\"]\n    R --> C[\"第三编 生态保护\"]\n    R --> D[\"第四编 绿色低碳发展\"]\n    R --> E[\"第五编 法律责任和附则\"]\n    A --> A1[\"立法目的·基本原则·监督管理体制·公众参与\"]\n    B --> B1[\"大气·水·海洋·土壤·固废·噪声·化学物质等污染防治整合\"]\n    C --> C1[\"自然生态·生物多样性·生态修复等\"]\n    D --> D1[\"应对气候变化·碳达峰碳中和·循环经济等(亮点新增)\"]\n    E --> E1[\"行政·民事·刑事责任与生态环境损害赔偿\"]\n```\n\n### 1.2 编纂意义（高频论述点）\n\n1. **系统整合**：对现行分散的环境单行法（环保法、大气/水/固废/噪声/土壤污染防治法等）进行编订纂修、集成升华，消除规范冲突、填补空白。\n2. **首创\"绿色低碳发展\"编**：将应对气候变化、碳达峰碳中和、绿色低碳转型纳入法典，回应\"双碳\"战略，是重要制度创新。\n3. **法典化里程碑**：继《民法典》后我国又一部以\"典\"命名的法律，标志生态环境法治体系化、现代化。\n4. **价值引领**：体现中国特色、时代特点，反映人民意愿，系统规范协调。\n\n> **复习提示**：法典施行后，原\"环境保护法\"等表述应更新为\"生态环境法典相应编/条\"；但**基本原则、基本制度、法律责任的实体内容总体延续并升级**，原有复习要点仍然适用，重点掌握\"整合 + 新增绿色低碳发展编\"两条主线。\n\n---\n\n## 二 · 新疆大学开课背景\n\n新疆大学**生态与环境学院**（博达校区，乌鲁木齐市水磨沟区华瑞街777号）设环境科学（理学）、环境工程（工学）专业。环境法学/环境与资源保护法学常作为环境类专业的**专业基础/选修课**，或由法学院开设。`[推断]`\n\n- 培养目标含**环境规划管理、环境影响评价**等，环境法治素养是其重要组成。\n- 区域特色：服务\"一带一路\"新疆核心区与干旱区生态环境保护，强调生态文明与依法治污。\n\n---\n\n## 三 · 新疆区域特色考点（结合本地实际）`[推断]`\n\n1. **干旱区生态保护立法适用**：荒漠化防治、绿洲与水资源保护、生态红线的法律保障。\n2. **流域与跨界环境治理**：塔里木河等流域水资源与水污染防治的法律协调（协同合作原则）。\n3. **生态保护补偿**：草原、森林、湿地生态补偿制度在新疆的应用。\n4. **环境公益诉讼与生态环境损害赔偿**：本地典型案例（如非法排污、破坏草原/林地）的责任认定。\n5. **\"双碳\"与绿色低碳发展编**：结合新疆能源结构（煤电、新能源）讨论绿色低碳转型的法律制度。\n\n---\n\n## 四 · 备考与资源建议\n\n### 4.1 复习路径\n\n1. 以汪劲教材建立\"概念—原则—制度—责任—救济\"主干，再用「核心例题精解」「名词解释与简答速查」自测。\n2. **务必新增法典专题**：背熟法典 5 编结构、施行日期、废止范围、编纂意义与\"绿色低碳发展\"编亮点。\n3. 准备 1–2 道案例（环境侵权 + 公益诉讼/损害赔偿）的答题模板。\n\n### 4.2 推荐补充资源（公开、权威）\n\n- **法典原文**：全国人大网、生态环境部（mee.gov.cn）、新华网受权全文、维基文库《中华人民共和国生态环境法典》。\n- **官方解读**：人民日报、新华社关于法典通过的报道与释义文章。\n- **教材**：汪劲《环境法学》（北大社）、金瑞林《环境与资源保护法学》。\n- **案例库**：最高人民法院环境资源审判典型案例、检察机关公益诉讼典型案例。\n\n---\n\n## 五 · 常见问题\n\n**Q：法典施行后，老教材还能用吗？**\nA：能。基本原理、原则、制度、责任的**实体内容总体延续**；只需把法律依据更新为\"生态环境法典\"，并补学\"绿色低碳发展\"编等新增内容。\n\n**Q：法典会怎么考？**\nA：多以名词解释（生态环境法典）、简答（结构与意义）、论述（编纂意义/对单行法的整合/绿色低碳发展编的创新）形式出现；案例题仍以责任认定为主。\n\n**Q：与环境规划与管理课程如何衔接？**\nA：环境法学提供制度的**法律依据与责任后果**；环境规划与管理侧重制度的**技术实现与管理流程**。环评、三同时、排污许可、总量控制等是两课的共同交汇点。\n\n---\n\n> 法以时移，典以纲举。紧扣 2026《生态环境法典》最新坐标，兼顾新疆区域实际，方为\"取天下资源为我所用\"。院校特色多为依公开信息的合理推断，务必与任课教师要求核对。"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 环境法学 · 期末复习骨架\n\n> 教师: 杨建英 · 学期: 2026春\n> 共 14 PDF · 262 页 · 4 章节\n> 已填复习要点：4/4 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 第 2 章 | 环境保护法的基本原则 | 35 | [_第02章_环境保护法的基本原则.md](./_第02章_环境保护法的基本原则.md) |\n| 第 3 章 | 环境利用行为的主体及其权利义务 | 36 | [_第03章_环境利用行为的主体及其权利义务.md](./_第03章_环境利用行为的主体及其权利义务.md) |\n| 第 4 章 | 国家的环境保护义务 | 17 | [_第04章_国家的环境保护义务.md](./_第04章_国家的环境保护义务.md) |\n| 第 5 章 | 环境基本法与综合性环境法律制度 | 23 | [_第05章_环境基本法与综合性环境法律制度.md](./_第05章_环境基本法与综合性环境法律制度.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 111，密度 **薄**，建议复习期 2-3 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 第 2 章 · 环境保护法的基本原则\n\n> 主版 35 页 · 第 6 节 · [详细素材](./_第02章_环境保护法的基本原则.md)\n\n**核心三问**：\n\n- **是什么** ── 环境法基本原则：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）；预防原则（预防为主，防治结合，综合治理）：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）；协调发展原则（经济、社会发展与环境保护相协调）：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境法四大基本原则的名称与内涵（选择/简答·必考）；协调发展原则的概念与法条依据（《环保法》第4条）（简答）；预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 3 章 · 环境利用行为的主体及其权利义务\n\n> 主版 36 页 · 第 7 节 · [详细素材](./_第03章_环境利用行为的主体及其权利义务.md)\n\n**核心三问**：\n\n- **是什么** ── 环境利用行为（environmental utilization behavior）：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）；本能利用行为（instinctive utilization behavior）：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）；开发利用行为（development and utilization behavior）：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）；环境法律关系的概念与主体构成（名词解释）；公众环境权益的五项内容（简答）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 国家的环境保护义务\n\n> 主版 17 页 · 第 9 节 · [详细素材](./_第04章_国家的环境保护义务.md)\n\n**核心三问**：\n\n- **是什么** ── 国家环境保护义务：国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）；环境行政主体：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）；环境行政执法：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）；环境行政执法的具体形式（选择）；环境行政正当程序的四个要素（简答）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 5 章 · 环境基本法与综合性环境法律制度\n\n> 主版 23 页 · 第 10 节 · [详细素材](./_第05章_环境基本法与综合性环境法律制度.md)\n\n**核心三问**：\n\n- **是什么** ── 环境与资源保护法的基本制度：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）；环境标准制度：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）；环境质量标准：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境法基本制度的分类与确立依据（简答）；环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）；环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 四 · 章际交叉（同一课件涉两章）\n\n- 第 2 章  ⇄  第 3 章\n- 第 4 章  ⇄  第 5 章\n\n## 五 · 非教学性内容（仅记，期末不考）\n\n- 1 (22 页)\n- 1 (7 页)\n- 1 (9 页)\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 第 2 章 · 环境保护法的基本原则\n- [ ] 第 3 章 · 环境利用行为的主体及其权利义务\n- [ ] 第 4 章 · 国家的环境保护义务\n- [ ] 第 5 章 · 环境基本法与综合性环境法律制度\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练"}, {"id": "exam-期末速查", "group": "期末冲刺", "title": "期末速查", "md": "# 环境法学 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 4/4 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 2 | 环境保护法的基本原则 | 环境法基本原则：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）；预防原则（预防为主，防治结合，综合治理）：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）；协调发展原则（经济、社会发展与环境保护相协调）：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003） |  | 环境法四大基本原则的名称与内涵（选择/简答·必考）；协调发展原则的概念与法条依据（《环保法》第4条）（简答）；预防原则的内涵：预防为主、防治结合、综合治理（名词解释） |\n| 3 | 环境利用行为的主体及其权利义务 | 环境利用行为（environmental utilization behavior）：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）；本能利用行为（instinctive utilization behavior）：行为人在自然状态下为了生存繁衍、适应环境变化 p005） | 4 |\n| 环境行政执法 | 环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005） | 4 |\n| 环境与资源保护法的基本制度 | 调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004） | 5 |\n| 环境标准制度 | 为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009） | 5 |\n| 环境质量标准 | 在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013） | 5 |\n|  |  |  |\n|  |  |  |\n|  |  |  |"}, {"id": "exam-期末模拟卷", "group": "期末冲刺", "title": "期末模拟卷", "md": "# 环境法学 · 期末模拟卷\n\n> 教师: 杨建英 · 学期: 2026春\n> 自《最终复习资料》自举而生，仅作复习自测。\n> 出题时刻：2026-06-12 16:04:17\n\n---\n\n## 一、单项选择题（共 10 题）\n\n**1.** 环境法所调整的社会关系的核心是\n  - A. 因开发、利用、保护和改善环境而产生的社会关系\n  - B. 一般财产买卖关系\n  - C. 婚姻家庭关系\n  - D. 行政区划关系\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：环境法律关系围绕环境利用行为而展开。\n\n<\/details>\n\n**2.** 我国环境保护的基本原则不包括\n  - A. 保护优先、预防为主、综合治理\n  - B. 公众参与\n  - C. 损害担责\n  - D. 先污染后治理\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**D**  　解析：《环境保护法》确立保护优先、预防为主、综合治理、公众参与、损害担责等原则。\n\n<\/details>\n\n**3.** 《环境保护法》规定，企业事业单位在生产经营中产生污染应\n  - A. 采取措施防治污染，建立环境保护责任制度\n  - B. 自由排放\n  - C. 仅缴费即可不治理\n  - D. 无需公开信息\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：对应《环保法》第42条，明确防治义务与责任制。\n\n<\/details>\n\n**4.** 重点排污单位应当依法公开其主要污染物的名称、排放方式、浓度和总量等信息，这体现了\n  - A. 环境信息公开制度\n  - B. 排污许可豁免\n  - C. 总量奖励\n  - D. 行政复议\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：对应《环保法》第55条，保障公众知情与监督。\n\n<\/details>\n\n**5.** 公民依法享有获取环境信息、参与和监督环境保护的权利，属于\n  - A. 公众环境权（环境知情、参与、监督权）\n  - B. 物权\n  - C. 债权\n  - D. 行政处罚权\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：公众环境权是环境法赋予公民的程序性与实体性权利。\n\n<\/details>\n\n**6.** 建设项目环境保护设施必须与主体工程同时设计、同时施工、同时投产使用，这一制度是\n  - A. 三同时制度\n  - B. 排污许可制度\n  - C. 环境影响评价制度\n  - D. 限期治理制度\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：三同时制度旨在预防新污染源。\n\n<\/details>\n\n**7.** 对可能造成重大环境影响的建设项目，应当编制\n  - A. 环境影响报告书\n  - B. 营业执照\n  - C. 纳税申报表\n  - D. 用地许可\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：环境影响评价按影响程度分报告书、报告表、登记表。\n\n<\/details>\n\n**8.** 公民发现任何单位和个人有污染环境破坏生态行为，有权向有关部门\n  - A. 举报\n  - B. 直接处罚\n  - C. 强制拆除\n  - D. 没收财产\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：对应《环保法》第57条，举报人信息应受保护。\n\n<\/details>\n\n**9.** 我国环境法律体系中处于基础性、统领性地位的是\n  - A. 《环境保护法》\n  - B. 某地方政府规章\n  - C. 行业标准\n  - D. 企业内部制度\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：《环境保护法》为环境领域的基本法。\n\n<\/details>\n\n**10.** 排污权是指\n  - A. 排污者依法律法规规定、经环境管理部门许可向环境排放污染物的权利\n  - B. 无限排放的权利\n  - C. 一种物权凭证\n  - D. 行政强制权\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：排污权以排污许可与总量控制为前提。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 环境法律关系由主体、客体和 ___ 三要素构成。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**内容（权利与义务）**\n\n<\/details>\n\n**2.** 《环境保护法》确立的五大基本原则是保护优先、预防为主、综合治理、___ 和损害担责。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**公众参与**\n\n<\/details>\n\n**3.** 建设项目环保设施“三同时”指同时设计、同时施工、同时 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**投产使用**\n\n<\/details>\n\n**4.** 对超过污染物排放标准或超过总量控制指标排污的，可责令 ___ 整治。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**限期（限制生产、停产）**\n\n<\/details>\n\n**5.** 环境影响评价按可能造成影响的程度分为环境影响报告书、报告表和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**登记表**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 环境法律关系\n\n<details><summary>📝 参考答案<\/summary>\n\n答：环境法律规范在调整人们开发、利用、保护和改善环境的行为过程中所形成的，以权利义务为内容的社会关系，由主体、客体和内容三要素构成。\n\n<\/details>\n\n**2.** 公众环境权\n\n<details><summary>📝 参考答案<\/summary>\n\n答：公民基于在适宜、健康环境中生存发展的利益，依法享有的获取环境信息、参与环境决策、监督环境行为及请求救济等实体性与程序性权利的总称。\n\n<\/details>\n\n**3.** 三同时制度\n\n<details><summary>📝 参考答案<\/summary>\n\n答：建设项目中防治污染和保护环境的设施，必须与主体工程同时设计、同时施工、同时投产使用的制度，是预防新污染源产生的重要法律制度。\n\n<\/details>\n\n**4.** 排污权\n\n<details><summary>📝 参考答案<\/summary>\n\n答：排污者在符合排污许可与污染物总量控制要求的前提下，依法向环境排放一定种类和数量污染物的权利，可在制度框架下进行有偿使用与交易。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述我国《环境保护法》确立的基本原则。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①保护优先：把环境保护置于优先地位；②预防为主：防患于污染产生之前；③综合治理：多手段、多领域协同；④公众参与：保障知情、参与、监督；⑤损害担责（污染者负担）：谁污染谁治理、谁损害谁担责。\n\n<\/details>\n\n**2.** 简述公众环境权的主要内容。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①环境知情权：获取环境质量、排污等信息；②环境参与权：参与环境决策与建设项目论证；③环境监督权：监督、举报污染破坏行为；④环境侵害救济请求权：受害时请求停止侵害、赔偿损失等。\n\n<\/details>\n\n**3.** 简述环境影响评价制度的作用与分类。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：作用：在开发建设前预测评估其环境影响并提出对策，从源头预防环境损害。分类：按影响程度分为环境影响报告书（重大影响）、报告表（轻度影响）、登记表（影响很小），实行分类管理与审批。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试论我国环境法“预防为主”原则的内涵，并结合环境影响评价制度与“三同时”制度说明其如何在制度层面得到落实。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①内涵：环境损害往往具有潜伏性、长期性、难恢复性，事后治理代价高昂，故应把工作重点放在污染和生态破坏产生之前，通过预测、规划与控制防患于未然。②环境影响评价制度落实预防：要求建设项目在决策与开工前对其可能的环境影响进行预测评价并提出防治对策，未通过评价不得开工，从源头筛选与优化项目。③“三同时”制度落实预防：要求环保设施与主体工程同时设计、施工、投产使用，确保新建项目自投产即具备污染防治能力，防止“先建后治、边污边治”。④二者前后衔接：环评在决策端把关，三同时在建设运行端保障，共同构成预防为主原则的制度链条，再辅以排污许可、总量控制等，形成全过程预防体系。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "pages", "group": "原始课件", "title": "全部课件原页 · 逐讲", "md": "# 原始课件 · 页图（真实 PDF 页面）\n\n> 下列为雨课堂课件原始页面渲染；大讲已均匀采样关键页。点击讲次标题展开，单击图片可看大图。\n\n<details class=\"pdf-lesson\" open>\n<summary>001-13. 环境损害救济法-13. 环境损害救济法 · 9 页<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L01_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L01_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L01_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L01_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img load
