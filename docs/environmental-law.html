 |\n| ---- | ---- | ---: |\n| 环境法基本原则 | 调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002） | 2 |\n| 预防原则（预防为主，防治结合，综合治理） | 强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002） | 2 |\n| 协调发展原则（经济、社会发展与环境保护相协调） | 在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003） | 2 |\n| 环境利用行为（environmental utilization behavior） | 人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003） | 3 |\n| 本能利用行为（instinctive utilization behavior） | 行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003） | 3 |\n| 开发利用行为（development and utilization behavior） | 行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004） | 3 |\n| 国家环境保护义务 | 国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录） | 4 |\n| 环境行政主体 | 依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005） | 4 |\n| 环境行政执法 | 环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005） | 4 |\n| 环境与资源保护法的基本制度 | 调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004） | 5 |\n| 环境标准制度 | 为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009） | 5 |\n| 环境质量标准 | 在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013） | 5 |\n|  |  |  |\n|  |  |  |\n|  |  |  |\n"}, {"id": "exam-期末模拟卷", "group": "期末冲刺", "title": "期末模拟卷", "md": "# 环境法学 · 期末模拟卷\n\n> 教师: 杨建英 · 学期: 2026春\n> 自《最终复习资料》自举而生，仅作复习自测。\n> 出题时刻：2026-06-12 16:04:17\n\n---\n\n## 一、单项选择题（共 10 题）\n\n**1.** 环境法所调整的社会关系的核心是\n  - A. 因开发、利用、保护和改善环境而产生的社会关系\n  - B. 一般财产买卖关系\n  - C. 婚姻家庭关系\n  - D. 行政区划关系\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：环境法律关系围绕环境利用行为而展开。\n\n<\/details>\n\n**2.** 我国环境保护的基本原则不包括\n  - A. 保护优先、预防为主、综合治理\n  - B. 公众参与\n  - C. 损害担责\n  - D. 先污染后治理\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**D**  　解析：《环境保护法》确立保护优先、预防为主、综合治理、公众参与、损害担责等原则。\n\n<\/details>\n\n**3.** 《环境保护法》规定，企业事业单位在生产经营中产生污染应\n  - A. 采取措施防治污染，建立环境保护责任制度\n  - B. 自由排放\n  - C. 仅缴费即可不治理\n  - D. 无需公开信息\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：对应《环保法》第42条，明确防治义务与责任制。\n\n<\/details>\n\n**4.** 重点排污单位应当依法公开其主要污染物的名称、排放方式、浓度和总量等信息，这体现了\n  - A. 环境信息公开制度\n  - B. 排污许可豁免\n  - C. 总量奖励\n  - D. 行政复议\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：对应《环保法》第55条，保障公众知情与监督。\n\n<\/details>\n\n**5.** 公民依法享有获取环境信息、参与和监督环境保护的权利，属于\n  - A. 公众环境权（环境知情、参与、监督权）\n  - B. 物权\n  - C. 债权\n  - D. 行政处罚权\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：公众环境权是环境法赋予公民的程序性与实体性权利。\n\n<\/details>\n\n**6.** 建设项目环境保护设施必须与主体工程同时设计、同时施工、同时投产使用，这一制度是\n  - A. 三同时制度\n  - B. 排污许可制度\n  - C. 环境影响评价制度\n  - D. 限期治理制度\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：三同时制度旨在预防新污染源。\n\n<\/details>\n\n**7.** 对可能造成重大环境影响的建设项目，应当编制\n  - A. 环境影响报告书\n  - B. 营业执照\n  - C. 纳税申报表\n  - D. 用地许可\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：环境影响评价按影响程度分报告书、报告表、登记表。\n\n<\/details>\n\n**8.** 公民发现任何单位和个人有污染环境破坏生态行为，有权向有关部门\n  - A. 举报\n  - B. 直接处罚\n  - C. 强制拆除\n  - D. 没收财产\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：对应《环保法》第57条，举报人信息应受保护。\n\n<\/details>\n\n**9.** 我国环境法律体系中处于基础性、统领性地位的是\n  - A. 《环境保护法》\n  - B. 某地方政府规章\n  - C. 行业标准\n  - D. 企业内部制度\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：《环境保护法》为环境领域的基本法。\n\n<\/details>\n\n**10.** 排污权是指\n  - A. 排污者依法律法规规定、经环境管理部门许可向环境排放污染物的权利\n  - B. 无限排放的权利\n  - C. 一种物权凭证\n  - D. 行政强制权\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：排污权以排污许可与总量控制为前提。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 环境法律关系由主体、客体和 ___ 三要素构成。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**内容（权利与义务）**\n\n<\/details>\n\n**2.** 《环境保护法》确立的五大基本原则是保护优先、预防为主、综合治理、___ 和损害担责。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**公众参与**\n\n<\/details>\n\n**3.** 建设项目环保设施“三同时”指同时设计、同时施工、同时 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**投产使用**\n\n<\/details>\n\n**4.** 对超过污染物排放标准或超过总量控制指标排污的，可责令 ___ 整治。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**限期（限制生产、停产）**\n\n<\/details>\n\n**5.** 环境影响评价按可能造成影响的程度分为环境影响报告书、报告表和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**登记表**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 环境法律关系\n\n<details><summary>📝 参考答案<\/summary>\n\n答：环境法律规范在调整人们开发、利用、保护和改善环境的行为过程中所形成的，以权利义务为内容的社会关系，由主体、客体和内容三要素构成。\n\n<\/details>\n\n**2.** 公众环境权\n\n<details><summary>📝 参考答案<\/summary>\n\n答：公民基于在适宜、健康环境中生存发展的利益，依法享有的获取环境信息、参与环境决策、监督环境行为及请求救济等实体性与程序性权利的总称。\n\n<\/details>\n\n**3.** 三同时制度\n\n<details><summary>📝 参考答案<\/summary>\n\n答：建设项目中防治污染和保护环境的设施，必须与主体工程同时设计、同时施工、同时投产使用的制度，是预防新污染源产生的重要法律制度。\n\n<\/details>\n\n**4.** 排污权\n\n<details><summary>📝 参考答案<\/summary>\n\n答：排污者在符合排污许可与污染物总量控制要求的前提下，依法向环境排放一定种类和数量污染物的权利，可在制度框架下进行有偿使用与交易。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述我国《环境保护法》确立的基本原则。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①保护优先：把环境保护置于优先地位；②预防为主：防患于污染产生之前；③综合治理：多手段、多领域协同；④公众参与：保障知情、参与、监督；⑤损害担责（污染者负担）：谁污染谁治理、谁损害谁担责。\n\n<\/details>\n\n**2.** 简述公众环境权的主要内容。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①环境知情权：获取环境质量、排污等信息；②环境参与权：参与环境决策与建设项目论证；③环境监督权：监督、举报污染破坏行为；④环境侵害救济请求权：受害时请求停止侵害、赔偿损失等。\n\n<\/details>\n\n**3.** 简述环境影响评价制度的作用与分类。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：作用：在开发建设前预测评估其环境影响并提出对策，从源头预防环境损害。分类：按影响程度分为环境影响报告书（重大影响）、报告表（轻度影响）、登记表（影响很小），实行分类管理与审批。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试论我国环境法“预防为主”原则的内涵，并结合环境影响评价制度与“三同时”制度说明其如何在制度层面得到落实。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①内涵：环境损害往往具有潜伏性、长期性、难恢复性，事后治理代价高昂，故应把工作重点放在污染和生态破坏产生之前，通过预测、规划与控制防患于未然。②环境影响评价制度落实预防：要求建设项目在决策与开工前对其可能的环境影响进行预测评价并提出防治对策，未通过评价不得开工，从源头筛选与优化项目。③“三同时”制度落实预防：要求环保设施与主体工程同时设计、施工、投产使用，确保新建项目自投产即具备污染防治能力，防止“先建后治、边污边治”。④二者前后衔接：环评在决策端把关，三同时在建设运行端保障，共同构成预防为主原则的制度链条，再辅以排污许可、总量控制等，形成全过程预防体系。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "study-00", "group": "学习系统", "title": "00 备考总纲", "md": "# 环境法学 · 期末备考总纲\n\n> 教师：杨建英 · 学期：2026春\n> 生成于 2026-06-12 · 目标考试日 **2026-07-03**（共 21 天）\n> 章数：4 · 已填要点：4 章\n\n> *为学者日益，闻道者日损。* —— 复习非求多读，而求记牢；记牢之法，已有实证。\n\n---\n\n## 一 · 复习之道（实证为据）\n\n> 据 Dunlosky et al. 2013（《Psychological Science in the Public Interest》）与 Carpenter, Pan & Butler 2022（《Nature Reviews Psychology》）：\n\n| 技法 | 效用 | 怎么做 |\n|---|---|---|\n| **提取练习**（自测/默写） | **高** | 合上书，先答 `自测题库.md`，再对照——别只重读 |\n| **间隔重复**（分散练习） | **高** | 按下方日历，隔日/隔周回提取，别考前突击一次 |\n| 交错练习 | 中 | 按下方“交错刷题序”混章做题，别一章刷到底 |\n| 自我解释 / 追问“为什么” | 中 | 每个考点问自己“为什么成立、与上一章何关” |\n| 双重编码（图像） | 中 | 看/画每章思维导图，文字配图记 |\n| 高亮 · 重读 · 摘抄 | **低** | 感觉努力实则低效，不作为主手段 |\n\n## 二 · 三段备考（先懂 → 后测 → 终模考）\n\n- **一轮·通读理解**（2026-06-12 → 2026-06-22 · 11 天）：逐章通读图文 + 画/看思维导图，求懂而非背\n- **二轮·提取自测**（2026-06-23 → 2026-06-29 · 7 天）：闭卷做自测题与填空卡，错题标记\n- **三轮·模考查漏**（2026-06-30 → 2026-07-03 · 4 天）：限时模拟卷 + 错点专项 + 易错点重背\n\n## 三 · 间隔重复日历（首学 + 1/3/7/14 天回提取）\n\n| 日期 | 当日任务 |\n|---|---|\n| 2026-06-12 | 📖 首学：第 2 章 环境保护法的基本原则 |\n| 2026-06-13 | 🔁 提取复习：第 2 章 环境保护法的基本原则 |\n| 2026-06-14 | 📖 首学：第 3 章 环境利用行为的主体及其权利义务 |\n| 2026-06-15 | 🔁 提取复习：第 2 章 环境保护法的基本原则<br>🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务 |\n| 2026-06-17 | 🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务<br>📖 首学：第 4 章 国家的环境保护义务 |\n| 2026-06-18 | 🔁 提取复习：第 4 章 国家的环境保护义务 |\n| 2026-06-19 | 🔁 提取复习：第 2 章 环境保护法的基本原则 |\n| 2026-06-20 | 🔁 提取复习：第 4 章 国家的环境保护义务<br>📖 首学：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-21 | 🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务<br>🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-23 | 🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-24 | 🔁 提取复习：第 4 章 国家的环境保护义务 |\n| 2026-06-26 | 🔁 提取复习：第 2 章 环境保护法的基本原则 |\n| 2026-06-27 | 🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n| 2026-06-28 | 🔁 提取复习：第 3 章 环境利用行为的主体及其权利义务 |\n| 2026-07-01 | 🔁 提取复习：第 4 章 国家的环境保护义务 |\n| 2026-07-02 | 🔁 提取复习：第 5 章 环境基本法与综合性环境法律制度 |\n\n> 📖 = 首次学习（求懂）；🔁 = 闭卷提取复习（求牢）。错过某日，顺延即可，勿弃。\n\n## 四 · 交错刷题序（三轮 · 混章不连刷）\n\n1. 第 2 章 环境保护法的基本原则 → 第 3 章 环境利用行为的主体及其权利义务 → 第 4 章 国家的环境保护义务 → 第 5 章 环境基本法与综合性环境法律制度\n2. 第 3 章 环境利用行为的主体及其权利义务 → 第 4 章 国家的环境保护义务 → 第 5 章 环境基本法与综合性环境法律制度 → 第 2 章 环境保护法的基本原则\n3. 第 4 章 国家的环境保护义务 → 第 5 章 环境基本法与综合性环境法律制度 → 第 2 章 环境保护法的基本原则 → 第 3 章 环境利用行为的主体及其权利义务\n\n## 五 · 每日提取清单（贴在桌前）\n\n- [ ] 今日“首学”章：通读图文 + 看思维导图（求懂）\n- [ ] 今日“回提取”章：**闭卷**做 `自测题库.md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表\n"}, {"id": "study-a7ba9845", "group": "学习系统", "title": "自测题库", "md": "# 环境法学 · 自测题库（闭卷提取）\n\n> 共 59 道结构化提取题（不含思考题与脚手架）。\n\n> **用法**：先合上书答，再展开“参考答案”对照。**提取**比重读有效得多。\n> 答错/卡壳处，回 `_综合复习资料.md` 对应章精看，并标入次日复习。\n\n---\n\n## 第 2 章 · 环境保护法的基本原则\n\n**Q1（名词解释）** 环境法基本原则？\n\n<details><summary>参考答案<\/summary>\n\n调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）\n\n<\/details>\n\n**Q2（名词解释）** 预防原则（预防为主，防治结合，综合治理）？\n\n<details><summary>参考答案<\/summary>\n\n强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n\n<\/details>\n\n**Q3（名词解释）** 协调发展原则（经济、社会发展与环境保护相协调）？\n\n<details><summary>参考答案<\/summary>\n\n在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n\n<\/details>\n\n**Q4（名词解释）** 环境责任原则（原因者负担原则）？\n\n<details><summary>参考答案<\/summary>\n\n污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n\n<\/details>\n\n**Q5（名词解释）** 公众参与原则？\n\n<details><summary>参考答案<\/summary>\n\n公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n\n<\/details>\n\n**Q6（考点·闭卷默写）** 请展开论述：环境法四大基本原则的名称与内涵（选择/简答·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境法四大基本原则的名称与内涵（选择/简答·必考）\n\n<\/details>\n\n**Q7（考点·闭卷默写）** 请展开论述：协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：原因者负担原则的四层含义（选择·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：原因者负担原则的四层含义（选择·高频）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：公众参与原则的概念与适用方式（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公众参与原则的概念与适用方式（简答）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：协调发展原则的七项贯彻措施（论述）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：协调发展原则的七项贯彻措施（论述）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：盖巴斯科夫案与田纳西案的比较（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：盖巴斯科夫案与田纳西案的比较（案例分析）\n\n<\/details>\n\n## 第 3 章 · 环境利用行为的主体及其权利义务\n\n**Q1（名词解释）** 环境利用行为（environmental utilization behavior）？\n\n<details><summary>参考答案<\/summary>\n\n人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n\n<\/details>\n\n**Q2（名词解释）** 本能利用行为（instinctive utilization behavior）？\n\n<details><summary>参考答案<\/summary>\n\n行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n\n<\/details>\n\n**Q3（名词解释）** 开发利用行为（development and utilization behavior）？\n\n<details><summary>参考答案<\/summary>\n\n行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n\n<\/details>\n\n**Q4（名词解释）** 环境法律关系（environmental legal relation）？\n\n<details><summary>参考答案<\/summary>\n\n环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n\n<\/details>\n\n**Q5（名词解释）** 公民（自然人）？\n\n<details><summary>参考答案<\/summary>\n\n环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n\n<\/details>\n\n**Q6（名词解释）** 公众？\n\n<details><summary>参考答案<\/summary>\n\n与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n\n<\/details>\n\n**Q7（名词解释）** 环境保护组织？\n\n<details><summary>参考答案<\/summary>\n\n依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n\n<\/details>\n\n**Q8（名词解释）** 公众环境权益？\n\n<details><summary>参考答案<\/summary>\n\n既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n\n<\/details>\n\n**Q9（名词解释）** 排污权（emission right）？\n\n<details><summary>参考答案<\/summary>\n\n环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n\n<\/details>\n\n**Q10（名词解释）** 开发利用行为人环境社会责任？\n\n<details><summary>参考答案<\/summary>\n\n从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境法律关系的概念与主体构成（名词解释）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境法律关系的概念与主体构成（名词解释）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：公众环境权益的五项内容（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公众环境权益的五项内容（简答）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：公民环境保护的两类义务：一般义务+特别义务（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公民环境保护的两类义务：一般义务+特别义务（简答）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：逃避监管违法排污的方式及法律后果（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：逃避监管违法排污的方式及法律后果（简答）\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：重点排污单位环境信息公开制度（选择/简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：重点排污单位环境信息公开制度（选择/简答）\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：A公司监测数据造假案的法律适用（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：A公司监测数据造假案的法律适用（案例分析）\n\n<\/details>\n\n## 第 4 章 · 国家的环境保护义务\n\n**Q1（名词解释）** 国家环境保护义务？\n\n<details><summary>参考答案<\/summary>\n\n国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）\n\n<\/details>\n\n**Q2（名词解释）** 环境行政主体？\n\n<details><summary>参考答案<\/summary>\n\n依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n\n<\/details>\n\n**Q3（名词解释）** 环境行政执法？\n\n<details><summary>参考答案<\/summary>\n\n环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n\n<\/details>\n\n**Q4（名词解释）** 环境行政复议？\n\n<details><summary>参考答案<\/summary>\n\n公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n\n<\/details>\n\n**Q5（名词解释）** 环境行政诉讼？\n\n<details><summary>参考答案<\/summary>\n\n公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n\n<\/details>\n\n**Q6（名词解释）** 环境审判？\n\n<details><summary>参考答案<\/summary>\n\n人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n\n<\/details>\n\n**Q7（名词解释）** 环境检察？\n\n<details><summary>参考答案<\/summary>\n\n人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉讼等活动。（p015）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：环境行政执法的具体形式（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政执法的具体形式（选择）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：环境行政正当程序的四个要素（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政正当程序的四个要素（简答）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：环境行政违法的原因（论述）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政违法的原因（论述）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境行政复议与行政诉讼的区别（简答·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政复议与行政诉讼的区别（简答·高频）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：生态环境损害赔偿制度的适格主体（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态环境损害赔偿制度的适格主体（选择）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：林西县行政公益诉讼案的法律意义（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：林西县行政公益诉讼案的法律意义（案例分析）\n\n<\/details>\n\n## 第 5 章 · 环境基本法与综合性环境法律制度\n\n**Q1（名词解释）** 环境与资源保护法的基本制度？\n\n<details><summary>参考答案<\/summary>\n\n调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n\n<\/details>\n\n**Q2（名词解释）** 环境标准制度？\n\n<details><summary>参考答案<\/summary>\n\n为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n\n<\/details>\n\n**Q3（名词解释）** 环境质量标准？\n\n<details><summary>参考答案<\/summary>\n\n在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n\n<\/details>\n\n**Q4（名词解释）** 污染物排放标准？\n\n<details><summary>参考答案<\/summary>\n\n为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n\n<\/details>\n\n**Q5（名词解释）** 环境规划制度？\n\n<details><summary>参考答案<\/summary>\n\n为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n\n<\/details>\n\n**Q6（考点·闭卷默写）** 请展开论述：环境法基本制度的分类与确立依据（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境法基本制度的分类与确立依据（简答）\n\n<\/details>\n\n**Q7（考点·闭卷默写）** 请展开论述：环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：环境规划制度的三个层次（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境规划制度的三个层次（简答）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：五项基本制度的名称（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：五项基本制度的名称（选择）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：1979年《环保法（试行）》首创的五项制度（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：1979年《环保法（试行）》首创的五项制度（选择）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：A精细材料案中环境标准的适用（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：A精细材料案中环境标准的适用（案例分析）\n\n<\/details>\n"}, {"id": "study-8d66dc1d", "group": "学习系统", "title": "速记卡", "md": "# 环境法学 · 速记卡（填空 · 间隔重复）\n\n> 共 27 张卡。\n\n> 碎片时间用：看正面回忆背面，答不出的打 ✗，按间隔重复优先复习。\n\n---\n\n## 第 2 章 · 环境保护法的基本原则\n\n- ____：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）\n  - <details><summary>答案<\/summary> 环境法基本原则 <\/details>\n- ____：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n  - <details><summary>答案<\/summary> 预防原则（预防为主，防治结合，综合治理） <\/details>\n- ____：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n  - <details><summary>答案<\/summary> 协调发展原则（经济、社会发展与环境保护相协调） <\/details>\n- ____：污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n  - <details><summary>答案<\/summary> 环境责任原则（原因者负担原则） <\/details>\n- ____：公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n  - <details><summary>答案<\/summary> 公众参与原则 <\/details>\n\n## 第 3 章 · 环境利用行为的主体及其权利义务\n\n- ____：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n  - <details><summary>答案<\/summary> 环境利用行为（environmental utilization behavior） <\/details>\n- ____：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n  - <details><summary>答案<\/summary> 本能利用行为（instinctive utilization behavior） <\/details>\n- ____：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n  - <details><summary>答案<\/summary> 开发利用行为（development and utilization behavior） <\/details>\n- ____：环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n  - <details><summary>答案<\/summary> 环境法律关系（environmental legal relation） <\/details>\n- ____：环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n  - <details><summary>答案<\/summary> 公民（自然人） <\/details>\n- ____：与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n  - <details><summary>答案<\/summary> 公众 <\/details>\n- ____：依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n  - <details><summary>答案<\/summary> 环境保护组织 <\/details>\n- ____：既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n  - <details><summary>答案<\/summary> 公众环境权益 <\/details>\n- ____：环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n  - <details><summary>答案<\/summary> 排污权（emission right） <\/details>\n- ____：从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n  - <details><summary>答案<\/summary> 开发利用行为人环境社会责任 <\/details>\n\n## 第 4 章 · 国家的环境保护义务\n\n- ____：国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）\n  - <details><summary>答案<\/summary> 国家环境保护义务 <\/details>\n- ____：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n  - <details><summary>答案<\/summary> 环境行政主体 <\/details>\n- ____：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n  - <details><summary>答案<\/summary> 环境行政执法 <\/details>\n- ____：公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n  - <details><summary>答案<\/summary> 环境行政复议 <\/details>\n- ____：公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n  - <details><summary>答案<\/summary> 环境行政诉讼 <\/details>\n- ____：人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n  - <details><summary>答案<\/summary> 环境审判 <\/details>\n- ____：人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉讼等活动。（p015）\n  - <details><summary>答案<\/summary> 环境检察 <\/details>\n\n## 第 5 章 · 环境基本法与综合性环境法律制度\n\n- ____：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n  - <details><summary>答案<\/summary> 环境与资源保护法的基本制度 <\/details>\n- ____：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n  - <details><summary>答案<\/summary> 环境标准制度 <\/details>\n- ____：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n  - <details><summary>答案<\/summary> 环境质量标准 <\/details>\n- ____：为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n  - <details><summary>答案<\/summary> 污染物排放标准 <\/details>\n- ____：为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n  - <details><summary>答案<\/summary> 环境规划制度 <\/details>\n"}, {"id": "graph", "group": "知识图谱", "title": "章节图谱", "md": "# 环境法学 · 章节图谱\n\n> 教师: 杨建英 · 学期: 2026春  \n> PDF: 14, 页: 262, 识别章节: 4 个\n> 章节号: 2, 3, 4, 5\n\n## 总览\n\n| 章节 | 标题 | 主版页数 | PDF 数 |\n|------|------|---------:|------:|\n| 第 2 章 | 环境保护法的基本原则 | 35 | 6 |\n| 第 3 章 | 环境利用行为的主体及其权利义务 | 36 | 2 |\n| 第 4 章 | 国家的环境保
