<script id="course-data" type="application/json">{"slug": "environmental-law", "title": "环境法学", "folder": "环境法学", "meta": {"teacher": "杨建英", "term": "2026春", "pdf": 14, "chapters": 6}, "defaultSection": "chap-1", "sections": [{"id": "chap-1", "group": "章节精讲", "title": "第1章 · 环境法学概述", "md": "# 第1章 · 环境法学概述\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 三 · 复习要点\n\n#### 核心概念\n\n- **环境保护法（韩德培教授定义）**：调整因保护和改善生活环境和生态环境，防治污染和其他公害而产生的各种社会关系的法律规范的总称。\n- **理解定义的三个要点**：① 目的是在人类与环境之间建立一种协调和谐的关系——只适用于次生环境问题；② 主要通过保护和改善环境、防治污染和其他公害等途径实现目的；③ 是由一系列有关的法律法规共同组成的、若干法律规范的总称。\n- **环境保护法的特征**：① 科技性——基本原则、管理制度和法律规范都是从环境科学的研究成果和技术规范中提炼出来的，体现了生态规律和经济规律的要求；② 综合性——从法律关系看涉及社会关系广，从规范构成看由多种法律规范综合而成，从法的渊源看包括宪法、法律、行政法规、地方性法规等；③ 保护法益确立的共同性——环境是一个整体，不因国家和地区的划分而分割，环境法旨在保护社会乃至全体人类的利益。\n- **其他代表性定义（了解·对比）**：金瑞林——保护环境和自然资源、防治污染和其他公害的法律规范总称；周珂——为实现经济和社会可持续发展，调整有关保护和改善环境、合理利用自然资源、防治污染和其他公害的法律规范总称；汪劲——以保护和改善环境、警惕和预防人为环境侵害为目的，调整与环境相关人类行为的法律规范总称。\n- **教师总结（PDF原句）**：环境保护法，是生态文明的保障法，是美丽中国的护航法。\n- **环境法的发展阶段（世界）**：\n  1. 18世纪中叶至20世纪初：民法和零散污染防治立法并用，出现专门资源保护立法\n  2. 20世纪初至60年代：大量污染防治立法，出现偏向污染防治的基本立法，国际环境法开始发展\n  3. 20世纪70年代至今：国内环境立法爆炸式增长，环境法理念较大发展，国际与国内交互融合\n- **环境法的发展阶段（中国）**：\n  1. 1979年《环境保护法（试行）》——首次确立环评制度、排污收费制度、\"三同时\"制度等\n  2. 1989年《环境保护法》——正式颁布，专章规定基本制度\n  3. 2014年修订——强化政府责任，完善公众参与，加大处罚力度\n- **习近平生态文明思想六项原则**：\n  1. 坚持人与自然和谐共生\n  2. 绿水青山就是金山银山\n  3. 良好生态环境是最普惠的民生福祉\n  4. 山水林田湖草是生命共同体\n  5. 用最严格制度最严密法治保护生态环境\n  6. 共谋全球生态文明建设\n- **美丽中国**：中共十八大提出的执政理念，强调生态文明建设融入经济、政治、文化、社会建设各方面和全过程。2027年目标：绿色低碳发展深入推进；2035年目标：美丽中国基本实现；本世纪中叶：美丽中国全面建成。\n\n#### 核心法条 / 制度构成\n\n- **《环境保护法》第4条**：保护环境是国家的基本国策。国家采取有利于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经济、技术政策和措施，使经济社会发展与环境保护相协调。\n- **《国家公园法》(2026.1.1)**：首次用法律形式划定\"核心保护区+一般控制区\"双轨格局\n- **《生态环境法典》（2026.3.12 通过，2026.8.15 施行）**：继《民法典》后第二部以\"典\"命名的法律，共 5 编 1242 条（总则、污染防治、生态保护、绿色低碳发展、法律责任和附则），同时废止《环境保护法》等 10 部法律；单设绿色低碳发展编为重要创新。详见「真题与网络资源 · 生态环境法典2026要点」。\n\n#### 典型案例 / 裁判要旨\n\n- **长江流域非法捕捞生态损害赔偿案**：多人电鱼破坏渔业资源与水环境，依刑法+长江保护法+环境公益诉讼法追究生态损害赔偿。裁判要旨：生态没有替代品，用之不觉，失之难存；用法治守住生态红线，就是守住民生底线。\n- **校园/生活场景快判**：私自砍校园古树→违法；乱扔危废电池/乱倒实验废液→违法；垃圾回收造成污染→违法\n\n#### 高频考点\n\n1. 环境保护法的概念与特征（名词解释/简答）\n2. 世界环境法发展的三个阶段及其特点（简答/论述）\n3. 中国环境法的发展历程（1979→1989→2014）（简答）\n4. 习近平生态文明思想六项原则（论述题高频）\n5. 美丽中国的目标与时间节点（2027/2035/本世纪中叶）（选择/简答）\n6. 2026年环境法治三件大事（选择/简答）\n\n#### 易错 / 易混点\n\n- ❌ 混淆\"环境法发展阶段\"的世界与中国分期：世界分三期，中国分三法（试行→正式→修订）\n- ❌ 将\"美丽中国\"仅理解为生态概念：实际是政治、经济、文化、社会、生态五位一体\n- ❌ 忽略\"用最严格制度最严密法治保护生态环境\"原则——这是环境法与生态文明的桥梁\n- ❌ 将1979年试行法与1989年正式法混淆：试行法首次确立制度，正式法专章规定\n\n#### 思考题 / 自测\n\n1. 根据韩德培教授对环境保护法的定义，理解该定义需把握哪三个要点？环境保护法具有哪些基本特征？\n2. 比较世界环境法发展三个阶段与中国环境法发展三个阶段的异同。\n3. 习近平生态文明思想六项原则如何体现在现行环境法制度中？\n4. 《生态环境法典》编纂对环境法体系有何意义？\n\n#### 与前后章之关联\n\n- **→ 第2章**：第1章确立的环境法概念和发展脉络，是理解第2章\"基本原则\"的基础\n- **→ 第5章**：第1章提到的1979年试行法首次确立的制度（环评、排污收费、\"三同时\"），在第5章\"基本制度\"中详细展开\n- **→ 第6章**：第1章的环境法体系概述，为第6章\"污染控制法\"的单行法体系提供框架\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第1章<br/>环境法学概述))\n    1.1 环境保护法的概念\n      定义与调整对象\n      特征\n    1.2 创制发展与完善\n      世界发展四阶段\n      中国发展三阶段\n    习近平生态文明思想\n      六项原则\n      美丽中国\n    2026法治大事\n      国家公园法\n      生态环境法典\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L15_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L15_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L16_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L16_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L17_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L17_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L17_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L17_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L17_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L17_p031.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p011.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 体系示意 · 环境法律关系三要素\n\n```mermaid\nflowchart LR\n    A[\"环境法律关系\"] --> B[\"主体 国家 单位 公民\"]\n    A --> C[\"客体 环境要素与环境行为\"]\n    A --> D[\"内容 权利与义务\"]\n    B --> E[\"因环境保护与开发利用而结成\"]\n```\n\n#### 例题 1-1（名词解释）\n**题**：简述环境法的概念与基本特征。\n**参考答案**：\n- 概念（韩德培教授定义）：环境保护法是调整因**保护和改善生活环境和生态环境，防治污染和其他公害**而产生的各种社会关系的法律规范的总称。\n- 特征（PDF三特征）：① **科技性**（基本原则、管理制度和法律规范都从环境科学研究成果和技术规范中提炼，体现生态规律与经济规律的要求）；② **综合性**（涉及社会关系广、由多种法律规范综合而成、法的渊源包括宪法/法律/行政法规/地方性法规等）；③ **保护法益确立的共同性**（环境是一个整体，不因国家和地区划分而分割，旨在保护社会乃至全体人类的利益）。\n\n#### 例题 1-2（简答）\n**题**：环境法的渊源（形式）有哪些？\n**参考答案**：① 宪法中的环境保护条款；② 环境保护**基本法**（《环境保护法》）；③ 环境保护**单行法**（大气、水、固废、噪声等）；④ 环境保护**行政法规、部门规章与地方性法规**；⑤ 环境标准；⑥ 我国缔结或参加的**国际环境条约**。\n\n#### 例题 1-3（辨析）\n**题**：判断并说明——\"环境法只调整人与自然的关系\"。\n**参考答案**：**错误**。法律只能调整**人与人之间的社会关系**。环境法表面\"保护环境\"，实质是调整人们在开发利用与保护环境过程中**结成的人与人的社会关系**；人与自然的关系是其调整社会关系时所遵循的**自然规律基础**，而非法律调整对象本身。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境保护法\n\n<details><summary>参考答案<\/summary>\n\n（韩德培教授定义）调整因保护和改善生活环境和生态环境，防治污染和其他公害而产生的各种社会关系的法律规范的总称。教师总结：环境保护法是生态文明的保障法、美丽中国的护航法。\n\n<\/details>\n\n**Q2（简答论述）** 简述世界环境法发展的三个阶段及特征。\n\n<details><summary>参考答案<\/summary>\n\n① 18世纪中至20世纪初——资源保护与分散的污染治理立法，开始出现专门的资源保护立法；② 20世纪初至60年代——大量污染治理立法出现，偏重污染防治的基本法，各国环境法开始发展；③ 20世纪70年代至今——国内环境立法爆炸式增长，环境管理较为发达，国际交流与合作加强。\n\n<\/details>\n\n**Q3（简答）** 简述中国环境保护法的发展历程（三个标志年份）。\n\n<details><summary>参考答案<\/summary>\n\n1979 年《环境保护法（试行）》——首次确立环境影响评价、\"三同时\"、排污收费等制度；1989 年《环境保护法》正式颁布——分章规定基本制度；2014 年修订——强化政府责任、完善公众参与、加大处罚力度（被称\"史上最严\"）。\n\n<\/details>\n\n**Q4（论述·高频）** 简述习近平生态文明思想的六项原则。\n\n<details><summary>参考答案<\/summary>\n\n① 坚持人与自然和谐共生；② 绿水青山就是金山银山；③ 良好生态环境是最普惠的民生福祉；④ 山水林田湖草是生命共同体；⑤ 用最严格制度最严密法治保护生态环境；⑥ 共谋全球生态文明建设。\n\n<\/details>\n\n**Q5（选择/简答）** 美丽中国建设的三个时间节点目标。\n\n<details><summary>参考答案<\/summary>\n\n2027 年：绿色低碳发展深入推进；2035 年：美丽中国目标基本实现；本世纪中叶：美丽中国全面建成。\n\n<\/details>\n\n**Q6（名词解释）** 《环境保护法》第 4 条确立的基本要求。\n\n<details><summary>参考答案<\/summary>\n\n保护环境是国家的基本国策；国家采取有利于节约和循环利用资源、保护和改善环境的经济、技术政策和措施，使经济社会发展与环境保护相协调。\n\n<\/details>\n\n**Q7（案例·裁判要旨）** 长江流域非法捕捞生态损害赔偿案体现的环境法理。\n\n<details><summary>参考答案<\/summary>\n\n行为人破坏渔业资源与水生态，依法承担生态环境损害赔偿责任；裁判要旨：生态有价、损害担责，守住生态红线即是守住生存底线（环境公益诉讼）。\n\n<\/details>\n\n**Q8（选择/简答）** 2026 年环境法治标志性事件。\n\n<details><summary>参考答案<\/summary>\n\n《国家公园法》（2026.1.1 施行）——形成\"核心保护区 + 一般控制区\"双区格局；《生态环境法典》（2026.3.12 通过、2026.8.15 施行）——共 5 编 1242 条，整合并废止《环境保护法》等 10 部法律，单设绿色低碳发展编。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：调整因保护和改善生活环境和生态环境、防治污染和其他公害而产生的各种社会关系的法律规范总称（韩德培教授定义）\n  - <details><summary>答案<\/summary> 环境保护法 <\/details>\n- ____：世界环境法发展的三个阶段\n  - <details><summary>答案<\/summary> ①资源保护与分散治理(18C中-20C初) ②污染治理立法(20C初-60s) ③国内立法爆炸+国际合作(70s至今) <\/details>\n- ____：中国环境保护法发展的三个标志年份\n  - <details><summary>答案<\/summary> 1979试行 → 1989正式颁布 → 2014修订（史上最严） <\/details>\n- ____：习近平生态文明思想的六项原则\n  - <details><summary>答案<\/summary> 和谐共生／两山论／良好生态是民生福祉／生命共同体／最严制度法治／共谋全球生态文明 <\/details>\n- ____：美丽中国建设三个时间节点\n  - <details><summary>答案<\/summary> 2027 深入推进、2035 基本实现、本世纪中叶 全面建成 <\/details>\n- ____：《环境保护法》第 4 条的核心\n  - <details><summary>答案<\/summary> 保护环境是国家基本国策；经济社会发展与环境保护相协调 <\/details>\n- ____：2026 年施行、形成\"核心保护区+一般控制区\"双区格局的法律\n  - <details><summary>答案<\/summary> 《国家公园法》（2026.1.1） <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 69 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L15_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L15_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L15_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L15_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L15_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/envi \"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p011.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p012.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p012.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p013.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p013.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p014.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p014.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p015.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p015.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p016.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p017.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p017.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p018.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p018.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p020.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p020.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p021.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p021.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L18_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L18_p022.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-2", "group": "章节精讲", "title": "第2章 · 环境保护法的基本原则", "md": "# 第2章 · 环境保护法的基本原则\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 从OCR迁移\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境法基本原则**：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）\n- **预防原则**（预防为主，防治结合，综合治理）：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n- **协调发展原则**（经济、社会发展与环境保护相协调）：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n- **环境责任原则**（原因者负担原则）：污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n- **公众参与原则**：公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n\n#### 二、关键法条 / 制度构成\n\n- **《环境保护法》第4条**：保护环境是国家的基本国策。国家采取有利于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经济、技术政策和措施，使经济社会发展与环境保护相协调。（p003）\n- **《环境保护法》第6条**：一切单位和个人都有保护环境的义务。地方各级人民政府应当对本行政区域的环境质量负责。企业事业单位和其他生产经营者应当防止、减少环境污染和生态破坏，对所造成的损害依法承担责任。（p031）\n- **《环境保护法》第13条**：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划。环境保护规划与主体功能区规划、土地利用总体规划和城乡规划等相衔接。（p016）\n- **《环境保护法》第20条**：国家建立跨行政区域的重点区域、流域环境污染和生态破坏联合防治协调机制，实行统一规划、统一标准、统一监测、统一的防治措施。（p019 · 区域联防联控）\n\n#### 三、重要案例\n\n- **盖巴斯科夫-拉基玛洛大坝案**（p005-p006）：匈牙利与捷克在多瑙河修建大坝，匈牙利认定生态效益高于经济利益而停工。国际法院判决指出\"可持续发展充分表达了将经济发展与环境保护相协调的需要\"。→ 协调发展原则的国际法实践\n- **田纳西流域管理局诉希尔案**（p011-p015）：美国联邦最高法院以6:3判决保护濒危蜗牛镖优先于耗资一亿多美元的大坝完工。→ 环境保护优先于经济利益的经典判例\n- **中国东部沿海癌症村**（p007-p010）：浙江绍兴滨海工业区纺织企业污染致多个癌症村出现，\"化工企业开到哪里，癌症村便出现在哪里\"。→ 先污染后治理的惨痛教训\n- **株洲河西高新区案例**（p028-p029）：57个建设项目仅9个执行\"三同时\"，色拉油厂废水直排湘江造成严重农业损失。→ 有法不依、执法不严的典型\n\n#### 四、协调发展原则的贯彻措施（p016-p030）\n\n1. 将环境保护工作纳入国民经济和社会发展规划（第13条）\n2. 各部门国际合作，实行区域联防联控（第20条）\n3. 深入开展环境保护法制宣传教育\n4. 加强环境科学技术研究，保证环保资金投入\n5. 建立循环经济型社会（资源→产品→再生资源）\n6. 严格立法、严格执法，增大违法成本\n7. 探索编制自然资源资产负债表，实行自然资源资产离任审计\n\n#### 五、环境责任原则的贯彻（p032）\n\n1. 实行排污收费制度或征收污染税制度\n2. 实行废弃物品再生利用和回收制度\n3. 实行开发利用自然资源补偿费或税制度\n4. 建立环境保护费用的共同负担制度\n\n#### 六、公众参与原则（p033-p035）\n\n- **参与主体**：居民、各类专业人士、社会团体、与拟议行为有关的行政机关\n- **适用方式**：①环境影响评价中的公众参与制度；②决策信息公开与披露制度；③鼓励非政府环境组织代表公众参与；④公众参与的行政和司法保障制度\n\n#### 七、高频考点（速记）\n\n1. 环境法四大基本原则的名称与内涵（选择/简答·必考）\n2. 协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n3. 预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n4. 原因者负担原则的四层含义（选择·高频）\n5. 公众参与原则的概念与适用方式（简答）\n6. 协调发展原则的七项贯彻措施（论述）\n7. 盖巴斯科夫案与田纳西案的比较（案例分析）\n\n#### 八、易错 / 易混点\n\n- ❌ 将\"协调发展\"等同于\"经济优先\"：协调发展强调同步，非经济优先\n- ❌ 混淆\"预防原则\"与\"预防为主\"：前者是基本原则，后者是其内涵之一\n- ❌ 将\"原因者负担\"仅理解为\"污染者付费\"：还包括利用者补偿、开发者保护、破坏者恢复\n- ❌ 忽略公众参与原则的司法保障：公众参与不仅限于行政程序，还包括司法救济\n\n#### 九、与前后章之关联\n\n- **← 第1章**：第1章环境法概述为基本原则提供理论基础\n- **→ 第3章**：第3章环境利用行为主体是公众参与原则的具体化\n- **→ 第5章**：第5章环境基本制度是基本原则的制度化落实\n- **→ 第6章**：第6章污染控制法是原因者负担原则的具体适用\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第2章<br/>环境保护法的基本原则))\n    核心概念\n      环境法基本原则\n      预防原则\n      协调发展原则\n      环境责任原则\n      公众参与原则\n    关键法条 / 制度构成\n      《环境保护法》第4条\n      《环境保护法》第6条\n      《环境保护法》第13条\n      《环境保护法》第20条\n    协调发展原则的贯彻措施\n      将环境保护工作纳入国民经济和社会发展规划（第13条）\n      各部门国际合作，实行区域联防联控（第20条）\n      深入开展环境保护法制宣传教育\n      加强环境科学技术研究，保证环保资金投入\n      建立循环经济型社会（资源→产品→再生资源）\n      严格立法、严格执法，增大违法成本\n      探索编制自然资源资产负债表，实行自然资源资产离任审计\n    环境责任原则的贯彻\n      实行排污收费制度或征收污染税制度\n      实行废弃物品再生利用和回收制度\n      实行开发利用自然资源补偿费或税制度\n      建立环境保护费用的共同负担制度\n    公众参与原则\n      参与主体\n      适用方式\n    高频考点\n      环境法四大基本原则的名称与内涵（选择/简答·必考）\n      协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n      预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n      原因者负担原则的四层含义（选择·高频）\n      公众参与原则的概念与适用方式（简答）\n      协调发展原则的七项贯彻措施（论述）\n      盖巴斯科夫案与田纳西案的比较（案例分析）\n    易错 / 易混点\n      ❌ 将协调发展等同于经济优先\n      ❌ 混淆预防原则与预防为主\n      ❌ 将原因者负担仅理解为污染者付费\n      ❌ 忽略公众参与原则的司法保障\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L11_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L11_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L11_p015.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L11_p015.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L11_p030.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L11_p030.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L13_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L13_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L13_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L13_p016.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p009.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 体系示意 · 五项基本原则\n\n```mermaid\ngraph TD\n    R[\"环境保护法基本原则\"] --> P1[\"协调发展原则<br/>经济社会与环境保护相协调\"]\n    R --> P2[\"预防为主原则<br/>预防 保护 综合治理\"]\n    R --> P3[\"环境责任原则<br/>损害担责 污染者付费\"]\n    R --> P4[\"公众参与原则<br/>知情 参与 监督\"]\n    P3 --> P3a[\"谁污染谁治理\"]\n    P3 --> P3b[\"谁开发谁保护\"]\n```\n\n#### 例题 2-1（简答）\n**题**：试述\"预防为主\"原则的内涵及其制度体现。\n**参考答案**：\n- 内涵：环境损害往往**不可逆、难恢复、代价高**，故应在行为发生**之前**采取措施防止或减轻损害，辅以综合治理。\n- 制度体现：① **环境影响评价制度**（事前评价）；② **\"三同时\"制度**（防治设施与主体工程同时设计、施工、投产）；③ **规划环评**；④ **排污许可**与**总量控制**。\n\n#### 例题 2-2（论述）\n**题**：论述\"损害担责（污染者负担）\"原则及其与传统\"谁污染谁治理\"的发展关系。\n**参考答案**：\n1. 含义：**造成环境污染和生态破坏的主体，应承担治理责任和赔偿责任**，将环境成本**内部化**。\n2. 发展：早期表述为\"谁污染谁治理\"，侧重**末端治理**；2014 年《环境保护法》确立\"**损害担责**\"，扩展至**全过程、全要素**（含生态破坏、生态环境损害赔偿），责任形式涵盖行政、民事乃至刑事。\n3. 意义：纠正\"企业获利、社会买单\"的外部性，倒逼清洁生产与源头减量。\n\n#### 例题 2-3（案例分析）\n**题**：某化工厂长期超标排放废水致下游农田绝收。当地政府以\"招商引资重点企业\"为由不予处罚。请运用基本原则分析。\n**参考答案**：\n- 涉**协调发展原则**：经济发展不得以牺牲环境为代价，\"重点企业\"不构成免责事由。\n- 涉**环境责任/损害担责原则**：超标排放者应承担**停止侵害、消除危险、赔偿损失**的民事责任及**罚款、责令整改**的行政责任。\n- 涉**公众参与/监督**：受损农户有权举报、提起**环境民事公益诉讼**或私益诉讼；政府\"不予处罚\"属**行政不作为**，可申请复议或提起行政诉讼。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境法基本原则？\n\n<details><summary>参考答案<\/summary>\n\n调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）\n\n<\/details>\n\n**Q2（名词解释）** 预防原则（预防为主，防治结合，综合治理）？\n\n<details><summary>参考答案<\/summary>\n\n强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n\n<\/details>\n\n**Q3（名词解释）** 协调发展原则（经济、社会发展与环境保护相协调）？\n\n<details><summary>参考答案<\/summary>\n\n在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n\n<\/details>\n\n**Q4（名词解释）** 环境责任原则（原因者负担原则）？\n\n<details><summary>参考答案<\/summary>\n\n污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n\n<\/details>\n\n**Q5（名词解释）** 公众参与原则？\n\n<details><summary>参考答案<\/summary>\n\n公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n\n<\/details>\n\n**Q6（考点·闭卷默写）** 请展开论述：环境法四大基本原则的名称与内涵（选择/简答·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境法四大基本原则的名称与内涵（选择/简答·必考）\n\n<\/details>\n\n**Q7（考点·闭卷默写）** 请展开论述：协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：原因者负担原则的四层含义（选择·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：原因者负担原则的四层含义（选择·高频）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：公众参与原则的概念与适用方式（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公众参与原则的概念与适用方式（简答）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：协调发展原则的七项贯彻措施（论述）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：协调发展原则的七项贯彻措施（论述）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：盖巴斯科夫案与田纳西案的比较（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：盖巴斯科夫案与田纳西案的比较（案例分析）\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）\n  - <details><summary>答案<\/summary> 环境法基本原则 <\/details>\n- ____：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n  - <details><summary>答案<\/summary> 预防原则（预防为主，防治结合，综合治理） <\/details>\n- ____：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n  - <details><summary>答案<\/summary> 协调发展原则（经济、社会发展与环境保护相协调） <\/details>\n- ____：污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n  - <details><summary>答案<\/summary> 环境责任原则（原因者负担原则） <\/details>\n- ____：公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n  - <details><summary>答案<\/summary> 公众参与原则 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 88 页（点击展开）<\/summar \" src=\"assets/pdf/environmental-law/L14_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p011.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p012.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p012.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p013.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p013.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p014.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p014.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p015.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p015.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p016.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p017.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p017.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p018.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p018.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p020.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p020.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p021.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p021.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p022.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L14_p023.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L14_p023.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-3", "group": "章节精讲", "title": "第3章 · 环境权利、义务的主体及其权利义务", "md": "# 第3章 · 环境权利、义务的主体及其权利义务\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 从OCR迁移\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境利用行为（environmental utilization behavior）**：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n- **本能利用行为（instinctive utilization behavior）**：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n- **开发利用行为（development and utilization behavior）**：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n- **环境法律关系（environmental legal relation）**：环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n- **公民（自然人）**：环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n- **公众**：与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n- **环境保护组织**：依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n- **公众环境权益**：既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n- **排污权（emission right）**：环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n- **开发利用行为人环境社会责任**：从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n\n#### 二、关键法条 / 制度构成\n\n- **《环保法》第53条第1款**：公民、法人和其他组织依法享有获取环境信息、参与和监督环境保护的权利。宣示了公众参与环境保护的三项程序性权利：环境知情权、参与权和监督权。（p010）\n- **《环保法》第57条**：规定了公众对于环境违法行为的举报权。接受举报的机关应当对举报人的相关信息予以保密，保护举报人的合法权益。（p011）\n- **《环保法》第54条**：规定了政府机关和其他公共服务机构的环境信息发布职责。国务院环境保护主管部门统一发布国家环境质量、重点污染源监测信息及其他重大环境信息。还规定了环境违法企业的\"黑名单\"制度。（p012、p015）\n- **《环保法》第30条**：开发利用自然资源，应当合理开发，保护生物多样性，保障生态安全，依法制定有关生态保护和恢复治理方案并予以实施。（p018）\n- **《环保法》第42条**：排放污染物的企业事业单位和其他生产经营者应当采取措施防治污染；应建立环境保护责任制度；重点排污单位应安装使用监测设备；严禁通过暗管、渗井、渗坑、灌注或篡改伪造监测数据等逃避监管方式违法排放污染物。（p020-p023）\n- **《环保法》第55条**：重点排污单位应当如实向社会公开其主要污染物的名称、排放方式、排放浓度和总量、超标排放情况，以及防治污染设施的建设和运行情况，接受社会监督。（p024）\n- **《环保法》第47条**：各级人民政府及其有关部门和企业事业单位应当做好突发环境事件的风险控制、应急准备、应急处置和事后恢复等工作。企业事业单位应制定突发环境事件应急预案。（p031）\n\n#### 三、公众环境权益的内容（p008-p009）\n\n1. 优美、舒适环境的享受权\n2. 开发利用环境决策与行为知悉权\n3. 开发利用环境决策建言权\n4. 监督开发利用环境行为及其举报权\n5. 环境权益侵害救济请求权\n\n**三项核心程序性权利**：环境知情权、参与权和监督权（第53条）\n\n#### 四、公民的环境保护义务（p016）\n\n1. **关心和保护环境的一般义务**：《环保法》规定一切单位和个人都有保护环境的义务\n2. **忍受一定限度环境污染或自然环境损害的特别义务**：容忍的判断标准是排放行为是否具有合法性，以是否构成实质性影响为判断标准。是否应当忍受实质性影响取决于两个条件：①行为是否为当地通行；②影响是否可以通过经济上可行的措施克服\n\n#### 五、开发利用行为人的权利与义务（p017-p031）\n\n**一般权利**：\n- 取得政府特许的自然资源开发利用权或向环境排放污染物的权利\n- 按照自然资源规划或环境保护规划实施开发和利用环境的行为\n\n**义务**：\n- 接受国家宏观调控和管理监督\n- 触犯法律法规时接受制裁\n- 造成环境损害时承担民事责任\n\n**排污权及其义务**（p019-p023）：\n- 遵守排污范围、方法、途径及标准\n- 履行环境影响评价和\"三同时\"、排污许可、缴纳排污费税、接受现场检查等法定义务\n- 企业环保责任制：单位负责人为总负责人，环境监督员具体负责\n- 重点排污单位环境监测义务：安装使用监测设备，保证正常运行，保存原始监测记录\n- 严禁逃避监管违法排污：暗管、渗井、渗坑、灌注、篡改伪造监测数据等 → 行政拘留5-15日，构成犯罪追究刑事责任\n\n#### 六、重点排污单位环境信息公开（p024-p030）\n\n- **应当公开的信息**（第9条）：基础信息、排污信息、防治污染设施建设和运行情况、环评及环保行政许可情况、突发环境事件应急预案、其他\n- **公开方式**（第10条）：网站、企业环境信息公开平台、当地报刊等便于公众知晓的方式\n- **公开时限**（第11条）：名录公布后90日内公开；新生成或变更信息30日内公开\n- **违法责任**：责令公开，处3万元以下罚款，并予以公告\n\n#### 七、重要案例\n\n- **A公司环境监测数据弄虚作假案**（p032-p034）：A公司高浓度焦化废水未经处理直接用于熄焦（恶意偷排），自动监控数据造假（SO₂显示35-90mg/m³，实测166-172mg/m³）。B市环保局处罚145万元+没收保证金100万元；主管经理和仪表部经理被行政拘留7日。→ 体现《环保法》第42条对监测数据造假的严厉制裁\n\n#### 八、开发利用行为人环境社会责任（p035-p036）\n\n- **概念**：除强制性法律规范外的环境保护义务，具有道义性\n- **内容**：①通过环境保护质量体系认证或获得绿色标签认定；②推行清洁生产；③主动对外宣示环境保护守则\n\n#### 九、高频考点（速记）\n\n1. 环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n2. 环境法律关系的概念与主体构成（名词解释）\n3. 公众环境权益的五项内容（简答）\n4. 公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n5. 公民环境保护的两类义务：一般义务+特别义务（简答）\n6. 排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n7. 逃避监管违法排污的方式及法律后果（简答）\n8. 重点排污单位环境信息公开制度（选择/简答）\n9. A公司监测数据造假案的法律适用（案例分析）\n\n#### 十、易错 / 易混点\n\n- ❌ 将\"公众\"等同于\"公民\"：公众是群体概念，包括公民、法人、其他组织\n- ❌ 混淆\"排污权\"与\"环境权\"：排污权是行政特许权，非宪法基本权利\n- ❌ 忽略\"忍受义务\"的两个条件：当地通行+经济上可行措施可克服\n- ❌ 将\"环境社会责任\"等同于\"法律义务\"：前者是道义性的，非强制性\n- ❌ 混淆\"本能利用行为\"与\"开发利用行为\"：前者以基本生存为目的，后者以经济利益为目的\n\n#### 十一、与前后章之关联\n\n- **← 第2章**：第2章公众参与原则在本章具体化为公众环境权益\n- **→ 第4章**：本章开发利用行为人的义务对应第4章国家的环境保护义务\n- **→ 第5章**：本章排污权、环境信息公开放在第5章制度体系中落实\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第3章<br/>环境权利、义务的主体及其权利义务))\n    核心概念\n      环境利用行为（environmental utilization…\n      本能利用行为（instinctive utilization be…\n      开发利用行为（development and utilizatio…\n      环境法律关系（environmental legal relati…\n      公民（自然人）\n      公众\n      环境保护组织\n      公众环境权益\n      排污权（emission right）\n      开发利用行为人环境社会责任\n    关键法条 / 制度构成\n      《环保法》第53条第1款\n      《环保法》第57条\n      《环保法》第54条\n      《环保法》第30条\n      《环保法》第42条\n      《环保法》第55条\n      《环保法》第47条\n    公众环境权益的内容\n      三项核心程序性权利\n    公民的环境保护义务\n      关心和保护环境的一般义务\n      忍受一定限度环境污染或自然环境损害的特别义务\n    开发利用行为人的权利与义务\n      一般权利\n      义务\n      排污权及其义务\n    重点排污单位环境信息公开\n      应当公开的信息\n      公开方式\n      公开时限\n      违法责任\n    开发利用行为人环境社会责任\n      概念\n      内容\n    高频考点\n      环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n      环境法律关系的概念与主体构成（名词解释）\n      公众环境权益的五项内容（简答）\n      公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高…\n      公民环境保护的两类义务：一般义务+特别义务（简答）\n      排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n      逃避监管违法排污的方式及法律后果（简答）\n      重点排污单位环境信息公开制度（选择/简答）\n      A公司监测数据造假案的法律适用（案例分析）\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L10_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p013.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p013.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p025.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p025.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p031.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 例题 3-1（名词解释）\n**题**：什么是公众的环境权益？包含哪些内容？\n**参考答案**：公众环境权益指公民、法人和其他组织依法享有的**在健康、适宜环境中生活，并参与环境治理**的权益。内容包括：① **环境知情权**；② **环境参与权**（决策参与）；③ **环境监督权**（举报、检举）；④ 受到损害时的**救济权**（诉讼、赔偿）。\n\n#### 例题 3-2（简答）\n**题**：重点排污单位在环境信息公开方面负有哪些义务？\n**参考答案**：① 如实**公开主要污染物名称、排放方式、浓度与总量、超标情况**；② 公开**污染防治设施的建设与运行情况**；③ 通过**统一平台**实时或定期公开监测数据；④ 不得**篡改、伪造**监测数据。未依法公开的，由环保主管部门责令公开、处罚并记入信用记录。\n\n#### 例题 3-3（案例分析）\n**题**：某企业拒绝公开其废气在线监测数据，称属\"商业秘密\"。是否成立？\n**参考答案**：**不成立**。污染物排放数据涉及**环境公共利益与公众知情权**，依法属**强制公开**信息，不属于可豁免的商业秘密。企业拒绝公开，环保主管部门可**责令公开、处以罚款并公开违法信息**；构成弄虚作假的，依法从重处理。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境利用行为（environmental utilization behavior）？\n\n<details><summary>参考答案<\/summary>\n\n人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n\n<\/details>\n\n**Q2（名词解释）** 本能利用行为（instinctive utilization behavior）？\n\n<details><summary>参考答案<\/summary>\n\n行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n\n<\/details>\n\n**Q3（名词解释）** 开发利用行为（development and utilization behavior）？\n\n<details><summary>参考答案<\/summary>\n\n行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n\n<\/details>\n\n**Q4（名词解释）** 环境法律关系（environmental legal relation）？\n\n<details><summary>参考答案<\/summary>\n\n环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n\n<\/details>\n\n**Q5（名词解释）** 公民（自然人）？\n\n<details><summary>参考答案<\/summary>\n\n环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n\n<\/details>\n\n**Q6（名词解释）** 公众？\n\n<details><summary>参考答案<\/summary>\n\n与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n\n<\/details>\n\n**Q7（名词解释）** 环境保护组织？\n\n<details><summary>参考答案<\/summary>\n\n依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n\n<\/details>\n\n**Q8（名词解释）** 公众环境权益？\n\n<details><summary>参考答案<\/summary>\n\n既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n\n<\/details>\n\n**Q9（名词解释）** 排污权（emission right）？\n\n<details><summary>参考答案<\/summary>\n\n环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n\n<\/details>\n\n**Q10（名词解释）** 开发利用行为人环境社会责任？\n\n<details><summary>参考答案<\/summary>\n\n从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境法律关系的概念与主体构成（名词解释）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境法律关系的概念与主体构成（名词解释）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：公众环境权益的五项内容（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公众环境权益的五项内容（简答）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：公民环境保护的两类义务：一般义务+特别义务（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：公民环境保护的两类义务：一般义务+特别义务（简答）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：逃避监管违法排污的方式及法律后果（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：逃避监管违法排污的方式及法律后果（简答）\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：重点排污单位环境信息公开制度（选择/简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：重点排污单位环境信息公开制度（选择/简答）\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：A公司监测数据造假案的法律适用（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：A公司监测数据造假案的法律适用（案例分析）\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n  - <details><summary>答案<\/summary> 环境利用行为（environmental utilization behavior） <\/details>\n- ____：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n  - <details><summary>答案<\/summary> 本能利用行为（instinctive utilization behavior） <\/details>\n- ____：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n  - <details><summary>答案<\/summary> 开发利用行为（development and utilization behavior） <\/details>\n- ____：环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n  - <details><summary>答案<\/summary> 环境法律关系（environmental legal relation） <\/details>\n- ____：环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n  - <details><summary>答案<\/summary> 公民（ ironmental-law/L10_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p020.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p020.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p021.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p021.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p022.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p023.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p023.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p024.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p024.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p025.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p025.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p026.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p026.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p027.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p027.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p028.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p028.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p029.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p029.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p030.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p030.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p031.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p032.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p032.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p033.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p033.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p034.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p035.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L10_p036.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L10_p036.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-4", "group": "章节精讲", "title": "第4章 · 国家的环境保护职责", "md": "# 第4章 · 国家的环境保护职责\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 从OCR迁移\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **国家环境保护义务**：国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）\n- **环境行政主体**：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n- **环境行政执法**：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n- **环境行政复议**：公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n- **环境行政诉讼**：公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n- **环境审判**：人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n- **环境检察**：人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉讼等活动。（p015）\n\n#### 二、国家环境保护义务的三重结构（p002目录）\n\n1. **作为义务**（4.1.1）：国家必须积极采取行动保护环境\n2. **不作为义务**（4.1.2）：国家不得实施破坏环境的行为\n3. **给付义务**（4.1.3）：国家应向公民提供环境保护的公共物品和服务\n\n#### 三、环境行政的正当程序（p004）\n\n1. 信息公开\n2. 公众参与\n3. 说明决策的理由\n4. 公布周知\n\n#### 四、环境行政主体违法问题（p006-p009）\n\n**现实中存在的违法行政行为**：执法主体滥用职权、违反法定程序、越权行政、执法主体不适合、失职或不作为、证据不确实充分、定性不准确、适用法律不准确、行政处罚不恰当等。\n\n**违法行政行为的原因**：\n1. 环保立法障碍：部门本位主义思想严重；环境立法之间关系不协调\n2. 环境管理体制不完善：管理机构设置重复；政府行使了环保部门的部分职权\n3. 环保部门执法权限设置问题：各职能部门执法权配置不恰当；环保部门缺乏必要的强制执行权\n4. 环保部门的民主性、透明度不高\n5. 未形成强有力的监督机制\n6. 环保部门自身建设落后：法制机构欠缺；投入不足；人员专业化素养不高\n\n#### 五、环境行政复议与行政诉讼的区别（p012）\n\n| 区别点 | 行政复议 | 行政诉讼 |\n|--------|---------|---------|\n| 性质 | 行政行为 | 司法行为 |\n| 审查范围 | 合法性+合理性 | 仅合法性（一般） |\n| 审查结果 | 可维持或变更原决定 | 一般只能维持或撤销，不能变更 |\n| 不服后续 | 向法院起诉（一审程序） | 提起上诉（上诉程序） |\n\n**行政诉讼时效**：《环保法》15天；《森林法》《渔业法》30天\n\n#### 六、生态环境损害民事索赔权（p013）\n\n- 对生态破坏及其损失认识的发展——生态补偿制度\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n\n#### 七、重要案例\n\n- **林西县人民检察院诉林西县国土资源局行政公益诉讼案**（p016-p017）：李殿有自1999年起非法开采沸石，面积28亩，矿坑最深7.8米。林西县国土局多次下达行政处罚但违法行为人上交罚款后并未停止采矿，国土局存在怠于履行职责行为。检察院提起行政公益诉讼，法院当庭宣判支持全部诉讼请求，确认国土局未积极履行职责违法，判令继续履行监督管理法定职责。→ 环境行政公益诉讼的典型判例\n\n#### 八、高频考点（速记）\n\n1. 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n2. 环境行政执法的具体形式（选择）\n3. 环境行政正当程序的四个要素（简答）\n4. 环境行政违法的原因（论述）\n5. 环境行政复议与行政诉讼的区别（简答·高频）\n6. 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n7. 生态环境损害赔偿制度的适格主体（选择）\n8. 林西县行政公益诉讼案的法律意义（案例分析）\n\n#### 九、易错 / 易混点\n\n- ❌ 混淆\"环境行政复议\"与\"环境行政诉讼\"：前者审查合法性+合理性，后者一般仅审查合法性\n- ❌ 将\"环境审判\"等同于\"环境行政诉讼\"：环境审判包括行政、民事、刑事三类诉讼\n- ❌ 忽略\"给付义务\"：国家义务不仅是作为和不作为，还包括提供公共物品和服务\n- ❌ 混淆行政诉讼时效：环保法15天 vs 森林法/渔业法30天\n- ❌ 认为行政诉讼可以变更原决定：一般只能维持或撤销，不能变更\n\n#### 十、与前后章之关联\n\n- **← 第3章**：第3章开发利用行为人的义务对应本章国家的监督管理义务\n- **→ 第5章**：本章环境行政管理手段在第5章制度体系中具体展开\n- **→ 第6章**：本章环境行政处罚在污染控制法中具体适用\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第4章<br/>国家的环境保护职责))\n    核心概念\n      国家环境保护义务\n      环境行政主体\n      环境行政执法\n      环境行政复议\n      环境行政诉讼\n      环境审判\n      环境检察\n    国家环境保护义务的三重结构\n      作为义务\n n    D --> E\n    A --> F[\"造成生态环境损害\"] --> G[\"生态环境损害赔偿磋商/诉讼<br/>政府为索赔权利人\"]\n```\n\n#### 例题 4-1（简答）\n**题**：环境行政主体应遵循的\"正当程序\"包含哪些基本要求？\n**参考答案**：① **告知**（说明理由、权利义务）；② **听取意见/听证**（重大处罚前）；③ **回避**；④ **公开**（信息与依据）；⑤ **说明理由**；⑥ **救济告知**（复议、诉讼途径与期限）。\n\n#### 例题 4-2（辨析）\n**题**：行政复议与行政诉讼的主要区别。\n**参考答案**：\n| 维度 | 行政复议 | 行政诉讼 |\n|---|---|---|\n| 审查机关 | 上级**行政机关** | **人民法院** |\n| 审查范围 | 合法性**与合理性** | 原则上**合法性**为主 |\n| 程序 | 相对简便、免费、较快 | 严格司法程序 |\n| 关系 | 多数可**自由选择**；少数**复议前置** | — |\n\n#### 例题 4-3（案例分析）\n**题**：某企业违法倾倒危废致土壤、地下水严重污染。除行政处罚外，国家可主张何种责任？由谁主张？\n**参考答案**：可启动**生态环境损害赔偿**。① 权利主体：省级、市地级政府（及其指定部门）作为国家利益代表；② 方式：先**磋商**，磋商不成提起**生态环境损害赔偿诉讼**；③ 责任内容：修复生态环境（无法修复时赔偿修复费用）、赔偿期间服务功能损失、调查评估费用等。与行政罚款、刑事责任**可并行不悖**。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 国家环境保护义务？\n\n<details><summary>参考答案<\/summary>\n\n国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）\n\n<\/details>\n\n**Q2（名词解释）** 环境行政主体？\n\n<details><summary>参考答案<\/summary>\n\n依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n\n<\/details>\n\n**Q3（名词解释）** 环境行政执法？\n\n<details><summary>参考答案<\/summary>\n\n环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n\n<\/details>\n\n**Q4（名词解释）** 环境行政复议？\n\n<details><summary>参考答案<\/summary>\n\n公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n\n<\/details>\n\n**Q5（名词解释）** 环境行政诉讼？\n\n<details><summary>参考答案<\/summary>\n\n公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n\n<\/details>\n\n**Q6（名词解释）** 环境审判？\n\n<details><summary>参考答案<\/summary>\n\n人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n\n<\/details>\n\n**Q7（名词解释）** 环境检察？\n\n<details><summary>参考答案<\/summary>\n\n人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉讼等活动。（p015）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：环境行政执法的具体形式（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政执法的具体形式（选择）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：环境行政正当程序的四个要素（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政正当程序的四个要素（简答）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：环境行政违法的原因（论述）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政违法的原因（论述）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境行政复议与行政诉讼的区别（简答·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政复议与行政诉讼的区别（简答·高频）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：生态环境损害赔偿制度的适格主体（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态环境损害赔偿制度的适格主体（选择）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：林西县行政公益诉讼案的法律意义（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：林西县行政公益诉讼案的法律意义（案例分析）\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）\n  - <details><summary>答案<\/summary> 国家环境保护义务 <\/details>\n- ____：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n  - <details><summary>答案<\/summary> 环境行政主体 <\/details>\n- ____：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n  - <details><summary>答案<\/summary> 环境行政执法 <\/details>\n- ____：公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n  - <details><summary>答案<\/summary> 环境行政复议 <\/details>\n- ____：公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n  - <details><summary>答案<\/summary> 环境行政诉讼 <\/details>\n- ____：人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n  - <details><summary>答案<\/summary> 环境审判 <\/details>\n- ____：人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉 \"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p011.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L09_p012.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L09_p012.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-5", "group": "章节精讲", "title": "第5章 · 环境基本法与综合性环境法律制度", "md": "# 第5章 · 环境基本法与综合性环境法律制度\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 从OCR迁移\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境与资源保护法的基本制度**：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n- **环境标准制度**：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n- **环境质量标准**：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n- **污染物排放标准**：为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n- **环境规划制度**：为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n\n#### 二、环境法基本制度的分类（p005）\n\n- **环境保护基本法律制度**\n- **自然资源保护基本法律制度**\n\n> 划分是相对的，如规划制度、许可证制度既是环境保护的基本法律制度，又是自然资源保护的基本法律制度，只是侧重点不同。\n\n#### 三、环境法基本制度的确立依据（p008）\n\n1. 具体体现环境与资源保护法的基本原则\n2. 具体反映环境与资源保护法律的共通性和本质性的法律措施\n3. 依据基本国情和社会经济发展水平，通过对法的\"立、改、废\"逐步完善\n\n#### 四、环境标准制度（p009-p021）\n\n**环境标准分类**：\n- **强制性标准**：环境质量标准、污染物排放（控制）标准——必须执行\n- **推荐性标准**：环境监测方法标准、环境标准样品标准、环境基础标准——被强制性标准引用后也必须强制执行\n\n**环境质量标准**（p012-p017）：\n- 《环保法》第15条：国务院环保主管部门制定国家环境质量标准；省级政府可制定严于国标的地方标准，报国务院备案\n- 按环境要素分：水质量标准、大气质量标准、土壤质量标准、生物质量标准\n- 水质量标准按水体类型分：地面水、海水、地下水等；按用途分：生活饮用水、渔业用水、农业用水、娱乐用水、工业用水等\n- 大气环境质量标准：一类区（自然保护区、风景名胜区等）适用一级浓度限值；二类区（居住区、商业区、工业区、农村等）适用二级浓度限值\n\n**污染物排放标准**（p018）：\n- 《环保法》第16条：国务院环保主管部门根据国家环境质量标准和国家经济、技术条件制定国家污染物排放标准；省级政府可制定严于国标的地方标准，报国务院备案\n\n#### 五、环境规划制度（p022-p023）\n\n- 《环保法》第13条：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划\n- **三个层次**：\n  1. 国民经济和社会发展五年规划纲要（总体）→ 环境保护篇章\n  2. 重点专项规划（国务院主管部门）\n  3. 行业规划和地区规划（各部门、各地区）\n- 环境保护规划的内容应当包括生态保护和污染防治的目标、任务、保障措施等，并与主体功能区规划、土地利用总体规划和城乡规划等相衔接\n\n#### 六、环境保护法基本制度的历史发展（p006）\n\n- **1979年**《环境保护法（试行）》首先规定了：环境影响评价制度（第6条）、环境规划制度（第7条）、征收排污费制度（第18条）、\"三同时\"制度（第6条）、环境标准制度（第18、19条）\n- **1989年**《环境保护法》在第二章专章对环境法基本制度作出规定，使体系进一步丰富\n\n#### 七、五项基本制度（p007）\n\n1. 环境标准制度\n2. 环境规划制度\n3. 环境影响评价制度\n4. 环境费和环境税制度\n5. 突发环境事件应急管理制度\n\n#### 八、重要案例\n\n- **A精细材料有限公司诉B区人民政府环保行政处罚案**（p019-p021）：A公司排放废气臭气浓度超标，被限期治理后两次监测仍未达标《恶臭污染物排放标准》。B区政府作出停业、关闭处罚。A公司主张采样点与频次不合法。法院认定：采样点为厂界敏感点符合标准规定；频次间隔不足2小时存在瑕疵但不足以推翻结论。判决驳回原告诉讼请求，二审维持。→ 污染物排放标准在行政处罚中的适用\n\n**核心问题**：\n1. 《恶臭污染物排放标准》属于何种类型的环境标准？→ 污染物排放标准（强制性标准）\n2. 在行政处罚案件中是否需要其他类型环境标准配合使用？\n3. 标准适用的疑难问题由谁解释？\n\n#### 九、高频考点（速记）\n\n1. 环境法基本制度的分类与确立依据（简答）\n2. 环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n3. 环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n4. 地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n5. 环境规划制度的三个层次（简答）\n6. 五项基本制度的名称（选择）\n7. 1979年《环保法（试行）》首创的五项制度（选择）\n8. A精细材料案中环境标准的适用（案例分析）\n\n#### 十、易错 / 易混点\n\n- ❌ 混淆\"强制性标准\"与\"推荐性标准\"的范围：环境质量标准和污染物排放标准是强制性，其余为推荐性\n- ❌ 忽略推荐性标准被强制性标准引用后也必须强制执行\n- ❌ 混淆国家环境质量标准与国家污染物排放标准的制定依据：前者直接制定，后者需考虑\"国家经济、技术条件\"\n- ❌ 将环境规划仅理解为环境保护规划：还包括纳入国民经济和社会发展规划\n- ❌ 混淆环境质量标准按环境要素的分类与按用途的分类\n\n#### 十一、与前后章之关联\n\n- **← 第2章**：第2章基本原则在本章具体化为基本制度\n- **← 第4章**：第4章环境行政管理手段在本章制度体系中展开\n- **→ 第6章**：本章环境标准、排污许可等制度在污染控制法中具体适用\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第5章<br/>环境基本法与综合性环境法律制度))\n    核心概念\n      环境与资源保护法的基本制度\n      环境标准制度\n      环境质量标准\n      污染物排放标准\n      环境规划制度\n    环境法基本制度的分类\n      环境保护基本法律制度\n      自然资源保护基本法律制度\n    环境法基本制度的确立依据\n      具体体现环境与资源保护法的基本原则\n      具体反映环境与资源保护法律的共通性和本质性的法律措施\n      依据基本国情和社会经济发展水平，通过对法的立、改、废逐步完善\n    环境标准制度\n      环境标准分类\n      强制性标准\n      推荐性标准\n      环境质量标准\n      污染物排放标准\n    环境规划制度\n      三个层次\n    环境保护法基本制度的历史发展\n      1979年\n      1989年\n    五项基本制度\n      环境标准制度\n      环境规划制度\n      环境影响评价制度\n      环境费和环境税制度\n      突发环境事件应急管理制度\n    高频考点\n      环境法基本制度的分类与确立依据（简答）\n      环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n      环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n      地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n      环境规划制度的三个层次（简答）\n      五项基本制度的名称（选择）\n      1979年《环保法（试行）》首创的五项制度（选择）\n      A精细材料案中环境标准的适用（案例分析）\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L06_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p012.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p012.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p016.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p020.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p020.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 体系示意 · 全过程管控制度链\n\n```mermaid\nflowchart LR\n    A[\"环境影响评价<br/>(事前)\"] --> B[\"三同时<br/>(建设期)\"]\n    B --> C[\"排污许可<br/>(运营准入)\"]\n    C --> D[\"总量控制<br/>(配额)\"]\n    D --> E[\"环境监测+信息公开<br/>(运行监管)\"]\n    E --> F[\"按日计罚/查封扣押<br/>(违法惩戒)\"]\n```\n\n#### 例题 5-1（名词解释）\n**题**：什么是\"三同时\"制度？\n**参考答案**：建设项目中**防治污染和保护环境的设施**，必须与主体工程**同时设计、同时施工、同时投产使用**的制度。它是预防为主原则在建设期的核心落实，与环评制度首尾衔接。\n\n#### 例题 5-2（简答）\n**题**：简述环境影响评价制度的对象与基本程序。\n**参考答案**：\n- 对象：**规划**（综合性/专项规划）与**建设项目**。\n- 程序：① 筛选分类（报告书 / 报告表 / 登记表）；② 编制环评文件；③ **公众参与**（重大项目）；④ 主管部门**审批**；⑤ 跟踪评价与**环保验收**。\n\n#### 例题 5-3（案例分析）\n**题**：某项目未批先建、主体工程已投产但未建污染防治设施。涉及哪些制度违法？如何处理？\n**参考答案**：① 违反**环评制度**（未批先建）——责令停止建设、罚款，可责令恢复原状；② 违反**三同时制度**（防治设施未同时投产）——责令限期建设配套设施、罚款；③ 若已排污，违反**排污许可**——责令停止排污、按日连续处罚直至改正。体现\"预防为主 + 损害担责\"。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境与资源保护法的基本制度？\n\n<details><summary>参考答案<\/summary>\n\n调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n\n<\/details>\n\n**Q2（名词解释）** 环境标准制度？\n\n<details><summary>参考答案<\/summary>\n\n为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n\n<\/details>\n\n**Q3（名词解释）** 环境质量标准？\n\n<details><summary>参考答案<\/summary>\n\n在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n\n<\/details>\n\n**Q4（名词解释）** 污染物排放标准？\n\n<details><summary>参考答案<\/summary>\n\n为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n\n<\/details>\n\n**Q5（名词解释）** 环境规划制度？\n\n<details><summary>参考答案<\/summary>\n\n为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n\n<\/details>\n\n**Q6（考点·闭卷默写）** 请展开论述：环境法基本制度的分类与确立依据（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境法基本制度的分类与确立依据（简答）\n\n<\/details>\n\n**Q7（考点·闭卷默写）** 请展开论述：环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：环境规划制度的三个层次（简答）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境规划制度的三个层次（简答）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：五项基本制度的名称（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：五项基本制度的名称（选择）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：1979年《环保法（试行）》首创的五项制度（选择）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：1979年《环保法（试行）》首创的五项制度（选择）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：A精细材料案中环境标准的适用（案例分析）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：A精细材料案中环境标准的适用（案例分析）\n\n<\/details>\n\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n  - <details><summary>答案<\/summary> 环境与资源保护法的基本制度 <\/details>\n- ____：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n  - <details><summary>答案<\/summary> 环境标准制度 <\/details>\n- ____：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n  - <details><summary>答案<\/summary> 环境质量标准 <\/details>\n- ____：为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n  - <details><summary>答案<\/summary> 污染物排放标准 <\/details>\n- ____：为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n  - <details><summary>答案<\/summary> 环境规划制度 <\/details>\n\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 23 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L06_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p011.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p012.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p012.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p013.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p013.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p014.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p014.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p015.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p015.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p016.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p017.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p017.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p018.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p018.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p020.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p020.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p021.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p021.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p022.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L06_p023.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L06_p023.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-6", "group": "章节精讲", "title": "第6章 · 污染控制法", "md": "# 第6章 · 污染控制法\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 三 · 复习要点\n\n#### 核心概念\n\n- **环境污染**（1974年OECD经济合作与发展组织环境委员会最早提出）：被人们利用的物质或者能量直接或间接地进入环境，导致对自然的有害影响，以致危及人类健康、危害生命资源和生态系统，以及损害或者妨害舒适性和环境的其他合法用途的现象。\n- **公害**：一般认为，公害就是环境污染。我国《环境保护法》（2014修订版）第三章\"防治污染和其他公害\"第42条列举：在生产建设或者其他活动中产生的废气、废水、废渣、医疗废物、粉尘、恶臭气体、放射性物质以及噪声、振动、光辐射、电磁辐射等对环境的污染和危害。\n- **污染源**：造成环境污染的污染物的发生源，如向环境排放污染物或对环境产生有害影响的场所、设备和装置。\n- **污染物**：进入环境后使环境的正常组成和性质发生直接或间接有害于人类的物质和能量。\n- **一次污染物**：由污染源直接与环境接触、进入环境而导致的污染，污染物的物理、化学性质并未改变。\n- **二次污染物**：进入环境的一次污染物的物理、化学性质发生变化而形成的新污染物；在一定条件和范围内，二次污染物比一次污染物的污染更具破坏性、危害程度更大。\n- **环境污染防治法（污染控制法）**：国家为预防和治理环境污染和其他公害，对产生或可能产生环境污染和其他公害的原因活动（包括各种对环境不利的人为活动）实施管理，以达到保护生活环境和生态环境、进而达到保护人体健康和财产安全的目的而制定的同类法律的总称。\n\n#### 环境污染的特征（PDF p5）\n\n1. 是人类正常活动的有害副作用\n2. 须为物质、能量从一定的设施设备向外界排放或者泄漏\n3. 以环境为媒介对不特定人体造成危害\n4. 具有综合性和积累性\n5. 往往同时侵害多种权益\n6. 危及的范围广\n7. 引起的疾病往往难以发现和治疗\n\n#### 环境污染的分类（PDF p6）\n\n- 按物理、化学性质：一次污染物、二次污染物\n- 按介入环境的要素：大气污染、水质污染、海洋环境污染、土壤污染\n- 按污染物的形态：废气污染、废水污染、固体废物污染、噪声污染、放射性污染、电磁波辐射污染等\n\n#### 核心法条 / 制度构成\n\n- **污染控制法体系**：环境污染防治法律法规体系在形式上表现为环境保护基本法下属的单行法及其配套法规——单行法律 → 国务院行政法规 → 主管部门规章/环境标准 → 地方性法规规章。\n- **环境污染防治单行法律（PDF p10）**：《大气污染防治法》（2015年修订）、《水污染防治法》（2017年修正）、《海洋环境保护法》（2017年修正）、《环境噪声污染防治法》（2018年修正）、《固体废物污染环境防治法》（2016年修正）、《放射性污染防治法》（2003年）、《清洁生产促进法》（2002年）等。\n- **各国（地区）法律名称的差异**：美国在环境要素前冠以\"清洁\"二字（《清洁空气法》《清洁水法》）；日本采用\"环境要素+污染因子+防止（规制）\"（《大气污染防止法》《水质污浊防止法》《噪音规制法》）；中国台湾地区命名突出预防、管制、整治、清理、管理等目的。\n\n#### 典型案例 / 裁判要旨\n\n- **紫金矿业水污染案**：紫金矿业集团因含铜酸性废水渗漏致汀江水污染，被判处罚金3000万元，相关责任人获刑。→ 水污染防治法的严厉执行\n- **天津港爆炸固废案**：危险废物违规储存导致重大爆炸事故，相关责任人被追究刑事责任。→ 固体废物污染环境防治法的适用\n\n#### 高频考点\n\n1. 环境污染的概念（1974 OECD）与七个特征（名词解释/简答）\n2. 公害、污染源、污染物、一次/二次污染物的区别（名词解释）\n3. 环境污染防治法的概念与单行法体系（简答）\n4. 环境污染的三种分类维度（性质/要素/形态）（选择·高频）\n5. 各国（美/日/中台）污染防治法律名称的差异（选择）\n6. 污染从发生到危害的四个过程与法律控制思路（简答）\n\n#### 易错 / 易混点\n\n- ❌ 将\"污染控制法\"等同于\"环境保护法\"：前者是单行法体系，后者是基本法\n- ❌ 混淆大气污染与温室气体排放：温室气体排放受气候变化法调整，不完全等同于大气污染防治\n- ❌ 忽略土壤污染防治法的\"风险管控\"原则：不同于其他污染防治法的\"达标排放\"思路\n- ❌ 将固体废物\"三化\"顺序颠倒：正确顺序是减量化→资源化→无害化\n- ❌ 混淆排污许可与排污收费：许可是准入制度，收费（现改为环保税）是经济手段\n\n#### 思考题 / 自测\n\n1. 污染控制法体系与环境保护基本法的关系是什么？\n2. 总量控制制度与浓度控制制度有何区别？\n3. 《土壤污染防治法》为何采用\"风险管控\"而非\"达标排放\"？\n4. 固体废物\"三化\"原则如何体现预防原则和环境责任原则？\n\n#### 与前后章之关联\n\n- **← 第2章**：第2章的环境责任原则在污染控制法中具体适用\n- **← 第5章**：第5章的排污许可、环境标准在污染控制法中具体落实\n- **← 第4章**：第4章的环境行政处罚在污染控制执法中适用\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第6章<br/>污染控制法))\n    6.1 概念与特征\n      环境污染(OECD)\n      公害/污染源/污染物\n      一次/二次污染物\n      七个特征\n    6.2 污染分类\n      按性质:一次/二次\n      按要素:大气/水/海洋/土壤\n      按形态:废气/废水/固废/噪声\n    6.3 污染防治法\n      概念与发展\n      单行法体系\n      各国名称差异\n    6.4 法律控制思路\n      四个过程\n      确立制度基本思路\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L02_p032.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L02_p032.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L02_p081.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L02_p081.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L03_p023.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L03_p023.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L03_p067.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L03_p067.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L04_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L04_p011.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 体系示意 · 单行法与共通制度\n\n```mermaid\ngraph TD\n    R[\"污染控制法\"] --> A[\"大气污染防治法\"]\n    R --> B[\"水污染防治法\"]\n    R --> C[\"固体废物污染环境防治法\"]\n    R --> D[\"噪声污染防治法\"]\n    R --> E[\"共通制度<br/>排污许可·总量控制·按日计罚·查封扣押\"]\n```\n\n#### 例题 6-1（简答）\n**题**：《环境保护法》（2014）新增的\"四大利剑\"（强力执法手段）是什么？\n**参考答案**：① **按日连续处罚**（违法持续，罚款按日累加，上不封顶）；② **查封、扣押**（对违法排污设施设备）；③ **限制生产、停产整治**；④ **行政拘留**（对情节严重的违法责任人，移送公安）。另含**环境公益诉讼**与企业违法信息**信用惩戒**。\n\n#### 例题 6-2（案例分析 · 按日计罚）\n**题**：某厂超标排污被责令改正并罚款 10 万元；30 日后复查仍未改正。按日连续处罚如何计算？\n**参考答案**：自**责令改正之日的次日**起，到**再次检查发现仍未改正之日**，按**原处罚数额按日累加**计罚。若期间为 30 日，则加罚 $10\\text{ 万} \\times 30 = 300\\text{ 万元}$（与原 10 万元合并），且可同时采取**查封扣押、停产整治**等措施。其立法目的在于**消除\"守法成本高、违法成本低\"**的倒挂。\n\n#### 例题 6-3（辨析）\n**题**：固体废物污染防治为何强调\"减量化、资源化、无害化\"三原则的顺位？\n**参考答案**：① **减量化**居首——从源头减少产生量，治本；② **资源化**次之——对已产生废物循环利用，化害为利；③ **无害化**兜底——对无法利用者进行安全处置，防止二次污染。三者构成**从源头到末端**的递进式管控逻辑，契合\"预防为主、综合治理\"。\n\n---\n\n> **正言若反**：法条不离原则，原则不离事实，事实不离原始 PDF 课件之图表。本篇为\"考场上写得出\"的一层；遇疑，回归「综合复习资料」与各章素材，并核对最新法律文本。\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 污染控制法\n\n<details><summary>参考答案<\/summary>\n\n调整在防治环境污染过程中产生的社会关系的法律规范的总称，是环境法体系的重要组成部分；具有预防性、补救性和技术性特征。\n\n<\/details>\n\n**Q2（选择·高频）** 列举七大污染类型及其对应单行法。\n\n<details><summary>参考答案<\/summary>\n\n大气污染—《大气污染防治法》；水污染—《水污染防治法》；土壤污染—《土壤污染防治法》；固体废物污染—《固体废物污染环境防治法》；环境噪声污染—《噪声污染防治法》；放射性污染—《放射性污染防治法》；有毒化学品污染—相关化学品管理法规。\n\n<\/details>\n\n**Q3（简答）** 污染控制法律体系的层次结构。\n\n<details><summary>参考答案<\/summary>\n\n综合性法律（《环境保护法》）→ 各污染要素单行法 → 行政法规与部门规章；构成\"综合法—单行法—行政法规\"的多层级体系。\n\n<\/details>\n\n**Q4（简答论述）** 总量控制制度与排污许可制度的关系。\n\n<details><summary>参考答案<\/summary>\n\n总量控制据环境质量标准确定一定区域内污染物排放总量控制指标，并分配到各排污单位；排污许可制是落实总量控制的核心载体，将总量指标、排放限值等以许可证形式固定，实现\"一证式\"管理。\n\n<\/details>\n\n**Q5（选择/简答）** 《土壤污染防治法》（2018）的基本原则。\n\n<details><summary>参考答案<\/summary>\n\n预防为主、保护优先、分类管理、风险管控、污染担责、公众参与——以\"风险管控\"而非\"达标排放\"为核心思路。\n\n<\/details>\n\n**Q6（选择·必考）** 固体废物污染防治的\"三化\"原则。\n\n<details><summary>参考答案<\/summary>\n\n减量化 → 资源化 → 无害化（顺序不可颠倒），体现预防原则与环境责任原则。\n\n<\/details>\n\n**Q7（案例）** 紫金矿业水污染案体现的制度要点。\n\n<details><summary>参考答案<\/summary>\n\n金矿企业含酸废水渗漏致江河污染，被判罚款约 3000 万元、相关责任人被追究刑事责任；体现水污染防治的严格执法与\"损害担责\"。\n\n<\/details>\n\n**Q8（论述）** 为什么污染控制法是环境法体系的\"基础工程\"？\n\n<details><summary>参考答案<\/summary>\n\n污染控制法直接针对各类污染要素设定防治制度（排污许可、总量控制、环境监测、污染事故应急），是环境质量改善的具体落地法，与资源保护法、生态保护法共同构成环境法体系。\n\n<\/details>\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：调整防治环境污染过程中社会关系的法律规范总称\n  - <details><summary>答案<\/summary> 污染控制法（预防性+补救性+技术性） <\/details>\n- ____：七大污染类型\n  - <details><summary>答案<\/summary> 大气／水／土壤／固体废物／噪声／放射性／有毒化学品 <\/details>\n- ____：污染控制法律体系的层次\n  - <details><summary>答案<\/summary> 综合性法律→单行法→行政法规与部门规章 <\/details>\n- ____：将总量指标以许可证形式固定、落实总量控制的核心制度\n  - <details><summary>答案<\/summary> 排污许可制度 <\/details>\n- ____：《土壤污染防治法》的核心思路（不同于\"达标排放\"）\n  - <details><summary>答案<\/summary> 风险管控（预防为主、分类管理、污染担责） <\/details>\n- ____：固体废物污染防治\"三化\"原则及顺序\n  - <details><summary>答案<\/summary> 减量化 → 资源化 → 无害化 <\/details>\n- ____：确定区域内污染物排放总量并分配到排污单位的制度\n  - <details><summary>答案<\/summary> 总量控制制度 <\/details>\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 167 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-law/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L01_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-law/L01_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-law/L01_p003.jpg\" target=\"_bla 本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境法基本原则**：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）\n- **预防原则**（预防为主，防治结合，综合治理）：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n- **协调发展原则**（经济、社会发展与环境保护相协调）：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n- **环境责任原则**（原因者负担原则）：污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n- **公众参与原则**：公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n\n#### 二、关键法条 / 制度构成\n\n- **《环境保护法》第4条**：保护环境是国家的基本国策。国家采取有利于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经济、技术政策和措施，使经济社会发展与环境保护相协调。（p003）\n- **《环境保护法》第6条**：一切单位和个人都有保护环境的义务。地方各级人民政府应当对本行政区域的环境质量负责。企业事业单位和其他生产经营者应当防止、减少环境污染和生态破坏，对所造成的损害依法承担责任。（p031）\n- **《环境保护法》第13条**：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划。环境保护规划与主体功能区规划、土地利用总体规划和城乡规划等相衔接。（p016）\n- **《环境保护法》第20条**：国家建立跨行政区域的重点区域、流域环境污染和生态破坏联合防治协调机制，实行统一规划、统一标准、统一监测、统一的防治措施。（p019 · 区域联防联控）\n\n#### 三、重要案例\n\n- **盖巴斯科夫-拉基玛洛大坝案**（p005-p006）：匈牙利与捷克在多瑙河修建大坝，匈牙利认定生态效益高于经济利益而停工。国际法院判决指出\"可持续发展充分表达了将经济发展与环境保护相协调的需要\"。→ 协调发展原则的国际法实践\n- **田纳西流域管理局诉希尔案**（p011-p015）：美国联邦最高法院以6:3判决保护濒危蜗牛镖优先于耗资一亿多美元的大坝完工。→ 环境保护优先于经济利益的经典判例\n- **中国东部沿海癌症村**（p007-p010）：浙江绍兴滨海工业区纺织企业污染致多个癌症村出现，\"化工企业开到哪里，癌症村便出现在哪里\"。→ 先污染后治理的惨痛教训\n- **株洲河西高新区案例**（p028-p029）：57个建设项目仅9个执行\"三同时\"，色拉油厂废水直排湘江造成严重农业损失。→ 有法不依、执法不严的典型\n\n#### 四、协调发展原则的贯彻措施（p016-p030）\n\n1. 将环境保护工作纳入国民经济和社会发展规划（第13条）\n2. 各部门国际合作，实行区域联防联控（第20条）\n3. 深入开展环境保护法制宣传教育\n4. 加强环境科学技术研究，保证环保资金投入\n5. 建立循环经济型社会（资源→产品→再生资源）\n6. 严格立法、严格执法，增大违法成本\n7. 探索编制自然资源资产负债表，实行自然资源资产离任审计\n\n#### 五、环境责任原则的贯彻（p032）\n\n1. 实行排污收费制度或征收污染税制度\n2. 实行废弃物品再生利用和回收制度\n3. 实行开发利用自然资源补偿费或税制度\n4. 建立环境保护费用的共同负担制度\n\n#### 六、公众参与原则（p033-p035）\n\n- **参与主体**：居民、各类专业人士、社会团体、与拟议行为有关的行政机关\n- **适用方式**：①环境影响评价中的公众参与制度；②决策信息公开与披露制度；③鼓励非政府环境组织代表公众参与；④公众参与的行政和司法保障制度\n\n#### 七、高频考点（速记）\n\n1. 环境法四大基本原则的名称与内涵（选择/简答·必考）\n2. 协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n3. 预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n4. 原因者负担原则的四层含义（选择·高频）\n5. 公众参与原则的概念与适用方式（简答）\n6. 协调发展原则的七项贯彻措施（论述）\n7. 盖巴斯科夫案与田纳西案的比较（案例分析）\n\n#### 八、易错 / 易混点\n\n- ❌ 将\"协调发展\"等同于\"经济优先\"：协调发展强调同步，非经济优先\n- ❌ 混淆\"预防原则\"与\"预防为主\"：前者是基本原则，后者是其内涵之一\n- ❌ 将\"原因者负担\"仅理解为\"污染者付费\"：还包括利用者补偿、开发者保护、破坏者恢复\n- ❌ 忽略公众参与原则的司法保障：公众参与不仅限于行政程序，还包括司法救济\n\n#### 九、与前后章之关联\n\n- **← 第1章**：第1章环境法概述为基本原则提供理论基础\n- **→ 第3章**：第3章环境利用行为主体是公众参与原则的具体化\n- **→ 第5章**：第5章环境基本制度是基本原则的制度化落实\n- **→ 第6章**：第6章污染控制法是原因者负担原则的具体适用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境保护法的基本原则\n## 核心概念\n- 环境法基本原则\n- 预防原则\n- 协调发展原则\n- 环境责任原则\n- 公众参与原则\n## 关键法条 / 制度构成\n- 《环境保护法》第4条\n- 《环境保护法》第6条\n- 《环境保护法》第13条\n- 《环境保护法》第20条\n## 协调发展原则的贯彻措施\n- 将环境保护工作纳入国民经济和社会发展规划（第13条）\n- 各部门国际合作，实行区域联防联控（第20条）\n- 深入开展环境保护法制宣传教育\n- 加强环境科学技术研究，保证环保资金投入\n- 建立循环经济型社会（资源→产品→再生资源）\n- 严格立法、严格执法，增大违法成本\n- 探索编制自然资源资产负债表，实行自然资源资产离任审计\n## 环境责任原则的贯彻\n- 实行排污收费制度或征收污染税制度\n- 实行废弃物品再生利用和回收制度\n- 实行开发利用自然资源补偿费或税制度\n- 建立环境保护费用的共同负担制度\n## 公众参与原则\n- 参与主体\n- 适用方式\n## 高频考点\n- 环境法四大基本原则的名称与内涵（选择/简答·必考）\n- 协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n- 预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n- 原因者负担原则的四层含义（选择·高频）\n- 公众参与原则的概念与适用方式（简答）\n- 协调发展原则的七项贯彻措施（论述）\n- 盖巴斯科夫案与田纳西案的比较（案例分析）\n## 易错 / 易混点\n- ❌ 将\"协调发展\"等同于\"经济优先\"\n- ❌ 混淆\"预防原则\"与\"预防为主\"\n- ❌ 将\"原因者负担\"仅理解为\"污染者付费\"\n- ❌ 忽略公众参与原则的司法保障\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境保护法的基本原则))\n    核心概念\n      环境法基本原则\n      预防原则\n      协调发展原则\n      环境责任原则\n      公众参与原则\n    关键法条 / 制度构成\n      《环境保护法》第4条\n      《环境保护法》第6条\n      《环境保护法》第13条\n      《环境保护法》第20条\n    协调发展原则的贯彻措施\n      将环境保护工作纳入国民经济和社会发展规划（第13条）\n      各部门国际合作，实行区域联防联控（第20条）\n      深入开展环境保护法制宣传教育\n      加强环境科学技术研究，保证环保资金投入\n      建立循环经济型社会（资源→产品→再生资源）\n      严格立法、严格执法，增大违法成本\n      探索编制自然资源资产负债表，实行自然资源资产离任审计\n    环境责任原则的贯彻\n      实行排污收费制度或征收污染税制度\n      实行废弃物品再生利用和回收制度\n      实行开发利用自然资源补偿费或税制度\n      建立环境保护费用的共同负担制度\n    公众参与原则\n      参与主体\n      适用方式\n    高频考点\n      环境法四大基本原则的名称与内涵（选择/简答·必考）\n      协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n      预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n      原因者负担原则的四层含义（选择·高频）\n      公众参与原则的概念与适用方式（简答）\n      协调发展原则的七项贯彻措施（论述）\n      盖巴斯科夫案与田纳西案的比较（案例分析）\n    易错 / 易混点\n      ❌ 将协调发展等同于经济优先\n      ❌ 混淆预防原则与预防为主\n      ❌ 将原因者负担仅理解为污染者付费\n      ❌ 忽略公众参与原则的司法保障\n```\n\n<\/details>\n\n---\n\n### 第 3 章 · 环境利用行为的主体及其权利义务\n\n> 素材：[_第03章_环境利用行为的主体及其权利义务.md](./_第03章_环境利用行为的主体及其权利义务.md) · 主版 36 页\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境利用行为（environmental utilization behavior）**：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n- **本能利用行为（instinctive utilization behavior）**：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n- **开发利用行为（development and utilization behavior）**：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n- **环境法律关系（environmental legal relation）**：环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n- **公民（自然人）**：环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n- **公众**：与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n- **环境保护组织**：依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n- **公众环境权益**：既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n- **排污权（emission right）**：环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n- **开发利用行为人环境社会责任**：从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n\n#### 二、关键法条 / 制度构成\n\n- **《环保法》第53条第1款**：公民、法人和其他组织依法享有获取环境信息、参与和监督环境保护的权利。宣示了公众参与环境保护的三项程序性权利：环境知情权、参与权和监督权。（p010）\n- **《环保法》第57条**：规定了公众对于环境违法行为的举报权。接受举报的机关应当对举报人的相关信息予以保密，保护举报人的合法权益。（p011）\n- **《环保法》第54条**：规定了政府机关和其他公共服务机构的环境信息发布职责。国务院环境保护主管部门统一发布国家环境质量、重点污染源监测信息及其他重大环境信息。还规定了环境违法企业的\"黑名单\"制度。（p012、p015）\n- **《环保法》第30条**：开发利用自然资源，应当合理开发，保护生物多样性，保障生态安全，依法制定有关生态保护和恢复治理方案并予以实施。（p018）\n- **《环保法》第42条**：排放污染物的企业事业单位和其他生产经营者应当采取措施防治污染；应建立环境保护责任制度；重点排污单位应安装使用监测设备；严禁通过暗管、渗井、渗坑、灌注或篡改伪造监测数据等逃避监管方式违法排放污染物。（p020-p023）\n- **《环保法》第55条**：重点排污单位应当如实向社会公开其主要污染物的名称、排放方式、排放浓度和总量、超标排放情况，以及防治污染设施的建设和运行情况，接受社会监督。（p024）\n- **《环保法》第47条**：各级人民政府及其有关部门和企业事业单位应当做好突发环境事件的风险控制、应急准备、应急处置和事后恢复等工作。企业事业单位应制定突发环境事件应急预案。（p031）\n\n#### 三、公众环境权益的内容（p008-p009）\n\n1. 优美、舒适环境的享受权\n2. 开发利用环境决策与行为知悉权\n3. 开发利用环境决策建言权\n4. 监督开发利用环境行为及其举报权\n5. 环境权益侵害救济请求权\n\n**三项核心程序性权利**：环境知情权、参与权和监督权（第53条）\n\n#### 四、公民的环境保护义务（p016）\n\n1. **关心和保护环境的一般义务**：《环保法》规定一切单位和个人都有保护环境的义务\n2. **忍受一定限度环境污染或自然环境损害的特别义务**：容忍的判断标准是排放行为是否具有合法性，以是否构成实质性影响为判断标准。是否应当忍受实质性影响取决于两个条件：①行为是否为当地通行；②影响是否可以通过经济上可行的措施克服\n\n#### 五、开发利用行为人的权利与义务（p017-p031）\n\n**一般权利**：\n- 取得政府特许的自然资源开发利用权或向环境排放污染物的权利\n- 按照自然资源规划或环境保护规划实施开发和利用环境的行为\n\n**义务**：\n- 接受国家宏观调控和管理监督\n- 触犯法律法规时接受制裁\n- 造成环境损害时承担民事责任\n\n**排污权及其义务**（p019-p023）：\n- 遵守排污范围、方法、途径及标准\n- 履行环境影响评价和\"三同时\"、排污许可、缴纳排污费税、接受现场检查等法定义务\n- 企业环保责任制：单位负责人为总负责人，环境监督员具体负责\n- 重点排污单位环境监测义务：安装使用监测设备，保证正常运行，保存原始监测记录\n- 严禁逃避监管违法排污：暗管、渗井、渗坑、灌注、篡改伪造监测数据等 → 行政拘留5-15日，构成犯罪追究刑事责任\n\n#### 六、重点排污单位环境信息公开（p024-p030）\n\n- **应当公开的信息**（第9条）：基础信息、排污信息、防治污染设施建设和运行情况、环评及环保行政许可情况、突发环境事件应急预案、其他\n- **公开方式**（第10条）：网站、企业环境信息公开平台、当地报刊等便于公众知晓的方式\n- **公开时限**（第11条）：名录公布后90日内公开；新生成或变更信息30日内公开\n- **违法责任**：责令公开，处3万元以下罚款，并予以公告\n\n#### 七、重要案例\n\n- **A公司环境监测数据弄虚作假案**（p032-p034）：A公司高浓度焦化废水未经处理直接用于熄焦（恶意偷排），自动监控数据造假（SO₂显示35-90mg/m³，实测166-172mg/m³）。B市环保局处罚145万元+没收保证金100万元；主管经理和仪表部经理被行政拘留7日。→ 体现《环保法》第42条对监测数据造假的严厉制裁\n\n#### 八、开发利用行为人环境社会责任（p035-p036）\n\n- **概念**：除强制性法律规范外的环境保护义务，具有道义性\n- **内容**：①通过环境保护质量体系认证或获得绿色标签认定；②推行清洁生产；③主动对外宣示环境保护守则\n\n#### 九、高频考点（速记）\n\n1. 环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n2. 环境法律关系的概念与主体构成（名词解释）\n3. 公众环境权益的五项内容（简答）\n4. 公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n5. 公民环境保护的两类义务：一般义务+特别义务（简答）\n6. 排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n7. 逃避监管违法排污的方式及法律后果（简答）\n8. 重点排污单位环境信息公开制度（选择/简答）\n9. A公司监测数据造假案的法律适用（案例分析）\n\n#### 十、易错 / 易混点\n\n- ❌ 将\"公众\"等同于\"公民\"：公众是群体概念，包括公民、法人、其他组织\n- ❌ 混淆\"排污权\"与\"环境权\"：排污权是行政特许权，非宪法基本权利\n- ❌ 忽略\"忍受义务\"的两个条件：当地通行+经济上可行措施可克服\n- ❌ 将\"环境社会责任\"等同于\"法律义务\"：前者是道义性的，非强制性\n- ❌ 混淆\"本能利用行为\"与\"开发利用行为\"：前者以基本生存为目的，后者以经济利益为目的\n\n#### 十一、与前后章之关联\n\n- **← 第2章**：第2章公众参与原则在本章具体化为公众环境权益\n- **→ 第4章**：本章开发利用行为人的义务对应第4章国家的环境保护义务\n- **→ 第5章**：本章排污权、环境信息公开放在第5章制度体系中落实\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境利用行为的主体及其权利义务\n## 核心概念\n- 环境利用行为（
