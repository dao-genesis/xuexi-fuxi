。（p002）\n- **预防原则**（预防为主，防治结合，综合治理）：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）\n- **协调发展原则**（经济、社会发展与环境保护相协调）：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n- **环境责任原则**（原因者负担原则）：污染者付费、利用者补偿、开发者保护、破坏者恢复。（p002、p031）\n- **公众参与原则**：公众有权通过一定程序或途径参与一切与公众环境权益相关的开发决策等活动，并有权得到相应的法律保护和救济，以防止决策的盲目性。（p033）\n\n#### 二、关键法条 / 制度构成\n\n- **《环境保护法》第4条**：保护环境是国家的基本国策。国家采取有利于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经济、技术政策和措施，使经济社会发展与环境保护相协调。（p003）\n- **《环境保护法》第6条**：一切单位和个人都有保护环境的义务。地方各级人民政府应当对本行政区域的环境质量负责。企业事业单位和其他生产经营者应当防止、减少环境污染和生态破坏，对所造成的损害依法承担责任。（p031）\n- **《环境保护法》第13条**：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划。环境保护规划与主体功能区规划、土地利用总体规划和城乡规划等相衔接。（p016）\n- **《环境保护法》第20条**：国家建立跨行政区域的重点区域、流域环境污染和生态破坏联合防治协调机制，实行统一规划、统一标准、统一监测、统一的防治措施。（p019 · 区域联防联控）\n\n#### 三、重要案例\n\n- **盖巴斯科夫-拉基玛洛大坝案**（p005-p006）：匈牙利与捷克在多瑙河修建大坝，匈牙利认定生态效益高于经济利益而停工。国际法院判决指出\"可持续发展充分表达了将经济发展与环境保护相协调的需要\"。→ 协调发展原则的国际法实践\n- **田纳西流域管理局诉希尔案**（p011-p015）：美国联邦最高法院以6:3判决保护濒危蜗牛镖优先于耗资一亿多美元的大坝完工。→ 环境保护优先于经济利益的经典判例\n- **中国东部沿海癌症村**（p007-p010）：浙江绍兴滨海工业区纺织企业污染致多个癌症村出现，\"化工企业开到哪里，癌症村便出现在哪里\"。→ 先污染后治理的惨痛教训\n- **株洲河西高新区案例**（p028-p029）：57个建设项目仅9个执行\"三同时\"，色拉油厂废水直排湘江造成严重农业损失。→ 有法不依、执法不严的典型\n\n#### 四、协调发展原则的贯彻措施（p016-p030）\n\n1. 将环境保护工作纳入国民经济和社会发展规划（第13条）\n2. 各部门国际合作，实行区域联防联控（第20条）\n3. 深入开展环境保护法制宣传教育\n4. 加强环境科学技术研究，保证环保资金投入\n5. 建立循环经济型社会（资源→产品→再生资源）\n6. 严格立法、严格执法，增大违法成本\n7. 探索编制自然资源资产负债表，实行自然资源资产离任审计\n\n#### 五、环境责任原则的贯彻（p032）\n\n1. 实行排污收费制度或征收污染税制度\n2. 实行废弃物品再生利用和回收制度\n3. 实行开发利用自然资源补偿费或税制度\n4. 建立环境保护费用的共同负担制度\n\n#### 六、公众参与原则（p033-p035）\n\n- **参与主体**：居民、各类专业人士、社会团体、与拟议行为有关的行政机关\n- **适用方式**：①环境影响评价中的公众参与制度；②决策信息公开与披露制度；③鼓励非政府环境组织代表公众参与；④公众参与的行政和司法保障制度\n\n#### 七、高频考点（速记）\n\n1. 环境法四大基本原则的名称与内涵（选择/简答·必考）\n2. 协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n3. 预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n4. 原因者负担原则的四层含义（选择·高频）\n5. 公众参与原则的概念与适用方式（简答）\n6. 协调发展原则的七项贯彻措施（论述）\n7. 盖巴斯科夫案与田纳西案的比较（案例分析）\n\n#### 八、易错 / 易混点\n\n- ❌ 将\"协调发展\"等同于\"经济优先\"：协调发展强调同步，非经济优先\n- ❌ 混淆\"预防原则\"与\"预防为主\"：前者是基本原则，后者是其内涵之一\n- ❌ 将\"原因者负担\"仅理解为\"污染者付费\"：还包括利用者补偿、开发者保护、破坏者恢复\n- ❌ 忽略公众参与原则的司法保障：公众参与不仅限于行政程序，还包括司法救济\n\n#### 九、与前后章之关联\n\n- **← 第1章**：第1章环境法概述为基本原则提供理论基础\n- **→ 第3章**：第3章环境利用行为主体是公众参与原则的具体化\n- **→ 第5章**：第5章环境基本制度是基本原则的制度化落实\n- **→ 第6章**：第6章污染控制法是原因者负担原则的具体适用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境保护法的基本原则\n## 核心概念\n- 环境法基本原则\n- 预防原则\n- 协调发展原则\n- 环境责任原则\n- 公众参与原则\n## 关键法条 / 制度构成\n- 《环境保护法》第4条\n- 《环境保护法》第6条\n- 《环境保护法》第13条\n- 《环境保护法》第20条\n## 协调发展原则的贯彻措施\n- 将环境保护工作纳入国民经济和社会发展规划（第13条）\n- 各部门国际合作，实行区域联防联控（第20条）\n- 深入开展环境保护法制宣传教育\n- 加强环境科学技术研究，保证环保资金投入\n- 建立循环经济型社会（资源→产品→再生资源）\n- 严格立法、严格执法，增大违法成本\n- 探索编制自然资源资产负债表，实行自然资源资产离任审计\n## 环境责任原则的贯彻\n- 实行排污收费制度或征收污染税制度\n- 实行废弃物品再生利用和回收制度\n- 实行开发利用自然资源补偿费或税制度\n- 建立环境保护费用的共同负担制度\n## 公众参与原则\n- 参与主体\n- 适用方式\n## 高频考点\n- 环境法四大基本原则的名称与内涵（选择/简答·必考）\n- 协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n- 预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n- 原因者负担原则的四层含义（选择·高频）\n- 公众参与原则的概念与适用方式（简答）\n- 协调发展原则的七项贯彻措施（论述）\n- 盖巴斯科夫案与田纳西案的比较（案例分析）\n## 易错 / 易混点\n- ❌ 将\"协调发展\"等同于\"经济优先\"\n- ❌ 混淆\"预防原则\"与\"预防为主\"\n- ❌ 将\"原因者负担\"仅理解为\"污染者付费\"\n- ❌ 忽略公众参与原则的司法保障\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境保护法的基本原则))\n    核心概念\n      环境法基本原则\n      预防原则\n      协调发展原则\n      环境责任原则\n      公众参与原则\n    关键法条 / 制度构成\n      《环境保护法》第4条\n      《环境保护法》第6条\n      《环境保护法》第13条\n      《环境保护法》第20条\n    协调发展原则的贯彻措施\n      将环境保护工作纳入国民经济和社会发展规划（第13条）\n      各部门国际合作，实行区域联防联控（第20条）\n      深入开展环境保护法制宣传教育\n      加强环境科学技术研究，保证环保资金投入\n      建立循环经济型社会（资源→产品→再生资源）\n      严格立法、严格执法，增大违法成本\n      探索编制自然资源资产负债表，实行自然资源资产离任审计\n    环境责任原则的贯彻\n      实行排污收费制度或征收污染税制度\n      实行废弃物品再生利用和回收制度\n      实行开发利用自然资源补偿费或税制度\n      建立环境保护费用的共同负担制度\n    公众参与原则\n      参与主体\n      适用方式\n    高频考点\n      环境法四大基本原则的名称与内涵（选择/简答·必考）\n      协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n      预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n      原因者负担原则的四层含义（选择·高频）\n      公众参与原则的概念与适用方式（简答）\n      协调发展原则的七项贯彻措施（论述）\n      盖巴斯科夫案与田纳西案的比较（案例分析）\n    易错 / 易混点\n      ❌ 将协调发展等同于经济优先\n      ❌ 混淆预防原则与预防为主\n      ❌ 将原因者负担仅理解为污染者付费\n      ❌ 忽略公众参与原则的司法保障\n```\n\n<\/details>\n\n---\n\n### 第 3 章 · 环境利用行为的主体及其权利义务\n\n> 素材：[_第03章_环境利用行为的主体及其权利义务.md](./_第03章_环境利用行为的主体及其权利义务.md) · 主版 36 页\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境利用行为（environmental utilization behavior）**：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n- **本能利用行为（instinctive utilization behavior）**：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n- **开发利用行为（development and utilization behavior）**：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n- **环境法律关系（environmental legal relation）**：环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n- **公民（自然人）**：环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n- **公众**：与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n- **环境保护组织**：依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n- **公众环境权益**：既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n- **排污权（emission right）**：环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n- **开发利用行为人环境社会责任**：从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n\n#### 二、关键法条 / 制度构成\n\n- **《环保法》第53条第1款**：公民、法人和其他组织依法享有获取环境信息、参与和监督环境保护的权利。宣示了公众参与环境保护的三项程序性权利：环境知情权、参与权和监督权。（p010）\n- **《环保法》第57条**：规定了公众对于环境违法行为的举报权。接受举报的机关应当对举报人的相关信息予以保密，保护举报人的合法权益。（p011）\n- **《环保法》第54条**：规定了政府机关和其他公共服务机构的环境信息发布职责。国务院环境保护主管部门统一发布国家环境质量、重点污染源监测信息及其他重大环境信息。还规定了环境违法企业的\"黑名单\"制度。（p012、p015）\n- **《环保法》第30条**：开发利用自然资源，应当合理开发，保护生物多样性，保障生态安全，依法制定有关生态保护和恢复治理方案并予以实施。（p018）\n- **《环保法》第42条**：排放污染物的企业事业单位和其他生产经营者应当采取措施防治污染；应建立环境保护责任制度；重点排污单位应安装使用监测设备；严禁通过暗管、渗井、渗坑、灌注或篡改伪造监测数据等逃避监管方式违法排放污染物。（p020-p023）\n- **《环保法》第55条**：重点排污单位应当如实向社会公开其主要污染物的名称、排放方式、排放浓度和总量、超标排放情况，以及防治污染设施的建设和运行情况，接受社会监督。（p024）\n- **《环保法》第47条**：各级人民政府及其有关部门和企业事业单位应当做好突发环境事件的风险控制、应急准备、应急处置和事后恢复等工作。企业事业单位应制定突发环境事件应急预案。（p031）\n\n#### 三、公众环境权益的内容（p008-p009）\n\n1. 优美、舒适环境的享受权\n2. 开发利用环境决策与行为知悉权\n3. 开发利用环境决策建言权\n4. 监督开发利用环境行为及其举报权\n5. 环境权益侵害救济请求权\n\n**三项核心程序性权利**：环境知情权、参与权和监督权（第53条）\n\n#### 四、公民的环境保护义务（p016）\n\n1. **关心和保护环境的一般义务**：《环保法》规定一切单位和个人都有保护环境的义务\n2. **忍受一定限度环境污染或自然环境损害的特别义务**：容忍的判断标准是排放行为是否具有合法性，以是否构成实质性影响为判断标准。是否应当忍受实质性影响取决于两个条件：①行为是否为当地通行；②影响是否可以通过经济上可行的措施克服\n\n#### 五、开发利用行为人的权利与义务（p017-p031）\n\n**一般权利**：\n- 取得政府特许的自然资源开发利用权或向环境排放污染物的权利\n- 按照自然资源规划或环境保护规划实施开发和利用环境的行为\n\n**义务**：\n- 接受国家宏观调控和管理监督\n- 触犯法律法规时接受制裁\n- 造成环境损害时承担民事责任\n\n**排污权及其义务**（p019-p023）：\n- 遵守排污范围、方法、途径及标准\n- 履行环境影响评价和\"三同时\"、排污许可、缴纳排污费税、接受现场检查等法定义务\n- 企业环保责任制：单位负责人为总负责人，环境监督员具体负责\n- 重点排污单位环境监测义务：安装使用监测设备，保证正常运行，保存原始监测记录\n- 严禁逃避监管违法排污：暗管、渗井、渗坑、灌注、篡改伪造监测数据等 → 行政拘留5-15日，构成犯罪追究刑事责任\n\n#### 六、重点排污单位环境信息公开（p024-p030）\n\n- **应当公开的信息**（第9条）：基础信息、排污信息、防治污染设施建设和运行情况、环评及环保行政许可情况、突发环境事件应急预案、其他\n- **公开方式**（第10条）：网站、企业环境信息公开平台、当地报刊等便于公众知晓的方式\n- **公开时限**（第11条）：名录公布后90日内公开；新生成或变更信息30日内公开\n- **违法责任**：责令公开，处3万元以下罚款，并予以公告\n\n#### 七、重要案例\n\n- **A公司环境监测数据弄虚作假案**（p032-p034）：A公司高浓度焦化废水未经处理直接用于熄焦（恶意偷排），自动监控数据造假（SO₂显示35-90mg/m³，实测166-172mg/m³）。B市环保局处罚145万元+没收保证金100万元；主管经理和仪表部经理被行政拘留7日。→ 体现《环保法》第42条对监测数据造假的严厉制裁\n\n#### 八、开发利用行为人环境社会责任（p035-p036）\n\n- **概念**：除强制性法律规范外的环境保护义务，具有道义性\n- **内容**：①通过环境保护质量体系认证或获得绿色标签认定；②推行清洁生产；③主动对外宣示环境保护守则\n\n#### 九、高频考点（速记）\n\n1. 环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n2. 环境法律关系的概念与主体构成（名词解释）\n3. 公众环境权益的五项内容（简答）\n4. 公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n5. 公民环境保护的两类义务：一般义务+特别义务（简答）\n6. 排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n7. 逃避监管违法排污的方式及法律后果（简答）\n8. 重点排污单位环境信息公开制度（选择/简答）\n9. A公司监测数据造假案的法律适用（案例分析）\n\n#### 十、易错 / 易混点\n\n- ❌ 将\"公众\"等同于\"公民\"：公众是群体概念，包括公民、法人、其他组织\n- ❌ 混淆\"排污权\"与\"环境权\"：排污权是行政特许权，非宪法基本权利\n- ❌ 忽略\"忍受义务\"的两个条件：当地通行+经济上可行措施可克服\n- ❌ 将\"环境社会责任\"等同于\"法律义务\"：前者是道义性的，非强制性\n- ❌ 混淆\"本能利用行为\"与\"开发利用行为\"：前者以基本生存为目的，后者以经济利益为目的\n\n#### 十一、与前后章之关联\n\n- **← 第2章**：第2章公众参与原则在本章具体化为公众环境权益\n- **→ 第4章**：本章开发利用行为人的义务对应第4章国家的环境保护义务\n- **→ 第5章**：本章排污权、环境信息公开放在第5章制度体系中落实\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境利用行为的主体及其权利义务\n## 核心概念\n- 环境利用行为（environmental utilization behavior）\n- 本能利用行为（instinctive utilization behavior）\n- 开发利用行为（development and ut 总称。（p002目录）\n- **环境行政主体**：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）\n- **环境行政执法**：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n- **环境行政复议**：公民、法人或其他组织认为环境具体行政行为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决定的活动。（p011）\n- **环境行政诉讼**：公民、法人或其他组织认为环境行政机关的具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民法院进行审理并作出裁判的活动。核心是审理具体行政行为的合法性，一般不包括合理性审查。（p011）\n- **环境审判**：人民法院依照法定程序对涉及环境污染和生态破坏的行政、民事和刑事诉讼案件进行审理并判决的活动。2014年6月最高人民法院成立了环境资源审判庭。（p014）\n- **环境检察**：人民检察院依照法定程序审查被检举的破坏环境与资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的玩忽职守罪和直接受理立案侦查的环境监管失职罪，以及依法提起环境公益诉讼等活动。（p015）\n\n#### 二、国家环境保护义务的三重结构（p002目录）\n\n1. **作为义务**（4.1.1）：国家必须积极采取行动保护环境\n2. **不作为义务**（4.1.2）：国家不得实施破坏环境的行为\n3. **给付义务**（4.1.3）：国家应向公民提供环境保护的公共物品和服务\n\n#### 三、环境行政的正当程序（p004）\n\n1. 信息公开\n2. 公众参与\n3. 说明决策的理由\n4. 公布周知\n\n#### 四、环境行政主体违法问题（p006-p009）\n\n**现实中存在的违法行政行为**：执法主体滥用职权、违反法定程序、越权行政、执法主体不适合、失职或不作为、证据不确实充分、定性不准确、适用法律不准确、行政处罚不恰当等。\n\n**违法行政行为的原因**：\n1. 环保立法障碍：部门本位主义思想严重；环境立法之间关系不协调\n2. 环境管理体制不完善：管理机构设置重复；政府行使了环保部门的部分职权\n3. 环保部门执法权限设置问题：各职能部门执法权配置不恰当；环保部门缺乏必要的强制执行权\n4. 环保部门的民主性、透明度不高\n5. 未形成强有力的监督机制\n6. 环保部门自身建设落后：法制机构欠缺；投入不足；人员专业化素养不高\n\n#### 五、环境行政复议与行政诉讼的区别（p012）\n\n| 区别点 | 行政复议 | 行政诉讼 |\n|--------|---------|---------|\n| 性质 | 行政行为 | 司法行为 |\n| 审查范围 | 合法性+合理性 | 仅合法性（一般） |\n| 审查结果 | 可维持或变更原决定 | 一般只能维持或撤销，不能变更 |\n| 不服后续 | 向法院起诉（一审程序） | 提起上诉（上诉程序） |\n\n**行政诉讼时效**：《环保法》15天；《森林法》《渔业法》30天\n\n#### 六、生态环境损害民事索赔权（p013）\n\n- 对生态破坏及其损失认识的发展——生态补偿制度\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n\n#### 七、重要案例\n\n- **林西县人民检察院诉林西县国土资源局行政公益诉讼案**（p016-p017）：李殿有自1999年起非法开采沸石，面积28亩，矿坑最深7.8米。林西县国土局多次下达行政处罚但违法行为人上交罚款后并未停止采矿，国土局存在怠于履行职责行为。检察院提起行政公益诉讼，法院当庭宣判支持全部诉讼请求，确认国土局未积极履行职责违法，判令继续履行监督管理法定职责。→ 环境行政公益诉讼的典型判例\n\n#### 八、高频考点（速记）\n\n1. 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n2. 环境行政执法的具体形式（选择）\n3. 环境行政正当程序的四个要素（简答）\n4. 环境行政违法的原因（论述）\n5. 环境行政复议与行政诉讼的区别（简答·高频）\n6. 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n7. 生态环境损害赔偿制度的适格主体（选择）\n8. 林西县行政公益诉讼案的法律意义（案例分析）\n\n#### 九、易错 / 易混点\n\n- ❌ 混淆\"环境行政复议\"与\"环境行政诉讼\"：前者审查合法性+合理性，后者一般仅审查合法性\n- ❌ 将\"环境审判\"等同于\"环境行政诉讼\"：环境审判包括行政、民事、刑事三类诉讼\n- ❌ 忽略\"给付义务\"：国家义务不仅是作为和不作为，还包括提供公共物品和服务\n- ❌ 混淆行政诉讼时效：环保法15天 vs 森林法/渔业法30天\n- ❌ 认为行政诉讼可以变更原决定：一般只能维持或撤销，不能变更\n\n#### 十、与前后章之关联\n\n- **← 第3章**：第3章开发利用行为人的义务对应本章国家的监督管理义务\n- **→ 第5章**：本章环境行政管理手段在第5章制度体系中具体展开\n- **→ 第6章**：本章环境行政处罚在污染控制法中具体适用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 国家的环境保护义务\n## 核心概念\n- 国家环境保护义务\n- 环境行政主体\n- 环境行政执法\n- 环境行政复议\n- 环境行政诉讼\n- 环境审判\n- 环境检察\n## 国家环境保护义务的三重结构\n- 作为义务\n- 不作为义务\n- 给付义务\n## 环境行政的正当程序\n- 信息公开\n- 公众参与\n- 说明决策的理由\n- 公布周知\n## 环境行政主体违法问题\n- 现实中存在的违法行政行为\n- 违法行政行为的原因\n## 环境行政复议与行政诉讼的区别\n- 行政诉讼时效\n## 生态环境损害民事索赔权\n- 对生态破坏及其损失认识的发展\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n## 高频考点\n- 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n- 环境行政执法的具体形式（选择）\n- 环境行政正当程序的四个要素（简答）\n- 环境行政违法的原因（论述）\n- 环境行政复议与行政诉讼的区别（简答·高频）\n- 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n- 生态环境损害赔偿制度的适格主体（选择）\n- 林西县行政公益诉讼案的法律意义（案例分析）\n## 易错 / 易混点\n- ❌ 混淆\"环境行政复议\"与\"环境行政诉讼\"\n- ❌ 将\"环境审判\"等同于\"环境行政诉讼\"\n- ❌ 忽略\"给付义务\"\n- ❌ 混淆行政诉讼时效\n- ❌ 认为行政诉讼可以变更原决定\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((国家的环境保护义务))\n    核心概念\n      国家环境保护义务\n      环境行政主体\n      环境行政执法\n      环境行政复议\n      环境行政诉讼\n      环境审判\n      环境检察\n    国家环境保护义务的三重结构\n      作为义务\n      不作为义务\n      给付义务\n    环境行政的正当程序\n      信息公开\n      公众参与\n      说明决策的理由\n      公布周知\n    环境行政主体违法问题\n      现实中存在的违法行政行为\n      违法行政行为的原因\n    环境行政复议与行政诉讼的区别\n      行政诉讼时效\n    生态环境损害民事索赔权\n      对生态破坏及其损失认识的发展\n      行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n      试行中的生态环境损害赔偿制度\n    高频考点\n      国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·…\n      环境行政执法的具体形式（选择）\n      环境行政正当程序的四个要素（简答）\n      环境行政违法的原因（论述）\n      环境行政复议与行政诉讼的区别（简答·高频）\n      环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n      生态环境损害赔偿制度的适格主体（选择）\n      林西县行政公益诉讼案的法律意义（案例分析）\n    易错 / 易混点\n      ❌ 混淆环境行政复议与环境行政诉讼\n      ❌ 将环境审判等同于环境行政诉讼\n      ❌ 忽略给付义务\n      ❌ 混淆行政诉讼时效\n      ❌ 认为行政诉讼可以变更原决定\n```\n\n<\/details>\n\n---\n\n### 第 5 章 · 环境基本法与综合性环境法律制度\n\n> 素材：[_第05章_环境基本法与综合性环境法律制度.md](./_第05章_环境基本法与综合性环境法律制度.md) · 主版 23 页\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n#### 一、核心概念（名词解释）\n\n- **环境与资源保护法的基本制度**：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）\n- **环境标准制度**：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）\n- **环境质量标准**：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n- **污染物排放标准**：为实现环境质量标准，对污染源排入环境的污染物或有害因素的浓度或数量所作的限量规定。（p018）\n- **环境规划制度**：为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n\n#### 二、环境法基本制度的分类（p005）\n\n- **环境保护基本法律制度**\n- **自然资源保护基本法律制度**\n\n> 划分是相对的，如规划制度、许可证制度既是环境保护的基本法律制度，又是自然资源保护的基本法律制度，只是侧重点不同。\n\n#### 三、环境法基本制度的确立依据（p008）\n\n1. 具体体现环境与资源保护法的基本原则\n2. 具体反映环境与资源保护法律的共通性和本质性的法律措施\n3. 依据基本国情和社会经济发展水平，通过对法的\"立、改、废\"逐步完善\n\n#### 四、环境标准制度（p009-p021）\n\n**环境标准分类**：\n- **强制性标准**：环境质量标准、污染物排放（控制）标准——必须执行\n- **推荐性标准**：环境监测方法标准、环境标准样品标准、环境基础标准——被强制性标准引用后也必须强制执行\n\n**环境质量标准**（p012-p017）：\n- 《环保法》第15条：国务院环保主管部门制定国家环境质量标准；省级政府可制定严于国标的地方标准，报国务院备案\n- 按环境要素分：水质量标准、大气质量标准、土壤质量标准、生物质量标准\n- 水质量标准按水体类型分：地面水、海水、地下水等；按用途分：生活饮用水、渔业用水、农业用水、娱乐用水、工业用水等\n- 大气环境质量标准：一类区（自然保护区、风景名胜区等）适用一级浓度限值；二类区（居住区、商业区、工业区、农村等）适用二级浓度限值\n\n**污染物排放标准**（p018）：\n- 《环保法》第16条：国务院环保主管部门根据国家环境质量标准和国家经济、技术条件制定国家污染物排放标准；省级政府可制定严于国标的地方标准，报国务院备案\n\n#### 五、环境规划制度（p022-p023）\n\n- 《环保法》第13条：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划\n- **三个层次**：\n  1. 国民经济和社会发展五年规划纲要（总体）→ 环境保护篇章\n  2. 重点专项规划（国务院主管部门）\n  3. 行业规划和地区规划（各部门、各地区）\n- 环境保护规划的内容应当包括生态保护和污染防治的目标、任务、保障措施等，并与主体功能区规划、土地利用总体规划和城乡规划等相衔接\n\n#### 六、环境保护法基本制度的历史发展（p006）\n\n- **1979年**《环境保护法（试行）》首先规定了：环境影响评价制度（第6条）、环境规划制度（第7条）、征收排污费制度（第18条）、\"三同时\"制度（第6条）、环境标准制度（第18、19条）\n- **1989年**《环境保护法》在第二章专章对环境法基本制度作出规定，使体系进一步丰富\n\n#### 七、五项基本制度（p007）\n\n1. 环境标准制度\n2. 环境规划制度\n3. 环境影响评价制度\n4. 环境费和环境税制度\n5. 突发环境事件应急管理制度\n\n#### 八、重要案例\n\n- **A精细材料有限公司诉B区人民政府环保行政处罚案**（p019-p021）：A公司排放废气臭气浓度超标，被限期治理后两次监测仍未达标《恶臭污染物排放标准》。B区政府作出停业、关闭处罚。A公司主张采样点与频次不合法。法院认定：采样点为厂界敏感点符合标准规定；频次间隔不足2小时存在瑕疵但不足以推翻结论。判决驳回原告诉讼请求，二审维持。→ 污染物排放标准在行政处罚中的适用\n\n**核心问题**：\n1. 《恶臭污染物排放标准》属于何种类型的环境标准？→ 污染物排放标准（强制性标准）\n2. 在行政处罚案件中是否需要其他类型环境标准配合使用？\n3. 标准适用的疑难问题由谁解释？\n\n#### 九、高频考点（速记）\n\n1. 环境法基本制度的分类与确立依据（简答）\n2. 环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n3. 环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n4. 地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n5. 环境规划制度的三个层次（简答）\n6. 五项基本制度的名称（选择）\n7. 1979年《环保法（试行）》首创的五项制度（选择）\n8. A精细材料案中环境标准的适用（案例分析）\n\n#### 十、易错 / 易混点\n\n- ❌ 混淆\"强制性标准\"与\"推荐性标准\"的范围：环境质量标准和污染物排放标准是强制性，其余为推荐性\n- ❌ 忽略推荐性标准被强制性标准引用后也必须强制执行\n- ❌ 混淆国家环境质量标准与国家污染物排放标准的制定依据：前者直接制定，后者需考虑\"国家经济、技术条件\"\n- ❌ 将环境规划仅理解为环境保护规划：还包括纳入国民经济和社会发展规划\n- ❌ 混淆环境质量标准按环境要素的分类与按用途的分类\n\n#### 十一、与前后章之关联\n\n- **← 第2章**：第2章基本原则在本章具体化为基本制度\n- **← 第4章**：第4章环境行政管理手段在本章制度体系中展开\n- **→ 第6章**：本章环境标准、排污许可等制度在污染控制法中具体适用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境基本法与综合性环境法律制度\n## 核心概念\n- 环境与资源保护法的基本制度\n- 环境标准制度\n- 环境质量标准\n- 污染物排放标准\n- 环境规划制度\n## 环境法基本制度的分类\n- 环境保护基本法律制度\n- 自然资源保护基本法律制度\n## 环境法基本制度的确立依据\n- 具体体现环境与资源保护法的基本原则\n- 具体反映环境与资源保护法律的共通性和本质性的法律措施\n- 依据基本国情和社会经济发展水平，通过对法的\"立、改、废\"逐步完善\n## 环境标准制度\n- 环境标准分类\n- 强制性标准\n- 推荐性标准\n- 环境质量标准\n- 污染物排放标准\n## 环境规划制度\n- 三个层次\n## 环境保护法基本制度的历史发展\n- 1979年\n- 1989年\n## 五项基本制度\n- 环境标准制度\n- 环境规划制度\n- 环境影响评价制度\n- 环境费和环境税制度\n- 突发环境事件应急管理制度\n## 高频考点\n- 环境法基本制度的分类与确立依据（简答）\n- 环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n- 环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n- 地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n- 环境规划制度的三个层次（简答）\n- 五项基本制度的名称（选择）\n- 1979年《环保法（试行）》首创的五项制度（选择）\n- A精细材料案中环境标准的适用（案例分析）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境基本法与综合性环境法律制度))\n    核心概念\n      环境与资源保护法的基本制度\n      环境标准制度\n      环境质量标准\n      污染物排放标准\n      环境规划制度\n    环境法基本制度的分类\n      环境保护基本法律制度\n      自然资源保护基本法律制度\n    环境法基本制度的确立依据\n      具体体现环境与资源保护法的基本原则\n      具体反映环境与资源保护法律的共通性和本质性的法律措施\n      依据基本国情和社会经济发展水平，通过对法的立、改、废逐步完善\n    环境标准制度\n      环境标准分类\n      强制性标准\n      推荐性标准\n      环境质量标准\n      污染物排放标准\n    环境规划制度\n      三个层次\n    环境保护法基本制度的历史发展\n      1979年\n 境法的发展阶段（中国）**：\n  1. 1979年《环境保护法（试行）》——首次确立环评制度、排污收费制度、\"三同时\"制度等\n  2. 1989年《环境保护法》——正式颁布，专章规定基本制度\n  3. 2014年修订——强化政府责任，完善公众参与，加大处罚力度\n- **习近平生态文明思想六项原则**：\n  1. 坚持人与自然和谐共生\n  2. 绿水青山就是金山银山\n  3. 良好生态环境是最普惠的民生福祉\n  4. 山水林田湖草是生命共同体\n  5. 用最严格制度最严密法治保护生态环境\n  6. 共谋全球生态文明建设\n- **美丽中国**：中共十八大提出的执政理念，强调生态文明建设融入经济、政治、文化、社会建设各方面和全过程。2027年目标：绿色低碳发展深入推进；2035年目标：美丽中国基本实现；本世纪中叶：美丽中国全面建成。\n\n### 核心法条 / 制度构成\n\n- **《环境保护法》第4条**：保护环境是国家的基本国策。国家采取有利于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经济、技术政策和措施，使经济社会发展与环境保护相协调。\n- **《国家公园法》(2026.1.1)**：首次用法律形式划定\"核心保护区+一般控制区\"双轨格局\n- **《生态环境法典》（草案三审稿）**：继《民法典》后第二部法典，单设绿色低碳发展编，明确人兽冲突紧急避险规则\n\n### 典型案例 / 裁判要旨\n\n- **长江流域非法捕捞生态损害赔偿案**：多人电鱼破坏渔业资源与水环境，依刑法+长江保护法+环境公益诉讼法追究生态损害赔偿。裁判要旨：生态没有替代品，用之不觉，失之难存；用法治守住生态红线，就是守住民生底线。\n- **校园/生活场景快判**：私自砍校园古树→违法；乱扔危废电池/乱倒实验废液→违法；垃圾回收造成污染→违法\n\n### 高频考点\n\n1. 环境保护法的概念与特征（名词解释/简答）\n2. 世界环境法发展的三个阶段及其特点（简答/论述）\n3. 中国环境法的发展历程（1979→1989→2014）（简答）\n4. 习近平生态文明思想六项原则（论述题高频）\n5. 美丽中国的目标与时间节点（2027/2035/本世纪中叶）（选择/简答）\n6. 2026年环境法治三件大事（选择/简答）\n\n### 易错 / 易混点\n\n- ❌ 混淆\"环境法发展阶段\"的世界与中国分期：世界分三期，中国分三法（试行→正式→修订）\n- ❌ 将\"美丽中国\"仅理解为生态概念：实际是政治、经济、文化、社会、生态五位一体\n- ❌ 忽略\"用最严格制度最严密法治保护生态环境\"原则——这是环境法与生态文明的桥梁\n- ❌ 将1979年试行法与1989年正式法混淆：试行法首次确立制度，正式法专章规定\n\n### 思考题 / 自测\n\n1. 为什么说环境保护法是\"生态文明的保障法，美丽中国的护航法\"？\n2. 比较世界环境法发展三个阶段与中国环境法发展三个阶段的异同。\n3. 习近平生态文明思想六项原则如何体现在现行环境法制度中？\n4. 《生态环境法典》编纂对环境法体系有何意义？\n\n### 与前后章之关联\n\n- **→ 第2章**：第1章确立的环境法概念和发展脉络，是理解第2章\"基本原则\"的基础\n- **→ 第5章**：第1章提到的1979年试行法首次确立的制度（环评、排污收费、\"三同时\"），在第5章\"基本制度\"中详细展开\n- **→ 第6章**：第1章的环境法体系概述，为第6章\"污染控制法\"的单行法体系提供框架\n"}, {"id": "ch-02", "group": "章节素材", "title": "第02章 环境保护法的基本原则", "md": "# 环境法学 · 第 2 章 · 环境保护法的基本原则 · 素材\n\n> 教师: 杨建英 · 学期: 2026春\n> 章下 PDF: 6 个 · 总页: 132\n> 主版: 第 6 节 · 35 页\n\n---\n\n## 主版课件 · 第 6 节\n\n> `006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则.pdf`\n\n<details><summary>展开 35 页图链<\/summary>\n\n- [p001](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_001.jpg)  · 2.环境保护法的基本原则\n- [p002](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_002.jpg)  · 环境法的基本原则是调整因开发利用、保护和改善环境而产生的\n- [p003](../006-2.环境保 -2.环境保护法的基本原则/page_030.jpg)  · 2.3协调发展原则\n- [p031](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_031.jpg)  · 2.环境保护法的基本原则\n- [p032](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_032.jpg)  · 2.环境保护法的基本原则\n- [p033](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_033.jpg)  · 2.环境保护法的基本原则\n- [p034](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_034.jpg)  · 2.环境保护法的基本原则\n- [p035](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_035.jpg)  · 2.环境保护法的基本原则\n\n<\/details>\n\n<details><summary>展开 35 页图文对照（每图配其识别文本）<\/summary>\n\n**p001** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_001.jpg)\n\n2.环境保护法的基本原则\n新疆大学生态与环境学院\n杨建英\n2026年3月\n\n---\n\n**p002** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_002.jpg)\n\n环境法的基本原则是调整因开发利用、保护和改善环境而产生的\n社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，\n是对环境保护实行法律调整的基本指导方针。（3.25)\n它贯穿于整个环境法中，具有普遍的指导作用。\n我国环境法的基本原则主要有：\n预防原则（内涵：预防为主，防治结合，综合治理原则）；\n协调发展原则（内涵：经济、社会发展与环境保护相协调原则）；\n原因者负担原则（内涵：污染者付费，利用者补偿，开发者保护，破\n坏者恢复原则）；\n公众参与原则。\n\n---\n\n**p003** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_003.jpg)\n\n2.3协调发展原则\n2.3.1概念和意义\n【经济、社会发展和环境保护相协调的原则】 （P52-\n53）指在发展经济的同时，加强保护和改善环境，使环境保护和\n经济建设同步发展，坚持在发展中保护，在保护中发展。实现经济\n效益、社会效益、环境效益的统一。\n这一原则，正确地反映了经济建设和环境保护的关系，同时也\n明确了如何正确对待和处理二者之间的关系。环境和自然资源是经\n济发展的物质基础，离开了环境和自然资源，任何形式的生产都无\n法进行。\n《环境保护法》第4条保护环境是国家的基本国策。国家采取有利\n于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经\n济、技术政策和措施，使经济社会发展与环境保护相协调。\n\n---\n\n**p004** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_004.jpg)\n\n2.3协调发展原则\n讨论二：如何看待经济建设与环境保护的关系？\n由此可见，经济建设与环境保护并不矛盾，经济建设和\n环境保护之间是相互影响、相互制约、又相互促进的辩证统\n一的关系。\n我们决不能走“先污染后治理”的老路，不能用消耗大\n量的资源、破坏环境来实现经济增长的高速度。这就要求我\n们找到一个平衡点，既能保持经济一定速度的增长，又不以\n破坏环境为代价。\n\n---\n\n**p005** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_005.jpg)\n\n2.3协调发展原则\n2.3.1概念和意义盖巴斯科夫拉基玛洛大坝案 （4.8)\n1977年，匈牙利和捷克签订《布达佩斯条约》在多瑙河上修\n建盖巴斯科夫一拉基玛洛大坝，将河水截至两条运河后回注于\n多瑙河。\n1988年，牙利国会认定该河流的生态效益高于该项目的经\n济利益，命令政府重新评价该项目。1989年，匈牙利宣布在项目\n的环境影响得到充分评价之前停止执行该工程。1991年捷克决定\n继续建设该项目，并单方面将近2/3的多瑙河河水截引至其领土。\n1992年10月，牙利向国际法院提出申请。\n\n---\n\n**p006** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_006.jpg)\n\n2.3协调发展原则\n2.3.1概念和意义\n国际法院本案判决书140段：“通观历史，人类由于经济或其\n他原因一直不断地干扰自然。人类过去从事这种干扰时，从不\n考虑其对环境的影响。由于新的科学知识和日益认识到以欠考\n虑和未减缓的速度从事这种干扰对人类一当代人及其后代所\n带来的危险。可持续发展充分表达了将经济发展与环境保护相\n协调的需要。对本案而言，双方都应重新审视盖巴斯科夫电厂\n运行对环境的影响。尤其是，它们必须为多瑙河故道和该河两\n岸支流所释放的水量找到一个满意的解决办法。”\n\n---\n\n**p007** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_007.jpg)\n\n2.3协调发展原则\n中国东商滨海经济带应症村际意图\n沿海多个省份出现癌症村\n浙江萧山坞里村，江苏盐\n城东兴村，山东肥城肖家店\n随着工业化的进程，一个\n山东阳\n接一个癌症村出现在东部滨海 头利刘铁丘村\n村、部楼村\n经济活跃地带。名单上还有无 西汉庄村 山东省肥城市肖家店村\n锡广丰村，常州新北区，阜宁 江苏省阜宁县杨\n集镇东兴村 宜州\n县洋桥村，安徽宿州张庄村，\n阳谷县西关村、邵楼村、西汉 南苏车\n庄村、国庄村，天津西堤头村、 www.nddaily.c\n刘快庄村等。\n\n---\n\n**p008** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_008.jpg)\n\n2.3协调发展原则\n中国大陆在改革开放后出现的群体疾病现象。由于环境污染，大\n多是饮用了上游企业排出的未经处理的污水，以致环境受污染，导致\n人体内部机制严重受损，造成某一村庄大规模的癌症病发。\n浙江癌症村（浙江省绍兴市绍兴县）：公开资料显示，中国共有164\n个纺织工业集群，拥有超过5万家纺织工厂，主要集中于东部、东南部\n沿海地区。绍兴市绍兴县便是其中之一，这里的纺织企业9000余家，\n印染产能约占全国30%，因而也被誉为“建在布匹上的城市”。然而，\n这个GDP功劳簿上的大功臣却变成了水乡恶变的罪魁祸首，在规划面\n积100平方公里的绍兴滨海工业区及周边已经有多个“癌症村”出现。\n\n---\n\n**p009** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_009.jpg)\n\n2.3协调发展原则\n同样沦为生态难民的还有毗邻的杭州市萧山临江工业园\n区及周边的村民，在那里同样集聚纺织及其相关的化工企\n业。绍兴滨海工业区的排污口再往东，绍兴上虞市的道墟\n镇亦有不少村民反映，他们那里也有“癌症村”。化工企\n业开到哪里，“癌症村”似乎便会出现在哪里。\n\n---\n\n**p010** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_010.jpg)\n\n2.3协调发展原则\n从2003年12月29日开始，萧\n山南阳镇坞里村村民韦东英，开\n始了长达4年的“环保日记”写作。\n记录了坞里村遭受的环境污染侵\n袭，在恶臭气味和污水包围的日\n子里，一个个村民因患癌症死去。\n当韦东英的证据照片累积到5\n斤多重时，南阳化工园区还没有\n搬迁的迹象。她给萧山市、浙江\n省两级环保局打去电话咨询，得\n到的答复是：南阳的环境监测在\n2006年已达标，化工园不用搬迁。\n\n---\n\n**p011** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_011.jpg)\n\n2.3协调发展原则\n田纳西流域管理局诉希尔案\n1967年，美国联邦议会批准在小田纳西河上修建一座水库，\n作为配套设施，TVA开始在小田纳西河上修建泰利库大坝。\n1975年生物学家发现小田纳西河有一种濒临灭绝的鲈鱼\n（蜗牛镖），联邦内政部将其列入了濒危物种名单，从而使其\n进入1973年生效的《美国濒危物种法》保护范围之内。不巧的\n是，蜗牛镖只能生活在泰利库大坝附近，大坝建成的话，将影\n响蜗牛镖的栖息地而导致灭绝，由此发生了“要小鱼，还是要\n大坝”的二难决择。\n\n---\n\n**p012** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_012.jpg)\n\n2.3协调发展原则\n以希尔等为首的环保组织和一些公民以TVA为被告向联邦\n地方法院提起诉讼，认为TVA违反了《美国濒危物种法》3的\n规定，要求法院确认其违法并终止大坝的修建。\n联邦地方法院认为，虽然大坝的修建将会对蜗牛鱼的栖息\n地造成不利影响和破坏，但大坝在该法案生效前七年就开始动\n工，到蜗牛镖被列入濒危物种名单时，大坝已经接近完工，以\n牺牲纳税人一亿多美元的利益为代价来保护一个微不足道、没\n有重大经济价值且生态价值也不明显的鱼种是很不明智的。\n\n---\n\n**p013** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_013.jpg)\n\n2.3协调发展原则\n原告不服，将案件上诉至联邦巡回法院。巡回法院的\n法官认为，是否豁免被告遵守该法案，只有国会或内政部\n才能做出决定，因而判令联邦地方法院永久禁止大坝继续\n完工，“除非国会通过适当立法豁免泰利库大坝遵循《美国\n危物种法》或者蜗牛镖从濒危物种名单上取消或有新的\n关键栖息地生存”，否则《美国濒危物种法》不允许进行\n利益平衡，必须将保护生物多样性置于绝对优先地位。\n\n---\n\n**p014** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_014.jpg)\n\n2.3协调发展原则\n1997年4月18日，TVA将案件上诉到联邦最高法院，\n要求撤销上诉法院的判决。初审原告希尔等人申请法庭在诉\n讼期间作出裁定，暂停大坝的修建，以免造成不可逆转的结\n果。最高法院于同年6月15日做出了终审判决，9位大法官\n以6：3的优势支持了希尔等人的诉求，认为停工禁令是最合\n适的救济手段。\n从此，小鱼儿在田纳西河里过着快乐的生活，它们身边\n则是那座耗资一亿多美元的废弃大坝作为永远的见证。\n\n---\n\n**p015** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_015.jpg)\n\n2.3协调发展原则\n我国葛洲坝刚建成时，阻隔了中华鲟上溯产卵，中华鲟\n在坝上撞得头破血流，非常惨烈。中华鲟数量锐减，不得不\n进行人工孵化养殖。同时，大坝还破坏了青、草、鲢、鳙四\n大家鱼的天然产卵繁殖场，长江由过去年产四大家鱼200多\n亿尾降为仅10亿尾。名贵的鱼，因大坝建在其产卵场，十\n多年前就已在长江里消失了。\n美国最高法院的判决具有深厚的民意积淀，本案之后90\n%的民众说：“发电站可以建在别处，而蜗牛镖一旦灭绝将\n永不再生”。\n\n---\n\n**p016** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_016.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（一）将环境保护工作切实纳入国民经济和社会发展规划\n我国是以公有制为基础的社会主义国家，环境保护是经济建\n设的重要组成部分。因此，在制定和实施发展规划时必须把环境\n保护目标和措施纳入国民经济和社会发展规划中，并加强监督指\n导。\n《环境保护法》第13条关于“县级以上人民政府应当将环境保护\n工作纳入国民经济和社会发展规划。环境保护规划与主体功能区\n规划、土地利用总体规划和城乡规划等相衔接”的规定。\n\n---\n\n**p017** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_017.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n从1953年开始的“一五”计划算起，中国编制实施国民经济\n和社会发展五年计划的框架体制，已有50多年的历史。从1953年\n到1982年我国实行的前五个五年计划中，都没有将环境保护列为\n国民经济和社会发展的一项内容，因此在这30年间，环境保护是\n各项建设比例失调中最严重的一环。\n1982年公布的第六个五年计划（1980-1985）中，首次将环境\n保护列为专门的一章，制定了“加强环境保护，制止环境污染的\n进一步发展”的目标，并提出了政策、法规、监督、管理和资金\n等五项措施。此后的“七五”、“八五”和“九五”计划中也都\n把环境保护列入了国民经济和社会发展计划，在“十五”计划\n（2000-2005）中，更是制定了“可持续发展”的战略方针。\n\n---\n\n**p018** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_018.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n例如，我国在“十五”计划中，规定了环境保护的任务\n和计划指标、对环境保护的方针政策、环境保护投资、主要\n保护措施等都作了具体的规定，这样，就可以从宏观上进行\n综合平衡、协调好经济、社会发展和环境保护之间的关系。\n同时，在国民经济和社会发展计划中，必须确定环境保\n护的资金数额或所占比例，以确保经济建设和环境保护协调\n发展。\n\n---\n\n**p019** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_019.jpg)\n\n（二）各部门、国际合作，实行交流与援助，联合处理环境问题\n《环境保护法》第20条国家建立跨行政区域的重点区域、\n流域环境污染和生态破坏联合防治协调机制，实行统一规划、\n统一标准、统一监测、统一的防治措施。前款规定以外的\n跨行政区域的环境污染和生态破坏的防治，由上级人民政府\n协调解决，或者由有关地方人民政府协商解决。（区域联防\n联控）\n\n---\n\n**p020** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_020.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（三）深入开展环境保护法制宣传教育\n我国目前已颁布了大量的环境保护方面的法律法规，而\n且都体现了经济、社会发展与环境保护相协调的原则。\n但实践中人们对环境保护认识不足，执法力度不够。有\n法不依、执法不严的现象较普遍。有些人特别是领导干部环\n境保护意识淡薄，缺乏生态观念，因而在建设项目中不是把\n环境保护设施挤掉了，就是上一些不配套的环保设施，并时\n常处于“休息”状态。\n\n---\n\n**p021** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_021.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（三）深入开展环境保护法制宣传教育\n因此必须加强环境法制宣传教育，提高全民族的环境意识，\n特别是提高处在政治、经济决策地位的领导干部的环境意识。\n使人们明确认识到保护环境是我国的一项基本国策，认清经\n济、社会发展与环境保护相协调是客观规律的要求，正确处理环\n境保护与经济建设和社会发展的关系，把眼前利益和长远利益、\n局部利益和整体利益结合起来，遵守生态规律和经济规律，保证\n和促进环境保护和经济建设协调发展。\n\n---\n\n**p022** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_022.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（四）加强环境科学技术研究、提高环境科学技术水平、保\n证环境保护资金的投入\n环境科学技术是解决环境问题的重要手段，实现经济的发\n展与环境的改善只能依靠环境科学技术的进步。\n因此，必须加强环境科学技术方面的研究，针对当前存在\n的和将来可能出现的重大环境问题，重点研究开发、利用各种\n应用技术，并吸收国外的先进经验和技术，同时，要培养更多\n的环境方面的科技人才，并增加环境保护的资金投入。\n\n---\n\n**p023** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_023.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（四）加强环境科学技术研究、提高环境科学技术水平、保\n证环境保护资金的投入\n环境问题的解决，尤其是环境污染的治理，在根本上取\n决于环境科学技术的水平。只有不断地进行环境科学研究，\n开发出节能低耗、变废为宝、清洁生产的生产工艺以及能控\n制和治理环境污染、保护生态平衡的科研成果，才能使环境\n保护与经济、社会发展协调成为现实。\n\n---\n\n**p024** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_024.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（四）加强环境科学技术研究、提高环境科学技术水平、保\n证环境保护资金的投入\n秸秆是一种常见的农业生产废料，秸秆由草变宝的技术目前已\n经十分成熟。首先，秸秆可以变乙醇。华东理工大学颜涌捷教授负\n责的国家863重大课题 “纤维素废弃物制取乙醇技术”，已经\n可以从7吨至8吨秸秆中提炼出1吨燃料乙醇，如果普通汽油中加\n入10%到15%的燃料乙醇，燃烧效果仍同汽油一样；如果改一\n改发动机，燃料乙醇就能代替85%的汽油。其次，秸秆还可以发\n电。2吨秸秆的热值，相当于1吨煤，目前我国可作为能源用途的\n农作物秸秆近3亿吨，至少可替代近1.5亿吨煤炭。此外，秸秆还\n可以发酵“生”气、制成人造板材、新型轻质墙材以及造纸等。\n\n---\n\n**p025** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_025.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（五）建立循环经济型社会\n环境问题的解决，尤其是环境污染的治理，在根本上取决\n于环境科学技术的水平。只有不断地进行环境科学研究，开发\n出节能低耗、变废为宝、清洁生产的生产工艺以及能控制和治\n理环境污染、保护生态平衡的科研成果，才能使环境保护与经\n济、社会发展协调成为现实。\n\n---\n\n**p026** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_026.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（五）建立循环经济型社会\n传统经济遵循的是“资源一生产—消费一废弃物排放”，循环经\n济本质上是一种生态经济，它要求运用生态学规律来指导人类社会的\n经济活动；倡导的是一种建立在物质不断循环利用基础上的经济发展\n模式，它要求把经济活动组成一个“资源一产品一再生资源”的反馈\n流程，所有的物质和能源在这个不断进行的循环中得到合理持久的利\n用，以把经济对自然环境的影响降低到尽可能小的程度。\n例如，生态工业园区：通过模拟生态系统建立工业系统，生产\n者一消费者一分解者的循环途径和食物链网，采用废物交换，清洁生\n产等手段使一个企业生产的副产品或废物可用作另一个工厂的投入或\n原料，实现循环使用。\n\n---\n\n**p027** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_027.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（六）严格立法、严格执法\n根据经济建设的发展、适时的修改我国现行《环境保护法》\n的有关条款。例如，将“环境保护同经济、社会发展相协调原\n则”修改为“使经济社会发展与环境保护相协调”原则。从根本\n上解决有法不依、执法不严的问题，保证环境保护工作有序健\n康地发展。\n\n---\n\n**p028** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_028.jpg)\n\n2.3协调发展原则\n（六）严格立法、严格执法\n强化环境监督管理，一方面要做到环境管理的科学化，另一方\n面要加大环境污染与环境破坏的处罚力度，增大违法成本。\n株洲市的河西高新技术开发区，在创建之初，开发区管委会只\n考虑如何招商引资，把开发区办起来，但环境意识非常淡薄，国家\n明文规定的开发区环境影响评价，是在开发区建成两年之后，在市\n政府的严厉批评下才拨出钱上了马。经过检查发现，在开发区两年\n内引进的57个建设项目中仅有9个按国家规定进行了“三同时”建\n设。不少企业开始投产后，即给当地的环境造成了很严重影响。\n\n---\n\n**p029** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_029.jpg)\n\n2.3协调发展原则\n（六）严格立法、严格执法\n其中一耗资6000万元，生产色拉油的厂家，于1996年6月开始试生\n产，但未上任何环保设施，废水直排湘江，造成了严重的农业损失；另\n有一家橡胶厂，未办理任何环保手续，小锅炉造成工厂四周浓烟滚滚，\n附近居民苦不堪言。\n株洲市的河西高新开发区就是因为招商引资不够理想，在项目选择\n上有些“饥不择食”，忽视了经济、社会发展与环境保护的协调，造成\n了生态破坏和环境污染，其教训是十分惨痛的。近些年株洲市已在下大\n力气对其进行整治，对一些对环境造成污染的企业予以关、停、整、改。\n\n---\n\n**p030** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_030.jpg)\n\n2.3协调发展原则\n2.3.2贯彻\n（七）探索编制自然资源资产负债表\n用绿色GDP的方法取代传统GDP以衡量国民经济与社会的发展。\n中共十八届三中全会提出要“探索编制自然资源资产负债表，对领\n导干部实行自然资源资产离任审计。”编制自然资源资产负债表，\n有助于全面揭示政府对各项资源的占有使用情况及负担能力，并明\n确相应的权利和责任主体，反映潜在的风险状况。\n通过对领导干部实行自然资源资产离任审计，将对政绩考核制\n度产生重大影响，并提高经济社会管理水平。\n\n---\n\n**p031** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_031.jpg)\n\n2.环境保护法的基本原则\n2.4环境责任原则（原因者负担原则）\n2.4.1概念\n《环境保护法》第6条：一切单位和个人都有保护环境的义\n务。地方各级人民政府应当对本行政区域的环境质量负责。\n企业事业单位和其他生产经营者应当防止、减少环境污染和\n生态破坏，对所造成的损害依法承担责任。公民应当增强\n环境保护意识，采取低碳、节俭的生活方式，自觉履行环境\n保护义务。\n\n---\n\n**p032** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_032.jpg)\n\n2.环境保护法的基本原则\n2.4环境责任原则（原因者负担原则）\n2.4.2贯彻\n（一）实行排污收费制度或征收污染税制度；\n（二）实行废弃物品再生利用和回收制度；\n（三）实行开发利用自然资源补偿费或税制度；\n（四）建立环境保护费用的共同负担制度。\n\n---\n\n**p033** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_033.jpg)\n\n2.环境保护法的基本原则\n2.5公众参与原则\n2.5.1概念\n【公众参与原则】 （P61）：指公众有权通过一定的程\n序或途径参与一切与公众环境权益相关的开发决策等活动，\n并有权得到相应的法律保护和救济，以防止决策的盲目性、\n使得该项决策符合广大公众的切身利益和需要。\n\n---\n\n**p034** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_034.jpg)\n\n2.环境保护法的基本原则\n2.5公众参与原则\n2.5.1概念\n参与决策的公众的范围（P62-64）：\n（1）居民；\n（2）各类专业人士；\n（3）社会团体；\n（4）与拟议行为有关的行政机关。\n\n---\n\n**p035** ![](../006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则/page_035.jpg)\n\n2.环境保护法的基本原则\n2.5公众参与原则\n2.5.2适用\n（一）在环境影响评价和其他涉及公众利益的许可程序中\n建立公众参与制度；\n建立决策信息公开与披露制度；\n鼓励各类非政府的环境组织代表公众参与环境决策；\n（四）建立公众参与的行政和司法保障制度。\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 5 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 2 节 · 31 页\n\n> `002-2.环境保护法的基本原则-1-2026年3月4日-杨建英-开学第一课.pdf` · 涉章 [2]\n\n- [p001](../002-2.环境保护法的基本原则-1-2026年3月4日-杨建英-开学第一课/page_001.jpg)  · 大家！早上好！\n- [p002](../002-2.环境保护法的基本原则-1-2026年3月4日-杨建英-开学第一课/page_002.jpg)  · 讨论1：污染环境、破坏生态，仅仅\n- [p003](../002-2.环境保护法的基本原则-1-2026年3月4日-杨建英-开学第一课/page_003.jpg)  · 讨论2：为什么要学《环境保护法》？\n- ...余 28 页, 参 [`002-2.环境保护法的基本原则-1-2026年3月4日-杨建英-开学第一课/`](../002-2.环境保护法的基本原则-1-2026年3月4日-杨建英-开学第一课/)\n\n### 辅 2 · 第 4 节 · 23 页\n\n> `004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则.pdf` · 涉章 [2]\n\n- [p001](../004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则/page_001.jpg)  · 2.环境保护法的基本原则\n- [p002](../004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则/page_002.jpg)  · 2.1什么是基本原则？\n- [p003](../004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则/page_003.jpg)  · 在理解环境法的基本原则时，要注意如下几个问题：\n- ...余 20 页, 参 [`004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则/`](../004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则/)\n\n### 辅 3 · 第 5 节 · 22 页\n\n> `005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则.pdf` · 涉章 [2]\n\n- [p001](../005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则/page_001.jpg)  · 2.环境保护法的基本原则\n- [p002](../005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则/page_002.jpg)  · 目录\n- [p003](../005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则/page_003.jpg)  · 2.2预防原则（3.25）\n- ...余 19 页, 参 [`005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则/`](../005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则/)\n\n### 辅 条）\n3. 深入开展环境保护法制宣传教育\n4. 加强环境科学技术研究，保证环保资金投入\n5. 建立循环经济型社会（资源→产品→再生资源）\n6. 严格立法、严格执法，增大违法成本\n7. 探索编制自然资源资产负债表，实行自然资源资产离任审计\n\n### 五、环境责任原则的贯彻（p032）\n\n1. 实行排污收费制度或征收污染税制度\n2. 实行废弃物品再生利用和回收制度\n3. 实行开发利用自然资源补偿费或税制度\n4. 建立环境保护费用的共同负担制度\n\n### 六、公众参与原则（p033-p035）\n\n- **参与主体**：居民、各类专业人士、社会团体、与拟议行为有关的行政机关\n- **适用方式**：①环境影响评价中的公众参与制度；②决策信息公开与披露制度；③鼓励非政府环境组织代表公众参与；④公众参与的行政和司法保障制度\n\n### 七、高频考点（速记）\n\n1. 环境法四大基本原则的名称与内涵（选择/简答·必考）\n2. 协调发展原则的概念与法条依据（《环保法》第4条）（简答）\n3. 预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n4. 原因者负担原则的四层含义（选择·高频）\n5. 公众参与原则的概念与适用方式（简答）\n6. 协调发展原则的七项贯彻措施（论述）\n7. 盖巴斯科夫案与田纳西案的比较（案例分析）\n\n### 八、易错 / 易混点\n\n- ❌ 将\"协调发展\"等同于\"经济优先\"：协调发展强调同步，非经济优先\n- ❌ 混淆\"预防原则\"与\"预防为主\"：前者是基本原则，后者是其内涵之一\n- ❌ 将\"原因者负担\"仅理解为\"污染者付费\"：还包括利用者补偿、开发者保护、破坏者恢复\n- ❌ 忽略公众参与原则的司法保障：公众参与不仅限于行政程序，还包括司法救济\n\n### 九、与前后章之关联\n\n- **← 第1章**：第1章环境法概述为基本原则提供理论基础\n- **→ 第3章**：第3章环境利用行为主体是公众参与原则的具体化\n- **→ 第5章**：第5章环境基本制度是基本原则的制度化落实\n- **→ 第6章**：第6章污染控制法是原因者负担原则的具体适用\n"}, {"id": "ch-03", "group": "章节素材", "title": "第03章 环境利用行为的主体及其权利义务", "md": "# 环境法学 · 第 3 章 · 环境利用行为的主体及其权利义务 · 素材\n\n> 教师: 杨建英 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 44\n> 主版: 第 7 节 · 36 页\n\n---\n\n## 主版课件 · 第 7 节\n\n> `007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务.pdf`\n\n<details><summary>展开 36 页图链<\/summary>\n\n- [p001](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_001.jpg)  · 3.环境利用行为的主体及其权利义务\n- [p002](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_002.jpg)  · 目录\n- [p003](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_003.jpg)  · 3.1环境利用行为与环境法律关系 遭受2万倍辐射的人，究竟多痛苦？\n- [p004](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_004.jpg)  · 3.1环境利用行为与环境法律关系\n- [p005](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_005.jpg)  · 3.1环境利用行为与环境法律关系\n- [p006](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_006.jpg)  · 3.2公民（自然人）与公众\n- [p007](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_007.jpg)  · 3.2公民（自然人）与公众\n- [p008](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_008.jpg)  · 3.2公民（自然人）与公众 讨论一\n- [p009](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行 体及其权利义务-3. 环境利用行为的主体及其权利义务/page_033.jpg)  · 3.3开发利用行为人\n- [p034](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_034.jpg)  · 3.3开发利用行为人\n- [p035](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_035.jpg)  · 3.3开发利用行为人\n- [p036](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_036.jpg)  · 3.3开发利用行为人\n\n<\/details>\n\n<details><summary>展开 36 页图文对照（每图配其识别文本）<\/summary>\n\n**p001** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_001.jpg)\n\n3.环境利用行为的主体及其权利义务\n新疆大学生态与环境学院\n杨建英\n2026年4月\n\n---\n\n**p002** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_002.jpg)\n\n目录\n3.环境利用行为的主体及其权利义务\n3.1环境利用行为与环境法律关系\n3.1.1环境利用行为\n3.1.2环境法律关系\n3.2公民（自然人）与公众\n3.2.1概念\n3.2.2公众的环境权益\n3.2.3公民的环境保护义务\n3.3开发利用行为人\n3.3.1一般权利与义务\n3.3.2环境社会责任\n\n---\n\n**p003** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_003.jpg)\n\n3.1环境利用行为与环境法律关系 遭受2万倍辐射的人，究竟多痛苦？\n3.1.1环境利用行为 中国庭审公开网 qfSVtqPQfcg\n概念及分类（P67-69） %E6%B1%A1%E6%9F%93&pageNumber=1&pageSize=15&extType=\n【环境利用行为（environmentalutilizationbehavior）】是\n指人类为满足生存需要有意识地获取环境要素或者从环境要素中谋\n取利益的活动。\n从行为对环境是否产生不利影响的角度，本书将环境利用行为\n分为本能利用行为与开发利用行为两大类。\n（一）本能利用行为\n【本能利用行为（instinctiveutilizationbehavior）】是指行\n为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改\n变环境的活动。\n以基本生存为目的一一产生了环境权\n\n---\n\n**p004** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_004.jpg)\n\n3.1环境利用行为与环境法律关系\n3.1.1环境利用行为\n概念及分类（P67-69）\n（二）开发利用行为\n【开发利用行为（developmentandutilizationbehavior）】是指行为人以谋取环境容量与自然资源的经济利益\n为目的，向环境排放或者处理废弃物质与能量或者开发自然资源与\n能源等利用和改变环境状况的活动。\n根据开发利用行为的方式，可以将它们分为环境容量利用行为\n和自然资源利用行为两大类。\n\n---\n\n**p005** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_005.jpg)\n\n3.1环境利用行为与环境法律关系\n3.1.2环境法律关系\n一、概念（P69)\n【环境法律关系environmental legalrelation）】是环境利用行为主体\n间发生的具有权利义务内容的社会关系。\n环境法律关系的实质是受法律调整的环境利用关系，它们以主\n体在环境利用行为中的权利义务为基本内容。\n环境法律关系的主体是依法享有环境利用权利并承担环境保护\n义务的环境利用行为人以及代表国家行使环境监督管理权的行政机\n关。包括公民（自然人、公众及其代表）、各种开发利用行为人以\n及国家机关和政府及其环境主管部门等。\n\n---\n\n**p006** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_006.jpg)\n\n3.2公民（自然人）与公众\n3.2.1概念（P71-72）\n【公民（自然人）】：是指环境和自然资源的享受者或者是\n环境质量和生态效益（ecological benefit）的受益者。（个人）\n【公众】：一般指与开发利用环境行为及其结果有直接和间接\n利害关系的各种主体的统称。 （群体）\n【环境保护组织】：是指依法在设区的市级以上人民政府民\n政部门登记，专门从事环境保护公益活动连续五年以上且无违法\n记录的社会组织。\n\n---\n\n**p007** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_007.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n一、公众环境权益的法律规定及其法律解析\n法律规定：2002年《环境影响评价法》首次将“公众环境权益”作\n为规划环评的内容；\n2009、2012、2016年三次在国务院发布的《国家人权行动计划》中，\n将其作为人权的重要组成部分。\n【公众环境权益】既是公民基本权利中与享受优美环境相关的、\n非独占性的权利和利益的集合，也是公民对其正常生活和工作环境\n享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）\n\n---\n\n**p008** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_008.jpg)\n\n3.2公民（自然人）与公众 讨论一\n3.2.2公众的环境权益\n二、公众环境权益的内容\n（1）优美、舒适环境的享受权；\n（2）开发利用环境决策与行为知悉权；\n（3）开发利用环境决策建言权；\n4） 监督开发利用环境行为及其举报权；\n（5）环境权益侵害救济请求权\n\n---\n\n**p009** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_009.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n三、公众环境权益的内容\n环境知情权、参与权和监督权\n公众环境权益 环境违法举报权\n环境民事公益诉讼\n\n---\n\n**p010** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_010.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n三、公众环境权益的内容\n环境知情权、参与权和监督权\n《环境保护法》（2014年修订版）第53条第1款规定，公民、\n法人和其他组织依法享有获取环境信息、参与和监督环境保护\n的权利。该款规定宣示了公众参与环境保护的三项重要的程序\n性权利，即环境知情权、参与权和监督权。此外，该条第2款还\n相应规定，各级人民政府环境保护主管部门和其他负有环境保\n护监督管理职责的部门，应当依法公开环境信息、完善公众参\n与程序，为公民、法人和其他组织参与和监督环境保护提供便\n利。\n\n---\n\n**p011** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_011.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n三、公众环境权益的内容\n公众的环境违法举报权\n《环境保护法》（2014年修订版）第57条规定了公众对于\n环境违法行为的举报权。公民、法人和其他组织发现任何单位和\n个人有污染环境和破坏生态行为的，有权向环境保护主管部门或\n者其他负有环境保护监督管理职责的部门举报。公民、法人和其\n他组织发现地方各级人民政府、县级以上人民政府环境保护主管\n部门和其他负有环境保护监督管理职责的部门不依法履行职责的，\n有权向其上级机关或者监察机关举报。接受举报的机关应当对举\n报人的相关信息予以保密，保护举报人的合法权益。\n\n---\n\n**p012** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_012.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n三、公众环境权益的内容\n公共机构的环境信息发布职责\n《环境保护法》（2014年修订版）第54条规定了政府机关和其他公共\n服务机构的环境信息发布职责。国务院环境保护主管部门统一发布国家\n环境质量、重点污染源监测信息及其他重大环境信息。省级以上人民政\n府环境保护主管部门定期发布环境状况公报。县级以上人民政府环境保\n护主管部门和其他负有环境保护监督管理职责的部门，应当依法公开环\n境质量、环境监测、突发环境事件以及环境行政许可、行政处罚等信息。\n\n---\n\n**p013** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_013.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n曝光台\n三、公众环境权益的内容 行政处理 执法信息 通报\n公共机构的环境信息发布职责\n·核安全行政处罚决定书（无锡市新峰管业有限公司\n城市空气质量实时全国空气质量预报 地表水水质实时 政府信息公开\n信息公开指南 信息公开制度 核级管配件制造过程违法违规案）\nAQI实时报 AQ旧报 断面名称 测量时间 水质类别\n2020年03月13日01时 黄白桥 03-12 23:00 IV 信息公开目录 依申请公开 ·江苏利思德新材料有限公司未取得登记证生产新化\n城市 AQI 首要污染物 汉公路桥 03-12 23:00 IV 学物质违规行为处罚情况\n折州市 38 政务服务\n临汾市 72 PM10 海河大用 03-12 23:00 IV\n目事项目录 办事指南 ·山东四环药业股份有限公司和济南盛弘医药科技有\n昌梁市 74 PM10 北非水河防潮 03-12 23:00\n呼和浩特市 23 面运可防潮用 03-12 23:00 IV 常见问题 用户登录 限公司未取得登记证生产新化学物质违规行为处罚\n包头市 20 西屯桥 03-1223:00 互动交流 情况\n乌海市 40 平山桥 03-12 23:00\n意见征集 部长信箱\n赤峰市 23 兆通 03-12 23:00 行政处罚决定书（国家无线电监测中心环境违法\n通辽市 37 南张村 03-1223:00 环境污染网上举报 12369环保举报 案）\n鄂尔多斯市 26 大国汀水库 03-12 23:00\n呼伦贝尔市 25 廉政举报\n简可口 03-1223:00 TV ·责令改正违法行为决定书（成都中核高通同位素股\n丰北用 中央和国家机关举报网站\n良 轻度污染 中度污染 03-12 23:00 份有限公司）\n重度污染 严重污染 生态环境部廉政举报\n\n---\n\n**p014** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_014.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益 中华人民共和国生态环境部\n三、公众环境权益的内容 新疆维吾尔自治区生态环境厅\n公共机构的环境信息发布职责\n中华人民共和国生态环境部\nMinistryofEcologyandEnvironmentof thePeople'sRepublicofChina 请输入您要搜索的内容 新疆维吾尔自治区生态环境厅 请铂入搜索关携字\n热门搜索：一带一路打好污染防治攻 热词：蓝天保卫战地表水水质环增保护税高拔慢素\n环境质量 颜 走进环保 环境质量 污染防治 生态保护 信息公开 网上办事 政民互动\n当前位置：首页>环境质量\n环境状况公报 更多+\n生态环境状况公报\n中国生态环境状况公报 生态环境统计年报 中国海洋生态环境状况公报\n2015年环镇优写公司 2014年环境状况公服\n2015年环境统计年报 ·2010年环境统计年报 2018年环\n·2009年环境统计年报 环境机况热损2017 环境状况公报 2016\n·2014年环境统计年报\n·2013年环境统计年报 2008年环境统计年报\n·2012年环境统计年报 ·2007年环境统计年报\n2011年环境统计年报 2018年新疆维吾尔自治区 2017年新疆维吾尔自治区 2016年新疆维吾尔自治区 2015年新疆维吾尔自治区 2014年新疆维吾尔自治区\n·2006年环境统计年报 环境状况公报 环境状况公报 环境状况公报 环境状况公报 环境状况公报\n\n---\n\n**p015** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_015.jpg)\n\n3.2公民（自然人）与公众\n3.2.2公众的环境权益\n三、公众环境权益的内容\n环境违法“黑名单\"机制\n《环境保护法》（2014年修订版）第54条规定了环境违法企业的“黑\n名单”制度。即县级以上地方人民政府环境保护主管部门和其他负有环\n境保护监督管理职责的部门，应当将企业事业单位和其他生产经营者\n的环境违法信息记入社会诚信档案，及时向社会公布违法者名单。\n2013年12月，原环境保护部曾联合人民银行等部门发布了《企业环境\n信用评价办法（试行）》（环发[2013]150号），以推进企业环境信用\n评价工作，督促企业自觉履行环境保护法定义务和社会责任。\n\n---\n\n**p016** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_016.jpg)\n\n3.2公民（自然人）与公众\n3.2.3公民的环境保护义务（P78-79）\n1.关心和保护环境的一般义务\n《环境保护法》 （2014年修订版）夫 规定，一切单位和个人都有保\n护环境的义务。\n2.忍受一定限度环境污染或自然环境损害的特别义务\n一般情况下，容忍的判断标准是排放行为是否具有合法性，它\n以行为是否构成实质性影响为判断标准。\n是否应当许可或者忍受实质性影响，取决于两个条件：一是行\n为是否为当地通行，二是影响是否可以通过经济上可行的措施克服。\n\n---\n\n**p017** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_017.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n一般权利：\n首先，要取得由政府特许的自然资源开发利用权或者向环境排放污\n染物的权利；\n然后，按照自然资源规划或者环境保护规划实施开发和利用环境的\n行为。\n义务：\n接受国家对它们开展的宏观调控和管理监督；\n当环境利用行为触犯国家和地方环境保护法律法规时，还必须接受\n国家依法对它们实行的制裁；\n当向环境排放污染物造成环境损害或者开发自然资源造成自然破环\n时，还应当依法承担相应的民事责任。\n\n---\n\n**p018** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_018.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（一）开发利用自然资源的权利与义务\n《环境保护法》（2014年修订版）第30条规定，开发利用自然资\n源，应当合理开发，保护生物多样性，保障生态安全，依法制定有\n关生态保护和恢复治理方案并予以实施。引进外来物种以及研究、\n开发和利用生物技术，应当采取措施，防止对生物多样性的破坏。\n《环境保护法》（2014年修订版）第6条第3款、第36条、第40条\n第3款明确规定了企业事业单位和其他生产经营者应当防止、减少环\n境污染和生态破坏，对所造成的损害依法承担责任；使用有利于保\n护环境的产品和再生产品；优先使用清洁能源，采用资源利用率高、\n污染物排放量少的工艺、设备以及废弃物综合利用技术和污染物无\n害化处理技术等。\n\n---\n\n**p019** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_019.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n【利用环境容量排污的权利又称排污权（emissionright）】\n它是环境主管部门依法赋予排污者依照法律规定的污染物排放（控\n制）标准向环境排放污染物的权利，而非宪法上的基本权利。\n义务：遵守行政机关依法许可的排污范围、排污方法、排污途径以\n及按照排污标准所限定的种类、浓度和数量等排放污染物，并依法\n履行环境影响评价和“三同时”、排污许可、缴纳排污费税、接受现场\n检查等法定义务。\n\n---\n\n**p020** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_020.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n《环境保护法》（2014年修订版）第42条第1款进一步规定，\n排放污染物的企业事业单位和其他生产经营者，应当采取措施，\n防治在生产建设或者其他活动中产生的废气、废水、废渣、医疗\n废物、粉尘、恶臭气体、放射性物质以及噪声、振动、光辐射、\n电磁辐射等对环境的污染和危害。\n\n---\n\n**p021** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_021.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n企业环保责任制\n《环境保护法》 （2014年修订版）第42条第2款规定，排放污染\n物的企业事业单位，应当建立环境保护责任制度，明确单位负责人和\n相关人员的责任。单位负责人或相关人员没有履行环保职责而造成污\n染事故发生的，应承担相应的法律责任。\n【单位负责人】指排污单位的主要负责人，是排污单位环境保护\n工作的总负责人，在排污单位内全面负责环境保护工作，对相关责任\n人员进行指导、监督，落实环境保护管理制度。\n【相关人员】指排污单位的环境监督员等人员。环境监督员具体\n负责排行单位的污染防治、日常检查等环境保护工作。\n\n---\n\n**p022** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_022.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n重点排污单位的环境监测义务及其违法责任\n《环境保护法》（2014年修订版）第42条第3款规定，重点\n排污单位应当按照国家有关规定和监测规范安装使用监测设备，\n保证监测设备正常运行，保存原始监测记录。\n重点排污单位包括国家监控的重点排污单位和地方监控的重\n点排污单位，具体名录由国家环境保护行政主管部门和地方环境\n保护行政主管部门公布。\n执行监测记录包括监测各环节的原始记录、委托监测相关记\n录、自动监测设备运行维护记录。各类记录内容应当完整，由相\n关人员签字，并妥善保存。\n\n---\n\n**p023** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_023.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n严禁逃避监管违法排污\n《环境保护法》（2014年修订版）第42条第4款规定，严禁通过暗管、\n渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防治污\n染设施等逃避监管的方式违法排放污染物。\n《环境保护法》（2014年修订版）第63条和第69条分别规定，通过暗\n管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防\n治污染设施等逃避监管的方式违法排放污染物的企业事业单位和其他\n生产经营者，尚不构成犯罪的，除依照有关法律法规规定予以处罚外，\n由县级以上人民政府环境保护主管部门或者其他有关部门将案件移送\n公安机关，对其直接负责的主管人员和其他直接责任人员，处10日以\n上15日以下拘留；情节较轻的，处5日以上10日以下拘留。构成犯罪的，\n依法追究刑事责任。\n\n---\n\n**p024** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_024.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n重点排污单位的环境信息公开义务\n《环境保护法》（2014年修订版）第55条新增规定，重点排\n污单位应当如实向社会公开其主要污染物的名称、排放方式、排\n放浓度和总量、超标排放情况，以及防治污染设施的建设和运行\n情况，接受社会监督。2014年12月，原环境保护部配套制定了\n《企业事业单位环境信息公开办法》（原环境保护部令第31号）。\n\n---\n\n**p025** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_025.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n应当纳入重点排污单位名录的企事业单位种类\n根据《企业事业单位环境信息公开办法》第7条的规定，设区\n的市级人民政府环境保护主管部门应当于每年3月底前确定本行政\n区域内重点排污单位名录，并通过政府网站、报刊、广播、电视等\n便于公众知晓的方式公布。\n环境保护主管部门确定重点排污单位名录时，应当综合考虑本\n行政区域的环境容量、重点污染物排放总量控制指标的要求，以及\n企业事业单位排放污染物的种类、数量和浓度等因素。\n\n---\n\n**p026** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_026.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n应当纳入重点排污单位名录的企事业单位种类\n根据该办法第8条的规定，具备下列条件之一的企业事业单位，应\n当列入重点排污单位名录：\n（1）被设区的市级以上人民政府环境保护主管部门确定为重点监控企\n业的；\n（2）具有试验、分析、检测等功能的化学、医药、生物类省级重点以\n上实验室、二级以上医院、污染物集中处置单位等污染物排放行为引\n起社会广泛关注的或者可能对环境敏感区造成较大影响的；\n（3）三年内发生较大以上突发环境事件或者因环境污染问题造成重大\n社会影响的；\n（4）其他有必要列入的情形。\n\n---\n\n**p027** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_027.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n重点排污单位应当公开的环境信息的种类\n根据《企业事业单位环境信息公开办法）第9条的规定，重点排污单\n位应当公开下列信息：\n（1）基础信息；\n（2）排污信息；\n（3）防止污染设施的建设和运行情况；\n（4）建设项目环境影响评价及其他环境保护行政许可情况；\n（5）突发环境事件应急预案；\n（6）其他应当公开的环境信息。\n此外，列入国家重点监控企业名单的重点排污单位还应当公开其环境自\n行监测方案。\n\n---\n\n**p028** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_028.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n重点排污单位环境信息公开的方式\n根据《企业事业单位环境信息公开办法》第10条的规定，重点排污\n单位应当通过其网站、企业事业单位环境信息公开平台或者当地报刊等\n便于公众知晓的方式公开环境信息，同时可以采取以下一种或者几种方\n式予以公开：\n（1）公告或者公开发行的信息专刊；\n（2）广播、电视等新闻媒体；\n（3）信息公开服务、监督热线电话；\n（4）本单位的资料索取点、信息公开栏、信息亭、电子屏幕、电子触\n摸屏等场所或者设施；\n（5）其他便于公众及时、准确获得信息的方式。\n\n---\n\n**p029** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_029.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n重点排污单位环境信息公开的时限\n根据《企业事业单位环境信息公开办法》第11条的规定，重\n点排污单位应当在环境保护主管部门公布重点排污单位名录后90\n日内依法公开其环境信息；环境信息有新生成或者发生变更情形\n的，重点排污单位应当自环境信息生成或者变更之日起30日内予\n以公开。但是，法律、法规另有规定的，从其规定。\n\n---\n\n**p030** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_030.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n重点排污单位环境信息公开的违法行政责任\n根据《企业事业单位环境信息公开办法》第11条的规定，重点排污\n单位违反该办法的规定，有下列行为之一的，由县级以上环境保护主管\n部门根据《环境保护法》的规定责令公开，处3万元以下罚款，并予以\n公告：\n（1）不公开或者不按照该办法第9条规定的内容公开环境信息的；\n（2）不按照该办法第10条规定的方式公开环境信息的；\n（3）不按照该办法第11条规定的时限公开环境信息的；\n（4）公开内容不真实、弄虚作假的。\n法律、法规另有规定的，从其规定。\n\n---\n\n**p031** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_031.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\n企业环境应急管理\n《环境保护法》（2014年修订版）新增第47条规定要求，各级人\n民政府及其有关部门和企业事业单位应当依照《突发事件应对法》\n的规定，做好突发环境事件的风险控制、应急准备、应急处置和\n事后恢复等工作。企业事业单位应当按照国家有关规定制定突发\n环境事件应急预案，报环境保护主管部门和有关部门备案。在发\n生或者可能发生突发环境事件时，企业事业单位应当立即采取措\n施处理，及时通报可能受到危害的单位和居民，并向环境保护主\n管部门和有关部门报告。\n\n---\n\n**p032** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_032.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\nA公司环境监测数据弄虚作假案\n案情概述\nA公司主营捣固焦、粗苯、焦油等产品，是B市重要化工企业之一。2015年\n4月22日，B市环保局与市公安局环保支队混合编队，对A公司污染物排放情况\n进行了全面检查。检查发现，A公司部分高浓度焦化生产废水未经任何处理，\n直接用于熄焦，属典型的恶意偷排偷放。此外，A公司一期工程150t/h燃煤锅\n炉自动监控设备段二氧化硫值为35-90mg/m3之间，烟尘为45mg/m3，环保局\n现场手工监测二氧化硫值为166-172mg/m3之间，烟尘为194mg/m3；二期工程\n75t/h燃煤锅炉自动监控设备烟尘值为66mg/m3，环保局现场手工监测烟尘为\n163mg/m3，存在焦炉超标排放、燃煤锅炉在线监测数据造假、烟尘超标排放\n等问题。B市环保局依法作出处罚决定，对A公司处以145万元罚款并没收违法\n保证金100万元；因A公司肆意修改在线监控数据，其主管环保的经理张某某、\n仪表部经理胡某被依法行政拘留7日。\n\n---\n\n**p033** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_033.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\nA公司环境监测数据弄虚作假案\n核心问题\n《环境保护法》对企业环境监测的义务作出了哪些基本规定？\n对于环境监测弄虚作假的行为人是否可以依法予以行政拘留？\n\n---\n\n**p034** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_034.jpg)\n\n3.3开发利用行为人\n3.3.1开发利用行为人的一般权利与义务\n（二）利用环境容量排污的权利与义务\nA公司环境监测数据弄虚作假案\n简要评论\n《环境保护法》第42条明确规定，重点排污单位应当按照国家有关规定和\n监测规范安装使用监测设备，保证监测设备正常运行，保存原始监测记录。严禁\n通过暗管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防治污\n染设施等逃避监管的方式违法排放污染物。对于通过暗管、渗井、渗坑、灌注\n或者篡改、伪造监测数据，或者不正常运行防治污染设施等逃避监管的方式违\n法排放污染物的企业事业单位和其他生产经营者，构成犯罪的，依法追究刑事\n责任；尚不构成犯罪的，除依照有关法律法规规定予以处罚外，由县级以上人民\n政府环境保护主管部门或者其他有关部门将案件移送公安机关，对其直接负责\n的主管人员和其他直接责任人员，处10日以上15日以下拘留；情节较轻的，处\n5日以上10日以下拘留。\n\n---\n\n**p035** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_035.jpg)\n\n3.3开发利用行为人\n3.3.2开发利用行为人的环境社会责任\n（一）概念\n【开发利用行为人环境社会责任】是指从事开发利用行为人作\n为一类社会群体对社会以及其他公众除强制性法律规范外的环境保\n护义务。\n两个特征：\n第一，责任主体为从事开发利用环境行为（排污或者开发资源）的\n人，它们同时也属于公众的范畴，是社会群体的一种类型；\n第二，这种责任并非来源于法律的强制性规范，而是开发利用行为\n人用以维系和调整与本能利用环境的社会公众之间和谐关系的一种\n道义。\n\n---\n\n**p036** ![](../007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务/page_036.jpg)\n\n3.3开发利用行为人\n3.3.2开发利用行为人的环境社会责任\n（二）开发利用行为人环境社会责任的内容\n1.通过环境保护质量体系认证或获得绿色标签认定；\n2.推行清洁生产；\n3.主动对外宣示开发利用行为人环境保护守则。\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 1 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 6 节 · 8 页（跨章）\n\n> `006-2.环境保护法的基本原则（4）-3. 环境利用行为的主体及其权利义务.pdf` · 涉章 [2, 3]\n\n- [p001](../006-2.环境保护法的基本原则（4）-3. 环境利用行为的主体及其权利义务/page_001.jpg)  · 目录\n- [p002](../006-2.环境保护法的基本原则（4）-3. 环境利用行为的主体及其权利义务/page_002.jpg)  · 3.1环境利用行为与环境法律关系 遭受2万倍辐射的人，究竟多痛苦？\n- [p003](../006-2.环境保护法的基本原则（4）-3. 环境利用行为的主体及其权利义务/page_003.jpg)  · 3.1环境利用行为与环境法律关系\n- ...余 5 页, 参 [`006-2. 环境保护的两类义务：一般义务+特别义务（简答）\n      排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n      逃避监管违法排污的方式及法律后果（简答）\n      重点排污单位环境信息公开制度（选择/简答）\n      A公司监测数据造假案的法律适用（案例分析）\n```\n\n## 复习要点 · 从OCR迁移\n\n> 以下内容均从课件PDF的OCR识别文本中迁移整理，去芜存菁。\n\n### 一、核心概念（名词解释）\n\n- **环境利用行为（environmental utilization behavior）**：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）\n- **本能利用行为（instinctive utilization behavior）**：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）\n- **开发利用行为（development and utilization behavior）**：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n- **环境法律关系（environmental legal relation）**：环境利用行为主体间发生的具有权利义务内容的社会关系。实质是受法律调整的环境利用关系，以主体在环境利用行为中的权利义务为基本内容。（p005）\n- **公民（自然人）**：环境和自然资源的享受者或者是环境质量和生态效益的受益者。（个人）（p006）\n- **公众**：与开发利用环境行为及其结果有直接和间接利害关系的各种主体的统称。（群体）（p006）\n- **环境保护组织**：依法在设区的市级以上人民政府民政部门登记，专门从事环境保护公益活动连续五年以上且无违法记录的社会组织。（p006）\n- **公众环境权益**：既是公民基本权利中与享受优美环境相关的、非独占性的权利和利益的集合，也是公民对其正常生活和工作环境享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）（p007）\n- **排污权（emission right）**：环境主管部门依法赋予排污者依照法律规定的污染物排放（控制）标准向环境排放污染物的权利，而非宪法上的基本权利。（p019）\n- **开发利用行为人环境社会责任**：从事开发利用行为人作为一类社会群体对社会以及其他公众除强制性法律规范外的环境保护义务。具有道义性特征。（p035）\n\n### 二、关键法条 / 制度构成\n\n- **《环保法》第53条第1款**：公民、法人和其他组织依法享有获取环境信息、参与和监督环境保护的权利。宣示了公众参与环境保护的三项程序性权利：环境知情权、参与权和监督权。（p010）\n- **《环保法》第57条**：规定了公众对于环境违法行为的举报权。接受举报的机关应当对举报人的相关信息予以保密，保护举报人的合法权益。（p011）\n- **《环保法》第54条**：规定了政府机关和其他公共服务机构的环境信息发布职责。国务院环境保护主管部门统一发布国家环境质量、重点污染源监测信息及其他重大环境信息。还规定了环境违法企业的\"黑名单\"制度。（p012、p015）\n- **《环保法》第30条**：开发利用自然资源，应当合理开发，保护生物多样性，保障生态安全，依法制定有关生态保护和恢复治理方案并予以实施。（p018）\n- **《环保法》第42条**：排放污染物的企业事业单位和其他生产经营者应当采取措施防治污染；应建立环境保护责任制度；重点排污单位应安装使用监测设备；严禁通过暗管、渗井、渗坑、灌注或篡改伪造监测数据等逃避监管方式违法排放污染物。（p020-p023）\n- **《环保法》第55条**：重点排污单位应当如实向社会公开其主要污染物的名称、排放方式、排放浓度和总量、超标排放情况，以及防治污染设施的建设和运行情况，接受社会监督。（p024）\n- **《环保法》第47条**：各级人民政府及其有关部门和企业事业单位应当做好突发环境事件的风险控制、应急准备、应急处置和事后恢复等工作。企业事业单位应制定突发环境事件应急预案。（p031）\n\n### 三、公众环境权益的内容（p008-p009）\n\n1. 优美、舒适环境的享受权\n2. 开发利用环境决策与行为知悉权\n3. 开发利用环境决策建言权\n4. 监督开发利用环境行为及其举报权\n5. 环境权益侵害救济请求权\n\n**三项核心程序性权利**：环境知情权、参与权和监督权（第53条）\n\n### 四、公民的环境保护义务（p016）\n\n1. **关心和保护环境的一般义务**：《环保法》规定一切单位和个人都有保护环境的义务\n2. **忍受一定限度环境污染或自然环境损害的特别义务**：容忍的判断标准是排放行为是否具有合法性，以是否构成实质性影响为判断标准。是否应当忍受实质性影响取决于两个条件：①行为是否为当地通行；②影响是否可以通过经济上可行的措施克服\n\n### 五、开发利用行为人的权利与义务（p017-p031）\n\n**一般权利**：\n- 取得政府特许的自然资源开发利用权或向环境排放污染物的权利\n- 按照自然资源规划或环境保护规划实施开发和利用环境的行为\n\n**义务**：\n- 接受国家宏观调控和管理监督\n- 触犯法律法规时接受制裁\n- 造成环境损害时承担民事责任\n\n**排污权及其义务**（p019-p023）：\n- 遵守排污范围、方法、途径及标准\n- 履行环境影响评价和\"三同时\"、排污许可、缴纳排污费税、接受现场检查等法定义务\n- 企业环保责任制：单位负责人为总负责人，环境监督员具体负责\n- 重点排污单位环境监测义务：安装使用监测设备，保证正常运行，保存原始监测记录\n- 严禁逃避监管违法排污：暗管、渗井、渗坑、灌注、篡改伪造监测数据等 → 行政拘留5-15日，构成犯罪追究刑事责任\n\n### 六、重点排污单位环境信息公开（p024-p030）\n\n- **应当公开的信息**（第9条）：基础信息、排污信息、防治污染设施建设和运行情况、环评及环保行政许可情况、突发环境事件应急预案、其他\n- **公开方式**（第10条）：网站、企业环境信息公开平台、当地报刊等便于公众知晓的方式\n- **公开时限**（第11条）：名录公布后90日内公开；新生成或变更信息30日内公开\n- **违法责任**：责令公开，处3万元以下罚款，并予以公告\n\n### 七、重要案例\n\n- **A公司环境监测数据弄虚作假案**（p032-p034）：A公司高浓度焦化废水未经处理直接用于熄焦（恶意偷排），自动监控数据造假（SO₂显示35-90mg/m³，实测166-172mg/m³）。B市环保局处罚145万元+没收保证金100万元；主管经理和仪表部经理被行政拘留7日。→ 体现《环保法》第42条对监测数据造假的严厉制裁\n\n### 八、开发利用行为人环境社会责任（p035-p036）\n\n- **概念**：除强制性法律规范外的环境保护义务，具有道义性\n- **内容**：①通过环境保护质量体系认证或获得绿色标签认定；②推行清洁生产；③主动对外宣示环境保护守则\n\n### 九、高频考点（速记）\n\n1. 环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）\n2. 环境法律关系的概念与主体构成（名词解释）\n3. 公众环境权益的五项内容（简答）\n4. 公众参与环境保护的三项程序性权利：知情权、参与权、监督权（选择·高频）\n5. 公民环境保护的两类义务：一般义务+特别义务（简答）\n6. 排污权的性质：非宪法基本权利，是行政特许权（选择·易错）\n7. 逃避监管违法排污的方式及法律后果（简答）\n8. 重点排污单位环境信息公开制度（选择/简答）\n9. A公司监测数据造假案的法律适用（案例分析）\n\n### 十、易错 / 易混点\n\n- ❌ 将\"公众\"等同于\"公民\"：公众是群体概念，包括公民、法人、其他组织\n- ❌ 混淆\"排污权\"与\"环境权\"：排污权是行政特许权，非宪法基本权利\n- ❌ 忽略\"忍受义务\"的两个条件：当地通行+经济上可行措施可克服\n- ❌ 将\"环境社会责任\"等同于\"法律义务\"：前者是道义性的，非强制性\n- ❌ 混淆\"本能利用行为\"与\"开发利用行为\"：前者以基本生存为目的，后者以经济利益为目的\n\n### 十一、与前后章之关联\n\n- **← 第2章**：第2章公众参与原则在本章具体化为公众环境权益\n- **→ 第4章**：本章开发利用行为人的义务对应第4章国家的环境保护义务\n- **→ 第5章**：本章排污权、环境信息公开放在第5章制度体系中落实\n"}, {"id": "ch-04", "group": "章节素材", "title": "第04章 国家的环境保护义务", "md": "# 环境法学 · 第 4 章 · 国家的环境保护义务 · 素材\n\n> 教师: 杨建英 · 学期: 2026春\n> 章下 PDF: 3 个 · 总页: 33\n> 主版: 第 9 节 · 17 页\n\n---\n\n## 主版课件 · 第 9 节\n\n> `009-4. 国家的环境保护义务 （2）-4. 国家的环 公布周知。\n\n---\n\n**p005** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_005.jpg)\n\n4.2环境行政\n4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济（P97-100）\n环境行政主体：是依法享有国家行政职权、能代表国家独立\n进行环境行政管理并独立参加环境行政公益诉讼的组织。\n环境行政执法：是行政执法活动的重要组成部分，是指环境\n行政主体依照法定的职权与程序对环境行政相对人所实施的\n具有法律约束力的具体行政行为。\n环境行政执法的具体形式有：环境行政许可、排污收费、现\n场检查、“三同时”验收、环境行政确认、环境行政处罚等。\n\n---\n\n**p006** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_006.jpg)\n\n4.2环境行政\n4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济（P97-100）\n环境行政主体违法问题：\n1.现实中存在的违法行政行为\n执法主体滥用职权，在执法的过程中违反法定程序，越\n权行政，执法主体不适合，失职或不作为，使用的证据不确\n实充分，定性不准确，适用法律不准确，行政处罚不恰当等。\n2.违法行政行为的原因：\n（1）环保立法障碍\n1环保立法中部门本位主义思想严重。\n）环境立法之间关系的不协调。\n\n---\n\n**p007** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_007.jpg)\n\n4.2环境行政\n4.2.2环境保护的行政管理手段\n2.违法行政行为的原因：\n《环境保护法》着重于解决环境污染问题，行政诉讼时效为15\n天。“当事人对行政处罚决定不服的，可以在接到处罚通知之日起\n十五日内，同作出处罚决定的机关的上一级机关申请复议；对复议\n决定不服的，可以在接到复议决定之白起十五日内，向人民法院起\n诉。当事人也可以在接到处罚通知之日起十五日内，直接向人民法\n院起诉。当事人逾期不申请复议、也不向人民法院起诉、又不履行\n处罚决定的，由作出处罚决定的机关申请人民法院强制执行。\n《森林法》《渔业法》为30天《森林法》第十七条当事人对\n人民政府的处理决定不服的，可以在接到通知之日起一个月内，\n向人民法院起诉。\n\n---\n\n**p008** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_008.jpg)\n\n4.2环境行政\n4.2.2环境保护的行政管理手段\n2.违法行政行为的原因：\n（2）环境管理体制不完善\n①环境管理机构设置重复\n各部门分工管理----统一监督管理与分工负责相结合。\n环境监测数据不一致\n②政府行使了环保部门的部分职权\n《大气污染防治法》第二十条在大气受到严重污染，危害人体健康\n和安全的紧急情况下，当地人民政府应当及时向当地居民公告，采\n取强制性应急措施，包括责令有关排污单位停止排放污染物。\n\n---\n\n**p009** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_009.jpg)\n\n4.2环境行政\n4.2.2环境保护的行政管理手段\n2.违法行政行为的原因：\n（3）环保部门执法权限的设置问题\n①各职能部门执法权的配置不恰当\n如：各部门利益冲突 法律规定项目建设要先由环保部门先审批通过，其\n他部门再审批，而现实中.....\n②环保部门缺乏必要的强制执行权\n（4）环保部门的民主性，透明度不高\n（5）未形成强有力的监督机制\n（6）环保部门自身建设落后\n①环保法制机构欠缺；②环保投入不足；\n2000- 2005年我国环保投入为5800亿元，占同GDP的1.2%\n③环境行政人员专业化素养不高\n\n---\n\n**p010** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_010.jpg)\n\n4.2环境行政\n问卷\n4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济 （P97-100)\n2.不服环境行政的救济措施\n【环境行政纠纷】的焦点：环境行政主体的行政行为是否合\n法、合理（是否侵权）。\n环境行政复议：依申请的行为，环境行政机关只能依据公民、\n法人或者其他组织的申请而作出行政复议行为，不能在无申\n请的情况下主动作出。\n\n---\n\n**p011** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_011.jpg)\n\n4.2环境行政\n4.2.2环境保护的行政管理手段\n2.不服环境行政的救济措施\n【环境行政复议】：指公民、法人或者其他组织认为环境具体行政行\n为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机\n关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决\n定的活动。\n【环境行政诉讼】：指公民、法人或者其他组织认为环境行政机关的\n具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民\n法院进行审理并作出裁判的活动。\n环境行政诉讼的核心是，审理具体行政行为的合法性，一般不包括对\n具体行政行为合理性的审查。\n\n---\n\n**p012** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_012.jpg)\n\n环境行政复议和环境行政诉讼的区别？\n·不同点：\n（1）性质不同\n（2）解决行政争议的过程不同\n（3）当事人不服行政复议决定时，向人民法院起诉，起诉一经人\n民法院受理，就引起第一审程序的开始，不服行政复议的一方当事\n人为原告；而当事人不服人民法院一审判决时，只能依法提起上诉，\n引起上诉程序的开始，不服第一审法院判决的一方当事人此时称为\n上诉人而不再称为原告。\n（4）审查结果不同，行政复议决定可以维持、也可以变更原决定，\n而行政诉讼判决一般不能变更原决定，原则上只能维持或者撤消被\n诉的具体行政行为。\n\n---\n\n**p013** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_013.jpg)\n\n4.2环境行政\n4.2.3代表国家行使生态环境损害民事索赔权\n（一）对生态破坏及其损失认识的发展一生态补偿制度\n探索中国特色生态补偿制度体系_光明网\n12/17/c0ntent33406914.htm\n千岛湖，生态补偿的惊艳之作好看视频\n生态环境部部长：去年中央拿出50亿元推动长江流域生态补偿2019两会3月11日精彩视频腾\n讯视频\n（二）行使环境与资源保护监督管理权的部门是代表国家进行索赔诉\n讼的适格主体\n（三）试行中的生态环境损害赔偿制度\n\n---\n\n**p014** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_014.jpg)\n\n4.3环境司法\n4.3.1环境审判\n【环境审判】是人民法院依照法定程序对涉及环境污染和生态破坏\n的行政、民事和刑事诉讼案件进行审理并判决的活动。\n2014年6月，最高人民法院成立了环境资源审判庭。\n审理方式：原有审判机构承担和专门审判机构承担两种方式。\n最高法召开环境资源审判庭成立五周年发布会-中华人民共和国最高人民法院\n最高人民法院发布《中国环境资源审判（2016-2017）》（白皮书）\n中国庭审公开网\ncityCode=&caseCause=&unUnionIds=&label=-\n1&courtCode=&catalogId=&dataType=&pageSize=15&address=&timeFlag=&caseType=&courtType=&\npageNumber=1&extType=&isOts=\n\n---\n\n**p015** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_015.jpg)\n\n4.3环境司法\n4.3.2环境检察\n【环境检察】是人民检察院依照法定程序审查被检举的破坏环境与\n资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的\n玩忽职守罪和直接受理立案侦查的环境监管失职罪，为履行民事和行\n政法律监督职责审查一定法律事实以及依法提起环境公益诉讼等的活\n动。\n\n---\n\n**p016** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_016.jpg)\n\n4.3环境司法\n4.3.2环境检察\n案例4.3.2内蒙古自治区林西县人民检察院诉林西县国土资源局行政\n公益诉讼案\n基本案情\n内蒙古自治区林西县人民检察院在履行职责中发现，李殿有自\n1999年起与林西县隆平农场、林西县大井镇多次签订沸石开采合同，\n在未办理采矿许可证及其他相关手续的情况下，在大井镇红星村牧场\n后山非法开采沸石，每年生产沸石大约2000吨，总面积为28亩，矿\n坑最深处达到7.8米。林西县国土资源局多次向李殿有下达了责令停\n产、没收非法开采矿产品并处罚金的行政处罚决定，而违法行为人李\n殿有上交罚款后，并未停止采矿，林西县国土资源局存在怠于履行职\n责行为。\n\n---\n\n**p017** ![](../009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务/page_017.jpg)\n\n4.3环境司法\n4.3.2环境检察\n案例4.3.2内蒙古自治区林西县人民检察院诉林西县国土资源局行政\n公益诉讼案\n诉讼过程：为保护国家矿产资源，营造良好的矿山地质和生态环\n境，促进行政机关依法行政，全面履职，维护国家利益。林西县人民\n检察院于2016年12月9日依法向林西县人民法院提起行政公益诉讼，\n请求确认林西县国土资源局对李殿有的非法采矿行为未积极履行职责\n违法，并判令林西县国土资源局继续履行对李殿有非法采矿行为进行\n监督管理的法定职责。2016年12月23日，林西县人民法院对本案进行\n了公开开庭审理，查清案件事实后当庭宣判，支持林西县人民检察院\n的全部诉讼请求，判决确认林西县国土资源局未积极履行职责违法，\n并判令其对李殿有的非法采矿行为继续履行监督管理法定职责。\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 2 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 8 节 · 12 页\n\n> `008-4. 国家的环境保护义务-4. 国家的环境保护义务.pdf` · 涉章 [4]\n\n- [p001](../008-4. 国家的环境保护义务-4. 国家的环境保护义务/page_001.jpg)  · 4.国家的环境保护义务\n- [p002](../008-4. 国家的环境保护义务-4. 国家的环境保护义务/page_002.jpg)  · 目录\n- [p003](../008-4. 国家的环境保护义务-4. 国家的环境保护义务/page_003.jpg)  · 环境资源法学中国大学MOOC（慕课）\n- ...余 9 页, 参 [`008-4. 国家的环境保护义务-4. 国家的环境保护义务/`](../008-4. 国家的环境保护义务-4. 国家的环境保护义务/)\n\n### 辅 2 · 第 9 节 · 4 页（跨章）\n\n> `009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度.pdf` · 涉章 [4, 5]\n\n- [p001](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/page_001.jpg)  · 5.环境基本法与综合性环境法律制度\n- [p002](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/page_002.jpg)  · 5.1概述\n- [p003](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/page_003.jpg)  · 5.1.2环境保护法的基本制度\n- ...余 1 页, 参 [`009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/`](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 5 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 国家的环境保护义务\n## 核心概念\n- 国家环境保护义务\n- 环境行政主体\n- 环境行政执法\n- 环境行政复议\n- 环境行政诉讼\n- 环境审判\n- 环境检察\n## 国家环境保护义务的三重结构\n- 作为义务\n- 不作为义务\n- 给付义务\n## 环境行政的正当程序\n- 信息公开\n- 公众参与\n- 说明决策的理由\n- 公布周知\n## 环境行政主体违法问题\n- 现实中存在的违法行政行为\n- 违法行政行为的原因\n## 环境行政复议与行政诉讼的区别\n- 行政诉讼时效\n## 生态环境损害民事索赔权\n- 对生态破坏及其损失认识的发展\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n## 高频考点\n- 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n- 环境行政执法的具体形式（选择）\n- 环境行政正当程序的四个要素（简答）\n- 环境行政违法的原因（论述）\n- 环境行政复议与行政诉讼的区别（简答·高频）\n- 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n- 生态环境损害赔偿制度的适格主体（选择）\n- 林西县行政公益诉讼案的法律意义（案例分析）\n# 作为、证据不确实充分、定性不准确、适用法律不准确、行政处罚不恰当等。\n\n**违法行政行为的原因**：\n1. 环保立法障碍：部门本位主义思想严重；环境立法之间关系不协调\n2. 环境管理体制不完善：管理机构设置重复；政府行使了环保部门的部分职权\n3. 环保部门执法权限设置问题：各职能部门执法权配置不恰当；环保部门缺乏必要的强制执行权\n4. 环保部门的民主性、透明度不高\n5. 未形成强有力的监督机制\n6. 环保部门自身建设落后：法制机构欠缺；投入不足；人员专业化素养不高\n\n### 五、环境行政复议与行政诉讼的区别（p012）\n\n| 区别点 | 行政复议 | 行政诉讼 |\n|--------|---------|---------|\n| 性质 | 行政行为 | 司法行为 |\n| 审查范围 | 合法性+合理性 | 仅合法性（一般） |\n| 审查结果 | 可维持或变更原决定 | 一般只能维持或撤销，不能变更 |\n| 不服后续 | 向法院起诉（一审程序） | 提起上诉（上诉程序） |\n\n**行政诉讼时效**：《环保法》15天；《森林法》《渔业法》30天\n\n### 六、生态环境损害民事索赔权（p013）\n\n- 对生态破坏及其损失认识的发展——生态补偿制度\n- 行使环境与资源保护监督管理权的部门是代表国家进行索赔诉讼的适格主体\n- 试行中的生态环境损害赔偿制度\n\n### 七、重要案例\n\n- **林西县人民检察院诉林西县国土资源局行政公益诉讼案**（p016-p017）：李殿有自1999年起非法开采沸石，面积28亩，矿坑最深7.8米。林西县国土局多次下达行政处罚但违法行为人上交罚款后并未停止采矿，国土局存在怠于履行职责行为。检察院提起行政公益诉讼，法院当庭宣判支持全部诉讼请求，确认国土局未积极履行职责违法，判令继续履行监督管理法定职责。→ 环境行政公益诉讼的典型判例\n\n### 八、高频考点（速记）\n\n1. 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）\n2. 环境行政执法的具体形式（选择）\n3. 环境行政正当程序的四个要素（简答）\n4. 环境行政违法的原因（论述）\n5. 环境行政复议与行政诉讼的区别（简答·高频）\n6. 环境行政诉讼的核心：审理具体行政行为的合法性（选择）\n7. 生态环境损害赔偿制度的适格主体（选择）\n8. 林西县行政公益诉讼案的法律意义（案例分析）\n\n### 九、易错 / 易混点\n\n- ❌ 混淆\"环境行政复议\"与\"环境行政诉讼\"：前者审查合法性+合理性，后者一般仅审查合法性\n- ❌ 将\"环境审判\"等同于\"环境行政诉讼\"：环境审判包括行政、民事、刑事三类诉讼\n- ❌ 忽略\"给付义务\"：国家义务不仅是作为和不作为，还包括提供公共物品和服务\n- ❌ 混淆行政诉讼时效：环保法15天 vs 森林法/渔业法30天\n- ❌ 认为行政诉讼可以变更原决定：一般只能维持或撤销，不能变更\n\n### 十、与前后章之关联\n\n- **← 第3章**：第3章开发利用行为人的义务对应本章国家的监督管理义务\n- **→ 第5章**：本章环境行政管理手段在第5章制度体系中具体展开\n- **→ 第6章**：本章环境行政处罚在污染控制法中具体适用\n"}, {"id": "ch-05", "group": "章节素材", "title": "第05章 环境基本法与综合性环境法律制度", "md": "# 环境法学 · 第 5 章 · 环境基本法与综合性环境法律制度 · 素材\n\n> 教师: 杨建英 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 27\n> 主版: 第 10 节 · 23 页\n\n---\n\n## 主版课件 · 第 10 节\n\n> `010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度.pdf`\n\n<details><summary>展开 23 页图链<\/summary>\n\n- [p001](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_001.jpg)  · 5.环境基本法与综合性环境法律制度\n- [p002](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_002.jpg)  · 5.1.2环境保护法的基本制度\n- [p003](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_003.jpg)  · 5.1.2环境保护法的基本制度\n- [p004](../010-5. 政策】：指执政者在一定时期确立的目标或希望达到的结\n果，不具备法的约束力，但可以对制度的执行和变革产生影响；\n【原则】：指由法律确立的行为模式或行为准则，具有法的\n约束力，同时在执行中可能要求执政者采取有利于制度的政策。\n\n---\n\n**p003** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_003.jpg)\n\n5.1.2环境保护法的基本制度\n【基本制度】：指按照环境与资源保护立法的目的和基本\n原则确立的、普遍适用于环境与资源保护各个领域的法律规\n范的总称。环境与资源保护法基本制度具有共通性，在所有\n环境与资源保护的立法、行政和司法中都要体现和实施。\n【特别制度】：指在各单项环境与资源保护立法中为实现\n立法目的而确立的具有领域性、针对性和特殊性的法律措施\n和方法的总称。\n\n---\n\n**p004** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_004.jpg)\n\n5.1.2环境保护法的基本制度（4.29）\n环境与资源保护法的基本制度是调整环境资源社会关系的\n行政、经济、技术等手段和措施法律化的体现，是一个综合各\n种调整手段的法律规范体系。\n环境与资源保护法的基本制度是具有法律效力的规范体系，\n一切享用生态环境和开发利用自然资源的组织和个人都必须严\n格遵守这些制度。\n\n---\n\n**p005** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_005.jpg)\n\n5.1.2环境保护法的基本制度\n（二）环境法基本制度的分类\n环境保护法的基本制度是从不同的环境资源保护领域发展起\n来的，根据环境与资源保护法的基本制度适用范围和调整对象的\n不同，大致可以分为两大类：\n一类是环境保护基本法律制度；另一类是自然资源保护基本\n法律制度。环境基本法律制度的划分是相对的，在适用这些制度\n时没有绝对的界限。如规划制度，许可证制度既是环境保护的基\n本法律制度，又是自然资源保护的基本法律制度，只是在适用这\n些制度时侧重点不同而己。\n\n---\n\n**p006** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_006.jpg)\n\n5.1.2环境保护法的基本制度\n（三）环境保护法的基本制度在我国环境执法司法和守\n法的过程中发挥着重要的作用\n1979年《环境保护法（试行）》首先规定了环境影响评价\n制度（第6条）、环境规划制度（第7条）、征收排污费制度（第\n18条）、“三同时”制度（第6条）和环境标准制度（第18条、第\n19条）等。\n在借鉴国外先进的立法成果和总结本国环境立法经验的基\n础之上，1989年《环境保护法》在第二章专章对环境法的基本\n制度作出了规定，使环境保护法基本制度体系进一步丰富。\n\n---\n\n**p007** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_007.jpg)\n\n5.1.2环境保护法的基本制度\n（四）环境保护法基本制度的确立\n环境标准制度\n环境规划制度\n环境影响评价制度\n环境费和环境税制度\n突发环境事件应急管理制度\n\n---\n\n**p008** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_008.jpg)\n\n5.1.2环境保护法的基本制度\n环境保护法的基本法律制度主要是根据以下原理进行确定：\n1、具体体现环境与资源保护法的基本原则；\n2、具体反映环境与资源保护法律的共通性和本质性的法律\n措施；\n3、依据基本国情和社会经济发展水平，通过对法的“立、\n改、废”逐步完善。\n\n---\n\n**p009** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_009.jpg)\n\n5.2环境标准制度\n环境质量标准\n强制性标准\n污染物排放（控制）标准\n环境监测方法标准\n推荐性标准 环境标准样品标准\n环境基础标准\n\n---\n\n**p010** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_010.jpg)\n\n5.2环境标准制度\n环境质量标准、污染物排放（控制）标准属于强制性环\n境标准，必须执行；除此以外的环境标准属于推荐性环境\n标准，推荐性环境标准如果被强制性环境标准，也必须强\n制执行。\n\n---\n\n**p011** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_011.jpg)\n\n5.2环境标准制度\n标准中华人民共和国生态环境部\n《环境空气质量标准（GB3095—2012）》\n《纯碱工业污染物排放标准（HJ1017-2019）》\n地方环境保护标准DB714/index.html\n\n---\n\n**p012** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_012.jpg)\n\n5.2环境标准制度\n5.2.1强制性环境标准\n（一）环境质量标准\n《环境保护法》（2014修订版）第十五条国务院环境保护主管部\n门制定国家环境质量标准。省、自治区、直辖市人民政府对国家\n环境质量标准中未作规定的项目，可以制定地方环境质量标准；\n对国家环境质量标准中已作规定的项目，可以制定严于国家环境\n质量标准的地方环境质量标准。地方环境质量标准应当报国务院\n环境保护主管部门备案。国家鼓励开展环境基准研究。\n\n---\n\n**p013** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_013.jpg)\n\n5.2环境标准制度\n5.2.1强制性环境标准\n（一）环境质量标准\n按环境要素分：有水质量标准、大气质量标准、土壤质量标准和生\n物质量标准四类，每一类又按不同用途或控制对象分为各种质量标准。\n水质量标准按水体类型分为地面水质量标准、海水质量标准和地\n下水质量标准等；按水资源的用途分为生活饮用水水质标准、渔业用\n水水质标准、农业用水水质标准、娱乐用水水质标准和各种工业用水\n水质标准等。\n\n---\n\n**p014** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_014.jpg)\n\n5.2环境标准制度\n5.2.1强制性环境标准\n表1水环境质量标准的种类\n编号 名 称 行业 备\nGB3838-2002 地面水环境质量标准 国家 取代GB3838-1988与\nGHZB1-1999\n目前重新修订，拟修订\nSL63-1994 地表水资源质量标准 水利 为：水资源质量标准（含\n地下水）\nGB/T14848-1993 地下水质量标准 国家 推荐性标准\nGB 12941-1991 景观娱乐用水水质标准 国家 GHZB1-1999发布后，环\n保局将其废止\nGB5084-1992 农田灌溉水质标准 国家 正修订\nGB 11607-1989 渔业水质标准 国家 在修订\nGB 3097-1997 海水水质标准 国家\n卫生部以部长令的形式\nGB5749-1985 生活饮用水卫生标准 国家 修订发布，名称改为生活\n饮用水水质卫生规范，但\n没有标准编号\n卫生\n以文件发布 生活饮用水水质卫生规范 部 2001年发布\n无标准编号 百武 农村实施生活饮用水卫生标准 爱委\n（GB5749-1985）准贝」 会\n\n---\n\n**p015** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_015.jpg)\n\n5.2环境标准制度\n5.2.1强制性环境标准\n·由于各种标准制定的目的、适用范围和要求的不同，同一污染物\n在不同标准中规定的标准值也是不同的。例如，铜的标准值在中\n国的《生活饮用水卫生标准》、《工业企业设计卫生标准》和\n《渔业水质标准》中分别规定为1.0毫克/升、0.1毫克/升和0.01毫\n克/升。\n·世界各国制定的各种水质量标准中规定的项目多寡不一。目最多\n的是苏联颁布的地面水水质标准，正式颁布的有420多项，未正\n式颁布的还有200多项。多数国家的地面水水质标准中都规定有\n酚、氰化物、砷、汞、铅、铬、镉等主要项目。中国1979年修订\n颁布的《工业企业设计卫生标准》关于地面水中有害物质的最高\n容许浓度列有53个项目。\n\n---\n\n**p016** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_016.jpg)\n\n5.2环境标准制度\n5.2.1强制性环境标准\n·环境质量标准的实施领域\n以《大气环境质量标准》为例\n本标准首次发布于1982年。1996年第一次修订，2000年第二次修订，\n本次为第三次修订。本标准将根据国家经济社会发展状况和环境保护\n要求适时修订。\n本次修订调整了环境空气功能区分类，将三类区并入二类区；增\n设了颗粒物（粒径小于等于2.5um）浓度限值和臭氧8小时平均浓度限\n值；调整了颗粒物（粒径小于等于10um）、二氧化氮、铅和苯并[a]芘\n等的浓度限值；调整了数据统计的有效性规定。\n环境空气功能区分为二类：一类区为自然保护区、风景名胜区和其\n他需要特殊保护的区域；二类区为居住区、商业交通居民混合区、文\n化区、工业区和农村地区。\n\n---\n\n**p017** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_017.jpg)\n\n表1环境空气污染物基本项目浓度限值\n5.2环境标准制度 浓度限值\n序号 污染物项目 平均时间 一级 二级 单位\n年平均 20 605.2.1强制性环境标准 二氧化硫（SO） 24小时平均 50 1501小时平均 150 500\n·环境质量标准的实施领域 年平均 40 40 μg/m'\n二氧化氮（NO） 24小时平均 80 80\n以《大气环境质量标准》为例 1小时平均 200 200\n一氧化碳（CO） 24小时平均 4 4 mg/m²\n1小时平均 10 10\n一类区适用一级浓度 臭氧（0） 日最大8小时平均 100 1601小时平均 160 200\n颗粒物（粒径小于等于0um） 年平均 40 7024小时平均 50 150 μg/m\n限值，二类区适用二\n颗粒物（粒径小于等于2.5μum） 24小时平均 年平均 15 3535 75\n级浓度限值。一、二 表2环境空气污染物其他项目浓度限值\n序号 污染物项目 平均时间 浓度限值 单位\n类环境空气功能区质 一级 二级\n总悬浮颗粒物（TSP） 年平均 80 20024小时平均 120 300\n量要求见表1和表2。 年平均 50 502 氮氧化物（NO） 24小时平均 100 1001小时平均 250 250 μg/m\n铅（Pb） 年平均 0.5 0.53 季平均 1 1\n苯并[a]芘（BaP） 年平均 0.001 0.00124小时平均 0.0025 0.0025\n\n---\n\n**p018** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_018.jpg)\n\n5.2环境标准制度\n5.2.1强制性环境标准\n（二）污染物排放标准\n《环境保护法》（2014修订版）第十六条国务院环境保护主\n管部门根据国家环境质量标准和国家经济、技术条件，制定\n国家污染物排放标准。省、自治区、直辖市人民政府对国家\n污染物排放标准中未作规定的项目，可以制定地方污染物排\n放标准；对国家污染物排放标准中已作规定的项目，可以制\n定严于国家污染物排放标准的地方污染物排放标准。地方污\n染物排放标准应当报国务院环境保护主管部门备案。\n\n---\n\n**p019** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_019.jpg)\n\n5.2环境标准制度\n【案例】A精细材料有限公司诉B区人民政府环保行政处罚案\n2011年12月2日，B区环境运输和城市管理局（以下简称区环运局）以A精细\n材料有限公司（以下简称A公司）在生产过程中排放废气的臭气浓度超标为由，\n对该公司作出《限期治理决定书》，要求2012年1月31日前完成排放臭气浓度治\n理达到《恶臭污染物排放标准》的要求，并经环运局验收合格；逾期未申请验收\n或未完成限期治理任务，将按规定责令停业、关闭；要求该公司分析臭气浓度超\n标排放原因，制定限期治理达标计划以及落实各项污染防治措施，确保污染物达\n标排放。\n2012年2月9日，A公司向区环运局申请治理验收。B区环境保护监测站受该\n区环运局委托，于同年4月26日、6月28日对该公司进行臭气排放监测，两次监测\n报告均显示臭气浓度未达标。区环运局遂于2012年8月29日组织验收组现场检查\n并对法定代表人进行调查询问，告知该公司验收结果：存在未提交限期治理方案、\n废气处理技术不能确保无组织废气达标排放、排放废气的臭气浓度超标、使用的\n燃油不符合环保要求等四个方面的问题，未通过限期治理验收。\n2013年1月11日，B区人民政府作出《行政处罚告知书》，同年3月18日经听\n证后作出《行政处罚决定书》，决定A公司自收到行政处罚决定书之日起停业、\n关闭。该公司不服提起行政诉讼，请求法院撤销上述《行政处罚决定书》。\n\n---\n\n**p020** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_020.jpg)\n\n5.2环境标准制度\n【案例】A精细材料有限公司诉B区人民政府环保行政处罚案\n佛山市中级人民法院一审认为，A公司对B区人民政府作出处罚决定的职权\n依据及行政程序并无异议。原告认为上述两次臭气排放监测的采样点与频次不符\n合法定要求，未能排除其他干犹因素，故监测报告的结论不能作为定案依据。经\n查，B区环境保护监测站具有废气污染物检测的法定资质，该监测站两次臭气采\n样点即监测位置为A公司厂界敏感点，符合《恶臭污染物排放标准》及国家环境\n保护总局《关于恶臭物无组织排放检测问题的复函》规定。原告认为臭气监测采\n样点的设置不合法的主张于法无据，其亦未提供充分证据证明上述臭气监测采样\n点存在其他干扰因素。至于采样频次问题，该监测站两次臭气监测均采用了4次\n*3点的监测频次并取其中最大测定值，但频次间隔不足2小时，存在一定瑕疵。\n但该瑕疵不足以推翻监测报告结论的正确性。由于原告在限期治理期限届满后，\n经两次监测臭气排放浓度仍未达到《恶臭污染物排放标准》的要求，且存在其他\n相关环保问题，经B区环运局报请B区人民政府依照《广东省珠江三角洲大气污染\n防治办法》有关规定对原告作出停业、关闭的行政处罚决定，认定事实清楚，证\n据充分，适用法律正确，遂判决驳回原告诉讼请求。原告上诉后，广东省高级人\n民法院二审判决驳回上诉，维持原判。\n\n---\n\n**p021** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_021.jpg)\n\n5.2环境标准制度\n【案例】A精细材料有限公司诉B区人民政府环保行政处罚案\n核心问题\n1.《恶臭污染物排放标准》属于何种类型的环境标准？\n2、《恶臭污染物排放标准》在行政处罚案件中的适用是否需要其他\n类型的环境标准的配合使用？\n3.《恶臭污染物排放标准》适用的疑难问题由谁解释？\n\n---\n\n**p022** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_022.jpg)\n\n5.3环境规划制度\n《环境保护法》（2014修订版）第十三条县级以上人民政府应当\n将环境保护工作纳入国民经济和社会发展规划。国务院环境保护\n主管部门会同有关部门，根据国民经济和社会发展规划编制国家\n环境保护规划，报国务院批准并公布实施。县级以上地方人民政\n府环境保护主管部门会同有关部门，根据国家环境保护规划的要\n求，编制本行政区域的环境保护规划，报同级人民政府批准并公\n布实施。环境保护规划的内容应当包括生态保护和污染防治的目\n标、任务、保障措施等，并与主体功能区规划、土地利用总体规\n划和城乡规划等相衔接。\n\n---\n\n**p023** ![](../010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度/page_023.jpg)\n\n5.3环境规划制度\n国民经济和社会发展五年规划 环境保护五年规划\n五年规划纲要 （总体） 环境保护篇章\n三个层次\n环境保护规划\n重点专项规划（国务院主管部门）\n（环境主管部门）\n环境与自然保护规\n行业规划和地区规划（各部门、各地区） 划、行业和地区规\n划（其他有关部门）\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 1 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 9 节 · 4 页（跨章）\n\n> `009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度.pdf` · 涉章 [4, 5]\n\n- [p001](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/page_001.jpg)  · 5.环境基本法与综合性环境法律制度\n- [p002](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/page_002.jpg)  · 5.1概述\n- [p003](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/page_003.jpg)  · 5.1.2环境保护法的基本制度\n- ...余 1 页, 参 [`009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/`](../009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 4 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / m ：为使环境与经济、社会协调发展，对一定时期内环境保护目标和措施所作的规定和安排。（p022）\n\n### 二、环境法基本制度的分类（p005）\n\n- **环境保护基本法律制度**\n- **自然资源保护基本法律制度**\n\n> 划分是相对的，如规划制度、许可证制度既是环境保护的基本法律制度，又是自然资源保护的基本法律制度，只是侧重点不同。\n\n### 三、环境法基本制度的确立依据（p008）\n\n1. 具体体现环境与资源保护法的基本原则\n2. 具体反映环境与资源保护法律的共通性和本质性的法律措施\n3. 依据基本国情和社会经济发展水平，通过对法的\"立、改、废\"逐步完善\n\n### 四、环境标准制度（p009-p021）\n\n**环境标准分类**：\n- **强制性标准**：环境质量标准、污染物排放（控制）标准——必须执行\n- **推荐性标准**：环境监测方法标准、环境标准样品标准、环境基础标准——被强制性标准引用后也必须强制执行\n\n**环境质量标准**（p012-p017）：\n- 《环保法》第15条：国务院环保主管部门制定国家环境质量标准；省级政府可制定严于国标的地方标准，报国务院备案\n- 按环境要素分：水质量标准、大气质量标准、土壤质量标准、生物质量标准\n- 水质量标准按水体类型分：地面水、海水、地下水等；按用途分：生活饮用水、渔业用水、农业用水、娱乐用水、工业用水等\n- 大气环境质量标准：一类区（自然保护区、风景名胜区等）适用一级浓度限值；二类区（居住区、商业区、工业区、农村等）适用二级浓度限值\n\n**污染物排放标准**（p018）：\n- 《环保法》第16条：国务院环保主管部门根据国家环境质量标准和国家经济、技术条件制定国家污染物排放标准；省级政府可制定严于国标的地方标准，报国务院备案\n\n### 五、环境规划制度（p022-p023）\n\n- 《环保法》第13条：县级以上人民政府应当将环境保护工作纳入国民经济和社会发展规划\n- **三个层次**：\n  1. 国民经济和社会发展五年规划纲要（总体）→ 环境保护篇章\n  2. 重点专项规划（国务院主管部门）\n  3. 行业规划和地区规划（各部门、各地区）\n- 环境保护规划的内容应当包括生态保护和污染防治的目标、任务、保障措施等，并与主体功能区规划、土地利用总体规划和城乡规划等相衔接\n\n### 六、环境保护法基本制度的历史发展（p006）\n\n- **1979年**《环境保护法（试行）》首先规定了：环境影响评价制度（第6条）、环境规划制度（第7条）、征收排污费制度（第18条）、\"三同时\"制度（第6条）、环境标准制度（第18、19条）\n- **1989年**《环境保护法》在第二章专章对环境法基本制度作出规定，使体系进一步丰富\n\n### 七、五项基本制度（p007）\n\n1. 环境标准制度\n2. 环境规划制度\n3. 环境影响评价制度\n4. 环境费和环境税制度\n5. 突发环境事件应急管理制度\n\n### 八、重要案例\n\n- **A精细材料有限公司诉B区人民政府环保行政处罚案**（p019-p021）：A公司排放废气臭气浓度超标，被限期治理后两次监测仍未达标《恶臭污染物排放标准》。B区政府作出停业、关闭处罚。A公司主张采样点与频次不合法。法院认定：采样点为厂界敏感点符合标准规定；频次间隔不足2小时存在瑕疵但不足以推翻结论。判决驳回原告诉讼请求，二审维持。→ 污染物排放标准在行政处罚中的适用\n\n**核心问题**：\n1. 《恶臭污染物排放标准》属于何种类型的环境标准？→ 污染物排放标准（强制性标准）\n2. 在行政处罚案件中是否需要其他类型环境标准配合使用？\n3. 标准适用的疑难问题由谁解释？\n\n### 九、高频考点（速记）\n\n1. 环境法基本制度的分类与确立依据（简答）\n2. 环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）\n3. 环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n4. 地方环境标准严于国家标准的法律依据（第15、16条）（选择·高频）\n5. 环境规划制度的三个层次（简答）\n6. 五项基本制度的名称（选择）\n7. 1979年《环保法（试行）》首创的五项制度（选择）\n8. A精细材料案中环境标准的适用（案例分析）\n\n### 十、易错 / 易混点\n\n- ❌ 混淆\"强制性标准\"与\"推荐性标准\"的范围：环境质量标准和污染物排放标准是强制性，其余为推荐性\n- ❌ 忽略推荐性标准被强制性标准引用后也必须强制执行\n- ❌ 混淆国家环境质量标准与国家污染物排放标准的制定依据：前者直接制定，后者需考虑\"国家经济、技术条件\"\n- ❌ 将环境规划仅理解为环境保护规划：还包括纳入国民经济和社会发展规划\n- ❌ 混淆环境质量标准按环境要素的分类与按用途的分类\n\n### 十一、与前后章之关联\n\n- **← 第2章**：第2章基本原则在本章具体化为基本制度\n- **← 第4章**：第4章环境行政管理手段在本章制度体系中展开\n- **→ 第6章**：本章环境标准、排污许可等制度在污染控制法中具体适用\n"}, {"id": "ch-06", "group": "章节素材", "title": "第06章 污染控制法", "md": "# 第06章 · 污染控制法\n\n> 教师: 杨建英 · 学期: 2026春\n> 主版页: 13 页（PDF 011）\n> 辅版页: 0 页\n> 注：原归类为\"第2章/第二编\"，实际为独立第6章内容\n\n---\n\n## 一 · 主版页图链\n\n### PDF 011 — 主版（13页）\n\n<details><summary>展开图链<\/summary>\n\n- [p001](../011-第二编%20污染控制法-第二编%20污染控制法/page_001.jpg) ~ [p013](../011-第二编%20污染控制法-第二编%20污染控制法/page_013.jpg)\n\n<\/details>\n\n---\n\n## 二 · 思维导图\n\n```markmap\n# 第06章 污染控制法\n## 6.1 污染控制法概述\n### 概念：防治环境污染的法律规范\n### 特征：预防性+补救性+技术性\n## 6.2 污染类型\n### 大气污染\n### 水污染\n### 土壤污染\n### 固体废物污染\n### 环境噪声污染\n### 放射性污染\n### 有毒化学品污染\n## 6.3 污染控制法体系\n### 综合性法律\n### 单行法律\n#### 大气污染防治法\n#### 水污染防治法\n#### 土壤污染防治法\n#### 固体废物污染环境防治法\n#### 环境噪声污染防治法\n### 行政法规与部门规章\n## 6.4 污染控制基本制度\n### 排污许可制度\n### 总量控制制度\n### 环境监测制度\n### 污染事故应急制度\n```\n\n```mermaid\nmindmap\n  root((第06章<br/>污染控制法))\n    6.1 概述\n      防治环境污染\n      预防性+补救性+技术性\n    6.2 污染类型\n      大气污染\n      水污染\n      土壤污染\n      固废污染\n      噪声污染\n      放射性/化学品\n    6.3 法体系\n      综合性法律\n      单行法律\n      行政法规\n    6.4 基本制度\n      排污许可\n      总量控制\n      环境监测\n      应急制度\n```\n\n---\n\n## 三 · 复习要点\n\n### 核心概念\n\n- **污染控制法**：调整因防治环境污染而产生的社会关系的法律规范的总称，是环境法体系的重要组成部分。具有预防性、补救性和技术性特征。\n- **大气污染**：由于人类活动或自然过程引起某些物质进入大气，呈现出足够浓度、达到足够时间，危害人体健康和生态环境的现象。\n- **水污染**：水体因某种物质的介入而导致其化学、物理、生物或放射性等方面特性的改变，影响水的有效利用，危害人体健康或破坏生态环境的现象。\n- **土壤污染**：因人为因素导致某种物质进入陆地表层土壤，引起土壤化学、物理、生物等方面特性的改变，影响土壤功能和有效利用，危害公众健康或破坏生态环境的现象。\n- **固体废物污染**：在生产、生活和其他活动中产生的丧失原有利用价值或虽未丧失利用价值但被抛弃或放弃的固态、半固态和置于容器中的气态物品、物质，对环境造成污染的现象。\n- **总量控制制度**：根据环境质量目标，确定一定区域内污染物排放总量控制指标，并分配到排污单位的制度。\n\n### 核心法条 / 制度构成\n\n- **《大气污染防治法》**：以改善大气环境质量为目标，实行大气污染物排放总量控制和许可制度\n- **《水污染防治法》**：防治水污染，保护地表水和地下水环境，实行排污许可制度\n- **《土壤污染防治法》(2018)**：预防为主、保护优先、分类管理、风险管控、污染担责、公众参与\n- **《固体废物污染环境防治法》**：减量化、资源化、无害化原则，实行固体废物污染环境防治责任制度\n- **《环境噪声污染防治法》**：防治环境噪声污染，保障城乡居民正常生活和工作环境\n\n### 典型案例 / 裁判要旨\n\n- **紫金矿业水污染案**：紫金矿业集团因含铜酸性废水渗漏致汀江水污染，被判处罚金3000万元，相关责任人获刑。→ 水污染防治法的严厉执行\n- **天津港爆炸固废案**：危险废物违规储存导致重大爆炸事故，相关责任人被追究刑事责任。→ 固体废物污染环境防治法的适用\n\n### 高频考点\n\n1. 污染控制法的概念与特征（预防性/补救性/技术性）（名词解释/简答）\n2. 七种污染类型及其对应单行法（选择·高频）\n3. 污染控制法体系的层级结构（综合性法律→单行法律→行政法规）（简答）\n4. 总量控制制度与排污许可制度的关系（简答）\n5. 《土壤污染防治法》的基本原则（选择/简答）\n6. 固体废物\"三化\"原则（减量化/资源化/无害化）（选择·必考）\n\n### 易错 / 易混点\n\n- ❌ 将\"污染控制法\"等同于\"环境保护法\"：前者是单行法体系，后者是基本法\n- ❌ 混淆大气污染与温室气体排放：温室气体排放受气候变化法调整，不完全等同于大气污染防治\n- ❌ 忽略土壤污染防治法的\"风险管控\"原则：不同于其他污染防治法的\"达标排放\"思路\n- ❌ 将固体废物\"三化\"顺序颠倒：正确顺序是减量化→资源化→无害化\n- ❌ 混淆排污许可与排污收费：许可是准入制度，收费（现改为环保税）是经济手段\n\n### 思考题 / 自测\n\n1. 污染控制法体系与环境保护基本法的关系是什么？\n2. 总量控制制度与浓度控制制度有何区别？\n3. 《土壤污染防治法》为何采用\"风险管控\"而非\"达标排放\"？\n4. 固体废物\"三化\"原则如何体现预防原则和环境责任原则？\n\n### 与前后章之关联\n\n- **← 第2章**：第2章的环境责任原则在污染控制法中具体适用\n- **← 第5章**：第5章的排污许可、环境标准在污染控制法中具体落实\n- **← 第4章**：第4章的环境行政处罚在污染控制执法中适用\n"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 环境法学 · 期末复习骨架\n\n> 教师: 杨建英 · 学期: 2026春\n> 共 14 PDF · 262 页 · 4 章节\n> 已填复习要点：4/4 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 第 2 章 | 环境保护法的基本原则 | 35 | [_第02章_环境保护法的基本原则.md](./_第02章_环境保护法的基本原则.md) |\n| 第 3 章 | 环境利用行为的主体及其权利义务 | 36 | [_第03章_环境利用行为的主体及其权利义务.md](./_第03章_环境利用行为的主体及其权利义务.md) |\n| 第 4 章 | 国家的环境保护义务 | 17 | [_第04章_国家的环境保护义务.md](./_第04章_国家的环境保护义务.md) |\n| 第 5 章 | 环境基本法与综合性环境法律制度 | 23 | [_第05章_环境基本法与综合性环境法律制度.md](./_第05章_环境基本法与综合性环境法律制度.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 111，密度 **薄**，建议复习期 2-3 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 第 2 章 · 环境保护法的基本原则\n\n> 主版 35 页 · 第 6 节 · [详细素材](./_第02章_环境保护法的基本原则.md)\n\n**核心三问**：\n\n- **是什么** ── 环境法基本原则：调整因开发利用、保护和改善环境而产生的社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，具有普遍指导作用。（p002）；预防原则（预防为主，防治结合，综合治理）：强调在环境问题发生前采取预防措施，避免环境损害的发生和扩大。（p002）；协调发展原则（经济、社会发展与环境保护相协调）：在发展经济的同时加强保护和改善环境，使环境保护和经济建设同步发展，坚持在发展中保护、在保护中发展，实现经济效益、社会效益、环境效益的统一。（p003）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境法四大基本原则的名称与内涵（选择/简答·必考）；协调发展原则的概念与法条依据（《环保法》第4条）（简答）；预防原则的内涵：预防为主、防治结合、综合治理（名词解释）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 3 章 · 环境利用行为的主体及其权利义务\n\n> 主版 36 页 · 第 7 节 · [详细素材](./_第03章_环境利用行为的主体及其权利义务.md)\n\n**核心三问**：\n\n- **是什么** ── 环境利用行为（environmental utilization behavior）：人类为满足生存需要有意识地获取环境要素或者从环境要素中谋取利益的活动。（p003）；本能利用行为（instinctive utilization behavior）：行为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改变环境的活动。以基本生存为目的——产生了环境权。（p003）；开发利用行为（development and utilization behavior）：行为人以谋取环境容量与自然资源的经济利益为目的，向环境排放或处理废弃物质与能量或开发自然资源与能源等利用和改变环境状况的活动。分为环境容量利用行为和自然资源利用行为两大类。（p004）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境利用行为的分类：本能利用行为 vs 开发利用行为（选择·必考）；环境法律关系的概念与主体构成（名词解释）；公众环境权益的五项内容（简答）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 国家的环境保护义务\n\n> 主版 17 页 · 第 9 节 · [详细素材](./_第04章_国家的环境保护义务.md)\n\n**核心三问**：\n\n- **是什么** ── 国家环境保护义务：国家对环境保护承担的作为义务、不作为义务和给付义务的总称。（p002目录）；环境行政主体：依法享有国家行政职权、能代表国家独立进行环境行政管理并独立参加环境行政公益诉讼的组织。（p005）；环境行政执法：环境行政主体依照法定职权与程序对环境行政相对人所实施的具有法律约束力的具体行政行为。形式包括：环境行政许可、排污收费、现场检查、\"三同时\"验收、环境行政确认、环境行政处罚等。（p005）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 国家环境保护义务的三重结构：作为义务、不作为义务、给付义务（简答·必考）；环境行政执法的具体形式（选择）；环境行政正当程序的四个要素（简答）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 5 章 · 环境基本法与综合性环境法律制度\n\n> 主版 23 页 · 第 10 节 · [详细素材](./_第05章_环境基本法与综合性环境法律制度.md)\n\n**核心三问**：\n\n- **是什么** ── 环境与资源保护法的基本制度：调整环境资源社会关系的行政、经济、技术等手段和措施法律化的体现，是一个综合各种调整手段的法律规范体系。具有法律效力，一切享用生态环境和开发利用自然资源的组织和个人都必须严格遵守。（p004）；环境标准制度：为保护人群健康、防治环境污染、维护生态平衡，由法定机关依法制定和颁布的关于环境质量、污染物排放、环境监测方法等的各种技术规范的总称。（p009）；环境质量标准：在一定时间和空间范围内，对环境中的有害物质或因素所规定的容许限值。按环境要素分为水质量标准、大气质量标准、土壤质量标准和生物质量标准四类。（p012-p013）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境法基本制度的分类与确立依据（简答）；环境标准的两大分类：强制性标准 vs 推荐性标准（选择·必考）；环境质量标准与污染物排放标准的制定主体与权限（选择/简答）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 四 · 章际交叉（同一课件涉两章）\n\n- 第 2 章  ⇄  第 3 章\n- 第 4 章  ⇄  第 5 章\n\n## 五 · 非教学性内容（仅记，期末不考）\n\n- 1 (22 页)\n- 1 (7 页)\n- 1 (9 页)\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 第 2 章 · 环境保护法的基本原则\n- [ ] 第 3 章 · 环境利用行为的主体及其权利义务\n- [ ] 第 4 章 · 国家的环境保护义务\n- [ ] 第 5 章 · 环境基本法与综合性环境法律制度\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已
