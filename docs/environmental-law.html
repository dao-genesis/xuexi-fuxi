护法的特征：\n（一）科技性\n环境保护法的基本原则、管理制度和法律规范都是从环境科学的\n研究成果和技术规范中提炼出来的，体现了生态规律和经济规律的要\n求，具有较强的科学技术性。\n（二）综合性\n（1）从法律关系，涉及社会关系广。\n（2）从法律规范的构成，由多种法律规范综合而成。\n（3）从法的渊源，包括宪法、法律、行政法规、地方性法规等。\n（三）保护法益确立的共同性\n环境是一个整体，不因国家和地区的划分而分割，因此，环境法\n旨在保护社会乃至全体人类的利益，体现出在法益保护上的共同性\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.2环境保护法的渊源\n国内法渊源（法律体系金字塔）：\n顶层：（1）宪法环保条款；\n（2）法律：\n①《环境保护法》；（核心，基本法）\n②大气、水、土壤、固废、碳市场、国家公园等单行法；（主干)\n底座：\n（3）行政法规；\n（4）地方性法规或地方政府规章；\n（5）国务院部门规章；\n（6）对法的适用具有普遍意义的有权解释。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.2环境保护法的渊源\n\n#### 国内法渊源 (法律体系金字塔）\n宪法中的环境保护条款 全国人代大会通过\n中华人民共和国环境保护法 人大常委会通过\n环境保护 环境资源 污染 其他法律中的环\n国际公约 保护法 防治法 境保护条款\n\n#### 环境保护行政法规 国务院通过\n环境保护地 省市人大通过 环境保护 国家环境保护\n\n#### 方性法规 部门规章 总局及有关\n\n#### 环境标准 部、委、办、局\n\n#### 环境保护地 颁布\n\n#### 方政府规章 ·地方政府颁布\n图3-1 中国环境保护法律体系层次结构\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.3环境保护法的立法目的\n第一条：为保护和改善生活环境与生态环境，防治污染和其\n他公害，保障人体健康，促进社会主义现代化建设的发展，\n制定本法。\n第一条：为保护和改善环境，防治污染和其他公害，保障公\n众健康，推进生态文明建设，促进经济社会可持续发展，制\n定本法。《新环境保护法》（2014年修订）\n2014年4月24日，十二届全国人大常委会第八次会议表决通过了《环保\n法修订案》，新法已经于2015年1月1日施行。至此，这部中国环境领\n域的“基本法”，完成了25年来的首次修订。这也让环保法律与时俱\n进，开始服务于公众对依法建设“美丽中国”的期待。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.3环境保护法的立法目的\n（1）什么是立法目的？\n立法目的，是指国家在制定或认可法律时希望实现的结果。\n（2）类型\n·环境基本法或主要立法的目的包括两种类型：\n·直接目的，即协调人与环境的关系、保护和改善环境；\n·最终目的，包括保护人体健康和保障经济社会可持续发展两个方\n面。其中，在最终目的上，存在“目的一元论”和“目的二元论”\n两种观点，多数国家规定最终目的包括保护人体健康和保障经济\n社会可持续发展，也有国家规定环境法的最终目的只包括保护人\n体健康。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.3环境保护法的立法目的\n（3）“一元论”和“二元论”\n\n#### 保护环境\n\n#### 维护人体健康\n\n#### 经济发展\n（4）如何正确理解环境保护与经济发展之间的关系？\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.3环境保护法的立法目的\n美国《国家环境政策法》 日本《公害对策基本法》\n宣布一项鼓励人同他所在的环境之 本法是为了明确企业、国家\n\n#### 间建设性的和愉快和谐关系的国家\n\n#### 和地方公共团体对防治公害\n环境政策；推动为预防或消除对环\n\n#### 的职责，确定基本的防治措\n\n#### 境和生物圈的损害所作的努力并促\n进人类健康和福利：深化对国家至 施，以全面推行防治公害的\n关重要的生态系统和自然资源的认对策，达到保护国民健康和\n识。 维护其生活环境的目的。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 2.1环境保护法的概念\n\n### 2.1.3环境保护法的立法目的\n\n#### 我国《环境保护法》立法目的变迁\n\n#### 法律文本 立法目的\n1979年环境保护法（试行）第二条 中华人民共和国环境保护法的任务，是保证在社会主\n义现代化建设中，合理地利用自然环境，防治环境污染和\n生态破坏，为人民造成清洁适宜的生活和劳动环境，保护\n人民健康，促进经济发展。\n1989年《环境保护法第一条 为保护和改善生活环境与生态环境，防治污染和其他\n公害，保障人体健康，促进社会主义现代化建设的发展，\n\n#### 制定本法\n2014年环境保护法第一条 为保护和改善环境，防治污染和其他公害，保障公众\n健康，推进生态文明建设，促进经济社会可持续发展，制\n\n#### 定本法\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n案例1：日本—汞污染下水侯病梦魔60年\n1956年的一天，日本水侯湾一名5岁女童出现口齿不清、走路\n困难、突然狂叫等症状，医院上报了这种“中枢神经系统怪病”\n女童稍后死亡。由于病因不明，人们称为“水侯病”。当地村民\n陆续出现这些症状，死亡病例增加。研究人员发现，病因是室素\n公司一家氮肥厂排放含汞工业废水，致使水湾附近海城鱼和贝\n类体内形成甲基汞等有机水银化合物，经食物链进入人体，严重\n侵害神经系统和身体其他部位。\n日本水侯病事件：排海污水导致2万多人终身带病，上千人死亡\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n·熊本县水侯病、20世纪60年代中期发生在新渴县的水侯病、20世\n致的“四日市哮喘病”并列为日本四大公害病。目前，水侯病尚\n无根治疗法。截至2001年3月，日本环境省认定了2265名水侯病\n患者，其中1784人已经死亡。令人气愤的是，室素公司不但没有\n停止排污，还企图掩盖真相。出于经济发展考虑，日本政府在事\n件爆发伊始，就偏污染企业。面对政府的“不作为”，受害者\n不得不发起“自救”，掀开了日本环保运动的序幕。1966年新\n“水侯病”事件发生后，当地医生、学者和律师组成了NGO组织\n“水侯病对策会议民主小组”委员会。在NGO的努力下，1967年\n新冯市民向法院提出控诉。1971年法院终于作出判决，受害者得\n到赔偿成为日本第一起针对水侯病的公益诉讼。之后，遭受污染\n公害的受害者纷纷通过公益诉讼维护权益。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n伴随着越来越多针对公害污染事件的公益诉讼案件获得胜利，\n日本开始出台全国性的环境立法。自20世纪60年代中期，日本政\n府相继出台了《公害对策基本法》《大气污染防止法》《噪音规\n制法》和《排烟规制法》。1967年，针对“水侯病”的《环境污\n染控制基本法》通过，并通过法律规定政府必须建立相应的机制，\n帮助污染公害中的受害公民。\n1968年，日本政府最终作出官方声明，正式承认新鸿“水侯\n病”是一起由工业污染引起的公害病。1971年5月，日本环保省\n成立，并开始积极推动“水病”的官方认证。\n在这种环境运动的影响下，构建具备较强规划性和可操作性\n的法律，并明确国家、地方政府、企业以及公众责任和义务，则\n成为日后日本政府制定政策的重点。20世纪80年代，日本社会逐\n渐从治理污染到转向应对能源危机的可持续发展过程中，明确通\n过法律规范了官、产、学、民在建立节能、可持续发展方面的社\n会责任。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n日本政府2010年制定了《水侯病受害者救济法》，同意向每\n名未经认定的水侯病患者支付210万日元（约合2.6万美元）\n一次性赔偿，另外每月发放至多1.77万日元（220美元）医疗\n补贴。截至2012年3月底，熊本、鹿儿岛、新渴3县申请者\n超过5.3万人。对官方认定的水侯病患者，室素公司向每人\n一次性赔偿1600万至1800万日元（20万至22万美元）并免费\n提供医疗服务。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n#### 案例2：校园/生活场景快判\n\n#### 是\n·1.私自砍校园古树 违法\n\n#### 否\n\n#### 是\n·2.乱扔危废电池，乱倒实验废液 违法\n\n#### 香\n\n#### 是 违法\n·3.野生动物伤人反击\n\n#### 否\n\n#### 是否\n·4.垃圾回收、资源化利用过程中造成污染 违法\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n#### 作业\n1.搜索1个2026年环境法治热点，写100字短评；\n·2.拍下身边1个环保合规/违法场景（不涉隐私）\n下节课分享。\n"}, {"id": "pdf-003-1-2026-3-4-2-1-2026-3-4", "group": "原始课件 · PDF原文", "title": "003-1-2026年3月4日-杨建英-开学第一课（2）-1-2026年3月4日-杨建英-开学第一课", "md": "# 2026年3月4日-杨建英-开学第一课（2）-1-2026年3月4日-杨建英-开学第一课\n\n> 来源: 003-1-2026年3月4日-杨建英-开学第一课（2）-1-2026年3月4日-杨建英-开学第一课.pdf\n> 页数: 7\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 案例2：校园/生活场景快判\n\n#### 是\n·1.私自砍校园古树 违法\n\n#### 否\n\n#### 是\n·2.乱扔危废电池，乱倒实验废液 违法\n\n#### 香\n\n#### 是 违法\n·3.野生动物伤人反击\n\n#### 否\n\n#### 是否\n·4.垃圾回收、资源化利用过程中造成污染 违法\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n案例3：长江流域非法捕捞生态损害赔偿案\n事实：多人电鱼，破坏渔业资源与水环境\n法律：刑法十长江保护法+环境公益诉讼法\n问题：\n1.为什么要追究生态损害赔偿？\n2.个人破坏生态，为何要付出巨大代价？\n总结：生态没有替代品，用之不觉，失之难存。用法治守住生态红线，就是守住民生底线。\n江苏常州221万元判决背后的生态保卫战_生态环境频道_央视网（cctv.com）\n\n#### x6Olm2D.69\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 3.2环境保护法的创制、发展和完善\n\n### 3.2.1世界环境法的发展\n资本主义发展的早期，西方社会信奉自由资本主义理念，并基\n本完成了工业化和城市化进程。伴随着这一过程，部分污染问\n题以及资源破坏问题开始显现。\n·民法和零散的污染防治立法并用\n\n#### 18世纪中叶至\n20世纪初期 ·出现专门的资源保护和管理立法\n随着经济活动的日益频繁与产业活动的污染累积效应，环境污\n染逐渐加重、污染损害大面积扩散，世界上相继出现“八大公\n20世纪初期至 害事件”，引发全球范围关注\n20世纪60年代 ·大量的污染防治立法\n·出现编向于污染防治的基本立法\n·国际环境法开始得到迅速发展\n1972年人类环境会议召开、可持续思想普及，人类社会对于经\n20世纪70年代 济发展与环境保护之间的关系的认识越来越深入，人类社会开\n至今 始从整体上考虑环境保护问题\n\n#### 国内环境立法呈爆炸式增长\n\n#### 环境法的理念得到较大发展\n国际环境法进一步发展，国际环境法和国内环境法交互和融合趋势\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 3.2.2中国环境法的发展\n\n#### 1949-1973：混沌时期\n1973-1979：初步产生时期\n环境保护工作和环境法律初步产生时期。\n1978年《宪法》第11条第3款专门对环境保护作出规定，这是环境保护首次被列入中国的国家根本大\n法之中，为国家制定专门的环境法律奠定了宪法基础。\n1979-1989：初步发展时期\n从1979年《环境保护法（试行）》的颁布实施到1989年《环境保护法》取而代之的10年，是中国环境\n保护立法的初步发展时期，中国的环境保护法律体系初步形成。1989年，颁布环境保护基本法。\n1989-2014：改革完善时期\n我国于1989年12月26日通过了新的《环境保护法》。这为其他环境单行法律的制定、修改奠定了基础，\n拉开了环境法律完善的序幕。\n从1989年至2014《环境保护法》修订是中国环境法的改革完善时期。\n\n#### 2014年至今：体系优化时期\n此后，不断修改或新制定环境相关单行法，环境法律体系不断优化。\n2014年4月24日，第十二届全国人民代表大会常务委员会第八次会议对《环境保护法》作出修订。\n2015年1月1日，新《环境保护法》生效，标志着中国环境法律体系发展到一个新的阶段。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n讨论3：作为环境专业学生，我们能\n为绿水青山做什么？\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n·1.会举报：\n·12369环保举报；\n·12345政务热线；\n·平台私信举报\n·2.会参与：\n·环保监督\n·志愿普法\n·低碳实践\n·3.会学习：\n·紧盯法典立法、碳市场、生态修复三大前沿\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 作业\n1.搜索1个2026年环境法治热点，写100字短评；\n·2.拍下身边1个环保合规/违法场景（不涉隐私）\n下节课分享。\n"}, {"id": "pdf-003-1-2026-3-4-2-2", "group": "原始课件 · PDF原文", "title": "003-1-2026年3月4日-杨建英-开学第一课（2）-2.环境保护法的基本原则", "md": "# 2026年3月4日-杨建英-开学第一课（2）-2.环境保护法的基本原则\n\n> 来源: 003-1-2026年3月4日-杨建英-开学第一课（2）-2.环境保护法的基本原则.pdf\n> 页数: 9\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n2.环境保护法的基本原则\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年3月11日\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 目录\n2.环境保护法的基本原则\n\n### 2.2预防原则\n\n### 2.2.1概念和意义\n\n### 2.2.2贯彻\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n\n### 2.3.2贯彻\n\n### 2.4环境责任原则\n\n### 2.5公众参与原则\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n回顾任何一个部门法，都有其基本原则，某一部门法的\n基本原则，是指贯穿于整个部门法之中，对该部门法\n的各项法律制度和具体法律规范起统率作用的基本准\n则。例如，民法的基本原则就包括主体平等原则、等价有偿\n原则、诚实信用原则、自愿公平原则等，这些都是民事行为应\n当遵循的基本准则。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n环境法作为一个独立的法律部门，也有其基本原则，即贯穿于\n整个环境法之中，所有的环境法律规范都必须遵循和贯彻的，调整\n并决定一切环境法律关系主体所有行为的指导思想和基本准则。\n简而言之，环境法的基本原则就是贯穿于整个环境法之\n中的，为所有的环境法制度和规范所遵循的基本准则\n（P48）。\n它是调整因保护和改善环境而产生的社会关系的基本准则，是\n环境保护法本质的集中表现。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n在理解环境法的基本原则时，要注意如下几个问题：\n1、环境法的基本原则是由环境法确认的。\n环境法的基本原则并不是随意确定的，不是哪一个人或是哪\n一个机关认为某一项重要就可以将其作为环境法的基本原则，它\n应该是由法律确认的，即在环境法中有明确的规定或是体现。\n1979年《环境保护法（试行）》第6条第2款：“已经对环境造\n成污染和其他公害的单位，应当按照谁污染谁治理的原则，制定\n规划，积极治理，或者报请主管部门批准转产、搬迁。”在这个\n条文中就明确规定了“谁污染谁治理”的原则。\n《环境保护法（2014修订版）第5条：环境保护坚持保护优先、\n预防为主、综合治理、公众参与、损害担责的原则。\n而大部分的环境法的基本原则并没有直接规定于条文之中，\n而是通过一个或一些条文体现出来。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n2、不能把环境保护必须遵循的基本原则同环境法的立法\n原则和一般的司法原则混为一谈。\n（1）首先，要把环境法的基本原则同环境法的立法原则区别开\n来。\n环境法的立法原则是指在起草、制定或修改环境法规范的过\n程中，对立法者具有指导意义的基本原理和基本方法。\n例如长江、黄河上游的森林生态系统与苏南的森林生态系统的功\n能不尽相同，前者的主要功能是水土保持，而后者可能是提供木\n材，所以在进行环境法立法时要充分考虑这些地区的特点，对长\n江、黄河上游的森林在立法时应规定禁止采伐，而对苏南的森林\n就不必作这样的规定。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n2、不能把环境保护必须遵循的基本原则同环境法的立法\n原则和一般的司法原则混为一谈。\n（2）其次，要将环境法的基本原则与一般的司法原则区别开来。\n一般的司法原则是指在执法法律的过程必须遵循的一些基本\n准则。如“以事实为依据、以法律为准绳”原则、“法律面前人\n人平等”原则等等，这些司法原则虽然在环境法的执法过程中也\n适用，但由于没有体现出环境法与其他法律部门相不同的特点，\n也不是环境法的基本原则。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n3、环境法的基本原则具有普遍意义和指导作用。\n环境法的基本原则是环境法的基本方针、政策在法律上的\n体现，是贯穿于整个环境法之中的，具有普遍意义和指导性的\n规范。\n正因为如此，不能将只适用于某个特定领域或是特定对象\n的个别原则作为环境法的基本原则。例如水污染防治法中的\n“生活饮用水优先和重点保护原则”、“流域管理与区域管理\n相结合原则”等就不能作为环境法的基本原则。\n"}, {"id": "pdf-004-2-2-2", "group": "原始课件 · PDF原文", "title": "004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则", "md": "# 2.环境保护法的基本原则\n\n> 来源: 004-2.环境保护法的基本原则（2）-2.环境保护法的基本原则.pdf\n> 页数: 23\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n2.环境保护法的基本原则\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n### 2.1什么是基本原则？\n回顾任何一个部门法，都有其基本原则，某一部门法的\n基本原则，是指贯穿于整个部门法之中，对该部门法\n的各项法律制度和具体法律规范起统率作用的基本准\n则。例如，民法的基本原则就包括主体平等原则、等价有偿\n原则、诚实信用原则、自愿公平原则等，这些都是民事行为应\n当遵循的基本准则。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n在理解环境法的基本原则时，要注意如下几个问题：\n1、环境法的基本原则是由环境法确认的。\n环境法的基本原则并不是随意确定的，不是哪一个人或是哪\n一个机关认为某一项重要就可以将其作为环境法的基本原则，它\n应该是由法律确认的，即在环境法中有明确的规定或是体现。\n1979年《环境保护法（试行）》第6条第2款：“已经对环境造\n成污染和其他公害的单位，应当按照谁污染谁治理的原则，制定\n规划，积极治理，或者报请主管部门批准转产、搬迁。”在这个\n条文中就明确规定了“谁污染谁治理”的原则。\n《环境保护法（2014修订版）第5条：环境保护坚持保护优先、\n预防为主、综合治理、公众参与、损害担责的原则。\n而大部分的环境法的基本原则并没有直接规定于条文之中，\n而是通过一个或一些条文体现出来。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n2、不能把环境保护必须遵循的基本原则同环境法的立法\n原则和一般的司法原则混为一谈。\n（1）首先，要把环境法的基本原则同环境法的立法原则区别开\n来。\n环境法的立法原则是指在起草、制定或修改环境法规范的过\n程中，对立法者具有指导意义的基本原理和基本方法。\n例如长江、黄河上游的森林生态系统与苏南的森林生态系统的功\n能不尽相同，前者的主要功能是水土保持，而后者可能是提供木\n材，所以在进行环境法立法时要充分考虑这些地区的特点，对长\n江、黄河上游的森林在立法时应规定禁止采伐，而对苏南的森林\n就不必作这样的规定。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n2、不能把环境保护必须遵循的基本原则同环境法的立法\n原则和一般的司法原则混为一谈。\n（2）其次，要将环境法的基本原则与一般的司法原则区别开来。\n一般的司法原则是指在执法法律的过程必须遵循的一些基本\n准则。如“以事实为依据、以法律为准绳”原则、“法律面前人\n人平等”原则等等，这些司法原则虽然在环境法的执法过程中也\n适用，但由于没有体现出环境法与其他法律部门相不同的特点，\n也不是环境法的基本原则。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n3、环境法的基本原则具有普遍意义和指导作用。\n环境法的基本原则是环境法的基本方针、政策在法律上的\n体现，是贯穿于整个环境法之中的，具有普遍意义和指导性的\n规范。\n正因为如此，不能将只适用于某个特定领域或是特定对象\n的个别原则作为环境法的基本原则。例如水污染防治法中的\n“生活饮用水优先和重点保护原则”、“流域管理与区域管理\n相结合原则”等就不能作为环境法的基本原则。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n环境法的基本原则是调整因开发利用、保护和改善环境而产生的\n社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，\n是对环境保护实行法律调整的基本指导方针。（3.25)\n它贯穿于整个环境法中，具有普遍的指导作用。\n我国环境法的基本原则主要有：\n预防原则（内涵：预防为主，防治结合，综合治理原则）；\n协调发展原则（内涵：经济、社会发展与环境保护相协调原则）；\n原因者负担原则（内涵：污染者付费，利用者补偿，开发者保护，破\n坏者恢复原则）；\n公众参与原则。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 2.2 预防原则\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 2.2.1概念\n【预防为主、防治结合、综合治理原则】（P49）：是指\n环境保护工作要以预防为主、防患于未然，对已发生的污染和破\n坏要积极治理。把环境污染和生态破坏控制在维持生态平衡、保\n护社会物资财富和人体健康允许的限度之内。\n这一原则表明环境保护的重点是预防环境污染和破坏；防与\n治要有机地结合起来，在预防下及时治理，在治理中加强预防；\n从整体利益出发，综合各种方式和途径整治环境污染和破坏。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 2.2.1概念\n是指在环境保护工作中将保护环境，采取各种预防措施，防止\n环境问题的产生和恶化，或者把污染和生态破坏控制在能够维持生\n态平衡、保护人体健康和社会物质财富以及保障经济社会持续发展\n的限度之内，并对已经造成的环境污染和生态破坏积极进行治理。\n预防原则包含两层含义（P49-50）：\n1.提前采取预防措施，以避免危害的产生（损害预防）；\n2.提前预测、分析和评价，以避免环境危害及其风险的出现（风险\n预防）。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 2.2.1概念\n《环境保护法》第40条：企业应当优先使用清洁能源，采\n用资源利用率高、污染物排放量少的工艺、设备以及废弃物综\n合利用技术和污染物无害化处理技术，减少污染物的产生。\n第41条：建设项目中防治污染的设施，应当与主体工程同\n时设计、同时施工、同时投产使用。防治污染的设施应当符合\n经批准的环境影响评价文件的要求，不得擅自拆除或者闲置。\n《水污染防治法》第10条关于“合理规划工业布局”的规定\n等都体现了这一原则。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 2.2.1概念\n从“先污染后治理”到“病重求医末端治理”到“综合污染\n控制”：\n1、1980年联合国环境署：“预期环境政策”\n2、美国：1984年《资源保护回收法》；“从摇篮到坟墓”；\n\n#### 1990年《污染预防法》\n3、我国：2001年开始在多部法律中确立该原则\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 2.2.1概念 案例1：以身体检测铅毒的乡村儿童\n2009-2010年间，陕西凤翔、湖南\n武冈、湖南郴州、河南济源、湖南嘉\n禾多地发生儿童血铅超标事件。\n\n#### 陕西凤翔和湖南武冈中毒儿童人\n数分别达到了惊人的615名1354名。嘉\n禾县397名参检的14周岁以下儿童，有\n250人超标。\n\n#### 屡见不鲜的血铅超标中毒事件均\n延续过往的“黑色定律”：当地政府\n为发展经济上马高污染化工企业，健\n康受损的居民自发体检，发生群体性\n事件。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 2.2.1概念\n嘉禾是贫困县，为了便于招商引资，发展经济，一批从\n周边省市淘汰的企业来到嘉禾，不做环境影响评估就可以上\n马生产，所谓“先上车后买票”，还包括逃票，以至该县541\n家企业，其中未进行环评审批的企业多达309家，接近六成。\n嘉禾县环保局长说，“经济落后了，好不容易来几个企\n业，你就不好去管。”政府不是防患于未然，而是毫不设防，\n先协同作恶，再考虑救治，乃至是拿民众的创伤作为自身政\n绩的垫脚石。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 2.2.1概念\n“血铅事件”发生后，郴州在全市范围内，全面清理小治炼企\n业，环保不达标的坚决关停。引发中毒事件的炼铅企业腾达公司，\n曾被县市两级环保局几度叫停，但仍继续生产。在牺牲了几百名\n儿童身体健康之后，腾达公司才被关闭停产。\n铅是一种多系统、多亲和性毒物，主要损害神经系统、造血\n系统、血管和消化系统。对儿童心理、智力和行为发育损伤具有\n不可逆性。一般血铅每上升100微克每升，IQ（智力水平测试）就\n会下降1到7分，并将导致性格和行为上的诸多问题。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 2.2.1概念\n案例2：台州168人血铅超标蓄电池厂距住宅仅5米\n截止2011年3月26日下午5时，台州市路桥区峰江街道33个村\n共有597名村民进行血铅检测血铅超标168人，其中儿童53人。\n这是一起由台州市速起蓄电池有限公司引起的铅污染事件。该\n公司产生含铅粉尘和废气未经收集直接外排，当地村民血铅超标\n事件与速起公司含铅污染物，特别是含铅粉尘废气排放有直接关\n系。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 2.2.1概念\n这家厂的污染已经有8年多历史。涉铅行业是国家明令重点监\n控的重金属污染企业。该企业也被列入路桥区的重点监管企业，\n然而，环保部门在此前进行的多次环境监测中，却从未公布其有\n检出违规超排的现象。环保局长称从未接到群众举报。\n但当地村民说，不仅向环保局投诉过，还亲自去局里反映蓄\n电池公司偷排污水的问题，但就是不见执法人员来处理。最终引\n发了上百名村民血铅和镉超标的严重后果。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 2.2.1概念\n案件处理结果：该公司已被责令关停，公司法人代\n表应建国已被刑事拘留。对此事负有直接责任的台州市\n环保局路桥分局一名副局长、路桥区城南环境监察中队\n中队长，路桥区峰江街道办事处一名副主任等3人已被停\n职检查。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n讨论一：为什么要采取预防原则？\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 案例1：高校的网红课\n·华东师大一—家常菜、劳动与生活（生活必备技能\n\n#### 与常识）、护理、自救营救等\n·南京农业大学一运动减脂课\n·天津大学“恋爱课”\n·建议开设美育课、国家安全教育、金融管理、经济\n\n#### 安全教育课等\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 案例2：福岛核电站和长江保护法\n·福岛核事故诉讼原告团胜诉\n·中华人民共和国长江保护法\n4%BA%BA%E6%B0%91%E5%85%B1%E5%92%8C%E5%\n%oA4%E6%B3%95/22860970?fr=aladdin\n[新闻直播间】聚焦两会·建言献策有我持续改善生态环境让家园\n\n#### 更绿更美\n309.shtml\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n案例3：人类的未来是怎样的？\n·8000000，这串数字触目惊心！\n\n#### 人类胎盘中首次发现微型塑料粒子\n·引人深思的获奖动画《鱼生》\n=3654925259821979589&spm id fr0m=333.337.0.0\n\n#### 《第三封信》\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n实行预防为主、防治结合、综合治理的原则，主要是\n由环境问题本身的特点决定的。\n（1）环境问题具有不可逆转性、累积性、复合性。环境\n遭受污染、破坏后，要消除其受到的危害，往往需要很长\n的时间，有些甚至是无法补救的。\n（2）环境遭受污染、破坏后再去治理一般要比采取预防\n措施所花费的代价高。经济学家认为：预防污染费用与事\n后治理费用比例高达1：20。\n（3）环境问题的产生，是在经济、社会发展中忽视环境\n保护的结果，如果在经济建设过程中重视环境保护，采取\n预防措施，许多环境问题是可以得到解决的，即使出现一\n些问题，也可以控制在一定的限度之内。\n"}, {"id": "pdf-005-2-3-2", "group": "原始课件 · PDF原文", "title": "005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则", "md": "# 2.环境保护法的基本原则\n\n> 来源: 005-2.环境保护法的基本原则（3）-2.环境保护法的基本原则.pdf\n> 页数: 22\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n2.环境保护法的基本原则\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 目录\n2.环境保护法的基本原则\n\n### 2.1什么是基本原则？\n\n### 2.2预防原则\n\n### 2.2.1概念和意义\n\n### 2.2.2贯彻\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n\n### 2.3.2贯彻\n\n### 2.4环境责任原则\n\n### 2.5公众参与原则\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 2.2预防原则（3.25）\n实行预防为主、防治结合、综合治理的原则，主要是\n由环境问题本身的特点决定的。\n（1）环境问题具有不可逆转性、累积性、复合性。环境\n遭受污染、破坏后，要消除其受到的危害，往往需要很长\n的时间，有些甚至是无法补救的。\n（2）环境遭受污染、破坏后再去治理一般要比采取预防\n措施所花费的代价高。经济学家认为：预防污染费用与事\n后治理费用比例高达1：20。\n（3）环境问题的产生，是在经济、社会发展中忽视环境\n保护的结果，如果在经济建设过程中重视环境保护，采取\n预防措施，许多环境问题是可以得到解决的，即使出现一\n些问题，也可以控制在一定的限度之内。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 2.2预防原则\n\n### 2.2.2实现（适用或贯彻） （P51-52)\n1993年国务院批转的国家计委《关于保护和改善环境的若\n干规定（试行草案）》首先确定了该原则。《国务院关于国民经\n济调整时期加强环境保护工作的决定》、《国务院关于环境\n保护工作的决定》都强调了这一原则，《环境保护法》确认并\n完善了该原则。《环境保护法》第13条、第14条、第19条、\n第40条、第41条、第45条、第46条等分别作了具体规定，一些\n环境保护单行法也有这方面的规定。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n（一）合理规划，有计划地开发利用环境和自然资源\n工业、产业布局；环境\n1.全面规划，合理布局 功能分区等\n《环境保护法》第13条县级以上人民政府应当将环境保护工作纳\n入国民经济和社会发展规划。国务院环境保护主管部门会同有关部门，\n根据国民经济和社会发展规划编制国家环境保护规划，报国务院批准\n并公布实施。县级以上地方人民政府环境保护主管部门会同有关部门，\n根据国家环境保护规划的要求，编制本行政区域的环境保护规划，报\n同级人民政府批准并公布实施。环境保护规划的内容应当包括生态保\n护和污染防治的目标、任务、保障措施等，并与主体功能区规划、土\n地利用总体规划和城乡规划等相衔接。\n第14条国务院有关部门和省、自治区、直辖市人民政府组织制定\n经济、技术政策，应当充分考虑对环境的影响，听取有关方面和专家\n的意见。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n2.有计划地开发利用环境和自然资源\n《环境保护法》第二章保护和改善环境第28-39条也作了明确规定。\n·第29条国家在重点生态功能区、生态环境敏感区和脆弱区等区域\n划定生态保护红线，实行严格保护。\n·第30条开发利用自然资源，应当合理开发，保护生物多样性，保\n障生态安全，依法制定有关生态保护和恢复治理方案并予以实施。\n引进外来物种以及研究、开发和利用生物技术，应当采取措施，防\n止对生物多样性的破坏。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n（二）运用环境标准控制和减少生产经营活动向环境排放污染物\n·第15条国务院环境保护主管部门制定国家环境质量标准。省、\n自治区、直辖市人民政府对国家环境质量标准中未作规定的\n项目，可以制定地方环境质量标准；对国家环境质量标准中\n已作规定的项目，可以制定严于国家环境质量标准的地方环\n境质量标准。地方环境质量标准应当报国务院环境保护主管\n部门备案。国家鼓励开展环境基准研究。\n·第16条国务院环境保护主管部门根据国家环境质量标准和国\n家经济、技术条件，制定国家污染物排放标准。省、自治区、\n直辖市人民政府对国家污染物排放标准中未作规定的项目，\n可以制定地方污染物排放标准：对国家污染物排放标准中已\n作规定的项目，可以制定严于国家污染物排放标准的地方污\n染物排放标准。地方污染物排放标准应当报国务院环境保护\n主管部门备案。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n（三）制定和实施预防性的环境管理制度\n环境影响评价制度、清洁生产制度、环境规划制度、环境许可\n制度等。\n·环境保护法第13条关于环境规划制度的规定。\n·第19条编制有关开发利用规划，建设对环境有影响的项目，应\n当依法进行环境影响评价。未依法进行环境影响评价的开发利\n用规划，不得组织实施；未依法进行环境影响评价的建设项目，\n不得开工建设。（环境影响评价制度）\n·第40条国家促进清洁生产和资源循环利用。国务院有关部门\n和地方各级人民政府应当采取措施，推广清洁能源的生产和使\n用。企业应当优先使用清洁能源，采用资源利用率高、污染物\n排放量少的工艺、设备以及废弃物综合利用技术和污染物无害\n化处理技术，减少污染物的产生。（清洁生产制度）\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n（三）制定和实施预防性的环境管理制度\n第41条建设项目中防治污染的设施，应当与主体工程同时设计、\n同时施工、同时投产使用。防治污染的设施应当符合经批准的\n环境影响评价文件的要求，不得擅自拆除或者闲置。（三同时\n\n#### 制度）\n第45条国家依照法律规定实行排污许可管理制度。实行排污许\n可管理的企业事业单位和其他生产经营者应当按照排污许可证\n的要求排放污染物；未取得排污许可证的，不得排放污染物。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n（四）增强风险防范意识，谨慎地对待具有科学不\n\n#### 确定性的开发利用活动\n第39条国家建立、健全环境与健康监测、调查和风险评\n估制度；鼓励和组织开展环境质量对公众健康影响的研\n究，采取措施预防和控制与环境污染有关的疾病。\n【环保短片】震撼环保公益短片《致我们的地球》\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 2.3协调发展原则\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n【经济、社会发展和环境保护相协调的原则】 （P52-\n53）指在发展经济的同时，加强保护和改善环境，使环境保护和\n经济建设同步发展，坚持在发展中保护，在保护中发展。实现经济\n效益、社会效益、环境效益的统一。\n这一原则，正确地反映了经济建设和环境保护的关系，同时也\n明确了如何正确对待和处理二者之间的关系。环境和自然资源是经\n济发展的物质基础，离开了环境和自然资源，任何形式的生产都无\n法进行。\n《环境保护法》第4条保护环境是国家的基本国策。国家采取有利\n于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经\n济、技术政策和措施，使经济社会发展与环境保护相协调。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n\n#### 协调发展原则的内涵\n即经济、社会发展与环境相协调原则\n\n#### 该原则的提出与发展\n1973年第一次环境工作会议一1989年《环境保护法》\n—2005年《关于落实科学发展观加强环境保护的决定》一\n\n#### 一协调、可持续发展\n1972年，斯德哥尔摩会议，《我们只有一个地球》《人类环境宣言》；\n1987年，世界环境与保护发展委员会，提出可持续发展的观点。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n在如何使环境保护同经济、社会发展相协调的问题上，有\n两种对立的看法：\n一是主张停止经济发展，提出所谓“经济零增长论”；\n二是坚持无限发展，先发展经济，然后再治理污染。\n两种看法都是把环境保护与经济发展对立起来，片面强调\n二者之间矛盾的一面，而忽视了它们之间相互依存、相互促进\n的统一的一面。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n前者违背了人类社会进步的根本利益而在现实中不能实现，因\n为，贫穷本身就是一个最大的环境问题，生产不发展，没有物力和\n财力，环境保护是难以搞好的；后者已被当前环境问题的现状证明\n超越环境承受能力的发展，只会危及人类社会的生存和发展，最终\n将导致人类社会的灭亡。\n因此，二者都不可取。1987年由世界环境与保护发展委员会提\n出的可持续发展的观点是人类寻求发展的最佳选择。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n“既满足当代人的需要，又不对后代满足其需要的能力构成威胁\n和危害”。 《我们共同的未来》\n“人类应享有以与自然相和谐的方式过健康而富有生产成果的生\n活的权利，并公平地满足今世后代在发展与环境方面的需要，求\n取发展的权利必须实现”。 《里约宣言》\n“不存在抽象意义的发展权，发展权总是同环境对它的容忍有关，\n是对发展权的正确阐述”。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 2.3协调发展原则\n讨论二：如何看待经济建设与环境保护的关系？\n（1）保护环境、合理利用自然资源、提高资源的再生\n增殖能力、维护生态平衡、促进生态系统良性循环，有利\n于促进国民经济持续稳定协调发展。如果环境和自然资源\n遭到污染和破坏，人体健康就会受到危害，人们就无法进\n行经济建设，必然会阻碍经济的发展。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 2.3协调发展原则\n讨论二：如何看待经济建设与环境保护的关系？\n（2）保持经济快速增长是环境保护的基础，因为环\n境保护需要大量的人力、物力和财力，没有经济的较快增\n长，没有财政能力的不断提高，环境治理就没有资金的投\n入来支持，就难以实现环境保护的目标；同样经济增长较\n快，环境压力会加大，对环保产业就产生了巨大的需求。\n经济的发展一方面带来了环境问题，另一方面又为保\n护和改善环境提供高科技手段和更多的资金创造条件。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 2.3协调发展原则\n讨论二：如何看待经济建设与环境保护的关系？\n由此可见，经济建设与环境保护并不矛盾，经济建设和\n环境保护之间是相互影响、相互制约、又相互促进的辩证统\n一的关系。\n我们决不能走“先污染后治理”的老路，不能用消耗大\n量的资源、破坏环境来实现经济增长的高速度。这就要求我\n们找到一个平衡点，既能保持经济一定速度的增长，又不以\n破坏环境为代价。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 2.3协调发展原则\n讨论二：如何看待经济建设与环境保护的关系？\n中共中央在制定《第十一个五年规划》中特别提出了要建\n设资源节约型、环境友好型社会，使经济建设与环境保护协调\n发展。\n十三大提出“转变经济发展方式”，如建设循环经济，看\n出只有保护环境，才能为将来的经济增长提供支持，如能源、\n健康。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n《环境保护法》第13条关于“县级以上人民政府应当将环境\n保护工作纳入国民经济和社会发展规划。环境保护规划与主体功\n能区规划、土地利用总体规划和城乡规划等相衔接”的规定。\n第14条国务院有关部门和省、自治区、直辖市人民政府组织制\n定经济、技术政策，应当充分考虑对环境的影响，听取有关方面\n和专家的意见。\n这两条不仅是预防原则的体现，也是协调发展原则的要求和\n具体体现。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n《环境影响评价法》第一条为了实施可持续发展战\n略，预防因规划和建设项目实施后对环境造成不良影响，\n促进经济、社会和环境的协调发展，制定本法。\n"}, {"id": "pdf-006-2-4-2", "group": "原始课件 · PDF原文", "title": "006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则", "md": "# 2.环境保护法的基本原则\n\n> 来源: 006-2.环境保护法的基本原则（4）-2.环境保护法的基本原则.pdf\n> 页数: 35\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n2.环境保护法的基本原则\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n环境法的基本原则是调整因开发利用、保护和改善环境而产生的\n社会关系的指导思想和基本准则，是环境法本质和特征的集中体现，\n是对环境保护实行法律调整的基本指导方针。（3.25)\n它贯穿于整个环境法中，具有普遍的指导作用。\n我国环境法的基本原则主要有：\n预防原则（内涵：预防为主，防治结合，综合治理原则）；\n协调发展原则（内涵：经济、社会发展与环境保护相协调原则）；\n原因者负担原则（内涵：污染者付费，利用者补偿，开发者保护，破\n坏者恢复原则）；\n公众参与原则。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n【经济、社会发展和环境保护相协调的原则】 （P52-\n53）指在发展经济的同时，加强保护和改善环境，使环境保护和\n经济建设同步发展，坚持在发展中保护，在保护中发展。实现经济\n效益、社会效益、环境效益的统一。\n这一原则，正确地反映了经济建设和环境保护的关系，同时也\n明确了如何正确对待和处理二者之间的关系。环境和自然资源是经\n济发展的物质基础，离开了环境和自然资源，任何形式的生产都无\n法进行。\n《环境保护法》第4条保护环境是国家的基本国策。国家采取有利\n于节约和循环利用资源、保护和改善环境、促进人与自然和谐的经\n济、技术政策和措施，使经济社会发展与环境保护相协调。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 2.3协调发展原则\n讨论二：如何看待经济建设与环境保护的关系？\n由此可见，经济建设与环境保护并不矛盾，经济建设和\n环境保护之间是相互影响、相互制约、又相互促进的辩证统\n一的关系。\n我们决不能走“先污染后治理”的老路，不能用消耗大\n量的资源、破坏环境来实现经济增长的高速度。这就要求我\n们找到一个平衡点，既能保持经济一定速度的增长，又不以\n破坏环境为代价。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义盖巴斯科夫拉基玛洛大坝案 （4.8)\n1977年，匈牙利和捷克签订《布达佩斯条约》在多瑙河上修\n建盖巴斯科夫一拉基玛洛大坝，将河水截至两条运河后回注于\n多瑙河。\n1988年，牙利国会认定该河流的生态效益高于该项目的经\n济利益，命令政府重新评价该项目。1989年，匈牙利宣布在项目\n的环境影响得到充分评价之前停止执行该工程。1991年捷克决定\n继续建设该项目，并单方面将近2/3的多瑙河河水截引至其领土。\n1992年10月，牙利向国际法院提出申请。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 2.3协调发展原则\n\n### 2.3.1概念和意义\n国际法院本案判决书140段：“通观历史，人类由于经济或其\n他原因一直不断地干扰自然。人类过去从事这种干扰时，从不\n考虑其对环境的影响。由于新的科学知识和日益认识到以欠考\n虑和未减缓的速度从事这种干扰对人类一当代人及其后代所\n带来的危险。可持续发展充分表达了将经济发展与环境保护相\n协调的需要。对本案而言，双方都应重新审视盖巴斯科夫电厂\n运行对环境的影响。尤其是，它们必须为多瑙河故道和该河两\n岸支流所释放的水量找到一个满意的解决办法。”\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 2.3协调发展原则\n\n#### 中国东商滨海经济带应症村际意图\n\n#### 沿海多个省份出现癌症村\n\n#### 浙江萧山坞里村，江苏盐\n\n#### 城东兴村，山东肥城肖家店\n\n#### 随着工业化的进程，一个\n\n#### 山东阳\n接一个癌症村出现在东部滨海 头利刘铁丘村\n\n#### 村、部楼村\n经济活跃地带。名单上还有无 西汉庄村 山东省肥城市肖家店村\n锡广丰村，常州新北区，阜宁 江苏省阜宁县杨\n\n#### 集镇东兴村 宜州\n县洋桥村，安徽宿州张庄村，\n阳谷县西关村、邵楼村、西汉 南苏车\n庄村、国庄村，天津西堤头村、 www.nddaily.c\n刘快庄村等。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 2.3协调发展原则\n中国大陆在改革开放后出现的群体疾病现象。由于环境污染，大\n多是饮用了上游企业排出的未经处理的污水，以致环境受污染，导致\n人体内部机制严重受损，造成某一村庄大规模的癌症病发。\n浙江癌症村（浙江省绍兴市绍兴县）：公开资料显示，中国共有164\n个纺织工业集群，拥有超过5万家纺织工厂，主要集中于东部、东南部\n沿海地区。绍兴市绍兴县便是其中之一，这里的纺织企业9000余家，\n印染产能约占全国30%，因而也被誉为“建在布匹上的城市”。然而，\n这个GDP功劳簿上的大功臣却变成了水乡恶变的罪魁祸首，在规划面\n积100平方公里的绍兴滨海工业区及周边已经有多个“癌症村”出现。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 2.3协调发展原则\n同样沦为生态难民的还有毗邻的杭州市萧山临江工业园\n区及周边的村民，在那里同样集聚纺织及其相关的化工企\n业。绍兴滨海工业区的排污口再往东，绍兴上虞市的道墟\n镇亦有不少村民反映，他们那里也有“癌症村”。化工企\n业开到哪里，“癌症村”似乎便会出现在哪里。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 2.3协调发展原则\n从2003年12月29日开始，萧\n\n#### 山南阳镇坞里村村民韦东英，开\n始了长达4年的“环保日记”写作。\n\n#### 记录了坞里村遭受的环境污染侵\n\n#### 袭，在恶臭气味和污水包围的日\n子里，一个个村民因患癌症死去。\n\n#### 当韦东英的证据照片累积到5\n\n#### 斤多重时，南阳化工园区还没有\n搬迁的迹象。她给萧山市、浙江\n\n#### 省两级环保局打去电话咨询，得\n\n#### 到的答复是：南阳的环境监测在\n2006年已达标，化工园不用搬迁。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 2.3协调发展原则\n\n#### 田纳西流域管理局诉希尔案\n1967年，美国联邦议会批准在小田纳西河上修建一座水库，\n作为配套设施，TVA开始在小田纳西河上修建泰利库大坝。\n1975年生物学家发现小田纳西河有一种濒临灭绝的鲈鱼\n（蜗牛镖），联邦内政部将其列入了濒危物种名单，从而使其\n进入1973年生效的《美国濒危物种法》保护范围之内。不巧的\n是，蜗牛镖只能生活在泰利库大坝附近，大坝建成的话，将影\n响蜗牛镖的栖息地而导致灭绝，由此发生了“要小鱼，还是要\n大坝”的二难决择。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 2.3协调发展原则\n以希尔等为首的环保组织和一些公民以TVA为被告向联邦\n地方法院提起诉讼，认为TVA违反了《美国濒危物种法》3的\n规定，要求法院确认其违法并终止大坝的修建。\n联邦地方法院认为，虽然大坝的修建将会对蜗牛鱼的栖息\n地造成不利影响和破坏，但大坝在该法案生效前七年就开始动\n工，到蜗牛镖被列入濒危物种名单时，大坝已经接近完工，以\n牺牲纳税人一亿多美元的利益为代价来保护一个微不足道、没\n有重大经济价值且生态价值也不明显的鱼种是很不明智的。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 2.3协调发展原则\n原告不服，将案件上诉至联邦巡回法院。巡回法院的\n法官认为，是否豁免被告遵守该法案，只有国会或内政部\n才能做出决定，因而判令联邦地方法院永久禁止大坝继续\n完工，“除非国会通过适当立法豁免泰利库大坝遵循《美国\n危物种法》或者蜗牛镖从濒危物种名单上取消或有新的\n关键栖息地生存”，否则《美国濒危物种法》不允许进行\n利益平衡，必须将保护生物多样性置于绝对优先地位。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 2.3协调发展原则\n1997年4月18日，TVA将案件上诉到联邦最高法院，\n要求撤销上诉法院的判决。初审原告希尔等人申请法庭在诉\n讼期间作出裁定，暂停大坝的修建，以免造成不可逆转的结\n果。最高法院于同年6月15日做出了终审判决，9位大法官\n以6：3的优势支持了希尔等人的诉求，认为停工禁令是最合\n适的救济手段。\n从此，小鱼儿在田纳西河里过着快乐的生活，它们身边\n则是那座耗资一亿多美元的废弃大坝作为永远的见证。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 2.3协调发展原则\n我国葛洲坝刚建成时，阻隔了中华鲟上溯产卵，中华鲟\n在坝上撞得头破血流，非常惨烈。中华鲟数量锐减，不得不\n进行人工孵化养殖。同时，大坝还破坏了青、草、鲢、鳙四\n大家鱼的天然产卵繁殖场，长江由过去年产四大家鱼200多\n亿尾降为仅10亿尾。名贵的鱼，因大坝建在其产卵场，十\n多年前就已在长江里消失了。\n美国最高法院的判决具有深厚的民意积淀，本案之后90\n%的民众说：“发电站可以建在别处，而蜗牛镖一旦灭绝将\n永不再生”。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 2.3协调发展原则\n（一）将环境保护工作切实纳入国民经济和社会发展规划\n我国是以公有制为基础的社会主义国家，环境保护是经济建\n设的重要组成部分。因此，在制定和实施发展规划时必须把环境\n保护目标和措施纳入国民经济和社会发展规划中，并加强监督指\n导。\n《环境保护法》第13条关于“县级以上人民政府应当将环境保护\n工作纳入国民经济和社会发展规划。环境保护规划与主体功能区\n规划、土地利用总体规划和城乡规划等相衔接”的规定。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 2.3协调发展原则\n从1953年开始的“一五”计划算起，中国编制实施国民经济\n和社会发展五年计划的框架体制，已有50多年的历史。从1953年\n到1982年我国实行的前五个五年计划中，都没有将环境保护列为\n国民经济和社会发展的一项内容，因此在这30年间，环境保护是\n各项建设比例失调中最严重的一环。\n1982年公布的第六个五年计划（1980-1985）中，首次将环境\n保护列为专门的一章，制定了“加强环境保护，制止环境污染的\n进一步发展”的目标，并提出了政策、法规、监督、管理和资金\n等五项措施。此后的“七五”、“八五”和“九五”计划中也都\n把环境保护列入了国民经济和社会发展计划，在“十五”计划\n（2000-2005）中，更是制定了“可持续发展”的战略方针。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 2.3协调发展原则\n例如，我国在“十五”计划中，规定了环境保护的任务\n和计划指标、对环境保护的方针政策、环境保护投资、主要\n保护措施等都作了具体的规定，这样，就可以从宏观上进行\n综合平衡、协调好经济、社会发展和环境保护之间的关系。\n同时，在国民经济和社会发展计划中，必须确定环境保\n护的资金数额或所占比例，以确保经济建设和环境保护协调\n发展。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n（二）各部门、国际合作，实行交流与援助，联合处理环境问题\n《环境保护法》第20条国家建立跨行政区域的重点区域、\n流域环境污染和生态破坏联合防治协调机制，实行统一规划、\n统一标准、统一监测、统一的防治措施。前款规定以外的\n跨行政区域的环境污染和生态破坏的防治，由上级人民政府\n协调解决，或者由有关地方人民政府协商解决。（区域联防\n\n#### 联控）\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 2.3协调发展原则\n（三）深入开展环境保护法制宣传教育\n我国目前已颁布了大量的环境保护方面的法律法规，而\n且都体现了经济、社会发展与环境保护相协调的原则。\n但实践中人们对环境保护认识不足，执法力度不够。有\n法不依、执法不严的现象较普遍。有些人特别是领导干部环\n境保护意识淡薄，缺乏生态观念，因而在建设项目中不是把\n环境保护设施挤掉了，就是上一些不配套的环保设施，并时\n常处于“休息”状态。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 2.3协调发展原则\n（三）深入开展环境保护法制宣传教育\n因此必须加强环境法制宣传教育，提高全民族的环境意识，\n特别是提高处在政治、经济决策地位的领导干部的环境意识。\n使人们明确认识到保护环境是我国的一项基本国策，认清经\n济、社会发展与环境保护相协调是客观规律的要求，正确处理环\n境保护与经济建设和社会发展的关系，把眼前利益和长远利益、\n局部利益和整体利益结合起来，遵守生态规律和经济规律，保证\n和促进环境保护和经济建设协调发展。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 2.3协调发展原则\n（四）加强环境科学技术研究、提高环境科学技术水平、保\n\n#### 证环境保护资金的投入\n环境科学技术是解决环境问题的重要手段，实现经济的发\n展与环境的改善只能依靠环境科学技术的进步。\n因此，必须加强环境科学技术方面的研究，针对当前存在\n的和将来可能出现的重大环境问题，重点研究开发、利用各种\n应用技术，并吸收国外的先进经验和技术，同时，要培养更多\n的环境方面的科技人才，并增加环境保护的资金投入。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 2.3协调发展原则\n（四）加强环境科学技术研究、提高环境科学技术水平、保\n\n#### 证环境保护资金的投入\n环境问题的解决，尤其是环境污染的治理，在根本上取\n决于环境科学技术的水平。只有不断地进行环境科学研究，\n开发出节能低耗、变废为宝、清洁生产的生产工艺以及能控\n制和治理环境污染、保护生态平衡的科研成果，才能使环境\n保护与经济、社会发展协调成为现实。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 2.3协调发展原则\n（四）加强环境科学技术研究、提高环境科学技术水平、保\n\n#### 证环境保护资金的投入\n秸秆是一种常见的农业生产废料，秸秆由草变宝的技术目前已\n经十分成熟。首先，秸秆可以变乙醇。华东理工大学颜涌捷教授负\n责的国家863重大课题 “纤维素废弃物制取乙醇技术”，已经\n可以从7吨至8吨秸秆中提炼出1吨燃料乙醇，如果普通汽油中加\n入10%到15%的燃料乙醇，燃烧效果仍同汽油一样；如果改一\n改发动机，燃料乙醇就能代替85%的汽油。其次，秸秆还可以发\n电。2吨秸秆的热值，相当于1吨煤，目前我国可作为能源用途的\n农作物秸秆近3亿吨，至少可替代近1.5亿吨煤炭。此外，秸秆还\n可以发酵“生”气、制成人造板材、新型轻质墙材以及造纸等。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 2.3协调发展原则\n（五）建立循环经济型社会\n环境问题的解决，尤其是环境污染的治理，在根本上取决\n于环境科学技术的水平。只有不断地进行环境科学研究，开发\n出节能低耗、变废为宝、清洁生产的生产工艺以及能控制和治\n理环境污染、保护生态平衡的科研成果，才能使环境保护与经\n济、社会发展协调成为现实。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 2.3协调发展原则\n（五）建立循环经济型社会\n传统经济遵循的是“资源一生产—消费一废弃物排放”，循环经\n济本质上是一种生态经济，它要求运用生态学规律来指导人类社会的\n经济活动；倡导的是一种建立在物质不断循环利用基础上的经济发展\n模式，它要求把经济活动组成一个“资源一产品一再生资源”的反馈\n流程，所有的物质和能源在这个不断进行的循环中得到合理持久的利\n用，以把经济对自然环境的影响降低到尽可能小的程度。\n例如，生态工业园区：通过模拟生态系统建立工业系统，生产\n者一消费者一分解者的循环途径和食物链网，采用废物交换，清洁生\n产等手段使一个企业生产的副产品或废物可用作另一个工厂的投入或\n原料，实现循环使用。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 2.3协调发展原则\n（六）严格立法、严格执法\n根据经济建设的发展、适时的修改我国现行《环境保护法》\n的有关条款。例如，将“环境保护同经济、社会发展相协调原\n则”修改为“使经济社会发展与环境保护相协调”原则。从根本\n上解决有法不依、执法不严的问题，保证环境保护工作有序健\n康地发展。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 2.3协调发展原则\n（六）严格立法、严格执法\n强化环境监督管理，一方面要做到环境管理的科学化，另一方\n面要加大环境污染与环境破坏的处罚力度，增大违法成本。\n株洲市的河西高新技术开发区，在创建之初，开发区管委会只\n考虑如何招商引资，把开发区办起来，但环境意识非常淡薄，国家\n明文规定的开发区环境影响评价，是在开发区建成两年之后，在市\n政府的严厉批评下才拨出钱上了马。经过检查发现，在开发区两年\n内引进的57个建设项目中仅有9个按国家规定进行了“三同时”建\n设。不少企业开始投产后，即给当地的环境造成了很严重影响。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 2.3协调发展原则\n（六）严格立法、严格执法\n其中一耗资6000万元，生产色拉油的厂家，于1996年6月开始试生\n产，但未上任何环保设施，废水直排湘江，造成了严重的农业损失；另\n有一家橡胶厂，未办理任何环保手续，小锅炉造成工厂四周浓烟滚滚，\n附近居民苦不堪言。\n株洲市的河西高新开发区就是因为招商引资不够理想，在项目选择\n上有些“饥不择食”，忽视了经济、社会发展与环境保护的协调，造成\n了生态破坏和环境污染，其教训是十分惨痛的。近些年株洲市已在下大\n力气对其进行整治，对一些对环境造成污染的企业予以关、停、整、改。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n### 2.3协调发展原则\n（七）探索编制自然资源资产负债表\n用绿色GDP的方法取代传统GDP以衡量国民经济与社会的发展。\n中共十八届三中全会提出要“探索编制自然资源资产负债表，对领\n导干部实行自然资源资产离任审计。”编制自然资源资产负债表，\n有助于全面揭示政府对各项资源的占有使用情况及负担能力，并明\n确相应的权利和责任主体，反映潜在的风险状况。\n通过对领导干部实行自然资源资产离任审计，将对政绩考核制\n度产生重大影响，并提高经济社会管理水平。\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n2.环境保护法的基本原则\n\n### 2.4环境责任原则（原因者负担原则）\n\n### 2.4.1概念\n《环境保护法》第6条：一切单位和个人都有保护环境的义\n务。地方各级人民政府应当对本行政区域的环境质量负责。\n企业事业单位和其他生产经营者应当防止、减少环境污染和\n生态破坏，对所造成的损害依法承担责任。公民应当增强\n环境保护意识，采取低碳、节俭的生活方式，自觉履行环境\n保护义务。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n2.环境保护法的基本原则\n\n### 2.4环境责任原则（原因者负担原则）\n（一）实行排污收费制度或征收污染税制度；\n（二）实行废弃物品再生利用和回收制度；\n（三）实行开发利用自然资源补偿费或税制度；\n（四）建立环境保护费用的共同负担制度。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n2.环境保护法的基本原则\n\n### 2.5公众参与原则\n\n### 2.5.1概念\n【公众参与原则】 （P61）：指公众有权通过一定的程\n序或途径参与一切与公众环境权益相关的开发决策等活动，\n并有权得到相应的法律保护和救济，以防止决策的盲目性、\n使得该项决策符合广大公众的切身利益和需要。\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n2.环境保护法的基本原则\n\n### 2.5公众参与原则\n\n### 2.5.1概念\n参与决策的公众的范围（P62-64）：\n（1）居民；\n（2）各类专业人士；\n（3）社会团体；\n（4）与拟议行为有关的行政机关。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n2.环境保护法的基本原则\n\n### 2.5公众参与原则\n\n### 2.5.2适用\n（一）在环境影响评价和其他涉及公众利益的许可程序中\n建立公众参与制度；\n建立决策信息公开与披露制度；\n鼓励各类非政府的环境组织代表公众参与环境决策；\n（四）建立公众参与的行政和司法保障制度。\n"}, {"id": "pdf-006-2-4-3", "group": "原始课件 · PDF原文", "title": "006-2.环境保护法的基本原则（4）-3. 环境利用行为的主体及其权利义务", "md": "# 3. 环境利用行为的主体及其权利义务\n\n> 来源: 006-2.环境保护法的基本原则（4）-3. 环境利用行为的主体及其权利义务.pdf\n> 页数: 8\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 目录\n3.环境利用行为的主体及其权利义务\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.1环境利用行为\n\n### 3.1.2环境法律关系\n\n### 3.2公民（自然人）与公众\n\n### 3.2.1概念\n\n### 3.2.2公众的环境权益\n\n### 3.2.3公民的环境保护义务\n\n### 3.3开发利用行为人\n\n### 3.3.1一般权利与义务\n\n### 3.3.2环境社会责任\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n### 3.1环境利用行为与环境法律关系 遭受2万倍辐射的人，究竟多痛苦？\n\n### 3.1.1环境利用行为 中国庭审公开网 qfSVtqPQfcg\n概念及分类（P67-69） %E6%B1%A1%E6%9F%93&pageNumber=1&pageSize=15&extType=\n【环境利用行为（environmentalutilizationbehavior）】是\n指人类为满足生存需要有意识地获取环境要素或者从环境要素中谋\n取利益的活动。\n从行为对环境是否产生不利影响的角度，本书将环境利用行为\n分为本能利用行为与开发利用行为两大类。\n（一）本能利用行为\n【本能利用行为（instinctiveutilizationbehavior）】是指行\n为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改\n变环境的活动。\n以基本生存为目的一一产生了环境权\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.1环境利用行为\n\n#### 概念及分类（P67-69）\n【开发利用行为（developmentandutilizationbehavior）】是指行为人以谋取环境容量与自然资源的经济利益\n为目的，向环境排放或者处理废弃物质与能量或者开发自然资源与\n能源等利用和改变环境状况的活动。\n根据开发利用行为的方式，可以将它们分为环境容量利用行为\n和自然资源利用行为两大类。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.1环境利用行为\n\n#### 概念及分类（P67-69）\n它们的区别在于前者以向环境排放污染物为特征、后者以索取\n环境要素（自然资源）为特征。\n1.环境容量利用行为\n【环境容量利用行为】是指经行政机关许可的特定主体（开\n发利用行为人）为牟取经济利益而利用环境容量、向环境排放污染\n物或抛弃废物的行为。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.1环境利用行为\n\n#### 概念及分类（P67-69）\n2.自然资源利用行为\n【自然资源利用行为】是指经行政机关许可的特定主体（开\n发利用行为人）为牟取经济利益从环境要素中获取利益的行为，如\n取水、伐木、狩猎、养殖、放牧以及修建水坝等。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.2环境法律关系\n一、概念（P69)\n【环境法律关系environmental legalrelation）】是环境利用行为主体\n间发生的具有权利义务内容的社会关系。\n环境法律关系的实质是受法律调整的环境利用关系，它们以主\n体在环境利用行为中的权利义务为基本内容。\n环境法律关系的主体是依法享有环境利用权利并承担环境保护\n义务的环境利用行为人以及代表国家行使环境监督管理权的行政机\n关。包括公民（自然人、公众及其代表）、各种开发利用行为人以\n及国家机关和政府及其环境主管部门等。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.2环境法律关系\n二、特征（P70-71）\n1.环境法律关系是具有多重牵连法律性质的环境利用关系；\n2.环境法律关系以人类平等地利用环境的权利和义务为内容；\n3.环境法律关系符合并体现了自然生态规律的人类意志。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 3.2公民（自然人）与公众\n"}, {"id": "pdf-007-3-3", "group": "原始课件 · PDF原文", "title": "007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务", "md": "# 3. 环境利用行为的主体及其权利义务\n\n> 来源: 007-3. 环境利用行为的主体及其权利义务-3. 环境利用行为的主体及其权利义务.pdf\n> 页数: 36\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n3.环境利用行为的主体及其权利义务\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年4月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 目录\n3.环境利用行为的主体及其权利义务\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.1环境利用行为\n\n### 3.1.2环境法律关系\n\n### 3.2.1概念\n\n### 3.2.2公众的环境权益\n\n### 3.2.3公民的环境保护义务\n\n### 3.3.1一般权利与义务\n\n### 3.3.2环境社会责任\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 3.1环境利用行为与环境法律关系 遭受2万倍辐射的人，究竟多痛苦？\n\n### 3.1.1环境利用行为 中国庭审公开网 qfSVtqPQfcg\n概念及分类（P67-69） %E6%B1%A1%E6%9F%93&pageNumber=1&pageSize=15&extType=\n【环境利用行为（environmentalutilizationbehavior）】是\n指人类为满足生存需要有意识地获取环境要素或者从环境要素中谋\n取利益的活动。\n从行为对环境是否产生不利影响的角度，本书将环境利用行为\n分为本能利用行为与开发利用行为两大类。\n（一）本能利用行为\n【本能利用行为（instinctiveutilizationbehavior）】是指行\n为人在自然状态下为了生存繁衍、适应环境变化所进行的利用和改\n变环境的活动。\n以基本生存为目的一一产生了环境权\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.1环境利用行为\n\n#### 概念及分类（P67-69）\n（二）开发利用行为\n【开发利用行为（developmentandutilizationbehavior）】是指行为人以谋取环境容量与自然资源的经济利益\n为目的，向环境排放或者处理废弃物质与能量或者开发自然资源与\n能源等利用和改变环境状况的活动。\n根据开发利用行为的方式，可以将它们分为环境容量利用行为\n和自然资源利用行为两大类。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 3.1环境利用行为与环境法律关系\n\n### 3.1.2环境法律关系\n一、概念（P69)\n【环境法律关系environmental legalrelation）】是环境利用行为主体\n间发生的具有权利义务内容的社会关系。\n环境法律关系的实质是受法律调整的环境利用关系，它们以主\n体在环境利用行为中的权利义务为基本内容。\n环境法律关系的主体是依法享有环境利用权利并承担环境保护\n义务的环境利用行为人以及代表国家行使环境监督管理权的行政机\n关。包括公民（自然人、公众及其代表）、各种开发利用行为人以\n及国家机关和政府及其环境主管部门等。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 3.2.1概念（P71-72）\n【公民（自然人）】：是指环境和自然资源的享受者或者是\n环境质量和生态效益（ecological benefit）的受益者。（个人）\n【公众】：一般指与开发利用环境行为及其结果有直接和间接\n利害关系的各种主体的统称。 （群体）\n【环境保护组织】：是指依法在设区的市级以上人民政府民\n政部门登记，专门从事环境保护公益活动连续五年以上且无违法\n记录的社会组织。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 3.2.2公众的环境权益\n一、公众环境权益的法律规定及其法律解析\n法律规定：2002年《环境影响评价法》首次将“公众环境权益”作\n为规划环评的内容；\n2009、2012、2016年三次在国务院发布的《国家人权行动计划》中，\n将其作为人权的重要组成部分。\n【公众环境权益】既是公民基本权利中与享受优美环境相关的、\n非独占性的权利和利益的集合，也是公民对其正常生活和工作环境\n享有的不受他人干扰和侵害的权利与利益。（包括共益权和自益权）\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 3.2公民（自然人）与公众 讨论一\n\n### 3.2.2公众的环境权益\n二、公众环境权益的内容\n（1）优美、舒适环境的享受权；\n（2）开发利用环境决策与行为知悉权；\n（3）开发利用环境决策建言权；\n4） 监督开发利用环境行为及其举报权；\n（5）环境权益侵害救济请求权\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 3.2.2公众的环境权益\n三、公众环境权益的内容\n\n#### 环境知情权、参与权和监督权\n\n#### 公众环境权益 环境违法举报权\n\n#### 环境民事公益诉讼\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 3.2.2公众的环境权益\n三、公众环境权益的内容\n\n#### 环境知情权、参与权和监督权\n《环境保护法》（2014年修订版）第53条第1款规定，公民、\n法人和其他组织依法享有获取环境信息、参与和监督环境保护\n的权利。该款规定宣示了公众参与环境保护的三项重要的程序\n性权利，即环境知情权、参与权和监督权。此外，该条第2款还\n相应规定，各级人民政府环境保护主管部门和其他负有环境保\n护监督管理职责的部门，应当依法公开环境信息、完善公众参\n与程序，为公民、法人和其他组织参与和监督环境保护提供便\n利。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 3.2.2公众的环境权益\n三、公众环境权益的内容\n\n#### 公众的环境违法举报权\n《环境保护法》（2014年修订版）第57条规定了公众对于\n环境违法行为的举报权。公民、法人和其他组织发现任何单位和\n个人有污染环境和破坏生态行为的，有权向环境保护主管部门或\n者其他负有环境保护监督管理职责的部门举报。公民、法人和其\n他组织发现地方各级人民政府、县级以上人民政府环境保护主管\n部门和其他负有环境保护监督管理职责的部门不依法履行职责的，\n有权向其上级机关或者监察机关举报。接受举报的机关应当对举\n报人的相关信息予以保密，保护举报人的合法权益。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 3.2.2公众的环境权益\n三、公众环境权益的内容\n\n#### 公共机构的环境信息发布职责\n《环境保护法》（2014年修订版）第54条规定了政府机关和其他公共\n服务机构的环境信息发布职责。国务院环境保护主管部门统一发布国家\n环境质量、重点污染源监测信息及其他重大环境信息。省级以上人民政\n府环境保护主管部门定期发布环境状况公报。县级以上人民政府环境保\n护主管部门和其他负有环境保护监督管理职责的部门，应当依法公开环\n境质量、环境监测、突发环境事件以及环境行政许可、行政处罚等信息。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 3.2.2公众的环境权益\n\n#### 曝光台\n三、公众环境权益的内容 行政处理 执法信息 通报\n\n#### 公共机构的环境信息发布职责\n·核安全行政处罚决定书（无锡市新峰管业有限公司\n城市空气质量实时全国空气质量预报 地表水水质实时 政府信息公开\n信息公开指南 信息公开制度 核级管配件制造过程违法违规案）\nAQI实时报 AQ旧报 断面名称 测量时间 水质类别\n2020年03月13日01时 黄白桥 03-12 23:00 IV 信息公开目录 依申请公开 ·江苏利思德新材料有限公司未取得登记证生产新化\n城市 AQI 首要污染物 汉公路桥 03-12 23:00 IV 学物质违规行为处罚情况\n\n#### 折州市 38 政务服务\n临汾市 72 PM10 海河大用 03-12 23:00 IV\n目事项目录 办事指南 ·山东四环药业股份有限公司和济南盛弘医药科技有\n昌梁市 74 PM10 北非水河防潮 03-12 23:00\n呼和浩特市 23 面运可防潮用 03-12 23:00 IV 常见问题 用户登录 限公司未取得登记证生产新化学物质违规行为处罚\n包头市 20 西屯桥 03-1223:00 互动交流 情况\n乌海市 40 平山桥 03-12 23:00\n\n#### 意见征集 部长信箱\n赤峰市 23 兆通 03-12 23:00 行政处罚决定书（国家无线电监测中心环境违法\n通辽市 37 南张村 03-1223:00 环境污染网上举报 12369环保举报 案）\n鄂尔多斯市 26 大国汀水库 03-12 23:00\n\n#### 呼伦贝尔市 25 廉政举报\n简可口 03-1223:00 TV ·责令改正违法行为决定书（成都中核高通同位素股\n\n#### 丰北用 中央和国家机关举报网站\n良 轻度污染 中度污染 03-12 23:00 份有限公司）\n重度污染 严重污染 生态环境部廉政举报\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 3.2.2公众的环境权益 中华人民共和国生态环境部\n三、公众环境权益的内容 新疆维吾尔自治区生态环境厅\n\n#### 公共机构的环境信息发布职责\n\n#### 中华人民共和国生态环境部\nMinistryofEcologyandEnvironmentof thePeople'sRepublicofChina 请输入您要搜索的内容 新疆维吾尔自治区生态环境厅 请铂入搜索关携字\n热门搜索：一带一路打好污染防治攻 热词：蓝天保卫战地表水水质环增保护税高拔慢素\n环境质量 颜 走进环保 环境质量 污染防治 生态保护 信息公开 网上办事 政民互动\n\n#### 当前位置：首页>环境质量\n\n#### 环境状况公报 更多+\n\n#### 生态环境状况公报\n中国生态环境状况公报 生态环境统计年报 中国海洋生态环境状况公报\n2015年环镇优写公司 2014年环境状况公服\n2015年环境统计年报 ·2010年环境统计年报 2018年环\n·2009年环境统计年报 环境机况热损2017 环境状况公报 2016\n·2014年环境统计年报\n·2013年环境统计年报 2008年环境统计年报\n·2012年环境统计年报 ·2007年环境统计年报\n2011年环境统计年报 2018年新疆维吾尔自治区 2017年新疆维吾尔自治区 2016年新疆维吾尔自治区 2015年新疆维吾尔自治区 2014年新疆维吾尔自治区\n·2006年环境统计年报 环境状况公报 环境状况公报 环境状况公报 环境状况公报 环境状况公报\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 3.2.2公众的环境权益\n三、公众环境权益的内容\n\n#### 环境违法“黑名单\"机制\n《环境保护法》（2014年修订版）第54条规定了环境违法企业的“黑\n名单”制度。即县级以上地方人民政府环境保护主管部门和其他负有环\n境保护监督管理职责的部门，应当将企业事业单位和其他生产经营者\n的环境违法信息记入社会诚信档案，及时向社会公布违法者名单。\n2013年12月，原环境保护部曾联合人民银行等部门发布了《企业环境\n信用评价办法（试行）》（环发[2013]150号），以推进企业环境信用\n评价工作，督促企业自觉履行环境保护法定义务和社会责任。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 3.2.3公民的环境保护义务（P78-79）\n1.关心和保护环境的一般义务\n《环境保护法》 （2014年修订版）夫 规定，一切单位和个人都有保\n护环境的义务。\n2.忍受一定限度环境污染或自然环境损害的特别义务\n一般情况下，容忍的判断标准是排放行为是否具有合法性，它\n以行为是否构成实质性影响为判断标准。\n是否应当许可或者忍受实质性影响，取决于两个条件：一是行\n为是否为当地通行，二是影响是否可以通过经济上可行的措施克服。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n一般权利：\n首先，要取得由政府特许的自然资源开发利用权或者向环境排放污\n染物的权利；\n然后，按照自然资源规划或者环境保护规划实施开发和利用环境的\n行为。\n义务：\n接受国家对它们开展的宏观调控和管理监督；\n当环境利用行为触犯国家和地方环境保护法律法规时，还必须接受\n国家依法对它们实行的制裁；\n当向环境排放污染物造成环境损害或者开发自然资源造成自然破环\n时，还应当依法承担相应的民事责任。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n（一）开发利用自然资源的权利与义务\n《环境保护法》（2014年修订版）第30条规定，开发利用自然资\n源，应当合理开发，保护生物多样性，保障生态安全，依法制定有\n关生态保护和恢复治理方案并予以实施。引进外来物种以及研究、\n开发和利用生物技术，应当采取措施，防止对生物多样性的破坏。\n《环境保护法》（2014年修订版）第6条第3款、第36条、第40条\n第3款明确规定了企业事业单位和其他生产经营者应当防止、减少环\n境污染和生态破坏，对所造成的损害依法承担责任；使用有利于保\n护环境的产品和再生产品；优先使用清洁能源，采用资源利用率高、\n污染物排放量少的工艺、设备以及废弃物综合利用技术和污染物无\n害化处理技术等。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n（二）利用环境容量排污的权利与义务\n【利用环境容量排污的权利又称排污权（emissionright）】\n它是环境主管部门依法赋予排污者依照法律规定的污染物排放（控\n制）标准向环境排放污染物的权利，而非宪法上的基本权利。\n义务：遵守行政机关依法许可的排污范围、排污方法、排污途径以\n及按照排污标准所限定的种类、浓度和数量等排放污染物，并依法\n履行环境影响评价和“三同时”、排污许可、缴纳排污费税、接受现场\n检查等法定义务。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n（二）利用环境容量排污的权利与义务\n《环境保护法》（2014年修订版）第42条第1款进一步规定，\n排放污染物的企业事业单位和其他生产经营者，应当采取措施，\n防治在生产建设或者其他活动中产生的废气、废水、废渣、医疗\n废物、粉尘、恶臭气体、放射性物质以及噪声、振动、光辐射、\n电磁辐射等对环境的污染和危害。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### 企业环保责任制\n《环境保护法》 （2014年修订版）第42条第2款规定，排放污染\n物的企业事业单位，应当建立环境保护责任制度，明确单位负责人和\n相关人员的责任。单位负责人或相关人员没有履行环保职责而造成污\n染事故发生的，应承担相应的法律责任。\n【单位负责人】指排污单位的主要负责人，是排污单位环境保护\n工作的总负责人，在排污单位内全面负责环境保护工作，对相关责任\n人员进行指导、监督，落实环境保护管理制度。\n【相关人员】指排污单位的环境监督员等人员。环境监督员具体\n负责排行单位的污染防治、日常检查等环境保护工作。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n（二）利用环境容量排污的权利与义务\n重点排污单位的环境监测义务及其违法责任\n《环境保护法》（2014年修订版）第42条第3款规定，重点\n排污单位应当按照国家有关规定和监测规范安装使用监测设备，\n保证监测设备正常运行，保存原始监测记录。\n重点排污单位包括国家监控的重点排污单位和地方监控的重\n点排污单位，具体名录由国家环境保护行政主管部门和地方环境\n保护行政主管部门公布。\n执行监测记录包括监测各环节的原始记录、委托监测相关记\n录、自动监测设备运行维护记录。各类记录内容应当完整，由相\n关人员签字，并妥善保存。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### 严禁逃避监管违法排污\n《环境保护法》（2014年修订版）第42条第4款规定，严禁通过暗管、\n渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防治污\n染设施等逃避监管的方式违法排放污染物。\n《环境保护法》（2014年修订版）第63条和第69条分别规定，通过暗\n管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防\n治污染设施等逃避监管的方式违法排放污染物的企业事业单位和其他\n生产经营者，尚不构成犯罪的，除依照有关法律法规规定予以处罚外，\n由县级以上人民政府环境保护主管部门或者其他有关部门将案件移送\n公安机关，对其直接负责的主管人员和其他直接责任人员，处10日以\n上15日以下拘留；情节较轻的，处5日以上10日以下拘留。构成犯罪的，\n依法追究刑事责任。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### 重点排污单位的环境信息公开义务\n《环境保护法》（2014年修订版）第55条新增规定，重点排\n污单位应当如实向社会公开其主要污染物的名称、排放方式、排\n放浓度和总量、超标排放情况，以及防治污染设施的建设和运行\n情况，接受社会监督。2014年12月，原环境保护部配套制定了\n《企业事业单位环境信息公开办法》（原环境保护部令第31号）。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n（二）利用环境容量排污的权利与义务\n应当纳入重点排污单位名录的企事业单位种类\n根据《企业事业单位环境信息公开办法》第7条的规定，设区\n的市级人民政府环境保护主管部门应当于每年3月底前确定本行政\n区域内重点排污单位名录，并通过政府网站、报刊、广播、电视等\n便于公众知晓的方式公布。\n环境保护主管部门确定重点排污单位名录时，应当综合考虑本\n行政区域的环境容量、重点污染物排放总量控制指标的要求，以及\n企业事业单位排放污染物的种类、数量和浓度等因素。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n（二）利用环境容量排污的权利与义务\n应当纳入重点排污单位名录的企事业单位种类\n根据该办法第8条的规定，具备下列条件之一的企业事业单位，应\n当列入重点排污单位名录：\n（1）被设区的市级以上人民政府环境保护主管部门确定为重点监控企\n业的；\n（2）具有试验、分析、检测等功能的化学、医药、生物类省级重点以\n上实验室、二级以上医院、污染物集中处置单位等污染物排放行为引\n起社会广泛关注的或者可能对环境敏感区造成较大影响的；\n（3）三年内发生较大以上突发环境事件或者因环境污染问题造成重大\n社会影响的；\n（4）其他有必要列入的情形。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n（二）利用环境容量排污的权利与义务\n重点排污单位应当公开的环境信息的种类\n根据《企业事业单位环境信息公开办法）第9条的规定，重点排污单\n位应当公开下列信息：\n（1）基础信息；\n（2）排污信息；\n（3）防止污染设施的建设和运行情况；\n（4）建设项目环境影响评价及其他环境保护行政许可情况；\n（5）突发环境事件应急预案；\n（6）其他应当公开的环境信息。\n此外，列入国家重点监控企业名单的重点排污单位还应当公开其环境自\n行监测方案。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### 重点排污单位环境信息公开的方式\n根据《企业事业单位环境信息公开办法》第10条的规定，重点排污\n单位应当通过其网站、企业事业单位环境信息公开平台或者当地报刊等\n便于公众知晓的方式公开环境信息，同时可以采取以下一种或者几种方\n式予以公开：\n（1）公告或者公开发行的信息专刊；\n（2）广播、电视等新闻媒体；\n（3）信息公开服务、监督热线电话；\n（4）本单位的资料索取点、信息公开栏、信息亭、电子屏幕、电子触\n摸屏等场所或者设施；\n（5）其他便于公众及时、准确获得信息的方式。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### 重点排污单位环境信息公开的时限\n根据《企业事业单位环境信息公开办法》第11条的规定，重\n点排污单位应当在环境保护主管部门公布重点排污单位名录后90\n日内依法公开其环境信息；环境信息有新生成或者发生变更情形\n的，重点排污单位应当自环境信息生成或者变更之日起30日内予\n以公开。但是，法律、法规另有规定的，从其规定。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n（二）利用环境容量排污的权利与义务\n重点排污单位环境信息公开的违法行政责任\n根据《企业事业单位环境信息公开办法》第11条的规定，重点排污\n单位违反该办法的规定，有下列行为之一的，由县级以上环境保护主管\n部门根据《环境保护法》的规定责令公开，处3万元以下罚款，并予以\n公告：\n（1）不公开或者不按照该办法第9条规定的内容公开环境信息的；\n（2）不按照该办法第10条规定的方式公开环境信息的；\n（3）不按照该办法第11条规定的时限公开环境信息的；\n（4）公开内容不真实、弄虚作假的。\n法律、法规另有规定的，从其规定。\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### 企业环境应急管理\n《环境保护法》（2014年修订版）新增第47条规定要求，各级人\n民政府及其有关部门和企业事业单位应当依照《突发事件应对法》\n的规定，做好突发环境事件的风险控制、应急准备、应急处置和\n事后恢复等工作。企业事业单位应当按照国家有关规定制定突发\n环境事件应急预案，报环境保护主管部门和有关部门备案。在发\n生或者可能发生突发环境事件时，企业事业单位应当立即采取措\n施处理，及时通报可能受到危害的单位和居民，并向环境保护主\n管部门和有关部门报告。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### A公司环境监测数据弄虚作假案\n\n#### 案情概述\nA公司主营捣固焦、粗苯、焦油等产品，是B市重要化工企业之一。2015年\n4月22日，B市环保局与市公安局环保支队混合编队，对A公司污染物排放情况\n进行了全面检查。检查发现，A公司部分高浓度焦化生产废水未经任何处理，\n直接用于熄焦，属典型的恶意偷排偷放。此外，A公司一期工程150t/h燃煤锅\n炉自动监控设备段二氧化硫值为35-90mg/m3之间，烟尘为45mg/m3，环保局\n现场手工监测二氧化硫值为166-172mg/m3之间，烟尘为194mg/m3；二期工程\n75t/h燃煤锅炉自动监控设备烟尘值为66mg/m3，环保局现场手工监测烟尘为\n163mg/m3，存在焦炉超标排放、燃煤锅炉在线监测数据造假、烟尘超标排放\n等问题。B市环保局依法作出处罚决定，对A公司处以145万元罚款并没收违法\n保证金100万元；因A公司肆意修改在线监控数据，其主管环保的经理张某某、\n仪表部经理胡某被依法行政拘留7日。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### A公司环境监测数据弄虚作假案\n\n#### 核心问题\n《环境保护法》对企业环境监测的义务作出了哪些基本规定？\n对于环境监测弄虚作假的行为人是否可以依法予以行政拘留？\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n（二）利用环境容量排污的权利与义务\n\n#### A公司环境监测数据弄虚作假案\n\n#### 简要评论\n《环境保护法》第42条明确规定，重点排污单位应当按照国家有关规定和\n监测规范安装使用监测设备，保证监测设备正常运行，保存原始监测记录。严禁\n通过暗管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正常运行防治污\n染设施等逃避监管的方式违法排放污染物。对于通过暗管、渗井、渗坑、灌注\n或者篡改、伪造监测数据，或者不正常运行防治污染设施等逃避监管的方式违\n法排放污染物的企业事业单位和其他生产经营者，构成犯罪的，依法追究刑事\n责任；尚不构成犯罪的，除依照有关法律法规规定予以处罚外，由县级以上人民\n政府环境保护主管部门或者其他有关部门将案件移送公安机关，对其直接负责\n的主管人员和其他直接责任人员，处10日以上15日以下拘留；情节较轻的，处\n5日以上10日以下拘留。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n### 3.3.2开发利用行为人的环境社会责任\n（一）概念\n【开发利用行为人环境社会责任】是指从事开发利用行为人作\n为一类社会群体对社会以及其他公众除强制性法律规范外的环境保\n护义务。\n两个特征：\n第一，责任主体为从事开发利用环境行为（排污或者开发资源）的\n人，它们同时也属于公众的范畴，是社会群体的一种类型；\n第二，这种责任并非来源于法律的强制性规范，而是开发利用行为\n人用以维系和调整与本能利用环境的社会公众之间和谐关系的一种\n道义。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n### 3.3.2开发利用行为人的环境社会责任\n（二）开发利用行为人环境社会责任的内容\n1.通过环境保护质量体系认证或获得绿色标签认定；\n2.推行清洁生产；\n3.主动对外宣示开发利用行为人环境保护守则。\n"}, {"id": "pdf-008-4-4", "group": "原始课件 · PDF原文", "title": "008-4. 国家的环境保护义务-4. 国家的环境保护义务", "md": "# 4. 国家的环境保护义务\n\n> 来源: 008-4. 国家的环境保护义务-4. 国家的环境保护义务.pdf\n> 页数: 12\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n4.国家的环境保护义务\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年4月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 目录\n4.国家的环境保护义务\n\n### 4.1国家的环境保护义务概述\n\n### 4.1.1作为义务\n\n### 4.1.2不作为义务\n\n### 4.1.3给付义务\n\n### 4.2环境行政\n\n### 4.2.1环境行政管理体制\n\n### 4.2.2环境保护的行政管理手段\n\n### 4.2.3生态环境损害民事索赔权\n\n### 4.3环境司法\n\n### 4.3.1环境审判\n\n### 4.3.2环境检察\n\n### 4.4执政党中央与中央政府履行国家环境保护义务的政策手段\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n环境资源法学中国大学MOOC（慕课）\n\n### 4.1国家的环境保护义务概述\n1449277162?tid=1449696441#/learn/content\n国家环境保护义务主要通过环境立法、环境行政以及环境司\n法等国家机关的活动来实现。\n\n### 4.1.1作为义务（积极）（P84-85）\n【环境保护的积极作为义务】是指国家应当通过环境政策和\n法律手段直接实施规制污染环境和破坏生态行为及防御环境破坏\n风险行为，以维护公民的环境权益。\n国家的环境保护义务不限于对开发利用行为人行为的直接控\n制或者间接诱导，还需要政府通过制定相应的环境政策来落实，\n通过设立相应的环境保护行政机关来主管和协调。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 4.1国家的环境保护义务概述 国庆大阅兵令人叹为观止！\n\n### 4.1.2不作为义务（消极） (P85-86) 475039393&wfr=spider&for=pc\n【防止环境破坏的消极不作为义务】是指国家应当事实上减少\n或避免作出自身行为造成污染环境和破坏生态的行为，采取措施阻\n止或防止针对公民环境权益的私人侵害。\n首先，国家不得以国家行为危害环境。\n其次，国家应接受环境主管部门的管理，尊重和遵守环境法规。\n再次，是监控义务。\n最后，保障环境行政决策的正当化、建立环境情报公开制度和\n保障公众参与环境决策。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 4.1国家的环境保护义务概述 提供环境公共服务\n\n### 4.1.3给付义务（P86） 职能：环境监管\n【环境保护的给付义务】是指国家应当积极履行对公民的\n生存保障义务，提供和保障公民享受最低环境质量要求的条件。\n第一，国家有维护最低环境质量，不断改善环境质量的义\n务。——基本生存\n第二，排除危害和预防环境风险。\n《美丽中国》第四集：绿色持续发展是高质量发展最生动的表达CCTV节目官网-纪录片_央视网\n(ccty.com)\n24871139.PT8hUEEDkoTi.0.0\n聚焦_生态文明美丽中国_新闻频道_央视网（cctv.com）\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 多选题3分\n国家环境保护义务主要通过哪些国家机关的活动来实现？\n\n#### 环境立法\n\n#### 环境行政\n\n#### 环境司法\n\n#### 行政处罚\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.1环境行政管理体制\n（一）环境行政是政府的基本职能；\n（二）中国中央政府环境行政机构的发展—生态环境部的\n职责（P89）；\n（三）地方各级人民政府的环境保护责任；\n（四）县级以上地方人民政府环境保护行政主管部门的职责\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（一）环境与自然资源开发利用决策权\n【开发利用环境与资源决策权】（P91）：指由国家环\n境、资源与能源法律法规授权的政府及其主管部门，就开发\n利用与保护环境与资源制定策略、编制规划以及发布命令并\n组织实施的行政权力。\n特点：（1）科技关联性；\n（2）利益冲突性。 环境规划决策分析\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（二）开发利用环境与资源及其相关行为许可权（P92-93）\n【开发利用环境与资源许可权（也称审批权）】：指\n由国家环境、资源与能源法律法规授权的政府及其主管部门，\n赋予申请人实施开发利用环境资源的权利或者资格的行政权\n力。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（三）开发利用环境与资源监督管理权（P93-94）\n【开发利用环境与资源监督管理权】：指由国家环境、\n资源与能源法律法规授权的政府及其主管部门以及经授权的\n行政执法机构，通过现场检查与实地调查、实行环境监测等\n方式，对开发利用环境行为实行监督管理的行政权力。\n生态环境部出台新规今后环保执法将全过程记录\n全国人大常委会环境保护法执法检查组第一次全体会议发言（经济日报）\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（四）规章制定权、行政强制权与行政处罚权（P95-97）\n生态环境部：防范权力滥用出台行政处罚新规\n最高罚200万！一文盘点10种常见环境违法行为及最高罚款金额\n问题：环境主管部门是否有权责令停业、关闭排污企业？\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（四）规章制定权、行政强制权与行政处罚权（P95-97）\n案例4.2.1A企业自2006年5月8日以来一直闲置治污设备超标排\n污，直到12月7日被环保部门监测发现。环保部门依法给予2万元\n处罚并责令A立即改正。A经内部测算发现，超标排污每个月节\n省的治污成本为20万元，于是在缴纳了罚款之后仍然闲置治污设\n备。12月10日环保部门复查发现A企业仍在超标排污，于是决定\n再次对A进行处罚。A认为其生产设备是持续运转的，这次超标\n排污与上次超标排污属于同一行为，根据“一事不再罚”原则，\n不应再次受到处罚。\n讨论一：你认为立法和执法时如何处理连续违法行为最合理？\n"}, {"id": "pdf-009-4-2-4", "group": "原始课件 · PDF原文", "title": "009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务", "md": "# 4. 国家的环境保护义务\n\n> 来源: 009-4. 国家的环境保护义务 （2）-4. 国家的环境保护义务.pdf\n> 页数: 17\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n4.国家的环境保护义务\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年4月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 目录\n4.国家的环境保护义务\n\n### 4.1国家的环境保护义务概述\n\n### 4.1.1作为义务\n\n### 4.1.2不作为义务\n\n### 4.1.3给付义务\n\n### 4.2环境行政\n\n### 4.2.1环境行政管理体制\n\n### 4.2.2环境保护的行政管理手段\n\n### 4.2.3生态环境损害民事索赔权\n\n### 4.3环境司法\n\n### 4.3.1环境审判\n\n### 4.3.2环境检察\n\n### 4.4执政党中央与中央政府履行国家环境保护义务的政策手段\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 4.2环境行政\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济（P97-100）\n1.环境行政的正当程序\n包括：（1）信息公开；\n（2）公众参与；\n（3）说明决策的理由；\n（4）公布周知。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济（P97-100）\n环境行政主体：是依法享有国家行政职权、能代表国家独立\n进行环境行政管理并独立参加环境行政公益诉讼的组织。\n环境行政执法：是行政执法活动的重要组成部分，是指环境\n行政主体依照法定的职权与程序对环境行政相对人所实施的\n具有法律约束力的具体行政行为。\n环境行政执法的具体形式有：环境行政许可、排污收费、现\n场检查、“三同时”验收、环境行政确认、环境行政处罚等。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济（P97-100）\n环境行政主体违法问题：\n1.现实中存在的违法行政行为\n执法主体滥用职权，在执法的过程中违反法定程序，越\n权行政，执法主体不适合，失职或不作为，使用的证据不确\n实充分，定性不准确，适用法律不准确，行政处罚不恰当等。\n2.违法行政行为的原因：\n（1）环保立法障碍\n1环保立法中部门本位主义思想严重。\n）环境立法之间关系的不协调。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n2.违法行政行为的原因：\n《环境保护法》着重于解决环境污染问题，行政诉讼时效为15\n天。“当事人对行政处罚决定不服的，可以在接到处罚通知之日起\n十五日内，同作出处罚决定的机关的上一级机关申请复议；对复议\n决定不服的，可以在接到复议决定之白起十五日内，向人民法院起\n诉。当事人也可以在接到处罚通知之日起十五日内，直接向人民法\n院起诉。当事人逾期不申请复议、也不向人民法院起诉、又不履行\n处罚决定的，由作出处罚决定的机关申请人民法院强制执行。\n《森林法》《渔业法》为30天《森林法》第十七条当事人对\n人民政府的处理决定不服的，可以在接到通知之日起一个月内，\n向人民法院起诉。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n2.违法行政行为的原因：\n（2）环境管理体制不完善\n\n#### ①环境管理机构设置重复\n各部门分工管理----统一监督管理与分工负责相结合。\n\n#### 环境监测数据不一致\n\n#### ②政府行使了环保部门的部分职权\n《大气污染防治法》第二十条在大气受到严重污染，危害人体健康\n和安全的紧急情况下，当地人民政府应当及时向当地居民公告，采\n取强制性应急措施，包括责令有关排污单位停止排放污染物。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n2.违法行政行为的原因：\n（3）环保部门执法权限的设置问题\n\n#### ①各职能部门执法权的配置不恰当\n如：各部门利益冲突 法律规定项目建设要先由环保部门先审批通过，其\n他部门再审批，而现实中.....\n\n#### ②环保部门缺乏必要的强制执行权\n（4）环保部门的民主性，透明度不高\n（5）未形成强有力的监督机制\n（6）环保部门自身建设落后\n①环保法制机构欠缺；②环保投入不足；\n2000- 2005年我国环保投入为5800亿元，占同GDP的1.2%\n\n#### ③环境行政人员专业化素养不高\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 4.2环境行政\n\n#### 问卷\n\n### 4.2.2环境保护的行政管理手段\n（五）不服环境、资源与能源行政的救济 （P97-100)\n2.不服环境行政的救济措施\n【环境行政纠纷】的焦点：环境行政主体的行政行为是否合\n法、合理（是否侵权）。\n环境行政复议：依申请的行为，环境行政机关只能依据公民、\n法人或者其他组织的申请而作出行政复议行为，不能在无申\n请的情况下主动作出。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.2环境保护的行政管理手段\n2.不服环境行政的救济措施\n【环境行政复议】：指公民、法人或者其他组织认为环境具体行政行\n为侵犯其合法权益，向环境行政机关提出行政复议申请，行政复议机\n关依法对该具体行政行为进行合法性、合理性审查并作出行政复议决\n定的活动。\n【环境行政诉讼】：指公民、法人或者其他组织认为环境行政机关的\n具体行政行为侵犯其合法权益时，依法向人民法院提起诉讼，由人民\n法院进行审理并作出裁判的活动。\n环境行政诉讼的核心是，审理具体行政行为的合法性，一般不包括对\n具体行政行为合理性的审查。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n环境行政复议和环境行政诉讼的区别？\n·不同点：\n（1）性质不同\n（2）解决行政争议的过程不同\n（3）当事人不服行政复议决定时，向人民法院起诉，起诉一经人\n民法院受理，就引起第一审程序的开始，不服行政复议的一方当事\n人为原告；而当事人不服人民法院一审判决时，只能依法提起上诉，\n引起上诉程序的开始，不服第一审法院判决的一方当事人此时称为\n上诉人而不再称为原告。\n（4）审查结果不同，行政复议决定可以维持、也可以变更原决定，\n而行政诉讼判决一般不能变更原决定，原则上只能维持或者撤消被\n诉的具体行政行为。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 4.2环境行政\n\n### 4.2.3代表国家行使生态环境损害民事索赔权\n（一）对生态破坏及其损失认识的发展一生态补偿制度\n探索中国特色生态补偿制度体系_光明网\n12/17/c0ntent33406914.htm\n千岛湖，生态补偿的惊艳之作好看视频\n生态环境部部长：去年中央拿出50亿元推动长江流域生态补偿2019两会3月11日精彩视频腾\n\n#### 讯视频\n（二）行使环境与资源保护监督管理权的部门是代表国家进行索赔诉\n\n#### 讼的适格主体\n（三）试行中的生态环境损害赔偿制度\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 4.3环境司法\n\n### 4.3.1环境审判\n【环境审判】是人民法院依照法定程序对涉及环境污染和生态破坏\n的行政、民事和刑事诉讼案件进行审理并判决的活动。\n2014年6月，最高人民法院成立了环境资源审判庭。\n审理方式：原有审判机构承担和专门审判机构承担两种方式。\n最高法召开环境资源审判庭成立五周年发布会-中华人民共和国最高人民法院\n最高人民法院发布《中国环境资源审判（2016-2017）》（白皮书）\n\n#### 中国庭审公开网\ncityCode=&caseCause=&unUnionIds=&label=-\n1&courtCode=&catalogId=&dataType=&pageSize=15&address=&timeFlag=&caseType=&courtType=&\npageNumber=1&extType=&isOts=\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 4.3环境司法\n\n### 4.3.2环境检察\n【环境检察】是人民检察院依照法定程序审查被检举的破坏环境与\n资源保护犯罪事实并提起诉讼，依法认定和处理违反环境保护法规的\n玩忽职守罪和直接受理立案侦查的环境监管失职罪，为履行民事和行\n政法律监督职责审查一定法律事实以及依法提起环境公益诉讼等的活\n动。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 4.3环境司法\n\n### 4.3.2环境检察\n案例4.3.2内蒙古自治区林西县人民检察院诉林西县国土资源局行政\n\n#### 公益诉讼案\n\n#### 基本案情\n内蒙古自治区林西县人民检察院在履行职责中发现，李殿有自\n1999年起与林西县隆平农场、林西县大井镇多次签订沸石开采合同，\n在未办理采矿许可证及其他相关手续的情况下，在大井镇红星村牧场\n后山非法开采沸石，每年生产沸石大约2000吨，总面积为28亩，矿\n坑最深处达到7.8米。林西县国土资源局多次向李殿有下达了责令停\n产、没收非法开采矿产品并处罚金的行政处罚决定，而违法行为人李\n殿有上交罚款后，并未停止采矿，林西县国土资源局存在怠于履行职\n责行为。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 4.3环境司法\n\n### 4.3.2环境检察\n案例4.3.2内蒙古自治区林西县人民检察院诉林西县国土资源局行政\n\n#### 公益诉讼案\n诉讼过程：为保护国家矿产资源，营造良好的矿山地质和生态环\n境，促进行政机关依法行政，全面履职，维护国家利益。林西县人民\n检察院于2016年12月9日依法向林西县人民法院提起行政公益诉讼，\n请求确认林西县国土资源局对李殿有的非法采矿行为未积极履行职责\n违法，并判令林西县国土资源局继续履行对李殿有非法采矿行为进行\n监督管理的法定职责。2016年12月23日，林西县人民法院对本案进行\n了公开开庭审理，查清案件事实后当庭宣判，支持林西县人民检察院\n的全部诉讼请求，判决确认林西县国土资源局未积极履行职责违法，\n并判令其对李殿有的非法采矿行为继续履行监督管理法定职责。\n"}, {"id": "pdf-009-4-2-5", "group": "原始课件 · PDF原文", "title": "009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度", "md": "# 5. 环境基本法与综合性环境法律制度\n\n> 来源: 009-4. 国家的环境保护义务 （2）-5. 环境基本法与综合性环境法律制度.pdf\n> 页数: 4\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n5.环境基本法与综合性环境法律制度\n\n#### 杨建英\n\n#### 2026年4月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n### 5.1概述\n\n### 5.1.1环境基本法的概念（P111）\n【环境基本法】：是指在一国环境保护法律体系内，由国家立\n法机关制定的、与单项环境保护法律相对应处于最高位阶的，包\n含国家环境政策目标、基本原则和基本策略等内容的综合性环境\n保护法律。\n（一）产生背景\n（二）内容\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n（一）环境保护法基本制度的由来\n【制度】：一般指法则、执行机制和机构的总称。\n【政策】：指执政者在一定时期确立的目标或希望达到的结\n果，不具备法的约束力，但可以对制度的执行和变革产生影响；\n【原则】：指由法律确立的行为模式或行为准则，具有法的\n约束力，同时在执行中可能要求执政者采取有利于制度的政策。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n【基本制度】：指按照环境与资源保护立法的目的和基本\n原则确立的、普遍适用于环境与资源保护各个领域的法律规\n范的总称。环境与资源保护法基本制度具有共通性，在所有\n环境与资源保护的立法、行政和司法中都要体现和实施。\n【特别制度】：指在各单项环境与资源保护立法中为实现\n立法目的而确立的具有领域性、针对性和特殊性的法律措施\n和方法的总称。\n"}, {"id": "pdf-010-5-5", "group": "原始课件 · PDF原文", "title": "010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度", "md": "# 5. 环境基本法与综合性环境法律制度\n\n> 来源: 010-5. 环境基本法与综合性环境法律制度-5. 环境基本法与综合性环境法律制度.pdf\n> 页数: 23\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n5.环境基本法与综合性环境法律制度\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年4月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n（一）环境保护法基本制度的由来\n【制度】：一般指法则、执行机制和机构的总称。\n【政策】：指执政者在一定时期确立的目标或希望达到的结\n果，不具备法的约束力，但可以对制度的执行和变革产生影响；\n【原则】：指由法律确立的行为模式或行为准则，具有法的\n约束力，同时在执行中可能要求执政者采取有利于制度的政策。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n【基本制度】：指按照环境与资源保护立法的目的和基本\n原则确立的、普遍适用于环境与资源保护各个领域的法律规\n范的总称。环境与资源保护法基本制度具有共通性，在所有\n环境与资源保护的立法、行政和司法中都要体现和实施。\n【特别制度】：指在各单项环境与资源保护立法中为实现\n立法目的而确立的具有领域性、针对性和特殊性的法律措施\n和方法的总称。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 5.1.2环境保护法的基本制度（4.29）\n环境与资源保护法的基本制度是调整环境资源社会关系的\n行政、经济、技术等手段和措施法律化的体现，是一个综合各\n种调整手段的法律规范体系。\n环境与资源保护法的基本制度是具有法律效力的规范体系，\n一切享用生态环境和开发利用自然资源的组织和个人都必须严\n格遵守这些制度。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n（二）环境法基本制度的分类\n环境保护法的基本制度是从不同的环境资源保护领域发展起\n来的，根据环境与资源保护法的基本制度适用范围和调整对象的\n不同，大致可以分为两大类：\n一类是环境保护基本法律制度；另一类是自然资源保护基本\n法律制度。环境基本法律制度的划分是相对的，在适用这些制度\n时没有绝对的界限。如规划制度，许可证制度既是环境保护的基\n本法律制度，又是自然资源保护的基本法律制度，只是在适用这\n些制度时侧重点不同而己。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n（三）环境保护法的基本制度在我国环境执法司法和守\n\n#### 法的过程中发挥着重要的作用\n1979年《环境保护法（试行）》首先规定了环境影响评价\n制度（第6条）、环境规划制度（第7条）、征收排污费制度（第\n18条）、“三同时”制度（第6条）和环境标准制度（第18条、第\n19条）等。\n在借鉴国外先进的立法成果和总结本国环境立法经验的基\n础之上，1989年《环境保护法》在第二章专章对环境法的基本\n制度作出了规定，使环境保护法基本制度体系进一步丰富。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n（四）环境保护法基本制度的确立\n\n#### 环境标准制度\n\n#### 环境规划制度\n\n#### 环境影响评价制度\n\n#### 环境费和环境税制度\n\n#### 突发环境事件应急管理制度\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 5.1.2环境保护法的基本制度\n环境保护法的基本法律制度主要是根据以下原理进行确定：\n1、具体体现环境与资源保护法的基本原则；\n2、具体反映环境与资源保护法律的共通性和本质性的法律\n措施；\n3、依据基本国情和社会经济发展水平，通过对法的“立、\n改、废”逐步完善。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 5.2环境标准制度\n\n#### 环境质量标准\n\n#### 强制性标准\n\n#### 污染物排放（控制）标准\n\n#### 环境监测方法标准\n\n#### 推荐性标准 环境标准样品标准\n\n#### 环境基础标准\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 5.2环境标准制度\n环境质量标准、污染物排放（控制）标准属于强制性环\n境标准，必须执行；除此以外的环境标准属于推荐性环境\n标准，推荐性环境标准如果被强制性环境标准，也必须强\n制执行。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 5.2环境标准制度\n\n#### 标准中华人民共和国生态环境部\n《环境空气质量标准（GB3095—2012）》\n《纯碱工业污染物排放标准（HJ1017-2019）》\n地方环境保护标准DB714/index.html\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 5.2环境标准制度\n\n### 5.2.1强制性环境标准\n（一）环境质量标准\n《环境保护法》（2014修订版）第十五条国务院环境保护主管部\n门制定国家环境质量标准。省、自治区、直辖市人民政府对国家\n环境质量标准中未作规定的项目，可以制定地方环境质量标准；\n对国家环境质量标准中已作规定的项目，可以制定严于国家环境\n质量标准的地方环境质量标准。地方环境质量标准应当报国务院\n环境保护主管部门备案。国家鼓励开展环境基准研究。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 5.2环境标准制度\n\n### 5.2.1强制性环境标准\n（一）环境质量标准\n按环境要素分：有水质量标准、大气质量标准、土壤质量标准和生\n物质量标准四类，每一类又按不同用途或控制对象分为各种质量标准。\n水质量标准按水体类型分为地面水质量标准、海水质量标准和地\n下水质量标准等；按水资源的用途分为生活饮用水水质标准、渔业用\n水水质标准、农业用水水质标准、娱乐用水水质标准和各种工业用水\n水质标准等。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 5.2环境标准制度\n\n### 5.2.1强制性环境标准\n\n#### 表1水环境质量标准的种类\n\n#### 编号 名 称 行业 备\nGB3838-2002 地面水环境质量标准 国家 取代GB3838-1988与\n\n#### GHZB1-1999\n\n#### 目前重新修订，拟修订\nSL63-1994 地表水资源质量标准 水利 为：水资源质量标准（含\n\n#### 地下水）\nGB/T14848-1993 地下水质量标准 国家 推荐性标准\nGB 12941-1991 景观娱乐用水水质标准 国家 GHZB1-1999发布后，环\n\n#### 保局将其废止\nGB5084-1992 农田灌溉水质标准 国家 正修订\nGB 11607-1989 渔业水质标准 国家 在修订\nGB 3097-1997 海水水质标准 国家\n\n#### 卫生部以部长令的形式\nGB5749-1985 生活饮用水卫生标准 国家 修订发布，名称改为生活\n\n#### 饮用水水质卫生规范，但\n\n#### 没有标准编号\n\n#### 卫生\n以文件发布 生活饮用水水质卫生规范 部 2001年发布\n无标准编号 百武 农村实施生活饮用水卫生标准 爱委\n（GB5749-1985）准贝」 会\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 5.2环境标准制度\n\n### 5.2.1强制性环境标准\n·由于各种标准制定的目的、适用范围和要求的不同，同一污染物\n在不同标准中规定的标准值也是不同的。例如，铜的标准值在中\n国的《生活饮用水卫生标准》、《工业企业设计卫生标准》和\n《渔业水质标准》中分别规定为1.0毫克/升、0.1毫克/升和0.01毫\n克/升。\n·世界各国制定的各种水质量标准中规定的项目多寡不一。目最多\n的是苏联颁布的地面水水质标准，正式颁布的有420多项，未正\n式颁布的还有200多项。多数国家的地面水水质标准中都规定有\n酚、氰化物、砷、汞、铅、铬、镉等主要项目。中国1979年修订\n颁布的《工业企业设计卫生标准》关于地面水中有害物质的最高\n容许浓度列有53个项目。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 5.2环境标准制度\n\n### 5.2.1强制性环境标准\n·环境质量标准的实施领域\n\n#### 以《大气环境质量标准》为例\n本标准首次发布于1982年。1996年第一次修订，2000年第二次修订，\n本次为第三次修订。本标准将根据国家经济社会发展状况和环境保护\n要求适时修订。\n本次修订调整了环境空气功能区分类，将三类区并入二类区；增\n设了颗粒物（粒径小于等于2.5um）浓度限值和臭氧8小时平均浓度限\n值；调整了颗粒物（粒径小于等于10um）、二氧化氮、铅和苯并[a]芘\n等的浓度限值；调整了数据统计的有效性规定。\n环境空气功能区分为二类：一类区为自然保护区、风景名胜区和其\n他需要特殊保护的区域；二类区为居住区、商业交通居民混合区、文\n化区、工业区和农村地区。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n表1环境空气污染物基本项目浓度限值\n\n### 5.2环境标准制度 浓度限值\n序号 污染物项目 平均时间 一级 二级 单位\n年平均 20 605.2.1强制性环境标准 二氧化硫（SO） 24小时平均 50 1501小时平均 150 500\n·环境质量标准的实施领域 年平均 40 40 μg/m'\n二氧化氮（NO） 24小时平均 80 80\n以《大气环境质量标准》为例 1小时平均 200 200\n一氧化碳（CO） 24小时平均 4 4 mg/m²\n\n#### 1小时平均 10 10\n一类区适用一级浓度 臭氧（0） 日最大8小时平均 100 1601小时平均 160 200\n颗粒物（粒径小于等于0um） 年平均 40 7024小时平均 50 150 μg/m\n\n#### 限值，二类区适用二\n颗粒物（粒径小于等于2.5μum） 24小时平均 年平均 15 3535 75\n级浓度限值。一、二 表2环境空气污染物其他项目浓度限值\n序号 污染物项目 平均时间 浓度限值 单位\n\n#### 类环境空气功能区质 一级 二级\n总悬浮颗粒物（TSP） 年平均 80 20024小时平均 120 300\n量要求见表1和表2。 年平均 50 502 氮氧化物（NO） 24小时平均 100 1001小时平均 250 250 μg/m\n铅（Pb） 年平均 0.5 0.53 季平均 1 1\n苯并[a]芘（BaP） 年平均 0.001 0.00124小时平均 0.0025 0.0025\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 5.2环境标准制度\n\n### 5.2.1强制性环境标准\n（二）污染物排放标准\n《环境保护法》（2014修订版）第十六条国务院环境保护主\n管部门根据国家环境质量标准和国家经济、技术条件，制定\n国家污染物排放标准。省、自治区、直辖市人民政府对国家\n污染物排放标准中未作规定的项目，可以制定地方污染物排\n放标准；对国家污染物排放标准中已作规定的项目，可以制\n定严于国家污染物排放标准的地方污染物排放标准。地方污\n染物排放标准应当报国务院环境保护主管部门备案。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 5.2环境标准制度\n【案例】A精细材料有限公司诉B区人民政府环保行政处罚案\n2011年12月2日，B区环境运输和城市管理局（以下简称区环运局）以A精细\n材料有限公司（以下简称A公司）在生产过程中排放废气的臭气浓度超标为由，\n对该公司作出《限期治理决定书》，要求2012年1月31日前完成排放臭气浓度治\n理达到《恶臭污染物排放标准》的要求，并经环运局验收合格；逾期未申请验收\n或未完成限期治理任务，将按规定责令停业、关闭；要求该公司分析臭气浓度超\n标排放原因，制定限期治理达标计划以及落实各项污染防治措施，确保污染物达\n标排放。\n2012年2月9日，A公司向区环运局申请治理验收。B区环境保护监测站受该\n区环运局委托，于同年4月26日、6月28日对该公司进行臭气排放监测，两次监测\n报告均显示臭气浓度未达标。区环运局遂于2012年8月29日组织验收组现场检查\n并对法定代表人进行调查询问，告知该公司验收结果：存在未提交限期治理方案、\n废气处理技术不能确保无组织废气达标排放、排放废气的臭气浓度超标、使用的\n燃油不符合环保要求等四个方面的问题，未通过限期治理验收。\n2013年1月11日，B区人民政府作出《行政处罚告知书》，同年3月18日经听\n证后作出《行政处罚决定书》，决定A公司自收到行政处罚决定书之日起停业、\n关闭。该公司不服提起行政诉讼，请求法院撤销上述《行政处罚决定书》。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 5.2环境标准制度\n【案例】A精细材料有限公司诉B区人民政府环保行政处罚案\n佛山市中级人民法院一审认为，A公司对B区人民政府作出处罚决定的职权\n依据及行政程序并无异议。原告认为上述两次臭气排放监测的采样点与频次不符\n合法定要求，未能排除其他干犹因素，故监测报告的结论不能作为定案依据。经\n查，B区环境保护监测站具有废气污染物检测的法定资质，该监测站两次臭气采\n样点即监测位置为A公司厂界敏感点，符合《恶臭污染物排放标准》及国家环境\n保护总局《关于恶臭物无组织排放检测问题的复函》规定。原告认为臭气监测采\n样点的设置不合法的主张于法无据，其亦未提供充分证据证明上述臭气监测采样\n点存在其他干扰因素。至于采样频次问题，该监测站两次臭气监测均采用了4次\n*3点的监测频次并取其中最大测定值，但频次间隔不足2小时，存在一定瑕疵。\n但该瑕疵不足以推翻监测报告结论的正确性。由于原告在限期治理期限届满后，\n经两次监测臭气排放浓度仍未达到《恶臭污染物排放标准》的要求，且存在其他\n相关环保问题，经B区环运局报请B区人民政府依照《广东省珠江三角洲大气污染\n防治办法》有关规定对原告作出停业、关闭的行政处罚决定，认定事实清楚，证\n据充分，适用法律正确，遂判决驳回原告诉讼请求。原告上诉后，广东省高级人\n民法院二审判决驳回上诉，维持原判。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 5.2环境标准制度\n【案例】A精细材料有限公司诉B区人民政府环保行政处罚案\n\n#### 核心问题\n1.《恶臭污染物排放标准》属于何种类型的环境标准？\n2、《恶臭污染物排放标准》在行政处罚案件中的适用是否需要其他\n类型的环境标准的配合使用？\n3.《恶臭污染物排放标准》适用的疑难问题由谁解释？\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 5.3环境规划制度\n《环境保护法》（2014修订版）第十三条县级以上人民政府应当\n将环境保护工作纳入国民经济和社会发展规划。国务院环境保护\n主管部门会同有关部门，根据国民经济和社会发展规划编制国家\n环境保护规划，报国务院批准并公布实施。县级以上地方人民政\n府环境保护主管部门会同有关部门，根据国家环境保护规划的要\n求，编制本行政区域的环境保护规划，报同级人民政府批准并公\n布实施。环境保护规划的内容应当包括生态保护和污染防治的目\n标、任务、保障措施等，并与主体功能区规划、土地利用总体规\n划和城乡规划等相衔接。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 5.3环境规划制度\n国民经济和社会发展五年规划 环境保护五年规划\n五年规划纲要 （总体） 环境保护篇章\n\n#### 三个层次\n\n#### 环境保护规划\n\n#### 重点专项规划（国务院主管部门）\n（环境主管部门）\n\n#### 环境与自然保护规\n行业规划和地区规划（各部门、各地区） 划、行业和地区规\n\n#### 划（其他有关部门）\n"}, {"id": "pdf-011", "group": "原始课件 · PDF原文", "title": "011-第二编 污染控制法-第二编 污染控制法", "md": "# 第二编 污染控制法\n\n> 来源: 011-第二编 污染控制法-第二编 污染控制法.pdf\n> 页数: 13\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 第二编污染控制法\n\n#### 新疆大学生态与环境学院\n\n#### 杨建英\n\n#### 2026年5月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n6.污染控制法概述\n\n### 6.1环境污染的概念与特征\n环境污染和其他公害的概念（P149-151）\n【环境污染】是指被人们利用的物质或者能量直接\n或间接地进入环境，导致对自然的有害影响，以致\n危及人类健康、危害生命资源和生态系统，以及损\n害或者妨害舒适性和环境的其他合法用途的现象。\n（1974年OECD经济合作与发展组织环境委员会最早\n\n#### 提出）\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n6.污染控制法概述\n\n### 6.1环境污染的概念与特征\n环境污染和其他公害的概念（P149-151）\n【公害】一般认为，公害就是环境污染。\n我国现行《环境保护法》 （2014修订版）第三章“防治\n污染和其他公害”第42条：列举了环境污染和其他公害\n是“在生产建设或者其他活动中产生的废气、废水、废\n渣、医疗废物、粉尘、恶臭气体、放射性物质以及噪声、\n振动、光辐射、电磁辐射等对环境的污染和危害。”\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n6.污染控制法概述\n\n### 6.1环境污染的概念与特征\n\n#### 环境污染产生的原因\n环境污染的产生，在大多数情况下是因污染源排放\n了污染物超过了环境容量造成的。\n【污染源】是指造成环境污染的污染物的发生源，如\n向环境排放污染物或对环境产生有害影响的场所、设备\n和装置。\n【污染物】是指进入环境后使环境的正常组成和性质\n发生直接或间接有害于人类的物质和能量。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n6.污染控制法概述\n\n### 6.1环境污染的概念与特征\n\n#### 环境污染的特征\n环境污染是人类正常活动的有害副作用；\n须为物质、能量从一定的设施设备向外界排放或者泄漏；\n环境污染以环境为媒介对不特定人体造成危害；\n环境污染具有综合性和积累性；\n环境污染往往同时侵害多种权益；\n环境污染危及的范围广；\n环境污染引起的疾病往往难以发现和治疗。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n6.污染控制法概述\n\n### 6.1环境污染的概念与特征\n\n#### 环境污染的分类\n1.在环境科学上，将导致环境污染的物质分为一次污染物和二次\n污染物。\n【一次污染物】是指由污染源直接与环境接触，进入环境而导\n致的污染，污染物的物理、化学性质并未改变。\n【二次污染物】是指进入环境的一次污染物的物理、化学性质\n发生变化而形成的新污染物。\n在一定条件下和范围内，二次污染物比一次污染物的污染要\n更具有破坏性，危害程度也更大。\n2.根据污染物介入环境的要素不同，可以分为大气污染、水质污\n染、海洋环境污染、土壤污染。\n3.根据污染物的形态分为：废气污染、废水污染和固体废\n物污染、噪声污染、放射性污染、电磁波辐射污染等。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n6.污染控制法概述\n\n### 6.1环境污染的概念与特征\n\n#### 我国环境污染主要特点\n水体污染：我国有许多地区的水体，环境污染日益突出。\n包括湖泊、河流、地下水及海洋污染比较严重，我国的\n水环境污染以有机物污染为主。\n大气污染：我国城市的空气质量仍不乐观，并呈发展趋\n势。\n噪声污染：亟待解决，主要产生原因为交通噪声、工业\n噪声。\n生活垃圾：我国城市的某些地区，环境污染从城市向农\n村扩展，造成垃圾包围城市的严重局面。\n2019年全国地表水、环境空气质量状况.pdf\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n6.污染控制法概述\n\n### 6.2环境污染防治法的概念和特征\n【环境污染防治法】，是指国家为预防和治理环境污\n染和其他公害，对产生或可能产生环境污染和其他公害\n的原因活动（包括各种对环境不利的人为活动）实施管\n理，以达到保护生活环境和生态环境、进而达到保护人\n体健康和财产安全的目的而制定的同类法律的总称。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n6.污染控制法概述\n\n### 6.2环境污染防治法的概念和特征\n（一）发展\n\n#### 我国环境污染防治立法是环境\n\n#### 萌芽\n法中发展得较早和较快的领域。\n\n#### 进一步健全\n\n#### 和完善\n\n#### 起步\n\n#### 快速发展\n\n#### 初步完善\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n6.污染控制法概述\n\n### 6.2环境污染防治法的概念和特征\n环境污染防治法律法规体系在形式上表现为环境保护基本法下\n属的单行法及其配套法规。\n1、环境污染防治单行法律：\n《大气污染防治法》（2015年修订）、《水污染防治法》\n（2017年修正）、《海洋环境保护法》（2017年修正）、《环境\n噪声污染防治法》（2018年修正）、《固体废物污染环境防治\n法》（2016年修正）、《放射性污染防治法》（2003年）、\n《清洁生产促进法》（2002年）等；\n2、国务院也制定和实施了大量综合性或单行环境污染防治的行\n政法规；\n3、各主管部门也分别制定了一些专项部门规章或环境标准；\n4、各地方则根据本地方的特点制定了许多地方性环境污染防治\n的法规、规章或地方性环境示准。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 6.2环境污染防治法的概念和特征\n世界各国（地区）环境污染防治法律的名称\n由于各环境污染防治法律在控制对象、管理方式以及立法目标和制度重\n点等方面有所不同，法律名称的具体表述在各国（地区）也存在着不同。\n美国是在环境要素前冠以“清洁”二字的方法，如《清洁空气法》、\n《清洁水法》等；\n日本采用的是“环境要素+污染因子+防止（规制）”的方法，如《大气污染\n防止法》、《水质污浊防止法》、《悲臭防止法》、《噪音规制法》等。\n欧洲各国有关环境污染防治法律的称谓则表现得林林总总、五花八门，\n既有以单项环境要素的保护作为法的称谓的，也有以污染因子的防治或控制\n作为法的称谓的。\n中国台湾地区在命名上也颇为讲究。例如，《空气污染防制法》，意在\n突出法的预防和管制目的；《噪音管制法》，意在突出法的管制目的；《土\n壤及地下水污染整治法》，意在体现法的整治目的；《废弃物清理法》，意\n在体现法的清理目的；《毒性化学物质管理法》，意在体现法的管理目的。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 6.2环境污染防治法的概念和特征\n需注意的问题：\n（1）应根据污染的产生和发展的机理，确定法律控制\n措施。\n污染从发生直至造成危害一般要经过如下四个过程：\n第一，污染物从一定的设施、设备和装置（发生源）散\n发或排出；\n第二，污染物在各环境要素中积累或沉积；\n第三，污染物致环境发生物理、化学生态或其他环境特\n性的改变导致环境质量下降；\n第四，污染物或者环境质量下降最终造成对人类合法权\n益的侵害或导致生态系统的破坏。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 6.2环境污染防治法的概念和特征\n确立法律制度的基本思路在于：\n首先，应当针对环境质量状况的现实条件和需要，明确\n该环境区域是否允许污染物，或者在何种程度上允许哪\n些污染物的散发和排放；\n其次，对产生污染物的发生源采取应对和控制措施，使\n得污染物的散发和排放符合行政上的规定与要求；\n再次，针对环境的临界负荷和环境容量，确定对经行政\n许可散发和排放污染物的环境采取何种程度的恢复、治\n理措施；\n最后，对可能发生的污染事故、事后的污染损害等确立\n相应的补救或救济措施。\n"}]}</script>
