pg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p56.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p57.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p57.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p58.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p58.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p59.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p59.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "lab-01-ArcGIS", "group": "实验精讲 · 上机", "title": "实验一 · ArcGIS软件概述及基本操作", "md": "# 实验一 · ArcGIS 软件概述及基本操作\n\n> 对应理论：第 1 章 地理信息系统概论。先「识软件」，为后续全部上机打基础。\n\n## 一、实验目的\n认识 ArcGIS Desktop 三大组件（**ArcMap / ArcCatalog / ArcToolbox**），掌握软件界面构成与最基本的数据加载、浏览、图层管理操作。\n\n## 二、实验内容\n1. 启动 ArcMap，认识主界面：菜单栏、工具栏、**目录表（TOC / Table Of Contents）**、显示区。\n2. 区分**数据视图（Data View）**与**布局视图（Layout View）**。\n3. 加载数据（Add Data），浏览地图（放大 / 缩小 / 漫游 / 全图 / 书签）。\n4. 图层管理：显隐、调整叠放顺序、符号化（Symbology）、标注（Label）。\n5. 在 ArcCatalog 中浏览与连接数据；认识 ArcToolbox 工具箱体系。\n\n## 三、关键操作\n- **加载数据**：工具栏 `Add Data` 按钮 或 菜单 `File ▸ Add Data`，定位到数据所在文件夹（首次需在 ArcCatalog 中 `Connect To Folder` 建立文件夹连接）。\n- **视图切换**：窗口左下角图标，或菜单 `View ▸ Data View / Layout View`。数据视图用于浏览分析，布局视图用于排版出图。\n- **图层符号化**：图层右键 `Properties ▸ Symbology`，设置单一符号 / 分类 / 分级等。\n- **书签**：`Bookmarks ▸ Create Bookmark` 记住某视野范围。\n\n## 四、考点与要义\n- **三大组件分工**：ArcMap（显示/编辑/分析/出图）、ArcCatalog（数据管理）、ArcToolbox（地理处理工具）。\n- **数据视图 vs 布局视图**：前者看数据本身，后者做地图整饰与打印输出。\n- **TOC 作用**：管理图层顺序与显隐——上层图层覆盖下层；面要素通常置于线、点之下。\n- **坐标系**：数据框（Data Frame）坐标系决定显示投影；首个加载图层常决定数据框坐标系。\n\n## 五、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p04.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p04.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p05.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p05.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p06.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p06.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p07.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p07.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-02", "group": "实验精讲 · 上机", "title": "实验二 · 矢量数据的创建", "md": "# 实验二 · 矢量数据的创建\n\n> 对应理论：第 2 章 空间数据（模型与结构）——矢量数据模型（点 / 线 / 面）。\n\n## 一、实验目的\n掌握在 **Shapefile** 与 **Geodatabase** 中创建矢量要素的方法，理解字段与坐标系的设置。\n\n## 二、实验内容\n1. 在 ArcCatalog 创建**地理数据库**（个人地理数据库 `GeoDB.mdb` 或文件地理数据库）。\n2. 新建 **Shapefile**（指定要素类型 Point / Polyline / Polygon 与坐标系）。\n3. 为要素类**添加字段**（Add Field：文本 / 短整型 / 长整型 / 浮点 / 双精度）。\n4. 用**编辑器（Editor）**创建点 / 线 / 面要素并录入属性。\n5. 导入外部数据（如由坐标表生成点要素）。\n\n## 三、关键操作（步骤）\n1. ArcCatalog 中右键文件夹 `New ▸ Shapefile`：\n   - **Name** 命名；**Feature Type** 选 Point / Polyline / Polygon；\n   - 点击 `Edit…` 设置 **Spatial Reference（坐标系）**（地理坐标系 GCS 或投影坐标系 PCS）。\n2. 在属性表中 `Table Options ▸ Add Field` 添加字段（**注意：字段类型创建后不可更改**，需谨慎选择）。\n3. `Editor ▸ Start Editing` → `Create Features` 选模板绘制要素 → 在属性表录入属性 → `Editor ▸ Stop Editing` 保存编辑。\n4. 个人/文件地理数据库内同理可新建要素类（Feature Class），并可组织进要素数据集。\n\n## 四、考点与要义\n- **Shapefile vs Geodatabase**：Shapefile 由多文件（.shp/.shx/.dbf 等）组成、字段名 ≤10 字符、不支持拓扑/子类型；Geodatabase 支持要素数据集、拓扑、子类型、域、关系类，功能更强。\n- **坐标系定义的重要性**：未定义坐标系的数据无法正确叠加 / 量算；创建时即应指定。\n- **字段类型选择**：整型存编号、浮点/双精度存测量值、文本存名称；类型不可逆。\n- **编辑会话**：必须 Start/Stop Editing 包裹，否则不能增删改要素。\n\n## 五、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p08.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p08.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p09.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p09.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p10.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p10.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p11.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p11.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p12.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p12.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p15.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p15.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-03", "group": "实验精讲 · 上机", "title": "实验三 · 矢量数据编辑与处理", "md": "# 实验三 · 矢量数据编辑与处理\n\n> 对应理论：第 2 章 空间数据结构 + 第 3 章 空间数据的转换与处理（坐标系变换、拓扑）。本实验为矢量上机的重头戏。\n\n## 一、实验目的\n掌握矢量数据的编辑与处理（含**坐标系变换**与**拓扑检查**）的基本流程。\n\n## 二、实验内容（5 个任务，前 5 项均在 ArcCatalog 目录窗口完成）\n1. 建立**文件地理数据库**，命名 `Exe04_database`。\n2. 新建**要素类（Feature Class）**，坐标系设为 **WGS 1984 World Mercator**。\n3. 新建**要素数据集（Feature Dataset）**，并导入外源矢量数据。\n4. 导入**栅格（Raster）数据**。\n5. 对 `Road.shp` 执行**拓扑分析（Topology）**。\n\n## 三、关键操作（步骤）\n1. **建库**：ArcCatalog 右键 `New ▸ File Geodatabase`，重命名为 `Exe04_database`。\n2. **建要素类**：库右键 `New ▸ Feature Class`，命名（如 `test_point`），类型选 Point/Polyline/Polygon，`Coordinate System` 选 **Projected ▸ World ▸ WGS 1984 World Mercator**。\n3. **建要素数据集并导入**：库右键 `New ▸ Feature Dataset`（同一数据集内所有要素类**必须共用同一坐标系**）；数据集右键 `Import ▸ Feature Class (single/multiple)` 导入外源 shp。\n4. **导入栅格**：库右键 `Import ▸ Raster Datasets`。\n5. **拓扑分析**（对道路网做完整性检查）：\n   - 要素数据集右键 `New ▸ Topology`；设置 **Cluster Tolerance（聚类容差）**；\n   - 选择参与的要素类并设 **Rank（等级 1–50，等级越高越不易被移动）**；\n   - 添加**拓扑规则**：\n     - `Must Not Have Dangles`（线不能有悬挂点——防断头路）\n     - `Must Not Have Pseudo Nodes`（不能有伪节点）\n     - `Must Not Intersect`（不能相交 / 自相交）\n   - `Validate Topology` 验证 → 用 **Error Inspector** 查看并修正错误。\n\n## 四、拓扑错误类型（必考）\n- **缝隙（Gap）**：相邻面之间不该有的空隙。\n- **叠盖 / 重叠（Overlap）**：要素相互覆盖。\n- **悬挂（Dangle）**：线端点未连接到其他线（断头）。\n- **伪节点（Pseudo Node）**：本应连续的线被无意义地打断。\n- 其它：超出（Overshoot）、未及（Undershoot）、跨越。\n\n## 五、考点与要义\n- **要素数据集**内要素类共享同一空间参考，是建立拓扑 / 网络的前提。\n- **坐标系变换（投影变换）**：Project 工具把数据从一种坐标系转到另一种；`Define Projection` 仅声明而不变换坐标值——二者勿混淆。\n- **Cluster Tolerance** 决定多近的坐标被视为重合；过大会误并要素。\n- **Rank** 决定验证时哪条要素被吸附移动。\n\n## 六、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p17.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p17.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p20.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p20.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p23.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p23.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p27.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p27.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p29.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p29.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p31.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p31.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-04", "group": "实验精讲 · 上机", "title": "实验四 · 专题地图与制图输出", "md": "# 实验四 · 专题地图和地图制图输出\n\n> 对应理论：第 4 章 空间数据的可视化表达。把分析结果「画成图、出成版」。\n\n## 一、实验目的\n掌握 ArcMap 绘制**专题地图**的基本流程与**制图输出**方法。\n\n## 二、实验内容\n绘制「枫树坝水库水质采样地图」：主图为水库与采样点（S1–S8），并附**索引图 / 区位图（Locator / Inset Map，中国—珠江流域）**，完成整饰与导出。\n> 指导书说明：具体绘制步骤参考理论课程「空间数据的可视化表达」相应章节。\n\n## 三、关键操作（步骤）\n1. **数据符号化（Symbology）**，按数据性质选四类专题表达：\n   - 单一符号（Single symbol）\n   - 唯一值 / 分类（Categories / Unique values）\n   - 分级色彩 / 分级符号（Graduated colors / symbols，定量分级）\n   - 比率 / 点密度 / 统计图表（Proportional / Dot density / Charts）\n2. 切换**布局视图（Layout View）**，设置页面与方向。\n3. 插入整饰要素：`Insert ▸` 图名（Title）、**图例（Legend）**、**比例尺（Scale Bar）**、**指北针（North Arrow）**、格网（Grid）。\n4. 制作**索引图**：新增一个数据框（Data Frame），放入小比例尺底图，框出主图范围。\n5. **导出**：`File ▸ Export Map`，选 JPG / PNG / PDF / EPS / TIFF，设 DPI（出版常用 300 dpi）。\n\n## 四、考点与要义\n- **专题地图四类符号化方法**及适用：定性用唯一值，定量用分级 / 比率。\n- **地图整饰五要素**：图名、图例、比例尺、指北针、（数学要素/格网）；外加责任要素（编制者、坐标系）。\n- **数据框（Data Frame）**：一个布局可含多个数据框，用于主图 + 索引图。\n- **导出格式**：栅格（JPG/PNG/TIFF）vs 矢量（PDF/EPS/AI），出版选矢量或高 DPI 栅格。\n\n## 五、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p34.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p34.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-05", "group": "实验精讲 · 上机", "title": "实验五 · 市区择房分析", "md": "# 实验五 · 市区择房分析（缓冲区分析 + 叠置分析）\n\n> 对应理论：空间分析（矢量）。教材实例 7.5.1（P264–270）。综合运用**缓冲区分析**与**叠置分析**。\n\n## 一、背景与目的\n为购房者在城区中选出「最佳购房区」：既要远离噪声、又要靠近商业中心 / 名校 / 名胜。核心是**缓冲区（Buffer）+ 叠置（Overlay）**。\n\n## 二、数据\n`network`（交通网络）、`marketplace`（商业中心）、`school`（名牌高中）、`famous place`（名胜古迹）、`city.mxd`。\n\n## 三、四个择房条件\n| 条件 | 含义 | 实现 |\n|---|---|---|\n| ① 远离主干道噪声 | 距主干道 **200m 之外** | network 选主干道后做 200m 缓冲，再**擦除** |\n| ② 靠近大型商业中心 | 位于商业中心影响范围内 | marketplace 缓冲，半径=属性字段 **YUZHI** |\n| ③ 靠近名牌高中 | 距名校 **750m 之内** | school 缓冲 750m |\n| ④ 靠近名胜古迹 | 距名胜 **500m 之内** | famous place 缓冲 500m |\n\n## 四、关键操作（步骤）\n1. **主干道噪声缓冲区**：对 `network` 按属性选择 `\"TYPE\" = 'ST'` 选出主要道路（街道）→ 用 Buffer，仅对所选要素分析，半径 **200m** → 得噪声缓冲区。\n2. **商业中心影响范围**：对 `marketplace` 做缓冲，缓冲半径取**属性字段 YUZHI**（不同中心影响范围不同）。\n3. **名牌高中影响范围**：对 `school` 做缓冲，半径 **750m**。\n4. **名胜古迹影响范围**：对 `famous place` 做缓冲，半径 **500m**。\n5. **叠置分析求最佳区**：\n   - 对商业中心、名校、名胜三缓冲区做【分析工具 ▸ 叠加分析 ▸ **相交 Intersect**】→ 同时满足 3 个条件的区域；\n   - 再用主干道噪声缓冲区对上一步结果做【**擦除 Erase**】（排除噪声区）→ **同时满足 4 个条件的最佳购房区**。\n\n## 五、考点与要义\n- **缓冲区建立三要素**：缓冲对象图层、缓冲半径（定值或字段值）、边界设定类型（是否融合 Dissolve）。\n- **按属性选择 SQL**：`\"TYPE\"='ST'`，配合「仅对所选要素分析」。\n- **叠置分析语义**：`Intersect` 求交（取同时满足）；`Erase` 擦除（剔除某条件区）；`Union` 求并；`Clip` 裁剪。\n- **思路模型**：正向条件用相交叠加，负向条件（远离）用缓冲后擦除——这是选址 / 适宜性分析的通用套路。\n\n## 六、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p35.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p35.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p38.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p38.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p39.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p39.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p40.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p40.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p41.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p41.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-06", "group": "实验精讲 · 上机", "title": "实验六 · 学校选址", "md": "# 实验六 · 学校选址（栅格成本距离 + 重分类 + 加权叠加）\n\n> 对应理论：空间分析（栅格）。教材实例 8.10.1（P323–328）。是栅格适宜性分析的经典范例。\n\n## 一、背景与目的\n为新学校选出适宜区。熟悉 ArcGIS **栅格距离制图、成本距离加权、数据重分类、多层面加权合并**等空间分析功能。\n\n## 二、数据\n`landuse`（土地利用）、`dem`（高程）、`rec_sites`（娱乐场所）、`school`（现有学校）。\n\n## 三、选址原则与权重\n| 因素 | 原则 | 权重 |\n|---|---|---|\n| 距娱乐设施 | 越近越好 | **0.5** |\n| 距现有学校 | 越远越好（避开） | **0.25** |\n| 土地利用类型 | 成本低（避开水体/湿地） | **0.125** |\n| 地势（坡度） | 越平坦越好 | **0.125** |\n\n> 权重之和 = 0.5 + 0.25 + 0.125 + 0.125 = **1.0**。\n\n## 四、关键操作（步骤）\n1. 激活 **Spatial Analyst** 扩展（`自定义 ▸ 扩展模块` 勾选）。\n2. 打开 `school.mxd`；设环境：**工作空间** + **处理范围 = 与 landuse 相同** + **栅格分析像元大小 = 与 landuse 相同**（保证各层对齐可叠加）。\n3. **坡度**：`Spatial Analyst ▸ 表面分析 ▸ 坡度`，输入 dem → `slope`。\n4. **欧式距离**：`距离分析 ▸ 欧式距离`：`rec_sites → dis_recsites`；`school → dis_school`。\n5. **重分类**（统一为 1–10 级，消除量纲）：\n   - 坡度：平坦赋高值 → `reclassslope`；\n   - 距娱乐场所：最近赋 10、最远赋 1 → `reclassdisr`；\n   - 距现有学校：最远赋 10、最近赋 1 → `reclassdiss`；\n   - 土地利用：按 Ctrl 多选删除 `water / wetland / grass`，勾选「将缺失值更改为 **NoData**」，其余赋值 → `reclassland`。\n6. **加权叠加**：`Spatial Analyst ▸ 地图代数 ▸ 栅格计算器`：\n   ```\n   suit = reclassdisr*0.5 + reclassdiss*0.25 + reclassland*0.125 + reclassslope*0.125\n   ```\n   适宜性高（深色）区域即推荐选址区。\n\n## 五、考点与要义\n- **欧式距离 vs 成本距离**：欧式=直线距离；成本距离=考虑阻力表面的累积成本。\n- **重分类的目的**：把不同量纲 / 范围的成本数据统一到同一可比等级，才能加权求和。\n- **NoData**：表示禁止建设区（水体 / 湿地），不参与运算 / 排除在结果之外。\n- **加权叠加（Weighted Overlay / 栅格计算器）**：`Σ(reclass × weight)`，权重反映各因素重要性。\n- **环境设置（像元大小 / 范围对齐）**是栅格多层运算正确叠加的前提。\n\n## 六、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p36.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p36.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p43.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p43.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p44.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p44.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p45.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p45.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p46.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p46.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p47.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p47.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-07", "group": "实验精讲 · 上机", "title": "实验七 · 空间空值分析", "md": "# 实验七 · 空间空值分析（空间插值 + 分区统计 + 栅格计算）\n\n> 对应理论：空间分析（栅格）。以三峡库区 2018 年降雨为例，串联**插值 → 分区统计 → 栅格计算**。\n\n## 一、实验目的\n通过实例，掌握**空间插值（Kriging）**、**分区统计（Zonal Statistics）**、**栅格计算**等 ArcGIS 操作及其应用意义。\n\n## 二、数据\n- `PRE_2018.csv`：三峡库区 2018 年各站点降雨（字段 `lat / long / elev / year_pre`）。\n- `TRG_county`：库区区县边界（含字段 `Name`）。\n\n## 三、内容一 · 空间插值（Kriging）\n1. CSV → `Display XY Data`（按 long=X、lat=Y）→ 导出为点要素 `pre_2018.shp`。\n2. `Spatial Analyst ▸ Interpolation ▸ **Kriging**`：\n   - **Input point features** = `PRE_2018`\n   - **Z value field** = `year_pre`（待插值的降雨量）\n   - **Output surface raster** = `pre_2018.tif`\n   - Kriging method = **Ordinary**；Semivariogram model = **Spherical**\n   - **Output cell size** = `150`\n   - Search radius = Variable（点数 12）\n3. **环境设置 ▸ Raster Analysis ▸ Mask（掩膜）= `TRG_county`**：\n   - 有掩膜 → 仅在库区范围内插值（边界裁剪）；\n   - 无掩膜 → 输出整个矩形范围。\n\n## 四、内容二 · 分区统计（按区县统计 2018 年均降雨）\n- **Zonal Statistics as Table（输出表格）**：`Spatial Analyst ▸ Zonal ▸ Zonal Statistics as Table`：\n  - Input zone = `TRG_county`；Zone field = **`Name`**；Input value raster = `pre_2018.tif`；\n  - Output table = `tgr.dbf`；Statistics type = **MEAN**；勾选 `Ignore NoData`。\n  - 结果：一张表，列出各区县降雨年均值。\n- **Zonal Statistics（输出栅格）**：参数同上，但 **Output raster** = `pre_2018_z.tif`（无「输出表」项）：\n  - 结果：各区县整体填充其均值的专题栅格图。\n\n## 五、考点与要义\n- **空间插值**：由离散采样点推求连续表面（降雨、高程、污染浓度等）。Kriging 利用半变异函数刻画空间自相关，分普通（Ordinary）/ 泛（Universal）克里金。\n- **掩膜（Mask）**：限定分析 / 输出范围到指定区域，是按行政边界出图的关键。\n- **分区统计两工具区别**：`as Table` 输出**属性表**（便于后续统计 / 连接）；普通 `Zonal Statistics` 输出**栅格**（便于专题成图）。\n- **Zone field**：定义「区」的字段（如行政区名 `Name`），每个唯一值是一个统计单元。\n- **栅格计算（Raster Calculator）**：对栅格做代数 / 条件运算（如 `Con`），是栅格分析的通用引擎。\n\n## 六、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p49.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p49.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p50.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p50.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p51.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p51.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p52.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p52.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p53.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p53.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p54.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p54.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "lab-08", "group": "实验精讲 · 上机", "title": "实验八 · 综合数据处理模型构建", "md": "# 实验八 · 综合数据处理模型构建（ModelBuilder + 水文分析）\n\n> 对应理论：空间分析（建模 / 水文）。参考教材第十一章水文分析。用 **ModelBuilder** 把整条水文分析链自动化。\n\n## 一、实验目的\n掌握**集水区划分**的基本流程，掌握 **ModelBuilder** 的使用。\n\n## 二、实验内容\n用 ArcGIS ModelBuilder 搭建集水区划分模型。集水区划分（参考教材第十一章水文分析）可分为：**填挖、汇流量计算、水流长度、河网提取、流域分割**等步骤。\n\n## 三、关键操作（步骤）\n1. **新建模型**：ArcToolbox 中先 `New Toolbox`（**模型只能存放在 Toolbox 中，不能存放在文件夹**，否则报错 `Models can only be saved in a toolbox`）；再右键工具箱 `New ▸ Model`，保存命名 `Watershed`。\n2. 将工具依次拖入模型窗口并连线，设置输入输出：\n   ```\n   DEM.tif\n     └▶ Fill（填洼）                     → DEM_Fill\n        └▶ Flow Direction（流向）         → FlowDir\n           └▶ Flow Accumulation（汇流累积）→ FlowAcc\n              └▶ Raster Calculator         → Con(\"%FlowAcc%\" > 500, 1)   # 阈值提取河网\n                 ├▶ Stream Link            → StreamL\n                 │   └▶ Watershed          → (流向 FlowDir + 倾泻点 StreamL, Pour point field=VALUE)\n                 │       └▶ Raster to Polygon → Basin（矢量集水区）\n                 └▶ Stream to Feature      → Stream（矢量河网）\n   ```\n3. 运行整个模型，得到河网与流域分割结果。\n\n## 四、注意事项（必考细节）\n- **Raster Calculator 阈值**：`Con(\"%FlowAcc%\" > 500, 1)`——汇流累积大于 500 的栅格判定为河道。\n- **Stream to Feature**：把栅格河网转为**矢量河网**。\n- **Watershed 参数**：Input flow direction = `FlowDir`；Pour point data = `StreamL`；Pour point field = `VALUE`。\n- **Raster to Polygon**：把栅格集水区转为**矢量**（Basin）。\n- **ModelBuilder 价值**：流程可视化、可重用、可批处理（变量参数化），是 GIS 自动化建模核心。\n\n## 五、思考题\n在生态环境保护中如何使用「集水区」这一概念？\n> 参考：集水区（流域）是水文与物质迁移的天然单元——可用于面源污染负荷核算、水源地保护区划定、水土流失与生态修复分区、流域生态补偿与统一管理等。\n\n## 六、本实验原页（点击看大图）\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/gis/lab_p55.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p55.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p56.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p56.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p57.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p57.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/gis/lab_p58.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/gis/lab_p58.jpg\" alt=\"\"><\/a>\n<\/div>"}, {"id": "review-综合复习资料", "group": "总览资料", "title": "综合复习资料（图文 + 思维导图）", "md": "# 地理信息系统 · 综合复习资料\n\n> 教师: 黄源生 · 学期: 2026春\n> 链路：原始 PDF → 页图集（多图提取）→ 章节图谱 → LLM 协填要点 → 思维导图 → **本资料**\n> 完成度：复习要点 **4/4** 章 · 嵌入子图 **0** 张 · 思维导图 **4/4** 章\n\n---\n\n## 一 · 章级入口\n\n| 章 | 标题 | 主版页 | 子图 | 要点 | 图谱 | 素材 |\n| ---: | ---- | -----: | ---: | :--: | :--: | ---- |\n| 1 | 地理信息系统 Geographic Information System, GIS | 90 | 0 | ✓ | ✓ | [_第01章_地理信息系统_Geographic_Information_System,_GI.md](./_第01章_地理信息系统_Geographic_Information_System,_GI.md) |\n| 2 | 空间数据-知识点回顾 | 169 | 0 | ✓ | ✓ | [_第02章_空间数据-知识点回顾.md](./_第02章_空间数据-知识点回顾.md) |\n| 3 | 空间数据的转换与处理 | 104 | 0 | ✓ | ✓ | [_第03章_空间数据的转换与处理.md](./_第03章_空间数据的转换与处理.md) |\n| 4 | 空间数据的可视化表达 | 107 | 0 | ✓ | ✓ | [_第04章_空间数据的可视化表达.md](./_第04章_空间数据的可视化表达.md) |\n\n## 二 · 全章综合汇编\n\n### 第 1 章 · 地理信息系统 Geographic Information System, GIS\n\n> 素材：[_第01章_地理信息系统_Geographic_Information_System,_GI.md](./_第01章_地理信息系统_Geographic_Information_System,_GI.md) · 主版 90 页\n\n\n#### 一、核心概念（名词解释）\n\n- [x] **地理信息系统（GIS）**：既是跨地球科学、空间科学、信息科学和计算机科学的一门应用基础学科，又是一项工程应用技术。以地学原理为依托，在计算机软硬件支持下，研究空间数据的采集、处理、存储、管理、分析、建模和显示。\n- [x] **地理数据**：与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律等的数字、文字、图像和图形总称。\n- [x] **地理信息**：有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。\n- [x] **数据与信息的关系**：信息来源于数据，是数据内涵的意义；信息是数据的表达，数据是信息的载体。\n- [x] **地理数据的特征**：空间上的分布性、时间上的序列性、数量上的海量性、载体的多样性、位置和属性的对应性。\n- [x] **地理信息的特征**：空间相关性、空间层次性、空间区域性、空间多样性。\n- [x] **GIS的构成**：五大部分——计算机硬件系统、软件系统、空间数据、地学模型、应用人员。\n- [x] **GIS基本特征**：数据的空间定位特征、空间关系处理的复杂性、海量数据管理的能力；GIS是空间数据和属性数据的综合体。\n- [x] **空间分析**：GIS的核心功能，也是GIS与其他计算机系统的根本区别。\n\n#### 二、关键公式 / 模型\n\n- [x] **RUSLE公式**（通用土壤流失方程）：A = R·K·L·S·C·P，用于土壤侵蚀量估算\n- [x] **C-Fix模型**：植被固碳量估算模型\n- [x] **GIS功能链**：数据采集与输入 → 数据编辑与更新 → 数据存储与管理 → 空间查询与分析 → 数据与图形的交互显示 → 应用模型与系统开发\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **John Snow霍乱溯源**（1854伦敦）：空间数据可视化+空间插值，确认Broad Street水井为霍乱源头\n- [x] **COVID-19疫情地图**：数据空间可视化\n- [x] **苏州河重金属空间分布**：采样点地图+空间插值+污染物浓度可视化\n- [x] **东江上游土壤侵蚀**：RUSLE模型+时序变化分析\n- [x] **农村排水模式优化**：基于GIS的计算框架——空间聚类→空间叠置→管网优化→处理设施优选→造价核算\n\n#### 四、高频考点（速记）\n\n1. GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路\n2. GIS五大部分构成：硬件、软件、数据、模型、人员\n3. GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n4. GIS是空间数据+属性数据的综合体\n5. 地理数据三大特征：空间分布性、时间序列性、海量性\n6. 数据库建设占系统投资70%\n7. GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/QGIS）→应用软件（二次开发）\n\n#### 五、思考题 / 自测\n\n- [x] 题：GIS与一般信息系统的本质区别是什么？\n  答：GIS处理空间数据和属性数据的综合体，核心在于空间分析功能。\n- [x] 题：为什么说空间分析是GIS的核心功能？\n  答：空间分析是GIS区别于其他计算机系统的根本区别，也是评价GIS功能的主要特征。\n- [x] 题：GIS在环境科学中有哪些应用？\n  答：污染物空间可视化、土壤侵蚀评估、水质监测、排水模式优化等。\n\n#### 六、与前后章之关联\n\n- 承前章：本章为GIS基础概念，无前章\n- 启后章：为第二章空间数据组织、第三章空间数据转换与处理提供理论框架\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 地理信息系统 Geographic Inform\n## 核心概念\n- 地理信息系统（GIS）\n- 地理数据\n- 地理信息\n- 数据与信息的关系\n- 地理数据的特征\n- 地理信息的特征\n- GIS的构成\n- GIS基本特征\n- 空间分析\n## 关键公式 / 模型\n- RUSLE公式\n- C-Fix模型\n- GIS功能链\n## 高频考点\n- GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路\n- GIS五大部分构成：硬件、软件、数据、模型、人员\n- GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n- GIS是空间数据+属性数据的综合体\n- 地理数据三大特征：空间分布性、时间序列性、海量性\n- 数据库建设占系统投资70%\n- GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/QGIS）→应用软件（二次开发）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((地理信息系统 Geographic Inform))\n    核心概念\n      地理信息系统（GIS）\n      地理数据\n      地理信息\n      数据与信息的关系\n      地理数据的特征\n      地理信息的特征\n      GIS的构成\n      GIS基本特征\n      空间分析\n    关键公式 / 模型\n      RUSLE公式\n      C-Fix模型\n      GIS功能链\n    高频考点\n      GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→…\n      GIS五大部分构成：硬件、软件、数据、模型、人员\n      GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n      GIS是空间数据+属性数据的综合体\n      地理数据三大特征：空间分布性、时间序列性、海量性\n      数据库建设占系统投资70%\n      GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/Q…\n```\n\n<\/details>\n\n---\n\n### 第 2 章 · 空间数据-知识点回顾\n\n> 素材：[_第02章_空间数据-知识点回顾.md](./_第02章_空间数据-知识点回顾.md) · 主版 169 页\n\n\n#### 一、核心概念（名词解释）\n\n- [x] **空间数据采集**：将地图、外业观测、航空相片、遥感图像、文本资料等转为计算机可识别的数字形式\n- [x] **地理空间数据**：表示空间实体的位置、形状、大小及分布特征的数据\n- [x] **非地理空间数据（属性数据）**：表示空间实体的属性特征，是对地理空间数据的说明\n- [x] **矢量数据**：用点、线、面及其拓扑关系表达空间实体；空间拓扑关系清晰，易于网络分析；图形数据质量高\n- [x] **栅格数据**：用规则网格表示空间实体；数据量大，易执行空间分析，与遥感数据匹配\n- [x] **矢量与栅格对比**：矢量——拓扑清晰、图形精美、叠置难；栅格——易分析、数据量大、图形粗糙\n- [x] **空间数据库**：数据统一定义、组织和存储，集中管理，消除\"数据孤岛\"；采用复杂数据模型（层次/网络/关系/对象）\n- [x] **Geodatabase**：ArcGIS第三代数据模型，包含要素类（点/线/面）、要素数据集、关系表\n- [x] **Shapefile**：由主文件(.shp)、索引文件(.shx)、dBASE表(.dbf)、空间索引组成\n- [x] **拓扑关系**：对现实世界地理事物之间空间关系的模仿程度；用于检查数据错误\n\n#### 二、关键公式 / 模型\n\n- [x] **栅格编码方法**：直接栅格编码（最简单最直接）、游程编码、四叉树编码\n- [x] **矢量数据结构**：点——坐标(X,Y)；线——坐标序列；面——闭合坐标序列+拓扑关系\n- [x] **数据模型层次**：层次模型→网络模型→关系模型→对象模型\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **MXD文件操作**：数据层排序原则（点线面由上至下、重要程度由上至下、线划由下至上、色彩由下至上）\n- [x] **创建要素类**：Catalog→选中要素数据集→新建→选择类型（Point/Line/Polygon）\n- [x] **矢量数据编辑**：选择要素→裁剪/分割/整形/移动\n- [x] **属性编辑**：添加字段→设置类型（Text/Short/Long/Double等）→计算字段值\n\n#### 四、高频考点（速记）\n\n1. 矢量 vs 栅格数据优缺点对比（必考）\n2. 空间数据采集方法：野外采集、地图数字化、摄影测量、遥感处理\n3. Geodatabase三级结构：要素类→要素数据集→Geodatabase\n4. Shapefile组成：.shp+.shx+.dbf（至少3文件）\n5. 拓扑关系用于检查数据错误\n6. 数据层排序四原则\n7. Geoprocessing环境设置影响工具运行\n\n#### 五、思考题 / 自测\n\n- [x] 题：矢量数据和栅格数据各有何优缺点？\n  答：矢量——拓扑清晰、图形精美、叠置难、投影变换易；栅格——易分析、数据量大、图形粗糙、与遥感匹配好\n- [x] 题：空间数据库与文件系统有何本质区别？\n  答：数据统一定义组织存储、集中管理消除数据孤岛、采用复杂数据模型\n- [x] 题：如何在ArcGIS中创建要素类？\n  答：Catalog→选中Geodatabase/要素数据集→新建→选择类型→定义字段和坐标系\n\n#### 六、与前后章之关联\n\n- 承前章：承接第一章GIS基本概念，深入空间数据组织\n- 启后章：为第三章空间数据转换与处理提供数据结构基础\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 空间数据-知识点回顾\n## 核心概念\n- 空间数据采集\n- 地理空间数据\n- 非地理空间数据（属性数据）\n- 矢量数据\n- 栅格数据\n- 矢量与栅格对比\n- 空间数据库\n- Geodatabase\n- Shapefile\n- 拓扑关系\n## 关键公式 / 模型\n- 栅格编码方法\n- 矢量数据结构\n- 数据模型层次\n## 高频考点\n- 矢量 vs 栅格数据优缺点对比（必考）\n- 空间数据采集方法：野外采集、地图数字化、摄影测量、遥感处理\n- Geodatabase三级结构：要素类→要素数据集→Geodatabase\n- Shapefile组成：.shp+.shx+.dbf（至少3文件）\n- 拓扑关系用于检查数据错误\n- 数据层排序四原则\n- Geoprocessing环境设置影响工具运行\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((空间数据-知识点回顾))\n    核心概念\n      空间数据采集\n      地理空间数据\n      非地理空间数据（属性数据）\n      矢量数据\n      栅格数据\n      矢量与栅格对比\n      空间数据库\n      Geodatabase\n      Shapefile\n      拓扑关系\n    关键公式 / 模型\n      栅格编码方法\n      矢量数据结构\n      数据模型层次\n    高频考点\n      矢量 vs 栅格数据优缺点对比（必考）\n      空间数据采集方法：野外采集、地图数字化、摄影测量、遥感处理\n      Geodatabase三级结构：要素类→要素数据集→Geodata…\n      Shapefile组成：.shp+.shx+.dbf（至少3文件）\n      拓扑关系用于检查数据错误\n      数据层排序四原则\n      Geoprocessing环境设置影响工具运行\n```\n\n<\/details>\n\n---\n\n### 第 3 章 · 空间数据的转换与处理\n\n> 素材：[_第03章_空间数据的转换与处理.md](./_第03章_空间数据的转换与处理.md) · 主版 104 页\n\n\n#### 一、核心概念（名词解释）\n\n- [x] **空间参考系统**：确定地理目标平面位置和高程的平面坐标系和高程系的统称\n- [x] **地球椭球体**：地球表面几何模型四类——自然表面→大地水准面→地球椭球面→数学模型\n- [x] **参考椭球体**：与局部地区大地水准面最佳拟合的地球椭球体，需确定定位与定向\n- [x] **大地坐标系**：以参考椭球面为基准面建立的坐标系，用大地经度L(-180~180)、大地纬度B(-90~+90)、大地高程表示\n- [x] **北京54坐标系**：参心坐标系，克拉索夫斯基椭球体，大地原点在前苏联普尔科沃；缺点——椭球参数不精确、与我国大地水准面西高东低倾斜\n- [x] **西安80坐标系**：参心坐标系，四个椭球基本参数，多点定位，大地原点在西安；定向明确\n- [x] **CGCS2000**：地心坐标系，2008年7月起启用，北斗卫星导航使用此系\n- [x] **WGS84**：地心坐标系，GPS定位结果所属坐标系\n- [x] **高程基准**：我国主要——1956黄海高程系、1985国家高程基准（青岛大港验潮站）\n- [x] **地图投影**：将地球椭球面上的经纬网按一定数学法则转换到平面上；实质是一一对应的映射关系\n- [x] **投影变形**：长度变形、面积变形、角度变形；投影必然产生变形\n- [x] **高斯-克吕格投影**：横轴切圆柱投影，中央经线无变形，我国大中比例尺地图常用\n- [x] **兰勃特投影**：正轴割圆锥投影，适用于中纬度东西延伸区域\n- [x] **空间变换**：同一区域不同空间参考系统之间的转换，包括坐标变换和投影变换\n- [x] **数据格式转换**：不同GIS平台间数据格式互转（Shapefile↔Geodatabase↔Coverage等）\n\n#### 二、关键公式 / 模型\n\n- [x] **投影变形类型**：长度比 m = 实际长度/椭球面长度；面积比 p = 实际面积/椭球面面积\n- [x] **高斯投影分带**：6°带（1:2.5万及更小比例尺）和3°带（1:1万及更大比例尺）\n- [x] **坐标转换方法**：四参数（平面相似变换）、七参数（三维赫尔默特变换）\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **ArcGIS定义投影**：ArcToolbox→Data Management→Projections and Transformations→Define Projection\n- [x] **ArcGIS投影变换**：Project工具，需选择转换方法（如Beijing54→CGCS2000的转换参数）\n- [x] **中国大地原点**：陕西省泾阳县永乐镇北流村（北纬34°32'27.00″东经108°55'25.00″）\n\n#### 四、高频考点（速记）\n\n1. 四大坐标系统对比（北京54/西安80/CGCS2000/WGS84）——参心vs地心是核心区别\n2. 地球表面四层模型：自然表面→大地水准面→椭球面→数学模型\n3. 地图投影必然产生变形（长度/面积/角度）\n4. 高斯-克吕格投影：横轴切圆柱、中央经线无变形、6°/3°分带\n5. 我国高程基准：1985国家高程基准（青岛）\n6. 投影变换 vs 坐标变换的区别\n7. CGCS2000是地心坐标系（北斗使用），北京54/西安80是参心坐标系\n\n#### 五、思考题 / 自测\n\n- [x] 题：北京54与西安80坐标系有何区别？\n  答：北京54用克拉索夫斯基椭球、原点在苏联；西安80用国际推荐参数、原点在西安、定向更明确\n- [x] 题：为什么要进行地图投影？\n  答：球面坐标不便测量计算，平面地图符合视觉习惯，但地球椭球为不可展开曲面\n- [x] 题：参心坐标系与地心坐标系有何区别？\n  答：参心——原点在参考椭球中心（近似地球质心）；地心——原点在地球质心，精度更高\n\n#### 六、与前后章之关联\n\n- 承前章：承接第二章空间数据组织，为数据赋予空间参考\n- 启后章：为第四章空间数据可视化表达提供坐标/投影基础\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 空间数据的转换与处理\n## 核心概念\n- 空间参考系统\n- 地球椭球体\n- 参考椭球体\n- 大地坐标系\n- 北京54坐标系\n- 西安80坐标系\n- CGCS2000\n- WGS84\n- 高程基准\n- 地图投影\n- 投影变形\n- 高斯-克吕格投影\n- 兰勃特投影\n- 空间变换\n## 关键公式 / 模型\n- 投影变形类型\n- 高斯投影分带\n- 坐标转换方法\n## 高频考点\n- 四大坐标系统对比（北京54/西安80/CGCS2000/WGS84）——参心vs地心是核心区别\n- 地球表面四层模型：自然表面→大地水准面→椭球面→数学模型\n- 地图投影必然产生变形（长度/面积/角度）\n- 高斯-克吕格投影：横轴切圆柱、中央经线无变形、6°/3°分带\n- 我国高程基准：1985国家高程基准（青岛）\n- 投影变换 vs 坐标变换的区别\n- CGCS2000是地心坐标系（北斗使用），北京54/西安80是参心坐标系\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((空间数据的转换与处理))\n    核心概念\n      空间参考系统\n      地球椭球体\n      参考椭球体\n      大地坐标系\n      北京54坐标系\n      西安80坐标系\n      CGCS2000\n      WGS84\n      高程基准\n      地图投影\n      投影变形\n      高斯-克吕格投影\n      兰勃特投影\n      空间变换\n    关键公式 / 模型\n      投影变形类型\n      高斯投影分带\n      坐标转换方法\n    高频考点\n      四大坐标系统对比（北京54/西安80/CGCS2000/WGS84…\n      地球表面四层模型：自然表面→大地水准面→椭球面→数学模型\n      地图投影必然产生变形（长度/面积/角度）\n      高斯-克吕格投影：横轴切圆柱、中央经线无变形、6°/3°分带\n      我国高程基准：1985国家高程基准（青岛）\n      投影变换 vs 坐标变换的区别\n      CGCS2000是地心坐标系（北斗使用），北京54/西安80是参心…\n```\n\n<\/details>\n\n---\n\n### 第 4 章 · 空间数据的可视化表达\n\n> 素材：[_第04章_空间数据的可视化表达.md](./_第04章_空间数据的可视化表达.md) · 主版 107 页\n\n\n#### 一、核心概念（名词解释）\n\n- [x] **数据可视化**：将数字信息转换为人可识别的图形，清晰有效传递信息，便于分析推理\n- [x] **地理信息可视化三层次**：①地图数据的可视化表示 ②地理信息的可视化表示（分级+专题地图） ③空间分析结果的可视化表示\n- [x] **符号化**：按实际情况确定地图符号基本形状，以颜色或形状区分事物性质\n- [x] **单一符号**：大小、形状、颜色统一的符号，忽略定量差异，只反映地理位置\n- [x] **分类色彩/分类符号**：不同属性值用不同符号，反映数量或质量差异\n- [x] **分级色彩**：属性值按分级方法分若干级别，不同颜色表示不同级别，反映定量差异\n- [x] **分级符号**：不同大小符号表示不同级别属性值，用于点/线要素\n- [x] **比率符号**：属性值与符号大小一一对应，反映同级别间微小差异；数值过大时不适用\n- [x] **统计符号**：饼图（整体与部分比例）、柱状图（比较/趋势）、累计柱状图（比例+趋势）\n- [x] **点值符号**：用点密度表现要素空间分布，数值大区域点多\n- [x] **专题地图**：突出表示一种或几种自然/社会经济现象的地图\n- [x] **地图布局要素**：图名、图例、比例尺、坐标网、指北针、图框、附图\n\n#### 二、关键公式 / 模型\n\n- [x] **符号化方法分类**：单一符号、分类符号、分级符号、分级色彩、比率符号、组合符号、统计符号、彩色阴影\n- [x] **矢量符号化**：点状→标记符号；线状→线符号；面状→填充符号\n- [x] **栅格符号化**：分类栅格符号、分级栅格符号\n- [x] **分级方法**：自然断点法（Jenks）、等间隔法、分位数法、标准差法\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **ArcMap符号系统**：符号选择器→符号属性编辑器→样式管理器\n- [x] **分类符号设置**：图层属性→符号系统→分类→设置类数和分类方法\n- [x] **分级符号设置**：图层属性→符号系统→数量→分级符号\n- [x] **地图输出**：布局视图→页面设置→添加图名/图例/比例尺/指北针→导出/打印\n\n#### 四、高频考点（速记）\n\n1. 符号化8种方法及其适用场景（必考）\n2. 分级色彩 vs 分级符号的区别（颜色vs大小）\n3. 比率符号的限制——属性值过大时不适用\n4. 统计符号三种类型：饼图/柱状图/累计柱状图\n5. 地理信息可视化三层次\n6. 地图布局六大要素\n7. 栅格数据符号化：分类+分级两种\n\n#### 五、思考题 / 自测\n\n- [x] 题：分级色彩与分级符号有何区别？\n  答：分级色彩用不同颜色表示级别差异，适用于面状要素；分级符号用不同大小表示，适用于点/线要素\n- [x] 题：比率符号与分级符号有何区别？\n  答：比率符号一一对应（连续变化），分级符号按级别分组（离散变化）\n- [x] 题：制作一幅完整专题地图需要哪些要素？\n  答：图名、图例、比例尺、坐标网、指北针、图框，可能还有附图和文字说明\n\n#### 六、与前后章之关联\n\n- 承前章：承接第三章坐标/投影体系，将空间数据以可视化方式呈现\n- 启后章：GIS课程总结，可视化是GIS应用输出的最终环节\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 空间数据的可视化表达\n## 核心概念\n- 数据可视化\n- 地理信息可视化三层次\n- 符号化\n- 单一符号\n- 分类色彩/分类符号\n- 分级色彩\n- 分级符号\n- 比率符号\n- 统计符号\n- 点值符号\n- 专题地图\n- 地图布局要素\n## 关键公式 / 模型\n- 符号化方法分类\n- 矢量符号化\n- 栅格符号化\n- 分级方法\n## 高频考点\n- 符号化8种方法及其适用场景（必考）\n- 分级色彩 vs 分级符号的区别（颜色vs大小）\n- 比率符号的限制——属性值过大时不适用\n- 统计符号三种类型：饼图/柱状图/累计柱状图\n- 地理信息可视化三层次\n- 地图布局六大要素\n- 栅格数据符号化：分类+分级两种\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((空间数据的可视化表达))\n    核心概念\n      数据可视化\n      地理信息可视化三层次\n      符号化\n      单一符号\n      分类色彩/分类符号\n      分级色彩\n      分级符号\n      比率符号\n      统计符号\n      点值符号\n      专题地图\n      地图布局要素\n    关键公式 / 模型\n      符号化方法分类\n      矢量符号化\n      栅格符号化\n      分级方法\n    高频考点\n      符号化8种方法及其适用场景（必考）\n      分级色彩 vs 分级符号的区别（颜色vs大小）\n      比率符号的限制——属性值过大时不适用\n      统计符号三种类型：饼图/柱状图/累计柱状图\n      地理信息可视化三层次\n      地图布局六大要素\n      栅格数据符号化：分类+分级两种\n```\n\n<\/details>\n\n---\n\n\n> **正言若反**：最终资料不离底层图像；凡疑处，复归章节素材与原始 PDF。\n> 每章之链：原始 PDF → `02_解析成果/<PDF_stem>/page_*.jpg` → 章节素材 md → 本资料。"}, {"id": "graph", "group": "总览资料", "title": "知识图谱 · 章节图谱", "md": "# 地理信息系统 · 章节图谱\n\n> 教师: 黄源生 · 学期: 2026春  \n> PDF: 6, 页: 726, 识别章节: 4 个\n> 章节号: 1, 2, 3, 4\n\n## 总览\n\n| 章节 | 标题 | 主版页数 | PDF 数 |\n|------|------|---------:|------:|\n| 第 1 章 | 地理信息系统 Geographic Information System, GIS | 90 | 2 |\n 📖 首学：第 3 章 空间数据的转换与处理 |\n| 2026-06-18 | 🔁 提取复习：第 3 章 空间数据的转换与处理 |\n| 2026-06-19 | 🔁 提取复习：第 1 章 地理信息系统 Geographic Information System, GIS |\n| 2026-06-20 | 🔁 提取复习：第 3 章 空间数据的转换与处理<br>📖 首学：第 4 章 空间数据的可视化表达 |\n| 2026-06-21 | 🔁 提取复习：第 2 章 空间数据-知识点回顾<br>🔁 提取复习：第 4 章 空间数据的可视化表达 |\n| 2026-06-23 | 🔁 提取复习：第 4 章 空间数据的可视化表达 |\n| 2026-06-24 | 🔁 提取复习：第 3 章 空间数据的转换与处理 |\n| 2026-06-26 | 🔁 提取复习：第 1 章 地理信息系统 Geographic Information System, GIS |\n| 2026-06-27 | 🔁 提取复习：第 4 章 空间数据的可视化表达 |\n| 2026-06-28 | 🔁 提取复习：第 2 章 空间数据-知识点回顾 |\n| 2026-07-01 | 🔁 提取复习：第 3 章 空间数据的转换与处理 |\n| 2026-07-02 | 🔁 提取复习：第 4 章 空间数据的可视化表达 |\n\n> 📖 = 首次学习（求懂）；🔁 = 闭卷提取复习（求牢）。错过某日，顺延即可，勿弃。\n\n## 四 · 交错刷题序（三轮 · 混章不连刷）\n\n1. 第 1 章 地理信息系统 Geographic Information System, GIS → 第 2 章 空间数据-知识点回顾 → 第 3 章 空间数据的转换与处理 → 第 4 章 空间数据的可视化表达\n2. 第 2 章 空间数据-知识点回顾 → 第 3 章 空间数据的转换与处理 → 第 4 章 空间数据的可视化表达 → 第 1 章 地理信息系统 Geographic Information System, GIS\n3. 第 3 章 空间数据的转换与处理 → 第 4 章 空间数据的可视化表达 → 第 1 章 地理信息系统 Geographic Information System, GIS → 第 2 章 空间数据-知识点回顾\n\n## 五 · 每日提取清单（贴在桌前）\n\n- [ ] 今日“首学”章：通读图文 + 看思维导图（求懂）\n- [ ] 今日“回提取”章：**闭卷**做 `自测题库.md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表"}, {"id": "web-00", "group": "真题与网络资源", "title": "一天冲刺路线图", "md": "# 地理信息系统 GIS · 一天冲刺路线图\n\n> 只有一天怎么办？按本页的时间盒顺序走，先建立\"数据—结构—分析—应用\"骨架，再回填要点。\n> 教材锚点：黄杏元、汤国安等《地理信息系统概论》。本页只做\"导航 + 高频清单\"。\n\n---\n\n## 一、一天时间分配（建议）\n\n| 时段 | 时长 | 做什么 | 用本站哪个板块 |\n| --- | --- | --- | --- |\n| ① 建立骨架 | 1.0 h | 通读 GIS 全貌：组成、数据流、功能 | 期末冲刺 → **期末骨架**；总览资料 → **总览/备考资料** |\n| ② 核心名词过一遍 | 1.5 h | 名词解释 + 高频考点，边看边默写 | 真题与网络资源 → **GIS核心知识点与名词解释速查** |\n| ③ 章节精讲（抓重点章） | 2.0 h | 矢量/栅格、空间分析、DEM、数据质量优先 | 章节精讲 → 各章 **知识精讲 + 例题** |\n| ④ 真题演练 | 1.5 h | 做真题、对照参考答案找薄弱点 | 真题与网络资源 → **GIS经典试题与参考答案 / 各校真题** |\n| ⑤ 自测 + 模拟 | 1.0 h | 闭卷默写名词、做一套题 | 期末冲刺 → **期末速查 / 期末模拟卷** |\n| ⑥ 临考扫雷 | 0.5 h | 回看\"易错辨析\"，确认空间分析类型 | 本页 + **核心知识点速查** |\n\n> 时间更紧（半天）：只做 ①②④——骨架 + 名词 + 真题。\n\n---\n\n## 二、必拿分的\"四条主线\"\n\n1. **GIS 是什么、由什么组成**：定义（采集/存储/管理/分析/表达地理空间数据的系统）；五大组成（硬件、软件、数据、人员、方法）；与 CAD/MIS/RS/GPS 的区别联系。\n2. **空间数据的两种结构**：**矢量**（点/线/面，拓扑关系，精度高、数据量小、利于网络分析）vs **栅格**（像元，结构简单、利于叠加与空间分析、数据量大）——优缺点、适用、相互转换。\n3. **空间分析（重头戏）**：缓冲区分析、叠加分析（点/线/面叠加，并/交/差）、网络分析（最短路径）、空间插值、**数字地形分析（DEM/坡度/坡向/TIN）**。\n4. **数据采集与质量**：数据源与采集方式（数字化、扫描、遥感、GPS）；空间数据质量（位置精度、属性精度、逻辑一致性、完整性）与误差来源。\n\n---\n\n## 三、必背名词（最小集 · 务必默写）\n\n地理信息系统（GIS）、空间数据、矢量数据结构、栅格数据结构、拓扑关系、空间数据库、缓冲区分析、叠加分析、网络分析、空间插值、数字高程模型（DEM）、TIN、空间数据质量、地图投影、空间参考（坐标系）。\n\n> 名词解释答题公式：**定义 + 关键特征 + 一句用途/举例**。\n\n---\n\n## 四、高频简答 / 论述（背框架）\n\n- 矢量与栅格数据结构的**优缺点对比**与适用场景。\n- GIS 的**基本功能**（数据采集与编辑、存储与管理、空间查询与分析、可视化与输出）。\n- **叠加分析**的类型与作用；**缓冲区分析**的概念与应用。\n- 空间数据**质量**的内容与误差来源。\n- DEM 的**表示方法**（规则格网、TIN、等高线）与应用（坡度坡向、通视、淹没分析）。\n\n---\n\n## 五、易错辨析（临考扫一眼）\n\n- **矢量**精度高、利于网络/拓扑分析；**栅格**利于叠加/空间分析与遥感融合——别把优缺点张冠李戴。\n- **拓扑关系**描述的是空间对象间的邻接/关联/包含，与具体坐标无关。\n- **叠加分析**（多层数据空间运算）≠ 简单的图层叠放显示。\n- DEM 是**高程**模型，DTM 是更广义的地形（含坡度等派生）；TIN 是不规则三角网。\n\n---\n\n## 六、考场答题节奏\n\n名词解释稳拿基本分 → 简答分条、必要时画示意（如缓冲区/叠加）→ 论述先列框架（套第二节四条主线）再展开 → 应用题\"明确需求 → 选数据结构与分析方法 → 给流程\"。\n\n> 道法自然：抓住\"数据—结构—分析—应用\"四块，一天之内把高频名词与空间分析方法吃透，基本盘已稳。"}, {"id": "web-01-GIS", "group": "真题与网络资源", "title": "中科院新疆所GIS真题", "md": "# 中科院新疆生态与地理研究所 GIS 考研真题\n\n> ★ 新疆相关 · 来源：CSDN xiliangxiaoke 博客等网络公开资源\n> 汇编于 2026-06-05\n\n---\n\n## 2004年 GIS 专业考研试题\n\n1. 地理信息系统集成的关键技术是什么？\n2. 谈谈 WebGIS 的关键技术？\n3. 数字地球的概念，谈谈数字地球的关键技术，如何建立数字城市？\n4. 地理信息系统工程的开发步骤？\n5. 地理信息系统空间分析的方法？\n\n---\n\n## 2006年 GIS 专业考研试题\n\n### 一、名词解释（5×10）\n\n1. **地图投影** —— 按一定数学法则，把地球椭球面上的经纬线网转绘到平面上的方法\n2. **拓扑关系** —— 空间实体之间的相邻、关联、包含等关系，是 GIS 空间分析的基础\n3. **TIN** —— 不规则三角网（Triangulated Irregular Network），用一系列不相交的三角形逼近地形表面\n4. **元数据** —— 描述数据的数据，说明数据内容、质量、状况等特征的信息\n5. **几何变换** —— 将空间数据从一个坐标系转换到另一个坐标系的数学过程\n6. **空间数据** —— 描述空间实体的位置、形状、大小及分布特征的数据\n7. **DEM** —— 数字高程模型（Digital Elevation Model），地面高程的数字表达\n8. **控制点** —— 已知坐标的地面点，用于几何纠正和坐标转换\n9. **LUCC** —— 土地利用/土地覆盖变化（Land Use and Land Cover Change）\n10. **数据压缩** —— 在保持必要信息的前提下减少数据量的技术\n\n### 二、简答（10×5）\n\n1. **简述空间数据库的特点？**\n\n   空间数据库具有以下特点：\n   - 数据量大，涉及海量空间数据\n   - 数据结构复杂，包含矢量和栅格等多种数据类型\n   - 具有空间拓扑关系\n   - 数据具有空间索引机制\n   - 需要支持空间查询和空间分析\n\n2. **简述常用的地图投影？**\n\n   - **高斯-克吕格投影**：等角横切椭圆柱投影，我国基本比例尺地形图采用\n   - **墨卡托投影**：等角正切圆柱投影，航海图常用\n   - **UTM 投影**：通用横轴墨卡托投影，中央经线长度比0.9996\n   - **兰伯特投影**：等角正轴割圆锥投影，我国1:100万地形图采用\n   - **阿尔伯斯投影**：正轴等面积割圆锥投影\n\n3. **简述空间分析方法？**\n\n   - **叠置分析**：将两层或多层空间数据叠加产生新特征\n   - **缓冲区分析**：根据点线面实体建立周围一定范围的缓冲区\n   - **网络分析**：路径分析、资源分配、连通分析等\n   - **数字地形分析**：坡度、坡向、等高线生成等\n   - **空间插值**：根据已知点推求未知点值\n\n4. **GIS 与 CAD 的主要区别？**\n\n   | 方面 | GIS | CAD |\n   |------|-----|-----|\n   | 数据内容 | 空间数据+属性数据 | 图形数据为主 |\n   | 分析功能 | 强大的空间分析 | 侧重制图设计 |\n   | 数据量 | 海量 | 相对较小 |\n   | 坐标系 | 地理坐标系 | 局部坐标系 |\n   | 拓扑关系 | 必须建立 | 一般不建立 |\n\n5. **简述目视解译的过程（解译标志）？**\n\n   目视解译过程：\n   - 建立解译标志（色调、纹理、形状、大小、阴影、位置等）\n   - 识别地物类型\n   - 综合分析和验证\n   - 解译成果整理\n\n### 三、论述题\n\n#### 1. 乌鲁木齐市土地利用变化研究（15分）\n\n现有一个乌鲁木齐市（1960—2000）的土地利用变化的研究，要你根据你所学的 GIS 知识和方法进行工作：\n\n**(1) 选择使用的有效、可行的 GIS 模型软件特点**\n\n推荐使用 ArcGIS 或 QGIS，特点：\n- 支持多源数据输入（遥感影像、矢量地图、属性表）\n- 具有强大的空间分析和叠置功能\n- 支持时序数据管理和变化检测\n- 可进行面积统计和报表生成\n\n**(2) 导入空间数据、生成拷贝、报表的外围设备**\n\n- 扫描仪：将纸质地图数字化\n- 数字化仪：手扶跟踪矢量化\n- 打印机/绘图仪：输出成果图\n- 硬盘/磁带机：数据存储与备份\n\n**(3) 建立项目所用的数据类型（栅格或矢量）**\n\n建议混合使用：\n- 矢量数据：土地利用分类边界、行政界线、道路河流等\n- 栅格数据：遥感影像（用于分类提取土地利用信息）\n- 属性数据：各类统计数据\n\n**(4) 为获得有价值的土地变化信息所需要 GIS 的功能**\n\n- 数据输入与编辑功能\n- 坐标配准与投影转换功能\n- 遥感影像分类功能\n- 叠置分析功能（不同时期土地利用图叠加）\n- 面积统计与查询功能\n- 可视化与制图输出功能\n\n#### 2. 采伐区选址方案（15分）\n\n某公司采伐，为防止水土流失，规定不得在坡度大于40%内采伐，同时规定采伐区必须位于距河流2KM以内，还要在沿公路8KM以内。现有地形图、河流矢量图、公路矢量图。问如何用GIS确定可采伐的范围，并画出示意图。\n\n**解题步骤：**\n\n1. **生成坡度图**：从地形图（DEM）生成坡度图\n2. **坡度筛选**：提取坡度≤40%的区域 → 得到图层A\n3. **河流缓冲区**：对河流矢量图建立2KM缓冲区 → 得到图层B\n4. **公路缓冲区**：对公路矢量图建立8KM缓冲区 → 得到图层C\n5. **叠置分析**：A ∩ B ∩ C = 可采伐区域\n6. **输出结果**：生成可采伐范围图，计算面积\n\n```\n示意图：\n地形图(DEM) → 坡度分析 → 坡度≤40% ──┐\n                                       ├── 叠置求交 ──→ 可采伐区\n河流图 → 2KM缓冲区 ──────────────────┤\n                                       │\n公路图 → 8KM缓冲区 ──────────────────┘\n```\n\n#### 3. GIS 的发展简史与趋势（20分）\n\n**发展简史：**\n\n- **萌芽期（1960s）**：世界上第一个GIS——加拿大地理信息系统（CGIS）诞生于1960年代\n- **发展期（1970s）**：GIS软件商业化，学术研究活跃\n- **应用期（1980s）**：工作站GIS出现，应用领域扩大\n- **产业化期（1990s-）**：桌面GIS普及，WebGIS出现\n- **中国GIS发展**：起步(1970-1980)、准备(1980-1985)、发展(1985-1995)、产业化(1996以后)\n\n**发展趋势：**\n\n1. **系统集成化**：GIS与RS、GPS集成（3S一体化）\n2. **平台网络化**：WebGIS、移动GIS、云GIS\n3. **数据标准化**：OpenGIS互操作标准、空间数据共享\n4. **应用社会化**：GIS进入大众生活（导航、LBS等）\n5. **技术前沿**：大数据GIS、人工智能GIS、三维GIS、时空GIS"}, {"id": "web-02", "group": "真题与网络资源", "title": "中科院地理所遥感所真题", "md": "# 各高校 GIS 考研真题集（二）· 中科院地理所/遥感所\n\n> 来源：CSDN、知乎等网络公开资源 · 汇编于 2026-06-05\n\n---\n\n## 一 · 中科院地理所\n\n### 2000年 GIS 研究生入学试题\n\n**一、名词解释（每个4分，共20分）**\n\n1. 空间拓扑关系\n2. 地址匹配\n3. 元数据\n\n### 2001年 GIS 研究生入学试题\n\n**一、名词解释**\n\n1. 地址匹配 —— 将文字形式的地址信息转换为地理坐标的过程\n2. 地图精度 —— 地图上量测的精确度或可靠程度\n3. 关系数据库 —— 基于关系模型组织的数据库，用二维表格表示实体及联系\n4. 四叉树 —— 一种层次性数据结构，将区域递归四等分\n\n**二、简答题**\n\n1. Internet GIS 的特点及应用\n2. GIS 的结构及功能\n3. 空间分析方法及应用\n\n**三、论述题**\n\n1. GIS 的发展趋势\n2. GIS 与 RS、GPS 的集成方法\n3. GIS 空间分析功能的缺陷及改进方法\n\n### 2002年 GIS 研究生入学试题\n\n**一、名词解释**\n\n1. 地理空间 —— 地理现象发生和存在的空间范围\n2. 行程编码 —— 一种栅格数据压缩方法，记录属性值和连续个数\n3. 地址匹配 —— 将地址描述转为空间坐标\n4. 拓扑关系 —— 空间实体间的相邻、关联、包含关系\n5. 空间数据元数据 —— 描述空间数据内容、质量、状况等特征的数据\n\n**二、简答**\n\n1. 地理信息系统的组成与功能\n2. 数字地形模型的建立方法与特点\n3. 地理信息系统互操作\n\n**三、问答**\n\n1. GIS 的发展历程\n2. 结合你的专业，谈一谈 GIS 的应用与关键点\n\n---\n\n## 二 · 中科院遥感应用研究所\n\n### 2003年 GIS 专业硕士入学考试试卷\n\n**一、名词解释（每题3分，共15分）**\n\n1. **地理信息系统** —— 在计算机软硬件支持下，对空间数据进行采集、存储、管理、分析、显示的系统\n2. **空间信息网格** —— 将空间信息按网格组织管理的技术体系\n3. **空间数据挖掘** —— 从空间数据库中提取隐含的、未知的、有价值的空间模式\n4. **数据互操作性** —— 不同系统之间共享和交换数据的能力\n5. **空间索引** —— 依据空间实体位置和形状组织的数据结构，加速空间查询\n\n**二、填空题（每空2分，共40分）**\n\n1. 地理信息系统萌芽于（1960）年代。\n2. 我国的地理信息系统工作起始于（1980）年代，其标志是（中科院遥感所成立全国第一个GIS研究室）。\n3. （拓扑）、（方向）和（度量）是地理空间分析的三大要素。\n4. 地理信息系统中的数据转换主要包括（格式转换）和（坐标转换）。\n5. 地理信息系统的空间分析分为（空间查询）、（空间分析）和（空间建模）三个层次。\n6. 空间关系通常分为（拓扑关系）、（方向关系）和（度量关系）三类。\n7. 手扶跟踪数字化的精度受（采点密度）、（操作员技能）和（设备精度）三种条件的影响。\n8. 空间信息查询方式主要有（属性查询）、（空间查询）和（图形查询）三种方式。\n\n**三、判断题**\n\n1. 若某一弧段的左、右多边形分别为A和B，则A、B两个多边形相邻。（对）\n2. 若弧段A和多边形P无交点，则A和P是分离关系。（对）\n3. 利用游程编码数据结构一定能够减少数据存储空间。（错——当相邻像元值变化频繁时反而增大）\n4. 对于等角投影，面积越大，造成的畸变越大，因而大面积的区域制图不适合使用等角投影。（对）\n5. 开放式GIS的目的是实现异构分布数据的共享和不同系统之间的互操作。（对）\n\n**四、简答题**\n\n1. **地理空间数据库的特点及发展趋势**\n   - 特点：数据量大、结构复杂、空间拓扑关系、时空动态性\n   - 趋势：面向对象、分布式、多媒体、时空一体化\n\n2. **空间数据质量的标准要素**\n   - 位置精度、属性精度、逻辑一致性、完整性、时间精度、数据世系\n\n3. **地理信息系统标准化的内容及意义**\n   - 内容：数据标准、技术标准、应用标准\n   - 意义：促进数据共享、保证数据质量、降低开发成本\n\n**五、论述题**\n\n1. **三峡工程淹没分析方案（25分）**\n\n   需要的基本数据：\n   - DEM 数据\n   - 土地利用/土地覆盖图\n   - 行政区划图\n   - 人口分布图\n   - 社会经济统计数据\n\n   技术方案：\n   - 根据蓄水位确定高程阈值\n   - 利用 DEM 提取低于阈值的区域（淹没范围）\n   - 叠置分析：淹没范围 ∩ 土地利用图 → 淹没耕地面积\n   - 叠置分析：淹没范围 ∩ 行政区划 ∩ 人口分布 → 移民数量\n   - 统计输出各类面积和人口数据\n\n2. **海面温度等值线方案（20分）**\n\n   - 利用观测点数据进行空间插值（IDW/克里金）\n   - 生成温度等值线分布图\n   - 计算温度梯度（相邻等值线间距/温度差）\n   - 可视化输出\n\n### 2005年 GIS 专业硕士入学考试试卷\n\n**一、填空题**\n\n1. 数据建模三个步骤：概念建模、逻辑建模、物理建模\n2. 空间分析三种类型：空间查询分析、空间拓扑分析、空间特征分析\n3. 矢量对象按维数分五类：点（0D）、线（1D）、面（2D）、体（3D）、时间维\n4. GIS硬件四部分：输入设备、处理设备、存储设备、输出设备\n5. 地图投影按畸变分：等角投影、等面积投影、任意投影；高斯投影为等角投影\n6. 数据库类型：层次型、网状型、关系型\n\n### 2006年 GIS 专业硕士入学考试试卷\n\n**一、名词解释（4'×5）**\n\n1. 虚拟现实 —— 利用计算机模拟产生三维空间环境的技术\n2. 空间信息网格 —— 网格计算技术在空间信息领域的应用\n3. 空间信息挖掘 —— 从海量空间数据中发现隐含知识\n4. 数据互操作性 —— 异构系统间数据共享和操作能力\n5. 空间索引 —— 基于空间位置的数据组织结构\n\n**二、填空**\n\n1. 数据建模三步骤：概念建模、逻辑建模、物理建模\n2. 空间分析三层次：空间查询、空间分析、空间建模\n3. 地图投影按畸变分三种类型：等角投影、等面积投影、任意投影。高斯投影为等角投影。面积大，畸变大\n4. 常用数据库模型有：层次模型、网状模型、关系模型、对象模型"}, {"id": "web-03", "group": "真题与网络资源", "title": "南大武大其他高校真题", "md": "# 各高校 GIS 考研真题集（三）· 南京大学/武汉大学/其他高校\n\n> 来源：CSDN xiliangxiaoke 博客等网络公开资源 · 汇编于 2026-06-05\n\n---\n\n## 一 · 南京大学\n\n### 1995年 GIS 考研入学试题\n\n**一、名词解释（20）**\n\n1. 地理信息系统\n2. 全球定位系统\n3. 数据结构\n4. 游程编码\n5. DIME文件\n\n**二、试以实例说明空间数据的基本特征及其在计算机中的表示方法（15）**\n\n**三、试述在 PC ARC/INFO 中一个 coverage 的生成步骤及使用的相应命令（15）**\n\n**四、试以城市某一子功能的应用为例，简述建立运行 GIS 的方法和步骤（25）**\n\n**五、简述 GIS 的空间分析功能及其地学应用（25）**\n\n### 1996年 GIS 考研入学试题\n\n**一、名词解释（20）**\n\n1. 地理信息系统\n2. 数据库管理系统\n3. 四叉树编码\n4. 边界代数算法\n5. 数字插值与拟合\n\n**二、试以实例说明空间数据的基本特征及其在计算机中的表示方法（15）**\n\n**三、试写出矢量和栅格数据结构的模式，并列表比较其优缺点（20）**\n\n### 2004年 GIS 考研入学试题\n\n**一、** 什么是数据库、数据库管理系统、数据库系统、数据库模型？（20分）\n\n**二、** GIS 系统中，为什么需做栅格数据和矢量数据之间的转换？这些转换有哪些算法？（30分）\n\n**三、** 举例说明 GIS 缓冲区分析和叠合分析的用途。（30分）\n\n**四、** Morton 编码与线性四叉树空间索引题（35分）\n\n**五、** 试列表说明解决某项应用的常规方法和 GIS 方法所采用关键技术的主要异同点。（35分）\n\n### 2005年 GIS 考研入学试题\n\n**一、名词解释**\n\n1. 4D产品 —— DLG+DRG+DOM+DEM\n2. 空间数据引擎 —— 中间件技术，实现空间数据在关系数据库中的存储管理\n3. LBS —— 基于位置的服务（Location Based Service）\n4. 数字高程模型 —— DEM\n5. 嵌入式GIS —— 运行在嵌入式设备上的GIS\n\n**二、问答题**\n\n1. 阐述地理信息系统的主要特征\n2. 阐述地理信息系统数据组织的发展及趋势\n3. 阐述主要的地理定位数据获取方法和原理\n4. 阐述电子政务系统与 GIS 的关系\n5. 阐述通信技术发展与 GIS 的相互关系\n\n### 2008年 GIS 考研入学试题\n\n**一、名词解释（4×10）**\n\n1. 似大地水准面和旋转椭球\n2. 多边形矢量结构中的拓扑关系\n3. 临界矩形和 Dijkstra 算法\n4. 高斯克吕格投影\n\n**二、论述（110'）**\n\n1. 简述 GIS 的硬件设备组成\n2. 什么是游程编码结构，影响游程编码的因素及压缩效果\n3. 试分析 Delaunay 三角形和泰森多边形的内在联系及在 GIS 中作用\n4. 分别举例说明点与多边形叠合分析、线与多边形叠合分析、多边形与多边形叠合分析\n5. 奥运售票点选址综合应用题\n\n---\n\n## 二 · 武汉大学 / 武汉测绘科技大学\n\n### 1998年 GIS 考研试题\n\n**一、选择**\n\n1. 世界上第一个地理信息系统产生于：**C 加拿大**（CGIS，1960s）\n2. 判断点是否在多边形内常用：**B 半线理论**（射线法）\n3. 空间集合分析主要完成：**D 叠置分析**\n4. 以线性四叉树表示 8×8 栅格矩阵时，第6行第5列 Morton 码值：**D 36**\n5. 建立空间要素之间的拓扑关系属于：**C 空间查询**功能\n\n**二、简述在栅格数据中提取多边形边界的一般方法**\n\n**三、地理信息系统中的数据输入包含几项内容？输入过程中可能产生的误差有几种？**\n\n**七、简答题**\n\n1. 地理坐标\n2. 地图投影研究的主要内容\n3. 地理信息系统中的地图投影配置应遵循的原则\n\n**八、介绍两种商用 GIS 基础软件的主要特性和适应的场合**\n\n**九、城市地下管线规划综合应用题**\n\n### 2008年 GIS 专业硕士入学考试试题（科目代码930）\n\n**一、名词解释（6×5分）**\n\n1. 智能地理信息系统\n2. 邻接矩阵\n3. 标识编码\n4. 有向赋权图\n5. 空间位置特征\n6. 空间数据的不确定性\n\n**二、简答题（5×16分）**\n\n1. 企业通过网络平台发布信息需要哪种网络系统结构？分为哪几种类型？\n2. 要解决多源数据的空间参考系不一致的问题，可以采用哪些方法？\n3. 理图层数据过大影响系统效率，采用何种索引可以解决？与目标索引什么关系？\n4. 缓冲区多边形是怎么建立的？缓冲区分析与缓冲区查询有什么区别？\n5. GIS 互操作需要解决的主要问题？有哪些解决方法？\n\n**三、分析题（20分）**\n\n土地管理部门利用 GIS 给土地分类图进行面积统计时，发现统计结果不一致。请分析可能影响统计结果的因素。\n\n**四、论述题（20分）**\n\n空间分析模型有哪些？并论述它们在开发 GIS 应用中的作用。\n\n---\n\n## 三 · 其他高校精选\n\n### 福州大学 2005年 GIS 硕士/博士研究生入学考试试卷\n\n**一、名词解释（每小题5分，共20分）**\n\n1. 电子地图\n2. 缓冲区\n3. GPS\n4. WebGIS\n\n**二、简答题（共90分）**\n\n1. 简述地理信息系统的基本功能（12分）\n2. 简述当代地理信息系统的发展动态（12分）\n3. 简述栅格数据结构的特点（12分）\n4. 简述空间数据输入地理信息系统的方法（12分）\n5. 简述 DEM 的基本类型（9分）\n6. 简述泰森多边形的性质（9分）\n7. 简述矢量数据叠置分析的基本类型和内容（12分）\n8. 简述虚拟现实的基本类型和意义（12分）\n\n**三、综合题（每小题20分，共40分）**\n\n1. 某地共有n个气象观测站，其平面坐标位置分别为 Pi(xi,yi)，设在某一时刻第i台站观测到的温度值为 ti，现需要计算同一时刻该地任意位置 P(x,y) 处的温度值，试设计三种完成该任务的插值方案。\n\n   **参考答案：**\n   - 方案一：距离反比加权法（IDW）——以距离的幂次倒数作为权重\n   - 方案二：克里金插值法（Kriging）——基于空间变异函数的最优线性无偏估计\n   - 方案三：样条函数法——用多项式拟合光滑曲面\n\n2. 试论述采用地理信息系统管理空间数据相对于传统手工方式的优势。\n\n### 河海大学 2005年 GIS 研究生入学试题\n\n**名词解释：** 元数据、空间数据编码、投影转换、数据压缩、时空数据库、DTM\n\n**简答/论述：**\n\n1. 地理空间数据的基本特征\n2. GIS 的基本构成\n3. Spaghetti 数据与拓扑数据的异同\n4. ArcGIS 的产品内容及每一个产品的重要功能\n5. GIS 项目的系统设计步骤\n6. GIS 基本数据结构，及优缺点\n7. GIS 与 MIS、CAD 的异同点\n8. 游程编码、四叉树编码\n9. 结合道路拆迁利用 GIS 进行面积计算的步骤及所需数据\n10. 当前 GIS 的发展趋势\n\n### 华中师范大学 2004年 GIS 专业考研试题\n\n**一、名词解释：**\n\n1. 数据精度 2. 矢量数据结构 3. 视线图 4. AHP 5. GML\n\n**二、问答题：**\n\n1. 栅格数据编码，并给出一张栅格图，让你设计一种编码方法\n2. 叙述由纸质地图转换到矢量电子地图方法及步骤\n3. 叙述遥感数据和 GIS 数据融合与意义\n4. 给你两个图层，一个是点要素图层，一个是多边形图层，要求你进行叠置分析、缓冲区分析和空间插值\n5. 某部门要设计一个桌面地理信息系统，要求你建立一个桌面原始模型，叙述过程\n\n### 兰州大学 2008年遥感与地理信息系统试题\n\n**参考教材：** 黄杏元《地理信息系统概论》、邬伦《地理信息系统——原理、方法和应用》\n\n**一、概念题（4×10）**\n\n1. 地理空间 2. 四叉树 3. 空间数据库 4. 对地观测系统 5. 辐照度\n6. 地物光谱 7. 极轨卫星 8. 中值滤波 9. K-L变换 10. 监督分类\n\n**二、简答（10×5）**\n\n1. 试述多边形矢量数据结构中弧段-结点拓扑关系的表达方法\n2. 试述多元空间数据融合的内容\n3. 试述 GIS 缓冲区分析的概念及作用\n4. 根据水体的光谱特征，如何运用图像处理技术从遥感影像中提取水体空间分布范围与信息？\n5. 简述专家系统在遥感与 GIS 中的应用\n\n**三、论述题（20×3）**\n\n1. 试述关系型数据库中的数据模型概念、设计方法\n2. 试述数字地形模型的基本概念、基本分析方法\n3. 试述根据 DEM、土地利用、政区图、道路交通图、人口分布图、遥感影像、社会经济统计年鉴等数据进行洪水淹没损失预测分析的方法和步骤\n4. 试述\"3S\"集成的概念、理论、关键技术\n\n### 浙江大学 2004年 GIS 专业考研试题\n\n1. 论述地理空间数据区别于一般计算机数据的本质特征\n2. GIS 所关注的三种基本拓扑特性是什么？在拓扑矢量数据结构中怎样表达？\n3. 解释栅格空间数据模型的几个基本构成成分，试将栅格数据与矢量数据进行总体比较\n4. 采用空间数据库引擎，地理空间数据管理方式与过去有什么不同？简述目前空间数据库引擎的两种主要实现方式\n5. 从基本思想或理论假设上，空间数据插值有哪四种类型？\n6. 矢量 GIS 叠置分析有哪三种主要形式？为什么栅格 GIS 叠置分析比矢量 GIS 叠置分析相对简单？\n\n### 中南大学 2003年 GIS 专业考研试题\n\n**参考教材：** 邬伦等《地理信息系统原理、方法和应用》、龚健雅《地理信息系统基础》\n\n**一、填空题（共40分，每空2分）**\n\n1. GIS 作为一门科学，一般认为是集计算机科学、（地理学）、（测绘学）等学科为一体的新兴边缘科学\n2. 基于计算机的信息系统一般分为管理信息系统、（地理信息系统）、（CAD）、（CAM）等四类\n3. 地球表面几何模型分为地球自然表面、（大地水准面）、（地球椭球面）、数学模型等四类\n4. 矢量数据结构编码的方式有（实体型）、（拓扑型）、（索引型）等\n5. 面向对象方法的数据抽象技术包括（概括）、（特化）、聚集、联合等\n6. 路径分析一般包括（最短路径）、（最佳路径）、N条最佳路径分析、动态最佳路径分析等\n7. GIS 硬件配置设计主要包括（输入设备）、（处理设备）、（输出设备）、存储设备、网络设备等\n8. 世界流行的 GIS 软件有（ArcGIS）、（MapInfo）、Mapinfo 等\n9. 我国的国家基本比例尺地形图均采用（高斯-克吕格）投影\n\n**二、选择题（共20分，每小题2分）**\n\n1. 空间数据编码的原则主要有系统性和科学性、（B 一致性）、标准化和通用性、简捷性、可扩展性等\n2. 不属于空间数据编辑与处理过程的是（D 数据分发）\n3. 不属于 WebGIS 软件产品的是（B GeoMedia——这是桌面GIS）\n4. 不属于 GIS 设计与开发步骤的是（D 系统安装）\n5. 计算最短路径的经典算法是（C Dijkstra）"}, {"id": "web-04-GIS", "group": "真题与网络资源", "title": "GIS核心知识点名词解释速查", "md": "# GIS 核心知识点与名词解释速查（扩展版）\n\n> 综合：黄杏元《地理信息系统概论》、邬伦《地理信息系统—原理、方法和应用》、\n> 汤国安《地理信息系统教程》、Kang-tsung Chang《地理信息系统导论》\n> 汇编于 2026-06-05 · 对应课程第1-4章\n\n---\n\n## 第1章 · 地理信息系统基础\n\n### 1.1 核心定义\n\n| 术语 | 释义 |\n|------|------|\n| 地理信息系统（GIS） | 在计算机软硬件支持下，对空间数据进行采集、存储、管理、分析、显示和输出的信息系统。既是跨学科应用基础学科，又是一项工程技术 |\n| 地理数据 | 与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律的数字、文字、图像和图形总称 |\n| 地理信息 | 有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释 |\n| 地理信息特征 | 空间特征、属性特征、时序特征 |\n| 信息 | 客观事物运动状态的表征，具有客观性、传输性、共享性、适用性 |\n| 数据 | 未加工的原始事实，是信息的载体 |\n\n### 1.2 GIS 组成与功能\n\n| 组成部分 | 说明 |\n|----------|------|\n| 硬件系统 | 服务器、工作站、输入设备（数字化仪、扫描仪、GPS）、输出设备（绘图仪、打印机）、存储设备 |\n| 软件系统 | 系统软件（OS）、GIS基础软件（ArcGIS、MapInfo、QGIS）、应用软件 |\n| 数据 | 空间数据+属性数据，是GIS的核心 |\n| 模型 | 空间分析模型、应用模型 |\n| 人员 | 系统开发人员、数据生产者、最终用户 |\n\n| GIS功能链 | 说明 |\n|-----------|------|\n| 数据采集与输入 | 将各种来源数据转为计算机可识别形式 |\n| 数据编辑与更新 | 数据检查、修改、维护 |\n| 数据存储与管理 | 空间数据库的组织与管理 |\n| 空间查询与分析 | GIS核心功能，区别于其他系统的根本标志 |\n| 数据与图形的交互显示 | 可视化表达 |\n| 应用模型与系统开发 | 面向具体应用的模型构建 |\n\n### 1.3 GIS 发展\n\n| 阶段 | 时间 | 标志 |\n|------|------|------|\n| 萌芽期 | 1960s | 加拿大CGIS（世界第一个GIS） |\n| 发展期 | 1970s | GIS软件商业化 |\n| 应用期 | 1980s | 工作站GIS |\n| 产业化期 | 1990s- | 桌面GIS、WebGIS |\n| 中国起步 | 1970-1980 | 中科院遥感所GIS研究室 |\n\n### 1.4 GIS 与其他系统区别\n\n| 对比 | GIS | CAD | MIS |\n|------|-----|-----|-----|\n| 数据 | 空间+属性 | 图形为主 | 属性为主 |\n| 分析 | 空间分析 | 制图设计 | 统计分析 |\n| 坐标 | 地理坐标系 | 局部坐标系 | 无 |\n| 拓扑 | 必须建立 | 一般不建立 | 无 |\n\n---\n\n## 第2章 · 空间数据\n\n### 2.1 空间数据基本概念\n\n| 术语 | 释义 |\n|------|------|\n| 空间数据 | 描述空间实体的位置、形状、大小及分布特征的数据 |\n| 空间数据特征 | 空间特征（位置）、属性特征（性质）、时序特征（时间） |\n| 属性数据 | 表示空间实体的属性特征，是对地理空间数据的说明 |\n| 地理空间 | 地理现象发生和存在的空间范围，通常指地球表层 |\n| 空间实体 | 具有空间位置和属性特征的地理对象（点、线、面、体） |\n\n### 2.2 空间数据采集方法\n\n| 方法 | 说明 |\n|------|------|\n| 野外采集 | GPS测量、全站仪等 |\n| 地图数字化 | 手扶跟踪数字化、扫描矢量化 |\n| 摄影测量 | 航空摄影、数字摄影测量 |\n| 遥感处理 | 卫星遥感影像解译与分类 |\n\n### 2.3 栅格数据编码\n\n| 编码方法 | 特点 |\n|----------|------|\n| 直接栅格编码 | 最简单最直接，逐行逐列记录像元值 |\n| 游程编码（RLE） | 记录属性值+连续个数，适合大片同值区域 |\n| 四叉树编码 | 递归四等分，同值区合并，适合层次性数据 |\n| 链码（Freeman） | 用方向码记录边界，适合线状要素 |\n\n### 2.4 矢量数据结构\n\n| 要素 | 表示方法 |\n|------|----------|\n| 点 | 坐标(X,Y) |\n| 线 | 坐标序列 |\n| 面 | 闭合坐标序列+拓扑关系 |\n\n### 2.5 矢量 vs 栅格对比（必考）\n\n| 方面 | 矢量 | 栅格 |\n|------|------|------|\n| 数据结构 | 复杂、精确 | 简单、规则 |\n| 数据量 | 小 | 大 |\n| 拓扑关系 | 易建立 | 难建立 |\n| 图形精度 | 高 | 取决于分辨率 |\n| 空间分析 | 叠置分析复杂 | 叠置分析简单 |\n| 图形显示 | 精美 | 有锯齿 |\n| 适宜对象 | 离散对象 | 连续场数据 |\n\n### 2.6 数据模型\n\n| 模型 | 特点 |\n|------|------|\n| 层次模型 | 树形结构，一对多 |\n| 网络模型 | 图结构，多对多 |\n| 关系模型 | 二维表，最广泛使用 |\n| 对象模型 | 封装+继承+多态 |\n\n### 2.7 Geodatabase 三级结构\n\n要素类（Feature Class）→ 要素数据集（Feature Dataset）→ Geodatabase\n\n### 2.8 空间数据质量\n\n| 质量要素 | 说明 |\n|----------|------|\n| 位置精度 | 空间位置的准确程度 |\n| 属性精度 | 属性值的准确程度 |\n| 逻辑一致性 | 数据间逻辑关系的正确性 |\n| 完整性 | 数据是否完整无遗漏 |\n| 时间精度 | 数据的时间现势性 |\n| 数据世系 | 数据来源和处理历史 |\n\n---\n\n## 第3章 · 空间数据的转换与处理\n\n### 3.1 空间参考系统\n\n| 术语 | 释义 |\n|------|------|\n| 空间参考系统 | 确定地理目标平面位置和高程的平面坐标系和高程系的统称 |\n| 地球椭球体 | 地球表面几何模型四类——自然表面→大地水准面→地球椭球面→数学模型 |\n| 参考椭球体 | 与局部地区大地水准面最佳拟合的地球椭球体，需确定定位与定向 |\n| 大地水准面 | 假想平均海水面延伸穿过大陆形成的封闭曲面，是高程的基准面 |\n| 参心坐标系 | 原点在参考椭球中心的坐标系（北京54、西安80） |\n| 地心坐标系 | 原点在地球质心的坐标系（CGCS2000、WGS84） |\n\n### 3.2 四大坐标系统对比（必考）\n\n| 坐标系 | 类型 | 原点 | 椭球体 | 特点 |\n|--------|------|------|--------|------|\n| 北京54 | 参心 | 参考椭球中心 | 克拉索夫斯基 | 原苏联体系，精度较低 |\n| 西安80 | 参心 | 参考椭球中心 | IUGG1975 | 中国自主建立，精度提高 |\n| CGCS2000 | 地心 | 地球质心 | CGCS2000椭球 | 中国新一代地心坐标系 |\n| WGS84 | 地心 | 地球质心 | WGS84椭球 | GPS使用，全球统一 |\n\n### 3.3 地图投影\n\n| 投影类型 | 变形特征 | 典型投影 | 适用场景 |\n|----------|----------|----------|----------|\n| 等角投影 | 角度无变形，面积变形大 | 墨卡托、高斯-克吕格 | 航海、地形图 |\n| 等面积投影 | 面积无变形，角度变形大 | 阿尔伯斯 | 面积统计 |\n| 任意投影 | 均有变形但较均匀 | 兰伯特 | 中小比例尺 |\n\n### 3.4 高斯-克吕格投影（重点）\n\n- 类型：等角横切椭圆柱投影\n- 特点：中央经线无变形，离中央经线越远变形越大\n- 分带：6°带（1:2.5万及更小）、3°带（1:1万及更大）\n- 我国6°分带：13-23带\n- 坐标规定：X轴=赤道，Y轴=中央经线，Y值加500km避免负值\n\n### 3.5 坐标转换方法\n\n| 方法 | 参数 | 适用 |\n|------|------|------|\n| 四参数变换 | 2平移+1旋转+1缩放 | 平面相似变换，小范围 |\n| 七参数变换 | 3平移+3旋转+1缩放 | 三维赫尔默特变换，大范围 |\n| 仿射变换 | 6参数 | X/Y方向不同缩放+扭曲+旋转+平移 |\n| 相似变换 | 4参数 | 等比例缩放+旋转+平移 |\n\n### 3.6 投影转换方式\n\n| 方式 | 说明 |\n|------|------|\n| 正解变换 | 直接建立两个投影间的解析关系式 |\n| 反解变换 | 先反解出地理坐标，再代入新投影公式 |\n| 数值变换 | 利用离散点坐标，数值逼近建立关系式 |\n| 解析-数值变换 | 新投影已知，原投影未知，先反解再代入 |\n\n### 3.7 空间内插方法\n\n| 类型 | 方法 |\n|------|------|\n| 分块内插法 | 线性内插、双线性多项式、二元样条函数 |\n| 逐点内插法 | 移动拟合法、距离反比加权（IDW）、克里金法 |\n| 整体内插法 | N次多项式拟合 |\n\n### 3.8 空间数据处理三方面\n\n1. **数据变换**：坐标系变换，包括几何纠正和投影转换\n2. **数据重构**：格式转换、结构转换、类型替换\n3. **数据提取**：类型提取、窗口提取、空间内插\n\n---\n\n## 第4章 · 空间数据的可视化表达\n\n### 4.1 可视化基本概念\n\n| 术语 | 释义 |\n|------|------|\n| 数据可视化 | 将数字信息转换为人可识别的图形，清晰有效传递信息 |\n| 地理信息可视化三层次 | ①地图数据的可视化表示 ②地理信息的可视化表示（分级+专题地图） ③空间分析结果的可视化表示 |\n| 符号化 | 按实际情况确定地图符号基本形状，以颜色或形状区分事物性质 |\n\n### 4.2 符号化8种方法（必考）\n\n| 方法 | 说明 | 适用场景 |\n|------|------|----------|\n| 单一符号 | 所有要素同一符号 | 仅关注位置分布 |\n| 分类符号 | 按属性类别不同符号 | 土地利用分类、行政区划 |\n| 分级符号 | 按数值大小不同大小符号 | 人口等级、GDP等级 |\n| 分级色彩 | 按数值大小不同颜色 | 温度分布、降水分布 |\n| 比率符号 | 符号大小与属性值成比例 | 精确表示数量（值过大时不适用） |\n| 组合符号 | 多属性组合表示 | 同时表示多个指标 |\n| 统计符号 | 饼图/柱状图符号 | 多属性统计对比 |\n| 彩色阴影 | 用色彩深浅表示 | 地形渲染、阴影效果 |\n\n### 4.3 矢量符号化\n\n| 要素类型 | 符号类型 |\n|----------|----------|\n| 点状 | 标记符号（Marker） |\n| 线状 | 线符号（Line） |\n| 面状 | 填充符号（Fill） |\n\n### 4.4 栅格符号化\n\n| 类型 | 说明 |\n|------|------|\n| 分类栅格符号 | 不同类别不同颜色 |\n| 分级栅格符号 | 不同级别不同色彩深浅 |\n\n### 4.5 专题地图\n\n| 类型 | 说明 |\n|------|------|\n| 质量底色图 | 表示现象的质量特征 |\n| 等值线图 | 用等值线表示连续变化现象 |\n| 分级统计图 | 以行政单元为单位分级着色 |\n| 定点符号图 | 用点状符号表示离散现象 |\n| 动线图 | 用箭头表示运动方向和路径 |\n\n### 4.6 地图制图综合\n\n- 概括：简化细节，保留主要特征\n- 合并：相邻同类要素合并\n- 选取：根据重要性取舍\n| 移位：避免符号重叠而偏移\n\n---\n\n## 跨章核心名词速对（30+）\n\n| # | 术语 | 释义 | 章 |\n|---|------|------|---:|\n| 1 | GIS | 地理信息系统 | 1 |\n| 2 | 地理数据 | 与地理环境要素有关的数据总称 | 1 |\n| 3 | 地理信息 | 对地理数据的解释和知识 | 1 |\n| 4 | 空间数据 | 描述空间实体位置、形状、大小的数据 | 2 |\n| 5 | 属性数据 | 表示空间实体属性特征的数据 | 2 |\n| 6 | 拓扑关系 | 空间实体间的相邻、关联、包含关系 | 2 |\n| 7 | 游程编码 | 记录属性值+连续个数的栅格压缩方法 | 2 |\n| 8 | 四叉树 | 递归四等分的层次性数据结构 | 2 |\n| 9 | Geodatabase | ESRI的空间数据存储模型 | 2 |\n| 10 | 元数据 | 描述数据的数据 | 2 |\n| 11 | DEM | 数字高程模型 | 2 |\n| 12 | TIN | 不规则三角网 | 2 |\n| 13 | 空间参考系统 | 平面坐标系和高程系的统称 | 3 |\n| 14 | 大地水准面 | 平均海水面延伸形成的封闭曲面 | 3 |\n| 15 | 参考椭球体 | 与局部大地水准面最佳拟合的椭球体 | 3 |\n| 16 | 地图投影 | 将地球椭球面转绘到平面的数学方法 | 3 |\n| 17 | 高斯-克吕格投影 | 等角横切椭圆柱投影 | 3 |\n| 18 | 墨卡托投影 | 等角正切圆柱投影 | 3 |\n| 19 | UTM投影 | 通用横轴墨卡托投影 | 3 |\n| 20 | 兰伯特投影 | 等角正轴割圆锥投影 | 3 |\n| 21 | 阿尔伯斯投影 | 正轴等面积割圆锥投影 | 3 |\n| 22 | 仿射变换 | 6参数变换，X/Y方向不同缩放 | 3 |\n| 23 | 四参数变换 | 平面相似变换 | 3 |\n| 24 | 七参数变换 | 三维赫尔默特变换 | 3 |\n| 25 | 克里金插值 | 基于变异函数的最优线性无偏估计 | 3 |\n| 26 | 数据可视化 | 数字信息转换为图形的过程 | 4 |\n| 27 | 符号化 | 确定地图符号以区分事物性质 | 4 |\n| 28 | 分级色彩 | 按数值大小用不同颜色表示 | 4 |\n| 29 | 分级符号 | 按数值大小用不同大小符号表示 | 4 |\n| 30 | 比率符号 | 符号大小与属性值成比例 | 4 |\n| 31 | 专题地图 | 突出表示一种或几种主题要素的地图 | 4 |\n| 32 | 叠置分析 | 将两层或多层空间数据叠加产生新特征 | 2 |\n| 33 | 缓冲区分析 | 建立实体周围一定范围的缓冲区 | 2 |\n| 34 | 空间索引 | 基于空间位置的数据组织结构 | 2 |\n| 35 | WebGIS | 基于Internet的地理信息系统 | 1 |"}, {"id": "web-05-GIS", "group": "真题与网络资源", "title": "GIS经典试题与参考答案", "md": "# GIS 经典试题与参考答案（简答/论述/计算）\n\n> 综合：各高校考研真题、自考真题、期末试题高频题\n> 汇编于 2026-06-05 · 按题型分类\n\n---\n\n## 一 · 名词解释（高频30题）\n\n### 1. 地理信息系统（GIS）\n在计算机软硬件支持下，对空间数据进行采集、存储、管理、分析、显示和输出的信息系统。它既是跨学科的应用基础学科，又是一项工程技术。\n\n### 2. 空间数据\n描述空间实体的位置、形状、大小及分布特征的数据，具有空间特征、属性特征和时序特征三大基本特征。\n\n### 3. 地理信息\n有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。\n\n### 4. 拓扑关系\n空间实体间的相邻、关联、包含关系。拓扑关系不随地图投影和比例尺变化而改变，是空间分析的基础。\n\n### 5. 游程编码（RLE）\n一种栅格数据压缩方法，记录属性值及其连续出现的个数。适合大片同值区域的压缩，压缩效果取决于数据的均匀程度。\n\n### 6. 四叉树编码\n递归四等分的层次性数据结构，同值区合并为一个节点，不同值区继续细分。适合具有层次性和区域一致性的数据。\n\n### 7. 数字高程模型（DEM）\n通过有限地形高程数据实现对地面高程的数字化模拟，是地形分析的数学基础。表达形式有规则格网（Grid）和不规则三角网（TIN）。\n\n### 8. 不规则三角网（TIN）\n由不规则分布的数据点按Delaunay三角准则自动连接形成的三角网络，能根据地形的起伏特征改变采样密度。\n\n### 9. 元数据\n描述数据的数据，说明数据的内容、质量、状况和其他有关特征的信息。用于数据共享、查询和管理。\n\n### 10. 地图投影\n将地球椭球面上的点映射到平面上的数学方法。实质是建立地球椭球面与平面之间点的一一对应关系。\n\n### 11. 高斯-克吕格投影\n等角横切椭圆柱投影。中央经线无变形，离中央经线越远变形越大。我国基本比例尺地形图采用此投影，6°分带（13-23带）和3°分带。\n\n### 12. 仿射变换\n6参数坐标变换方法，可在X和Y方向上进行不同比例的缩放，同时进行扭曲、旋转和平移。特性：直线变换后仍为直线，平行线仍为平行线。\n\n### 13. 缓冲区分析\n对空间实体周围建立一定宽度的缓冲区多边形，用于分析实体对周围环境的影响范围。\n\n### 14. 叠置分析\n将两层或多层空间数据叠加，产生新的空间特征和属性的分析方法。是GIS最基本的空间分析功能之一。\n\n### 15. 空间内插\n通过已知点数据推求未知点数据的数学方法。常用方法有距离反比加权法（IDW）、克里金法（Kriging）、样条函数法。\n\n### 16. 克里金插值（Kriging）\n基于区域化变量理论，利用变异函数，对未知点进行最优线性无偏估计的空间插值方法。\n\n### 17. 空间索引\n基于空间实体位置和形状或空间关系，按一定顺序排列的数据结构。常见类型有范围索引、格网索引、四叉树索引。\n\n### 18. Geodatabase\nESRI提出的面向对象的空间数据存储模型，三级结构：要素类→要素数据集→Geodatabase。\n\n### 19. WebGIS\n基于Internet/Intranet的地理信息系统，利用Web技术实现空间数据的发布、共享和互操作。\n\n### 20. 空间数据引擎（SDE）\n中间件技术，实现空间数据在关系数据库中的存储管理，使GIS应用与数据库之间建立连接桥梁。\n\n### 21. 数据可视化\n将数字信息转换为人可识别的图形图像，清晰有效地传递信息的过程。\n\n### 22. 符号化\n按实际情况确定地图符号的基本形状，以颜色或形状区分事物性质，将空间数据转换为地图表达的过程。\n\n### 23. 专题地图\n突出表示一种或几种主题要素的地图，如人口分布图、土地利用图、等温线图等。\n\n### 24. 大地水准面\n假设平均海水面延伸穿过大陆形成的封闭曲面，是高程的基准面，也是地球形状的物理表面。\n\n### 25. 参考椭球体\n与局部地区大地水准面最佳拟合的地球椭球体，需确定定位与定向参数。\n\n### 26. CGCS2000\n中国大地坐标系2000，原点在地球质心的地心坐标系，椭球体为CGCS2000椭球，是我国新一代国家大地坐标系。\n\n### 27. Dijkstra算法\n求解图中单源最短路径的经典算法，采用贪心策略逐步扩展最短路径树。时间复杂度O(n²)。\n\n### 28. 泰森多边形（Voronoi图）\n由一组点生成的多边形，每个多边形内的点到其生成点的距离小于到其他任何生成点的距离。与Delaunay三角网互为对偶。\n\n### 29. 制图综合\n根据地图用途和比例尺，对地图内容进行选取、概括、合并和移位，以保持地图清晰可读的过程。\n\n### 30. 3S集成\nGPS（定位）、RS（遥感获取）、GIS（分析管理）三种技术的集成应用，实现从数据获取到分析应用的全流程。\n\n---\n\n## 二 · 简答题（高频20题）\n\n### 1. 简述GIS的基本组成\n\nGIS由五部分组成：\n1. **硬件系统**：服务器、工作站、输入设备（数字化仪、扫描仪、GPS）、输出设备（绘图仪、打印机）、存储设备\n2. **软件系统**：系统软件（OS）、GIS基础软件（ArcGIS、MapInfo、QGIS）、应用软件\n3. **数据**：空间数据+属性数据，是GIS的核心内容\n4. **模型**：空间分析模型、应用模型\n5. **人员**：系统开发人员、数据生产者、最终用户\n\n### 2. 简述GIS的基本功能\n\n1. **数据采集与输入**：将各种来源数据转为计算机可识别形式\n2. **数据编辑与更新**：数据检查、修改、维护\n3. **数据存储与管理**：空间数据库的组织与管理\n4. **空间查询与分析**：GIS核心功能，区别于其他系统的根本标志\n5. **数据与图形的交互显示**：可视化表达\n6. **应用模型与系统开发**：面向具体应用的模型构建\n\n### 3. 简述矢量数据与栅格数据的区别（必考）\n\n| 方面 | 矢量 | 栅格 |\n|------|------|------|\n| 数据结构 | 复杂、精确 | 简单、规则 |\n| 数据量 | 小 | 大 |\n| 拓扑关系 | 易建立 | 难建立 |\n| 图形精度 | 高 | 取决于分辨率 |\n| 叠置分析 | 复杂 | 简单 |\n| 图形显示 | 精美 | 有锯齿 |\n| 适宜对象 | 离散对象 | 连续场数据 |\n\n### 4. 简述空间数据的三大基本特征\n\n1. **空间特征**：描述实体位置、形状、大小及实体间的空间关系（拓扑、方向、度量），是GIS区别于其他信息系统的根本标志\n2. **属性特征**：描述实体的性质和状态，如类型、等级、数量等\n3. **时序特征**：描述实体随时间变化的特征，反映数据的现势性\n\n### 5. 简述栅格数据编码方法\n\n1. **直接栅格编码**：最简单，逐行逐列记录像元值\n2. **游程编码（RLE）**：记录属性值+连续个数，适合大片同值区域\n3. **四叉树编码**：递归四等分，同值区合并，适合层次性数据\n4. **链码（Freeman码）**：用方向码记录边界，适合线状要素\n\n### 6. 简述高斯-克吕格投影的特点\n\n1. 中央经线上没有任何变形，投影后保持长度不变\n2. 除中央经线外，其他任何点长度比大于1\n3. 同一纬线上，离中央经线越远变形越大\n4. 同一经线上，纬度越低变形越大\n5. 属于等角投影，面积比为长度比的平方\n6. 长度比等变形线平行于中央经线\n7. 分带控制变形：6°带和3°带\n\n### 7. 简述仿射变换的特性\n\n仿射变换是6参数变换，特性：\n1. 直线变换后仍为直线\n2. 平行线变换后仍为平行线\n3. 不同方向上的长度比发生变化\n4. 可在X和Y方向上进行不同比例的缩放\n5. 同时进行扭曲、旋转和平移\n\n### 8. 简述空间数据处理的三方面内容\n\n1. **数据变换**：数据从一种数学状态到另一种数学状态的变换，包括几何纠正和地图投影转换\n2. **数据重构**：数据从一种格式到另一种格式的转换，包括结构转换、格式转换、类型替换\n3. **数据提取**：对数据进行某种条件的取舍，包括类型提取、窗口提取、空间内插\n\n### 9. 简述空间内插的三种类型\n\n1. **分块内插法**：将区域分块，每块内用简单函数拟合。包括线性内插、双线性多项式内插、二元样条函数内插\n2. **逐点内插法**：以待插点为中心，利用周围一定范围内的已知点进行内插。包括移动拟合法、距离反比加权法（IDW）、克里金法\n3. **整体内插法**：在整个区域上用统一函数拟合。包括N次多项式拟合法\n\n### 10. 简述投影转换的四种方式\n\n1. **正解变换**：直接建立两个投影间的解析关系式\n2. **反解变换**：先反解出地理坐标，再代入新投影公式\n3. **数值变换**：原投影公式未知时，利用离散点坐标数值逼近建立关系式\n4. **解析-数值变换**：新投影已知、原投影未知，先反解出地理坐标再代入新投影\n\n### 11. 简述GIS与MIS、CAD的区别\n\n| 方面 | GIS | MIS | CAD |\n|------|-----|-----|-----|\n| 数据类型 | 空间+属性 | 属性为主 | 图形为主 |\n| 坐标系 | 地理坐标系 | 无 | 局部坐标系 |\n| 拓扑关系 | 必须建立 | 无 | 一般不建立 |\n| 核心功能 | 空间分析 | 统计分析 | 制图设计 |\n| 数据量 | 大 | 中 | 小 |\n\n### 12. 简述空间数据质量的要素\n\n1. **位置精度**：空间位置的准确程度\n2. **属性精度**：属性值的准确程度\n3. **逻辑一致性**：数据间逻辑关系的正确性\n4. **完整性**：数据是否完整无遗漏\n5. **时间精度**：数据的时间现势性\n6. **数据世系**：数据来源和处理历史\n\n### 13. 简述空间数据采集的主要方法\n\n1. **野外采集**：GPS测量、全站仪等\n2. **地图数字化**：手扶跟踪数字化、扫描矢量化\n3. **摄影测量**：航空摄影、数字摄影测量\n4. **遥感处理**：卫星遥感影像解译与分类\n\n### 14. 简述缓冲区分析的步骤\n\n1. 确定缓冲目标（点、线、面）\n2. 设定缓冲距离\n3. 生成缓冲区多边形\n4. 进行叠加分析\n5. 提取结果\n\n### 15. 简述叠置分析的三种类型\n\n1. **点与多边形叠置**：判断点落在哪个多边形内，获得多边形属性\n2. **线与多边形叠置**：判断线穿越哪些多边形，将线段分割并赋予多边形属性\n3. **多边形与多边形叠置**：将两个多边形图层叠加产生新多边形，属性合并\n\n### 16. 简述符号化的8种方法\n\n1. **单一符号**：所有要素同一符号\n2. **分类符号**：按属性类别不同符号\n3. **分级符号**：按数值大小不同大小符号\n4. **分级色彩**：按数值大小不同颜色\n5. **比率符号**：符号大小与属性值成比例\n6. **组合符号**：多属性组合表示\n7. **统计符号**：饼图/柱状图符号\n8. **彩色阴影**：色彩深浅表示\n\n### 17. 简述关系数据库的三类完整性\n\n1. **实体完整性**：主键非空原则\n2. **参照完整性**：不允许引用不存在的实体\n3. **用户自定义完整性**：具体应用所涉及数据必须满足的语义要求\n\n### 18. 简述数据库范式\n\n1. **1NF**：每个属性必须是原子、不可分割的数据项\n2. **2NF**：在1NF基础上，每个非主属性完全函数依赖关键字\n3. **3NF**：在2NF基础上，消除传递函数依赖\n4. **BCNF**：每个决定因素都是候选关键字\n\n### 19. 简述常见的空间索引方法\n\n1. **范围索引**：记录每个空间实体的最大最小坐标\n2. **格网索引**：将区域划分为大小相等的网格，记录每个网格内空间实体的地址\n3. **四叉树索引**：递归四等分区域，用莫顿码记录实体位置\n\n### 20. 简述GIS的发展趋势\n\n1. WebGIS和云GIS\n2. 移动GIS和嵌入式GIS\n3. 三维GIS和时态GIS\n4. GIS与大数据、AI融合\n5. 互操作和标准化\n6. 开源GIS发展\n\n---\n\n## 三 · 论述题（高频10题）\n\n### 1. 论述GIS空间分析功能及其在地学中的应用\n\n**空间分析功能：**\n1. **空间查询**：属性查图形、图形查属性\n2. **叠置分析**：多图层叠加产生新特征\n3. **缓冲区分析**：分析实体影响范围\n4. **网络分析**：最短路径、最佳路径、资源分配\n5. **地形分析**：坡度、坡向、等高线生成\n6. **空间统计分析**：空间自相关、空间插值\n\n**地学应用：**\n- 城市规划：用地适宜性评价\n- 环境保护：污染源影响范围分析\n- 交通规划：最短路径选择\n- 农业：作物适宜性评价\n- 地质：矿产资源评价\n- 防灾减灾：洪水淹没分析\n\n### 2. 论述四种坐标系统的区别与联系\n\n| 坐标系 | 类型 | 原点 | 椭球体 | 特点 |\n|--------|------|------|--------|------|\n| 北京54 | 参心 | 参考椭球中心 | 克拉索夫斯基 | 原苏联体系，精度较低 |\n| 西安80 | 参心 | 参考椭球中心 | IUGG1975 | 中国自主建立 |\n| CGCS2000 | 地心 | 地球质心 | CGCS2000椭球 | 中国新一代地心坐标系 |\n| WGS84 | 地心 | 地球质心 | WGS84椭球 | GPS使用，全球统一 |\n\n**联系：**\n- 参心坐标系与地心坐标系的区别在于原点位置不同\n- 参心坐标系适合局部地区使用，地心坐标系适合全球应用\n- 坐标转换需要通过七参数或四参数变换实现\n- CGCS2000与WGS84基本一致，差异在厘米级\n\n### 3. 论述GIS在数字城市中的应用\n\n1. **城市规划管理**：用地审批、建筑管理、规划方案评估\n2. **市政设施管理**：地下管网、供水排水、电力通信\n3. **交通管理**：路网规划、交通流量分析、应急调度\n4. **环境保护**：污染源监测、环境质量评价\n5. **公共安全**：消防调度、犯罪分析、应急指挥\n6. **土地管理**：地籍管理、土地利用变更监测\n7. **社区服务**：公共服务设施选址、社区资源分配\n\n### 4. 论述地图投影的选择原则\n\n1. **根据制图区域范围**：\n   - 世界图：多圆柱投影、摩尔威德投影\n   - 半球图：方位投影\n   - 中纬度地区：圆锥投影（兰伯特、阿尔伯斯）\n   - 赤道地区：圆柱投影（墨卡托）\n2. **根据制图目的**：\n   - 航海图：等角投影（墨卡托）\n   - 面积统计：等面积投影（阿尔伯斯）\n   - 地形图：等角投影（高斯-克吕格）\n3. **根据变形分布**：\n   - 控制角度变形→等角投影\n   - 控制面积变形→等面积投影\n   - 均衡变形→任意投影\n\n### 5. 论述GIS项目系统设计的步骤\n\n1. **需求分析**：明确系统目标、功能需求、数据需求\n2. **可行性分析**：技术可行性、经济可行性、社会可行性\n3. **系统总体设计**：\n   - 逻辑设计：数据流程、功能模块\n   - 物理设计：硬件配置、软件选择、网络架构\n4. **数据库设计**：\n   - 概念设计：E-R图\n   - 逻辑设计：关系模型\n   - 物理设计：存储结构、索引\n5. **详细设计**：模块接口、算法、编码规范\n6. **系统实现**：编码、测试、数据入库\n7. **系统运行与维护**：日常管理、更新升级\n\n### 6. 论述3S集成技术及其应用\n\n**3S含义：**\n- GPS：全球定位系统，提供实时定位信息\n- RS：遥感，提供大范围空间数据获取\n- GIS：地理信息系统，提供空间数据管理和分析\n\n**集成方式：**\n1. GPS+GIS：实时定位与导航\n2. RS+GIS：遥感数据处理与分析\n3. GPS+RS：遥感影像几何校正\n4. GPS+RS+GIS：全流程集成\n\n**应用：**\n- 精准农业：GPS定位+RS监测+GIS分析\n- 智慧交通：GPS车辆定位+GIS路径规划\n- 防灾减灾：RS灾害监测+GIS评估+GPS定位\n- 国土资源调查：RS数据获取+GIS管理+GPS验证\n\n### 7. 论述空间数据不确定性及处理方法\n\n**不确定性来源：**\n1. 数据源不确定性：测量误差、分类误差\n2. 数据处理不确定性：坐标转换误差、内插误差\n3. 数据使用不确定性：尺度效应、语义模糊\n\n**处理方法：**\n1. 误差传播分析：Monte Carlo模拟\n2. 数据质量评价：位置精度、属性精度评估\n3. 元数据管理：记录数据来源和处理过程\n4. 不确定性可视化：误差带、概率等值线\n5. 敏感性分析：评估不确定性对结果的影响\n\n### 8. 论述GIS互操作及其解决方法\n\n**互操作问题：**\n1. 数据格式不兼容\n2. 坐标参考系不一致\n3. 语义差异\n4. 软件平台不同\n\n**解决方法：**\n1. **数据标准**：制定统一的数据标准和规范\n2. **开放地理数据互操作规范（OGC）**：WMS、WFS、WCS等服务\n3. **数据转换**：使用中间格式（如Shapefile、GML）\n4. **Web服务**：基于SOA架构的服务共享\n5. **语义互操作**：本体论（Ontology）方法\n\n---\n\n## 四 · 计算题（典型5题）\n\n### 1. Morton码计算\n\n**题目**：在8×8栅格矩阵中，求第6行第5列（行号从0开始）的Morton码。\n\n**解法**：\n- 行号6 = 110（二进制）\n- 列号5 = 101（二进制）\n- 交错排列：1**1**1**0**0**1** → 111001 = 57\n\n> 注意：另一种常见编号从1开始，第6行第5列=行5列4\n> 行5=101，列4=100，交错=1**1**0**0**1**0**=110010=50\n\n### 2. 仿射变换参数计算\n\n**题目**：已知4个控制点的旧坐标和新坐标，求仿射变换6参数。\n\n**公式**：\n```\nX' = a₀ + a₁X + a₂Y\nY' = b₀ + b₁X + b₂Y\n```\n\n**步骤**：\n1. 列出方程组（至少3个点）\n2. 用最小二乘法求解6个参数\n3. 用第4个点验证精度\n\n### 3. 游程编码\n\n**题目**：对以下栅格数据进行游程编码：\n```\nA A A B B\nA A B B B\nC C C C C\nC C D D D\n```\n\n**解法**：\n- 第1行：(A,3)(B,2)\n- 第2行：(A,2)(B,3)\n- 第3行：(C,5)\n- 第4行：(C,2)(D,3)\n\n### 4. 缓冲区面积计算\n\n**题目**：一条长L=1000m的线状要素，缓冲距离d=50m，求缓冲区面积。\n\n**解法**：\n- 矩形部分：L × 2d = 1000 × 100 = 100,000 m²\n- 两端半圆：π × d² = π × 2500 ≈ 7,854 m²\n- 总面积 ≈ 107,854 m²\n\n### 5. 高斯-克吕格投影带号计算\n\n**题目**：已知某地经度为117°E，求其在6°分带中的带号和中央经线。\n\n**解法**：\n- 6°分带：带号 = ⌈117/6⌉ = 20（从0°经线算起）\n- 中央经线 = 20 × 6 - 3 = 117°E\n- 验证：117°恰好在第20带中央经线上\n\n> 3°分带：带号 = ⌈117/3⌉ = 39，中央经线 = 39 × 3 = 117°E\n\n---\n\n## 五 · 综合应用题（典型3题）\n\n### 1. 洪水淹没损失预测分析\n\n**数据源**：DEM、土地利用图、政区图、道路交通图、人口分布图、遥感影像、社会经济统计年鉴\n\n**步骤**：\n1. 利用DEM提取地形特征（坡度、坡向、汇水累积量）\n2. 根据水文模型确定洪水淹没范围\n3. 将淹没范围与土地利用图叠置，获取淹没区用地类型\n4. 与政区图叠置，获取各行政单元淹没面积\n5. 与人口分布图叠置，估算受灾人口\n6. 结合社会经济统计年鉴，估算经济损失\n7. 利用道路交通图评估交通影响\n8. 生成洪水淹没损失评估报告和专题地图\n\n### 2. 城市公交站点选址\n\n**步骤**：\n1. 收集数据：道路网、居民区分布、人口密度、现有站点、学校医院等\n2. 建立居民区缓冲区（步行500m范围）\n3. 对现有站点做缓冲区分析，找出服务盲区\n4. 将盲区与人口密度图叠置，确定优先选址区域\n5. 结合道路网进行可达性分析\n6. 用AHP法综合评价候选站点\n7. 生成选址方案专题图\n\n### 3. 土地利用变化检测\n\n**步骤**：\n1. 获取两期遥感影像\n2. 几何校正和配准\n3. 影像分类获取两期土地利用图\n4. 将两期土地利用图叠置分析\n5. 计算转移矩阵（各类间转化面积）\n6. 分析变化趋势和驱动力\n7. 生成变化检测专题图"}, {"id": "web-06-GIS", "group": "真题与网络资源", "title": "新疆大学GIS相关资料专集", "md": "# 新疆大学 GIS 相关资料专集\n\n> 汇编于 2026-06-05 · 含考研真题、期末复习、课程信息、导师方向\n\n---\n\n## 一 · 新疆大学地理与遥感科学学院概况\n\n### 学院简介\n\n新疆大学地理与遥感科学学院（原资源与环境科学学院）是新疆大学重点学院之一，拥有地理学一级学科博士点和硕士点。学院在干旱区地理、遥感与GIS应用、生态与环境等领域具有鲜明特色和区域优势。\n\n### 相关学科点\n\n| 类别 | 学科 | 代码 | 备注 |\n|------|------|------|------|\n| 一级学科博士点 | 地理学 | 0705 | 含自然地理、人文地理、地图学与GIS |\n| 一级学科硕士点 | 地理学 | 0705 | 同上 |\n| 专业学位硕士 | 资源与环境 | 0857 | 含GIS与遥感应用方向 |\n| 自命题科目 | 地理信息系统 | 819 | 部分年份使用 |\n| 自命题科目 | 地理学综合 | 821 | 部分年份使用 |\n\n### 主要研究方向\n\n1. **干旱区生态环境遥感监测与评价**\n2. **GIS空间分析与区域可持续发展**\n3. **遥感信息提取与地学建模**\n4. **土地利用/覆被变化（LUCC）检测**\n5. **城市扩展与空间格局分析**\n6. **中亚地区资源环境遥感应用**\n7. **灾害遥感监测与风险评估**\n8. **精准农业与GIS应用**\n\n---\n\n## 二 · 考研科目与参考书目\n\n### 2.1 考试科目\n\n新疆大学地理学相关专业考研科目：\n\n| 科目 | 代码 | 说明 |\n|------|------|------|\n| 思想政治理论 | 101 | 全国统考 |\n| 英语一 | 201 | 全国统考 |\n| 数学（自命题或统考） | 601/302 | 视年份而定 |\n| 地理信息系统 / 地理学综合 | 819/821 | 自命题 |\n\n> 注意：819和821科目代码在不同年份可能调整，请以当年招生简章为准。\n\n### 2.2 参考书目\n\n| 书目 | 作者 | 出版社 | 适用科目 |\n|------|------|--------|----------|\n| 《地理信息系统概论》（第3版） | 黄杏元、马劲松 | 高等教育出版社 | 819/821 |\n| 《地理信息系统—原理、方法和应用》 | 邬伦等 | 科学出版社 | 819/821 |\n| 《地理信息系统教程》 | 汤国安 | 高等教育出版社 | 819/821 |\n| 《遥感导论》 | 梅安新 | 高等教育出版社 | 辅助 |\n| 《自然地理学》（第4版） | 伍光和 | 高等教育出版社 | 821辅助 |\n| 《经济地理学》（第3版） | 李小建 | 高等教育出版社 | 821辅助 |\n\n### 2.3 复试参考\n\n- 遥感与GIS综合面试\n- 专业英语翻译\n- 科研设想陈述\n\n---\n\n## 三 · 819/821 考研真题汇编\n\n> 说明：新疆大学真题公开渠道有限，以下根据网络资源、考生回忆和同类院校试题规律整理。部分题目为推断题，标注[推断]。\n\n### 3.1 819 地理信息系统（回忆版）\n\n#### 一、名词解释（每题4分，共20分）\n\n1. 地理信息系统\n2. 空间数据结构\n3. 地图投影\n4. 数字高程模型（DEM）\n5. 缓冲区分析\n\n#### 二、简答题（每题10分，共50分）\n\n1. 简述GIS的基本组成及各部分功能。\n2. 简述矢量数据与栅格数据的优缺点比较。\n3. 简述高斯-克吕格投影的特点及分带方法。\n4. 简述空间数据质量评价的主要指标。\n5. 简述空间内插的基本方法。\n\n#### 三、论述题（每题20分，共40分）\n\n1. 论述GIS在干旱区生态环境监测中的应用，结合新疆实际举例说明。[推断]\n2. 论述空间数据不确定性的来源及处理方法。\n\n#### 四、综合应用题（每题20分，共40分）\n\n1. 设计一个基于GIS的新疆土地利用变化检测方案，说明所需数据、处理步骤和预期成果。[推断]\n2. 某地区需要选址建设一座污水处理厂，请利用GIS空间分析方法给出选址方案。\n\n### 3.2 821 地理学综合（回忆版）\n\n#### 一、名词解释（每题3分，共30分）\n\n1. 地理信息系统\n2. 遥感\n3. 经纬网\n4. 大气环流\n5. 土地利用/覆被变化（LUCC）\n6. 坡度\n7. 汇水累积量\n8. 植被指数（NDVI）\n9. 空间自相关\n10. 地理信息可视化\n\n#### 二、简答题（每题10分，共50分）\n\n1. 简述3S集成技术及其在资源环境调查中的应用。[推断]\n2. 简述遥感影像分类的基本方法。\n3. 简述干旱区生态环境特征。[推断]\n4. 简述GIS支持下的空间统计分析方法。\n5. 简述全球定位系统（GPS）的组成和定位原理。\n\n#### 三、论述题（每题20分，共40分）\n\n1. 论述遥感与GIS技术在新疆生态环境监测与评价中的应用。[推断]\n2. 论述\"一带一路\"背景下中亚地区资源环境遥感研究的发展趋势。[推断]\n\n#### 四、综合应用题（每题15分，共30分）\n\n1. 利用NDVI时间序列数据分析某区域植被覆盖变化趋势，给出技术路线。\n2. 基于DEM数据提取地形特征因子（坡度、坡向、汇水累积量），说明分析流程。\n\n---\n\n## 四 · 期末考试复习要点\n\n### 4.1 课程基本信息\n\n- **课程名称**：地理信息系统 / 地理信息系统原理\n- **学分**：3-4学分\n- **学时**：48-64学时\n- **授课对象**：地理科学、地理信息科学、遥感科学与技术等专业本科生\n- **主要教材**：黄杏元《地理信息系统概论》/ 汤国安《地理信息系统教程》\n\n### 4.2 期末考试题型分布\n\n| 题型 | 分值 | 题量 |\n|------|------|------|\n| 名词解释 | 20-30分 | 5-6题 |\n| 简答题 | 30-40分 | 4-5题 |\n| 论述题 | 20-30分 | 1-2题 |\n| 综合应用/计算 | 10-20分 | 1-2题 |\n\n### 4.3 期末高频考点\n\n**第一梯队（几乎必考）：**\n\n1. GIS的定义、组成和功能\n2. 矢量数据与栅格数据的比较\n3. 高斯-克吕格投影\n4. 空间数据结构及编码方法\n5. 缓冲区分析与叠置分析\n6. DEM与地形分析\n\n**第二梯队（高频）：**\n\n7. 空间数据质量\n8. 坐标系与坐标变换\n9. 空间内插方法\n10. 空间数据库与索引\n11. 地理信息可视化与专题地图\n12. 3S集成\n\n**第三梯队（中频）：**\n\n13. GIS发展历史与趋势\n14. WebGIS与云GIS\n15. 空间数据采集方法\n16. 地图概括/制图综合\n17. GIS项目设计\n18. 空间数据互操作\n\n### 4.4 新疆大学特色考点\n\n> 基于新疆区域特征和学院研究方向推断\n\n1. **干旱区GIS应用**：水资源管理、荒漠化监测、绿洲动态\n2. **遥感与GIS融合**：遥感影像分类后处理、变化检测\n3. **中亚区域研究**：跨境资源环境分析、丝绸之路经济带\n4. **多语言GIS**：维吾尔语地图标注、双语地理信息\n5. **生态安全评价**：生态脆弱性评估、生态红线划定\n\n---\n\n## 五 · 中科院新疆生态与地理研究所考研信息\n\n### 5.1 研究所简介\n\n中科院新疆生态与地理研究所是新疆地区最重要的地理与生态研究机构，在干旱区地理、遥感与GIS应用方面实力雄厚，是新疆大学联合培养单位。\n\n### 5.2 考研科目\n\n| 专业 | 科目1 | 科目2 | 科目3 | 科目4 |\n|------|-------|-------|-------|-------|\n| 地图学与地理信息系统 | 101政治 | 201英语 | 302数学二 | 839地理信息系统 |\n| 自然地理学 | 101政治 | 201英语 | 302数学二 | 835自然地理学 |\n\n### 5.3 839 地理信息系统真题要点\n\n> 中科院统一命题，难度较高\n\n1. 注重GIS原理的深度理解\n2. 空间数据结构与算法（如四叉树、R树）\n3. 空间分析算法原理（如Dijkstra、Voronoi）\n4. GIS与遥感融合\n5. 空间数据模型（面向对象、Geodatabase）\n6. GIS前沿技术（大数据GIS、AI+GIS）\n\n---\n\n## 六 · 新疆地区GIS应用案例\n\n### 6.1 干旱区水资源管理\n\n- **应用**：基于GIS和RS的流域水资源评价与调度\n- **方法**：DEM提取水系网络 + 遥感监测水体变化 + 空间分析评价水资源\n- **案例**：塔里木河流域水资源管理信息系统\n\n### 6.2 荒漠化监测与评价\n\n- **应用**：荒漠化动态监测与预警\n- **方法**：多时相遥感影像 + NDVI变化检测 + GIS空间分析\n- **案例**：古尔班通古特沙漠南缘荒漠化监测\n\n### 6.3 绿洲动态变化\n\n- **应用**：绿洲扩张与萎缩监测\n- **方法**：土地利用分类 + 叠置分析 + 驱动力分析\n- **案例**：吐鲁番盆地绿洲变化\n\n### 6.4 城市扩展监测\n\n- **应用**：乌鲁木齐城市扩展时空分析\n- **方法**：多期遥感影像 + 城市用地提取 + 空间统计\n- **案例**：乌鲁木齐市2000-2020年城市扩展分析\n\n### 6.5 丝绸之路经济带\n\n- **应用**：中亚地区交通网络与经济辐射分析\n- **方法**：网络分析 + 缓冲区分析 + 空间相互作用模型\n- **案例**：中欧班列沿线城市空间格局分析\n\n### 6.6 灾害风险评估\n\n- **应用**：地震/洪水/沙尘暴灾害风险评估\n- **方法**：多因子叠加分析 + AHP权重 + 风险区划\n- **案例**：新疆地震灾害风险评估\n\n---\n\n## 七 · 新疆大学GIS相关导师与课题组\n\n> 以下为公开信息整理，具体以学院官网为准\n\n### 主要研究方向与导师\n\n| 研究方向 | 关键词 | 代表性成果领域 |\n|----------|--------|----------------|\n| 遥感与GIS应用 | 干旱区生态环境遥感 | NDVI、LAI、蒸散 |\n| 空间分析与建模 | 土地利用变化模拟 | Markov-CA模型 |\n| 地理信息工程 | WebGIS开发 | 新疆地理信息公共服务平台 |\n| 遥感信息提取 | 深度学习分类 | 高分辨率影像解译 |\n| 生态遥感 | 生态安全评价 | 生态脆弱性、生态红线 |\n\n---\n\n## 八 · 复习建议与备考策略\n\n### 8.1 考研备考时间规划\n\n| 阶段 | 时间 | 重点 |\n|------|------|------|\n| 基础阶段 | 3-6月 | 通读教材，建立知识框架 |\n| 强化阶段 | 7-9月 | 专题突破，真题训练 |\n| 冲刺阶段 | 10-11月 | 模拟考试，查漏补缺 |\n| 考前调整 | 12月 | 回顾错题，调整心态 |\n\n### 8.2 819/821备考重点\n\n1. **教材为本**：黄杏元、汤国安教材至少通读3遍\n2. **真题为王**：收集近5年真题，分析出题规律\n3. **区域特色**：关注新疆干旱区GIS/遥感应用案例\n4. **交叉复习**：821需兼顾自然地理和人文地理知识\n5. **实践操作**：熟悉ArcGIS/QGIS基本操作，面试可能涉及\n\n### 8.3 面试准备\n\n1. 自我介绍（中英文）\n2. 专业基础知识问答\n3. 科研设想陈述（3-5分钟）\n4. 专业英语翻译\n5. 实验技能考核（可能涉及ArcGIS操作演示）\n\n### 8.4 推荐补充资源\n\n1. **MOOC**：中国大学MOOC上汤国安《地理信息系统》课程\n2. **软件实操**：ArcGIS官方教程、QGIS文档\n3. **论文阅读**：新疆大学地理学科相关硕博论文\n4. **学术期刊**：《遥感学报》、《地理学报》、《干旱区地理》、《干旱区研究》\n5. **数据资源**：中科院资源环境科学数据中心（resdc.cn）、地理空间数据云（gscloud.cn）\n\n---\n\n## 九 · 新疆地区GIS数据资源\n\n| 数据源 | 网址 | 数据类型 |\n|--------|------|----------|\n| 中科院资源环境科学数据中心 | resdc.cn | 土地利用、气象、土壤 |\n| 地理空间数据云 | gscloud.cn | 遥感影像、DEM |\n| 新疆维吾尔自治区自然资源厅 | — | 地籍、规划数据 |\n| 国家地球系统科学数据中心 | geodata.cn | 综合地理数据 |\n| NASA Earthdata | earthdata.nasa.gov | MODIS、Landsat |\n| USGS | earthexplorer.usgs.gov | Landsat、SRTM |\n| ESA Copernicus | scihub.copernicus.eu | Sentinel系列 |\n\n---\n\n## 十 · 附录：新疆大学地理学考研常见问题\n\n### Q1：819和821有什么区别？\n\n819偏重GIS原理与技术，821为地理学综合（含自然地理、人文地理、GIS）。报考地图学与GIS方向一般考819，报考自然地理/人文地理方向考821。\n\n### Q2：是否需要编程能力？\n\nGIS方向建议掌握Python（ArcPy、GDAL）或R语言空间分析包，面试可能涉及编程能力考察。\n\n### Q3：新疆大学GIS方向就业方向？\n\n- 自然资源管理部门\n- 测绘与规划院\n- 遥感与GIS企业\n- 科研院所\n- 国土、环保、水利等政府部门\n\n### Q4：与中科院新疆生态与地理研究所的关系？\n\n新疆大学与中科院新疆生地所是联合培养单位，部分导师在两单位均有招生名额，可互选。\n\n### Q5：复试分数线一般多少？\n\n地理学属于理学门类，一般执行国家B区分数线。近年理学B区线约270-280分（单科有要求），具体以当年公布为准。"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 地理信息系统 · 期末复习骨架\n\n> 教师: 黄源生 · 学期: 2026春\n> 共 6 PDF · 726 页 · 4 章节\n> 已填复习要点：4/4 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 第 1 章 | 地理信息系统 Geographic Information System, GIS | 90 | [_第01章_地理信息系统_Geographic_Information_System,_GI.md](./_第01章_地理信息系统_Geographic_Information_System,_GI.md) |\n| 第 2 章 | 空间数据-知识点回顾 | 169 | [_第02章_空间数据-知识点回顾.md](./_第02章_空间数据-知识点回顾.md) |\n| 第 3 章 | 空间数据的转换与处理 | 104 | [_第03章_空间数据的转换与处理.md](./_第03章_空间数据的转换与处理.md) |\n| 第 4 章 | 空间数据的可视化表达 | 107 | [_第04章_空间数据的可视化表达.md](./_第04章_空间数据的可视化表达.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 470，密度 **中**，建议复习期 5-7 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 第 1 章 · 地理信息系统 Geographic Information System, GIS\n\n> 主版 90 页 · 第 2 节 · [详细素材](./_第01章_地理信息系统_Geographic_Information_System,_GI.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 地理信息系统（GIS）：既是跨地球科学、空间科学、信息科学和计算机科学的一门应用基础学科，又是一项工程应用技术。以地学原理为依托，在计算机软硬件支持下，研究空间数据的采集、处理、存储、管理、分析、建模和显示。；[x] 地理数据：与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律等的数字、文字、图像和图形总称。；[x] 地理信息：有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。\n- **怎么算** ── [x] RUSLE公式（通用土壤流失方程）：A = R·K·L·S·C·P，用于土壤侵蚀量估算；[x] C-Fix模型：植被固碳量估算模型；[x] GIS功能链：数据采集与输入 → 数据编辑与更新 → 数据存储与管理 → 空间查询与分析 → 数据与图形的交互显示 → 应用模型与系统开发\n- **考什么** ── GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路；GIS五大部分构成：硬件、软件、数据、模型、人员；GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 2 章 · 空间数据-知识点回顾\n\n> 主版 169 页 · 第 4 节 · [详细素材](./_第02章_空间数据-知识点回顾.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 空间数据采集：将地图、外业观测、航空相片、遥感图像、文本资料等转为计算机可识别的数字形式；[x] 地理空间数据：表示空间实体的位置、形状、大小及分布特征的数据；[x] 非地理空间数据（属性数据）：表示空间实体的属性特征，是对地理空间数据的说明\n- **怎么算** ── [x] 栅格编码方法：直接栅格编码（最简单最直接）、游程编码、四叉树编码；[x] 矢量数据结构：点——坐标(X,Y)；线——坐标序列；面——闭合坐标序列+拓扑关系；[x] 数据模型层次：层次模型→网络模型→关系模型→对象模型\n- **考什么** ── 矢量 vs 栅格数据优缺点对比（必考）；空间数据采集方法：野外采集、地图数字化、摄影测量、遥感处理；Geodatabase三级结构：要素类→要素数据集→Geodatabase\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 3 章 · 空间数据的转换与处理\n\n> 主版 104 页 · 第 5 节 · [详细素材](./_第03章_空间数据的转换与处理.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 空间参考系统：确定地理目标平面位置和高程的平面坐标系和高程系的统称；[x] 地球椭球体：地球表面几何模型四类——自然表面→大地水准面→地球椭球面→数学模型；[x] 参考椭球体：与局部地区大地水准面最佳拟合的地球椭球体，需确定定位与定向\n- **怎么算** ── [x] 投影变形类型：长度比 m = 实际长度/椭球面长度；面积比 p = 实际面积/椭球面面积；[x] 高斯投影分带：6°带（1:2.5万及更小比例尺）和3°带（1:1万及更大比例尺）；[x] 坐标转换方法：四参数（平面相似变换）、七参数（三维赫尔默特变换）\n- **考什么** ── 四大坐标系统对比（北京54/西安80/CGCS2000/WGS84）——参心vs地心是核心区别；地球表面四层模型：自然表面→大地水准面→椭球面→数学模型；地图投影必然产生变形（长度/面积/角度）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 空间数据的可视化表达\n\n> 主版 107 页 · 第 6 节 · [详细素材](./_第04章_空间数据的可视化表达.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 数据可视化：将数字信息转换为人可识别的图形，清晰有效传递信息，便于分析推理；[x] 地理信息可视化三层次：①地图数据的可视化表示 ②地理信息的可视化表示（分级+专题地图） ③空间分析结果的可视化表示；[x] 符号化：按实际情况确定地图符号基本形状，以颜色或形状区分事物性质\n- **怎么算** ── [x] 符号化方法分类：单一符号、分类符号、分级符号、分级色彩、比率符号、组合符号、统计符号、彩色阴影；[x] 矢量符号化：点状→标记符号；线状→线符号；面状→填充符号；[x] 栅格符号化：分类栅格符号、分级栅格符号\n- **考什么** ── 符号化8种方法及其适用场景（必考）；分级色彩 vs 分级符号的区别（颜色vs大小）；比率符号的限制——属性值过大时不适用\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 第 1 章 · 地理信息系统 Geographic Information System, GIS\n- [ ] 第 2 章 · 空间数据-知识点回顾\n- [ ] 第 3 章 · 空间数据的转换与处理\n- [ ] 第 4 章 · 空间数据的可视化表达\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练"}, {"id": "exam-期末速查", "group": "期末冲刺", "title": "期末速查", "md": "# 地理信息系统 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 4/4 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 1 | 地理信息系统 Geographic Information System, GIS | [x] 地理信息系统（GIS）：既是跨地球科学、空间科学、信息科学和计算机科学的一门应用基础学科，又是一项工程应用技术。以地学原理为依托，在计算机软硬件支持下，研究空间数据的采集、处理、存储、管理、分析、建模和显示。；[x] 地理数据：与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律等的数字、文字、图像和图形总称。；[x] 地理信息：有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。 | [x] RUSLE公式（通用土壤流失方程）：A = R·K·L·S·C·P，用于土壤侵蚀量估算；[x] C-Fix模型：植被固碳量估算模型；[x] GIS功能链：数据采集与输入 → 数据编辑与更新 → 数据存储与管理 → 空间查询与分析 → 数据与图形的交互显示 → 应用模型与系统开发 | GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路；GIS五大部分构成：硬件、软件、数据、模型、人员；GIS核心功能 = 空间分析（区别于其他系统的根本标志） |\n| 2 | 空间数据-知识点回顾 | [x] 空间数据采集：将地图、外业观测、航空相片、遥感图像、文本资料等转为计算机可识别的数字形式；[x] 地理空间数据：表示空间实体的位置、形状、大小及分布特征的数据；[x] 非地理空间数据（属性数据）：表示空间实体的属性特征，是对地理空间数据的说明 | [x] 栅格编码方法：直接栅格编码（最简单最直接）、游程编码、四叉树编码；[x] 矢量数据结构：点——坐标(X,Y)；线——坐标序列；面——闭合坐标序列+拓扑关系；[x] 数据模型层次：层次模型→网络模型→关系模型→对象模型 | 矢量 vs 栅格数据优缺点对比（必考）；空间数据采集方法：野外采集、地图数字化、摄影测量、遥感处理；Geodatabase三级结构：要素类→要素数据集→Geodatabase |\n| 3 | 空间数据的转换与处理 | [x] 空间参考系统：确定地理目标平面位置和高程的平面坐标系和高程系的统称；[x] 地球椭球体：地球表面几何模型四类——自然表面→大地水准面→地球椭球面→数学模型；[x] 参考椭球体：与局部地区大地水准面最佳拟合的地球椭球体，需确定定位与定向 | [x] 投影变形类型：长度比 m = 实际长度/椭球面长度；面积比 p = 实际面积/椭球面面积；[x] 高斯投影分带：6°带（1:2.5万及更小比例尺）和3°带（1:1万及更大比例尺）；[x] 坐标转换方法：四参数（平面相似变换）、七参数（三维赫尔默特变换） | 四大坐标系统对比（北京54/西安80/CGC <details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**D**  　解析：GIS 由硬件、软件、数据、人员和方法五要素构成。\n\n<\/details>\n\n**3.** 矢量数据模型用以表达地理实体的基本图形元素是\n  - A. 点、线、面\n  - B. 像元（栅格）\n  - C. 文字\n  - D. 体素\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：矢量模型用点、线、多边形并记录坐标表达实体。\n\n<\/details>\n\n**4.** 栅格数据模型的基本单元是\n  - A. 结点\n  - B. 像元（grid cell）\n  - C. 弧段\n  - D. 多边形\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：栅格以规则格网像元及其属性值表达空间。\n\n<\/details>\n\n**5.** 下列关于矢量与栅格数据的比较，正确的是\n  - A. 矢量精度高、拓扑关系明确，栅格结构简单、便于叠加运算\n  - B. 栅格精度一定高于矢量\n  - C. 矢量不能表示面状地物\n  - D. 栅格无法做空间分析\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：矢量利于精确定位与拓扑，栅格利于连续场与叠置分析。\n\n<\/details>\n\n**6.** 描述空间对象之间邻接、关联、包含等空间关系的概念是\n  - A. 拓扑关系\n  - B. 投影\n  - C. 比例尺\n  - D. 分辨率\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：拓扑关系记录邻接、关联、包含，是矢量数据的重要特性。\n\n<\/details>\n\n**7.** 将地球椭球面上的点转换到平面上的过程称为\n  - A. 地图投影\n  - B. 数字化\n  - C. 重采样\n  - D. 内插\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：投影是建立球面与平面坐标对应关系的方法，必然产生变形。\n\n<\/details>\n\n**8.** 缓冲区分析（buffer）属于\n  - A. 邻近度分析\n  - B. 网络分析\n  - C. 统计分析\n  - D. 数据压缩\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：缓冲区按距离生成邻近影响范围，是邻近度分析的典型。\n\n<\/details>\n\n**9.** 叠加分析（overlay）的主要作用是\n  - A. 将多层空间数据叠合以获得新的空间与属性关系\n  - B. 压缩数据\n  - C. 改变投影\n  - D. 绘制图例\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：叠置分析（如交、并、擦除）综合多层信息生成新图层。\n\n<\/details>\n\n**10.** DEM（数字高程模型）主要用于表达\n  - A. 地表起伏（高程）的连续分布\n  - B. 道路名称\n  - C. 行政区人口\n  - D. 土地权属\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：DEM 以格网或 TIN 表达高程，可派生坡度、坡向等。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** GIS 的五大构成要素是硬件、软件、数据、人员和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**方法（应用模型）**\n\n<\/details>\n\n**2.** 空间数据的两大基本模型是矢量模型和 ___ 模型。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**栅格**\n\n<\/details>\n\n**3.** 记录空间对象邻接、关联、包含等空间关系的特性称为 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**拓扑关系**\n\n<\/details>\n\n**4.** 地图投影按变形性质可分为等角投影、等积投影和 ___ 投影。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**等距（任意）**\n\n<\/details>\n\n**5.** 由不规则三角网表达地表起伏的高程模型简称 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**TIN**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 地理信息系统（GIS）\n\n<details><summary>📝 参考答案<\/summary>\n\n答：在计算机硬件、软件支持下，对整个或部分地球表层空间中的地理分布数据进行采集、存储、管理、运算、分析、显示和描述的技术系统。\n\n<\/details>\n\n**2.** 拓扑关系\n\n<details><summary>📝 参考答案<\/summary>\n\n答：描述空间对象之间不随几何形变而改变的相互关系，主要包括邻接、关联和包含，是矢量数据进行空间查询与分析的基础。\n\n<\/details>\n\n**3.** 缓冲区分析\n\n<details><summary>📝 参考答案<\/summary>\n\n答：以点、线、面地物为基础，按给定距离向外（或向内）扩展生成一定宽度的邻近区域，用以分析地物的空间影响范围的邻近度分析方法。\n\n<\/details>\n\n**4.** 叠加分析\n\n<details><summary>📝 参考答案<\/summary>\n\n答：将同一地区两个或多个空间数据层按一定逻辑叠合，产生兼具原各层空间与属性特征的新图层的分析方法，常见有交、并、擦除、相交等操作。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述矢量数据模型与栅格数据模型的优缺点。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：矢量：定位精确、数据紧凑、拓扑关系明确、利于精确制图与网络分析，但叠加运算与连续场表达较复杂。栅格：结构简单、便于叠置与空间分析、利于表达连续现象（如高程、遥感），但精度受像元大小限制、数据量大、难以精确表达边界与拓扑。\n\n<\/details>\n\n**2.** 简述地图投影的概念及其必然产生变形的原因。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：地图投影是按一定数学法则将地球椭球（球）面上的经纬网与地物转换到平面上的方法。由于球面不可展为平面，转换中必然产生长度、角度或面积的变形，故有等角、等积、等距等不同投影以满足不同需要。\n\n<\/details>\n\n**3.** 简述 GIS 空间分析的主要类型。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①邻近度分析（如缓冲区）；②叠加分析（多层叠置）；③网络分析（最短路径、资源分配）；④地形分析（基于 DEM 的坡度、坡向、可视域）；⑤空间统计与插值分析等。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试以城市选址（如选择一块适宜建设的用地）为例，论述如何综合运用缓冲区分析与叠加分析完成空间决策。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①明确选址约束与目标，如距道路一定范围内、远离河流保护带、坡度适中、避让生态红线等；②对道路做缓冲区得到交通便利区，对河流、生态敏感区做缓冲区得到应回避区，由 DEM 派生坡度图筛出适宜坡度区；③将上述各专题层统一到同一坐标与投影后进行叠加分析（交集运算），逐层取满足条件的区域；④对叠加结果按重要性赋权进行适宜性评价（加权叠加），得到适宜性分级图，选出综合得分最高的地块；⑤结论：缓冲区分析解决“距离/邻近”约束，叠加分析解决“多因子综合”，二者结合实现从单因子到多因子的空间多准则决策，体现 GIS 空间分析支撑规划决策的能力。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "pages", "group": "原始课件", "title": "全部课件原页 · 逐讲", "md": "# 原始课件 · 页图（真实 PDF 页面）\n\n> 下列为雨课堂课件原始页面渲染；大讲已均匀采样关键页。点击讲次标题展开，单击图片可看大图。\n\n<
