n- [x] **地理数据**：与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律等的数字、文字、图像和图形总称。\n- [x] **地理信息**：有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。\n- [x] **数据与信息的关系**：信息来源于数据，是数据内涵的意义；信息是数据的表达，数据是信息的载体。\n- [x] **地理数据的特征**：空间上的分布性、时间上的序列性、数量上的海量性、载体的多样性、位置和属性的对应性。\n- [x] **地理信息的特征**：空间相关性、空间层次性、空间区域性、空间多样性。\n- [x] **GIS的构成**：五大部分——计算机硬件系统、软件系统、空间数据、地学模型、应用人员。\n- [x] **GIS基本特征**：数据的空间定位特征、空间关系处理的复杂性、海量数据管理的能力；GIS是空间数据和属性数据的综合体。\n- [x] **空间分析**：GIS的核心功能，也是GIS与其他计算机系统的根本区别。\n\n#### 二、关键公式 / 模型\n\n- [x] **RUSLE公式**（通用土壤流失方程）：A = R·K·L·S·C·P，用于土壤侵蚀量估算\n- [x] **C-Fix模型**：植被固碳量估算模型\n- [x] **GIS功能链**：数据采集与输入 → 数据编辑与更新 → 数据存储与管理 → 空间查询与分析 → 数据与图形的交互显示 → 应用模型与系统开发\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **John Snow霍乱溯源**（1854伦敦）：空间数据可视化+空间插值，确认Broad Street水井为霍乱源头\n- [x] **COVID-19疫情地图**：数据空间可视化\n- [x] **苏州河重金属空间分布**：采样点地图+空间插值+污染物浓度可视化\n- [x] **东江上游土壤侵蚀**：RUSLE模型+时序变化分析\n- [x] **农村排水模式优化**：基于GIS的计算框架——空间聚类→空间叠置→管网优化→处理设施优选→造价核算\n\n#### 四、高频考点（速记）\n\n1. GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路\n2. GIS五大部分构成：硬件、软件、数据、模型、人员\n3. GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n4. GIS是空间数据+属性数据的综合体\n5. 地理数据三大特征：空间分布性、时间序列性、海量性\n6. 数据库建设占系统投资70%\n7. GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/QGIS）→应用软件（二次开发）\n\n#### 五、思考题 / 自测\n\n- [x] 题：GIS与一般信息系统的本质区别是什么？\n  答：GIS处理空间数据和属性数据的综合体，核心在于空间分析功能。\n- [x] 题：为什么说空间分析是GIS的核心功能？\n  答：空间分析是GIS区别于其他计算机系统的根本区别，也是评价GIS功能的主要特征。\n- [x] 题：GIS在环境科学中有哪些应用？\n  答：污染物空间可视化、土壤侵蚀评估、水质监测、排水模式优化等。\n\n#### 六、与前后章之关联\n\n- 承前章：本章为GIS基础概念，无前章\n- 启后章：为第二章空间数据组织、第三章空间数据转换与处理提供理论框架\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 地理信息系统 Geographic Inform\n## 核心概念\n- 地理信息系统（GIS）\n- 地理数据\n- 地理信息\n- 数据与信息的关系\n- 地理数据的特征\n- 地理信息的特征\n- GIS的构成\n- GIS基本特征\n- 空间分析\n## 关键公式 / 模型\n- RUSLE公式\n- C-Fix模型\n- GIS功能链\n## 高频考点\n- GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路\n- GIS五大部分构成：硬件、软件、数据、模型、人员\n- GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n- GIS是空间数据+属性数据的综合体\n- 地理数据三大特征：空间分布性、时间序列性、海量性\n- 数据库建设占系统投资70%\n- GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/QGIS）→应用软件（二次开发）\n```\n\n### Mermai ，适用于中纬度东西延伸区域\n- [x] **空间变换**：同一区域不同空间参考系统之间的转换，包括坐标变换和投影变换\n- [x] **数据格式转换**：不同GIS平台间数据格式互转（Shapefile↔Geodatabase↔Coverage等）\n\n#### 二、关键公式 / 模型\n\n- [x] **投影变形类型**：长度比 m = 实际长度/椭球面长度；面积比 p = 实际面积/椭球面面积\n- [x] **高斯投影分带**：6°带（1:2.5万及更小比例尺）和3°带（1:1万及更大比例尺）\n- [x] **坐标转换方法**：四参数（平面相似变换）、七参数（三维赫尔默特变换）\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **ArcGIS定义投影**：ArcToolbox→Data Management→Projections and Transformations→Define Projection\n- [x] **ArcGIS投影变换**：Project工具，需选择转换方法（如Beijing54→CGCS2000的转换参数）\n- [x] **中国大地原点**：陕西省泾阳县永乐镇北流村（北纬34°32'27.00″东经108°55'25.00″）\n\n#### 四、高频考点（速记）\n\n1. 四大坐标系统对比（北京54/西安80/CGCS2000/WGS84）——参心vs地心是核心区别\n2. 地球表面四层模型：自然表面→大地水准面→椭球面→数学模型\n3. 地图投影必然产生变形（长度/面积/角度）\n4. 高斯-克吕格投影：横轴切圆柱、中央经线无变形、6°/3°分带\n5. 我国高程基准：1985国家高程基准（青岛）\n6. 投影变换 vs 坐标变换的区别\n7. CGCS2000是地心坐标系（北斗使用），北京54/西安80是参心坐标系\n\n#### 五、思考题 / 自测\n\n- [x] 题：北京54与西安80坐标系有何区别？\n  答：北京54用克拉索夫斯基椭球、原点在苏联；西安80用国际推荐参数、原点在西安、定向更明确\n- [x] 题：为什么要进行地图投影？\n  答：球面坐标不便测量计算，平面地图符合视觉习惯，但地球椭球为不可展开曲面\n- [x] 题：参心坐标系与地心坐标系有何区别？\n  答：参心——原点在参考椭球中心（近似地球质心）；地心——原点在地球质心，精度更高\n\n#### 六、与前后章之关联\n\n- 承前章：承接第二章空间数据组织，为数据赋予空间参考\n- 启后章：为第四章空间数据可视化表达提供坐标/投影基础\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 空间数据的转换与处理\n## 核心概念\n- 空间参考系统\n- 地球椭球体\n- 参考椭球体\n- 大地坐标系\n- 北京54坐标系\n- 西安80坐标系\n- CGCS2000\n- WGS84\n- 高程基准\n- 地图投影\n- 投影变形\n- 高斯-克吕格投影\n- 兰勃特投影\n- 空间变换\n## 关键公式 / 模型\n- 投影变形类型\n- 高斯投影分带\n- 坐标转换方法\n## 高频考点\n- 四大坐标系统对比（北京54/西安80/CGCS2000/WGS84）——参心vs地心是核心区别\n- 地球表面四层模型：自然表面→大地水准面→椭球面→数学模型\n- 地图投影必然产生变形（长度/面积/角度）\n- 高斯-克吕格投影：横轴切圆柱、中央经线无变形、6°/3°分带\n- 我国高程基准：1985国家高程基准（青岛）\n- 投影变换 vs 坐标变换的区别\n- CGCS2000是地心坐标系（北斗使用），北京54/西安80是参心坐标系\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((空间数据的转换与处理))\n    核心概念\n      空间参考系统\n      地球椭球体\n      参考椭球体\n      大地坐标系\n      北京54坐标系\n      西安80坐标系\n      CGCS2000\n      WGS84\n      高程基准\n      地图投影\n      投影变形\n      高斯-克吕格投影\n      兰勃特投影\n      空间变换\n    关键公式 / 模型\n      投影变形类型\n      高斯投影分带\n      坐标转换方法\n    高频考点\n      四大坐标系统对比（北京54/西安80/CGCS2000/WGS84…\n      地球表面四层模型：自然表面→大地水准面→椭球面→数学模型\n      地图投影必然产生变形（长度/面积/角度）\n      高斯-克吕格投影：横轴切圆柱、中央经线无变形、6°/3°分带\n      我国高程基准：1985国家高程基准（青岛）\n      投影变换 vs 坐标变换的区别\n      CGCS2000是地心坐标系（北斗使用），北京54/西安80是参心…\n```\n\n<\/details>\n\n---\n\n### 第 4 章 · 空间数据的可视化表达\n\n> 素材：[_第04章_空间数据的可视化表达.md](./_第04章_空间数据的可视化表达.md) · 主版 107 页\n\n> 基于 OCR 全文自动提取，人工校核待补。\n\n#### 一、核心概念（名词解释）\n\n- [x] **数据可视化**：将数字信息转换为人可识别的图形，清晰有效传递信息，便于分析推理\n- [x] **地理信息可视化三层次**：①地图数据的可视化表示 ②地理信息的可视化表示（分级+专题地图） ③空间分析结果的可视化表示\n- [x] **符号化**：按实际情况确定地图符号基本形状，以颜色或形状区分事物性质\n- [x] **单一符号**：大小、形状、颜色统一的符号，忽略定量差异，只反映地理位置\n- [x] **分类色彩/分类符号**：不同属性值用不同符号，反映数量或质量差异\n- [x] **分级色彩**：属性值按分级方法分若干级别，不同颜色表示不同级别，反映定量差异\n- [x] **分级符号**：不同大小符号表示不同级别属性值，用于点/线要素\n- [x] **比率符号**：属性值与符号大小一一对应，反映同级别间微小差异；数值过大时不适用\n- [x] **统计符号**：饼图（整体与部分比例）、柱状图（比较/趋势）、累计柱状图（比例+趋势）\n- [x] **点值符号**：用点密度表现要素空间分布，数值大区域点多\n- [x] **专题地图**：突出表示一种或几种自然/社会经济现象的地图\n- [x] **地图布局要素**：图名、图例、比例尺、坐标网、指北针、图框、附图\n\n#### 二、关键公式 / 模型\n\n- [x] **符号化方法分类**：单一符号、分类符号、分级符号、分级色彩、比率符号、组合符号、统计符号、彩色阴影\n- [x] **矢量符号化**：点状→标记符号；线状→线符号；面状→填充符号\n- [x] **栅格符号化**：分类栅格符号、分级栅格符号\n- [x] **分级方法**：自然断点法（Jenks）、等间隔法、分位数法、标准差法\n\n#### 三、重要案例 / 实验 / 例题\n\n- [x] **ArcMap符号系统**：符号选择器→符号属性编辑器→样式管理器\n- [x] **分类符号设置**：图层属性→符号系统→分类→设置类数和分类方法\n- [x] **分级符号设置**：图层属性→符号系统→数量→分级符号\n- [x] **地图输出**：布局视图→页面设置→添加图名/图例/比例尺/指北针→导出/打印\n\n#### 四、高频考点（速记）\n\n1. 符号化8种方法及其适用场景（必考）\n2. 分级色彩 vs 分级符号的区别（颜色vs大小）\n3. 比率符号的限制——属性值过大时不适用\n4. 统计符号三种类型：饼图/柱状图/累计柱状图\n5. 地理信息可视化三层次\n6. 地图布局六大要素\n7. 栅格数据符号化：分类+分级两种\n\n#### 五、思考题 / 自测\n\n- [x] 题：分级色彩与分级符号有何区别？\n  答：分级色彩用不同颜色表示级别差异，适用于面状要素；分级符号用不同大小表示，适用于点/线要素\n- [x] 题：比率符号与分级符号有何区别？\n  答：比率符号一一对应（连续变化），分级符号按级别分组（离散变化）\n- [x] 题：制作一幅完整专题地图需要哪些要素？\n  答：图名、图例、比例尺、坐标网、指北针、图框，可能还有附图和文字说明\n\n#### 六、与前后章之关联\n\n- 承前章：承接第三章坐标/投影体系，将空间数据以可视化方式呈现\n- 启后章：GIS课程总结，可视化是GIS应用输出的最终环节\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 空间数据的可视化表达\n## 核心概念\n- 数据可视 -\n\n**p028** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_028.jpg)\n\n二、 地理信息系统\n2.1信息与地理信息 数据和信息\n信息来源于数据，是数据内涵的意义和数据内容\n的解释。信息是一种客观存在，而数据是客观对\n象的一种表示，其本身并不是信息。\n数据所蕴涵的信息不会自动呈现出来，需要利\n用一种技术，如统计、解译、编码等对其解释，\n信息才能呈现出来。\n信息是数据的表达，数据是信息的载体。\n编号 鸡蛋体积 频数\n1 62.14\n... ......\n300 58.23\n体积（立方厘米）\n现实世界中的对象 描述事物特征的数据 从数据中统计得到的信息\n\n---\n\n**p029** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_029.jpg)\n\n地理信息系统\n2.1信息与地理信息 数据和信息\n114°00\"E 114°400°E 115°200E 114°00E 114°400E 115200E 114°0E 114°400E 115°200E 114°00E 114°400E 115°200E 11400E 114400E 115°200E1999 2004 2009 2014 2017\nNOSS. N.O.SS.ZN.007.\nLegend Legend Legend Legend Legend N.0.S7\nASlight ASlight ASlight ASlight ASlightCModerate BLight CModerate BLight CModerate BLight BLight CModerate CModerate BLightD Severe EVery severe 01530 60km D Severe EVery severc 01530 60 km D Severe EVery severe 01530 60km D Severc D SevereFExtremely severe FExtremely severe FExtremely severe FExtremely severe EVery severe 01530 60 km FExtremely severe EVery severe 01530  09 N001.711400\"E 114400°E 115200E 114°00°E 114400E 115200°E 114°00°E 114400\"E 115°200°E 114°00E 114°400E 115°200E 30011 114400E 115°200E800 (a) 2000 1.07001600 0.8\nSoil Erosion(x10*) 600500 1200 Rainfall(mm) 0.6400 NDVI300 800 0.4200 400 0.21001999 2004 2009 2014 2017 0.0\n\n---\n\n**p030** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_030.jpg)\n\n二、地理信息系统\n2.1信息与地理信息一地理数据和地理信息\n》地理数据：与地理环境要素有关的事物/现象的数\n量、质量、分布特征、联系和规律等的数字、文\n字、图像和图形等总称。\n地理信息：有关地理实体和地理现象的性质、特\n征和运动/变化状态的表征和一切有用的知识，它\n是对表达地理特征和地理现象之间关系的地理数\n据的解释。\n\n---\n\n**p031** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_031.jpg)\n\n二、 地理信息系统\n2.1信息与地理信息— 地理数据的特征\n地理数据相比常规数据，\n具有一些独有的特征，主\n要包括： 属性\n定位 数据\n数据\n空间上的分布性\n时域\n数据\n时间上的序列性\n数量上的海量性\n地理对象或地理现\n载体的多样性\n象的数据描述\n位置和属性的对应性\n 特性：\n\n---\n\n**p035** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_035.jpg)\n\n二、地理信息系统\n2.2地理信息系统一定义\n>地理信息系统（GeographicInformationSystem或Geo-InformationSystem，简称GIS）\n既是跨地球科学、空间科学、信息科学和计算\n机科学的一门应用基础学科，又是一项工程应\n用技术。它是以地学原理为依托，在计算机软\n硬件的支持下，研究空间数据的采集、处理、\n存储、管理、分析、建模和显示的相关理论方\n法和应用技术，以解决复杂的管理、规划和决\n策等问题。\n\n---\n\n**p036** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_036.jpg)\n\n二、地理信息系统\n2.2地理信息系统一内涵\nGIS处理/管理的对象：地理空间实体数据及其关\n系，包括空间定位数据、图形数据、遥感图像数\n据、属性数据等，主要用于分析和处理一定区域\n内分布的各种现象（物种、污染物）和过程（群\n落演变、污染扩散），解决各种复杂地学问题。\nGIS的操作对象：点、线、面、体这类有空间位\n置和空间形态特征的空间数据。\nGIS的技术优势在于它的数据综合、模拟与分析\n评价能力。\n\n---\n\n**p037** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_037.jpg)\n\n二、地理信息系统\n2.2地理信息系统 基本特征\n数据的空间定位特征：有别于其他数据的本\n质特征；\n空间关系处理的复杂性：图像、空间关系、\n属性数据。\n海量数据管理的能力：空间对象本身具有海\n量数据、分析过程产生海量数据。\n\n---\n\n**p038** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_038.jpg)\n\n二、 地理信息系统\n2.2地理信息系统 基本特征\n空间数据 属性数据\nName Address Town St. ZipGIS IS\n是\n空间数据和属性数据的综合体\n\n---\n\n**p039** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_039.jpg)\n\n二、 地理信息系统\n2.3GIS的构成\n>GIS功能的实现需要一定的环境支持，GIS运行\n环境包括计算机硬件系统、软件系统、空间数据、\n地学模型和管理与应用人员五大部分\n硬件系统 软件系统\n构建 应用\n地学模型 空间数据\n应用人员\n\n---\n\n**p040** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_040.jpg)\n\n二、 地理信息系统\n2.3.1计算机硬件系统\n计算机硬件是计算机系统中的实际物理装置的总\n称，是GIS的物理外壳。可以是电子的、电的、\n磁的、机械的、光的原件或装置。\n数字摄影测量仪器\n外部存储器 内部存储器\n全站仪 专用设备\n存储设备 绘图仪\n输入设备 处理设备 输出设备 打印机\n数字化仪\n终端\n扫描仪 常规设备\n服务器 工作站\n鼠标键盘\n\n---\n\n**p041** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_041.jpg)\n\n二、地理信息系统\n2.3.2计算机软件系统\n》GIS运行所必需的各种程序，包括三类：\nGIS支撑软件：GIS运行所必需的各种软件环\n境，如操作系统、数据库。\nGIS平台软件包括GIS功能所必需的各种处理\n软件和扩展开发包，如ArcGIS、QGIS等。\nGIS应用软件一般是在GIS平台软件的基础上，\n通过二次开发所形成的具体的应用软件，一般\n是面向应用部门的。\n\n---\n\n**p042** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_042.jpg)\n\n二、地理信息系统\n2.3.2计算机软件系统\n土地资源管理系统\n其它行业应用系统\nGIS应用软件\n平台软件 平台SDKGIS平台软件\n其它平台组件\nGIS支撑软件 操作系统 数据库系统\n其它支撑软件\n\n---\n\n**p043** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_043.jpg)\n\n二、地理信息系统\n2.3.3 地理空间数据\n数据是GIS的核\n心内容。地理空\n间数据是指以地 遥感监测数据 GPS及物联网\n相关数据\n球表面空间位置\n为参照的自然、 空间数据库\n社会和人文景观\n社会调查数据 社交媒体数据\n数据，可以是图\n形、图像、文件、\n表格和数字等。 交通时空数据 传统地图数据\n\n---\n\n**p044** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_044.jpg)\n\n二、地理信息系统\n2.3.3地理空间数据\n》不同用途的GIS，其地理空间数据的种类、精度\n均会有所不同，一般都包括以下三种信息：\n几何坐标：标识空间对象在自然界中的位置；\n空间关系：如距离、方位、拓扑关系等；\n非几何属性：\n①定性：名称、类型、特性等，如土地利用、土壤种类；\n②定量：数量和等级，如面积、人口数量等\n\n---\n\n**p045** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_045.jpg)\n\n二、地理信息系统\n2.3.4地学模型\n源数据\n>GIS的地学模型是根据\n数据1 填洼模型\n具体的地学目标和问\n题，①以GIS已有的\n相格水系提取模型 数据2\n操作和方法为基础，\n构建能够表达或模拟\n河流分级 水系矢里化\n特定现象的计算机模\n型；②无已有工具或\n分级河网 矢量河网\n算法，基于计算机编\n基于ArcGIS的河网\n程语言构建.... 提取模型\n河网提取模型\n\n---\n\n**p046** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_046.jpg)\n\n二、地理信息系统\n2.3.5应用人员\n》人员是GIS中的重要\n构成因素。地理信息\n系统从其设计、建立、\n项目管理 系统开发\n人员 人员\n运行和维护的整个生\n命周期，都离不开人\nGIS普通\n用户\n的作用。仅有系统的 科学研究 软件设计\n人员 人员\n软硬件、数据和模型\n构不成完整的地理信\n数据维护\n人员\n息系统。\n\n---\n\n**p047** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_047.jpg)\n\n二、地理信息系统\n2.4GIS功能与应用\n>GIS以数字形式表示自然界，具有完备的空间特\n性，它可以存储和处理不同地理发展时期的大\n量地理数据，具有极强的空间信息综合分析能\n力，是地理分析的有力工具。\nGIS不仅要管理大量复杂的地理数据\n还要完成地理分析、评价、预测和辅助决策的任\n务。\n\n---\n\n**p048** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_048.jpg)\n\n二、地理信息系统\n2.4.1数据采集与输入\n>将外部数据传输到GIS内部，并将数据从外部格\n式转化为便于处理的内部格式的过程\n确保GIS数据在内容和空间上的完整性、数值逻辑\n一致性和正确性；\nGIS数据库的建设占整个系统建设投资的70%;\n重要GIS研究内容：数据共享和自动化数据输入\n\n---\n\n**p049** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_049.jpg)\n\n二、 地理信息系统\n2.4.1 娄 数据采集与输入\n遥感传感器\n模拟地图 影像数据\n地面测量与\n足 历史数据\n计算机媒介 存储介质\n数字化仪\n扫描仪\n表格 矢量数据 栅格数据\n\n---\n\n**p050** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_050.jpg)\n\n二、 地理信息系统\n2.4.1数据采集与输入\n\n---\n\n**p051** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_051.jpg)\n\n二、 地理信息系统\n2.4.2数据编辑与更新\n数据编辑主要包括：图形编辑和属性编辑\n图形编辑：包括拓扑关系、几何图形、图幅拼\n接、投影变换以及误差校正等；\n属性编辑：属性表编辑，结合数据库完成。\n数据获取\n数据入库\nEditing and error correction Geocoding\n\n---\n\n**p052** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_052.jpg)\n\n二、 地理信息系统\n2.4.2数据编辑与更新\n\n---\n\n**p053** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_053.jpg)\n\n二、地理信息系统\n2.4.2数据编辑与更新\n>数据编辑主要包括：图形编辑和属性编辑\n图形编辑：包括拓扑关系、几何图形、图幅拼\n接、投影变换以及误差校正等；\n属性编辑：属性表编辑。\n数据更新：以新记录数据替代数据库中相对应\n的原有数据项或记录。\n空间实体是动态发展的，空间数据只反映其瞬\n时特征。\n\n---\n\n**p054** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_054.jpg)\n\n二、地理信息系统\n2.4.3数据存储与管理\n》建立空间数据库的关键步骤，涉及空间数据和\n属性数据的组织。\n空间数据组织方式：矢量模型、栅格模型、混合\n模型（矢量/栅格）；\n数据结构决定系统的功能；\n如何将空间数据和属性数据融为一体？\n\n---\n\n**p055** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_055.jpg)\n\n二、 地理信息系统\n2.4.3数据存储与管理\n如何将空间数据和属 Name Alti Long utumn,ng/vinter,ng/Ispring,ng/Lummer,ng\n鹤溪大桥 31.42167 120.455 317.64 345.5977413.413527.462\n性数据融为一体？ 浒青路 31.39111 120.5028 248.51 1173.002806.843 711.1685\n西塘河桥 31.44639 120.5353 207.35 259.8876502.8195 894.455\n漕湖 31.49417120.5761 39.28 252.2499424.555 397.021120°30'0\"E 120°400\"E 120°500\" 9** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_059.jpg)\n\n二、地理信息系统\n2.4.5数据与图形的交互显示\n》GIS为用户提供了许多表达地理数据的工具。\n可以是计算机屏幕显示；\n也可以是诸如报告、表格、地图等硬拷贝图件；\n可以通过人机交互方式来选择显示对象的形式\n尤其要强调的是GIS的地图输出功能\n可以输出全要素地图，也可以根据用户需要，输\n出各种专题图、统计图等。\n\n---\n\n**p060** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_060.jpg)\n\n二、 地理信息系统\n2.4.5数据与图形的交互显示\n表格\n501:1万坡度分级\n初格占总数百分比（%） 40 □0-385 口3-530 日8-15 5-825 15-2525-35\n目35-45\n专题地图 10 图45-605-3 8-15 15-2525-35 35-45\n坡度分级（1：5万）\n统计图\n\n---\n\n**p061** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_061.jpg)\n\n二、1 地理信息系统\n2.4.6应用模型与系统开发功能\n空气指数地图\n>GIS在各行各业的应用越 AQI PM PMOS NO\n来越广泛，常规GIS无法 严壹污染 全国\n中度污染 重度污染\n轻度污染\n满足各类型的应用需求。 俄罗斯\nGIS具有相应的二次开发 系\n斯坦 蒙古\n功能，用于开发满足特定\n行业需求的应用模型或应 中华人民共和国 韩国\n用软件系统。 加拉国\n印度\n泰国\nGIS的二次开发功能包通\n斯里兰卡\n常会提供完整的API和开 新加坡 印度尼西亚\n1000km\n高德地师\n发环境。\n\n---\n\n**p062** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_062.jpg)\n\n二、 地理信息系统\n2.4.6应用模型与系统开发功能\n应用领域 应用功能 应用领域 应用功能\n地方管理 公共服务 网络管理\n社会经济/政府\n交通规划 服务提供\n社会服务规划 电力与通信\n城市管理 紧急维护\n援助与发展 环境管理 垃圾填埋场选择\n国防、警务 目标位置识别 矿物分布制图\n战术支持决策 污染检测\n智能数据集成 自然灾害评估\n国土安全与防恐 灾害管理和救济\n商业 市场份额分析 资源管理\n运输车辆管理 环境影响评估\n保险 非点源污染负荷评估\n零售点位置 环境管理与规划\n\n---\n\n**p063** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_063.jpg)\n\n二、地理信息系统\n2.4GIS技术与发展\n物联网与智慧城市：传感器实时、动态获取信息，\n为城市空间物联信息的应用提供基础\n云平台与数据中心：空间数据来源的广泛性、数\n据的多源性和应用的复杂性\n》大数据与并行运算：多源、异构、海量和实时动\n态的空间数据\n机器学习与人工智能：计算机通过学习、自我完\n善，使挖掘和预测的结果更加准确\n\n---\n\n**p064** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_064.jpg)\n\n三、GIS空间分析\n>基于GIS的空间分析是GIS区别于其他信息系\n统的主要特色，也是评价GIS功能的主要特征\n之一。\n》GIS集成了多学科的最新技术，如关系数据库\n管理、高效图形算法、插值、区划和网络分析\n等，为GIS空间分析提供了强大的工具。\n》基于GIS空间分析的不同角度和层次：\n按空间数据结构类型；\n按分析对象的维数；\n按分析的复杂性程度。\n\n 算和信\n息查询、专题制图等。\n>8城市定量考核：制作环境质量、污染控制和城市\n建设三部分指标的信息查询和专题制图\n\n---\n\n**p081** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_081.jpg)\n\n五、环境地理信息系统\n5.3环境GIS应用需求\n>9应急预警预报：对事故风险源的地理位置及其\n属性、事故敏感区域单位位置及其属性进行有效\n管理。提供污染事故的大气、河流污染扩散的模\n拟过程和应急方案\n》10流域管理：对于整个流域的空间信息进行综合\n管理，对流域水质污染状况进行分析与评价。根\n据河流上监测断面的监测数据评价整条河流的水\n质状况以及排放到该条河流工业污染源贡献率。\n\n---\n\n**p082** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_082.jpg)\n\n五、环境地理信息系统\n5.4环境GIS功能需求\n>①环境空间数据处理功能：环境GIS应具备调整\n数据结构，灵活组织数据内容的功能；需考虑环\n境空间数据与环保业务属性数据的分离/统一存储\n策略。\n>②环境空间数据分析功能：具备从已有数据中获\n得（挖掘）对环境管理有用的信息或规律性知识\n的能力；环境GIS首先必备空间数据查询分析功\n能（属性或空间查询）。\n\n---\n\n**p083** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_083.jpg)\n\n五、环境地理信息系统\n5.4环境GIS功能需求\n>③环境空间数据维护功能：环境空间数据的多样\n性和应用的广泛性决定了环境GIS需要较强的数\n据维护功能，包括图层、图形（编辑、显示）、\n客户请求、数据访问等功能。\n》④环境应用功能：动态查询和显示、制作环境功\n能区专题地图、环境质量评价等；多与环境空间\n信息专题数据产品生产和发布；环境管理与规划\n决策方面应用较少\n\n---\n\n**p084** ![](../002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_084.jpg)\n\n五、环境地理信息系统\n襄阳市樊城区七里河黑臭水体整治工程监控中心项目\n：樊城区七里河黑臭水体整治智慧水务平台 首页 管网管理 黑臭水体治理 视频监控子系统 污水处理厂监督 巴 2023.06.14 系统管理员\n黑臭水体评价 污水厂基本信息\n河道新面 水质程度 更新时间 标准处理水量 服务范\n中航大道 2023-06-1412:01:00 鱼梁洲 30万 吴城片、襄州片区 工艺\n富康路以南区域\n普泊沟汇入点 V 2023-06-1412:01:00 标准处理水堂 20万td 服务范摄 城片 改良型AO 核心工艺\n西 中欧西路 2023-05-22 16:24:00 标准处理水量 服务范 核心工艺\n东津 10万td 东津区 取气生物减池\n自 吴一禁站 TV 2023-06-1412:01:00\n园 卧龙大道 NEW IBER R 污水厂水质达标 观音园\n注：指2小时更新 新烽光电 进水水质 出水水质 来达标\n河道斯面监测\n实时水位 瞬时流量 招标名称 水质评价 2时狗\n0.331 pHn 7.16 2023-06-1401:50:000.0 0.0\nm mh ms COD 7.6 一级A 2023-06-1401:50:00\n际名称 水级评价 0.04 -级A 2023-06-1401:50:00\n注度 107.3 2023-06-1412:01:00 总码 0.113 -级A 2023-06-1401:50:00\nL00 I类 2023-06-1412:01:00 本月报警统计 污水处理厂\np值 8.02 2023-06-1412:01:00\n总氨 I类 2023-06-1412:01:00\n治裤氢 7.8 I类 2023-06-1412:01:00 雨水系统 雨水管网 口雨水检香拌 口雨水菱子 日雨水用门 而水检修井\n电导率 468.0 污水系统 污水营网 口男水检直井 口污水菱子       GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/Q…\n```\n\n## 复习要点 · 已填充\n\n> 基于 OCR 全文自动提取，人工校核待补。\n\n### 一、核心概念（名词解释）\n\n- [x] **地理信息系统（GIS）**：既是跨地球科学、空间科学、信息科学和计算机科学的一门应用基础学科，又是一项工程应用技术。以地学原理为依托，在计算机软硬件支持下，研究空间数据的采集、处理、存储、管理、分析、建模和显示。\n- [x] **地理数据**：与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律等的数字、文字、图像和图形总称。\n- [x] **地理信息**：有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。\n- [x] **数据与信息的关系**：信息来源于数据，是数据内涵的意义；信息是数据的表达，数据是信息的载体。\n- [x] **地理数据的特征**：空间上的分布性、时间上的序列性、数量上的海量性、载体的多样性、位置和属性的对应性。\n- [x] **地理信息的特征**：空间相关性、空间层次性、空间区域性、空间多样性。\n- [x] **GIS的构成**：五大部分——计算机硬件系统、软件系统、空间数据、地学模型、应用人员。\n- [x] **GIS基本特征**：数据的空间定位特征、空间关系处理的复杂性、海量数据管理的能力；GIS是空间数据和属性数据的综合体。\n- [x] **空间分析**：GIS的核心功能，也是GIS与其他计算机系统的根本区别。\n\n### 二、关键公式 / 模型\n\n- [x] **RUSLE公式**（通用土壤流失方程）：A = R·K·L·S·C·P，用于土壤侵蚀量估算\n- [x] **C-Fix模型**：植被固碳量估算模型\n- [x] **GIS功能链**：数据采集与输入 → 数据编辑与更新 → 数据存储与管理 → 空间查询与分析 → 数据与图形的交互显示 → 应用模型与系统开发\n\n### 三、重要案例 / 实验 / 例题\n\n- [x] **John Snow霍乱溯源**（1854伦敦）：空间数据可视化+空间插值，确认Broad Street水井为霍乱源头\n- [x] **COVID-19疫情地图**：数据空间可视化\n- [x] **苏州河重金属空间分布**：采样点地图+空间插值+污染物浓度可视化\n- [x] **东江上游土壤侵蚀**：RUSLE模型+时序变化分析\n- [x] **农村排水模式优化**：基于GIS的计算框架——空间聚类→空间叠置→管网优化→处理设施优选→造价核算\n\n### 四、高频考点（速记）\n\n1. GIS的定义（必考）：跨学科应用基础+工程技术，研究空间数据采集→显示全链路\n2. GIS五大部分构成：硬件、软件、数据、模型、人员\n3. GIS核心功能 = 空间分析（区别于其他系统的根本标志）\n4. GIS是空间数据+属性数据的综合体\n5. 地理数据三大特征：空间分布性、时间序列性、海量性\n6. 数据库建设占系统投资70%\n7. GIS软件三类：支撑软件（OS/DB）→平台软件（ArcGIS/QGIS）→应用软件（二次开发）\n\n### 五、思考题 / 自测\n\n- [x] 题：GIS与一般信息系统的本质区别是什么？\n  答：GIS处理空间数据和属性数据的综合体，核心在于空间分析功能。\n- [x] 题：为什么说空间分析是GIS的核心功能？\n  答：空间分析是GIS区别于其他计算机系统的根本区别，也是评价GIS功能的主要特征。\n- [x] 题：GIS在环境科学中有哪些应用？\n  答：污染物空间可视化、土壤侵蚀评估、水质监测、排水模式优化等。\n\n### 六、与前后章之关联\n\n- 承前章：本章为GIS基础概念，无前章\n- 启后章：为第二章空间数据组织、第三章空间数据转换与处理提供理论框架\n"}, {"id": "ch-01-Geographic-Information-System-GI", "group": "章节素材", "title": "第01章 地理信息系统 Geographic Information System, GI 图文全文", "md": "# 第一章 · 地理信息系统 Geographic Information System, GIS · 图文全文\n\n> 教师: 黄源生 · 学期: 2026春\n> 章节: 第一章 地理信息系统 Geographic Information System, GIS\n> 含 2 个PDF\n\n---\n\n## PDF: 地理信息系统 Geographic \n环境包括计算机硬件系统、软件系统、空间数据、\n地学模型和管理与应用人员五大部分\n硬件系统 软件系统\n构建 应用\n地学模型 空间数据\n应用人员\n\n### 第 40 页\n\n![page 40](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_040.jpg)\n\n二、 地理信息系统\n2.3.1计算机硬件系统\n计算机硬件是计算机系统中的实际物理装置的总\n称，是GIS的物理外壳。可以是电子的、电的、\n磁的、机械的、光的原件或装置。\n数字摄影测量仪器\n外部存储器 内部存储器\n全站仪 专用设备\n存储设备 绘图仪\n输入设备 处理设备 输出设备 打印机\n数字化仪\n终端\n扫描仪 常规设备\n服务器 工作站\n鼠标键盘\n\n### 第 41 页\n\n![page 41](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_041.jpg)\n\n二、地理信息系统\n2.3.2计算机软件系统\n》GIS运行所必需的各种程序，包括三类：\nGIS支撑软件：GIS运行所必需的各种软件环\n境，如操作系统、数据库。\nGIS平台软件包括GIS功能所必需的各种处理\n软件和扩展开发包，如ArcGIS、QGIS等。\nGIS应用软件一般是在GIS平台软件的基础上，\n通过二次开发所形成的具体的应用软件，一般\n是面向应用部门的。\n\n### 第 42 页\n\n![page 42](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_042.jpg)\n\n二、地理信息系统\n2.3.2计算机软件系统\n土地资源管理系统\n其它行业应用系统\nGIS应用软件\n平台软件 平台SDKGIS平台软件\n其它平台组件\nGIS支撑软件 操作系统 数据库系统\n其它支撑软件\n\n### 第 43 页\n\n![page 43](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_043.jpg)\n\n二、地理信息系统\n2.3.3 地理空间数据\n数据是GIS的核\n心内容。地理空\n间数据是指以地 遥感监测数据 GPS及物联网\n相关数据\n球表面空间位置\n为参照的自然、 空间数据库\n社会和人文景观\n社会调查数据 社交媒体数据\n数据，可以是图\n形、图像、文件、\n表格和数字等。 交通时空数据 传统地图数据\n\n### 第 44 页\n\n![page 44](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_044.jpg)\n\n二、地理信息系统\n2.3.3地理空间数据\n》不同用途的GIS，其地理空间数据的种类、精度\n均会有所不同，一般都包括以下三种信息：\n几何坐标：标识空间对象在自然界中的位置；\n空间关系：如距离、方位、拓扑关系等；\n非几何属性：\n①定性：名称、类型、特性等，如土地利用、土壤种类；\n②定量：数量和等级，如面积、人口数量等\n\n### 第 45 页\n\n![page 45](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_045.jpg)\n\n二、地理信息系统\n2.3.4地学模型\n源数据\n>GIS的地学模型是根据\n数据1 填洼模型\n具体的地学目标和问\n题，①以GIS已有的\n相格水系提取模型 数据2\n操作和方法为基础，\n构建能够表达或模拟\n河流分级 水系矢里化\n特定现象的计算机模\n型；②无已有工具或\n分级河网 矢量河网\n算法，基于计算机编\n基于ArcGIS的河网\n程语言构建.... 提取模型\n河网提取模型\n\n### 第 46 页\n\n![page 46](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, 种综合规划、区域规\n划、流域规划水环境规划以及自然保护区规划等，\n为环境规划的制定提供技术手段\n>5污染源、环境质量远程监控：收集环境监测数\n据并进行识别、计算，反映监控污染源的实时污\n染指标信息，对实施监控的污染源进行跟踪表述\n动态直观的显示监控污染源的实时状态和污染物\n排放情况，使重点污染源的远程监控可视化。\n\n### 第 80 页\n\n![page 80](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_080.jpg)\n\n五、环境地理信息系统\n5.3环境GIS应用需求\n>6环境质量现状评价：直观反映出区域中受污染的\n程度以及空间分布情况。\n>自然生态现状与变化调查分析：自然生态环境现\n状与变化的调查分析，如对土地利用、水土流失、\n沙漠化、森林砍伐等进行分类解析，面积计算和信\n息查询、专题制图等。\n>8城市定量考核：制作环境质量、污染控制和城市\n建设三部分指标的信息查询和专题制图\n\n### 第 81 页\n\n![page 81](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_081.jpg)\n\n五、环境地理信息系统\n5.3环境GIS应用需求\n>9应急预警预报：对事故风险源的地理位置及其\n属性、事故敏感区域单位位置及其属性进行有效\n管理。提供污染事故的大气、河流污染扩散的模\n拟过程和应急方案\n》10流域管理：对于整个流域的空间信息进行综合\n管理，对流域水质污染状况进行分析与评价。根\n据河流上监测断面的监测数据评价整条河流的水\n质状况以及排放到该条河流工业污染源贡献率。\n\n### 第 82 页\n\n![page 82](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_082.jpg)\n\n五、环境地理信息系统\n5.4环境GIS功能需求\n>①环境空间数据处理功能：环境GIS应具备调整\n数据结构，灵活组织数据内容的功能；需考虑环\n境空间数据与环保业务属性数据的分离/统一存储\n策略。\n>②环境空间数据分析功能：具备从已有数据中获\n得（挖掘）对环境管理有用的信息或规律性知识\n的能力；环境GIS首先必备空间数据查询分析功\n能（属性或空间查询）。\n\n### 第 83 页\n\n![page 83](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_083.jpg)\n\n五、环境地理信息系统\n5.4环境GIS功能需求\n>③环境空间数据维护功能：环境空间数据的多样\n性和应用的广泛性决定了环境GIS需要较强的数\n据维护功能，包括图层、图形（编辑、显示）、\n客户请求、数据访问等功能。\n》④环境应用功能：动态查询和显示、制作环境功\n能区专题地图、环境质量评价等；多与环境空间\n信息专题数据产品生产和发布；环境管理与规划\n决策方面应用较少\n\n### 第 84 页\n\n![page 84](001-地理信息系统 Geographic Information System, GIS-地理信息系统 Geographic Information System, GIS/page_084.jpg)\n\n五、环境地理信息系统\n襄阳市樊城区七里河黑臭水体整治工程监控中心项目\n：樊城区七里河黑臭水体整治智慧水务平台 首页 管网管理 黑臭水体治理 视频监控子系统 污水处理厂监督 巴 2023.06.14 系统管理员\n黑臭水体评价 污水厂基本信息\n河道新面 水质程度 更新时间 标准处理水量 服务范\n中航大道 2023-06-1412:01:00 鱼梁洲 30万 吴城片、襄州片区 工艺\n富康路以南区域\n普泊沟汇入点 V 2023-06-1412:01:00 标准处理水堂 20万td 服务范摄 城片 改良型AO 核心工艺\n西 中欧西路 2023-05-22 16:24:00 标准处理水量 服务范 核心工艺\n东津 10万td 东津区 取气生物减池\n自 吴一禁站 TV 2023-06-1412:01:00\n园 卧龙大道 NEW IBER R 污水厂水质达标 观音园\n注：指2小时更新 新烽 （物种、污染物）和过程（群\n落演变、污染扩散），解决各种复杂地学问题。\nGIS的操作对象：点、线、面、体这类有空间位\n置和空间形态特征的空间数据。\nGIS的技术优势在于它的数据综合、模拟与分析\n评价能力。\n\n### 第 37 页\n\n![page 37](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_037.jpg)\n\n二、地理信息系统\n2.2地理信息系统 基本特征\n数据的空间定位特征：有别于其他数据的本\n质特征；\n空间关系处理的复杂性：图像、空间关系、\n属性数据。\n海量数据管理的能力：空间对象本身具有海\n量数据、分析过程产生海量数据。\n\n### 第 38 页\n\n![page 38](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_038.jpg)\n\n二、 地理信息系统\n2.2地理信息系统 基本特征\n空间数据 属性数据\nName Address Town St. ZipGIS IS\n是\n空间数据和属性数据的综合体\n\n### 第 39 页\n\n![page 39](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_039.jpg)\n\n二、 地理信息系统\n2.3GIS的构成\n>GIS功能的实现需要一定的环境支持，GIS运行\n环境包括计算机硬件系统、软件系统、空间数据、\n地学模型和管理与应用人员五大部分\n硬件系统 软件系统\n构建 应用\n地学模型 空间数据\n应用人员\n\n### 第 40 页\n\n![page 40](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_040.jpg)\n\n二、 地理信息系统\n2.3.1计算机硬件系统\n计算机硬件是计算机系统中的实际物理装置的总\n称，是GIS的物理外壳。可以是电子的、电的、\n磁的、机械的、光的原件或装置。\n数字摄影测量仪器\n外部存储器 内部存储器\n全站仪 专用设备\n存储设备 绘图仪\n输入设备 处理设备 输出设备 打印机\n数字化仪\n终端\n扫描仪 常规设备\n服务器 工作站\n鼠标键盘\n\n### 第 41 页\n\n![page 41](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_041.jpg)\n\n二、地理信息系统\n2.3.2计算机软件系统\n》GIS运行所必需的各种程序，包括三类：\nGIS支撑软件：GIS运行所必需的各种软件环\n境，如操作系统、数据库。\nGIS平台软件包括GIS功能所必需的各种处理\n软件和扩展开发包，如ArcGIS、QGIS等。\nGIS应用软件一般是在GIS平台软件的基础上，\n通过二次开发所形成的具体的应用软件，一般\n是面向应用部门的。\n\n### 第 42 页\n\n![page 42](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_042.jpg)\n\n二、地理信息系统\n2.3.2计算机软件系统\n土地资源管理系统\n其它行业应用系统\nGIS应用软件\n平台软件 平台SDKGIS平台软件\n其它平台组件\nGIS支撑软件 操作系统 数据库系统\n其它支撑软件\n\n### 第 43 页\n\n![page 43](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_043.jpg)\n\n二、地理信息系统\n2.3.3 地理空间数据\n数据是GIS的核\n心内容。地理空\n间数据是指以地 遥感监测数据 GPS及物联网\n相关数据\n球表面空间位置\n为参照的自然、 空间数据库\n社会和人文景观\n社会调查数据 社交媒体数据\n数据，可以是图\n形、图像、文件、\n表格和数字等。 交通时空数据 传统地图数据\n\n### 第 44 页\n\n![page 44](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_044.jpg)\n\n二、地理信息系统\n2.3.3地理空间数据\n》不同用途的GIS，其地理空间数据的种类、精度\n均会有所不同，一般都包括以下三种信息：\n几何坐标：标识空间对象在自然界中的位置；\n空间关系：如距离、方位、拓扑关系等；\n非几何属性：\n①定性：名称、类型、特性等，如土地利用、土壤种类；\n②定量：数量和等级，如面积、人口数量等\n\n### 第 45 页\n\n![page 45](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_045.jpg)\n\n二、地理信息系统\n2.3.4地学模型\n源数据\n>GIS的地学模型是根据\n数据1 填洼模型\n具体的地学目标和问\n题，①以GIS已有的\n相格水系提取模型 数据2\n操作和方法为基础，\n构建能够表达或模拟\n河流分级 水系矢里化\n特定现象的计算机模\n型；②无已有工具或\n分级河网 矢量河网\n算法，基于计算机编\n基于ArcGIS的河网\n程语言构建.... 提取模型\n河网提取模型\n\n### 第 46 页\n\n![page 46](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_046.jpg)\n\n二、地理信息系统\n2.3.5应用人员\n》人员是GIS中的重要\n构成因素。地理信息\n系统从其设计、建立、\n项目管理 系统开发\n人员 人员\n运行和维护的整个生\n命周期，都离不开人\nGIS普通\n用户\n的作用。仅有系统的 科学研究 软件设计\n人员 人员\n软硬件、数据和模型\n构不成完整的地理信\n数据维护\n人员\n息系统。\n\n### 第 47 页\n\n![page 47](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_047.jpg)\n\n二、地理信息系统\n2.4GIS功能与应用\n>GIS以数字形式表示自然界，具有完备的空间特\n性，它可以存储和处理不同地理发展时期的大\n量地理数据，具有极强的空间信息综合分析能\n力，是地理分析的有力工具。\nGIS不仅要管理大量复杂的地理数据\n还要完成地理分析、评价、预测和辅助决策的任\n务。\n\n### 第 48 页\n\n![page 48](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_048.jpg)\n\n二、地理信息系统\n2.4.1数据采集与输入\n>将外部数据传输到GIS内部，并将数据从外部格\n式转化为便于处理的内部格式的过程\n确保GIS数据在内容和空间上的完整性、数值逻辑\n一致性和正确性；\nGIS数据库的建设占整个系统建设投资的70%;\n重要GIS研究内容：数据共享和自动化数据输入\n\n### 第 49 页\n\n![page 49](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_049.jpg)\n\n二、 地理信息系统\n2.4.1 娄 数据采集与输入\n遥感传感器\n模拟地图 影像数据\n地面测量与\n足 历史数据\n计算机媒介 存储介质\n数字化仪\n扫描仪\n表格 矢量数据 栅格数据\n\n### 第 50 页\n\n![page 50](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_050.jpg)\n\n二、 地理信息系统\n2.4.1数据采集与输入\n\n### 第 51 页\n\n![page 51](002-地理信息系统 Geographic age_082.jpg)\n\n五、环境地理信息系统\n5.4环境GIS功能需求\n>①环境空间数据处理功能：环境GIS应具备调整\n数据结构，灵活组织数据内容的功能；需考虑环\n境空间数据与环保业务属性数据的分离/统一存储\n策略。\n>②环境空间数据分析功能：具备从已有数据中获\n得（挖掘）对环境管理有用的信息或规律性知识\n的能力；环境GIS首先必备空间数据查询分析功\n能（属性或空间查询）。\n\n### 第 83 页\n\n![page 83](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_083.jpg)\n\n五、环境地理信息系统\n5.4环境GIS功能需求\n>③环境空间数据维护功能：环境空间数据的多样\n性和应用的广泛性决定了环境GIS需要较强的数\n据维护功能，包括图层、图形（编辑、显示）、\n客户请求、数据访问等功能。\n》④环境应用功能：动态查询和显示、制作环境功\n能区专题地图、环境质量评价等；多与环境空间\n信息专题数据产品生产和发布；环境管理与规划\n决策方面应用较少\n\n### 第 84 页\n\n![page 84](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_084.jpg)\n\n五、环境地理信息系统\n襄阳市樊城区七里河黑臭水体整治工程监控中心项目\n：樊城区七里河黑臭水体整治智慧水务平台 首页 管网管理 黑臭水体治理 视频监控子系统 污水处理厂监督 巴 2023.06.14 系统管理员\n黑臭水体评价 污水厂基本信息\n河道新面 水质程度 更新时间 标准处理水量 服务范\n中航大道 2023-06-1412:01:00 鱼梁洲 30万 吴城片、襄州片区 工艺\n富康路以南区域\n普泊沟汇入点 V 2023-06-1412:01:00 标准处理水堂 20万td 服务范摄 城片 改良型AO 核心工艺\n西 中欧西路 2023-05-22 16:24:00 标准处理水量 服务范 核心工艺\n东津 10万td 东津区 取气生物减池\n自 吴一禁站 TV 2023-06-1412:01:00\n园 卧龙大道 NEW IBER R 污水厂水质达标 观音园\n注：指2小时更新 新烽光电 进水水质 出水水质 来达标\n河道斯面监测\n实时水位 瞬时流量 招标名称 水质评价 2时狗\n0.331 pHn 7.16 2023-06-1401:50:000.0 0.0\nm mh ms COD 7.6 一级A 2023-06-1401:50:00\n际名称 水级评价 0.04 -级A 2023-06-1401:50:00\n注度 107.3 2023-06-1412:01:00 总码 0.113 -级A 2023-06-1401:50:00\nL00 I类 2023-06-1412:01:00 本月报警统计 污水处理厂\np值 8.02 2023-06-1412:01:00\n总氨 I类 2023-06-1412:01:00\n治裤氢 7.8 I类 2023-06-1412:01:00 雨水系统 雨水管网 口雨水检香拌 口雨水菱子 日雨水用门 而水检修井\n电导率 468.0 污水系统 污水营网 口男水检直井 口污水菱子 口污水检排井\n2023-06-1412:01:00 合流系统 合流营网 口台查井 口台 合流草水井 故障报警 消缺报警\n0.314 VK 2023-06-1412:01:00 排水设临 为水处理厂 污水泵站 口排海站 可分站 排口\n\n### 第 85 页\n\n![page 85](002-地理信息系统 Geographic Information System, GIS（2）-地理信息系统 Geographic Information System, GIS/page_085.jpg)\n\n五、环境地理信息系统\n襄阳市樊城区七里河黑臭水体整治工程监控中心项目\n樊城区七里河黑臭水体整治智慧水务平台 首页 管网管理 黑突水体治理 视频监控子系统 污水处理厂监督 2023.06.14 系统管理员\n自\n自建小学 品农工品球大酒店 阳市封动保健员\n蔡阳市第十三中学\n七国河黑身水体 月充连黑身水体 南果黑身水体 ? 阿道水版 诚量水位\nNEW IBER\n站点名称 水位（m) 新烽光电 S速(m/s) 小时水量（mm） 累计论（m） 爱测时间\n中航大道 0.28 0.03 346.6 on System\n> 既是跨**地球科学、空间科学、信息科学和计算机科学**的一门**应用基础学科**，又是一项**工程应用技术**。\n> 以地学原理为依托，在计算机软硬件支持下，研究空间数据的**采集、处理、存储、管理、分析、建模和显示**。\n\n**答题要点**：①跨学科性质 ②计算机软硬件支持 ③空间数据全链路（采集→显示）\n\n### 1.2 数据 vs 信息 vs 地理数据 vs 地理信息\n\n| 概念 | 定义 | 关键词 |\n|------|------|--------|\n| **数据** | 未经加工的原始事实记录 | 原始、载体 |\n| **信息** | 用数据表示事物内容/数量/特征，向人们提供关于现实世界新的事实和知识 | 解释、知识 |\n| **地理数据** | 与地理环境要素有关的事物/现象的**数量、质量、分布特征、联系和规律**等的数字、文字、图像和图形总称 | 数量+质量+分布 |\n| **地理信息** | 有关地理实体和地理现象的**性质、特征和运动/变化状态**的表征和一切有用的知识 | 性质+变化+解释 |\n\n**核心关系**：信息来源于数据 → 信息是数据的表达 → 数据是信息的载体 → 地理信息是对地理数据的解释\n\n### 1.3 地理数据五大特征\n\n| 特征 | 含义 |\n|------|------|\n| **空间分布性** | 地理对象在空间上有确定位置和分布模式 |\n| **时间序列性** | 地理现象随时间动态变化 |\n| **数量海量性** | 空间对象本身数据量大，分析过程产生更多数据 |\n| **载体多样性** | 图形、图像、文字、表格等多种形式 |\n| **位置-属性对应性** | 空间位置与属性紧密关联，这是GIS区别于MIS的本质 |\n\n### 1.4 地理信息特有特征\n\n> 地理信息具备信息基本特征（客观性、适用性、可传输性、共享性），此外还有独特特性：\n\n| 特征 | 说明 |\n|------|------|\n| **空间相关性** | 近邻事物关联更强（Tobler地理学第一定律） |\n| **空间层次性** | 不同尺度/分辨率下表现不同 |\n| **空间区域性** | 同一现象在不同区域特征不同 |\n| **空间多样性** | 同一区域多种现象共存 |\n\n![地理数据特征图](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_031.jpg)\n\n---\n\n## 二、GIS的构成（五大部分·必考简答）\n\n```\n        ┌─────────┐\n        │ 应用人员 │  ← 系统开发/数据生产/终端用户\n        ├─────────┤\n        │ 地学模型 │  ← 针对具体地学问题的数学模型\n        ├─────────┤\n        │ 空间数据 │  ← GIS核心内容（矢量+栅格+属性）\n        ├─────────┤\n        │ 软件系统 │  ← 支撑→平台→应用（三层）\n        ├─────────┤\n        │ 硬件系统 │  ← 输入→处理→输出+存储\n        └─────────┘\n```\n\n| 组成 | 详细说明 | 考试关键词 |\n|------|----------|-----------|\n| **硬件系统** | 输入设备（数字化仪、扫描仪、GPS）→ 处理设备（服务器、工作站）→ 输出设备（绘图仪、打印机）→ 存储设备 | 物理外壳 |\n| **软件系统** | ①支撑软件（OS/DB）②平台软件（ArcGIS/QGIS/MapInfo）③应用软件（二次开发） | 三层结构 |\n| **空间数据** | 矢量+栅格+属性；几何坐标+空间关系+非几何属性（定性+定量）；**数据库建设占系统投资70%** | 核心内容 |\n| **地学模型** | ①基于GIS已有操作构建 ②无已有工具时编程构建 | 应用深化 |\n| **应用人员** | 系统开发、项目管理、科学研究、软件设计、数据维护、普通用户 | 不可或缺 |\n\n![GIS五大部分结构图](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_027.jpg)\n\n![GIS硬件组成图](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_028.jpg)\n\n![GIS软件三层图](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_030.jpg)\n\n---\n\n## 三、GIS基本特征\n\n1. **数据的空间定位特征**：GIS = 空间数据 + 属性数据的综合体（本质特征）\n2. **空间关系处理的复杂性**：需同时处理图像、空间关系、属性数据\n3. **海量数据管理的能力**：空间对象本身海量 + 分析过程产生海量数据\n\n> ⚡ **核心论断**：GIS的核心功能 = **空间分析** —— 这是GIS与其他计算机系统的**根本区别**\n\n---\n\n## 四、GIS功能链（必考·简答）\n\n```\n数据采集与输入 → 数据编辑与更新 → 数据存储与管理 → 空间查询与分析 → 数据与图形交互显示 → 应用模型与系统开发\n```\n\n| 功能 | 核心内容 | 考试要点 |\n|------|----------|----------|\n| **数据采集与输入** | 将地图/遥感/外业/文本转为计算机可识别数字形式 | 数据库建设占投资**70%**；重要研究内容：数据共享和自动化输入 |\n| **数据编辑与更新** | 图形编辑（拓扑/几何/图幅拼接/投影变换/误差校正）+ 属性编辑 | 空间实体动态发展，数据只反映瞬时特征 |\n| **数据存储与管理** | 空间数据库：矢量/栅格/混合模型组织；空间数据+属性数据融为一体 | 消除\"数据孤岛\" |\n| **空间查询与分析** | ①空间查询（最基本功能）②空间分析（**核心功能**）③模型分析（应用深化标志） | **根本区别** |\n| **数据与图形交互显示** | 屏幕显示 + 硬拷贝（报告/表格/地图）；强调**地图输出**功能：全要素地图/专题图/统计图 | 可视化 |\n| **应用模型与系统开发** | 二次开发功能 + 完整API和开发环境 | 面向行业需求 |\n\n![空间分析功能图](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_057.jpg)\n\n![GIS应用领域表](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_062.jpg)\n\n---\n\n## 五、GIS技术与发展趋势\n\n| 趋势 | 核心内容 |\n|------|----------|\n| **物联网与智慧城市** | 传感器实时、动态获取信息，为城市空间物联信息应用提供基础 |\n| **云平台与数据中心** | 空间数据来源广泛性、多源性、应用复杂性 |\n| **大数据与并行运算** | 多源、异构、海量、实时动态的空间数据 |\n| **机器学习与人工智能** | 计算机通过学习自我完善，使挖掘和预测更准确 |\n\n### GIS发展历程\n\n| 阶段 | 时间 | 标志 |\n|------|------|------|\n| 萌芽期 | 1960s | 加拿大CGIS（世界第一个GIS） |\n| 发展期 | 1970s | GIS软件商业化 |\n| 应用期 | 1980s | 工作站GIS |\n| 产业化期 | 1990s- | 桌面GIS、WebGIS |\n| 中国起步 | 1970-1980 | 中科院遥感所GIS研究室 |\n\n---\n\n## 六、GIS与其他系统区别（简答高频）\n\n| 对比维度 | GIS | CAD | MIS |\n|----------|-----|-----|-----|\n| **数据类型** | 空间+属性 | 图形为主 | 属性为主 |\n| **坐标系** | 地理坐标系 | 局部坐标系 | 无 |\n| **拓扑关系** | 必须建立 | 一般不建立 | 无 |\n| **核心功能** | 空间分析 | 制图设计 | 统计分析 |\n| **数据量** | 大 | 中 | 小 |\n\n> 答题技巧：从数据类型、坐标系、拓扑关系、核心功能四个维度对比\n\n---\n\n## 七、常用GIS软件\n\n| 类型 | 软件 |\n|------|------|\n| **商业软件** | ArcGIS、MapInfo、SuperMap |\n| **开源软件** | QGIS、GRASS GIS、GDAL/OGR |\n\n---\n\n## 八、ArcGIS 10 概述\n\n### 8.1 ArcGIS三个基础模块（必考）\n\n| 模块 | 功能 | 记忆口诀 |\n|------|------|----------|\n| **ArcMap** | 桌面核心应用，显示/查询/编辑/分析地图数据，**数据视图+布局视图** | \"做地图\" |\n| **ArcCatalog** | 空间数据资源管理器，浏览/搜索/组织/管理空间数据，**创建和管理地理数据库** | \"管数据\" |\n| **Toolbox** | 地理处理框架 = ToolBox + **ModelBuilder** + **Python(ArcPy)** | \"做分析\" |\n\n![ArcGIS三模块](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_067.jpg)\n\n### 8.2 ArcGIS中的空间数据类型\n\n| 类型 | 特点 | 示例 |\n|------|------|------|\n| **矢量数据** | 离散数据 | 行政区划、植被覆盖、土地利用 |\n| **栅格数据** | 连续数据 | 数字高程DEM、空气质量 |\n\n> Shapefile组成：.shp + .shx + .dbf + .prj + .sbn/.sbx（至少前三个）\n\n### 8.3 空间分析工具分类\n\n| 工具集 | 主要内容 |\n|--------|----------|\n| **分析工具(Analysis)** | 裁剪/选择/拆分/相交/联合/缓冲区/邻近分析 |\n| **空间分析(Spatial Analyst)** | 矢量分析(缓冲区/叠置/网络) + 栅格分析(距离/表面/密度/统计) + 水文分析 |\n| **网络分析(Network Analyst)** | 成本路径/最近设施点/服务区/多路径派发 |\n| **3D分析** | 表面生成/坡度坡向/可视性分析 |\n| **空间统计(Spatial Statistics)** | 聚类分析/空间自相关/度量地理分布/空间关系建模 |\n\n---\n\n## 九、环境GIS应用\n\n### 9.1 三种应用模式\n\n1. **环境科学研究工具**：辅助手段\n2. **环境管理**：长期、稳定、高效运行的业务化服务系统\n3. **公众服务**\n\n### 9.2 十大应用需求\n\n> 污染控制 · 环境监测 · 建设项目管理 · 环境规划 · 污染源远程监控\n> 环境质量现状评价 · 自然生态调查分析 · 城市定量考核 · 应急预警预报 · 流域管理\n\n### 9.3 四大功能需求\n\n1. **环境空间数据处理功能**：调整数据结构，灵活组织数据内容\n2. **环境空间数据分析功能**：从已有数据中获得规律性知识\n3. **环境空间数据维护功能**：图层/图形编辑/数据访问\n4. **环境应用功能**：动态查询显示/专题地图/环境质量评价\n\n---\n\n## 十、重要案例（论述题素材）\n\n| 案例 | 核心技术 | 论述要点 |\n|------|----------|----------|\n| **John Snow霍乱溯源**（1854伦敦） | 空间数据可视化 + 空间插值 | 确认Broad Street水井为疫情源头 → GIS空间分析的经典起源 |\n| **COVID-19疫情地图** | 数据空间可视化 | 全球/全国疫情分布实时可视化 |\n| **苏州河重金属空间分布** | 采样点地图 + 空间插值 + 污染物浓度分级色彩 | 城市水系重金属三态(表层水/悬浮颗粒/沉积物)空间分布 |\n| **东江上游土壤侵蚀** | RUSLE模型 + 时序对比 | A = R·K·L·S·C·P；1999-2017五期侵蚀变化 + C-Fix固碳模型 |\n| **农村排水模式优化** | 空间聚类→空间叠置→管网优化→处理设施优选→造价核算 | 基于GIS的计算框架 + ArcGIS + Python算法设计 |\n| **市政排水模式优化** | GIS读写数据 + 算法设计 + 代码编写 | 污水管网直径分级可视化 + WWTPs(12)处理厂分布 |\n\n![GIS能干什么](../002-地理信息系统%20Geographic%20Information%20System,%20GIS（2）-地理信息系统%20Geographic%20Information%20System,%20GIS/page_013.jpg)\n\n---\n\n## 十一、经典试题精选\n\n### 名词解释\n\n1. **地理信息系统（GIS）**：在计算机软硬件支持下，对空间数据进行采集、存储、管理、分析、显示和输出的信息系统。既是跨学科应用基础学科，又是一项工程技术。\n2. **地理数据**：与地理环境要素有关的事物/现象的数量、质量、分布特征、联系和规律的数字、文字、图像和图形总称。\n3. **地理信息**：有关地理实体和地理现象的性质、特征和运动/变化状态的表征和一切有用的知识，是对地理数据的解释。\n4. **3S集成**：GPS（定位）+ RS（遥感获取）+ GIS（分析管理）三种技术的集成应用。\n\n### 简答题\n\n**Q1：简述GIS的基本组成**\n> GIS由五部分组成：①硬件系统（服务器/工作站/输入输出设备/存储设备）②软件系统（支撑软件/平台软件/应用软件）③数据（空间数据+属性数据，GIS核心）④模型（空间分析模型/应用模型）⑤人员（开发人员/数据生产者/最终用户）\n\n**Q2：简述GIS的基本功能**\n> ①数据采集与输入 ②数据编辑与更新 ③数据存储与管理 ④空间查询与分析（核心功能）⑤数据与图形的交互显示 ⑥应用模型与系统开发\n\n**Q3：GIS与MIS、CAD的区别**\n> 见第六节对比表。核心区别：GIS处理空间+属性数据、使用地理坐标系、必须建立拓扑关系、核心功能是空间分析。\n\n### 论述题\n\n**Q：论述GIS空间分析功能及其在地学中的应用**\n> 空间分析功能：①空间查询（属性查图形/图形查属性）②叠置分析（多图层叠加产生新特征）③缓冲区分析（分析实体影响范围）④网络分析（最短/最佳路径）⑤地形分析（坡度/坡向/等高线）⑥空间统计分析（空间自相关/空间插值）\n> 地学应用：城市规划（用地适宜性评价）、环境管理（污染扩散模拟）、资源管理（矿产分布制图）、灾害评估（洪水淹没分析）、交通规划（路径优化）\n\n---\n\n## 十二、高频考点速记（考前必背）\n\n| # | 考点 | 关键词 |\n|---|------|--------|\n| 1 | **GIS定义（必考）** | 跨学科应用基础+工程技术；空间数据采集→显示全链路 |\n| 2 | **GIS五大部分** | 硬件、软件、数据、模型、人员 |\n| 3 | **GIS核心功能 = 空间分析** | 区别于其他系统的**根本标志** |\n| 4 | **GIS本质** | 空间数据+属性数据的综合体 |\n| 5 | **地理数据五特征** | 空间分布性、时间序列性、海量性、载体多样性、位置属性对应性 |\n| 6 | **地理信息四特征** | 空间相关性、空间层次性、空间区域性、空间多样性 |\n| 7 | **数据库建设占投资70%** | 数据是GIS核心内容 |\n| 8 | **GIS软件三层** | 支撑软件→平台软件→应用软件 |\n| 9 | **ArcGIS三模块** | ArcMap(做地图) + ArcCatalog(管数据) + Toolbox(做分析) |\n| 10 | **空间数据三种信息** | 几何坐标 + 空间关系 + 非几何属性(定性+定量) |\n| 11 | **RUSLE公式** | A = R·K·L·S·C·P（土壤侵蚀量估算） |\n| 12 | **GIS发展趋势** | WebGIS/云GIS + 移动GIS + 三维/时态GIS + 大数据AI融合 |\n"}, {"id": "ch-02-GIS", "group": "章节素材", "title": "第02章 GIS 图文全文", "md": "# 第二章 · GIS · 图文全文\n\n> 教师: 黄源生 · 学期: 2026春\n> 章节: 第二章 GIS\n> 含 2 个PDF\n\n---\n\n## PDF: 空间数据-知识点回顾\n> 页数: 166\n\n### 第 1 页\n\n![page 1](003-GIS-空间数据-知识点回顾/page_001.jpg)\n\n知识点回顾\n如何更改MIXD文件中数据框/层名称？\n在需要更名的数据层上单击左键，选定数据层，\n再次单击左键，数据层名称进入可编辑状态\n输入新名称。\n选定数据层一图层属性 主（Properties）一常规\n（General）→图层名称（LayerName）\n不会修改Windows系统下文件名称！\n\n### 第 2 页\n\n![page 2](003-GIS-空间数据-知识点回顾/page_002.jpg)\n\n知识点回顾\nMXD文件中调整数据层顺序的原则？\n数据层在内容表中的排序，直接影响输出地图\n中的表达效果。\n(1)按点、线、面要素类型依次由上至下排列;\n(2)按要素重要程度的高低依次由上至下排列;\n(3)按要素线划的细粗依次由下至上排列;\n(4)按要素色彩的浓淡程度依次由下至上排列。\n清晰直观的地图表达，不能遮挡主要要素！！！\n内容列表模式：按绘制顺序列出\n\n### 第 3 页\n\n![page 3](003-GIS-空间数据-知识点回顾/page_003.jpg)\n\n知识点回顾\nMXD文件中如何复制、删除数据层？\nTable Of Contents 口X\n①在内容列表中选\n中需复制的数据层 日 LayersRiverNetCounty\n（按Ctrl或Shift选择\nWaterArel\n多个数据层); CopyHefeiRSimage Remove\n②点击鼠标右键； GroupTurn On\n③在弹出快捷菜单 TurnOffCreate LayerPackage...\n中选择复杂(copy)；\nZoom To LayersVisibleScale Range\n\n### 第 4 页\n\n![page 4](003-GIS-空间数据-知识点回顾/page_004.jpg)\n\n知识点回顾\nMXD文件中如何复制、删除数据层？\n④选中数据层需要 Table OfContents 口X\n。三\n复杂到的数据框；\nTableOf Contents5点击鼠标右键：\n6在弹出快捷菜单 LayersRiverN\n中选择粘贴(Past)。 CopyRiverN\n选中图层→点击鼠 WaterA Remove\n+ County Group\n标右键→删除\n+ City Turn On\n(remove)。\n\n### 第 5 页\n\n![page 5](003-GIS-空间数据-知识点回顾/page_005.jpg)\n\n知识点回顾\n文件连接 （FolderConnections）如何操作？\nAddDataLookin: Home-Documents\\ArcGISHome-Documents\\ArcGISFolderConnections ments\\ArcGISToolboxes ctionsDatabaseServers tToFolder...\nDatabase ConnectionsGISServersMyHostedServices DATAReady-To-UseServicesName: Add nnectionsShow of type: Datasets,Layers andResults CancelervicesleServicesTracking Connections\n\n### 第 6 页\n\n![page 6](003-GIS-空间数据-知识点回顾/page_006.jpg)\n\n知识点回顾\n新建、删除矢量文件/文件夹如何操作？\nCatalog 口x\n←价鞋\n选中目标文件 Location: ArcGIS_3rdHome-Documents\\ArcGIS\n夹→点击鼠标 日 FolderConnections\n$RECYCLE.BIN Folder\n右键→新建 ArcGIS3r Copy\n+ Desktop File Geodatabase\n+ document Paste PersonalGeodatabasedownload DeleteGIS_map Rename Database Connection...\nNoteExpr ArcGiSServer Connection...\n选中目标文件 Notes RefreshIdd Layer...\nReport New GroupLayer\n夹→点击鼠标 source_co Item Description... PythonToolboxSubject Properties...\nShapefile....\n右键→删除 Turn F ationalView\n\n### 第 12 页\n\n![page 12](003-GIS-空间数据-知识点回顾/page_012.jpg)\n\n本章内容\n一、矢量数据组织\n二、栅格数据组织\n三、创建地理数据库\n四、数据采集\n五、数据编辑\n\n### 第 13 页\n\n![page 13](003-GIS-空间数据-知识点回顾/page_013.jpg)\n\n》空间数据采集是指将现有的地图、外业观\n测成果、航空相片、遥感图像、文本资料\n等转成计算机可以识别处理的数字形式\n>数据采集可分为属性数据采集和图形数据\n采集。\n表示空间实体的位置、形状、\n地理空间数据\n大小及其分布特征的数据。\n地理\n数据\n表示空间实体的属性特征、\n非地理空间数据\n是对地理空间数据的说明。\n\n### 第 14 页\n\n![page 14](003-GIS-空间数据-知识点回顾/page_014.jpg)\n\n》空间数据采集是指将现有的地图、外业观\n测成果、航空相片、遥感图像、文本资料\n等转成计算机可以识别处理的数字形式\n>数据采集可分为属性数据采集和图形数据\n采集。\n>数据组织就是按照一定的方式和规则对数\n据进行归并、存储、处理的过程。数据组\n织的好坏，直接影响到GIS 的性能。\n\n### 第 15 页\n\n![page 15](003-GIS-空间数据-知识点回顾/page_015.jpg)\n\n> *此页无文字*\n\n### 第 16 页\n\n![page 16](003-GIS-空间数据-知识点回顾/page_016.jpg)\n\nDH JX1\n\n### 第 17 页\n\n![page 17](003-GIS-空间数据-知识点回顾/page_017.jpg)\n\n★ TSGTSG DH\n\n### 第 18 页\n\n![page 18](003-GIS-空间数据-知识点回顾/page_018.jpg)\n\n》空间数据采集是指将现有的地图、外业观\n测成果、航空相片、遥感图像、文本资料\n等转成计算机可以识别处理的数字形式\n>数据采集可分为属性数据采集和图形数据\n采集。\n>数据组织就是按照一定的方式和规则对数\n据进行归并、存储、处理的过程。数据组\n织的好坏，直接影响到GIS 的性能。\n\n### 第 19 页\n\n![page 19](003-GIS-空间数据-知识点回顾/page_019.jpg)\n\n>GIS中主要有矢量、栅格、点云和地理数据\n库（geodatabase）四种数据组织方式。\n矢量数据组织包括点、线、面数据以及拓扑关系\n的组织。\n栅格数据组织用于管理影像图片等不同格式的栅\n格数据。\nArcGIS也可以加载和处理摄影测量或激光雷达\n获得的点云数据\n地理数据库是ArcGIS数据模型发展的第三代产物，\n它是面向对象的数据模型，能够表示要素的自然\n行为和要素之间的关系。\n\n### 第 20 页\n\n![page 20](003-GIS-空间数据-知识点回顾/page_020.jpg)\n\n地理空间数据的基本结构\n地理空间对象：GIS处理的客体，是现实世界中客观存在的\n实体或现象\n空间对象可抽象为点、线、面、体等多种数据类型及其组合\n线一维 点零维\n空间对象\n面二维 体三维 时间四维\n\n### 第 21 页\n\n![page 21](003-GIS-空间数据-知识点回顾/page_021.jpg)\n\n地理空间数据的基本结构\n地理空间实体\n地理空间实体是对复杂地理事物和现象进行简化抽象\n得到的结果，简称空间实体，它们的一个典型特征是\n与一定的地理空间位置有关，都具有一定的几何形态\n分布状况以及彼此之间的相互关系\n地理空间实体包括点、线、面和体等多种类型，是地\n理信息系统（GIS）中用于表示现实世界中地理现象的\n基本单位。\n\n### 第 22 页\n\n![page 22](003-GIS-空间数据-知识点回顾/page_022.jpg)\n\n地理空间数据的基本结构\n在GIS中，地理数据是表示地理位置，分布特点的自然现象和社\n会现象的诸要素文件。它包括自然地理数据和社会经济数据\n表示空间实体的位置、形状、\n地理空间数据\n大小及其分布特征的数据。\n地理\n数据\n表示空间实体的属性特征\n非地理空间数据\n是对地理空间数据的说明。\n地理空间数据的特征\n空间特征：空 空间物体的几何特征以及拓扑关系\n属性特征： 空间对象的属性信息\n时间特征：地理空间数据是动态的\n\n### 第 23 页\n\n![page 23](003-GIS-空间数据-知识点回顾/page_023.jpg)\n\n地理空间数据的基本结构\n地理空间数据分类\n根据数据来源，地理空间数据可分为以下四类：\n图形数据 图像数据 实体属性数据 统计数据\n数字化的 航空和航 空间实体的专 描述性\n数据 天数据 题信息数据 数据\n地理空间数据 非地理空间数据\n栅格结构\n矢量结构\n\n### 第 24 页\n\n![page 24](003-GIS-空间数据-知识点回顾/page_024.jpg)\n\n地理空间数据的基本结构\n图形数据的表达\n以单一的坐标来表示。\n(x1, y1)\n点\n（“代码\"，1，X1，y1)\n(x2, y2) 以多个坐标来表示。\n线 （“代码\"，3，X1，y1，X2，y2\n(x3, y3)\n(x1, y1) X3, y3)\n(x2, y2) 以多个坐标来表示，且最后一个\n(x3, y3) 坐标必须与第一个坐标重合。\n面\n（\"代码\"，4，X1，y1，X2，y2\n(x1, y1) (x4, y4)\nX3, y3， X4, y4, X1， y1)\n\n### 第 25 页\n\n![page 25](003-GIS-空间数据-知识点回顾/page_025.jpg)\n\n地理空间数据的基本结构\n图形数据的组织\n点 线 面 属性表\nPt.ID X Ln.ID Pt.1 Pt.2 Pol.ID Ln.ID Pol.ID Attrib.\n12345 24.5 27.4 36 73839 14628 328101 4441515 3835292842 1415167718 104.224.8 24.1 100.127.8 22.5 105.730.1 29.9 102.714.2 30.1 106.1\n... ... ... ... ... .*. ... ... ...\n\n### 第 26 页\n\n![page 26](003-GIS-空间数据-知识点回顾/page_026.jpg)\n\n地理空间数据的基本结构\n图形数据的拓扑结构\n邻接 相交 相离 包含 重合\n点一点\n点一线\n点一面\n线一线\n线一面\n面一面\n\n### 第 27 页\n\n![page 27](003-GIS-空间数据-知识点回顾/page_027.jpg)\n\n地理空间数据的基本结构\n图像数据的特征\n图像数据的最小单元为像元或像素，像元或像素的数值\n可用于描述客观世界中存在的现象。\n图像数据的实质是像元的阵列，每个像元由行列号确定\n其位置，且具有实体属性的编码值。\n图像数据是地表一定面积内数据的近似、离散化的标识\n图像数据的表现 图像数据的存储结构\n\n### 第 28 页\n\n![page 28](003-GIS-空间数据-知识点回顾/page_028.jpg)\n\n地理空间数据的基本结构\n图像数据的表达\n\n### 第 29 页\n\n![page 29](003-GIS-空间数据-知识点回顾/page_029.jpg)\n\n地理空间数据的基本结构\n图像数据的表达\n点：表示单个像元\n值\n线：在一定方向上链\n接成串的相邻像元的\n集合\n面：聚集在一起的\n相邻像元的集合\n层：表示一种地理属性或同一属性的不同特征\n\n### 第 30 页\n\n![page 30](003-GIS-空间数据-知识点回顾/page_030.jpg)\n\n地理空间数据的基本结构\n图像数据的特征 分辨率\n像元大小决定了影像数据所表达对象的详细程度，像元\n一般是用相同宽度和高度的方格表示。一个面对象可以\n采用不同像元大小的像素数据表示，像元越小，则表达\n越为精细，占用存储空间越大\n像元（像素）\n高度\n宽度\n\n### 第 31 页\n\n![page 31](003-GIS-空间数据-知识点回顾/page_031.jpg)\n\n地理空间数据的基本结构\n图像数据的特征 分辨率\n像素所代表地面范围的大小，或地面物体能分辨的最小单元\n高空间分辨率 低空间分辨率\n地物A 地物B\n距离d1<分辨率\n实际地物情况 不可分辨出两个地物 遥感图像上显示\n地物C 地物D\n距离d2>分辨率\n实际地物情况 可以分辨出两个地物\n遥感图像上显示\n\n### 第 32 页\n\n![page 32](003-GIS-空间数据-知识点回顾/page_032.jpg)\n\n第一节\n矢量数据组织\n\n### 第 33 页\n\n![page 33](003-GIS-空间数据-知识点回顾/page_033.jpg)\n\n矢量数据结构概述\n》矢量数据是指通过记录实体坐标及其关系，尽可\n能精确地表示点、线、面 只能存\n在一个值。\n\n### 第 47 页\n\n![page 47](003-GIS-空间数据-知识点回顾/page_047.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n栅格数据结构的显著特点：属性明显，定位隐含，\n即数据直接记录属性的指针或属性本身，而所在\n位置则根据行列号转换为相应的坐标给出，也就\n是说定位是根据数据在数据集中的位置得到的。\n>栅格数据的优缺点：\n口优点：数据结构简单、数学模拟方便\n口缺点：数据量大、难以建立实体间的拓扑关系、\n通过改变分辨率而减少数据量时精度和信息量\n同时受损等。\n\n### 第 48 页\n\n![page 48](003-GIS-空间数据-知识点回顾/page_048.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n》完全栅格数据结构（也称编码）将栅格看作\n一个数据矩阵，逐行逐个记录栅格单元的值。\n》这是最简单最直接的一种栅格编码方法。通\n常这种编码为栅格文件或格网文件，它不采\n用任何压缩数据的处理。\n\n### 第 49 页\n\n![page 49](003-GIS-空间数据-知识点回顾/page_049.jpg)\n\n二、栅格数据组织\n创建栅格数据\n位置：通常由一对有序的行列\n3 3 坐标(X，Y)表示\n属性：保存各种类型的数据值，\n3 3 1 14 3 3 1 1 1 如整数、实数、编码和日期等。\n3 3 2 2 14 2 2 2 》某一区域的单元格具有同一属\n性。\n\n### 第 50 页\n\n![page 50](003-GIS-空间数据-知识点回顾/page_050.jpg)\n\n二、栅格数据组织\n栅格数据结构\nRed-green-bluecompositeAttributevalues 255\nrangefrom0 to255\nineachbandBand1 Band2\nBand3\n\n### 第 51 页\n\n![page 51](003-GIS-空间数据-知识点回顾/page_051.jpg)\n\n矢量数据VS.栅格数据\n优点 缺点\n>数据结构严密，余度小，数据量小; 数据结构处理算法复杂\n空间拓扑关系清晰，易于网络分析； 叠置分析与栅格图组合比较难；\n矢量数据\n面向对象目标的，不仅能表达属性编码 >数学模拟比较困难；\n而且能方便地记录每个自标的具体的 空间分析技术上比较复杂，需要更复\n属性描述信息； 杂的软、硬件条件；\n能实现图形数据的恢复、更新和综合； >显示与绘图成本比较高。\n>图形显示质量好、精度高。\n数据结构简单，易于算法实现； 图形数据量大，用大像元减小数据量\n栅格数据\n空间数据的叠置和组合容易，有利于与 时，精度和信息量受损失；\n遥感数据的匹配应用和分析； >难以建立空间网络连接关系；\n易执行各类空间分析，地理现象模拟； >投影变化实现困难；\n>输出方法快速建议，成本低廉。 图形数据质量低，地图输出不精美。\n\n### 第 52 页\n\n![page 52](003-GIS-空间数据-知识点回顾/page_052.jpg)\n\n第三节\n创建地理数据库\n\n### 第 53 页\n\n![page 53](003-GIS-空间数据-知识点回顾/page_053.jpg)\n\n三、创建地理数据库\n3.1数据库基础 数据组织方式\n数据是信息的具体表达形式。为了表达更有意\n义的信息内容，数据必须按一定的方式进行组\n织和存储。\n数据的 数据库\n组织\n文件\n数据项\n记录\n\n### 第 54 页\n\n![page 54](003-GIS-空间数据-知识点回顾/page_054.jpg)\n\n三、创建地理数据库\n3.1数据库基础 数据项\n》数据项：定义数据的最小单位，是数据记录中\n最基本的、不可分的数据单元\n》域：数据项的取值范围，可以是数值（整数、\n小数）、字符、日期等。\n域：{男、女}\n姓名 学号 姓别 学院 专业\n数据项 张三 20200023 男 生态与环境学院 环境科学\n李四 20210123 女 外语学院 英国文学\n\n### 第 55 页\n\n![page 55](003-GIS-空间数据-知识点回顾/page_055.jpg)\n\n三、创建地理数据库\n3.1数据库基础 一记录\n>记录（record）：由若干相关联的数据项组成，\n是关于一个实体的数据总和。\n·字段：同类型 ·值：记录反映 ·标识符：标识每\n记录的框架。 实体的内容。 个记录的数据项。\n标识符/关键字\n姓名 学号 姓别 学院 专业 字段\n张三 20200023 男 生态与环境学院 环境科学\ # 第 77 页\n\n![page 77](003-GIS-空间数据-知识点回顾/page_077.jpg)\n\n数据采集就是运用各种技术手段，通过各种渠道收\n集数据的过程。服务于地理信息系统的数据采集工\n作包括两方面内容：空间数据的采集和属性数据的\n采集。\n空间数据采集方法：野外数据采集、现有地图数字\n化、摄影测量方法、遥感图像处理方法等。\n属性数据采集方法：相关部门的观测、测量数据、\n各类统计数据、专题调查数据、文献资料数据等渠\n道获取。\n遥感图像解译也是获取属性数据的重要渠道\n\n### 第 78 页\n\n![page 78](003-GIS-空间数据-知识点回顾/page_078.jpg)\n\n4.1手动数字化\n>根据卫星影像/电子地图，全手动绘制点、\n线、面要素。\n>一般流程如下：\n①在ArcMap中新建一个空白地图文档\n(.Mxd) ;\n②加载卫星影像数据；\n③创建一个新的与卫星影像坐标系相同的要素\n类（点、线、面要素）；\n④开始编辑要素类...··\n\n### 第 79 页\n\n![page 79](003-GIS-空间数据-知识点回顾/page_079.jpg)\n\n4.1手动数字化\n在地理数据库中创建\n>在文件夹中创建\n\n### 第 80 页\n\n![page 80](003-GIS-空间数据-知识点回顾/page_080.jpg)\n\n4.1.1 创建要素\nCatalog Folder\n一+ File GeodatabaseLocation: GIS_Example Personal Geodatabase\n田 ArcGIS_3rdDesktop Database Connection...\n+ document ArcGiSServer Connection..\n+ download 百 CopyGISExampl Layer...\nExampl le_DB. 启 Paste Group Layer\n+ Exampl DB. Delete PythonToolbox\n+ GIS_map\n+ NoteExpress Rename Shapefile...\n+ Notes urnFeatureClass...\n+ Id Refresh\n+ Report Toolbox\n+ source_code New dBASE Table\n+ SubjectSystemVolume LAS Dataset\n+ ItemDescription...\n+ 给排水设计手册 AddressLocator...\nProperties... Composite Address Locator...\nXMLDocument\n\n### 第 81 页\n\n![page 81](003-GIS-空间数据-知识点回顾/page_081.jpg)\n\n4.1.1创建要素\nType here to search @\nName: dom_area Favorites\n田 Geographic Coordinate SystemsFeature Type: Polygon 田 ProjectedCoordinate SystemsPointSpatial Reference PolvlinePolygon CatalogDescription: MultiPoint\n个 七价\nName:GCS_WGS_1984 Current coordinate system: GCS_WGS_1984\nWKID:4326Authority:EPSG Location: GIS_ExampleAngularUnit:Degree(0.01745: PrimeMeridian:Greenwich(0.0) FolderConnectionsSpheroid:WGS_1984 SemmajorAxis:6378137.0 E:\\\nSemminorAxis:6356752.314 田 $RECYCLE.BINInverseFlattening:298.2572 田 ArcGIS_3rd\n田 DesktopdocumentShowDetails Edit... download\n日 GIS_ExampleCoordinates wilcontain Mvalues.Used to storeroute data. Example_DB.gdbCoordinates will containZvalues.Used to store 3D data. ExampleDB.mdbdom_area.shpOK Cancel Line.shp\n田 GI 可以加载和处理摄影测量或激光雷达\n获得的点云数据\n地理数据库是ArcGIS数据模型发展的第三代产物，\n它是面向对象的数据模型，能够表示要素的自然\n行为和要素之间的关系。\n\n### 第 20 页\n\n![page 20](004-空间数据-知识点回顾/page_020.jpg)\n\n地理空间数据的基本结构\n地理空间对象：GIS处理的客体，是现实世界中客观存在的\n实体或现象\n空间对象可抽象为点、线、面、体等多种数据类型及其组合\n线一维 点零维\n空间对象\n面二维 体三维 时间四维\n\n### 第 21 页\n\n![page 21](004-空间数据-知识点回顾/page_021.jpg)\n\n地理空间数据的基本结构\n地理空间实体\n地理空间实体是对复杂地理事物和现象进行简化抽象\n得到的结果，简称空间实体，它们的一个典型特征是\n与一定的地理空间位置有关，都具有一定的几何形态\n分布状况以及彼此之间的相互关系\n地理空间实体包括点、线、面和体等多种类型，是地\n理信息系统（GIS）中用于表示现实世界中地理现象的\n基本单位。\n\n### 第 22 页\n\n![page 22](004-空间数据-知识点回顾/page_022.jpg)\n\n地理空间数据的基本结构\n在GIS中，地理数据是表示地理位置，分布特点的自然现象和社\n会现象的诸要素文件。它包括自然地理数据和社会经济数据\n表示空间实体的位置、形状、\n地理空间数据\n大小及其分布特征的数据。\n地理\n数据\n表示空间实体的属性特征\n非地理空间数据\n是对地理空间数据的说明。\n地理空间数据的特征\n空间特征：空 空间物体的几何特征以及拓扑关系\n属性特征： 空间对象的属性信息\n时间特征：地理空间数据是动态的\n\n### 第 23 页\n\n![page 23](004-空间数据-知识点回顾/page_023.jpg)\n\n地理空间数据的基本结构\n地理空间数据分类\n根据数据来源，地理空间数据可分为以下四类：\n图形数据 图像数据 实体属性数据 统计数据\n数字化的 航空和航 空间实体的专 描述性\n数据 天数据 题信息数据 数据\n地理空间数据 非地理空间数据\n栅格结构\n矢量结构\n\n### 第 24 页\n\n![page 24](004-空间数据-知识点回顾/page_024.jpg)\n\n地理空间数据的基本结构\n图形数据的表达\n以单一的坐标来表示。\n(x1, y1)\n点\n（“代码\"，1，X1，y1)\n(x2, y2) 以多个坐标来表示。\n线 （“代码\"，3，X1，y1，X2，y2\n(x3, y3)\n(x1, y1) X3, y3)\n(x2, y2) 以多个坐标来表示，且最后一个\n(x3, y3) 坐标必须与第一个坐标重合。\n面\n（\"代码\"，4，X1，y1，X2，y2\n(x1, y1) (x4, y4)\nX3, y3， X4, y4, X1， y1)\n\n### 第 25 页\n\n![page 25](004-空间数据-知识点回顾/page_025.jpg)\n\n地理空间数据的基本结构\n图形数据的组织\n点 线 面 属性表\nPt.ID X Ln.ID Pt.1 Pt.2 Pol.ID Ln.ID Pol.ID Attrib.\n12345 24.5 27.4 36 73839 14628 328101 4441515 3835292842 1415167718 104.224.8 24.1 100.127.8 22.5 105.730.1 29.9 102.714.2 30.1 106.1\n... ... ... ... ... .*. ... ... ...\n\n### 第 26 页\n\n![page 26](004-空间数据-知识点回顾/page_026.jpg)\n\n地理空间数据的基本结构\n图形数据的拓扑结构\n邻接 相交 相离 包含 重合\n点一点\n点一线\n点一面\n线一线\n线一面\n面一面\n\n### 第 27 页\n\n![page 27](004-空间数据-知识点回顾/page_027.jpg)\n\n地理空间数据的基本结构\n图像数据的特征\n图像数据的最小单元为像元或像素，像元或像素的数值\n可用于描述客观世界中存在的现象。\n图像数据的实质是像元的阵列，每个像元由行列号确定\n其位置，且具有实体属性的编码值。\n图像数据是地表一定面积内数据的近似、离散化的标识\n图像数据的表现 图像数据的存储结构\n\n### 第 28 页\n\n![page 28](004-空间数据-知识点回顾/page_028.jpg)\n\n地理空间数 于个人或小规模工作组；\n》仅适用于Windows，不可跨平台\n\n### 第 43 页\n\n![page 43](004-空间数据-知识点回顾/page_043.jpg)\n\n一、矢量数据组织\n文件地理数据库（FileGeodatabase）\n》一文件夹的形式保存各类型的GIS数据；\n>每个数据集在磁盘上都是一个单独的文件夹;\n适用于个人或小规模工作组；\n每个数据集上限1TB，超大型影像数据集可提升\n至256TB；\n》跨平台，Windows、Linux。\n\n### 第 44 页\n\n![page 44](004-空间数据-知识点回顾/page_044.jpg)\n\n一、矢量数据组织\nSDE地理数据库（ArcSDEgeodatabase）\n》存储为商业的RDBMS（Oracle、SQLServer、\nMySQL）;\n》适用于多人或大型工作组（企业）；\n支持多用户同时编辑文件；\n需要RDBMS证书和ArcSED技术支撑；\n跨平台，Windows、Linux。\n\n### 第 45 页\n\n![page 45](004-空间数据-知识点回顾/page_045.jpg)\n\n知识点回顾\n地理空间数据可分为哪几类？\n根据数据来源，地理空间数据可分为以下四类：\n图形数据 图像数据 实体属性数据 统计数据\n数字化的 航空和航 空间实体的专 描述性\n数据 天数据 题信息数据 数据\n地理空间数据 非地理空间数据\n表示空间实体的位置、形状、 表示空间实体的属性特征\n大小及其分布特征的数据。 是对地理空间数据的说明\n\n### 第 46 页\n\n![page 46](004-空间数据-知识点回顾/page_046.jpg)\n\n知识点回顾\n什么是矢量数据？\n》矢量数据是指通过记录实体坐标及其关\n系，尽可能精确地表示点、线、面等地\n理实体的空间位置和形状，坐标空间为\n连续空间，允许任意位置、长度和面积\n的精确定义。\n\n### 第 47 页\n\n![page 47](004-空间数据-知识点回顾/page_047.jpg)\n\n知识点回顾\n地理数据库有哪些类别？\n个人数据库 (Personal Geodatabase)\n文件地理数据库 （File Geodatabase）\nSDE地理数据库（ArcSDEgeodatabase）\n\n### 第 48 页\n\n![page 48](004-空间数据-知识点回顾/page_048.jpg)\n\n第二节\n栅格数据组织\n\n### 第 49 页\n\n![page 49](004-空间数据-知识点回顾/page_049.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n以规则栅格阵列表示空间对象的\n数据结构称为栅格数据结构。阵\n列中每个栅格单元上的数值表示\n空间对象的属性特征。即栅格阵\n列中每个单元的行列号确定位置\n属性值表示空间对象的类型、等\n级等特征。每个栅格单元只能存\n在一个值。\n\n### 第 50 页\n\n![page 50](004-空间数据-知识点回顾/page_050.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n栅格数据结构的显著特点：属性明显，定位隐含，\n即数据直接记录属性的指针或属性本身，而所在\n位置则根据行列号转换为相应的坐标给出，也就\n是说定位是根据数据在数据集中的位置得到的。\n>栅格数据的优缺点：\n口优点：数据结构简单、数学模拟方便\n口缺点：数据量大、难以建立实体间的拓扑关系、\n通过改变分辨率而减少数据量时精度和信息量\n同时受损等。\n\n### 第 51 页\n\n![page 51](004-空间数据-知识点回顾/page_051.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n》完全栅格数据结构（也称编码）将栅格看作\n一个数据矩阵，逐行逐个记录栅格单元的值。\n》这是最简单最直接的一种栅格编码方法。通\n常这种编码为栅格文件或格网文件，它不采\n用任何压缩数据的处理。\n\n### 第 52 页\n\n![page 52](004-空间数据-知识点回顾/page_052.jpg)\n\n二、栅格数据组织\n创建栅格数据\n位置：通常由一对有序的行列\n3 3 坐标(X，Y)表示\n属性：保存各种类型的数据值，\n3 3 1 14 3 3 1 1 1 如整数、实数、编码和日期等。\n3 3 2 2 14 2 2 2 》某一区域的单元格具有同一属\n性。\n\n### 第 53 页\n\n![page 53](004-空间数据-知识点回顾/page_053.jpg)\n\n二、栅格数据组织\n栅格数据结构\nRed 答高频）\n\n| 方法 | 说明 |\n|------|------|\n| **野外采集** | GPS测量、全站仪等 |\n| **地图数字化** | 手扶跟踪数字化、扫描矢量化 |\n| **摄影测量** | 航空摄影、数字摄影测量 |\n| **遥感处理** | 卫星遥感影像解译与分类 |\n\n### 1.3 地理空间数据 vs 非地理空间数据\n\n| 概念 | 定义 | 关键词 |\n|------|------|--------|\n| **地理空间数据** | 表示空间实体的**位置、形状、大小**及其分布特征的数据 | 位置+形状+分布 |\n| **非地理空间数据（属性数据）** | 表示空间实体的**属性特征**，是对地理空间数据的说明 | 属性+说明 |\n\n### 1.4 地理空间数据三大特征（必考简答）\n\n| 特征 | 说明 | 考试要点 |\n|------|------|----------|\n| **空间特征** | 空间物体的几何特征以及拓扑关系 | GIS区别于其他系统的根本标志 |\n| **属性特征** | 空间对象的属性信息（类型/等级/数量） | 定性+定量 |\n| **时间特征** | 地理空间数据是动态的 | 现势性 |\n\n### 1.5 地理空间数据分类\n\n| 类型 | 说明 |\n|------|------|\n| **图形数据** | 数字化的数据 |\n| **图像数据** | 航空和航天数据 |\n| **实体属性数据** | 空间实体的专题信息数据 |\n| **统计数据** | 描述性数据 |\n\n### 1.6 GIS四种数据组织方式\n\n| 方式 | 核心特征 |\n|------|----------|\n| **矢量数据** | 点、线、面及拓扑关系 |\n| **栅格数据** | 影像图片等规则栅格阵列 |\n| **点云数据** | 摄影测量或激光雷达获得 |\n| **Geodatabase** | ArcGIS第三代数据模型，面向对象 |\n\n---\n\n## 二、地理空间数据的基本结构\n\n### 2.1 空间对象抽象\n\n| 维度 | 类型 | 说明 |\n|------|------|------|\n| **零维** | 点 | 有位置无长度面积 |\n| **一维** | 线 | 有长度无面积 |\n| **二维** | 面 | 有面积有周长 |\n| **三维** | 体 | 有体积 |\n| **四维** | 时间 | 时空动态 |\n\n![空间对象抽象](../003-GIS-空间数据-知识点回顾/page_020.jpg)\n\n### 2.2 图形数据的表达\n\n| 类型 | 坐标表达 | 说明 |\n|------|----------|------|\n| **点** | 单一坐标 (x1, y1) | 空间位置 |\n| **线** | 多个坐标序列 | 连接路径 |\n| **面** | 多个坐标，首尾坐标重合 | 闭合区域 |\n\n### 2.3 图形数据的拓扑结构（必考名词解释）\n\n> **拓扑关系**：空间实体间的相邻、关联、包含关系。不随地图投影和比例尺变化而改变，是空间分析的基础。\n\n**六类拓扑关系**：点-点、点-线、点-面、线-线、线-面、面-面\n\n**五种基本类型**：邻接、相交、相离、包含、重合\n\n![拓扑关系](../003-GIS-空间数据-知识点回顾/page_026.jpg)\n\n### 2.4 图像（栅格）数据的特征\n\n- 最小单元为**像元/像素**\n- 像元由行列号确定位置，具有实体属性的编码值\n- **分辨率**：像元大小决定表达精细程度，像元越小越精细，存储空间越大\n- 每个栅格单元**只能存在一个值**\n\n![栅格分辨率](../003-GIS-空间数据-知识点回顾/page_031.jpg)\n\n---\n\n## 三、矢量数据组织\n\n### 3.1 矢量数据结构概述\n\n> 通过记录实体坐标及其关系，尽可能精确地表示点、线、面等地理实体的空间位置和形状\n> 坐标空间为**连续空间**，允许任意位置、长度和面积的精确定义\n\n**三大特点**：①数据量少 ②数据精确 ③图形精美\n\n### 3.2 基于文件系统的矢量数据 — Shapefile\n\n> Shapefile是GIS软件界的开放标准，非拓扑简单格式\n> **由多个文件组成，前缀必须相同，各文件必须在同一目录下**\n\n| 文件后缀 | 功能 | 必需 |\n|----------|------|------|\n| **.shp** | 存储要素几何的主文件 | ✅ |\n| **.shx** | 存储要素几何索引的索引文件 | ✅ |\n| **.dbf** | 存储要素属性信息的dBASE表 | ✅ |\n| **.sbn/.sbx** | 存储要素空间索引 | ❌ |\n| **.prj** | 存储坐标系信息 | ❌ |\n| **.xml** | 元数据 | ❌ |\n\n> ⚡ 考试要点：Shapefile至少由**.shp + .shx + .dbf**三个文件组成\n\n![Shapefile文件组成](../003-GIS-空间数据-知识点回顾/page_037.jpg)\n\n### 3.3 基于地理数据库的矢量数据 — Geodatabase\n\n> ArcGIS第三代数据模型，面向对象，能表示要素的自然行为和要素之间的关系\n\n| 类型 | 存储 | 大小限制 | 适用场景 | 跨平台 |\n|------|------|----------|----------|--------|\n| **个人Geodatabase** | Microsoft Access (.mdb) | ≤2GB | 个人/小工作组 | 仅Windows |\n| **文件Geodatabase** | 文件夹形式 (.gdb) | 单数据集≤1TB（影像可256TB） | 个人/小工作组 | Win+Linux |\n| **SDE Geodatabase** | 商业RDBMS（Oracle/SQL Server） | 无限 | 多人/大型企业 | Win+Linux |\n\n**Geodatabase三级结构**：要素类(Feature Class) → 要素数据集(Feature Dataset) → Geodatabase\n\n---\n\n## 四、栅格数据组织\n\n### 4.1 栅格数据结构概述\n\n> 以规则栅格阵列表示空间对象的数据结构\n> 阵列中每个栅格单元的数值表示空间对象的属性特征\n> 每个栅格单元**只能存在一个值**\n\n**显著特点**：**属性明显，定位隐含**\n- 数据直接记录属性的指针或属性本身\n- 所在位置根据行列号转换为相应的坐标给出\n\n### 4.2 栅格数据优缺点\n\n| | 内容 |\n|------|------|\n| **优点** | 数据结构简单、数学模拟方便、空间叠置组合容易、与遥感数据匹配、易执行空间分析 |\n| **缺点** | 数据量大、难以建立拓扑关系、降低分辨率时精度和信息量同时受损、图形质量低 |\n\n### 4.3 栅格数据编码方法（必考简答）\n\n| 编码方法 | 特点 | 适用场景 |\n|----------|------|----------|\n| **直接栅格编码** | 最简单最直接，逐行逐列记录像元值 | 通用 |\n| **游程编码（RLE）** | 记录属性值+连续个数 | 大片同值区域 |\n| **四叉树编码** | 递归四等分，同值区合并 | 层次性数据 |\n| **链码（Freeman码）** | 用方向码记录边界 | 线状要素 |\n\n> ⚡ 游程编码压缩效果取决于数据的均匀程度；四叉树适合具有区域一致性的数据\n\n---\n\n## 五、矢量 vs 栅格 对比（必考·简答）\n\n| 对比项 | 矢量数据 | 栅格数据 |\n|--------|----------|----------|\n| **数据结构** | 严密，冗余小，数据量小 | 简单，易算法实现 |\n| **数据量** | 小 | 大 |\n| **拓扑关系** | 清晰，易于网络分析 | 难以建立网络连接关系 |\n| **叠置分析** | 比较难 | 容易，有利于与遥感匹配 |\n| **数学模拟** | 比较困难 | 容易，地理现象模拟 |\n| **图形质量** | 精美，精度高 | 粗糙，有锯齿 |\n| **存储空间** | 小 | 大 |\n| **适宜对象** | 离散对象 | 连续场数据 |\n\n![矢量vs栅格](../003-GIS-空间数据-知识点回顾/page_051.jpg)\n\n> 答题技巧：从数据结构、数据量、拓扑、叠置、模拟、图形、存储、适宜对象8个维度对比\n\n---\n\n## 六、空间数据库\n\n### 6.1 数据库基础概念\n\n| 概念 | 定义 |\n|------|------|\n| **数据项** | 定义数据的最小单位，最基本的、不可分的数据单元 |\n| **域** | 数据项的取值范围（数值、字符、日期等） |\n| **记录** | 由若干相关联的数据项组成，关于一个实体的数据总和 |\n| **关键字** | 标识每个记录的数据项 |\n\n### 6.2 四种数据模型\n\n| 模型 | 特点 | 代表 |\n|------|------|------|\n| **层次模型** | 树状结构，一对多 | 早期GIS |\n| **网络模型** | 图状结构，多对多 | 早期GIS |\n| **关系模型** | 二维表，最广泛使用 | Shapefile(.dbf) |\n| **面向对象模型** | 封装+继承+多态 | Geodatabase |\n\n### 6.3 关系数据库三类完整性\n\n1. **实体完整性**：主键非空原则\n2. **参照完整性**：不允许引用不存在的实体\n3. **用户自定义完整性**：具体应用所涉及数据必须满足的语义要求\n\n### 6.4 数据库范式\n\n| 范式 | 要求 |\n|------|------|\n| **1NF** | 每个属性必须是原子、不可分割的数据项 |\n| **2NF** | 在1NF基础上，每个非主属性完全函数依赖关键字 |\n| **3NF** | 在2NF基础上，消除传递函数依赖 |\n| **BCNF** | 每个决定因素都是候选关键字 |\n\n### 6.5 空间数据质量六要素（简答高频）\n\n| 质量要素 | 说明 |\n|----------|------|\n| **位置精度** | 空间位置的准确程度 |\n| **属性精度** | 属性值的准确程度 |\n| **逻辑一致性** | 数据间逻辑关系的正确性 |\n| **完整性** | 数据是否完整无遗漏 |\n| **时间精度** | 数据的时间现势性 |\n| **数据世系** | 数据来源和处理历史 |\n\n### 6.6 常见空间索引方法\n\n| 方法 | 说明 |\n|------|------|\n| **范围索引** | 记录每个空间实体的最大最小坐标 |\n| **格网索引** | 将区域划分为大小相等的网格，记录每个网格内空间实体的地址 |\n| **四叉树索引** | 递归四等分区域，用莫顿码记录实体位置 |\n\n---\n\n## 七、ArcGIS操作知识点回顾\n\n### 7.1 MXD文件操作\n\n- **更改数据框/层名称**：单击选定→再次单击进入编辑→输入新名称（不修改Windows文件名）\n- **调整数据层顺序原则**（必考）：\n  1. 按点、线、面要素类型依次**由上至下**排列\n  2. 按要素重要程度高低依次**由上至下**排列\n  3. 按要素线划细粗依次**由下至上**排列\n  4. 按要素色彩浓淡依次**由下至上**排列\n\n### 7.2 Geoprocessing环境设置\n\n> 环境设置会影响工具和命令的运行\n> 可在应用程序级别或运行工具时设置\n> 应用程序级别设置与地图文档一起保存\n\n---\n\n## 八、经典试题精选\n\n### 名词解释\n\n1. **空间数据**：描述空间实体的位置、形状、大小及分布特征的数据，具有空间特征、属性特征和时序特征三大基本特征。\n2. **拓扑关系**：空间实体间的相邻、关联、包含关系。不随地图投影和比例尺变化而改变，是空间分析的基础。\n3. **游程编码（RLE）**：一种栅格数据压缩方法，记录属性值及其连续出现的个数。适合大片同值区域的压缩。\n4. **四叉树编码**：递归四等分的层次性数据结构，同值区合并为一个节点，不同值区继续细分。\n5. **Geodatabase**：ESRI提出的面向对象的空间数据存储模型，三级结构：要素类→要素数据集→Geodatabase。\n6. **元数据**：描述数据的数据，说明数据的内容、质量、状况和其他有关特征的信息。\n7. **DEM**：通过有限地形高程数据实现对地面高程的数字化模拟。表达形式有规则格网（Grid）和不规则三角网（TIN）。\n8. **TIN**：由不规则分布的数据点按Delaunay三角准则自动连接形成的三角网络，能根据地形的起伏特征改变采样密度。\n\n### 简答题\n\n**Q1：简述矢量数据与栅格数据的区别（必考）**\n> 见第五节对比表。8个维度：数据结构、数据量、拓扑、叠置、模拟、图形、存储、适宜对象。\n\n**Q2：简述栅格数据编码方法**\n> ①直接栅格编码（最简单，逐行逐列记录）②游程编码RLE（属性值+连续个数）③四叉树编码（递归四等分，同值合并）④链码/Freeman码（方向码记录边界）\n\n**Q3：简述空间数据的三大基本特征**\n> ①空间特征（位置/形状/拓扑关系，GIS区别于其他系统的根本标志）②属性特征（性质/状态/类型/等级/数量）③时序特征（随时间变化的动态特征，现势性）\n\n**Q4：简述空间数据采集的主要方法**\n> ①野外采集（GPS/全站仪）②地图数字化（手扶跟踪/扫描矢量化）③摄影测量（航空摄影/数字摄影测量）④遥感处理（卫星遥感影像解译与分类）\n\n**Q5：简述空间数据质量的要素**\n> ①位置精度 ②属性精度 ③逻辑一致性 ④完整性 ⑤时间精度 ⑥数据世系\n\n---\n\n## 九、高频考点速记（考前必背）\n\n| # | 考点 | 关键词 |\n|---|------|--------|\n| 1 | **矢量数据特点** | 数据量少、精度高、图形精美、拓扑清晰 |\n| 2 | **栅格数据特点** | 属性明显定位隐含、数据结构简单、数据量大 |\n| 3 | **Shapefile组成** | .shp + .shx + .dbf（至少三个文件，前缀相同同目录） |\n| 4 | **Geodatabase三种类型** | 个人(.mdb≤2GB) / 文件(.gdb≤1TB) / SDE(RDBMS无限) |\n| 5 | **Geodatabase三级结构** | 要素类→要素数据集→Geodatabase |\n| 6 | **矢量vs栅格对比（必考）** | 拓扑/叠置/模拟/图形质量/存储/适宜对象 |\n| 7 | **拓扑关系六类** | 点-点、点-线、点-面、线-线、线-面、面-面 |\n| 8 | **拓扑五种基本类型** | 邻接、相交、相离、包含、重合 |\n| 9 | **栅格编码四种方法** | 直接编码/RLE/四叉树/链码 |\n| 10 | **栅格分辨率** | 像元越小越精细，存储空间越大 |\n| 11 | **数据层排列四原则** | 点线面由上至下、重要程度由上至下、线划粗细由下至上、色彩浓淡由下至上 |\n| 12 | **空间数据质量六要素** | 位置精度/属性精度/逻辑一致性/完整性/时间精度/数据世系 |\n| 13 | **栅格核心特征** | 属性明显、定位隐含、每格只能一个值 |\n| 14 | **数据模型四类** | 层次(树)→网络(图)→关系(表)→对象(Geodatabase) |\n| 15 | **数据库三类完整性** | 实体完整性/参照完整性/用户自定义完整性 |\n"}, {"id": "ch-02", "group": "章节素材", "title": "第02章 空间数据-知识点回顾", "md": "# 地理信息系统 · 第 2 章 · 空间数据-知识点回顾 · 素材\n\n> 教师: 黄源生 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 335\n> 主版: 第 4 节 · 169 页\n\n---\n\n## 主版课件 · 第 4 节\n\n> `004-空间数据-知识点回顾.pdf`\n\n<details><summary>展开 169 页图链<\/summary>\n\n- [p001](../004-空间数据-知识点回顾/page_001.jpg)  · 知识点回顾\n- [p002](../004-空间数据-知识点回顾/page_002.jpg)  · 知识点回顾\n- [p003](../004-空间数据-知识点回顾/page_003.jpg)  · 知识点回顾\n- [p004](../004-空间数据-知识点回顾/page_004.jpg)  · 知识点回顾\n- [p005](../004-空间数据-知识点回顾/page_005.jpg)  · 知识点回顾\n- [p006](../004-空间数据-知识点回顾/page_006.jpg)  · 知识点回顾\n- [p007](../004-空间数据-知识点回顾/page_007.jpg)  · 知识点回顾\n- [p008](../004-空间数据-知识点回顾/page_008.jpg)  · 知识点回顾\n- [p009](../004-空间数据-知识点回顾/page_009.jpg)  · 1.3Geoprocessing地理处理框架\n- [p010](../004-空间数据-知识点回顾/page_010.jpg)  · 1.3Geoprocessing地理处理框架\n- [p011](../004-空间数据-知识点回顾/page_011.jpg)  · 空间数据的采集与组织\n- [p012](../004-空间数据-知识点回顾/page_012.jpg)  · 本章内容\n- [p013](../004-空间数据-知识点回顾/page_013.jpg)  · 》空间数据采集是指将现有的 n行为和要素之间的关系。\n\n---\n\n**p020** ![](../004-空间数据-知识点回顾/page_020.jpg)\n\n地理空间数据的基本结构\n地理空间对象：GIS处理的客体，是现实世界中客观存在的\n实体或现象\n空间对象可抽象为点、线、面、体等多种数据类型及其组合\n线一维 点零维\n空间对象\n面二维 体三维 时间四维\n\n---\n\n**p021** ![](../004-空间数据-知识点回顾/page_021.jpg)\n\n地理空间数据的基本结构\n地理空间实体\n地理空间实体是对复杂地理事物和现象进行简化抽象\n得到的结果，简称空间实体，它们的一个典型特征是\n与一定的地理空间位置有关，都具有一定的几何形态\n分布状况以及彼此之间的相互关系\n地理空间实体包括点、线、面和体等多种类型，是地\n理信息系统（GIS）中用于表示现实世界中地理现象的\n基本单位。\n\n---\n\n**p022** ![](../004-空间数据-知识点回顾/page_022.jpg)\n\n地理空间数据的基本结构\n在GIS中，地理数据是表示地理位置，分布特点的自然现象和社\n会现象的诸要素文件。它包括自然地理数据和社会经济数据\n表示空间实体的位置、形状、\n地理空间数据\n大小及其分布特征的数据。\n地理\n数据\n表示空间实体的属性特征\n非地理空间数据\n是对地理空间数据的说明。\n地理空间数据的特征\n空间特征：空 空间物体的几何特征以及拓扑关系\n属性特征： 空间对象的属性信息\n时间特征：地理空间数据是动态的\n\n---\n\n**p023** ![](../004-空间数据-知识点回顾/page_023.jpg)\n\n地理空间数据的基本结构\n地理空间数据分类\n根据数据来源，地理空间数据可分为以下四类：\n图形数据 图像数据 实体属性数据 统计数据\n数字化的 航空和航 空间实体的专 描述性\n数据 天数据 题信息数据 数据\n地理空间数据 非地理空间数据\n栅格结构\n矢量结构\n\n---\n\n**p024** ![](../004-空间数据-知识点回顾/page_024.jpg)\n\n地理空间数据的基本结构\n图形数据的表达\n以单一的坐标来表示。\n(x1, y1)\n点\n（“代码\"，1，X1，y1)\n(x2, y2) 以多个坐标来表示。\n线 （“代码\"，3，X1，y1，X2，y2\n(x3, y3)\n(x1, y1) X3, y3)\n(x2, y2) 以多个坐标来表示，且最后一个\n(x3, y3) 坐标必须与第一个坐标重合。\n面\n（\"代码\"，4，X1，y1，X2，y2\n(x1, y1) (x4, y4)\nX3, y3， X4, y4, X1， y1)\n\n---\n\n**p025** ![](../004-空间数据-知识点回顾/page_025.jpg)\n\n地理空间数据的基本结构\n图形数据的组织\n点 线 面 属性表\nPt.ID X Ln.ID Pt.1 Pt.2 Pol.ID Ln.ID Pol.ID Attrib.\n12345 24.5 27.4 36 73839 14628 328101 4441515 3835292842 1415167718 104.224.8 24.1 100.127.8 22.5 105.730.1 29.9 102.714.2 30.1 106.1\n... ... ... ... ... .*. ... ... ...\n\n---\n\n**p026** ![](../004-空间数据-知识点回顾/page_026.jpg)\n\n地理空间数据的基本结构\n图形数据的拓扑结构\n邻接 相交 相离 包含 重合\n点一点\n点一线\n点一面\n线一线\n线一面\n面一面\n\n---\n\n**p027** ![](../004-空间数据-知识点回顾/page_027.jpg)\n\n地理空间数据的基本结构\n图像数据的特征\n图像数据的最小单元为像元或像素，像元或像素的数值\n可用于描述客观世界中存在的现象。\n图像数据的实质是像元的阵列，每个像元由行列号确定\n其位置，且具有实体属性的编码值。\n图像数据是地表一定面积内数据的近似、离散化的标识\n图像数据的表现 图像数据的存储结构\n\n---\n\n**p028** ![](../004-空间数据-知识点回顾/page_028.jpg)\n\n地理空间数据的基本结构\n图像数据的表达\n\n---\n\n**p029** ![](../004-空间数据-知识点回顾/page_029.jpg)\n\n地理空间数据的基本结构\n图像数据的表达\n点：表示单个像元\n值\n线：在一定方向上链\n接成串的相邻像元的\n集合\n面：聚集在一起的\n相邻像元的集合\n层：表示一种地理属性或同一属性的不同特征\n\n---\n\n**p030** ![](../004-空间数据-知识点回顾/page_030.jpg)\n\n地理空间数据的基本结构\n图像数据的特征 分辨率\n像元大小决定了影像数据所表达对象的详细程度，像元\n一般是用相同宽度和高度的方格表示。一个面对象可以\n采用不同像元大小的像素数据表示，像元越小，则表达\n越为精细，占用存储空间越大\n像元（像素）\n高度\n宽度\n\n---\n\n**p031** ![](../004-空间数据-知识点回顾/page_031.jpg)\n\n地理空间数据的基本结构\n图像数据的特征 分辨率\n像素所代表地面范围的大小，或地面物体能分辨的最小单元\n高空间分辨率 低空间分辨率\n地物A 地物B\n距离d1<分辨率\n实际地物情况 不可分辨出两个地物 遥感图像上显示\n地物C 地物D\n距离d2>分辨率\n实际地物情况 可以分辨出两个地物\n遥感图像上显示\n\n---\n\n**p032** ![](../004-空间数据-知识点回顾/page_032.jpg)\n\n第一节\n矢量数据组织\n\n---\n\n**p033** ![](../004-空间数据-知识点回顾/page_033.jpg)\n\n矢量数据结构概述\n》矢量数据是指通过记录实体坐标及其关系，尽可\n能精确地表示点、线、面等地理实体的空间位置\n和形状，坐标空间为连续空间，允许任意位置、\n长度和面积的精确定义。\nForesl0005S59561000 581000\n\n---\n\n**p034** ![](../004-空间数据-知识点回顾/page_034.jpg)\n\n一、矢量数据组织\n矢量数据具有数据量少、数据精确的特点；\nArcGIS中矢量数据组织：\n》基于文件系统的矢量数据组织；\n》基于地理数据库的数据组织\n\n---\n\n**p035** ![](../004-空间数据-知识点回顾/page_035.jpg)\n\n一、矢量数据组织\n矢量数据结构直接以几何空间坐标为基础，\n记录采样点坐标，通过这种数据组织方式，\n可以得到精美的地图：\n可以对复杂数据以最小的数据冗余进行存贮、\n数据精度高、存储空间小等特点，是一种高\n效的图形数据结构。\nArcGIS中矢量数据组织方式：\n》基于文件系统的矢量数据组织；\n》基于地理数据库的数据组织\n\n---\n\n**p036** ![](../004-空间数据-知识点回顾/page_036.jpg)\n\n一、矢量数据组织\n基于文件系统的矢量数据\n>Windows文件系统下的数据组织方式，\nArcGIS有Shapefile和Coverage两种格式。\n/Shapefile一GIS软件界的一个开放标准，易操\n作、规范性、可与其他数据转换一应用广泛。\n／Shapefile是一种用于存储地理要素的几何位置\n和属性信息的非拓扑简单格式。\n（可通过点、线、面来表示。 B\n／Shapefile通常由多个文件组成！！！\n\n---\n\n**p037** ![](../004-空间数据-知识点回顾/page_037.jpg)\n\n一、矢量数据组织\n基于文件系统的矢量数据\nrivernet.cpg waterstation.cpg Windows系统下\nrivernet.dbf waterstation.dbf\n的Shapefile文件\nrivernet.prj water_station.prjrivernet.sbn waterstation.shprivernet.sbx waterstation.shp.xml rivernet.shprivernet.shpwaterstation.shx Urumchi.shprivernet.shp.xmlXinjiang.cpgrivernet.shx waterstation.shpXinjiang.dbfUrumchi.cpgXinjiang.prj Xinjiang.shpUrumchi.dbfUrumchi.prj Xinjiang.sbnXinjiang.sbx ArcGIS软件下\nUrumchi.sbnUrumchi.sbx Xinjiang.shp\n的Shapefile文件\nUrumchi.shp Xinjiang.shp.xmlUrumchi.shx Xinjiang.shx\n\n---\n\n**p038** ![](../004-空间数据-知识点回顾/page_038.jpg)\n\n一、矢量数据组织\n基于文件系统的矢量数据\n》(1).shp：用于存储要素几何的主文件;\n(2).shx：用于存储要素几何索引的索引文件;\n(3).dbf：用于存储要素属性信息的dBASE表;\n(4).sbn和.sbx：用于存储要素空间索引的文件；\n(5).prj：用于存储坐标系信息的文件;\n》(6).xml：元数据，存储Shapefile的相关信息。\n/各文件共同组成Shapefile，其前缀必须相同\n并且各文件必须在同一目录下。\n\n---\n\n**p039** ![](../004-空间数据-知识点回顾/page_039.jpg)\n\n一、矢量数据组织\n··国\n省级行政区\nTeri_Indus Total_Col1 35 Urban_to_T Vocation 5230000 DZM NAMS 黑龙江 Heilongjiang NAMSSN35.9 124 18 1650000 新蓬 Sinkiang37.5 32.43 1640000 3140000 山园 宁夏 Ningxia Shanxi45.9 35.5 0540000 Tibet30.4 38 13410000 4370000 山东 河南 Shandong36.3 41.49 17 320000 Jiangsu Henan33.2 40.22 27.81 14420000 13340000 安徽 湖北 Anhui Hubei36.3 48.67 8330000 浙江 Zhejiang39.1 40.8 27.67 29. 13430000 4360000 江西 Jiangxi Hunan34.6 23.36 75 1 530000 云南 湖商 Yunnan40 41.57 23.87 4520000 350000 贵州 福注 Fujian Cuizhou37.2 28.15 5450000 8 广西 Guangxi39.3 40. 11 55 16440000 0460000 广东 海南 Guangdong Hainan34.2 49.68 4220000 吉林 Jilin45.5 39 54.24 9210000 3120000 辽宁 天津 Liaoning Tianjing42.1 35.6 18 34.76 1630000 青海 Qinghai24.01 32.26 2620000 3610000 甘肃 陕园 Shanxi Gansu35.3 1 42.68 4150000 内乘古 Inner Mongolia33.5 40.8 26.08 33.09 2500000 兰庆 周北 Chongqing909 88.31 11 6310000 130000 上海 Hebei Shanghai58.3 77.54 0710000 4110000 北京 台湾 Beijing Taiwanoo 0 0810000 香港 HongKong34 42 26.69 0 0820000 5510000 四川 澳门 Sichuan Macau\n(0out of 34 Selected)\n省级行政区\n\n---\n\n**p040** ![](../004-空间数据-知识点回顾/page_040.jpg)\n\n一、矢量数据组织\n基于文件系统的矢量数据 特点\n》总的数据量没有大小限制，单张表或者\n要素类的大小限制为1TB。\n>使用Windows资源管理器可以对数据进\n行管理。\n》在Windows资源管理器下文件太多，不\n容易管理。\n\n---\n\n**p041** ![](../004-空间数据-知识点回顾/page_041.jpg)\n\n一、矢量数据组织\n基于地理数据库的矢量数据\n地理数据库是一种面向对象的空间数据模型，\n它对地理空间特征的表达更接近我们对现实世\n界的认知。\nESRI公司研发的一种采用标准关系数据库的数\n据管理模式，是一个为ArcGIS所用的数据框架，\n该框架定义了ArcGIS中用到的所有的数据类型\n分为个人地理数据库、文件地理数据库和企业\n级地理数据库。\n\n---\n\n**p042** ![](../004-空间数据-知识点回顾/page_042.jpg)\n\n一、矢量数据组织\n个人数据库（PersonalGeodatabase）\nMicrosoftAccess数据库（.mdb）；\n数据文件不能超过2GB；\n》适用于个人或小规模工作组；\n》仅适用于Windows，不可跨平台\n\n---\n\n**p043** ![](../004-空间数据-知识点回顾/page_043.jpg)\n\n一、矢量数据组织\n文件地理数据库（FileGeodatabase）\n》一文件夹的形式保存各类型的GIS数据；\n>每个数据集在磁盘上都是一个单独的文件夹;\n适用于个人或小规模工作组；\n每个数据集上限1TB，超大型影像数据集可提升\n至256TB；\n》跨平台，Windows、Linux。\n\n---\n\n**p044** ![](../004-空间数据-知识点回顾/page_044.jpg)\n\n一、矢量数据组织\nSDE地理数据库（ArcSDEgeodatabase）\n》存储为商业的RDBMS（Oracle、SQLServer、\nMySQL）;\n》适用于多人或大型工作组（企业）；\n支持多用户同时编辑文件；\n需要RDBMS证书和ArcSED技术支撑；\n跨平台，Windows、Linux。\n\n---\n\n**p045** ![](../004-空间数据-知识点回顾/page_045.jpg)\n\n知识点回顾\n地理空间数据可分为哪几类？\n根据数据来源，地理空间数据可分为以下四类：\n图形数据 图像数据 实体属性数据 统计数据\n数字化的 航空和航 空间实体的专 描述性\n数据 天数据 题信息数据 数据\n地理空间数据 非地理空间数据\n表示空间实体的位置、形状、 表示空间实体的属性特征\n大小及其分布特征的数据。 是对地理空间数据的说明\n\n---\n\n**p046** ![](../004-空间数据-知识点回顾/page_046.jpg)\n\n知识点回顾\n什么是矢量数据？\n》矢量数据是指通过记录实体坐标及其关\n系，尽可能精确地表示点、线、面等地\n理实体的空间位置和形状，坐标空间为\n连续空间，允许任意位置、长度和面积\n的精确定义。\n\n---\n\n**p047** ![](../004-空间数据-知识点回顾/page_047.jpg)\n\n知识点回顾\n地理数据库有哪些类别？\n个人数据库 (Personal Geodatabase)\n文件地理数据库 （File Geodatabase）\nSDE地理数据库（ArcSDEgeodatabase）\n\n---\n\n**p048** ![](../004-空间数据-知识点回顾/page_048.jpg)\n\n第二节\n栅格数据组织\n\n---\n\n**p049** ![](../004-空间数据-知识点回顾/page_049.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n以规则栅格阵列表示空间对象的\n数据结构称为栅格数据结构。阵\n列中每个栅格单元上的数值表示\n空间对象的属性特征。即栅格阵\n列中每个单元的行列号确定位置\n属性值表示空间对象的类型、等\n级等特征。每个栅格单元只能存\n在一个值。\n\n---\n\n**p050** ![](../004-空间数据-知识点回顾/page_050.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n栅格数据结构的显著特点：属性明显，定位隐含，\n即数据直接记录属性的指针或属性本身，而所在\n位置则根据行列号转换为相应的坐标给出，也就\n是说定位是根据数据在数据集中的位置得到的。\n>栅格数据的优缺点：\n口优点：数据结构简单、数学模拟方便\n口缺点：数据量大、难以建立实体间的拓扑关系、\n通过改变分辨率而减少数据量时精度和信息量\n同时受损等。\n\n---\n\n**p051** ![](../004-空间数据-知识点回顾/page_051.jpg)\n\n二、栅格数据组织\n栅格数据结构概述\n》完全栅格数据结构（也称编码）将栅格看作\n一个数据矩阵，逐行逐个记录栅格单元的值。\n》这是最简单最直接的一种栅格编码方法。通\n常这种编码为栅格文件或格网文件，它不采\n用任何压缩数据的处理。\n\n---\n\n**p052** ![](../004-空间数据-知识点回顾/page_052.jpg)\n\n二、栅格数据组织\n创建栅格数据\n位置：通常由一对有序的行列\n3 3 坐标(X，Y)表示\n属性：保存各种类型的数据值，\n3 3 1 14 3 3 1 1 1 如整数、实数、编码和日期等。\n3 3 2 2 14 2 2 2 》某一区域的单元格具有同一属\n性。\n\n---\n\n**p053** ![](../004-空间数据-知识点回顾/page_053.jpg)\n\n二、栅格数据组织\n栅格数据结构\nRed-green-bluecompositeAttributevalues 255\nrangefrom0 to255\nineachbandBand1 Band2\nBand3\n\n---\n\n**p054** ![](../004-空间数据-知识点回顾/page_054.jpg)\n\n矢量数据VS.栅格数据\n优点 缺点\n数据结构严密，余度小，数据量小； >数据结构处理算法复杂\n矢量数据 空间拓扑关系清晰，易于网络分析； >叠置分析与栅格图组合比较难；\n面向对象目标的，不仅能表达属性编码 数学模拟比较困难；\n而且能方便地记录每个目标的具体的 >空间分析技术上比较复杂，需要更复\n属性描述信息； 杂的软、硬件条件;\n>能实现图形数据的恢复、更新和综合； 显示与绘图成本比较高。\n图形显示质量好、精度高。\n数据结构简单，易于算法实现； 图形数据量大，用大像元减小数据量\n栅格数据\n空间数据的叠置和组合容易，有利于与 时，精度和信息量受损失；\n遥感数据的匹配应用和分析； >难以建立空间网络连接关系；\n易执行各类空间分析，地理现象模拟 >投影变化实现困难；\n输出方法快速建议，成本低廉。 图形数据质量低，地图输出不精美。\n\n---\n\n**p055** ![](../004-空间数据-知识点回顾/page_055.jpg)\n\n第三节\n创建地理数据库\n\n---\n\n**p056** ![](../004-空间数据-知识点回顾/page_056.jpg)\n\n三、创建地理数据库\n3.1数据库基础 数据组织方式\n数据是信息的具体表达形式。为了表达更有意\n义的信息内容，数据必须按一定的方式进行组\n织和存储。\n数据的 数据库\n组织\n文件\n数据项\n记录\n\n---\n\n**p057** ![](../004-空间数据-知识点回顾/page_057.jpg)\n\n三、创建地理数据库\n3.1数据库基础 数据项\n》数据项：定义数据的最小单位，是数据记录中\n最基本的、不可分的数据单元\n》域：数据项的取值范围，可以是数值（整数、\n小数）、字符、日期等。\n域：{男、女}\n姓名 学号 姓别 学院 专业\n数据项 张三 20200023 男 生态与环境学院 环境科学\n李四 20210123 女 外语学院 英国文学\n\n---\n\n**p058** ![](../004-空间数据-知识点回顾/page_058.jpg)\n\n三、创建地理数据库\n3.1数据库基础 一记录\n>记录（record）：由若干相关联的数据项组成，\n是关于一个实体的数据总和。\n·字段：同类型 ·值：记录反映 ·标识符：标识每\n记录的框架。 实体的内容。 个记录的数据项。\n标识符/关键字\n姓名 学号 姓别 学院 专业 字段\n张三 20200023 男 生态与环境学院 环境科学\n记录 李四 女 外语学院 英国文学\n\n---\n\n**p059** ![](../004-空间数据-知识点回顾/page_059.jpg)\n\n三、创建地理数据库\n3.1数据库基础 文件\n>文件（file）：给定类型记录的全部具体值的集\n合，用文件名称标识。\n学生基本信息表\n姓名 学号 姓别 学院 专业\n具体\n张三 20200023 男女 生态与环境学院 环境科学\n值的\n李四 20210123 外语学院 英国文学\n集合\n文件存储\nJMD_M_500.dbf\n\n---\n\n**p060** ![](../004-空间数据-知识点回顾/page_060.jpg)\n\n三、创建地理数据库\n3.1数据库基础 数据组织方式：数据库\n>具有特定联系的数据集合体。\n》比文件更大的数据组织。\n》内部机构是文件的集合，这些文件具有某种直\n接的联系，不是孤立的。\n姓名 学号 表格（Table)\n张三 20232123\n数据\n数据库 视图（View)\n(data)\n数据\nQL 存储过程（Storedprocedure）\n触发器 (Trigger)\n\n---\n\n**p061** ![](../004-空间数据-知识点回顾/page_061.jpg)\n\n三、创建地理数据库\n3.1 数据库基础 数据组织方式：数据库\n序号 物品 单价 上月结余 本月领用 本月购入 购入金额 库存 盘点数 差异 备注\n1 笔 5 500 200 100 400 -4002 文件央 10 500 150 200 550 -5503 笔 5 500 200 100 400 -4004 文件夹 10 500 150 200 550 -5505 笔 5 500 200 100 400 -4006 文件央 10 500 150 200 550 -5507 笔 5 500 200 100 400 -4008 文件央 10 500 150 200 550 -5509 笔 5 500 200 100 400 -40010 文件夹 10 500 150 200 550 -55011
