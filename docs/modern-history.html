*：各阶级探索 → 均失败 → 旧路不通\n4. **辛亥革命意义与失败**：伟大巨变但未完成反帝反封建 → 资产阶级共和国方案行不通\n5. **五四运动**：新民主主义革命开端 → 马克思主义传播 → 党的成立\n6. **中国共产党成立**：开天辟地的大事变 → 革命面貌焕然一新\n7. **农村包围城市道路**：马克思主义中国化 → 遵义会议 → 长征\n8. **抗日战争**：国民党正面战场 + 共产党敌后战场 → 中流砥柱\n9. **解放战争**：三条道路/两种命运 → 没有共产党就没有新中国\n10. **社会主义改造**：一化三改 → 创造性转变 → 社会主义制度确立\n11. **改革开放**：十一届三中全会 → 伟大转折 → 中国特色社会主义\n12. **新时代**：十八大 → 中国梦 → 五位一体/四个全面 → 中国式现代化\n\n---\n\n## 终 · 道之教\n\n> *道恒无为，而无不为。*\n>\n> 此夹自为闭环：万事可于课夹内成；\n> 见疑则归章素材 → 归教材原文。\n> 慎终若始，则无败事矣。\n"}, {"id": "rr-329d7291", "group": "复习资料", "title": "最终复习资料", "md": "# 中国近现代史纲要 · 最终复习资料\n\n> 新疆大学 · 2026春 · 亚里坤·买买提亚尔 · 16班\n> 教材：高等教育出版社2023版 · 闭卷考试\n> 题型：单选 + 判断 + 辨析 + 简答 + 材料分析\n\n---\n\n## 上编综述：风云变幻的八十年 (1840-1919)\n\n### 核心概念\n\n- **近代中国社会性质**：半殖民地半封建社会\n- **两对主要矛盾**：帝国主义与中华民族的矛盾（最主要）；封建主义与人民大众的矛盾\n- **两大历史任务**：争取民族独立、人民解放；实现国家富强、人民富裕\n- **关系**：前一任务为后一任务扫清障碍、创造前提\n\n---\n\n## 第一章 进入近代后中华民族的磨难与抗争\n\n### 第一节 鸦片战争前的中国和世界\n\n- 中国封建社会特点：自给自足的自然经济占主导；专制主义中央集权；儒家思想为正统\n- 世界：资本主义快速发展 → 殖民扩张 → 需要市场和原料\n\n### 第二节 西方列强对中国的侵略\n\n**四种侵略方式**：\n\n1. **军事侵略**：发动战争 → 签订不平等条约\n   - 1840-1842 第一次鸦片战争 →《南京条约》（割香港岛、五口通商、协定关税、赔款2100万银元）\n   - 1856-1860 第二次鸦片战争 →《天津条约》《北京条约》（割九龙半岛、开放更多口岸）\n   - 1894-1895 甲午战争 →《马关条约》（割台湾及澎湖、赔款2亿两、允许在华设厂）\n   - 1900-1901 八国联军 →《辛丑条约》（赔款4.5亿两、设使馆区、严禁反帝）\n\n2. **政治控制**：领事裁判权（治外法权）；把持海关；勾结清政府镇压人民\n\n3. **经济掠夺**：勒索赔款；控制通商口岸；剥夺关税自主权；商品倾销与资本输出\n\n4. **文化渗透**：披着宗教外衣进行侵略活动；为侵略制造舆论\n\n### 第三节 反抗外来侵略的斗争\n\n- 人民群众：三元里人民抗英；义和团运动（粉碎瓜分图谋）\n- 爱国官兵：关天培、陈化成、邓世昌、冯子材（镇南关大捷）\n\n### 第四节 反侵略斗争的失败与民族意识的觉醒\n\n**失败原因**（★必考）：\n1. **社会制度腐败**（根本原因）\n2. **经济技术落后**（重要原因）\n\n**民族意识觉醒**：\n- \"师夷长技以制夷\"（魏源《海国图志》）\n- \"救亡\"口号（严复《天演论》\"物竞天择，适者生存\"）\n- 孙中山\"振兴中华\"\n\n---\n\n## 第二章 不同社会力量对国家出路的早期探索\n\n### 第一节 太平天国农民战争\n\n- 1851金田起义 → 1853定都天京 → 1864天京陷落\n- 《天朝田亩制度》：绝对平均主义 → 无法实现\n- 《资政新篇》：中国近代第一个比较系统的发展资本主义方案 → 未实施\n- **意义**：沉重打击清王朝和外国侵略势力\n- **失败原因**：农民阶级局限性（无先进阶级领导、无科学纲领）；战略失误；中外反动势力联合镇压\n- **教训**：农民阶级不能充当中国革命的主力军和领导力量\n\n### 第二节 洋务运动\n\n- 时间：19世纪60-90年代\n- 口号：前期\"自强\"（军事工业）；后期\"求富\"（民用工业）\n- 代表：奕䜣、曾国藩、李鸿章、左宗棠、张之洞\n- 内容：兴办近代企业；建立新式海陆军；创办新式学堂、派遣留学生\n- **性质**：地主阶级自救运动\n- **失败标志**：甲午战争北洋水师覆没\n- **失败原因**：封建性（官办/官督商办）；对外依赖性；管理腐朽\n- **历史作用**：客观上促进了中国早期工业和民族资本主义发展；是中国近代教育的开端\n\n### 第三节 戊戌维新运动\n\n- 1898年（戊戌年），103天 → \"百日维新\"\n- 代表：康有为、梁启超、谭嗣同\n- 内容：政治上兴民权、设议院、定宪法；经济上发展资本主义；文教上改革科举\n- **性质**：资产阶级性质的改良运动\n- **失败原因**：民族资产阶级软弱性 → 不敢否定封建主义 → 不敢发动群众 → 对帝国主义抱幻想\n- **意义**：资产阶级登上政治舞台的第一次表演；起了思想启蒙作用\n- **教训**：自上而下的改良道路在中国行不通\n\n---\n\n## 第三章 辛亥革命与君主专制制度的终结\n\n### 第一节 举起近代民族民主革命的旗帜\n\n- 资产阶级革命派形成：孙中山、黄兴、章炳麟\n- **三民主义**（★必考）：\n  - 民族主义：驱除鞑虏，恢复中华（推翻清朝统治，争取民族独立）\n  - 民权主义：创立民国（推翻封建君主专制，建立资产阶级民主共和国）→ **核心**\n  - 民生主义：平均地权（资本主义土地纲领）\n- 革命与改良的辩论：要不要以革命手段推翻清王朝；要不要推翻帝制实行共和；要不要社会改革\n\n### 第二节 辛亥革命与建立民国\n\n- 1911.10.10 武昌起义\n- 1912.1.1 中华民国临时政府成立 → 孙中山临时大总统\n- 1912.2.12 清帝退位 → **两千多年封建君主专制制度终结**\n- 《中华民国临时约法》：中国历史上第一部具有资产阶级共和国宪法性质的法典\n\n### 第三节 辛亥革命的失败\n\n- 袁世凯篡夺革命果实 → 北洋军阀统治\n- **辛亥革命意义**（★必考）：\n  1. 推翻了封建君主专制制度 → 伟大历史性巨变\n  2. 使民主共和观念深入人心\n  3. 促使社会经济、思想习惯和社会风俗的变化\n  4. 推动亚洲民族解放运动\n- **失败原因**（★必考）：\n  1. **根本原因**：在帝国主义时代，半殖民地半封建的中国，资本主义建国方案行不通\n  2. **主观原因**：民族资产阶级软弱性和妥协性 → 不敢彻底反帝反封建 → 不敢发动群众\n- **教训**：资产阶级共和国方案在中国行不通；旧民主主义革命走到尽头\n\n---\n\n## 中编综述：翻天覆地的三十年 (1919-1949)\n\n- 三种政治力量、三种建国方案：\n  1. 地主阶级和买办性大资产阶级 → 军事独裁专政\n  2. 民族资产阶级 → 资产阶级共和国\n  3. 工人阶级、农民阶级和城市小资产阶级 → 人民民主专政\n- 两个中国之命运：光明与黑暗\n\n---\n\n## 第四章 开天辟地的大事变\n\n### 第一节 新文化运动和五四运动\n\n**新文化运动**：\n- 1915 陈独秀《青年杂志》（后改名《新青年》）→ 标志新文化运动开始\n- 口号：民主（德先生）和科学（赛先生）\n- 内容：提倡民主、科学，反对专制、迷信；提倡新道德，反对旧道德；提倡新文学，反对旧文学\n- 意义：空前思想解放运动；为马克思主义传播创造条件\n\n**五四运动**（★必考）：\n- 导火线：巴黎和会上中国外交失败\n- 1919.5.4 北京学生 → 6月5日上海工人罢工 → 工人阶级登上政治舞台\n- **历史意义**：中国新民主主义革命的开端\n  1. 表现了反帝反封建的彻底性\n  2. 是一次真正的群众运动\n  3. 促进了马克思主义在中国的传播及其与中国工人运动的结合\n  4. 发生在俄国十月革命之后 → 属于世界无产阶级社会主义革命的一部分\n\n### 第二节 马克思主义进一步传播与中国共产党诞生\n\n- 早期马克思主义者：李大钊（中国宣传马克思主义第一人）、陈独秀\n- 三次思想论争：问题与主义论争；关于社会主义的论争；与无政府主义的论争\n\n**中国共产党成立**（★必考·\"开天辟地的大事变\"）：\n- 1921.7.23 中共一大（上海 → 嘉兴南湖）\n- 纲领：推翻资产阶级政权；承认无产阶级专政；消灭资本家私有制\n- **成立意义**：\n  1. 新的坚强的领导核心\n  2. 新的革命方法（群众路线）\n  3. 新的奋斗目标（社会主义和共产主义）\n  4. 新的革命前途（社会主义方向）\n  5. 使中国革命有了可信赖的组织者和领导者\n\n- 1922 中共二大：**第一次提出反帝反封建的民主革命纲领**\n  - 最高纲领：实现社会主义、共产主义\n  - 最低纲领：打倒军阀、推翻国际帝国主义压迫、统一中国为真正民主共和国\n\n### 第三节 中国革命的新局面\n\n- 1924-1927 第一次国共合作（中共三大决定以个人名义加入国民党）\n- 北伐战争胜利\n- **大革命失败**：1927 四一二政变 → 七一五政变\n- **失败原因**：中共领导机关犯了右倾机会主义错误 → 放弃无产阶级领导权和武装力量\n- **经验教训**：必须坚持无产阶级领导权；必须结成巩固的工农联盟；必须建立革命武装\n\n---\n\n## 第五章 中国革命的新道路\n\n### 第一节 对革命新道路的艰苦探索\n\n- 1927 国民党在全国统治的建立（宁汉合流 → 南京政府）\n- **南昌起义**（1927.8.1）：打响武装反抗国民党反动派第一枪 → 人民军队诞生\n- **八七会议**（1927.8.7）：\"枪杆子里面出政权\"；土地革命和武装反抗总方针\n- 秋收起义 → 三湾改编（党指挥枪原则）→ 井冈山革命根据地\n- **农村包围城市、武装夺取政权**道路理论形成\n  - 《中国的红色政权为什么能够存在？》\n  - 《井冈山的斗争》\n  - 《星星之火，可以燎原》\n\n### 第二节 中国革命在探索中曲折前进\n\n- 土地革命：打土豪、分田地 → 《井冈山土地法》→《兴国土地法》\n- **遵义会议**（1935.1）（★必考）：\n  - 纠正了王明\"左\"倾军事错误\n  - 确立毛泽东在党中央的实际领导地位\n  - **中国共产党历史上一个生死攸关的转折点**\n  - 标志中国共产党在政治上走向成熟\n- 长征（1934.10-1936.10）：红军三大主力会师 → 长征胜利\n- 抗日民族统一战线策略的制定：《八一宣言》→ 瓦窑堡会议\n\n---\n\n## 第六章 中华民族的抗日战争\n\n### 第一节 日本发动灭亡中国的侵略战争\n\n- 1931 九一八事变 → 侵占东北\n- 1937 七七事变（卢沟桥事变）→ 全面侵华\n- 南京大屠杀：30万以上中国平民和战俘被害\n\n### 第二节 从局部抗战到全国性抗战\n\n- 一二九运动（1935.12.9）：促进民族觉醒\n- 西安事变（1936.12.12）：张学良、杨虎城 → 和平解决 → 时局转换枢纽\n- 1937.9 国民党公布中共提出的合作宣言 → 抗日民族统一战线正式形成\n\n### 第三节 国民党正面战场\n\n- 淞沪会战、忻口会战、徐州会战（台儿庄大捷）、武汉会战\n- 失败原因：片面抗战路线（不发动群众）；战略指导失误；敌强我弱\n\n### 第四节 共产党敌后战场 → 中流砥柱\n\n- 平型关大捷（1937.9）：抗战以来第一次大捷\n- 百团大战（1940）：敌后战场最大规模战役\n- **共产党是抗战中流砥柱**（★必考）：\n  1. 倡导和坚持抗日民族统一战线\n  2. 坚持全面抗战路线\n  3. 开辟敌后战场\n  4. 推进马克思主义中国化 → 毛泽东思想成熟\n\n### 第五节 抗日战争的胜利\n\n- 1945.8.15 日本宣布无条件投降 → 9.2 签署投降书\n- **胜利原因**（★必考）：\n  1. 中国共产党在全民族抗战中发挥了中流砥柱作用\n  2. 以国共合作为基础的抗日民族统一战线\n  3. 全民族抗战\n  4. 国际反法西斯力量的支持\n- **意义**：近代以来中华民族反抗外敌入侵第一次取得完全胜利；中华民族由衰败走向复兴的重大转折\n\n---\n\n## 第七章 为新中国而奋斗\n\n### 第一节 从争取和平民主到进行自卫战争\n\n- 重庆谈判（1945.8-10）→ 双十协定\n- 政协会议（1946.1）→ 五项协议\n- 全面内战爆发（1946.6）\n\n### 第二节 国民党政府覆亡\n\n- 三大战役（1948.9-1949.1）：辽沈、淮海、平津\n- 渡江战役（1949.4.21）→ 占领南京 → 国民党统治覆灭\n\n### 第三节 新民主主义革命的胜利\n\n- **中华人民共和国成立**（1949.10.1）（★必考·意义）：\n  1. 中华民族以崭新姿态自立于世界民族之林\n  2. 建立了真正属于人民的共和国\n  3. 国家基本统一 → 可集中力量进行经济文化建设\n  4. 为由新民主主义向社会主义过渡创造了政治前提\n  5. 中国共产党成为全国范围内的执政党\n\n- **\"没有共产党就没有新中国\"**（★必考·革命胜利基本经验）：\n  1. 坚持马克思列宁主义普遍真理与中国具体实际相结合 → 毛泽东思想\n  2. 坚持革命的武装斗争\n  3. 建立广泛的统一战线\n  4. 坚持共产党领导 → 根本保证\n  5. 坚持国际主义与爱国主义相结合\n\n---\n\n## 下编综述：辉煌的历史进程 (1949-)\n\n- 从新民主主义向社会主义过渡 → 社会主义建设探索 → 改革开放 → 新时代\n\n---\n\n## 第八章 中华人民共和国成立与社会主义建设道路的探索\n\n### 第一节 从新民主主义向社会主义过渡的开始\n\n- 新中国成立初期三大任务：继续完成民主革命遗留任务；恢复国民经济；巩固新生政权\n- 土地改革（1950-1952）：废除封建土地制度 → 农民成为土地主人\n- 抗美援朝（1950-1953）：保家卫国 → 提高中国国际地位\n\n### 第二节 社会主义道路：历史和人民的选择\n\n- 过渡时期总路线（1953）：\"一化三改\"（★必考）\n  - 一化：社会主义工业化（主体）\n  - 三改：对农业、手工业、资本主义工商业的社会主义改造（两翼）\n  - 特点：建设与改造同时并举\n\n### 第三节 有中国特点的向社会主义过渡的道路\n\n- 农业改造：互助组 → 初级社 → 高级社\n- 资本主义工商业改造：**和平赎买**（世界社会主义运动史上的创举）\n- 社会主义改造完成（1956）→ **社会主义制度在中国确立**（★必考·意义）：\n  1. 中国历史上最深刻最伟大的社会变革\n  2. 为当代中国一切发展进步奠定了根本政治前提和制度基础\n  3. 创造性完成了由新民主主义到社会主义的转变\n\n### 第四节 社会主义建设在探索中曲折发展\n\n- **中共八大**（1956）（★必考）：\n  - 正确分析国内主要矛盾：人民对于经济文化迅速发展的需要与当前经济文化不能满足人民需要的状况之间的矛盾\n  - 确定主要任务：集中力量发展社会生产力\n  - 坚持既反保守又反冒进的经济建设方针\n\n- 探索中的失误：大跃进、人民公社化运动 → \"左\"倾错误发展\n- **文化大革命**（1966-1976）：严重曲折 → 教训深刻\n\n- **建设成就**（不能因错误而否定）：\n  - 独立完整的工业体系和国民经济体系\n  - \"两弹一星\"\n  - 外交突破（恢复联合国合法席位、中美建交）\n\n---\n\n## 第九章 改革开放与中国特色社会主义\n\n### 第一节 历史性的伟大转折\n\n- **十一届三中全会**（1978.12）（★必考·\"伟大历史转折\"）：\n  1. 彻底否定\"两个凡是\"的错误方针 → 重新确立实事求是的思想路线\n  2. 停止\"以阶级斗争为纲\" → 工作重心转移到经济建设上来\n  3. 作出改革开放的伟大决策\n  4. 形成以邓小平为核心的党中央领导集体\n  - **意义**：中华人民共和国成立以来具有深远意义的伟大转折；开启了改革开放和社会主义现代化建设新时期\n\n### 第二节 改革开放的展开\n\n- 农村改革先突破：家庭联产承包责任制 → 乡镇企业异军突起\n- 经济特区：深圳、珠海、汕头、厦门（1980）→ 海南（1988）\n- 中共十二大（1982）：\"建设有中国特色的社会主义\"\n- 中共十三大（1987）：社会主义初级阶段理论；\"一个中心、两个基本点\"基本路线\n\n### 第三节 改革开放的新阶段\n\n- 邓小平南方谈话（1992）：社会主义本质；三个有利于标准\n- 中共十四大（1992）：建立社会主义市场经济体制\n- 中共十五大（1997）：邓小平理论写入党章；依法治国基本方略\n\n### 第四节 中国特色社会主义的跨世纪发展\n\n- \"三个代表\"重要思想\n- 科学发展观\n- 全面建设小康社会\n\n---\n\n## 第十章 中国特色社会主义进入新时代\n\n### 第一节 中共十八大开启中国特色社会主义新时代\n\n- 2012 十八大 → 习近平新时代\n- **中国梦**：实现中华民族伟大复兴 → 国家富强、民族振兴、人民幸福\n- \"五位一体\"总体布局：经济、政治、文化、社会、生态文明建设\n- \"四个全面\"战略布局：全面建成小康社会、全面深化改革、全面依法治国、全面从严治党\n\n### 第二节 新时代十年伟大变革\n\n- 脱贫攻坚全面胜利\n- 全面建成小康社会（2021）\n- **里程碑意义**：\n  1. 迈上全面建设社会主义现代化国家新征程\n  2. 实现中华民族伟大复兴进入不可逆转的历史进程\n  3. 科学社会主义在21世纪中国焕发强大生机活力\n\n### 第三节 中国式现代化\n\n- 中共二十大（2022）：以中国式现代化全面推进中华民族伟大复兴\n- **中国式现代化特征**：\n  1. 人口规模巨大的现代化\n  2. 全体人民共同富裕的现代化\n  3. 物质文明和精神文明相协调的现代化\n  4. 人与自然和谐共生的现代化\n  5. 走和平发展道路的现代化\n\n---\n\n## 新疆近现代史专题 (新疆大学特色考点)\n\n### 新疆和平解放\n\n- 1949.9.25-26 新疆和平解放（陶峙岳、包尔汗通电起义）\n- 王震率第一兵团进疆\n\n### 新疆生产建设兵团\n\n- 1954.10 成立 → 屯垦戍边、建设边疆\n\n### 民族区域自治\n\n- 1955.10.1 新疆维吾尔自治区成立\n\n### 中国共产党在新疆的领导地位\n\n- 历史的必然、人民的选择\n- 新疆近现代历史是中国近现代历史的重要组成部分\n\n---\n\n## 期末高频简答/论述题精选\n\n### 1. 为什么说辛亥革命是近代中国的一次伟大历史性巨变？又为什么说它失败了？\n\n**巨变**：推翻了封建君主专制制度（非封建制度整体）；使民主共和观念深入人心；促进了社会经济思想风俗变化；推动了亚洲民族解放运动。\n\n**失败**：没有完成反帝反封建的任务；革命果实被袁世凯篡夺。根本原因：在帝国主义时代，半殖民地半封建的中国，资本主义建国方案行不通。主观原因：民族资产阶级软弱性妥协性。\n\n### 2. 为什么说中国共产党的成立是开天辟地的大事变？\n\n1. 新的坚强的领导核心\n2. 新的革命方法（群众路线）\n3. 新的奋斗目标（社会主义和共产主义）\n4. 新的革命前途（社会主义方向）\n5. 使中国革命面貌焕然一新\n\n### 3. 为什么说中国共产党是抗日战争的中流砥柱？\n\n1. 倡导、促成并坚持抗日民族统一战线\n2. 坚持全面抗战路线（人民战争）\n3. 开辟和坚持敌后战场\n4. 推进马克思主义中国化 → 毛泽东思想走向成熟\n\n### 4. 为什么说\"没有共产党就没有新中国\"？中国革命取得胜利的基本经验是什么？\n\n**原因**：共产党领导中国人民走新民主主义道路，推翻三座大山，建立了新中国。\n\n**基本经验（三大法宝）**：\n1. 统一战线\n2. 武装斗争\n3. 党的建设\n\n### 5. 为什么说十一届三中全会是中华人民共和国成立后的伟大历史转折？\n\n1. 重新确立实事求是的思想路线 → 否定\"两个凡是\"\n2. 停止\"以阶级斗争为纲\" → 工作重心转移到经济建设\n3. 作出改革开放伟大决策\n4. 形成以邓小平为核心的第二代领导集体\n5. 结束了党和国家工作在徘徊中前进的局面\n\n### 6. 简述近代中国社会的基本特征。\n\n1. 资本-帝国主义逐步控制中国政治经济\n2. 封建势力成为帝国主义统治中国的社会支柱\n3. 自然经济遭破坏但封建剥削制度依然存在\n4. 中国各地经济政治文化发展极不平衡\n5. 中国人民贫困和不自由程度世界罕见\n\n### 7. 简述反侵略斗争失败的原因。\n\n1. **社会制度腐败**（根本原因）：清政府腐败无能 → 不敢发动群众\n2. **经济技术落后**（重要原因）：武器装备落后、军队素质低下\n\n### 8. 简述遵义会议的历史意义。\n\n1. 纠正了王明\"左\"倾军事错误\n2. 确立毛泽东在党中央的实际领导地位\n3. 中国共产党历史上生死攸关的转折点\n4. 标志中国共产党在政治上走向成熟（独立自主解决自身问题）\n\n### 9. 简述过渡时期总路线的内容及特点。\n\n**内容**：\"一化三改\"——社会主义工业化（主体）；对农业、手工业、资本主义工商业的社会主义改造（两翼）。\n\n**特点**：社会主义建设与社会主义改造同时并举。\n\n### 10. 简述中共八大的主要贡献。\n\n1. 正确分析国内主要矛盾\n2. 确定主要任务：集中力量发展社会生产力\n3. 坚持既反保守又反冒进的经济建设方针\n4. 提出扩大民主、健全法制任务\n\n---\n\n## 期末高频选择题精选\n\n1. 第一次鸦片战争后美国迫使清政府签订的不平等条约 → **C.《望厦条约》**\n2. 近代中国社会性质 → **半殖民地半封建社会**\n3. 近代中国最主要的矛盾 → **帝国主义与中华民族的矛盾**\n4. 粉碎帝国主义瓜分中国图谋的事件 → **A.义和团运动**\n5. 戊戌维新时期梁启超主笔的报纸 → **A.《时务报》**\n6. 中国民族资产阶级登上政治舞台的第一次表演 → **B.戊戌维新**\n7. 孙中山民权主义即 → **B.政治革命**\n8. 辛亥革命失败的根本原因 → **A.资本主义建国方案行不通**\n9. 五四运动的直接导火线 → **D.巴黎和会上中国外交的失败**\n10. 第一次提出反帝反封建民主革命纲领 → **B.中共二大**\n11. 中共三大正式决定 → **C.共产党员以个人名义加入国民党**\n12. 王明\"左\"倾教条主义最大恶果 → **A.第五次反\"围剿\"失败，被迫长征**\n13. 遵义会议最主要功绩 → **确立了毛泽东在党中央的实际领导地位**\n14. 抗战以来第一次大捷 → **平型关大捷**\n15. 中国抗战胜利纪念日 → **9月3日**\n16. 1861年清政府综理洋务的中央机关 → **C.总理各国事务衙门**\n17. 帝国主义列强瓜分中国图谋达到高潮 → **C.甲午战争后**\n18. 戊戌维新前维新派与守旧派论战实质 → **A.资产阶级思想与封建主义思想第一次正面交锋**\n19. 洋务运动的指导思想 → **\"中学为体，西学为用\"**\n20. 太平天国具有资本主义色彩的纲领 → **《资政新篇》**\n\n---\n\n## 辨析题答题要领\n\n辨析题 = 先判断对错 + 再分析原因\n\n**常见辨析角度**：\n1. \"辛亥革命推翻了封建制度\" → ✗ 推翻的是封建**君主专制制度**，非整个封建制度\n2. \"洋务运动是资产阶级性质的改革\" → ✗ 地主阶级自救运动\n3. \"五四运动是旧民主主义革命\" → ✗ 新民主主义革命的开端\n4. \"中国革命的中心问题是农民问题\" → ✓ 农民是中国革命的主力军\n5. \"社会主义改造就是取消资本主义\" → ✗ 是和平赎买、逐步改造\n\n---\n\n## 材料分析题答题框架\n\n1. **审题**：明确材料涉及的历史事件/人物/时期\n2. **定位**：对应教材哪个章节、哪个知识点\n3. **分析**：运用唯物史观 → 结合\"四个选择\"主线\n4. **作答**：分点论述 → 史论结合 → 结论扣题\n\n**万能答题角度**：\n- 历史必然性（为什么是历史的选择）\n- 阶级局限性（为什么旧阶级/旧方案失败）\n- 经验教训（对后世的启示）\n- 理论意义（马克思主义中国化的体现）\n"}, {"id": "rr-e2bac107", "group": "复习资料", "title": "期末速查", "md": "# 中国近现代史纲要 · 期末速查\n\n> 关键词 → 答案。一触即达。\n\n---\n\n## 条约速查\n\n| 条约 | 年份 | 战争 | 关键内容 |\n|------|------|------|----------|\n| 南京条约 | 1842 | 鸦片战争 | 割香港岛、五口通商、协定关税、赔2100万银元 |\n| 望厦条约 | 1844 | — | 美国获得领事裁判权 |\n| 黄埔条约 | 1844 | — | 法国获得传教权 |\n| 天津条约 | 1858 | 第二次鸦片 | 开放更多口岸、允许传教 |\n| 北京条约 | 1860 | 第二次鸦片 | 割九龙半岛、增开通商口岸 |\n| 马关条约 | 1895 | 甲午战争 | 割台湾澎湖、赔2亿两、允许设厂 |\n| 辛丑条约 | 1901 | 八国联军 | 赔4.5亿两、设使馆区、严禁反帝 |\n\n## 人物速查\n\n| 人物 | 关键词 |\n|------|--------|\n| 林则徐 | 虎门销烟、睁眼看世界第一人 |\n| 魏源 | \"师夷长技以制夷\"、《海国图志》 |\n| 严复 | 《天演论》\"物竞天择适者生存\"、\"救亡\" |\n| 洪秀全 | 太平天国、《天朝田亩制度》 |\n| 洪仁玕 | 《资政新篇》（资本主义方案） |\n| 奕䜣/曾/李/左/张 | 洋务运动 |\n| 康有为/梁启超 | 戊戌维新 |\n| 谭嗣同 | 戊戌六君子、\"我自横刀向天笑\" |\n| 孙中山 | 三民主义、辛亥革命、临时大总统 |\n| 陈独秀 | 《新青年》、新文化运动、中共首任总书记 |\n| 李大钊 | 中国宣传马克思主义第一人 |\n| 毛泽东 | 农村包围城市、遵义会议后实际领导 |\n| 周恩来 | 南昌起义、统一战线 |\n| 邓小平 | 改革开放、南方谈话、中国特色社会主义 |\n\n## 会议速查\n\n| 会议 | 年份 | 关键决策 |\n|------|------|----------|\n| 中共一大 | 1921 | 党的成立 |\n| 中共二大 | 1922 | 第一次提出反帝反封建民主革命纲领 |\n| 中共三大 | 1923 | 以个人名义加入国民党 |\n| 八七会议 | 1927 | 枪杆子里面出政权、土地革命+武装反抗 |\n| 遵义会议 | 1935 | 确立毛泽东领导、生死攸关转折 |\n| 瓦窑堡会议 | 1935 | 抗日民族统一战线策略 |\n| 中共七大 | 1945 | 毛泽东思想写入党章 |\n| 中共八大 | 1956 | 正确分析主要矛盾、发展生产力 |\n| 十一届三中全会 | 1978 | 伟大历史转折、改革开放 |\n| 中共十二大 | 1982 | \"建设有中国特色的社会主义\" |\n| 中共十三大 | 1987 | 社会主义初级阶段理论、基本路线 |\n| 中共十四大 | 1992 | 社会主义市场经济体制 |\n| 中共十五大 | 1997 | 邓小平理论写入党章 |\n| 中共十八大 | 2012 | 新时代、中国梦 |\n| 中共二十大 | 2022 | 中国式现代化 |\n\n## 事件速查\n\n| 事件 | 年份 | 意义 |\n|------|------|------|\n| 鸦片战争 | 1840 | 近代史起点 |\n| 金田起义 | 1851 | 太平天国开始 |\n| 天京陷落 | 1864 | 太平天国失败 |\n| 甲午战争 | 1894-95 | 洋务运动失败标志 |\n| 戊戌变法 | 1898 | 百日维新、资产阶级改良 |\n| 辛亥革命 | 1911 | 推翻君主专制 |\n| 新文化运动 | 1915 | 思想解放 |\n| 五四运动 | 1919 | 新民主主义革命开端 |\n| 中共成立 | 1921 | 开天辟地 |\n| 北伐战争 | 1926-28 | 第一次国共合作 |\n| 南昌起义 | 1927.8.1 | 人民军队诞生 |\n| 九一八事变 | 1931 | 局部抗战开始 |\n| 长征 | 1934-36 | 战略转移 |\n| 一二九运动 | 1935 | 民族觉醒 |\n| 西安事变 | 1936 | 时局转换枢纽 |\n| 七七事变 | 1937 | 全面抗战开始 |\n| 平型关大捷 | 1937 | 抗战首次大捷 |\n| 百团大战 | 1940 | 敌后最大规模 |\n| 抗战胜利 | 1945 | 近代首次反侵略完全胜利 |\n| 三大战役 | 1948-49 | 解放战争决定性胜利 |\n| 新中国成立 | 1949.10.1 | 民族独立人民解放 |\n| 抗美援朝 | 1950-53 | 提高国际地位 |\n| 社会主义改造完成 | 1956 | 社会主义制度确立 |\n| 改革开放 | 1978 | 伟大历史转折 |\n\n## 数字速查\n\n- **两个矛盾**：帝国主义↔中华民族；封建主义↔人民大众\n- **两个任务**：民族独立人民解放；国家富强人民富裕\n- **三民主义**：民族、民权（核心）、民生\n- **三大法宝**：统一战线、武装斗争、党的建设\n- **三大作风**：理论联系实际、密切联系群众、批评与自我批评\n- **三条道路**：独裁专政、资产阶级共和国、人民民主专政\n- **四个选择**：马克思主义、中国共产党、社会主义、改革开放\n- **五位一体**：经济、政治、文化、社会、生态\n- **四个全面**：小康社会、深化改革、依法治国、从严治党\n- **五大发展理念**：创新、协调、绿色、开放、共享\n- **中国式现代化五个特征**：人口规模巨大、共同富裕、两个文明协调、人与自然和谐、和平发展\n\n## 性质速查\n\n| 运动 | 性质 |\n|------|------|\n| 太平天国 | 农民革命战争 |\n| 洋务运动 | 地主阶级自救运动 |\n| 戊戌维新 | 资产阶级改良运动 |\n| 辛亥革命 | 资产阶级民主革命 |\n| 五四运动 | 彻底反帝反封建的群众运动 |\n| 新文化运动 | 空前思想解放运动 |\n| 国民革命 | 大革命/国民革命 |\n| 抗日战争 | 民族解放战争 |\n| 解放战争 | 新民主主义革命 |\n| 社会主义改造 | 社会主义革命 |\n\n## 原因速查\n\n| 问题 | 原因 |\n|------|------|\n| 反侵略失败 | 根本：社会制度腐败；重要：经济技术落后 |\n| 太平天国失败 | 农民阶级局限性、无先进阶级领导 |\n| 洋务运动失败 | 封建性、依赖性、腐朽性 |\n| 戊戌维新失败 | 民族资产阶级软弱性→不敢反帝反封建 |\n| 辛亥革命失败 | 根本：资本主义方案行不通；主观：资产阶级软弱性 |\n| 大革命失败 | 右倾机会主义→放弃领导权和武装 |\n\n## 新疆考点速查\n\n| 事件 | 时间 |\n|------|------|\n| 新疆和平解放 | 1949.9.25-26 |\n| 新疆生产建设兵团 | 1954.10 |\n| 新疆维吾尔自治区 | 1955.10.1 |\n"}, {"id": "rr-43250580", "group": "复习资料", "title": "期末骨架", "md": "# 中国近现代史纲要 · 期末骨架\n\n> 骨架者，道之骨也。一气贯通，万变不离其宗。\n\n---\n\n## 一条主线\n\n**四个选择**：马克思主义 → 中国共产党 → 社会主义道路 → 改革开放\n\n## 两大历史任务\n\n- 争取民族独立、人民解放（前提）\n- 实现国家富强、人民富裕（目的）\n\n## 两对主要矛盾\n\n- 帝国主义与中华民族（最主要）\n- 封建主义与人民大众\n\n## 三个时期\n\n| 编 | 时期 | 时间 | 主题 |\n|---:|------|------|------|\n| 上编 | 旧民主主义革命 | 1840-1919 | 探索→失败→旧路不通 |\n| 中编 | 新民主主义革命 | 1919-1949 | 党领导→胜利→新中国 |\n| 下编 | 社会主义建设 | 1949- | 改造→探索→改革→新时代 |\n\n## 十章骨架\n\n```\n第1章 鸦片战争 → 半殖民地半封建 → 反侵略失败(制度腐败+技术落后)\n第2章 太平天国/洋务/维新 → 农民/地主/资产阶级探索 → 全失败\n第3章 辛亥革命 → 推翻君主专制 → 但资本主义方案行不通\n第4章 五四运动 → 新民主主义开端 → 党成立(开天辟地)\n第5章 南昌起义 → 农村包围城市 → 遵义会议(生死转折)\n第6章 抗日战争 → 统一战线 → 共产党中流砥柱 → 胜利\n第7章 解放战争 → 三大战役 → 新中国成立(没有共产党就没有新中国)\n第8章 社会主义改造 → 一化三改 → 制度确立(最深刻伟大变革)\n第9章 十一届三中全会 → 改革开放 → 中国特色社会主义\n第10章 十八大 → 新时代 → 中国梦 → 中国式现代化\n```\n\n## 六大转折点\n\n1. **1840** 鸦片战争 → 近代史起点\n2. **1919** 五四运动 → 新民主主义革命开端\n3. **1921** 中共成立 → 开天辟地\n4. **1935** 遵义会议 → 生死攸关转折\n5. **1949** 新中国成立 → 民族独立人民解放\n6. **1978** 十一届三中全会 → 伟大历史转折\n\n## 三大法宝\n\n统一战线 + 武装斗争 + 党的建设\n\n## 五次探索失败教训\n\n| 探索 | 阶级 | 失败原因 |\n|------|------|----------|\n| 太平天国 | 农民 | 无先进阶级领导、无科学纲领 |\n| 洋务运动 | 地主 | 封建性、依赖性、腐朽性 |\n| 戊戌维新 | 资产阶级(改良) | 软弱性→不敢反帝反封建→不敢发动群众 |\n| 辛亥革命 | 资产阶级(革命) | 软弱性→资本主义方案行不通 |\n| 大革命 | 国共合作 | 右倾机会主义→放弃领导权和武装 |\n\n## 新疆考点骨架\n\n- 1949.9 新疆和平解放（陶峙岳、包尔汗起义）\n- 1954.10 新疆生产建设兵团成立\n- 1955.10.1 新疆维吾尔自治区成立\n- 中国共产党在新疆的领导地位 = 历史必然 + 人民选择\n"}, {"id": "graph", "group": "知识图谱", "title": "章节图谱", "md": "# 中国近现代史纲要 · 章节图谱\n\n> 十章三编，一气贯通。四个选择，万变归宗。\n\n```\n                        ┌─────────────────────────────────┐\n                        │     四个选择（课程主线）          │\n                        │  马克思主义→共产党→社会主义→改革  │\n                        └──────────────┬──────────────────┘\n                                       │\n          ┌────────────────────────────┼────────────────────────────┐\n          │                            │                            │\n    ┌─────┴──────┐             ┌───────┴───────┐           ┌───────┴───────┐\n    │  上编       │             │  中编          │           │  下编          │\n    │ 1840-1919  │             │ 1919-1949     │           │ 1949-         │\n    │ 旧民主主义  │             │ 新民主主义     │           │ 社会主义建设   │\n    │ 探索→失败   │             │ 党领导→胜利    │           │ 改造→改革→新时代│\n    └─────┬──────┘             └───────┬───────┘           └───────┬───────┘\n          │                            │                            │\n   ┌──────┼──────┐            ┌────────┼────────┐          ┌──────┼──────┐\n   │      │      │            │        │        │          │      │      │\n 第1章  第2章  第3章       第4章    第5章    第6章     第7章  第8章  第9章  第10章\n │      │      │            │        │        │          │      │      │      │\n 鸦片   早期   辛亥         五四     农村     抗日      解放   社改   改革   新时代\n 战争   探索   革命         运动     包围     战争      战争   建设   开放\n │      │      │            │        城市              │      │      │      │\n │      │      │            │        │                 │      │      │      │\n 反侵略 太平   推翻         党成立   遵义             新中国 一化   十一届  十八大\n 失败   天国   君主         开天辟地 生死转折         成立   三改   三中全会 中国梦\n │      洋务   专制                                │      │      │      │\n 制度   戊戌   资本主义                              │      制度   伟大   中国式\n 腐败   维新   方案                                  │      确立   转折   现代化\n       行不通  行不通                                │      │      │      │\n              ↓                                     │      │      │      │\n         旧路不通 ──────────────→ 需要新道路 ←──────┘      │      │      │\n                            ↓                           │      │      │\n                     中国共产党诞生 ←─────────────────────┘      │      │\n                            ↓                                  │      │\n                     新民主主义革命胜利 → 新中国成立 ───────────┘      │\n                            ↓                                       │\n                     社会主义制度确立 → 改革开放 → 新时代 ──────────┘\n```\n\n## 章节关联矩阵\n\n|  | 探索失败 | 革命选择 | 建设发展 |\n|--|---------|---------|---------|\n| 核心问题 | 旧路为何不通 | 新路如何开辟 | 新路如何发展 |\n| 章节 | 1-3 | 4-7 | 8-10 |\n| 关键转折 | 辛亥革命失败 | 党的成立 | 十一届三中全会 |\n| 结论 | 资本主义方案行不通 | 只有共产党才能救中国 | 只有社会主义才能发展中国 |\n\n## 各章核心命题\n\n| 章 | 核心命题 | 答案 |\n|---:|---------|------|\n| 1 | 反侵略为何失败？ | 社会制度腐败（根本）+ 经济技术落后 |\n| 2 | 早期探索为何失败？ | 各阶级局限性 → 旧路不通 |\n| 3 | 辛亥革命意义与失败？ | 推翻君主专制 → 但资本主义方案行不通 |\n| 4 | 为何需要共产党？ | 旧路不通 → 党成立 = 开天辟地 |\n| 5 | 革命新路是什么？ | 农村包围城市、武装夺取政权 |\n| 6 | 谁是抗战中流砥柱？ | 中国共产党 |\n| 7 | 为何没有共产党就没有新中国？ | 党领导人民完成反帝反封建 |\n| 8 | 社会主义制度为何是历史必然？ | 人民的选择 + 最深刻伟大变革 |\n| 9 | 改革开放为何是伟大转折？ | 从\"以阶级斗争为纲\"→经济建设 |\n| 10 | 新时代新在哪？ | 中国式现代化 → 民族复兴不可逆转 |\n"}]}</script>
