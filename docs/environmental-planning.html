<script id="course-data" type="application/json">{"slug": "environmental-planning", "title": "环境规划与管理", "folder": "环境规划与管理", "meta": {"teacher": "王思雨", "term": "2026春", "pdf": 11, "chapters": 5}, "defaultSection": "chap-2", "sections": [{"id": "chap-2", "group": "章节精讲", "title": "第2章 · 绪论 · 环境规划与管理", "md": "# 第2章 · 绪论 · 环境规划与管理\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点\n\n#### 一、核心概念（名词解释）\n\n- [x] **环境管理**：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n- [x] **环境规划**：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n- [x] **环境容量**：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- [x] **环境承载力**：不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n- [x] **可持续发展**：既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n- [x] **两山论**：绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] **复合生态系统**：自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n- [x] **工业生态学**：研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n- [x] **生态工业园**：制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n- [x] **环境经济学**：研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n\n#### 二、关键公式 / 模型\n\n- **环境容量**：M = K + R（K=稀释容量，R=自净容量）\n- **环境承载力**：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向\n- **环境承载力指标体系**：资源供给指标+社会影响指标+污染容纳指标\n- **帕累托最适度**：资源配置效率理论，寻求个人、集体和社会之间经济效率的协调统一\n- **计划分类模型**：按时间（长/中/短期）、约束力（指令性/指导性）、制定者层次（战略/管理/作业）、性质（综合/局部/项目）\n\n#### 三、重要案例 / 实验 / 例题\n\n- **丹麦卡伦堡生态工业园**：世界上最早最著名的生态工业园，主体企业为发电厂、炼油厂、制药厂、石膏板生产厂，通过贸易方式利用对方废弃物和副产品\n- **广西贵港国家生态工业（制糖）示范园区**：2001年8月我国第一个国家级生态工业示范园区\n- **美国生态工业园示范点**：1994年指定4个社区——巴尔的摩、查尔斯、布郎斯、恰塔努加\n- **两山论实践**：黑河（生态发展带动绿色崛起）、福建长汀（水土治理提升农民收入）、海南海口（大环保模式+海绵城市）\n- **中国总量控制历程**：1996年\"九五\"总量控制→1998年\"一控双达标\"→\"十五\"三大任务→\"十一五\"SO₂和COD控制→\"十二五\"主要污染物减排\n\n#### 四、高频考点（速记）\n\n1. **环境规划与管理五要素**：人、物、资金、信息、时空\n2. **环境管理五大手段**：行政、法律、经济、技术、宣传教育\n3. **环境规划vs环境管理关系**：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n4. **环境容量vs环境承载力**：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n5. **环境承载力三大特征**：客观性与主观性、区域性与时间性、动态性与可调控性\n6. **生态学三定律（米勒）**：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n7. **生态学六规律（陈昌笃）**：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n8. **可持续发展四原则**：协调原则、公平原则、持续原则、共同原则\n9. **可持续发展基本思想**：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n10. **复合生态系统四大矛盾**：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n11. **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论/概述，奠定基本概念和理论基础\n- 启后章：第4章深入综合分析方法，第5-7章为规划与管理实务\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第2章<br/>绪论 · 环境规划与管理))\n    核心概念\n      环境管理\n      环境规划\n      环境容量\n      环境承载力\n      可持续发展\n      两山论\n      复合生态系统\n      工业生态学\n      生态工业园\n      环境经济学\n    关键公式 / 模型\n      环境容量\n      环境承载力\n      环境承载力指标体系\n      帕累托最适度\n      计划分类模型\n    高频考点\n      环境规划与管理五要素：人、物、资金、信息、时空\n      环境管理五大手段：行政、法律、经济、技术、宣传教育\n      环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心…\n      环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社…\n      环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n      生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理…\n      生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协…\n      可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n      可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认…\n      复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资…\n      三种环境伦理观：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥…\n      工业园区三代：第一代劳动密集型→第二代高新技术→第三代生态工业园\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L15_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L15_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L15_p060.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L15_p060.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L16_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L16_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L16_p066.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L16_p066.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p038.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p038.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 体系示意 · 规划与管理的关系\n\n```mermaid\nflowchart LR\n    A[\"环境规划<br/>(蓝图/目标/方案)\"] --> B[\"环境管理<br/>(实施/监督/调控)\"]\n    B -->|反馈修正| A\n    A --> C[\"以预防为主、源头控制\"]\n    B --> D[\"命令控制 + 经济激励 + 公众参与\"]\n```\n\n#### 例题 1-1（名词解释）\n**题**：什么是环境规划？什么是环境管理？二者关系如何？\n**参考答案**：\n- **环境规划**：为协调环境与社会经济发展、合理利用环境容量，对一定时期一定区域的环境保护**目标、任务与措施**所作的**总体部署**。\n- **环境管理**：运用**行政、法律、经济、技术、教育**等手段，对影响环境的活动进行**调控**，使经济社会发展与环境相协调。\n- 关系：规划是管理的**前提与依据**（定目标、绘蓝图）；管理是规划的**实施与保障**（落地、监督、反馈），二者构成\"计划—执行—检查—改进\"闭环。\n\n#### 例题 1-2（简答）\n**题**：环境管理的三大类手段及其代表措施。\n**参考答案**：① **命令控制型**（标准、许可、限期治理、关停）；② **经济激励型**（排污收费/环境税、排污权交易、补贴、押金返还）；③ **公众参与/自愿型**（信息公开、环境标志、自愿协议、公益诉讼）。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境管理？\n\n<details><summary>参考答案<\/summary>\n\n协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n\n<\/details>\n\n**Q2（名词解释）** 环境规划？\n\n<details><summary>参考答案<\/summary>\n\n国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n\n<\/details>\n\n**Q3（名词解释）** 环境容量？\n\n<details><summary>参考答案<\/summary>\n\n某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n\n<\/details>\n\n**Q4（名词解释）** 环境承载力？\n\n<details><summary>参考答案<\/summary>\n\n不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n\n<\/details>\n\n**Q5（名词解释）** 可持续发展？\n\n<details><summary>参考答案<\/summary>\n\n既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n\n<\/details>\n\n**Q6（名词解释）** 两山论？\n\n<details><summary>参考答案<\/summary>\n\n绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n\n<\/details>\n\n**Q7（名词解释）** 复合生态系统？\n\n<details><summary>参考答案<\/summary>\n\n自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n\n<\/details>\n\n**Q8（名词解释）** 工业生态学？\n\n<details><summary>参考答案<\/summary>\n\n研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n\n<\/details>\n\n**Q9（名词解释）** 生态工业园？\n\n<details><summary>参考答案<\/summary>\n\n制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n\n<\/details>\n\n**Q10（名词解释）** 环境经济学？\n\n<details><summary>参考答案<\/summary>\n\n研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：环境规划与管理五要素：人、物、资金、信息、时空\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境规划与管理五要素：人、物、资金、信息、时空\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境管理五大手段：行政、法律、经济、技术、宣传教育\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境管理五大手段：行政、法律、经济、技术、宣传教育\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态学六规律（陈昌笃）：物物相关、相 er\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p058.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p060.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p060.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p061.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p061.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p062.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p062.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p063.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p063.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p064.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p064.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p066.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p066.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p067.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p067.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p068.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p068.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p069.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p069.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p071.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p071.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p072.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p072.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L17_p073.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L17_p073.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-4", "group": "章节精讲", "title": "第4章 · 环境规划与管理的综合分析方法", "md": "# 第4章 · 环境规划与管理的综合分析方法\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点\n\n#### 一、核心概念（名词解释）\n\n- [x] **环境现状调查**：掌握和了解某区域环境现状，发现和识别主要环境问题，确定主要污染源和主要污染物，为环境规划与管理的制定和实施创造条件\n- [x] **环境评价**：对被评价对象的优劣、好坏作定量或定性描述，一般以定量为主；含自然环境评价、社会经济评价、环境质量评价和污染源评价4方面\n- [x] **等标污染负荷**：将不同种类、不同量纲的污染物排放量标准化处理的方法，Pᵢ=Cᵢ/C₀ᵢ×Qᵢ\n- [x] **环境统计**：用数字反映并计量人类活动引起的环境变化；指标体系含7个子系统\n- [x] **环境预测**：借助数学、计算理论和信息处理技术，对未来环境质量变化趋势进行定性和定量分析；预测是决策的基础\n- [x] **决策**：从若干可能策略中选取最好策略的过程；具有多目标性、长期性、不确定性、方案多样性、一次性等特点\n- [x] **环境审计**：对特定项目环保情况进行系统的、有文字记录的、定期的、客观的评定\n- [x] **EMIS**：以现代数据库技术为核心，实现环境信息输入输出修改删除传输检索计算等操作的技术工程系统\n- [x] **EDSS**：将决策支持系统引入环境规划管理决策，对结构化/未结构化问题进行描述组织，协助完成管理决策\n- [x] **德尔菲法**：又称\"专家调查法\"，以无记名方式数轮函询征求专家意见，具不具名、反馈性、统计性特点\n- [x] **层次分析法（AHP）**：用递阶层次结构和矩阵方程将思维过程数学化，1~9标度构造判断矩阵，求特征向量得权重\n- [x] **清洁生产审计**：对产品生产全过程重点环节污染定量监测，找高物耗高能耗高污染原因，提出对策减少污染物产生\n\n#### 二、关键公式 / 模型\n\n- **环境质量指数**：Iᵢ = Cᵢ/C₀ᵢ（监测值/标准值）\n- **等标污染负荷（废水）**：Pᵢ = (Cᵢ/C₀ᵢ)×Qᵢ；Cᵢ=实测浓度(mg/L)，Qᵢ=废水排放量(m³/d)\n- **等标污染负荷（废气）**：Pᵢ = (Cᵢ/C₀ᵢ)×qᵢ；qᵢ=废气介质排放流量(m³/d)\n- **污染负荷比**：Kⱼ = Pⱼ/Pₜ×100%，累计>80%的污染源为主要污染源\n- **人口预测**：算术级数法Nₜ=N₀+b(t-t₀)；几何级数法Nₜ=N₀(1+K)^(t-t₀)；指数法Nₜ=N₀·e^(K(t-t₀))\n- **能源消费弹性系数法**：β=e·α（e=0.4~1.1），Eₜ=E₀(1+β)^(t-t₀)\n- **民用耗煤量**：Eₛ=Aₛ·S\n- **最大收益期望值**：Aₙ=max(∑Pᵢaᵢ)；最小机会损失期望值：Aₙ=min(∑PᵢOᵢ)\n- **折衷效益值**：Cᵢ=α·max{aᵢ}+(1-α)·min{aᵢ}（α=乐观系数）\n- **后悔值**：某状态下最大效益值与各方案效益值之差；选各方案最大后悔值中最小者\n\n#### 三、重要案例 / 实验 / 例题\n\n- **例4-1（风险型决策）**：某厂开发环保产品，三种市场状态P₁=0.4/P₂=0.5/P₃=0.1，三方案；最大收益期望值选A₂(=64)，最小机会损失亦选A₂(=8)\n- **例4-2（不确定型决策）**：五方案四状态——乐观选A₂(max=9)、悲观选A₁(max of min=4)、折衷(α=0.45)选A₁(C=5.35)、后悔值选A₄(最小最大后悔值=2)\n- **例4-3（防噪耳机生产）**：5种日产量×5种销售量——小中取大选A₁、大中取大选A₅、等可能性选A₄(2400)、最小机会损失选A₃\n- **石家庄污染源动态管理系统**：EMIS实例\n- **云南省地质环境管理信息系统**：含地质灾害、地下水、矿山地质环境等业务管理\n- **中国环境信息网络**：1个国家中心+23个省级中心+110个城市中心\n\n#### 四、高频考点（速记）\n\n1. **环境现状调查三方法**：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n2. **环境现状调查六内容**：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n3. **环境评价四方面**：自然环境、社会经济、环境质量、污染源评价\n4. **自然环境评价八法**：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n5. **污染源评价三法**：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n6. **环境统计指标体系七子系统**：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n7. **环境统计三研究法**：大量观察法、综合分析法、归纳推断法\n8. **环境预测分类**：按内容（区域/行业/专题）、按作用（定性/定量/定时/定比/评价）、按时间（短期<5/中期5~15/长期20年）\n9. **定性预测四法**：专家会议法、德尔菲法、主观概率法、层次分析法\n10. **定量预测三法**：时间序列法、逻辑型规律法（S规律）、数学模型法\n11. **决策分类**：确定型vs非确定型（风险型—概率已知；不确定型—概率未知）\n12. **决策三要素**：自然状态（不可控）、策略（可控）、益损值\n13. **不确定型决策五准则**：等可能性(1/n)、乐观(大中取大)、悲观(小中取大/Wald)、折衷(α系数)、后悔值(最小最大/Savage)\n14. **决策六原则**：信息快准全、预测未来、可行性、系统性、对比优选、集团决策\n15. **环境审计七内容**：符合性、环保管理系统、过渡、有害物质处理存放清理、污染预防、环境效益、产品审计\n16. **EMIS四功能**：查询检索、空间分析+模型加工、决策支持、降低成本提高效益\n17. **EDSS五组成**：数据库、模型库、知识库、人机交互界面、决策分析模块\n18. **EMIS设计四阶段**：可行性研究→系统分析→系统设计→实施与评价\n19. **EMIS设计七原则**：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境现状调查三种方法优缺点？ 答：①收集资料法—范围广省人力但仅二手不全面；②现场调查法—第一手数据但工作量大受条件限；③遥感法—远距离综合探测技术要求高\n- [x] 题：等标污染负荷法如何确定主要污染源？ 答：按等标污染负荷排序，计算累计百分比，累计>80%的污染源为主要污染源\n- [x] 题：乐观准则vs悲观准则vs折衷准则？ 答：乐观=大中取大（冒险）；悲观=小中取大（保守/Wald准则）；折衷=α·max+(1-α)·min（α=0为悲观，α=1为乐观）\n- [x] 题：风险型决策与不确定型决策区别？ 答：风险型—各自然状态概率可预先估计计算；不确定型—各状态概率一无所知，靠主观倾向决策\n- [x] 题：EMIS与EDSS区别？ 答：EMIS侧重信息存储检索和模型加工，是数据库+应用软件系统；EDSS侧重对结构化/未结构化问题提供决策支持，含数据库+模型库+知识库+决策分析模块\n\n#### 六、与前后章之关联\n\n- 承前章：第0/2章奠定基本概念和理论基础（环境容量、环境承载力、可持续发展等），本章提供具体分析方法工具\n- 启后章：第5章环境规划基本内容和程序将运用本章的调查、评价、预测、决策方法；第7章清洁生产审计是环境审计的深入展开\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第4章<br/>环境规划与管理的综合分析方法))\n    核心概念\n      环境现状调查\n      环境评价\n      等标污染负荷\n      环境统计\n      环境预测\n      决策\n      环境审计\n      EMIS\n      EDSS\n      德尔菲法\n      层次分析法（AHP）\n art LR\n    A[\"环境现状调查\"] --> B[\"环境质量评价\"]\n    B --> C[\"环境预测 (趋势/情景/模型)\"]\n    C --> D[\"承载力与容量分析\"]\n    D --> E[\"费用效益/多目标决策\"]\n    E --> F[\"方案优选\"]\n```\n\n#### 例题 4-1（名词解释）\n**题**：什么是环境承载力？什么是环境容量？\n**参考答案**：\n- **环境承载力**：在一定时期和区域，环境系统在维持其结构功能不被破坏的前提下，所能**承受人类社会经济活动的阈值**（综合、相对）。\n- **环境容量**：在满足环境目标值（标准）的前提下，区域环境所能容纳某种污染物的**最大允许排放量**。前者综合、宏观，后者针对具体污染物、可量化。\n\n#### 例题 4-2（计算 · 水环境容量·零维稀释）\n**题**：某河段流量 $Q=10\\ \\mathrm{m^3/s}$，上游本底浓度 $C_0=2\\ \\mathrm{mg/L}$，水质目标 $C_s=5\\ \\mathrm{mg/L}$（COD，暂不计降解）。求该河段对 COD 的最大允许排放量（容量，$\\mathrm{kg/d}$）。\n**解**：\n1. 单位换算：$Q=10\\ \\mathrm{m^3/s}=10\\times86400=8.64\\times10^{5}\\ \\mathrm{m^3/d}$。\n2. 可利用浓度增量 $\\Delta C=C_s-C_0=3\\ \\mathrm{mg/L}=3\\ \\mathrm{g/m^3}$。\n3. 环境容量 $W=Q\\cdot\\Delta C=8.64\\times10^{5}\\times3=2.592\\times10^{6}\\ \\mathrm{g/d}\\approx 2592\\ \\mathrm{kg/d}$。\n\n$$\\boxed{W=Q(C_s-C_0)\\approx 2.59\\times10^{3}\\ \\mathrm{kg/d}}$$\n\n#### 例题 4-3（计算 · 费用效益）\n**题**：某治理方案投资现值 $C=800\\ \\mathrm{万元}$，预期环境效益现值 $B=1200\\ \\mathrm{万元}$。求效益费用比并判断经济可行性。\n**解**：$\\dfrac{B}{C}=\\dfrac{1200}{800}=1.5>1$，效益大于费用，**经济可行**。\n\n$$\\boxed{B/C=1.5>1\\ \\Rightarrow\\ \\text{方案经济上可行}}$$\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境现状调查？\n\n<details><summary>参考答案<\/summary>\n\n掌握和了解某区域环境现状，发现和识别主要环境问题，确定主要污染源和主要污染物，为环境规划与管理的制定和实施创造条件\n\n<\/details>\n\n**Q2（名词解释）** 环境评价？\n\n<details><summary>参考答案<\/summary>\n\n对被评价对象的优劣、好坏作定量或定性描述，一般以定量为主；含自然环境评价、社会经济评价、环境质量评价和污染源评价4方面\n\n<\/details>\n\n**Q3（名词解释）** 等标污染负荷？\n\n<details><summary>参考答案<\/summary>\n\n将不同种类、不同量纲的污染物排放量标准化处理的方法，Pᵢ=Cᵢ/C₀ᵢ×Qᵢ\n\n<\/details>\n\n**Q4（名词解释）** 环境统计？\n\n<details><summary>参考答案<\/summary>\n\n用数字反映并计量人类活动引起的环境变化；指标体系含7个子系统\n\n<\/details>\n\n**Q5（名词解释）** 环境预测？\n\n<details><summary>参考答案<\/summary>\n\n借助数学、计算理论和信息处理技术，对未来环境质量变化趋势进行定性和定量分析；预测是决策的基础\n\n<\/details>\n\n**Q6（名词解释）** 决策？\n\n<details><summary>参考答案<\/summary>\n\n从若干可能策略中选取最好策略的过程；具有多目标性、长期性、不确定性、方案多样性、一次性等特点\n\n<\/details>\n\n**Q7（名词解释）** 环境审计？\n\n<details><summary>参考答案<\/summary>\n\n对特定项目环保情况进行系统的、有文字记录的、定期的、客观的评定\n\n<\/details>\n\n**Q8（名词解释）** EMIS？\n\n<details><summary>参考答案<\/summary>\n\n以现代数据库技术为核心，实现环境信息输入输出修改删除传输检索计算等操作的技术工程系统\n\n<\/details>\n\n**Q9（名词解释）** EDSS？\n\n<details><summary>参考答案<\/summary>\n\n将决策支持系统引入环境规划管理决策，对结构化/未结构化问题进行描述组织，协助完成管理决策\n\n<\/details>\n\n**Q10（名词解释）** 德尔菲法？\n\n<details><summary>参考答案<\/summary>\n\n又称\"专家调查法\"，以无记名方式数轮函询征求专家意见，具不具名、反馈性、统计性特点\n\n<\/details>\n\n**Q11（名词解释）** 层次分析法（AHP）？\n\n<details><summary>参考答案<\/summary>\n\n用递阶层次结构和矩阵方程将思维过程数学化，1~9标度构造判断矩阵，求特征向量得权重\n\n<\/details>\n\n**Q12（名词解释）** 清洁生产审计？\n\n<details><summary>参考答案<\/summary>\n\n对产品生产全过程重点环节污染定量监测，找高物耗高能耗高污染原因，提出对策减少污染物产生\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：环境评价四方面：自然环境、社会经济、环境质量、污染源评价\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境评价四方面：自然环境、社会经济、环境质量、污染源评价\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：自然环境评价八法：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：自然环境评价八法：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：污染源评价三法：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：污染源评价三法：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：环境统计指标体系七子系统：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境统计指标体系七子系统：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：环境统计三研究法：大量观察法、综合分析法、归纳推断法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境统计三研究法：大量观察法、综合分析法、归纳推断法\n\n< 对照本章“高频考点 / 核心概念”作答；要点：EMIS设计四阶段：可行性研究→系统分析→系统设计→实施与评价\n\n<\/details>\n\n**Q31（考点·闭卷默写）** 请展开论述：EMIS设计七原则：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：EMIS设计七原则：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- 题：环境现状调查三种方法优缺点？ 答：①收集资料法—范围广省人力但仅二手不全面；②现场调查法—第一手数据但工作量大受条件限；③遥感法—远距离综合探测技术要求高\n- 题：等标污染负荷法如何确定主要污染源？ 答：按等标污染负荷排序，计算累计百分比，累计>80%的污染源为主要污染源\n- 题：乐观准则vs悲观准则vs折衷准则？ 答：乐观=大中取大（冒险）；悲观=小中取大（保守/Wald准则）；折衷=α·max+(1-α)·min（α=0为悲观，α=1为乐观）\n- 题：风险型决策与不确定型决策区别？ 答：风险型—各自然状态概率可预先估计计算；不确定型—各状态概率一无所知，靠主观倾向决策\n- 题：EMIS与EDSS区别？ 答：EMIS侧重信息存储检索和模型加工，是数据库+应用软件系统；EDSS侧重对结构化/未结构化问题提供决策支持，含数据库+模型库+知识库+决策分析模块\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：掌握和了解某区域环境现状，发现和识别主要环境问题，确定主要污染源和主要污染物，为环境规划与管理的制定和实施创造条件\n  - <details><summary>答案<\/summary> 环境现状调查 <\/details>\n- ____：对被评价对象的优劣、好坏作定量或定性描述，一般以定量为主；含自然环境评价、社会经济评价、环境质量评价和污染源评价4方面\n  - <details><summary>答案<\/summary> 环境评价 <\/details>\n- ____：将不同种类、不同量纲的污染物排放量标准化处理的方法，Pᵢ=Cᵢ/C₀ᵢ×Qᵢ\n  - <details><summary>答案<\/summary> 等标污染负荷 <\/details>\n- ____：用数字反映并计量人类活动引起的环境变化；指标体系含7个子系统\n  - <details><summary>答案<\/summary> 环境统计 <\/details>\n- ____：借助数学、计算理论和信息处理技术，对未来环境质量变化趋势进行定性和定量分析；预测是决策的基础\n  - <details><summary>答案<\/summary> 环境预测 <\/details>\n- ____：从若干可能策略中选取最好策略的过程；具有多目标性、长期性、不确定性、方案多样性、一次性等特点\n  - <details><summary>答案<\/summary> 决策 <\/details>\n- ____：对特定项目环保情况进行系统的、有文字记录的、定期的、客观的评定\n  - <details><summary>答案<\/summary> 环境审计 <\/details>\n- ____：以现代数据库技术为核心，实现环境信息输入输出修改删除传输检索计算等操作的技术工程系统\n  - <details><summary>答案<\/summary> EMIS <\/details>\n- ____：将决策支持系统引入环境规划管理决策，对结构化/未结构化问题进行描述组织，协助完成管理决策\n  - <details><summary>答案<\/summary> EDSS <\/details>\n- ____：又称\"专家调查法\"，以无记名方式数轮函询征求专家意见，具不具名、反馈性、统计性特点\n  - <details><summary>答案<\/summary> 德尔菲法 <\/details>\n- ____：用递阶层次结构和矩阵方程将思维过程数学化，1~9标度构造判断矩阵，求特征向量得权重\n  - <details><summary>答案<\/summary> 层次分析法（AHP） <\/details>\n- ____：对产品生产全过程重点环节污染定量监测，找高物耗高能耗高污染原因，提出对策减少污染物产生\n  - <details><summary>答 4_p115.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p115.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p117.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p117.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p119.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p119.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p121.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p121.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p124.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p124.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p126.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p126.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p128.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p128.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p130.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p130.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p133.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p133.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L14_p135.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L14_p135.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-5", "group": "章节精讲", "title": "第5章 · 环境规划的基本内容和程序", "md": "# 第5章 · 环境规划的基本内容和程序\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · LLM 协填\n\n#### 一、核心概念\n\n- **环境现状调查**：调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*\n- **环境现状调查方法**：收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*\n- **环境评价**：对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n- **等标污染负荷法**：以污染物排放量除以其评价标准 Pᵢ=Qᵢ/C₀ᵢ，识别主要污染源与主要污染物。  *（要：按 P 值大小排序）*\n- **环境统计**：用统计方法收集、整理、分析环境数据，反映环境状况与保护工作的活动。  *（要：有固定的指标体系与上报流程）*\n- **社会经济预测**：对人口、经济发展、能源消耗等进行预测（弹性系数法、回归分析法、灰色预测）。  *（要：规划情景设定的依据）*\n- **环境预测**：把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n- **德尔菲法**：匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n- **决策分析**：在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n- **环境审计**：对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n- **环境管理信息系统（EMIS）与环境决策支持系统（EDSS）**：对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Pᵢ = Qᵢ / C₀ᵢ` | 等标污染负荷，Qᵢ 为排放量，C₀ᵢ 为评价标准 |\n| `E = Σ Pⱼ·Vᵢⱼ` | 风险型决策的期望值准则 |\n| `C = α·max + (1−α)·min` | 非确定型决策折衷准则，α 为乐观系数 |\n| `min(max 后悔值)` | 后悔值（最小机会损失）准则 |\n\n#### 三、重要案例 / 例题\n\n- 例 4-1：用期望值准则在多个环保产品方案中选最优。\n- 例 4-2：对同一效益矩阵分别用乐观、悲观、等可能、折衷准则决策并比较。\n- 例 4-3：防噪耳机产量决策，构建收益矩阵与机会损失（后悔值）矩阵。\n\n#### 四、高频考点（速记）\n\n1. 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n2. 等标污染负荷法识别主要污染源与污染物\n3. 环境统计的内容与指标体系\n4. 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n5. 环境预测的定性与定量方法\n6. 德尔菲法的特点与步骤\n7. 五种非确定型决策准则及计算\n8. 环境审计的内容与方法\n9. EMIS 与 EDSS 的功能与组成\n\n#### 五、思考题 / 自测\n\n- **Q**：等标污染负荷法如何确定主要污染源？\n  **A**：分别计算各源各污染物的等标污染负荷 Pᵢ=Qᵢ/C₀ᵢ 并求和，按 P 值大小排序，累计贡献大者即为主要污染源或主要污染物。\n\n- **Q**：德尔菲法相比一般专家会议有何优点？\n  **A**：匿名可避免权威与从众影响，多轮函询与反馈使专家意见逐步收敛，结果更客观可靠。\n\n- **Q**：乐观、悲观、折衷准则的决策思想有何差异？\n  **A**：乐观（大中取大）取各方案最大收益再取最大；悲观（小中取大）取各方案最小收益再取最大；折衷用乐观系数 α 对二者加权。\n\n\n#### 六、与前后章之关联\n\n- **承前**：在前章环境规划基本概念与程序的基础上提供技术支撑。\n- **启后**：调查、预测、决策、审计等方法直接服务于第 6 章各环境要素规划与第 7 章管理模式。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第5章<br/>环境规划的基本内容和程序))\n    核心概念\n      环境现状调查\n      环境现状调查方法\n      环境评价\n      等标污染负荷法\n      环境统计\n      社会经济预测\n      环境预测\n      德尔菲法\n      决策分析\n      环境审计\n      环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n    关键公式 / 模型\n      Pᵢ = Qᵢ / C₀ᵢ\n      E = Σ Pⱼ·Vᵢⱼ\n      C = α·max + （1−α）·min\n      min（max 后悔值）\n    高频考点\n      环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n      等标污染负荷法识别主要污染源与污染物\n      环境统计的内容与指标体系\n      社会经济预测方法（人口、能源弹性系数/回归/灰色）\n      环境预测的定性与定量方法\n      德尔菲法的特点与步骤\n      五种非确定型决策准则及计算\n      环境审计的内容与方法\n      EMIS 与 EDSS 的功能与组成\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L10_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L10_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L10_p026.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L10_p026.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L10_p052.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L10_p052.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L11_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L11_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L11_p043.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L11_p043.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L11_p086.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L11_p086.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 程序示意 · 环境规划编制流程\n\n```mermaid\nflowchart TD\n    A[\"1 现状调查与评价\"] --> B[\"2 环境预测\"]\n    B --> C[\"3 确定规划目标与指标体系\"]\n    C --> D[\"4 环境功能区划\"]\n    D --> E[\"5 环境容量测算与总量分配\"]\n    E --> F[\"6 方案设计与优选\"]\n    F --> G[\"7 规划实施、监督与考核\"]\n```\n\n#### 例题 5-1（简答）\n**题**：环境规划的目标指标体系一般包含哪几类指标？\n**参考答案**：① **环境质量指标**（大气、水、声、土壤达标率）；② **污染物总量控制指标**（COD、氨氮、SO₂、NOₓ 排放总量）；③ **环境治理/建设指标**（污水处理率、垃圾无害化率、绿化覆盖率）；④ **相关社会经济指标**（万元 GDP 能耗/排放强度）。\n\n#### 例题 5-2（计算 · 总量分配·等比例削减）\n**题**：区域 COD 现状排放 $1.0\\times10^{4}\\ \\mathrm{t/a}$，环境容量（允许排放）$=0.8\\times10^{4}\\ \\mathrm{t/a}$。求需削减总量与削减率；若按等比例分配，某企业现排 $500\\ \\mathrm{t/a}$ 应削减多少？\n**解**：\n1. 需削减 $=1.0\\times10^{4}-0.8\\times10^{4}=2.0\\times10^{3}\\ \\mathrm{t/a}$；削减率 $=\\dfrac{2000}{10000}=20\\%$。\n2. 企业削减 $=500\\times20\\%=100\\ \\mathrm{t/a}$，分配后允许排放 $400\\ \\mathrm{t/a}$。\n\n$$\\boxed{削减率 20\\%;\\ 该企业削减 100\\ \\mathrm{t/a}\\to 允许 400\\ \\mathrm{t/a}}$$\n\n#### 例题 5-3（名词解释）\n**题**：什么是环境功能区划？意义何在？\n**参考答案**：根据区域的**自然条件、环境容量、社会经济功能与保护目标**，将区域划分为不同**环境功能区**（如大气一类/二类区、地表水 I–V 类水域、声环境功能区），分别执行**不同的环境质量标准与管理要求**。意义：实现**分区分类、差别化管理**，是总量分配与排污许可的空间依据。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境现状调查？\n\n<details><summary>参考答案<\/summary>\n\n调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*\n\n<\/details>\n\n**Q2（名词解释）** 环境现状调查方法？\n\n<details><summary>参考答案<\/summary>\n\n收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*\n\n<\/details>\n\n**Q3（名词解释）** 环境评价？\n\n<details><summary>参考答案<\/summary>\n\n对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n\n<\/details>\n\n**Q4（名词解释）** 等标污染负荷法？\n\n<details><summary>参考答案<\/summary>\n\n以污染物排放量除以其评价标准 Pᵢ=Qᵢ/C₀ᵢ，识别主要污染源与主要污染物。  *（要：按 P 值大小排序）*\n\n<\/details>\n\n**Q5（名词解释）** 环境统计？\n\n<details><summary>参考答案<\/summary>\n\n用统计方法收集、整理、分析环境数据，反映环境状况与保护工作的活动。  *（要：有固定的指标体系与上报流程）*\n\n<\/details>\n\n**Q6（名词解释）** 社会经济预测？\n\n<details><summary>参考答案<\/summary>\n\n对人口、经济发展、能源消耗等进行预测（弹性系数法、回归分析法、灰色预测）。  *（要：规划情景设定的依据）*\n\n<\/details>\n\n**Q7（名词解释）** 环境预测？\n\n<details><summary>参考答案<\/summary>\n\n把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n\n<\/details>\n\n**Q8（名词解释）** 德尔菲法？\n\n<details><summary>参考答案<\/summary>\n\n匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n\n<\/details>\n\n**Q9（名词解释）** 决策分析？\n\n<details><summary>参考答案<\/summary>\n\n在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n\n<\/details>\n\n**Q10（名词解释）** 环境审计？\n\n<details><summary>参考答案<\/summary>\n\n对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n\n<\/details>\n\n**Q11（名词解释）** 环境管理信息系统（EMIS）与环境决策支持系统（EDSS）？\n\n<details><summary>参考答案<\/summary>\n\n对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：等标污染负荷法识别主要污染源与污染物\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：等标污染负荷法识别主要污染源与污染物\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：环境统计的内容与指标体系\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境统计的内容与指标体系\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：社会经济预测方法（人口、能源弹性系数/回归/灰色）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：社会经济预测方法（人口、能源弹性系数/回归/灰色）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：环境预测的定性与定量方法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境预测的定性与定量方法\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：德尔菲法的特点与步骤\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：德尔菲法的特点与步骤\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：五种非确定型决策准则及计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：五种非确定型决策准则及计算\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：环境审计的内容与方法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境审计的内容与方法\n\n<\/details>\n\n**Q20（考点·闭卷默写）** 请展开论述：EMIS 与 EDSS 的功能与组成\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：EMIS 与 EDSS 的功能与组成\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：等标污染负荷法如何确定主要污染源？\n  **A**：分别计算各源各污染物的等标污染负荷 Pᵢ=Qᵢ/C₀ᵢ 并求和，按 P 值大小排序，累计贡献大者即为主要污染源或主要污染物。\n\n- **Q**：德尔菲法相比一般专家会议有何优点？\n  **A**：匿名可避免权威与从众影响，多轮函询与反馈使专家意见逐步收敛，结果更客观可靠。\n\n- **Q**：乐观、悲观、折衷准则的决策思想有何差异？\n  **A**：乐观（大中取大）取各方案最大收益再取最大；悲观（小中取大）取各方案最小收益再取最大；折衷用乐观系数 α 对二者加权。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*\n  - <details><summary>答案<\/summary> 环境现状调查 <\/details>\n- ____：收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*\n n- **大气污染物总量控制（A 值法/P 值法）**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n- **水环境功能区划**：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n- **水环境容量**：在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n- **水污染物预测**：用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n- **固体废物管理规划**：以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n- **生态环境规划**：以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `A 值法 / P 值法` | 大气污染物总量控制的两种分配方法 |\n| `W = Q(C_s − C₀) + 自净量` | 水环境容量（稀释+自净）的基本构成 |\n| `Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D` | 河流 BOD 衰减与溶解氧亏缺耦合模型 |\n| `三化原则（减量化/资源化/无害化）` | 固体废物管理的核心目标 |\n\n#### 三、重要案例 / 例题\n\n- 某区域大气污染物允许排放总量的分配。\n- 河流允许纳污量（水环境容量）计算。\n- 城市生活垃圾按三化原则的处理处置规划。\n\n#### 四、高频考点（速记）\n\n1. 大气环境规划的内容与类型\n2. 大气污染物总量控制方法（A 值/P 值）\n3. 水环境功能区划与水环境容量概念及计算\n4. 水污染控制规划方法与 S-P 模型\n5. 固体废物管理三化原则及规划内容\n6. 生态环境规划的内容与生态适宜度分析\n7. 各要素规划共同的调查—评价—预测—目标—措施程序\n\n#### 五、思考题 / 自测\n\n- **Q**：什么是环境容量？在规划中起何作用？\n  **A**：环境容量是在满足环境质量目标前提下区域（水/大气）所能容纳污染物的最大允许量，是确定允许排放总量、实施总量控制与分配的依据。\n\n- **Q**：固体废物管理的三化原则指什么？\n  **A**：减量化（源头减少产生）、资源化（回收利用）、无害化（安全处置），是固废规划的核心目标。\n\n- **Q**：大气总量控制 A 值法与 P 值法有何区别？\n  **A**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单个污染源的允许排放率（与烟囱高度等有关）自下而上控制。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 5 章调查、预测、决策与容量计算等技术方法。\n- **启后**：各要素规划的落实需第 7 章环境管理模式（总量控制、清洁生产）来保障。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第6章<br/>环境规划 要素规划))\n    核心概念\n      大气环境规划\n      大气污染物总量控制（A 值法/P 值法）\n      水环境功能区划\n      水环境容量\n      水污染物预测\n      固体废物管理规划\n      生态环境规划\n    关键公式 / 模型\n      A 值法 / P 值法\n      W = Q（C_s − C₀） + 自净量\n      Streeter-Phelps：dL/dt=−k₁L, dD/dt…\n      三化原则（减量化/资源化/无害化）\n    高频考点\n      大气环境规划的内容与类型\n      大气污染物总量控制方法（A 值/P 值）\n      水环境功能区划与水环境容量概念及计算\n      水污染控制规划方法与 S-P 模型\n      固体废物管理三化原则及规划内容\n      生态环境规划的内容与生态适宜度分析\n      各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L08_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L08_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L08_p027.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L08_p027.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L08_p053.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L08_p053.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p040.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p078.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p078.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 流程示意 · 要素环境规划\n\n```mermaid\nflowchart LR\n    A[\"划定环境功能区<br/>定水质/空气目标 Cs\"] --> B[\"核算环境容量<br/>W=f(Q,Cs,本底)\"]\n    B --> C[\"总量分配到排污口<br/>公平/效率\"]\n    C --> D[\"核发排污许可<br/>预留安全余量\"]\n```\n\n#### 例题 6-1（计算 · 大气环境容量 · 箱模型）\n**题**：某规划区面积 $S=100\\ \\mathrm{km^2}$（迎风边长 $W=10\\ \\mathrm{km}$），混合层高 $H=1000\\ \\mathrm{m}$，平均风速 $u=3\\ \\mathrm{m/s}$，$\\mathrm{SO_2}$ 质量目标 $C_s=0.06\\ \\mathrm{mg/m^3}$，本底 $C_0\\approx0$。估算 $\\mathrm{SO_2}$ 大气环境容量（允许排放量，$\\mathrm{t/d}$）。\n**解**：\n1. 通风流量 $Qf=u\\,H\\,W=3\\times1000\\times10^{4}=3\\times10^{7}\\ \\mathrm{m^3/s}$。\n2. 允许排放速率 $=(C_s-C_0)\\,Qf=0.06\\times3\\times10^{7}=1.8\\times10^{6}\\ \\mathrm{mg/s}$。\n3. 换算每日：$1.8\\times10^{6}\\times86400=1.56\\times10^{11}\\ \\mathrm{mg/d}\\approx155\\ \\mathrm{t/d}$。\n\n$$\\boxed{W_a=(C_s-C_0)\\,uHW\\approx1.6\\times10^{2}\\ \\mathrm{t/d}}$$\n\n#### 例题 6-2（简答 · 水环境要素规划）\n**题**：水环境规划如何确定纳污能力并完成排放分配？\n**参考答案**：① 划定水环境功能区（I–V 类），确定各区水质目标 $C_s$；② 用河流稀释/自净模型（零维 $W=Q(C_s-C_0)$ 或 S–P 模型）核算环境容量；③ 按总量控制将容量分配到各排污口（兼顾公平与效率），核发排污许可；④ 预留安全余量，动态校核。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 大气环境规划？\n\n<details><summary>参考答案<\/summary>\n\n在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n\n<\/details>\n\n**Q2（名词解释）** 大气污染物总量控制（A 值法/P 值法）？\n\n<details><summary>参考答案<\/summary>\n\nA 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n\n<\/details>\n\n**Q3（名词解释）** 水环境功能区划？\n\n<details><summary>参考答案<\/summary>\n\n按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n\n<\/details>\n\n**Q4（名词解释）** 水环境容量？\n\n<details><summary>参考答案<\/summary>\n\n在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n\n<\/details>\n\n**Q5（名词解释）** 水污染物预测？\n\n<details><summary>参考答案<\/summary>\n\n用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n\n<\/details>\n\n**Q6（名词解释）** 固体废物管理规划？\n\n<details><summary>参考答案<\/summary>\n\n以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n\n<\/details>\n\n**Q7（名词解释）** 生态环境规划？\n\n<details><summary>参考答案<\/summary>\n\n以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：大气环境规划的内容与类型\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：大气环境规划的内容与类型\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：大气污染物总量控制方法（A 值/P 值）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：大气污染物总量控制方法（A 值/P 值）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：水环境功能区划与水环境容量概念及计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：水环境功能区划与水环境容量概念及计算\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：水污染控制规划方法与 S-P 模型\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：水污染控制规划方法与 S-P 模型\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：固体废物管理三化原则及规划内容\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：固体废物管理三化原则及规划内容\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：生态环境规划的内容与生态适宜度分析\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态环境规划的内容与生态适宜度分析\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：各要素规划共同的调查—评价—预测—目标—措施程序\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：各要素规划共同的调查—评价—预测—目标—措施程序\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：什么是环境容量？在规划中起何作用？\n  **A**：环境容量是在满足环境质量目标前提下区域（水/大气）所能容纳污染物的最大允许量，是确定允许排放总量、实施总量控制与分配的依据。\n\n- **Q**：固体废物管理的三化原则指什么？\n  **A**：减量化（源头减少产生）、资源化（回收利用）、无害化（安全处置），是固废规划的核心目标。\n\n- **Q**：大气总量控制 A 值法与 P 值法有何区别？\n  **A**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单个污染源的允许排放率（与烟囱高度等有关）自下而上控制。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n  - <details><summary>答案<\/summary> 大气环境规划 <\/details>\n- ____：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n  - <details><summary>答案<\/summary> 大气污染物总量控制（A 值法/P 值法） <\/details>\n- ____：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n  - <details><summary>答案<\/summary> 水环境功能区划 <\/details>\n- ____：在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n  - <details><summary>答案<\/summary> 水环境容量 <\/details>\n- ____：用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n  - <details><summary>答案<\/summary> 水污染物预测 <\/details>\n- ____：以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n  - <details><summary>答案<\/summary> 固体废物管理规划 <\/details>\n- ____：以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n  - <details><summary>答案<\/summary> 生态环境规划 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 120 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L08_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L08_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L08_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L08_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L08_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L08_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L08_p005.jpg\" tar jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p098.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p100.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p100.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p101.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p101.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p103.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p103.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p105.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p105.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p107.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p107.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p109.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p109.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p111.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p111.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p113.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p113.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L09_p115.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L09_p115.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-7", "group": "章节精讲", "title": "第7章 · 环境管理模式", "md": "# 第7章 · 环境管理模式\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · LLM 协填\n\n#### 一、核心概念\n\n- **末端控制（传统管理模式）**：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n- **末端控制的弊端**：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n- **污染预防（现代管理模式）**：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n- **源削减**：在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n- **循环经济**：遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n- **产品生态设计（绿色设计/生命周期设计）**：在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n- **清洁生产**：对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n- **清洁生产审计**：系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n- **环境绩效与环境绩效审计**：对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `3R 原则（Reduce/Reuse/Recycle）` | 循环经济减量化、再利用、再循环 |\n| `清洁生产审计程序` | 筹划组织→预评估→评估→方案产生与筛选→实施→持续改进 |\n| `生命周期评价（LCA）` | 对产品全生命周期的资源消耗与环境影响进行评价 |\n\n#### 三、重要案例 / 例题\n\n- 某企业清洁生产审计削减物耗、能耗与污染物排放。\n- 生态工业园（循环经济园区）内企业间的物质循环利用。\n- 产品生态设计降低产品全生命周期的资源消耗与排放。\n\n#### 四、高频考点（速记）\n\n1. 末端控制模式的建立、实践与弊端\n2. 污染预防模式的内涵与优势（对比末端控制）\n3. 源削减的途径\n4. 循环经济 3R 原则\n5. 产品生态设计与生命周期思想\n6. 清洁生产的定义与清洁生产审计程序\n7. 环境绩效审计的内容\n8. 两种管理模式的根本区别（被动治理 vs 主动预防）\n\n#### 五、思考题 / 自测\n\n- **Q**：末端控制与污染预防的根本区别是什么？\n  **A**：末端控制在污染产生后被动治理（先污染后治理）；污染预防从源头与全过程主动减少污染产生（预防为主），后者更经济高效且能避免污染转移。\n\n- **Q**：循环经济的 3R 原则指什么？\n  **A**：减量化（Reduce）、再利用（Reuse）、再循环（Recycle），实现资源高效利用与物质闭路循环。\n\n- **Q**：清洁生产审计的核心目的是什么？\n  **A**：通过系统审查生产全过程，识别物耗能耗高、污染重的环节，提出并实施削减方案，实现源头预防与生态效率提升。\n\n\n#### 六、与前后章之关联\n\n- **承前**：是第 5 章决策/审计方法与第 6 章要素规划在管理制度层面的落实。\n- **启后**：全书收尾，构建规划—实施—绩效—持续改进的环境管理闭环。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第7章<br/>环境管理模式))\n    核心概念\n      末端控制（传统管理模式）\n      末端控制的弊端\n      污染预防（现代管理模式）\n      源削减\n      循环经济\n      产品生态设计（绿色设计/生命周期设计）\n      清洁生产\n      清洁生产审计\n      环境绩效与环境绩效审计\n    关键公式 / 模型\n      3R 原则（Reduce/Reuse/Recycle）\n      清洁生产审计程序\n      生命周期评价（LCA）\n    高频考点\n      末端控制模式的建立、实践与弊端\n      污染预防模式的内涵与优势（对比末端控制）\n      源削减的途径\n      循环经济 3R 原则\n      产品生态设计与生命周期思想\n      清洁生产的定义与清洁生产审计程序\n      环境绩效审计的内容\n      两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L07_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L07_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L07_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L07_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L07_p037.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L07_p037.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L07_p054.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L07_p054.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L07_p072.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L07_p072.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L07_p090.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L07_p090.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 体系示意 · 管理手段组合\n\n```mermaid\ngraph TD\n    R[\"环境管理手段\"] --> A[\"命令控制<br/>标准·许可·限期治理\"]\n    R --> B[\"经济激励<br/>环境税·排污权交易·补贴\"]\n    R --> C[\"公众参与<br/>信息公开·公益诉讼·环境标志\"]\n    A --> D[\"刚性强、见效快、成本高\"]\n    B --> E[\"灵活、激励减排、需市场配套\"]\n    C --> F[\"监督社会化、提升合法性\"]\n```\n\n#### 例题 6-1（案例分析 · 排污权交易）\n**题**：A 企业减排边际成本 $200\\ \\mathrm{元/t}$，B 企业 $600\\ \\mathrm{元/t}$。区域需再削减 COD $100\\ \\mathrm{t}$。比较\"平均分摊\"与\"排污权交易\"两种方式的总成本。\n**参考答案**：\n- **平均分摊**（各减 $50\\ \\mathrm{t}$）：$200\\times50+600\\times50=10000+30000=4.0\\times10^{4}\\ \\mathrm{元}$。\n- **交易**：由**低成本的 A 企业多减**（A 减 $100\\ \\mathrm{t}$），总成本 $200\\times100=2.0\\times10^{4}\\ \\mathrm{元}$；B 向 A 购买配额，双方与社会均获益。\n- 结论：排污权交易使减排在**边际成本最低处**完成，**总治理成本最省**，体现经济激励手段的效率优势。\n\n$$\\boxed{交易方式总成本 2.0\\times10^{4}\\ \\mathrm{元} < 平均分摊 4.0\\times10^{4}\\ \\mathrm{元}}$$\n\n#### 例题 6-2（简答）\n**题**：简述\"三同时\"制度与排污许可制度在环境管理中的作用。\n**参考答案**：\n- **三同时**：建设项目防治污染设施与主体工程**同时设计、施工、投产**，是**建设期**的源头预防。\n- **排污许可**：以许可证形式明确企业**允许排放的污染物种类、浓度、总量与监测要求**，是**运营期**的\"一证式\"核心管理制度，承接总量控制并衔接执法。\n\n---\n\n> **正言若反**：方案不离容量，容量不离标准，标准不离原始 PDF 课件之图表。本篇为\"算得出、议得透\"的一层；遇疑，回归「综合复习资料」与各章素材。\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 末端控制（传统管理模式）？\n\n<details><summary>参考答案<\/summary>\n\n污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n\n<\/details>\n\n**Q2（名词解释）** 末端控制的弊端？\n\n<details><summary>参考答案<\/summary>\n\n治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n\n<\/details>\n\n**Q3（名词解释）** 污染预防（现代管理模式）？\n\n<details><summary>参考答案<\/summary>\n\n从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n\n<\/details>\n\n**Q4（名词解释）** 源削减？\n\n<details><summary>参考答案<\/summary>\n\n在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n\n<\/details>\n\n**Q5（名词解释）** 循环经济？\n\n<details><summary>参考答案<\/summary>\n\n遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n\n<\/details>\n\n**Q6（名词解释）** 产品生态设计（绿色设计/生命周期设计）？\n\n<details><summary>参考答案<\/summary>\n\n在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n\n<\/details>\n\n**Q7（名词解释）** 清洁生产？\n\n<details><summary>参考答案<\/summary>\n\n对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n\n<\/details>\n\n**Q8（名词解释）** 清洁生产审计？\n\n<details><summary>参考答案<\/summary>\n\n系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n\n<\/details>\n\n**Q9（名词解释）** 环境绩效与环境绩效审计？\n\n<details><summary>参考答案<\/summary>\n\n对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：末端控制模式的建立、实践与弊端\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：末端控制模式的建立、实践与弊端\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：污染预防模式的内涵与优势（对比末端控制）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：污染预防模式的内涵与优势（对比末端控制）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：源削减的途径\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：源削减的途径\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：循环经济 3R 原则\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：循环经济 3R 原则\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：产品生态设计与生命周期思想\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：产品生态设计与生命周期思想\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：清洁生产的定义与清洁生产审计程序\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：清洁生产的定义与清洁生产审计程序\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：环境绩效审计的内容\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境绩效审计的内容\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：两种管理模式的根本区别（被动治理 vs 主动预防）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：两种管理模式的根本区别（被动治理 vs 主动预防）\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：末端控制与污染预防的根本区别是什么？\n  **A**：末端控制在污染产生后被动治理（先污染后治理）；污染预防从源头与全过程主动减少污染产生（预防为主），后者更经济高效且能避免污染转移。\n\n- **Q**：循环经济的 3R 原则指什么？\n  **A**：减量化（Reduce）、再利用（Reuse）、再循环（Recycle），实现资源高效利用与物质闭路循环。\n\n- **Q**：清洁生产审计的核心目的是什么？\n  **A**：通过系统审查生产全过程，识别物耗能耗高、污染重的环节，提出并实施削减方案，实现源头预防与生态效率提升。\n\n<\/details>\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n  - <details><summary>答案<\/summary> 末端控制（传统管理模式） <\/details>\n- ____：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n  - <details><summary>答案<\/summary> 末端控制的弊端 <\/details>\n- ____：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n  - <details><summary>答案<\/summary> 污染预防（现代管理模式） <\/details>\n- ____：在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n  - <details><summary>答案<\/summary> 源削减 <\/details>\n- ____：遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n  - <details><summary>答案<\/summary> 循环经济 <\/details>\n- ____：在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n  - <details><summary>答案<\/summary> 产品生态设计（绿色设计/生命周期设计） <\/details>\n- ____：对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n  - <details><summary>答案<\/summary> 清洁生产 <\/details>\n- ____：系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n  - <details><summary>答案<\/summary> 清洁生产审计 <\/details>\n- ____：对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n  - <details><summary>答案<\/summary> 环境绩效与环境绩效审计 <\/details>\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n /_第05章_环境规划的基本内容和程序.md) |\n| 6 | 环境规划 | 115 | 0 | ✓ | ✓ | [_第06章_环境规划.md](./_第06章_环境规划.md) |\n| 7 | 环境管理模式 | 106 | 0 | ✓ | ✓ | [_第07章_环境管理模式.md](./_第07章_环境管理模式.md) |\n\n## 二 · 全章综合汇编\n\n### 绪论 · 绪论-环境规划与管理\n\n> 素材：[_第00章_绪论-环境规划与管理.md](./_第00章_绪论-环境规划与管理.md) · 主版 129 页\n\n#### 一、核心概念（名词解释）\n\n- [x] **环境管理**：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n- [x] **环境规划**：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n- [x] **环境容量**：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- [x] **环境承载力**：不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n- [x] **可持续发展**：既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n- [x] **两山论**：绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] **复合生态系统**：自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n- [x] **工业生态学**：研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n- [x] **生态工业园**：制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n- [x] **环境经济学**：研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n\n#### 二、关键公式 / 模型\n\n- **环境容量**：M = K + R（K=稀释容量，R=自净容量）\n- **环境承载力**：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向\n- **环境承载力指标体系**：资源供给指标+社会影响指标+污染容纳指标\n- **帕累托最适度**：资源配置效率理论，寻求个人、集体和社会之间经济效率的协调统一\n- **计划分类模型**：按时间（长/中/短期）、约束力（指令性/指导性）、制定者层次（战略/管理/作业）、性质（综合/局部/项目）\n\n#### 三、重要案例 / 实验 / 例题\n\n- **丹麦卡伦堡生态工业园**：世界上最早最著名的生态工业园，主体企业为发电厂、炼油厂、制药厂、石膏板生产厂，通过贸易方式利用对方废弃物和副产品\n- **广西贵港国家生态工业（制糖）示范园区**：2001年8月我国第一个国家级生态工业示范园区\n- **美国生态工业园示范点**：1994年指定4个社区——巴尔的摩、查尔斯、布郎斯、恰塔努加\n- **两山论实践**：黑河（生态发展带动绿色崛起）、福建长汀（水土治理提升农民收入）、海南海口（大环保模式+海绵城市）\n- **中国总量控制历程**：1996年\"九五\"总量控制→1998年\"一控双达标\"→\"十五\"三大任务→\"十一五\"SO₂和COD控制→\"十二五\"主要污染物减排\n\n#### 四、高频考点（速记）\n\n1. **环境规划与管理五要素**：人、物、资金、信息、时空\n2. **环境管理五大手段**：行政、法律、经济、技术、宣传教育\n3. **环境规划vs环境管理关系**：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n4. **环境容量vs环境承载力**：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n5. **环境承载力三大特征**：客观性与主观性、区域性与时间性、动态性与可调控性\n6. **生态学三定律（米勒）**：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n7. **生态学六规律（陈昌笃）**：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n8. **可持续发展四原则**：协调原则、公平原则、持续原则、共同原则\n9. **可持续发展基本思想**：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n10. **复合生态系统四大矛盾**：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n11. **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论，奠定基本概念和理论基础\n- 启后章：第2章深入环境规划与管理的政策方针法律法规，第4章进入综合分析方法，第5-7章为规划与管理实务\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论-环境规划与管理\n## 核心概念\n- 环境管理\n- 环境规划\n- 环境容量\n- 环境承载力\n- 可持续发展\n- 两山论\n- 复合生态系统\n- 工业生态学\n- 生态工业园\n- 环境经济学\n## 关键公式 / 模型\n- 环境容量\n- 环境承载力\n- 环境承载力指标体系\n- 帕累托最适度\n- 计划分类模型\n## 高频考点\n- 环境规划与管理五要素：人、物、资金、信息、时空\n- 环境管理五大手段：行政、法律、经济、技术、宣传教育\n- 环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n- 环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n- 环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n- 生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n- 生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n- 可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n- 可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n- 复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n- 三种环境伦理观：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n- 工业园区三代：第一代劳动密集型→第二代高新技术→第三代生态工业园\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论-环境规划与管理))\n    核心概念\n      环境管理\n      环境规划\n      环境容量\n      环境承载力\n      可持续发展\n      两山论\n      复合生态系统\n      工业生态学\n      生态工业园\n      环境经济学\n    关键公式 / 模型\n      环境容量\n      环境承载力\n      环境承载力指标体系\n      帕累托最适度\n      计划分类模型\n    高频考点\n      环境规划与管理五要素：人、物、资金、信息、时空\n      环境管理五大手段：行政、法律、经济、技术、宣传教育\n      环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心…\n      环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社…\n      环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n      生态学三定律（米勒）：① 7. **生态学六规律（陈昌笃）**：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n8. **可持续发展四原则**：协调原则、公平原则、持续原则、共同原则\n9. **可持续发展基本思想**：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n10. **复合生态系统四大矛盾**：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n11. **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论/概述，奠定基本概念和理论基础\n- 启后章：第4章深入综合分析方法，第5-7章为规划与管理实务\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论-环境规划与管理\n## 核心概念\n- 环境管理\n- 环境规划\n- 环境容量\n- 环境承载力\n- 可持续发展\n- 两山论\n- 复合生态系统\n- 工业生态学\n- 生态工业园\n- 环境经济学\n## 关键公式 / 模型\n- 环境容量\n- 环境承载力\n- 环境承载力指标体系\n- 帕累托最适度\n- 计划分类模型\n## 高频考点\n- 环境规划与管理五要素：人、物、资金、信息、时空\n- 环境管理五大手段：行政、法律、经济、技术、宣传教育\n- 环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n- 环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n- 环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n- 生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n- 生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n- 可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n- 可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n- 复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n- 三种环境伦理观：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n- 工业园区三代：第一代劳动密集型→第二代高新技术→第三代生态工业园\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论-环境规划与管理))\n    核心概念\n      环境管理\n      环境规划\n      环境容量\n      环境承载力\n      可持续发展\n      两山论\n      复合生态系统\n      工业生态学\n      生态工业园\n      环境经济学\n    关键公式 / 模型\n      环境容量\n      环境承载力\n      环境承载力指标体系\n      帕累托最适度\n      计划分类模型\n    高频考点\n      环境规划与管理五要素：人、物、资金、信息、时空\n      环境管理五大手段：行政、法律、经济、技术、宣传教育\n      环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心…\n      环 *：5种日产量×5种销售量——小中取大选A₁、大中取大选A₅、等可能性选A₄(2400)、最小机会损失选A₃\n- **石家庄污染源动态管理系统**：EMIS实例\n- **云南省地质环境管理信息系统**：含地质灾害、地下水、矿山地质环境等业务管理\n- **中国环境信息网络**：1个国家中心+23个省级中心+110个城市中心\n\n#### 四、高频考点（速记）\n\n1. **环境现状调查三方法**：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n2. **环境现状调查六内容**：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n3. **环境评价四方面**：自然环境、社会经济、环境质量、污染源评价\n4. **自然环境评价八法**：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n5. **污染源评价三法**：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n6. **环境统计指标体系七子系统**：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n7. **环境统计三研究法**：大量观察法、综合分析法、归纳推断法\n8. **环境预测分类**：按内容（区域/行业/专题）、按作用（定性/定量/定时/定比/评价）、按时间（短期<5/中期5~15/长期20年）\n9. **定性预测四法**：专家会议法、德尔菲法、主观概率法、层次分析法\n10. **定量预测三法**：时间序列法、逻辑型规律法（S规律）、数学模型法\n11. **决策分类**：确定型vs非确定型（风险型—概率已知；不确定型—概率未知）\n12. **决策三要素**：自然状态（不可控）、策略（可控）、益损值\n13. **不确定型决策五准则**：等可能性(1/n)、乐观(大中取大)、悲观(小中取大/Wald)、折衷(α系数)、后悔值(最小最大/Savage)\n14. **决策六原则**：信息快准全、预测未来、可行性、系统性、对比优选、集团决策\n15. **环境审计七内容**：符合性、环保管理系统、过渡、有害物质处理存放清理、污染预防、环境效益、产品审计\n16. **EMIS四功能**：查询检索、空间分析+模型加工、决策支持、降低成本提高效益\n17. **EDSS五组成**：数据库、模型库、知识库、人机交互界面、决策分析模块\n18. **EMIS设计四阶段**：可行性研究→系统分析→系统设计→实施与评价\n19. **EMIS设计七原则**：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境现状调查三种方法优缺点？ 答：①收集资料法—范围广省人力但仅二手不全面；②现场调查法—第一手数据但工作量大受条件限；③遥感法—远距离综合探测技术要求高\n- [x] 题：等标污染负荷法如何确定主要污染源？ 答：按等标污染负荷排序，计算累计百分比，累计>80%的污染源为主要污染源\n- [x] 题：乐观准则vs悲观准则vs折衷准则？ 答：乐观=大中取大（冒险）；悲观=小中取大（保守/Wald准则）；折衷=α·max+(1-α)·min（α=0为悲观，α=1为乐观）\n- [x] 题：风险型决策与不确定型决策区别？ 答：风险型—各自然状态概率可预先估计计算；不确定型—各状态概率一无所知，靠主观倾向决策\n- [x] 题：EMIS与EDSS区别？ 答：EMIS侧重信息存储检索和模型加工，是数据库+应用软件系统；EDSS侧重对结构化/未结构化问题提供决策支持，含数据库+模型库+知识库+决策分析模块\n\n#### 六、与前后章之关联\n\n- 承前章：第0/2章奠定基本概念和理论基础（环境容量、环境承载力、可持续发展等），本章提供具体分析方法工具\n- 启后章：第5章环境规划基本内容和程序将运用本章的调查、评价、预测、决策方法；第7章清洁生产审计是环境审计的深入展开\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划与管理中的综合分析方法\n## 核心概念\n- 环境现状调查\n- 环境评价\n- 等标污染负荷\n- 环境统计\n- 环境预测\n- 决策\n- 环境审计\n- EMIS\n- EDSS\n- 德尔菲法\n- 层次分析法（AHP）\n- 清洁生产审计\n## 关键公式 / 模型\n- 环境质量指数\n- 等标污染负荷（废水）\n- 为规划目标设定提供依据）*\n- **等标污染负荷法**：以污染物排放量除以其评价标准 Pᵢ=Qᵢ/C₀ᵢ，识别主要污染源与主要污染物。  *（要：按 P 值大小排序）*\n- **环境统计**：用统计方法收集、整理、分析环境数据，反映环境状况与保护工作的活动。  *（要：有固定的指标体系与上报流程）*\n- **社会经济预测**：对人口、经济发展、能源消耗等进行预测（弹性系数法、回归分析法、灰色预测）。  *（要：规划情景设定的依据）*\n- **环境预测**：把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n- **德尔菲法**：匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n- **决策分析**：在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n- **环境审计**：对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n- **环境管理信息系统（EMIS）与环境决策支持系统（EDSS）**：对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Pᵢ = Qᵢ / C₀ᵢ` | 等标污染负荷，Qᵢ 为排放量，C₀ᵢ 为评价标准 |\n| `E = Σ Pⱼ·Vᵢⱼ` | 风险型决策的期望值准则 |\n| `C = α·max + (1−α)·min` | 非确定型决策折衷准则，α 为乐观系数 |\n| `min(max 后悔值)` | 后悔值（最小机会损失）准则 |\n\n#### 三、重要案例 / 例题\n\n- 例 4-1：用期望值准则在多个环保产品方案中选最优。\n- 例 4-2：对同一效益矩阵分别用乐观、悲观、等可能、折衷准则决策并比较。\n- 例 4-3：防噪耳机产量决策，构建收益矩阵与机会损失（后悔值）矩阵。\n\n#### 四、高频考点（速记）\n\n1. 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n2. 等标污染负荷法识别主要污染源与污染物\n3. 环境统计的内容与指标体系\n4. 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n5. 环境预测的定性与定量方法\n6. 德尔菲法的特点与步骤\n7. 五种非确定型决策准则及计算\n8. 环境审计的内容与方法\n9. EMIS 与 EDSS 的功能与组成\n\n#### 五、思考题 / 自测\n\n- **Q**：等标污染负荷法如何确定主要污染源？\n  **A**：分别计算各源各污染物的等标污染负荷 Pᵢ=Qᵢ/C₀ᵢ 并求和，按 P 值大小排序，累计贡献大者即为主要污染源或主要污染物。\n\n- **Q**：德尔菲法相比一般专家会议有何优点？\n  **A**：匿名可避免权威与从众影响，多轮函询与反馈使专家意见逐步收敛，结果更客观可靠。\n\n- **Q**：乐观、悲观、折衷准则的决策思想有何差异？\n  **A**：乐观（大中取大）取各方案最大收益再取最大；悲观（小中取大）取各方案最小收益再取最大；折衷用乐观系数 α 对二者加权。\n\n\n#### 六、与前后章之关联\n\n- **承前**：在前章环境规划基本概念与程序的基础上提供技术支撑。\n- **启后**：调查、预测、决策、审计等方法直接服务于第 6 章各环境要素规划与第 7 章管理模式。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划的基本内容和程序\n## 核心概念\n- 环境现状调查\n- 环境现状调查方法\n- 环境评价\n- 等标污染负荷法\n- 环境统计\n- 社会经济预测\n- 环境预测\n- 德尔菲法\n- 决策分析\n- 环境审计\n- 环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n## 关键公式 / 模型\n- Pᵢ = Qᵢ / C₀ᵢ\n- E = Σ Pⱼ·Vᵢⱼ\n- C = α·max + (1−α)·min\n- min(max 后悔值)\n## 高频考点\n- 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n- 等标污染负荷法识别主要污染源与污染物\n- 环境统计的内容与指标体系\n- 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n- 环境预测的定性与定量方法\n- 德尔菲法的特点与步骤\n- 五种非确定型决策准则及计算\n- 环境审计的内容与方法\n- EMIS 与 EDSS 的功能与组成\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境规划的基本内容和程序))\n    核心概念\n      环境现状调查\n      环境现状调查方法\n      环境评价\n      等标污染负荷法\n      环境统计\n      社会经济预测\n      环境预测\n      德尔菲法\n      决策分析\n      环境审计\n      环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n    关键公式 / 模型\n      Pᵢ = Qᵢ / C₀ᵢ\n      E = Σ Pⱼ·Vᵢⱼ\n      C = α·max + （1−α）·min\n      min（max 后悔值）\n    高频考点\n      环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n      等标污染负荷法识别主要污染源与污染物\n      环境统计的内容与指标体系\n      社会经济预测方法（人口、能源弹性系数/回归/灰色）\n      环境预测的定性与定量方法\n      德尔菲法的特点与步骤\n      五种非确定型决策准则及计算\n      环境审计的内容与方法\n      EMIS 与 EDSS 的功能与组成\n```\n\n<\/details>\n\n---\n\n### 第 6 章 · 环境规划\n\n> 素材：[_第06章_环境规划.md](./_第06章_环境规划.md) · 主版 115 页\n\n#### 一、核心概念\n\n- **大气环境规划**：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n- **大气污染物总量控制（A 值法/P 值法）**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n- **水环境功能区划**：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n- **水环境容量**：在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n- **水污染物预测**：用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n- **固体废物管理规划**：以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n- **生态环境规划**：以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `A 值法 / P 值法` | 大气污染物总量控制的两种分配方法 |\n| `W = Q(C_s − C₀) + 自净量` | 水环境容量（稀释+自净）的基本构成 |\n| `Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D` | 河流 BOD 衰减与溶解氧亏缺耦合模型 |\n| `三化原则（减量化/资源化/无害化）` | 固体废物管理的核心目标 |\n\n#### 三、重要案例 / 例题\n\n- 某区域大气污染物允许排放总量的分配。\n- 河流允许纳污量（水环境容量）计算。\n- 城市生活垃圾按三化原则的处理处置规划。\n\n#### 四、高频考点（速记）\n\n1. 大气环境规划的内容与类型\n2. 大气污染物总量控制方法（A 值/P 值）\n3. 水环境功能区划与水环境容量概念及计算\n4. 水污染控制规划方法与 S-P 模型\n5. 固体废物管理三化原则及规划内容\n6. 生态环境规划的内容与生态适宜度分析\n7. 各要素规划共同的调查—评价—预测—目标—措施程序\n\n#### 五、思考题 / 自测\n\n- **Q**：什么是环境容量？在规划中起何作用？\n  **A**：环境容量是在满足环境质量目标前提下区域（水/大气）所能容纳污染物的最大允许量，是确定允许排放总量、实施总量控制与分配的依据。\n\n- **Q**：固体废物管理的三化原则指什么？\n  **A**：减量化（源头减少产生）、资源化（回收利用）、无害化（安全处置），是固废规划的核心目标。\n\n- **Q**：大气总量控制 A 值法与 P 值法有何区别？\n  **A**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单个污染源的允许排放率（与烟囱高度等有关）自下而上控制。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 5 章调查、预测、决策与容量计算等技术方法。\n- **启后**：各要素规划的落实需第 7 章环境管理模式（总量控制、清洁生产）来保障。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划\n## 核心概念\n- 大气环境规划\n- 大气污染物总量控制（A 值法/P 值法）\n- 水环境功能区划\n- 水环境容量\n- 水污染物预测\n- 固体废物管理规划\n- 生态环境规划\n## 关键公式 / 模型\n- A 值法 / P 值法\n- W = Q(C_s − C₀) + 自净量\n- Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D\n- 三化原则（减量化/资源化/无害化）\n## 高频考点\n- 大气环境规划的内容与类型\n- 大气污染物总量控制方法（A 值/P 值）\n- 水环境功能区划与水环境容量概念及计算\n- 水污染控制规划方法与 S-P 模型\n- 固体废物管理三化原则及规划内容\n- 生态环境规划的内容与生态适宜度分析\n- 各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境规划))\n    核心概念\n      大气环境规划\n      大气污染物总量控制（A 值法/P 值法）\n      水环境功能区划\n      水环境容量\n      水污染物预测\n      固体废物管理规划\n      生态环境规划\n    关键公式 / 模型\n      A 值法 / P 值法\n      W = Q（C_s − C₀） + 自净量\n      Streeter-Phelps：dL/dt=−k₁L, dD/dt…\n      三化原则（减量化/资源化/无害化）\n    高频考点\n      大气环境规划的内容与类型\n      大气污染物总量控制方法（A 值/P 值）\n      水环境功能区划与水环境容量概念及计算\n      水污染控制规划方法与 S-P 模型\n      固体废物管理三化原则及规划内容\n      生态环境规划的内容与生态适宜度分析\n      各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n<\/details>\n\n---\n\n### 第 7 章 · 环境管理模式\n\n> 素材：[_第07章_环境管理模式.md](./_第07章_环境管理模式.md) · 主版 106 页\n\n#### 一、核心概念\n\n- **末端控制（传统管理模式）**：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n- **末端控制的弊端**：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n- **污染预防（现代管理模式）**：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n- **源削减**：在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n- **循环经济**：遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n- **产品生态设计（绿色设计/生命周期设计）**：在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n- **清洁生产**：对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n- **清洁生产审计**：系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n- **环境绩效与环境绩效审计**：对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `3R 原则（Reduce/Reuse/Recycle）` | 循环经济减量化、再利用、再循环 |\n| `清洁生产审计程序` | 筹划组织→预评估→评估→方案产生与筛选→实施→持续改进 |\n| `生命周期评价（LCA）` | 对产品全生命周期的资源消耗与环境影响进行评价 |\n\n#### 三、重要案例 / 例题\n\n- 某企业清洁生产审计削减物耗、能耗与污染物排放。\n- 生态工业园（循环经济园区）内企业间的物质循环利用。\n- 产品生态设计降低产品全生命周期的资源消耗与排放。\n\n#### 四、高频考点（速记）\n\n1. 末端控制模式的建立、实践与弊端\n2. 污染预防模式的内涵与优势（对比末端控制）\n3. 源削减的途径\n4. 循环经济 3R 原则\n5. 产品生态设计与生命周期思想\n6. 清洁生产的定义与清洁生产审计程序\n7. 环境绩效审计的内容\n8. 两种管理模式的根本区别（被动治理 vs 主动预防）\n\n#### 五、思考题 / 自测\n\n- **Q**：末端控制与污染预防的根本区别是什么？\n  **A**：末端控制在污染产生后被动治理（先污染后治理）；污染预防从源头与全过程主动减少污染产生（预防为主），后者更经济高效且能避免污染转移。\n\n- **Q**：循环经济的 3R 原则指什么？\n  **A**：减量化（Reduce）、再利用（Reuse）、再循环（Recycle），实现资源高效利用与物质闭路循环。\n\n- **Q**：清洁生产审计的核心目的是什么？\n  **A**：通过系统审查生产全过程，识别物耗能耗高、污染重的环节，提出并实施削减方案，实现源头预防与生态效率提升。\n\n\n#### 六、与前后章之关联\n\n- **承前**：是第 5 章决策/审计方法与第 6 章要素规划在管理制度层面的落实。\n- **启后**：全书收尾，构建规划—实施—绩效—持续改进的环境管理闭环。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境管理模式\n## 核心概念\n- 末端控制（传统管理模式）\n- 末端控制的弊端\n- 污染预防（现代管理模式）\n- 源削减\n- 循环经济\n- 产品生态设计（绿色设计/生命周期设计）\n- 清洁生产\n- 清洁生产审计\n- 环境绩效与环境绩效审计\n## 关键公式 / 模型\n- 3R 原则（Reduce/Reuse/Recycle）\n- 清洁生产审计程序\n- 生命周期评价（LCA）\n## 高频考点\n- 末端控制模式的建立、实践与弊端\n- 污染预防模式的内涵与优势（对比末端控制）\n- 源削减的途径\n- 循环经济 3R 原则\n- 产品生态设计与生命周期思想\n- 清洁生产的定义与清洁生产审计程序\n- 环境绩效审计的内容\n- 两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境管理模式))\n    核心概念\n      末端控制（传统管理模式）\n      末端控制的弊端\n      污染预防（现代管理模式）\n      源削减\n      循环经济\n      产品生态设计（绿色设计/生命周期设计）\n      清洁生产\n      清洁生产审计\n      环境绩效与环境绩效审计\n    关键公式 / 模型\n      3R 原则（Reduce/Reuse/Recycle）\n      清洁生产审计程序\n      生命周期评价（LCA）\n    高频考点\n      末端控制模式的建立、实践与弊端\n      污染预防模式的内涵与优势（对比末端控制）\n      源削减的途径\n      循环经济 3R 原则\n      产品生态设计与生命周期思想\n      清洁生产的定义与清洁生产审计程序\n      环境绩效审计的内容\n      两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n<\/details>\n\n---\n\n\n> **正言若反**：最终资料不离底层图像；凡疑处，复归章节素材与原始 PDF。\n> 每章之链：原始 PDF → `02_解析成果/<PDF_stem>/page_*.jpg` → 章节素材 md → 本资料。\n"}, {"id": "graph", "group": "总览资料", "title": "知识图谱 · 章节图谱", "md": "# 环境规划与管理 · .md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表\n"}, {"id": "web-01", "group": "真题与网络资源", "title": "期末真题题型与高频考点", "md": "# 环境规划与管理 · 期末真题题型与高频考点\n\n> 汇编自公开教材（郭怀成、尚金城等《环境规划学》第三版 · 高等教育出版社，2019）、自考/成考课程大纲、各校期末与考研复习资料及出题规律。\n> **说明**：本篇为**题型规律 + 高频考点梳理**，非某年真题原卷；`[规律推断]` 为据出题习惯推断，以本校考纲为准。\n\n---\n\n## 一 · 课程与教材基本信息\n\n| 项 | 内容 |\n|---|---|\n| 主流教材 | 郭怀成、尚金城、张天柱、刘永《环境规划学》（第三版，高等教育出版社，2019） |\n| 教材结构 | 全书 11 章：绪论、理论基础、规划内容、技术方法、水/大气/土壤/固废/生态/城镇环境规划、规划支持系统 |\n| 课程性质 | 环境科学/环境工程专业核心课，理论性 + 应用性并重 |\n| 考核比例 | 重点约 60%、次重点约 30%、一般约 10%（自考大纲口径，可参考） |\n\n---\n\n## 二 · 期末考试题型分布（规律）\n\n| 题型 | 分值区间 | 题量 | 备注 |\n|---|---|---|---|\n| 单项选择 / 填空 | 15–25 分 | 若干 | 基本概念与流程 |\n| 名词解释 | 15–20 分 | 5–6 题 | 概念精准 |\n| 简答题 | 25–35 分 | 5–6 题 | 占比大，分点作答 |\n| 论述题 | 15–25 分 | 1–2 题 | 体系/手段比较/联系实际 |\n| 计算/案例 | 10–20 分 | 1–2 题 | 环境容量、总量分配、费用效益 |\n\n---\n\n## 三 · 高频考点梯队\n\n### 第一梯队（几乎必考）\n\n1. 环境规划、环境管理的定义及二者关系\n2. 环境容量与环境承载力（定义、区别、影响因素）\n3. 环境规划的类型与基本内容、编制程序\n4. 环境功能区划（依据、意义、与总量控制的关系）\n5. 环境规划目标与指标体系（四类指标）\n6. 总量控制与污染物排放总量分配（等比例/按容量/按效率）\n7. 环境管理三大类手段：命令控制、经济激励、公众参与/自愿\n8. \"三同时\"制度与排污许可制度\n\n### 第二梯队（高频）\n\n9. 环境调查、环境评价、环境预测（趋势/情景/模型）\n10. 费用效益分析（B/C 判别）、多目标决策与系统分析\n11. 水环境规划（功能区→容量→分配，零维/S-P 模型思想）\n12. 大气环境规划（箱模型/A 值法思想，容量估算）\n13. 排污权交易的原理与效率优势\n14. 生态规划与生态环境承载力\n15. 环境管理体制与环境政策（环境税/费、排污收费改税）\n\n### 第三梯队（中频）\n\n16. 环境规划的理论基础（可持续发展、复合生态系统、空间结构理论）\n17. 固废与噪声污染控制规划\n18. 城镇/区域环境规划\n19. 环境规划支持系统（GIS、模型、数据库）\n20. 我国环境规划的发展历程与\"五年规划\"中的环保规划\n\n---\n\n## 四 · 典型简答/论述题清单（各校流传整理）\n\n1. 简述环境规划与环境管理的关系。\n2. 简述环境规划的基本内容与编制程序。\n3. 环境承载力与环境容量有何区别与联系？\n4. 简述环境功能区划的依据与意义。\n5. 环境规划目标指标体系包括哪几类指标？\n6. 简述环境管理的三大类手段及其代表措施与优缺点。\n7. 简述\"三同时\"制度与排污许可制度的作用。\n8. 简述总量控制的基本思路与污染物分配方法。\n9. 简述费用效益分析在方案优选中的应用。\n10. 论述排污权交易相对命令控制手段的效率优势（可结合计算）。\n11. 论述我国环境管理制度体系（\"老三项 + 新五项\"等八项基本制度）。\n12. `[规律推断]` 结合某区域实际，论述如何编制一项水（或大气）环境规划。\n\n---\n\n## 五 · 必会计算（见「核心例题精解」）\n\n| 主题 | 关键式 |\n|---|---|\n| 水环境容量（零维稀释） | W = Q(C_s − C_0) |\n| 大气环境容量（箱模型） | W_a = (C_s − C_0)·u·H·W |\n| 总量削减率 | 削减率 = (现状 − 容量)/现状 |\n| 等比例分配 | 企业削减 = 企业现排 × 区域削减率 |\n| 费用效益 | B/C，>1 经济可行 |\n| 排污权交易 | 由边际治理成本低者多减，总成本最省 |\n\n---\n\n## 六 · 备考策略\n\n1. **抓主干**：以\"调查评价→预测→定目标指标→功能区划→容量与总量分配→方案优选→实施管理\"贯穿全书。\n2. **概念成对记**：规划/管理、容量/承载力、命令控制/经济激励、三同时/排污许可——成对辨析最易得分。\n3. **手段会比较**：三类手段的机理、优缺点、适用情形是论述题富矿。\n4. **计算要落地**：环境容量与总量分配几乎必练，注意单位换算（m³/s→m³/d、mg/L→g/m³）。\n5. **联系制度与时政**：八项环境管理基本制度、环境保护税、排污许可\"一证式\"、\"双碳\"与生态文明等可作论述加分点。\n\n---\n\n> 规划为蓝图，管理为落地。把\"目标—容量—分配—手段—制度\"打通，期末与考研皆有抓手。\n"}, {"id": "web-02", "group": "真题与网络资源", "title": "名词解释与简答速查", "md": "# 环境规划与管理 · 名词解释与简答速查\n\n> 考前速背层：核心名词 + 高频简答得分要点。配合「核心例题精解」与「综合复习资料」使用。\n\n---\n\n## 一 · 核心名词解释\n\n- **环境规划**：人类为使环境与经济社会协调发展，预先对自身活动和环境所作的时间与空间上的合理安排；是政府履行环境职责的综合决策过程与纲领性文件。\n- **环境管理**：运用行政、法律、经济、技术、教育等手段，对影响环境的人类活动进行调控，使经济社会发展与环境相协调。\n- **环境容量**：在一定地区、特定产业结构与污染源分布条件下，为达到环境目标值，环境所能容纳某污染物的**最大允许排放量**。\n- **环境承载力**：某一时刻环境系统在维持其结构功能不被破坏前提下所能承受人类社会经济活动的**能力阈值**（具区域性、时序性、可变性、可调控性）。\n- **环境规划目标**：对规划对象在未来某阶段环境质量的发展方向和水平所作的规定（规划的核心内容）。\n- **环境功能区划**：依社会经济需要与不同地区在环境结构、环境质量、使用功能上的差异，对规划区域作合理划分，分区执行不同质量标准与管理要求。\n- **环境评价**：在环境调查分析基础上，用数学方法对环境质量、环境影响作定性与定量评述。\n- **环境预测**：据已掌握资料，对未来环境质量状况与发展趋势进行分析预测（趋势法/情景法/模型法）。\n- **总量控制**：以区域允许排放总量为约束，将排放量分配到各污染源并加以管理的制度（目标总量/容量总量/行业总量）。\n- **生态规划**：结合生态环境承载力分析，对人类活动与环境建设在时空上作合理安排，是区域规划的重要组成。\n- **可持续发展**：既满足当代人需要又不损害后代人满足其需要能力的发展（环境规划的根本指导思想）。\n- **\"三同时\"制度**：建设项目中防治污染的设施与主体工程同时设计、同时施工、同时投产使用。\n- **排污许可制度**：以许可证形式明确排污单位允许排放污染物的种类、浓度、总量与监测要求的\"一证式\"管理制度。\n- **排污权交易**：在总量控制下，允许排污单位之间买卖排放配额，使减排在边际成本最低处完成。\n- **环境影响评价（EIA）**：对规划和建设项目实施后可能造成的环境影响进行分析、预测和评估，提出预防或减轻对策并跟踪监测的方法与制度。\n\n---\n\n## 二 · 高频简答 · 得分要点\n\n### Q1 环境规划与环境管理的关系\n规划是管理的**前提与依据**（定目标、绘蓝图）；管理是规划的**实施与保障**（落地、监督、反馈）。二者构成\"计划—执行—检查—改进（PDCA）\"闭环，规划重\"预防为主、源头控制\"，管理重手段组合调控。\n\n### Q2 环境容量与环境承载力的区别\n环境容量针对**具体污染物**、可量化（最大允许排放量），是总量分配与排污许可的依据；环境承载力是**综合、宏观**的能力阈值，反映环境系统对人类活动的整体支撑能力。容量是承载力在污染物维度上的具体表现。\n\n### Q3 环境规划的编制程序\n① 现状调查与评价 → ② 环境预测 → ③ 确定规划目标与指标体系 → ④ 环境功能区划 → ⑤ 环境容量测算与总量分配 → ⑥ 方案设计与优选 → ⑦ 规划实施、监督与考核。\n\n### Q4 环境规划目标指标体系的四类指标\n① 环境质量指标（大气/水/声/土壤达标率）；② 污染物总量控制指标（COD、氨氮、SO₂、NOₓ 排放总量）；③ 环境治理/建设指标（污水处理率、垃圾无害化率、绿化覆盖率）；④ 相关社会经济指标（万元 GDP 能耗/排放强度）。\n\n### Q5 环境管理三大类手段及优缺点\n① **命令控制型**（标准、许可、限期治理、关停）：刚性强、见效快，但成本高、缺乏持续激励；② **经济激励型**（环境税费、排污权交易、补贴、押金返还）：灵活、激励减排、效率高，但需市场与监测配套；③ **公众参与/自愿型**（信息公开、环境标志、自愿协议、公益诉讼）：监督社会化、提升合法性，但作用间接。\n\n### Q6 总量控制与污染物分配方法\n在确定区域环境容量（允许排放总量）后，将其分配到各污染源。常用方法：等比例削减分配（公平）、按贡献率/浓度分配、按治理成本（效率）分配、优化分配（线性规划）。分配后核发排污许可并预留安全余量。\n\n### Q7 我国环境管理的基本制度\n\"老三项\"：环境影响评价、\"三同时\"、排污收费（现为环境保护税/排污许可）；\"新五项\"：环境保护目标责任制、城市环境综合整治定量考核、排污许可证、污染集中控制、限期治理。现行核心为**环评 + 三同时 + 排污许可 + 总量控制**。\n\n---\n\n## 三 · 易错辨析\n\n| 易混对 | 关键区别 |\n|---|---|\n| 环境规划 vs 环境管理 | 规划=蓝图/前提；管理=实施/保障 |\n| 环境容量 vs 环境承载力 | 容量针对污染物、可量化；承载力综合、宏观 |\n| 环境质量标准 vs 排放标准 | 前者针对环境介质质量；后者针对污染源排放 |\n| 目标总量 vs 容量总量 | 目标总量按管理目标定；容量总量按环境容量定 |\n| 命令控制 vs 经济激励 | 前者行政强制；后者市场/价格信号 |\n| 三同时 vs 排污许可 | 三同时管建设期设施；排污许可管运营期排放 |\n\n---\n\n> 速查为术，体系为道。把\"目标—区划—容量—分配—手段—制度\"串成一线，名词与简答皆迎刃而解。\n"}, {"id": "web-03", "group": "真题与网络资源", "title": "新疆大学环境规划与管理相关资料", "md": "# 新疆大学 · 环境规划与管理相关资料\n\n> 据新疆大学生态与环境学院公开信息（eco-env.xju.edu.cn）整理；院校特色考点标 `[推断]`，以本校教学大纲与任课教师讲义为准。\n\n---\n\n## 一 · 开课院系与专业背景\n\n新疆大学**生态与环境学院**（博达校区，乌鲁木齐市水磨沟区华瑞街777号）设环境科学（理学）、环境工程（工学）两个本科专业，本-硕-博一体。\n\n- 环境科学专业培养目标明确包含\"**环境规划管理**、环境影响评价\"等方向，环境规划与管理是其**专业核心课**。\n- 学科特色：服务\"一带一路\"新疆核心区建设，聚焦**干旱区**大气、水、土壤、固废重点污染防控，从区域整体寻求最佳解决方案。\n\n---\n\n## 二 · 课程定位与教材\n\n| 项 | 内容 |\n|---|---|\n| 教材 | 郭怀成、尚金城等《环境规划学》（第三版，高等教育出版社） |\n| 关联课程 | 环境影响评价、环境监测、环境管理学、环境经济学、GIS（规划支持系统） |\n| 考核 | 平时 + 期末闭卷；题型见「期末真题题型与高频考点」 |\n\n---\n\n## 三 · 新疆区域特色考点（结合干旱区）\n\n> 任课教师常将通用规划方法与**新疆干旱区**实际结合命题，建议储备如下案例与论点。`[推断]`\n\n1. **干旱区水环境规划**：水资源紧缺背景下的流域水量—水质统筹、水环境容量核算与总量分配（如塔里木河、乌伦古河流域）。\n2. **绿洲—荒漠生态规划**：生态承载力与生态红线、防沙治沙与绿洲可持续；生态环境承载力分析方法。\n3. **城镇环境规划**：乌鲁木齐等城市冬季供暖大气污染防治规划、大气环境容量（箱模型/A 值法）。\n4. **工业园区环境规划**：石油石化、煤化工、有色冶炼等八大产业园区的总量控制与排污许可。\n5. **\"三线一单\"落地**：生态保护红线、环境质量底线、资源利用上线、生态环境准入清单在新疆的应用。\n6. **生态文明与\"双碳\"**：区域减污降碳协同、绿色发展规划。\n\n---\n\n## 四 · 备考与资源建议\n\n### 4.1 复习路径\n\n1. 以郭怀成教材 + 本校讲义建立\"调查评价→预测→目标指标→功能区划→容量与总量分配→方案优选→实施管理\"主干。\n2. 用本仓库「核心例题精解」练环境容量与总量分配、费用效益、排污权交易计算。\n3. 结合上节干旱区案例，准备 1–2 道\"如何编制某区域水/大气环境规划\"的论述框架。\n\n### 4.2 推荐补充资源（公开）\n\n- **法规与政策**：《环境保护法》《环境影响评价法》《排污许可管理条例》、\"三线一单\"技术指南、各级\"生态环境保护规划\"。\n- **标准**：《地表水环境质量标准》（GB 3838）、《环境空气质量标准》（GB 3095）、各类污染物排放标准（确定 C_s 与功能区目标）。\n- **MOOC/教材数字课程**：高教社《环境规划学》第三版配套电子教案与案例。\n- **数据**：生态环境部及新疆维吾尔自治区生态环境厅公开的环境质量公报、规划文本。\n\n---\n\n## 五 · 常见问题\n\n**Q：本课计算题难吗？**\nA：以环境容量（水：W=Q(C_s−C_0)；大气：箱模型）与总量分配、费用效益为主，套路固定，重在单位换算与判别（见「核心例题精解」）。\n\n**Q：论述题如何结合新疆实际？**\nA：选一类要素规划（水/大气/生态），按\"现状问题→目标指标→功能区划→容量核算→总量分配→管理手段→保障措施\"展开，并嵌入干旱区/绿洲/园区等本地特征。\n\n**Q：与环境影响评价课程如何区分？**\nA：环境规划面向**区域、中长期、宏观目标与总量**；环境影响评价面向**具体规划/项目、事前预测与对策**。二者通过功能区划、容量与总量控制相衔接。\n\n---\n\n> 以上院校特色多为依公开信息的合理推断，务必与任课教师要求核对。规划之要在\"统筹时空、协调发展\"，落点在本校考纲。\n"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 环境规划与管理 · 期末复习骨架\n\n> 教师: 王思雨 · 学期: 2026春\n> 共 11 PDF · 1207 页 · 6 章节\n> 已填复习要点：6/6 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 绪论 | 绪论-环境规划与管理 | 129 | [_第00章_绪论-环境规划与管理.md](./_第00章_绪论-环境规划与管理.md) |\n| 第 2 章 | 绪论-环境规划与管理 | 129 | [_第02章_绪论-环境规划与管理.md](./_第02章_绪论-环境规划与管理.md) |\n| 第 4 章 | 环境规划与管理中的综合分析方法 | 135 | [_第04章_环境规划与管理中的综合分析方法.md](./_第04章_环境规划与管理中的综合分析方法.md) |\n| 第 5 章 | 环境规划的基本内容和程序 | 126 | [_第05章_环境规划的基本内容和程序.md](./_第05章_环境规划的基本内容和程序.md) |\n| 第 6 章 | 环境规划 | 115 | [_第06章_环境规划.md](./_第06章_环境规划.md) |\n| 第 7 章 | 环境管理模式 | 106 | [_第07章_环境管理模式.md](./_第07章_环境管理模式.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 740，密度 **厚**，建议复习期 10-14 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 绪论 · 绪论-环境规划与管理\n\n> 主版 129 页 · 第 2 节 · [详细素材](./_第00章_绪论-环境规划与管理.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 环境管理：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作；[x] 环境规划：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案；[x] 环境容量：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- **怎么算** ── 环境容量：M = K + R（K=稀释容量，R=自净容量）；环境承载力：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向；环境承载力指标体系：资源供给指标+社会影响指标+污染容纳指标\n- **考什么** ── 环境规划与管理五要素：人、物、资金、信息、时空；环境管理五大手段：行政、法律、经济、技术、宣传教育；环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 2 章 · 绪论-环境规划与管理\n\n> 主版 129 页 · 第 2 节 · [详细素材](./_第02章_绪论-环境规划与管理.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 环境管理：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作；[x] 环境规划：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案；[x] 环境容量：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- **怎么算** ── 环境容量：M = K + R（K=稀释容量，R=自净容量）；环境承载力：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向；环境承载力指标体系：资源供给指标+社会影响指标+污染容纳指标\n- **考什么** ── 环境规划与管理五要素：人、物、资金、信息、时空；环境管理五大手段：行政、法律、经济、技术、宣传教育；环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 环境规划与管理中的综合分析方法\n\n> 主版 135 页 · 第 4 节 · [详细素材](./_第04章_环境规划与管理中的综合分析方法.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 环境现状调查：掌握和了解某区域环境现状，发现和识别主要环境问题，确定主要污染源和主要污染物，为环境规划与管理的制定和实施创造条件；[x] 环境评价：对被评价对象的优劣、好坏作定量或定性描述，一般以定量为主；含自然环境评价、社会经济评价、环境质量评价和污染源评价4方面；[x] 等标污染负荷：将不同种类、不同量纲的污染物排放量标准化处理的方法，Pᵢ=Cᵢ/C₀ᵢ×Qᵢ\n- **怎么算** ── 环境质量指数：Iᵢ = Cᵢ/C₀ᵢ（监测值/标准值）；等标污染负荷（废水）：Pᵢ = (Cᵢ/C₀ᵢ)×Qᵢ；Cᵢ=实测浓度(mg/L)，Qᵢ=废水排放量(m³/d)；等标污染负荷（废气）：Pᵢ = (Cᵢ/C₀ᵢ)×qᵢ；qᵢ=废气介质排放流量(m³/d)\n- **考什么** ── 环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）；环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状；环境评价四方面：自然环境、社会经济、环境质量、污染源评价\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 5 章 · 环境规划的基本内容和程序\n\n> 主版 126 页 · 第 6 节 · [详细素材](./_第05章_环境规划的基本内容和程序.md)\n\n**核心三问**：\n\n- **是什么** ── 环境现状调查：调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*；环境现状调查方法：收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*；环境评价：对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法；等标污染负荷法识别主要污染源与污染物；环境统计的内容与指标体系\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 6 章 · 环境规划\n\n> 主版 115 页 · 第 7 节 · [详细素材](./_第06章_环境规划.md)\n\n**核心三问**：\n\n- **是什么** ── 大气环境规划：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*；大气污染物总量控制（A 值法/P 值法）：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*；水环境功能区划：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 大气环境规划的内容与类型；大气污染物总量控制方法（A 值/P 值）；水环境功能区划与水环境容量概念及计算\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 7 章 · 环境管理模式\n\n> 主版 106 页 · 第 8 节 · [详细素材](./_第07章_环境管理模式.md)\n\n**核心三问**：\n\n- **是什么** ── 末端控制（传统管理模式）：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*；末端控制的弊端：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*；污染预防（现代管理模式）：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 末端控制模式的建立、实践与弊端；污染预防模式的内涵与优势（对比末端控制）；源削减的途径\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 四 · 章际交叉（同一课件涉两章）\n\n- 绪论  ⇄  第 2 章\n- 第 4 章  ⇄  第 5 章\n- 第 5 章  ⇄  第 6 章\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 绪论 · 绪论-环境规划与管理\n- [ ] 第 2 章 · 绪论-环境规划与管理\n- [ ] 第 4 章 · 环境规划与管理中的综合分析方法\n- [ ] 第 5 章 · 环境规划的基本内容和程序\n- [ ] 第 6 章 · 环境规划\n- [ ] 第 7 章 · 环境管理模式\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练\n"}, {"id": "exam-期末速查", "group": "期末冲刺", "title": "期末速查", "md": "# 环境规划与管理 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 6/6 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 0 | 绪论-环境规划与管理 | [x] 环境管理：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作；[x] 环境规划：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案；[x] 环境容量：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量） | 环境容量：M = K + R（K=稀释容量，R=自净容量）；环境承载力：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向；环境承载力指标体系：资源供给指标+社会影响指标+污染容纳指标 | 环境规划与管理五要素：人、物、资金、信息、时空；环境管理五大手段：行政、法律、经济、技术、宣传教育；环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础 |\n| 2 | 绪论-环境规划与管理 | [x] 环境管理：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作；[x] 环境规划：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案；[x] 环境容量：某环境单元在给定环境功能区目标和环境质量 ><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：总量控制弥补浓度控制在容量超载时的不足。\n\n<\/details>\n\n**5.** 环境功能区划的主要作用是\n  - A. 为不同区域确定相应的环境质量目标与管理要求\n  - B. 划定行政边界\n  - C. 确定土地价格\n  - D. 统计人口\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：功能区划是分区分类管理与目标确定的基础。\n\n<\/details>\n\n**6.** 下列哪项是环境规划中常用的预测方法\n  - A. 趋势外推、弹性系数、投入产出、情景分析\n  - B. 仅靠经验\n  - C. 抽签\n  - D. 民意投票\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：社会经济与污染负荷预测多用定量与情景结合的方法。\n\n<\/details>\n\n**7.** 我国环境管理的三大政策是\n  - A. 预防为主防治结合、谁污染谁治理、强化环境管理\n  - B. 先污染后治理\n  - C. 末端治理为主\n  - D. 自由排放\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：三大政策是我国环境管理体系的基石。\n\n<\/details>\n\n**8.** 环境管理的八项制度中不包括\n  - A. 环境影响评价制度\n  - B. 三同时制度\n  - C. 排污收费制度\n  - D. 计划生育制度\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**D**  　解析：八项制度围绕环境保护，计划生育不属其中。\n\n<\/details>\n\n**9.** “三同时”制度是指建设项目的环保设施应与主体工程\n  - A. 同时设计、同时施工、同时投产使用\n  - B. 同时审批\n  - C. 同时拆除\n  - D. 同时收费\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：三同时是预防新污染源产生的重要制度。\n\n<\/details>\n\n**10.** 环境规划方案优选常用的方法是\n  - A. 费用效益分析、多目标决策、层次分析法\n  - B. 随机选择\n  - C. 仅看投资额\n  - D. 先到先得\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：方案比选需综合经济、环境、技术多目标权衡。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 环境规划按对象可分为污染综合防治规划、___规划和生态规划等。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**自然资源保护（生态保护）**\n\n<\/details>\n\n**2.** 环境规划编制的一般程序包括：现状调查与评价、___、目标与指标确定、方案设计与优选、实施与管理。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**预测（趋势与负荷预测）**\n\n<\/details>\n\n**3.** 在浓度控制基础上控制排入环境污染物总量的制度称为 ___ 控制。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**总量**\n\n<\/details>\n\n**4.** 环境质量现状评价中，用以表征环境质量优劣的综合数值称为环境质量 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**指数**\n\n<\/details>\n\n**5.** 环境管理按管理范围可分为区域环境管理、部门环境管理和 ___ 环境管理。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**资源（自然资源）**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 环境规划\n\n<details><summary>📝 参考答案<\/summary>\n\n答：为协调经济社会发展与环境保护、合理利用环境资源，运用科学方法对一定时期、一定区域内的环境保护活动作出的预先安排和部署，是带有指导性、约束性的综合方案。\n\n<\/details>\n\n**2.** 环境承载力\n\n<details><summary>📝 参考答案<\/summary>\n\n答：在一定时间、空间和环境目标约束下，环境系统在维持自身结构与功能稳定的前提下，所能承受的人类社会经济活动的最大限度，是确定开发强度与总量控制的依据。\n\n<\/details>\n\n**3.** 环境功能区划\n\n<details><summary>📝 参考答案<\/summary>\n\n答：根据自然条件、环境质量现状、社会经济发展与环境功能要求，将区域划分为不同类型与等级的环境功能区，并赋予相应环境质量目标与管理要求的工作。\n\n<\/details>\n\n**4.** 总量控制\n\n<details><summary>📝 参考答案<\/summary>\n\n答：在污染物浓度达标的基础上，依据环境容量或目标，对一定区域内排入环境的污染物排放总量加以核定与控制的环境管理方式。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述环境规划编制的一般工作程序。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①环境现状调查与评价；②社会经济发展与环境污染负荷预测；③确定环境目标与指标体系；④功能区划与环境容量/承载力分析；⑤规划方案设计与多目标优选；⑥实施保障措施与跟踪管理评估。\n\n<\/details>\n\n**2.** 简述浓度控制与总量控制的区别与联系。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：浓度控制规定排放口污染物浓度限值，简单易行但在排放源密集、环境容量超载时难以保证环境质量达标；总量控制在浓度达标基础上限定区域排放总量，与环境容量挂钩，更能保障环境目标。二者相辅相成，总量控制是浓度控制的发展与补充。\n\n<\/details>\n\n**3.** 简述我国环境管理的三大政策及其含义。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①预防为主、防治结合：把污染控制在产生之前；②谁污染谁治理（污染者负担）：明确治理与经济责任；③强化环境管理：以制度与监督提高管理效能、弥补资金技术不足。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试论环境承载力与环境功能区划在区域环境规划中的作用，并说明二者如何共同支撑总量控制的实施。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①环境承载力刻画区域环境系统可承受的人类活动阈值，为确定开发强度、污染物允许排放总量提供科学上限；②环境功能区划依自然与社会条件将区域分区分类，赋予各区差异化的环境质量目标与管理要求，使规划目标空间落地；③总量控制以功能区目标确定各区允许的环境质量，进而由环境容量（承载力的具体体现）反算允许排放总量，并在区内各污染源间分配削减指标；④三者构成“目标—容量—总量—分配”的闭环：功能区划定目标，承载力/容量定上限，总量控制定排放并落实到源，最终实现区域环境质量达标与可持续发展。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "pages", "group": "原始课件", "title": "全部课件原页 · 逐讲", "md": "# 原始课件 · 页图（真实 PDF 页面）\n\n> 下列为雨课堂课件原始页面渲染；大讲已均匀采样关键页。点击讲次标题展开，单击图片可看大图。\n\n<details class=\"pdf-lesson\" open>\n<summary>001-第十章 环境监管-第十章 环境监管 · 60 页<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L01_p002.jpg\" target=\"
