第00章_绪论-环境规划与管理.md](./_第00章_绪论-环境规划与管理.md) · 主版 129 页\n\n#### 一、核心概念（名词解释）\n\n- [x] **环境管理**：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n- [x] **环境规划**：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n- [x] **环境容量**：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- [x] **环境承载力**：不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n- [x] **可持续发展**：既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n- [x] **两山论**：绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] **复合生态系统**：自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n- [x] **工业生态学**：研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n- [x] **生态工业园**：制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n- [x] **环境经济学**：研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n\n#### 二、关键公式 / 模型\n\n- **环境容量**：M = K + R（K=稀释容量，R=自净容量）\n- **环境承载力**：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向\n- **环境承载力指标体系**：资源供给指标+社会影响指标+污染容纳指标\n- **帕累托最适度**：资源配置效率理论，寻求个人、集体和社会之间经济效率的协调统一\n- **计划分类模型**：按时间（长/中/短期）、约束力（指令性/指导性）、制定者层次（战略/管理/作业）、性质（综合/局部/项目）\n\n#### 三、重要案例 / 实验 / 例题\n\n- **丹麦卡伦堡生态工业园**：世界上最早最著名的生态工业园，主体企业为发电厂、炼油厂、制药厂、石膏板生产厂，通过贸易方式利用对方废弃物和副产品\n- **广西贵港国家生态工业（制糖）示范园区**：2001年8月我国第一个国家级生态工业示范园区\n- **美国生态工业园示范点**：1994年指定4个社区——巴尔的摩、查尔斯、布郎斯、恰塔努加\n- **两山论实践**：黑河（生态发展带动绿色崛起）、福建长汀（水土治理提升农民收入）、海南海口（大环保模式+海绵城市）\n- **中国总量控制历程**：1996年\"九五\"总量控制→1998年\"一控双达标\"→\"十五\"三大任务→\"十一五\"SO₂和COD控制→\"十二五\"主要污染物减排\n\n#### 四、高频考点（速记）\n\n1. **环境规划与管理五要素**：人、物、资金、信息、时空\n2. **环境管理五大手段**：行政、法律、经济、技术、宣传教育\n3. **环境规划vs环境管理关系**：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n4. **环境容量vs环境承载力**：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n5. **环境承载力三大特征**：客观性与主观性、区域性与时间性、动态性与可调控性\n6. **生态学三定律（米勒）**：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n7. **生态学六规律（陈昌笃）**：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n8. **可持续发展四原则**：协调原则、公平原则、持续原则、共同原则\n9. **可持续发展基本思想**：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n10. **复合生态系统四大矛盾**：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n11. **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论，奠定基本概念和理论基础\n- 启后章：第2章深入环境规划与管理的政策方针法律法规，第4章进入综合分析方法，第5-7章为规划与管理实务\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论-环境规划与管理\n## 核心概念\n- 环境管理\n- 环境规划\n- 环境容量\n- 环境承载力\n- 可持续发展\n- 两山论\n- 复合生态系统\n- 工业生态学\n- 生态工业园\n- 环境经济学\n## 关键公式 / 模型\n- 环境容量\n- 环境承载力\n- 环境承载力指标体系\n- 帕累托最适度\n- 计划分类模型\n## 高频考点\n- 环境规划与管理五要素：人、物、资金、信息、时空\n- 环境管理五大手段：行政、法律、经济、技术、宣传教育\n- 环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n- 环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n- 环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n- 生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n- 生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n- 可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n- 可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n- 复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n- 三种环境伦理观：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n- 工业园区三代：第一代劳动密集型→第二代高新技术→第三代生态工业园\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论-环境规划与管理))\n    核心概念\n      环境管理\n      环境规划\n      环境容量\n      环境承载力\n      可持续发展\n      两山论\n      复合生态系统\n      工业生态学\n      生态工业园\n      环境经济学\n    关键公式 / 模型\n      环境容量\n      环境承载力\n      环境承载力指标体系\n      帕累托最适度\n      计划分类模型\n    高频考点\n      环境规划与管理五要素：人、物、资金、信息、时空\n      环境管理五大手段：行政、法律、经济、技术、宣传教育\n      环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心…\n      环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社…\n      环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n      生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理…\n      生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协…\n      可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n      可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认…\n      复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资…\n      三种环境伦理观：生命中心主义（泰勒）、地球整体主 . **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论/概述，奠定基本概念和理论基础\n- 启后章：第4章深入综合分析方法，第5-7章为规划与管理实务\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论-环境规划与管理\n## 核心概念\n- 环境管理\n- 环境规划\n- 环境容量\n- 环境承载力\n- 可持续发展\n- 两山论\n- 复合生态系统\n- 工业生态学\n- 生态工业园\n- 环境经济学\n## 关键公式 / 模型\n- 环境容量\n- 环境承载力\n- 环境承载力指标体系\n- 帕累托最适度\n- 计划分类模型\n## 高频考点\n- 环境规划与管理五要素：人、物、资金、信息、时空\n- 环境管理五大手段：行政、法律、经济、技术、宣传教育\n- 环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n- 环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n- 环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n- 生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n- 生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n- 可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n- 可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n- 复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n- 三种环境伦理观：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n- 工业园区三代：第一代劳动密集型→第二代高新技术→第三代生态工业园\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论-环境规划与管理))\n    核心概念\n      环境管理\n      环境规划\n      环境容量\n      环境承载力\n      可持续发展\n      两山论\n      复合生态系统\n      工业生态学\n      生态工业园\n      环境经济学\n    关键公式 / 模型\n      环境容量\n      环境承载力\n      环境承载力指标体系\n      帕累托最适度\n      计划分类模型\n    高频考点\n      环境规划与管理五要素：人、物、资金、信息、时空\n      环境管理五大手段：行政、法律、经济、技术、宣传教育\n      环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心…\n      环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社…\n      环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n      生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理…\n      生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协…\n      可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n      可持续发展基本思想：不否定 仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n2. **环境现状调查六内容**：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n3. **环境评价四方面**：自然环境、社会经济、环境质量、污染源评价\n4. **自然环境评价八法**：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n5. **污染源评价三法**：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n6. **环境统计指标体系七子系统**：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n7. **环境统计三研究法**：大量观察法、综合分析法、归纳推断法\n8. **环境预测分类**：按内容（区域/行业/专题）、按作用（定性/定量/定时/定比/评价）、按时间（短期<5/中期5~15/长期20年）\n9. **定性预测四法**：专家会议法、德尔菲法、主观概率法、层次分析法\n10. **定量预测三法**：时间序列法、逻辑型规律法（S规律）、数学模型法\n11. **决策分类**：确定型vs非确定型（风险型—概率已知；不确定型—概率未知）\n12. **决策三要素**：自然状态（不可控）、策略（可控）、益损值\n13. **不确定型决策五准则**：等可能性(1/n)、乐观(大中取大)、悲观(小中取大/Wald)、折衷(α系数)、后悔值(最小最大/Savage)\n14. **决策六原则**：信息快准全、预测未来、可行性、系统性、对比优选、集团决策\n15. **环境审计七内容**：符合性、环保管理系统、过渡、有害物质处理存放清理、污染预防、环境效益、产品审计\n16. **EMIS四功能**：查询检索、空间分析+模型加工、决策支持、降低成本提高效益\n17. **EDSS五组成**：数据库、模型库、知识库、人机交互界面、决策分析模块\n18. **EMIS设计四阶段**：可行性研究→系统分析→系统设计→实施与评价\n19. **EMIS设计七原则**：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境现状调查三种方法优缺点？ 答：①收集资料法—范围广省人力但仅二手不全面；②现场调查法—第一手数据但工作量大受条件限；③遥感法—远距离综合探测技术要求高\n- [x] 题：等标污染负荷法如何确定主要污染源？ 答：按等标污染负荷排序，计算累计百分比，累计>80%的污染源为主要污染源\n- [x] 题：乐观准则vs悲观准则vs折衷准则？ 答：乐观=大中取大（冒险）；悲观=小中取大（保守/Wald准则）；折衷=α·max+(1-α)·min（α=0为悲观，α=1为乐观）\n- [x] 题：风险型决策与不确定型决策区别？ 答：风险型—各自然状态概率可预先估计计算；不确定型—各状态概率一无所知，靠主观倾向决策\n- [x] 题：EMIS与EDSS区别？ 答：EMIS侧重信息存储检索和模型加工，是数据库+应用软件系统；EDSS侧重对结构化/未结构化问题提供决策支持，含数据库+模型库+知识库+决策分析模块\n\n#### 六、与前后章之关联\n\n- 承前章：第0/2章奠定基本概念和理论基础（环境容量、环境承载力、可持续发展等），本章提供具体分析方法工具\n- 启后章：第5章环境规划基本内容和程序将运用本章的调查、评价、预测、决策方法；第7章清洁生产审计是环境审计的深入展开\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划与管理中的综合分析方法\n## 核心概念\n- 环境现状调查\n- 环境评价\n- 等标污染负荷\n- 环境统计\n- 环境预测\n- 决策\n- 环境审计\n- EMIS\n- EDSS\n- 德尔菲法\n- 层次分析法（AHP）\n- 清洁生产审计\n## 关键公式 / 模型\n- 环境质量指数\n- 等标污染负荷（废水）\n- 等标污染负荷（废气）\n- 污染负荷比\n- 人口预测\n- 能源消费弹性系数法\n- 民用耗煤量\n- 最大收益期望值\n- 折衷效益值\n- 后悔值\n## 高频考点\n- 环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n- 环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n- 环境评价四方面：自然环境、社会经济、环境质量、污染 的依据）*\n- **环境预测**：把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n- **德尔菲法**：匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n- **决策分析**：在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n- **环境审计**：对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n- **环境管理信息系统（EMIS）与环境决策支持系统（EDSS）**：对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Pᵢ = Qᵢ / C₀ᵢ` | 等标污染负荷，Qᵢ 为排放量，C₀ᵢ 为评价标准 |\n| `E = Σ Pⱼ·Vᵢⱼ` | 风险型决策的期望值准则 |\n| `C = α·max + (1−α)·min` | 非确定型决策折衷准则，α 为乐观系数 |\n| `min(max 后悔值)` | 后悔值（最小机会损失）准则 |\n\n#### 三、重要案例 / 例题\n\n- 例 4-1：用期望值准则在多个环保产品方案中选最优。\n- 例 4-2：对同一效益矩阵分别用乐观、悲观、等可能、折衷准则决策并比较。\n- 例 4-3：防噪耳机产量决策，构建收益矩阵与机会损失（后悔值）矩阵。\n\n#### 四、高频考点（速记）\n\n1. 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n2. 等标污染负荷法识别主要污染源与污染物\n3. 环境统计的内容与指标体系\n4. 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n5. 环境预测的定性与定量方法\n6. 德尔菲法的特点与步骤\n7. 五种非确定型决策准则及计算\n8. 环境审计的内容与方法\n9. EMIS 与 EDSS 的功能与组成\n\n#### 五、思考题 / 自测\n\n- **Q**：等标污染负荷法如何确定主要污染源？\n  **A**：分别计算各源各污染物的等标污染负荷 Pᵢ=Qᵢ/C₀ᵢ 并求和，按 P 值大小排序，累计贡献大者即为主要污染源或主要污染物。\n\n- **Q**：德尔菲法相比一般专家会议有何优点？\n  **A**：匿名可避免权威与从众影响，多轮函询与反馈使专家意见逐步收敛，结果更客观可靠。\n\n- **Q**：乐观、悲观、折衷准则的决策思想有何差异？\n  **A**：乐观（大中取大）取各方案最大收益再取最大；悲观（小中取大）取各方案最小收益再取最大；折衷用乐观系数 α 对二者加权。\n\n\n#### 六、与前后章之关联\n\n- **承前**：在前章环境规划基本概念与程序的基础上提供技术支撑。\n- **启后**：调查、预测、决策、审计等方法直接服务于第 6 章各环境要素规划与第 7 章管理模式。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划的基本内容和程序\n## 核心概念\n- 环境现状调查\n- 环境现状调查方法\n- 环境评价\n- 等标污染负荷法\n- 环境统计\n- 社会经济预测\n- 环境预测\n- 德尔菲法\n- 决策分析\n- 环境审计\n- 环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n## 关键公式 / 模型\n- Pᵢ = Qᵢ / C₀ᵢ\n- E = Σ Pⱼ·Vᵢⱼ\n- C = α·max + (1−α)·min\n- min(max 后悔值)\n## 高频考点\n- 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n- 等标污染负荷法识别主要污染源与污染物\n- 环境统计的内容与指标体系\n- 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n- 环境预测的定性与定量方法\n- 德尔菲法的特点与步骤\n- 五种非确定型决策准则及计算\n- 环境审计的内容与方法\n- EMIS 与 EDSS 的功能与组成\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境规划的基本内容和程序))\n    核心概念\n      环境现状调查\n      环境现状调查方法\n      环境评价\n      等标污染负荷法\n      环境统计\n      社会经济预测\n      环境预测\n      德尔菲法\n      决策分析\n      环境审计\n      环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n    关键公式 / 模型\n      Pᵢ = Qᵢ / C₀ᵢ\n      E = Σ Pⱼ·Vᵢⱼ\n      C = α·max + （1−α）·min\n      min（max 后悔值）\n    高频考点\n      环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n      等标污染负荷法识别主要污染源与污染物\n      环境统计的内容与指标体系\n      社会经济预测方法（人口、能源弹性系数/回归/灰色）\n      环境预测的定性与定量方法\n      德尔菲法的特点与步骤\n      五种非确定型决策准则及计算\n      环境审计的内容与方法\n      EMIS 与 EDSS 的功能与组成\n```\n\n<\/details>\n\n---\n\n### 第 6 章 · 环境规划\n\n> 素材：[_第06章_环境规划.md](./_第06章_环境规划.md) · 主版 115 页\n\n#### 一、核心概念\n\n- **大气环境规划**：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n- **大气污染物总量控制（A 值法/P 值法）**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n- **水环境功能区划**：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n- **水环境容量**：在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n- **水污染物预测**：用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n- **固体废物管理规划**：以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n- **生态环境规划**：以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `A 值法 / P 值法` | 大气污染物总量控制的两种分配方法 |\n| `W = Q(C_s − C₀) + 自净量` | 水环境容量（稀释+自净）的基本构成 |\n| `Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D` | 河流 BOD 衰减与溶解氧亏缺耦合模型 |\n| `三化原则（减量化/资源化/无害化）` | 固体废物管理的核心目标 |\n\n#### 三、重要案例 / 例题\n\n- 某区域大气污染物允许排放总量的分配。\n- 河流允许纳污量（水环境容量）计算。\n- 城市生活垃圾按三化原则的处理处置规划。\n\n#### 四、高频考点（速记）\n\n1. 大气环境规划的内容与类型\n2. 大气污染物总量控制方法（A 值/P 值）\n3. 水环境功能区划与水环境容量概念及计算\n4. 水污染控制规划方法与 S-P 模型\n5. 固体废物管理三化原则及规划内容\n6. 生态环境规划的内容与生态适宜度分析\n7. 各要素规划共同的调查—评价—预测—目标—措施程序\n\n#### 五、思考题 / 自测\n\n- **Q**：什么是环境容量？在规划中起何作用？\n  **A**：环境容量是在满足环境质量目标前提下区域（水/大气）所能容纳污染物的最大允许量，是确定允许排放总量、实施总量控制与分配的依据。\n\n- **Q**：固体废物管理的三化原则指什么？\n  **A**：减量化（源头减少产生）、资源化（回收利用）、无害化（安全处置），是固废规划的核心目标。\n\n- **Q**：大气总量控制 A 值法与 P 值法有何区别？\n  **A**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单个污染源的允许排放率（与烟囱高度等有关）自下而上控制。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 5 章调查、预测、决策与容量计算等技术方法。\n- **启后**：各要素规划的落实需第 7 章环境管理模式（总量控制、清洁生产）来保障。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划\n## 核心概念\n- 大气环境规划\n- 大气污染物总量控制（A 值法/P 值法）\n- 水环境功能区划\n- 水环境容量\n- 水污染物预测\n- 固体废物管理规划\n- 生态环境规划\n## 关键公式 / 模型\n- A 值法 / P 值法\n- W = Q(C_s − C₀) + 自净量\n- Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D\n- 三化原则（减量化/资源化/无害化）\n## 高频考点\n- 大气环境规划的内容与类型\n- 大气污染物总量控制方法（A 值/P 值）\n- 水环境功能区划与水环境容量概念及计算\n- 水污染控制规划方法与 S-P 模型\n- 固体废物管理三化原则及规划内容\n- 生态环境规划的内容与生态适宜度分析\n- 各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境规划))\n    核心概念\n      大气环境规划\n      大气污染物总量控制（A 值法/P 值法）\n      水环境功能区划\n      水环境容量\n      水污染物预测\n      固体废物管理规划\n      生态环境规划\n    关键公式 / 模型\n      A 值法 / P 值法\n      W = Q（C_s − C₀） + 自净量\n      Streeter-Phelps：dL/dt=−k₁L, dD/dt…\n      三化原则（减量化/资源化/无害化）\n    高频考点\n      大气环境规划的内容与类型\n      大气污染物总量控制方法（A 值/P 值）\n      水环境功能区划与水环境容量概念及计算\n      水污染控制规划方法与 S-P 模型\n      固体废物管理三化原则及规划内容\n      生态环境规划的内容与生态适宜度分析\n      各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n<\/details>\n\n---\n\n### 第 7 章 · 环境管理模式\n\n> 素材：[_第07章_环境管理模式.md](./_第07章_环境管理模式.md) · 主版 106 页\n\n#### 一、核心概念\n\n- **末端控制（传统管理模式）**：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n- **末端控制的弊端**：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n- **污染预防（现代管理模式）**：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n- **源削减**：在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n- **循环经济**：遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n- **产品生态设计（绿色设计/生命周期设计）**：在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n- **清洁生产**：对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n- **清洁生产审计**：系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n- **环境绩效与环境绩效审计**：对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `3R 原则（Reduce/Reuse/Recycle）` | 循环经济减量化、再利用、再循环 |\n| `清洁生产审计程序` | 筹划组织→预评估→评估→方案产生与筛选→实施→持续改进 |\n| `生命周期评价（LCA）` | 对产品全生命周期的资源消耗与环境影响进行评价 |\n\n#### 三、重要案例 / 例题\n\n- 某企业清洁生产审计削减物耗、能耗与污染物排放。\n- 生态工业园（循环经济园区）内企业间的物质循环利用。\n- 产品生态设计降低产品全生命周期的资源消耗与排放。\n\n#### 四、高频考点（速记）\n\n1. 末端控制模式的建立、实践与弊端\n2. 污染预防模式的内涵与优势（对比末端控制）\n3. 源削减的途径\n4. 循环经济 3R 原则\n5. 产品生态设计与生命周期思想\n6. 清洁生产的定义与清洁生产审计程序\n7. 环境绩效审计的内容\n8. 两种管理模式的根本区别（被动治理 vs 主动预防）\n\n#### 五、思考题 / 自测\n\n- **Q**：末端控制与污染预防的根本区别是什么？\n  **A**：末端控制在污染产生后被动治理（先污染后治理）；污染预防从源头与全过程主动减少污染产生（预防为主），后者更经济高效且能避免污染转移。\n\n- **Q**：循环经济的 3R 原则指什么？\n  **A**：减量化（Reduce）、再利用（Reuse）、再循环（Recycle），实现资源高效利用与物质闭路循环。\n\n- **Q**：清洁生产审计的核心目的是什么？\n  **A**：通过系统审查生产全过程，识别物耗能耗高、污染重的环节，提出并实施削减方案，实现源头预防与生态效率提升。\n\n\n#### 六、与前后章之关联\n\n- **承前**：是第 5 章决策/审计方法与第 6 章要素规划在管理制度层面的落实。\n- **启后**：全书收尾，构建规划—实施—绩效—持续改进的环境管理闭环。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境管理模式\n## 核心概念\n- 末端控制（传统管理模式）\n- 末端控制的弊端\n- 污染预防（现代管理模式）\n- 源削减\n- 循环经济\n- 产品生态设计（绿色设计/生命周期设计）\n- 清洁生产\n- 清洁生产审计\n- 环境绩效与环境绩效审计\n## 关键公式 / 模型\n- 3R 原则（Reduce/Reuse/Recycle）\n- 清洁生产审计程序\n- 生命周期评价（LCA）\n## 高频考点\n- 末端控制模式的建立、实践与弊端\n- 污染预防模式的内涵与优势（对比末端控制）\n- 源削减的途径\n- 循环经济 3R 原则\n- 产品生态设计与生命周期思想\n- 清洁生产的定义与清洁生产审计程序\n- 环境绩效审计的内容\n- 两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境管理模式))\n    核心概念\n      末端控制（传统管理模式）\n      末端控制的弊端\n      污染预防（现代管理模式）\n      源削减\n      循环经济\n      产品生态设计（绿色设计/生命周期设计）\n      清洁生产\n      清洁生产审计\n      环境绩效与环境绩效审计\n    关键公式 / 模型\n      3R 原则（Reduce/Reuse/Recycle）\n      清洁生产审计程序\n      生命周期评价（LCA）\n    高频考点\n      末端控制模式的建立、实践与弊端\n      污染预防模式的内涵与优势（对比末端控制）\n      源削减的途径\n      循环经济 3R 原则\n      产品生态设计与生命周期思想\n      清洁生产的定义与清洁生产审计程序\n      环境绩效审计的内容\n      两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n<\/details>\n\n---\n\n\n> **正言若反**：最终资料不离底层图像；凡疑处，复归章节素材与原始 PDF。\n> 每章之链：原始 PDF → `02_解析成果/<PDF_stem>/page_*.jpg` → 章节素材 md → 本资料。\n"}, {"id": "deepdive", "group": "例题精解 · 深化", "title": "核心例题 · 详解 · 图示", "md": "# 环境规划与管理 · 核心例题精解 · 图示深化\n\n> 本篇为**深化层**：在「综合复习资料」之上，逐章给出**名词解释 / 简答 / 计算与案例 + 参考答案**，并配**思维导图 / 程序示意图**（mermaid 矢量图，非纯文字）。\n> 规划计算遵循\"先判目标 → 列模型/公式 → 代入数据 → 得值与对策\"四步。\n\n---\n\n## 全课知识结构 · 思维导图\n\n```mermaid\nmindmap\n  root((环境规划与管理))\n    第1章 绪论\n      环境规划与管理的概念\n      环境规划的类型\n      环境管理的内涵与手段\n      二者的关系\n      发展趋势\n    第4章 综合分析方法\n      环境调查与评价\n      环境预测 趋势与情景\n      费用效益分析\n      系统分析与多目标决策\n      环境承载力分析\n    第5章 规划的内容与程序\n      环境规划目标与指标体系\n      环境功能区划\n      环境容量与总量分配\n      方案设计与优选\n      规划程序\n    第6章 环境规划编制\n      大气环境规划\n      水环境规划\n      固废与噪声规划\n      生态环境规划\n    第7章 环境管理模式\n      命令控制型手段\n      经济激励型手段\n      公众参与与自愿型手段\n      三同时与排污许可\n      环境管理体制\n```\n\n---\n\n## 第 1 章 · 绪论\n\n### 体系示意 · 规划与管理的关系\n\n```mermaid\nflowchart LR\n    A[\"环境规划<br/>(蓝图/目标/方案)\"] --> B[\"环境管理<br/>(实施/监督/调控)\"]\n    B -->|反馈修正| A\n    A --> C[\"以预防为主、源头控制\"]\n    B --> D[\"命令控制 + 经济激励 + 公众参与\"]\n```\n\n### 例题 1-1（名词解释）\n**题**：什么是环境规划？什么是环境管理？二者关系如何？\n**参考答案**：\n- **环境规划**：为协调环境与社会经济发展、合理利用环境容量，对一定时期一定区域的环境保护**目标、任务与措施**所作的**总体部署**。\n- **环境管理**：运用**行政、法律、经济、技术、教育**等手段，对影响环境的活动进行**调控**，使经济社会发展与环境相协调。\n- 关系：规划是管理的**前提与依据**（定目标、绘蓝图）；管理是规划的**实施与保障**（落地、监督、反馈），二者构成\"计划—执行—检查—改进\"闭环。\n\n### 例题 1-2（简答）\n**题**：环境管理的三大类手段及其代表措施。\n**参考答案**：① **命令控制型**（标准、许可、限期治理、关停）；② **经济激励型**（排污收费/环境税、排污权交易、补贴、押金返还）；③ **公众参与/自愿型**（信息公开、环境标志、自愿协议、公益诉讼）。\n\n---\n\n## 第 2 章/第 4 章 · 综合分析方法\n\n### 流程示意 · 环境预测与决策\n\n```mermaid\nflowchart LR\n    A[\"环境现状调查\"] --> B[\"环境质量评价\"]\n    B --> C[\"环境预测 (趋势/情景/模型)\"]\n    C --> D[\"承载力与容量分析\"]\n    D --> E[\"费用效益/多目标决策\"]\n    E --> F[\"方案优选\"]\n```\n\n### 例题 4-1（名词解释）\n**题**：什么是环境承载力？什么是环境容量？\n**参考答案**：\n- **环境承载力**：在一定时期和区域，环境系统在维持其结构功能不被破坏的前提下，所能**承受人类社会经济活动的阈值**（综合、相对）。\n- **环境容量**：在满足环境目标值（标准）的前提下，区域环境所能容纳某种污染物的**最大允许排放量**。前者综合、宏观，后者针对具体污染物、可量化。\n\n### 例题 4-2（计算 · 水环境容量·零维稀释）\n**题**：某河段流量 $Q=10\\ \\mathrm{m^3/s}$，上游本底浓度 $C_0=2\\ \\mathrm{mg/L}$，水质目标 $C_s=5\\ \\mathrm{mg/L}$（COD，暂不计降解）。求该河段对 COD 的最大允许排放量（容量，$\\mathrm{kg/d}$）。\n**解**：\n1. 单位换算：$Q=10\\ \\mathrm{m^3/s}=10\\times86400=8.64\\times10^{5}\\ \\mathrm{m^3/d}$。\n2. 可利用浓度增量 $\\Delta C=C_s-C_0=3\\ \\mathrm{mg/L}=3\\ \\mathrm{g/m^3}$。\n3. 环境容量 $W=Q\\cdot\\Delta C=8.64\\times10^{5}\\times3=2.592\\times10^{6}\\ \\mathrm{g/d}\\approx 2592\\ \\mathrm{kg/d}$。\n\n$$\\boxed{W=Q(C_s-C_0)\\approx 2.59\\times10^{3}\\ \\mathrm{kg/d}}$$\n\n### 例题 4-3（计算 · 费用效益）\n**题**：某治理方案投资现值 $C=800\\ \\mathrm{万元}$，预期环境效益现值 $B=1200\\ \\mathrm{万元}$。求效益费用比并判断经济可行性。\n**解**：$\\dfrac{B}{C}=\\dfrac{1200}{800}=1.5>1$，效益大于费用，**经济可行**。\n\n$$\\boxed{B/C=1.5>1\\ \\Rightarrow\\ \\text{方案经济上可行}}$$\n\n---\n\n## 第 5 章 · 环境规划的内容与程序\n\n### 程序示意 · 环境规划编制流程\n\n```mermaid\nflowchart TD\n    A[\"1 现状调查与评价\"] --> B[\"2 环境预测\"]\n    B --> C[\"3 确定规划目标与指标体系\"]\n    C --> D[\"4 环境功能区划\"]\n    D --> E[\"5 环境容量测算与总量分配\"]\n    E --> F[\"6 方案设计与优选\"]\n    F --> G[\"7 规划实施、监督与考核\"]\n```\n\n### 例题 5-1（简答）\n**题**：环境规划的目标指标体系一般包含哪几类指标？\n**参考答案**：① **环境质量指标**（大气、水、声、土壤达标率）；② **污染物总量控制指标**（COD、氨氮、SO₂、NOₓ 排放总量）；③ **环境治理/建设指标**（污水处理率、垃圾无害化率、绿化覆盖率）；④ **相关社会经济指标**（万元 GDP 能耗/排放强度）。\n\n### 例题 5-2（计算 · 总量分配·等比例削减）\n**题**：区域 COD 现状排放 $1.0\\times10^{4}\\ \\mathrm{t/a}$，环境容量（允许排放）$=0.8\\times10^{4}\\ \\mathrm{t/a}$。求需削减总量与削减率；若按等比例分配，某企业现排 $500\\ \\mathrm{t/a}$ 应削减多少？\n**解**：\n1. 需削减 $=1.0\\times10^{4}-0.8\\times10^{4}=2.0\\times10^{3}\\ \\mathrm{t/a}$；削减率 $=\\dfrac{2000}{10000}=20\\%$。\n2. 企业削减 $=500\\times20\\%=100\\ \\mathrm{t/a}$，分配后允许排放 $400\\ \\mathrm{t/a}$。\n\n$$\\boxed{削减率 20\\%;\\ 该企业削减 100\\ \\mathrm{t/a}\\to 允许 400\\ \\mathrm{t/a}}$$\n\n### 例题 5-3（名词解释）\n**题**：什么是环境功能区划？意义何在？\n**参考答案**：根据区域的**自然条件、环境容量、社会经济功能与保护目标**，将区域划分为不同**环境功能区**（如大气一类/二类区、地表水 I–V 类水域、声环境功能区），分别执行**不同的环境质量标准与管理要求**。意义：实现**分区分类、差别化管理**，是总量分配与排污许可的空间依据。\n\n---\n\n## 第 6 章/第 7 章 · 规划编制与管理模式\n\n### 体系示意 · 管理手段组合\n\n```mermaid\ngraph TD\n    R[\"环境管理手段\"] --> A[\"命令控制<br/>标准·许可·限期治理\"]\n    R --> B[\"经济激励<br/>环境税·排污权交易·补贴\"]\n    R --> C[\"公众参与<br/>信息公开·公益诉讼·环境标志\"]\n    A --> D[\"刚性强、见效快、成本高\"]\n    B --> E[\"灵活、激励减排、需市场配套\"]\n    C --> F[\"监督社会化、提升合法性\"]\n```\n\n### 例题 6-1（案例分析 · 排污权交易）\n**题**：A 企业减排边际成本 $200\\ \\mathrm{元/t}$，B 企业 $600\\ \\mathrm{元/t}$。区域需再削减 COD $100\\ \\mathrm{t}$。比较\"平均分摊\"与\"排污权交易\"两种方式的总成本。\n**参考答案**：\n- **平均分摊**（各减 $50\\ \\mathrm{t}$）：$200\\times50+600\\times50=10000+30000=4.0\\times10^{4}\\ \\mathrm{元}$。\n- **交易**：由**低成本的 A 企业多减**（A 减 $100\\ \\mathrm{t}$），总成本 $200\\times100=2.0\\times10^{4}\\ \\mathrm{元}$；B 向 A 购买配额，双方与社会均获益。\n- 结论：排污权交易使减排在**边际成本最低处**完成，**总治理成本最省**，体现经济激励手段的效率优势。\n\n$$\\boxed{交易方式总成本 2.0\\times10^{4}\\ \\mathrm{元} < 平均分摊 4.0\\times10^{4}\\ \\mathrm{元}}$$\n\n### 例题 6-2（简答）\n**题**：简述\"三同时\"制度与排污许可制度在环境管理中的作用。\n**参考答案**：\n- **三同时**：建设项目防治污染设施与主体工程**同时设计、施工、投产**，是**建设期**的源头预防。\n- **排污许可**：以许可证形式明确企业**允许排放的污染物种类、浓度、总量与监测要求**，是**运营期**的\"一证式\"核心管理制度，承接总量控制并衔接执法。\n\n---\n\n> **正言若反**：方案不离容量，容量不离标准，标准不离原始 PDF 课件之图表。本篇为\"算得出、议得透\"的一层；遇疑，回归「综合复习资料」与各章素材。\n"}, {"id": "ch-00", "group": "章节素材", "title": "第00章 绪论-环境规划与管理", "md": "# 环境规划与管理 · 绪论 · 绪论-环境规划与管理 · 素材\n\n> 教师: 王思雨 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 202\n> 主版: 第 2 节 · 129 页\n\n---\n\n## 主版课件 · 第 2 节\n\n> `002-part02-绪论-环境规划与管理.pdf`\n\n<details><summary>展开 129 页图链<\/summary>\n\n- [p001](../002-part02-绪论-环境规划与管理/page_001.jpg)  · 环境规划与管理\n- [p002](../002-part02-绪论-环境规划与管理/page_002.jpg)  · 第一章\n- [p003](../002-part02-绪论-环境规划与管理/page_003.jpg)  · 课前回顾\n- [p004](../002-part02-绪论-环境规划与管理/page_004.jpg)  · 课前回顾\n- [p005](../002-part02-绪论-环境规划与管理/page_005.jpg)  · 课前回顾\n- [p006](../002-part02-绪论-环境规划与管理/page_006.jpg)  · 课前回顾\n- [p007](../002-part02-绪论-环境规划与管理/page_007.jpg)  · 课前回顾\n- [p008](../002-part02-绪论-环境规划与管理/page_008.jpg)  · 课前回顾\n- [p009](../002-part02-绪论-环境规划与管理/page_009.jpg)  · 课前回顾\n- [p010](../002-part02-绪论-环境规划与管理/page_010.jpg)  · 课前回顾\n- [p011](../002-part02-绪论-环境规划与管理/page_011.jpg)  · 课前回顾\n- [p012](../002-part02-绪论-环境规划与管理/page_012.jpg)  · 课前回顾\n- [p013](../002-part02-绪论-环境规划与管理/page_013.jpg)  · 课前回顾\n- [p014](../002-part02-绪论-环境规划与管理/page_014.jpg)  · 课前回顾\n- [p015](../002-part02-绪论-环境规划与管理/page_015.jpg)  · 四环境规划与管理的理论基础\n- [p016](../002-part02-绪论-环境规划与管理/page_016.jpg)  · 四环境规划与管理的理论基础\n- [p017](../002-part02-绪论-环境规划与管理/page_017.jpg)  · 四环境规划与管理的理论基础\n- [p018](../002-part02-绪论-环境规划与管理/page_018.jpg)  · 四五 环境规划与管理的理论基础\n- [p019](../ 国采取协调合作的行动。\n\n---\n\n**p005** ![](../002-part02-绪论-环境规划与管理/page_005.jpg)\n\n课前回顾\n2.环境规划的含义\n》环境规划是国民经济和社会发展的有机组成部分，是环境管理的首要职\n能，是环境决策在时间、空间上的具体安排，是规划管理者对一定时期\n内环境保护目标和措施作出的具体规定，是一种带有指令性的环境保护\n方案。\n》环境规划的目的是在发展经济的同时保护环境，使经济与社会协调发展。\n>环境规划的实质是一种克服人类经济社会活动和环境保护活动盲目和主\n观随意性的科学决策活动。\n\n---\n\n**p006** ![](../002-part02-绪论-环境规划与管理/page_006.jpg)\n\n课前回顾\n3.环境规划与管理的对象\n1.现代系统管理的“五要素论”\n>对于环境规划与管理，其研究对象也应包括人、物、资\n金、信息和时空5个方面：\n(1）人是第一个主要对象。\n(2）物也是重要研究对象。\n\n---\n\n**p007** ![](../002-part02-绪论-环境规划与管理/page_007.jpg)\n\n课前回顾\n3.环境规划与管理的对象\n（3）资金是系统赖以实现其目标的重要物质基础，也是规\n划与管理的研究对象。\n（4）信息是系统的“神经”，信息也是规划与管理的重要\n对象。\n（5）任何管理活动都是在一定的时空条件下进行的，环境\n规划与管理的一个突出特点是时空特性日益突出，则时\n空条件亦应成为重要的研究对象。\n\n---\n\n**p008** ![](../002-part02-绪论-环境规划与管理/page_008.jpg)\n\n课前回顾\n4. 环境规划与管理的手段\n1.行政手段\n根据国家行政法规所赋予的组织和指挥权力，对环境资源\n保护工作实施规划与管理\n2.法律手段\n是环境规划与管理的一种强制性手段\n3.经济手段\n是指利用价值规律，运用价格、税收、信贷等经济杠杆，\n充分发挥价值规律在环境管理过程的杠杆作用。\n\n---\n\n**p009** ![](../002-part02-绪论-环境规划与管理/page_009.jpg)\n\n课前回顾\n4.技术手段\n指借助那些既能提高生产率，又能把对环境污染和生态破坏\n控制到最小限度的工艺技术以及先进的污染治理技术等来达\n到保护环境目标的手段。\n5.宣传教育手段\n是环境管理不可缺少的手段。环境宣传既是普及环境科学知\n识，又是一种思想动员。\n\n---\n\n**p010** ![](../002-part02-绪论-环境规划与管理/page_010.jpg)\n\n课前回顾\n5.环境管理与环境规划的关系\n规划职能是环境管理的首要职能。\n2） 环境目标是环境规划与环境管理的共同核心。\n(3) 环境规划与管理具有共同的理论基础。\n\n---\n\n**p011** ![](../002-part02-绪论-环境规划与管理/page_011.jpg)\n\n课前回顾\n6.环境规划与管理的目的\n环境规划与管理的根本目的就是通过对可持续发展思想的传播，使人类社会\n的组织形式、运行机制以至管理部门和生产部门的决策、计划和个人的日\n常生活等各种活动，符合人与自然和谐相处的原则，并以制度、法律、体\n制和观念的形式体现出来，创建一种可持续的发展模式和消费模式\n\n---\n\n**p012** ![](../002-part02-绪论-环境规划与管理/page_012.jpg)\n\n课前回顾\n7.环境规划与管理的任务\n环境管理的基本任务应该是：转变人类社会的基本观念和\n调整人类社会的行为。\n环境文化的建设是环境规划与管理的一项长期的根本的任\n务。文化决定着人类的行为，只有转变了过去那种视环境\n为征服对象的文化，才能从根本上去解决环境问题。\n\n---\n\n**p013** ![](../002-part02-绪论-环境规划与管理/page_013.jpg)\n\n课前回顾\n人类的社会行为分为政府行为、市场行为和公众行为三种。\n》政府行为是总的国家的管理行为，诸如制定政策、法律、法令、发\n展计划并组织实施等；\n>市场行为是指各种市场主体包括企业和生产者个人在市场规律的支\n配下，进行商品生产和交换的行为；\n》公众行为则是指公众在日常生活中诸如消费、休闲和旅游等方面的\n行为。\n>这三种行为都可能会对环境产生不同程度的影响。\n\n---\n\n**p014** ![](../002-part02-绪论-环境规划与管理/page_014.jpg)\n\n课前回顾\n8.环境规划与管理的作用\n1.促进环境与经济、社会可持续发展\n2.保障环境保护活动纳入国民经济和社会发展计划\n3.实施环境政策、法规和制度的主要途径\n4.实现以较小的投资获取较佳的环境效益\n\n---\n\n**p015** ![](../002-part02-绪论-环境规划与管理/page_015.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之生态学理论\n生态文明建设之可持续发展原理\n生态文明建设之“两山论”原理\n生态文明建设之环境经济学原理\n生态文明建设之系统论原理\n生态文明建设之管理二重性原理\n\n---\n\n**p016** ![](../002-part02-绪论-环境规划与管理/page_016.jpg)\n\n四环境规划与管理的理论基础\n（2）计划类型\n由于人类活动的复杂性与多元性，计划的种类也十分复杂和多样。人\n们根据不同的背景、不同的需要编制出各种各样的计划，常见的分类\n方法见图表。\n分类原则 计划种类 分类原则 计划种类\n长期计划 政策\n按计划的时间界限划分 中期计划 按计划的范围划分 程序\n短期计划 方法\n战略计划\n按计划的约束力划 指令性计划\n按计划制定者层次划分 管理计划\n分 指导性计划\n作业计划\n经济发展计划\n综合计划\n按计划的对象划分 环境保护计划\n局部计划 按计划的性质划分\n土地利用计划\n项目计划 其他\n\n---\n\n**p017** ![](../002-part02-绪论-环境规划与管理/page_017.jpg)\n\n四环境规划与管理的理论基础\n美国环境学家米勒总结的生态学三定律是：\n生态学第一定律：任何行动都不是孤立的，对自然界的\n任何侵犯都具有无数效应，其中许多效应是不可逆的。该定\n律为哈定所提出，可称之为多效应原理或极限性原理；\n生态学第二定律：每一种事物无不与其他事物相互联系\n和相互交融。此定律可称为相互联系原理或生态链原理；\n生态学第三定律：我们生产的任何物质均不应对地球上\n自然的生物地球化循环有任何干扰。此定律可称之为勿干扰\n原理或生物多样性原理\n\n---\n\n**p018** ![](../002-part02-绪论-环境规划与管理/page_018.jpg)\n\n四五 环境规划与管理的理论基础\n我国生态学家马世骏先生提出了生态学五规律：相互制约和相\n互依赖的互生规律、相互补偿和相互协调的共生规律、物质循环转\n化的再生规律、相互适应与选择的协同化规律和物质输入输出的平\n衡规律。\n陈昌笃提出了六条生态学一般规律：物物相关、相生相克、能\n流物复、负载定额、协调稳定和时空有宜。\n\n---\n\n**p019** ![](../002-part02-绪论-环境规划与管理/page_019.jpg)\n\n四环境规划与管理的理论基础\n2012年11月，党的十八大从新的历史起点出发，做出“大力推\n进生态文明建设”的战略决策，从10个方面绘出生态文明建设的宏伟\n蓝图。建设生态文明，是关系人民福祉、关乎民族未来的长远大计。\n面对资源约束趋紧、环境污染严重、生态系统退化的严峻形势，必\n须树立尊重自然、顺应自然、保护自然的生态文明理念，把生态文\n明建设放在突出地位，融入经济建设、政治建设、文化建设、社会\n建设各方面和全过程，努力建设美丽中国，实现中华民族永续发展。\n\n---\n\n**p020** ![](../002-part02-绪论-环境规划与管理/page_020.jpg)\n\n四 环境规划与管理的理论基础\n生态系统的极限性原理：\n生态环境系统中的一切资源都是有限的，对于污染\n和破坏带来的影响，生态环境系统也只有一定限度\n的承受能力。\n如果超过这个限度，就会使自然系统失去平衡稳定\n的能力，引起质量上的衰退，并造成严重的后果。\n人类对环境资源的开发利用，必须维持自然资源的\n再生功能和环境质量的恢复能力，不充许超过生物\n圈的承载能力或容许极限。\n环境容量和环境承载力：\n在进行环境规划与管理时，根据极限性原理，对生态\n环境系统中各因素（水、气、土地等）的功能限度进\n行定义。\n\n---\n\n**p021** ![](../002-part02-绪论-环境规划与管理/page_021.jpg)\n\n四 环境规划与管理的理论基础\n1、环境容量\n环境容量是一个复杂的反映环境净化能力的量，其\n数值应能表征污染物在环境中的物理、化学变化及空\n间机械运动的性质。\n《环境科学大辞典》\n某环境单元给定环境功能区目标和环境质量目标下\n所充许承纳的污染物质的最大数量\n环境容量是反映生态平衡规律，污染物在自然环境\n中的迁移转化规律，以及生物与生态环境之间的物\n质能量交换规律的综合性指标\n环境容量是自然生态环境的基本属性之一，由自然\n生态环境特征和污染物质特征共同决定。\n\n---\n\n**p022** ![](../002-part02-绪论-环境规划与管理/page_022.jpg)\n\n四 环境规划与管理的理论基础\n1、环境容量\n环境容量值大小，与该环境单元本身的组成和结构\n有关，其变化具有明显的地带性规律和地区性差异\n环境容量的准确测量需要较长的研究、监测时间，\n在实际应用中通常采用简化的计算方式。\nM=K+R\n基本环境容量 可变环境容量\n/稀释容量 /自净容量\n由于环境容量的自净机制，可用环境浓度标准值与\n背景值之差，通过一定的输入输出关系转换成排放量，\n即以污染物的充许排放量作为环境容量。\n\n---\n\n**p023** ![](../002-part02-绪论-环境规划与管理/page_023.jpg)\n\n四 环境规划与管理的理论基础\n1、环境容量\nM=K+R\n基本环境容量 可变环境容量\n/稀释容量 /自净容量\n例如：水环境容量\n稀释容量：在给定水域的来水污染物浓度高于\n出水水质目标时，依靠稀释作用达到水质目标\n自净 所能承纳的污染物量\nK 自净容量：由于沉降、生化、吸附等物理、化\n稀释 学和生物作用，给定水域达到水质目标所能自\n净的污染物量\n\n---\n\n**p024** ![](../002-part02-绪论-环境规划与管理/page_024.jpg)\n\n四环境规划与管理的理论基础\n1、环境容量\n环境容量是一种环境资源，但随着社会的快速发展\n绝大部分地区的环境容量已经很小，许多地区污染排\n放量已经远远超过环境容量允许的排放量。\n基于环境容量进行区域污染物排放总量控制是目前较\n为通用的方法\n基于总量控制的城市环境整治规划的模式：\n根据污染源调查结果和已制定的社会经济发展规划，\n调用各种模型预测未来的环境质量；\n根据预测结果和已制定的环境目标，通过浓度、排\n放量转换关系计算环境容量；\n根据环境容量和污染物总削减量，最后得到综合治\n理方案。\n\n---\n\n**p025** ![](../002-part02-绪论-环境规划与管理/page_025.jpg)\n\n四环境规划与管理的理论基础\n1、环境容量\n1996年7月，第四次全国环境保护会议提出《国家环境保护“九五”计\n划和2010年远景目标》，明确“实施污染物排放总量控制计划”。\n1998年，《全国环境保护工作（1998-2002）纲要》，提出了“一控\n双达标” 全国主要污染物实施总量控制。\n2002年1月，《国家环境保护“十五”计划》，明确了“十五”期间努\n力完成控制污染物排放总量等三大任务。\n十一五环境保护规划：到2010年，二氧化硫和化学需氧量排放得到控\n制，重点地区和城市的环境质量有所改善，生态环境恶化趋势基本遏制。\n十二五环境保护规划：到2015年，主要污染物排放总量显著减少：城\n乡饮用水水源地环境安全得到有效保障，水质大幅提高；重金属污染得\n到有效控制，持久性有机污染物、危险化学品、危险废物等污染防治成\n效明显；城镇环境基础设施建设和运行水平得到提升。\n\n---\n\n**p026** ![](../002-part02-绪论-环境规划与管理/page_026.jpg)\n\n四环境规划与管理的理论基础\n1、环境容量\n环境容量应是一个系统性的、与人类社会行为息息\n相关的动态变化量。环境容量的概念表述了环境容纳\n污染物的能力，但这只是环境功能的一部分。\n除此之外，环境还为人类提供了生存和发展所必需\n的资源、能源，为人类提供各种精神财富和文化载体。\n环境对人类社会的支持作用远大于环境容量\n这一概念的内涵。\n\n---\n\n**p027** ![](../002-part02-绪论-环境规划与管理/page_027.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力：\n是指不破坏自然环境的情况下，自然环境能够承载和\n支撑的人类社会活动的强度和总量\n环境承载力原理：\n只有将人类社会各种生存和发展的活动的强度和总量，\n控制在自然环境的承载力范围之内，才能认为这种生存\n与发展活动才具有可持续性。环境承载力是判断一项人\n类活动是否对自然环境构成威胁或破坏的基本标准。\n\n---\n\n**p028** ![](../002-part02-绪论-环境规划与管理/page_028.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力是一个最低标准，是人类活动不能超过的\n界限，一旦超过这个界面，自然环境系统将发生不可\n逆转的破坏，进而对人类的健康生存和发展构成危害。\n科学地确定一个地区、城市\n的环境承载力，确定人类活\n动的环境限制底线，是环境\n管理最重要的基础工作之一\n\n---\n\n**p029** ![](../002-part02-绪论-环境规划与管理/page_029.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力是环境系统固有功能的表现，它不仅与环\n境系统本身的结构有关，还与外界（人类社会经济活\n动）的输入输出有关。\n环境承载力的描述\nEBC = f(T,S,B)。 人类经济行为\n的规模与方向\n时间 空间\n\n---\n\n**p030** ![](../002-part02-绪论-环境规划与管理/page_030.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n人类积极的环保行为可在一定程度上提高环境承载\n力。如人类通过优化自己的活动，可以提高某一区\n域的环境承载力，使其承载更多的人口和发展活动。\n人类可以通过修建污水处理厂，\n废弃物处理中心、绿色造林等\n生态环境保护和建设产业，进\n一步提高环境承载力。这是人\n类环境管理行为合理性的依据\n\n---\n\n**p031** ![](../002-part02-绪论-环境规划与管理/page_031.jpg)\n\n四环境规划与管理的理论基础\n2、环境承载力\n环境承载力指标体系\n环境系统与人类社会经济系统：物质、能量和信息的代谢，可以分为三部分指标：\n资源供给指标。如水资源、土地资源和生物资源的数量、质量和开发利用程度；\n社会影响指标。如经济总量、污染治理投资、公用设施水平和人口密度等；\n污染容纳指标。如污染物的排放量、绿化状况和污染物净化能力等。\n通过环境承载力指标体系，可以间接量化表达某一区域的环境承载量和环境承载力。\n\n---\n\n**p032** ![](../002-part02-绪论-环境规划与管理/page_032.jpg)\n\n四环境规划与管理的理论基础\n2、环境承载力\n环境承载力的特征\n客观性和主观性：客观性体现在一定时期和状态下的环境承载力\n是客观存在的，是可以衡量和评价的；主观性体现在人们对环境\n承载里的评价分析具有主观性。\n区域性和时间性：指不同时期、不同区域的环境承载力是不同的，\n相应的评价指标的选取和量化评价方法也应有所不同。\n动态性和可调控性：指其大小是随着时间、空间和生产力水平的\n变化而变化的。人类可以通过改变经济增长方式、提高技术水平\n等手段来提高区域环境承载力，使其向有利于人类的方向发展。\n\n---\n\n**p033** ![](../002-part02-绪论-环境规划与管理/page_033.jpg)\n\n四 环境规划与管理的理论基础\n环境容量与环境承载力的区别与联系\n环境容量 环境承载力\n区别\n是自然生态环境的基本属性之一 既不是纯粹描述自然环境特征的量\n也不是一个描述人类社会的量\n侧重反映环境系统的自然属性，即内 侧重体现和反映环境系统的社会属性，\n在的自然票赋和性质 即外在的社会票赋和性质\n联系\n在科学技术和社会关系发展的一定阶 一定时期、一定状态下的环境承载力\n段，环境容量具有相对的确定性、有 也是有限的，但可以通过人类环境保\n限性 护行为动态的、可调控的\n\n---\n\n**p034** ![](../002-part02-绪论-环境规划与管理/page_034.jpg)\n\n四环境规划与管理的理论基础\n生态系统的生态链原理\n所谓生态链原理系指按照生态学第二定律“每一种\n事物无不与其他事物相互联系和相互交融”的原理，模\n仿生态系统物质循环和能量流动的规律重构工业（产业）\n系统，推行循环经济模式，研究现代工业系统运行机制\n的耦合思想，是环境规划与管理的重要理论基础。\n1.工业生态学\n2.生态工业园\n\n---\n\n**p035** ![](../002-part02-绪论-环境规划与管理/page_035.jpg)\n\n四环境规划与管理的理论基础\n1、工业生态学\n（1）工业生态学的定义\n工业生态学是”人类在经济、文化和技术不断发展的前提下，\n有目的、合理地去探索和维护可持续发展的方法”，“要求不是孤立而\n是协调地看待产业系统与其周围环境的关系”。\n工业生态学又称产业生态学，是一门研究社会生产活动中自然\n资源从源、流到汇的全代谢过程、组织管理体制以及生产、消费、调\n控行为的动力学机制、控制论方法及其与生命支持系统相互关系的系\n统科学。\n\n---\n\n**p036** ![](../002-part02-绪论-环境规划与管理/page_036.jpg)\n\n四五 环境规划与管理的理论基础\n工业生态学实践者界定的工业的外延非常广泛，涵盖了人类的各种活动，\n其研究范围不仅仅局限在一个企业的围墙之内，而是扩展到人类生存和活动\n对地球造成的各种影响，包括社会对资源的利用，成为循环经济理论产生的\n基础。它认为工业系统中的物质、能源、信息的流动和储存不是孤立的简单\n叠加关系，而是像自然生态系统那样可以循环运行，他们之间相互依赖、相\n互作用、相互影响，形成复杂的、相互连接的网络系统。\n\n---\n\n**p037** ![](../002-part02-绪论-环境规划与管理/page_037.jpg)\n\n四环境规划与管理的理论基础\n工业生态学的思想包含了”从摇篮到坟墓”的全过程管理系统观，即在产\n品的整个生命周期内不应对环境和生态系统造成危害，产品生命周期包括原\n材料采掘、原材料生产、产品制造、产品使用以及产品用后处理。工业代谢\n分析和生命周期评价是目前工业生态学中普遍使用的有效方法。\n工业生态学以生态学的理论观点考察工业代谢过程，亦即从取自环境到\n返回环境的物质转化全过程，研究工业活动和生态环境的相互关系，以研究\n调整、改进当前工业生态链结构的原则和方法，建立新的物质闭路循环，使\n工业生态系统与生物圈兼容并持久生存下去。\n\n---\n\n**p038** ![](../002-part02-绪论-环境规划与管理/page_038.jpg)\n\n四环境规划与管理的理论基础\n（2）特征及趋势\n工业生态学领域开始社群化，目前已经出现了专注于物质流\n分析的分会和专注于生态工业发展的分会两大子群。发达国家占\n据工业生态学领域的主导地位，且欧、美、日三足鼎立的格局日\n益明显。其中，美国强于概念体系、理论构建和全球视野，欧洲\n强于大项自主导和系统实践，日本则精于刻画并看眼于亚洲视角。\n工业生态学的理论基础和学科体系仍然比较模糊，社会物质代谢\n和生态工业发展成为学科的主体构成，但前者偏于还原视角，后\n者理论建构不足。生态工业园区、城市代谢、节能减排与气候变\n化等都成为了工业生态学应用的热点领域，\n\n---\n\n**p039** ![](../002-part02-绪论-环境规划与管理/page_039.jpg)\n\n四环境规划与管理的理论基础\n2、生态工业园\n生态工业园是建立在一块固定地域上的由制造企业和服务企\n业形成的企业社区。在该社区内，各成员单位通过物流或能流传\n递等方式把不同工厂或企业连接起来，形成共享资源和互换副产\n品的产业共生组合，使一家工厂的废弃物或副产品成为另一家工\n厂的原料或能源，模拟自然系统，在产业系统中建立”生产者一消\n费者一分解者”的循环途径。并通过共同管理环境事宜和经济事宜\n来获取更大的环境效益、经济效益和社会效益。整个企业社区能\n获得比单个企业通过个体行为的最优化所能获得的效益之和更大\n的效益。\n\n---\n\n**p040** ![](../002-part02-绪论-环境规划与管理/page_040.jpg)\n\n四环境规划与管理的理论基础\n（2）生态工业园的建设实践\n一般认为，生态工业园的形是工业共生体，丹麦的卡伦堡共生\n体就是工业共生体的成功典范。卡伦堡生态工业园是世界上最早\n也是最著名的生态工业园，其主体企业是发电厂、炼油厂、制药\n厂、石膏板生产厂。以这4个企业为核心，通过贸易方式利用对方\n生产过程中产生的废弃物和副产品，不仅减少了废物产生量和处\n理的费用，还产生了较好的经济效益，形成了经济发展与环境保\n护的良性循环。这是生态工业园发展的形，也是工业生态学的\n第一次实践。\n\n---\n\n**p041** ![](../002-part02-绪论-环境规划与管理/page_041.jpg)\n\n四环境规划与管理的理论基础\n美国是世界上最为积极投身于生态工业园规划和建设的国家。\n在1994年，总统可持续发展理事会指定了4个社区作为生态工业\n园区的示范点，即马里兰州的巴尔的摩、弗吉尼亚州的查尔斯、\n德克萨斯州的布郎斯和田纳西州的恰塔努加。美国的生态工业园，\n涉及生物能源开发、废物处理、清洁工业、固体和液体废物的再\n循环等多种行业多个层次，并且各具特色。\n\n---\n\n**p042** ![](../002-part02-绪论-环境规划与管理/page_042.jpg)\n\n四环境规划与管理的理论基础\n我国的工业园区发展经历了三个阶段，其中第一代园区内主\n要以劳动密集型的”三来一补“型企业为主，技术含量低；第二代\n园区的企业以高新技术应用为特征；第三代园区则是生态工业园，\n其基本功能是解决经济、环境和社会三者协调发展问题。\n2001年8月，我国第一个国家级生态工业示范园区一广西贵\n港国家生态工业（制糖）示范园区由原国家环保总局授牌建设。之后，\n辽宁、江苏、山东、天津、新疆、内蒙古、注江、广东等省、直\n辖市、自治区分别开展了生态工业园区建设的试点，试点不仅覆\n盖制糖、造纸、化工、水泥、冶金等传统行业，也有电子、环保、\n汽车、生物化工等高科技行业\n\n---\n\n**p043** ![](../002-part02-绪论-环境规划与管理/page_043.jpg)\n\n四环境规划与管理的理论基础\n2003年12月国家环保总局把生态工业示范园区（生态工业园\n区）定义为依据清洁生产要求、循环经济理念和工业生态学原理\n而设计建立的一种新型工业园区。它通过物流或能流传递等方式\n把不同工厂或企业连接起来，形成共享资源和互换副产品的产业\n共生组合，使一家工厂的废弃物或副产品成为另一家工厂的原料\n或能源，模拟自然系统，在产业系统中建立“生产者一消费者一分\n解者”的循环途径。\n\n---\n\n**p044** ![](../002-part02-绪论-环境规划与管理/page_044.jpg)\n\n四 环境规划与管理的理论基础\n生物多样性原理 一与自然和谐相处的环境伦理观\n1、生命中心主义\n·生命中心主义的代表人物之一保罗?泰勒在《尊重自然》一\n书中写到：“采取尊重自然的态度，就是把地球自然生态\n系统中的野生动物看做是具有固有价值的东西。“根据他\n的意见，所谓”尊重自然”就是尊重”作为整体的生物共同\n体”，而尊重”生物共同体”就是承认构成共同体的每个动\n植物体的”固有的价值”。并认为，人类不是万物的中心，\n所有生命都应该受到尊重\n\n---\n\n**p045** ![](../002-part02-绪论-环境规划与管理/page_045.jpg)\n\n四 环境规划与管理的理论基础\n提出生命中心主义的环境伦理观，\n其目的是为了保护野生的动物，\n避免被人类伤害。由于人类在组\n成社会、进行生产和发展文化的\n过程中，已经具备了其他生物无\n与伦比的力量和优势，因此，只\n有从价值观上肯定野生动植物也\n像人一样具有它不可剥夺的“权\n利”与“价值”，才能避免人类对\n自然生物的进一步伤害，并使人\n类承担起对自然的伦理责任。\n\n---\n\n**p046** ![](../002-part02-绪论-环境规划与管理/page_046.jpg)\n\n四五 环境规划与管理的理论基础\n2、地球整体主义\n李奥波德提出”大地伦理”，是指”规范人与大地以及人与依存\n于大地的动植物之间关系的伦理规则”，其基本主张是要将人\n“从大地这一共同体的征服者转变成为这一共同体的平凡一员、\n一个构成要素”。\n“大地伦理”的特征是将”共同体”的概念从以往伦理学所研究的\n人类社会共同体的关系扩展到了大地。这里”大地”包括土壤、\n水、植物、动物等，其实是整个自然生态系统。\n\n---\n\n**p047** ![](../002-part02-绪论-环境规划与管理/page_047.jpg)\n\n四环境规划与管理的理论基础\n3、代际均等的环境伦理观\n与生命中心主义及地球整体主义不同，持这种观点的人的立场\n是以人类为中心的。\n它只考虑人类各成员的均等，而将自然环境和其他生命有机体\n看做是人类均等义务，最终都源于我们人类各成员相互间所应\n承担的义务。\n·这一伦理观不同于传统的伦理观之处，是它把人类各成员间的平\n等关系从“代内”扩展到”代际”，认为在享有自然资源与拥有良好\n的环境上，我们的子孙后代与我们当代人具有同等的权利。\n\n---\n\n**p048** ![](../002-part02-绪论-环境规划与管理/page_048.jpg)\n\n四 环境规划与管理的理论基础\n阅读材料一生物多样性\n①什么是生物多样性？\n生物多样性（biologicaldiversity）是指地球上的生物（包括\n动物、植物、微生物）在所有形式、层次和联合体中生命的多样\n化，包括生态系统多样性、物种多样性和基因多样性。生物多\n样性是地球上生命经过几十亿年发展进化的结果，是人类赖以\n生存的物质基础。\n\n---\n\n**p049** ![](../002-part02-绪论-环境规划与管理/page_049.jpg)\n\n四环境规划与管理的理论基础\n如果你学过生物学，你会知道这是一种研究有生命的物体的学科，\n从研究最微小的生命组成部分，到植物和动物。而”多样性”简单来说\n就是”各种各样”的意思。生物多样性包括所有自然世界的资源，包括\n植物、动物、昆虫、微生物和它们生存的生态系统。它同样包括构造\n出生命的重要基石一一染色体、基因和脱氧核糖核酸。\n你也是生物多样性的一部分。生物多样性使生命在这个行星上变\n得可能。没有生物多样性，你也不能在这个行星上生存。就算你可以\n生存下来，你也不可能喜欢这个灰暗的、无生气的、光秃秃的、无聊\n的世界。没有生物多样性，你不会感受到树林带给你的绿意、海洋带\n给你的蓝色，也不会有你呼吸的空气、吃的食物、喝的水。\n\n---\n\n**p050** ![](../002-part02-绪论-环境规划与管理/page_050.jpg)\n\n四环境规划与管理的理论基础\n②为什么生物多样性如此重要？\n生物多样性带给我们无尽美丽的自然世界。生物多样性可以帮\n助清洁我们呼吸的空气以及喝的水。人类还利用生物多样性得到了\n所需的全部食品、许多药物和工业原料。物种为人类提供了食物的\n来源，作为人类基本食物的农作物、家禽和家畜等均源自野生物种。\n野生物种是培育新品种不可缺少的原材料，特别是随着近代遗传工\n程的兴起和发展，物种的保存有着更深远的意义。物种是多种药物\n的来源，随着医学研究的深入，越来越多的物种被发现可作药用。\n\n---\n\n**p051** ![](../002-part02-绪论-环境规划与管理/page_051.jpg)\n\n四环境规划与管理的理论基础\n以上的例子是人们所熟知的直接价值，而间接价值也非同小可：\n物种多样性对科学技术的发展是不可或缺的。仿生学的发展离不开丰富\n而奇异的生物世界。生物多样性是维持生态系统相对平衡的必要条件，某（些）\n物种的消亡可能引起整个系统失衡甚至崩溃。\n生物多样性的间接价值主要与其功能有关：固定太阳能、调节水文、防\n止水土流失、调节气候、吸收分解污染物、贮存营养元素并促进养分循环和\n维持进化过程等方面都与生物多样性间接相关。许多自前认为无足轻重的物\n种，可能有着重要的价值。\n\n---\n\n**p052** ![](../002-part02-绪论-环境规划与管理/page_052.jpg)\n\n四环境规划与管理的理论基础\n③生物多样性现在的状况如何？\n地球上的生物种类非常丰富，自前科学家们估计现存的生物物\n种数量在870万种左右，其中包括777万种动物、29.8万种植物、\n61.1万种真菌、3.64万种原生动物和2.75万种藻类等。然而，这只\n是一个估计值，实际的物种数量可能会更多。不过经人类研究和加\n以利用的只是其中的一小部分。很多物种还没来得及定名就已灭绝。\n据估计，全球原始森林的面积仅占地球表面的2%左右。需要注\n意的是，原始森林的面积正在不断缩小，这对生物多样性和生态系\n统造成了严重威胁。无数的动植物在人类还没认识它们之前就随着\n原始森林的砍伐、污染、围湖填海等原因提前从地球上消失了。\n\n---\n\n**p053** ![](../002-part02-绪论-环境规划与管理/page_053.jpg)\n\n四环境规划与管理的理论基础\n不同类型的生态系统面积锐减，无法再现的基因、物种和生态系统正\n以前所未有的速度消失。如果不立即采取有效措施，人类将面临能否继续\n以其固有方式生活的挑战。生物多样性的研究、保护和持续合理利用待\n加强，刻不容缓。\n1994年12月29日，联合国大会49/119号决议案宣布12月29日为“国\n际生物多样性日”。从2001年起，根据第55届联合国大会第201号决议，\n国际生物多样性日由原来的每年12月29日改为5月22日。这个国际纪念日\n的确立，说明生物多样性问题已经引起各国政府的广泛关注。生物多样性\n保护与持续利用已成为人类与环境领域的中心议题。\n\n---\n\n**p054** ![](../002-part02-绪论-环境规划与管理/page_054.jpg)\n\n四环境规划与管理的理论基础\n④中国采取了哪些措施？\n中国是生物多样性特别丰富的国家，以高等植物为例，中国约有3万\n种，美国约1.8万种，整个欧洲仅1.2万种。\n由于中国是人口最多的国家，对生物多样性具有很大的依赖性。中国\n经济的高速发展和庞大的人口压力给生物多样性造成很大影响，致使中国\n成为生物多样性受到严重威胁的国家。在《濒危野生动植物种国际贸易公\n约》列出的640个世界性濒危物种中，中国就占了约25%，共156种，形\n势十分严峻。\n\n---\n\n**p055** ![](../002-part02-绪论-环境规划与管理/page_055.jpg)\n\n四环境规划与管理的理论基础\n截止到1995年末，全国已建成各级各类自然保护区799处，面\n积达7185万hm2，约占国土面积的7.48%，其中10处自然保护区\n加入”人与生物圈保护网络”，6处被列入《国际重要湿地名录》。到\n1995年底，全国建立珍稀濒危物种繁育基地200多处，国家濒危物\n种进出口管理中心在全国主要口岸城市设立了17个办事处。\n同时还组织实施了对大熊猫、朱、扬子鳄、海南坡鹿、野马、\n麋鹿、高鼻羚羊的”七大拯救工程”。\n面对全国范围内的生物物种危机，这些努力无疑是远远不够的，\n还需要全体国民的重视和对物种栖息地的持续改善\n\n---\n\n**p056** ![](../002-part02-绪论-环境规划与管理/page_056.jpg)\n\n四 环境规划与管理的理论基础\n我们可以做些什么？\n作为普通公民，我们能为生物\n多样性保护做些什么呢？\n最显而易见的是反对、监督、\n制止偷猎、采摘珍稀野生动植物的\n行为，让野生动植物远离我们的餐\n桌。穿着野生动物皮毛服装也是我\n们反对的行为。同时，在发展生产\n的同时，尽可能保护野生动植物的\n栖息地。\n\n---\n\n**p057** ![](../002-part02-绪论-环境规划与管理/page_057.jpg)\n\n四 环境规划与管理的理论基础\n生态文明建设之可持续发展理论\n一、可持续发展的定义\n二、可持续发展的原则\n三、可持续发展研究的主要内容\n\n---\n\n**p058** ![](../002-part02-绪论-环境规划与管理/page_058.jpg)\n\n四环境规划与管理的理论基础\n1、可持续发展的定义\n1987年，在《我们共同的未来》报告中正式使用了“可持续发\n展”的概念，即”既能满足当代人的需要，又不对后代人满足其需要\n的能力构成危害的发展”。\n1992年6月联合国环境与发展会议通过了以可持续发展为核心\n的《里约环境与发展宣言》和《21世纪议程》等重要文件。\n1994年3月，国务院第16次常务会议讨论通过了《中国21世纪\n议程-中国21世纪人口、环境与发展白皮书》，首次把可持续发展战\n略纳入我国经济和社会发展的长远规划。\n1997年把可持续发展战略确定为我国”现代化建设中必须实施\n的战略，与科教兴国战略一起被确定为中国走向21世纪的两大国家\n战略\n\n---\n\n**p059** ![](../002-part02-绪论-环境规划与管理/page_059.jpg)\n\n四环境规划与管理的理论基础\n可持续发展包含需要和限制两层含义，需要是指世界各国人们\n的基本需要，应将此放在特别优先的地位来考虑；限制是指当前的\n技术状况和社会组织对环境满足现在和将来需要的能力施加的限制\n可持续发展理论的形成是以唯物史观为基础的，其直接目的是\n解决生态恶化的困境，寻求克服传统发展模式对生态环境产生负面\n影响的有效途径。可持续发展理论强调把环境保护作为发展进程的\n一个重要组成部分，作为衡量发展质量、发展水平和发展程度的客\n观标准之一。注重环境与经济的协调，人与自然的和谐，认为健康\n的经济发展应建立在生态可持续、社会公正和人民积极参与自身发\n展决策的基础上。\n\n---\n\n**p060** ![](../002-part02-绪论-环境规划与管理/page_060.jpg)\n\n四 环境规划与管理的理论基础\n2、可持续发展的原则\n1.协调原则：社会、经济、环境。\n2.公平原则：自然资源、社会财富\n3.持续原则：当前利益、长远利益\n4.共同原则：协调、公平、持续。\n\n---\n\n**p061** ![](../002-part02-绪论-环境规划与管理/page_061.jpg)\n\n四环境规划与管理的理论基础\n3、可持续发展的主要内容\n1.环境保护与可持续发展\n环境保护是可持续发展的重要方面；可持续发展的核心是发\n展，但要求在严格控制人口、提高人口素质和保护环境、资\n源永续利用的前提下进行经济和社会的发展。环境保护是区\n分可持续发展与传统发展的分水岭和试金石\n现代发展不仅满足于物质和精神消费，还把建设舒适、安全、\n清洁、优美的环境作为实现的重要目标。可持续发展把环境\n保护作为衡量发展质量、发展水平和发展程度的客观标准之\n\n---\n\n**p062** ![](../002-part02-绪论-环境规划与管理/page_062.jpg)\n\n四环境规划与管理的理论基础\n可持续发展要求加快环保新技术研制和普及，只有大量使用\n先进科技才能使单位生产量的能耗、物耗大幅度下降，减轻\n环境的污染负荷。环境保护是可持续发展进程的一个部分，\n可持续发展非常重视环境保护，把环境保护作为它积极追求\n实现的最基本的目的之一。\n可持续发展一方面要求人们在生产时少投入，多产出；另一\n方面要求人们消费时尽可能多利用，少排放。因此，我们必\n须纠正过去单纯靠增加投入、加大消耗实现发展和以牺牲环\n境来增加产出的做法，从而使发展更少的依赖有限的资源，\n更多的与环境容量有机的协调\n\n---\n\n**p063** ![](../002-part02-绪论-环境规划与管理/page_063.jpg)\n\n八 环境规划与管理的理论基础\n2.经济与可持续发展\n人类要走可持续发展之路，经济系统的生态化是必由之路。\n经济生态化核心是经济系统向自然生态系统有选择性的学习\n重新定位经济系统，保持经济系统索取和资源环境供给之间\n协调，经济系统废弃物排放和环境承载力协调。\n构建循环型经济，更是可持续发展的工具和钥匙。\n\n---\n\n**p064** ![](../002-part02-绪论-环境规划与管理/page_064.jpg)\n\n四环境规划与管理的理论基础\n3.社会与可持续发展\n对人口资源的正确估计是可持续发展战略考虑的前提\n之一。要考虑人口的绝对数量与粮食问题、人口老化\n及养老保障、城市化带来的农业人口过剩、妇女问题\n和社会分工、人口素质、教育和社会结构的完善、人\n口信息的开发与利用及家庭结构问题。另外灾害防治\n和环境法制的研究也是可持续发展的重要方面。\n\n---\n\n**p065** ![](../002-part02-绪论-环境规划与管理/page_065.jpg)\n\n四 环境规划与管理的理论基础\n社会发展要和谐发展，和谐发展的核心是科学发展观，即”坚持以\n人为本，树立全面、协调、可持续的发展观，促进经济社会和人\n的全面发展”和”统筹城乡发展、统筹区域发展、统筹经济社会发\n展、统筹人与自然发展、统筹国内发展与对外开放的要求”。和谐\n发展强调”各明其位”、“各得其所”和“各尽所能”。\n\n---\n\n**p066** ![](../002-part02-绪论-环境规划与管理/page_066.jpg)\n\n四环境规划与管理的理论基础\n4.区域的可持续发展\n区域可持续发展的核心就是经济增长点。\n首先其规模应相对地大，才能产生充分的直接效应和间接效\n应;\n其次，应当是增长最快的产业和地区；\n第三，应同其他产业部门之间具有高强度的投入产出关系，\n能够是增长效应被传递分散；\n第四，它应是创新的”朝阳式”产业或企业。新经济增长点\n的作用已被中国经济发展的实际所证实。\n\n---\n\n**p067** ![](../002-part02-绪论-环境规划与管理/page_067.jpg)\n\n四 环境规划与管理的理论基础\n可持续发展的基本思想\n（1）可持续发展并不否定经济增长，尤其\n是不能否定欠发达国家的经济增长，但需\n要重新审视如何实现经济增长\n·经济增长一一主要指GNP或GDP增长是\n一种数量上扩大的范式；\n\n---\n\n**p068** ![](../002-part02-绪论-环境规划与管理/page_068.jpg)\n\n四环境规划与管理的理论基础\n必须正确认识GDP的数量和质量\n·GDP的局限性：不能反映社会成本、社会分配和社会公正\n资源环境代价；不能衡量经济增长的效率、效益和质量\n5岁以下要儿死亡率的下降%） 成人识字率变化(%)\n预期寿命变化（%)\n人均GDP变化(%) 20 人均GDP变化（%) 人均GDP变化（%)\n数据：133个国家（1970-2002年），作者计算\n·只注重经济总量和速度的增长，而不顾资源损失、环境污染、生态破坏，\n有可能造成经济增长了，人民生活质量（HDI）却下降了的局面，经济也不能\n持续增长。\n\n---\n\n**p069** ![](../002-part02-绪论-环境规划与管理/page_069.jpg)\n\n四 环境规划与管理的理论基础\n可持续发展的基本思想\n（2）以提高生活质量为目标，同社会进步相适应\n(3) 承认自然环境的价值，而且这种价值不仅体现在\n环境对经济系统的支撑和服务价值上，也体现在环\n境对生命支持系统的不可缺少的存在价值上\n（4）以自然资源为基础、同环境承载能力相协调\n\"可持续性”可以通过适当的经济手段、技术措施\n和政府干预得以实现\n目的是减少自然资源的耗竭速率，使之低于资源再\n生速率\n\n---\n\n**p070** ![](../002-part02-绪论-环境规划与管理/page_070.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之”两山论“原理\n一、“两山论\"的含义\n二、“两山论\"的发展和生态文明思想\n\n---\n\n**p071** ![](../002-part02-绪论-环境规划与管理/page_071.jpg)\n\n四 环境规划与管理的理论基础\n生态文明建设之”两山论“原理\n习近平总书记多次强调“绿水青山就是金山银山”，\n更进一步指出“树立正确的政绩观，不能只要金山银\n山，不要绿水青山”。“绿水青山就是金山银山\"已经\n成为习近平生态文明思想的重要组成部分，对我国生\n态环境和经济发展产生了深远的影响。\n\n---\n\n**p072** ![](../002-part02-绪论-环境规划与管理/page_072.jpg)\n\n四 环境规划与管理的理论基础\n发展历程\n2005年8月 2013年月 2015年月\n时任浙江省委书 习总书记提出两山论三个阶段 《关于加快推进生态\n记的习近平同志 1.既要绿水青山，也要金山银 文明建设的意见》将\n在浙江安吉考察 山。 “坚持绿水青山就是\n时提出：“绿水 2.宁要绿水青山，不要金山银 金山银山”写进了中\n青山就是金山银 山。 央文件，成为中国生\n山\"的科学论断。 3.绿水青山就是金山银山。 态文明建设的指导思\n想。\n\n---\n\n**p073** ![](../002-part02-绪论-环境规划与管理/page_073.jpg)\n\n四 环境规划与管理的理论基础\n2016年月 2017年10月 2018年月\n联合国环境大会发布 习总书记在全国生态环\n十九大将其写入党代会报告\n了《绿水青山就是金 保大会上提出了六项重\n同时《中国共产党章程（修\n山银山：中国生态文 要原则，其中两山论就\n正案）》在总纲中也增加了\n明战略行动》，为世 是六大重要原则之一，\n两山论这一表述，称为我党\n界可持续发展理念提 为我国生态文明建设指\n的重要执政理念之一。\n供了“中国方案”。 明了方向。\n\n---\n\n**p074** ![](../002-part02-绪论-环境规划与管理/page_074.jpg)\n\n四 环境规划与管理的理论基础\n2016年月 2017年10月 2018年月\n联合国环境大会发布 习总书记在全国生态环\n十九大将其写入党代会报告\n了《绿水青山就是金 保大会上提出了六项重\n同时《中国共产党章程（修\n山银山：中国生态文 要原则，其中两山论就\n正案）》在总纲中也增加了\n明战略行动》，为世 是六大重要原则之一，\n两山论这一表述，称为我党\n界可持续发展理念提 为我国生态文明建设指\n的重要执政理念之一。\n供了“中国方案”。 明了方向。\n\n---\n\n**p075** ![](../002-part02-绪论-环境规划与管理/page_075.jpg)\n\n四 环境规划与管理的理论基础\n2019年6月 2020年03月\n中国的发展绝不会以牺牲环境为代 绿水青山就是金山银山”理念已\n价。我们将秉持绿水青山就是金山 成为全党全社会的共识和行动，成\n银山的发展理念，坚决打赢蓝天、 为新发展理念的重要组成部分。实\n碧水、净土三大保卫战，鼓励发展 践证明，经济发展不能以破坏生态\n绿水环保产业，大力发展可再生能 为代价，生态本身就是经济，保护\n源，促进资源节约和循环利用。 生态就是发展生产力。\n\n---\n\n**p076** ![](../002-part02-绪论-环境规划与管理/page_076.jpg)\n\n四环境规划与管理的理论基础\n绿水青山就是金山银山\n绿水青山 指的是结构和功能良好的生态系统。\n金山银山：指的是满足人类需求的各种财富和福社。\n人类生态系统是人与自然相互依存、相互影响的有机整体，维持人与自\n然和谐健康发展的基本导向是以人的福社为目标，而人的福社既包含了对物\n质财富和精神财富的需求，也包含了对良好生态环境的需求。\n\n---\n\n**p077** ![](../002-part02-绪论-环境规划与管理/page_077.jpg)\n\n四 环境规划与管理的理论基础\n绿水青山就是金山银山\n生动诠释了生态经济的自然资本观\n“绿水青山\"是支撑人类发展的基础，不仅 习近平总书记这样论述\n绿水青山就是\n为人类提供各种物质原料，还创造与维持 金山银山\n了地球生命支持系统，具有重要生态价\n值。\n习近平论大力推进生态文明建设\n如果将生态系统转化为生态经济优势，\n自然资本将会成为国家财富的重要组成\n部分，绿水青山就变成了金山银山。\n\n---\n\n**p078** ![](../002-part02-绪论-环境规划与管理/page_078.jpg)\n\n四 环境规划与管理的理论基础\n绿水青山就是金山银山\n绿水青山就是金山银山 生态文明\n本质 核心思想 核心 根本问题\n回答什么是绿 实现经济发展与 正确处理好经济\n人与自然\n色发展，怎样 生态环境保护互 发展和生态环境\n和谐共处。\n实现绿色发展。 动双赢。 保护的关系。\n\n---\n\n**p079** ![](../002-part02-绪论-环境规划与管理/page_079.jpg)\n\n四环境规划与管理的理论基础\n科学内涵\n“两山?理论所蕴含的绿色发展新理\n念，人类的发展不仅要发展好经济而\n且要保护好生态环境，要努力做到在\n发展经济的同时保护好生态环境，在\n保护生态环境的同时发展好经济。\n\n---\n\n**p080** ![](../002-part02-绪论-环境规划与管理/page_080.jpg)\n\n四环境规划与管理的理论基础\n探索和实践\n党的十八大以来，生态文明建设纳入中国特色\n绿水青山代星\n社会主义“五位一体”总体布局和“四个全面”战略布\n金银山\n局，实行最严格的生态环境保护制度，着力将生态\n文明建设纳入制度化、法制化轨道，使得生态文明\n理念日趋深入人心，绿色发展理念一步步转化为各\n地各部门的切实行动。各地响应号召进行了创新生\n态治理、加强生态文明的探索实践。\n\n---\n\n**p081** ![](../002-part02-绪论-环境规划与管理/page_081.jpg)\n\n四 环境规划与管理的理论基础\n黑河\n以“生态发展”带动“绿色崛起”\n1.开展自然生态修复工作 2.改善环保基础设 3.创造生态产业\n施设备，探索农村 打造绿色增长极。\n生态文明建设，积\n极开展生态乡镇、\n生态村建设。\n\n---\n\n**p082** ![](../002-part02-绪论-环境规划与管理/page_082.jpg)\n\n四 环境规划与管理的理论基础\n福建长汀\n稳步推进水土治理，提升农民收入\n坚持把水土流失治理 因地制宜、分类实施、 水土流失治理与提\n放在突出的战略地位 科学规划、科学治理 升百姓收入同行。\n\n---\n\n**p083** ![](../002-part02-绪论-环境规划与管理/page_083.jpg)\n\n四 环境规划与管理的理论基础\n海南海口\n围绕大环保”模式多措并举走可持续发展之路\n海绵城市示意图\n雨水花园\n构建“大环保”管 多管齐下改善空 用“海绵城市”理念\n理模式，建立完善 气土壤质量，加 治理内河，重视保护\n生态环保机制。 大环境执法力度 湿地生物多样性。\n\n---\n\n**p084** ![](../002-part02-绪论-环境规划与管理/page_084.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之复合生态系统论原理\n一、复合生态系统的功能\n二、复合生态系统的内部矛盾\n三、复合生态系统理论在环境规划与管理中的应用\n\n---\n\n**p085** ![](../002-part02-绪论-环境规划与管理/page_085.jpg)\n\n环境规划与管理的理论基础\n自然子\n·生物和环境\n系统 ·自然物质基础\n复合生态系统：在\n社会子 ·人、产业、社会组织等\n一定空间内生物群落\n·稳定、优质的生活是全\n与非生命环境相互作 系统\n用的统一体。 人类的共同追求\n·产品的供需平衡、资金\n经济子 积累的速率与利润等\n系统 ·社会进步和环境保护的\n必要条件\n\n---\n\n**p086** ![](../002-part02-绪论-环境规划与管理/page_086.jpg)\n\n四环境规划与管理的理论基础\n复合生态系统的功能\n生产 ·为社会提供丰富的物质和信息产品\n·人类提高了自然的生产力，但同时也产出了对自然\n无用甚至有害的产品\n生活 ·为人们提供方便的生活条件和舒适的栖息环境\n·人类不断改善自己的生活水平，但产生的环境问题，\n也给人类生活带来了负面影响\n还原 ·保证畅想自然资源的永续利用和社会、经济、环境\n的协调持续发展\n·这一功能保证了生产和生活两个功能的持续\n·利用生物与生物、生物与环境之间的信息传递为人\n信息传递\n类服务\n·应用现代科学技术，操纵生物的活动\n\n---\n\n**p087** ![](../002-part02-绪论-环境规划与管理/page_087.jpg)\n\n四 环境规划与管理的理论基础\n生产污染\n科技 景观\n通讯 金融 资源利用 植物 能源\n工业 经济系统 贸易 水体 自然系统 矿产\n农业 运输 管理 土地 动物\n决策\n建筑 大气\n人\n类 环\n劳 品 服务 活\n动 境\n旅游 教育 影\n力\n居住 社会系统 文娱 响\n能流和物流\n饮食 医疗 信息流\n供应\n\n---\n\n**p088** ![](../002-part02-绪论-环境规划与管理/page_088.jpg)\n\n四 环境规划与管理的理论基础\n复合生态系统的内部矛盾\n1.要求自然环境相对稳定而实际剧变\n2.自然环境改变的快速性和恢复调节的缓慢性\n人类改造自然的能力越来越强，但恢复\n调节本领还不够\n3.资源有限而人类需求无限；\n4.地球体积、物质有限而人口增长无限；\n需要进行环境规划与管理\n\n---\n\n**p089** ![](../002-part02-绪论-环境规划与管理/page_089.jpg)\n\n环境规划与管理的理论基础\n复合生态系统理论在环境规划与管理中的应用\n不要将现有环境当作纯碎自然环境来规划与管理\n规划要以生态为导向，注重生态保护。\n规划中要注重社会、经济因素，应根据社会经济发\n展变化而相应地调整\n一 复合生态系统中，最活跃的积极因素是人，最强烈\n的破坏因素也是人。\n一复合生态系统是一类特殊的人工生态系统，兼有复\n杂的社会属性和自然属性两方面的内容。\n\n---\n\n**p090** ![](../002-part02-绪论-环境规划与管理/page_090.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之经济学原理\n一、环境经济学的基本观念\n二、环境经济学的基本理论和方法\n\n---\n\n**p091** ![](../002-part02-绪论-环境规划与管理/page_091.jpg)\n\n四环境规划与管理的理论基础\n环境规划与管理的任务是协调环境保护和经济建设的同\n步发展，实现经济效益、社会效益和环境效益的统一。环境\n问题实质上是一个经济问题。为了增强综合国力和提高人民\n生活水平，我国必须实现持续的经济增长，同时又不能破坏\n经济发展所依赖的资源和环境基础。因此，资源、环境和经\n济政策必须相辅相成。随看我国向社会主义市场经济体制的\n转变，在政府的宏观调控下，市场经济机制在规范对环境的\n态度和行为方面将起到越来越重要的作用，经济杠杆作用在\n强化环境管理过程中，也将发挥日益重要的作用。\n\n---\n\n**p092** ![](../002-part02-绪论-环境规划与管理/page_092.jpg)\n\n四 环境规划与管理的理论基础\n环境经济学就是研究合理调节人与自然之间的物质变换，使\n社会经济活动符合自然生态平衡和物质循环规律，不仅能取得近\n期的直接效果，又能取得远期的间接效果。\n建立可持续发展的经济体系、社会体系和保持与之相适应的\n可持续利用的资源和环境基础，是环境经济学研究的主要任务。\nGREEN\n\n---\n\n**p093** ![](../002-part02-绪论-环境规划与管理/page_093.jpg)\n\n四环境规划与管理的理论基础\n（1）环境经济学的基本理论\n为了保障环境资源的持续利用，也必须改变对环境资源无偿\n使用的状况，对环境资源进行计量，实行有偿使用，使社会不经\n济性内在化，使经济活动的环境效应能以经济信息的形式反馈到\n国民经济核算体系中，保证经济决策既考虑直接的近期效果，又\n考虑间接的长远效果，促进经济发展符合自然生态规律的要求。\n具体包括环境经济学理论在可持续发展条件下的修正和应用，完\n善国民经济核算体系，环境资源价值评估等。\n\n---\n\n**p094** ![](../002-part02-绪论-环境规划与管理/page_094.jpg)\n\n四环境规划与管理的理论基础\n（2）社会生产力的合理组织\n合理开发和利用资源，合理规划和组织社会生产力，是保护\n环境最根本、最有效的措施。为此必须以科学发展观为指导，改\n变单纯以GDP衡量经济发展成就的传统方法，把环境质量的改善\n作为经济发展成就的重要内容，使生产和消费的决策同生态学的\n要求协调一致；要研究把环境保护纳入经济发展计划的方法，保\n证基本生产部门和消除污染部门按比例地协调发展；要研究生产\n布局和环境保护的关系，按照经济观点和生态观点相统一的原则，\n拟定各类资源开发利用方案，确定国家或地区的产业结构，以及\n社会生产力的合理布局。\n\n---\n\n**p095** ![](../002-part02-绪论-环境规划与管理/page_095.jpg)\n\n四 环境规划与管理的理论基础\n（3）环境保护的经济效果\n包括环境污染、生态失调的经济\n损失估价的理论和方法，各种生产生\n活废弃物最优治理和利用途径的经济\n循环\n选择，区域环境污染综合防治优化方 经济\n案的经济分析，各种污染物排放标准\n确定的经济准则，各类环境经济数学\n模型的建立等。\n\n---\n\n**p096** ![](../002-part02-绪论-环境规划与管理/page_096.jpg)\n\n四 环境规划与管理的理论基础\n（4）运用经济手段进行环境管理\n经济手段在环境管理中是与行政、法律、教育手段相互配合使用的一\n种方法。它通过税收、财政、信贷等经济杠杆，调节经济活动与环境保护\n之间的关系、污染者与受污染者之间的关系，促使企业和个人的生产和消\n费方式符合可持续发展的需要。当前，更应加强对市场经济条件下环境经\n济政策的研究，建立适合中国国情的环境税收制度、资源有偿使用制度和\n资源定价政策，依靠价值规律和供求关系来强化环境规划与管理。\n环保 创新\n可持续\n实在\n\n---\n\n**p097** ![](../002-part02-绪论-环境规划与管理/page_097.jpg)\n\n四环境规划与管理的理论基础\n2、环境经济学的基本理论与方法\n1.基本理论\n（1）经济效率理论\n意大利社会学家、经济学家帕累托在20\n世纪初从经济学理论出发探讨资源配置\n效率问题，提出了著名的”帕累托最适 v381234191/?vdsource=024b2\n度“理论。 3e8a203cda77162896ddf36a118\n经济效率理论认为，经济效率应该是社会\n经济效率，既不是传统生产力理论中的”产\n出最大化”，也不是传统消费者理论中的\n效用最大化”，而应寻求个人、集体和社\n会之间经济效率的协调与统一。\n\n---\n\n**p098** ![](../002-part02-绪论-环境规划与管理/page_098.jpg)\n\n四环境规划与管理的理论基础\n（2）外部性理论\n价格 MSC\n由马歇尔提出，经庇古等学者深入研究 MC\n后形成的外部性理论，为环境经济学的\n建立和发展奠定了理论基础。分为正外 MEC\n部性（或称外部经济）和负外部性（或 D\n称外部不经济）。 Q1Q 上游林木欧伐量\n图1上游林木砍伐的负外部效应\n·外部性理论认为，在没有市场力的作用下，\n外部性表现为财经独立的两个经济单位（如 价格 MSB\n公司和消费者）的相互作用。并应用一般均\n衡分析法，分析环境问题产生的经济根源， MC\n即生产和消费的外部性和它的影响范围，提\n出解决环境污染这个外部不经济性问题的各\nQ Q1 造林水平\n种方法。 图2上游植树造林的正外部效应\n\n---\n\n**p099** ![](../002-part02-绪论-环境规划与管理/page_099.jpg)\n\n四环境规划与管理的理论基础\n(1）外部经济性(效益，正)\n口环境质量改善；\n口生态系统功能与价值的恢复与提高；\n口提高人体健康水平（或降低健康风险）；\n口资产增值和美学景观享受等。\n(2）外部不经济性（费用，负）\n口环境污染\n口生态破坏（退化）等。\n\n---\n\n**p100** ![](../002-part02-绪论-环境规划与管理/page_100.jpg)\n\n四 环境规划与管理的理论基础\n（3）物质平衡理论\n在20世纪60年代中期，鲍尔丁依据热力学定律，提出了一个最基本的环\n境经济学问题：环境与经济相互作用关系问题。他指出，首先，根据热力学\n第一定律，生产和消费过程产生的废弃物，其物质形态并没有消失，必然存\n在于物质系统之中，因此，在规划经济活动时，必须同时考虑环境吸纳废弃\n物的容量；第二，虽然回收利用可以减少对环境容量的压力，但是根据热力\n学第二定律，不断增加的熵意味着100%的回收利用是不可能的。\n\n---\n\n**p101** ![](../002-part02-绪论-环境规划与管理/page_101.jpg)\n\n四 环境规划与管理的理论基础\n·物质平衡理论的一个现代经济系统由物质加工、能量转换、污染物处理和\n最终消费四个部门（或部分）组成。在这四个部门之间及由这四个部门组成\n的经济系统与自然环境之间，存在着物质流动关系。为了使人类经济步入可\n持续发展的轨道，减少经济系统对自然环境的污染，最根本的办法是提高物\n质及其能量的利用效率和循环使用率，减少自然资源的开采量和使用量，从\n而降低污染物的排放量。循环经济的提出和发展，正是物质平衡理论在可持\n续条件下的实践\n循环\n经济\n\n---\n\n**p102** ![](../002-part02-绪论-环境规划与管理/page_102.jpg)\n\n四 环境规划与管理的理论基础\n·物质平衡理论的一个现代经济系统由物质加工、能量转换、污染物处理和\n最终消费四个部门（或部分）组成。在这四个部门之间及由这四个部门组成\n的经济系统与自然环境之间，存在着物质流动关系。为了使人类经济步入可\n持续发展的轨道，减少经济系统对自然环境的污染，最根本的办法是提高物\n质及其能量的利用效率和循环使用率，减少自然资源的开采量和使用量，从\n而降低污染物的排放量。循环经济的提出和发展，正是物质平衡理论在可持\n续条件下的实践\n循环\n经济\n\n---\n\n**p103** ![](../002-part02-绪论-环境规划与管理/page_103.jpg)\n\n四环境规划与管理的理论基础\n（4）自然环境价值理论\n约翰?克鲁蒂拉提出了“舒适型资源的经济价值理论”。一些稀有的生物物种、\n珍奇的自然景观、重要的生态环境系统，这些资源称为舒适型资源\n保护好舒适型资源，或者将这类资源的使用严格限制在可再生的限度之内是\n十分必要的。舒适型资源具有损坏的单向性，被破坏就意味着永远丧失\n如果承认舒适型资源是不可逆的，那么就应当重新认识舒适型资源的价值构\n成。当代人直接或间接利用舒适型资源获得的经济收益是舒适型资源的”使\n用价值”；当代人为了保证后代人能够利用资源而做出的支付和后代人因此\n而获得的收益，是舒适型资源的”选择价值”；人类不是出于任何功利的考虑，\n只是为了资源的存在而表现出的支付意愿是舒适型资源的“存在价值”，这一\n理论最重要的责献在于为定量评价舒适型资源的经济价值奠定了坚实的理论\n基础。\n\n---\n\n**p104** ![](../002-part02-绪论-环境规划与管理/page_104.jpg)\n\n四环境规划与管理的理论基础\n（5）排污交易权理论\n1960年，科斯提出科斯定理，即”在设计和选择社会格局时，我们应\n当考虑总的效果”，“关键在避免较严重的损害”。著名经济学家戴尔\n期提出的排污交易权理论就是在科斯定理的基础上发展起来的。\n排污交易权理论认为，环境资源是一种商品，政府是所有权，政府可\n以在专家帮助下组织实施排污权交易，通过市场竞争机制，促使外部\n性内部化，达到避免较严重的损害的自的。也就是政府有效地使用其\n对环境资源这个特殊商品的产权，使市场机制在环境资源优化配置和\n外部性内部化问题上发挥最佳作用。这就是著名的排污交易权理论。\n\n---\n\n**p105** ![](../002-part02-绪论-环境规划与管理/page_105.jpg)\n\n四环境规划与管理的理论基础\n2.主要分析方法\n（1）环境退化的宏观经济评估\n?环境退化包括自然资源耗竭和环境质量恶化两部分。环境退\n化的经济评估，主要研究如何确定环境资源价值核算的指标\n体系、核算方法，将环境退化纳入到国民收入核算体系中，\n争取改进现行的国民收入核算体系，在经济增长中考虑环境\n资源的消耗。\n\n---\n\n**p106** ![](../002-part02-绪论-环境规划与管理/page_106.jpg)\n\n四环境规划与管理的理论基础\n（2）环境质量的费用效益分析\n这是环境经济学的核心内容，包括环境资源的价值核算理论\n和方法；环境污染和生态破坏的经济损失评估技术；环境质\n量改善的效益评估；污染控制的费用评估；环境质量影响的\n剂量反应关系；环境规划、政策和标准制定中费用效益分析\n方法的应用；环境效果分析和风险分析等。\n\n---\n\n**p107** ![](../002-part02-绪论-环境规划与管理/page_107.jpg)\n\n四环境规划与管理的理论基础\n（3）环境经济系统的投入产出分析\n?投入产出分析可以用定量方式来描述环境与经济的协调关系，\n可以是宏观的定量描述，将环境保护纳入国民经济综合平衡计\n划；也可以是微观的定量描述，描述一个企业各生产工序间环\n境与经济的投入产出关系。这是建立环境管理最优化模型和循\n环经济发展模式的基本方法。\n（4）环境资源开发项目的经济评价\n在考察费用和效益时要考虑到间接（外部）费用和间接效益\n间接费用和效益的计算要涉及到环境质量费用效益分析技术\n以及资源的机会成本或影子价格计算\n\n---\n\n**p108** ![](../002-part02-绪论-环境规划与管理/page_108.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之管理二重性原理\n一、管理的二重性特点\n二、管理的职能\n\n---\n\n**p109** ![](../002-part02-绪论-环境规划与管理/page_109.jpg)\n\n四环境规划与管理的理论基础\n1.管理二重性的涵义\n管理作为一种社会活动，必然有其质的特性。管理的本质\n具有二重性，它既有同生产力、社会化大生产相联系的自然属\n性，又有同生产关系、社会制度相联系的社会属性。\n生产力 自然属性\n生产活动\n统一性\n生产关系 社会属性\n\n---\n\n**p110** ![](../002-part02-绪论-环境规划与管理/page_110.jpg)\n\n四环境规划与管理的理论基础\n（1）管理的自然属性\n管理的自然属性表明，管理之所以必要，是由劳动的社会化和生产力发\n展水平所决定的。管理是分工协作的共同劳动得以顺利进行的必要条件。\n管理的自然属性就是管理的技术性，技术性是管理本质的一个重要方面。\n管理是生产力的要素之一，不进行有效的管理，生产就无法顺利地进行，\n更谈不上发展。\n\n---\n\n**p111** ![](../002-part02-绪论-环境规划与管理/page_111.jpg)\n\n四环境规划与管理的理论基础\n（2）管理的社会属性\n管理的社会属性是与生产关系、社会制度的性质紧密相关的。因\n为管理是一种社会活动，管理必须且只能在一定的社会历史条件\n下和一定的社会关系中进行，因而也必然采取一定的社会组织形\n式来执行管理的职能。\n管理学中的组织目标、组织道德、领导作风、激励方式、管理理\n念、人际关系、群体价值观、组织文化等，主要是对人的管理，\n具有较强的意识形态色彩，属于生产关系和社会关系的范畴。\n\n---\n\n**p112** ![](../002-part02-绪论-环境规划与管理/page_112.jpg)\n\n四环境规划与管理的理论基础\n2.自然属性和社会属性的关系\n管理的二重性是相互联系、相互制约的。\n一方面，管理的自然属性不可能孤立存在，总是在一定的社会制\n度和生产关系条件下发挥作用。而管理的社会属性也不可能脱离\n管理的自然属性而存在，否则管理的社会属性就会成为没有内容\n的形式。\n另一方面，两者又是相互制约的。管理的自然属性要求具有一定\n的社会属性的组织形式和生产关系与其适应。同样，管理的社会\n属性也必然对管理的科学技术等方面发生影响或制约作用。\n管理的自然属性和社会属性是两位一体的，不能把它们截然分开。\n就像一辆车的两个轮子，两个轮子一起转动，车辆才能前进\n\n---\n\n**p113** ![](../002-part02-绪论-环境规划与管理/page_113.jpg)\n\n四环境规划与管理的理论基础\n管理过程\n我国的许多学者把管理的自\n然属性称为管理的一般职能，管\n生产力 生产关系\n理的社会属性称为管理的特殊职\n能，而把管理的各项工作称为管\n管理的 管理的\n自然属性 社会属性 理的基本职能。\n管理的一般职能和管理的特\n管理的 管理的\n一般职能 特殊职能 殊职能总是结合在一起，在管理\n的基本职能中体现出来并一起发\n管理的基本职能：计划、组织、控制 挥作用。\n\n---\n\n**p114** ![](../002-part02-绪论-环境规划与管理/page_114.jpg)\n\n四环境规划与管理的理论基础\n二、管理的职能\n前已述及，法约尔将管理分为计划、组织、指挥、协调、控\n制5种职能，而在法约尔管理思想基础上发展起来的管理过程学\n派进一步将管理职能归为计划、组织和控制三大职能，为我们提\n供了一个研究管理核心功能的框架。\n1.计划职能\n2.组织职能\n3.控制职能\n\n---\n\n**p115** ![](../002-part02-绪论-环境规划与管理/page_115.jpg)\n\n四环境规划与管理的理论基础\n1.计划职能\n（1）计划的性质\n计划的目标性。任何组织或个人制定计划都是为了有效地达到某种目\n标。可以说，没有目标的行动计划或多或少是一种盲目的行动。\n计划的首要性。计划是管理的首要职能。管理过程当中的其他职能都\n是为了支持、保证目标的实现。而这些职能只有在计划工作确定了目\n标之后才能进行。\n计划的普遍性。任何管理者或多或少都有某些制定计划的权力和责任\n高层管理者不可能也不必要对自己组织内的一切活动作出确切的说明，\n这也是有效的管理者所必须遵循的一条原则。也就是说，计划不仅仅\n是领导的职责，也是组织成员的普遍职责。\n\n---\n\n**p116** ![](../002-part02-绪论-环境规划与管理/page_116.jpg)\n\n四 环境规划与管理的理论基础\n2.组织职能\n（1）组织的含义\n古典管理学派的定义将组织\n定义为：“组织是为了达到某些特\n定目标经由分工与合作及不同层\n次的权力和责任制度，而构成的\n人的集合。“这个含义具有3层意\n思：①组织必须具有目标；②没\n有分工与合作也不能称其为组织；\n③组织要有不同层次的权力与责\n任制度。\n\n---\n\n**p117** ![](../002-part02-绪论-环境规划与管理/page_117.jpg)\n\n四环境规划与管理的理论基础\n（2）组织环境\n任何组织都是在一定的环境下生存和发展的。环境给组织提供资\n源，吸收组织的产出，同时又给予组织许多约束。\n一个组织要保持持续的发展，它就必须适合其周围的环境。\n组织环境包括许多要素，其中最主要的是人力、物质、资金、气\n候、市场、文化、政府政策和法律。环境总是处于变化之中，有时变\n化剧烈，有时变化缓慢。当环境变到足以阻碍组织的发展时，就必须\n对组织进行调整和改革，以适应环境的变化。\n\n---\n\n**p118** ![](../002-part02-绪论-环境规划与管理/page_118.jpg)\n\n环境规划与管理的理论基础\n3.控制职能\n（1）控制与控制系统\n①控制的含义：\n法约尔认为，控制是监视各\n人是否依照计划、命令及原则执\n行工作。\n孔茨则认为，控制是按照计\n划标准衡量计划的完成情况和纠\n正计划执行中的偏差以确保计划\n目标的实现。\n\n---\n\n**p119** ![](../002-part02-绪论-环境规划与管理/page_119.jpg)\n\n四环境规划与管理的理论基础\n②控制系统\na.控制的目标体系。任何控制活动和行为都是有一定目标取向的，\n无目标的控制是不存在的。\nb.控制的主体。控制系统的主体是各级管理者以及他们所属的职\n能部门。一般而言，中低层管理层执行的主要是例行的、程序性\n的控制，而高层管理者执行的主要是例外的、非程序性的控制。\nc.控制的客体（对象）。控制系统的控制对象是整个组织的活动\n即在控制活动中是把管理活动当作一个总体来控制的，而不是把\n各项活动孤立地看待。只有统一的控制才能使整体协调一致，达\n到整体的优化，实现总的组织目标，否则就会顾此失彼。\n\n---\n\n**p120** ![](../002-part02-绪论-环境规划与管理/page_120.jpg)\n\n四环境规划与管理的理论基础\nd.控制方法、手段和工具。控制的方法有末端控制和源头控制、浓\n度控制和总量控制、分散控制和集中控制、静态控制和动态控制相\n结合的方法。控制的手段采用综合性手段，有法律手段、经济手段、\n行政手段、教育手段等。在现代环境管理系统中，控制的工具主要\n是电子计算机。\ne.控制机构。从纵向看，可分为不同地区、不同层次的控制；从横\n向看，可分为不同性质的专业控制，例如开发建设项目控制、自然\n保护区控制、污染源控制、环境监测控制以及环境监理控制等。\nf.信息控制系统。是控制活动的神经。控制系统的活动是按照所获\n得的信息来进行的。随看当代社会与经济发展的复杂化，信息量日\n趋增大，管理中的信息处理工作也逐渐发展形成了管理信息系统。\n\n---\n\n**p121** ![](../002-part02-绪论-环境规划与管理/page_121.jpg)\n\n四环境规划与管理的理论基础\n③控制的类型\n按照控制职能的需要，可分为五种控制类型。第一，按照控\n制活动的性质可以划分为预防性控制和更正性控制；第二，根据\n控制点位于整个活动过程中的位置划分为预先控制、过程控制和\n事后控制；第三，根据实施控制的来源划分为正式组织控制、群\n体控制和自我控制；第四，根据控制信息的性质划分为反馈控制\n和前馈控制；第五，根据控制所采用的手段划分为直接控制和间\n接控制。\n\n---\n\n**p122** ![](../002-part02-绪论-环境规划与管理/page_122.jpg)\n\n四 环境规划与管理的理论基础\n（2）控制的原则\n控制所牵涉的范围是十分广泛的。\n从总体上看，它既包括对人的控制，也\n包括了对物的控制，这就增加了控制的\n复杂性。为了进行有效的控制，要遵循\n以下原则：①公众参与原则：②系统控\n制的原则；③一致与比较的原则；④预\n防性原则；例外与重点原则；灵活\n性原则；经济合理原则；8反馈原则。\n\n---\n\n**p123** ![](../002-part02-绪论-环境规划与管理/page_123.jpg)\n\n四 环境规划与管理的理论基础\n（2）控制的原则\n控制所牵涉的范围是十分广泛的。\n从总体上看，它既包括对人的控制，也\n包括了对物的控制，这就增加了控制的\n复杂性。为了进行有效的控制，要遵循\n以下原则：①公众参与原则；②系统控\n制的原则；③一致与比较的原则；④预\n防性原则；例外与重点原则；灵活\n性原则；经济合理原则；⑧反馈原则\n\n---\n\n**p124** ![](../002-part02-绪论-环境规划与管理/page_124.jpg)\n\n四环境规划与管理的理论基础\n（3）控制的程序\n①控制的条件：\n任何形式的控制，都有一定的前提条件，这些前提条件是否\n充分，对于控制过程能否顺利展开有很大的影响。这些前提条件\n主要有以下几个方面：一是要有一个科学的、切实可行的计划；\n二是健全组织结构，完善责任制度；控制工作的主要内容，是根\n据各种信息，纠正计划执行中出现的偏差，以确保计划的实现；\n三是做好各种信息资料的收集、整理与分析工作；四是控制要有\n反馈渠道。\n\n---\n\n**p125** ![](../002-part02-绪论-环境规划与管理/page_125.jpg)\n\n四环境规划与管理的理论基础\n②控制的程序：\na.制定标准。制定控制标准是实施控制的前提。一个好的标准应\n符合可行性、稳定性、简明性和一致性的要求；\nb.检查、对照、评价。控制过程的第二个步骤是检查、对照、评\n价实际工作与标准之间的差异。这个过程的工作要求对工作进程\n做深入调查，调查详细程度应与标准相吻合，在调查取得资料数\n据的基础上开展综合性分析评价。分析评价应综合运用统计分析\n系统分析、经济分析等方法。并将分析评价结果及时反馈；\nc.纠正偏差。首先应确定偏差产生的原因，其次制定补救措施。\n\n---\n\n**p126** ![](../002-part02-绪论-环境规划与管理/page_126.jpg)\n\n四环境规划与管理的理论基础\n修订\n控制① 控制③\n计划 执行过程\n制定标准 修正标准\n控制②\n检查、衡量\n控制的程序\n\n---\n\n**p127** ![](../002-part02-绪论-环境规划与管理/page_127.jpg)\n\n四环境规划与管理的理论基础\n（4）反馈控制和前馈控制\n①反馈控制：所谓信息反馈控制就是用过去的情况来指导现在和将\n来。在环境管理中通过制订环境质量标准来实现对环境质量的控制\n方式就是一种反馈控制，而建立环境管理信息系统则是将反控制\n贯穿于管理全过程的基础\n②前馈控制：所谓前馈控制又可称为指导将来的控制，它的具体办\n法是不断利用最新的信息进行预测，把所期望的结果同预测的结果\n进行比较，采取措施使投入和实施活动与期望的结果相吻合。前馈\n控制的着眼点是通过预测被控对象的投入或者过程进行控制，以保\n证获得所期望的产出。这就解决了时滞现象所带来的问题。环境规\n划和环境影响评价是前馈控制方式在环境管理中的具体应用。\n\n---\n\n**p128** ![](../002-part02-绪论-环境规划与管理/page_128.jpg)\n\n四环境规划与管理的理论基础\n干扰\n前馈信息\n输出\n控制器 系统\n控制\n(1)前馈控制方式\n干扰\n控制 输出\n控制器 系统\n反馈信息\n(2)反馈控制方式\n\n---\n\n**p129** ![](../002-part02-绪论-环境规划与管理/page_129.jpg)\n\n四环境规划与管理的理论基础\n什么是管理的二重性特点，试采用管理二重性性质部析我国环境管\n理中存在的主要问题？\n简述计划职能、组织职能和控制职能的含义和作用\n什么是环境容量？什么是环境承载力？试分析两者关系\n简述工业生态学的定义及其内涵\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 1 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 1 节 · 73 页（跨章）\n\n> `001-part02-绪论-环境规划与管理.pdf` · 涉章 [0, 2]\n\n- [p001](../001-part02-绪论-环境规划与管理/page_001.jpg)  · 环境规划与管理\n- [p002](../001-part02-绪论-环境规划与管理/page_002.jpg)  · 》联系方式：\n- [p003](../001-part02-绪论-环境规划与管理/page_003.jpg)  · 教材\n- ...余 70 页, 参 [`001-part02-绪论-环境规划与管理/`](../001-part02-绪论-环境规划与管理/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 2 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论-环境规划与管理\n##  [x] **工业生态学**：研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n- [x] **生态工业园**：制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n- [x] **环境经济学**：研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n\n### 二、关键公式 / 模型\n\n- **环境容量**：M = K + R（K=稀释容量，R=自净容量）\n- **环境承载力**：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向\n- **环境承载力指标体系**：资源供给指标+社会影响指标+污染容纳指标\n- **帕累托最适度**：资源配置效率理论，寻求个人、集体和社会之间经济效率的协调统一\n- **计划分类模型**：按时间（长/中/短期）、约束力（指令性/指导性）、制定者层次（战略/管理/作业）、性质（综合/局部/项目）\n\n### 三、重要案例 / 实验 / 例题\n\n- **丹麦卡伦堡生态工业园**：世界上最早最著名的生态工业园，主体企业为发电厂、炼油厂、制药厂、石膏板生产厂，通过贸易方式利用对方废弃物和副产品\n- **广西贵港国家生态工业（制糖）示范园区**：2001年8月我国第一个国家级生态工业示范园区\n- **美国生态工业园示范点**：1994年指定4个社区——巴尔的摩、查尔斯、布郎斯、恰塔努加\n- **两山论实践**：黑河（生态发展带动绿色崛起）、福建长汀（水土治理提升农民收入）、海南海口（大环保模式+海绵城市）\n- **中国总量控制历程**：1996年\"九五\"总量控制→1998年\"一控双达标\"→\"十五\"三大任务→\"十一五\"SO₂和COD控制→\"十二五\"主要污染物减排\n\n### 四、高频考点（速记）\n\n1. **环境规划与管理五要素**：人、物、资金、信息、时空\n2. **环境管理五大手段**：行政、法律、经济、技术、宣传教育\n3. **环境规划vs环境管理关系**：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n4. **环境容量vs环境承载力**：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n5. **环境承载力三大特征**：客观性与主观性、区域性与时间性、动态性与可调控性\n6. **生态学三定律（米勒）**：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n7. **生态学六规律（陈昌笃）**：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n8. **可持续发展四原则**：协调原则、公平原则、持续原则、共同原则\n9. **可持续发展基本思想**：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n10. **复合生态系统四大矛盾**：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n11. **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n### 六、与前后章之关联\n\n- 承前章：本章为绪论，奠定基本概念和理论基础\n- 启后章：第2章深入环境规划与管理的政策方针法律法规，第4章进入综合分析方法，第5-7章为规划与管理实务\n"}, {"id": "ch-02", "group": "章节素材", "title": "第02章 绪论-环境规划与管理", "md": "# 环境规划与管理 · 第 2 章 · 绪论-环境规划与管理 · 素材\n\n> 教师: 王思雨 · 学期: 2026春\
