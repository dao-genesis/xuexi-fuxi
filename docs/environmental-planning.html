*p007** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_007.jpg)\n\n②区域内相关的社会因素：\na.社会人口状况分析，人通过生产和消费活动同\n环境形成了相互联系、相互作用、相互制约的对立统\n一关系。\nb.社会意识状况分析，规划区内人们的思想、道\n德、哲学、美学、文艺、宗教和风俗等社会意识形态，\n特别是当地人们的环境意识等方面的情况，并分析这\n些社会意识对区域环境所产生的影响。\nc.社会制度和体制、体育等社会概况，分析对区\n域环境所产生的影响。\n\n---\n\n**p008** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_008.jpg)\n\n（3）环境污染因素调查\n突出重大工业污染源调查和污染源综合调查。根据污染类\n型，进行单项调查，按污染物排放总量排队由此确定评价区内的\n主要污染物和主要污染源。\n污染调查还应酌情包括乡镇企业污染评价和生活及面源污染\n分析等。污染调查还应考察现存环境设施运行情况、已有环境工\n程的技术和效益，作为新规划工程项目的设计依据和参考。\n\n---\n\n**p009** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_009.jpg)\n\n2.生态调查\n环境自净能力\n土地开发利用情况\n气象条件\n绿地覆盖率\n人口密度\n经济密度\n建设密度\n能耗密度调查等\n\n---\n\n**p010** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_010.jpg)\n\n3.污染源调查\n工业污染源\n农业污染源\n生活污染源\n交通运输污染源\n噪声污染源\n放射性\n电磁辐射污染源调查等\n\n---\n\n**p011** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_011.jpg)\n\n4、环境质量调查\n环境保护部门及工厂企业历年的环境质量报告和环境监测资料。\n5.环保措施效果调查\n环保设施运行率、达标率和环保措施削减污染物效果以及\n其综合效益进行分析评价。\n6.环境管理现状调查\n包括环境管理机构、环境保护工作人员业务素质、环境政\n策法规实施和环境监督实施情况等。\n\n---\n\n**p012** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_012.jpg)\n\n二、环境现状调查的方法\n1.收集资料法\n应用范围广、收效大，比\n较节省人力、物力和时间。\n环境现状调查时，应首先通过\n此方法获得现有的各种有关资\n料，但此方法只能获得第二手\n资料，而且往往不全面，不能\n完全符合要求，需要其他方法\n补充。\n\n---\n\n**p013** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_013.jpg)\n\n2.现场调查法\n可以针对使用者的需要，直接获得第一手的数据和资料，\n以弥补收集资料法的不足。\n这种方法工作量大，需占用较多的人力、物力和时间，有\n时还可能受季节、仪器设备条件的限制。\n现场调查法能够直接获取真实、准确的环境现状信息，\n但可能受到时间、人力、物力和天气等条件的限制，并且对\n调查人员的专业知识和技能要求较高。\n\n---\n\n**p014** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_014.jpg)\n\n3.遥感的方法\n遥感是一种综合技术，它利用航空器、卫星等远距离探\n测设备获取地球表面信息。通过收集、处理和分析地球表面\n的图像，从而获得关于地球环境、自然资源、人类活动等方\n面的信息。这种技术通常涉及使用特定的传感器装置，在不\n直接接触研究对象的情况下，收集其特征信息，并对这些信\n息进行提取、加工、表达和应用。遥感技术的应用领域非常\n广泛，包括电力、通信、气象、农林、海洋、勘探、摄影、\n防灾减灾等。\n\n---\n\n**p015** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_015.jpg)\n\n三、五 环境评价\n在环境规划中，环境评价的主要内容包括自然环境评\n价、社会经济评价、环境质量评价和污染源评价等4个方\n面。评价是对被评价对象的优劣、好坏作定量或定性的描\n述，一般以定量描述为主。\n\n---\n\n**p016** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_016.jpg)\n\n1.环境评价的主要内\n容\n（1）自然环境评价\n通过自然、社会、经济背景分析及社会、经济与环境的\n相关分析，确定当前主要环境问题及其产生的原因，并确定\n环境区划和评估环境的承载能力。\n自然背景分析会考虑当地的气候条件、地形地貌、土壤\n类型、水资源、植被覆盖等自然因素。社会背景分析则关注\n人口结构、文化传统、教育水平、社会组织形式、生活方式\n等方面。经济背景分析包括产业结构、经济发展水平、经济\n增长模式、资源利用效率等内容。\n\n---\n\n**p017** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_017.jpg)\n\n（2）社会经济评价\n项目 内容\n人口总数、人口密度、人口分布、人口的\n人口评价\n年龄结构和人口的文化素质等。\n产业结构、国民生产总值和人均国民收入、\n经济活动评价\n产品综合能耗、能源利用率等。\n住房、道路、给水设施及供水管网、排水\n城市基础设施\n管网及污水处理设施、能源结构、供热方式、\n评价\n绿地及分布和电话普及率等。\n\n---\n\n**p018** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_018.jpg)\n\n（3）环境质量评价\n环境质量评价是环境规划与\n蓝天 绿色地球\n管理的一项基础工作，其目的是正\n确认识规划区的环境质量现状、环\n境质量的地区差异和环境质量的变\n化趋势。环境质量评价突出超标问\n题，以明确环境污染的时空界域为\n主要环节，指出主要环境问题的原\n因和潜在的环境隐患等。\n\n---\n\n**p019** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_019.jpg)\n\n（4）污染源评价\n突出重大工业污染源评价和污染源综合评价。根据污染类型\n进行单项评价，按污染物等标污染负荷排序，确定评价区的主要\n污染物和主要污染源。\n污染评价还应酌情包括乡镇企业污染评价和生活及面源\n污染分析等。\n农业污染源\n化肥\n其他污染源\n\n---\n\n**p020** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_020.jpg)\n\n2.环境评价的主要方法\n（1）自然环境评价方法：\n①类比分析法：是一种常用的定性和半定量的方法，一般有生态环境\n整体类比、生态因子类比、生态环境问题类比等。\n②列表清单法：将各种生态环境因子分别列在同一表格的行与列里，\n逐点进行分析并以正负号、数字或其他符号表示其性质、强度等。\n③生态图法：即图形叠置法，是把两个以上的生态环境信息叠合在\n一张图上，构成复合图，用以表示生态环境变化的方向和程度。绘\n制生态图的两个基本手段是指标法和重叠法。指标法是用定量或半\n定量的方法对环境主体进行评价、分级，并绘制在地图上。重叠法\n是将各相关要素的图件叠合在一起以获得新的、综合性的结果\n\n---\n\n**p021** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_021.jpg)\n\n④指数法与综合指数法：在生态环境评价中用得最多，必须建\n立表征生态环境因子特性的指标体系和确定评价标准，赋予各\n因子权重，然后建立评价函数曲线，得出综合评价指数值。例\n如用于水环境质量评价的内梅罗指数、用于大气环境质量评价\n的格林大气指数、上海大气质量指数等。\n③景观生态学方法：通过空间结构和功能分析与稳定性分析，\n评价生态环境质量状况。\n生态系统综合评价法：常用层次分析法（AHP法），又称多\n层次权重分析决策法，是一种定性和定量结合的方法。\n\n---\n\n**p022** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_022.jpg)\n\n①生物生产力评价法：用三个基本生物学参数（生物生长\n量、生物量和物种量）来表示，可评价生态环境质量及其\n变化趋势。\n⑧其他评价方法：还有多因子数量分析法、回归分析法、聚\n类分析法、相关分析法、系统分析法等。\n生态环境评价方法正处于蓬勃发展的时期，新的方法还在不\n断出现，但不管采取什么方法，其可靠性最终取决于对生态\n环境的全面认识和深刻理解。获取可靠的资料数据，仔细分\n析生态环境的特点、本质和各要素之间的内在联系，是评价\n成功的关键。\n\n---\n\n**p023** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_023.jpg)\n\n（2）社会经济评价方法\n社会经济评价的关键是选择评价的标准和指标化的方法。由\n于社会经济问题比较复杂，不易形成统一的看法，目前尚无统一\n评价标准，一般是根据研究对象和研究者所选择的总的战略目标，\n结合国内外相关指标体系来确定。\n\n---\n\n**p024** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_024.jpg)\n\n山\n（3）环境质量评价方法\n环境质量评价分为单环境要素评价、单要素综合评价\n和区域环境质量综合评价。评价的方法很多，这里重点介\n绍指数评价方法。某污染物在环境中监测值与标准值的比\n值，称为该污染物的环境质量指数，表示污染物的超过环\n境质量标准的倍数。\ni污染物的环境质量指数；\nP 污染物的监测值；\nCio -i污染物的环境质量标准值。\n\n---\n\n**p025** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_025.jpg)\n\n（4）污染源评价方法\n在确定主要污染物和污染源的评价中多选用排放量和毒性这两\n个指标作为评价主要污染物的指标。在多种污染物比较分析中，在\n数学上可采用标准化法，将不同种类、不同量纲的一组值进行标准\n化，使之可相互比较，主要方法有排毒指数法、环境污染能力潜在\n指数法和等标污染负荷法等。\n\n---\n\n**p026** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_026.jpg)\n\n等标污染负荷法\n项目 公式 备注\n废水中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度值，mg/l;\nCoi i污染物的允许排放浓度标准与C同单位的\nP 数值，无因次量；\nCoi Qi -污废水排放量，m3/d。\n某污染物的等标污\n染负荷(P)\n废气中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度平均值，mg/mv3；\nCoi -污染物的允许排放浓度标准与p同单位的\nP;= 数值，无因次量；\nCoi qi 一废气中i污染物的介质排放流量，mv/d。\n某污染源的等标污 污染源中各污染物i=1.2， n的等标污染负荷\n染负荷(P) 之和，为污染源的等标污染负荷。\n\n---\n\n**p027** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_027.jpg)\n\n按调查区域内污染源的等标污染负荷（P-)大\n评价区域的等标污\n染负荷(PT) P=∑P, 小排列，将累计百分比大于80%左右的污染\n= 源列为区域内主要污染源。\n评价区域内某污染 按评价区域内某污染物等标污染负荷（P总）大\nPi=P 小排序，分别计算百分比及累计百分比，将\n物的总等标污染负\n荷(Pi) j=1 累计百分比大于80%左右的污染物列为该区\n域的主要污染物。\n污染物排放量排序是直接评价某种污染物的\n污染源污染负荷 K P ×100% 主要污染源的最简单方法。实施总量控制规\n比(K) P 划时，针对区域总量控制的主要污染物，对\n排放这一主要污染物的污染源进行总量排序。\n区域主要污染物的选择，主要是根据区域的\n主要环境问题，或是根据环境质量评价结果\n污染物的污染负 =Pi ×100% 来确定。\n荷比(K) 针对主要污染物的排放量，首先要有污染源\n排放量清单，然后排序，再选出占污染物总\n量90%以上的污染源，进行总量控制规划。\n\n---\n\n**p028** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_028.jpg)\n\n第二节 环境统计方法\n环境统计\n二、 环境统计的调查方法\n三、环境统计的研究方法\n\n---\n\n**p029** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_029.jpg)\n\n一、环境统计\n环境统计是用数字反映并计量人类活动引起的环境变化和\n环境变化对人类的影响。\n以环境为主要研究对象，研究范围涉及人类赖以生产和生\n活的全部条件，包括影响生态平衡的诸因素及其变化带来的后\n果。环境统计要调查和反映植物、动物、大气、水、土地土壤\n和人类居住区等各个方面的活动和自然现象及其对环境的影响。\n\n---\n\n**p030** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_030.jpg)\n\n1.一般的统计工作程序\n阶段 内容\n全面调查 (报表制度、普查)\n统计调查（基础）：\n非全面调查（重点调查、典型调查、抽样\n收集资料过程\n调查)\n统计表 (把资料综合成统计表)\n统计整理（中间环节）： 统计图 (把资料综合成统计图)\n加工资料过程 整理成各种统计指数（综合指标、回归分\n析、指数、动态数列等)\n统计分析（核心）： 描述性分析（利用指标数据说明问题）\n分析资料过程 推断性分析（各种推断、预测）\n\n---\n\n**p031** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_031.jpg)\n\n2.环境统计的内容\n自然环境：包括空气与气候、水、土地、生态环境。\n特殊环境：包括能源、放射性、有害物质、噪声、自然灾害、野\n生动植物。\n与环境有关的生活条件：包括健康与营养、劳动条件、居住条件、\n娱乐和文化条件、主观评价环境一一民意测验。\n背景材料：包括直接影响环境的背景因素、间接因素、公共事业、\n技术、意识形态的因素、地理的和有关的背景材料。\n改善环境条件的办法：包括立法和实施、环境法的违反和起诉、\n减轻环境的损害、用于环境保护的支出、环境的研究和教育等\n\n---\n\n**p032** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_032.jpg)\n\n3.环境统计的指标体系\n我国现行环境统计指标体系包括七个子系统：\n工业污染与防治\n生活及其他污染与防治 爱护地球·保护环境\n农业污染与防治\n环境污染治理投资\n自然生态环境保护\n环境管理\n·环保系统自身建设\n\n---\n\n**p033** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_033.jpg)\n\n4.中国现行环境统计指标体系框架\n工业污染与防治 企业基本情况 工业污染物排放情况 工业污染治理设施 工业污染治理情况\n生活及其他污染与防治 生活污水排放情况 城市污水处理厂运行情况 生活废气排放情况 城市垃圾处理情况\n农业污染与防治 规模化畜禽养殖场污染排放及治理情况\n环境污染治理投资 污染源治理投资 城市环境基础设施建设投资 环境污染治理投资合计\n自然生态环境保护 自然保护区建设情况 野生动植物保护情况 生态示范区建设情况\n生态功能保护区建设情况 农村环境污染及治理情况\n环境管理 环保法规和标准 环保年度计划 绿色工程规划 环评制度 “三同时”制度\n排污收费制度执行情况 排污申报登记制度及排污许可证制度 限期治理制度\n环境科技工作 环保产业 环保信访工作 人大政协提案 环保档案工作情况\n环保系统自身建设 环保机构 环保人员\n\n---\n\n**p034** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_034.jpg)\n\n5.中国环境统计范围\n② 6\n生态破坏 区域环境 环境系统\n与建设统 污染与防 的自身建\n计 治统计 设统计\n③ 5\n自然资源 区域环境 环境管理\n统计 质量统计 统计\n\n---\n\n**p035** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_035.jpg)\n\n6.环境统计的作用\nGreen Life!\n为环境管理和决策提供依据。\n评价和考核各级政府及环境保\n护部门环境保护的工作情况。\n增加社会公众对环境状况和环\n境保护的了解，提高全民的环\n保护生忘环境\n境意识。\n拥抱绿色生活\n\n---\n\n**p036** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_036.jpg)\n\n7.环境统计专业报表上报流程\n省级上报数据\n总局规划司 相关司\n审核并填报本级数\n专业 省级\n报表 汇总 上报\n空白表 数据\n地级上报数据\n省局规划处 相关处室\n审核并填报本级数\n专业 市级\n报表 汇总 上\n空白表 数据 报\n区县级上报数据\n地市局规划科 相关科室\n审核并填报本级数\n专业 区县级\n报表 汇总 上报\n空白表 数据\n专业报表空白表\n区县级环保局 相关科室\n规划部门\n填报本级数\n\n---\n\n**p037** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_037.jpg)\n\n二、环境统计的调查方法\n1、定期普查：1996年我国进行了全国污染源普查工作。\n2、抽样调查：对重点工业企业污染源实行抽样调查，\n重点污染源年度统计报表。\n3、科学估算：对重点企业及社会生活污染物排放进行\n科学估算。\n4、专项调查：对环境保护工作中有重大意义的进行专\n项调查，如乡镇企业污染调查、畜禽业专项调查、环保\n产业专项调查等。\n\n---\n\n**p038** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_038.jpg)\n\n三、环境统计的研究方法\n1、大量观察法：环境现象的特征与其数量表现有不同\n程度的差异，建立在大量观察基础上的统计结果必然\n具有较好的代表性。\n2、综合分析法：综合分析法是指对大量观察所获资料\n进行整理汇总，计算出总量指标、相对指标、平均指\n标、变异指标等。\n3、归纳推断法：所谓归纳是由个别到一般，由事实\n到概括的推理方法，是统计研究常用的方法。\n\n---\n\n**p039** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_039.jpg)\n\n延伸材料-我国环境统计缺口性指标\n环境统计缺口性指标是指在环境统计中存在的数据缺失\n或不完整的指标。这些指标可能由于以下原因而存在缺口：\n1、数据收集困难：某些环境数据可能难以收集，例如特定\n污染物的排放数据、生态系统的详细信息等。\n2、监测范围有限：环境监测网络可能无法覆盖所有地区或\n环境要素，导致某些区域或指标的数据缺失。\n3、报告和记录不完整：企业或相关部门可能未能完整报告\n或记录环境数据，导致统计数据不全面。\n\n---\n\n**p040** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_040.jpg)\n\n以下是一些可能存在缺口性指标的领域：\n1、危险废物产生和处置：危险废物的产生量、种类、\n处置方式等数据可能存在缺口。\n2、土壤污染：土壤污染的程度、范围和污染物种类等\n信息可能不完整。\n3、生物多样性：生物多样性的详细数据，如物种数量、\n栖息地状况等，可能难以全面获取。\n4、特定污染物排放：一些特定污染物的排放数据，尤\n其是来自小型企业或非重点污染源的排放，可能存在\n缺失。\n\n---\n\n**p041** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_041.jpg)\n\n为了减少环境统计缺口性指标，可以采取以下措施：\n1、完善监测网络：扩大监测范围，提高监测频率，以获取更全面的数据。\n2、加强数据收集和管理：建立健全的数据收集和报告制度，确保数据的准确\n性和完整性。\n3、推动信息共享：促进不同部门和机构之间的数据共享，整合各方资源，填\n补数据空白。\n4、开展专项调查和研究：针对特定的环境问题或指标，进行专项调查和研究，\n以获取更详细的数据。\n需要注意的是，具体的环境统计缺口性指标会因地区、时间和环境问题的不\n同而有所差异。因此，在进行环境统计和分析时，需要充分认识到这些缺口，\n并采取适当的方法来处理和解释数据。同时，持续改进和完善环境统计体系也\n是解决缺口性指标问题的关键。\n\n---\n\n**p042** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_042.jpg)\n\n第三节 社会经济预测方法\n一、社会发展预测\n二、经济发展预测\n\n---\n\n**p043** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_043.jpg)\n\n社会发展预测\n社会发展预测重点是人口预测，是指根据一个国家、一个地区现\n有人口状况及可以预测到的未来发展变化趋势，测算在未来某个时\n间人口的状况，是环境规划与管理的基本参数之一。进行人口预测，\n主要关心的是未来的人口总数。\n社会发展预测也包括规划期内区域内的人口总数、人口密度和\n人口分布等方面的发展变化趋势，人们的可持续发展观念和环境意\n识等各种社会意识的发展变化，人们的生活水平、居住条件、消费\n倾向和对环境污染的承受能力等方面的变化等。\n\n---\n\n**p044** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_044.jpg)\n\n常见的人口预测模型\n项目 公式 说明\n算术级数 N 预测年的人口数量，万人；\nN,=N,+b（t-to)\n法 Nro 基准年的人口数量，万人；\nb 逐年人口增加数（即变动一年\n几何级数 N=N(1+K)（-0)\n法 N的增加数），万人/a；\nt.to 预测年和基准年，a；\n人口自然增长率，是人口出生\n指数增长 N=N2.718K（-to)\n法 to 率与死亡率之差，常表示为人口每年\n净增的干分数。\n\n---\n\n**p045** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_045.jpg)\n\n二、 经济发展预测\n能源消耗指标\n指标名称 说明\n产品综合 包括单位产值综合能耗（总耗能量和产品总产值的比值）\n能耗 和单位产量综合能耗（总耗能量和产品总产量的比值）。\n能源利用率 有效利用的能量和供给的能量的比值。\n规划期内能源消耗量增长速度与年平均经济增长速度之间\n能源消费弹性\n系数 的比值，年平均经济增长速度，可采用工业总产值、工农\n业总产值、社会总产值或国民收入的增长速度等。\n\n---\n\n**p046** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_046.jpg)\n\n能源消耗预测方法\n方法名称 说明\n人均能量 按人民生活中衣食住行对能源的需求来估算生活用能的方法，\n消费法 我国平均每人每年1.14t标准煤。\n能源消费弹性系数e一般为0.4～1.1，由国民经济增长速度，粗\n能源消费 预测能耗的增长速度β=é·α，其中α为工业产值增长速度，以\n弹性系数法 此可进行规划期能耗预测E，=E。（1+β)（-），其中E为预测年的\n能耗量，E为基准年的能耗量，t，t为预测年和基准年。\n\n---\n\n**p047** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_047.jpg)\n\n目前，耗煤量的预测可分为民用耗煤量预测和工业耗煤量\n预测，民用耗煤量预测可用式（4-2）表示：\nEs=As·S (4-\n：中\nEs- -预测年采暖耗煤量，x104t/a;\nA 采暖耗煤系数，t/m2;\nS一一预测年采暖面积，m2。\n\n---\n\n**p048** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_048.jpg)\n\n工业耗煤量预测方法有弹性系数法、回归分析法、灰色预测\n等几种常用的方法。以弹性系数法为例，设工业耗煤量平均增长\n率为α，工业总产值平均增长率为β，工业耗煤量弹性系数C：可用\n式（4-3）表示。\n(Et/E0）t-t0-1 (4-3)\nβ (Mt/M0)t-t0-1\n式中Et一一预测年的工业耗煤量，x104t/a；\nEo一一基准年的工业耗煤量，x104t/a;\nMt一一预测年的工业总产值，x104元/a；\nM。一基准年的工业总产值，x104元/a；\nt，to预测年和基准年，a。\n\n---\n\n**p049** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_049.jpg)\n\n第四节 环境预测方法\n、环境预测\n二、常用预测方法\n·三、环境预测的工作程序\n\n---\n\n**p050** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_050.jpg)\n\n环境预测\n1、内涵\n在环境管理过程中，经常需要对人类活动将可能引起的环境质量\n变化趋势进行预测。环境预测是在调查研究和科学实验的基础上进行\n的，借助于数学、计算理论和信息处理技术等工具，对未来某一时间\n环境质量的变化趋势，进行定性和定量分析。或者说，预测就是根据\n过去和现在来估计未来，是对研究对象的未来发展作出科学推测和估\n计，预测是决策的基础。\n\n---\n\n**p051** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_051.jpg)\n\n把需要进行预测的客观环境看成一个系统，根据一般系统的整\n体性、相关性和动态性等特点，把事物的过去、现在和将来看成一\n个连续的、不断发展变化的辩证统一体，并依据已有资料数据，使\n用预测方法，对未来的环境污染趋势、污染控制对策以及控制污染\n所需的投资趋势等进行评价和估算\n这种围绕系统的环境、技术和价值等未来情况进行预测，主要\n为决策提供必需的未来信息，对环境管理系统开发和提高环境效益\n是十分重要的。\n\n---\n\n**p052** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_052.jpg)\n\n2、分类\n类别 分类子项\n按预测内\n区域环境预测、行业环境预测、专题环境预测\n容划分\n定性预测：对未来发展的定性分析（递增、递减、加快、减缓节奏）；\n定量预测：占有历史和现实数据，运用数学模型预测预测；\n按预测作 定时预测：寻找时间序列上的发展变化规律（过去、现在和今后）：\n用划分 定比预测：定结构比例，例如环保投资结构比例分析（水、气、渣、\n噪);\n评价预测：对预测结果可信度、风险性进行评价\n短期预测：5年内；\n按预测时\n中期预测：5~15年；\n间划分\n长期预测：20年\n\n---\n\n**p053** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_053.jpg)\n\n二、常用预测方法\n1、预测的基本原则\n（1）资料的完整性：预测不同于猜测，猜测是随心所欲，不负\n责任，而预测必须以周密调查和详尽的统计资料为依据。\n（2）数据的准确性：基础数据必须准确完整，预测结果必须给\n出误差分析；由于资料数据、预测技术和预测人员素质三方面的因\n素，预测结果不可能十全十美，误差总会有，但误差有大有小。\n（3）方法的可靠性：对所有方法、模型进行分析、评价和检验。\n（4）结果的可验性：预测应有明了的结论，且这个结论是可以\n检验的。\n\n---\n\n**p054** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_054.jpg)\n\n2、环境预测内容和基本程序\n环境预测是通过已取得的情报资\n料和监测统计数据，对未来未知的环\n境前景进行的估计和推测，也就是把\n环境作为预测对象，置于一定的时间\n和空间中，研究在未来一定时期经济\n社会活动对环境的影响，预测环境要\n素和系统将达到的运动状态及可能出\n现的结果，它是环境决策的依据，也\n是制定环境规划与环境管理的基础。\n\n---\n\n**p055** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_055.jpg)\n\n（1）环境预测的内容\n①能源和资源消耗的增长、土地利用、资源开发的规模和速度、预\n测供求矛盾及其对环境的影响；\n③大气环境、水环境、土壤环境等环境要素污染状况的变化；\n④开发活动可能造成的生态破坏；\n③环境污染与破坏造成的经济损失和对人体健康的损害；\n?主要污染物的削减量\n（2）环境预测的一般程序：①确定预测的目的和任务；②收集和分析\n有关资料；③选择预测方法；④建立预测模型；③进行预测计算；\n?对预测结果的鉴别和分析。\n\n---\n\n**p056** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_056.jpg)\n\n3、环境预测的方法\n根据预测结果一般可分为两类，即定性预测方法和定量预测方法。\n（1）定性预测方法\n定性预测是预测者利用直观的材料，根据掌握的专业知识和丰富\n的实际经验，运用逻辑思维方法对环境变化做出定性的预计推断和环\n境交叉影响分析，它主要包括专家会议法、德尔菲法、主观概率法和\n层次分析法等。\n①专家会议法又称”集合意见法”，是通过专家之间的信息系统，\n引起”思维共振”并产生组合效应，形成宏观智能结构后进行创造性思\n维的方法。这种方法可以排除折衷，对所议的问题通过客观的连续分\n析，找到一组切实可行方案。\n\n---\n\n**p057** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_057.jpg)\n\n②德尔菲法又称“专家调查法”或“函询调查法”，以无记名方式，通过数\n轮函询征求专家意见。好 预测领导小组对每轮的专家意见进行汇兑整理，作为\n参考资料再发给专家，供其分析判断，进一步提出新的论证，并不断修正自\n己的见解，如此循环反复数次，专家意见日趋一致，产生较为可靠结论。\n德尔菲这一名称起源\n于古希腊有关太阳神\n阿波罗的神话，寓意\n阿波罗预卜未来的神\n谕。1946年，兰德公\n司首次用这种方法做\n出成功预测后，这一\n方法被迅速广泛采用。\n\n---\n\n**p058** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_058.jpg)\n\n德尔菲法一般情况下包括设计调查表、发放调查表实施调查、回收调查\n表进行统计处理、将所有调查对象对每项指标权重的平均估计值及本人估计\n值的离差反馈给每个参加调查者并进行第二轮调查和收回调查表进行统计处\n理五个基本步骤，具有不具名（应邀参加者并不了解，克服易受权威人士思\n想和见解的束缚）、反馈性（一般经3~4轮，每轮统计结果反馈给每位参加者\n作为下一轮参考）和预测结果统计性（每一轮采用统计方法处理预测结果，作\n定量处理）等特点。\n\n---\n\n**p059** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_059.jpg)\n\n③主观概率法首选允许专家在预测时可以提出几个估计值，并\n评定备选值出现的可能性；然后计算各个专家预测值的期望值；最\n后，对所有专家预测期望值取平均值，得到预测结果。\n④层次分析法利用递阶层次结构和矩阵方程将思维过程数学化，\n采用1~9标度构造判断矩阵，通过求解矩阵特征向量及最大特征根，\n求得低层因素相对目标层的相对重要性权重值，以决定其影响程度。\n\n---\n\n**p060** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_060.jpg)\n\n（2）定量预测方\n法\n定量预测以运筹学、系统论、\n控制论、系统动态仿真和统计学\n为基础，根据历史数据和资料，\n应用数理统计方法来预测事物的\n未来，或者利用事物发展的因果\n关系来预测事物的来。常用的定\n量预测方法主要有时间序列法、\n逻辑型规律法和环境系统的数学\n模型法等。\n\n---\n\n**p061** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_061.jpg)\n\n①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n**p062** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_062.jpg)\n\n②逻辑型规律法\n逻辑型规律是自然环境和社会环境中事物发展的基本规律之一\n其基本线形是由一条指数曲线和一条对数曲线平滑衔接组合而成，\n成S型，又称S规律。\n③环境系统的数学模型\n依据科学定律或者数据的统计分析，或者两者兼而有之，包括\n代数方程模型、微分方程模型等。\n\n---\n\n**p063** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_063.jpg)\n\n（3）回归分析法\n回归分析法是通过对历史资料的统计与分析，寻求变量之间相互\n依存的相关关系的一种数量统计方法。\n回归分析法的特点包括：①回归模型中的因变量和自变量之间必\n须有因果关系；②自变量与因变量间必须具有强相关关系，自变量间\n必须具有弱相关关系；③自变量的预测值较准确且易得到；④正确选\n定回归模型的形式；回归模型必须通过各种检验后才能用于预测。\n回归预测法的基本步骤包括：①进行因素分析，确定回归模型的\n自变量；②绘制散点图，构造回归模型的理论形式；③利用最小平方\n法估计模型参数，建立模型；④对建立的回归模型进行检验，检验的\n方法包括S检验和相关检验等；利用检验后的回归模型进行预测。\n\n---\n\n**p064** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_064.jpg)\n\n4、环境预测的常见类型\n（1）大气环境质量预测\n大气环境质量预测是为了了解未\n来一定时期的经济、社会活动对大气\n环境带来的影响，以便采取改善大气\n环境质量的措施。\n主要内容是预测大气环境中污染\n物的含量，常用方法有箱式模型法、\n高斯模型法、线源扩散模式法、面源\n等。\n\n---\n\n**p065** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_065.jpg)\n\n（2）水环境质量预测\n水环境质量预测最基本的问题就是要找出污染排放变化与\n水体控制点处主要污染物含量水平的相关关系，以此预测区域\n（或城市）由于实施经济、社会发展规划而产生的环境影响。\n可选用或建立水质模型，如河流模型，河口、湖泊水库模\n型等均是进行水质预测最常采用的方法。\n\n---\n\n**p066** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_066.jpg)\n\n（3）固体废物环境质量预测\n固体废物对环境影响是多方面的，对这类预测问题，一般\n包括工业固体废物产生量、城市垃圾产生量及固体废物环境影\n响预测等内容。\n固体废物环境影响预测则可采用大气、水影响预测模型\n以及因果关系分析法等。\n\n---\n\n**p067** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_067.jpg)\n\n（4）噪声环境质量预测\n交通噪声预测方法：交通噪声预测方法常用的有多元回归预测，\n即根据用车流量、道路宽度、本底噪声值与交通噪声等效声级之间的\n关系，建立多元回归预测模型\n环境噪声预测方法：环境噪声预测方法常见的主要有两种：一\n种是多元回归预测方法，通过噪声源、本底噪声与噪声等效声级之\n间的关系，建立多元回归预测模型。另一种为灰色预测方法，即根\n据历年环境噪声值，建立灰色预测模型。\n\n---\n\n**p068** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_068.jpg)\n\n三、环境预测的工作程序\n确定预测目的\n准备阶段 确定预测时间\n制定预测计划\n收集预测资料\n收集分析信息\n资料的分析检验\n选择预测方法\n建立预测模型\n预测分析\n进行预测计算\n否\n预测结果检验\n输出预测结果\n输出结果\n提交预测结果\n\n---\n\n**p069** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_069.jpg)\n\n第五节 决策分析方法\n一、决策\n二、决策因素\n三、决策方法\n四、决策原则和决策程序\n\n---\n\n**p070** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_070.jpg)\n\n一、决策\n1、内涵\n决策是人们为了达到一定目标，从若干可能的策略中选取最\n好策略的过程。\n决策分析是研究怎样才能作出科学的决策，是一种为复杂的\n和结果不肯定的决策问题提供旨在改善决策过程的合乎逻辑的系\n统分析方法，它的任务是为决策者提供优的或满意的决策及其可\n能结果的分析，供决策时参考。\n决策问题具有多目标性、决策影响的长期性、后果的不确定\n性、可供选择方案的多样性及决策大多数情况下的一次性等特点。\n\n---\n\n**p071** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_071.jpg)\n\n决策是系统工程的核心，也是管理\n的核心，决策是人类社会的重要活动， 运筹惟喱决胜千里\n贯穿于人类各项活动之中，决策一错，\n全盘皆输。1964年瑞士研制出第一只石\n英电子表，决策者以为市场前途不大，\n未引起重视，敏感的日本人立即从技术\n到市场进行深入调研，结论是大有市场，\n它利用其雄厚电子技术基础，首先推出\n成批产品占领市场，刮起石英技术誉满\n全球的旋风，仅七十年代后5年就挤\n瑞士178家手表厂。\n\n---\n\n**p072** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_072.jpg)\n\n2、分类\n决策问题通常分为确定型和非确定型。其中非确定型决策\n包括风险型决策和不确定型决策。确定型决策是在决策环境完\n全确定的条件下进行的，其选择的结果也是确定的。所谓风险\n型情况下的决策和不确定情况下的决策，都是在决策环境不是\n完全确定的情况下进行的，它们之间的区别在于：前者对于各\n自然状态发生的概率，决策者是可以预先估计或计算出来的；\n而后者对于各自然状态发生的概率，决策者是一无所知的，只\n能靠决策者的主观倾向进行决策。\n\n---\n\n**p073** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_073.jpg)\n\n二、决策因素\n一般的决策问题都包含三个最基本的因素：\n1.自然状态\n“产品销路好”、“产品销路一般”和“产品销路差“都是自然状态，\n是决策者无法控制的因素。\n2.策略\n策略是决策者可以采取的行动方案。采取哪一个策略，完全由决\n策者决定。\n3.益损值\n益损值是不同策略在不同自然状态下的收益值或损失值。\n\n---\n\n**p074** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_074.jpg)\n\n三、决策方法\n1.确定型决策的方法\n确定型决策法适应于处理确定型决策问题，也就是说在自然状态已\n清楚而且完全确定，决策者可以凭借个人的判断，按既定目标及评价准\n则选定行动方案，这样的决策就是确定形决策问题。它有四个主要特征，\n①只有一个确定的自然状态；②存在决策者希望达到的一个明确的目的；\n③存在着可供决策者选择的两个或两个以上的行动方案，而且每种方案\n的最终结果是确定的；④不同的行动方案在确定状态下的收益值或损失\n值可以计算出来。\n确定型决策的方法有很多，例如单纯择优法、模型决策法、排队决\n策法和盈亏平衡分析等。单纯择优法就是可以直接选择最优的决策方案；\n模型决策法是利用一定的数学模型进行计算后，加以择优的方法。\n\n---\n\n**p075** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_075.jpg)\n\n2.非确定型决策的方法\n对于风险型决策问题，其状态的发生或不发生是带有某种概率的，\n这种概率对决策者来讲要承担一定的风险。最大收益期望值决策准则的\n公式见式（4-5），最小机会损失期望值决策准则公式见式（4-6）。\nAn=max(∑=P;a) (4-5)\n式中：\nP;一某状态发生的概率；\na;一状态的期望值。\nA,=min(∑²=,P;0) (4-\n式中：0一状态的损失值。\n\n---\n\n**p076** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_076.jpg)\n\n例4-1某厂开发环保产品，其市场状态E；，发生概率P和各方案\n不同收益a；见表4-15，对各方案A择优决策。\n市场状态E及概率PE良好， E2一般， E3不佳， 收益期望\n方案A;\nP1=0.4 P2=0.5 P3=0.1\naij Oij aij Oij aij OijA1 80 0 50 20 20 30\nA2 60 20 70 0 50 0 PanPO# n nA3 50 30 40 30 20 30\n表4-15最大收益期望值方案决策矩阵（最小机会损失期望值）\n\n---\n\n**p077** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_077.jpg)\n\n解：据式（4-5）\nAn=max{(0.4x80+0.5x50+0.1x20),(0.4X60+0.5x70+0.1x50).\n（0.4x10+0.5x40+0.1x20）}=max{59,64，42）=64选择期望值最大\n的方案A2\n据式(4-6)\nAn=min{(0.4x0+0.5x20+0.1x30),(0.4X20+0.5x0+0.1x0),(0.4x30+0.5x30+0.1x30）}=min{13，8,30}=8选择机会损失最小的方案\n对于不确定型决策问题，不但状态的发生是随机的，而且各状态\n发生的概率也是未知的和无法事先确定的。对于这类问题的决策，主\n要取决于决策者的素质、经验和决策风格等。本书介绍几种比较常见\n的处理不确定型决策问题的决策方法。\n\n---\n\n**p078** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_078.jpg)\n\n（1）等可能性准则\n对于不同的自然状态，如果没有确切理由说明每个自然状态的\n概率，那么只能认为它们发生的机会是相等的，即每一种自然\n状态发生的概率都是1/n。将每一个自然状态的概率定为1/n\n后，就可以用已经介绍过的方法了。\n（2）乐观准则\n按乐观准则决策时，决策者持最乐观的态度，决策时不放弃任\n何一个获得最好结果的机会，愿意以承担一定风险的代价去获\n得最大的利益。\n\n---\n\n**p079** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_079.jpg)\n\n例4-2\n表4-16效益矩阵\n效益矩阵状态SSi S2 S3 S4\n方案AjA1 4 4 6 7\nA2 2 4 6 9\nA3 5 7 3 5\nA4 3 5 6 8\nA5 3 5 5 5\n\n---\n\n**p080** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_080.jpg)\n\n对于A:max（4，4，6，7)=7\n对于A2:max(2，4,6，9)=9\n对于A3:max(5，7，3，5）=7\n对于A4:max（3，5，6，8)=8\n对于As:max（3，5，5，5）=5\n再从选出的5个最大效益值中，挑选一个最大值：即：max（7，9，7，8，\n5)=9，故选方案A2。\n按乐观准则决策，实际是瞄准整个效益矩阵中的最大者。这当然不\n会丧失获得最好结果的机会，但有时也不可避免落到最坏的结局。比如\n本例中选择了A2，若自然状态S4发生，则获得最好结果；而若自然状态\nS发生，则将落到最坏结局。\n\n---\n\n**p081** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_081.jpg)\n\n（3）悲观准则\n悲观法（最大最小准则法或瓦尔德准则法）的决策原则：“小中取大”，\n是当有多种方案可供决策者选择时，先估算出每个方案在每种状态下的\n收益值或收益率，然后把各个方案的最小收益值或收益率单列出来，在\n这组最小收益值或收益率中，选择收益值或收益率最大的那个方案作为\n最佳方案。这种决策方法，在出现不利的情况下，也可使损失减到最小。\n其特点是决策者持最悲观的态度，他总是把事情估计得很不利。\n乐观准则 大中取大\n悲观准则 小中取大\n\n---\n\n**p082** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_082.jpg)\n\n仍以例4-2为例：\n对于A:min（4，4，6，7)=4\n对于A2:min(2，4，6，9)=2\n对于A3:min（5，7，3，5)=3\n对于A4:min（3，5，6，8)=3\n对于As:min（3，5，5，5)=3\n再从选出的5个最小效益值中，挑选一个最大值：\n即:max（4,2，3，3，3）=4\n故选方案A1。\n按悲观准则决策，可能丧失掉获得最好结果的机会。但不管最终\n哪个自然状态发生，决策者都能够避免最坏的结局\n\n---\n\n**p083** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_083.jpg)\n\n(4)折衷准则\n乐观法与悲观法决策的缺点是：\n在决策过程中所损失的信息过多，而\n且决策结果也有很大的片面性。所谓\n折衷，即在乐观与悲观之间折衷。在\n折衷准则中，用乐观系数a表示乐观\n程度（0≤a≤1），而（1-a）就是悲观系\n数，它表示悲观程度。折衷法的特点：\n既不非常乐观，也不非常悲观，而是\n通过一个系数。（0≤a≤1）表示决策者\n对客观条件估计的乐观程度。\n\n---\n\n**p084** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_084.jpg)\n\n上例中，假设a=0.45，则1-a=0.55。折衷效益值C的公式为：\nC;=a·max{a)+(1-a)·min{a}(i=1,2...5)\n对于A1:C=0.45x7+0.55x4=5.35\n对于A2:C2=0.45x9+0.55x2=5.15\n对于A3:C3=0.45x7+0.55x3=4.8\n对于A4:C4=0.45x8+0.55x3=5.25\n对于A5:C=0.45x5+0.55x3=3.9\n再从各个方案的折衷效益值C中选择一个最大值：\n即：max（c}=max(5.35，5.15，4.8，5.25，3.9)=5.35\n其相应方案即所选方案。故选方案A1。\n当乐观系数a取值不同时，选择的方案可能不同。当a=1时，折\n衷准则即成为乐观准则，而当a=0时，折衷准则成为悲观准则。\n\n---\n\n**p085** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_085.jpg)\n\n（5）后悔值准则（最小后悔值准\n则)\n对于非确定型决策问题，为了避免事后遗憾没有选准效益最大\n或损失最小的方案，可以采用后悔值法进行决策。后悔值（最小最大\n后悔值法），是后悔值法决策的主要依据，是指某状态下的最大效益\n值与各方案的效益值之差。\n决策者做出决定之后，若不够理想，必有后悔之感。后悔值准\n则就是把每一自然状态对应的最大效益值视为理想目标，把它与该\n状态下的其他效益值之差作为未达到理想目标的后悔值，这样可得\n到一个后悔矩阵。\n求出后悔矩阵中每一行的最大值，这些最大值中的最小者对应\n的方案，即为应选方案。上例中（表4-6），效益矩阵对应的后悔矩\n阵见表4-17。\n\n---\n\n**p086** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_086.jpg)\n\n表4-17 效益矩阵对应的后悔矩阵\n方案 状态（S） 最大后\n(Ai) S1 S2 S3 S4 悔值\nA1 1 3 0 2 3\nA2 3 3 0 0 3\nA3 0 0 3 4 4\nA4 2 2 0 1 2\nA5 2 2 1 4 4\n因为各个方案的最大后悔值中最小者为2，故选择方案A1。\n\n---\n\n**p087** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_087.jpg)\n\n对于不确定型问题，采用不同的决策准则做出的决策往往\n是不同的。为了使决策更准确可靠，最好设法了解各自然状态\n发生的概率，以便将不确定问题转化为风险型问题，提高决策\n的科学性。\nalternativehigh-riskconsequencesuncertainty complexityMAKiNGinterpersonalissues\n\n---\n\n**p088** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_088.jpg)\n\n[例4-3]某厂试制一种防噪耳机，新产品成本每件3元，销售价每件5\n元，若产品当天未销售出，每件损失1元，该厂日产量方案共5个，0、\n1000、2000、3000、4000件，试问为使该厂收入最高，试确定采\n用何种生产方案。\n表4-18各种生产方案下的销售量\n销售量j\n产量方案\n0j1 1000j22000j33000j4 4000j5\nA1:0i1 0 0 0 0 0\n-1000 2000 2000 2000 20001000i2\n-2000 1000 4000 4000 40002000i3\n-3000 0 3000 6000 60003000i4\nAs: -40004000 i5 -1000 2000 5000 8000\n\n---\n\n**p089** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_089.jpg)\n\n①采用小中取大准则的收益矩阵（表4-19）\nAn=max{min(a1j),min(a2), min(a3j), min(a4; ),min(as; ) }\n表4-19采用小中取大准则的收益矩阵\n方案A; 1000 2000 3000 4000\n最小收\n益期望 0 -1000 -2000 -3000 -4000\n值\n因此A=max（0,-1000,-2000,-3000,-4000)=0，收\n益期望值为0所对应的方案为A1，即应停止生产。\n\n---\n\n**p090** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_090.jpg)\n\n②采用大中取大准则的收益矩阵（表4-20）\nAn= max{max(a1j),max(a2j) ,max(a3j),max(a4j),max(a5;)\n表4-20采用大中取大准则的收益矩阵\n方案A; 1000 2000 3000 4000\n最小收\n益期望 0 2000 4000 6000 8000\n值\n因此A，=max（0,2000,4000,6000,8000)=8000，收\n益期望值为8000所对应的方案为A5，即日产4000件。\n\n---\n\n**p091** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_091.jpg)\n\n③等可能性原则\n据表中数据可得备选方案期望值：各方案期望值即为各种自然状态可能\n出现结果的算术平均值，五种市场状态所取得收益平均值如下：\n0=(0)S/+(0)S/+(0)S/+(0)S/+(0）S/1:\nA2:1/5(-\n000=(000)+(000)+(000)+(000)+(00000=（000)+000)+000+0000+000-)\n00=（0009)/+(0009)/+(0000)1+(0)1+(0000-)/:\nA5:1/5(-4000)+1/5(-\n最大收益期望\n值:An=max{2=1 }=max（0,1400,2200,2400,2000)=2400对应A\n\n---\n\n**p092** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_092.jpg)\n\n④最小机会损失决策准则\n计算每种销售量时，各备选方案的机会损失O；：\nO=事件j的最大收益值-各方案i的可能收益值（表4-21）\n事件1，销售量为0时，\nO11=0-0-0;O21=0-(-1000)=1000 ;O31=0-(-2000)=2000 ;\nO41=0-(-3000)=3000 ;O51=0-(-4000)=4000\n事件2，销售量为1000时，\nO12=2000-0=2000;O22=2000-2000=0;O31=2000-\n1000=1000 ;O42=2000-0=2000 ;O52=2000-(-1000)=3000\n\n---\n\n**p093** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_093.jpg)\n\n代\n表4-21最小机会损失决策准则下最大机会损失矩阵\n销售量j\n产量方 最大机\n案 0j1 1000 2000 3000 4000 会损失\nj2 j3 j4 js0 2000 4000 6000 8000 80001000 1000 0 2000 4000 6000 60002000 2000 1000 0 2000 4000 400030003000 3000 2000 1000 0 2000 （最小）\n4000 4000 3000 2000 1000 1000 4000\n\n---\n\n**p094** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_094.jpg)\n\n主观题10分\n采用何种方案？\n\n---\n\n**p095** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_095.jpg)\n\n四、决策原则和决策程序\n1.决策原则\n决策原则主要包括信息快准全原则、\n预测未来原则、可行性原则、系统性原\n则、对比优选原则和集团决策原则。\n2.决策程序\n决策作为一个过程，通常是通过调查\n研究后，在了解客观实际和预测今后发\n展的基础上，明确提出各种可供选择的\n方案以及各种方案的效应，然后从中选\n定某个最优方案。整个过程分为下列程\n序(表4-22)。\n\n---\n\n**p096** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_096.jpg)\n\n表4-22决策程序\n序号 决策过程 说明\n1 明确问题 根据提出的问题，找出症结点，明确对问题的认识\n目标是决策所要达到的结果。如果目标不明确，往往\n2 确定目标 造成决策失误。当有多个目标时应分清主次，统筹兼\n顾。明确目标时，要注意目标的先进性与可靠性\n确定目标后，应对状态进行分析和收集信息，建立模\n3 制定方案\n型，提出实现目标的多种可行方案\n4 方案评估 对提出的多种方案的效果进行评价，尽可能通过科学\n计算，用数量分析的方法比较其优劣和得失\n决策者从总体角度对各种方案的目的性、可行性和时\n5 选择方案\n效性进行综合的系统分析，选取使目标最优的方案\n为了保证最优方案的实施，需要制定实施措施，落实\n6 组织实施\n执行单位，明确具体责任\n在决策实施过程中可能会产生这样或那样偏离目标的\n7 反馈调整 情况，因此必须及时收集决策执行中的\n反馈调整信息，分析既定决策是否可以实现预定目标\n\n---\n\n**p097** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_097.jpg)\n\n第六节 环境审计方法\n一、环境审计\n二、环境审计的内容\n三、环境审计方法\n\n---\n\n**p098** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_098.jpg)\n\n一、环境审计\n环境审计是对特定项目的环境保护情况，包括组织\n机构、管理、生产及环保设施运转与排污等情况进行系统\n的、有文字记录的、定期的、客观的评定。\n环境审计按范围可分为地区（城市）级的环境审计及\n工厂、工艺、特定污染物等的环境审计。\n按审计的目标可分为提高环境管理效率、有效控制污\n染、提高环保资金使用效率、减少事故等环境审计。\n按审计的目的可分为审查环境执法、废物减量化、实\n施清洁生产等环境审计。\n\n---\n\n**p099** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_099.jpg)\n\n环境审计是对环境管理的某些方面\n进行检查、检验和核实，目的一般是将\n潜在的、可能出现的环境危险降到最低 审计\n程度。\n“环境审计”也是一种管理工具，它用\n于对环境组织、环境管理和仪器设备是\n否发挥作用进行系统的、定期的和客观\n的评价。一般包括对管理的承诺（前\n提）、环境审计小组的目标（方向）、\n专业能力、环境审计程序、书面报告、\n质量保证和跟踪等环节。\n\n---\n\n**p100** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_100.jpg)\n\n二、 环境审计的内容\n1.符合性审计\n主要为环境保护法规的符合性审计，对企业有关环境的\n现状及管理当局所作的努力进行详细的、特定区域的评价，\n以提高符合性，减少因不符合而造成的后果。\n2.环境保护管理系统审计\n确定环境管理系统是否运作良好，是否能处理当前或未\n来的环境风险。\n3.过渡审计\n评价与不动产的获取和剥离有关的风险。企业在购买和\n转让不动产时，需要对其有关环境因素加以审计，以此来降\n低由此带来的风险。\n\n---\n\n**p101** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_101.jpg)\n\n4.有害物质的处理、存放及清理的审计\n评价危险原料的处理、存放及清理会产生的全部负债。\n有害物质如果处理、存放和清理不当，会对周边环境造成污\n染，甚至会威胁人类的健康，易带来诉讼、赔偿和罚款，导\n致环境成本上升、经济效益和社会效益下降，必须对其所经\n历的各个环节进行审计。\n5.污染预防审计\n确定减少废物的机会，通过对企业可能发生污染情况的\n审计预测结果，采用一系列有效的措施，减少企业在生产经\n营过程中产生污染的机会。\n\n---\n\n**p102** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_102.jpg)\n\n6.环境效益审计\n评价由于采取了保护环境的措施而产生的成本及其估算的合\n理性、合法性和真实性，并估计环境治理的效益。由于环保设备\n的价格普遍较高，而其带来的效益又具有潜在的、长期的特性，\n通过环境效益审计，能提高企业的环保意识并在生产经营活动中\n兼顾企业的长远发展。\n7.产品审计\n确定产品是否与环境政策的要求相符合。如果一个企业的产\n品被列为绿色产品，就会吸引众多的消费者，企业将在激烈的竞\n争中取得优势。通过产品审计，企业可以看出自己的产品与环境\n政策要求的差距，并加以改进。\n\n---\n\n**p103** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_103.jpg)\n\n三、环境审计方法\n环境审计是审计的一种类型，\n常规审计方法对环境审计同样适\n用，如在进行财务收支审计和经\n审计\n济效益审计中运用的：审计检查\n法（包括资料检查法、实物检查\n法）；审计调查法（包括查询法、\n观察法、专题调查法）；审计分\n析法、账户分析法、账龄分析法；\n逻辑推理分析法、经济活动分析\n法；经济技术分析法、数学分析\n法，抽样审计法等。\n\n---\n\n**p104** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_104.jpg)\n\n目前在环境审计专业人才缺乏的情况下如何开展环境审计，我们\n采取了以下几种方式：\n1.将微观审计与宏观分析相结合\n环境审计工作涉及面广、政策性强，要从宏观着眼，把为宏\n观管理服务贯穿于审计工作全过程。在制定审计工作计划时，要\n分析当前环境管理中的主要问题，以资金为主线，以重点环保项\n自为对象，由浅入深选择环境污染最为严重的项自和重点污染源\n治理项目实施审计。将审计中的微观经济现象与有关环境保护宏\n观经济政策、法规、措施相联系，反映问题实质，并提出切实可\n行的意见和建议，及时反馈给政府及有关部门，为宏观决策提供\n依据。\n\n---\n\n**p105** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_105.jpg)\n\n2.将财务收支审计与经济效益审计相结合\n环境审计不仅要对环保资金\n的筹集及使用情况、开展财政与\n财务收支的真实性和合法合规性 审计\n进行审计，而且更重要的是要根\n据国家各项起居室环境指标，测\n评被审计单位应承担的环境保护\n资金\n责任、环境治理责任及工作绩效，\n反映环境保护政策的落实情况\n因此，在开展财务收支审计的同\n时，必须开展环境绩效审计。\n\n---\n\n**p106** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_106.jpg)\n\n3.将审计人员与环保专业技术人员相结合\n环境审计专业技术性很强，审计人员仅有财务、审计知识是不能\n适应工作需要的，还必须熟悉国家环保法律、法规、制度和宏观经济\n政策，同时还要有综合分析、判断能力，因此，现阶段开展环境审计，\n一方面审计人员要通过学习和实践，尽快提高素质，成为既懂财务又\n懂环保、具有宏观分析问题能力的复合型人才，提高环境审计质量；\n另一方面，可以聘请环保专业技术人员参与审计组，合作开展审计，\n促进审计向纵深方向发展，尽快发挥环境审计的社会功效。\n\n---\n\n**p107** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_107.jpg)\n\n目前环境审计刚刚起步，企业环境审计是最基本的，其中企业清\n洁生产审计应用较广泛。清洁生产审计是指对组织产品生产或提供服\n务全过程的重点或优先环节、工序产生的污染进行定量监测，找出高\n物耗、高能耗、高污染的原因，然后有的放矢地提出对策、制定方案，\n减少和防止污染物的产生。清洁生产审计的一个重要内容就是通过提\n高能源、资源利用效率，减少废物产生量，达到环境效益和经济效益\n的和谐统一。清洁生产审计方法详见本书第7章。\n\n---\n\n**p108** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_108.jpg)\n\n第七节 环境管理信息系统\n一、环境信息及其系统\n二、环境管理信息系统的设计与评价\n·三、环境决策支持系统的设计与评价\n\n---\n\n**p109** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_109.jpg)\n\n一、环境信息及其系统\n1.环境信息\n环境信息是在环境管理工作中应用的经收集、处理而以特定形\n式存在的环境知识，以数字、字母、图像和音像等多种形式存在。\n环境信息是环境系统受人类活动等外来影响作用后的反馈，是\n人类认知环境状况的来源。因此，环境信息是环境规划与管理系统\n的神经。\n环境信息除具有一般信息的事实性、等级性、传输性、扩散性\n和共享性等基本属性外，还具有时空性、综合性、连续性和随机性\n的特征。\n\n---\n\n**p110** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_110.jpg)\n\n2.环境信息的检索\n环境信息在各种学术刊物和内部资料上均有刊登，环境管理人\n员可充分利用国内外的检索刊物，查阅相关信息。\n序号\n名称 说明\n全国报刊索 它是全国报刊的一个分册，由上海图书馆编辑出版，\n1 引科技版\n以题录形式按中国图书分类法分类编制，分类号为X。\n它是目前国内环境科学技术信息唯一的检索刊物，\n是全国科技信息检索体系的组成部分，采用中、英、德、\n法、日、俄6种文字，报道国内外百种期刊中有关环境科\n学技术的最新文献资料。以文摘和题录形式向广大读者\n环境科学文\n2 摘 提供环境信息服务，全年报道量约3600篇，其中文摘约\n占70%，题录约占30%，报道内容具有科学性、技术性、\n动态性、实用性、准确性和系统性。\n\n---\n\n**p111** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_111.jpg)\n\n序号\n名称 说明\n它由中国环境科学研究院情报研究所编辑，中国环\n境科学出版社出版，以全国环保科技情报网交流的内部\n中文科技资\n资料为主要资料来源，集中报道我国有关环境科学的会\n3 料目录一环\n议论文、科技成果、出国访问考察、来华技术座谈、学\n境科学\n位论文、引进技术成套资料以及中文期刊上译文资料等。\n国外科技资\n它由科学技术文献出版社出版，是一种题录检索工\n料馆藏目\n具，报道中国科技情报研究所人藏的有关环境污染与保\n4 录一环境污\n护方面的科技资料文献。\n染与保护\n它是美国生物科学情报服务社编辑出版的英文刊物，\n环境污染物\n按类目（水污染、微生物、食品卫生、气体污染、职业卫\n对人体健康\n5 影响文摘 生、农药、射线、土壤、物理污染物、植物、动物、微\n粒污染及其化学原因等）编排。\n\n---\n\n**p112** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_112.jpg)\n\n序\n号 名称 说明\n空气与水保 它收录了世界各国300多种期刊及90种会议文件以及\n护一API文摘 其他出版物中有关空气与水保护方面的文献。\n它收录了美国1000余种期刊、政府文献、研究报告、\n环境文摘 会议记录以及新书中有关环境污染与环境保护研究方面\n7 的文献资料。\n它报道各国出版的400余种环境科学技术期刊的近期\n目次，主题包括人类生态学、空气、土地资源、水资源、\n环境期刊文\n8 营养与保健、能源等，并附有主题和作者索引及年终累\n献题录\n积索引。\n它报道的主要类目有空气污染、水污染、土壤污染、\n9 污染文摘\n海洋污染、噪声污染等。\n\n---\n\n**p113** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_113.jpg)\n\n序号\n名称 说明\n它主要报道环境公害、水质污染、水质污染控制技\n科学技术文\n术、大气污染、大气污染控制技术、废弃物处理、其他\n10 献速报一环\n公害、污染物保护、恶臭、农药与残留农药、放射性污\n境公害篇\n染、自然保护等类目。\n水研究中心 它摘录了世界各国关于给水、水质分析、污染和废\n通报 水处理、天然水源污染等。\n\n---\n\n**p114** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_114.jpg)\n\n3.环境信息系统\n环境信息系统：\n环境信息从产生到应用于环境保\n护工作所构成的系统。\n环境信息系统的构成：\n它由工作人员、设备（计算机、\n网络技术、GIS技术、模型库等）\n及环境原始信息等组成。\n环境信息系统按内容分为：\n环境管理信息系统（EMIS）\n环境决策支持系统（EDSS）\n\n---\n\n**p115** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_115.jpg)\n\n（1）环境管理信息系统\n环境管理信息系统（EMIS）是以现代数据库技术为核心，\n将环境信息存储在电子计算机中，在计算机软、硬件支持下，\n实现对环境信息的输入、输出、修改、删除、传输、检索和计\n算等各种数据库技术的基本操作，并结合统计数学、优化管理\n分析、制图输出、预测评价模型、规划决策模型等应用软件，\n构成一个复杂而有序的、具有完整功能的技术工程系统。它既\n是各种环境信息的数据库，又是环境管理政策和策略的实验室。\n\n---\n\n**p116** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_116.jpg)\n\n其基本功能包括：①全面准确地查询和检索各种环境信息，系\n统提供环境科研和管理所需要的各种数据和信息并具有统一的格\n式。②分析各种空间数据，利用数学模型进行数据加工，进行区\n域环境质量的现状评价、污染源评价、污染控制方案预测、经济\n发展对环境影响的预测以及区域环境质量控制规划等工作。③决\n策支持，针对不同层次环境管理部门的不同要求，输出各种图件\n和报告，为环境管理工作提供辅助决策。④有效地利用系统本身\n的功能，可降低系统成本，提高效益。\n\n---\n\n**p117** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_117.jpg)\n\n收集 录用\n存储 环境信息 以报表、图表、图形等形式输出信\n息\n加工 处理\n为政府决策者、企业管理者及公众和NGO提供\n数据参考\n\n---\n\n**p118** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_118.jpg)\n\n建设项目环境管理的基本目标主要包括：\n①实现基本信息、污染物的预测排放量与实际排放量、区域范围\n“三废”排放分布、区域范围污染物累积负荷等专题图的显示；\n②实现通过地图对建设项目基础数据查询分析结果进行图文互查，\n并针对专题信息能在图上进行任意选取范围进行分析、汇总，生成\n专题图表。\n数据采集\n地理数据库 移动GIS\n服务器\n信息发布\n\n---\n\n**p119** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_119.jpg)\n\n正安市流南告环撞景\n空气环境质量 统平台 水环境质量\nAQI指数 45优 首要污染物\n2021-10-15 合平合入口 欧公告 GS统 环吸监用 环乐爱素 行155841 河流23总断面50水源地21\n本月优良天数 废气 废水 污水处理厂 尾气超标 考核目标 2021-09485 458 27 985 考楼日标 012 鹿·12 37 达标斯面 0\n轻杂0 中方染0 达标率 0%\n染0 -100% 咨控\n空气质量目标考核指标 未达标站点 (0)\n累计优良天数 优良率 日标优良天数 同比\n247天 86% 311 天 -27%\n空气质量预报 2021-09-15 2021-10-15 水质自动监测信息\n46 39 31 流城断阳名际 水淡列\n2942 2021-101213:050\n甘泉贝 朱家沟 2021-10-1505:0006010010Z60Z60660 47\n证后监管 40 36 环境执法\n许可证发放\n支含业 已整64 点 129 52 1347 28817 未皮321 韵化 256 53 123450\n排为记 2039 始查次数问企业数\n应 275 税款 处罚企业数 处罚金额\n102 实报 280 25602 元 环信恒辉科技 6 2155.706万元\n\n---\n\n**p120** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_120.jpg)\n\n（2）环境决策支持系统\n环境决策支持系统（EnvironmentalDecisionSupportSystems，简称EDSS）是将决策支持系统引I入环境规划、\n管理、决策工作中的产物，对定结构化、未定结构化或不定\n结构化问题进行描述、组织，进而协助人们完成管理决策的\n支持技术。其基本功能是收集、整理、贮存并及时提供本系\n统与本决策有关的各种数据，对环境信息进行加工、处理、\n分析、综合、预测、评价。\n科学性\n效率\n\n---\n\n**p121** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_121.jpg)\n\n环境决策支持系统通常具有以下几个主要组成部分：\n数据库：存储大量的环境数据，包括环境监测数据、污染源信息、地\n理信息、社会经济数据等。\n模型库：包含各种用于环境预测、模拟和评估的数学模型和算法，例\n如大气扩散模型、水质模型、生态模型等。\n知识库：积累环境领域的专业知识、法规政策、经验案例等，为决策\n提供理论和实践依据。\n人机交互界面：允许决策者输入问题和参数，查看分析结果，并以直\n观的方式展示数据和模型输出。\n决策分析模块：运用数据分析、多准则决策分析、风险评估等方法，\n对不同的决策方案进行比较和评估。\n\n---\n\n**p122** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_122.jpg)\n\n收集、整理、贮存各种环境信息和数据\n主要功能 灵活运用模型方法对环境信息进行加工处理、分析、综合、\n预测、评价以提供决策信息\n提供友好的人机界面和模型输出功能；良好的环境信息传输\n功能\n快速的信息加工速度及响应时间\n具有定性分析和定量研究相结合的特定环境问题的方式\n\n---\n\n**p123** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_123.jpg)\n\n二、环境管理信息系统的设计与评价\n1.信息系统设计的目标、任务和原则\n目标：充分利用先进的GIS技术、数据库技术、网络通信技术、\n分布式计算技术等，建设一个科学、高效的环境应用信息系统\n为环境管理信息系统的开发目标。\n根本任务：逻辑模型→物理模型（功能设计→数据库设计一应用\n设计）的转变。\n设计原则：①实用性（面向需求，功能完善）；②标准性（标准化、\n统一化）；③先进性（紧跟技术潮流）；④动态性（动态调整、与环\n境业务发展相适应）；开放性（后续开发）；6经济性（性价比）；\n?安全性（数据安全，逻辑可靠）。\n\n---\n\n**p124** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_124.jpg)\n\n2.环境管理信息系统的设计与评价\n环境管理信息系统设计过程可分为四个阶段：\n①可行性研究。\n②系统分析。\n③系统设计。\n④系统的实施与评价。\n石家庄污染源动态管理系统\n系统设置\n行业类型 美注度 行政处罚\n国控 t22 行政区具\n451 59t\n火电行业 35 印行业 35 长安区 29 451\n水范行症 614 65 污水处理厂 614 65 西分比 166\n行业美行\n\n---\n\n**p125** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_125.jpg)\n\n云南省地质环境管理信息系统 2017年12月28日周四 好，欢迎用用想环营信系统\n8-19℃多云 禁票进出\n安全防护管理\n地质环境业务数据\n地质灾害 地下水 矿山地质环境 地质遗迹 基础数据\n地质环境业务管理\n综合业务数据管理 数据采集系统管理 数据系统管理 政务系统管理 应急支撑管理\n\n---\n\n**p126** ![](../006-第五章环境规划的基本内容和程序-第四章环境规划与管理中的综合分析方法/page_126.jpg)\n\n习题\n1.简述环境现状调查的内容和方法。\n2.简述环境评价的内容和方法。\n3.简述环境目标的组成。\n4.简述环境规划与管理指标体系的组成内容。\n5.简述环境统计的内容及研究和调查方法。\n6.简述社会发展预测的主要方法。\n7.简述经济发展预测的主要方法。\n8.简述环境质量预测的主要方法。\n9.简述环境审计的方法和内容。\n10.简述环境管理信息系统的组成和设计方法。\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 2 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 6 节 · 76 页\n\n> `006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序.pdf` · 涉章 [5]\n\n- [p001](../006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序/page_001.jpg)  · GUNIV\n- [p002](../006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序/page_002.jpg)  · 学习要点\n- [p003](../006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序/page_003.jpg)  · 第一节 环境规划的原则和程序\n- ...余 73 页, 参 [`006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序/`](../006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序/)\n\n### 辅 2 · 第 7 节 · 77 页（跨章）\n\n> `007-第六章环境规划-第五章环境规划的基本内容和程序.pdf` · 涉章 [5, 6]\n\n- [p001](../007-第六章环境规划-第五章环境规划的基本内容和程序/page_001.jpg)  · GUNIV\n- [p002](../007-第六章环境规划-第五章环境规划的基本内容和程序/page_002.jpg)  · 学习要点\n- [p003](../007-第六章环境规划-第五章环境规划的基本内容和程序/page_003.jpg)  · 第一节 环境规划的原则和程序\n- ...余 74 页, 参 [`007-第六章环境规划-第五章环境规划的基本内容和程序/`](../007-第六章环境规划-第五章环境规划的基本内容和程序/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 4 章, 第 6 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划的基本内容和程序\n## 核心概念\n- 环境现状调查\n- 环境现状调查方法\n- 环境评价\n- 等标污染负荷法\n- 环境统计\n- 社会经济预测\n- 环境预测\n- 德尔菲法\n- 决策分析\n- 环境审计\n- 环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n## 关键公式 / 模型\n- Pᵢ = Qᵢ / C₀ᵢ\n- E = Σ Pⱼ·Vᵢⱼ\n- C = α·max + (1−α)·min\n- min(max 后悔值)\n## 高频考点\n- 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n- 等标污染负荷法识别主要污染源与污染物\n- 环境统计的内容与指标体系\n- 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n- 环境预测的定性与定量方法\n- 德尔菲法的特点与步骤\n- 五种非确定型决策准则及计算\n- 环境审计的内容与方法\n- EMIS 与 EDSS 的功能与组成\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境规划的基本内容和程序))\n    核心概念\n      环境现状调查\n      环境现状调查方法\n      环境评价\n      等标污染负荷法\n      环境统计\n      社会经济预测\n      环境预测\n      德尔菲法\n      决策分析\n      环境审计\n      环境管理信息系统（EMIS）与环境决策支持系统（EDSS）\n    关键公式 / 模型\n      Pᵢ = Qᵢ / C₀ᵢ\n      E = Σ Pⱼ·Vᵢⱼ\n      C = α·max + （1−α）·min\n      min（max 后悔值）\n    高频考点\n      环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n      等标污染负荷法识别主要污染源与污染物\n      环境统计的内容与指标体系\n      社会经济预测方法（人口、能源弹性系数/回归/灰色）\n      环境预测的定性与定量方法\n      德尔菲法的特点与步骤\n      五种非确定型决策准则及计算\n      环境审计的内容与方法\n      EMIS 与 EDSS 的功能与组成\n```\n\n## 复习要点 · LLM 协填\n\n### 一、核心概念\n\n- **环境现状调查**：调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*\n- **环境现状调查方法**：收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*\n- **环境评价**：对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n- **等标污染负荷法**：以污染物排放量除以其评价标准 Pᵢ=Qᵢ/C₀ᵢ，识别主要污染源与主要污染物。  *（要：按 P 值大小排序）*\n- **环境统计**：用统计方法收集、整理、分析环境数据，反映环境状况与保护工作的活动。  *（要：有固定的指标体系与上报流程）*\n- **社会经济预测**：对人口、经济发展、能源消耗等进行预测（弹性系数法、回归分析法、灰色预测）。  *（要：规划情景设定的依据）*\n- **环境预测**：把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n- **德尔菲法**：匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n- **决策分析**：在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n- **环境审计**：对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n- **环境管理信息系统（EMIS）与环境决策支持系统（EDSS）**：对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Pᵢ = Qᵢ / C₀ᵢ` | 等标污染负荷，Qᵢ 为排放量，C₀ᵢ 为评价标准 |\n| `E = Σ Pⱼ·Vᵢⱼ` | 风险型决策的期望值准则 |\n| `C = α·max + (1−α)·min` | 非确定型决策折衷准则，α 为乐观系数 |\n| `min(max 后悔值)` | 后悔值（最小机会损失）准则 |\n\n### 三、重要案例 / 例题\n\n- 例 4-1：用期望值准则在多个环保产品方案中选最优。\n- 例 4-2：对同一效益矩阵分别用乐观、悲观、等可能、折衷准则决策并比较。\n- 例 4-3：防噪耳机产量决策，构建收益矩阵与机会损失（后悔值）矩阵。\n\n### 四、高频考点（速记）\n\n1. 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n2. 等标污染负荷法识别主要污染源与污染物\n3. 环境统计的内容与指标体系\n4. 社会经济预测方法（人口、能源弹性系数/回归/灰色）\n5. 环境预测的定性与定量方法\n6. 德尔菲法的特点与步骤\n7. 五种非确定型决策准则及计算\n8. 环境审计的内容与方法\n9. EMIS 与 EDSS 的功能与组成\n\n### 五、思考题 / 自测\n\n- **Q**：等标污染负荷法如何确定主要污染源？\n  **A**：分别计算各源各污染物的等标污染负荷 Pᵢ=Qᵢ/C₀ᵢ 并求和，按 P 值大小排序，累计贡献大者即为主要污染源或主要污染物。\n\n- **Q**：德尔菲法相比一般专家会议有何优点？\n  **A**：匿名可避免权威与从众影响，多轮函询与反馈使专家意见逐步收敛，结果更客观可靠。\n\n- **Q**：乐观、悲观、折衷准则的决策思想有何差异？\n  **A**：乐观（大中取大）取各方案最大收益再取最大；悲观（小中取大）取各方案最小收益再取最大；折衷用乐观系数 α 对二者加权。\n\n\n### 六、与前后章之关联\n\n- **承前**：在前章环境规划基本概念与程序的基础上提供技术支撑。\n- **启后**：调查、预测、决策、审计等方法直接服务 人为主\n体的城市生态系统，而且关系到\n社会、经济的持续健康发展。为\n协调城市社会、经济健康发展与\n大气环境保护之间的关系，制定\n与社会经济发展相匹配的大气环\n境规划是行之有效的手段。\n\n---\n\n**p005** ![](../007-第六章环境规划-第六章环境规划/page_005.jpg)\n\n6.1大气环境规划\n一、大气环境规划的主要内容与类型\n二、大气环境污染源调查与评价\n三、大气污染预测\n四、大气环境规划目标与指标体系\n五、大气污染物总量控制方法\n六、大气污染防治措施\n\n---\n\n**p006** ![](../007-第六章环境规划-第六章环境规划/page_006.jpg)\n\n一大气环境规划的主要内容和类型\n大气环境规划是为了平衡和协调某一区域的大气环境与社会、经济\n之间的关系，以期达到大气环境系统功能的最优化，最大限度地发挥大\n气环境系统组成部分的功能。\n在大气环境规划时，首先对大气环境系统进行系统分析，确定各子系\n统之间的关系；其次对规划期内的主要资源进行需求分析，重点分析城\n市能流过程，从能源的输入、输送、转换、分配和使用各个环节中，找\n出产生污染的主要原因和控制污染的主要途径，从而为确定和实现大气\n环境目标提供可靠保证\n\n---\n\n**p007** ![](../007-第六章环境规划-第六章环境规划/page_007.jpg)\n\n一大气环境规划的主要内容和类型\n1.大气环境规划的主要内容\n10 查清大气环境的主要问题\n查清规划区主要污染源，并预测其发展趋势。\n2 ）确定大气环境规划目标\n根据所要解决的主要环境问题和社会经济与大气环境协调发\n展的需求，确定合理的规划目标。\n（3）建立大气环境质量模型\n确定污染源与环境目标之间的关系。\n\n---\n\n**p008** ![](../007-第六章环境规划-第六章环境规划/page_008.jpg)\n\n一大气环境规划的主要内容和类型\n1.大气环境规划的主要内容\n（4）制定大气污染控制方案\n制定多套包括切实可行的治理措施的方案。\n(5）方案优选\n对多种方案进行环境、经济和社会影响分析，通过决策\n分析，选择最佳方案。\n(6）实施规划方案\n\n---\n\n**p009** ![](../007-第六章环境规划-第六章环境规划/page_009.jpg)\n\n一大气环境规划的主要内容和类型\n2.大气环境规划的类型\n大气污染物排放与控制是相互联系而又相对独立的两个阶段，在进\n行大气环境规划时，应将它们一起考虑，才有可能以最小的费用获得最\n大的效益。大气环境规划总体上划分为两类，即大气环境质量规划和\n大气污染控制规划。这两类规划相互联系、相互影响、相互作用构成了\n大气环境规划的全过程。\n（1）大气环境质量规划\n大气环境质量规划是以城市总体规划和大气环境质量标准为依据，\n规定了城市不同功能区主要大气污染物的浓度限值。它是城市大气环\n境管理的基础，也是城市建设总体规划的重要组成部分。大气环境质\n量规划模型主要是建立污染源排放和大气环境质量之间的关系。\n\n---\n\n**p010** ![](../007-第六章环境规划-第六章环境规划/page_010.jpg)\n\n一大气环境规划的主要内容和类型\n依据《环境空气质量标准》GB3095-2012）：\n1、一类区（自然保护区、风景名胜区和其他需要特殊保护的区域）：\n①S02：年平均浓度限值为20ug/m²，24小时平均浓度限值为50μg/m²，\n1小时平均浓度限值为150ug/m3。②N02：年平均浓度限值为\n40ug/m²，24小时平均浓度限值为80μg/m²，1小时平均浓度限值为\n200μg/m3。③c0：24小时平均浓度限值为4mg/m²，1小时平均浓度\n限值为10mg/m3。④0²：日最大8小时平均浓度限值为100μg/m3，1\n小时平均浓度限值为160ug/m3。PM1o：年平均浓度限值为\n40ug/m²，24小时平均浓度限值为50μg/m3。?PM2.5：年平均浓度限\n值为15pg/m3，24小时平均浓度限值为35μg/m3。\n\n---\n\n**p011** ![](../007-第六章环境规划-第六章环境规划/page_011.jpg)\n\n一大气环境规划的主要内容和类型\n二类区（居住区、商业交通居民混合区、文化区、工业区和农村地区）：\n①S02：年平均浓度限值为60μg/m3，24小时平均浓度限值为\n150μg/m²，1小时平均浓度限值为500μg/m²。②N02：年平均浓度限\n值为40μg/m²，24小时平均浓度限值为80μg/m3，1小时平均浓度限值\n为200μg/m²。③c0：24小时平均浓度限值为4mg/m²，1小时平均浓\n度限值为10mg/m3。@03：日最大8小时平均浓度限值为160μg/m²，1\n小时平均浓度限值为200μg/m3。?PM1o：年平均浓度限值为70ug/m²，\n24小时平均浓度限值为150μg/m3。?PM2.5：年平均浓度限值为\n35ug/m3，24小时平均浓度限值为75ug/m3。\n\n---\n\n**p012** ![](../007-第六章环境规划-第六章环境规划/page_012.jpg)\n\n一大气环境规划的主要内容和类型\n（2）大气污染控制规划\n大气污染控制规划是指实现大气环境质量的方案。对于新建或污染较\n小的城市，大气污染控制规划可根据城市的性质、发展规模、工业结\n构、产品结构、资源状况、大气污染控制技术等，结合城市总体规划\n中其它专业规划合理布局。对于已经受到污染或部分污染的城市，\n大气污染控制规划的目的则主要是寻求实现城市大气环境质量规划的\n便捷、经济、可行的技术方案和管理方案。\n\n---\n\n**p013** ![](../007-第六章环境规划-第六章环境规划/page_013.jpg)\n\n二大气环境污染源调查与评价\n1.大气污染物与污染源\n大气污染物是指由于人类活动或自然过程排入大气并对人类\n或环境产生有害影响的物质。根据存在的特征可分为气溶胶状\n污染物和气体状态污染物两类，前者主要表现为PM1o、降尘、\nTSP、PM2.5等；后者主要有SO2、NOx，COx、碳氢化合物和卤族\n化合物等。\n大气污染物的发生源或排放装置称为大气污染源。通常又可\n分为工业污染物、生活污染源和交通污染源，前两类污染源统\n称为固定源，交通污染源则称为流动源。另外，按污染源的几\n何形状，可分为点源、线源、面源和体源；按污染源的几何高\n度可分为高架源、中架源和低架源；按污染源排放污染物时间\n的长短，可分为连续源、瞬时源；按污染源排放形式可分为有\n组织排放源和无组织排放源。\n\n---\n\n**p014** ![](../007-第六章环境规划-第六章环境规划/page_014.jpg)\n\n二大气环境污染源调查与评价\n2.大气污染源的调查与分析\n大气污染源调查的目的是弄清规划区\n污染的主要来源，一般按工业污染源、生\n活污染源和交通污染源进行分类和调查。\n如有近期的工业污染源调查资料，一般可\n直接选用，而生活污染源和交通污染源的\n调查则可结合规划区的具体情况进行。但\n是，调查所得的基础资料和数据，必须能\n满足环境污染预测与制定污染综合整治方\n案的需要。主要包括以下几方面：\n\n---\n\n**p015** ![](../007-第六章环境规划-第六章环境规划/page_015.jpg)\n\n二大气环境污染源调查与评价\n2.大气污染源的调查与分析\n（1）画出污染源分布图\n画出规划区域范围内的大气污染源分布图及类型（点源、面源\n线源），标明污染源的位置、污染排放方式，并列表给出各主\n要参数。\n（2）点源调查统计内容\n排气筒底部中心坐标（一般按国家坐标系）及分布平面图；排\n气筒高度（m）及出口内径（m）；排气筒出口烟气温度（℃）：\n烟气出口速度（m/s）；各主要污染物正常排放量（t/a,t/h或\nkg/h)。\n（3）面源调查统计内容\n将规划区在选定的坐标系内网格化。按网格统计面源的如下参\n数：主要污染物排放量[t/(hkm²)]，面源排放高度（m），面源\n分类。\n\n---\n\n**p016** ![](../007-第六章环境规划-第六章环境规划/page_016.jpg)\n\n二大气环境污染源调查与评价\n3.大气污染源的评价\n通过污染源的评价，确定出该规划区域的主要污染源和主\n要污染物，常采用等标污染负荷法和污染物排放量排序的方法。\n（1）等标污染负荷法：采用等标污染负荷法对区域工业污染\n源进行评价，用等标污染负荷法对污染源及污染物进行评价并\n排序。\n（2）污染物排放量排序：污染物排放量排序是直接评价某种\n污染物的主要污染源的最简单方法。采用总量控制规划法时，\n针对区域总量控制的主要污染物，对排放主要污染物的污染源\n进行总量排序。\n\n---\n\n**p017** ![](../007-第六章环境规划-第六章环境规划/page_017.jpg)\n\n三大气污染预测\n1.大气污染源源强预测\nQi = K;W(1-ni)\n式中：Q；一源强，对瞬时排放源以kg或t计，对连续稳定排放\n源以kg/h或td计；\nK;一某种污染物的排放因子；\nW-燃料的消耗量，对固体燃料以kg或t计，对液体燃料以L\n计，对气体燃料以100m3计，时间单位以h或d计；\nmi一净化设备对污染物的去除效率，%；\ni-污染物的编号。\n2.大气环境质量预测\n常用的预测模型主要有两类：一是箱式模型，二是扩散模型。\n\n---\n\n**p018** ![](../007-第六章环境规划-第六章环境规划/page_018.jpg)\n\n四大气环境规划目标与指标体系\n1.大气环境规划目标\n（1）大气环境质量目标\n大气环境质量目标是基本目标，依地域和功能区有所不同，\n由表征大气环境质量的指标具体体现。\n（2）大气污染物总量控制目标\n是以大气环境功能区环境容量为基础制定的，便于实施和管\n理的目标；通过制定污染物总量控制目标，将污染物控制在功\n能区环境容量的限度内，其余部分作为削减目标或削减量。\n\n---\n\n**p019** ![](../007-第六章环境规划-第六章环境规划/page_019.jpg)\n\n四大气环境规划目标与指标体系\n2.大气环境规划指标体系\n（1）气象气候指标。主要包括气温、气压、风向、风速、风频、日照、\n大气稳定度和混合层高度等。\n（2）大气环境质量指标。主要包括总悬浮颗粒物、飘尘、SO2、降尘、\nNOx，CO、光化学氧化剂、臭氧、氟化物、苯并花和细菌总数等。\n（3）大气污染控制指标。主要包括废气排放总量、SO排放量及回收率、\n烟尘排放量、工业粉尘排放量及回收量、烟尘及粉尘的去除率、CO排放量、\nNOx排放量、光化学氧化剂排放量、烟尘控制区覆盖率、工业尾气达标率和汽\n车尾气达标率等。\n（4）城市环境建设指标。主要包括城市气化率、城市集中供热率、城\n市型煤普及率、城市绿地覆盖率和人均公共绿地等。\n（5）城市社会经济指标。主要包括国民生产总值、人均国民生产总值、\n工业总产值、各行业产值、各行业能耗、生活耗煤量、万元工业产值能耗、\n城市人口数量、分区人口数量、人口密度及分布和人口自然增长率等。\n\n---\n\n**p020** ![](../007-第六章环境规划-第六章环境规划/page_020.jpg)\n\n五大气污染物总量控制方法\n1.A-P值法\nA值法\nA值法属于地区系数法，只要给出控制区总面积及各功能分区的面积，\n再根据当地总量控制系数A值就能计算出该面积上的总充许排放量。\nA值法是以地面大气环境质量为目标值，使用简便的箱模式而实现的\n具有宏观意义的总量控制；是对以往实行的P值法的修改。\n\n---\n\n**p021** ![](../007-第六章环境规划-第六章环境规划/page_021.jpg)\n\n五大气污染物总量控制方法\n1.A-P值法\nP值法\nP值法是根据烟囱有效高度估算各污染源的允许排放量。是\n用烟囱高度来控制污染物的排放率，所以P值法是污染物排\n放总量的计算方法，可以运用P值法检验执行浓度控制或总\n量控制标准地区的污染物排放是否超标。\n\n---\n\n**p022** ![](../007-第六章环境规划-第六章环境规划/page_022.jpg)\n\n五大气污染物总量控制方法\n1.A-P值法\nA-P值法\nA-P值法是指用A值法计算控制区域中充许排放总量\n用修正的P值法分配到每个污染源的一种方法。在A值\n法中只规定了各区域总充许排放量而无法确定每个源的\n允许排放量。而P值法则可以对固定的某个烟筒控制其\n排放总量，但无法对区域内烟筒个数加以限制，即无法\n限制区域排放总量。若将二者结合起来，则可以解决上\n述问题。\n\n---\n\n**p023** ![](../007-第六章环境规划-第六章环境规划/page_023.jpg)\n\n五大气污染物总量控制方法\n2.平权分配法\n平权分配法是基于城市多源模式的一种总量控制方法，它是\n根据多源模式模拟各污染源对控制区域中筛选出来的控制点的\n污染物浓度贡献率，若控制点处的污染物浓度超标，根据各源\n贡献率进行削减，使控制点处的污染物浓度符合相应环境标准\n限值的要求。\n3.优化方法\n优化方法是将大气污染控制对策的环境效益和经济费用结合\n起来的一种方法，它将大气污染总量控制落实到防治对策和防\n治经费上，运用系统工程的理论和原则，制定出大气环境质量\n达标的前提下，治理费用较小的大气污染总量控制方案。\n\n---\n\n**p024** ![](../007-第六章环境规划-第六章环境规划/page_024.jpg)\n\n六大气污染防治措施\n1.全面规划，合理布局\n从区域（或城市）大气环境整体出发，针对该地域内的大气\n环境容量、主要污染问题（如污染类型、程度、范围等）及大\n气环境质量的要求，以改善大气环境质量为目标，综合运用各\n种措施，组合、优化确定大气污染防治方案。\n2.以集中控制为主，降低污染物排放量\n所谓集中控制，就是从区域的整体着眼，采取宏观调控和综\n合防治措施。集中控制不仅能节约资源和能源（如煤、油、气\n等），还便于采取污染防治措施并提高污染物的处理率。\n\n---\n\n**p025** ![](../007-第六章环境规划-第六章环境规划/page_025.jpg)\n\n六大气污染防治措施\n3.强化污染源治理，降低污染物排放\n在注意集中控制的同时，还应研发先进的处理技术，强化污\n染源治理，包括烟尘治理技术、二氧化硫治理技术、氮氧化物\n治理技术等。\n4.综合防治汽车尾气\n研究表明，汽车尾气是大气污染物PM2.5的来源之一。防治\n汽车尾气的主要措施有：①加强立法和管理，建立、健全机动\n车污染防治的法规体系并严格执行；②提高汽油品质并研发新\n型清洁燃料，使机动车达到节能、降耗、减少污染物的排出量\n的目标；③大力发展公共交通事业，倡导绿色出行。\n\n---\n\n**p026** ![](../007-第六章环境规划-第六章环境规划/page_026.jpg)\n\n6.2水环境规划\n水环境规划基础\n水污染源的调查与评价\n水污染物预测\n四 水污染控制规划方法\n五 水污染综合防治措施\n\n---\n\n**p027** ![](../007-第六章环境规划-第六章环境规划/page_027.jpg)\n\n一水环境规划基础\n1.水环境规划的内容\n（1）明确水环境的主要问题。包括水量、水质、水资源利用\n等方面，并分析问题的根本原因。\n（2）明确水环境规划目标。从水质与水量两个方面拟定目标\n（3）选定规划方法。最优化法和模拟优化法是常用方法。\n（4）拟定规划措施。调整产业结构与布局，提高水资源利用\n率等。\n（5）方案比选。在评价、优化的基础上，提出供决策选用的\n方案。\n（6）规划实施。\n\n---\n\n**p028** ![](../007-第六章环境规划-第六章环境规划/page_028.jpg)\n\n一水环境规划基础\n2.水功能区划 水环境规划的目标是通过对水\n污染物排放的合理组织与控制，保\n证水体的水质满足特定功能区的需\n求。水功能区是指为满足水资源开\n发和有效保护的需求，根据自然条\n件、功能要求、开发利用现状，按\n照流域综合规划、水资源保护规划\n和经济社会发展的要求，在相应水\n域按其主导功能划定并执行相应质\n量标准的特定区域。\n\n---\n\n**p029** ![](../007-第六章环境规划-第六章环境规划/page_029.jpg)\n\n一水环境规划基础\n2.水功能区划一原则\n①优先保护集中式饮用水水源地。\n②不得降低水体现有的水质等级。\n上、下游和区域之间兼顾，适当考虑潜在\n功能要求。\n④与工业合理布局相结合。\n5实用可行，便于管理。\n\n---\n\n**p030** ![](../007-第六章环境规划-第六章环境规划/page_030.jpg)\n\n一水环境规划基础\n2.水功能区划一方法与步骤\n①提出水环境 ②选择相应的 ③现状功能可达性分析\n保护目标 环境质量标准 确定主要人为污染源\n负荷分配\n工程规划技 ④建立排污量\n政策协调 ③污染控制\n术和经济综 与水环境质量\n行政决策 措施分析\n合分析 间的定量关系\n\n---\n\n**p031** ![](../007-第六章环境规划-第六章环境规划/page_031.jpg)\n\n一水环境规划基础\n2.水功能区划一功能分区\n地表水的水功能区一般分为水功能一级区和水功能二级区\n水功能一级区分为保护区、缓冲区、开发利用区和保留区四\n类。在水功能区一级区中的开发利用区中又划分为七类二级\n区，分别为饮用水源区、工业用水区、农业用水区、渔业用水\n区、景观娱乐用水区、过渡区和排污控制区。水功能区的划\n分是水环境质量标准在具体水域的具体应用，是水环境规划\n的依据。\n\n---\n\n**p032** ![](../007-第六章环境规划-第六章环境规划/page_032.jpg)\n\n一水环境规划基础\n3.水污染控制单元\n水污染控制单元是这样的可操作实体：包括排放源与受纳水\n体两部分；在行政区划的基础上结合水体使用功能和水质目标\n划分；各单元之间污染物类型、分布规律、输入-响应关系等一\n般不同；各控制单元的污染物排放及常规监测资料齐全；解决\n的环境问题不同，控制单元的划分也不同。\n划分水污染控制单元后，应阐明各功能区的相关情况，主要\n内容有：功能说明（属于哪类功能区、执行的水质标准等）、\n水质现状分析、污染源分析、水质预测、技术措施制定、环境\n容量计算等。\n\n---\n\n**p033** ![](../007-第六章环境规划-第六章环境规划/page_033.jpg)\n\n一水环境规划基础\n4.水环境容量\n（1）定义与内涵\n水环境容量是指在保证特定水质目标的前提下，所能接受\n的最大污染物的量，一般以水体中能容纳的最大污染物的量来\n衡量。\n最大允许纳污量是指在排污口空间分布及排放方式给定的\n条件下环境单元所允许排放污染物的量。\n也就是说，完全分散的排放方式所对应的污染物容纳量就\n是水环境容量，与其他排放方式相对应的污染物容纳量都称之\n为允许排放量，水环境容量是最大允许纳污量的极限值。\n\n---\n\n**p034** ![](../007-第六章环境规划-第六章环境规划/page_034.jpg)\n\n一水环境规划基础\n（2）水环境容量的计算\n1、首先进行水环境功能区划，确定水体的水质目标；\n2、根据不同的水环境功能划分为不同的水污染控制单元，并\n对水环境单元进行简化，以便能够利用水质模型进行描述水质的\n变化规律；\n3、然后进行水环境基础资料的调查与收集，包括水文和水污\n染源两方面的内容，例如流量、流速、污水排放量、排放浓度、\n排放方式等；\n4、最后根据水域简化结果选择或建立合适的水质模型，并确\n定模型中所需的各项参数，进行水环境容量的计算。\n\n---\n\n**p035** ![](../007-第六章环境规划-第六章环境规划/page_035.jpg)\n\n一水环境规划基础\n5.允许排放量的分配\n两种策略：公平性策略，效率策略\n公平性策略的出发点就是追求各个污染源之间污染物分配的\n公平性，通常认为，等比例削减污染物量属于公平分配之列；\n而效率策略则是追求污染物削减过程达到最高的效率，例如典型\n效率策略目标是区域污水处理费用最小。效率准则的实施，可以\n促进社会经济的发展，而公平原则则有利于保持社会的稳定和安\n定，效率和公平缺一不可。此外，对于水环境管理来说，可操作\n性也是一个不可忽略的方面。分配策略的选择需要从实际条件出\n发，因地制宜。\n\n---\n\n**p036** ![](../007-第六章环境规划-第六章环境规划/page_036.jpg)\n\n一水环境规划基础\n水污染物分配策略\n策略类型 公平策略 效率策略 混合策略\n均等分摊允许 区域总费用最\n排放量 小\n分区均匀削减\n等比例削减实 区域削减总量 【在各个污染\n际排污量 最小 控制区之间实\n施效率策略\n按照企业的社 （例如区域总\n策略举例 会贡献（例如 区域总效益最 费用最低），\n产值）确定排 大 在污染控制区\n污量 内部实施公平\n策略（例如等\n按照企业对环\n比例削减污染\n境（例如水质）\n物）】\n的影响确定排\n污量\n\n---\n\n**p037** ![](../007-第六章环境规划-第六章环境规划/page_037.jpg)\n\n二水污染源的调查与评价\n水污染源调查包括水污染\n物的种类、数量、排放方式、\n排放途径及污染源的类型和\n位置等内容，在此基础上，\n判断出主要污染物和主要污\n染源，为水环境现状评价提\n供依据。\n\n---\n\n**p038** ![](../007-第六章环境规划-第六章环境规划/page_038.jpg)\n\n二水污染源的调查与评价\n1.水污染源调查\n分为工业水污染源和生活水污染源分别进行调查\n调查的方法主要有收集资料法和现场实测法\n2.水污染源评价\n目的是要确定主要的水污染源和水污染物，提供水环境质量\n水平及成因，为水环境规划提供依据。\n多采用等标污染指数评价法。\n\n---\n\n**p039** ![](../007-第六章环境规划-第六章环境规划/page_039.jpg)\n\n三水污染物预测\n通过对区域经济发展规划的分析，识别区域发展的水环境\n主要污染问题；利用有关资料，根据社会经济发展情况、技术\n经济政策、生活水平，预测不同水平年污（废）水及主要水污染\n物排放量，作为水污染综合整治方案设计的依据。\n对于点源，通过指数增长法或万元产值污染物的排放系数\n或单位产品污染物或废物的排放系数预测排污的发展趋势。对\n于面源，主要采用区域土地属性变化-面源污染源强的关系估算\n法，根据土地利用情况进行预测。\n\n---\n\n**p040** ![](../007-第六章环境规划-第六章环境规划/page_040.jpg)\n\n三水污染物预测\n1.用水量预测\n（1）工业用水量 （2）生活用水量\n工业=αG =365x AD\n工业一工业用水量，万 Qt一生活用水量，万t/a;\nA一人口，万人；\nGt一工业产值，万元；\nDt一人均生活用水量，t/\nα一万元工业产值用水系数 （人·d）。\n万t/（万元·a）。\n\n---\n\n**p041** ![](../007-第六章环境规划-第六章环境规划/page_041.jpg)\n\n三水污染物预测\n2.废水排放量预测\n（1）工业废水 （2）生活污水\nWti QtiCW = QctWti一工业废水产生量，万 Wtu一生活污水排放量，万\nt/a; t;\nQti一工业用水量,万t/a; Qt一生活用水量，万t;\nct一排水系数。 ct一排水系数。\n\n---\n\n**p042** ![](../007-第六章环境规划-第六章环境规划/page_042.jpg)\n\n三水污染物预测\n3.污染物产生量、排放量预测\n（1）工业污染物 （2）生活污水\nPti =βG, =3.65x Ax Etu tuPti一工业污染物排放量， Ptu一生活污染物产生量，\nt/a; t/a;\nGt一工业产值，万元； A一人口，万人；\nβt一万元工业产值污染物 Em一人均污染负荷，g/(\n排放量,t/（万元·a）。 人·d)。\n\n---\n\n**p043** ![](../007-第六章环境规划-第六章环境规划/page_043.jpg)\n\n四水污染控制规划方法\n1.最优化法\n最优化是指运用数学方法研究对象的优化途径，提供优化\n方案，以便为决策者提供科学决策的依据。评价水污染治理规\n划方法优劣的关键是在达到预定水质目标的前提下，费用是否\n最小，这就涉及最优化问题。水污染控制的最优化问题是在污\n水处理费用并未随着处理技术的改进而提高的背景下提出来的。\n从水污染控制解决问题的不同途径来看，最优化问题主要可分\n为排污口最优化处理、最优化均匀处理、区域最优化处理等。\n\n---\n\n**p044** ![](../007-第六章环境规划-第六章环境规划/page_044.jpg)\n\n四水污染控制规划方法\n（1）排污口最优化处理（水质规划）\n排污口最优化处理是指以每个小区的排放口为基础，在满足\n出水水质的前提下，求解各排放口的污水处理效率的最佳组\n合，目标是各排放口的污水处理费用之和为最低。在进行排\n放口处理最优规划时，各个污水处理厂的处理规模不变，它\n等于各小区收集的污水量。\n\n---\n\n**p045** ![](../007-第六章环境规划-第六章环境规划/page_045.jpg)\n\n四水污染控制规划方法\n（2）最优化均匀处理（厂群规划）\n最优化均匀处理是指在区域范围内，在同一污水处理效率的\n条件下，寻求最佳的污水处理厂的位置与规模（包水处理厂\n选址、规模及污水管线布局）的组合，追求全区域的污水处\n理费用最低。在工业发达国家或地区，法律规定所有排入水\n体的污水都必须经过二级处理(物理处理十生化处理)，这是\n均匀处理最优规划的基础。\n\n---\n\n**p046** ![](../007-第六章环境规划-第六章环境规划/page_046.jpg)\n\n四水污染控制规划方法\n（3）区域最优化处理（区域处理最优规划）\n区域最优化处理是排污口最优化处理与最优化均匀处理的综\n合，也就是说，为了使区域污水处理总费用最低，它既要考\n虑污水处理厂最佳位置和数量，又要考虑每座污水处理厂的\n最佳处理效率。\n\n---\n\n**p047** ![](../007-第六章环境规划-第六章环境规划/page_047.jpg)\n\n四水污染控制规划方法\n2.模拟优选法\n即通过规划方案的模拟优选来对水污染控制进行规划。规\n划方案的模拟优选是定性分析与定量计算的结合，先定性确定\n模拟的范围，再进行定量的模拟计算，最后优选确定最佳实用\n方案。\n应用规划模拟方法得到的解，二般不是区域的最优解，其\n好坏程度多数取决于规划人员的经验和能力。因此，应用此方\n法时，尽可能多提出一些初步规划方案，以供筛选。模拟优选\n的工作量往往较大，主要通过计算机完成方案的对比寻优工作。\n但在很多情况下，规划方案的模拟优选是一种更为有效的方法。\n\n---\n\n**p048** ![](../007-第六章环境规划-第六章环境规划/page_048.jpg)\n\n五水污染综合防治措施\n1.减少污染物的排放量\n（1）节约用水\n水资源浪费不仅加剧水资源短缺的矛盾，同时也不可避\n免地产生大量废水，增加水污染治理负担。节约用水、提高\n水的重复利用率是减少水污染物的有效途径之一。\n要全面推进各种节水技术和措施，发展节水型产业。采\n用先进工艺技术，发展工业用水重复和循环使用系统；开展\n城市废水再生回用：调整农业结构，干旱地区减少水稻种植\n面积；实施水权制度，加强水权管理，形成节水机制。同时，\n应加强节水宣传教育，加强人们的节水意识，必要时，利用\n价格机制，控制不必要的用水。\n\n---\n\n**p049** ![](../007-第六章环境规划-第六章环境规划/page_049.jpg)\n\n五水污染综合防治措施\n1.减少污染物的排放量\n清洁生产与可持续发展模式图\n（2）推行清洁生产\n过程\n调整工业结构，改革生产工艺 经营\n经济\n推行清洁生产。根据国家产业政策 清洁\n调整行业结构、产品结构、原料结 生产\n构、规模结构，逐步淘汰或限制耗 能量\n水量大、水污染排放量大的行业和\n产品，积极发展对水环境危害小、\n耗水量小的高新技术产业；以无毒 清洁生产\n无害原料替代有毒、有害原料，改\n革生产工艺等，对产品的整个生命\n周期推行清洁生产。\n\n---\n\n**p050** ![](../007-第六章环境规划-第六章环境规划/page_050.jpg)\n\n五水污染综合防治措施\n1.减少污染物的排放量\n（3）加强污水处理\n积极推行清洁生产，采取一切措施减少水污染物的产生，也\n难以实现水污染物的零排放，所以，要防治结合，即加强污水\n处理。工业企业还必须加强水污染的治理，尤其是有毒污染物\n必须单独处理或预处理。随着工业布局、城市布局的调整和城\n市下水道管网的建设和完善，可逐步实现城市污水的集中处理，\n使城市污水处理与工业废水治理结合起来。\n\n---\n\n**p051** ![](../007-第六章环境规划-第六章环境规划/page_051.jpg)\n\n五水污染综合防治措施\n1.减少污染物的排放量\n（4）控制面源污染\n面源污染主要来自农村，\n包括农村人口生活、农业生产\n畜禽养殖等过程产生的污染。\n要解决面源污染比解决工业污\n染和城市生活污水的难度要大\n需要通过综合防治和开展生态\n农业示范工程等措施进行控制\n\n---\n\n**p052** ![](../007-第六章环境规划-第六章环境规划/page_052.jpg)\n\n五水污染综合防治措施\n2.合理利用水体自净能力\n（1）人工复氧\n人工复氧是改善河流水质的重要措施之一，它是借助于安\n装增氧器来提高河水中的溶解氧浓度。在溶解氧浓度很低的河\n段使用这项措施尤为有效。\n（2）污水调节\n在河流水量低的时期，用蓄污池把污水暂时蓄存起来，待\n河流水量高时释放，可以更合理地利用河流的自净能力来提高\n河流的水质。污水调节费用主要是建池费用，缺点是占地面积\n大、有可能污染地下水等。国外蓄存的污水大都是经过处理的\n水，避免或减轻了恶臭现象的发生。\n\n---\n\n**p053** ![](../007-第六章环境规划-第六章环境规划/page_053.jpg)\n\n五水污染综合防治措施\n2.合理利用水体自净能力\n（3）河流流量调控\n国外对流量调控以及从外流域引\n水冲污的研究较早，并已应用于河流\n的污染控制。世界上很多河流的径流\n量时间上分配不均，在枯水期水质恶\n化，而在高流量期，河流的自净能力\n得不到充分利用。因此，提高河流的\n枯水期流量成为水质控制的一个重要\n措施。实行流量调控可利用现有的水\n利设施，也可新建水利工程。\n\n---\n\n**p054** ![](../007-第六章环境规划-第六章环境规划/page_054.jpg)\n\n6.3固体废物管理规划\n一、固体废物概述\n1.定义及特点\n固体废物是指人类在生产建设、日常生活和其他活动中产\n生的，在一定时间和地点无法利用而丢弃的污染环境的固体、\n半固体物质。其概念具有时间性和空间性。一种过程的废物随\n着时空条件的变化，往往可以成为另一过程的原料，所以废物\n又有“放在错误地点的原料”之称。\n\n---\n\n**p055** ![](../007-第六章环境规划-第六章环境规划/page_055.jpg)\n\n6.3固体废物管理规划\n一、固体废物概述\n2.分类\n（1）城市生活垃圾\n城市生活垃圾又称城市固体废\n物，它是指在城市居民日常生活中\n垃圾分类我们一起来\n或城市日常生活提供服务的活动中\n产生的固体废物，主要包括居民生\n活垃圾、办公和商业垃圾等。它的\n主要特点是成分复杂，有机物含量\n高，其所含化学元素大部分为碳，\n其次是氧、氢、氮、硫等。\n\n---\n\n**p056** ![](../007-第六章环境规划-第六章环境规划/page_056.jpg)\n\n6.3固体废物管理规划\n一、固体废物概述\n2.分类\n（2）工业固体废弃物\n工业固体废物是指在工业、交\n通等生产过程中产生的固体废物，\n又称工业废渣或工业垃圾，主要包\n括冶金工业固体废物、能源工业固\n体废物、石油化学工业固体废物、\n矿业固体废物、轻工业固体废物以\n及其他工业固体废物。不同工业类\n型所产生的固体废物种类和性质是\n迥然相异的。\n\n---\n\n**p057** ![](../007-第六章环境规划-第六章环境规划/page_057.jpg)\n\n6.3固体废物管理规划\n一、固体废物概述\n2.分类\n（3）危险废物\n《中华人民共和国固体废物污染环境防治法》中规定：“危\n险废物是指列入国家危险废物名录或者根据国家规定的危险废\n物鉴别标准和鉴别方法认定的具有危险特性的废物。”\n危险废物的特性，包括急性毒性、易燃性、反应性、腐蚀性、\n浸出毒性和疾病传染性。联合国环境规划署《控制危险废物越\n境转移及其处置巴塞尔公约》列出了\"应加控制的废物类别\n共45类，“须加特别考虑的废物类别”共2类，同时列出了危险\n废物“废物共性的清单”共14种特性。\n\n---\n\n**p058** ![](../007-第六章环境规划-第六章环境规划/page_058.jpg)\n\n6.3固体废物管理规划\n3.固体废物的危害\n（1）固废的环境影响\n①对大气环境的影响：固体废物中的细微颗粒、粉尘等可随\n风飞扬，其中某些物质的分解和化学反应，还可以不同程度地产\n生毒气或恶臭，造成空气污染。\n②对水环境的影响：随天然降水和地表径流进入江河湖泊或\n随风飘落入水体，会引起地表水污染；渗沥水使地下水污染；直\n接排入河流、湖泊或海洋，又会造成更大的水体污染。\n③对土壤环境的影响：固体废物堆放必然会占用大量的良田\n沃土，有毒废渣的到处流失，对土壤造成严重的污染。\n\n---\n\n**p059** ![](../007-第六章环境规划-第六章环境规划/page_059.jpg)\n\n6.3固体废物管理规划\n3.固体废物的危害\n（2）固废对土地资源的影响\n大量固体废物的堆积会占用土地资源。随着我国经济的发展\n和人民生活水平的提高，固体废物的产生量越来越大，其侵占土\n地的问题会变得更加严重，从而进一步加剧了我国人多地少的矛\n盾。\n（3）固废对人体健康的影响\n固体废物中有害物质可通过环境介质一大气、土壤或地下水\n体等直接或间接传至人体，造成健康威胁。例如，化学废物的长\n期暴露，散发出的有毒物质被人吸入后引发的呕吐、头晕甚至中\n毒等症状。\n\n---\n\n**p060** ![](../007-第六章环境规划-第六章环境规划/page_060.jpg)\n\n6.3固体废物管理规划\n1.固体废物现状调查与评价\n1、生活垃圾现状调查与评价。包括城市概况、生活垃圾产生\n特征、垃圾收集方式、环境卫生体系建设概况、无害处理设施\n建设、回收体系建设、垃圾无害化处理量（率）和回收利用量\n（率）等。\n2、工业固体废物调查。包括工业固体废物中有害物质的种类、\n工业固体废物的种类、产生量、利用量、流向、贮存、处理与\n处置等。\n3、危险废物调查。具体调查内容包括危险废物种类与产生量，\n危险废物的收集、运输、综合利用、贮存和处理处置情况，危\n险废物安全处置率等。\n\n---\n\n**p061** ![](../007-第六章环境规划-第六章环境规划/page_061.jpg)\n\n二固体废物管理规划的内容\n2.固体废弃物产生量预测\n（1）生活垃圾产生量预测\nW =GKo(1+α) △tW一预测年垃圾产生量； G\n预测年人口数；\nKo一基准年人均垃圾产生量；\nα一人均垃圾增长量;\nAt一预测年与基准年之差。\n\n---\n\n**p062** ![](../007-第六章环境规划-第六章环境规划/page_062.jpg)\n\n二固体废物管理规划的内容\n2.工业固体废弃物产生量预测\n（2）工业固体废物产量预测\n①产值排污系数预测法 DWt一预测工业固体废物年产生量，万ta;\nDW, = W,S W:-预测年工业产值，万元；\nW。一基准年工业总产值，万元/a;\nW, = W。 exp(入△t) St-预测年工业固废产生当量，万t万元；\nSD-基准年固废产生当量，万t万元；\nS =S_e-k△t 入-工业总产值平均增长率，%；\nk-工业固废产生当量衰减系数。\n②产品排污系数预测法\n通过主要行业产品预测出的固废产生量除以基准年该类废\n物在主要行业中的产生系数，即为规划年该类废物产生量。\n\n---\n\n**p063** ![](../007-第六章环境规划-第六章环境规划/page_063.jpg)\n\n二固体废物管理规划的内容\n2.固体废弃物产生量预测\n（3）危险废物预测\nQ周 = AWtW, = W。 exp(2△t)\nQ固－预测危险废物年产生量，ta;\nA-万元产值危险废物产生量，t万元；\nW：一预测年工业产值，万元；\nWo-基准年工业总产值，万元/a；入-工业\n总产值平均增长率，%。\n\n---\n\n**p064** ![](../007-第六章环境规划-第六章环境规划/page_064.jpg)\n\n二固体废物管理规划的内容\n3.固体废物污染防治规划目标与指标体系\n（1）规划原则与目标\n①源头控制优先，促进清洁生产。从源头更新工艺、提高\n原材料利用效率、推广清洁能源使用，引导控制固体废物\n产生，促进清洁生产。\n②因地制宜，因废制宜。立足于规划区域的实际情况，科\n学客观分析固体废物处理处置状况和存在的问题，合理选\n用处理处置技术方法。\n③开展多种途径资源化利用，实施产业化发展。在努力实\n现固体废物减量化目标的同时，切实开展固体废物利用的\n产业化工作，逐步将固体废物污染防治重心前移，进行源\n头削减和产业化利用。\n\n---\n\n**p065** ![](../007-第六章环境规划-第六章环境规划/page_065.jpg)\n\n二固体废物管理规划的内容\n3.固体废物污染防治规划目标与指标体系\n（1）规划原则与目标\n④全过程控制管理，防止污染 因淑施术 焚烧\n合理利用\n转嫁。对固体废物进行全过程\n管理，将生产排放的固体废物\n处理纳入到整个生产生命周期\n中，严格控制固体废物转移他\n原料\n处。 通过：物理.化单、生物.等技术\n③集中治理与点源治理相结合\n肥\n原则。\n\n---\n\n**p066** ![](../007-第六章环境规划-第六章环境规划/page_066.jpg)\n\n二固体废物管理规划的内容\n3.固体废物污染防治规划目标与指标体系\n（2）规划指标\n废塑料的 直接再生\n综合利用方法\n①生活垃圾无害化处理率、生活 有大概以下\n三种\n垃圾资源化率、生活垃圾分类收\n集率；\n②工业固体废物减量率、工业固\n改性再生\n体废物综合利用率、工业固体废\n物处置利用率；\n③危险废物处置利用率、城镇医 热能利用\n疗垃圾处理率。\n\n---\n\n**p067** ![](../007-第六章环境规划-第六章环境规划/page_067.jpg)\n\n二固体废物管理规划的内容\n4.固体废物污染防治对策\n(1)生活垃圾防治 (2)工业固废防治 (3)危险废物防治\n①从源头上控制城 ①制定并执行防治 ①确定危险废物的\n工业固体废物污染 名称与种类。\n市生活垃圾的产生\n环境的技术政策。\n量。 ②危险废物的减量\n②从源头控制，减\n少工业固体废物产 化与资源化。\n②统筹安排建设城\n生量调整产业结构，\n乡生活垃圾收集、 ③危险废物的收集、\n减少高资源消耗。 运输与贮存。\n运输和处置设施，\n③提高工业固体废\n④危险废弃物最终\n开展综合利用。 物的利用率。\n处置，焚烧和安全\n④加强安全处置。\n③提出处置方案。 填埋。\n\n---\n\n**p068** ![](../007-第六章环境规划-第六章环境规划/page_068.jpg)\n\n三固体废物管理规划的方法\n1.固废管理规划的编制依据\n固体废物管理的法规、标准及技术政策，包括《固体废物污染\n环境防治法》，《生活垃圾填埋污染控制标准》（GB16889-1997)，\n《生活垃圾烧污染控制标准》（GB18485-2001），《医疗废物管\n理条例》（2003)，《危险废物污染防治技术政策》（2001)，《危险\n废物填理污染控制标准》（GB18598-2001）等。\n2.固废管理规划分析方法\n采用模型，分为预测模型、评估模型、运筹学优化模型等类\n型。进行模拟试验，根据试验来建立预测模型，再进行相应环\n境问题的预测。\n\n---\n\n**p069** ![](../007-第六章环境规划-第六章环境规划/page_069.jpg)\n\n三固体废物管理规划的方法\n3.固废处置选址方法\n（1）填埋场与区域的距离\n生活垃圾填理场通过多种途径对区域造成影响，因此，离区\n域距离较远为好。应设在当地夏季主导风向的下风向，在人畜\n居栖点500m以外。\n（2）交通运输条件\n运输距离越近越便利。一般要求距离公路、铁路和河流不超\n过500m。\n（3）环境保护条件\n般要求场地面积及容量能保证使用15-20年，在成本上才合算：\n一般要求距离任何地表水大于100m，垃圾渗出液不排入土地或\n农田，最好不要堆放在河流岸边；尽可能地利用废弃土地或使用\n便宜的土地或荒地；要远离机场，要求距离大于10kmo\n\n---\n\n**p070** ![](../007-第六章环境规划-第六章环境规划/page_070.jpg)\n\n三固体废物管理规划的方法\n3.固废处置选址方法\n（4）场地建设条件\n地形越平坦越好，其坡度应有利于填埋场和其他配套建筑设施\n的布置，不宜选择在地形坡度起伏变化大的地方和低洼汇水处；\n原则上，地形的自然坡度不应大于5%。\n（5）地质环境条件\n场址应选在渗透性弱的松散岩层或坚硬岩层的基础上，填理场\n防渗层的渗透性系数K≤10-7cm/s，并具有一定厚度；地下水位埋\n深大于2m；隔水层黏土厚度越大越好，一般要求大于6m；与供水\n开的距离至少大于300m，远离水源地500m以上。\n\n---\n\n**p071** ![](../007-第六章环境规划-第六章环境规划/page_071.jpg)\n\n四固体废物管理规划方案的综合评价\n1.土地损失\nL=Zr=1S,Pi\n式中：L一被堆占土地的经济损失，元；\nS一堆占土地的面积，亩;\nPi一单位土地面积的价格，元/亩；\nn一被堆占土地类型，每个类型土地价格看成是一致的。\n\n---\n\n**p072** ![](../007-第六章环境规划-第六章环境规划/page_072.jpg)\n\n四固体废物管理规划方案的综合评价\n1.土地损失\nLa=Z²=1 S;(△yiC; +△ciy)\n式中：La一被污染土壤引起农作物损失费用，元/年；\nS一污染较严重的土地及受影响的土地面积，亩;\nyi一某农作物主、副产品产量，kg/亩；\n△y一某农作物主、副产品减产量，kg/亩；\nC一某农作物主、副产品价格，元/kg;\n△C一某农作物主、副产品因为污染的价格降低量，元/kgn-农作物种类。\n\n---\n\n**p073** ![](../007-第六章环境规划-第六章环境规划/page_073.jpg)\n\n四固体废物管理规划方案的综合评价\n2.水资源损失\nLw=P。Qlw\n式中L一断水经济损失，元/年；\nP。一影响人口数，人；\nQ一人均生活用水量，m3/年；\nLw一单位供水量经济损失。\n\n---\n\n**p074** ![](../007-第六章环境规划-第六章环境规划/page_074.jpg)\n\n四固体废物管理规划方案的综合评价\n2.水资源损失\nLw=∑²=1 S;(△y;C;+△cy)\n式中：S一受影响灌溉面积，亩；\ny一主、副产品产量，kg/亩;\n△y一受污染水灌溉后主、副产品减产量,kg/亩；\nCi一某农作物主、副产品价格，元/kg;\n△c;一受污染水灌溉后某农作物主、副产品价格降低量，元/kg;n-\n农作物种类。\n\n---\n\n**p075** ![](../007-第六章环境规划-第六章环境规划/page_075.jpg)\n\n四固体废物管理规划方案的综合评价\n3.对人群健康影响的经济损失\n农业人口的生命价值可按下式估算：\nBa=TnZ=1 Siyic;+Z=1 BiT;\n式中：Ba一一个农业人口的生命价值，元；\nTn一农业人口有效创收年数，年，一般取45年；\n一某种农作物(包括经济作物);\ny;一某种农作物的单产量，kg/亩或m3/亩;\nCi 一某种农作物的市场价格，元/kg:\nS 平均每个农民种植某种农作物的种植面积，亩；\nB -牧副渔及其他年产值，元；\nT一从事牧副渔的劳动年数，年;\nn，N--分别为作物种类数及牧副渔等其他行业门类数。\n\n---\n\n**p076** ![](../007-第六章环境规划-第六章环境规划/page_076.jpg)\n\n四固体废物管理规划方案的综合评价\n非农业人口创造的价值，按各类行业的职工人均生产力来统计，\n即：\nBa=Tn’E²=1 B't\n式中B一非农业人口创造的价值；\nT’一非农业人口有效创收年数，年，一般取35年;\nB'非农业人口年产值，元/年。\n知道农业人口和非农业人口的价值，就可以按照固体废物\n对人体健康的风险进行分析，在已知对死亡概率影响的基础上\n评估对人体健康的损失。\n\n---\n\n**p077** ![](../007-第六章环境规划-第六章环境规划/page_077.jpg)\n\n6.4生态环境规划\n一、生态规划概述\n20世纪60年代初，美国宾夕法尼亚大学学者指出生态规划是\n在没有任何有害的情况或多数无害条件下，对土地的某种可能用\n途进行的规划。\n日本一些学者则将生态规划定义为生态学的土地利用规划。\n王祥荣等人提出，生态规划应是以生态学原理和规划原理为\n指导，应用系统科学、环境科学等多学科的手段辨识、模拟和设\n计人工复合生态系统内的各种生态关系，确定资源开发利用与保\n护的生态适宜度，探讨改善系统结构与功能的生态建设对策，促\n进人与环境关系持续协调发展的一种规划方法。\n\n---\n\n**p078** ![](../007-第六章环境规划-第六章环境规划/page_078.jpg)\n\n6.4生态环境规划\n一、生态规划概述\n1.概念： 是以生态学原理为指导，应用系统科学、环境科学\n等多学科手段辨识、模拟和设计生态系统内部各种生态关系，确\n定资源开发利用和保护的生态适宜性，探讨改善系统结构和功能\n的生态对策，促进人与环境系统协调、持续发展的规划方法。\n2.生态规划的主要任务\n（1）充分了解自然环境，自然资源的性能，以及自然生态过程特\n点和与人类活动的相互关系。\n（2）使系统的发展立足于具体的社会经济条件和自然资源的潜力\n形成系统社会经济功能与生态环境支持服务功能的互补与协调，\n突出系统优势。\n（3）追求系统总体关系的协调，强调系统发展的高效和持续性，\n改善和提高系统的自我调控和自我发展能力。\n\n---\n\n**p079** ![](../007-第六章环境规划-第六章环境规划/page_079.jpg)\n\n6.4生态环境规划\n3.生态规划的主要类型\n（1）按地理空间尺度划分。\n①区域生态规划。主要任务是编制区域自然、社会、经济和生态\n目录；对区域发展的中长期规划制定要点，特别是提出各种不同\n的可供选择的土地利用及基础性公共设施、社会设施、交通运输\n等方案。\n②景观生态规划。主要通过研究景观格局与生态过程及人类活动\n与景观的相互作用在景观生态分析、综合及评价的基础上，提出\n景观最优利用方案和对策与建议。强调空间格局对生态过程的控\n制和影响，通过调整景观格局来维持景观功能的健康和安全。\n\n---\n\n**p080** ![](../007-第六章环境规划-第六章环境规划/page_080.jpg)\n\n6.4生态环境规划\n3.生态规划的主要类型\n③生物圈保护区规划。主要目标是保证\n生物圈现有生物多样性的完整性和永续\n利用。在保护区建设规划中，应用生态\n学原理正确处理保护、开发、利用的关\n系，将保护、科研、生产、旅游等多层\n次、多目标规划有机结合，指导保护区\n的建设。\n（2）按地理环境和生存环境划分。有陆\n地生态系统、海洋生态系统、城市生态\n系统，农村生态系统等生态规划。\n（3）按社会科学门类划分。主要有经济\n生态规划、人类生态规划、民族文化生\n态规划等。\n\n---\n\n**p081** ![](../007-第六章环境规划-第六章环境规划/page_081.jpg)\n\n6.4生态环境规划\n4.生态规划的步骤\n（1）确定规划范围与规划目标：（2）收集资料，并分析资源环\n境条件的性能及其对特定利用方向的适宜性等级；（3）根据规划\n目标，建立资源评价与分级的准则：（4）分析和评价资源对不同\n利用方向的生态适宜性；（5）确定规划方案。\n乌衣水镇生态公园\n提划为生态数场 规划为儿童拓满区 限划为公司入口区\n规划为有机最网\n(26000m] 制为电年情动区\n均为信公司\n淘期为人口区\n洪江东路\n\n---\n\n**p082** ![](../007-第六章环境规划-第六章环境规划/page_082.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n内容：①自然环境与自然资源状况调查。\n主要包括：气候气象因素和地理特征因素，例如地形地貌、坡向坡\n位、海拔、经纬度等；自然资源状况，例如水资源、土壤资源、野生\n动植物资源及珍稀濒危物种数量，生物组分的空间分布及在区域空\n间的移动状况，土壤的理化组成和生产能力等；人类开发历史、方\n式和强度；自然灾害及其对环境的干扰破坏情况：生态环境演变的基\n本特征；基础图件收集和编制，主要收集地形图、土地利用现状图、\n植被图和土壤侵蚀图等。\n\n---\n\n**p083** ![](../007-第六章环境规划-第六章环境规划/page_083.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n②社会经济状况调查。\n主要内容包括：社会结构情况，例如人口密度、人均资源\n量、人口年龄构成、人口发展状况、生活水平的历史和现状、\n科技和文化水平的历史和现状、规划区域的主要生产方式等；\n经济结构与经济增长方式，例如产业构成的历史和现状及发展、\n自然资源的利用方式和强度。\n\n---\n\n**p084** ![](../007-第六章环境规划-第六章环境规划/page_084.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n③生态环境质量状况调查。\n一般而言，生态环境质量状况的调查内容主要包括各种\n生态环境和人工环境现状及问题，但随着调查关注的对象不\n同调查内容有所差异，主要内容包括土地利用情况、植被覆\n盖情况、水资源与水利用情况、生物多样性等。\n\n---\n\n**p085** ![](../007-第六章环境规划-第六章环境规划/page_085.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n方法：①实地调查。②历史资料收集。③社会调查。④遥感技术。\n①实地调查。是收集资料的最直接的方法，尤其在小区域、大\n比例尺规划中，实地调查更为重要。往往是弥补历史资料的不\n足与不完善，或对遥感资料的校正；\n②历史资料收集。对历史资料收集，可以为规划者提供探索人\n类活动与区域环境问题之间关系，还可以提供实际调查所不能\n得到的资料。\n\n---\n\n**p086** ![](../007-第六章环境规划-第六章环境规划/page_086.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n③社会调查。通过社会调查，了解区域内不同阶层的人们对发\n展的要求，所关注的焦点问题，在规划中充分体现公众的愿望。\n同时，通过进行专家咨询、座谈，可将专家的知识与经验结合\n于规划中。\n④应用遥感技术。遥感技术为及时准确获取区域空间特征资料\n提供了十分有效的手段，尤其适用于区域面积较大的生态环境\n调查。\n\n---\n\n**p087** ![](../007-第六章环境规划-第六章环境规划/page_087.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n①生态过程分析。生态过程是由生态系统类型、组成结构与功能所\n规定的，是生态系统及其功能的宏观表现。自然生态过程所反映的\n自然资源与能流特征、生态格局与动态都是以区域的生态系统功能\n为基础的。同时，在生态规划中，受人类活动影响的生态过程及其\n与自然生态过程的关系是关注的重点。特别是那些与区域发展和环\n境密切相关的生态过程（例如能流、物质循环、水循环、土地承载力、\n景观格局等），应在规划中进行综合分析。\n\n---\n\n**p088** ![](../007-第六章环境规划-第六章环境规划/page_088.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n②生态潜力分析。狭义的生态潜力指单位面积土地上可能达\n到的第一性生产力(亦称初级生产力），它是一个综合反映区\n域光、温、水、土资源配合的定量指标。它们的组合所允许\n的最大生产力通常是该区域农、林、牧业生态系统生产力的\n上限。广义的生态潜力则指区域内所有生态资源在自然条件\n下的生产和供应能力。通过对生态潜力的分析，与现状利用\n和产出进行对比，可以找到制约发展的主要生态环境要素。\n\n---\n\n**p089** ![](../007-第六章环境规划-第六章环境规划/page_089.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n③生态格局分析。人类的长期活动，使区域景观结构与功能带有明显的\n人工特征。原来物种丰富的自然植物群落被单一种群的农业和林业生物\n群落所取代，成为大多数区域景观的基质。城镇与农村居住区的广泛分\n布成为控制区域功能的镶嵌体，公路、铁路、人工林带（网）与区域交错\n的自然河道、人工河渠及自然景观残片共同构成了区域的景观格局。城\n镇是区域镶嵌体，又是社会经济中心，它通过发达的交通网络等廊道与\n农村及其他城镇进行物质与能量的交换与转化。残存的自然斑块则对维\n护区域生态条件、保存物种及生物多样性具重要意义。\n\n---\n\n**p090** ![](../007-第六章环境规划-第六章环境规划/page_090.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n④生态敏感性分析。在生态规划中\n必须分析和评价系统各因子对人类\n活动的反应，进行敏感性评价。根\n据区域发展和资源开发活动可能对\n系统的影响，生态敏感性评价一般\n包括水土流失评价、自然灾害风险\n评价、特殊价值生态系统和人文景\n观评价、重要集水区评价等。\n\n---\n\n**p091** ![](../007-第六章环境规划-第六章环境规划/page_091.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n5土地质量与区位评价。对土地质量和区位\n的评价实际就是对复合生态系统的评价与分\n析的综合和归纳。土地质量的评价因用途不\n同而在评价指标、内容、方法上有所不同。\n对于评价指标和属性，可采用因素间相互关\n系构成模型综合为综合指标，也可采用加权\n综合或主成分分析等方法，找出因子间的作\n用关系和相对权重，最终形成土地质量与区\n位评价图。\n\n---\n\n**p092** ![](../007-第六章环境规划-第六章环境规划/page_092.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n生态规划的最终目的是提出区域发展的方案与途径。生态决\n策分析就是在生态评价的基础上，根据规划对象的发展与要\n求以及资源环境及社会经济条件，分析与选择经济学与生态\n学合理的发展方案与措施。其内容包括：根据发展目标分析\n资源要求，通过与现状资源的匹配性分析确定初步的方案与\n措施，再运用生态学、经济学等相关学科知识对方案进行分\n析、评价和筛选。\n\n---\n\n**p093** ![](../007-第六章环境规划-第六章环境规划/page_093.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n①生态适宜性分析。是生态规划的核心，也是生态规划研究\n最多的方面。目标是根据区域自然资源与环境性能，按照发\n展的需求与资源利用要求，划分资源与环境的适宜性等级。\n自麦克哈格提出生态适宜性图形空间叠置方法以来，许多研\n究者对此进行了深入研究，先后提出了多种生态适宜性的评\n价方法，特别是随着地理信息系统技术的发展，生态适宜性\n分析方法得到进一步发展和完善。\n\n---\n\n**p094** ![](../007-第六章环境规划-第六章环境规划/page_094.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n②生态功能区划与土地利用布局。根据区域复合生态系统结\n构及其功能，对于涉及范围较大而又存在明显空间异质性的\n区域，要进行生态功能分区，将区域划分为不同的功能单元，\n研究其结构、特点、环境承载力等问题，为各区提供管理对\n策。区划时综合考虑各区生态环境要素现状、问题、发展趋\n势及生态适宜度，提出合理的分区布局方案。\n\n---\n\n**p095** ![](../007-第六章环境规划-第六章环境规划/page_095.jpg)\n\n6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n③规划方案的制定、评价与选择。\n在前述分析评价的基础上，根据 D 农业匠肤专颂规\n农企票\n业 乐，业，体 9\n发展的目标和要求以及资源环境\n的适宜性，制定具体的生态规划\n程交化生活 业作之期\n方案。生态规划是由一系列子规 完善绿色生态景观系统\n建设多元农业质观体验体系\n划构成的，这些规划最终是要以\n促进社会经济发展、生态环境条\n件改善及区域持续发展能力的增\n强为目的。\n\n---\n\n**p096** ![](../007-第六章环境规划-第六章环境规划/page_096.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n城市生态系统是城市居民与周围生物和非生物环境相互作用\n而形成的一类具有一定结构和功能的有机整体，也是人类在改造\n和适应自然环境的基础上建立起来的特殊的人工生态系统。\n（1）城市生态系统的人工主导性。\n城市中的一切设施都是人工制造的，人类活动对城市生态系\n统的发展起着重要的支配作用。与自然生态系统相比，城市生态\n系统的生产者一绿色植物的量很少；消费者主要是人类，而不是\n野生动物；在城市中，分解者--微生物的活动受到抑制，分解功\n能不强。\n\n---\n\n**p097** ![](../007-第六章环境规划-第六章环境规划/page_097.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（2）城市生态系统的高度集中性和高度开放性。\n城市中人口密集，城市居民所需要的绝大部分食物要从其他\n生态系统人为地输入：城市中的工业、建筑业、交通等都需要大\n量的物质和能量，这些也必须从外界输入，并且迅速地转化成各\n种产品。城市生产和居民生活产生大量的废弃物，绝大部分不能\n靠城市中自然系统的净化能力自然净化和分解，如果不及时进行\n人工处理，就会造成环境污染。\n\n---\n\n**p098** ![](../007-第六章环境规划-第六章环境规划/page_098.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（3）城市生态系统的不完整性。\n城市生态系统是人工生态系统，数量巨大的消费者（人类）所\n需要大量的食物和能量不能通过系统内部完全解决，而必须从外\n部系统获得；同时，缺少分解者，城市生态系统中产生的大量废\n弃物几乎全部需要通过人工设施来进行处理。因而，造成巨大的\n经济成本和处理的低效性。\n\n---\n\n**p099** ![](../007-第六章环境规划-第六章环境规划/page_099.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（4）城市生态系统的高度依赖性。\n由于缺少充足的土地和第一性生产者，其自我更新能力与初级生产能力很\n低，而且，城市规模越大，它对外部所提供的能源和物质的接受、消化、转换\n的能力就越强，它需求外部输入的物质种类和数量就越多，其对外部的依赖性\n就越强。\n\n---\n\n**p100** ![](../007-第六章环境规划-第六章环境规划/page_100.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（5）城市生态系统的脆弱性。\n城市生态系统的人工性和结构与功能的\n不完整性，就决定了城市生态系统低下的自我\n生产、更新、修补和调节的能力。另一方面， ECOSYSTEM\n城市生态系统对外部系统的高依赖性，就决定\n了一旦切断或缺少外部系统的食物、资源、能\n源的持续供应，城市生态系统就会瘫痪和崩溃\n同时，一且发生自然灾害和人为灾害，城市生\n态系统的自我抵抗能力和恢复能力就显得极其\n有限。\n\n---\n\n**p101** ![](../007-第六章环境规划-第六章环境规划/page_101.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n2.城市生态规划与生态城市\n城市生态规划是以生态学的理论为指导，对城市的社会、经\n济、技术和生态环境进行全面的综合规划，以便充分有效和科学\n合理地利用各种资源条件，促进城市生态系统的良性循环，使社\n会经济能够持续稳定地发展，为城市居民创造舒适、优美、清洁、\n安全的生产和生活环境。\n城市生态规划的目标是建设生态城市。生态城市从广义上讲，\n是建立在人类对人与自然关系更深刻认识基础上的新的文化观，\n是按照生态学原则建立起来的社会、经济、自然协调发展的新\n型社会关系，是有效地利用环境资源实现可持续发展的新的生\n产和生活方式。从狭义上讲，就是按照生态学原理进行城市设\n计，建立高效、和谐、健康、可持续发展的人类聚居环境。\n\n---\n\n**p102** ![](../007-第六章环境规划-第六章环境规划/page_102.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n3.城市生态规划的基本程序\n（1）明确规划范围和目标：由管理决策部门、规划部门及相关部门一起协商讨\n论，明确规划的范围和目标。\n（2）生态要素的调查、评价和预测：根据城市生态规划的内容要求，开展城市\n生态调查，为满足生态适宜性的评价要求，一般要按照规划详尽程度将城市空间\n划分为一定尺度的基本单元，如1km×1km或5km×5km，按单元收集规划区域内\n的自然、社会、人口与经济的资料和数据，并建立数据库。根据调查资料，运用\n多学科的理论和方法对城市资源与生态环境状况、生态过程特征、生态环境敏感\n性和重要性等进行综合分析与评价，预测其发展趋势，从而认识和了解城市生态\n系统发展的生态潜力和制约因素。\n\n---\n\n**p103** ![](../007-第六章环境规划-第六章环境规划/page_103.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n（3）生态适宜性分析评价：这是城市生态规划的核心，即\n根据城市生态环境特征和区域自然资源条件，参照城市发展\n的要求和资源利用的要求，分析评价各相关资源的生态适宜\n性，然后综合各单项资源的适宜性分析结果，划分资源与生\n态环境的综合适宜性等级和空间分布图。\n（4）制定规划方案与措施：按照生态适宜性评价的结果，\n提出城市生态规划和生态设计的各种方案，包括具体建设项\n目及其配套措施。\n（5）规划方案评价：运用生态学与经济学的有关知识，对\n规划方案及其对城市生态系统的影响和生态环境不可逆转的\n变化进行综合评价。\n\n---\n\n**p104** ![](../007-第六章环境规划-第六章环境规划/page_104.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n（1）城市生态功能分区\n城市生态功能分区主要是根据城市的自然环境条件、社会经济发展基础以\n及城市未来发展定位，对城市不同空间地域进行的主导功能定位。在生态区\n划分的基础上，再根据城市功能及组团式发展要求，划分为不同的生态亚区。\n生态亚区注重城市发展对生态系统结构的影响，反映人类活动和城市发展\n对生态系统和景观结构的干扰程度，不同的生态区采用不同的评价指标划分\n生态亚区。\n依据生态系统的敏感性、生态服务功能类型和城市功能差异等，进一步将\n各生态亚区划分为不同的生态调控单元。\n\n---\n\n**p105** ![](../007-第六章环境规划-第六章环境规划/page_105.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n（2）城市生态产业发展专项规划\n产业是城市经济发展的载体。根据生态城市和城市可持续发展的要求，\n生态产业发展是未来城市发展的必然方向。城市生态产业规划就是要根据\n循环经济理论和生态学理论，利用清洁生产技术和工艺对传统产业进行改\n造规划，制定新型生态产业发展项目，优化调整、组装与集成城市产业链，\n以及开展城市生态产业园的规划建设等。城市的未来产业发展定位主要是\n生态工业、生态服务业、环保产业、生态农业等方向。\n\n---\n\n**p106** ![](../007-第六章环境规划-第六章环境规划/page_106.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n4.城市生态规划的主要内容\n(3）城市生态环境整治与生态建设专项\n规划\n城市生态环境整治与生态建设是城\n市生态规划的重要内容之一。城市生态\n环境建设专项规划包括城市大气环境规\n划、城市水环境规划、城市声环境规划\n25 50km\n城市固体废物污染防治规划、城市绿地 图例\n地表水涵养与保护用地 道路防护用地\n地下水保护用地 河流防护用地\n系统建设规划以及城市重点生态景观区 生物多样性保护用地 城市绿地\n水土保持用地 非生态用地\n保护与建设规划等内容。 北京城市生态规划\n\n---\n\n**p107** ![](../007-第六章环境规划-第六章环境规划/page_107.jpg)\n\n6.4生态环境规划\n4.城市生态规划的主要内容\n（4）城市人居环境建设专项规划\n“人居环境”就城市和建筑的领域来讲，可具体理解为人的居住生\n活环境。人居环境的核心是“人”，因此，在人居环境建设规划中，必\n须以满足“人类居住”需要为目的，必须将人的居住、生活、休憩、交\n通、管理、公共服务、文化等各种复杂的要求在时间和空间中结合起来，\n要将人工建筑环境与自然环境融合起来，要将硬件建设（人居建筑及其\n附属设施）、软件建设（社区管理体制、社区文化)和心件（生理健康、心\n理健康)等结合起来，要将人居建筑的节能、节材、降耗、环保、安全、\n健康、循环、再生、和谐等作为规划目标，要充分体现人文关怀。\n\n---\n\n**p108** ![](../007-第六章环境规划-第六章环境规划/page_108.jpg)\n\n6.4生态环境规划\n二、城市生态规划\n4.城市生态规划的主要内容\n（5）城乡一体化生态建设专项规划\n城市与其周边乡村地区共同构成了城乡复合生态系统，二者之间相\n互作用、相互影响，它们之间不断地进行着物质、能量、信息和资金交\n流。\n城乡一体化，简单地说，就是统筹城乡社会经济发展，推动城市和\n农村协调发展，农村居民和城市居民共享现代文明生活。城乡一体化不\n是城乡一样化，而是通过统一的城乡规划，打破城乡分割的体制和政策，\n加强城乡间的基础设施和社会事业建设，促进城乡间生产要素流动，逐\n步缩小城乡差别，实现城乡经济、社会环境的和谐发展。\n\n---\n\n**p109** ![](../007-第六章环境规划-第六章环境规划/page_109.jpg)\n\n6.4生态环境规划\n三、生态工业园区规划\n1.生态工业园区的概念与类型\n生态工业园区是依据清洁生产要求、循环经济理念和工业生态学\n原理而设计建立的一种新型工业园区。它通过在产业系统中建立\n“生产者一消费者一分解者”的循环途径，寻求物质闭路循环、能\n量多级利用和废物产生的最小化的工业发展形式。\n可分为行业类园区、综合类园区和静脉工业类园区。行业类生态\n园区是以某一类工业行业的一个或几个企业为核心，通过物质和\n能量的集成，在更多同类企业或相关行业企业间建立共生关系而\n形成的生态工业园区。综合类生态工业园区是由不同工业行业的\n企业组成的工业园区，主要指在高新技术产业开发区、经济技术\n开发区等工业园区基础上改造而成的生态工业园。静脉产业类生\n态工业园区是以静脉产业生产（资源再生利用产业）的企业为主\n体的生态工业园区。\n\n---\n\n**p110** ![](../007-第六章环境规划-第六章环境规划/page_110.jpg)\n\n6.4生态环境规划\n三、生态工业园区规划\n2.生态工业园区规划的原则\n“3R\"原则（减量化、再利用、资源化）；适用性原则：可操作性\n原则。\n3.生态工业园区规划的编制依据\n国家和地方环境保护、清洁生产和循环经济方面的相关法律\n法规、国家和地方对生态工业园区的管理政策、国家和地方有关\n园区的发展政策、园区所在区域国民经济和社会发展规划（纲\n要）、园区控制性规划、相关行业清洁生产标准、相关行业中长\n期发展规划、园区所在区域循环经济规划、园区所在区域产业发\n展规划、园区所在区域环境保护规划、园区所在区域土地利用规\n划、园区所在区域交通、电力等基础设施规划以及其他依据材料。\n\n---\n\n**p111** ![](../007-第六章环境规划-第六章环境规划/page_111.jpg)\n\n6.4生态环境规划\n三、生态工业园区规划\n4.生态工业园区规划编制的程序\n（1）确定任务。当地园区管委会或其他园区行政管理部门委托\n具有相应资质或经验的单位编制生态工业园区规划，通过委托\n文件和合同明确规划编制各方责任、要求、工作进度安排、验\n收方式等。\n（2）调查、收集资料。收集编制规划所必需的生态环境、社\n会、经济背景或现状资料，社会经济发展规划、区域总体规划\n和土地利用规划、产业结构、产业发展规划和布局规划、园区\n主导行业发展规划等有关资料，以及与规划有关的社会、经济\n科技、地理、自然、生态、环境污染等方面的有关信息。调查\n范围以拟建设的生态工业园区为主，兼顾对园区发展影响较大\n的周边区域。\n\n---\n\n**p112** ![](../007-第六章环境规划-第六章环境规划/page_112.jpg)\n\n6.4生态环境规划\n4.生态工业园区规划编制的程序\n（3）编制规划大纲。按照国家环\n境保护部发布的《生态工业园区\n建设规划编制指南》（HJ/T409-\n2007）要求的规划主要内容编制规\n划大纲。\n（4）编制规划。按照规划大纲的\n要求编制生态工业园区规划和技\n术报告。\n\n---\n\n**p113** ![](../007-第六章环境规划-第六章环境规划/page_113.jpg)\n\n6.4生态环境规划\n4.生态工业园区规划编制的程序\n（5）规划论证及公众参与。在规划\n编制过程中应当广泛征求政府有关部\n门的意见和建议，同时通过多种形式\n咨询公众意见，并组织专家论证会对\n规划成果进行论证。\n（6）规划评审。有关部门依据论证\n后的规划大纲组织对规划进行审查，\n规划编制单位根据审查意见对规划进\n行修改、完善后形成规划报批稿。\n\n---\n\n**p114** ![](../007-第六章环境规划-第六章环境规划/page_114.jpg)\n\n6.4生态环境规划\n三、生态工业园区规划\n5.生态工业园区规划编制的内容\n（1）生态工业园区概况和现状分析。\n（2）生态工业园区建设必要性分析。\n（3）生态工业园区建设总体设计。\n（4）园区主要行业生态工业发展规划。\n（5）资源循环利用和污染控制规划。\n（6）重大项目及其投资与效益分析。\n（7）生态工业园区建设保障措施。\n\n---\n\n**p115** ![](../007-第六章环境规划-第六章环境规划/page_115.jpg)\n\n6.4生态环境规划\n习题\n1.简述大气环境规划的内容和步骤。\n2.简述大气污染源调查的主要内容。\n3.简述大气污染物总量控制的主要方法及大气污染防治措施。\n4.简述水环境功能区划的原则和方法。\n5.水污染物预测的主要包括哪些内容？\n6.简述水污染综合防治措施。\n7.简述固体废物管理规划的主要内容。\n8.固体废物处置选址的原则有哪些？\n9.简述生态规划的内涵。\n10.简述生态调查的主要内容和方法。\n11.城市生态规划与生态城市之间是什么关系？\n12.城市生态规划的主要内容有哪些？\n13.简述生态工业园区规划的主要内容。\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 1 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 7 节 · 77 页（跨章）\n\n> `007-第六章环境规划-第五章环境规划的基本内容和程序.pdf` · 涉章 [5, 6]\n\n- [p001](../007-第六章环境规划-第五章环境规划的基本内容和程序/page_001.jpg)  · GUNIV\n- [p002](../007-第六章环境规划-第五章环境规划的基本内容和程序/page_002.jpg)  · 学习要点\n- [p003](../007-第六章环境规划-第五章环境规划的基本内容和程序/page_003.jpg)  · 第一节 环境规划的原则和程序\n- ...余 74 页, 参 [`007-第六章环境规划-第五章环境规划的基本内容和程序/`](../007-第六章环境规划-第五章环境规划的基本内容和程序/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 5 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境规划\n## 核心概念\n- 大气环境规划\n- 大气污染物总量控制（A 值法/P 值法）\n- 水环境功能区划\n- 水环境容量\n- 水污染物预测\n- 固体废物管理规划\n- 生态环境规划\n## 关键公式 / 模型\n- A 值法 / P 值法\n- W = Q(C_s − C₀) + 自净量\n- Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D\n- 三化原则（减量化/资源化/无害化）\n## 高频考点\n- 大气环境规划的内容与类型\n- 大气污染物总量控制方法（A 值/P 值）\n- 水环境功能区划与水环境容量概念及计算\n- 水污染控制规划方法与 S-P 模型\n- 固体废物管理三化原则及规划内容\n- 生态环境规划的内容与生态适宜度分析\n- 各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境规划))\n    核心概念\n      大气环境规划\n      大气污染物总量控制（A 值法/P 值法）\n      水环境功能区划\n      水环境容量\n      水污染物预测\n      固体废物管理规划\n      生态环境规划\n    关键公式 / 模型\n      A 值法 / P 值法\n      W = Q（C_s − C₀） + 自净量\n      Streeter-Phelps：dL/dt=−k₁L, dD/dt…\n      三化原则（减量化/资源化/无害化）\n    高频考点\n      大气环境规划的内容与类型\n      大气污染物总量控制方法（A 值/P 值）\n      水环境功能区划与水环境容量概念及计算\n      水污染控制规划方法与 S-P 模型\n      固体废物管理三化原则及规划内容\n      生态环境规划的内容与生态适宜度分析\n      各要素规划共同的调查—评价—预测—目标—措施程序\n```\n\n## 复习要点 · LLM 协填\n\n### 一、核心概念\n\n- **大气环境规划**：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n- **大气污染物总量控制（A 值法/P 值法）**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n- **水环境功能区划**：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n- **水环境容量**：在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n- **水污染物预测**：用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n- **固体废物管理规划**：以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n- **生态环境规划**：以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `A 值法 / P 值法` | 大气污染物总量控制的两种分配方法 |\n| `W = Q(C_s − C₀) + 自净量` | 水环境容量（稀释+自净）的基本构成 |\n| `Streeter-Phelps：dL/dt=−k₁L, dD/dt=k₁L−k₂D` | 河流 BOD 衰减与溶解氧亏缺耦合模型 |\n| `三化原则（减量化/资源化/无害化）` | 固体废物管理的核心目标 |\n\n### 三、重要案例 / 例题\n\n- 某区域大气污染物允许排放总量的分配。\n- 河流允许纳污量（水环境容量）计算。\n- 城市生活垃圾按三化原则的处理处置规划。\n\n### 四、高频考点（速记）\n\n1. 大气环境规划的内容与类型\n2. 大气污染物总量控制方法（A 值/P 值）\n3. 水环境功能区划与水环境容量概念及计算\n4. 水污染控制规划方法与 S-P 模型\n5. 固体废物管理三化原则及规划内容\n6. 生态环境规划的内容与生态适宜度分析\n7. 各要素规划共同的调查—评价—预测—目标—措施程序\n\n### 五、思考题 / 自测\n\n- **Q**：什么是环境容量？在规划中起何作用？\n  **A**：环境容量是在满足环境质量目标前提下区域（水/大气）所能容纳污染物的最大允许量，是确定允许排放总量、实施总量控制与分配的依据。\n\n- **Q**：固体废物管理的三化原则指什么？\n  **A**：减量化（源头减少产生）、资源化（回收利用）、无害化（安全处置），是固废规划的核心目标。\n\n- **Q**：大气总量控制 A 值法与 P 值法有何区别？\n  **A**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单个污染源的允许排放率（与烟囱高度等有关）自下而上控制。\n\n\n### 六、与前后章之关联\n\n- **承前**：运用第 5 章调查、预测、决策与容量计算等技术方法。\n- **启后**：各要素规划的落实需第 7 章环境管理模式（总量控制、清洁生产）来保障。\n\n"}, {"id": "ch-07", "group": "章节素材", "title": "第07章 环境管理模式", "md": "# 环境规划与管理 · 第 7 章 · 环境管理模式 · 素材\n\n> 教师: 王思雨 · 学期: 2026春\n> 章下 PDF: 1 个 · 总页: 106\n> 主版: 第 8 节 · 106 页\n\n---\n\n## 主版课件 · 第 8 节\n\n> `008-5月8日授课-第七章环境管理模式.pdf`\n\n<details><summary>展开 106 页图链<\/summary>\n\n- [p001](../008-5月8日授课-第七章环境管理模式/page_001.jpg)  · GUNIV\n- [p002](../008-5月8日授课-第七章环境管理模式/page_002.jpg)  · 学习要点\n- [p003](../008-5月8日授课-第七章环境管理模式/page_003.jpg)  · 学习要点\n- [p004](../008-5月8日授课-第七章环境管理模式/page_004.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p005](../008-5月8日授课-第七章环境管理模式/page_005.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p006](../008-5月8日授课-第七章环境管理模式/page_006.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p007](../008-5月8日授课-第七章环境管理模式/page_007.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p008](../008-5月8日授课-第七章环境管理模式/page_008.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p009](../008-5月8日授课-第七章环境管理模式/page_009.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p010](../008-5月8日授课-第七章环境管理模式/page_010.jpg)  · 一、末端控制传统环境管理模式的建立\n- [p011](../008-5月8日授课-第七章环境管理模式/page_011.jpg)  · 二、末端控制传统环境管理模式的实践\n- [p012](../008-5月8日授课-第七章环境管理模式/page_012.jpg)  · 二、末端控制传统环境管理模式的实践\n- [p013](../008-5月8日授课-第七章环境管理模式/page_013.jpg)  · 二、末端控制传统环境管理模式的实践\n- [p014](../008-5月8日授课-第七章环境管理模式/page_014.jpg)  · 二、末端控制传统环境管理模式的实践\n- [p015](../008-5月8日授课-第七章环境管理模式/page_015.jpg)  · 主观题 页10分\n- [p016](../008-5月8日授课-第七章环境管理模式/page_016.jpg)  · 三、末端控制传统环境
