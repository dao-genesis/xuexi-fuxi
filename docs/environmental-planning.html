末端控制传统环境管理模式的弊端\n\n---\n\n**p004** ![](../008-5月8日授课-第七章环境管理模式/page_004.jpg)\n\n一、末端控制传统环境管理模式的建立\n1.末端控制的含义\n未端控制又称末端治理或末\n端处理，是指在生产过程的终端\n或者是在废弃物排放到自然界之\n前，采取一系列措施对其进行物\n理、化学或生物过程的处理，以\n减少排放到环境中的废物总量。\n\n---\n\n**p005** ![](../008-5月8日授课-第七章环境管理模式/page_005.jpg)\n\n一、末端控制传统环境管理模式的建立\n一座20万kW的燃煤电厂，每关停1d\n的脱硫除尘设备，就可以节约大约20万\n元；莲花味精厂每关停一天污水处理设\n备，大约可节约成本10万元。末端治理\n所需的大量环保投入抵消了经济发展所\n创造的福利。所以，以末端治理为特征\n的经济模式既达不到预期的经济效益、\n社会效益，同样也遏制不了生态环境恶\n化的趋势。也就是说，末端治理经济模\n式，从本质上仍然属于传统经济模式的\n范畴。\n\n---\n\n**p006** ![](../008-5月8日授课-第七章环境管理模式/page_006.jpg)\n\n一、末端控制传统环境管理模式的建立\n2.基于末端控制思想的传统环境管理模式的建立\n20世纪70-80年代初，随着制造业的快速发展与技术革新速度的加\n快，人类所依赖的资源与生产的产品范围得到扩大：人工合成的各种化\n学物质被不断的生产与制造，而这些化学物质不能很快或不能为自然系\n统吸纳与循环，因此引1发了严重的环境污染问题；同时制造过程中能源\n与资源消耗大，排放了大量的废弃物，环境的容纳与循环能力不能承载，\n造成环境问题日益突出。\n\n---\n\n**p007** ![](../008-5月8日授课-第七章环境管理模式/page_007.jpg)\n\n一、末端控制传统环境管理模式的建立\n随着“污染者负担”原则的提出，\n各国法律都规定了企业对其排放污染\n物的行为必须承担经济责任，凡是污 谁污染谁负责。\n染物的排放量超过了规定的排放标准，\n都需要缴纳超标排污费，造成环境损\n害的，需要承担治理污染的费用并赔\n工程施工\n偿相应的损失。在这一阶段，企业面\n对严格的法律、法规、标准、政策，\n企业只能遵循相关的制度约束。\n\n---\n\n**p008** ![](../008-5月8日授课-第七章环境管理模式/page_008.jpg)\n\n一、末端控制传统环境管理模式的建立\n为了能够在制度约束的范围内进行经营活动，其环境手段往往是\n在其制造的最后工序或排污口建立各种防治环境污染的设施来处理污\n染，如建污水处理站，安装除尘、脱硫装置等以“过滤器”为代表的\n末端控制装置与设备，为固体废弃物配置焚烧炉或修建填埋厂等方式\n来满足政策与法规对废弃物的排放达到排放标准的要求。这种环境管\n理模式是以“管道控制污染”思想为核心，强调的是对排放物的末端\n管理。\n\n---\n\n**p009** ![](../008-5月8日授课-第七章环境管理模式/page_009.jpg)\n\n一、末端控制传统环境管理模式的建立\n未端控制的环境管理模式具有线性经济模式的基本特征：\n①是由“资源-产品-废弃物排放”单方向流程组成的开环式系统；\n②在这种模式中，人们从自然界获取大量的资源和原材料，经过\n生产加工制造出产品，产品在消费使用后被当作废弃物直接丢弃，而\n不是被回收、再利用或重新转化为资源。这种模式依赖于大量的资源\n投入和不断扩大的生产规模来推动经济增长，对资源的消耗速度快\n并且产生大量的废弃物和环境污染，是一种不可持续的经济发展方式。\n产品 分销商\n销售 用户 使用\n供应商 资源\n采购 制造\n废弃物\n污染处理\n\n---\n\n**p010** ![](../008-5月8日授课-第七章环境管理模式/page_010.jpg)\n\n一、末端控制传统环境管理模式的建立\n这种环境管理模式要实现整体经济系统的人与自然的和谐发展要求\n具备几个基本的前提：\n①自然资源的永续与无限性，制造业能永续地从自然系统中便利地得到\n资源与能源；②产品在分销与使用过程中不产生对自然系统构成威胁的\n废弃物；③自然生态系统可以自然化解、吸纳和消除企业通过末端处理\n的废弃物。\n事实上上述三个假设前提均不存在：自然资源不是永续存在的，同\n时是有限的；产品在分销与使用过程中产生了大量的废弃物，如日益受\n到关注的电子垃圾已经对自然环境产生了巨大的环境压力；自然系统自\n然降解、吸纳和消除废弃物的能力是有限的。以管道控制为核心的末端\n控制的环境管理模式不能实现人和自然的和谐发展\n\n---\n\n**p011** ![](../008-5月8日授课-第七章环境管理模式/page_011.jpg)\n\n二、末端控制传统环境管理模式的实践\n1.美国末端控制传统环境管理模式的实践\n美国污染控制政策演变（三次重大演变）\n第一次重大转变 第二次重大转变 第三次重大转变\n1948-1963 20世纪70年代-80年 90年代以来\n代\n从忽视污染防治转变 由浓度控制向总量 源头控制提出\n为重视 控制转变\n《联邦水污染控制法》 《清洁空气法》 《污染预防法》\n\n---\n\n**p012** ![](../008-5月8日授课-第七章环境管理模式/page_012.jpg)\n\n二、末端控制传统环境管理模式的实践\n据美国1988年有毒物质排放报表资料，每年仍有45.7亿t\n有毒化学品直接排入环境，对环境产生严重的危害。而且随着\n人们对环境质量要求日益提高，污染物控制标准日趋严格，实\n行末端控制导致环境保护工作投资日益增加，美国每年该项投\n资达到800亿~900亿美元\n\n---\n\n**p013** ![](../008-5月8日授课-第七章环境管理模式/page_013.jpg)\n\n二、末端控制传统环境管理模式的实践\n2.中国末端控制传统环境管理模式的实践\n我国的环境管理发展历程的前两个阶段充分说明了基于末端控制思\n想的传统环境管理模式在我国的建立和实践过程。\n在第一个阶段实现了思想认识的转变，颁布了《中华人民共和国环\n境保护法（试行）》，认识到了环境保护要依法管理，并开始集中人力\n财力治理了一批重点污染源。\n在第二个阶段确定了环境保护是我国的一项基本国策，提出了“三\n同步、三统一”的大政方针，确立了以强化环境管理为主的“三大政\n策”，形成了以环境影响评价、“三同时”、征收排污费和自然资源补\n偿费、排污许可证、环境保护目标责任、城市环境综合整治定量考核、\n限期治理、污染集中控制等制度为基本内容的环境管理体系\n\n---\n\n**p014** ![](../008-5月8日授课-第七章环境管理模式/page_014.jpg)\n\n二、末端控制传统环境管理模式的实践\n我国在环境污染防治方面的行政控制手段可简要概括为：在经济计\n划方面，法律要求在“宏观决策”层次上应将环境保护纳入国民经济和\n社会发展计划，制定和执行环境保护规则；在“微观技术”层次上将环\n境保护纳入企业管理中；再加上“中观管理”层次上的各种行政管理制\n度和措施，共同构成了我国环境污染防治的行为控制体系。\n中国环保\nYOGACULTURE\n提与环楼的美系，保障经活社会的可持绿当屏历菜取的各种行 私境导补是情人要为前决现货或限在的环旗可群：协调人\n#的急称，其方法和手租有工程核不的、行孩爱理的，#育生\n乐地护是提人类为新认理要成酒在的环#为题，协调人\n你：其方和手核育工校核水的、1收管理作：您有 校济的，直传教自的婷\n\n---\n\n**p015** ![](../008-5月8日授课-第七章环境管理模式/page_015.jpg)\n\n主观题 页10分\n请同学们思考末端控制的弊端有哪些\n\n---\n\n**p016** ![](../008-5月8日授课-第七章环境管理模式/page_016.jpg)\n\n三、末端控制传统环境管理模式的弊端\n（1）末端处理技术常常使污染物从一种环境介质转移到另一种环境\n介质。常用的污染控制技术只解决工艺中产生并受法律约束的第一代\n污染物，而忽视了废弃物处理中或处理后产生的第二代污染问题。\n（2）现行环境保护法规、管理、投资、科技等占支配地位的是单纯\n污染控制，而没有对面临全球系统的环境威胁提出适当的解决办法。\n\n---\n\n**p017** ![](../008-5月8日授课-第七章环境管理模式/page_017.jpg)\n\n三、末端控制传统环境管理模式的弊端\n（3）环境问题给世界各国包括发达\n工业国家带来了越来越沉重的经济\n负担，控制污染问题之复杂，所需资\n金之巨大远远超出了原先的预料，环\n境问题的解决远比原来设想的要困难\n得多。\n（4）“污染控制”的现行法规体\n系和运行机制，导致部分企业（公\n司）养成了一种“污染排放后才控制\n或“达标排放”的思想心态，成为强\n化环境管理，广泛实行污染预防的障\n-5thJune\n碍因子。\n\n---\n\n**p018** ![](../008-5月8日授课-第七章环境管理模式/page_018.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n第二节 污染预防为基础的现代环\n境管理模式\n源削减\n循环经济\n三、废物减量化\n四、产品生态设计\n五、产品环境标志\n六、产品生命周期评价\n\n---\n\n**p019** ![](../008-5月8日授课-第七章环境管理模式/page_019.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n鉴于基于末端控制的环境管理模式的局限性，20世纪80年代\n中期，欧美国家将环境政策的重点转向以预防为主。可以将污染\n预防概念定义为：在人类活动各种过程中，例如材料、产品的制\n造、使用过程以及服务过程，采取消除或减少污染控制措施，它\n包括不用或少用有害物质，采用无污染或少污染制造技术与工艺\n等，以达到尽可能消除或减少各种(生产、使用)过程产生的废物，\n最大限度地节约和有效利用能源和资源，减少对环境的污染。\n\n---\n\n**p020** ![](../008-5月8日授课-第七章环境管理模式/page_020.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n美国1990年《污染预防法》\n美国1990年《污染预防法》在很大程度上是象征性的，它的\n实际作用是产生了可以建筑未来污染预防努力的立法框架。\n该法的中心议题是在全国采取措施促进自愿实行污染预防，\n既不需要也不希望采取强制性的污染预防。该法的基本政策是，\n作为环境管理政策体系的最高重点是通过源削减实现污染预防。\n该法第四、五、六、七、八节内容分别是环保局的活动、用\n于各州技术支持项目的基金、源削减技术信息交换所、源削减和\n再循环数据的收集、环保局的报告。\n\n---\n\n**p021** ![](../008-5月8日授课-第七章环境管理模式/page_021.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n该法所规定的环保局的责任包括：\n（1）宣传和推动自愿的污染预防；\n（2）收集与分析信息数据，以制定和明确解释综合污染预防计划。\n该法规定环保局必须在局内成立污染预防办公室。该法还要求环\n保局制定污染预防策略，包括下述措施：\n（1）建立测量源削减的标准方法；\n（2）审议环保局的法规，协调环保局与其他联邦机构的活动，促\n进源削减;\n\n---\n\n**p022** ![](../008-5月8日授课-第七章环境管理模式/page_022.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n（3）根据联邦立法建立改进和散发数据的方法；\n（4）成立国家信息交换站和通过拨款计划和技术援助，促进企\n业实行源削减；\n5 确定可计量的源削减目标；\n6 判定并向国会建议消除源削减障碍的方法；\n开发、检验和散发源削减审计程序；\n8 判定利用联邦采购手段，鼓励源削减的机会；\n6 制定年度奖励计划，以表彰执行优异的或革新的源削减计\n划的公司。\n\n---\n\n**p023** ![](../008-5月8日授课-第七章环境管理模式/page_023.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n美国污染预防政策实施\n(1)1990年成立污染预防办公室，其任务是开发、推广和实施污\n染预防战略。\n(2)环保局内成立环境教育办公室，主要训练环保系统内部成员及\n其他政府机构成员，培训以污染预防为中心内容。\n(3)环保局内成立污染预防信息交流中心(PPIC)，建立了污染预防\n信息交流系统（PIES），为企业提供有关源削减及再循环利用方面\n的信息服务（无偿服务）。还将帮助政府和企业制定污染预防计划\n向计算机网络提供相关资料。\n\n---\n\n**p024** ![](../008-5月8日授课-第七章环境管理模式/page_024.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n(4)有毒污染物的预防。有毒污染物是环保工\n作的重点之一。\n(5)制定了“源削减检查计划”(SRRP)。实施\nSRRP的目标是为了评价新颁布的工业标准对\nAGENCY\n工业界采用源削减措施潜力的影响。\n(6）建立污染预防示范工程。\n(7)其他措施。为实施污染预防，美国环保局\n还制定了一系列措施，如对开展污染预防工\n作的单位提供资助和奖励，并制定了《废物\n削减技术评价计划》（WRITE)，对废物削减技\n术进行评价，制定配套的政策，鼓励排污单\n位增加对污染预防的投资。\n\n---\n\n**p025** ![](../008-5月8日授课-第七章环境管理模式/page_025.jpg)\n\n源削减\n源削减\n源削减（sourcereduction)\n包括减少在回收利用、处理或处置\n以前进入废物流或环境中的有害物\n质、污染物的数量的活动，以及减\n保护环境\n少这些有害物质、污染物的排放对\n爱护地球\n公众健康和环境危害的活动。\n明确指出污染排放后的回收利\n用、处理、处置不是源削减，使污\n染预防更显示其与过去的污染控制\n有截然的区别。\n\n---\n\n**p026** ![](../008-5月8日授课-第七章环境管理模式/page_026.jpg)\n\n、源削减\n源头控制是针对末端控制而提出的一项控制方式，是指在“源\n头”削减或消除污染物，即尽量减少污染物的产生量，实施源削减。\n美国污染预防政策的实质就是推行源头控制，实施源削减。这是一\n种治本的措施，是一种通过原材料替代，革新生产工艺等措施，在\n技术进步的同时控制污染的方法，代表了今后污染控制的方向。\n\n---\n\n**p027** ![](../008-5月8日授课-第七章环境管理模式/page_027.jpg)\n\n一、源削减\n两种常用的源削减方法是改变产品和改进工艺。它们减少了产品\n的生命周期和废物处置中废物及制成品的数量和毒性。\n其内容包括设备或技术改造，工艺或程序改革，产品的重新配制\n或重新设计，原料替代，以及改进内务管理、维修、培训或库存控制。\n源削减不会带来任何形式的废物管理(例如，再生利用和处理)。\n\n---\n\n**p028** ![](../008-5月8日授课-第七章环境管理模式/page_028.jpg)\n\n、源削减\n为了实施源削减计划，美国\n采取了包括：信息交换站、研究\n与开发、提供技术帮助/法规说明、\n提供现场技术帮助、对工业提供\n财政援助、对地方政府提供财政\n援助、废物交换、废物审计、举\n办研讨班和学习班、召开专业会\n议、调查和评价、出版简讯和刊\n物、审查预防计划、与学术界合\n作，促进污染预防、奖励计划等\n内容的污染预防计划。\n\n---\n\n**p030** ![](../008-5月8日授课-第七章环境管理模式/page_030.jpg)\n\n主观题10分\n为什么?\n\n---\n\n**p031** ![](../008-5月8日授课-第七章环境管理模式/page_031.jpg)\n\n二、循环经济\n循环经济本质上是一种生态\n经济，就是把清洁生产和废弃物\n的综合利用融为一体的经济，它 循环经济\n要求运用生态学规律来指导人类\n减量化再利用资源化\n社会的经济活动。\n按照自然生态系统物质循环\n和能量流动规律重构经济系统\n使得经济系统和谐地纳入到类似\n于自然生态系统的物质循环过程\n中，建立起一种新的经济形态。\n\n---\n\n**p032** ![](../008-5月8日授课-第七章环境管理模式/page_032.jpg)\n\n二、循环经济\n自然生态系统中物质循环，能量流动一例如有机碳循环\n有机物\n二氧化碳 生产者\n微生物，其\n他生物\n食物碎屑，排泄物，户体 消费者（食物链）\n分解者\n\n---\n\n**p033** ![](../008-5月8日授课-第七章环境管理模式/page_033.jpg)\n\n二、循环经济\n生态系统中资源利用的特点：\n物质（资源）得到循环利用\n没有废弃物，一个过程的废物是另一个\n过程的资源\n资源高效转化，能源高效利用\n\n---\n\n**p034** ![](../008-5月8日授课-第七章环境管理模式/page_034.jpg)\n\n二、循环经济\n传统经济与循环经济的比较\n传统经济 循环经济\n“资源一生产—消费—废弃物 资源—生产—消费—资源\n排放”单向流动的线性经济 （再生）”的反馈式流程\n经济增长靠高强度的开采和消\n资源重复利用的比例很高，对\n费资源以及高强度地破坏生态\n生态环境的影响小\n环境\n\"三高一低”（高开采、高消 “三低一高” (低开采、\n耗、高排放、低利用) 低消耗、低排放、高利用）\n\n---\n\n**p035** ![](../008-5月8日授课-第七章环境管理模式/page_035.jpg)\n\n二、循环经济\n循环经济倡导的是一种建立在物质不断循环利用基础上的经济\n发展模式，它要求把经济活动组织成一个“资源一生产一消费一资\n源(再生)”的反馈式流程，所有的物质和能源要能在这个不断进行的\n经济循环中得到合理和持久的利用，以把经济活动对自然环境的影\n响降低到尽可能小的程度。\n循环经济是以物质、能量梯次和闭路循环使用为特征，在环境\n资源综合利用、生态设计和可持续消费等融为一体，运用生态学规\n律来指导人类社会的经济活动。\n\n---\n\n**p036** ![](../008-5月8日授课-第七章环境管理模式/page_036.jpg)\n\n二、循环经济\n1.循环经济的概念\n（1）循环经济的起源及发展\n循环经济的思想萌芽可以追溯到环境保\n护兴起的20世纪60年代，源于美国经济学\n家波尔丁提出“宇宙飞船理论”，对传统\n工业经济“资源一生产一消费一废弃物排 资源循环利用\n放”的“开环模式”提出了批评。波尔丁\n首先提出“循环经济”一词，指在人、自\n然资源和科学技术的大系统内，在资源投\n入、企业生产、产品消费及其废弃的全过\n程中，把传统的依赖资源消耗的线形增长\n经济，转变为依靠生态型循环利用资源来\n发展经济。\n\n---\n\n**p037** ![](../008-5月8日授课-第七章环境管理模式/page_037.jpg)\n\n二、循环经济\n“宇宙飞船理论”是循环经济的早期代表，该理论认为：地球就像在\n太空中飞行的宇宙飞船，要靠不断消耗自身有限的资源而生存，如果不合\n理开发资源、保护环境，就会像宇宙飞船那样走向毁灭。因此，“宇宙飞\n船经济”要求一种新的发展观：第一，必须改变过去那种“增长型”经济\n为“储备型”经济；第二，要改变传统的“消耗型经济”，而代之以休养\n生息的经济；第三，实行福利量的经济，摒弃只注重生产量的经济；第四，\n建立既不会使资源枯竭，又不会造成环境污染和生态破坏、能循环使用各\n种物资的“循环式”经济，以代替过去的“单程式”经济。\n让垃圾变资源！\n\n---\n\n**p038** ![](../008-5月8日授课-第七章环境管理模式/page_038.jpg)\n\n二、循环经济\n(2)循环经济的概念和原则\n循环经济是一种以资源的循环利用为核心，以“减量化、再利\n用、资源化”为原则，以低消耗、低排放、高效率为基本特征，符\n合可持续发展理念的经济增长模式。循环经济的“3R”原则为：\n①减量化原则（Reducing）\n减量化原则要求用较少的原料和能源投入来达到既定的生产目\n的或消费目的，即从经济活动的源头就注意节约资源和减少污染。\n减量化原则针对的是输入端，旨在减少进入生产和消费过程中物质\n和能源流量。对废弃物的产生，是通过预防的方式而不是末端治理\n的方式来加以避免。\n\n---\n\n**p039** ![](../008-5月8日授课-第七章环境管理模式/page_039.jpg)\n\n二、循环经济\n②再使用原则（Reusing）\n再使用原则要求制造产品和包装容器能够以初始的形式被反复\n使用；要求抵制一次性用品的泛滥。\n③再循环原则（Recycling）\n再循环原则要求生产出来的物品在完成其使用功能后能重新变\n成可以利用的资源，而不是不可恢复的垃圾。\n按照循环经济的思想，再循环有两种情况：一种是原级再循环，\n即废品被循环用来产生同种类型的新产品，例如报纸再生报纸、易\n拉罐再生易拉罐等；另一种是次级再循环，即将废物资源转化成其\n他产品的原料。原级再循环在减少原材料消耗上面达到的效率要比\n次级再循环高得多，是循环经济追求的理想境界。\n\n---\n\n**p040** ![](../008-5月8日授课-第七章环境管理模式/page_040.jpg)\n\n二、循环经济\n2.发达国家循环经济的基本模式\n（1)企业内部的循环经济模式（杜邦模式）\n基本特点是通过循环来延长生产链条，减少生产过程中物料和\n能源的使用量，减少废弃物和有毒物质的排放，最大限度地利用可\n再生资源，同时提高产品的耐用性等。\n杜邦公司创造性地把循环经济三原则发展成为与化学工业相结\n合的“3R制造法”，通过放弃使用某些环境有害型化学物质、减少\n些化学物质的使用量以及发明回收本公司产品的新工艺，到2000\n年已经使该公司的总废物减少了1/4，有害废弃物减少了40%，温\n室气体排放量减少了70%。\n\n---\n\n**p041** ![](../008-5月8日授课-第七章环境管理模式/page_041.jpg)\n\n二、循环经济\n（2）区域生态工业园区模式（卡伦堡模式）\n基本特征是按照工业生态学的原理，通过企业间的物质集成、能\n量集成和信息集成，形成产业间的代谢和共生耦合关系，使一家工厂\n的废气、废水、废渣、废热成为另一家工厂的原料和能源，建立工业\n生态园区。\n（3）社会层面上废弃物的回收再利用模式（DSD模式）\n回收再利用模式的基本特征是建立废旧物资的回收和再生利用体\n系，实现消费过程中和消费过程后物质与能量的循环。\n德国的废弃物双元回收体系（DSD）是其典型代表，是专门组织回\n收处理包装废弃物的非盈利社会中介组织，1995年由95家产品生产厂\n家、包装物生产厂家、商业企业以及垃圾回收部门联合组成，目前共\n有1.6万家企业加入。\n\n---\n\n**p042** ![](../008-5月8日授课-第七章环境管理模式/page_042.jpg)\n\n二、循环经济\n（4）社会循环经济体系\n循环型社会是指限制自然资\n源消耗、环境负担最小化的社会。 城市矿产 废弃资源\n2000年，日本制定了《促进\n废弃\n循环社会形成基本法》，提出把\n整个社会建成循环型社会的发展 消费者 材料循环\n目标，与2000年相比，到2010年 使用 利用\n要达到三个目标：资源投入产出\n产品再 再加工\n再市场化\n率提高40%，资源循环利用率提 制造\n高40%，废弃物最终处置量减少\n50%。\n\n---\n\n**p043** ![](../008-5月8日授课-第七章环境管理模式/page_043.jpg)\n\n二、循环经济\n日本循环经济法律体系\n法律层次 法律名称 制定时间（年）\n《环境基本法》 1993\n基本法 《建立循环型社会\n基本法》 2000\n《废弃物处理法》 1970\n综合性法 《资源有效利用处\n理法》 1991\n《容器与包装物的 1995\n分类收集与循环法》\n《特种家用机器循 1998\n环法》\n专项法 《建筑材料循环法》 2000\n《多氯联苯废弃物\n妥善处理特别措施 2001\n法》\n《车辆再生法》 2002\n\n---\n\n**p044** ![](../008-5月8日授课-第七章环境管理模式/page_044.jpg)\n\n二、循环经济\n3.我国循环经济发展的对策\n①加强宣传教育，牢固确立循环经济理念\n运用各种宣传形式和手段，进一步普及循环经济知识，不断将循环\n经济理念引入人们的日常生产、生活和消费方式中，切实提高公众的资\n源意识、节约意识和环保意识，摒弃传统的发展思维和发展模式。\n在发展思路上彻底改变重开发、轻节约，重速度、轻效益，重外延\n发展、轻内涵发展，片面追求GDP增长，忽视资源和环境的倾向，加快\n增长方式转变速度，切实推进循环经济发展。\n\n---\n\n**p045** ![](../008-5月8日授课-第七章环境管理模式/page_045.jpg)\n\n二、循环经济\n②依靠科技创新，加强循环经济技术开发\n科学技术是发展循环经济的重要支撑。通过产学研结合，组织一批\n关键技术攻关，努力突破制约循环经济发展的技术瓶颈。\n加大对循环经济相关科技创新与开发，从资源及能源开发利用、生\n产制造、消费等各个环节，为循环经济发展提供强有力的技术支撑，组\n织开展资源节约和替代、能量梯级利用、绿色再制造等方面的科技攻关，\n研究开发一批经济效益好、资源消耗低、环境污染少的实用技术。\n\n---\n\n**p046** ![](../008-5月8日授课-第七章环境管理模式/page_046.jpg)\n\n二、循环经济\n③强化环境管理，构建循环经济指标体系\n企业是经济活动的主体，也是资源消耗、废弃物产生和排放\n的载体，加强企业资源环境管理是发展循环经济的基础。\n企业要树立经济与资源环境协调发展的意识，建立健全资源\n节约管理制度，大力开展资源综合利用，积极推行清洁生产，从\n源头上削减污染，提高资源利用效率。\n④加强组织领导，积极推广示范典型\n加强组织领导是推动循环经济工作的关键，要高度重视，加\n大工作力度，把循环经济贯穿整个经济工作中，摆在重要议事日\n程上。\n\n---\n\n**p047** ![](../008-5月8日授课-第七章环境管理模式/page_047.jpg)\n\n二、循环经济\n制定相关经济政策，建立促\n进循环经济发展的激励机制\n除了在法律法规中体现出\n对循环经济的扶持外，应制定\n相关经济政策，加大对循环经\n济发展的支持力度。例如在税\n收减免、引导资金等方面给予\n激励政策，对采用清洁生产工\n艺和资源循环利用的企业给予\n减免税收、财政补贴以及信贷\n优惠政策。\n\n---\n\n**p048** ![](../008-5月8日授课-第七章环境管理模式/page_048.jpg)\n\n三、废物减量化\n废物减量化（wasteminimization）也称为废物最少化，指将产\n生的或随后处理、贮存或处置的有害废物量减少到可行的最小程度。\n即由产生者减少有害物的体积和毒性，其中包括削减废物产生\n的活动及废物产生后进行回收利用与减少废物体积和毒性的处理\n处置。“减量化”不一定要鼓励削减废物的生产量和废物本身的毒\n性，而且要求减少需要处置的废物的体积和毒性。\n无废城市\n让废物变资源\n\n---\n\n**p049** ![](../008-5月8日授课-第七章环境管理模式/page_049.jpg)\n\n三、废物减量化\n废物减量化与末端治理相比，有明显的优越性，如据化工、轻\n工、纺织等十五个企业投资与削减量效益比较，废物减量化比末端\n治理，万元环境投资削减污染物负荷高3倍多。但由于废物的处理\n和回收利用，仍有可能造成对健康、安全和环境的危害，因而废物\n减量化往往是废物管理措施的改进，而不是消除它们。所以“废物\n减量化”仍然是一个与排放后的有害废物处理息息相关的术语，其\n实效性如同末端治理，仍有很大局限性。\n\n---\n\n**p050** ![](../008-5月8日授课-第七章环境管理模式/page_050.jpg)\n\n四、产品生态设计\n2005年7月6日，欧洲议会和欧盟理事会通过了关于用能产\n品生态设计要求的第2005/32/EC号指令（下文简称用能产品生\n态设计指令或EUP指令），并要求成员国于2007年8月11日前使\n遵守该指令所需的国内法律、法规和行政规定生效。\n欧盟这一绿色指令的通过引起了全世界的关注，有学者认为\n它将引起设计领域的一场革命，国内企业特别是家电类出口企业\n的“神经”也因此而高度紧张。\n\n---\n\n**p051** ![](../008-5月8日授课-第七章环境管理模式/page_051.jpg)\n\n四、产品生态设计\n1.产品生态设计的定义\n产品设计是一个将人的某种目的或需要转换为一个具体的物理形式\n或工具的过程。产品生态设计（eco-design）旨在改善产品在整个生\n命周期内的环境性能，降低其环境影响，实现从源头上预防污染的目的。\n产品生态设计系指将环境因素纳入设计之中，在产品生命周期的每\n一环节都考虑其可能带来的环境影响，通过设计改进，使产品的环境影\n响降为最低，最终引导产生一个更具有可持续性的生产和消费系统。\n\n---\n\n**p052** ![](../008-5月8日授课-第七章环境管理模式/page_052.jpg)\n\n四、产品生态设计\n中上\n产品生态设计的特点\n（1）从“以人为中心”的产品设计转向既考虑人的需求，又考虑生\n态系统安全的生态设计。\n（2）从产品开发概念阶段，就引进生态环境变量，并与传统的设计因\n子如成本、质量、技术可行性、经济有效性等进行综合考虑。\n（3）将产品的生态环境特性看做是提高产品市场竞争力的一个重要\n因素；在产品开发中考虑生态环境问题，并不是要完全忽略其他因子。\n因为产品的生态特性是包含在产品中的潜在特性，如果仅仅考虑生态\n因子，产品就很难进入市场，产品的潜在生态特性也就无法实现。\n\n---\n\n**p053** ![](../008-5月8日授课-第七章环境管理模式/page_053.jpg)\n\n四、产品生态设计\n2.产品生态设计战略\n（1）生态产品概念开发战略\n产品生态设计战略首先应考虑的就是生态产品概念开发战略。\n从环保方面考虑，生态设计的最终目标是寻找更优化、更合理的\n方案来持续减少产品对环境的影响，其实现途径见下表：\n实现途径 作用 说明\n减少生产商对有形产品非物质化主要包括：产品体\n以非物质产品（如信息）或 的生产和使用，同时也积小型化：产品重量最轻化；\n服务替代有形的产品 减少消费者对有形产品非物质产品替代物质产品；\n的依赖。 减少对物质的使用，减少对\n基础设施的利用等\n提高产品的使用效率，实现产品共享的途径：考虑\n提倡产品共享 降低原材料和能源的消开发新的适用于共享的产品；\n耗，降低产品的运输成提高现有共享产品的共享率；\n本。 以提供服务代替提供产品\n\n---\n\n**p054** ![](../008-5月8日授课-第七章环境管理模式/page_054.jpg)\n\n四、产品生态设计\n（2）易于清洁、维护和维修\n产品生态设计应注意产品易于清\n洁、维护和维修以延长产品的使用寿\n命。\n生态设计要点：一是清楚标明产\n品如何打开以进行维护和维修；二是\n清楚标明产品的某一部件应以某种特\n殊的方式进行清洁或维护：三是应清\n楚标明产品中需要定期检查的部件；\n四是需要定期更换的部件应易于更换。\n\n---\n\n**p055** ![](../008-5月8日授课-第七章环境管理模式/page_055.jpg)\n\n四、产品生态设计\n（3）产品的模块化设计\n产品的模块化设计可最大限度地提高产品的可更新性，以\n满足不断变化的用户需求。在模块化设计中，每个模块都具有\n明确的功能、接口和标准规范。这些模块可以独立进行设计、\n生产、测试和维护。通过对模块的选择、组合和配置，可以快\n速创建出满足不同用户需求、具有不同性能和特点的产品。\n具体的策略：为产品预留升级空间，更新已过时或破损的\n部件；将易损件整合为可一次性替换的模块等。\n\n---\n\n**p056** ![](../008-5月8日授课-第七章环境管理模式/page_056.jpg)\n\n四、产品生态设计\n（4）尽量利用再循环原料及材料\n生态产品设计的一个特点是尽可能利用再循环原料及材料，\n减少原材料在采掘和生产过程中的能耗，最大程度地减少资源消\n耗，降低成本，提高企业经济效益，保护生态环境。企业可以制\n定“回收”计划，对原材料或部件进行再循环。\n\n---\n\n**p057** ![](../008-5月8日授课-第七章环境管理模式/page_057.jpg)\n\n四、产品生态设计\n（5）致力于产品体积的最小化和重量的最轻化\n产品生态设计应致力于产品体积的最小化和质量的最轻化\n以减少原材料及能源的消耗。由于产品质量的减轻，使用的原材\n料减少，相应产生的废物也减少，同时产品运输过程的环境影响\n也减小。产品和其包装体积的减小，使得同一运输工具一次可运\n更多的产品，从而减少能耗和成本。\n总之，产品生态设计减少对外部环境的废物排放，尽可能在\n企业内部乃至整个产业界实现生产一消费和维护一回收一再生产\n的封闭大循环。\n\n---\n\n**p058** ![](../008-5月8日授课-第七章环境管理模式/page_058.jpg)\n\n四、产品生态设计\n3、产品生态管理\n（1）ISO14000环境管理体系是产品生态管理的重要标准\n1993年6月，国际标准化组织（ISO）成立了TC207环境管理\n技术委员会，TC207所制定的国际标准，通称ISO14000系列标准。\nISO14000体系体现了产品生命周期思想，即通过对产品“从摇篮\n到坟墓”的全过程控制，推动全行业乃至全社会环境行为的改善。\nISO14000是一个系列环境管理标准，它包含了面向组织的3项标准：\n环境管理体系（EMS）；环境审核（EA）；环境行为评价（EPE)\n面向环境的3项标准：生命周期评价（LCA）；环境标志（EL）；产\n品标准中的环境指标（EAPS）\n\n---\n\n**p059** ![](../008-5月8日授课-第七章环境管理模式/page_059.jpg)\n\n四、产品生态设计\n产品生态管理\n产品生态管理涉及产业生态领域中产品的设计、生产、销售、\n维护及回收的各个方面，管理方法也不尽相同。以下表典型的例子\n来说明产品生态管理。\n环境问\n公司 管理措施 实例说明\n题\n①废物管理、节能节水、水质控制、室内\n空气质量以及噪声控制等：②重复利用灌装 常见可再循环物品及\n其制成品有：铝（用于制\n产生废 的瓶、布质毛巾和洗衣袋、可洗涤的餐巾\n和可再充电的电池等：③制造商、供应商也 造铝产品，包括罐头），\n物多、 高级纸（用于制作纸盒\n水电等 应保证物品的可再循环性：4建立标准程序\n板、薄纱纸、印刷纸、\n能耗大、 对主要能源和水的消耗设备或环节诸如锅 书写纸、报纸、衬里\n旅馆 炉、制冷机、冷却塔和空调设备进行检\n空气质 纸板、白账薄纸、有\n量低、 测：要使资源（人员、设备、公用设施）的使 色账簿纸、混合办公\n噪声较 用与时间、季节、占有率、天气的变化匹\n纸、其他混合纸等），\n大等 配：采取具体的节能措施例如按实际负荷\n食品和有机材料（可用\n运行制冷机、锅炉、泵和冷却塔设备：按每 于草地与花园的土壤\n日、每周或假日经营来安排采暖、通风和 调节剂\n空调系统等\n\n---\n\n**p060** ![](../008-5月8日授课-第七章环境管理模式/page_060.jpg)\n\n四、产品生态设计\n五、产品环境标志\n1.环境标志概述\n环境标志是一种“证明性商标”，它表\n明该产品不仅质量合格，而且在生产、使用、\n处置过程中符合特定的环境保护要求，与同\n类产品相比，具有低毒少害，节约资源等环\n境优势。环境标志认证指由国家权威机构认\n可的第三方认证机构依据环境标志产品标准\n及有关规定，对产品环境性能及生产过程进 中国环保产品认证\n行确认，并以特定的标志图形予以公告，具\n有高度的客观公正性和可信度。\n\n---\n\n**p061** ![](../008-5月8日授课-第七章环境管理模式/page_061.jpg)\n\n四、产品生态设计\n发展环境标志的最终目的是保护环境，它通过两个具体步骤\n得以实现：一是通过环境标志向消费者传递一个信息，告诉消费\n者哪些产品有益于环境，并引导消费者购买、使用这类产品；二\n是通过消费者的选择和市场竞争，引导企业自觉调整产品结构，\n采用清洁生产工艺，使企业环保行为遵守法律法规，生产对环境\n有益的产品。\n产品环境标志的目标包括：①为消费者提供准确的信息；\n增强消费者的环境意识；③促进销售；④推动生产模式的转变；\n保护环境。\n\n---\n\n**p062** ![](../008-5月8日授课-第七章环境管理模式/page_062.jpg)\n\n四、产品生态设计\n环境标志培养了消费者的环境意识，强化了消费者对有利于\n环境的产品的选择，促进对环境影响较少的产品的开发，达到了\n减少废物、减少生活垃圾、减少污染的目的。\n对于实施环境标志制度带来的成效可从三个方面加以评估：\n①消费者行为的改变程度；②生产者行为的改变程度；③对环境\n的好处。\n实践表明，实施环境标志制度确实可以提高消费者对产品环\n境影响的关注，瑞典第二大零售店对消费者开展了一次民意测验，\n约有85%的顾客表示愿意为环境清洁产品支付较高的价格。\n\n---\n\n**p063** ![](../008-5月8日授课-第七章环境管理模式/page_063.jpg)\n\n四、产品生态设计\n2.产品环境标志类型\n世界上第一个推行环境标志计划的国家是德国，德国的“蓝天使”环境\n标志。加拿大于1988年开始实行环境标志计划。在1989年开始实施的有北\n欧诸国（丹麦、瑞典、挪威、芬兰和冰岛）、日本和美国；奥地利、葡萄牙\n和法国等欧洲国家按计划于1991年实施。1992年有22个经济合作与发展组\n织（OECD）国家参与这一计划。20世纪90年代初进入广大亚洲国家[如中国\n（1994年）等]，同时扩大到了大洋洲国家。\n保保章 台湾 日本 中 Ecomark 印度 GreenCheice 律资 GreenLabel 新加块\n美团 以色列 西蘭 香港\nGrenSal Enviroemt Choice Enviromatt Choice\n\n---\n\n**p064** ![](../008-5月8日授课-第七章环境管理模式/page_064.jpg)\n\n四、产品生态设计\n环境标志计划在不同的国家设计和实施的过程中，出现了不同\n的类型，在ISO14024中将它们分为三类。\n（1）类型I即批准印记型\n这是大多数国家采用的类型，其特点是：①自愿参加；②以准\n则、标准为基础；③包含生命周期的考虑；④有第三方面认证。\n（2）类型工即自我声明型\n其特点在于：①可由制造商、进口商、批发商、零售商或任何\n从中获益的人对产品的环境性能做出自我声明；②这种自我声明可\n在产品上或者在产品的包装上以文字声明、图案、图表等形式来表\n示，也可表示在产品的广告上或者产品名册上；③无需第三方认证。\n\n---\n\n**p065** ![](../008-5月8日授课-第七章环境管理模式/page_065.jpg)\n\n四、产品生态设计\n（3）类型Ⅲ即单项性能认证型\n这些单项性能有：可再循环性、可再\n循环的成分、可再循环的比例，节能、节\n水、减少挥发性有机化合物排放、可持续 环境\n的森林等。目前，美国少数私人认证机构 女\n开展这项工作。由于厂商对它的兴趣有所\nCHINA\n增加，这一类型的标准还有扩大的趋势。\n因此，在ISO14000系列标准中专门为此\n制定了ISO14025标准。\n与世界上大多数国家一样，我国实施\n的环境标志制度属于类型即批准印记型。\n\n---\n\n**p066** ![](../008-5月8日授课-第七章环境管理模式/page_066.jpg)\n\n四、产品生态设计\n3.实施产品环境标志制度的基本方法\n（1)确定授予环境标志的产品类别\n环境标志的产品类别由申请人提出，由主管机构审查确定。分类的\n原则是考虑同类产品应具有相似的使用目的、相当的使用功能并且相互\n间有直接竞争的关系。正确的产品分类对实施标志计划至关重要，不但\n要有充分的科学依据，还要兼顾消费者的利益。一般，优先类别应是针\n对环境危害较大而又有替代的可能、消费者感到重要、工业界乐于支持、\n市场容量大的部分产品。例如，德国产品共分若干个类型，它们是可回\n收利用型、低毒低害物质、低排放型、低噪声型、节水型、节能型、可\n生物降解型及其他类型\n\n---\n\n**p067** ![](../008-5月8日授课-第七章环境管理模式/page_067.jpg)\n\n四、产品生态设计\n(2)确定授予标志的标准和尺度\n通过产品类别后，就要根据这\n些产品生命周期各阶段对环境的影\n响，确定授予标准所应达到的要求。 保护 地球\n确定标准的主要手段是所谓“从摇\n篮到坟墓”的产品生命周期分析。\n确定标准时还应注意标准应该合理\n明确，并采取通过或不通过的方式，\n使申请厂家一目了然，不会劳而无\n功。标准及尺度也要定期修改提高。\n\n---\n\n**p068** ![](../008-5月8日授课-第七章环境管理模式/page_068.jpg)\n\n四、产品生态设计\n（3）制定标准图形\n产品环境标志图形的设计既要简洁\n明快，又要含义丰富；既要显示民族特 环境\n色，又要容易为国外消费者所接受。下\n页为中国I型环境标志图。\n我国的1型环境标志图形于1993年\n发布。它由青山、绿水、太阳和10个 CHI\n环组成。其中心结构表示人类赖以生存\n的环境；外围的10个环紧密结合，环环\n相扣，表示公众参与，共同保护；10个\n环的“环”字与环境的“环”同字，寓\n意为“全民联合起来，共同保护我们赖\n以生存的环境”。\n\n---\n\n**p069** ![](../008-5月8日授课-第七章环境管理模式/page_069.jpg)\n\n四、产品生态设计\n4.环境标志通用原则\n①环境标志及声明必须是准确的、可验证的、具相关性的和非误\n导性的;\n②用于环境标志及声明的程序和要求的制定、采纳和应用不得以\n制造不必要的国际贸易壁垒为目的；\n③环境标志及声明必须以足够严密、科学的方法学为基础，该方\n法足够彻底、全面，从而能够支持所作的声明，并能获得准确和可再\n现的结果;\n④用来支持环境标志及声明的程序、方法学和准则的信息必须具\n有可得性，并可应所有相关方的要求予以提供；\n③环境标志及声明的制定必须考虑产品生命周期的所有相关因素；\n\n---\n\n**p070** ![](../008-5月8日授课-第七章环境管理模式/page_070.jpg)\n\n四、产品生态设计\n环境标志及声明不得阻碍能够保持环境行为或具有改善环境表现潜\n力的革新;\n①任何与环境标志及声明有关的行政要求或信息需求都必须保持在符\n合适用准则和标准所需的限度；\n⑧环境标志及声明的制定过程应是开放的，有相关方参与，在此过程中\n应做出必要的努力以求得共识；\n@购买方和潜在的购买方必须能从使用环境标志或声明的一方获得与\n该环境标志或声明有关的产品和服务的环境因素信息。\n绿色环保标志\n\n---\n\n**p071** ![](../008-5月8日授课-第七章环境管理模式/page_071.jpg)\n\n四、产品生态设计\n5.中国的环境标志制度\n1994年5月17日由国家技术监督局授权国家环境保护局负责设\n立的环境标志产品认证委员会（CCCEL）正式在北京成立，这是代表\n国家对环境标志产品进行认证的唯一的第三方认证机构。我国产品\n环境标志的申请和授予程度比较严格。目前优先开展认证的六类产\n品如下：\n（1)国际履约类：保证我国如期履约，促进各行业CFCs替代，\n保证中国在国际上的声誉。1991年6月，我国签订《蒙特利尔议定\n书》，意味着2000年、2010年分两步替代CFCs制品。\n(2)可再生、回收类：其意义是节约资源、减少垃圾、降低污\n染。这类环境标志产品是各国环境标志产品认证的重点。\n\n---\n\n**p072** ![](../008-5月8日授课-第七章环境管理模式/page_072.jpg)\n\n四、产品生态设计\n③）改善区域环境质量类：主要针对消耗性消费品，特别是使\n用数量巨大，对环境三种介质（水、气、土壤）造成的严重威胁的产\n品。其意义是以市场为导向，为改善区域环境质量提供多种途径。\n（4）改善居室环境质量类：其意义是保护消费者权益，改善居\n室环境质量。主要针对居室环境的两个方面：空气环境和噪声指标。\n（5）保护人体健康类：其意义是推动我国人民生活质量的提高，\n引导消费者逐步淘汰对人体有害的传统产品。\n（6）提高资源、能源利用率类：其意义是节能降耗，提高产品\n的资源、能源综合利用率。\n\n---\n\n**p073** ![](../008-5月8日授课-第七章环境管理模式/page_073.jpg)\n\n四、产品生态设计\n6.中国环境标志国际合作与互认\n中国环境标志开展广泛国际合作，在与国际“生态标志”技术发\n展保持同步的同时，积极开展环境标志互认工作，得到国际社会的高\n度认可。\n在环境标志互认方面：中国环境标志已经并与德国蓝天使、北欧\n白天鹅、日本生态标签、韩国生态标志、澳大利亚环境选择、新西兰\n环境选择、泰国环境标志等国的环境标志机构签订了合作与互认协议。\n在共同标准制订方面：中国环境标志已经与德国蓝天使发布《再\n生鼓粉盒共同标准》，日本生态标签、韩国生态标志发布了《计算机\n共同标准》，目前这两项标准均进入了互认实施阶段。\n\n---\n\n**p074** ![](../008-5月8日授课-第七章环境管理模式/page_074.jpg)\n\n四、产品生态设计\n六、生命周期评价\n1.生命周期评价的定义\n生命周期评价（LCA）是对一\n原料采集\n个产品系统的生命周期中输入、输\n回收/报废 原料加工\n出及其潜在环境影响的汇编和评价。\n产品\n总体核心是：生命周期评价是 产品使用 生命周期 制造\n对贯穿产品生命周期全过程（即所谓\n运输 组装\n从摇篮到坟墓）一从获取原材料、生\n包装\n产、使用直至最终处置一的环境因\n素及其潜在影响的研究。\n\n---\n\n**p075** ![](../008-5月8日授课-第七章环境管理模式/page_075.jpg)\n\n四、产品生态设计\n2.生命周期评价步骤\nISO于1997年6月颁布了ISO14040标准，成为指导企业界进入\nISO14000环境管理体系的一个国际标准。该标准将生命周期评价分\n为互相联系的、不断重复进行的四个步骤：目的与范围确定、清单分\n析、影响评价和结果解释。\n（1）目标与范围的定义\n该阶段是对LCA研究的目标和范围进行界定，是LCA研究中的第\n一步，也是最关键的部分。目标定义主要说明进行LCA的原因和应用\n意图，范围界定则主要描述所研究产品系统的功能单位、系统边界\n数据分配程序、数据要求及原始数据质量要求等。目标与范围定义直\n接决定了LCA研究的深度和广度。鉴于LCA的重复性，可能需要对研\n究范围进行不断的调整和完善。\n\n---\n\n**p076** ![](../008-5月8日授课-第七章环境管理模式/page_076.jpg)\n\n四、产品生态设计\n（2）清单分析\n清单分析是对所研究系统中输入和输出数据建立清单的过程。\n清单分析主要包括数据的收集和计算，以此来量化产品系统中的相\n关输入和输出。首先是根据目标与范围定义阶段所确定的研究范围\n建立生命周期模型，做好数据收集准备。然后进行单元过程数据收\n集，并根据数据收集进行计算汇总得到产品生命周期的清单结果。\n（3）影响评价（核心；难度最大。评价方法和科学体系仍在发展和完\n善，尚没有一种广泛接受的统一方法）\n影响评价的目的是根据清单分析阶段的结果对产品生命周期的\n环境影响进行评价。这一过程将清单数据转化为具体的影响类型和\n指标参数，更便于认识产品生命周期的环境影响。此外，此阶段还\n为生命周期结果解释阶段提供必要的信息。\n\n---\n\n**p077** ![](../008-5月8日授课-第七章环境管理模式/page_077.jpg)\n\n四、产品生态设计\n（4）结果解释\n结果解释是基于清单分析和影响评价的结果识别出产品生命周\n期中的重大问题，并对结果进行评估，包括完整性、敏感性和一致\n性检查，进而给出结论、局限和建议。\n\n---\n\n**p078** ![](../008-5月8日授课-第七章环境管理模式/page_078.jpg)\n\n四、产品生态设计\n3.生命周期评价的应用领域\n应用领域 生命周期评价方法在其中所起的作用\n①通过“从摇篮到坟墓”的分析，识别对环境影响最大的工艺过程\n和产品寿命阶段。\n产品系统的生态\n辨识与诊断 ②评估产品（包括新产品）的资源效益，即对能耗、物耗进行全面\n平衡，一方面降低能耗、物耗从而降低产品成本，另一方面，帮助\n设计人员尽可能采用利于环境的原材料和能源。\n产品环境影响 以环境影响最小化为目标，分析比较某一产品系统内的不同方案或\n评价与比较 者对替代产品（或工艺）进行比较。\n生态产品设计 直接将生命周期评价应用于新产品的开发与设计中。\n与新产品开发\n再循环工艺设计从产品的设计阶段开始就考虑产品用后的拆卸和资源的回收利用。\n其他 政府和环境管理部门还可以借助生命周期评价进行立法、制定环境\n标准以及设立产品生态标志。\n\n---\n\n**p079** ![](../008-5月8日授课-第七章环境管理模式/page_079.jpg)\n\n第三节污染预防环境管理模式的实施\n第三节 污染预防环境管理模式的实施\n、环境规划的时空控制\n环境绩效\n三、环境绩效审计\n四、清洁生产与清洁生产审计\n\n---\n\n**p080** ![](../008-5月8日授课-第七章环境管理模式/page_080.jpg)\n\n一、环境规划的时空控制\n污染预防模式实施过程中的环境规划管理，主要是强调环境规划\n实施的动态控制管理，强调环境管理的计划职能，目的是使环境规划\n实施与管理相结合，使规划目标及其变化方向符合社会经济发展规律\n和生态规律，促进我国环境、经济、社会的可持续发展。\n环境规划实施的动态控制管理主要包括环境规划的空间控制、时\n间控制以及时空耦合的全过程控制。\n坚决打好衫染防治圾坚战\n\n---\n\n**p081** ![](../008-5月8日授课-第七章环境管理模式/page_081.jpg)\n\n一、环境规划的时空控制\n1.环境规划的空间控制\n环境规划实施的全过程是由一个集中控制机构来执行。在\n集中控制基础上，建立相对独立的几个二级机构，对环境规划\n的数量指标、质量指标进行评估和决策。各个相对独立的二级\n控制机构之间通过信息传递与反馈行为实现横向协调控制，环\n境规划的二级控制机构与总控制机构之间通过环境规划信息的\n传递与反馈实现纵向控制，纵向控制最后通过信息交叉反馈，\n实现环境规划实施的动态全过程控制管理。\n\n---\n\n**p082** ![](../008-5月8日授课-第七章环境管理模式/page_082.jpg)\n\n一、环境规划的时空控制\n2.环境规划的时间控制\n环境规划的时间控制是指环境规划信息反馈时间和反馈\n回路控制。其一为闭路控制，指在规划实施管理中具有完整\n反馈回路的时间控制。管理者根据环境规划实施者反馈的情\n报信息，有效控制和改善规划实施过程；其二为规划过程中\n具有不完整反馈回路的半闭路时间控制。由于环境规划实施\n中大量随机因素干扰，用信息反馈适时调节控制；其三为开\n路控制，即环境规划实施管理，不具备反馈回路控制。在环\n境规划的时间控制中，一般采用闭路、半闭路和开路控制信\n息反馈实施协调控制管理。\n\n---\n\n**p083** ![](../008-5月8日授课-第七章环境管理模式/page_083.jpg)\n\n一、环境规划的时空控制\n3.时空偶合的全过程控制\n这里针对环境规划实施\n的空间和时间控制管理无法\n沟通的情况下，在二者之间\n架起一座信息桥梁，通过信\n息反馈、资源共享等协调途\n径，化解时空控制管理的冲\n突，达到环境规划实施的动\n态控制管理。\n\n---\n\n**p084** ![](../008-5月8日授课-第七章环境管理模式/page_084.jpg)\n\n二、环境绩效\n二、环境绩效\n1.环境绩效和环境绩效评估\n环境绩效是指一个组织基于其环境方针、目标、指标，控制其\n环境因素所取得的可测量的环境管理体系成效。环境绩效表示环境\n保护的实际成绩和效果，它与“环境形势”、“环境状况”等词有\n接近之处，但也有区别，环境绩效主要是表示与工作努力程度和工\n作质量有关的实际环境后果。应该说，环境绩效是评定环境政策的\n最终标准。\n\n---\n\n**p085** ![](../008-5月8日授课-第七章环境管理模式/page_085.jpg)\n\n二、环境绩效\n环境绩效评估是由独立的考核机构\n或考核人员，对被考核单位或项目的环境\n管理活动进行综合的、系统的审查、分析，\n并按照一定的标准评定环境管理活动的现\n状和潜力，对提高环境管理绩效提出建议，\n促进其改善环境管理、提高环境管理绩效\n的一种评估活动。\nISO14031环境绩效评估于1999年\n10月正式公告。TC207/SC4的工作小组\n为配合ISO14031环境绩效评估标准的公 KP\n告，也汇整了各国不同组织实施环境绩效\n评估的技术案例，制定了ISO/TR14032\n的环境绩效评估报告。\n\n---\n\n**p086** ![](../008-5月8日授课-第七章环境管理模式/page_086.jpg)\n\n二、环境绩效\n环境绩效评估，是持续对组织环境\n绩效进行量测与评估的一种有系统的程\n序。对象则是针对组织的管理系统、操\n作系统，乃至于其周围的环境状况。\n组织的环境管理绩效为环境绩效评\n估的工作重点，在考量成本效益下，可\n针对其重要的环境参数，建立持续监督\n的系统，并将评估结果与各利害相关者\n加以沟通。这也呼应了环境管理系统持\n续改善的要求与精神。\n\n---\n\n**p087** ![](../008-5月8日授课-第七章环境管理模式/page_087.jpg)\n\n二、环境绩效\n2、环境绩效评估目标、内容和方法\n（1）环境绩效评估目标\n环境绩效评估的目标包括根本目标、\n具体目标和分项目标三个层次。\n根本目标为：改善环境管理，实现\n可持续发展。具体目标可以概括为：对 FOR\n目标\n环境管理各步骤的绩效情况进行考核评\n价，找出影响环境管理绩效的消极因素， BROAOCAST\n提出建设性的考核意见，从而促使环境\n管理工作的高效进行。\n\n---\n\n**p088** ![](../008-5月8日授课-第七章环境管理模式/page_088.jpg)\n\n二、环境绩效\n根据具体内容的不同，进一步地可以将具体目标分解为四类\n分项目标：①评价环境法规政策的科学性和合理性，帮助法规政\n策部门制定更加科学合理的环境法规与制度；②评价环境管理机\n构的设置和工作效率，揭示其影响工作效率的消极因素，提出改\n进建议；③评价环境规划的科学性和合理性，有助于制定更加科\n学合理的环境规划；④评价环境投资项目的经济性、效率性和效\n果性，为改善环境投资提出建设性意见。\n\n---\n\n**p089** ![](../008-5月8日授课-第七章环境管理模式/page_089.jpg)\n\n三、环境绩效审计\n三、环境绩效审计\n1.政府环境政策绩效审计\n政府环境政策绩效审计主要是对政府制定的环境政策，包\n括环境经济政策和环境行政控制政策的效果进行评价。评价时\n只考虑政策本身的实施效果，不考虑执行中的影响因素。\n\n---\n\n**p090** ![](../008-5月8日授课-第七章环境管理模式/page_090.jpg)\n\n三、环境绩效审计\n三、环境绩效审计\n1.政府环境政策绩效审计\n政府环境政策绩效审计主要是对政府制定的环境政策，包\n括环境经济政策和环境行政控制政策的效果进行评价。评价时\n只考虑政策本身的实施效果，不考虑执行中的影响因素。\n\n---\n\n**p091** ![](../008-5月8日授课-第七章环境管理模式/page_091.jpg)\n\n三、环境绩效审计\n2.政府环境项目效益审计\n进行政府环境项目效益审计首先要了解项目的实施背景、目\n标、计划等内容。如果项目被分解为在不同地区、不同阶段实施，\n还要了解项目分解情况。\n在审计资源有限的情况下，应以是否实现项目目标为重点。\n由于政府环境项目的目标很广泛，财务资料不能满足全面效益成\n本分析的需要，审计人员应灵活使用环境估值方法进行计算。\n\n---\n\n**p092** ![](../008-5月8日授课-第七章环境管理模式/page_092.jpg)\n\n三、环境绩效审计\n有些项目还可以使用对比的方\n法，比较项目实施前后的环境质量\n和经济收益。在缺乏被审项目环境\n价值数据时，可以引用其他项目的\n数值来估算，这种方法被称为“效\n益转移法”。引用的数值可以从环\n境管理部门、科研部门，以及国外\n的相关项目取得。不过目前可比的\n数值很少。\n由于环境项目的综合效益不可\n能在短期内完全体现，应对其实施\n跟踪审计。\n\n---\n\n**p093** ![](../008-5月8日授课-第七章环境管理模式/page_093.jpg)\n\n三、环境绩效审计\n3.企业环境绩效审计\n目前已经有许多企业公布其环境绩效报告。因为：\n第一，自愿参加欧共体《环境审计制度》，而负有公布其\n环境绩效的义务。\n第二，出于公共经济责任关系、市场竞争和公众利益，而\n自愿公布其环境绩效。\n从长远来看，法律和法规规定将会成为公布环境绩效报告\n的主要原因。\n\n---\n\n**p094** ![](../008-5月8日授课-第七章环境管理模式/page_094.jpg)\n\n三、环境绩效审计\n环境绩效报告包括以下内容：\n①与组织活动相关的环境法律和法规要求；\n②与组织活动相关的环境因素和对环境的影响；\n③组织的环境管理系统、环境方针和政策；\n④对环境问题计量和披露采用的会计政策；\n③环境目标和指标的定量数据，如散发到空气、土壤和水中\n的废弃物、噪声、废物处理、能源消耗数量、环境事故、环境成\n本（投资和罚金等）和环境收益（能源的节约）等。\n\n---\n\n**p095** ![](../008-5月8日授课-第七章环境管理模式/page_095.jpg)\n\n三、环境绩效审计\n现时环境绩效审计准则虽然\n有很多组织在积极探讨，如国际、\n国际维持发展协会商会、世界工业\n环境委员会和欧共体环境规划委员\n会等，但至今还没有一套公认的准\n则。\n由于环境绩效报告通常要披露\n有害物质的排放量，需要由专门技\n术专家进行符合性测试和实质性测\n试，一般要采取多学科联合审计的\n方式。\n\n---\n\n**p096** ![](../008-5月8日授课-第七章环境管理模式/page_096.jpg)\n\n三、环境绩效审计\n4.我国实施政府环境绩效评估应遵循的原则\n(1)整体性与区域性相结合的原则\n实行政府环境绩效评估，建立科学的评估体系是关键。由于我国地域\n辽阔，地区差别很大，各地资源凛赋和其他条件各不相同，不同层级、不\n同地区的政府绩效指标的设计也要体现其特点。要根据实际情况，以科学\n发展观为指导，建立符合地方各级政府实际的绩效评估指标体系。\n(2)软硬结合原则\n“硬指标”指的是可以量化的指标，“软指标”指难以具体量化的公\n众的满意度。硬指标采取以统计部门上报数据为主要依据的定量测算和评\n估为主，软指标的评估可以通过中介组织的问卷调查等形式获取基本情况\n来进行。\n\n---\n\n**p097** ![](../008-5月8日授课-第七章环境管理模式/page_097.jpg)\n\n三、环境绩效审计\n(3)公开透明原则\n将评估纳入政府日常工作机制，规范工作标准，加强数据\n整合利用，不单独就评估而评估。以指导为主，监督为辅。比\n如采取典型推广、抽样等办法，而不做大范围普查；委托非政\n府机构评估，充分利用外部评估，有些问题可以只公开数据，\n任由外部评估。\n环境绩效评估的结果只是决策需要的数据，不能与公务员\n个人利益直接挂钩。否则，公务员行为就容易以满足评估数据\n为目的，难以避免隐瞒事故、夸大成效的情况。规范评估程序，\n实行评估回避制度。\n\n---\n\n**p098** ![](../008-5月8日授课-第七章环境管理模式/page_098.jpg)\n\n三、环境绩效审计\n（4)公众参与原则\n实行内部评估与外部评估相结合，实行评估主体的多元化\n政府作为最大的公共部门，应接受多种评估主体的评价。形成多\n层次政府绩效评估体系。评估的方向也应该是多向的，包括：\n政府部门的自我评价；②自上而下的评估（组织部门与环保部门参\n加)；③自下而上的评估(公众参与)。\n同时深入开展公民评议活动，将管理和服务对象纳入评估体\n系，为科学的环境绩效评估创造环境和条件。\n\n---\n\n**p099** ![](../008-5月8日授课-第七章环境管理模式/page_099.jpg)\n\n四、清洁生产与清洁生产审计\n四、清洁生产与清洁生产审计\n1.清洁生产\n(1)清洁生产的内涵\n清洁生产是在生产过程、产品寿命和服务领域持续地应用整体预\n防的环境保护战略，增加生态效率，减少对人类和环境的危害。清洁\n生产是一种新的创造性思想，该思想将整体预防的环境战略持续应用\n于生产过程、产品和服务中，以增加生态效率和减少人类及环境的风\n险。\n一对生产过程，节约资源和能源，淘汰有毒有害的原材料和落后\n的工艺及设备，减少所有废弃物的数量、毒性和污染；\n一对产品，要减少产品全生命周期对人类和环境的不利影响；\n一对服务，要将环境因素纳入服务设计和实践中\n\n---\n\n**p100** ![](../008-5月8日授课-第七章环境管理模式/page_100.jpg)\n\n四、清洁生产与清洁生产审计\n清洁生产通过应用专门技术，改进工艺、设备和改变管理态度\n来实现。清洁生产的本质：①“预防为主”的方针；②环境效益与\n经济效益的高度统一；③持续改进：相对的、不断的过程；④系统\n性：防止污染物转移。\n清洁生产实现途：产品替代(毒性、污染)；能源、材料替代(毒\n性、污染)；工艺、设备替代(消耗、效率、污染)； (最大化)提升利\n用限度(能源、原材料、厂内物料循环)；强化管理，减少费(跑、冒、\n滴、漏、物料流失)；控制排放(净化处理、综合利、变废为宝)。\n\n---\n\n**p101** ![](../008-5月8日授课-第七章环境管理模式/page_101.jpg)\n\n四、清洁生产与清洁生产审计\n(2)清洁生产的理论基础\n清洁生产涵盖有深厚的理论基础，\n其实质是最优化理论。在生产过程中，\n物料按平衡原理相互转换，生产过程\n中产生的废弃物越多，则物料消耗就\n越大，废弃物是由物料转化而来的。\n清洁生产实际上是如何满足特定条件\n清洁生产\n下物料消耗最少，产品产出率最高。\n这一问题的理论基础是数学上的最优\n化理论，即废弃物最少量化可表示为\n目标函数，求解在各种约束条件下的\n最优解的问题。\n\n---\n\n**p102** ![](../008-5月8日授课-第七章环境管理模式/page_102.jpg)\n\n四、清洁生产与清洁生产审计\n(3)清洁生产的内容\n清洁的能源：常规能源的清洁利用；可再生能源的利用；新能\n源的开发；各种节能技术等。\n清洁的生产过程：不用、少用有毒的原料和辅助材料；无废、\n少废的工艺；无污染的高效设备；无毒、低毒的中间产品；减少生\n产过程中的各种危险因素；节约资源，少用昂贵和稀有资源；物料\n的再循环利用；利用二次资源作原材料；完善的管理等。\n清洁的产品：在贮运、使用中和使用后无危害人体健康和生态\n环境的产品；合理使用其功能和寿命期；合理包装；易于回收、复\n用和再生；易降解、易处置等。\n清洁的服务：在一切服务中都要贯彻清洁生产的思想和要求\n\n---\n\n**p103** ![](../008-5月8日授课-第七章环境管理模式/page_103.jpg)\n\n四、清洁生产与清洁生产审计\n2.清洁生产审计\n清洁生产审计，是对组织现存的和计划进行的生产、服务以及相关\n活动中，污染来源、废物产生原因以及整体解决方案，进行持续的、系\n统的、规范的分析、评估、策划、实施、保持和改进的过程(程序)。\n清洁生产审计是组织进行清洁生产的重要前提，也是其关键和核心。\n旨在不断寻求、制定、实施能够低费高效地减少能源、水、原材料的使\n用，消除和/或减少产品、过程中有毒物质的使用，减少各种废弃物排放\n及其毒性，提高资源利用效率的方案，从而持续改进组织的环境。\n（1)清洁生产审计的目的和特点\n通过清洁生产审计判定生产过程中不合理的废物流和物、能耗，分\n析其原因，提出削减方案并组织实施，从而减少废弃物的产生和排放\n达到实现本轮清洁生产目标。\n\n---\n\n**p104** ![](../008-5月8日授课-第七章环境管理模式/page_104.jpg)\n\n四、清洁生产与清洁生产审计\n清洁生产审计具有以下特点：\n①鲜明的目的性。它的目的是消除、减少废弃物的产生，它特别强调节\n能、减耗、减污的一致；\n②完整的系统性。以生产过程为主体，考虑到影响废弃物产生的各个方\n面设计一套发现问题、分析问题、解决问题、持续实施的完整体系；\n③突出预防性。针对“末端治理”，特别强调要在生产全过程和产品生\n命周期及服务范畴中做到预防污染。这一思想贯穿于审计的全过程；\n④符合经济性。生产全过程各个环节都从预防出发减少废弃物的产生，\n提高生产效率，降低成本，多出产品，少用资源、能源，减少末端治理\n的投资和运行费用；\n③强调持续性。无论是审计重点选择，还是方案滚动实施均体现了从点\n到面、逐步改进的持续性原则；\n\n---\n\n**p105** ![](../008-5月8日授课-第七章环境管理模式/page_105.jpg)\n\n四、清洁生产与清洁生产审计\n注重可操作性。每一个步骤均能与企业的实际情况相结合。\n在审计程序上是规范的，在方案实施上是灵活的，当企业的\n经济等条件有限时，可先实施无、低费方案，积累资金创造\n条件，逐步实施中、高费方案。\nGREEN\n\n---\n\n**p106** ![](../008-5月8日授课-第七章环境管理模式/page_106.jpg)\n\n作业\n1.何谓末端控制？其主要特征是什么？\n2.我国在计划经济体制下形成的以污染物“末端处理\n为主要特征的行政控制手段与发达国家的“命令-控制”\n措施有无显著区别，若有显著区别，具体表现在哪些方面？\n3.试客观评价末端控制传统环境管理模式实践的作用。\n4.何谓污染预防，它与末端控制的根本区别是什么？\n5.实施污染预防环境管理模式的主要途径有哪些？\n6.污染预防环境管理模式的基本内容有哪些？\n7.污染预防环境管理模式实施中可能存在的困难有哪些？\n8.何谓目标管理？并简述其基本思想、特点及实施步骤。\n\n---\n\n<\/details>\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境管理模式\n## 核心概念\n- 末端控制（传统管理模式）\n- 末端控制的弊端\n- 污染预防（现代管理模式）\n- 源削减\n- 循环经济\n- 产品生态设计（绿色设计/生命周期设计）\n- 清洁生产\n- 清洁生产审计\n- 环境绩效与环境绩效审计\n## 关键公式 / 模型\n- 3R 原则（Reduce/Reuse/Recycle）\n- 清洁生产审计程序\n- 生命周期评价（LCA）\n## 高频考点\n- 末端控制模式的建立、实践与弊端\n- 污染预防模式的内涵与优势（对比末端控制）\n- 源削减的途径\n- 循环经济 3R 原则\n- 产品生态设计与生命周期思想\n- 清洁生产的定义与清洁生产审计程序\n- 环境绩效审计的内容\n- 两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境管理模式))\n    核心概念\n      末端控制（传统管理模式）\n      末端控制的弊端\n      污染预防（现代管理模式）\n      源削减\n      循环经济\n      产品生态设计（绿色设计/生命周期设计）\n      清洁生产\n      清洁生产审计\n      环境绩效与环境绩效审计\n    关键公式 / 模型\n      3R 原则（Reduce/Reuse/Recycle）\n      清洁生产审计程序\n      生命周期评价（LCA）\n    高频考点\n      末端控制模式的建立、实践与弊端\n      污染预防模式的内涵与优势（对比末端控制）\n      源削减的途径\n      循环经济 3R 原则\n      产品生态设计与生命周期思想\n      清洁生产的定义与清洁生产审计程序\n      环境绩效审计的内容\n      两种管理模式的根本区别（被动治理 vs 主动预防）\n```\n\n## 复习要点 · LLM 协填\n\n### 一、核心概念\n\n- **末端控制（传统管理模式）**：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n- **末端控制的弊端**：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n- **污染预防（现代管理模式）**：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n- **源削减**：在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n- **循环经济**：遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n- **产品生态设计（绿色设计/生命周期设计）**：在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n- **清洁生产**：对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n- **清洁生产审计**：系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n- **环境绩效与环境绩效审计**：对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `3R 原则（Reduce/Reuse/Recycle）` | 循环经济减量化、再利用、再循环 |\n| `清洁生产审计程序` | 筹划组织→预评估→评估→方案产生与筛选→实施→持续改进 |\n| `生命周期评价（LCA）` | 对产品全生命周期的资源消耗与环境影响进行评价 |\n\n### 三、重要案例 / 例题\n\n- 某企业清洁生产审计削减物耗、能耗与污染物排放。\n- 生态工业园（循环经济园区）内企业间的物质循环利用。\n- 产品生态设计降低产品全生命周期的资源消耗与排放。\n\n### 四、高频考点（速记）\n\n1. 末端控制模式的建立、实践与弊端\n2. 污染预防模式的内涵与优势（对比末端控制）\n3. 源削减的途径\n4. 循环经济 3R 原则\n5. 产品生态设计与生命周期思想\n6. 清洁生产的定义与清洁生产审计程序\n7. 环境绩效审计的内容\n8. 两种管理模式的根本区别（被动治理 vs 主动预防）\n\n### 五、思考题 / 自测\n\n- **Q**：末端控制与污染预防的根本区别是什么？\n  **A**：末端控制在污染产生后被动治理（先污染后治理）；污染预防从源头与全过程主动减少污染产生（预防为主），后者更经济高效且能避免污染转移。\n\n- **Q**：循环经济的 3R 原则指什么？\n  **A**：减量化（Reduce）、再利用（Reuse）、再循环（Recycle），实现资源高效利用与物质闭路循环。\n\n- **Q**：清洁生产审计的核心目的是什么？\n  **A**：通过系统审查生产全过程，识别物耗能耗高、污染重的环节，提出并实施削减方案，实现源头预防与生态效率提升。\n\n\n### 六、与前后章之关联\n\n- **承前**：是第 5 章决策/审计方法与第 6 章要素规划在管理制度层面的落实。\n- **启后**：全书收尾，构建规划—实施—绩效—持续改进的环境管理闭环。\n\n"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 环境规划与管理 · 期末复习骨架\n\n> 教师: 王思雨 · 学期: 2026春\n> 共 11 PDF · 1207 页 · 6 章节\n> 已填复习要点：6/6 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 绪论 | 绪论-环境规划与管理 | 129 | [_第00章_绪论-环境规划与管理.md](./_第00章_绪论-环境规划与管理.md) |\n| 第 2 章 | 绪论-环境规划与管理 | 129 | [_第02章_绪论-环境规划与管理.md](./_第02章_绪论-环境规划与管理.md) |\n| 第 4 章 | 环境规划与管理中的综合分析方法 | 135 | [_第04章_环境规划与管理中的综合分析方法.md](./_第04章_环境规划与管理中的综合分析方法.md) |\n| 第 5 章 | 环境规划的基本内容和程序 | 126 | [_第05章_环境规划的基本内容和程序.md](./_第05章_环境规划的基本内容和程序.md) |\n| 第 6 章 | 环境规划 | 115 | [_第06章_环境规划.md](./_第06章_环境规划.md) |\n| 第 7 章 | 环境管理模式 | 106 | [_第07章_环境管理模式.md](./_第07章_环境管理模式.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 740，密度 **厚**，建议复习期 10-14 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 绪论 · 绪论-环境规划与管理\n\n> 主版 129 页 · 第 2 节 · [详细素材](./_第00章_绪论-环境规划与管理.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 环境管理：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作；[x] 环境规划：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案；[x] 环境容量：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- **怎么算** ── 环境容量：M = K + R（K=稀释容量，R=自净容量）；环境承载力：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向；环境承载力指标体系：资源供给指标+社会影响指标+污染容纳指标\n- **考什么** ── 环境规划与管理五要素：人、物、资金、信息、时空；环境管理五大手段：行政、法律、经济、技术、宣传教育；环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 2 章 · 绪论-环境规划与管理\n\n> 主版 129 页 · 第 2 节 · [详细素材](./_第02章_绪论-环境规划与管理.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 环境管理：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作；[x] 环境规划：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案；[x] 环境容量：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n- **怎么算** ── 环境容量：M = K + R（K=稀释容量，R=自净容量）；环境承载力：EBC = f(T, S, B)，T=时间，S=空间，B=人类经济行为的规模与方向；环境承载力指标体系：资源供给指标+社会影响指标+污染容纳指标\n- **考什么** ── 环境规划与管理五要素：人、物、资金、信息、时空；环境管理五大手段：行政、法律、经济、技术、宣传教育；环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 环境规划与管理中的综合分析方法\n\n> 主版 135 页 · 第 4 节 · [详细素材](./_第04章_环境规划与管理中的综合分析方法.md)\n\n**核心三问**：\n\n- **是什么** ── [x] 环境现状调查：掌握和了解某区域环境现状，发现和识别主要环境问题，确定主要污染源和主要污染物，为环境规划与管理的制定和实施创造条件；[x] 环境评价：对被评价对象的优劣、好坏作定量或定性描述，一般以定量为主；含自然环境评价、社会经济评价、环境质量评价和污染源评价4方面；[x] 等标污染负荷：将不同种类、不同量纲的污染物排放量标准化处理的方法，Pᵢ=Cᵢ/C₀ᵢ×Qᵢ\n- **怎么算** ── 环境质量指数：Iᵢ = Cᵢ/C₀ᵢ（监测值/标准值）；等标污染负荷（废水）：Pᵢ = (Cᵢ/C₀ᵢ)×Qᵢ；Cᵢ=实测浓度(mg/L)，Qᵢ=废水排放量(m³/d)；等标污染负荷（废气）：Pᵢ = (Cᵢ/C₀ᵢ)×qᵢ；qᵢ=废气介质排放流量(m³/d)\n- **考什么** ── 环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）；环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状；环境评价四方面：自然环境、社会经济、环境质量、污染源评价\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 5 章 · 环境规划的基本内容和程序\n\n> 主版 126 页 · 第 6 节 · [详细素材](./_第05章_环境规划的基本内容和程序.md)\n\n**核心三问**：\n\n- **是什么** ── 环境现状调查：调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*；环境现状调查方法：收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*；环境评价：对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法；等标污染负荷法识别主要污染源与污染物；环境统计的内容与指标体系\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 6 章 · 环境规划\n\n> 主版 115 页 · 第 7 节 · [详细素材](./_第06章_环境规划.md)\n\n**核心三问**：\n\n- **是什么** ── 大气环境规划：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*；大气污染物总量控制（A 值法/P 值法）：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*；水环境功能区划：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 大气环境规划的内容与类型；大气污染物总量控制方法（A 值/P 值）；水环境功能区划与水环境容量概念及计算\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 7 章 · 环境管理模式\n\n> 主版 106 页 · 第 8 节 · [详细素材](./_第07章_环境管理模式.md)\n\n**核心三问**：\n\n- **是什么** ── 末端控制（传统管理模式）：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*；末端控制的弊端：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*；污染预防（现代管理模式）：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 末端控制模式的建立、实践与弊端；污染预防模式的内涵与优势（对比末端控制）；源削减的途径\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 四 · 章际交叉（同一课件涉两章）\n\n- 绪论  ⇄  第 2 章\n- 第 4 章  ⇄  第 5 章\n- 第 5 章  ⇄  第 6 章\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 绪论 · 绪论-环境规划与管理\n- [ ] 第 2 章 · 绪论-环境规划与管理\n- [ ] 第 4 章 · 环境规划与管理中的综合分析方法\n- [ ] 第 5 章 · 环境规划的基本内容和程序\n- [ ] 第 6 章 · 环境规划\n- [ ] 第 7 章 · 环境管理模式\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练\n"}, {"id": "exam-期末速查", "group": "期末冲刺", "title": "期末速查", "md": "# 环境规划与管理 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸  题）\n\n**1.** 环境规划的根本目的是\n  - A. 限制一切经济发展\n  - B. 协调经济社会发展与环境保护的关系，实现可持续发展\n  - C. 仅治理已有污染\n  - D. 增加政府收入\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：环境规划是实现经济、社会与环境协调发展的前置性、综合性手段。\n\n<\/details>\n\n**2.** 下列属于环境规划基本特征的是\n  - A. 整体性、综合性、区域性、动态性\n  - B. 单一性\n  - C. 临时性\n  - D. 与经济无关\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：环境规划具有整体综合、区域差异与动态调整等特征。\n\n<\/details>\n\n**3.** 环境承载力是指\n  - A. 环境的面积\n  - B. 在一定时空与目标下，环境系统所能承受的人类活动的阈值\n  - C. 污染物的总量\n  - D. 人口数量\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：环境承载力是规划确定开发强度与总量控制的科学依据。\n\n<\/details>\n\n**4.** 污染物总量控制的核心思想是\n  - A. 只控制浓度\n  - B. 在浓度达标基础上控制排入环境的污染物总量\n  - C. 不限制排放\n  - D. 仅控制企业数量\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：总量控制弥补浓度控制在容量超载时的不足。\n\n<\/details>\n\n**5.** 环境功能区划的主要作用是\n  - A. 为不同区域确定相应的环境质量目标与管理要求\n  - B. 划定行政边界\n  - C. 确定土地价格\n  - D. 统计人口\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：功能区划是分区分类管理与目标确定的基础。\n\n<\/details>\n\n**6.** 下列哪项是环境规划中常用的预测方法\n  - A. 趋势外推、弹性系数、投入产出、情景分析\n  - B. 仅靠经验\n  - C. 抽签\n  - D. 民意投票\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：社会经济与污染负荷预测多用定量与情景结合的方法。\n\n<\/details>\n\n**7.** 我国环境管理的三大政策是\n  - A. 预防为主防治结合、谁污染谁治理、强化环境管理\n  - B. 先污染后治理\n  - C. 末端治理为主\n  - D. 自由排放\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：三大政策是我国环境管理体系的基石。\n\n<\/details>\n\n**8.** 环境管理的八项制度中不包括\n  - A. 环境影响评价制度\n  - B. 三同时制度\n  - C. 排污收费制度\n  - D. 计划生育制度\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**D**  　解析：八项制度围绕环境保护，计划生育不属其中。\n\n<\/details>\n\n**9.** “三同时”制度是指建设项目的环保设施应与主体工程\n  - A. 同时设计、同时施工、同时投产使用\n  - B. 同时审批\n  - C. 同时拆除\n  - D. 同时收费\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：三同时是预防新污染源产生的重要制度。\n\n<\/details>\n\n**10.** 环境规划方案优选常用的方法是\n  - A. 费用效益分析、多目标决策、层次分析法\n  - B. 随机选择\n  - C. 仅看投资额\n  - D. 先到先得\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：方案比选需综合经济、环境、技术多目标权衡。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 环境规划按对象可分为污染综合防治规划、___规划和生态规划等。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**自然资源保护（生态保护）**\n\n<\/details>\n\n**2.** 环境规划编制的一般程序包括：现状调查与评价、___、目标与指标确定、方案设计与优选、实施与管理。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**预测（趋势与负荷预测）**\n\n<\/details>\n\n**3.** 在浓度控制基础上控制排入环境污染物总量的制度称为 ___ 控制。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**总量**\n\n<\/details>\n\n**4.** 环境质量现状评价中，用以表征环境质量优劣的综合数值称为环境质量 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**指数**\n\n<\/details>\n\n**5.** 环境管理按管理范围可分为区域环境管理、部门环境管理和 ___ 环境管理。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**资源（自然资源）**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 环境规划\n\n<details><summary>📝 参考答案<\/summary>\n\n答：为协调经济社会发展与环境保护、合理利用环境资源，运用科学方法对一定时期、一定区域内的环境保护活动作出的预先安排和部署，是带有指导性、约束性的综合方案。\n\n<\/details>\n\n**2.** 环境承载力\n\n<details><summary>📝 参考答案<\/summary>\n\n答：在一定时间、空间和环境目标约束下，环境系统在维持自身结构与功能稳定的前提下，所能承受的人类社会经济活动的最大限度，是确定开发强度与总量控制的依据。\n\n<\/details>\n\n**3.** 环境功能区划\n\n<details><summary>📝 参考答案<\/summary>\n\n答：根据自然条件、环境质量现状、社会经济发展与环境功能要求，将区域划分为不同类型与等级的环境功能区，并赋予相应环境质量目标与管理要求的工作。\n\n<\/details>\n\n**4.** 总量控制\n\n<details><summary>📝 参考答案<\/summary>\n\n答：在污染物浓度达标的基础上，依据环境容量或目标，对一定区域内排入环境的污染物排放总量加以核定与控制的环境管理方式。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述环境规划编制的一般工作程序。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①环境现状调查与评价；②社会经济发展与环境污染负荷预测；③确定环境目标与指标体系；④功能区划与环境容量/承载力分析；⑤规划方案设计与多目标优选；⑥实施保障措施与跟踪管理评估。\n\n<\/details>\n\n**2.** 简述浓度控制与总量控制的区别与联系。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：浓度控制规定排放口污染物浓度限值，简单易行但在排放源密集、环境容量超载时难以保证环境质量达标；总量控制在浓度达标基础上限定区域排放总量，与环境容量挂钩，更能保障环境目标。二者相辅相成，总量控制是浓度控制的发展与补充。\n\n<\/details>\n\n**3.** 简述我国环境管理的三大政策及其含义。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①预防为主、防治结合：把污染控制在产生之前；②谁污染谁治理（污染者负担）：明确治理与经济责任；③强化环境管理：以制度与监督提高管理效能、弥补资金技术不足。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试论环境承载力与环境功能区划在区域环境规划中的作用，并说明二者如何共同支撑总量控制的实施。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①环境承载力刻画区域环境系统可承受的人类活动阈值，为确定开发强度、污染物允许排放总量提供科学上限；②环境功能区划依自然与社会条件将区域分区分类，赋予各区差异化的环境质量目标与管理要求，使规划目标空间落地；③总量控制以功能区目标确定各区允许的环境质量，进而由环境容量（承载力的具体体现）反算允许排放总量，并在区内各污染源间分配削减指标；④三者构成“目标—容量—总量—分配”的闭环：功能区划定目标，承载力/容量定上限，总量控制定排放并落实到源，最终实现区域环境质量达标与可持续发展。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "study-00", "group": "学习系统", "title": "00 备考总纲", "md": "# 环境规划与管理 · 期末备考总纲\n\n> 教师：王思雨 · 学期：2026春\n> 生成于 2026-06-12 · 目标考试日 **2026-07-03**（共 21 天）\n> 章数：6 · 已填要点：6 章\n\n> *为学者日益，闻道者日损。* —— 复习非求多读，而求记牢；记牢之法，已有实证。\n\n---\n\n## 一 · 复习之道（实证为据）\n\n> 据 Dunlosky et al. 2013（《Psychological Science in the Public Interest》）与 Carpenter, Pan & Butler 2022（《Nature Reviews Psychology》）：\n\n| 技法 | 效用 | 怎么做 |\n|---|---|---|\n| **提取练习**（自测/默写） | **高** | 合上书，先答 `自测题库.md`，再对照——别只重读 |\n| **间隔重复**（分散练习） | **高** | 按下方日历，隔日/隔周回提取，别考前突击一次 |\n| 交错练习 | 中 | 按下方“交错刷题序”混章做题，别一章刷到底 |\n| 自我解释 / 追问“为什么” | 中 | 每个考点问自己“为什么成立、与上一章何关” |\n| 双重编码（图像） | 中 | 看/画每章思维导图，文字配图记 |\n| 高亮 · 重读 · 摘抄 | **低** | 感觉努力实则低效，不作为主手段 |\n\n## 二 · 三段备考（先懂 → 后测 → 终模考）\n\n- **一轮·通读理解**（2026-06-12 → 2026-06-22 · 11 天）：逐章通读图文 + 画/看思维导图，求懂而非背\n- **二轮·提取自测**（2026-06-23 → 2026-06-29 · 7 天）：闭卷做自测题与填空卡，错题标记\n- **三轮·模考查漏**（2026-06-30 → 2026-07-03 · 4 天）：限时模拟卷 + 错点专项 + 易错点重背\n\n## 三 · 间隔重复日历（首学 + 1/3/7/14 天回提取）\n\n| 日期 | 当日任务 |\n|---|---|\n| 2026-06-12 | 📖 首学：绪论 绪论-环境规划与管理 |\n| 2026-06-13 | 🔁 提取复习：绪论 绪论-环境规划与管理 |\n| 2026-06-14 | 📖 首学：第 2 章 绪论-环境规划与管理 |\n| 2026-06-15 | 🔁 提取复习：绪论 绪论-环境规划与管理<br>🔁 提取复习：第 2 章 绪论-环境规划与管理<br>📖 首学：第 4 章 环境规划与管理中的综合分析方法 |\n| 2026-06-16 | 🔁 提取复习：第 4 章 环境规划与管理中的综合分析方法 |\n| 2026-06-17 | 🔁 提取复习：第 2 章 绪论-环境规划与管理<br>📖 首学：第 5 章 环境规划的基本内容和程序 |\n| 2026-06-18 | 🔁 提取复习：第 4 章 环境规划与管理中的综合分析方法<br>🔁 提取复习：第 5 章 环境规划的基本内容和程序 |\n| 2026-06-19 | 🔁 提取复习：绪论 绪论-环境规划与管理<br>📖 首学：第 6 章 环境规划 |\n| 2026-06-20 | 🔁 提取复习：第 5 章 环境规划的基本内容和程序<br>🔁 提取复习：第 6 章 环境规划<br>📖 首学：第 7 章 环境管理模式 |\n| 2026-06-21 | 🔁 提取复习：第 2 章 绪论-环境规划与管理<br>🔁 提取复习：第 7 章 环境管理模式 |\n| 2026-06-22 | 🔁 提取复习：第 4 章 环境规划与管理中的综合分析方法<br>🔁 提取复习：第 6 章 环境规划 |\n| 2026-06-23 | 🔁 提取复习：第 7 章 环境管理模式 |\n| 2026-06-24 | 🔁 提取复习：第 5 章 环境规划的基本内容和程序 |\n| 2026-06-26 | 🔁 提取复习：绪论 绪论-环境规划与管理<br>🔁 提取复习：第 6 章 环境规划 |\n| 2026-06-27 | 🔁 提取复习：第 7 章 环境管理模式 |\n| 2026-06-28 | 🔁 提取复习：第 2 章 绪论-环境规划与管理 |\n| 2026-06-29 | 🔁 提取复习：第 4 章 环境规划与管理中的综合分析方法 |\n| 2026-07-01 | 🔁 提取复习：第 5 章 环境规划的基本内容和程序 |\n| 2026-07-02 | 🔁 提取复习：第 7 章 环境管理模式 |\n| 2026-07-03 | 🔁 提取复习：第 6 章 环境规划 |\n\n> 📖 = 首次学习（求懂）；🔁 = 闭卷提取复习（求牢）。错过某日，顺延即可，勿弃。\n\n## 四 · 交错刷题序（三轮 · 混章不连刷）\n\n1. 绪论 绪论-环境规划与管理 → 第 2 章 绪论-环境规划与管理 → 第 4 章 环境规划与管理中的综合分析方法 → 第 5 章 环境规划的基本内容和程序 → 第 6 章 环境规划 → 第 7 章 环境管理模式\n2. 第 2 章 绪论-环境规划与管理 → 第 4 章 环境规划与管理中的综合分析方法 → 第 5 章 环境规划的基本内容和程序 → 第 6 章 环境规划 → 第 7 章 环境管理模式 → 绪论 绪论-环境规划与管理\n3. 第 4 章 环境规划与管理中的综合分析方法 → 第 5 章 环境规划的基本内容和程序 → 第 6 章 环境规划 → 第 7 章 环境管理模式 → 绪论 绪论-环境规划与管理 → 第 2 章 绪论-环境规划与管理\n\n## 五 · 每日提取清单（贴在桌前）\n\n- [ ] 今日“首学”章：通读图文 + 看思维导图（求懂）\n- [ ] 今日“回提取”章：**闭卷**做 `自测题库.md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表\n"}, {"id": "study-a7ba9845", "group": "学习系统", "title": "自测题库", "md": "# 环境规划与管理 · 自测题库（闭卷提取）\n\n> 共 126 道结构化提取题（不含思考题与脚手架）。\n\n> **用法**：先合上书答，再展开“参考答案”对照。**提取**比重读有效得多。\n> 答错/卡壳处，回 `_综合复习资料.md` 对应章精看，并标入次日复习。\n\n---\n\n## 绪论 · 绪论-环境规划与管理\n\n**Q1（名词解释）** 环境管理？\n\n<details><summary>参考答案<\/summary>\n\n协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n\n<\/details>\n\n**Q2（名词解释）** 环境规划？\n\n<details><summary>参考答案<\/summary>\n\n国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n\n<\/details>\n\n**Q3（名词解释）** 环境容量？\n\n<details><summary>参考答案<\/summary>\n\n某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n\n<\/details>\n\n**Q4（名词解释）** 环境承载力？\n\n<details><summary>参考答案<\/summary>\n\n不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n\n<\/details>\n\n**Q5（名词解释）** 可持续发展？\n\n<details><summary>参考答案<\/summary>\n\n既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n\n<\/details>\n\n**Q6（名词解释）** 两山论？\n\n<details><summary>参考答案<\/summary>\n\n绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n\n<\/details>\n\n**Q7（名词解释）** 复合生态系统？\n\n<details><summary>参考答案<\/summary>\n\n自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n\n<\/details>\n\n**Q8（名词解释）** 工业生态学？\n\n<details><summary>参考答案<\/summary>\n\n研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n\n<\/details>\n\n**Q9（名词解释）** 生态工业园？\n\n<details><summary>参考答案<\/summary>\n\n制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n\n<\/details>\n\n**Q10（名词解释）** 环境经济学？\n\n<details><summary>参考答案<\/summary>\n\n研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：环境规划与管理五要素：人、物、资金、信息、时空\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境规划与管理五要素：人、物、资金、信息、时空\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境管理五大手段：行政、法律、经济、技术、宣传教育\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境管理五大手段：行政、法律、经济、技术、宣传教育\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n\n<\/details>\n\n**Q18（考点·闭卷默 \n从若干可能策略中选取最好策略的过程；具有多目标性、长期性、不确定性、方案多样性、一次性等特点\n\n<\/details>\n\n**Q7（名词解释）** 环境审计？\n\n<details><summary>参考答案<\/summary>\n\n对特定项目环保情况进行系统的、有文字记录的、定期的、客观的评定\n\n<\/details>\n\n**Q8（名词解释）** EMIS？\n\n<details><summary>参考答案<\/summary>\n\n以现代数据库技术为核心，实现环境信息输入输出修改删除传输检索计算等操作的技术工程系统\n\n<\/details>\n\n**Q9（名词解释）** EDSS？\n\n<details><summary>参考答案<\/summary>\n\n将决策支持系统引入环境规划管理决策，对结构化/未结构化问题进行描述组织，协助完成管理决策\n\n<\/details>\n\n**Q10（名词解释）** 德尔菲法？\n\n<details><summary>参考答案<\/summary>\n\n又称\"专家调查法\"，以无记名方式数轮函询征求专家意见，具不具名、反馈性、统计性特点\n\n<\/details>\n\n**Q11（名词解释）** 层次分析法（AHP）？\n\n<details><summary>参考答案<\/summary>\n\n用递阶层次结构和矩阵方程将思维过程数学化，1~9标度构造判断矩阵，求特征向量得权重\n\n<\/details>\n\n**Q12（名词解释）** 清洁生产审计？\n\n<details><summary>参考答案<\/summary>\n\n对产品生产全过程重点环节污染定量监测，找高物耗高能耗高污染原因，提出对策减少污染物产生\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境现状调查三方法：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境现状调查六内容：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：环境评价四方面：自然环境、社会经济、环境质量、污染源评价\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境评价四方面：自然环境、社会经济、环境质量、污染源评价\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：自然环境评价八法：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：自然环境评价八法：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：污染源评价三法：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：污染源评价三法：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：环境统计指标体系七子系统：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境统计指标体系七子系统：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n\n<\/details>\n\n**Q19（考点·闭 型库、知识库、人机交互界面、决策分析模块\n\n<\/details>\n\n**Q30（考点·闭卷默写）** 请展开论述：EMIS设计四阶段：可行性研究→系统分析→系统设计→实施与评价\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：EMIS设计四阶段：可行性研究→系统分析→系统设计→实施与评价\n\n<\/details>\n\n**Q31（考点·闭卷默写）** 请展开论述：EMIS设计七原则：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：EMIS设计七原则：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- 题：环境现状调查三种方法优缺点？ 答：①收集资料法—范围广省人力但仅二手不全面；②现场调查法—第一手数据但工作量大受条件限；③遥感法—远距离综合探测技术要求高\n- 题：等标污染负荷法如何确定主要污染源？ 答：按等标污染负荷排序，计算累计百分比，累计>80%的污染源为主要污染源\n- 题：乐观准则vs悲观准则vs折衷准则？ 答：乐观=大中取大（冒险）；悲观=小中取大（保守/Wald准则）；折衷=α·max+(1-α)·min（α=0为悲观，α=1为乐观）\n- 题：风险型决策与不确定型决策区别？ 答：风险型—各自然状态概率可预先估计计算；不确定型—各状态概率一无所知，靠主观倾向决策\n- 题：EMIS与EDSS区别？ 答：EMIS侧重信息存储检索和模型加工，是数据库+应用软件系统；EDSS侧重对结构化/未结构化问题提供决策支持，含数据库+模型库+知识库+决策分析模块\n\n<\/details>\n\n## 第 5 章 · 环境规划的基本内容和程序\n\n**Q1（名词解释）** 环境现状调查？\n\n<details><summary>参考答案<\/summary>\n\n调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*\n\n<\/details>\n\n**Q2（名词解释）** 环境现状调查方法？\n\n<details><summary>参考答案<\/summary>\n\n收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*\n\n<\/details>\n\n**Q3（名词解释）** 环境评价？\n\n<details><summary>参考答案<\/summary>\n\n对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n\n<\/details>\n\n**Q4（名词解释）** 等标污染负荷法？\n\n<details><summary>参考答案<\/summary>\n\n以污染物排放量除以其评价标准 Pᵢ=Qᵢ/C₀ᵢ，识别主要污染源与主要污染物。  *（要：按 P 值大小排序）*\n\n<\/details>\n\n**Q5（名词解释）** 环境统计？\n\n<details><summary>参考答案<\/summary>\n\n用统计方法收集、整理、分析环境数据，反映环境状况与保护工作的活动。  *（要：有固定的指标体系与上报流程）*\n\n<\/details>\n\n**Q6（名词解释）** 社会经济预测？\n\n<details><summary>参考答案<\/summary>\n\n对人口、经济发展、能源消耗等进行预测（弹性系数法、回归分析法、灰色预测）。  *（要：规划情景设定的依据）*\n\n<\/details>\n\n**Q7（名词解释）** 环境预测？\n\n<details><summary>参考答案<\/summary>\n\n把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n\n<\/details>\n\n**Q8（名词解释）** 德尔菲法？\n\n<details><summary>参考答案<\/summary>\n\n匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n\n<\/details>\n\n**Q9（名词解释）** 决策分析？\n\n<details><summary>参考答案<\/summary>\n\n在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n\n<\/details>\n\n**Q10（名词解释）** 环境审计？\n\n<details><summary>参考答案<\/summary>\n\n对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n\n<\/details>\n\n**Q11（名词解释）** 环境管理信息系统（EMIS）与环境决策支持系统（EDSS）？\n\n<details><summary>参考答案<\/summary>\n\n对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境现状调查的内容（自然/社会经济/污染源/环境质量）与方法\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：等标污染负荷法识别主要污染源与污染物\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：等标污染负荷法识别主要污染源与污染物\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：环境统计的内容与指标体系\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境统计的内容与指标体系\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：社会经济预测方法（人口、能源弹性系数/回归/灰色）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：社会经济预测方法（人口、能源弹性系数/回归/灰色）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：环境预测的定性与定量方法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境预测的定性与定量方法\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：德尔菲法的特点与步骤\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：德尔菲法的特点与步骤\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：五种非确定型决策准则及计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：五种非确定型决策准则及计算\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：环境审计的内容与方法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境审计的内容与方法\n\n<\/details>\n\n**Q20（考点·闭卷默写）** 请展开论述：EMIS 与 EDSS 的功能与组成\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：EMIS 与 EDSS 的功能与组成\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：等标污染负荷法如何确定主要污染源？\n  **A**：分别计算各源各污染物的等标污染负荷 Pᵢ=Qᵢ/C₀ᵢ 并求和，按 P 值大小排序，累计贡献大者即为主要污染源或主要污染物。\n\n- **Q**：德尔菲法相比一般专家会议有何优点？\n  **A**：匿名可避免权威与从众影响，多轮函询与反馈使专家意见逐步收敛，结果更客观可靠。\n\n- **Q**：乐观、悲观、折衷准则的决策思想有何差异？\n  **A**：乐观（大中取大）取各方案最大收益再取最大；悲观（小中取大）取各方案最小收益再取最大；折衷用乐观系数 α 对二者加权。\n\n<\/details>\n\n## 第 6 章 · 环境规划\n\n**Q1（名词解释）** 大气环境规划？\n\n<details><summary>参考答案<\/summary>\n\n在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n\n<\/details>\n\n**Q2（名词解释）** 大气污染物总量控制（A 值法/P 值法）？\n\n<details><summary>参考答案<\/summary>\n\nA 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n\n<\/details>\n\n**Q3（名词解释）** 水环境功能区划？\n\n<details><summary>参考答案<\/summary>\n\n按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n\n<\/details>\n\n**Q4（名词解释）** 水环境容量？\n\n<details><summary>参考答案<\/summary>\n\n在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n\n<\/details>\n\n**Q5（名词解释）** 水污染物预测？\n\n<details><summary>参考答案<\/summary>\n\n用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n\n<\/details>\n\n**Q6（名词解释）** 固体废物管理规划？\n\n<details><summary>参考答案<\/summary>\n\n以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n\n<\/details>\n\n**Q7（名词解释）** 生态环境规划？\n\n<details><summary>参考答案<\/summary>\n\n以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：大气环境规划的内容与类型\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：大气环境规划的内容与类型\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：大气污染物总量控制方法（A 值/P 值）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：大气污染物总量控制方法（A 值/P 值）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：水环境功能区划与水环境容量概念及计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：水环境功能区划与水环境容量概念及计算\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：水污染控制规划方法与 S-P 模型\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：水污染控制规划方法与 S-P 模型\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：固体废物管理三化原则及规划内容\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：固体废物管理三化原则及规划内容\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：生态环境规划的内容与生态适宜度分析\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生态环境规划的内容与生态适宜度分析\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：各要素规划共同的调查—评价—预测—目标—措施程序\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：各要素规划共同的调查—评价—预测—目标—措施程序\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：什么是环境容量？在规划中起何作用？\n  **A**：环境容量是在满足环境质量目标前提下区域（水/大气）所能容纳污染物的最大允许量，是确定允许排放总量、实施总量控制与分配的依据。\n\n- **Q**：固体废物管理的三化原则指什么？\n  **A**：减量化（源头减少产生）、资源化（回收利用）、无害化（安全处置），是固废规划的核心目标。\n\n- **Q**：大气总量控制 A 值法与 P 值法有何区别？\n  **A**：A 值法基于区域允许排放总量自上而下分配；P 值法基于单个污染源的允许排放率（与烟囱高度等有关）自下而上控制。\n\n<\/details>\n\n## 第 7 章 · 环境管理模式\n\n**Q1（名词解释）** 末端控制（传统管理模式）？\n\n<details><summary>参考答案<\/summary>\n\n污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n\n<\/details>\n\n**Q2（名词解释）** 末端控制的弊端？\n\n<details><summary>参考答案<\/summary>\n\n治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n\n<\/details>\n\n**Q3（名词解释）** 污染预防（现代管理模式）？\n\n<details><summary>参考答案<\/summary>\n\n从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n\n<\/details>\n\n**Q4（名词解释）** 源削减？\n\n<details><summary>参考答案<\/summary>\n\n在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n\n<\/details>\n\n**Q5（名词解释）** 循环经济？\n\n<details><summary>参考答案<\/summary>\n\n遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n\n<\/details>\n\n**Q6（名词解释）** 产品生态设计（绿色设计/生命周期设计）？\n\n<details><summary>参考答案<\/summary>\n\n在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n\n<\/details>\n\n**Q7（名词解释）** 清洁生产？\n\n<details><summary>参考答案<\/summary>\n\n对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n\n<\/details>\n\n**Q8（名词解释）** 清洁生产审计？\n\n<details><summary>参考答案<\/summary>\n\n系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n\n<\/details>\n\n**Q9（名词解释）** 环境绩效与环境绩效审计？\n\n<details><summary>参考答案<\/summary>\n\n对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：末端控制模式的建立、实践与弊端\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：末端控制模式的建立、实践与弊端\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：污染预防模式的内涵与优势（对比末端控制）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：污染预防模式的内涵与优势（对比末端控制）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：源削减的途径\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：源削减的途径\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：循环经济 3R 原则\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：循环经济 3R 原则\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：产品生态设计与生命周期思想\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：产品生态设计与生命周期思想\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：清洁生产的定义与清洁生产审计程序\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：清洁生产的定义与清洁生产审计程序\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：环境绩效审计的内容\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境绩效审计的内容\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：两种管理模式的根本区别（被动治理 vs 主动预防）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：两种管理模式的根本区别（被动治理 vs 主动预防）\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：末端控制与污染预防的根本区别是什么？\n  **A**：末端控制在污染产生后被动治理（先污染后治理）；污染预防从源头与全过程主动减少污染产生（预防为主），后者更经济高效且能避免污染转移。\n\n- **Q**：循环经济的 3R 原则指什么？\n  **A**：减量化（Reduce）、再利用（Reuse）、再循环（Recycle），实现资源高效利用与物质闭路循环。\n\n- **Q**：清洁生产审计的核心目的是什么？\n  **A**：通过系统审查生产全过程，识别物耗能耗高、污染重的环节，提出并实施削减方案，实现源头预防与生态效率提升。\n\n<\/details>\n"}, {"id": "study-8d66dc1d", "group": "学习系统", "title": "速记卡", "md": "# 环境规划与管理 · 速记卡（填空 · 间隔重复）\n\n> 共 59 张卡。\n\n> 碎片时间用：看正面回忆背面，答不出的打 ✗，按间隔重复优先复习。\n\n---\n\n## 绪论 · 绪论-环境规划与管理\n\n- ____：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n  - <details><summary>答案<\/summary> 环境管理 <\/details>\n- ____：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n  - <details><summary>答案<\/summary> 环境规划 <\/details>\n- ____：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n  - <details><summary>答案<\/summary> 环境容量 <\/details>\n- ____：不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n  - <details><summary>答案<\/summary> 环境承载力 <\/details>\n- ____：既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n  - <details><summary>答案<\/summary> 可持续发展 <\/details>\n- ____：绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n  - <details><summary>答案<\/summary> 两山论 <\/details>\n- ____：自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n  - <details><summary>答案<\/summary> 复合生态系统 <\/details>\n- ____：研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n  - <details><summary>答案<\/summary> 工业生态学 <\/details>\n- ____：制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n  - <details><summary>答案<\/summary> 生态工业园 <\/details>\n- ____：研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n  - <details><summary>答案<\/summary> 环境经济学 <\/details>\n\n## 第 2 章 · 绪论-环境规划与管理\n\n- ____：协调发展与环境关系，运用各种手段限制人类损害环境质量的行为，是跨学科新兴综合学科，也是动态过程，需各国协调合作\n  - <details><summary>答案<\/summary> 环境管理 <\/details>\n- ____：国民经济和社会发展的有机组成部分，环境管理的首要职能，环境决策在时间空间上的具体安排，带有指令性的环境保护方案\n  - <details><summary>答案<\/summary> 环境规划 <\/details>\n- ____：某环境单元在给定环境功能区目标和环境质量目标下所允许承纳的污染物质的最大数量；M=K+R（基本/稀释容量+可变/自净容量）\n  - <details><summary>答案<\/summary> 环境容量 <\/details>\n- ____：不破坏自然环境情况下，自然环境能够承载和支撑的人类社会活动的强度和总量；EBC=f(T,S,B)\n  - <details><summary>答案<\/summary> 环境承载力 <\/details>\n- ____：既能满足当代人的需要，又不对后代人满足其需要的能力构成危害的发展（1987《我们共同的未来》）\n  - <details><summary>答案<\/summary> 可持续发展 <\/details>\n- ____：绿水青山就是金山银山；三阶段：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n  - <details><summary>答案<\/summary> 两山论 <\/details>\n- ____：自然子系统+社会子系统+经济子系统；功能包括生产、生活、还原、信息传递\n  - <details><summary>答案<\/summary> 复合生态系统 <\/details>\n- ____：研究社会生产活动中自然资源从源、流到汇的全代谢过程，含\"从摇篮到坟墓\"全过程管理系统观\n  - <details><summary>答案<\/summary> 工业生态学 <\/details>\n- ____：制造和服务企业形成的企业社区，通过物流/能流传递形成产业共生组合，模拟自然系统\"生产者-消费者-分解者\"循环\n  - <details><summary>答案<\/summary> 生态工业园 <\/details>\n- ____：研究合理调节人与自然之间物质变换，使社会经济活动符合自然生态平衡和物质循环规律的学科\n  - <details><summary>答案<\/summary> 环境经济学 <\/details>\n\n## 第 4 章 · 环境规划与管理中的综合分析方法\n\n- ____：掌握和了解某区域环境现状，发现和识别主要环境问题，确定主要污染源和主要污染物，为环境规划与管理的制定和实施创造条件\n  - <details><summary>答案<\/summary> 环境现状调查 <\/details>\n- ____：对被评价对象的优劣、好坏作定量或定性描述，一般以定量为主；含自然环境评价、社会经济评价、环境质量评价和污染源评价4方面\n  - <details><summary>答案<\/summary> 环境评价 <\/details>\n- ____：将不同种类、不同量纲的污染物排放量标准化处理的方法，Pᵢ=Cᵢ/C₀ᵢ×Qᵢ\n  - <details><summary>答案<\/summary> 等标污染负荷 <\/details>\n- ____：用数字反映并计量人类活动引起的环境变化；指标体系含7个子系统\n  - <details><summary>答案<\/summary> 环境统计 <\/details>\n- ____：借助数学、计算理论和信息处理技术，对未来环境质量变化趋势进行定性和定量分析；预测是决策的基础\n  - <details><summary>答案<\/summary> 环境预测 <\/details>\n- ____：从若干可能策略中选取最好策略的过程；具有多目标性、长期性、不确定性、方案多样性、一次性等特点\n  - <details><summary>答案<\/summary> 决策 <\/details>\n- ____：对特定项目环保情况进行系统的、有文字记录的、定期的、客观的评定\n  - <details><summary>答案<\/summary> 环境审计 <\/details>\n- ____：以现代数据库技术为核心，实现环境信息输入输出修改删除传输检索计算等操作的技术工程系统\n  - <details><summary>答案<\/summary> EMIS <\/details>\n- ____：将决策支持系统引入环境规划管理决策，对结构化/未结构化问题进行描述组织，协助完成管理决策\n  - <details><summary>答案<\/summary> EDSS <\/details>\n- ____：又称\"专家调查法\"，以无记名方式数轮函询征求专家意见，具不具名、反馈性、统计性特点\n  - <details><summary>答案<\/summary> 德尔菲法 <\/details>\n- ____：用递阶层次结构和矩阵方程将思维过程数学化，1~9标度构造判断矩阵，求特征向量得权重\n  - <details><summary>答案<\/summary> 层次分析法（AHP） <\/details>\n- ____：对产品生产全过程重点环节污染定量监测，找高物耗高能耗高污染原因，提出对策减少污染物产生\n  - <details><summary>答案<\/summary> 清洁生产审计 <\/details>\n\n## 第 5 章 · 环境规划的基本内容和程序\n\n- ____：调查区域自然环境、社会经济、污染源与环境质量现状，掌握本底资料，为规划提供依据。  *（要：规划的起点与数据基础）*\n  - <details><summary>答案<\/summary> 环境现状调查 <\/details>\n- ____：收集资料法、现场调查法、遥感法三类。  *（要：由粗到细、相互补充）*\n  - <details><summary>答案<\/summary> 环境现状调查方法 <\/details>\n- ____：对自然、社会经济、环境质量、污染源现状作出价值判断。  *（要：为规划目标设定提供依据）*\n  - <details><summary>答案<\/summary> 环境评价 <\/details>\n- ____：以污染物排放量除以其评价标准 Pᵢ=Qᵢ/C₀ᵢ，识别主要污染源与主要污染物。  *（要：按 P 值大小排序）*\n  - <details><summary>答案<\/summary> 等标污染负荷法 <\/details>\n- ____：用统计方法收集、整理、分析环境数据，反映环境状况与保护工作的活动。  *（要：有固定的指标体系与上报流程）*\n  - <details><summary>答案<\/summary> 环境统计 <\/details>\n- ____：对人口、经济发展、能源消耗等进行预测（弹性系数法、回归分析法、灰色预测）。  *（要：规划情景设定的依据）*\n  - <details><summary>答案<\/summary> 社会经济预测 <\/details>\n- ____：把环境视为系统，预测未来环境质量变化趋势；分定性（德尔菲法、主观概率法）与定量（时间序列、回归分析）。  *（要：预测内容含大气、水、固废、噪声）*\n  - <details><summary>答案<\/summary> 环境预测 <\/details>\n- ____：匿名、多轮函询、反馈收敛的专家调查法。  *（要：匿名避免权威与从众影响）*\n  - <details><summary>答案<\/summary> 德尔菲法 <\/details>\n- ____：在确定型、风险型（期望值准则）、非确定型（乐观/悲观/等可能/折衷/后悔值准则）条件下选优。  *（要：系统工程的核心）*\n  - <details><summary>答案<\/summary> 决策分析 <\/details>\n- ____：对环境管理活动的真实性、合规性、效益性进行审查。  *（要：财务审计与环保技术相结合）*\n  - <details><summary>答案<\/summary> 环境审计 <\/details>\n- ____：对环境信息进行收集、存储、检索、分析以支持管理与决策的系统。  *（要：信息化支撑手段）*\n  - <details><summary>答案<\/summary> 环境管理信息系统（EMIS）与环境决策支持系统（EDSS） <\/details>\n\n## 第 6 章 · 环境规划\n\n- ____：在大气环境容量约束下，对污染源排放进行总量控制与优化布局的规划。  *（要：以环境容量定排放总量）*\n  - <details><summary>答案<\/summary> 大气环境规划 <\/details>\n- ____：A 值法基于区域允许排放总量自上而下分配；P 值法基于单源允许排放率自下而上控制。  *（要：总量控制两条技术路线）*\n  - <details><summary>答案<\/summary> 大气污染物总量控制（A 值法/P 值法） <\/details>\n- ____：按水体使用功能与保护目标对水域分区并确定水质目标。  *（要：水环境规划的前提）*\n  - <details><summary>答案<\/summary> 水环境功能区划 <\/details>\n- ____：在满足水质目标前提下水体所能容纳污染物的最大允许量。  *（要：确定允许纳污量的依据）*\n  - <details><summary>答案<\/summary> 水环境容量 <\/details>\n- ____：用稀释自净、Streeter-Phelps（BOD-DO）等模型预测水质。  *（要：S-P 模型描述 BOD 衰减与 DO 变化）*\n  - <details><summary>答案<\/summary> 水污染物预测 <\/details>\n- ____：以减量化、资源化、无害化（三化）为原则的固废管理规划。  *（要：三化原则）*\n  - <details><summary>答案<\/summary> 固体废物管理规划 <\/details>\n- ____：以生态适宜度、生态承载力分析进行土地利用与生态功能区划。  *（要：强调系统性与可持续）*\n  - <details><summary>答案<\/summary> 生态环境规划 <\/details>\n\n## 第 7 章 · 环境管理模式\n\n- ____：污染产生后在排放末端进行治理（先污染后治理）。  *（要：被动、成本高、易转移污染）*\n  - <details><summary>答案<\/summary> 末端控制（传统管理模式） <\/details>\n- ____：治标不治本、资源浪费、污染转移、治理成本高。  *（要：促成向预防模式转变）*\n  - <details><summary>答案<\/summary> 末端控制的弊端 <\/details>\n- ____：从源头和生产全过程减少或消除污染物的产生（预防为主）。  *（要：主动、经济、可持续）*\n  - <details><summary>答案<\/summary> 污染预防（现代管理模式） <\/details>\n- ____：在源头减少或消除废物与污染物的产生。  *（要：污染预防的首要途径）*\n  - <details><summary>答案<\/summary> 源削减 <\/details>\n- ____：遵循减量化、再利用、再循环（3R）原则，实现物质闭路循环的经济模式。  *（要：3R 原则）*\n  - <details><summary>答案<\/summary> 循环经济 <\/details>\n- ____：在产品设计阶段考虑全生命周期环境影响并使之最小化。  *（要：源头预防的设计手段）*\n  - <details><summary>答案<\/summary> 产品生态设计（绿色设计/生命周期设计） <\/details>\n- ____：对生产全过程采取整体预防性环境策略，以提高生态效率、减少风险。  *（要：全过程预防）*\n  - <details><summary>答案<\/summary> 清洁生产 <\/details>\n- ____：系统审查生产全过程，识别高耗高污环节并提出削减方案。  *（要：清洁生产的实施工具）*\n  - <details><summary>答案<\/summary> 清洁生产审计 <\/details>\n- ____：对组织环境表现进行评价（绩效）并审查其真实性与有效性（绩效审计）。  *（要：管理闭环的反馈环节）*\n  - <details><summary>答案<\/summary> 环境绩效与环境绩效审计 <\/details>\n"}, {"id": "graph", "group": "知识图谱", "title": "章节图谱", "md": "# 环境规划与管理 · 章节图谱\n\n> 教师: 王思雨 · 学期: 2026春  \n> PDF: 11, 页: 1207, 识别章节: 6 个\n> 章节号: 0, 2, 4, 5, 6 有156种，约占总数\n的1/4。中国滥捕乱杀野生动物\n\n#### 和大量捕食野生动物的现象仍然\n十分严重，屡禁不止。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 一3 环境规划与管理的基本概念\n\n#### 世界贸易组织\n中国加入WTO将面临两方面新的环境问题。\n》一方面是国际上的“绿色贸易壁垒”。由于中国\n的环境标准普遍低于发达国家的标准，中国的\n食品、机电、纺织、皮革、陶瓷、烟草、玩具、\n鞋业等行业的产品将在出口贸易中受到限制。 中国加入世界贸易组织20周年\n\n#### 履行入世承诺，如期完成降税义务\n另一方面，由于国际市场对中国的矿产、石材、\n药用植物、农产品、畜牧产品的大量需求，可\n能会加重中国的生态、环境和自然资源的破坏。\n同时，中国可能成为国外污染密集型企业转移\n的地点和大量的国外工业废物“来料加工“的地\n点，这将极大地加重中国的环境问题\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 一环境规划与管理的基本概念\n\n#### 持久性污染 POPS\n随着中国经济的发展，难降解的持久性有\n机物污染开始显现。国际签署了《关于持\n久性有机污染物的斯德哥尔摩公约》，其\n中确定的首批禁止使用的12种持久性有机\n污染物在中国的环境介质中多有检出，中 高纬度\n\n#### 沉降>挥发 全球蒸\n国是公约的签字国。这类有机污染物具有 中纬度 依据全球迁移率\n\n#### 进行分馈\n\n#### 说降和挥发的\n转移到下一代体内，并在多年后显现其危 季节性循环 高迁移率\n\n#### 长距离 相对高迁移斗\n害的特点，也被称为\"环境激素“或\"环境 大气迁移\n\n#### 长距离 相对份\n荷尔蒙”，危害严重。这类有机污染物广 海洋迁移\n\n#### 低迁格\n泛存在于工农业和城市建设等使用的化学 降解和\n\n#### 低纬度 永久保留\n品之中。 挥发>沉降\n\n#### “姓跳\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 环境规划与管理的基本概念\n\n#### 环境问题成因\n\n#### 发展观\n\n#### 伦理道德观\n\n#### 价值观\n\n#### 科学观\n\n#### 消费观\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n#### 一环境规划与管理的基本概念\n环境规划与管理是解决环境问题的主要途径\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 一环境规划与管理的基本概念\n\n#### >环境规划的含义\n\n#### >环境管理的含义\n\n#### >环境规划与管理的关系\n\n#### >环境规划与管理的目的\n\n#### >环境规划与管理的任务\n\n#### >环境规划与管理的作用\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 一环境规划与管理的基本概念\n（一）环境管理的含义\n1.环境管理的提出\n》1972年，在《人类环境宣言》中提出“保护和改善人类环境是关系到全\n世界各国人民的幸福和经济发展的重要问题，也是全世界各国人民的迫\n切希望和各国政府的责任”。提出了环境管理的原则，包括指定适当的\n国家机关管理环境资源；应用科学和技术控制环境恶化和解决环境问题；\n开展环境教育和发展环境科学研究；确保各国际组织在环境保护方面的\n有效和有力的协调作用等。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 一环境规划与管理的基本概念\n>1974年，在墨西哥，由联合国环境规划署和联合国贸易与发展会议联合\n召开的资源利用、环境与发展战略方针专题讨论会上形成了三点共识：\n（1）全人类的一切基本需要应得到满足；\n2）号 要发展以满足需要，但又不能超出生物圈的容许极限；\n（3）协调这两个目标的方法即环境管理。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 一环境规划与管理的基本概念\n2.环境管理的含义\n》1974年，美国学者G.H.休威尔编写的《环境管理》一书，指出“环境\n管理是对损害人类自然环境质量的人的活动（特别是损害大气、水和\n陆地外貌的质量的人的活动）施加影响”。\n》1987年，多诺尔在《环境管理专业实践》中认为环境管理是一个“桥\n梁专业”，“它致力于系统方法发展信息协调技术”，“在跨学科的\n基础上，根据定量和未来学的观点，处理人工环境的问题”。\n》1992年赖斯等在《环境管理》著作中对环境管理的定义：“通过在有\n组织的群体里建立一个有利于人们发挥其成绩的环境，以实现既定的\n目标。”\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 一环境规划与管理的基本概念\n>库克（Cooke）等在其《环境管理中的地形学》（1990）中采用类似的\n定义，将环境管理描述为“人类利用土地、大气、植物和水的一系列活\n动”。\n》1987年，刘天齐主编的《环境技术与管理工程概论》中对环境管理的含\n义作出了如下论述：“通过全面规划，协调发展与环境的关系；运用经\n济、法律、技术、行政、教育等手段，限制人类损害环境质量的活动；\n达到既要发展经济满足人类的基本需要，又不超出环境的容许极限。\n》1992年赖斯等在《环境管理》著作中对环境管理的定义：“通过在有组\n织的群体里建立一个有利于人们发挥其成绩的环境，以实现既定的目\n标。”\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n#### 一环境规划与管理的基本概念\n根据国内外学者的研究成果，要比较全面地理解环境管理的含义，应\n该意以下几个基本问题：\n第一，协调发展与环境的关系。\n第二，动用各种手段限制人类损害环境质量的行为。\n第三，环境管理是跨学科领域的新兴综合学科。\n第四，环境管理和任何管理活动一样，也是一个动态过程\n第五，环境管理需要各国采取协调合作的行动。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n#### 一环境规划与管理的基本概念\n（二）环境规划的含义\n1.环境规划的提出\n1972年联合国人类环境会议上，在《人类环境会议宣言》中明确指\n出“合理的计划是协调发展的需要和保护与改善环境的需要相一致\n的”，“人的定居和城市化工作需加以规划”、“避免对环境的不\n良影响”、“取得社会、经济和环境三方面的最大利益”，“必须\n委托适当的国家机关对国家的环境资源进行规划、管理或监督，以\n期提高环境质量”。\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n#### 一环境规划与管理的基本概念\n·我国环境保护法第四条规定：“国家制定的环境保护规划必须纳\n入国民经济和社会发展规划，国家采取有利于环境保护的经济、\n技术政策和措施，使环境保护工作同经济建设和社会发展相协\n调。\"\n·我国环境保护法第十二条规定：“县级以上人民政府环境保护行\n政主管部门，应当会同有关部门对管辖区范围内的环境状况进行\n调查和评价，拟定环境保护规划，经计划部门综合平衡后，报同\n级人民政府批准实施。“\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n#### 一环境规划与管理的基本概念\n2.环境规划的含义\n》环境规划是国民经济和社会发展的有机组成部分，是环境管理的首要职\n能，是环境决策在时间、空间上的具体安排，是规划管理者对一定时期\n内环境保护目标和措施作出的具体规定，是一种带有指令性的环境保护\n方案。\n》环境规划的目的是在发展经济的同时保护环境，使经济与社会协调发展。\n>环境规划的实质是一种克服人类经济社会活动和环境保护活动盲目和主\n观随意性的科学决策活动。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n\n#### 一环境规划与管理的基本概念\n（三）环境管理与环境规划的关系\n规划职能是环境管理的首要职能。\n2） 环境目标是环境规划与环境管理的共同核心。\n(3) 环境规划与管理具有共同的理论基础\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 一环境规划与管理的基本概念\n（四）环境规划与管理的目的\n环境规划与管理的根本目的就是通过对可持续发展思想的传播，使人类社会\n的组织形式、运行机制以至管理部门和生产部门的决策、计划和个人的日\n常生活等各种活动，符合人与自然和谐相处的原则，并以制度、法律、体\n制和观念的形式体现出来，创建一种可持续的发展模式和消费模式。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 一环境规划与管理的基本概念\n（五）环境规划与管理的任务\n环境管理的基本任务应该是：转变人类社会的基本观念和\n调整人类社会的行为。\n环境文化的建设是环境规划与管理的一项长期的根本的任\n务。文化决定着人类的行为，只有转变了过去那种视环境\n为征服对象的文化，才能从根本上去解决环境问题。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n#### 一环境规划与管理的基本概念\n人类的社会行为分为政府行为、市场行为和公众行为三种。\n》政府行为是总的国家的管理行为，诸如制定政策、法律、法令、发\n展计划并组织实施等；\n>市场行为是指各种市场主体包括企业和生产者个人在市场规律的支\n配下，进行商品生产和交换的行为；\n》公众行为则是指公众在日常生活中诸如消费、休闲和旅游等方面的\n行为。\n>这三种行为都可能会对环境产生不同程度的影响。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n#### 一环境规划与管理的基本概念\n（六） 环境规划与管理的作用\n1.促进环境与经济、社会可持续发展\n2.保障环境保护活动纳入国民经济和社会发展计划\n3.实施环境政策、法规和制度的主要途径\n4.实现以较小的投资获取较佳的环境效益\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### 主观题10分\n查阅网络资料，结合自己的理解与一个具体的环\n境规划与管理的实际案例，谈一下环境规划与管\n\n#### 理的重要性\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n>第一个路标一1972年联合国人类环境会议\n>第二个路标一1992年联合国环境与发展会议\n>第三个路标一2002年联合国可持续发展世界首脑会议\n>第四个路标一2012年联合国可持续发展大会\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（一）、第一个路标\n1972年联合国人类环境会议- ——背景\n20世纪50～60年代发生的震惊世界的“八大公害\n事件，引起了西方工业国家的人民对公害的强烈不满\n促使一批科学家积极参与环境问题的研究，发表了许多\n报告和著作，形成了有代表性的观点和学派，并对环境\n规划与管理思想和理论的发展产生了重要的影响。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（一）、第一个路标\n1972年联合国人类环境会议 成果\n（1）由58个国家152位成员组成的通讯顾问委员会为会议\n提供的一份非正式报告－《只有一个地球》。\n（2）大会通过的《人类环境宣言》。该宣言将会议形成\n的共同看法和制定的共同原则加以总结，提出了7个共同\n观点和26项共同原则。初步构筑起环境规划与管理思想\n和理论的总体框架。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 中国环境保护事业进入起步阶段\n>1973年在北京召开了全国第一次环境保护会议。会议之后\n国务院颁布了《关于保护和改善环境的若干规定（试行草\n案）》。从此，中国的环境保护事业进入起步阶段。\n>1978年国家颁布的新宪法规定：“国家保护环境和自然资\n源，防治污染和其他公害。”首次将环境保护确定为政府\n的一项基本职能。\n>1979年国家颁布的《中华人民共和国环境保护法 去（试行）》\n为我国环保机构的建设提供了法律依据。\n>1989年5月召开的第三次全国环境保护会议，正式推出了新\n的五项环境管理制度。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 阅读材料：八大公害事件\n发生 发生地点 污染类型 污染源/物 扩散途径 受体 (人)\n\n#### 事件名称\n\n#### 致
