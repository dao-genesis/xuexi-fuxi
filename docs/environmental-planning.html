米 1977年12月又死亡79\n\n#### 而中毒 例\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（二）、第二个路标\n1992年联合国环境与发展会议－背景\n1983年，《新发展观》一书中指出新的发展观是“整体\n的”、 “综合的”和“内生的”。其经济发展不仅包含数\n量上的变化，而且还包括收入结构的合理化、文化条件的\n改善、生活质量的提高，以及其他社会福利的增进。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n1984年10月，联合国世界环境与发展委员会成立后，即在\n委员会主席、挪威首相布伦特兰夫人的领导下，编写了\n《我们共同的未来》，这是关于人类未来的纲领性文献\n报告分三个部分，共12章。《我们共同的未来》阐述了\n“从一个地球到一个世界”的总观点，并明确提出持续\n发展战略，即“满足当代人的需要，又不对后代人满足\n其需要的能力构成危害的发展”。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（二）、第二个路标\n1992年联合国环境与发展会议－成果\n1992年6月3-14日，联合国环境与发展会议在巴西里约热内\n卢召开，讨论了人类生存面临的环境与发展问题，通过\n了《里约环境与发展宣言》和《21世纪议程》两个纲领\n性文件。这次会议被认为是人类迈入21世纪的意义最为\n深远的一次世界性会议。\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 中国环境保护事业进入发展阶段\n·1992年7月，党中央、国务院批准了《中国环境与发展十\n大对策》，明确提出了实行可持续发展战略及主要对策措\n施。\n·1994年3月，国务院发布《中国21世纪议程 中国21世\n纪人口、环境与发展白皮书》，确定了实施可持续发展战\n略的行动目标、政策框架和实施方案。\n·1994年8月，国家计委和国家环保局联合颁布了《环境保\n护计划管理办法》，规范了环境规划与管理工作。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n·1996年7月，第四次全国环境保护会议召开，提出了\n《国家环境保护“九五”计划和2010年远景目标》，明\n确“实施污染物排放总量控制计划”和“中国跨世纪绿\n色工程计划”。\n·1998年，国家环保总局颁布了《全国环境保护工作\n（1998-2002）纲要》，提出了“一控双达标”（全国\n主要污染物实施总量控制；工业污染源排放污染物要达\n到国家或地方规定的标准；全国重点城市环境空气、地\n面水环境质量，按功能区分别达到国家规定的标准）和\n33211工程，加大了重点地区和重点流域的治理力度。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 中国环境保护事业进入发展阶段\n·2002年1月，第五次全国环境保护会议召开，会议提出\n了《国家环境保护“十五”计划》，明确了“十五”期\n间努力完成控制污染物排放总量，改善重点地区环境质\n量，节制生态恶化趋势“三大任务”\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（三）、第三个路标\n2002年联合国可持续发展世界首脑会议－背景\n1992年里约联合国环境与发展会议之后，国际社会在可持\n续发展领域出现了许多积极变化。\n全球环境形势依然严峻。联合国环境规划署发表的2000年\n环境报告指出，尽管一些国家在控制污染方面取得了进展，\n环境退化速度放慢，但总体上全球环境恶化的趋势仍没有\n得到扭转。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（三）、第三个路标\n2002年联合国可持续发展世界首脑会议-成果\n2000年9月联合国召开千年首脑会议，在这场历来规模最大\n的世界领袖聚会上，150位与会国家与政府元首通过《联合国\n千年宣言》，将《21世纪议程》与1992年以来联合国举行的\n重大会议相关结论汇总成21世纪人类发展的努力目标。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n2002年8月26日至9月4日，联合国可持续发展世界首\n脑会议在南非约翰内斯堡举行，会议产生了两项最终成果：\n《执行计划》和《政治宣言》。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 我国环境保护事业的发展趋势\n>2007年10月，中国共产党第十七次全国代表大会在背景\n召开，首次将建设生态文明作为一项国家战略任务明确\n\n#### 下来\n>21世界初，国务院《政府工作报告》提出大力发展循环\n经济（2004年）等政策密集出台，我国的环境规划与管\n理工作已全面进入综合决策阶段。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n（四）、第四个路标\n2012年联合国可持续发展大会-背景\n1992年，国际社会聚集在巴西里约热内卢，讨论实施可持续\n发展的具体方法和行动计划，在2002年的可持续发展问题世\n界首脑会议上，通过了执行计划。2012年，世界各国领导人\n再次集聚在里约热内卢，围绕“可持续发展和消除贫困背景\n下的绿色经济”和“促进可持续发展机制框架”两大主题，\n就20年来国际可持续发展取得的进展和存在的差距进行深入\n讨论，在全球环境保护发展史上树立起第四个路标。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n二3 环境规划与管理的由来与内涵\n（四）、第四个路标\n2012年联合国可持续发展大会－成果\n大会最终达到了题为“我们憧憬的未来”的成果文件。\n这份文件内容全面、基调积极，总体平衡，反映了各\n方主要关切，体现了国际社会的合作精神，展示了未\n来可持续发展的前景，对于确立全球可持续发展方向\n具有重要指导意义。\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n\n#### 环境规划与管理的由来与内涵\n\n#### 我国环境保护事业的发展趋势\n2012年11月，中国共产党第十八次全国代表大会在北\n京召开，首次把生态文明建设摆到中国特色社会主义\n事业“五位一体”总体布局的战略位置\n》2018年，全国生态环境大会在北京召开，这是首次以\n生态环境保护”为主题的全国性重要会议。大会确\n立的习近平生态文明思想是一项标志性、创新性、战\n略性的重大理论成果。\n法律方面：2014年，十二届全国人大常委会第八次会\n议表决通过了《中华人民共和国环境保护法修正案》，\n这部环境领域的“基本法”，完成了25年来的首次修\n订。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 阅读材料：世界环境日\n1972年10月，第27届联合国大会通过决议，将6月5日定\n为“世界环境日”。右上图为世界环境日标志。\n联合国根据当年的世界主要环境问题及环境热点，有针对\n性地制定每年的“世界环境日”的主题。1974年以来历年主\n\n#### 题见下页表格\n联合国系统和各国政府每年都在世界环境日这一天开展各\n种活动，宣传保护和改善人类环境的重要性，联合国环境规\n划署同时发表《环境现状的年度报告书》，召开表彰“全球\n500佳”国际会议。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n\n#### 历年世界环境日主题\n\n#### 1974年 只有一个地球\n\n#### 1975年 人类居住\n\n#### 1976年 水：生命的重要源泉\n1977年 关注臭氧层破坏、水土流失、土壤退化和滥伐森林\n\n#### 1978年 没有破坏的发展\n1979年 为了儿童的未来-没有破坏的发展\n1980年 新的10年，新的挑战一没有破坏的发展\n1981年 保护地下水和人类食物链，防治有毒化学品污染\n1982年 纪念斯德哥尔摩人类环境会议10周年-提高环境意识\n1983年 管理和处置有害废弃物，防治酸雨破坏和提高能源利用率\n\n#### 1984年 防治沙漠化\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### 二环境规划与管理的由来与内涵\n2013年 可持续发展：我们生活的城市\n2014年 小岛屿发展中国家：可持续发展与气候变化\n2015年 七亿人，七亿个声音：一个可持续发展的未来\n\n#### 2016年 打击塑料污染\n\n#### 2017年 与自然和谐共生\n2018年 塑料污染：我们的责任\n2019年 保护地球，保护生物多样性\n2020年 时间是现在：恢复我们的地球\n\n#### 2021年 恢复我们的地球\n\n#### 2022年 只有一个地球\n\n#### 2023年 解决塑料污染\n2024年 土地恢复、阻止荒漠化和增强抗干旱能力\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n\n#### >环境规划与管理的对象和手段\n\n#### >环境规划与管理的原理和内容\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n（一）环境规划与管理的对象\n1.现代系统管理的“五要素论”\n>对于环境规划与管理，其研究对象也应包括人、物、资\n金、信息和时空5个方面：\n(1）人是第一个主要对象。\n(2)牛 物也是重要研究对象。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n(一) 环境规划与管理的对象\n（3）资金是系统赖以实现其目标的重要物质基础，也是规\n划与管理的研究对象。\n（4）信息是系统的“神经”，信息也是规划与管理的重要\n对象。\n（5）任何管理活动都是在一定的时空条件下进行的，环境\n规划与管理的一个突出特点是时空特性日益突出，则时\n空条件亦应成为重要的研究对象。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n\n#### 人类社会经济活动主体的三个方面\n（1）个人：个人行为是环境规划与管理的主要对象之一\n(2）企业：企业行为是环境规划与管理的又一重要对象\n（3）政府：作为社会行为主体的政府，其行为对环境的影\n响是复杂的、深刻的。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n\n#### 二 环境规划与管理的手段\n1.行政手段\n根据国家行政法规所赋予的组织和指挥权力，对环境资源\n\n#### 保护工作实施规划与管理\n2.法律手段\n是环境规划与管理的一种强制性手段\n3.经济手段\n是指利用价值规律，运用价格、税收、信贷等经济杠杆\n充分发挥价值规律在环境管理过程的杠杆作用。\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n4.技术手段\n指借助那些既能提高生产率，又能把对环境污染和生态破坏\n控制到最小限度的工艺技术以及先进的污染治理技术等来达\n到保护环境目标的手段。\n5.宣传教育手段\n是环境管理不可缺少的手段。环境宣传既是普及环境科学知\n识，又是一种思想动员。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n（三）环境规划与管理的原理\n1.环境规划与管理的相关理论\n·包括生态学原理、可持续发展原理、“两山论原理、\n系统论原理、环境经济学原理和管理二重性原理。\n2.环境规划与管理的法规体系\n·根据环境法学基础理论，介绍环境保护法律、环境管理\n制度、环境标准和环境管理体系。\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n（三）环境规划与管理的原理\n3.环境规划与管理的技术方法\n·包括环境数据处理方法、最优化方法、环境决策方法和\n环境数学模型等。\n4.环境规划与管理综合分析方法\n·包括环境现状调查和评价、人口与社会经济发展预测、\n资源消耗预测、环境质量预测、环境统计、环境审计和\n环境管理信息系统等。\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n（四）环境规划与管理的内容\n1.环境规划的内容（详见第五章-第八章）\n环境规划的基本内容：基本内容集中了各类专项规划共\n性的原则、方法、指标和程序。包括环境规划的原则和\n程序、环境目标和指标体系、环境评价和预测、环境功\n能区划、环境规划方案的设计和比较以及环境规划的实\n施。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n2.环境管理的内容（详见第九章-第十章）\n（1）环境管理模式：包括末端控制为基础的传统环境管理\n模式、污染预防为基础的环境管理模式和污染预防模式实\n施过程的环境规划管理等。\n(2）组织层面的环境管理：包括组织与其环境绩效、循环经\n济、清洁生产和环境管理体系等。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n\n#### 三环境规划与管理的对象和内容\n（3）产品层面的环境管理：包括产品生态设计、生命周期\n\n#### 评价、产品环境标志等\n（4）活动层面的环境管理：包括建设项目、城市环境、农\n村环境、海洋环境、开发区环境等不同类型的环境管理以\n\n#### 及环境风险评价与管理\n"}, {"id": "pdf-002-part02", "group": "原始课件 · PDF原文", "title": "002-part02-绪论-环境规划与管理", "md": "# 绪论-环境规划与管理\n\n> 来源: 002-part02-绪论-环境规划与管理.pdf\n> 页数: 129\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 环境规划与管理\n\n#### 授课教师：王思雨副教授\n联系方式：\neswangsiyu@hotmail.com\n办公地点：生态与环境学院208办公室\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n## 第一章\n\n#### 概述\n第一节 环境规划与管理的基本概念\n第二节 环境规划与管理的产生和发展\n第三节 环境规划与管理的对象和内容\n第四节 环境规划与管理的理论基础\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 课前回顾\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 课前回顾\n1.环境管理的含义\n根据国内外学者的研究成果，要比较全面地理解环境管理的含义，应\n该意以下几个基本问题：\n第一，协调发展与环境的关系。\n第二，动用各种手段限制人类损害环境质量的行为。\n第三，环境管理是跨学科领域的新兴综合学科。\n第四，环境管理和任何管理活动一样，也是一个动态过程。\n第五，环境管理需要各国采取协调合作的行动。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 课前回顾\n2.环境规划的含义\n》环境规划是国民经济和社会发展的有机组成部分，是环境管理的首要职\n能，是环境决策在时间、空间上的具体安排，是规划管理者对一定时期\n内环境保护目标和措施作出的具体规定，是一种带有指令性的环境保护\n方案。\n》环境规划的目的是在发展经济的同时保护环境，使经济与社会协调发展。\n>环境规划的实质是一种克服人类经济社会活动和环境保护活动盲目和主\n观随意性的科学决策活动。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 课前回顾\n3.环境规划与管理的对象\n1.现代系统管理的“五要素论”\n>对于环境规划与管理，其研究对象也应包括人、物、资\n金、信息和时空5个方面：\n(1）人是第一个主要对象。\n(2）物也是重要研究对象。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 课前回顾\n3.环境规划与管理的对象\n（3）资金是系统赖以实现其目标的重要物质基础，也是规\n划与管理的研究对象。\n（4）信息是系统的“神经”，信息也是规划与管理的重要\n对象。\n（5）任何管理活动都是在一定的时空条件下进行的，环境\n规划与管理的一个突出特点是时空特性日益突出，则时\n空条件亦应成为重要的研究对象。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 课前回顾\n4. 环境规划与管理的手段\n1.行政手段\n根据国家行政法规所赋予的组织和指挥权力，对环境资源\n\n#### 保护工作实施规划与管理\n2.法律手段\n是环境规划与管理的一种强制性手段\n3.经济手段\n是指利用价值规律，运用价格、税收、信贷等经济杠杆，\n充分发挥价值规律在环境管理过程的杠杆作用。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 课前回顾\n4.技术手段\n指借助那些既能提高生产率，又能把对环境污染和生态破坏\n控制到最小限度的工艺技术以及先进的污染治理技术等来达\n到保护环境目标的手段。\n5.宣传教育手段\n是环境管理不可缺少的手段。环境宣传既是普及环境科学知\n识，又是一种思想动员。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 课前回顾\n5.环境管理与环境规划的关系\n规划职能是环境管理的首要职能。\n2） 环境目标是环境规划与环境管理的共同核心。\n(3) 环境规划与管理具有共同的理论基础。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 课前回顾\n6.环境规划与管理的目的\n环境规划与管理的根本目的就是通过对可持续发展思想的传播，使人类社会\n的组织形式、运行机制以至管理部门和生产部门的决策、计划和个人的日\n常生活等各种活动，符合人与自然和谐相处的原则，并以制度、法律、体\n制和观念的形式体现出来，创建一种可持续的发展模式和消费模式\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 课前回顾\n7.环境规划与管理的任务\n环境管理的基本任务应该是：转变人类社会的基本观念和\n调整人类社会的行为。\n环境文化的建设是环境规划与管理的一项长期的根本的任\n务。文化决定着人类的行为，只有转变了过去那种视环境\n为征服对象的文化，才能从根本上去解决环境问题。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 课前回顾\n人类的社会行为分为政府行为、市场行为和公众行为三种。\n》政府行为是总的国家的管理行为，诸如制定政策、法律、法令、发\n展计划并组织实施等；\n>市场行为是指各种市场主体包括企业和生产者个人在市场规律的支\n配下，进行商品生产和交换的行为；\n》公众行为则是指公众在日常生活中诸如消费、休闲和旅游等方面的\n行为。\n>这三种行为都可能会对环境产生不同程度的影响。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n#### 课前回顾\n8.环境规划与管理的作用\n1.促进环境与经济、社会可持续发展\n2.保障环境保护活动纳入国民经济和社会发展计划\n3.实施环境政策、法规和制度的主要途径\n4.实现以较小的投资获取较佳的环境效益\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 生态文明建设之生态学理论\n\n#### 生态文明建设之可持续发展原理\n\n#### 生态文明建设之“两山论”原理\n\n#### 生态文明建设之环境经济学原理\n\n#### 生态文明建设之系统论原理\n\n#### 生态文明建设之管理二重性原理\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）计划类型\n由于人类活动的复杂性与多元性，计划的种类也十分复杂和多样。人\n们根据不同的背景、不同的需要编制出各种各样的计划，常见的分类\n方法见图表。\n分类原则 计划种类 分类原则 计划种类\n\n#### 长期计划 政策\n按计划的时间界限划分 中期计划 按计划的范围划分 程序\n\n#### 短期计划 方法\n\n#### 战略计划\n\n#### 按计划的约束力划 指令性计划\n\n#### 按计划制定者层次划分 管理计划\n\n#### 分 指导性计划\n\n#### 作业计划\n\n#### 经济发展计划\n\n#### 综合计划\n\n#### 按计划的对象划分 环境保护计划\n\n#### 局部计划 按计划的性质划分\n\n#### 土地利用计划\n\n#### 项目计划 其他\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 四环境规划与管理的理论基础\n美国环境学家米勒总结的生态学三定律是：\n生态学第一定律：任何行动都不是孤立的，对自然界的\n任何侵犯都具有无数效应，其中许多效应是不可逆的。该定\n律为哈定所提出，可称之为多效应原理或极限性原理；\n生态学第二定律：每一种事物无不与其他事物相互联系\n和相互交融。此定律可称为相互联系原理或生态链原理；\n生态学第三定律：我们生产的任何物质均不应对地球上\n自然的生物地球化循环有任何干扰。此定律可称之为勿干扰\n\n#### 原理或生物多样性原理\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 四五 环境规划与管理的理论基础\n我国生态学家马世骏先生提出了生态学五规律：相互制约和相\n互依赖的互生规律、相互补偿和相互协调的共生规律、物质循环转\n化的再生规律、相互适应与选择的协同化规律和物质输入输出的平\n衡规律。\n陈昌笃提出了六条生态学一般规律：物物相关、相生相克、能\n流物复、负载定额、协调稳定和时空有宜。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2012年11月，党的十八大从新的历史起点出发，做出“大力推\n进生态文明建设”的战略决策，从10个方面绘出生态文明建设的宏伟\n蓝图。建设生态文明，是关系人民福祉、关乎民族未来的长远大计。\n面对资源约束趋紧、环境污染严重、生态系统退化的严峻形势，必\n须树立尊重自然、顺应自然、保护自然的生态文明理念，把生态文\n明建设放在突出地位，融入经济建设、政治建设、文化建设、社会\n建设各方面和全过程，努力建设美丽中国，实现中华民族永续发展。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n生态系统的极限性原理：\n生态环境系统中的一切资源都是有限的，对于污染\n和破坏带来的影响，生态环境系统也只有一定限度\n的承受能力。\n如果超过这个限度，就会使自然系统失去平衡稳定\n的能力，引起质量上的衰退，并造成严重的后果。\n人类对环境资源的开发利用，必须维持自然资源的\n再生功能和环境质量的恢复能力，不充许超过生物\n圈的承载能力或容许极限。\n环境容量和环境承载力：\n在进行环境规划与管理时，根据极限性原理，对生态\n环境系统中各因素（水、气、土地等）的功能限度进\n行定义。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n1、环境容量\n环境容量是一个复杂的反映环境净化能力的量，其\n数值应能表征污染物在环境中的物理、化学变化及空\n间机械运动的性质。\n\n#### 《环境科学大辞典》\n某环境单元给定环境功能区目标和环境质量目标下\n\n#### 所充许承纳的污染物质的最大数量\n环境容量是反映生态平衡规律，污染物在自然环境\n中的迁移转化规律，以及生物与生态环境之间的物\n\n#### 质能量交换规律的综合性指标\n环境容量是自然生态环境的基本属性之一，由自然\n生态环境特征和污染物质特征共同决定。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n1、环境容量\n环境容量值大小，与该环境单元本身的组成和结构\n有关，其变化具有明显的地带性规律和地区性差异\n环境容量的准确测量需要较长的研究、监测时间，\n在实际应用中通常采用简化的计算方式。\n\n#### M=K+R\n\n#### 基本环境容量 可变环境容量\n\n#### /稀释容量 /自净容量\n由于环境容量的自净机制，可用环境浓度标准值与\n背景值之差，通过一定的输入输出关系转换成排放量，\n即以污染物的充许排放量作为环境容量。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n1、环境容量\n\n#### M=K+R\n\n#### 基本环境容量 可变环境容量\n\n#### /稀释容量 /自净容量\n\n#### 例如：水环境容量\n稀释容量：在给定水域的来水污染物浓度高于\n出水水质目标时，依靠稀释作用达到水质目标\n\n#### 自净 所能承纳的污染物量\nK 自净容量：由于沉降、生化、吸附等物理、化\n稀释 学和生物作用，给定水域达到水质目标所能自\n\n#### 净的污染物量\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1、环境容量\n环境容量是一种环境资源，但随着社会的快速发展\n绝大部分地区的环境容量已经很小，许多地区污染排\n放量已经远远超过环境容量允许的排放量。\n基于环境容量进行区域污染物排放总量控制是目前较\n\n#### 为通用的方法\n基于总量控制的城市环境整治规划的模式：\n根据污染源调查结果和已制定的社会经济发展规划，\n调用各种模型预测未来的环境质量；\n根据预测结果和已制定的环境目标，通过浓度、排\n放量转换关系计算环境容量；\n根据环境容量和污染物总削减量，最后得到综合治\n理方案。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1、环境容量\n1996年7月，第四次全国环境保护会议提出《国家环境保护“九五”计\n划和2010年远景目标》，明确“实施污染物排放总量控制计划”。\n1998年，《全国环境保护工作（1998-2002）纲要》，提出了“一控\n双达标” 全国主要污染物实施总量控制。\n2002年1月，《国家环境保护“十五”计划》，明确了“十五”期间努\n力完成控制污染物排放总量等三大任务。\n十一五环境保护规划：到2010年，二氧化硫和化学需氧量排放得到控\n制，重点地区和城市的环境质量有所改善，生态环境恶化趋势基本遏制。\n十二五环境保护规划：到2015年，主要污染物排放总量显著减少：城\n乡饮用水水源地环境安全得到有效保障，水质大幅提高；重金属污染得\n到有效控制，持久性有机污染物、危险化学品、危险废物等污染防治成\n效明显；城镇环境基础设施建设和运行水平得到提升。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1、环境容量\n环境容量应是一个系统性的、与人类社会行为息息\n相关的动态变化量。环境容量的概念表述了环境容纳\n污染物的能力，但这只是环境功能的一部分。\n除此之外，环境还为人类提供了生存和发展所必需\n的资源、能源，为人类提供各种精神财富和文化载体。\n环境对人类社会的支持作用远大于环境容量\n这一概念的内涵。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力：\n是指不破坏自然环境的情况下，自然环境能够承载和\n\n#### 支撑的人类社会活动的强度和总量\n环境承载力原理：\n只有将人类社会各种生存和发展的活动的强度和总量，\n控制在自然环境的承载力范围之内，才能认为这种生存\n与发展活动才具有可持续性。环境承载力是判断一项人\n类活动是否对自然环境构成威胁或破坏的基本标准。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力是一个最低标准，是人类活动不能超过的\n界限，一旦超过这个界面，自然环境系统将发生不可\n逆转的破坏，进而对人类的健康生存和发展构成危害。\n\n#### 科学地确定一个地区、城市\n\n#### 的环境承载力，确定人类活\n\n#### 动的环境限制底线，是环境\n\n#### 管理最重要的基础工作之一\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力是环境系统固有功能的表现，它不仅与环\n境系统本身的结构有关，还与外界（人类社会经济活\n动）的输入输出有关。\n\n#### 环境承载力的描述\nEBC = f(T,S,B)。 人类经济行为\n\n#### 的规模与方向\n\n#### 时间 空间\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2、环境承载力\n人类积极的环保行为可在一定程度上提高环境承载\n力。如人类通过优化自己的活动，可以提高某一区\n域的环境承载力，使其承载更多的人口和发展活动。\n人类可以通过修建污水处理厂，\n\n#### 废弃物处理中心、绿色造林等\n\n#### 生态环境保护和建设产业，进\n一步提高环境承载力。这是人\n\n#### 类环境管理行为合理性的依据\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2、环境承载力\n\n#### 环境承载力指标体系\n环境系统与人类社会经济系统：物质、能量和信息的代谢，可以分为三部分指标：\n资源供给指标。如水资源、土地资源和生物资源的数量、质量和开发利用程度；\n社会影响指标。如经济总量、污染治理投资、公用设施水平和人口密度等；\n污染容纳指标。如污染物的排放量、绿化状况和污染物净化能力等。\n通过环境承载力指标体系，可以间接量化表达某一区域的环境承载量和环境承载力。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2、环境承载力\n\n#### 环境承载力的特征\n客观性和主观性：客观性体现在一定时期和状态下的环境承载力\n是客观存在的，是可以衡量和评价的；主观性体现在人们对环境\n承载里的评价分析具有主观性。\n区域性和时间性：指不同时期、不同区域的环境承载力是不同的，\n相应的评价指标的选取和量化评价方法也应有所不同。\n动态性和可调控性：指其大小是随着时间、空间和生产力水平的\n变化而变化的。人类可以通过改变经济增长方式、提高技术水平\n等手段来提高区域环境承载力，使其向有利于人类的方向发展。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n环境容量与环境承载力的区别与联系\n\n#### 环境容量 环境承载力\n\n#### 区别\n是自然生态环境的基本属性之一 既不是纯粹描述自然环境特征的量\n\n#### 也不是一个描述人类社会的量\n侧重反映环境系统的自然属性，即内 侧重体现和反映环境系统的社会属性，\n在的自然票赋和性质 即外在的社会票赋和性质\n\n#### 联系\n在科学技术和社会关系发展的一定阶 一定时期、一定状态下的环境承载力\n段，环境容量具有相对的确定性、有 也是有限的，但可以通过人类环境保\n\n#### 限性 护行为动态的、可调控的\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 生态系统的生态链原理\n所谓生态链原理系指按照生态学第二定律“每一种\n事物无不与其他事物相互联系和相互交融”的原理，模\n仿生态系统物质循环和能量流动的规律重构工业（产业）\n系统，推行循环经济模式，研究现代工业系统运行机制\n的耦合思想，是环境规划与管理的重要理论基础。\n1.工业生态学\n2.生态工业园\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1、工业生态学\n（1）工业生态学的定义\n工业生态学是”人类在经济、文化和技术不断发展的前提下，\n有目的、合理地去探索和维护可持续发展的方法”，“要求不是孤立而\n是协调地看待产业系统与其周围环境的关系”。\n工业生态学又称产业生态学，是一门研究社会生产活动中自然\n资源从源、流到汇的全代谢过程、组织管理体制以及生产、消费、调\n控行为的动力学机制、控制论方法及其与生命支持系统相互关系的系\n统科学。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n#### 四五 环境规划与管理的理论基础\n工业生态学实践者界定的工业的外延非常广泛，涵盖了人类的各种活动，\n其研究范围不仅仅局限在一个企业的围墙之内，而是扩展到人类生存和活动\n对地球造成的各种影响，包括社会对资源的利用，成为循环经济理论产生的\n基础。它认为工业系统中的物质、能源、信息的流动和储存不是孤立的简单\n叠加关系，而是像自然生态系统那样可以循环运行，他们之间相互依赖、相\n互作用、相互影响，形成复杂的、相互连接的网络系统。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n#### 四环境规划与管理的理论基础\n工业生态学的思想包含了”从摇篮到坟墓”的全过程管理系统观，即在产\n品的整个生命周期内不应对环境和生态系统造成危害，产品生命周期包括原\n材料采掘、原材料生产、产品制造、产品使用以及产品用后处理。工业代谢\n分析和生命周期评价是目前工业生态学中普遍使用的有效方法。\n工业生态学以生态学的理论观点考察工业代谢过程，亦即从取自环境到\n返回环境的物质转化全过程，研究工业活动和生态环境的相互关系，以研究\n调整、改进当前工业生态链结构的原则和方法，建立新的物质闭路循环，使\n工业生态系统与生物圈兼容并持久生存下去。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）特征及趋势\n工业生态学领域开始社群化，目前已经出现了专注于物质流\n分析的分会和专注于生态工业发展的分会两大子群。发达国家占\n据工业生态学领域的主导地位，且欧、美、日三足鼎立的格局日\n益明显。其中，美国强于概念体系、理论构建和全球视野，欧洲\n强于大项自主导和系统实践，日本则精于刻画并看眼于亚洲视角。\n工业生态学的理论基础和学科体系仍然比较模糊，社会物质代谢\n和生态工业发展成为学科的主体构成，但前者偏于还原视角，后\n者理论建构不足。生态工业园区、城市代谢、节能减排与气候变\n化等都成为了工业生态学应用的热点领域，\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2、生态工业园\n生态工业园是建立在一块固定地域上的由制造企业和服务企\n业形成的企业社区。在该社区内，各成员单位通过物流或能流传\n递等方式把不同工厂或企业连接起来，形成共享资源和互换副产\n品的产业共生组合，使一家工厂的废弃物或副产品成为另一家工\n厂的原料或能源，模拟自然系统，在产业系统中建立”生产者一消\n费者一分解者”的循环途径。并通过共同管理环境事宜和经济事宜\n来获取更大的环境效益、经济效益和社会效益。整个企业社区能\n获得比单个企业通过个体行为的最优化所能获得的效益之和更大\n的效益。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）生态工业园的建设实践\n一般认为，生态工业园的形是工业共生体，丹麦的卡伦堡共生\n体就是工业共生体的成功典范。卡伦堡生态工业园是世界上最早\n也是最著名的生态工业园，其主体企业是发电厂、炼油厂、制药\n厂、石膏板生产厂。以这4个企业为核心，通过贸易方式利用对方\n生产过程中产生的废弃物和副产品，不仅减少了废物产生量和处\n理的费用，还产生了较好的经济效益，形成了经济发展与环境保\n护的良性循环。这是生态工业园发展的形，也是工业生态学的\n第一次实践。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n#### 四环境规划与管理的理论基础\n美国是世界上最为积极投身于生态工业园规划和建设的国家。\n在1994年，总统可持续发展理事会指定了4个社区作为生态工业\n园区的示范点，即马里兰州的巴尔的摩、弗吉尼亚州的查尔斯、\n德克萨斯州的布郎斯和田纳西州的恰塔努加。美国的生态工业园，\n涉及生物能源开发、废物处理、清洁工业、固体和液体废物的再\n循环等多种行业多个层次，并且各具特色。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n#### 四环境规划与管理的理论基础\n我国的工业园区发展经历了三个阶段，其中第一代园区内主\n要以劳动密集型的”三来一补“型企业为主，技术含量低；第二代\n园区的企业以高新技术应用为特征；第三代园区则是生态工业园，\n其基本功能是解决经济、环境和社会三者协调发展问题。\n2001年8月，我国第一个国家级生态工业示范园区一广西贵\n港国家生态工业（制糖）示范园区由原国家环保总局授牌建设。之后，\n辽宁、江苏、山东、天津、新疆、内蒙古、注江、广东等省、直\n辖市、自治区分别开展了生态工业园区建设的试点，试点不仅覆\n盖制糖、造纸、化工、水泥、冶金等传统行业，也有电子、环保、\n\n#### 汽车、生物化工等高科技行业\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2003年12月国家环保总局把生态工业示范园区（生态工业园\n区）定义为依据清洁生产要求、循环经济理念和工业生态学原理\n而设计建立的一种新型工业园区。它通过物流或能流传递等方式\n把不同工厂或企业连接起来，形成共享资源和互换副产品的产业\n共生组合，使一家工厂的废弃物或副产品成为另一家工厂的原料\n或能源，模拟自然系统，在产业系统中建立“生产者一消费者一分\n解者”的循环途径。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n生物多样性原理 一与自然和谐相处的环境伦理观\n1、生命中心主义\n·生命中心主义的代表人物之一保罗?泰勒在《尊重自然》一\n书中写到：“采取尊重自然的态度，就是把地球自然生态\n系统中的野生动物看做是具有固有价值的东西。“根据他\n的意见，所谓”尊重自然”就是尊重”作为整体的生物共同\n体”，而尊重”生物共同体”就是承认构成共同体的每个动\n植物体的”固有的价值”。并认为，人类不是万物的中心，\n\n#### 所有生命都应该受到尊重\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n提出生命中心主义的环境伦理观，\n其目的是为了保护野生的动物，\n避免被人类伤害。由于人类在组\n\n#### 成社会、进行生产和发展文化的\n\n#### 过程中，已经具备了其他生物无\n\n#### 与伦比的力量和优势，因此，只\n\n#### 有从价值观上肯定野生动植物也\n\n#### 像人一样具有它不可剥夺的“权\n\n#### 利”与“价值”，才能避免人类对\n\n#### 自然生物的进一步伤害，并使人\n类承担起对自然的伦理责任。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 四五 环境规划与管理的理论基础\n2、地球整体主义\n李奥波德提出”大地伦理”，是指”规范人与大地以及人与依存\n于大地的动植物之间关系的伦理规则”，其基本主张是要将人\n“从大地这一共同体的征服者转变成为这一共同体的平凡一员、\n一个构成要素”。\n“大地伦理”的特征是将”共同体”的概念从以往伦理学所研究的\n人类社会共同体的关系扩展到了大地。这里”大地”包括土壤、\n水、植物、动物等，其实是整个自然生态系统。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 四环境规划与管理的理论基础\n3、代际均等的环境伦理观\n与生命中心主义及地球整体主义不同，持这种观点的人的立场\n是以人类为中心的。\n它只考虑人类各成员的均等，而将自然环境和其他生命有机体\n看做是人类均等义务，最终都源于我们人类各成员相互间所应\n承担的义务。\n·这一伦理观不同于传统的伦理观之处，是它把人类各成员间的平\n等关系从“代内”扩展到”代际”，认为在享有自然资源与拥有良好\n的环境上，我们的子孙后代与我们当代人具有同等的权利。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 阅读材料一生物多样性\n①什么是生物多样性？\n生物多样性（biologicaldiversity）是指地球上的生物（包括\n动物、植物、微生物）在所有形式、层次和联合体中生命的多样\n化，包括生态系统多样性、物种多样性和基因多样性。生物多\n样性是地球上生命经过几十亿年发展进化的结果，是人类赖以\n生存的物质基础。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 四环境规划与管理的理论基础\n如果你学过生物学，你会知道这是一种研究有生命的物体的学科，\n从研究最微小的生命组成部分，到植物和动物。而”多样性”简单来说\n就是”各种各样”的意思。生物多样性包括所有自然世界的资源，包括\n植物、动物、昆虫、微生物和它们生存的生态系统。它同样包括构造\n出生命的重要基石一一染色体、基因和脱氧核糖核酸。\n你也是生物多样性的一部分。生物多样性使生命在这个行星上变\n得可能。没有生物多样性，你也不能在这个行星上生存。就算你可以\n生存下来，你也不可能喜欢这个灰暗的、无生气的、光秃秃的、无聊\n的世界。没有生物多样性，你不会感受到树林带给你的绿意、海洋带\n给你的蓝色，也不会有你呼吸的空气、吃的食物、喝的水。\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 四环境规划与管理的理论基础\n②为什么生物多样性如此重要？\n生物多样性带给我们无尽美丽的自然世界。生物多样性可以帮\n助清洁我们呼吸的空气以及喝的水。人类还利用生物多样性得到了\n所需的全部食品、许多药物和工业原料。物种为人类提供了食物的\n来源，作为人类基本食物的农作物、家禽和家畜等均源自野生物种。\n野生物种是培育新品种不可缺少的原材料，特别是随着近代遗传工\n程的兴起和发展，物种的保存有着更深远的意义。物种是多种药物\n的来源，随着医学研究的深入，越来越多的物种被发现可作药用。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n\n#### 四环境规划与管理的理论基础\n以上的例子是人们所熟知的直接价值，而间接价值也非同小可：\n物种多样性对科学技术的发展是不可或缺的。仿生学的发展离不开丰富\n而奇异的生物世界。生物多样性是维持生态系统相对平衡的必要条件，某（些）\n物种的消亡可能引起整个系统失衡甚至崩溃。\n生物多样性的间接价值主要与其功能有关：固定太阳能、调节水文、防\n止水土流失、调节气候、吸收分解污染物、贮存营养元素并促进养分循环和\n维持进化过程等方面都与生物多样性间接相关。许多自前认为无足轻重的物\n种，可能有着重要的价值。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n\n#### 四环境规划与管理的理论基础\n③生物多样性现在的状况如何？\n地球上的生物种类非常丰富，自前科学家们估计现存的生物物\n种数量在870万种左右，其中包括777万种动物、29.8万种植物、\n\n### 61.1万种真菌、3.64万种原生动物和2.75万种藻类等。然而，这只\n是一个估计值，实际的物种数量可能会更多。不过经人类研究和加\n以利用的只是其中的一小部分。很多物种还没来得及定名就已灭绝。\n据估计，全球原始森林的面积仅占地球表面的2%左右。需要注\n意的是，原始森林的面积正在不断缩小，这对生物多样性和生态系\n统造成了严重威胁。无数的动植物在人类还没认识它们之前就随着\n原始森林的砍伐、污染、围湖填海等原因提前从地球上消失了。\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n\n#### 四环境规划与管理的理论基础\n不同类型的生态系统面积锐减，无法再现的基因、物种和生态系统正\n以前所未有的速度消失。如果不立即采取有效措施，人类将面临能否继续\n以其固有方式生活的挑战。生物多样性的研究、保护和持续合理利用待\n加强，刻不容缓。\n1994年12月29日，联合国大会49/119号决议案宣布12月29日为“国\n际生物多样性日”。从2001年起，根据第55届联合国大会第201号决议，\n国际生物多样性日由原来的每年12月29日改为5月22日。这个国际纪念日\n的确立，说明生物多样性问题已经引起各国政府的广泛关注。生物多样性\n保护与持续利用已成为人类与环境领域的中心议题。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n\n#### 四环境规划与管理的理论基础\n④中国采取了哪些措施？\n中国是生物多样性特别丰富的国家，以高等植物为例，中国约有3万\n种，美国约1.8万种，整个欧洲仅1.2万种。\n由于中国是人口最多的国家，对生物多样性具有很大的依赖性。中国\n经济的高速发展和庞大的人口压力给生物多样性造成很大影响，致使中国\n成为生物多样性受到严重威胁的国家。在《濒危野生动植物种国际贸易公\n约》列出的640个世界性濒危物种中，中国就占了约25%，共156种，形\n势十分严峻。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n\n#### 四环境规划与管理的理论基础\n截止到1995年末，全国已建成各级各类自然保护区799处，面\n积达7185万hm2，约占国土面积的7.48%，其中10处自然保护区\n加入”人与生物圈保护网络”，6处被列入《国际重要湿地名录》。到\n1995年底，全国建立珍稀濒危物种繁育基地200多处，国家濒危物\n种进出口管理中心在全国主要口岸城市设立了17个办事处。\n同时还组织实施了对大熊猫、朱、扬子鳄、海南坡鹿、野马、\n麋鹿、高鼻羚羊的”七大拯救工程”。\n面对全国范围内的生物物种危机，这些努力无疑是远远不够的，\n还需要全体国民的重视和对物种栖息地的持续改善\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n我们可以做些什么？\n\n#### 作为普通公民，我们能为生物\n多样性保护做些什么呢？\n最显而易见的是反对、监督、\n\n#### 制止偷猎、采摘珍稀野生动植物的\n\n#### 行为，让野生动植物远离我们的餐\n桌。穿着野生动物皮毛服装也是我\n们反对的行为。同时，在发展生产\n\n#### 的同时，尽可能保护野生动植物的\n栖息地。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 生态文明建设之可持续发展理论\n一、可持续发展的定义\n二、可持续发展的原则\n三、可持续发展研究的主要内容\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1、可持续发展的定义\n1987年，在《我们共同的未来》报告中正式使用了“可持续发\n展”的概念，即”既能满足当代人的需要，又不对后代人满足其需要\n的能力构成危害的发展”。\n1992年6月联合国环境与发展会议通过了以可持续发展为核心\n的《里约环境与发展宣言》和《21世纪议程》等重要文件。\n1994年3月，国务院第16次常务会议讨论通过了《中国21世纪\n议程-中国21世纪人口、环境与发展白皮书》，首次把可持续发展战\n略纳入我国经济和社会发展的长远规划。\n1997年把可持续发展战略确定为我国”现代化建设中必须实施\n的战略，与科教兴国战略一起被确定为中国走向21世纪的两大国家\n\n#### 战略\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n\n#### 四环境规划与管理的理论基础\n可持续发展包含需要和限制两层含义，需要是指世界各国人们\n的基本需要，应将此放在特别优先的地位来考虑；限制是指当前的\n技术状况和社会组织对环境满足现在和将来需要的能力施加的限制\n可持续发展理论的形成是以唯物史观为基础的，其直接目的是\n解决生态恶化的困境，寻求克服传统发展模式对生态环境产生负面\n影响的有效途径。可持续发展理论强调把环境保护作为发展进程的\n一个重要组成部分，作为衡量发展质量、发展水平和发展程度的客\n观标准之一。注重环境与经济的协调，人与自然的和谐，认为健康\n的经济发展应建立在生态可持续、社会公正和人民积极参与自身发\n展决策的基础上。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2、可持续发展的原则\n1.协调原则：社会、经济、环境。\n2.公平原则：自然资源、社会财富\n3.持续原则：当前利益、长远利益\n4.共同原则：协调、公平、持续。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### 四环境规划与管理的理论基础\n3、可持续发展的主要内容\n1.环境保护与可持续发展\n环境保护是可持续发展的重要方面；可持续发展的核心是发\n展，但要求在严格控制人口、提高人口素质和保护环境、资\n源永续利用的前提下进行经济和社会的发展。环境保护是区\n分可持续发展与传统发展的分水岭和试金石\n现代发展不仅满足于物质和精神消费，还把建设舒适、安全、\n清洁、优美的环境作为实现的重要目标。可持续发展把环境\n保护作为衡量发展质量、发展水平和发展程度的客观标准之\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### 四环境规划与管理的理论基础\n可持续发展要求加快环保新技术研制和普及，只有大量使用\n先进科技才能使单位生产量的能耗、物耗大幅度下降，减轻\n环境的污染负荷。环境保护是可持续发展进程的一个部分，\n可持续发展非常重视环境保护，把环境保护作为它积极追求\n实现的最基本的目的之一。\n可持续发展一方面要求人们在生产时少投入，多产出；另一\n方面要求人们消费时尽可能多利用，少排放。因此，我们必\n须纠正过去单纯靠增加投入、加大消耗实现发展和以牺牲环\n境来增加产出的做法，从而使发展更少的依赖有限的资源，\n\n#### 更多的与环境容量有机的协调\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n#### 八 环境规划与管理的理论基础\n2.经济与可持续发展\n人类要走可持续发展之路，经济系统的生态化是必由之路。\n经济生态化核心是经济系统向自然生态系统有选择性的学习\n重新定位经济系统，保持经济系统索取和资源环境供给之间\n协调，经济系统废弃物排放和环境承载力协调。\n构建循环型经济，更是可持续发展的工具和钥匙。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n\n#### 四环境规划与管理的理论基础\n3.社会与可持续发展\n对人口资源的正确估计是可持续发展战略考虑的前提\n之一。要考虑人口的绝对数量与粮食问题、人口老化\n及养老保障、城市化带来的农业人口过剩、妇女问题\n和社会分工、人口素质、教育和社会结构的完善、人\n口信息的开发与利用及家庭结构问题。另外灾害防治\n和环境法制的研究也是可持续发展的重要方面。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n社会发展要和谐发展，和谐发展的核心是科学发展观，即”坚持以\n人为本，树立全面、协调、可持续的发展观，促进经济社会和人\n的全面发展”和”统筹城乡发展、统筹区域发展、统筹经济社会发\n展、统筹人与自然发展、统筹国内发展与对外开放的要求”。和谐\n发展强调”各明其位”、“各得其所”和“各尽所能”。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n\n#### 四环境规划与管理的理论基础\n4.区域的可持续发展\n区域可持续发展的核心就是经济增长点。\n首先其规模应相对地大，才能产生充分的直接效应和间接效\n应;\n其次，应当是增长最快的产业和地区；\n第三，应同其他产业部门之间具有高强度的投入产出关系，\n能够是增长效应被传递分散；\n第四，它应是创新的”朝阳式”产业或企业。新经济增长点\n的作用已被中国经济发展的实际所证实。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 可持续发展的基本思想\n（1）可持续发展并不否定经济增长，尤其\n是不能否定欠发达国家的经济增长，但需\n\n#### 要重新审视如何实现经济增长\n·经济增长一一主要指GNP或GDP增长是\n一种数量上扩大的范式；\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 必须正确认识GDP的数量和质量\n·GDP的局限性：不能反映社会成本、社会分配和社会公正\n资源环境代价；不能衡量经济增长的效率、效益和质量\n5岁以下要儿死亡率的下降%） 成人识字率变化(%)\n预期寿命变化（%)\n人均GDP变化(%) 20 人均GDP变化（%) 人均GDP变化（%)\n数据：133个国家（1970-2002年），作者计算\n·只注重经济总量和速度的增长，而不顾资源损失、环境污染、生态破坏，\n有可能造成经济增长了，人民生活质量（HDI）却下降了的局面，经济也不能\n持续增长。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 可持续发展的基本思想\n（2）以提高生活质量为目标，同社会进步相适应\n(3) 承认自然环境的价值，而且这种价值不仅体现在\n环境对经济系统的支撑和服务价值上，也体现在环\n境对生命支持系统的不可缺少的存在价值上\n（4）以自然资源为基础、同环境承载能力相协调\n\"可持续性”可以通过适当的经济手段、技术措施\n\n#### 和政府干预得以实现\n目的是减少自然资源的耗竭速率，使之低于资源再\n\n#### 生速率\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 生态文明建设之”两山论“原理\n一、“两山论\"的含义\n二、“两山论\"的发展和生态文明思想\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 生态文明建设之”两山论“原理\n习近平总书记多次强调“绿水青山就是金山银山”，\n更进一步指出“树立正确的政绩观，不能只要金山银\n山，不要绿水青山”。“绿水青山就是金山银山\"已经\n成为习近平生态文明思想的重要组成部分，对我国生\n态环境和经济发展产生了深远的影响。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 发展历程\n2005年8月 2013年月 2015年月\n时任浙江省委书 习总书记提出两山论三个阶段 《关于加快推进生态\n记的习近平同志 1.既要绿水青山，也要金山银 文明建设的意见》将\n在浙江安吉考察 山。 “坚持绿水青山就是\n时提出：“绿水 2.宁要绿水青山，不要金山银 金山银山”写进了中\n青山就是金山银 山。 央文件，成为中国生\n山\"的科学论断。 3.绿水青山就是金山银山。 态文明建设的指导思\n想。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2016年月 2017年10月 2018年月\n联合国环境大会发布 习总书记在全国生态环\n\n#### 十九大将其写入党代会报告\n了《绿水青山就是金 保大会上提出了六项重\n\n#### 同时《中国共产党章程（修\n山银山：中国生态文 要原则，其中两山论就\n\n#### 正案）》在总纲中也增加了\n明战略行动》，为世 是六大重要原则之一，\n\n#### 两山论这一表述，称为我党\n界可持续发展理念提 为我国生态文明建设指\n的重要执政理念之一。\n供了“中国方案”。 明了方向。\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2016年月 2017年10月 2018年月\n联合国环境大会发布 习总书记在全国生态环\n\n#### 十九大将其写入党代会报告\n了《绿水青山就是金 保大会上提出了六项重\n\n#### 同时《中国共产党章程（修\n山银山：中国生态文 要原则，其中两山论就\n\n#### 正案）》在总纲中也增加了\n明战略行动》，为世 是六大重要原则之一，\n\n#### 两山论这一表述，称为我党\n界可持续发展理念提 为我国生态文明建设指\n的重要执政理念之一。\n供了“中国方案”。 明了方向。\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2019年6月 2020年03月\n中国的发展绝不会以牺牲环境为代 绿水青山就是金山银山”理念已\n价。我们将秉持绿水青山就是金山 成为全党全社会的共识和行动，成\n银山的发展理念，坚决打赢蓝天、 为新发展理念的重要组成部分。实\n碧水、净土三大保卫战，鼓励发展 践证明，经济发展不能以破坏生态\n绿水环保产业，大力发展可再生能 为代价，生态本身就是经济，保护\n源，促进资源节约和循环利用。 生态就是发展生产力。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 绿水青山就是金山银山\n绿水青山 指的是结构和功能良好的生态系统。\n金山银山：指的是满足人类需求的各种财富和福社。\n人类生态系统是人与自然相互依存、相互影响的有机整体，维持人与自\n然和谐健康发展的基本导向是以人的福社为目标，而人的福社既包含了对物\n质财富和精神财富的需求，也包含了对良好生态环境的需求。\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 绿水青山就是金山银山\n\n#### 生动诠释了生态经济的自然资本观\n“绿水青山\"是支撑人类发展的基础，不仅 习近平总书记这样论述\n\n#### 绿水青山就是\n为人类提供各种物质原料，还创造与维持 金山银山\n了地球生命支持系统，具有重要生态价\n值。\n\n#### 习近平论大力推进生态文明建设\n如果将生态系统转化为生态经济优势，\n自然资本将会成为国家财富的重要组成\n部分，绿水青山就变成了金山银山。\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n\ 生物、生物与环境之间的信息传递为人\n\n#### 信息传递\n\n#### 类服务\n·应用现代科学技术，操纵生物的活动\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 生产污染\n\n#### 科技 景观\n通讯 金融 资源利用 植物 能源\n工业 经济系统 贸易 水体 自然系统 矿产\n\n#### 农业 运输 管理 土地 动物\n\n#### 决策\n\n#### 建筑 大气\n\n#### 人\n\n#### 类 环\n\n#### 劳 品 服务 活\n\n#### 动 境\n\n#### 旅游 教育 影\n\n#### 力\n\n#### 居住 社会系统 文娱 响\n\n#### 能流和物流\n\n#### 饮食 医疗 信息流\n\n#### 供应\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 复合生态系统的内部矛盾\n1.要求自然环境相对稳定而实际剧变\n2.自然环境改变的快速性和恢复调节的缓慢性\n人类改造自然的能力越来越强，但恢复\n\n#### 调节本领还不够\n3.资源有限而人类需求无限；\n4.地球体积、物质有限而人口增长无限；\n\n#### 需要进行环境规划与管理\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n\n#### 环境规划与管理的理论基础\n复合生态系统理论在环境规划与管理中的应用\n不要将现有环境当作纯碎自然环境来规划与管理\n规划要以生态为导向，注重生态保护。\n规划中要注重社会、经济因素，应根据社会经济发\n\n#### 展变化而相应地调整\n一 复合生态系统中，最活跃的积极因素是人，最强烈\n的破坏因素也是人。\n一复合生态系统是一类特殊的人工生态系统，兼有复\n杂的社会属性和自然属性两方面的内容。\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 生态文明建设之经济学原理\n一、环境经济学的基本观念\n二、环境经济学的基本理论和方法\n\n---\n\n<!-- page 91 -->\n\n![page 91](page_091.jpg)\n\n\n#### 四环境规划与管理的理论基础\n环境规划与管理的任务是协调环境保护和经济建设的同\n步发展，实现经济效益、社会效益和环境效益的统一。环境\n问题实质上是一个经济问题。为了增强综合国力和提高人民\n生活水平，我国必须实现持续的经济增长，同时又不能破坏\n经济发展所依赖的资源和环境基础。因此，资源、环境和经\n济政策必须相辅相成。随看我国向社会主义市场经济体制的\n转变，在政府的宏观调控下，市场经济机制在规范对环境的\n态度和行为方面将起到越来越重要的作用，经济杠杆作用在\n强化环境管理过程中，也将发挥日益重要的作用。\n\n---\n\n<!-- page 92 -->\n\n![page 92](page_092.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n环境经济学就是研究合理调节人与自然之间的物质变换，使\n社会经济活动符合自然生态平衡和物质循环规律，不仅能取得近\n期的直接效果，又能取得远期的间接效果。\n建立可持续发展的经济体系、社会体系和保持与之相适应的\n可持续利用的资源和环境基础，是环境经济学研究的主要任务。\n\n#### GREEN\n\n---\n\n<!-- page 93 -->\n\n![page 93](page_093.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（1）环境经济学的基本理论\n为了保障环境资源的持续利用，也必须改变对环境资源无偿\n使用的状况，对环境资源进行计量，实行有偿使用，使社会不经\n济性内在化，使经济活动的环境效应能以经济信息的形式反馈到\n国民经济核算体系中，保证经济决策既考虑直接的近期效果，又\n考虑间接的长远效果，促进经济发展符合自然生态规律的要求。\n具体包括环境经济学理论在可持续发展条件下的修正和应用，完\n善国民经济核算体系，环境资源价值评估等。\n\n---\n\n<!-- page 94 -->\n\n![page 94](page_094.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）社会生产力的合理组织\n合理开发和利用资源，合理规划和组织社会生产力，是保护\n环境最根本、最有效的措施。为此必须以科学发展观为指导，改\n变单纯以GDP衡量经济发展成就的传统方法，把环境质量的改善\n作为经济发展成就的重要内容，使生产和消费的决策同生态学的\n要求协调一致；要研究把环境保护纳入经济发展计划的方法，保\n证基本生产部门和消除污染部门按比例地协调发展；要研究生产\n布局和环境保护的关系，按照经济观点和生态观点相统一的原则，\n拟定各类资源开发利用方案，确定国家或地区的产业结构，以及\n社会生产力的合理布局。\n\n---\n\n<!-- page 95 -->\n\n![page 95](page_095.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n（3）环境保护的经济效果\n\n#### 包括环境污染、生态失调的经济\n损失估价的理论和方法，各种生产生\n活废弃物最优治理和利用途径的经济\n\n#### 循环\n选择，区域环境污染综合防治优化方 经济\n案的经济分析，各种污染物排放标准\n确定的经济准则，各类环境经济数学\n模型的建立等。\n\n---\n\n<!-- page 96 -->\n\n![page 96](page_096.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n（4）运用经济手段进行环境管理\n经济手段在环境管理中是与行政、法律、教育手段相互配合使用的一\n种方法。它通过税收、财政、信贷等经济杠杆，调节经济活动与环境保护\n之间的关系、污染者与受污染者之间的关系，促使企业和个人的生产和消\n费方式符合可持续发展的需要。当前，更应加强对市场经济条件下环境经\n济政策的研究，建立适合中国国情的环境税收制度、资源有偿使用制度和\n资源定价政策，依靠价值规律和供求关系来强化环境规划与管理。\n\n#### 环保 创新\n\n#### 可持续\n\n#### 实在\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2、环境经济学的基本理论与方法\n1.基本理论\n（1）经济效率理论\n意大利社会学家、经济学家帕累托在20\n世纪初从经济学理论出发探讨资源配置\n效率问题，提出了著名的”帕累托最适 v381234191/?vdsource=024b2\n度“理论。 3e8a203cda77162896ddf36a118\n经济效率理论认为，经济效率应该是社会\n经济效率，既不是传统生产力理论中的”产\n出最大化”，也不是传统消费者理论中的\n效用最大化”，而应寻求个人、集体和社\n会之间经济效率的协调与统一。\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）外部性理论\n\n#### 价格 MSC\n由马歇尔提出，经庇古等学者深入研究 MC\n后形成的外部性理论，为环境经济学的\n建立和发展奠定了理论基础。分为正外 MEC\n部性（或称外部经济）和负外部性（或 D\n称外部不经济）。 Q1Q 上游林木欧伐量\n\n#### 图1上游林木砍伐的负外部效应\n·外部性理论认为，在没有市场力的作用下，\n外部性表现为财经独立的两个经济单位（如 价格 MSB\n公司和消费者）的相互作用。并应用一般均\n衡分析法，分析环境问题产生的经济根源， MC\n即生产和消费的外部性和它的影响范围，提\n出解决环境污染这个外部不经济性问题的各\n\n#### Q Q1 造林水平\n种方法。 图2上游植树造林的正外部效应\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n\n#### 四环境规划与管理的理论基础\n(1）外部经济性(效益，正)\n口环境质量改善；\n口生态系统功能与价值的恢复与提高；\n口提高人体健康水平（或降低健康风险）；\n口资产增值和美学景观享受等。\n(2）外部不经济性（费用，负）\n\n#### 口环境污染\n口生态破坏（退化）等。\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n（3）物质平衡理论\n在20世纪60年代中期，鲍尔丁依据热力学定律，提出了一个最基本的环\n境经济学问题：环境与经济相互作用关系问题。他指出，首先，根据热力学\n第一定律，生产和消费过程产生的废弃物，其物质形态并没有消失，必然存\n在于物质系统之中，因此，在规划经济活动时，必须同时考虑环境吸纳废弃\n物的容量；第二，虽然回收利用可以减少对环境容量的压力，但是根据热力\n学第二定律，不断增加的熵意味着100%的回收利用是不可能的。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n·物质平衡理论的一个现代经济系统由物质加工、能量转换、污染物处理和\n最终消费四个部门（或部分）组成。在这四个部门之间及由这四个部门组成\n的经济系统与自然环境之间，存在着物质流动关系。为了使人类经济步入可\n持续发展的轨道，减少经济系统对自然环境的污染，最根本的办法是提高物\n质及其能量的利用效率和循环使用率，减少自然资源的开采量和使用量，从\n而降低污染物的排放量。循环经济的提出和发展，正是物质平衡理论在可持\n\n#### 续条件下的实践\n\n#### 循环\n\n#### 经济\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n·物质平衡理论的一个现代经济系统由物质加工、能量转换、污染物处理和\n最终消费四个部门（或部分）组成。在这四个部门之间及由这四个部门组成\n的经济系统与自然环境之间，存在着物质流动关系。为了使人类经济步入可\n持续发展的轨道，减少经济系统对自然环境的污染，最根本的办法是提高物\n质及其能量的利用效率和循环使用率，减少自然资源的开采量和使用量，从\n而降低污染物的排放量。循环经济的提出和发展，正是物质平衡理论在可持\n\n#### 续条件下的实践\n\n#### 循环\n\n#### 经济\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（4）自然环境价值理论\n约翰?克鲁蒂拉提出了“舒适型资源的经济价值理论”。一些稀有的生物物种、\n珍奇的自然景观、重要的生态环境系统，这些资源称为舒适型资源\n保护好舒适型资源，或者将这类资源的使用严格限制在可再生的限度之内是\n十分必要的。舒适型资源具有损坏的单向性，被破坏就意味着永远丧失\n如果承认舒适型资源是不可逆的，那么就应当重新认识舒适型资源的价值构\n成。当代人直接或间接利用舒适型资源获得的经济收益是舒适型资源的”使\n用价值”；当代人为了保证后代人能够利用资源而做出的支付和后代人因此\n而获得的收益，是舒适型资源的”选择价值”；人类不是出于任何功利的考虑，\n只是为了资源的存在而表现出的支付意愿是舒适型资源的“存在价值”，这一\n理论最重要的责献在于为定量评价舒适型资源的经济价值奠定了坚实的理论\n基础。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（5）排污交易权理论\n1960年，科斯提出科斯定理，即”在设计和选择社会格局时，我们应\n当考虑总的效果”，“关键在避免较严重的损害”。著名经济学家戴尔\n期提出的排污交易权理论就是在科斯定理的基础上发展起来的。\n排污交易权理论认为，环境资源是一种商品，政府是所有权，政府可\n以在专家帮助下组织实施排污权交易，通过市场竞争机制，促使外部\n性内部化，达到避免较严重的损害的自的。也就是政府有效地使用其\n对环境资源这个特殊商品的产权，使市场机制在环境资源优化配置和\n外部性内部化问题上发挥最佳作用。这就是著名的排污交易权理论。\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2.主要分析方法\n（1）环境退化的宏观经济评估\n?环境退化包括自然资源耗竭和环境质量恶化两部分。环境退\n化的经济评估，主要研究如何确定环境资源价值核算的指标\n体系、核算方法，将环境退化纳入到国民收入核算体系中，\n争取改进现行的国民收入核算体系，在经济增长中考虑环境\n资源的消耗。\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）环境质量的费用效益分析\n这是环境经济学的核心内容，包括环境资源的价值核算理论\n和方法；环境污染和生态破坏的经济损失评估技术；环境质\n量改善的效益评估；污染控制的费用评估；环境质量影响的\n剂量反应关系；环境规划、政策和标准制定中费用效益分析\n方法的应用；环境效果分析和风险分析等。\n\n---\n\n<!-- page 107 -->\n\n![page 107](page_107.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（3）环境经济系统的投入产出分析\n?投入产出分析可以用定量方式来描述环境与经济的协调关系，\n可以是宏观的定量描述，将环境保护纳入国民经济综合平衡计\n划；也可以是微观的定量描述，描述一个企业各生产工序间环\n境与经济的投入产出关系。这是建立环境管理最优化模型和循\n环经济发展模式的基本方法。\n（4）环境资源开发项目的经济评价\n在考察费用和效益时要考虑到间接（外部）费用和间接效益\n间接费用和效益的计算要涉及到环境质量费用效益分析技术\n以及资源的机会成本或影子价格计算\n\n---\n\n<!-- page 108 -->\n\n![page 108](page_108.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 生态文明建设之管理二重性原理\n一、管理的二重性特点\n二、管理的职能\n\n---\n\n<!-- page 109 -->\n\n![page 109](page_109.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1.管理二重性的涵义\n管理作为一种社会活动，必然有其质的特性。管理的本质\n具有二重性，它既有同生产力、社会化大生产相联系的自然属\n性，又有同生产关系、社会制度相联系的社会属性。\n\n#### 生产力 自然属性\n\n#### 生产活动\n\n#### 统一性\n\n#### 生产关系 社会属性\n\n---\n\n<!-- page 110 -->\n\n![page 110](page_110.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（1）管理的自然属性\n管理的自然属性表明，管理之所以必要，是由劳动的社会化和生产力发\n展水平所决定的。管理是分工协作的共同劳动得以顺利进行的必要条件。\n管理的自然属性就是管理的技术性，技术性是管理本质的一个重要方面。\n管理是生产力的要素之一，不进行有效的管理，生产就无法顺利地进行，\n更谈不上发展。\n\n---\n\n<!-- page 111 -->\n\n![page 111](page_111.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）管理的社会属性\n管理的社会属性是与生产关系、社会制度的性质紧密相关的。因\n为管理是一种社会活动，管理必须且只能在一定的社会历史条件\n下和一定的社会关系中进行，因而也必然采取一定的社会组织形\n式来执行管理的职能。\n管理学中的组织目标、组织道德、领导作风、激励方式、管理理\n念、人际关系、群体价值观、组织文化等，主要是对人的管理，\n具有较强的意识形态色彩，属于生产关系和社会关系的范畴。\n\n---\n\n<!-- page 112 -->\n\n![page 112](page_112.jpg)\n\n\n#### 四环境规划与管理的理论基础\n2.自然属性和社会属性的关系\n管理的二重性是相互联系、相互制约的。\n一方面，管理的自然属性不可能孤立存在，总是在一定的社会制\n度和生产关系条件下发挥作用。而管理的社会属性也不可能脱离\n管理的自然属性而存在，否则管理的社会属性就会成为没有内容\n的形式。\n另一方面，两者又是相互制约的。管理的自然属性要求具有一定\n的社会属性的组织形式和生产关系与其适应。同样，管理的社会\n属性也必然对管理的科学技术等方面发生影响或制约作用。\n管理的自然属性和社会属性是两位一体的，不能把它们截然分开。\n就像一辆车的两个轮子，两个轮子一起转动，车辆才能前进\n\n---\n\n<!-- page 113 -->\n\n![page 113](page_113.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 管理过程\n\n#### 我国的许多学者把管理的自\n\n#### 然属性称为管理的一般职能，管\n\n#### 生产力 生产关系\n\n#### 理的社会属性称为管理的特殊职\n\n#### 能，而把管理的各项工作称为管\n\n#### 管理的 管理的\n自然属性 社会属性 理的基本职能。\n\n#### 管理的一般职能和管理的特\n\n#### 管理的 管理的\n一般职能 特殊职能 殊职能总是结合在一起，在管理\n\n#### 的基本职能中体现出来并一起发\n管理的基本职能：计划、组织、控制 挥作用。\n\n---\n\n<!-- page 114 -->\n\n![page 114](page_114.jpg)\n\n\n#### 四环境规划与管理的理论基础\n二、管理的职能\n前已述及，法约尔将管理分为计划、组织、指挥、协调、控\n制5种职能，而在法约尔管理思想基础上发展起来的管理过程学\n派进一步将管理职能归为计划、组织和控制三大职能，为我们提\n供了一个研究管理核心功能的框架。\n1.计划职能\n2.组织职能\n3.控制职能\n\n---\n\n<!-- page 115 -->\n\n![page 115](page_115.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1.计划职能\n（1）计划的性质\n计划的目标性。任何组织或个人制定计划都是为了有效地达到某种目\n标。可以说，没有目标的行动计划或多或少是一种盲目的行动。\n计划的首要性。计划是管理的首要职能。管理过程当中的其他职能都\n是为了支持、保证目标的实现。而这些职能只有在计划工作确定了目\n标之后才能进行。\n计划的普遍性。任何管理者或多或少都有某些制定计划的权力和责任\n高层管理者不可能也不必要对自己组织内的一切活动作出确切的说明，\n这也是有效的管理者所必须遵循的一条原则。也就是说，计划不仅仅\n是领导的职责，也是组织成员的普遍职责。\n\n---\n\n<!-- page 116 -->\n\n![page 116](page_116.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n2.组织职能\n（1）组织的含义\n\n#### 古典管理学派的定义将组织\n\n#### 定义为：“组织是为了达到某些特\n\n#### 定目标经由分工与合作及不同层\n\n#### 次的权力和责任制度，而构成的\n人的集合。“这个含义具有3层意\n思：①组织必须具有目标；②没\n有分工与合作也不能称其为组织；\n\n#### ③组织要有不同层次的权力与责\n任制度。\n\n---\n\n<!-- page 117 -->\n\n![page 117](page_117.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（2）组织环境\n任何组织都是在一定的环境下生存和发展的。环境给组织提供资\n源，吸收组织的产出，同时又给予组织许多约束。\n一个组织要保持持续的发展，它就必须适合其周围的环境。\n组织环境包括许多要素，其中最主要的是人力、物质、资金、气\n候、市场、文化、政府政策和法律。环境总是处于变化之中，有时变\n化剧烈，有时变化缓慢。当环境变到足以阻碍组织的发展时，就必须\n对组织进行调整和改革，以适应环境的变化。\n\n---\n\n<!-- page 118 -->\n\n![page 118](page_118.jpg)\n\n\n#### 环境规划与管理的理论基础\n3.控制职能\n（1）控制与控制系统\n①控制的含义：\n\n#### 法约尔认为，控制是监视各\n\n#### 人是否依照计划、命令及原则执\n行工作。\n\n#### 孔茨则认为，控制是按照计\n\n#### 划标准衡量计划的完成情况和纠\n\n#### 正计划执行中的偏差以确保计划\n目标的实现。\n\n---\n\n<!-- page 119 -->\n\n![page 119](page_119.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### ②控制系统\na.控制的目标体系。任何控制活动和行为都是有一定目标取向的，\n无目标的控制是不存在的。\nb.控制的主体。控制系统的主体是各级管理者以及他们所属的职\n能部门。一般而言，中低层管理层执行的主要是例行的、程序性\n的控制，而高层管理者执行的主要是例外的、非程序性的控制。\nc.控制的客体（对象）。控制系统的控制对象是整个组织的活动\n即在控制活动中是把管理活动当作一个总体来控制的，而不是把\n各项活动孤立地看待。只有统一的控制才能使整体协调一致，达\n到整体的优化，实现总的组织目标，否则就会顾此失彼。\n\n---\n\n<!-- page 120 -->\n\n![page 120](page_120.jpg)\n\n\n#### 四环境规划与管理的理论基础\nd.控制方法、手段和工具。控制的方法有末端控制和源头控制、浓\n度控制和总量控制、分散控制和集中控制、静态控制和动态控制相\n结合的方法。控制的手段采用综合性手段，有法律手段、经济手段、\n行政手段、教育手段等。在现代环境管理系统中，控制的工具主要\n是电子计算机。\ne.控制机构。从纵向看，可分为不同地区、不同层次的控制；从横\n向看，可分为不同性质的专业控制，例如开发建设项目控制、自然\n保护区控制、污染源控制、环境监测控制以及环境监理控制等。\nf.信息控制系统。是控制活动的神经。控制系统的活动是按照所获\n得的信息来进行的。随看当代社会与经济发展的复杂化，信息量日\n趋增大，管理中的信息处理工作也逐渐发展形成了管理信息系统。\n\n---\n\n<!-- page 121 -->\n\n![page 121](page_121.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### ③控制的类型\n按照控制职能的需要，可分为五种控制类型。第一，按照控\n制活动的性质可以划分为预防性控制和更正性控制；第二，根据\n控制点位于整个活动过程中的位置划分为预先控制、过程控制和\n事后控制；第三，根据实施控制的来源划分为正式组织控制、群\n体控制和自我控制；第四，根据控制信息的性质划分为反馈控制\n和前馈控制；第五，根据控制所采用的手段划分为直接控制和间\n接控制。\n\n---\n\n<!-- page 122 -->\n\n![page 122](page_122.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n（2）控制的原则\n控制所牵涉的范围是十分广泛的。\n从总体上看，它既包括对人的控制，也\n包括了对物的控制，这就增加了控制的\n复杂性。为了进行有效的控制，要遵循\n以下原则：①公众参与原则：②系统控\n制的原则；③一致与比较的原则；④预\n防性原则；例外与重点原则；灵活\n性原则；经济合理原则；8反馈原则。\n\n---\n\n<!-- page 123 -->\n\n![page 123](page_123.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n（2）控制的原则\n控制所牵涉的范围是十分广泛的。\n从总体上看，它既包括对人的控制，也\n包括了对物的控制，这就增加了控制的\n复杂性。为了进行有效的控制，要遵循\n以下原则：①公众参与原则；②系统控\n制的原则；③一致与比较的原则；④预\n防性原则；例外与重点原则；灵活\n性原则；经济合理原则；⑧反馈原则\n\n---\n\n<!-- page 124 -->\n\n![page 124](page_124.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（3）控制的程序\n①控制的条件：\n任何形式的控制，都有一定的前提条件，这些前提条件是否\n充分，对于控制过程能否顺利展开有很大的影响。这些前提条件\n主要有以下几个方面：一是要有一个科学的、切实可行的计划；\n二是健全组织结构，完善责任制度；控制工作的主要内容，是根\n据各种信息，纠正计划执行中出现的偏差，以确保计划的实现；\n三是做好各种信息资料的收集、整理与分析工作；四是控制要有\n反馈渠道。\n\n---\n\n<!-- page 125 -->\n\n![page 125](page_125.jpg)\n\n\n#### 四环境规划与管理的理论基础\n②控制的程序：\na.制定标准。制定控制标准是实施控制的前提。一个好的标准应\n符合可行性、稳定性、简明性和一致性的要求；\nb.检查、对照、评价。控制过程的第二个步骤是检查、对照、评\n价实际工作与标准之间的差异。这个过程的工作要求对工作进程\n做深入调查，调查详细程度应与标准相吻合，在调查取得资料数\n据的基础上开展综合性分析评价。分析评价应综合运用统计分析\n系统分析、经济分析等方法。并将分析评价结果及时反馈；\nc.纠正偏差。首先应确定偏差产生的原因，其次制定补救措施。\n\n---\n\n<!-- page 126 -->\n\n![page 126](page_126.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 修订\n\n#### 控制① 控制③\n\n#### 计划 执行过程\n\n#### 制定标准 修正标准\n\n#### 控制②\n\n#### 检查、衡量\n\n#### 控制的程序\n\n---\n\n<!-- page 127 -->\n\n![page 127](page_127.jpg)\n\n\n#### 四环境规划与管理的理论基础\n（4）反馈控制和前馈控制\n①反馈控制：所谓信息反馈控制就是用过去的情况来指导现在和将\n来。在环境管理中通过制订环境质量标准来实现对环境质量的控制\n方式就是一种反馈控制，而建立环境管理信息系统则是将反控制\n\n#### 贯穿于管理全过程的基础\n②前馈控制：所谓前馈控制又可称为指导将来的控制，它的具体办\n法是不断利用最新的信息进行预测，把所期望的结果同预测的结果\n进行比较，采取措施使投入和实施活动与期望的结果相吻合。前馈\n控制的着眼点是通过预测被控对象的投入或者过程进行控制，以保\n证获得所期望的产出。这就解决了时滞现象所带来的问题。环境规\n划和环境影响评价是前馈控制方式在环境管理中的具体应用。\n\n---\n\n<!-- page 128 -->\n\n![page 128](page_128.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 干扰\n\n#### 前馈信息\n\n#### 输出\n\n#### 控制器 系统\n\n#### 控制\n(1)前馈控制方式\n\n#### 干扰\n\n#### 控制 输出\n\n#### 控制器 系统\n\n#### 反馈信息\n(2)反馈控制方式\n\n---\n\n<!-- page 129 -->\n\n![page 129](page_129.jpg)\n\n\n#### 四环境规划与管理的理论基础\n什么是管理的二重性特点，试采用管理二重性性质部析我国环境管\n理中存在的主要问题？\n简述计划职能、组织职能和控制职能的含义和作用\n什么是环境容量？什么是环境承载力？试分析两者关系\n\n#### 简述工业生态学的定义及其内涵\n"}, {"id": "pdf-003", "group": "原始课件 · PDF原文", "title": "003-第二三章环境规划与管理的政策方针法律法规-环境规划与管理", "md": "# 环境规划与管理\n\n> 来源: 003-第二三章环境规划与管理的政策方针法律法规-环境规划与管理.pdf\n> 页数: 118\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 环境规划与管理\n\n#### 授课教师：王思雨副教授\n联系方式：\neswangsiyu@hotmail.com\n办公地点：生态与环境学院208办公室\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 第二/三章\n环境规划与管理的政策 法规、制度、标准和\n\n#### 管理体系\n第一节 我国环境保护政策方针体系\n\n#### 第二节 环境保护法规体系\n第三节 环境规划与管理的法律制度体系\n\n#### 第四节 环境标准体系\n\n#### 第五节 环境管理机构体系\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 课前回顾\n\n#### 生态文明建设之生态学理论\n\n#### 生态文明建设之可持续发展原理\n\n#### 生态文明建设之“两山论”原理\n\n#### 生态文明建设之环境经济学原理\n\n#### 生态文明建设之系统论原理\n\n#### 生态文明建设之管理二重性原理\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n环境容量与环境承载力的区别与联系\n\n#### 环境容量 环境承载力\n\n#### 区别\n是自然生态环境的基本属性之一 既不是纯粹描述自然环境特征的量\n\n#### 也不是一个描述人类社会的量\n侧重反映环境系统的自然属性，即内 侧重体现和反映环境系统的社会属性，\n在的自然票赋和性质 即外在的社会票赋和性质\n\n#### 联系\n在科学技术和社会关系发展的一定阶 一定时期、一定状态下的环境承载力\n段，环境容量具有相对的确定性、有 也是有限的，但可以通过人类环境保\n\n#### 限性 护行为动态的、可调控的\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 可持续发展的基本思想\n（1）可持续发展并不否定经济增长，尤其\n是不能否定欠发达国家的经济增长，但需\n\n#### 要重新审视如何实现经济增长\n·经济增长一一主要指GNP或GDP增长是\n一种数量上扩大的范式；\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 必须正确认识GDP的数量和质量\n·GDP的局限性：不能反映社会成本、社会分配和社会公正\n资源环境代价；不能衡量经济增长的效率、效益和质量\n5岁以下要儿死亡率的下降%） 成人识字率变化(%)\n预期寿命变化（%)\n人均GDP变化(%) 20 人均GDP变化（%) 人均GDP变化（%)\n数据：133个国家（1970-2002年），作者计算\n·只注重经济总量和速度的增长，而不顾资源损失、环境污染、生态破坏，\n有可能造成经济增长了，人民生活质量（HDI）却下降了的局面，经济也不能\n持续增长。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 可持续发展的基本思想\n（2）以提高生活质量为目标，同社会进步相适应\n(3) 承认自然环境的价值，而且这种价值不仅体现在\n环境对经济系统的支撑和服务价值上，也体现在环\n境对生命支持系统的不可缺少的存在价值上\n（4）以自然资源为基础、同环境承载能力相协调\n\"可持续性”可以通过适当的经济手段、技术措施\n\n#### 和政府干预得以实现\n目的是减少自然资源的耗竭速率，使之低于资源再\n\n#### 生速率\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 环境规划与管理的理论基础\n\n#### 自然子\n·生物和环境\n\n#### 系统 ·自然物质基础\n\n#### 复合生态系统：在\n\n#### 社会子 ·人、产业、社会组织等\n\n#### 一定空间内生物群落\n·稳定、优质的生活是全\n\n#### 与非生命环境相互作 系统\n用的统一体。 人类的共同追求\n·产品的供需平衡、资金\n\n#### 经济子 积累的速率与利润等\n\n#### 系统 ·社会进步和环境保护的\n\n#### 必要条件\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 生产污染\n\n#### 科技 景观\n通讯 金融 资源利用 植物 能源\n工业 经济系统 贸易 水体 自然系统 矿产\n\n#### 农业 运输 管理 土地 动物\n\n#### 决策\n\n#### 建筑 大气\n\n#### 人\n\n#### 类 环\n\n#### 劳 品 服务 活\n\n#### 动 境\n\n#### 旅游 教育 影\n\n#### 力\n\n#### 居住 社会系统 文娱 响\n\n#### 能流和物流\n\n#### 饮食 医疗 信息流\n\n#### 供应\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 四环境规划与管理的理论基础\n(1）外部经济性(效益，正)\n口环境质量改善；\n口生态系统功能与价值的恢复与提高；\n口提高人体健康水平（或降低健康风险）；\n口资产增值和美学景观享受等。\n(2）外部不经济性（费用，负）\n\n#### 口环境污染\n口生态破坏（退化）等。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1.管理二重性的涵义\n管理作为一种社会活动，必然有其质的特性。管理的本质\n具有二重性，它既有同生产力、社会化大生产相联系的自然属\n性，又有同生产关系、社会制度相联系的社会属性\n\n#### 生产力 自然属性\n\n#### 生产活动\n\n#### 统一性\n\n#### 生产关系 社会属性\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 四环境规划与管理的理论基础\n二、管理的职能\n前已述及，法约尔将管理分为计划、组织、指挥、协调、控\n制5种职能，而在法约尔管理思想基础上发展起来的管理过程学\n派进一步将管理职能归为计划、组织和控制三大职能，为我们提\n供了一个研究管理核心功能的框架。\n1.计划职能\n2.组织职能\n3.控制职能\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 学习要点\n了解我国环境保护法规体系的构成和环境管理机构体系\n的发展；掌握我国环境保护基本方针和政策，掌握八项环境\n管理法律制度、环境规划法律制度；识记环境标准体系的概\n念和分类、作用和意义。\n学习重点：环境保护法规体系，我国环境保护基本方针\n和政策，八项环境管理法律制度，环境规划法律制度。\n学习难点：我国环境八项管理法律制度，环境标准体系\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n第一节 我国环境保护方针政策体系\n一、基本方针\n二、我国环境管理的基本政策\n三、环境规划与管理的相关政策\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n一、基本方针\n1.环境保护的”32字”方针\n1973年第一次全国环境保护会议上确定了我国环境保护\n工作的”32字\"基本方针：全面规划、合理布局、综合利用、\n化害为利、依靠群众、大家动手、保护环境、造福人民。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n全面规划：强调在发展经济的同时，必须对环境保护进行前瞻性的规划。\n合理布局：指在产业发展和城市建设中，应考虑对环境的影响，避免布局不当\n造成的污染。\n综合利用：提倡资源的循环利用和废物的再利用，减少对环境的破坏。\n化害为利：将有害的环境影响因素转化为有利的方面，提高环境的整体质量。\n依靠群众：鼓励社会各界参与环境保护，发挥公众的监督和参与作用。\n大家动手：呼吁每个人都参与到环境保护中来，从自我做起，减少污染。\n保护环境：直接强调了环境保护的重要性，明确了保护环境是每个公民的责任。\n造福人民：最终的目的是通过保护环境来实现可持续发展，造福后代。\n这一方针的制定和实施，为中国的环境保护措施提供了理论基础和行动指南，特别\n是在经济快速发展的同时，如何有效保护环境资源提供了指导原则。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n2.环境保护是我国的基本国策\n一是明确提出了环境保护是现代化建设中的一项\n战略任务，是一项基本国策，从而确立了环境保护在\n经济和社会发展中的重要地位；\n二是制定出我国环保事业的战略方针，即经济建\n设、城乡建设、环境建设同步规划、同步实施、同步\n发展，实现经济效益、社会效益和环境效益的统一。即\n同步发展方针；\n三是确定把强化环境管理作为当前工作的中心环\n节。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n3.持续发展战略方针\n联合国环境与发展会议结束后，1992年7月，党中央、\n国务院批准了《中国环境与发展十大对策》；1994年3月，国\n务院发布《中国21世纪议程一一中国21世纪人口、环境与发\n展白皮书》，确定了实施可持续发展战略的行动目标、政策框\n架和实施方案。\n\n#### 以实现更绿色更可持续的未来\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n中国环境与发展十大对策内容：\n（1）实行持续发展战略；\n（2）采取有效措施，防治工业污染；\n（3）开展城市环境综合治理，治理城市“四害”（即废气、废水、\n废渣和噪声）；\n（4）提高能源利用效率，改善能源结构；\n（5）推广生态农业，坚持不懈地植树造林，切实加强生物多样性\n的保护；\n（6）大力推进科技进步，加强环境科学研究，积极发展环保产业；\n（7）运用经济手段保护环境；\n（8）加强环境教育，不断提高全民族的环境意识；\n（9）健全环境法规，强化环境管理；\n（10）参照联合国环境与发展大会精神，制定我国行动计划\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n4.“三同步三统一\"的方针\n\n#### 在国家统一领导下，环境保护与\n\n#### 经济建设、城乡建设同步规划（前\n提）、同步实施（条件）、同步发展\n（目的），实现经济效益、社会效益\n和环境效益的统一。\n\n#### 在防治环境污染方面，实行”预防\n为主、防治结合、综合治理”的方针；\n在自然保护方面，实行”自然资源开\n发、利用与保护、增殖并重”的方针；\n在环境保护的责任方面，实行”谁污\n染谁治理，谁开发谁保护”的方针。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n二、我国环境管理的基本政策\n1、“预防为主，防治结合\"政策。\n主要措施包括：\n（1）把环境保护纳入国家的、地\n\n#### 方的和各行各业的中长期和年度经\n济社会发展计划；\n（2）对开发建设项目实行环境影\n响评价和“三同时”制度；\n（3）对城市实行综合治理。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n2、“污染者付费”政策。由环境破坏者承担治理费用和责任。按照\n《环境保护法》等有关法律规定，环境保护投资以地方政府和企业为\n主。企业负责解决自己造成的环境污染和生态破坏问题，不允许转嫁\n给国家和社会；地方政府负责组织城市环境基础设施的建设，设施建\n设和运行费用应由污染物排放者合理负担；对跨地区的环境问题，有\n关地方政府要督促各自辖区内的污染物排放者切实承担责任，不得推\n。主要措施：\n（1）结合企业技术改造防治工业污染；\n（2）向超标向大气、水体等排污企事业单位征收超标排放费，防治\n工业污染；\n（3）对污染严重的企事业单位实行限期治理等。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n3、“强化环境管理”政策--三大政策的核\n心 目的是通过强化政府和企业的环境\n治理责任，控制和减少因管理不善带来\n的环境污染和破坏。主要措施：\n（1）逐步建立和完善环保法规和体系，\n建立健全各政府的环境保护机构及国家\n和地方监测网络；\n（2）对重要城市实行环境综合整治定\n量考核；\n（3）广泛开展环境保护宣传教育，不\n断提高全民族的环境意识。\n（4）实行地方各级政府的目标责任制。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n三、环境规划与管理的相关政策\n（一）产业政策\n（二）技术政策\n（三）环境经济政策\n（四）生态环境政策\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n（一）产业政策\n产业结构政策的概念首先出现在二战后的日本，这绝非偶然。战后\n日本经济临崩溃，在这种情况下，日本政府通过规化产业结构高度化\n发展目标，设计产业结构高度化的途径，确定不同时期带动整个国民经\n济起飞的”主导产业”，并通过政府一系列的相应政策，措施来确保\n“主导产业”崛起，从而诱导经济按既定目标发展，日本政府不同时期\n实施各有侧重的产业结构政策，促进该国经济的迅速崛起。\n在短短二十年中，日本经济走完了西方发达国家花一二百年才走完\n的路。一些经济学家和世界组织认为日本经济发展的成功秘诀是靠产业\n政策的实施。从此，产业政策的概念开始流行，有些国家如韩国也开始\n实施产业结构政策。\n中国一二三产占比：\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n产业结构政策是国家颁布的有利于产业结构调整和行业发展的\n专项环境政策，包括产业结构调整政策、行业环境管理政策、限制\n发展的行业政策以及禁止发展的行业政策\n1.产业结构调整政策\n包括产业结构合理化和高级化两个方面。20世纪90年代以来，我国已颁\n布了一批产业结构调整政策，如《90年代国家产业政策纲要》、《汽车工\n业产业政策》、《关于全国第三产业发展规划的通知》、《外商投资产业\n指导目录》、《水利产业政策》、《当前国家重点鼓励发展的产业、产品\n和技术目录》以及《当前部分行业制止低水平重复建设目录》等。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n“十四五“期间，新一轮科技革命和产业变革将加快深度融合，推\n动体系内各项重大技术的突破。现代信息技术是新兴产业发展的重\n要领域，“十四五\"期间将大力支持大数据、云计算、物联网、人工\n智能、生物与医疗技术等重大科技创新和示范，促进产业级应用实\n现跨越式发展。继续推动能源转型，加快发展新能源产业，推广利\n用可再生能源，促进清洁能源的普及应用，推进大功率能源储存和\n高效利用，以及落实电池新材料和新技术的研究与应用。在新材料\n领域继续推进产业化创新，重点突破功能性超细纳米材料和高性能\n复合材料，提升先进金属材料和陶瓷材料的技术水平，支持生物材\n料和功能性有机高分子材料的发展。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n2.行业环境管理政策\n行业分类就是有规则的按照一定科学依据，对从事国民经济生产和经营\n的单位或者个体的组织结构体系的详细划分，如石油化工、交通运输、建\n筑建材、水利水电等。行业环境管理政策主要是针对本行业的特点而有针\n对性的环境管理政策，如《冶金工业环境管理若干规定》、《建材工业环\n境保护工作条例》、《化学工业环境保护管理规定》、《电力工业环境保\n护管理办法》、《关于加强乡镇企业环境保护工作的规定》、《关于发展\n热电联产的规定》、《关于加强水电建设环境保护工作的通知》以及《关\n于加强饮食娱乐服务企业环境管理的通知》等。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n3.限制和禁止发展的行业政策\n1996年8月，国务院发布了《关于环境保护若干问题的决定》，要求在\n1996年9月30日前，对小造纸、小制革、小染料厂及土法炼焦、炼硫、炼砷、\n炼汞、炼铅锌、炼油、选金和农药、漂染、电镀、石棉制品、放射性制品\n等“15小\"企业实行取缔、关闭或停产。\n1999年6月5日，国家经济贸易委员会、国家环保总局、机械工业部联合\n发布了《关于公布第一批严重污染环境（大气）的淘汰工艺与设备的通\n知》，规定了15种污染工艺和设备的淘汰期限和可替代工艺及设备。\n1999年12月又发布了《淘汰落后生产能力、工艺和产品目录（第二\n批）》，涉及8个行业119项。\n2000年6月，再一次发布了第三批自录，涉及15个行业120项内容。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n（二）技术政策\n环境保护技术政策以特定的行业或污染因子为对\n象，在产业政策允许范围内引导企业采取有利于\n保护环境的生产工艺和污染防治技术。\n技术政策注重发展高质量、低消耗、高效率的适\n用生产技术，重点发展技术含量高、附加值高、\n满足环保要求的产品，重点发展投入成本低、去\n\n#### 除效率高的污染控制适用技术\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n中华人民共和国中央人民政府 首页|简|繁|EN|登录|邮箱|：\n首页）政策）国务院政策文件库）国务院部门文件 字号：默认大超大 打印收藏留言\n标题：关于印发《“十四五”生态环境领域科技创新专项规划》的通知发文机关：科技部生态环境部住房城乡建设部气象局林草局\n发文字号：国科发社（2022）238号 来源：科技部网站\n主题分类：科技、教育\\其他 公文种类：通知\n成文日期：2022年09月19日\n科技部生态环境部住房和城乡建设部气象局林草局\n关于印发《“十四五”生态环境领域科技创新专项规划》的通知\n\n#### 国科发社（2022〕238号\n各省、自治区、直辖市及计划单列市科技厅（委、局）、生态环境厅（局）、住房和城乡建设厅（委）、气象局、林草厅（局），新\n疆生产建设兵团科技局、生态环境局、住房和城乡建设局，各有关单位：\n11/02/content 5723769.htm\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n（三）环境经济政策\n环境经济政策是适用价格、税收、财政、信贷、收费、保\n险等各种经济手段引导和促进环境保护的政策。它是一种内在\n约束力量。\n环境经济政策采用手段：明晰产权（所有权、使用权和开发\n权）、建立市场（可交易许可证、可交易环境股票等）、税收、收费\n（排污收费等）、罚款制度（违法/违约罚款）、金融手段（环境基\n金等）、财政手段（专项资金等）、责任赔偿（环境资源损害赔偿\n等）、证券与押金制度（环境行为债券、废物处理证券等）。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n国家环境经济政策进展评估报告2023\n郝春旭，爱玉，龙风，程翠云，李晓亮，董战峰 ，葛察忠 个\n生态环境部环境规划院，北京100041\n基金项目：国家社会科学基金重大项目“加快推进生态环境治理体系和治理能力现代化研究\"（20&ZD092）\n作者简介：郝春旭（1986-)，女，博士，副研究员，研究方向为环境经济政策，E-mail:haocx@caep.org.cn。\n责任作者：董战峰（1979-)，男，博士，研究员，博士生导师，研究方向为环境经济与政策，E-mail：dongzf@caep.org.cn\n摘要：本年度报告采取实地调研法和政策分析法，系统评估2023年我国环境经济政策实践进展，总体认为环境经济政\n策体系不断健全完善，为美丽中国建设与生态环境质量持续改善提供了重要推动力，在生态文明治理体系中的地位和\n作用更加凸显，为宏观经济全面绿色低碳发展转型及美丽中国建设目标加快实现提供了重要支撑。未来，需要更加强\n调环境经济政策的科学性、系统性、经济性和制度化建设，深化环境经济政策创新，实施统筹谋划、综合调控、集成\n应用，在环境治理体系和治理能力现代化建设中发挥更加重要作用。\n关键词：环境经济政策年度进展评估2023\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n（四）生态环境政策\n（1）创新推进绿色发展四大结构调整政策\n①以水泥、化工等非电重点行业超低排放补贴、水电价阶梯激励\n政策为主要“抓手”，促进产业结构深度绿色调整；\n②实施大气污染防治重点区域实施煤炭减量替代，协同推进碳减\n排和污染减排等，推进能源节约利用与结构调整；\n③实施岸电使用补贴、柴油货车限期淘汰等，推进交通运输结构\n优化调整；\n④强化补贴推动农村废弃物资源化与有机肥综合利用以及农村污\n水处理设施运营，推动农村污水处理设施用电执行居民用电或农业生\n产用电价格。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n（2）完善生态环境空间管控\n2018年6月24日，《中共中央国务院关于全面加强生态环境保\n护坚决打好污染防治攻坚战的意见》中提出要坚持保护优先，落实生\n态保护红线、环境质量底线、资源利用上线硬约束，省级党委和政府\n加快确定生态保护红线、环境质量底线、资源利用上线，制定生态环\n境准入清单。继续推进生态、大气、水、土壤、海洋等要素生态环境\n分区管控，推进生态环境要素空间全覆盖管控；构建以战略环境影响\n评价、空间管控清单准入、生态保护补偿、生态环境空间监管与绩效\n考核为主要抓手的”三线一单“生态环境分区管控政策体系。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n（3）完善生态环境质量目标管理政策机制\n\n#### 抓好以考评为主的生态环境质量管\n理体系建设，建立水、气、土、生态等 THINK GREEN\n要素统一的自标考核体系，建立生态环\n境质量监测、评价、考核、公开、责任、\n奖惩环境质量目标管理体系，并强化考\n核结果与财政资金、官员升迁等政策的\n衔接增效。生态环境质量监测评价范围\n由大气、水、土壤拓展到近岸海域水质、\n地下水、农业与农村，完善空气质量达\n标、国家重点生态功能区等，完善生态\n环境监测点位与网络。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n（4）完善生态环境市场经济政策\n全面建立生态环境质量改善绩效导向的财政资金分配机制，将挥\n发性有机物、碳排放、污染性产品等纳入环境保护税改革范围，推进\n将生态环境外部成本纳入资源税和消费税改革，推动建立全成本覆盖\n的污水处理费政策和固体废物处理收费机制。\n完善基于生态贡献和生态环境改善绩效的国家重点生态功能区转\n移支付机制。在全国范围内推开碳交易市场，继续推动排污权交易、\n资源权益交易，建立健全归属清晰、权责明确、流转顺畅、监管有效\n的自然资源产权制度。引导和鼓励长江等重点流域以及粤港澳大湾区\n等重点区域探索设立绿色发展基金。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n（5）推进建立大生态环境治理格局\n以考核落实生态文明建设的”党政同责、一岗双责”；通过监管执法督促\n企业落实环境保护主体责任；坚持建设美丽中国全民行动，引导绿色消费和\n绿色生活方式；强化人大生态环境法律执法检查监督作用，完善政协生态环\n境治理监督，健全检察机关提起公益诉讼制度。形成党委领导、政府主导、\n企业实施、社会参与、多元共治、公开透明、动力内生的大生态环境治理格\n局。\n（6）深度参与推进国际环境规则制定\n动态跟踪评估《2030年可持续发展议程》中生态环境目标指标进展，\n定期发布《中国落实2030年可持续发展议程进展报告》。极推动共建绿色\n“一带一路”，推进绿色发展和生态环境保护标准国际互认，主导制定”一带\n一路”基础设施绿色化标准体系：推进绿色贸易与绿色责任投资，促进贸易供\n给侧结构性改革；加强国际生态环境公约履约。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 引用本文\n侯鹏，高吉喜，陈妍，崔俊，肖如林，张文国，孙晨曦，王永财，侯静，中国生态保护政策发展历程及其演进特征.生态\n学报，2021,41（4）:1656-1667.\nHouP,GaJ,henYhaiJ,Xia,hangG,unWang,ouJ.Develpmentprocessand\n中国生态保护政策发展历程及其演进特征\n侯鹏，高吉喜，陈妍，霍俊，肖如林，张文国，孙晨曦，王永财，侯静\n生态环境部卫星环境应用中心，北京100094\n收稿日期：2020-02-26；修订日期：2020-07-31\n基金项目：国家重点研发计划专项（2017YFC0506506，2016YFC0500206，2018YFC0507200）\n通讯作者Correspondingauthor.高吉喜.E-mallgjx@nies.org.\n摘要：生态环境是人类社会生存和发展的基础，建设生态文明是中华民族永续发展的千年大计。伴随着环境保护\n事业和生态文明制度体系的发展完善，生态保护政策制度体系发生着显著变化。通过对党和国家的重大决定、重\n要会议及政策法规文件的广泛调研和梳理，重点从基本国策确立、生态保护观念转变和政策制度变迁等3个方\n面，分析了我国生态保护政策发展历程及其演进特征。节约资源和保护环境基本国策的确立，是生态保护政策制\n度体系之根基。从生态保护思想启蒙阶段将生态保护纳入经济社会发展计划，到可持续发展阶段将生态保护作为\n文明发展道路的内在要求，再到生态文明阶段将人与自然视为生命共同体，这些生态保护观念的转变是生态保护\n空间管控政策、生态补偿政策、责任追究政策等生态保护政策制度的制订实施，是在客观判断我国当时基本国情\n基础上对生态保护观念的实践，对于推动生态保护事业发展、保障国家生态安全和社会经济高质量发展起到了关\n键作用。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 第二节 环境保护法规体系\n一、环境法律责任\n·二、我国环境保护法规体系\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n.all&vds0urce=024b23e8a203cda77162896ddf36a118\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n一、环境法律责任\n1.环境行政责任\n所谓环境行政责任，是指违反环境保护法，实施\n破坏或者污染环境的单位或个人所应承担的行政方面\n的法律责任。\n承担责任者既可能是企事业单位及其领导人员、\n直接责任人员，也可能是其他公民个人；既可能是中\n国的自然人、法人，也可能是外国的自然人、法人。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n2.环境民事责任\n所谓环境民事责任，是指单位或个人因污染危害环境而侵\n害了公共财产或他人的人身、财产所应当承担的民事方面\n的法律责任。\n在现行环境法中，因破坏环境资源而造成他人损害的，实\n行过失责任原则。行为人没有过错的，即使造成了损害后\n果，也不构成侵权行为、不承担民事赔偿责任。其构成环\n境侵权行为、承担环境民事责任的要件包括\n（1）有排放污染物的行为。\n（2）有损害结果。\n（3）违法行为与损害结果之间具有因果关系。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n3.环境刑事责任\n所谓环境刑事责任，是指行为人因违反环境法，造成或可\n能造成严重的环境污染或生态破坏、公私财产重大损失或\n人身伤亡，构成犯罪时，应当依法承担的以刑罚为处罚方\n\n#### 式的法律后果\n构成环境犯罪是承担环境刑事责任的前提条件。与其他\n犯罪一样，构成环境犯罪、承担环境刑事责任的要件包\n括犯罪主体、犯罪的主观方面、犯罪客体和犯罪的客观\n方面。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n二、我国环境保护法规体系\n1.宪法中的环境保护规范\n宪法在一个国家法律体系中处于最高位阶，它是一个国家的\n根本大法。我国1982年宪法26条规定：“国家保护和改善生活环\n境和生态环境，防治污染和其他公害。国家组织和鼓励植树造林，\n保护林木”。这一规定是国家对环境保护的总政策，说明了环境保\n护是国家的一项基本职责。此外，我国宪法第9条、第10条、第\n22条、第26条中对自然资源和一些重要的环境要素的所有权及其\n保护也做出了许多的规定。\n宪法为我国的环境保护活动和环境立法提供了指导原则和立\n法依据。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n2.中华人民共和国环境保护法\n\n#### 我国在1979年制定了第一部综\n\n#### 合性环境基本法《环境保护法（试\n行）》；1989年颁布了《环境保护\n\n#### 新环保法\n法》，2015年实施最新版环境保护\n法。这部新的综合性环境基本法在\n\n#### 环境保护的重要问题上都做了相应\n的规定。其主要内容包括：总则、\n\n#### 监督管理、保护和改善环境、防治\n\n#### 环境污染和其他公害、信息公开和\n公众参与、法律责任和附则7章。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n2.中华人民共和国环境保护法\n新环保法从47条增加到70条，对如环境规划、环境标准、环境监\n测、总量控制、生态补偿、排污收费等基本制度作出规定。加入了“对\n拒不改正的排污企业实施按日计罚”，“对严重违法行为采取行政拘留”\n等内容，增设”信息公开和公众参与”专章，建立“违法名单”制度，环境\n违法信息将记入社会诚信档案，并向社会公布违法者名单，被专家称为\n\n#### ‘史上最严”的环保法律\n\n#### 新环保法 污\n\n#### 环保 染\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n3.环境资源单行法\n\n#### 环境资源单行法是针对某一特定\n（1）环境保护单行法\n的环境要素或特定的环境社会关系进\n行调整的专门性法律法规，具有量多\nPROTECT ENVIRONMENT\n面广的特点，是环境法的主体部分。\n目前，我国已颁布的环境保护单行法\n八部。包括：\n保护环境 ①1982年颁布的《海洋环境保护法》\n（1999、2013年修订）\n\n#### 从我做起\n②1984年颁布的《水污染防治法》\n（1996、2008年修订）\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n③1987年颁布的《大气污染防治法》（95、00、16年三次修订）\n④1995年颁布的《固体废物污染环境防治法》（2004年修订）\n③1996年颁布的《环境噪声污染防治法》\n?2003年颁布的《环境影响评价法》\n①2003年颁布的《放射性污染防治法》\n82003年颁布的《清洁生产促进法》\n\n#### 维护环境卫生\n\n#### 我们在行动\n\n#### 保护碧水蓝天共建绿色家园\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n（2）资源保护单行法\n\n#### 目前，我国已颁布的资源保护\n单行法可分为以下三类：\n\n#### ①土地利用规划法：目前，我国已\n\n#### 保护环境\n\n#### 经颁布的有关法律法规主要有《中\n\n#### 华人民共和国城乡规划法》、《中\n\n#### 华人民共和国村庄和集镇规划建设\n管理条例》等。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n②自然资源保护法：目前，我国已经颁布的有关法律法规主要有\n《土地管理法》及其实施条例、《矿产资源法》及其实施细则、\n《水法》、《海域使用管理条例》、《森林法》及其实施细则、\n《草原法》、《渔业法》及其实施细则、《水产资源繁殖保护条\n例》、《基本农田保护条例》、《土地复垦规定》、《地质灾害防\n治条例》、《森林防火条例》、《草原防火条例》等。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n③自然保护法：目前，我国已经颁布的有关法律法规主要有\n\n#### 《野生动物保护法》及其实施条例\n\n#### 《水土保持法》及其实施细则\n\n#### 《防沙治沙法》\n\n#### 《自然保护区条例》\n\n#### 《风景名胜区管理暂行条例》\n\n#### 《野生植物保护条例》\n《城市绿化条例》等。\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n4.国家其他法律有关环境保护的规定\n（1）刑法\n1997年3月14日全国人民代表大会八届五中会议通过了刑法\n（修订案）。2011年新修订的刑法分则第六章第六节专门规定了\n破坏环境资源保护罪，具体规定了12种破坏环境资源保护罪。根据\n它们侵犯对象和行为性质的不同，可以分为4种类型。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n第一类，污染环境方面的犯罪，包括污染环境罪，非法进口固体废\n物危害环境罪；\n第二类，有关野生动物及其制品方面的犯罪，包括非法捕捞水产品\n罪，非法捕杀珍贵、濒危野生动物及其制品罪，非法狩猎罪；\n第三类，有关植物方面的犯罪，包括非法采伐、毁坏珍贵树木罪，\n非法收购盗伐、滥伐的林木罪；\n第四类，破坏资源方面的犯罪，包括破坏耕地罪，破坏矿产资源罪。\n新刑法的颁布，对于协调有关环境保护和资源保护法律，完善刑法，\n与国际立法接轨，具有重大意义，为采用刑法手段保护环境提供了依据。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n（2）行政法\n依照宪法原则而制定的并涉及环境管理范畴的行政法律，如\n\n#### 《民法通则》\n\n#### 《农业法》\n\n#### 保护环境\n\n#### 《企业法》\n\n#### 热爱地球\n《乡镇企业法》 保/护/环/境人/人/有/贵\n\n#### 《对外贸易法》\n\n#### 《标准化法》\n\n#### 《行政处罚法》\n\n#### 《文物保护法》\n\n#### 《公共卫生法》\n《食品卫生法》等中有关环境保护的条款。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n5.国家行政部门制定的各种环保法令、法规和条例\n国务院有关部委根据环境保护的具体对象而制定的各种环保\n专门性法令、法规、条例和决定，是我国环境保护法规体系的有\n机组成部分。例如《国务院关于结合技术改造防治工业污染的几\n项规定》、《国务院关于环境保护工作的决定》、《国务院关于\n加强乡镇、街道企业环境管理的规定》、《国务院关于环境保护\n若干问题的决定》、《医疗废物管理条例》、《危险化学品安全\n管理条例》等。\n这些法令、法规、条例和决定，具有国家行政强制力，而且\n针对性和操作性都较强，对我国环境规划与管理走上法制轨道起\n到了重要的推动作用。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n6.环境保护地方法规\n地方法规是各省、自治区、直辖市根据我国环境法律\n或法规，结合本地区实际情况而制定并经地方人大审议通\n过的法规。\n地方法规突出了环境管理的区域性特征，有利于因地\n制宜地加强环境管理，是我国环境保护法规体系的组成部\n分。\n国家已制定的法律法规，各地可以因地制宜地加以具体化。\n国家尚未制定的法律法规，各地可根据环境管理的实际需\n要，制定地方法规予以调整。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n7.签署并批准的国际环境公约\n我国积极开展环境外交，参与各项重大的国际环境事\n务，在国际环境与发展领域中发挥着越来越大的作用。\n1980年以来，我国政府已签署并批准了38个国际环\n境保护公约，如保护臭氧层《维也纳公约》、《气候变化\n框架公约》、《生物多样性公约》等，并在全球、区域和\n双边环境合作中不断取得进展。\n签署并批准的国际环境公约和协定，具有法律效力，\n负有相应的国际义务，因而也应归入我国环境法规的体系。\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n第三节 环境规划与管理的法律制度体系\n一、环境规划与管理制度\n●二、八项环境管理法律制度\n·三、环境规划法律制度\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n\n#### 环境规划与管理制度\n环境规划与管理制度是指为了实现环境立法的目的，并在环\n境保护基本法中作出规定的，由环境保护单项法规或规章所具体\n表现的，对国家环境保护具有普遍指导意义，并由环境行政主管\n部门来监督实施的同类法律规范的总称，属于环境保护行为的基\n本法律制度。按照规划和管理的不同要求，可以分为环境管理制\n度和环境规划行政法律制度两类。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### 环境管理八\n\n#### 项制度\n第三次全国环境保护会议上推出了“环境保护目标责任\n制”、“城市环境综合整治定量考核制度”、“排放污染物许可\n证制度”、“污染集中控制制度”和”污染源限期治理制度”共五\n项新的环境管理制度，与原已实行的”三同时制度”、“排污收\n费制度”、“环境影响评价制度”三项制度，形成了一整套强化\n环境管理的制度体系。\n\n#### 低碳文明生活 你我共同创建\n\n#### 爱护环境 保护地球\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### 环境规划行政\n\n#### 法律制度\n为了加强环境规划管理，贯彻预防为主、防治结合的环\n境政策，根据《环境保护法》和《土地管理法》的相关规定，\n在我国又实施了两项环境规划行政法律制度，即“环境保护计\n划制度“和”土地利用规划制度”。两项制度的实施，促进了\n我国环境规划和管理的法律制度体系趋于完善。\n\n#### 保地球\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n二、八项环境管理法律制度\n1.\"三同时\"制度\n（1）基本概念\n“三同时”制度系指所有新建、改建、扩建项目，其防治污\n染设施必须与主体工程同时设计、同时施工、同时投产。\n“三同时”制度是我国首创的。它是在总结我国环境管理的实\n践经验基础上，被我国法律所确认的一项重要的控制新污染源\n的法律制度。它适用于各种可能对环境、安全和健康产生影响\n的建设项目和工程。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n（2）相关法律规定\n“三同时“制度最早规定于1973年的《关于保护和改善环境的若\n干规定》。1979年的《环境保护法》（试行）和1989年的《环\n境保护法》在规定环境影响评价制度的同时，重申了“三同时”的\n规定。1986年的《建设项目环境保护管理办法》、1998年的\n《建设项目环境保护管理条例》对”三同时”制度都作了具体规定。\n2004年国家环境保护总局发布《关于开展固定资产投资项目环境\n影响评价和”三同时”制度执行情况清理整顿工作的紧急通知》。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n2.排污收费制度\n（1）基本概念\n排污收费制度系指对排放污染物的工\n矿企业事业单位征收排污费，用于污染的\n治理。这项制度是运用经济手段有效地促\n进污染治理和新技术的发展，使污染者承\n担污染防治费用的法律制度，是“污染者\n付费”环境政策的具体体现。\n\n#### 保护环境\n2003年7月1日，正式实施《排污费 从感做起\n征收使用管理条例》，这意味着我国已实\n\n#### 中宣部宣教局中国文明网\n施20多年的排污收费制度发生了重大变化。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n征收排污费的目的，是为了促使排污者加强经营管理，节约和\n综合利用资源，治理污染，改善环境。排污收费制度是”污染者付费”\n原则的体现，可以使污染防治责任与排污者的经济利益直接挂钩，促\n进经济效益、社会效益和环境效益的统一。\n《中华人民共和国环境保护税法》于2018年1月1日起施行，\n费改税开始，征收权由环保部门正式移交给税务机关，同时，环保部\n门配合开启”企业申报、税务征收、环保监测、信息共享”的税收征管\n模式。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n（2）我国征收排污费的相关规定\n1978年12月，中央批转的原国务院环境保护领导小组《环\n境保护工作汇报要点》首次提出在我国实行“排放污染物收费制\n度”。\n1982年12月，国务院在总结22个省、市征收排污费试点经\n验的基础上，颁布了《征收排污费暂行办法》，对征收排污费的\n目的、范围、标准、加收和减收的条件、费用管理使用等作了具\n体规定。\n1984年《水污染防治法》第15条作出了“向水体排放污染\n物的，按照国家规定缴纳排污费，超过国家或者地方规定的污染\n物排放标准的，按照国家规定缴纳超标准排污费”的规定，即凡\n向水体排放污染物超标或不超标都要收费\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n我国颁布的《中华人民共和国标准化法》第7、14、20\n条规定，我国现行的污染物排放标准属强制性标准，违反排\n放标准即违法，对不执行者要予以行政处罚。可认为，以超\n标与否，作为判定是否违法的界限。\n新修订的《环境保护法》规定：“排放污染物的企业事业\n单位和其他生产经营者，应当按照国家有关规定缴纳排污费。\n排污费应当全部专项用于环境污染防治，任何单位、个人不\n得截留、挤占或者挪作他用。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n2008年修订的《水污染防治法》\n第二十四条规定”直接向水体排放污\n染物的企业事业单位和个体工商户，\n应当按照排放水污染的种类、数量和\n\n#### 征收排污费\n排污费征收标准缴纳排污费。排污费\n\n#### 应当用于污染的防治，不得挪作他\n用。\n2000年4月第二次修订后颁布的 排污企业\n《大气污染防治法》第48条作出了\n超标者处10万元以下罚款，并限期\n治理“的规定。\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n排污收费种类：4大类4种118项因子，其中按污染介质分为4大\n类：水、气、声、危废；按收费方法分为4种：污水排污费、废气排\n污费、危险废物排污费、噪声超标准排污费；按污染因子分为118项：\n水污染因子69项（65项污染物，4个特征值）、气污染物45项、危险\n废物类型1项、噪声类型3项。\n《中华人民共和国环境保护税法》中的纳税人主要包括：在中华人\n民共和国领域和中华人民共和国管辖的其他海域，直接向环境排放\n应税污染物的企业事业单位和其他生产经营者为环境保护税的纳税\n人，应当依照本法规定缴纳环境保护税。征税对象包括：环境保护\n税法所附《环境保护税税目税额表》《应税污染物和当量值表》规\n定的大气污染物、水污染物、固体废物和噪声。\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n环境保护税由税务机关依照《中华人民共和国税收征收管理法》\n征收管理。环境保护主管部门依照本法和有关环境保护法律法规的\n规定负责对污染物的监测管理。环境保护主管部门和税务机关应当\n建立涉税信息共享平台和工作配合机制。税务机关应当将纳税人的\n纳税申报数据资料与环境保护主管部门交送的相关数据资料进行比\n对。税务机关发现纳税人的纳税申报数据资料异常或者纳税人未按\n照规定期限办理纳税申报的，可以提请环境保护主管部门进行复核，\n环境保护主管部门应当自收到税务机关的数据资料之日起十五日内\n向税务机关出具复核意见。税务机关应当按照环境保护主管部门复\n核的数据资料调整纳税人的应纳税额。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n3.环境影响评价制度\n（1）基本概念\n环境影响评价是指对规划和建设项目实施后可能造成的环\n境影响进行分析、预测和评估，提出预防或者减轻不良环\n境影响的对策和措施，进行跟踪监测的方法与制度。\n环境影响评价制度的作用：\n贯彻”预防为主”的环境保护政策。\n为开展区域政策环境影响评价，实施环境与发展综合决策\n创造了条件。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n（2）我国环境影响评价的相关法律规定\n我国在1979年《环境保护法（试行）》中，规定实行环\n境影响评价报告书制度；\n1986年颁布了《建设项目环境保护管理办法》\n1998年颁布了《建设项目环境保护管理条例》\n2016年《大气污染防治法》正式施行。\n\n#### 环平\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n2003年《中华人民共和国环境影响评价法》正式施行，《环境影响评\n价法》突出三个特点：\n①简化环评审批。今后审批部门只对环境影响报告书、环境影响报\n告表进行审批，对环境影响登记表实行备案管理，不再要求审批。\n②取消前置审批。新法删除了建设项目的环境影响评价文件未依法\n经审批部门审查或者审查后未予批准的，该项目审批部门不得批准其建\n设。从立法角度取消了环评审批作为项目审批部门前置条件的依据。\n③加强环境执法。新法对”未批先建”项目的处罚更严更重，取消了\n对”未批先建”项目限期补办手续的情形，在责令停止建设后直接进行处\n罚，并增加了可以责令恢复原状的内容。处罚额度从环评法修订前的处\n以5万元以上20万元以下改为项目总投资额1%以上5%以下。，\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n4.环境保护目标责任制\n（1）基本概念\n环境保护目标责任制是一种具体落实地方各级政府和有关污染的单位对\n环境质量负责的行政管理制度。环境保护目标责任制规定了各级政府行政首\n长应对当地的环境质量负责，企业的领导人对本单位污染防治负责，并确定\n他们在任期内环境保护的任务目标，列为政绩进行考核。环境保护目标责任\n制被认为是八项环境管理的龙头制度。\n河长制：\ncard.all&vds0urce=024b23e8a203cda77162896ddf36a118\n河长制，林长制，路长制：\n88%B6&from_source=webtop_search&spm_id_from=333.1007&search_source=5&page=\n\n#### 2&0=30\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n（2）制度的实施和发展\n第二次全国环境保护会议后，在我国各级政府中推行的“环\n境保护目标责任制”。第三次全国环境保护会议上被确定为八项环\n境管理制度之一。通过将环保目标的逐级分解、落实，突出了各\n级地方政府负责人的环境责任，解决了环境管理的保证条件和动\n力机制，促使环境管理系统内部活动有序，系统边界分明，环境\n责任落实，改变了环境管理孤军作战的被动局面。\n1997年3月8日中央政治局常委召开座谈会，亲自听取环保工\n作汇报，表明了党中央对环境问题的高度重视，开创了地方政府”一\n把手亲自抓环境管理，环保主管部门负责编制和检查、落实环境规\n划，各相关部门积极配合强化环境管理的新局面。\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n5.城市环境综合整治定量考核制度\n（1）基本概念\n城市环境综合整治定量考核制度是对城市实行综合整\n治的成效、城市环境质量，制定量化指标进行考核，每年\n评定城市各项环境建设与环境管理的总体水平。这项制度\n是城市政府统一领导负总责，有关部门各尽其职、分工负\n责，环保部门统一监督的管理制度。\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n（2）制度的实施和发展\n综合整治的概念最早是在1984年《中央关于经济体制改革的\n决定》中提出来的。随着国家经济体制的改革，政府职能发生了\n变化，该决定要求以城市为中心的各地政府要把工作重点从经济\n建设的计划指导转变到城市基础设施建设、城市公共设施建设和\n\n#### 城市环境综合整治上来\n1985年在河南洛阳召开的第一次全国城市环境保护工作会\n议上，确定了我国城市环境保护工作的发展方向一综合整治。\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n2003年国家环保总局发布了“关于印发《生态县、生态\n市、生态省建设指标（试行）》的通知”，在全国各地掀起了\n创建生态县、生态市和生态省的高潮\n“十二五”城市环境综合整治定量考核指标实施细则的实\n施，标志着我国城市综合整治进入了新的发展阶段。\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n6.排放污染物许可证制度\n（1）基本概念\n对环境有不良影响的各种规划、开发、建设项目、排污\n设施或经营活动，其建设者或经营者，需要事先提出申请，\n经主管部门审查批准，颁发许可证后才能从事该项活动，这\n就是许可证制度。\n包括排污申报登记制度和排污许可证制度两个方面以及\n排污申报，确定污染物总量控制自标和分配排污总量削减指\n标，核发排污许可证，监督检查执行情况等四项内容。\n这是一项与我国污染物排放总量控制计划相匹配的环境\n管理制度。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n全国排污许可证管理信息平台 公开端\n申请前信息公开 许可信息公开 限期整改登记信息公开许可注销公告许可撤销公告许可遗失声明重要通知 法规标准 网上申报 更多\n省/直辖市 地市 单位名称 行业类别 生产经营场所地址 信息公开起止日期 公开内容查看 填写反馈\n广东省 惠州市 惠州市东邦化学有限公司 林产化学产品制造 惠州市大亚湾技术经济开发区2024-06-17至2024-06-21 ? 填写\n云南省 曲靖市 会泽洋以则铅锌矿有限公司 铅锌矿采选 会泽以则村委会白碳箐 2024-06-17至2024-06-21 ® 填写\n江苏省 淮安市 江苏今世缘酒业股份有限公司白酒制造 涟水县高沟镇今世缘大道1号 2024-06-17至2024-06-21 填写\n江苏省 连云港市 连云港胜海水务有限公司 污水处理及其再生利用 江苏省连云港市灌云县临港产 2024-06-17至2024-06-21 ? 写\n广东省 佛山市 佛山市金利澳环保科技有限其他纸制品制造 佛山市高明区明城镇城七路372024-06-17至2024-06-21 ?\n广东省 广州市 广州医科大学附属第三医院综合医院 广州市黄埔区长贤路55号 2024-06-17至2024-06-21 填写\n青海省 海东市 青海耀华待种玻璃股份有限平板玻璃制造 乐都工业园（西区） 2024-06-17至2024-06-21 填写\n江苏省 盐城市 东台市大洋纺织染整有限公司棉纺织及印染精加工 东台市南沈灶镇镇南路 2024-06-17至2024-06-21 填写\n湖北省 仙桃市 仙桃安必盛焙铸设备有限公司有色金属合金制造 仙桃市胡场镇工业园发展大道 2024-06-17至2024-06-21 写\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n（3）制度的实施和发展\n中国施行排污申报登记的规定最早见于1982年由国务院\n颁布的《征收排污费暂行办法》之中，其主要目的在于以此作\n\n#### 为排污收费的依据\n后来在相继制定的《环境保护法》中明确规定，“排放污\n染物的企业事业单位，必须依照国务院环境保护行政主管部\n门的规定申报登记。\n排污许可证制度是比申报登记制度更严格的对环境进行\n科学化、目标化和定量化管理的一项制度。排污许可证制度在\n我国大规模地普遍实施，还不完全具备条件。\n\n---\n\n<!-- page 83 -->\n\n![page 83](page_083.jpg)\n\n实施污染物排放许可证制度后，容许排污权交易是国内环保制度的重大\n创新。排污单位经治理或产业（包括产品）调整，其实际排放物总量低于所核准\n的充许排放污染物总量部分，经环保部门准，充许进行有偿转让。但是，由\n于在现行的管理安排中，采取的是由政府征收排污费的制度，而不是使用市\n场交易的方式。所以从国内的情况来看，将排污权的交易具体化为一项可以\n操作的制度安排，并加以实施，需要在运行机制上进行探索。2001年9月，\n亚洲开发银行资的”二氧化排污交易制”在山西省太原市26家企业试点，开了\n国内排污权交易之先河。\n会议审议通过，并予公布，自2021年2月1日起施行。适用于全国碳排放权交\n易及相关活动，包括碳排放配额分配和清缴，碳排放权登记、交易、结算，\n温气体排放报告与核查等活动，以及对前述活动的监督管理。\n\n---\n\n<!-- page 84 -->\n\n![page 84](page_084.jpg)\n\n碳排放权就是中国人的人权：\n%B3%E6%8E%92%E6%94%BE%E6%9D%83&froms0urce=\nwebtopsearch&spmidfrom=333.1007&searchsource=5\n一文看懂碳市场，碳交易，碳排放权，碳汇，碳税，碳达峰，\n\n#### 碳中和\n=333.337.search-\ncard.all&vds0urce=024b23e8a203cda77162896ddf36a118\n\n---\n\n<!-- page 85 -->\n\n![page 85](page_085.jpg)\n\n（1）基本概念\n7.污染集中控制制度\n\n#### 污染集中控制方式是针对分散\n\n#### 控制的问题，改变过去一家一户治\n\n#### 理污染的作法，把有关污染源汇总\n\n#### 在一起，经分析比较，进行合理组\n\n#### 合，在经济效益、环境效益和社会\n\n#### 效益优化的前提下，采取集中处理\n措施的污染控制方式。实践证明，\n\n#### 推行集中控制，有利于使有限的环\n\n#### 保投资获得最佳的总体效益\n\n---\n\n<!-- page 86 -->\n\n![page 86](page_086.jpg)\n\n（2）实施污染集中控制的必要措施\n①实行污染集中控制，必须以规划先导。污染集中控制与城市建设密\n切相关，如完善城市排水管网，建立城市污水处理厂，发展城市煤气\n化和集中供热，建设城市垃圾处理厂，发展城市绿化等。因此，集中\n控制必须与城市建设同步规划，同步实施。\n②实行污染集中控制必须突出重点，划定不同的功能区划，分别整治。\n③实行污染集中控制必须与分散控制相结合，构建区域环境污染综合\n防治体系。\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n疏通多种资金渠道是推行污染集中控制的保证。要实现集中控制必\n须落实资金。应充分利用环保基金贷款、建设项目环保资金、银行贷\n款及地方财政补贴等多种渠道筹措资金。\n③实行污染集中控制，地方政府协调是关键。污染集中控制不仅涉及\n企业，也涉及地方政府各部门，充分依靠地方政府的协调，是集中控\n制方案得以落实的基础。\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n8.污染源限期治理制度\n（1）基本概念\n《环境保护法》第29条规定：“对造成环境严重污染的企业\n事业单位，限期治理。“所谓污染源限期治理制度，是指对超标\n排放的污染源，由国家和地方政府分别做出必须在一定期限内完\n成治理达标的决定，是一项强制性的法律制度。\n新环保法第60条规定：企业事业单位和其他生产经营者超过\n污染物排放标准或超过重点污染物排放总量控制指标排放污染物\n的，县级以上人民政府环境保护主管部门可以责令其采取限制生\n产、停产整治等措施；情节严重的，报经有批准权的人民政府批\n准，责令停业、关闭。\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n（2）制度实施及发展\n继1978年国家安排第一批限期治理项目完成后，1989年国\n家环境保护委员会和国家计委又下达了第二批污染限期治理项目\n140个，1996年国家下达了第三批污染限期治理项目121个。确\n定限期治理项目要考虑如下条件：\n①根据城市总体规划和城市环境保护规划的要求对区域环境整治\n作出总体规划；\n②首先选择危害严重、群众反映强烈、位于敏感地区的污染源进\n行限期治理；\n③要选择治理资金落实和治理技术成熟的项目。\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n三、环境规划法律制度\n1.环境保护计划制度\n（1）基本概念\n环境保护计划，是指由国家或地方人民政府及其行政管理\n部门依照一定法定程序编制的关于环境质量控制、污染物排放\n控制及污染治理、自然生态保护以及其他与环境保护有关的计\n划。环境保护计划是各级政府和各有关部门在计划期内要实现\n的环境目标和所要采取的防治措施的具体体现\n\n---\n\n<!-- page 91 -->\n\n![page 91](page_091.jpg)\n\n2.环境保护计划的主要内容\n环境保护计划制度主要规定在《环境保护法》第4、\n12、22、23、24条之中。环境保护计划的内容主要包括四\n类：即城市环境质量控制计划、污染物排放控制和污染治理\n计划、自然生态保护计划以及其他有关环境保护的计划等。\n\n---\n\n<!-- page 92 -->\n\n![page 92](page_092.jpg)\n\n对环境保护计划实行国家、\n\n#### 省（自治区、直辖市）、市\n（地）、县四级管理制。由各\n\n#### 级计划行政主管部门负责组织\n编制。各级环境保护主管部门\n\n#### 负责编制环境保护计划建议和\n\n#### 监督、检查计划的落实和具体\n执行。其他有关部门则主要是\n\n#### 根据计划和环境保护部门的要\n求，组织实施环境保护计划。\n\n---\n\n<!-- page 93 -->\n\n![page 93](page_093.jpg)\n\n2.土地利用规划制度\n土地利用规划制度是国家根据各地区的自然条件、资源状况\n和经济发展需要，通过制定土地利用的全面规划，对城镇设置、\n工农业布局、交通设施等进行总体安排，以保证社会经济的可持\n续发展，防止环境污染和生态破坏。\n我国已经颁布执行的有土地管理、城市规划、县镇规划和村\n镇规划等法规。2004年修订的《土地管理法》专设一章一一土地\n利用总体规划。要求各级政府应该依据国家经济和社会发展规划、\n国土整治和资源环境保护的要求、土地供给能力及各项建设对士\n地的需求，编制土地利用总体规划。\n\n---\n\n<!-- page 94 -->\n\n![page 94](page_094.jpg)\n\n\n#### 第四节 环境标准体系\n一、环境标准的概念和性质\n二、环境标准分类\n·三、环境标准的作用\n\n---\n\n<!-- page 95 -->\n\n![page 95](page_095.jpg)\n\n一、环境标准的概念和性质\n环境标准是环境保护法规体系中一个独立的、特殊的、重\n要的组成部分。\n环境标准是国家为了维护环境质量、控制污染，保护人群\n健康、社会财富和生态平衡，按照法定程序制定的各种技术规\n范的总体。\n\n---\n\n<!-- page 96 -->\n\n![page 96](page_096.jpg)\n\n环境标准的法律性质主要表现在：\n\n#### 首先，环境标准具有规范性\n\n#### 其次，环境标准具有法律的约束力\n最后，环境标准的制定像法规一样，要经授权由有关国家\n\n#### 机关按照法定程序制定和颁发\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n二、环境标准分类\n根据《环境保护标准管理办法》（1999.4.1）的规定，我国的\n环境标准由五类两级组成。\n五类，是指环境质量标准、污染物排放（控制）标准、环境监测\n方法标准等三类标准为核心，包含环境基础标准与标准制修订规范、\n管理规范类环境保护标准两类标准在内的国家环境保护标准体系。\n两级，是指我国环境保护标准分为国家级和地方级。\n有关强制性国家环境标准的代号，用“GB”表示；推荐性国家环\n境标准的代号，用”GB/T\"表示；行业环境标准代号用\"HJ\"表示，推\n荐性行业环境标准代号用\"HJ/T\"表示。\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n1.环境质量标准\n以维护一定的环境质量，保护人群健康、社会财\n富和促进生态良性循环为目标，规定环境中各类有害\n物质（或因素）在一定时间和空间内的允许含量，叫\n做环境质量标准。\n环境质量标准反映了人群、动植物和生态系统对环\n境质量的综合要求，也标志着在一定时期国家为控制\n污染在技术上和经济上可能达到的水平。环境质量标\n准体现环境目标的要求，是评价环境是否受到污染和\n制定污染物排放标准的依据。\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n以下是一些常见的环境质量标准举例：\n①大气环境质量标准：《环境空气质量标准》（GB3095-\n2012），规定了不同污染物（如二氧化硫、二氧化氮、\nPM2.5、PM10等）的浓度限值。\n②水环境质量标准：《地表水环境质量标准》（GB3838-\n2002），对地表水中各类污染物的含量及相关指标做出规定。\n③土壤环境质量标准：《土壤环境质量农用地土壤污染风险\n管控标准（试行）》（GB15618-2018）。\n④声环境质量标准：《声环境质量标准》（GB3096-\n2008），划分不同声环境功能区及其对应的噪声限值。\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n2.污染物排放标准\n为了实现国家的环境目标和环境质量标准，对污\n染源排放到环境中的污染物的浓度或数量所作的限量\n规定就是污染物排放标准。\n制定排放标准的直接目的是为了控制污染物的排放\n量，达到环境质量的要求。污染物排放标准为污染源\n规定的最高允许排污限额（浓度或总量），是确认排\n污行为是否合法的法律根据，超过排放标准要承担相\n应的法律责任。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n\n#### 以下是一些大气污染物排放标准的\n例子：\n\n#### 世界环境日\n\n#### 《火电厂大气污染物排放标准》\n蓝天保卫战，我是行动者。\n（GB13223-2011）：对火电厂排\n\n#### 放的二氧化硫、氮氧化物、颗粒物\n等污染物的浓度限值等进行规定。\n\n#### 2 《锅炉大气污染物排放标准》\n（GB13271-2014）：适用于各种\n锅炉的污染物排放控制。\n\n#### 《水泥工业大气污染物排放标准》\n（GB4915-2013）：规范水泥生\n产过程中的大气污染物排放要求。\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n3.环境监测方法标准\n环境监测规范方法标准指为监测环境质量和污染物排放，规\n范采样、分析测试、数据处理等技术所制定的国家环境监测方法\n标准。环境监测是人们对影响人类和其他生物生存和发展的环境\n质量状况进行的监视性测定活动，通常包括物理指标测定、化学\n\n#### 指标测定以及生态系统的测定\n环境监测方法标准具有规范性、强制性，严格的制定程序和\n显著的技术性和时限性，是制定环境保护规则和计划的重要依据，\n是实施环境保护法律、法规的基本保证，是强化环境监督管理的\n要点，也是提高环境质量，推动环境科学技术进步的动力。环境\n监测方法标准包括《城市区域环境噪声测量方法》、《摩托车和\n轻便摩托车噪声测量方法》等。\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n4.环境基础标准与标准制修订规范\n国家对环境保护工作中需要统一的技术术语、符号、代\n号（代码）、图形、指南、导则及信息编码等所作的规定，\n叫做环境基础标准。它是制定其他环境标准的基础。其目的\n是为制定和执行各类环境标准提供一个统一遵循的准则，避\n免各标准间的相互矛盾。以下是一些环境基础标准的例子：\n《环境保护图形标志》（GB15562）：规定了环境保护相关的图\n形标志样式。\n《环境标准样品研复制技术规范》（HJ/T173）：对环境标准样\n品的研制、复制等方面进行规范。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n5.管理规范类环境保护标准\n规范，就是明文规定或约定俗成的标准，适用于环保事业发\n展、利于行业环保建设的技术规范、管理规范、行业规范、导则\n等均属于此范畴。它具有规范性、强制性、科学性和相对稳定的\n特点。例如《生态环境状况评价技术规范》、《建设项目竣工环\n境保护验收技术规范》、《建设项目环境风险评价技术导则》和\n《核辐射环境质量评价一般规定》等。\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n三、环境标准的作用\n环境标准同环境保护法规相配合，在国家环境管理中\n起着重要作用。工业发达国家环境污染发展成为全国性公害，\n在加强环境保护立法的同时，开始制定全国性的环境标准，\n并且逐渐发展成为具有多层次、多形式、多用途的完整的环\n境标准体系，成为环境与资源保护法体系中不可缺少的部分。\n环境标准是制定国家和地方环境规划的主要依据，环\n境标准是环境保护法规制定与实施的重要基础与依据，环境\n标准是国家环境规划与管理的技术基础。\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n截止到2005年4月10日，中国已\n经制定各类环境标准486项。其中，\n国家标准357项，环保行业标准129\n项；强制性标准117项，推荐性标准\n369项；环境质量标准11项，污染物\n排放标准104项，监测方法标准315 国家王\n项，基础标准10项，其他标准46项。\n另有地方环境标准1000余项。\n\n---\n\n<!-- page 107 -->\n\n![page 107](page_107.jpg)\n\n1.环境标准具有法规约束力\n国家环境标准具有法规约束力，绝大多数是法律规定必\n须严格贯彻执行的强制性标准，具有行政法规的效力。国家\n环境标准明确规定了适用范围，及企事业单位在排放污染物\n时必须达到、可以达到的各项技术指标要求，规定了监测分\n析的方法以及违反要求所应承担的经济后果等，同时我国环\n境标准从制（修）订到发布实施有严格的工作程序，使环境标\n准具有规范性特征。国家环境标准又是国家有关环境政策在\n技术方面的具体体现，努力促使经济建设和环境建设协调发\n展。\n\n---\n\n<!-- page 108 -->\n\n![page 108](page_108.jpg)\n\n2.环境标准是环境规划的体现\n\n#### 通过环境规划来实施环境标准，环\n境标准提供了可列入国民经济和社会发\n展计划中的具体环境保护指标，为环境\n保护计划切实纳入各级国民经济和社会\n发展计划创造了条件。环境规划的目标\n主要是用标准来衡量的。环境质量标准 爱护环境\n\n#### 我们\n是具有鲜明的阶段性和区域性特征的规 从点点滴滴做起\n划指标，具备可定量化、可操作性强的\n特点。污染物排放标准是根据环境质量\n目标要求，将规划措施付诸实施，按污\n染控制项目进行分解和定量化，具有可\n阶段性实施的特点。\n\n---\n\n<!-- page 109 -->\n\n![page 109](page_109.jpg)\n\n3.环境标准是环境管理的依据\n环境管理制度和措施的一个基本特征是定量管理，要求\n在污染源控制与环境目标管理之间建立定量评价关系，并进\n行综合分析，需要通过环境保护标准统一技术方法，作为环\n境管理制度实施的技术依据。环境标准是强化环境管理的核\n心，环境质量标准提供了衡量环境质量状况的尺度，污染物\n排放标准为判别污染源是否违法提供了依据。同时，环境基\n础标准统一了环境质量标准和污染物排放标准实施的技术要\n求，为环境质量标准和污染物排放标准正确实施提供了技术\n保障，并相应提高了环境监督管理的科学水平和可比程度。\n\n---\n\n<!-- page 110 -->\n\n![page 110](page_110.jpg)\n\n4.环境标准是推动科技进步的动力\n环境标准是依据科学技术与实践的综合成果制定的，具\n有科学性和先进性，代表了今后一段时期内科学技术的发展\n方向。环境标准在某种程度上成为判断污染防治技术、生产\n工艺与设备是否先进可行的依据，成为筛选、评价环保科技\n成果的一个重要尺度，对技术进步起到导向作用。同时，环\n境标准规范了环保有关技术名词、术语等，保证了环境信息\n的可比性，使环境科学各学科之间，环境监督管理各部门之\n间以及环境科研和环境管理部门之间有效的信息交往和相互\n促进成为可能，加速科技成果转化。\n\n---\n\n<!-- page 111 -->\n\n![page 111](page_111.jpg)\n\n5.环境标准是环境评价的准绳\n在环境评价工作中，只有依靠环境标准，才能做出定量化的比较和\n评价，正确判断环境质量的好坏，从而为控制环境质量，进行环境污染\n综合整治，以及设计切实可行的治理方案提供科学依据。\n6.环境标准具有投资导向作用\n环境标准中指标值的高低是确定污染源治理污染资金投入的技术依\n据，在基本建设和技术改造项自中也是自标标准值，可量化污染治理程\n度，为提前安排污染防治资金提供导向。\n\n---\n\n<!-- page 112 -->\n\n![page 112](page_112.jpg)\n\n\n#### 第五节环境管理机构的发展\n1.环境保护领导小组\n20世纪70年代以前，我国就设有自然资源管理的行政主管部门，\n这些机构既是对自然资源进行管理的行政机关，又是国家企事业单位的\n上级主管部门，具有双重主体资格。与环境有关的行政管理机关还有计\n划、工业、建设、卫生等行政主管部门门。1974年10月25日，经国务院\n批准正式成立国务院环境保护领导小组，这是我国成立的第一个环境保\n护工作职能部门。1975年，国务院环境保护领导小组发布《关于环境\n保护的10年规划意见》，同年，黄河水源保护管理机构黄河流域水资\n源保护局成立。1976年长江水源保护管理机构长江水源保护局成立。\n1979年9月《中华人民共和国环境保护法（试行）》首次颁布，中国环境\n保护开始迈上法制轨道。\n\n---\n\n<!-- page 113 -->\n\n![page 113](page_113.jpg)\n\n2.城乡建设环境保护部\n1982年5月4日，国务院为了加强环保工作，撤销了国务院环境保护领\n导小组，将国家建委、国家城建总局、建工总局、国家测绘局、国务院环境\n保护领导小组办公室合并，组建城乡建设环境保护部，部内设环境保护局，\n并实行计划单列和财政、人事权的相对独立。另外，在国家计划委员会内又\n增设了与环境保护工作有关的国土局，形成了由环境保护局、国土局和其他\n工业、资源、卫生等部门共同负责的国家环境保护行政管理体制。\n3.国务院环境保护委员会\n1984年5月8日，成立了国务院环境保护委员会，其办公室设在城乡建\n设环境保护部（由环境保护局代行）。同年12月5日，城乡建设环境保护部环\n境保护局改为国家环境保护局，仍归城乡建设环境保护部领导，同时也是国\n务院环境保护委员会的办事机构。\n\n---\n\n<!-- page 114 -->\n\n![page 114](page_114.jpg)\n\n4.国家环境保护局\n1988年7月，隶属于城乡建设环境保护部领导的国家环境保护局独立出来，\n成为国务院直属局，正式更名为国家环境保护局（副部级），实现环境保护职能\n部门第二次跳跃。\n5.国家环境保护总局\n1998年6月，国家环境保护局升格为国家环境保护总局（正部级），是国务\n院主管环境保护工作的直属机构，实现环境保护职能部门第三次跳跃。在这次\n国务院机构改革中，除了将原林业部调整为国家林业局外，还成立了新的”国\n土资源部”，以统一对国家国土资源的管理。2002年，我国环境管理部门实施\n管理体制的”垂直领导”。2006年为加强中央对地方的监督，国家环保总局在全\n国先后成立了5个环保督察中心。\n\n---\n\n<!-- page 115 -->\n\n![page 115](page_115.jpg)\n\n6.环境保护部\n2008年3月15日，第十一届全国人民代表大会第一次会议正式批准在原国\n家环境保护总局的基础上，成立中华人民共和国环境保护部，作为国务院组成\n部门，实现环境保护职能部门第四次跳跃。\n7.生态环境部\n2018年3月17日，第十三届全国人民代表大会第一次会议正式批准将环境\n保护部的职责与国家发展和改革委员会、国土资源部、水利部、农业农村部、\n国家海洋局、国务院南水北调工程建设委员会6部门的相关环境保护职责整合，\n组建生态环境部，作为国务院组成部门，不再保留环境保护部，实现环境保护\n职能部门第五次跳跃。\n\n---\n\n<!-- page 116 -->\n\n![page 116](page_116.jpg)\n\n\n#### 习题\n1.简述我国环境与发展十大对策，并说明各项对策\n包含的主要内容。\n2.试分析环境政策和环境管理制度的相关关系。\n3.请在三类相关政策（产业政策、技术政策、环境\n经济政策）中选择一类，通过查阅资料，收集汇\n总该类政策执行过程中，国家有关部门已颁布的\n各项规定（列出汇总表）。\n4.说明我国环境保护法规体系的构成。\n\n---\n\n<!-- page 117 -->\n\n![page 117](page_117.jpg)\n\n\n#### 习题\n\n### 5.2000年4月29日第九届全国人大常委会第15次会议\n审查通过的《大气污染防治法》是该法的第二次\n修订，请比较该法二次修订的主要内容，并分析\n我国大气污染防治的发展动向。\n6.试比较1996年版《水污染防治法》与1984年版\n《水污染防治法》内容的变化，并分析我国水污染\n防治的发展动向。\n7.试分析《环境影响评价法》规定开展规划的环境\n影响评价的原因和目的。\n\n---\n\n<!-- page 118 -->\n\n![page 118](page_118.jpg)\n\n\n#### 习题\n8.简述八项环境管理制度的含义和相关规定。\n9.举例说明”土地利用规划制度”实施过程对污染严\n\n#### 重城市所采取的补救措施\n10.说明我国环境标准的分类方法，并按污染控制因\n子分类例表归纳常用环境标准目录。\n"}, {"id": "pdf-004", "group": "原始课件 · PDF原文", "title": "004-第四章环境规划与管理中的综合分析方法-环境规划与管理", "md": "# 环境规划与管理\n\n> 来源: 004-第四章环境规划与管理中的综合分析方法-环境规划与管理.pdf\n> 页数: 118\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 环境规划与管理\n\n#### 授课教师：王思雨副教授\n联系方式：\neswangsiyu@hotmail.com\n办公地点：生态与环境学院208办公室\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 第二/三章\n环境规划与管理的政策 法规、制度、标准和\n\n#### 管理体系\n第一节 我国环境保护政策方针体系\n\n#### 第二节 环境保护法规体系\n第三节 环境规划与管理的法律制度体系\n\n#### 第四节 环境标准体系\n\n#### 第五节 环境管理机构体系\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 课前回顾\n\n#### 生态文明建设之生态学理论\n\n#### 生态文明建设之可持续发展原理\n\n#### 生态文明建设之“两山论”原理\n\n#### 生态文明建设之环境经济学原理\n\n#### 生态文明建设之系统论原理\n\n#### 生态文明建设之管理二重性原理\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n环境容量与环境承载力的区别与联系\n\n#### 环境容量 环境承载力\n\n#### 区别\n是自然生态环境的基本属性之一 既不是纯粹描述自然环境特征的量\n\n#### 也不是一个描述人类社会的量\n侧重反映环境系统的自然属性，即内 侧重体现和反映环境系统的社会属性，\n在的自然票赋和性质 即外在的社会票赋和性质\n\n#### 联系\n在科学技术和社会关系发展的一定阶 一定时期、一定状态下的环境承载力\n段，环境容量具有相对的确定性、有 也是有限的，但可以通过人类环境保\n\n#### 限性 护行为动态的、可调控的\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 可持续发展的基本思想\n（1）可持续发展并不否定经济增长，尤其\n是不能否定欠发达国家的经济增长，但需\n\n#### 要重新审视如何实现经济增长\n·经济增长一一主要指GNP或GDP增长是\n一种数量上扩大的范式；\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 四环境规划与管理的理论基础\n\n#### 必须正确认识GDP的数量和质量\n·GDP的局限性：不能反映社会成本、社会分配和社会公正\n资源环境代价；不能衡量经济增长的效率、效益和质量\n5岁以下要儿死亡率的下降%） 成人识字率变化(%)\n预期寿命变化（%)\n人均GDP变化(%) 20 人均GDP变化（%) 人均GDP变化（%)\n数据：133个国家（1970-2002年），作者计算\n·只注重经济总量和速度的增长，而不顾资源损失、环境污染、生态破坏，\n有可能造成经济增长了，人民生活质量（HDI）却下降了的局面，经济也不能\n持续增长。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 可持续发展的基本思想\n（2）以提高生活质量为目标，同社会进步相适应\n(3) 承认自然环境的价值，而且这种价值不仅体现在\n环境对经济系统的支撑和服务价值上，也体现在环\n境对生命支持系统的不可缺少的存在价值上\n（4）以自然资源为基础、同环境承载能力相协调\n\"可持续性”可以通过适当的经济手段、技术措施\n\n#### 和政府干预得以实现\n目的是减少自然资源的耗竭速率，使之低于资源再\n\n#### 生速率\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 环境规划与管理的理论基础\n\n#### 自然子\n·生物和环境\n\n#### 系统 ·自然物质基础\n\n#### 复合生态系统：在\n\n#### 社会子 ·人、产业、社会组织等\n\n#### 一定空间内生物群落\n·稳定、优质的生活是全\n\n#### 与非生命环境相互作 系统\n用的统一体。 人类的共同追求\n·产品的供需平衡、资金\n\n#### 经济子 积累的速率与利润等\n\n#### 系统 ·社会进步和环境保护的\n\n#### 必要条件\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 四 环境规划与管理的理论基础\n\n#### 生产污染\n\n#### 科技 景观\n通讯 金融 资源利用 植物 能源\n工业 经济系统 贸易 水体 自然系统 矿产\n\n#### 农业 运输 管理 土地 动物\n\n#### 决策\n\n#### 建筑 大气\n\n#### 人\n\n#### 类 环\n\n#### 劳 品 服务 活\n\n#### 动 境\n\n#### 旅游 教育 影\n\n#### 力\n\n#### 居住 社会系统 文娱 响\n\n#### 能流和物流\n\n#### 饮食 医疗 信息流\n\n#### 供应\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 四环境规划与管理的理论基础\n(1）外部经济性(效益，正)\n口环境质量改善；\n口生态系统功能与价值的恢复与提高；\n口提高人体健康水平（或降低健康风险）；\n口资产增值和美学景观享受等。\n(2）外部不经济性（费用，负）\n\n#### 口环境污染\n口生态破坏（退化）等。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 四环境规划与管理的理论基础\n1.管理二重性的涵义\n管理作为一种社会活动，必然有其质的特性。管理的本质\n具有二重性，它既有同生产力、社会化大生产相联系的自然属\n性，又有同生产关系、社会制度相联系的社会属性\n\n#### 生产力 自然属性\n\n#### 生产活动\n\n#### 统一性\n\n#### 生产关系 社会属性\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 四环境规划与管理的理论基础\n二、管理的职能\n前已述及，法约尔将管理分为计划、组织、指挥、协调、控\n制5种职能，而在法约尔管理思想基础上发展起来的管理过程学\n派进一步将管理职能归为计划、组织和控制三大职能，为我们提\n供了一个研究管理核心功能的框架。\n1.计划职能\n2.组织职能\n3.控制职能\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 学习要点\n了解我国环境保护法规体系的构成和环境管理机构体系\n的发展；掌握我国环境保护基本方针和政策，掌握八项环境\n管理法律制度、环境规划法律制度；识记环境标准体系的概\n念和分类、作用和意义。\n学习重点：环境保护法规体系，我国环境保护基本方针\n和政策，八项环境管理法律制度，环境规划法律制度。\n学习难点：我国环境八项管理法律制度，环境标准体系\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n第一节 我国环境保护方针政策体系\n一、基本方针\n二、我国环境管理的基本政策\n三、环境规划与管理的相关政策\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n一、基本方针\n1.环境保护的”32字”方针\n1973年第一次全国环境保护会议上确定了我国环境保护\n工作的”32字\"基本方针：全面规划、合理布局、综合利用、\n化害为利、依靠群众、大家动手、保护环境、造福人民。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n全面规划：强调在发展经济的同时，必须对环境保护进行前瞻性的规划。\n合理布局：指在产业发展和城市建设中，应考虑对环境的影响，避免布局不当\n造成的污染。\n综合利用：提倡资源的循环利用和废物的再利用，减少对环境的破坏。\n化害为利：将有害的环境影响因素转化为有利的方面，提高环境的整体质量。\n依靠群众：鼓励社会各界参与环境保护，发挥公众的监督和参与作用。\n大家动手：呼吁每个人都参与到环境保护中来，从自我做起，减少污染。\n保护环境：直接强调了环境保护的重要性，明确了保护环境是每个公民的责任。\n造福人民：最终的目的是通过保护环境来实现可持续发展，造福后代。\n这一方针的制定和实施，为中国的环境保护措施提供了理论基础和行动指南，特别\n是在经济快速发展的同时，如何有效保护环境资源提供了指导原则。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n2.环境保护是我国的基本国策\n一是明确提出了环境保护是现代化建设中的一项\n战略任务，是一项基本国策，从而确立了环境保护在\n经济和社会发展中的重要地位；\n二是制定出我国环保事业的战略方针，即经济建\n设、城乡建设、环境建设同步规划、同步实施、同步\n发展，实现经济效益、社会效益和环境效益的统一。即\n同步发展方针；\n三是确定把强化环境管理作为当前工作的中心环\n节。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n3.持续发展战略方针\n联合国环境与发展会议结束后，1992年7月，党中央、\n国务院批准了《中国环境与发展十大对策》；1994年3月，国\n务院发布《中国21世纪议程一一中国21世纪人口、环境与发\n展白皮书》，确定了实施可持续发展战略的行动目标、政策框\n架和实施方案。\n\n#### 以实现更绿色更可持续的未来\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n中国环境与发展十大对策内容：\n（1）实行持续发展战略；\n（2）采取有效措施，防治工业污染；\n（3）开展城市环境综合治理，治理城市“四害”（即废气、废水、\n废渣和噪声）；\n（4）提高能源利用效率，改善能源结构；\n（5）推广生态农业，坚持不懈地植树造林，切实加强生物多样性\n的保护；\n（6）大力推进科技进步，加强环境科学研究，积极发展环保产业；\n（7）运用经济手段保护环境；\n（8）加强环境教育，不断提高全民族的环境意识；\n（9）健全环境法规，强化环境管理；\n（10）参照联合国环境与发展大会精神，制定我国行动计划\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n4.“三同步三统一\"的方针\n\n#### 在国家统一领导下，环境保护与\n\n#### 经济建设、城乡建设同步规划（前\n提）、同步实施（条件）、同步发展\n（目的），实现经济效益、社会效益\n和环境效益的统一。\n\n#### 在防治环境污染方面，实行”预防\n为主、防治结合、综合治理”的方针；\n在自然保护方面，实行”自然资源开\n发、利用与保护、增殖并重”的方针；\n在环境保护的责任方面，实行”谁污\n染谁治理，谁开发谁保护”的方针。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n二、我国环境管理的基本政策\n1、“预防为主，防治结合\"政策。\n主要措施包括：\n（1）把环境保护纳入国家的、地\n\n#### 方的和各行各业的中长期和年度经\n济社会发展计划；\n（2）对开发建设项目实行环境影\n响评价和“三同时”制度；\n（3）对城市实行综合治理。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n2、“污染者付费”政策。由环境破坏者承担治理费用和责任。按照\n《环境保护法》等有关法律规定，环境保护投资以地方政府和企业为\n主。企业负责解决自己造成的环境污染和生态破坏问题，不允许转嫁\n给国家和社会；地方政府负责组织城市环境基础设施的建设，设施建\n设和运行费用应由污染物排放者合理负担；对跨地区的环境问题，有\n关地方政府要督促各自辖区内的污染物排放者切实承担责任，不得推\n。主要措施：\n（1）结合企业技术改造防治工业污染；\n（2）向超标向大气、水体等排污企事业单位征收超标排放费，防治\n工业污染；\n（3）对污染严
