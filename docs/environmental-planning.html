重的企事业单位实行限期治理等。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n3、“强化环境管理”政策--三大政策的核\n心 目的是通过强化政府和企业的环境\n治理责任，控制和减少因管理不善带来\n的环境污染和破坏。主要措施：\n（1）逐步建立和完善环保法规和体系，\n建立健全各政府的环境保护机构及国家\n和地方监测网络；\n（2）对重要城市实行环境综合整治定\n量考核；\n（3）广泛开展环境保护宣传教育，不\n断提高全民族的环境意识。\n（4）实行地方各级政府的目标责任制。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n三、环境规划与管理的相关政策\n（一）产业政策\n（二）技术政策\n（三）环境经济政策\n（四）生态环境政策\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n（一）产业政策\n产业结构政策的概念首先出现在二战后的日本，这绝非偶然。战后\n日本经济临崩溃，在这种情况下，日本政府通过规化产业结构高度化\n发展目标，设计产业结构高度化的途径，确定不同时期带动整个国民经\n济起飞的”主导产业”，并通过政府一系列的相应政策，措施来确保\n“主导产业”崛起，从而诱导经济按既定目标发展，日本政府不同时期\n实施各有侧重的产业结构政策，促进该国经济的迅速崛起。\n在短短二十年中，日本经济走完了西方发达国家花一二百年才走完\n的路。一些经济学家和世界组织认为日本经济发展的成功秘诀是靠产业\n政策的实施。从此，产业政策的概念开始流行，有些国家如韩国也开始\n实施产业结构政策。\n中国一二三产占比：\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n产业结构政策是国家颁布的有利于产业结构调整和行业发展的\n专项环境政策，包括产业结构调整政策、行业环境管理政策、限制\n发展的行业政策以及禁止发展的行业政策\n1.产业结构调整政策\n包括产业结构合理化和高级化两个方面。20世纪90年代以来，我国已颁\n布了一批产业结构调整政策，如《90年代国家产业政策纲要》、《汽车工\n业产业政策》、《关于全国第三产业发展规划的通知》、《外商投资产业\n指导目录》、《水利产业政策》、《当前国家重点鼓励发展的产业、产品\n和技术目录》以及《当前部分行业制止低水平重复建设目录》等。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n“十四五“期间，新一轮科技革命和产业变革将加快深度融合，推\n动体系内各项重大技术的突破。现代信息技术是新兴产业发展的重\n要领域，“十四五\"期间将大力支持大数据、云计算、物联网、人工\n智能、生物与医疗技术等重大科技创新和示范，促进产业级应用实\n现跨越式发展。继续推动能源转型，加快发展新能源产业，推广利\n用可再生能源，促进清洁能源的普及应用，推进大功率能源储存和\n高效利用，以及落实电池新材料和新技术的研究与应用。在新材料\n领域继续推进产业化创新，重点突破功能性超细纳米材料和高性能\n复合材料，提升先进金属材料和陶瓷材料的技术水平，支持生物材\n料和功能性有机高分子材料的发展。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n2.行业环境管理政策\n行业分类就是有规则的按照一定科学依据，对从事国民经济生产和经营\n的单位或者个体的组织结构体系的详细划分，如石油化工、交通运输、建\n筑建材、水利水电等。行业环境管理政策主要是针对本行业的特点而有针\n对性的环境管理政策，如《冶金工业环境管理若干规定》、《建材工业环\n境保护工作条例》、《化学工业环境保护管理规定》、《电力工业环境保\n护管理办法》、《关于加强乡镇企业环境保护工作的规定》、《关于发展\n热电联产的规定》、《关于加强水电建设环境保护工作的通知》以及《关\n于加强饮食娱乐服务企业环境管理的通知》等。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n3.限制和禁止发展的行业政策\n1996年8月，国务院发布了《关于环境保护若干问题的决定》，要求在\n1996年9月30日前，对小造纸、小制革、小染料厂及土法炼焦、炼硫、炼砷、\n炼汞、炼铅锌、炼油、选金和农药、漂染、电镀、石棉制品、放射性制品\n等“15小\"企业实行取缔、关闭或停产。\n1999年6月5日，国家经济贸易委员会、国家环保总局、机械工业部联合\n发布了《关于公布第一批严重污染环境（大气）的淘汰工艺与设备的通\n知》，规定了15种污染工艺和设备的淘汰期限和可替代工艺及设备。\n1999年12月又发布了《淘汰落后生产能力、工艺和产品目录（第二\n批）》，涉及8个行业119项。\n2000年6月，再一次发布了第三批自录，涉及15个行业120项内容。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n（二）技术政策\n环境保护技术政策以特定的行业或污染因子为对\n象，在产业政策允许范围内引导企业采取有利于\n保护环境的生产工艺和污染防治技术。\n技术政策注重发展高质量、低消耗、高效率的适\n用生产技术，重点发展技术含量高、附加值高、\n满足环保要求的产品，重点发展投入成本低、去\n\n#### 除效率高的污染控制适用技术\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n中华人民共和国中央人民政府 首页|简|繁|EN|登录|邮箱|：\n首页）政策）国务院政策文件库）国务院部门文件 字号：默认大超大 打印收藏留言\n标题：关于印发《“十四五”生态环境领域科技创新专项规划》的通知发文机关：科技部生态环境部住房城乡建设部气象局林草局\n发文字号：国科发社（2022）238号 来源：科技部网站\n主题分类：科技、教育\\其他 公文种类：通知\n成文日期：2022年09月19日\n科技部生态环境部住房和城乡建设部气象局林草局\n关于印发《“十四五”生态环境领域科技创新专项规划》的通知\n\n#### 国科发社（2022〕238号\n各省、自治区、直辖市及计划单列市科技厅（委、局）、生态环境厅（局）、住房和城乡建设厅（委）、气象局、林草厅（局），新\n疆生产建设兵团科技局、生态环境局、住房和城乡建设局，各有关单位：\n11/02/content 5723769.htm\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n（三）环境经济政策\n环境经济政策是适用价格、税收、财政、信贷、收费、保\n险等各种经济手段引导和促进环境保护的政策。它是一种内在\n约束力量。\n环境经济政策采用手段：明晰产权（所有权、使用权和开发\n权）、建立市场（可交易许可证、可交易环境股票等）、税收、收费\n（排污收费等）、罚款制度（违法/违约罚款）、金融手段（环境基\n金等）、财政手段（专项资金等）、责任赔偿（环境资源损害赔偿\n等）、证券与押金制度（环境行为债券、废物处理证券等）。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n国家环境经济政策进展评估报告2023\n郝春旭，爱玉，龙风，程翠云，李晓亮，董战峰 ，葛察忠 个\n生态环境部环境规划院，北京100041\n基金项目：国家社会科学基金重大项目“加快推进生态环境治理体系和治理能力现代化研究\"（20&ZD092）\n作者简介：郝春旭（1986-)，女，博士，副研究员，研究方向为环境经济政策，E-mail:haocx@caep.org.cn。\n责任作者：董战峰（1979-)，男，博士，研究员，博士生导师，研究方向为环境经济与政策，E-mail：dongzf@caep.org.cn\n摘要：本年度报告采取实地调研法和政策分析法，系统评估2023年我国环境经济政策实践进展，总体认为环境经济政\n策体系不断健全完善，为美丽中国建设与生态环境质量持续改善提供了重要推动力，在生态文明治理体系中的地位和\n作用更加凸显，为宏观经济全面绿色低碳发展转型及美丽中国建设目标加快实现提供了重要支撑。未来，需要更加强\n调环境经济政策的科学性、系统性、经济性和制度化建设，深化环境经济政策创新，实施统筹谋划、综合调控、集成\n应用，在环境治理体系和治理能力现代化建设中发挥更加重要作用。\n关键词：环境经济政策年度进展评估2023\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n（四）生态环境政策\n（1）创新推进绿色发展四大结构调整政策\n①以水泥、化工等非电重点行业超低排放补贴、水电价阶梯激励\n政策为主要“抓手”，促进产业结构深度绿色调整；\n②实施大气污染防治重点区域实施煤炭减量替代，协同推进碳减\n排和污染减排等，推进能源节约利用与结构调整；\n③实施岸电使用补贴、柴油货车限期淘汰等，推进交通运输结构\n优化调整；\n④强化补贴推动农村废弃物资源化与有机肥综合利用以及农村污\n水处理设施运营，推动农村污水处理设施用电执行居民用电或农业生\n产用电价格。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n（2）完善生态环境空间管控\n2018年6月24日，《中共中央国务院关于全面加强生态环境保\n护坚决打好污染防治攻坚战的意见》中提出要坚持保护优先，落实生\n态保护红线、环境质量底线、资源利用上线硬约束，省级党委和政府\n加快确定生态保护红线、环境质量底线、资源利用上线，制定生态环\n境准入清单。继续推进生态、大气、水、土壤、海洋等要素生态环境\n分区管控，推进生态环境要素空间全覆盖管控；构建以战略环境影响\n评价、空间管控清单准入、生态保护补偿、生态环境空间监管与绩效\n考核为主要抓手的”三线一单“生态环境分区管控政策体系。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n（3）完善生态环境质量目标管理政策机制\n\n#### 抓好以考评为主的生态环境质量管\n理体系建设，建立水、气、土、生态等 THINK GREEN\n要素统一的自标考核体系，建立生态环\n境质量监测、评价、考核、公开、责任、\n奖惩环境质量目标管理体系，并强化考\n核结果与财政资金、官员升迁等政策的\n衔接增效。生态环境质量监测评价范围\n由大气、水、土壤拓展到近岸海域水质、\n地下水、农业与农村，完善空气质量达\n标、国家重点生态功能区等，完善生态\n环境监测点位与网络。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n（4）完善生态环境市场经济政策\n全面建立生态环境质量改善绩效导向的财政资金分配机制，将挥\n发性有机物、碳排放、污染性产品等纳入环境保护税改革范围，推进\n将生态环境外部成本纳入资源税和消费税改革，推动建立全成本覆盖\n的污水处理费政策和固体废物处理收费机制。\n完善基于生态贡献和生态环境改善绩效的国家重点生态功能区转\n移支付机制。在全国范围内推开碳交易市场，继续推动排污权交易、\n资源权益交易，建立健全归属清晰、权责明确、流转顺畅、监管有效\n的自然资源产权制度。引导和鼓励长江等重点流域以及粤港澳大湾区\n等重点区域探索设立绿色发展基金。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n（5）推进建立大生态环境治理格局\n以考核落实生态文明建设的”党政同责、一岗双责”；通过监管执法督促\n企业落实环境保护主体责任；坚持建设美丽中国全民行动，引导绿色消费和\n绿色生活方式；强化人大生态环境法律执法检查监督作用，完善政协生态环\n境治理监督，健全检察机关提起公益诉讼制度。形成党委领导、政府主导、\n企业实施、社会参与、多元共治、公开透明、动力内生的大生态环境治理格\n局。\n（6）深度参与推进国际环境规则制定\n动态跟踪评估《2030年可持续发展议程》中生态环境目标指标进展，\n定期发布《中国落实2030年可持续发展议程进展报告》。极推动共建绿色\n“一带一路”，推进绿色发展和生态环境保护标准国际互认，主导制定”一带\n一路”基础设施绿色化标准体系：推进绿色贸易与绿色责任投资，促进贸易供\n给侧结构性改革；加强国际生态环境公约履约。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 引用本文\n侯鹏，高吉喜，陈妍，崔俊，肖如林，张文国，孙晨曦，王永财，侯静，中国生态保护政策发展历程及其演进特征.生态\n学报，2021,41（4）:1656-1667.\nHouP,GaJ,henYhaiJ,Xia,hangG,unWang,ouJ.Develpmentprocessand\n中国生态保护政策发展历程及其演进特征\n侯鹏，高吉喜，陈妍，霍俊，肖如林，张文国，孙晨曦，王永财，侯静\n生态环境部卫星环境应用中心，北京100094\n收稿日期：2020-02-26；修订日期：2020-07-31\n基金项目：国家重点研发计划专项（2017YFC0506506，2016YFC0500206，2018YFC0507200）\n通讯作者Correspondingauthor.高吉喜.E-mallgjx@nies.org.\n摘要：生态环境是人类社会生存和发展的基础，建设生态文明是中华民族永续发展的千年大计。伴随着环境保护\n事业和生态文明制度体系的发展完善，生态保护政策制度体系发生着显著变化。通过对党和国家的重大决定、重\n要会议及政策法规文件的广泛调研和梳理，重点从基本国策确立、生态保护观念转变和政策制度变迁等3个方\n面，分析了我国生态保护政策发展历程及其演进特征。节约资源和保护环境基本国策的确立，是生态保护政策制\n度体系之根基。从生态保护思想启蒙阶段将生态保护纳入经济社会发展计划，到可持续发展阶段将生态保护作为\n文明发展道路的内在要求，再到生态文明阶段将人与自然视为生命共同体，这些生态保护观念的转变是生态保护\n空间管控政策、生态补偿政策、责任追究政策等生态保护政策制度的制订实施，是在客观判断我国当时基本国情\n基础上对生态保护观念的实践，对于推动生态保护事业发展、保障国家生态安全和社会经济高质量发展起到了关\n键作用。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 第二节 环境保护法规体系\n一、环境法律责任\n·二、我国环境保护法规体系\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n.all&vds0urce=024b23e8a203cda77162896ddf36a118\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n一、环境法律责任\n1.环境行政责任\n所谓环境行政责任，是指违反环境保护法，实施\n破坏或者污染环境的单位或个人所应承担的行政方面\n的法律责任。\n承担责任者既可能是企事业单位及其领导人员、\n直接责任人员，也可能是其他公民个人；既可能是中\n国的自然人、法人，也可能是外国的自然人、法人。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n2.环境民事责任\n所谓环境民事责任，是指单位或个人因污染危害环境而侵\n害了公共财产或他人的人身、财产所应当承担的民事方面\n的法律责任。\n在现行环境法中，因破坏环境资源而造成他人损害的，实\n行过失责任原则。行为人没有过错的，即使造成了损害后\n果，也不构成侵权行为、不承担民事赔偿责任。其构成环\n境侵权行为、承担环境民事责任的要件包括\n（1）有排放污染物的行为。\n（2）有损害结果。\n（3）违法行为与损害结果之间具有因果关系。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n3.环境刑事责任\n所谓环境刑事责任，是指行为人因违反环境法，造成或可\n能造成严重的环境污染或生态破坏、公私财产重大损失或\n人身伤亡，构成犯罪时，应当依法承担的以刑罚为处罚方\n\n#### 式的法律后果\n构成环境犯罪是承担环境刑事责任的前提条件。与其他\n犯罪一样，构成环境犯罪、承担环境刑事责任的要件包\n括犯罪主体、犯罪的主观方面、犯罪客体和犯罪的客观\n方面。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n二、我国环境保护法规体系\n1.宪法中的环境保护规范\n宪法在一个国家法律体系中处于最高位阶，它是一个国家的\n根本大法。我国1982年宪法26条规定：“国家保护和改善生活环\n境和生态环境，防治污染和其他公害。国家组织和鼓励植树造林，\n保护林木”。这一规定是国家对环境保护的总政策，说明了环境保\n护是国家的一项基本职责。此外，我国宪法第9条、第10条、第\n22条、第26条中对自然资源和一些重要的环境要素的所有权及其\n保护也做出了许多的规定。\n宪法为我国的环境保护活动和环境立法提供了指导原则和立\n法依据。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n2.中华人民共和国环境保护法\n\n#### 我国在1979年制定了第一部综\n\n#### 合性环境基本法《环境保护法（试\n行）》；1989年颁布了《环境保护\n\n#### 新环保法\n法》，2015年实施最新版环境保护\n法。这部新的综合性环境基本法在\n\n#### 环境保护的重要问题上都做了相应\n的规定。其主要内容包括：总则、\n\n#### 监督管理、保护和改善环境、防治\n\n#### 环境污染和其他公害、信息公开和\n公众参与、法律责任和附则7章。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n2.中华人民共和国环境保护法\n新环保法从47条增加到70条，对如环境规划、环境标准、环境监\n测、总量控制、生态补偿、排污收费等基本制度作出规定。加入了“对\n拒不改正的排污企业实施按日计罚”，“对严重违法行为采取行政拘留”\n等内容，增设”信息公开和公众参与”专章，建立“违法名单”制度，环境\n违法信息将记入社会诚信档案，并向社会公布违法者名单，被专家称为\n\n#### ‘史上最严”的环保法律\n\n#### 新环保法 污\n\n#### 环保 染\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n3.环境资源单行法\n\n#### 环境资源单行法是针对某一特定\n（1）环境保护单行法\n的环境要素或特定的环境社会关系进\n行调整的专门性法律法规，具有量多\nPROTECT ENVIRONMENT\n面广的特点，是环境法的主体部分。\n目前，我国已颁布的环境保护单行法\n八部。包括：\n保护环境 ①1982年颁布的《海洋环境保护法》\n（1999、2013年修订）\n\n#### 从我做起\n②1984年颁布的《水污染防治法》\n（1996、2008年修订）\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n③1987年颁布的《大气污染防治法》（95、00、16年三次修订）\n④1995年颁布的《固体废物污染环境防治法》（2004年修订）\n③1996年颁布的《环境噪声污染防治法》\n?2003年颁布的《环境影响评价法》\n①2003年颁布的《放射性污染防治法》\n82003年颁布的《清洁生产促进法》\n\n#### 维护环境卫生\n\n#### 我们在行动\n\n#### 保护碧水蓝天共建绿色家园\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n（2）资源保护单行法\n\n#### 目前，我国已颁布的资源保护\n单行法可分为以下三类：\n\n#### ①土地利用规划法：目前，我国已\n\n#### 保护环境\n\n#### 经颁布的有关法律法规主要有《中\n\n#### 华人民共和国城乡规划法》、《中\n\n#### 华人民共和国村庄和集镇规划建设\n管理条例》等。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n②自然资源保护法：目前，我国已经颁布的有关法律法规主要有\n《土地管理法》及其实施条例、《矿产资源法》及其实施细则、\n《水法》、《海域使用管理条例》、《森林法》及其实施细则、\n《草原法》、《渔业法》及其实施细则、《水产资源繁殖保护条\n例》、《基本农田保护条例》、《土地复垦规定》、《地质灾害防\n治条例》、《森林防火条例》、《草原防火条例》等。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n③自然保护法：目前，我国已经颁布的有关法律法规主要有\n\n#### 《野生动物保护法》及其实施条例\n\n#### 《水土保持法》及其实施细则\n\n#### 《防沙治沙法》\n\n#### 《自然保护区条例》\n\n#### 《风景名胜区管理暂行条例》\n\n#### 《野生植物保护条例》\n《城市绿化条例》等。\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n4.国家其他法律有关环境保护的规定\n（1）刑法\n1997年3月14日全国人民代表大会八届五中会议通过了刑法\n（修订案）。2011年新修订的刑法分则第六章第六节专门规定了\n破坏环境资源保护罪，具体规定了12种破坏环境资源保护罪。根据\n它们侵犯对象和行为性质的不同，可以分为4种类型。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n第一类，污染环境方面的犯罪，包括污染环境罪，非法进口固体废\n物危害环境罪；\n第二类，有关野生动物及其制品方面的犯罪，包括非法捕捞水产品\n罪，非法捕杀珍贵、濒危野生动物及其制品罪，非法狩猎罪；\n第三类，有关植物方面的犯罪，包括非法采伐、毁坏珍贵树木罪，\n非法收购盗伐、滥伐的林木罪；\n第四类，破坏资源方面的犯罪，包括破坏耕地罪，破坏矿产资源罪。\n新刑法的颁布，对于协调有关环境保护和资源保护法律，完善刑法，\n与国际立法接轨，具有重大意义，为采用刑法手段保护环境提供了依据。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n（2）行政法\n依照宪法原则而制定的并涉及环境管理范畴的行政法律，如\n\n#### 《民法通则》\n\n#### 《农业法》\n\n#### 保护环境\n\n#### 《企业法》\n\n#### 热爱地球\n《乡镇企业法》 保/护/环/境人/人/有/贵\n\n#### 《对外贸易法》\n\n#### 《标准化法》\n\n#### 《行政处罚法》\n\n#### 《文物保护法》\n\n#### 《公共卫生法》\n《食品卫生法》等中有关环境保护的条款。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n5.国家行政部门制定的各种环保法令、法规和条例\n国务院有关部委根据环境保护的具体对象而制定的各种环保\n专门性法令、法规、条例和决定，是我国环境保护法规体系的有\n机组成部分。例如《国务院关于结合技术改造防治工业污染的几\n项规定》、《国务院关于环境保护工作的决定》、《国务院关于\n加强乡镇、街道企业环境管理的规定》、《国务院关于环境保护\n若干问题的决定》、《医疗废物管理条例》、《危险化学品安全\n管理条例》等。\n这些法令、法规、条例和决定，具有国家行政强制力，而且\n针对性和操作性都较强，对我国环境规划与管理走上法制轨道起\n到了重要的推动作用。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n6.环境保护地方法规\n地方法规是各省、自治区、直辖市根据我国环境法律\n或法规，结合本地区实际情况而制定并经地方人大审议通\n过的法规。\n地方法规突出了环境管理的区域性特征，有利于因地\n制宜地加强环境管理，是我国环境保护法规体系的组成部\n分。\n国家已制定的法律法规，各地可以因地制宜地加以具体化。\n国家尚未制定的法律法规，各地可根据环境管理的实际需\n要，制定地方法规予以调整。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n7.签署并批准的国际环境公约\n我国积极开展环境外交，参与各项重大的国际环境事\n务，在国际环境与发展领域中发挥着越来越大的作用。\n1980年以来，我国政府已签署并批准了38个国际环\n境保护公约，如保护臭氧层《维也纳公约》、《气候变化\n框架公约》、《生物多样性公约》等，并在全球、区域和\n双边环境合作中不断取得进展。\n签署并批准的国际环境公约和协定，具有法律效力，\n负有相应的国际义务，因而也应归入我国环境法规的体系。\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n第三节 环境规划与管理的法律制度体系\n一、环境规划与管理制度\n●二、八项环境管理法律制度\n·三、环境规划法律制度\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n\n#### 环境规划与管理制度\n环境规划与管理制度是指为了实现环境立法的目的，并在环\n境保护基本法中作出规定的，由环境保护单项法规或规章所具体\n表现的，对国家环境保护具有普遍指导意义，并由环境行政主管\n部门来监督实施的同类法律规范的总称，属于环境保护行为的基\n本法律制度。按照规划和管理的不同要求，可以分为环境管理制\n度和环境规划行政法律制度两类。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### 环境管理八\n\n#### 项制度\n第三次全国环境保护会议上推出了“环境保护目标责任\n制”、“城市环境综合整治定量考核制度”、“排放污染物许可\n证制度”、“污染集中控制制度”和”污染源限期治理制度”共五\n项新的环境管理制度，与原已实行的”三同时制度”、“排污收\n费制度”、“环境影响评价制度”三项制度，形成了一整套强化\n环境管理的制度体系。\n\n#### 低碳文明生活 你我共同创建\n\n#### 爱护环境 保护地球\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### 环境规划行政\n\n#### 法律制度\n为了加强环境规划管理，贯彻预防为主、防治结合的环\n境政策，根据《环境保护法》和《土地管理法》的相关规定，\n在我国又实施了两项环境规划行政法律制度，即“环境保护计\n划制度“和”土地利用规划制度”。两项制度的实施，促进了\n我国环境规划和管理的法律制度体系趋于完善。\n\n#### 保地球\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n二、八项环境管理法律制度\n1.\"三同时\"制度\n（1）基本概念\n“三同时”制度系指所有新建、改建、扩建项目，其防治污\n染设施必须与主体工程同时设计、同时施工、同时投产。\n“三同时”制度是我国首创的。它是在总结我国环境管理的实\n践经验基础上，被我国法律所确认的一项重要的控制新污染源\n的法律制度。它适用于各种可能对环境、安全和健康产生影响\n的建设项目和工程。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n（2）相关法律规定\n“三同时“制度最早规定于1973年的《关于保护和改善环境的若\n干规定》。1979年的《环境保护法》（试行）和1989年的《环\n境保护法》在规定环境影响评价制度的同时，重申了“三同时”的\n规定。1986年的《建设项目环境保护管理办法》、1998年的\n《建设项目环境保护管理条例》对”三同时”制度都作了具体规定。\n2004年国家环境保护总局发布《关于开展固定资产投资项目环境\n影响评价和”三同时”制度执行情况清理整顿工作的紧急通知》。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n2.排污收费制度\n（1）基本概念\n排污收费制度系指对排放污染物的工\n矿企业事业单位征收排污费，用于污染的\n治理。这项制度是运用经济手段有效地促\n进污染治理和新技术的发展，使污染者承\n担污染防治费用的法律制度，是“污染者\n付费”环境政策的具体体现。\n\n#### 保护环境\n2003年7月1日，正式实施《排污费 从感做起\n征收使用管理条例》，这意味着我国已实\n\n#### 中宣部宣教局中国文明网\n施20多年的排污收费制度发生了重大变化。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n征收排污费的目的，是为了促使排污者加强经营管理，节约和\n综合利用资源，治理污染，改善环境。排污收费制度是”污染者付费”\n原则的体现，可以使污染防治责任与排污者的经济利益直接挂钩，促\n进经济效益、社会效益和环境效益的统一。\n《中华人民共和国环境保护税法》于2018年1月1日起施行，\n费改税开始，征收权由环保部门正式移交给税务机关，同时，环保部\n门配合开启”企业申报、税务征收、环保监测、信息共享”的税收征管\n模式。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n（2）我国征收排污费的相关规定\n1978年12月，中央批转的原国务院环境保护领导小组《环\n境保护工作汇报要点》首次提出在我国实行“排放污染物收费制\n度”。\n1982年12月，国务院在总结22个省、市征收排污费试点经\n验的基础上，颁布了《征收排污费暂行办法》，对征收排污费的\n目的、范围、标准、加收和减收的条件、费用管理使用等作了具\n体规定。\n1984年《水污染防治法》第15条作出了“向水体排放污染\n物的，按照国家规定缴纳排污费，超过国家或者地方规定的污染\n物排放标准的，按照国家规定缴纳超标准排污费”的规定，即凡\n向水体排放污染物超标或不超标都要收费\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n我国颁布的《中华人民共和国标准化法》第7、14、20\n条规定，我国现行的污染物排放标准属强制性标准，违反排\n放标准即违法，对不执行者要予以行政处罚。可认为，以超\n标与否，作为判定是否违法的界限。\n新修订的《环境保护法》规定：“排放污染物的企业事业\n单位和其他生产经营者，应当按照国家有关规定缴纳排污费。\n排污费应当全部专项用于环境污染防治，任何单位、个人不\n得截留、挤占或者挪作他用。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n2008年修订的《水污染防治法》\n第二十四条规定”直接向水体排放污\n染物的企业事业单位和个体工商户，\n应当按照排放水污染的种类、数量和\n\n#### 征收排污费\n排污费征收标准缴纳排污费。排污费\n\n#### 应当用于污染的防治，不得挪作他\n用。\n2000年4月第二次修订后颁布的 排污企业\n《大气污染防治法》第48条作出了\n超标者处10万元以下罚款，并限期\n治理“的规定。\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n排污收费种类：4大类4种118项因子，其中按污染介质分为4大\n类：水、气、声、危废；按收费方法分为4种：污水排污费、废气排\n污费、危险废物排污费、噪声超标准排污费；按污染因子分为118项：\n水污染因子69项（65项污染物，4个特征值）、气污染物45项、危险\n废物类型1项、噪声类型3项。\n《中华人民共和国环境保护税法》中的纳税人主要包括：在中华人\n民共和国领域和中华人民共和国管辖的其他海域，直接向环境排放\n应税污染物的企业事业单位和其他生产经营者为环境保护税的纳税\n人，应当依照本法规定缴纳环境保护税。征税对象包括：环境保护\n税法所附《环境保护税税目税额表》《应税污染物和当量值表》规\n定的大气污染物、水污染物、固体废物和噪声。\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n环境保护税由税务机关依照《中华人民共和国税收征收管理法》\n征收管理。环境保护主管部门依照本法和有关环境保护法律法规的\n规定负责对污染物的监测管理。环境保护主管部门和税务机关应当\n建立涉税信息共享平台和工作配合机制。税务机关应当将纳税人的\n纳税申报数据资料与环境保护主管部门交送的相关数据资料进行比\n对。税务机关发现纳税人的纳税申报数据资料异常或者纳税人未按\n照规定期限办理纳税申报的，可以提请环境保护主管部门进行复核，\n环境保护主管部门应当自收到税务机关的数据资料之日起十五日内\n向税务机关出具复核意见。税务机关应当按照环境保护主管部门复\n核的数据资料调整纳税人的应纳税额。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n3.环境影响评价制度\n（1）基本概念\n环境影响评价是指对规划和建设项目实施后可能造成的环\n境影响进行分析、预测和评估，提出预防或者减轻不良环\n境影响的对策和措施，进行跟踪监测的方法与制度。\n环境影响评价制度的作用：\n贯彻”预防为主”的环境保护政策。\n为开展区域政策环境影响评价，实施环境与发展综合决策\n创造了条件。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n（2）我国环境影响评价的相关法律规定\n我国在1979年《环境保护法（试行）》中，规定实行环\n境影响评价报告书制度；\n1986年颁布了《建设项目环境保护管理办法》\n1998年颁布了《建设项目环境保护管理条例》\n2016年《大气污染防治法》正式施行。\n\n#### 环平\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n2003年《中华人民共和国环境影响评价法》正式施行，《环境影响评\n价法》突出三个特点：\n①简化环评审批。今后审批部门只对环境影响报告书、环境影响报\n告表进行审批，对环境影响登记表实行备案管理，不再要求审批。\n②取消前置审批。新法删除了建设项目的环境影响评价文件未依法\n经审批部门审查或者审查后未予批准的，该项目审批部门不得批准其建\n设。从立法角度取消了环评审批作为项目审批部门前置条件的依据。\n③加强环境执法。新法对”未批先建”项目的处罚更严更重，取消了\n对”未批先建”项目限期补办手续的情形，在责令停止建设后直接进行处\n罚，并增加了可以责令恢复原状的内容。处罚额度从环评法修订前的处\n以5万元以上20万元以下改为项目总投资额1%以上5%以下。，\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n4.环境保护目标责任制\n（1）基本概念\n环境保护目标责任制是一种具体落实地方各级政府和有关污染的单位对\n环境质量负责的行政管理制度。环境保护目标责任制规定了各级政府行政首\n长应对当地的环境质量负责，企业的领导人对本单位污染防治负责，并确定\n他们在任期内环境保护的任务目标，列为政绩进行考核。环境保护目标责任\n制被认为是八项环境管理的龙头制度。\n河长制：\ncard.all&vds0urce=024b23e8a203cda77162896ddf36a118\n河长制，林长制，路长制：\n88%B6&from_source=webtop_search&spm_id_from=333.1007&search_source=5&page=\n\n#### 2&0=30\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n（2）制度的实施和发展\n第二次全国环境保护会议后，在我国各级政府中推行的“环\n境保护目标责任制”。第三次全国环境保护会议上被确定为八项环\n境管理制度之一。通过将环保目标的逐级分解、落实，突出了各\n级地方政府负责人的环境责任，解决了环境管理的保证条件和动\n力机制，促使环境管理系统内部活动有序，系统边界分明，环境\n责任落实，改变了环境管理孤军作战的被动局面。\n1997年3月8日中央政治局常委召开座谈会，亲自听取环保工\n作汇报，表明了党中央对环境问题的高度重视，开创了地方政府”一\n把手亲自抓环境管理，环保主管部门负责编制和检查、落实环境规\n划，各相关部门积极配合强化环境管理的新局面。\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n5.城市环境综合整治定量考核制度\n（1）基本概念\n城市环境综合整治定量考核制度是对城市实行综合整\n治的成效、城市环境质量，制定量化指标进行考核，每年\n评定城市各项环境建设与环境管理的总体水平。这项制度\n是城市政府统一领导负总责，有关部门各尽其职、分工负\n责，环保部门统一监督的管理制度。\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n（2）制度的实施和发展\n综合整治的概念最早是在1984年《中央关于经济体制改革的\n决定》中提出来的。随着国家经济体制的改革，政府职能发生了\n变化，该决定要求以城市为中心的各地政府要把工作重点从经济\n建设的计划指导转变到城市基础设施建设、城市公共设施建设和\n\n#### 城市环境综合整治上来\n1985年在河南洛阳召开的第一次全国城市环境保护工作会\n议上，确定了我国城市环境保护工作的发展方向一综合整治。\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n2003年国家环保总局发布了“关于印发《生态县、生态\n市、生态省建设指标（试行）》的通知”，在全国各地掀起了\n创建生态县、生态市和生态省的高潮\n“十二五”城市环境综合整治定量考核指标实施细则的实\n施，标志着我国城市综合整治进入了新的发展阶段。\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n6.排放污染物许可证制度\n（1）基本概念\n对环境有不良影响的各种规划、开发、建设项目、排污\n设施或经营活动，其建设者或经营者，需要事先提出申请，\n经主管部门审查批准，颁发许可证后才能从事该项活动，这\n就是许可证制度。\n包括排污申报登记制度和排污许可证制度两个方面以及\n排污申报，确定污染物总量控制自标和分配排污总量削减指\n标，核发排污许可证，监督检查执行情况等四项内容。\n这是一项与我国污染物排放总量控制计划相匹配的环境\n管理制度。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n全国排污许可证管理信息平台 公开端\n申请前信息公开 许可信息公开 限期整改登记信息公开许可注销公告许可撤销公告许可遗失声明重要通知 法规标准 网上申报 更多\n省/直辖市 地市 单位名称 行业类别 生产经营场所地址 信息公开起止日期 公开内容查看 填写反馈\n广东省 惠州市 惠州市东邦化学有限公司 林产化学产品制造 惠州市大亚湾技术经济开发区2024-06-17至2024-06-21 ? 填写\n云南省 曲靖市 会泽洋以则铅锌矿有限公司 铅锌矿采选 会泽以则村委会白碳箐 2024-06-17至2024-06-21 ® 填写\n江苏省 淮安市 江苏今世缘酒业股份有限公司白酒制造 涟水县高沟镇今世缘大道1号 2024-06-17至2024-06-21 填写\n江苏省 连云港市 连云港胜海水务有限公司 污水处理及其再生利用 江苏省连云港市灌云县临港产 2024-06-17至2024-06-21 ? 写\n广东省 佛山市 佛山市金利澳环保科技有限其他纸制品制造 佛山市高明区明城镇城七路372024-06-17至2024-06-21 ?\n广东省 广州市 广州医科大学附属第三医院综合医院 广州市黄埔区长贤路55号 2024-06-17至2024-06-21 填写\n青海省 海东市 青海耀华待种玻璃股份有限平板玻璃制造 乐都工业园（西区） 2024-06-17至2024-06-21 填写\n江苏省 盐城市 东台市大洋纺织染整有限公司棉纺织及印染精加工 东台市南沈灶镇镇南路 2024-06-17至2024-06-21 填写\n湖北省 仙桃市 仙桃安必盛焙铸设备有限公司有色金属合金制造 仙桃市胡场镇工业园发展大道 2024-06-17至2024-06-21 写\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n（3）制度的实施和发展\n中国施行排污申报登记的规定最早见于1982年由国务院\n颁布的《征收排污费暂行办法》之中，其主要目的在于以此作\n\n#### 为排污收费的依据\n后来在相继制定的《环境保护法》中明确规定，“排放污\n染物的企业事业单位，必须依照国务院环境保护行政主管部\n门的规定申报登记。\n排污许可证制度是比申报登记制度更严格的对环境进行\n科学化、目标化和定量化管理的一项制度。排污许可证制度在\n我国大规模地普遍实施，还不完全具备条件。\n\n---\n\n<!-- page 83 -->\n\n![page 83](page_083.jpg)\n\n实施污染物排放许可证制度后，容许排污权交易是国内环保制度的重大\n创新。排污单位经治理或产业（包括产品）调整，其实际排放物总量低于所核准\n的充许排放污染物总量部分，经环保部门准，充许进行有偿转让。但是，由\n于在现行的管理安排中，采取的是由政府征收排污费的制度，而不是使用市\n场交易的方式。所以从国内的情况来看，将排污权的交易具体化为一项可以\n操作的制度安排，并加以实施，需要在运行机制上进行探索。2001年9月，\n亚洲开发银行资的”二氧化排污交易制”在山西省太原市26家企业试点，开了\n国内排污权交易之先河。\n会议审议通过，并予公布，自2021年2月1日起施行。适用于全国碳排放权交\n易及相关活动，包括碳排放配额分配和清缴，碳排放权登记、交易、结算，\n温气体排放报告与核查等活动，以及对前述活动的监督管理。\n\n---\n\n<!-- page 84 -->\n\n![page 84](page_084.jpg)\n\n碳排放权就是中国人的人权：\n%B3%E6%8E%92%E6%94%BE%E6%9D%83&froms0urce=\nwebtopsearch&spmidfrom=333.1007&searchsource=5\n一文看懂碳市场，碳交易，碳排放权，碳汇，碳税，碳达峰，\n\n#### 碳中和\n=333.337.search-\ncard.all&vdsource=024b23e8a203cda77162896ddf36a118\n\n---\n\n<!-- page 85 -->\n\n![page 85](page_085.jpg)\n\n（1）基本概念\n7.污染集中控制制度\n\n#### 污染集中控制方式是针对分散\n\n#### 控制的问题，改变过去一家一户治\n\n#### 理污染的作法，把有关污染源汇总\n\n#### 在一起，经分析比较，进行合理组\n\n#### 合，在经济效益、环境效益和社会\n\n#### 效益优化的前提下，采取集中处理\n措施的污染控制方式。实践证明，\n\n#### 推行集中控制，有利于使有限的环\n\n#### 保投资获得最佳的总体效益\n\n---\n\n<!-- page 86 -->\n\n![page 86](page_086.jpg)\n\n（2）实施污染集中控制的必要措施\n①实行污染集中控制，必须以规划先导。污染集中控制与城市建设密\n切相关，如完善城市排水管网，建立城市污水处理厂，发展城市煤气\n化和集中供热，建设城市垃圾处理厂，发展城市绿化等。因此，集中\n控制必须与城市建设同步规划，同步实施。\n②实行污染集中控制必须突出重点，划定不同的功能区划，分别整治。\n③实行污染集中控制必须与分散控制相结合，构建区域环境污染综合\n防治体系。\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n疏通多种资金渠道是推行污染集中控制的保证。要实现集中控制必\n须落实资金。应充分利用环保基金贷款、建设项目环保资金、银行贷\n款及地方财政补贴等多种渠道筹措资金。\n③实行污染集中控制，地方政府协调是关键。污染集中控制不仅涉及\n企业，也涉及地方政府各部门，充分依靠地方政府的协调，是集中控\n制方案得以落实的基础。\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n8.污染源限期治理制度\n（1）基本概念\n《环境保护法》第29条规定：“对造成环境严重污染的企业\n事业单位，限期治理。“所谓污染源限期治理制度，是指对超标\n排放的污染源，由国家和地方政府分别做出必须在一定期限内完\n成治理达标的决定，是一项强制性的法律制度。\n新环保法第60条规定：企业事业单位和其他生产经营者超过\n污染物排放标准或超过重点污染物排放总量控制指标排放污染物\n的，县级以上人民政府环境保护主管部门可以责令其采取限制生\n产、停产整治等措施；情节严重的，报经有批准权的人民政府批\n准，责令停业、关闭。\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n（2）制度实施及发展\n继1978年国家安排第一批限期治理项目完成后，1989年国\n家环境保护委员会和国家计委又下达了第二批污染限期治理项目\n140个，1996年国家下达了第三批污染限期治理项目121个。确\n定限期治理项目要考虑如下条件：\n①根据城市总体规划和城市环境保护规划的要求对区域环境整治\n作出总体规划；\n②首先选择危害严重、群众反映强烈、位于敏感地区的污染源进\n行限期治理；\n③要选择治理资金落实和治理技术成熟的项目。\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n三、环境规划法律制度\n1.环境保护计划制度\n（1）基本概念\n环境保护计划，是指由国家或地方人民政府及其行政管理\n部门依照一定法定程序编制的关于环境质量控制、污染物排放\n控制及污染治理、自然生态保护以及其他与环境保护有关的计\n划。环境保护计划是各级政府和各有关部门在计划期内要实现\n的环境目标和所要采取的防治措施的具体体现\n\n---\n\n<!-- page 91 -->\n\n![page 91](page_091.jpg)\n\n2.环境保护计划的主要内容\n环境保护计划制度主要规定在《环境保护法》第4、\n12、22、23、24条之中。环境保护计划的内容主要包括四\n类：即城市环境质量控制计划、污染物排放控制和污染治理\n计划、自然生态保护计划以及其他有关环境保护的计划等。\n\n---\n\n<!-- page 92 -->\n\n![page 92](page_092.jpg)\n\n对环境保护计划实行国家、\n\n#### 省（自治区、直辖市）、市\n（地）、县四级管理制。由各\n\n#### 级计划行政主管部门负责组织\n编制。各级环境保护主管部门\n\n#### 负责编制环境保护计划建议和\n\n#### 监督、检查计划的落实和具体\n执行。其他有关部门则主要是\n\n#### 根据计划和环境保护部门的要\n求，组织实施环境保护计划。\n\n---\n\n<!-- page 93 -->\n\n![page 93](page_093.jpg)\n\n2.土地利用规划制度\n土地利用规划制度是国家根据各地区的自然条件、资源状况\n和经济发展需要，通过制定土地利用的全面规划，对城镇设置、\n工农业布局、交通设施等进行总体安排，以保证社会经济的可持\n续发展，防止环境污染和生态破坏。\n我国已经颁布执行的有土地管理、城市规划、县镇规划和村\n镇规划等法规。2004年修订的《土地管理法》专设一章一一土地\n利用总体规划。要求各级政府应该依据国家经济和社会发展规划、\n国土整治和资源环境保护的要求、土地供给能力及各项建设对士\n地的需求，编制土地利用总体规划。\n\n---\n\n<!-- page 94 -->\n\n![page 94](page_094.jpg)\n\n\n#### 第四节 环境标准体系\n一、环境标准的概念和性质\n二、环境标准分类\n·三、环境标准的作用\n\n---\n\n<!-- page 95 -->\n\n![page 95](page_095.jpg)\n\n一、环境标准的概念和性质\n环境标准是环境保护法规体系中一个独立的、特殊的、重\n要的组成部分。\n环境标准是国家为了维护环境质量、控制污染，保护人群\n健康、社会财富和生态平衡，按照法定程序制定的各种技术规\n范的总体。\n\n---\n\n<!-- page 96 -->\n\n![page 96](page_096.jpg)\n\n环境标准的法律性质主要表现在：\n\n#### 首先，环境标准具有规范性\n\n#### 其次，环境标准具有法律的约束力\n最后，环境标准的制定像法规一样，要经授权由有关国家\n\n#### 机关按照法定程序制定和颁发\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n二、环境标准分类\n根据《环境保护标准管理办法》（1999.4.1）的规定，我国的\n环境标准由五类两级组成。\n五类，是指环境质量标准、污染物排放（控制）标准、环境监测\n方法标准等三类标准为核心，包含环境基础标准与标准制修订规范、\n管理规范类环境保护标准两类标准在内的国家环境保护标准体系。\n两级，是指我国环境保护标准分为国家级和地方级。\n有关强制性国家环境标准的代号，用“GB”表示；推荐性国家环\n境标准的代号，用”GB/T\"表示；行业环境标准代号用\"HJ\"表示，推\n荐性行业环境标准代号用\"HJ/T\"表示。\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n1.环境质量标准\n以维护一定的环境质量，保护人群健康、社会财\n富和促进生态良性循环为目标，规定环境中各类有害\n物质（或因素）在一定时间和空间内的允许含量，叫\n做环境质量标准。\n环境质量标准反映了人群、动植物和生态系统对环\n境质量的综合要求，也标志着在一定时期国家为控制\n污染在技术上和经济上可能达到的水平。环境质量标\n准体现环境目标的要求，是评价环境是否受到污染和\n制定污染物排放标准的依据。\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n以下是一些常见的环境质量标准举例：\n①大气环境质量标准：《环境空气质量标准》（GB3095-\n2012），规定了不同污染物（如二氧化硫、二氧化氮、\nPM2.5、PM10等）的浓度限值。\n②水环境质量标准：《地表水环境质量标准》（GB3838-\n2002），对地表水中各类污染物的含量及相关指标做出规定。\n③土壤环境质量标准：《土壤环境质量农用地土壤污染风险\n管控标准（试行）》（GB15618-2018）。\n④声环境质量标准：《声环境质量标准》（GB3096-\n2008），划分不同声环境功能区及其对应的噪声限值。\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n2.污染物排放标准\n为了实现国家的环境目标和环境质量标准，对污\n染源排放到环境中的污染物的浓度或数量所作的限量\n规定就是污染物排放标准。\n制定排放标准的直接目的是为了控制污染物的排放\n量，达到环境质量的要求。污染物排放标准为污染源\n规定的最高允许排污限额（浓度或总量），是确认排\n污行为是否合法的法律根据，超过排放标准要承担相\n应的法律责任。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n\n#### 以下是一些大气污染物排放标准的\n例子：\n\n#### 世界环境日\n\n#### 《火电厂大气污染物排放标准》\n蓝天保卫战，我是行动者。\n（GB13223-2011）：对火电厂排\n\n#### 放的二氧化硫、氮氧化物、颗粒物\n等污染物的浓度限值等进行规定。\n\n#### 2 《锅炉大气污染物排放标准》\n（GB13271-2014）：适用于各种\n锅炉的污染物排放控制。\n\n#### 《水泥工业大气污染物排放标准》\n（GB4915-2013）：规范水泥生\n产过程中的大气污染物排放要求。\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n3.环境监测方法标准\n环境监测规范方法标准指为监测环境质量和污染物排放，规\n范采样、分析测试、数据处理等技术所制定的国家环境监测方法\n标准。环境监测是人们对影响人类和其他生物生存和发展的环境\n质量状况进行的监视性测定活动，通常包括物理指标测定、化学\n\n#### 指标测定以及生态系统的测定\n环境监测方法标准具有规范性、强制性，严格的制定程序和\n显著的技术性和时限性，是制定环境保护规则和计划的重要依据，\n是实施环境保护法律、法规的基本保证，是强化环境监督管理的\n要点，也是提高环境质量，推动环境科学技术进步的动力。环境\n监测方法标准包括《城市区域环境噪声测量方法》、《摩托车和\n轻便摩托车噪声测量方法》等。\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n4.环境基础标准与标准制修订规范\n国家对环境保护工作中需要统一的技术术语、符号、代\n号（代码）、图形、指南、导则及信息编码等所作的规定，\n叫做环境基础标准。它是制定其他环境标准的基础。其目的\n是为制定和执行各类环境标准提供一个统一遵循的准则，避\n免各标准间的相互矛盾。以下是一些环境基础标准的例子：\n《环境保护图形标志》（GB15562）：规定了环境保护相关的图\n形标志样式。\n《环境标准样品研复制技术规范》（HJ/T173）：对环境标准样\n品的研制、复制等方面进行规范。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n5.管理规范类环境保护标准\n规范，就是明文规定或约定俗成的标准，适用于环保事业发\n展、利于行业环保建设的技术规范、管理规范、行业规范、导则\n等均属于此范畴。它具有规范性、强制性、科学性和相对稳定的\n特点。例如《生态环境状况评价技术规范》、《建设项目竣工环\n境保护验收技术规范》、《建设项目环境风险评价技术导则》和\n《核辐射环境质量评价一般规定》等。\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n三、环境标准的作用\n环境标准同环境保护法规相配合，在国家环境管理中\n起着重要作用。工业发达国家环境污染发展成为全国性公害，\n在加强环境保护立法的同时，开始制定全国性的环境标准，\n并且逐渐发展成为具有多层次、多形式、多用途的完整的环\n境标准体系，成为环境与资源保护法体系中不可缺少的部分。\n环境标准是制定国家和地方环境规划的主要依据，环\n境标准是环境保护法规制定与实施的重要基础与依据，环境\n标准是国家环境规划与管理的技术基础。\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n截止到2005年4月10日，中国已\n经制定各类环境标准486项。其中，\n国家标准357项，环保行业标准129\n项；强制性标准117项，推荐性标准\n369项；环境质量标准11项，污染物\n排放标准104项，监测方法标准315 国家王\n项，基础标准10项，其他标准46项。\n另有地方环境标准1000余项。\n\n---\n\n<!-- page 107 -->\n\n![page 107](page_107.jpg)\n\n1.环境标准具有法规约束力\n国家环境标准具有法规约束力，绝大多数是法律规定必\n须严格贯彻执行的强制性标准，具有行政法规的效力。国家\n环境标准明确规定了适用范围，及企事业单位在排放污染物\n时必须达到、可以达到的各项技术指标要求，规定了监测分\n析的方法以及违反要求所应承担的经济后果等，同时我国环\n境标准从制（修）订到发布实施有严格的工作程序，使环境标\n准具有规范性特征。国家环境标准又是国家有关环境政策在\n技术方面的具体体现，努力促使经济建设和环境建设协调发\n展。\n\n---\n\n<!-- page 108 -->\n\n![page 108](page_108.jpg)\n\n2.环境标准是环境规划的体现\n\n#### 通过环境规划来实施环境标准，环\n境标准提供了可列入国民经济和社会发\n展计划中的具体环境保护指标，为环境\n保护计划切实纳入各级国民经济和社会\n发展计划创造了条件。环境规划的目标\n主要是用标准来衡量的。环境质量标准 爱护环境\n\n#### 我们\n是具有鲜明的阶段性和区域性特征的规 从点点滴滴做起\n划指标，具备可定量化、可操作性强的\n特点。污染物排放标准是根据环境质量\n目标要求，将规划措施付诸实施，按污\n染控制项目进行分解和定量化，具有可\n阶段性实施的特点。\n\n---\n\n<!-- page 109 -->\n\n![page 109](page_109.jpg)\n\n3.环境标准是环境管理的依据\n环境管理制度和措施的一个基本特征是定量管理，要求\n在污染源控制与环境目标管理之间建立定量评价关系，并进\n行综合分析，需要通过环境保护标准统一技术方法，作为环\n境管理制度实施的技术依据。环境标准是强化环境管理的核\n心，环境质量标准提供了衡量环境质量状况的尺度，污染物\n排放标准为判别污染源是否违法提供了依据。同时，环境基\n础标准统一了环境质量标准和污染物排放标准实施的技术要\n求，为环境质量标准和污染物排放标准正确实施提供了技术\n保障，并相应提高了环境监督管理的科学水平和可比程度。\n\n---\n\n<!-- page 110 -->\n\n![page 110](page_110.jpg)\n\n4.环境标准是推动科技进步的动力\n环境标准是依据科学技术与实践的综合成果制定的，具\n有科学性和先进性，代表了今后一段时期内科学技术的发展\n方向。环境标准在某种程度上成为判断污染防治技术、生产\n工艺与设备是否先进可行的依据，成为筛选、评价环保科技\n成果的一个重要尺度，对技术进步起到导向作用。同时，环\n境标准规范了环保有关技术名词、术语等，保证了环境信息\n的可比性，使环境科学各学科之间，环境监督管理各部门之\n间以及环境科研和环境管理部门之间有效的信息交往和相互\n促进成为可能，加速科技成果转化。\n\n---\n\n<!-- page 111 -->\n\n![page 111](page_111.jpg)\n\n5.环境标准是环境评价的准绳\n在环境评价工作中，只有依靠环境标准，才能做出定量化的比较和\n评价，正确判断环境质量的好坏，从而为控制环境质量，进行环境污染\n综合整治，以及设计切实可行的治理方案提供科学依据。\n6.环境标准具有投资导向作用\n环境标准中指标值的高低是确定污染源治理污染资金投入的技术依\n据，在基本建设和技术改造项自中也是自标标准值，可量化污染治理程\n度，为提前安排污染防治资金提供导向。\n\n---\n\n<!-- page 112 -->\n\n![page 112](page_112.jpg)\n\n\n#### 第五节环境管理机构的发展\n1.环境保护领导小组\n20世纪70年代以前，我国就设有自然资源管理的行政主管部门，\n这些机构既是对自然资源进行管理的行政机关，又是国家企事业单位的\n上级主管部门，具有双重主体资格。与环境有关的行政管理机关还有计\n划、工业、建设、卫生等行政主管部门门。1974年10月25日，经国务院\n批准正式成立国务院环境保护领导小组，这是我国成立的第一个环境保\n护工作职能部门。1975年，国务院环境保护领导小组发布《关于环境\n保护的10年规划意见》，同年，黄河水源保护管理机构黄河流域水资\n源保护局成立。1976年长江水源保护管理机构长江水源保护局成立。\n1979年9月《中华人民共和国环境保护法（试行）》首次颁布，中国环境\n保护开始迈上法制轨道。\n\n---\n\n<!-- page 113 -->\n\n![page 113](page_113.jpg)\n\n2.城乡建设环境保护部\n1982年5月4日，国务院为了加强环保工作，撤销了国务院环境保护领\n导小组，将国家建委、国家城建总局、建工总局、国家测绘局、国务院环境\n保护领导小组办公室合并，组建城乡建设环境保护部，部内设环境保护局，\n并实行计划单列和财政、人事权的相对独立。另外，在国家计划委员会内又\n增设了与环境保护工作有关的国土局，形成了由环境保护局、国土局和其他\n工业、资源、卫生等部门共同负责的国家环境保护行政管理体制。\n3.国务院环境保护委员会\n1984年5月8日，成立了国务院环境保护委员会，其办公室设在城乡建\n设环境保护部（由环境保护局代行）。同年12月5日，城乡建设环境保护部环\n境保护局改为国家环境保护局，仍归城乡建设环境保护部领导，同时也是国\n务院环境保护委员会的办事机构。\n\n---\n\n<!-- page 114 -->\n\n![page 114](page_114.jpg)\n\n4.国家环境保护局\n1988年7月，隶属于城乡建设环境保护部领导的国家环境保护局独立出来，\n成为国务院直属局，正式更名为国家环境保护局（副部级），实现环境保护职能\n部门第二次跳跃。\n5.国家环境保护总局\n1998年6月，国家环境保护局升格为国家环境保护总局（正部级），是国务\n院主管环境保护工作的直属机构，实现环境保护职能部门第三次跳跃。在这次\n国务院机构改革中，除了将原林业部调整为国家林业局外，还成立了新的”国\n土资源部”，以统一对国家国土资源的管理。2002年，我国环境管理部门实施\n管理体制的”垂直领导”。2006年为加强中央对地方的监督，国家环保总局在全\n国先后成立了5个环保督察中心。\n\n---\n\n<!-- page 115 -->\n\n![page 115](page_115.jpg)\n\n6.环境保护部\n2008年3月15日，第十一届全国人民代表大会第一次会议正式批准在原国\n家环境保护总局的基础上，成立中华人民共和国环境保护部，作为国务院组成\n部门，实现环境保护职能部门第四次跳跃。\n7.生态环境部\n2018年3月17日，第十三届全国人民代表大会第一次会议正式批准将环境\n保护部的职责与国家发展和改革委员会、国土资源部、水利部、农业农村部、\n国家海洋局、国务院南水北调工程建设委员会6部门的相关环境保护职责整合，\n组建生态环境部，作为国务院组成部门，不再保留环境保护部，实现环境保护\n职能部门第五次跳跃。\n\n---\n\n<!-- page 116 -->\n\n![page 116](page_116.jpg)\n\n\n#### 习题\n1.简述我国环境与发展十大对策，并说明各项对策\n包含的主要内容。\n2.试分析环境政策和环境管理制度的相关关系。\n3.请在三类相关政策（产业政策、技术政策、环境\n经济政策）中选择一类，通过查阅资料，收集汇\n总该类政策执行过程中，国家有关部门已颁布的\n各项规定（列出汇总表）。\n4.说明我国环境保护法规体系的构成。\n\n---\n\n<!-- page 117 -->\n\n![page 117](page_117.jpg)\n\n\n#### 习题\n\n### 5.2000年4月29日第九届全国人大常委会第15次会议\n审查通过的《大气污染防治法》是该法的第二次\n修订，请比较该法二次修订的主要内容，并分析\n我国大气污染防治的发展动向。\n6.试比较1996年版《水污染防治法》与1984年版\n《水污染防治法》内容的变化，并分析我国水污染\n防治的发展动向。\n7.试分析《环境影响评价法》规定开展规划的环境\n影响评价的原因和目的。\n\n---\n\n<!-- page 118 -->\n\n![page 118](page_118.jpg)\n\n\n#### 习题\n8.简述八项环境管理制度的含义和相关规定。\n9.举例说明”土地利用规划制度”实施过程对污染严\n\n#### 重城市所采取的补救措施\n10.说明我国环境标准的分类方法，并按污染控制因\n子分类例表归纳常用环境标准目录。\n"}, {"id": "pdf-004", "group": "原始课件 · PDF原文", "title": "004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法", "md": "# 第四章环境规划与管理中的综合分析方法\n\n> 来源: 004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法.pdf\n> 页数: 135\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第四章\n\n#### 环境规划与管理中的综合分析方法\n第一节 环境现状调查与评价的基本程序和方法\n\n#### 第二节 环境统计方法\n\n#### 第三节 社会经济预测方法\n\n#### 第四节 环境预测方法\n\n#### 第五节 决策分析方法\n\n#### 第六节 环境审计方法\n\n#### 第7节 环境管理信息系统\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 学习要点\n掌握环境现状调查与评价的基本程序和方法、环境统\n计方法、社会经济预测方法、环境预测方法、决策分析方\n法、环境审计方法和环境管理信息系统的内容和程序。\n学习重点：环境评价方法，环境预测方法，社会经济\n预测方法和决策分析方法。\n学习难点：环境管理信息系统的建立与应用。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 第一节 环境现状调查与评价\n\n#### 的基本程序和方法\n一、环境现状调查内容\n二、环境现状调查的方法\n·三、环境评价\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n环境现状调查与评价的目的是为了掌握和了解某区域环境现状，发现和识\n别主要环境问题，从而确定主要污染源和主要污染物，为环境规划与管理的\n\n#### 制定和实施创造条件\n环境现状调查要从信息情报的收集和分析入手，针对列出的调查清单逐项\n调查，发现问题并逐步深入，可以包括必要的现场监测、勘察以及征询专家\n意见等。环境评价包括自然环境评价、经济和社会评价、污染评价\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n一、环境现状调查内容\n1.环境特征调查\n（1）自然环境特征：\n\n#### 地质、气候水文、植被、地形\n\n#### 地貌、土壤、特殊价值地区及生态\n\n#### 环境（特别是生态敏感区或生态脆\n弱区）等。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n（2）社会环境特征和经济社会发展规\n\n#### 划\n①区域相关的经济现状：\na.生产布局现状分析，生产布局是人类生产活动\n存在和发展的空间形式，它对区域环境产生直接和显\n著的影响。\nb.生产力发展水平现状分析，生产力直接反映了\n人与自然环境之间的关系，生产力发展水平则反映了\n人们征服、改造、控制和适应环境的能力。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n②区域内相关的社会因素：\na.社会人口状况分析，人通过生产和消费活动同\n环境形成了相互联系、相互作用、相互制约的对立统\n一关系。\nb.社会意识状况分析，规划区内人们的思想、道\n德、哲学、美学、文艺、宗教和风俗等社会意识形态，\n特别是当地人们的环境意识等方面的情况，并分析这\n些社会意识对区域环境所产生的影响。\nc.社会制度和体制、体育等社会概况，分析对区\n域环境所产生的影响。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n（3）环境污染因素调查\n突出重大工业污染源调查和污染源综合调查。根据污染类\n型，进行单项调查，按污染物排放总量排队由此确定评价区内的\n主要污染物和主要污染源。\n污染调查还应酌情包括乡镇企业污染评价和生活及面源污染\n分析等。污染调查还应考察现存环境设施运行情况、已有环境工\n程的技术和效益，作为新规划工程项目的设计依据和参考。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n2.生态调查\n\n#### 环境自净能力\n\n#### 土地开发利用情况\n\n#### 气象条件\n\n#### 绿地覆盖率\n\n#### 人口密度\n\n#### 经济密度\n\n#### 建设密度\n\n#### 能耗密度调查等\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n3.污染源调查\n\n#### 工业污染源\n\n#### 农业污染源\n\n#### 生活污染源\n\n#### 交通运输污染源\n\n#### 噪声污染源\n\n#### 放射性\n\n#### 电磁辐射污染源调查等\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n4、环境质量调查\n环境保护部门及工厂企业历年的环境质量报告和环境监测资料。\n5.环保措施效果调查\n环保设施运行率、达标率和环保措施削减污染物效果以及\n其综合效益进行分析评价。\n6.环境管理现状调查\n包括环境管理机构、环境保护工作人员业务素质、环境政\n策法规实施和环境监督实施情况等。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n二、环境现状调查的方法\n1.收集资料法\n\n#### 应用范围广、收效大，比\n较节省人力、物力和时间。\n\n#### 环境现状调查时，应首先通过\n\n#### 此方法获得现有的各种有关资\n\n#### 料，但此方法只能获得第二手\n\n#### 资料，而且往往不全面，不能\n\n#### 完全符合要求，需要其他方法\n补充。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n2.现场调查法\n可以针对使用者的需要，直接获得第一手的数据和资料，\n以弥补收集资料法的不足。\n这种方法工作量大，需占用较多的人力、物力和时间，有\n时还可能受季节、仪器设备条件的限制。\n现场调查法能够直接获取真实、准确的环境现状信息，\n但可能受到时间、人力、物力和天气等条件的限制，并且对\n调查人员的专业知识和技能要求较高。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n3.遥感的方法\n遥感是一种综合技术，它利用航空器、卫星等远距离探\n测设备获取地球表面信息。通过收集、处理和分析地球表面\n的图像，从而获得关于地球环境、自然资源、人类活动等方\n面的信息。这种技术通常涉及使用特定的传感器装置，在不\n直接接触研究对象的情况下，收集其特征信息，并对这些信\n息进行提取、加工、表达和应用。遥感技术的应用领域非常\n广泛，包括电力、通信、气象、农林、海洋、勘探、摄影、\n防灾减灾等。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n三、五 环境评价\n在环境规划中，环境评价的主要内容包括自然环境评\n价、社会经济评价、环境质量评价和污染源评价等4个方\n面。评价是对被评价对象的优劣、好坏作定量或定性的描\n述，一般以定量描述为主。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n1.环境评价的主要内\n\n#### 容\n（1）自然环境评价\n通过自然、社会、经济背景分析及社会、经济与环境的\n相关分析，确定当前主要环境问题及其产生的原因，并确定\n环境区划和评估环境的承载能力。\n自然背景分析会考虑当地的气候条件、地形地貌、土壤\n类型、水资源、植被覆盖等自然因素。社会背景分析则关注\n人口结构、文化传统、教育水平、社会组织形式、生活方式\n等方面。经济背景分析包括产业结构、经济发展水平、经济\n增长模式、资源利用效率等内容。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n（2）社会经济评价\n\n#### 项目 内容\n人口总数、人口密度、人口分布、人口的\n\n#### 人口评价\n年龄结构和人口的文化素质等。\n产业结构、国民生产总值和人均国民收入、\n\n#### 经济活动评价\n产品综合能耗、能源利用率等。\n住房、道路、给水设施及供水管网、排水\n\n#### 城市基础设施\n管网及污水处理设施、能源结构、供热方式、\n\n#### 评价\n绿地及分布和电话普及率等。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n（3）环境质量评价\n\n#### 环境质量评价是环境规划与\n\n#### 蓝天 绿色地球\n\n#### 管理的一项基础工作，其目的是正\n\n#### 确认识规划区的环境质量现状、环\n\n#### 境质量的地区差异和环境质量的变\n化趋势。环境质量评价突出超标问\n\n#### 题，以明确环境污染的时空界域为\n\n#### 主要环节，指出主要环境问题的原\n因和潜在的环境隐患等。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n（4）污染源评价\n突出重大工业污染源评价和污染源综合评价。根据污染类型\n进行单项评价，按污染物等标污染负荷排序，确定评价区的主要\n污染物和主要污染源。\n污染评价还应酌情包括乡镇企业污染评价和生活及面源\n污染分析等。\n\n#### 农业污染源\n\n#### 化肥\n\n#### 其他污染源\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n2.环境评价的主要方法\n（1）自然环境评价方法：\n①类比分析法：是一种常用的定性和半定量的方法，一般有生态环境\n整体类比、生态因子类比、生态环境问题类比等。\n②列表清单法：将各种生态环境因子分别列在同一表格的行与列里，\n逐点进行分析并以正负号、数字或其他符号表示其性质、强度等。\n③生态图法：即图形叠置法，是把两个以上的生态环境信息叠合在\n一张图上，构成复合图，用以表示生态环境变化的方向和程度。绘\n制生态图的两个基本手段是指标法和重叠法。指标法是用定量或半\n定量的方法对环境主体进行评价、分级，并绘制在地图上。重叠法\n是将各相关要素的图件叠合在一起以获得新的、综合性的结果\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n④指数法与综合指数法：在生态环境评价中用得最多，必须建\n立表征生态环境因子特性的指标体系和确定评价标准，赋予各\n因子权重，然后建立评价函数曲线，得出综合评价指数值。例\n如用于水环境质量评价的内梅罗指数、用于大气环境质量评价\n的格林大气指数、上海大气质量指数等。\n③景观生态学方法：通过空间结构和功能分析与稳定性分析，\n评价生态环境质量状况。\n生态系统综合评价法：常用层次分析法（AHP法），又称多\n层次权重分析决策法，是一种定性和定量结合的方法。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n①生物生产力评价法：用三个基本生物学参数（生物生长\n量、生物量和物种量）来表示，可评价生态环境质量及其\n变化趋势。\n⑧其他评价方法：还有多因子数量分析法、回归分析法、聚\n类分析法、相关分析法、系统分析法等。\n生态环境评价方法正处于蓬勃发展的时期，新的方法还在不\n断出现，但不管采取什么方法，其可靠性最终取决于对生态\n环境的全面认识和深刻理解。获取可靠的资料数据，仔细分\n析生态环境的特点、本质和各要素之间的内在联系，是评价\n成功的关键。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n（2）社会经济评价方法\n社会经济评价的关键是选择评价的标准和指标化的方法。由\n于社会经济问题比较复杂，不易形成统一的看法，目前尚无统一\n评价标准，一般是根据研究对象和研究者所选择的总的战略目标，\n结合国内外相关指标体系来确定。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 山\n（3）环境质量评价方法\n环境质量评价分为单环境要素评价、单要素综合评价\n和区域环境质量综合评价。评价的方法很多，这里重点介\n绍指数评价方法。某污染物在环境中监测值与标准值的比\n值，称为该污染物的环境质量指数，表示污染物的超过环\n境质量标准的倍数。\ni污染物的环境质量指数；\nP 污染物的监测值；\nCio -i污染物的环境质量标准值。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n（4）污染源评价方法\n在确定主要污染物和污染源的评价中多选用排放量和毒性这两\n个指标作为评价主要污染物的指标。在多种污染物比较分析中，在\n数学上可采用标准化法，将不同种类、不同量纲的一组值进行标准\n化，使之可相互比较，主要方法有排毒指数法、环境污染能力潜在\n指数法和等标污染负荷法等。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 等标污染负荷法\n\n#### 项目 公式 备注\n废水中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度值，mg/l;\nCoi i污染物的允许排放浓度标准与C同单位的\nP 数值，无因次量；\nCoi Qi -污废水排放量，m3/d。\n\n#### 某污染物的等标污\n染负荷(P)\n废气中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度平均值，mg/mv3；\nCoi -污染物的允许排放浓度标准与p同单位的\nP;= 数值，无因次量；\nCoi qi 一废气中i污染物的介质排放流量，mv/d。\n某污染源的等标污 污染源中各污染物i=1.2， n的等标污染负荷\n染负荷(P) 之和，为污染源的等标污染负荷。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n按调查区域内污染源的等标污染负荷（P-)大\n\n#### 评价区域的等标污\n染负荷(PT) P=∑P, 小排列，将累计百分比大于80%左右的污染\n= 源列为区域内主要污染源。\n评价区域内某污染 按评价区域内某污染物等标污染负荷（P总）大\nPi=P 小排序，分别计算百分比及累计百分比，将\n\n#### 物的总等标污染负\n荷(Pi) j=1 累计百分比大于80%左右的污染物列为该区\n域的主要污染物。\n污染物排放量排序是直接评价某种污染物的\n污染源污染负荷 K P ×100% 主要污染源的最简单方法。实施总量控制规\n比(K) P 划时，针对区域总量控制的主要污染物，对\n排放这一主要污染物的污染源进行总量排序。\n区域主要污染物的选择，主要是根据区域的\n主要环境问题，或是根据环境质量评价结果\n污染物的污染负 =Pi ×100% 来确定。\n荷比(K) 针对主要污染物的排放量，首先要有污染源\n排放量清单，然后排序，再选出占污染物总\n量90%以上的污染源，进行总量控制规划。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 第二节 环境统计方法\n\n#### 环境统计\n二、 环境统计的调查方法\n三、环境统计的研究方法\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n一、环境统计\n环境统计是用数字反映并计量人类活动引起的环境变化和\n环境变化对人类的影响。\n以环境为主要研究对象，研究范围涉及人类赖以生产和生\n活的全部条件，包括影响生态平衡的诸因素及其变化带来的后\n果。环境统计要调查和反映植物、动物、大气、水、土地土壤\n和人类居住区等各个方面的活动和自然现象及其对环境的影响。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n1.一般的统计工作程序\n\n#### 阶段 内容\n全面调查 (报表制度、普查)\n统计调查（基础）：\n非全面调查（重点调查、典型调查、抽样\n\n#### 收集资料过程\n调查)\n统计表 (把资料综合成统计表)\n统计整理（中间环节）： 统计图 (把资料综合成统计图)\n加工资料过程 整理成各种统计指数（综合指标、回归分\n析、指数、动态数列等)\n统计分析（核心）： 描述性分析（利用指标数据说明问题）\n分析资料过程 推断性分析（各种推断、预测）\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n2.环境统计的内容\n自然环境：包括空气与气候、水、土地、生态环境。\n特殊环境：包括能源、放射性、有害物质、噪声、自然灾害、野\n生动植物。\n与环境有关的生活条件：包括健康与营养、劳动条件、居住条件、\n娱乐和文化条件、主观评价环境一一民意测验。\n背景材料：包括直接影响环境的背景因素、间接因素、公共事业、\n技术、意识形态的因素、地理的和有关的背景材料。\n改善环境条件的办法：包括立法和实施、环境法的违反和起诉、\n减轻环境的损害、用于环境保护的支出、环境的研究和教育等\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n3.环境统计的指标体系\n我国现行环境统计指标体系包括七个子系统：\n\n#### 工业污染与防治\n生活及其他污染与防治 爱护地球·保护环境\n\n#### 农业污染与防治\n\n#### 环境污染治理投资\n\n#### 自然生态环境保护\n\n#### 环境管理\n·环保系统自身建设\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n4.中国现行环境统计指标体系框架\n工业污染与防治 企业基本情况 工业污染物排放情况 工业污染治理设施 工业污染治理情况\n生活及其他污染与防治 生活污水排放情况 城市污水处理厂运行情况 生活废气排放情况 城市垃圾处理情况\n农业污染与防治 规模化畜禽养殖场污染排放及治理情况\n环境污染治理投资 污染源治理投资 城市环境基础设施建设投资 环境污染治理投资合计\n自然生态环境保护 自然保护区建设情况 野生动植物保护情况 生态示范区建设情况\n生态功能保护区建设情况 农村环境污染及治理情况\n环境管理 环保法规和标准 环保年度计划 绿色工程规划 环评制度 “三同时”制度\n排污收费制度执行情况 排污申报登记制度及排污许可证制度 限期治理制度\n环境科技工作 环保产业 环保信访工作 人大政协提案 环保档案工作情况\n环保系统自身建设 环保机构 环保人员\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n5.中国环境统计范围\n\n#### ② 6\n\n#### 生态破坏 区域环境 环境系统\n\n#### 与建设统 污染与防 的自身建\n\n#### 计 治统计 设统计\n\n#### ③ 5\n\n#### 自然资源 区域环境 环境管理\n\n#### 统计 质量统计 统计\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n6.环境统计的作用\nGreen Life!\n为环境管理和决策提供依据。\n\n#### 评价和考核各级政府及环境保\n护部门环境保护的工作情况。\n\n#### 增加社会公众对环境状况和环\n\n#### 境保护的了解，提高全民的环\n\n#### 保护生忘环境\n境意识。\n\n#### 拥抱绿色生活\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n7.环境统计专业报表上报流程\n\n#### 省级上报数据\n\n#### 总局规划司 相关司\n\n#### 审核并填报本级数\n\n#### 专业 省级\n\n#### 报表 汇总 上报\n\n#### 空白表 数据\n\n#### 地级上报数据\n\n#### 省局规划处 相关处室\n\n#### 审核并填报本级数\n\n#### 专业 市级\n\n#### 报表 汇总 上\n\n#### 空白表 数据 报\n\n#### 区县级上报数据\n\n#### 地市局规划科 相关科室\n\n#### 审核并填报本级数\n\n#### 专业 区县级\n\n#### 报表 汇总 上报\n\n#### 空白表 数据\n\n#### 专业报表空白表\n\n#### 区县级环保局 相关科室\n\n#### 规划部门\n\n#### 填报本级数\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n二、环境统计的调查方法\n1、定期普查：1996年我国进行了全国污染源普查工作。\n2、抽样调查：对重点工业企业污染源实行抽样调查，\n重点污染源年度统计报表。\n3、科学估算：对重点企业及社会生活污染物排放进行\n科学估算。\n4、专项调查：对环境保护工作中有重大意义的进行专\n项调查，如乡镇企业污染调查、畜禽业专项调查、环保\n产业专项调查等。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n三、环境统计的研究方法\n1、大量观察法：环境现象的特征与其数量表现有不同\n程度的差异，建立在大量观察基础上的统计结果必然\n具有较好的代表性。\n2、综合分析法：综合分析法是指对大量观察所获资料\n进行整理汇总，计算出总量指标、相对指标、平均指\n标、变异指标等。\n3、归纳推断法：所谓归纳是由个别到一般，由事实\n到概括的推理方法，是统计研究常用的方法。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n延伸材料-我国环境统计缺口性指标\n环境统计缺口性指标是指在环境统计中存在的数据缺失\n或不完整的指标。这些指标可能由于以下原因而存在缺口：\n1、数据收集困难：某些环境数据可能难以收集，例如特定\n污染物的排放数据、生态系统的详细信息等。\n2、监测范围有限：环境监测网络可能无法覆盖所有地区或\n环境要素，导致某些区域或指标的数据缺失。\n3、报告和记录不完整：企业或相关部门可能未能完整报告\n或记录环境数据，导致统计数据不全面。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n以下是一些可能存在缺口性指标的领域：\n1、危险废物产生和处置：危险废物的产生量、种类、\n处置方式等数据可能存在缺口。\n2、土壤污染：土壤污染的程度、范围和污染物种类等\n信息可能不完整。\n3、生物多样性：生物多样性的详细数据，如物种数量、\n栖息地状况等，可能难以全面获取。\n4、特定污染物排放：一些特定污染物的排放数据，尤\n其是来自小型企业或非重点污染源的排放，可能存在\n缺失。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n为了减少环境统计缺口性指标，可以采取以下措施：\n1、完善监测网络：扩大监测范围，提高监测频率，以获取更全面的数据。\n2、加强数据收集和管理：建立健全的数据收集和报告制度，确保数据的准确\n性和完整性。\n3、推动信息共享：促进不同部门和机构之间的数据共享，整合各方资源，填\n补数据空白。\n4、开展专项调查和研究：针对特定的环境问题或指标，进行专项调查和研究，\n以获取更详细的数据。\n需要注意的是，具体的环境统计缺口性指标会因地区、时间和环境问题的不\n同而有所差异。因此，在进行环境统计和分析时，需要充分认识到这些缺口，\n并采取适当的方法来处理和解释数据。同时，持续改进和完善环境统计体系也\n是解决缺口性指标问题的关键。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n#### 第三节 社会经济预测方法\n一、社会发展预测\n二、经济发展预测\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n#### 社会发展预测\n社会发展预测重点是人口预测，是指根据一个国家、一个地区现\n有人口状况及可以预测到的未来发展变化趋势，测算在未来某个时\n间人口的状况，是环境规划与管理的基本参数之一。进行人口预测，\n主要关心的是未来的人口总数。\n社会发展预测也包括规划期内区域内的人口总数、人口密度和\n人口分布等方面的发展变化趋势，人们的可持续发展观念和环境意\n识等各种社会意识的发展变化，人们的生活水平、居住条件、消费\n倾向和对环境污染的承受能力等方面的变化等。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 常见的人口预测模型\n\n#### 项目 公式 说明\n算术级数 N 预测年的人口数量，万人；\nN,=N,+b（t-to)\n法 Nro 基准年的人口数量，万人；\n\n#### b 逐年人口增加数（即变动一年\n几何级数 N=N(1+K)（-0)\n法 N的增加数），万人/a；\nt.to 预测年和基准年，a；\n\n#### 人口自然增长率，是人口出生\n指数增长 N=N2.718K（-to)\n法 to 率与死亡率之差，常表示为人口每年\n净增的干分数。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n二、 经济发展预测\n\n#### 能源消耗指标\n\n#### 指标名称 说明\n产品综合 包括单位产值综合能耗（总耗能量和产品总产值的比值）\n能耗 和单位产量综合能耗（总耗能量和产品总产量的比值）。\n能源利用率 有效利用的能量和供给的能量的比值。\n规划期内能源消耗量增长速度与年平均经济增长速度之间\n\n#### 能源消费弹性\n系数 的比值，年平均经济增长速度，可采用工业总产值、工农\n业总产值、社会总产值或国民收入的增长速度等。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 能源消耗预测方法\n\n#### 方法名称 说明\n人均能量 按人民生活中衣食住行对能源的需求来估算生活用能的方法，\n消费法 我国平均每人每年1.14t标准煤。\n能源消费弹性系数e一般为0.4～1.1，由国民经济增长速度，粗\n能源消费 预测能耗的增长速度β=é·α，其中α为工业产值增长速度，以\n弹性系数法 此可进行规划期能耗预测E，=E。（1+β)（-），其中E为预测年的\n能耗量，E为基准年的能耗量，t，t为预测年和基准年。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n目前，耗煤量的预测可分为民用耗煤量预测和工业耗煤量\n预测，民用耗煤量预测可用式（4-2）表示：\n\n#### Es=As·S (4-\n\n#### ：中\nEs- -预测年采暖耗煤量，x104t/a;\nA 采暖耗煤系数，t/m2;\nS一一预测年采暖面积，m2。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n工业耗煤量预测方法有弹性系数法、回归分析法、灰色预测\n等几种常用的方法。以弹性系数法为例，设工业耗煤量平均增长\n率为α，工业总产值平均增长率为β，工业耗煤量弹性系数C：可用\n式（4-3）表示。\n(Et/E0）t-t0-1 (4-3)\n\n#### β (Mt/M0)t-t0-1\n式中Et一一预测年的工业耗煤量，x104t/a；\nEo一一基准年的工业耗煤量，x104t/a;\nMt一一预测年的工业总产值，x104元/a；\nM。一基准年的工业总产值，x104元/a；\nt，to预测年和基准年，a。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 第四节 环境预测方法\n\n#### 、环境预测\n二、常用预测方法\n·三、环境预测的工作程序\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 环境预测\n1、内涵\n在环境管理过程中，经常需要对人类活动将可能引起的环境质量\n变化趋势进行预测。环境预测是在调查研究和科学实验的基础上进行\n的，借助于数学、计算理论和信息处理技术等工具，对未来某一时间\n环境质量的变化趋势，进行定性和定量分析。或者说，预测就是根据\n过去和现在来估计未来，是对研究对象的未来发展作出科学推测和估\n计，预测是决策的基础。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n把需要进行预测的客观环境看成一个系统，根据一般系统的整\n体性、相关性和动态性等特点，把事物的过去、现在和将来看成一\n个连续的、不断发展变化的辩证统一体，并依据已有资料数据，使\n用预测方法，对未来的环境污染趋势、污染控制对策以及控制污染\n\n#### 所需的投资趋势等进行评价和估算\n这种围绕系统的环境、技术和价值等未来情况进行预测，主要\n为决策提供必需的未来信息，对环境管理系统开发和提高环境效益\n是十分重要的。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n2、分类\n\n#### 类别 分类子项\n\n#### 按预测内\n区域环境预测、行业环境预测、专题环境预测\n\n#### 容划分\n定性预测：对未来发展的定性分析（递增、递减、加快、减缓节奏）；\n定量预测：占有历史和现实数据，运用数学模型预测预测；\n按预测作 定时预测：寻找时间序列上的发展变化规律（过去、现在和今后）：\n用划分 定比预测：定结构比例，例如环保投资结构比例分析（水、气、渣、\n噪);\n评价预测：对预测结果可信度、风险性进行评价\n短期预测：5年内；\n\n#### 按预测时\n中期预测：5~15年；\n\n#### 间划分\n\n#### 长期预测：20年\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n二、常用预测方法\n1、预测的基本原则\n（1）资料的完整性：预测不同于猜测，猜测是随心所欲，不负\n责任，而预测必须以周密调查和详尽的统计资料为依据。\n（2）数据的准确性：基础数据必须准确完整，预测结果必须给\n出误差分析；由于资料数据、预测技术和预测人员素质三方面的因\n素，预测结果不可能十全十美，误差总会有，但误差有大有小。\n（3）方法的可靠性：对所有方法、模型进行分析、评价和检验。\n（4）结果的可验性：预测应有明了的结论，且这个结论是可以\n检验的。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n2、环境预测内容和基本程序\n\n#### 环境预测是通过已取得的情报资\n料和监测统计数据，对未来未知的环\n境前景进行的估计和推测，也就是把\n环境作为预测对象，置于一定的时间\n和空间中，研究在未来一定时期经济\n社会活动对环境的影响，预测环境要\n素和系统将达到的运动状态及可能出\n现的结果，它是环境决策的依据，也\n是制定环境规划与环境管理的基础。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n（1）环境预测的内容\n①能源和资源消耗的增长、土地利用、资源开发的规模和速度、预\n测供求矛盾及其对环境的影响；\n③大气环境、水环境、土壤环境等环境要素污染状况的变化；\n④开发活动可能造成的生态破坏；\n③环境污染与破坏造成的经济损失和对人体健康的损害；\n?主要污染物的削减量\n（2）环境预测的一般程序：①确定预测的目的和任务；②收集和分析\n有关资料；③选择预测方法；④建立预测模型；③进行预测计算；\n?对预测结果的鉴别和分析。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n3、环境预测的方法\n根据预测结果一般可分为两类，即定性预测方法和定量预测方法。\n（1）定性预测方法\n定性预测是预测者利用直观的材料，根据掌握的专业知识和丰富\n的实际经验，运用逻辑思维方法对环境变化做出定性的预计推断和环\n境交叉影响分析，它主要包括专家会议法、德尔菲法、主观概率法和\n层次分析法等。\n①专家会议法又称”集合意见法”，是通过专家之间的信息系统，\n引起”思维共振”并产生组合效应，形成宏观智能结构后进行创造性思\n维的方法。这种方法可以排除折衷，对所议的问题通过客观的连续分\n析，找到一组切实可行方案。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n②德尔菲法又称“专家调查法”或“函询调查法”，以无记名方式，通过数\n轮函询征求专家意见。好 预测领导小组对每轮的专家意见进行汇兑整理，作为\n参考资料再发给专家，供其分析判断，进一步提出新的论证，并不断修正自\n己的见解，如此循环反复数次，专家意见日趋一致，产生较为可靠结论。\n\n#### 德尔菲这一名称起源\n\n#### 于古希腊有关太阳神\n\n#### 阿波罗的神话，寓意\n\n#### 阿波罗预卜未来的神\n谕。1946年，兰德公\n\n#### 司首次用这种方法做\n\n#### 出成功预测后，这一\n方法被迅速广泛采用。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n德尔菲法一般情况下包括设计调查表、发放调查表实施调查、回收调查\n表进行统计处理、将所有调查对象对每项指标权重的平均估计值及本人估计\n值的离差反馈给每个参加调查者并进行第二轮调查和收回调查表进行统计处\n理五个基本步骤，具有不具名（应邀参加者并不了解，克服易受权威人士思\n想和见解的束缚）、反馈性（一般经3~4轮，每轮统计结果反馈给每位参加者\n作为下一轮参考）和预测结果统计性（每一轮采用统计方法处理预测结果，作\n定量处理）等特点。\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n③主观概率法首选允许专家在预测时可以提出几个估计值，并\n评定备选值出现的可能性；然后计算各个专家预测值的期望值；最\n后，对所有专家预测期望值取平均值，得到预测结果。\n④层次分析法利用递阶层次结构和矩阵方程将思维过程数学化，\n采用1~9标度构造判断矩阵，通过求解矩阵特征向量及最大特征根，\n求得低层因素相对目标层的相对重要性权重值，以决定其影响程度。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n（2）定量预测方\n\n#### 法\n定量预测以运筹学、系统论、\n\n#### 控制论、系统动态仿真和统计学\n为基础，根据历史数据和资料，\n\n#### 应用数理统计方法来预测事物的\n\n#### 未来，或者利用事物发展的因果\n关系来预测事物的来。常用的定\n量预测方法主要有时间序列法、\n\n#### 逻辑型规律法和环境系统的数学\n模型法等。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### ①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### ①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n#### ②逻辑型规律法\n逻辑型规律是自然环境和社会环境中事物发展的基本规律之一\n其基本线形是由一条指数曲线和一条对数曲线平滑衔接组合而成，\n成S型，又称S规律。\n\n#### ③环境系统的数学模型\n依据科学定律或者数据的统计分析，或者两者兼而有之，包括\n代数方程模型、微分方程模型等。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n（3）回归分析法\n回归分析法是通过对历史资料的统计与分析，寻求变量之间相互\n依存的相关关系的一种数量统计方法。\n回归分析法的特点包括：①回归模型中的因变量和自变量之间必\n须有因果关系；②自变量与因变量间必须具有强相关关系，自变量间\n必须具有弱相关关系；③自变量的预测值较准确且易得到；④正确选\n定回归模型的形式；回归模型必须通过各种检验后才能用于预测。\n回归预测法的基本步骤包括：①进行因素分析，确定回归模型的\n自变量；②绘制散点图，构造回归模型的理论形式；③利用最小平方\n法估计模型参数，建立模型；④对建立的回归模型进行检验，检验的\n方法包括S检验和相关检验等；利用检验后的回归模型进行预测。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n4、环境预测的常见类型\n（1）大气环境质量预测\n\n#### 大气环境质量预测是为了了解未\n来一定时期的经济、社会活动对大气\n环境带来的影响，以便采取改善大气\n环境质量的措施。\n\n#### 主要内容是预测大气环境中污染\n物的含量，常用方法有箱式模型法、\n高斯模型法、线源扩散模式法、面源\n等。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n（2）水环境质量预测\n水环境质量预测最基本的问题就是要找出污染排放变化与\n水体控制点处主要污染物含量水平的相关关系，以此预测区域\n（或城市）由于实施经济、社会发展规划而产生的环境影响。\n可选用或建立水质模型，如河流模型，河口、湖泊水库模\n型等均是进行水质预测最常采用的方法。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n（3）固体废物环境质量预测\n固体废物对环境影响是多方面的，对这类预测问题，一般\n包括工业固体废物产生量、城市垃圾产生量及固体废物环境影\n响预测等内容。\n固体废物环境影响预测则可采用大气、水影响预测模型\n以及因果关系分析法等。\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n（4）噪声环境质量预测\n交通噪声预测方法：交通噪声预测方法常用的有多元回归预测，\n即根据用车流量、道路宽度、本底噪声值与交通噪声等效声级之间的\n\n#### 关系，建立多元回归预测模型\n环境噪声预测方法：环境噪声预测方法常见的主要有两种：一\n种是多元回归预测方法，通过噪声源、本底噪声与噪声等效声级之\n间的关系，建立多元回归预测模型。另一种为灰色预测方法，即根\n据历年环境噪声值，建立灰色预测模型。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n三、环境预测的工作程序\n\n#### 确定预测目的\n\n#### 准备阶段 确定预测时间\n\n#### 制定预测计划\n\n#### 收集预测资料\n\n#### 收集分析信息\n\n#### 资料的分析检验\n\n#### 选择预测方法\n\n#### 建立预测模型\n\n#### 预测分析\n\n#### 进行预测计算\n\n#### 否\n\n#### 预测结果检验\n\n#### 输出预测结果\n\n#### 输出结果\n\n#### 提交预测结果\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n\n#### 第五节 决策分析方法\n一、决策\n二、决策因素\n三、决策方法\n四、决策原则和决策程序\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n一、决策\n1、内涵\n决策是人们为了达到一定目标，从若干可能的策略中选取最\n好策略的过程。\n决策分析是研究怎样才能作出科学的决策，是一种为复杂的\n和结果不肯定的决策问题提供旨在改善决策过程的合乎逻辑的系\n统分析方法，它的任务是为决策者提供优的或满意的决策及其可\n能结果的分析，供决策时参考。\n决策问题具有多目标性、决策影响的长期性、后果的不确定\n性、可供选择方案的多样性及决策大多数情况下的一次性等特点。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n\n#### 决策是系统工程的核心，也是管理\n的核心，决策是人类社会的重要活动， 运筹惟喱决胜千里\n贯穿于人类各项活动之中，决策一错，\n全盘皆输。1964年瑞士研制出第一只石\n英电子表，决策者以为市场前途不大，\n未引起重视，敏感的日本人立即从技术\n到市场进行深入调研，结论是大有市场，\n它利用其雄厚电子技术基础，首先推出\n成批产品占领市场，刮起石英技术誉满\n全球的旋风，仅七十年代后5年就挤\n瑞士178家手表厂。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n2、分类\n决策问题通常分为确定型和非确定型。其中非确定型决策\n包括风险型决策和不确定型决策。确定型决策是在决策环境完\n全确定的条件下进行的，其选择的结果也是确定的。所谓风险\n型情况下的决策和不确定情况下的决策，都是在决策环境不是\n完全确定的情况下进行的，它们之间的区别在于：前者对于各\n自然状态发生的概率，决策者是可以预先估计或计算出来的；\n而后者对于各自然状态发生的概率，决策者是一无所知的，只\n能靠决策者的主观倾向进行决策。\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n二、决策因素\n一般的决策问题都包含三个最基本的因素：\n1.自然状态\n“产品销路好”、“产品销路一般”和“产品销路差“都是自然状态，\n是决策者无法控制的因素。\n2.策略\n策略是决策者可以采取的行动方案。采取哪一个策略，完全由决\n策者决定。\n3.益损值\n益损值是不同策略在不同自然状态下的收益值或损失值。\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n三、决策方法\n1.确定型决策的方法\n确定型决策法适应于处理确定型决策问题，也就是说在自然状态已\n清楚而且完全确定，决策者可以凭借个人的判断，按既定目标及评价准\n则选定行动方案，这样的决策就是确定形决策问题。它有四个主要特征，\n①只有一个确定的自然状态；②存在决策者希望达到的一个明确的目的；\n③存在着可供决策者选择的两个或两个以上的行动方案，而且每种方案\n的最终结果是确定的；④不同的行动方案在确定状态下的收益值或损失\n值可以计算出来。\n确定型决策的方法有很多，例如单纯择优法、模型决策法、排队决\n策法和盈亏平衡分析等。单纯择优法就是可以直接选择最优的决策方案；\n模型决策法是利用一定的数学模型进行计算后，加以择优的方法。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n2.非确定型决策的方法\n对于风险型决策问题，其状态的发生或不发生是带有某种概率的，\n这种概率对决策者来讲要承担一定的风险。最大收益期望值决策准则的\n公式见式（4-5），最小机会损失期望值决策准则公式见式（4-6）。\nAn=max(∑=P;a) (4-5)\n式中：\nP;一某状态发生的概率；\na;一状态的期望值。\nA,=min(∑²=,P;0) (4-\n式中：0一状态的损失值。\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n例4-1某厂开发环保产品，其市场状态E；，发生概率P和各方案\n不同收益a；见表4-15，对各方案A择优决策。\n市场状态E及概率PE良好， E2一般， E3不佳， 收益期望\n方案A;\nP1=0.4 P2=0.5 P3=0.1\naij Oij aij Oij aij OijA1 80 0 50 20 20 30\nA2 60 20 70 0 50 0 PanPO# n nA3 50 30 40 30 20 30\n表4-15最大收益期望值方案决策矩阵（最小机会损失期望值）\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n\n#### 解：据式（4-5）\nAn=max{(0.4x80+0.5x50+0.1x20),(0.4X60+0.5x70+0.1x50).\n（0.4x10+0.5x40+0.1x20）}=max{59,64，42）=64选择期望值最大\n\n#### 的方案A2\n据式(4-6)\nAn=min{(0.4x0+0.5x20+0.1x30),(0.4X20+0.5x0+0.1x0),(0.4x30+0.5x30+0.1x30）}=min{13，8,30}=8选择机会损失最小的方案\n对于不确定型决策问题，不但状态的发生是随机的，而且各状态\n发生的概率也是未知的和无法事先确定的。对于这类问题的决策，主\n要取决于决策者的素质、经验和决策风格等。本书介绍几种比较常见\n的处理不确定型决策问题的决策方法。\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n（1）等可能性准则\n对于不同的自然状态，如果没有确切理由说明每个自然状态的\n概率，那么只能认为它们发生的机会是相等的，即每一种自然\n状态发生的概率都是1/n。将每一个自然状态的概率定为1/n\n后，就可以用已经介绍过的方法了。\n（2）乐观准则\n按乐观准则决策时，决策者持最乐观的态度，决策时不放弃任\n何一个获得最好结果的机会，愿意以承担一定风险的代价去获\n得最大的利益。\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n\n#### 例4-2\n\n#### 表4-16效益矩阵\n效益矩阵状态SSi S2 S3 S4\n\n#### 方案AjA1 4 4 6 7\n\n#### A2 2 4 6 9\n\n#### A3 5 7 3 5\n\n#### A4 3 5 6 8\n\n#### A5 3 5 5 5\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n对于A:max（4，4，6，7)=7\n对于A2:max(2，4,6，9)=9\n对于A3:max(5，7，3，5）=7\n对于A4:max（3，5，6，8)=8\n对于As:max（3，5，5，5）=5\n再从选出的5个最大效益值中，挑选一个最大值：即：max（7，9，7，8，\n5)=9，故选方案A2。\n按乐观准则决策，实际是瞄准整个效益矩阵中的最大者。这当然不\n会丧失获得最好结果的机会，但有时也不可避免落到最坏的结局。比如\n本例中选择了A2，若自然状态S4发生，则获得最好结果；而若自然状态\nS发生，则将落到最坏结局。\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n（3）悲观准则\n悲观法（最大最小准则法或瓦尔德准则法）的决策原则：“小中取大”，\n是当有多种方案可供决策者选择时，先估算出每个方案在每种状态下的\n收益值或收益率，然后把各个方案的最小收益值或收益率单列出来，在\n这组最小收益值或收益率中，选择收益值或收益率最大的那个方案作为\n最佳方案。这种决策方法，在出现不利的情况下，也可使损失减到最小。\n其特点是决策者持最悲观的态度，他总是把事情估计得很不利。\n\n#### 乐观准则 大中取大\n\n#### 悲观准则 小中取大\n\n---\n\n<!-- page 83 -->\n\n![page 83](page_083.jpg)\n\n仍以例4-2为例：\n对于A:min（4，4，6，7)=4\n对于A2:min(2，4，6，9)=2\n对于A3:min（5，7，3，5)=3\n对于A4:min（3，5，6，8)=3\n对于As:min（3，5，5，5)=3\n再从选出的5个最小效益值中，挑选一个最大值：\n即:max（4,2，3，3，3）=4\n故选方案A1。\n按悲观准则决策，可能丧失掉获得最好结果的机会。但不管最终\n哪个自然状态发生，决策者都能够避免最坏的结局\n\n---\n\n<!-- page 84 -->\n\n![page 84](page_084.jpg)\n\n(4)折衷准则\n乐观法与悲观法决策的缺点是：\n在决策过程中所损失的信息过多，而\n且决策结果也有很大的片面性。所谓\n折衷，即在乐观与悲观之间折衷。在\n折衷准则中，用乐观系数a表示乐观\n程度（0≤a≤1），而（1-a）就是悲观系\n数，它表示悲观程度。折衷法的特点：\n既不非常乐观，也不非常悲观，而是\n通过一个系数。（0≤a≤1）表示决策者\n对客观条件估计的乐观程度。\n\n---\n\n<!-- page 85 -->\n\n![page 85](page_085.jpg)\n\n上例中，假设a=0.45，则1-a=0.55。折衷效益值C的公式为：\nC;=a·max{a)+(1-a)·min{a}(i=1,2...5)\n对于A1:C=0.45x7+0.55x4=5.35\n对于A2:C2=0.45x9+0.55x2=5.15\n对于A3:C3=0.45x7+0.55x3=4.8\n对于A4:C4=0.45x8+0.55x3=5.25\n对于A5:C=0.45x5+0.55x3=3.9\n再从各个方案的折衷效益值C中选择一个最大值：\n即：max（c}=max(5.35，5.15，4.8，5.25，3.9)=5.35\n其相应方案即所选方案。故选方案A1。\n当乐观系数a取值不同时，选择的方案可能不同。当a=1时，折\n衷准则即成为乐观准则，而当a=0时，折衷准则成为悲观准则。\n\n---\n\n<!-- page 86 -->\n\n![page 86](page_086.jpg)\n\n（5）后悔值准则（最小后悔值准\n则)\n对于非确定型决策问题，为了避免事后遗憾没有选准效益最大\n或损失最小的方案，可以采用后悔值法进行决策。后悔值（最小最大\n后悔值法），是后悔值法决策的主要依据，是指某状态下的最大效益\n值与各方案的效益值之差。\n决策者做出决定之后，若不够理想，必有后悔之感。后悔值准\n则就是把每一自然状态对应的最大效益值视为理想目标，把它与该\n状态下的其他效益值之差作为未达到理想目标的后悔值，这样可得\n到一个后悔矩阵。\n求出后悔矩阵中每一行的最大值，这些最大值中的最小者对应\n的方案，即为应选方案。上例中（表4-6），效益矩阵对应的后悔矩\n阵见表4-17。\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n表4-17 效益矩阵对应的后悔矩阵\n\n#### 方案 状态（S） 最大后\n(Ai) S1 S2 S3 S4 悔值\n\n#### A1 1 3 0 2 3\n\n#### A2 3 3 0 0 3\n\n#### A3 0 0 3 4 4\n\n#### A4 2 2 0 1 2\n\n#### A5 2 2 1 4 4\n因为各个方案的最大后悔值中最小者为2，故选择方案A1。\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n对于不确定型问题，采用不同的决策准则做出的决策往往\n是不同的。为了使决策更准确可靠，最好设法了解各自然状态\n发生的概率，以便将不确定问题转化为风险型问题，提高决策\n的科学性。\nalternativehigh-riskconsequencesuncertainty complexityMAKiNGinterpersonalissues\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n[例4-3]某厂试制一种防噪耳机，新产品成本每件3元，销售价每件5\n元，若产品当天未销售出，每件损失1元，该厂日产量方案共5个，0、\n1000、2000、3000、4000件，试问为使该厂收入最高，试确定采\n用何种生产方案。\n表4-18各种生产方案下的销售量\n\n#### 销售量j\n\n#### 产量方案\n0j1 1000j22000j33000j4 4000j5\nA1:0i1 0 0 0 0 0\n-1000 2000 2000 2000 20001000i2\n-2000 1000 4000 4000 40002000i3\n-3000 0 3000 6000 60003000i4\nAs: -40004000 i5 -1000 2000 5000 8000\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n①采用小中取大准则的收益矩阵（表4-19）\nAn=max{min(a1j),min(a2), min(a3j), min(a4; ),min(as; ) }\n表4-19采用小中取大准则的收益矩阵\n方案A; 1000
