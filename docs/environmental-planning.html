\n4 方案评估 对提出的多种方案的效果进行评价，尽可能通过科学\n计算，用数量分析的方法比较其优劣和得失\n决策者从总体角度对各种方案的目的性、可行性和时\n\n#### 5 选择方案\n效性进行综合的系统分析，选取使目标最优的方案\n为了保证最优方案的实施，需要制定实施措施，落实\n\n#### 6 组织实施\n\n#### 执行单位，明确具体责任\n在决策实施过程中可能会产生这样或那样偏离目标的\n7 反馈调整 情况，因此必须及时收集决策执行中的\n反馈调整信息，分析既定决策是否可以实现预定目标\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n\n#### 第六节 环境审计方法\n一、环境审计\n二、环境审计的内容\n三、环境审计方法\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n一、环境审计\n环境审计是对特定项目的环境保护情况，包括组织\n机构、管理、生产及环保设施运转与排污等情况进行系统\n的、有文字记录的、定期的、客观的评定。\n环境审计按范围可分为地区（城市）级的环境审计及\n工厂、工艺、特定污染物等的环境审计。\n按审计的目标可分为提高环境管理效率、有效控制污\n染、提高环保资金使用效率、减少事故等环境审计。\n按审计的目的可分为审查环境执法、废物减量化、实\n施清洁生产等环境审计。\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n\n#### 环境审计是对环境管理的某些方面\n进行检查、检验和核实，目的一般是将\n潜在的、可能出现的环境危险降到最低 审计\n程度。\n“环境审计”也是一种管理工具，它用\n于对环境组织、环境管理和仪器设备是\n否发挥作用进行系统的、定期的和客观\n的评价。一般包括对管理的承诺（前\n提）、环境审计小组的目标（方向）、\n专业能力、环境审计程序、书面报告、\n质量保证和跟踪等环节。\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n二、 环境审计的内容\n1.符合性审计\n主要为环境保护法规的符合性审计，对企业有关环境的\n现状及管理当局所作的努力进行详细的、特定区域的评价，\n以提高符合性，减少因不符合而造成的后果。\n2.环境保护管理系统审计\n确定环境管理系统是否运作良好，是否能处理当前或未\n来的环境风险。\n3.过渡审计\n评价与不动产的获取和剥离有关的风险。企业在购买和\n转让不动产时，需要对其有关环境因素加以审计，以此来降\n低由此带来的风险。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n4.有害物质的处理、存放及清理的审计\n评价危险原料的处理、存放及清理会产生的全部负债。\n有害物质如果处理、存放和清理不当，会对周边环境造成污\n染，甚至会威胁人类的健康，易带来诉讼、赔偿和罚款，导\n致环境成本上升、经济效益和社会效益下降，必须对其所经\n历的各个环节进行审计。\n5.污染预防审计\n确定减少废物的机会，通过对企业可能发生污染情况的\n审计预测结果，采用一系列有效的措施，减少企业在生产经\n营过程中产生污染的机会。\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n6.环境效益审计\n评价由于采取了保护环境的措施而产生的成本及其估算的合\n理性、合法性和真实性，并估计环境治理的效益。由于环保设备\n的价格普遍较高，而其带来的效益又具有潜在的、长期的特性，\n通过环境效益审计，能提高企业的环保意识并在生产经营活动中\n兼顾企业的长远发展。\n7.产品审计\n确定产品是否与环境政策的要求相符合。如果一个企业的产\n品被列为绿色产品，就会吸引众多的消费者，企业将在激烈的竞\n争中取得优势。通过产品审计，企业可以看出自己的产品与环境\n政策要求的差距，并加以改进。\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n三、环境审计方法\n环境审计是审计的一种类型，\n\n#### 常规审计方法对环境审计同样适\n\n#### 用，如在进行财务收支审计和经\n\n#### 审计\n\n#### 济效益审计中运用的：审计检查\n\n#### 法（包括资料检查法、实物检查\n法）；审计调查法（包括查询法、\n观察法、专题调查法）；审计分\n析法、账户分析法、账龄分析法；\n\n#### 逻辑推理分析法、经济活动分析\n法；经济技术分析法、数学分析\n法，抽样审计法等。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n目前在环境审计专业人才缺乏的情况下如何开展环境审计，我们\n采取了以下几种方式：\n1.将微观审计与宏观分析相结合\n环境审计工作涉及面广、政策性强，要从宏观着眼，把为宏\n观管理服务贯穿于审计工作全过程。在制定审计工作计划时，要\n分析当前环境管理中的主要问题，以资金为主线，以重点环保项\n自为对象，由浅入深选择环境污染最为严重的项自和重点污染源\n治理项目实施审计。将审计中的微观经济现象与有关环境保护宏\n观经济政策、法规、措施相联系，反映问题实质，并提出切实可\n行的意见和建议，及时反馈给政府及有关部门，为宏观决策提供\n依据。\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n2.将财务收支审计与经济效益审计相结合\n\n#### 环境审计不仅要对环保资金\n\n#### 的筹集及使用情况、开展财政与\n财务收支的真实性和合法合规性 审计\n\n#### 进行审计，而且更重要的是要根\n\n#### 据国家各项起居室环境指标，测\n\n#### 评被审计单位应承担的环境保护\n\n#### 资金\n责任、环境治理责任及工作绩效，\n\n#### 反映环境保护政策的落实情况\n\n#### 因此，在开展财务收支审计的同\n时，必须开展环境绩效审计。\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n3.将审计人员与环保专业技术人员相结合\n环境审计专业技术性很强，审计人员仅有财务、审计知识是不能\n适应工作需要的，还必须熟悉国家环保法律、法规、制度和宏观经济\n政策，同时还要有综合分析、判断能力，因此，现阶段开展环境审计，\n一方面审计人员要通过学习和实践，尽快提高素质，成为既懂财务又\n懂环保、具有宏观分析问题能力的复合型人才，提高环境审计质量；\n另一方面，可以聘请环保专业技术人员参与审计组，合作开展审计，\n促进审计向纵深方向发展，尽快发挥环境审计的社会功效。\n\n---\n\n<!-- page 107 -->\n\n![page 107](page_107.jpg)\n\n目前环境审计刚刚起步，企业环境审计是最基本的，其中企业清\n洁生产审计应用较广泛。清洁生产审计是指对组织产品生产或提供服\n务全过程的重点或优先环节、工序产生的污染进行定量监测，找出高\n物耗、高能耗、高污染的原因，然后有的放矢地提出对策、制定方案，\n减少和防止污染物的产生。清洁生产审计的一个重要内容就是通过提\n高能源、资源利用效率，减少废物产生量，达到环境效益和经济效益\n的和谐统一。清洁生产审计方法详见本书第7章。\n\n---\n\n<!-- page 108 -->\n\n![page 108](page_108.jpg)\n\n\n#### 第七节 环境管理信息系统\n一、环境信息及其系统\n二、环境管理信息系统的设计与评价\n·三、环境决策支持系统的设计与评价\n\n---\n\n<!-- page 109 -->\n\n![page 109](page_109.jpg)\n\n一、环境信息及其系统\n1.环境信息\n环境信息是在环境管理工作中应用的经收集、处理而以特定形\n式存在的环境知识，以数字、字母、图像和音像等多种形式存在。\n环境信息是环境系统受人类活动等外来影响作用后的反馈，是\n人类认知环境状况的来源。因此，环境信息是环境规划与管理系统\n的神经。\n环境信息除具有一般信息的事实性、等级性、传输性、扩散性\n和共享性等基本属性外，还具有时空性、综合性、连续性和随机性\n的特征。\n\n---\n\n<!-- page 110 -->\n\n![page 110](page_110.jpg)\n\n2.环境信息的检索\n环境信息在各种学术刊物和内部资料上均有刊登，环境管理人\n员可充分利用国内外的检索刊物，查阅相关信息。\n\n#### 序号\n\n#### 名称 说明\n全国报刊索 它是全国报刊的一个分册，由上海图书馆编辑出版，\n\n#### 1 引科技版\n以题录形式按中国图书分类法分类编制，分类号为X。\n它是目前国内环境科学技术信息唯一的检索刊物，\n是全国科技信息检索体系的组成部分，采用中、英、德、\n法、日、俄6种文字，报道国内外百种期刊中有关环境科\n学技术的最新文献资料。以文摘和题录形式向广大读者\n\n#### 环境科学文\n2 摘 提供环境信息服务，全年报道量约3600篇，其中文摘约\n占70%，题录约占30%，报道内容具有科学性、技术性、\n动态性、实用性、准确性和系统性。\n\n---\n\n<!-- page 111 -->\n\n![page 111](page_111.jpg)\n\n\n#### 序号\n\n#### 名称 说明\n它由中国环境科学研究院情报研究所编辑，中国环\n境科学出版社出版，以全国环保科技情报网交流的内部\n\n#### 中文科技资\n资料为主要资料来源，集中报道我国有关环境科学的会\n\n#### 3 料目录一环\n议论文、科技成果、出国访问考察、来华技术座谈、学\n\n#### 境科学\n位论文、引进技术成套资料以及中文期刊上译文资料等。\n\n#### 国外科技资\n它由科学技术文献出版社出版，是一种题录检索工\n\n#### 料馆藏目\n具，报道中国科技情报研究所人藏的有关环境污染与保\n\n#### 4 录一环境污\n护方面的科技资料文献。\n\n#### 染与保护\n它是美国生物科学情报服务社编辑出版的英文刊物，\n\n#### 环境污染物\n按类目（水污染、微生物、食品卫生、气体污染、职业卫\n\n#### 对人体健康\n5 影响文摘 生、农药、射线、土壤、物理污染物、植物、动物、微\n粒污染及其化学原因等）编排。\n\n---\n\n<!-- page 112 -->\n\n![page 112](page_112.jpg)\n\n\n#### 序\n\n#### 号 名称 说明\n空气与水保 它收录了世界各国300多种期刊及90种会议文件以及\n护一API文摘 其他出版物中有关空气与水保护方面的文献。\n它收录了美国1000余种期刊、政府文献、研究报告、\n环境文摘 会议记录以及新书中有关环境污染与环境保护研究方面\n7 的文献资料。\n它报道各国出版的400余种环境科学技术期刊的近期\n目次，主题包括人类生态学、空气、土地资源、水资源、\n\n#### 环境期刊文\n8 营养与保健、能源等，并附有主题和作者索引及年终累\n\n#### 献题录\n积索引。\n它报道的主要类目有空气污染、水污染、土壤污染、\n\n#### 9 污染文摘\n海洋污染、噪声污染等。\n\n---\n\n<!-- page 113 -->\n\n![page 113](page_113.jpg)\n\n\n#### 序号\n\n#### 名称 说明\n它主要报道环境公害、水质污染、水质污染控制技\n\n#### 科学技术文\n术、大气污染、大气污染控制技术、废弃物处理、其他\n\n#### 10 献速报一环\n公害、污染物保护、恶臭、农药与残留农药、放射性污\n\n#### 境公害篇\n染、自然保护等类目。\n水研究中心 它摘录了世界各国关于给水、水质分析、污染和废\n通报 水处理、天然水源污染等。\n\n---\n\n<!-- page 114 -->\n\n![page 114](page_114.jpg)\n\n3.环境信息系统\n环境信息系统：\n\n#### 环境信息从产生到应用于环境保\n护工作所构成的系统。\n环境信息系统的构成：\n它由工作人员、设备（计算机、\n网络技术、GIS技术、模型库等）\n及环境原始信息等组成。\n环境信息系统按内容分为：\n\n#### 环境管理信息系统（EMIS）\n\n#### 环境决策支持系统（EDSS）\n\n---\n\n<!-- page 115 -->\n\n![page 115](page_115.jpg)\n\n（1）环境管理信息系统\n环境管理信息系统（EMIS）是以现代数据库技术为核心，\n将环境信息存储在电子计算机中，在计算机软、硬件支持下，\n实现对环境信息的输入、输出、修改、删除、传输、检索和计\n算等各种数据库技术的基本操作，并结合统计数学、优化管理\n分析、制图输出、预测评价模型、规划决策模型等应用软件，\n构成一个复杂而有序的、具有完整功能的技术工程系统。它既\n是各种环境信息的数据库，又是环境管理政策和策略的实验室。\n\n---\n\n<!-- page 116 -->\n\n![page 116](page_116.jpg)\n\n其基本功能包括：①全面准确地查询和检索各种环境信息，系\n统提供环境科研和管理所需要的各种数据和信息并具有统一的格\n式。②分析各种空间数据，利用数学模型进行数据加工，进行区\n域环境质量的现状评价、污染源评价、污染控制方案预测、经济\n发展对环境影响的预测以及区域环境质量控制规划等工作。③决\n策支持，针对不同层次环境管理部门的不同要求，输出各种图件\n和报告，为环境管理工作提供辅助决策。④有效地利用系统本身\n的功能，可降低系统成本，提高效益。\n\n---\n\n<!-- page 117 -->\n\n![page 117](page_117.jpg)\n\n\n#### 收集 录用\n存储 环境信息 以报表、图表、图形等形式输出信\n\n#### 息\n\n#### 加工 处理\n为政府决策者、企业管理者及公众和NGO提供\n\n#### 数据参考\n\n---\n\n<!-- page 118 -->\n\n![page 118](page_118.jpg)\n\n建设项目环境管理的基本目标主要包括：\n①实现基本信息、污染物的预测排放量与实际排放量、区域范围\n“三废”排放分布、区域范围污染物累积负荷等专题图的显示；\n②实现通过地图对建设项目基础数据查询分析结果进行图文互查，\n并针对专题信息能在图上进行任意选取范围进行分析、汇总，生成\n专题图表。\n\n#### 数据采集\n\n#### 地理数据库 移动GIS\n\n#### 服务器\n\n#### 信息发布\n\n---\n\n<!-- page 119 -->\n\n![page 119](page_119.jpg)\n\n\n#### 正安市流南告环撞景\n空气环境质量 统平台 水环境质量\n\n#### AQI指数 45优 首要污染物\n2021-10-15 合平合入口 欧公告 GS统 环吸监用 环乐爱素 行155841 河流23总断面50水源地21\n本月优良天数 废气 废水 污水处理厂 尾气超标 考核目标 2021-09485 458 27 985 考楼日标 012 鹿·12 37 达标斯面 0\n\n#### 轻杂0 中方染0 达标率 0%\n\n#### 染0 -100% 咨控\n空气质量目标考核指标 未达标站点 (0)\n累计优良天数 优良率 日标优良天数 同比\n247天 86% 311 天 -27%\n空气质量预报 2021-09-15 2021-10-15 水质自动监测信息\n46 39 31 流城断阳名际 水淡列\n2942 2021-101213:050\n甘泉贝 朱家沟 2021-10-1505:0006010010Z60Z60660 47\n\n#### 证后监管 40 36 环境执法\n\n#### 许可证发放\n支含业 已整64 点 129 52 1347 28817 未皮321 韵化 256 53 123450\n排为记 2039 始查次数问企业数\n应 275 税款 处罚企业数 处罚金额\n102 实报 280 25602 元 环信恒辉科技 6 2155.706万元\n\n---\n\n<!-- page 120 -->\n\n![page 120](page_120.jpg)\n\n（2）环境决策支持系统\n环境决策支持系统（EnvironmentalDecisionSupportSystems，简称EDSS）是将决策支持系统引I入环境规划、\n管理、决策工作中的产物，对定结构化、未定结构化或不定\n结构化问题进行描述、组织，进而协助人们完成管理决策的\n支持技术。其基本功能是收集、整理、贮存并及时提供本系\n统与本决策有关的各种数据，对环境信息进行加工、处理、\n分析、综合、预测、评价。\n\n#### 科学性\n\n#### 效率\n\n---\n\n<!-- page 121 -->\n\n![page 121](page_121.jpg)\n\n环境决策支持系统通常具有以下几个主要组成部分：\n数据库：存储大量的环境数据，包括环境监测数据、污染源信息、地\n理信息、社会经济数据等。\n模型库：包含各种用于环境预测、模拟和评估的数学模型和算法，例\n如大气扩散模型、水质模型、生态模型等。\n知识库：积累环境领域的专业知识、法规政策、经验案例等，为决策\n提供理论和实践依据。\n人机交互界面：允许决策者输入问题和参数，查看分析结果，并以直\n观的方式展示数据和模型输出。\n决策分析模块：运用数据分析、多准则决策分析、风险评估等方法，\n对不同的决策方案进行比较和评估。\n\n---\n\n<!-- page 122 -->\n\n![page 122](page_122.jpg)\n\n收集、整理、贮存各种环境信息和数据\n主要功能 灵活运用模型方法对环境信息进行加工处理、分析、综合、\n\n#### 预测、评价以提供决策信息\n提供友好的人机界面和模型输出功能；良好的环境信息传输\n\n#### 功能\n\n#### 快速的信息加工速度及响应时间\n具有定性分析和定量研究相结合的特定环境问题的方式\n\n---\n\n<!-- page 123 -->\n\n![page 123](page_123.jpg)\n\n二、环境管理信息系统的设计与评价\n1.信息系统设计的目标、任务和原则\n目标：充分利用先进的GIS技术、数据库技术、网络通信技术、\n分布式计算技术等，建设一个科学、高效的环境应用信息系统\n为环境管理信息系统的开发目标。\n根本任务：逻辑模型→物理模型（功能设计→数据库设计一应用\n设计）的转变。\n设计原则：①实用性（面向需求，功能完善）；②标准性（标准化、\n统一化）；③先进性（紧跟技术潮流）；④动态性（动态调整、与环\n境业务发展相适应）；开放性（后续开发）；6经济性（性价比）；\n?安全性（数据安全，逻辑可靠）。\n\n---\n\n<!-- page 124 -->\n\n![page 124](page_124.jpg)\n\n2.环境管理信息系统的设计与评价\n环境管理信息系统设计过程可分为四个阶段：\n①可行性研究。\n②系统分析。\n③系统设计。\n④系统的实施与评价。\n\n#### 石家庄污染源动态管理系统\n\n#### 系统设置\n\n#### 行业类型 美注度 行政处罚\n\n#### 国控 t22 行政区具\n\n#### 451 59t\n火电行业 35 印行业 35 长安区 29 451\n水范行症 614 65 污水处理厂 614 65 西分比 166\n\n#### 行业美行\n\n---\n\n<!-- page 125 -->\n\n![page 125](page_125.jpg)\n\n环境管理信息系统EMIS的设计过程\n\n#### 终止\n\n#### 不可行 否定 -一一 否定\n提出问题 现行系统调查 明确目标 可行性分析 详细调查 信息流分析 逻辑设计 初步设计 详细设计 程序设计 系统测试 运行维护\n\n#### 审校 审核 审核\n\n#### 验收\n\n#### 修改目标或创造条件 修改 修改\n可行性研究 系统分析 系统设计 系统设计 系统实施与评价\n\n---\n\n<!-- page 126 -->\n\n![page 126](page_126.jpg)\n\n环境管理信息系统各开发程序及内容\n\n#### 阶段名称\n目的或任务 步骤 主要内容 主要成果\n可行性研究的前提：\n\n#### 明确研究的目的、要\n\n#### 可行性研究 (1）提出请求\n为整个工作过 求、方法及评价准则 可性性\n程提供一套必 用户调查：分析现有 报告；\n须遵循的衡量 系统，提出系统选择 项目开发\n标准 (2）可行性研究 方案进行可行性投资 计划\n\n#### 效益分析\n(3）批准 主要审核\n\n---\n\n<!-- page 127 -->\n\n![page 127](page_127.jpg)\n\n云南省地质环境管理信息系统 2017年12月28日周四 好，欢迎用用想环营信系统\n\n#### 8-19℃多云 禁票进出\n\n#### 安全防护管理\n\n#### 地质环境业务数据\n地质灾害 地下水 矿山地质环境 地质遗迹 基础数据\n\n#### 地质环境业务管理\n综合业务数据管理 数据采集系统管理 数据系统管理 政务系统管理 应急支撑管理\n\n---\n\n<!-- page 128 -->\n\n![page 128](page_128.jpg)\n\n\n#### 阶段名称\n目的或任务 步骤 主要内容 主要成果\n系统实施与评价 系统程序；\n\n#### 系统设计完成后就\n各模块程序的编写； 系统测试报\n\n#### 应交付使用，并在\n系统功能和性能的 告；\n\n#### 运行过程中不断完\n(7）建立系 评价报告; 系统使用报\n\n#### 善，不断升级，因\n统调试程序 实施组织管理运行 告；\n\n#### 而需要对其进行评\n\n#### 维护 系统评价验\n\n#### 价\n\n#### 收报告\n\n---\n\n<!-- page 129 -->\n\n![page 129](page_129.jpg)\n\n三、环境决策支持系统的设计与评价\n环境决策支持系统的设计分为制定行动计划、系统分析、总体结\n构设计和系统的实施与评价四个步骤。\n①制定行动计划，可有快速实现方案、分阶段实现方案和完整的\nEDSS方案；②系统分析步骤是EDSS设计的重要步骤，包括确定系\n统的组成要素，划分内在变量，分析各要素间的相互关系，确定\nEDSS的基本结构和特征；③总体结构设计阶段，由用户接口、信息\n子系统、模型子系统和决策支持子系统构成；④提供系统支持决策\n的分析与评价的相互关联的功能子模块，进而完善该系统。\n\n---\n\n<!-- page 130 -->\n\n![page 130](page_130.jpg)\n\n四、中国的环境信息系统建设\n1.网络建设\n国家环境信息网络总体框架是以国家环境信息中心网络系统为中\n枢，省级环境信息中心为网络骨干，以城市环境信息中心为网络基础\n国家级环境信息网络系统以国家环境保护总局信息中心计算机网络系\n统为主体，系统组成还包括国家环境保护总局机关办公自动化网络系\n统、中国环境科学研究院信息网络系统、中国环境监测总站环境监测\n信息网络系统以及国家环境保护总局在京直属单位环境信息网络系统\n等。\n\n---\n\n<!-- page 131 -->\n\n![page 131](page_131.jpg)\n\n2.机构能力建设\n基本形成了由国家级、省级、城市级信息中心组成的机构体系。\n整个组织体系包括国家环境保护总局信息中心、23个省级环境信息\n中心和110个城市环境信息中心。\n3.系统建设\n初步形成以环境统计、污染源管理、环境监测为主要信息源的\n环境信息管理系统网络。形成一系列环境管理应用软件。\n\n---\n\n<!-- page 132 -->\n\n![page 132](page_132.jpg)\n\n\n#### 习题\n1.简述环境现状调查的内容和方法。\n2.简述环境评价的内容和方法。\n3.简述环境目标的组成。\n4.简述环境规划与管理指标体系的组成内容。\n5.简述环境统计的内容及研究和调查方法。\n6.简述社会发展预测的主要方法。\n7.简述经济发展预测的主要方法。\n8.简述环境质量预测的主要方法。\n9.简述环境审计的方法和内容。\n10.简述环境管理信息系统的组成和设计方法。\n\n---\n\n<!-- page 133 -->\n\n![page 133](page_133.jpg)\n\n\n#### 习题\n1.简述我国环境与发展十大对策，并说明各项对策\n包含的主要内容。\n2.试分析环境政策和环境管理制度的相关关系。\n3.请在三类相关政策（产业政策、技术政策、环境\n经济政策）中选择一类，通过查阅资料，收集汇\n总该类政策执行过程中，国家有关部门已颁布的\n各项规定（列出汇总表）。\n4.说明我国环境保护法规体系的构成。\n\n---\n\n<!-- page 134 -->\n\n![page 134](page_134.jpg)\n\n\n#### 习题\n\n### 5.2000年4月29日第九届全国人大常委会第15次会议\n审查通过的《大气污染防治法》是该法的第二次\n修订，请比较该法二次修订的主要内容，并分析\n我国大气污染防治的发展动向。\n6.试比较1996年版《水污染防治法》与1984年版\n《水污染防治法》内容的变化，并分析我国水污染\n防治的发展动向。\n7.试分析《环境影响评价法》规定开展规划的环境\n影响评价的原因和目的。\n\n---\n\n<!-- page 135 -->\n\n![page 135](page_135.jpg)\n\n\n#### 习题\n8.简述八项环境管理制度的含义和相关规定。\n9.举例说明”土地利用规划制度”实施过程对污染严\n\n#### 重城市所采取的补救措施\n10.说明我国环境标准的分类方法，并按污染控制因\n子分类例表归纳常用环境标准目录。\n"}, {"id": "pdf-005", "group": "原始课件 · PDF原文", "title": "005-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法", "md": "# 第四章环境规划与管理中的综合分析方法\n\n> 来源: 005-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法.pdf\n> 页数: 134\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第四章\n\n#### 环境规划与管理中的综合分析方法\n第一节 环境现状调查与评价的基本程序和方法\n\n#### 第二节 环境统计方法\n\n#### 第三节 社会经济预测方法\n\n#### 第四节 环境预测方法\n\n#### 第五节 决策分析方法\n\n#### 第六节 环境审计方法\n\n#### 第7节 环境管理信息系统\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 学习要点\n掌握环境现状调查与评价的基本程序和方法、环境统\n计方法、社会经济预测方法、环境预测方法、决策分析方\n法、环境审计方法和环境管理信息系统的内容和程序。\n学习重点：环境评价方法，环境预测方法，社会经济\n预测方法和决策分析方法。\n学习难点：环境管理信息系统的建立与应用。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 第一节 环境现状调查与评价\n\n#### 的基本程序和方法\n一、环境现状调查内容\n二、环境现状调查的方法\n·三、环境评价\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n环境现状调查与评价的目的是为了掌握和了解某区域环境现状，发现和识\n别主要环境问题，从而确定主要污染源和主要污染物，为环境规划与管理的\n\n#### 制定和实施创造条件\n环境现状调查要从信息情报的收集和分析入手，针对列出的调查清单逐项\n调查，发现问题并逐步深入，可以包括必要的现场监测、勘察以及征询专家\n意见等。环境评价包括自然环境评价、经济和社会评价、污染评价\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n一、环境现状调查内容\n1.环境特征调查\n（1）自然环境特征：\n\n#### 地质、气候水文、植被、地形\n\n#### 地貌、土壤、特殊价值地区及生态\n\n#### 环境（特别是生态敏感区或生态脆\n弱区）等。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n（2）社会环境特征和经济社会发展规\n\n#### 划\n①区域相关的经济现状：\na.生产布局现状分析，生产布局是人类生产活动\n存在和发展的空间形式，它对区域环境产生直接和显\n著的影响。\nb.生产力发展水平现状分析，生产力直接反映了\n人与自然环境之间的关系，生产力发展水平则反映了\n人们征服、改造、控制和适应环境的能力。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n②区域内相关的社会因素：\na.社会人口状况分析，人通过生产和消费活动同\n环境形成了相互联系、相互作用、相互制约的对立统\n一关系。\nb.社会意识状况分析，规划区内人们的思想、道\n德、哲学、美学、文艺、宗教和风俗等社会意识形态，\n特别是当地人们的环境意识等方面的情况，并分析这\n些社会意识对区域环境所产生的影响。\nc.社会制度和体制、体育等社会概况，分析对区\n域环境所产生的影响。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n（3）环境污染因素调查\n突出重大工业污染源调查和污染源综合调查。根据污染类\n型，进行单项调查，按污染物排放总量排队由此确定评价区内的\n主要污染物和主要污染源。\n污染调查还应酌情包括乡镇企业污染评价和生活及面源污染\n分析等。污染调查还应考察现存环境设施运行情况、已有环境工\n程的技术和效益，作为新规划工程项目的设计依据和参考。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n2.生态调查\n\n#### 环境自净能力\n\n#### 土地开发利用情况\n\n#### 气象条件\n\n#### 绿地覆盖率\n\n#### 人口密度\n\n#### 经济密度\n\n#### 建设密度\n\n#### 能耗密度调查等\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n3.污染源调查\n\n#### 工业污染源\n\n#### 农业污染源\n\n#### 生活污染源\n\n#### 交通运输污染源\n\n#### 噪声污染源\n\n#### 放射性\n\n#### 电磁辐射污染源调查等\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n4、环境质量调查\n环境保护部门及工厂企业历年的环境质量报告和环境监测资料。\n5.环保措施效果调查\n环保设施运行率、达标率和环保措施削减污染物效果以及\n其综合效益进行分析评价。\n6.环境管理现状调查\n包括环境管理机构、环境保护工作人员业务素质、环境政\n策法规实施和环境监督实施情况等。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n二、环境现状调查的方法\n1.收集资料法\n\n#### 应用范围广、收效大，比\n较节省人力、物力和时间。\n\n#### 环境现状调查时，应首先通过\n\n#### 此方法获得现有的各种有关资\n\n#### 料，但此方法只能获得第二手\n\n#### 资料，而且往往不全面，不能\n\n#### 完全符合要求，需要其他方法\n补充。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n2.现场调查法\n可以针对使用者的需要，直接获得第一手的数据和资料，\n以弥补收集资料法的不足。\n这种方法工作量大，需占用较多的人力、物力和时间，有\n时还可能受季节、仪器设备条件的限制。\n现场调查法能够直接获取真实、准确的环境现状信息，\n但可能受到时间、人力、物力和天气等条件的限制，并且对\n调查人员的专业知识和技能要求较高。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n3.遥感的方法\n遥感是一种综合技术，它利用航空器、卫星等远距离探\n测设备获取地球表面信息。通过收集、处理和分析地球表面\n的图像，从而获得关于地球环境、自然资源、人类活动等方\n面的信息。这种技术通常涉及使用特定的传感器装置，在不\n直接接触研究对象的情况下，收集其特征信息，并对这些信\n息进行提取、加工、表达和应用。遥感技术的应用领域非常\n广泛，包括电力、通信、气象、农林、海洋、勘探、摄影、\n防灾减灾等。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n三、五 环境评价\n在环境规划中，环境评价的主要内容包括自然环境评\n价、社会经济评价、环境质量评价和污染源评价等4个方\n面。评价是对被评价对象的优劣、好坏作定量或定性的描\n述，一般以定量描述为主。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n1.环境评价的主要内\n\n#### 容\n（1）自然环境评价\n通过自然、社会、经济背景分析及社会、经济与环境的\n相关分析，确定当前主要环境问题及其产生的原因，并确定\n环境区划和评估环境的承载能力。\n自然背景分析会考虑当地的气候条件、地形地貌、土壤\n类型、水资源、植被覆盖等自然因素。社会背景分析则关注\n人口结构、文化传统、教育水平、社会组织形式、生活方式\n等方面。经济背景分析包括产业结构、经济发展水平、经济\n增长模式、资源利用效率等内容。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n（2）社会经济评价\n\n#### 项目 内容\n人口总数、人口密度、人口分布、人口的\n\n#### 人口评价\n年龄结构和人口的文化素质等。\n产业结构、国民生产总值和人均国民收入、\n\n#### 经济活动评价\n产品综合能耗、能源利用率等。\n住房、道路、给水设施及供水管网、排水\n\n#### 城市基础设施\n管网及污水处理设施、能源结构、供热方式、\n\n#### 评价\n绿地及分布和电话普及率等。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n（3）环境质量评价\n\n#### 环境质量评价是环境规划与\n\n#### 蓝天 绿色地球\n\n#### 管理的一项基础工作，其目的是正\n\n#### 确认识规划区的环境质量现状、环\n\n#### 境质量的地区差异和环境质量的变\n化趋势。环境质量评价突出超标问\n\n#### 题，以明确环境污染的时空界域为\n\n#### 主要环节，指出主要环境问题的原\n因和潜在的环境隐患等。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n三、环境预测的工作程序\n\n#### 确定预测目的\n\n#### 准备阶段 确定预测时间\n\n#### 制定预测计划\n\n#### 收集预测资料\n\n#### 收集分析信息\n\n#### 资料的分析检验\n\n#### 选择预测方法\n\n#### 建立预测模型\n\n#### 预测分析\n\n#### 进行预测计算\n\n#### 否\n\n#### 预测结果检验\n\n#### 输出预测结果\n\n#### 输出结果\n\n#### 提交预测结果\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n2.环境评价的主要方法\n（1）自然环境评价方法：\n①类比分析法：是一种常用的定性和半定量的方法，一般有生态环境\n整体类比、生态因子类比、生态环境问题类比等。\n②列表清单法：将各种生态环境因子分别列在同一表格的行与列里，\n逐点进行分析并以正负号、数字或其他符号表示其性质、强度等。\n③生态图法：即图形叠置法，是把两个以上的生态环境信息叠合在\n一张图上，构成复合图，用以表示生态环境变化的方向和程度。绘\n制生态图的两个基本手段是指标法和重叠法。指标法是用定量或半\n定量的方法对环境主体进行评价、分级，并绘制在地图上。重叠法\n是将各相关要素的图件叠合在一起以获得新的、综合性的结果\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n④指数法与综合指数法：在生态环境评价中用得最多，必须建\n立表征生态环境因子特性的指标体系和确定评价标准，赋予各\n因子权重，然后建立评价函数曲线，得出综合评价指数值。例\n如用于水环境质量评价的内梅罗指数、用于大气环境质量评价\n的格林大气指数、上海大气质量指数等。\n③景观生态学方法：通过空间结构和功能分析与稳定性分析，\n评价生态环境质量状况。\n生态系统综合评价法：常用层次分析法（AHP法），又称多\n层次权重分析决策法，是一种定性和定量结合的方法。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n①生物生产力评价法：用三个基本生物学参数（生物生长\n量、生物量和物种量）来表示，可评价生态环境质量及其\n变化趋势。\n⑧其他评价方法：还有多因子数量分析法、回归分析法、聚\n类分析法、相关分析法、系统分析法等。\n生态环境评价方法正处于蓬勃发展的时期，新的方法还在不\n断出现，但不管采取什么方法，其可靠性最终取决于对生态\n环境的全面认识和深刻理解。获取可靠的资料数据，仔细分\n析生态环境的特点、本质和各要素之间的内在联系，是评价\n成功的关键。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n（2）社会经济评价方法\n社会经济评价的关键是选择评价的标准和指标化的方法。由\n于社会经济问题比较复杂，不易形成统一的看法，目前尚无统一\n评价标准，一般是根据研究对象和研究者所选择的总的战略目标，\n结合国内外相关指标体系来确定。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 山\n（3）环境质量评价方法\n环境质量评价分为单环境要素评价、单要素综合评价\n和区域环境质量综合评价。评价的方法很多，这里重点介\n绍指数评价方法。某污染物在环境中监测值与标准值的比\n值，称为该污染物的环境质量指数，表示污染物的超过环\n境质量标准的倍数。\ni污染物的环境质量指数；\nP 污染物的监测值；\nCio -i污染物的环境质量标准值。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n（4）污染源评价方法\n在确定主要污染物和污染源的评价中多选用排放量和毒性这两\n个指标作为评价主要污染物的指标。在多种污染物比较分析中，在\n数学上可采用标准化法，将不同种类、不同量纲的一组值进行标准\n化，使之可相互比较，主要方法有排毒指数法、环境污染能力潜在\n指数法和等标污染负荷法等。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 等标污染负荷法\n\n#### 项目 公式 备注\n废水中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度值，mg/l;\nCoi i污染物的允许排放浓度标准与C同单位的\nP 数值，无因次量；\nCoi Qi -污废水排放量，m3/d。\n\n#### 某污染物的等标污\n染负荷(P)\n废气中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度平均值，mg/mv3；\nCoi -污染物的允许排放浓度标准与p同单位的\nP;= 数值，无因次量；\nCoi qi 一废气中i污染物的介质排放流量，mv/d。\n某污染源的等标污 污染源中各污染物i=1.2， n的等标污染负荷\n染负荷(P) 之和，为污染源的等标污染负荷。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n按调查区域内污染源的等标污染负荷（P-)大\n\n#### 评价区域的等标污\n染负荷(PT) P=∑P, 小排列，将累计百分比大于80%左右的污染\n= 源列为区域内主要污染源。\n评价区域内某污染 按评价区域内某污染物等标污染负荷（P总）大\nPi=P 小排序，分别计算百分比及累计百分比，将\n\n#### 物的总等标污染负\n荷(Pi) j=1 累计百分比大于80%左右的污染物列为该区\n域的主要污染物。\n污染物排放量排序是直接评价某种污染物的\n污染源污染负荷 K P ×100% 主要污染源的最简单方法。实施总量控制规\n比(K) P 划时，针对区域总量控制的主要污染物，对\n排放这一主要污染物的污染源进行总量排序。\n区域主要污染物的选择，主要是根据区域的\n主要环境问题，或是根据环境质量评价结果\n污染物的污染负 =Pi ×100% 来确定。\n荷比(K) 针对主要污染物的排放量，首先要有污染源\n排放量清单，然后排序，再选出占污染物总\n量90%以上的污染源，进行总量控制规划。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 第二节 环境统计方法\n\n#### 环境统计\n二、 环境统计的调查方法\n三、环境统计的研究方法\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n一、环境统计\n环境统计是用数字反映并计量人类活动引起的环境变化和\n环境变化对人类的影响。\n以环境为主要研究对象，研究范围涉及人类赖以生产和生\n活的全部条件，包括影响生态平衡的诸因素及其变化带来的后\n果。环境统计要调查和反映植物、动物、大气、水、土地土壤\n和人类居住区等各个方面的活动和自然现象及其对环境的影响。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n1.一般的统计工作程序\n\n#### 阶段 内容\n全面调查 (报表制度、普查)\n统计调查（基础）：\n非全面调查（重点调查、典型调查、抽样\n\n#### 收集资料过程\n调查)\n统计表 (把资料综合成统计表)\n统计整理（中间环节）： 统计图 (把资料综合成统计图)\n加工资料过程 整理成各种统计指数（综合指标、回归分\n析、指数、动态数列等)\n统计分析（核心）： 描述性分析（利用指标数据说明问题）\n分析资料过程 推断性分析（各种推断、预测）\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n2.环境统计的内容\n自然环境：包括空气与气候、水、土地、生态环境。\n特殊环境：包括能源、放射性、有害物质、噪声、自然灾害、野\n生动植物。\n与环境有关的生活条件：包括健康与营养、劳动条件、居住条件、\n娱乐和文化条件、主观评价环境一一民意测验。\n背景材料：包括直接影响环境的背景因素、间接因素、公共事业、\n技术、意识形态的因素、地理的和有关的背景材料。\n改善环境条件的办法：包括立法和实施、环境法的违反和起诉、\n减轻环境的损害、用于环境保护的支出、环境的研究和教育等\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n3.环境统计的指标体系\n我国现行环境统计指标体系包括七个子系统：\n\n#### 工业污染与防治\n生活及其他污染与防治 爱护地球·保护环境\n\n#### 农业污染与防治\n\n#### 环境污染治理投资\n\n#### 自然生态环境保护\n\n#### 环境管理\n·环保系统自身建设\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n4.中国现行环境统计指标体系框架\n工业污染与防治 企业基本情况 工业污染物排放情况 工业污染治理设施 工业污染治理情况\n生活及其他污染与防治 生活污水排放情况 城市污水处理厂运行情况 生活废气排放情况 城市垃圾处理情况\n农业污染与防治 规模化畜禽养殖场污染排放及治理情况\n环境污染治理投资 污染源治理投资 城市环境基础设施建设投资 环境污染治理投资合计\n自然生态环境保护 自然保护区建设情况 野生动植物保护情况 生态示范区建设情况\n生态功能保护区建设情况 农村环境污染及治理情况\n环境管理 环保法规和标准 环保年度计划 绿色工程规划 环评制度 “三同时”制度\n排污收费制度执行情况 排污申报登记制度及排污许可证制度 限期治理制度\n环境科技工作 环保产业 环保信访工作 人大政协提案 环保档案工作情况\n环保系统自身建设 环保机构 环保人员\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n5.中国环境统计范围\n\n#### ② 6\n\n#### 生态破坏 区域环境 环境系统\n\n#### 与建设统 污染与防 的自身建\n\n#### 计 治统计 设统计\n\n#### ③ 5\n\n#### 自然资源 区域环境 环境管理\n\n#### 统计 质量统计 统计\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n6.环境统计的作用\nGreen Life!\n为环境管理和决策提供依据。\n\n#### 评价和考核各级政府及环境保\n护部门环境保护的工作情况。\n\n#### 增加社会公众对环境状况和环\n\n#### 境保护的了解，提高全民的环\n\n#### 保护生忘环境\n境意识。\n\n#### 拥抱绿色生活\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n7.环境统计专业报表上报流程\n\n#### 省级上报数据\n\n#### 总局规划司 相关司\n\n#### 审核并填报本级数\n\n#### 专业 省级\n\n#### 报表 汇总 上报\n\n#### 空白表 数据\n\n#### 地级上报数据\n\n#### 省局规划处 相关处室\n\n#### 审核并填报本级数\n\n#### 专业 市级\n\n#### 报表 汇总 上\n\n#### 空白表 数据 报\n\n#### 区县级上报数据\n\n#### 地市局规划科 相关科室\n\n#### 审核并填报本级数\n\n#### 专业 区县级\n\n#### 报表 汇总 上报\n\n#### 空白表 数据\n\n#### 专业报表空白表\n\n#### 区县级环保局 相关科室\n\n#### 规划部门\n\n#### 填报本级数\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n二、环境统计的调查方法\n1、定期普查：1996年我国进行了全国污染源普查工作。\n2、抽样调查：对重点工业企业污染源实行抽样调查，\n重点污染源年度统计报表。\n3、科学估算：对重点企业及社会生活污染物排放进行\n科学估算。\n4、专项调查：对环境保护工作中有重大意义的进行专\n项调查，如乡镇企业污染调查、畜禽业专项调查、环保\n产业专项调查等。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n三、环境统计的研究方法\n1、大量观察法：环境现象的特征与其数量表现有不同\n程度的差异，建立在大量观察基础上的统计结果必然\n具有较好的代表性。\n2、综合分析法：综合分析法是指对大量观察所获资料\n进行整理汇总，计算出总量指标、相对指标、平均指\n标、变异指标等。\n3、归纳推断法：所谓归纳是由个别到一般，由事实\n到概括的推理方法，是统计研究常用的方法。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n延伸材料-我国环境统计缺口性指标\n环境统计缺口性指标是指在环境统计中存在的数据缺失\n或不完整的指标。这些指标可能由于以下原因而存在缺口：\n1、数据收集困难：某些环境数据可能难以收集，例如特定\n污染物的排放数据、生态系统的详细信息等。\n2、监测范围有限：环境监测网络可能无法覆盖所有地区或\n环境要素，导致某些区域或指标的数据缺失。\n3、报告和记录不完整：企业或相关部门可能未能完整报告\n或记录环境数据，导致统计数据不全面。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n以下是一些可能存在缺口性指标的领域：\n1、危险废物产生和处置：危险废物的产生量、种类、\n处置方式等数据可能存在缺口。\n2、土壤污染：土壤污染的程度、范围和污染物种类等\n信息可能不完整。\n3、生物多样性：生物多样性的详细数据，如物种数量、\n栖息地状况等，可能难以全面获取。\n4、特定污染物排放：一些特定污染物的排放数据，尤\n其是来自小型企业或非重点污染源的排放，可能存在\n缺失。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n为了减少环境统计缺口性指标，可以采取以下措施：\n1、完善监测网络：扩大监测范围，提高监测频率，以获取更全面的数据。\n2、加强数据收集和管理：建立健全的数据收集和报告制度，确保数据的准确\n性和完整性。\n3、推动信息共享：促进不同部门和机构之间的数据共享，整合各方资源，填\n补数据空白。\n4、开展专项调查和研究：针对特定的环境问题或指标，进行专项调查和研究，\n以获取更详细的数据。\n需要注意的是，具体的环境统计缺口性指标会因地区、时间和环境问题的不\n同而有所差异。因此，在进行环境统计和分析时，需要充分认识到这些缺口，\n并采取适当的方法来处理和解释数据。同时，持续改进和完善环境统计体系也\n是解决缺口性指标问题的关键。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n#### 第三节 社会经济预测方法\n一、社会发展预测\n二、经济发展预测\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n#### 社会发展预测\n社会发展预测重点是人口预测，是指根据一个国家、一个地区现\n有人口状况及可以预测到的未来发展变化趋势，测算在未来某个时\n间人口的状况，是环境规划与管理的基本参数之一。进行人口预测，\n主要关心的是未来的人口总数。\n社会发展预测也包括规划期内区域内的人口总数、人口密度和\n人口分布等方面的发展变化趋势，人们的可持续发展观念和环境意\n识等各种社会意识的发展变化，人们的生活水平、居住条件、消费\n倾向和对环境污染的承受能力等方面的变化等。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 常见的人口预测模型\n\n#### 项目 公式 说明\n算术级数 N 预测年的人口数量，万人；\nN,=N,+b（t-to)\n法 Nro 基准年的人口数量，万人；\n\n#### b 逐年人口增加数（即变动一年\n几何级数 N=N(1+K)（-0)\n法 N的增加数），万人/a；\nt.to 预测年和基准年，a；\n\n#### 人口自然增长率，是人口出生\n指数增长 N=N2.718K（-to)\n法 to 率与死亡率之差，常表示为人口每年\n净增的干分数。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n二、 经济发展预测\n\n#### 能源消耗指标\n\n#### 指标名称 说明\n产品综合 包括单位产值综合能耗（总耗能量和产品总产值的比值）\n能耗 和单位产量综合能耗（总耗能量和产品总产量的比值）。\n能源利用率 有效利用的能量和供给的能量的比值。\n规划期内能源消耗量增长速度与年平均经济增长速度之间\n\n#### 能源消费弹性\n系数 的比值，年平均经济增长速度，可采用工业总产值、工农\n业总产值、社会总产值或国民收入的增长速度等。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 能源消耗预测方法\n\n#### 方法名称 说明\n人均能量 按人民生活中衣食住行对能源的需求来估算生活用能的方法，\n消费法 我国平均每人每年1.14t标准煤。\n能源消费弹性系数e一般为0.4～1.1，由国民经济增长速度，粗\n能源消费 预测能耗的增长速度β=é·α，其中α为工业产值增长速度，以\n弹性系数法 此可进行规划期能耗预测E，=E。（1+β)（-），其中E为预测年的\n能耗量，E为基准年的能耗量，t，t为预测年和基准年。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n目前，耗煤量的预测可分为民用耗煤量预测和工业耗煤量\n预测，民用耗煤量预测可用式（4-2）表示：\n\n#### Es=As·S (4-\n\n#### ：中\nEs- -预测年采暖耗煤量，x104t/a;\nA 采暖耗煤系数，t/m2;\nS一一预测年采暖面积，m2。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n工业耗煤量预测方法有弹性系数法、回归分析法、灰色预测\n等几种常用的方法。以弹性系数法为例，设工业耗煤量平均增长\n率为α，工业总产值平均增长率为β，工业耗煤量弹性系数C：可用\n式（4-3）表示。\n(Et/E0）t-t0-1 (4-3)\n\n#### β (Mt/M0)t-t0-1\n式中Et一一预测年的工业耗煤量，x104t/a；\nEo一一基准年的工业耗煤量，x104t/a;\nMt一一预测年的工业总产值，x104元/a；\nM。一基准年的工业总产值，x104元/a；\nt，to预测年和基准年，a。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 第四节 环境预测方法\n\n#### 、环境预测\n二、常用预测方法\n·三、环境预测的工作程序\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 环境预测\n1、内涵\n在环境管理过程中，经常需要对人类活动将可能引起的环境质量\n变化趋势进行预测。环境预测是在调查研究和科学实验的基础上进行\n的，借助于数学、计算理论和信息处理技术等工具，对未来某一时间\n环境质量的变化趋势，进行定性和定量分析。或者说，预测就是根据\n过去和现在来估计未来，是对研究对象的未来发展作出科学推测和估\n计，预测是决策的基础。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n把需要进行预测的客观环境看成一个系统，根据一般系统的整\n体性、相关性和动态性等特点，把事物的过去、现在和将来看成一\n个连续的、不断发展变化的辩证统一体，并依据已有资料数据，使\n用预测方法，对未来的环境污染趋势、污染控制对策以及控制污染\n\n#### 所需的投资趋势等进行评价和估算\n这种围绕系统的环境、技术和价值等未来情况进行预测，主要\n为决策提供必需的未来信息，对环境管理系统开发和提高环境效益\n是十分重要的。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n2、分类\n\n#### 类别 分类子项\n\n#### 按预测内\n区域环境预测、行业环境预测、专题环境预测\n\n#### 容划分\n定性预测：对未来发展的定性分析（递增、递减、加快、减缓节奏）；\n定量预测：占有历史和现实数据，运用数学模型预测预测；\n按预测作 定时预测：寻找时间序列上的发展变化规律（过去、现在和今后）：\n用划分 定比预测：定结构比例，例如环保投资结构比例分析（水、气、渣、\n噪);\n评价预测：对预测结果可信度、风险性进行评价\n短期预测：5年内；\n\n#### 按预测时\n中期预测：5~15年；\n\n#### 间划分\n\n#### 长期预测：20年\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n二、常用预测方法\n1、预测的基本原则\n（1）资料的完整性：预测不同于猜测，猜测是随心所欲，不负\n责任，而预测必须以周密调查和详尽的统计资料为依据。\n（2）数据的准确性：基础数据必须准确完整，预测结果必须给\n出误差分析；由于资料数据、预测技术和预测人员素质三方面的因\n素，预测结果不可能十全十美，误差总会有，但误差有大有小。\n（3）方法的可靠性：对所有方法、模型进行分析、评价和检验。\n（4）结果的可验性：预测应有明了的结论，且这个结论是可以\n检验的。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n2、环境预测内容和基本程序\n\n#### 环境预测是通过已取得的情报资\n料和监测统计数据，对未来未知的环\n境前景进行的估计和推测，也就是把\n环境作为预测对象，置于一定的时间\n和空间中，研究在未来一定时期经济\n社会活动对环境的影响，预测环境要\n素和系统将达到的运动状态及可能出\n现的结果，它是环境决策的依据，也\n是制定环境规划与环境管理的基础。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n（1）环境预测的内容\n①能源和资源消耗的增长、土地利用、资源开发的规模和速度、预\n测供求矛盾及其对环境的影响；\n③大气环境、水环境、土壤环境等环境要素污染状况的变化；\n④开发活动可能造成的生态破坏；\n③环境污染与破坏造成的经济损失和对人体健康的损害；\n?主要污染物的削减量\n（2）环境预测的一般程序：①确定预测的目的和任务；②收集和分析\n有关资料；③选择预测方法；④建立预测模型；③进行预测计算；\n?对预测结果的鉴别和分析。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n3、环境预测的方法\n根据预测结果一般可分为两类，即定性预测方法和定量预测方法。\n（1）定性预测方法\n定性预测是预测者利用直观的材料，根据掌握的专业知识和丰富\n的实际经验，运用逻辑思维方法对环境变化做出定性的预计推断和环\n境交叉影响分析，它主要包括专家会议法、德尔菲法、主观概率法和\n层次分析法等。\n①专家会议法又称”集合意见法”，是通过专家之间的信息系统，\n引起”思维共振”并产生组合效应，形成宏观智能结构后进行创造性思\n维的方法。这种方法可以排除折衷，对所议的问题通过客观的连续分\n析，找到一组切实可行方案。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n②德尔菲法又称“专家调查法”或“函询调查法”，以无记名方式，通过数\n轮函询征求专家意见。好 预测领导小组对每轮的专家意见进行汇兑整理，作为\n参考资料再发给专家，供其分析判断，进一步提出新的论证，并不断修正自\n己的见解，如此循环反复数次，专家意见日趋一致，产生较为可靠结论。\n\n#### 德尔菲这一名称起源\n\n#### 于古希腊有关太阳神\n\n#### 阿波罗的神话，寓意\n\n#### 阿波罗预卜未来的神\n谕。1946年，兰德公\n\n#### 司首次用这种方法做\n\n#### 出成功预测后，这一\n方法被迅速广泛采用。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n德尔菲法一般情况下包括设计调查表、发放调查表实施调查、回收调查\n表进行统计处理、将所有调查对象对每项指标权重的平均估计值及本人估计\n值的离差反馈给每个参加调查者并进行第二轮调查和收回调查表进行统计处\n理五个基本步骤，具有不具名（应邀参加者并不了解，克服易受权威人士思\n想和见解的束缚）、反馈性（一般经3~4轮，每轮统计结果反馈给每位参加者\n作为下一轮参考）和预测结果统计性（每一轮采用统计方法处理预测结果，作\n定量处理）等特点。\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n③主观概率法首选允许专家在预测时可以提出几个估计值，并\n评定备选值出现的可能性；然后计算各个专家预测值的期望值；最\n后，对所有专家预测期望值取平均值，得到预测结果。\n④层次分析法利用递阶层次结构和矩阵方程将思维过程数学化，\n采用1~9标度构造判断矩阵，通过求解矩阵特征向量及最大特征根，\n求得低层因素相对目标层的相对重要性权重值，以决定其影响程度。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n（2）定量预测方\n\n#### 法\n定量预测以运筹学、系统论、\n\n#### 控制论、系统动态仿真和统计学\n为基础，根据历史数据和资料，\n\n#### 应用数理统计方法来预测事物的\n\n#### 未来，或者利用事物发展的因果\n关系来预测事物的来。常用的定\n量预测方法主要有时间序列法、\n\n#### 逻辑型规律法和环境系统的数学\n模型法等。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### ①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### ①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n#### ②逻辑型规律法\n逻辑型规律是自然环境和社会环境中事物发展的基本规律之一\n其基本线形是由一条指数曲线和一条对数曲线平滑衔接组合而成，\n成S型，又称S规律。\n\n#### ③环境系统的数学模型\n依据科学定律或者数据的统计分析，或者两者兼而有之，包括\n代数方程模型、微分方程模型等。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n（3）回归分析法\n回归分析法是通过对历史资料的统计与分析，寻求变量之间相互\n依存的相关关系的一种数量统计方法。\n回归分析法的特点包括：①回归模型中的因变量和自变量之间必\n须有因果关系；②自变量与因变量间必须具有强相关关系，自变量间\n必须具有弱相关关系；③自变量的预测值较准确且易得到；④正确选\n定回归模型的形式；回归模型必须通过各种检验后才能用于预测。\n回归预测法的基本步骤包括：①进行因素分析，确定回归模型的\n自变量；②绘制散点图，构造回归模型的理论形式；③利用最小平方\n法估计模型参数，建立模型；④对建立的回归模型进行检验，检验的\n方法包括S检验和相关检验等；利用检验后的回归模型进行预测。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n4、环境预测的常见类型\n（1）大气环境质量预测\n\n#### 大气环境质量预测是为了了解未\n来一定时期的经济、社会活动对大气\n环境带来的影响，以便采取改善大气\n环境质量的措施。\n\n#### 主要内容是预测大气环境中污染\n物的含量，常用方法有箱式模型法、\n高斯模型法、线源扩散模式法、面源\n等。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n（2）水环境质量预测\n水环境质量预测最基本的问题就是要找出污染排放变化与\n水体控制点处主要污染物含量水平的相关关系，以此预测区域\n（或城市）由于实施经济、社会发展规划而产生的环境影响。\n可选用或建立水质模型，如河流模型，河口、湖泊水库模\n型等均是进行水质预测最常采用的方法。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n（3）固体废物环境质量预测\n固体废物对环境影响是多方面的，对这类预测问题，一般\n包括工业固体废物产生量、城市垃圾产生量及固体废物环境影\n响预测等内容。\n固体废物环境影响预测则可采用大气、水影响预测模型\n以及因果关系分析法等。\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n（4）噪声环境质量预测\n交通噪声预测方法：交通噪声预测方法常用的有多元回归预测，\n即根据用车流量、道路宽度、本底噪声值与交通噪声等效声级之间的\n\n#### 关系，建立多元回归预测模型\n环境噪声预测方法：环境噪声预测方法常见的主要有两种：一\n种是多元回归预测方法，通过噪声源、本底噪声与噪声等效声级之\n间的关系，建立多元回归预测模型。另一种为灰色预测方法，即根\n据历年环境噪声值，建立灰色预测模型。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n\n#### 第五节 决策分析方法\n一、决策\n二、决策因素\n三、决策方法\n四、决策原则和决策程序\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n一、决策\n1、内涵\n决策是人们为了达到一定目标，从若干可能的策略中选取最\n好策略的过程。\n决策分析是研究怎样才能作出科学的决策，是一种为复杂的\n和结果不肯定的决策问题提供旨在改善决策过程的合乎逻辑的系\n统分析方法，它的任务是为决策者提供优的或满意的决策及其可\n能结果的分析，供决策时参考。\n决策问题具有多目标性、决策影响的长期性、后果的不确定\n性、可供选择方案的多样性及决策大多数情况下的一次性等特点。\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n\n#### 决策是系统工程的核心，也是管理\n的核心，决策是人类社会的重要活动， 运筹惟喱决胜千里\n贯穿于人类各项活动之中，决策一错，\n全盘皆输。1964年瑞士研制出第一只石\n英电子表，决策者以为市场前途不大，\n未引起重视，敏感的日本人立即从技术\n到市场进行深入调研，结论是大有市场，\n它利用其雄厚电子技术基础，首先推出\n成批产品占领市场，刮起石英技术誉满\n全球的旋风，仅七十年代后5年就挤\n瑞士178家手表厂。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n2、分类\n决策问题通常分为确定型和非确定型。其中非确定型决策\n包括风险型决策和不确定型决策。确定型决策是在决策环境完\n全确定的条件下进行的，其选择的结果也是确定的。所谓风险\n型情况下的决策和不确定情况下的决策，都是在决策环境不是\n完全确定的情况下进行的，它们之间的区别在于：前者对于各\n自然状态发生的概率，决策者是可以预先估计或计算出来的；\n而后者对于各自然状态发生的概率，决策者是一无所知的，只\n能靠决策者的主观倾向进行决策。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n二、决策因素\n一般的决策问题都包含三个最基本的因素：\n1.自然状态\n“产品销路好”、“产品销路一般”和“产品销路差“都是自然状态，\n是决策者无法控制的因素。\n2.策略\n策略是决策者可以采取的行动方案。采取哪一个策略，完全由决\n策者决定。\n3.益损值\n益损值是不同策略在不同自然状态下的收益值或损失值。\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n三、决策方法\n1.确定型决策的方法\n确定型决策法适应于处理确定型决策问题，也就是说在自然状态已\n清楚而且完全确定，决策者可以凭借个人的判断，按既定目标及评价准\n则选定行动方案，这样的决策就是确定形决策问题。它有四个主要特征，\n①只有一个确定的自然状态；②存在决策者希望达到的一个明确的目的；\n③存在着可供决策者选择的两个或两个以上的行动方案，而且每种方案\n的最终结果是确定的；④不同的行动方案在确定状态下的收益值或损失\n值可以计算出来。\n确定型决策的方法有很多，例如单纯择优法、模型决策法、排队决\n策法和盈亏平衡分析等。单纯择优法就是可以直接选择最优的决策方案；\n模型决策法是利用一定的数学模型进行计算后，加以择优的方法。\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n2.非确定型决策的方法\n对于风险型决策问题，其状态的发生或不发生是带有某种概率的，\n这种概率对决策者来讲要承担一定的风险。最大收益期望值决策准则的\n公式见式（4-5），最小机会损失期望值决策准则公式见式（4-6）。\nAn=max(∑=P;a) (4-5)\n式中：\nP;一某状态发生的概率；\na;一状态的期望值。\nA,=min(∑²=,P;0) (4-\n式中：0一状态的损失值。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n例4-1某厂开发环保产品，其市场状态E；，发生概率P和各方案\n不同收益a；见表4-15，对各方案A择优决策。\n市场状态E及概率PE良好， E2一般， E3不佳， 收益期望\n方案A;\nP1=0.4 P2=0.5 P3=0.1\naij Oij aij Oij aij OijA1 80 0 50 20 20 30\nA2 60 20 70 0 50 0 PanPO# n nA3 50 30 40 30 20 30\n表4-15最大收益期望值方案决策矩阵（最小机会损失期望值）\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n\n#### 解：据式（4-5）\nAn=max{(0.4x80+0.5x50+0.1x20),(0.4X60+0.5x70+0.1x50).\n（0.4x10+0.5x40+0.1x20）}=max{59,64，42）=64选择期望值最大\n\n#### 的方案A2\n据式(4-6)\nAn=min{(0.4x0+0.5x20+0.1x30),(0.4X20+0.5x0+0.1x0),(0.4x30+0.5x30+0.1x30）}=min{13，8,30}=8选择机会损失最小的方案\n对于不确定型决策问题，不但状态的发生是随机的，而且各状态\n发生的概率也是未知的和无法事先确定的。对于这类问题的决策，主\n要取决于决策者的素质、经验和决策风格等。本书介绍几种比较常见\n的处理不确定型决策问题的决策方法。\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n（1）等可能性准则\n对于不同的自然状态，如果没有确切理由说明每个自然状态的\n概率，那么只能认为它们发生的机会是相等的，即每一种自然\n状态发生的概率都是1/n。将每一个自然状态的概率定为1/n\n后，就可以用已经介绍过的方法了。\n（2）乐观准则\n按乐观准则决策时，决策者持最乐观的态度，决策时不放弃任\n何一个获得最好结果的机会，愿意以承担一定风险的代价去获\n得最大的利益。\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n\n#### 例4-2\n\n#### 表4-16效益矩阵\n效益矩阵状态SSi S2 S3 S4\n\n#### 方案AjA1 4 4 6 7\n\n#### A2 2 4 6 9\n\n#### A3 5 7 3 5\n\n#### A4 3 5 6 8\n\n#### A5 3 5 5 5\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n对于A:max（4，4，6，7)=7\n对于A2:max(2，4,6，9)=9\n对于A3:max(5，7，3，5）=7\n对于A4:max（3，5，6，8)=8\n对于As:max（3，5，5，5）=5\n再从选出的5个最大效益值中，挑选一个最大值：即：max（7，9，7，8，\n5)=9，故选方案A2。\n按乐观准则决策，实际是瞄准整个效益矩阵中的最大者。这当然不\n会丧失获得最好结果的机会，但有时也不可避免落到最坏的结局。比如\n本例中选择了A2，若自然状态S4发生，则获得最好结果；而若自然状态\nS发生，则将落到最坏结局。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n（3）悲观准则\n悲观法（最大最小准则法或瓦尔德准则法）的决策原则：“小中取大”，\n是当有多种方案可供决策者选择时，先估算出每个方案在每种状态下的\n收益值或收益率，然后把各个方案的最小收益值或收益率单列出来，在\n这组最小收益值或收益率中，选择收益值或收益率最大的那个方案作为\n最佳方案。这种决策方法，在出现不利的情况下，也可使损失减到最小。\n其特点是决策者持最悲观的态度，他总是把事情估计得很不利。\n\n#### 乐观准则 大中取大\n\n#### 悲观准则 小中取大\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n仍以例4-2为例：\n对于A:min（4，4，6，7)=4\n对于A2:min(2，4，6，9)=2\n对于A3:min（5，7，3，5)=3\n对于A4:min（3，5，6，8)=3\n对于As:min（3，5，5，5)=3\n再从选出的5个最小效益值中，挑选一个最大值：\n即:max（4,2，3，3，3）=4\n故选方案A1。\n按悲观准则决策，可能丧失掉获得最好结果的机会。但不管最终\n哪个自然状态发生，决策者都能够避免最坏的结局\n\n---\n\n<!-- page 83 -->\n\n![page 83](page_083.jpg)\n\n(4)折衷准则\n乐观法与悲观法决策的缺点是：\n在决策过程中所损失的信息过多，而\n且决策结果也有很大的片面性。所谓\n折衷，即在乐观与悲观之间折衷。在\n折衷准则中，用乐观系数a表示乐观\n程度（0≤a≤1），而（1-a）就是悲观系\n数，它表示悲观程度。折衷法的特点：\n既不非常乐观，也不非常悲观，而是\n通过一个系数。（0≤a≤1）表示决策者\n对客观条件估计的乐观程度。\n\n---\n\n<!-- page 84 -->\n\n![page 84](page_084.jpg)\n\n上例中，假设a=0.45，则1-a=0.55。折衷效益值C的公式为：\nC;=a·max{a)+(1-a)·min{a}(i=1,2...5)\n对于A1:C=0.45x7+0.55x4=5.35\n对于A2:C2=0.45x9+0.55x2=5.15\n对于A3:C3=0.45x7+0.55x3=4.8\n对于A4:C4=0.45x8+0.55x3=5.25\n对于A5:C=0.45x5+0.55x3=3.9\n再从各个方案的折衷效益值C中选择一个最大值：\n即：max（c}=max(5.35，5.15，4.8，5.25，3.9)=5.35\n其相应方案即所选方案。故选方案A1。\n当乐观系数a取值不同时，选择的方案可能不同。当a=1时，折\n衷准则即成为乐观准则，而当a=0时，折衷准则成为悲观准则。\n\n---\n\n<!-- page 85 -->\n\n![page 85](page_085.jpg)\n\n（5）后悔值准则（最小后悔值准\n则)\n对于非确定型决策问题，为了避免事后遗憾没有选准效益最大\n或损失最小的方案，可以采用后悔值法进行决策。后悔值（最小最大\n后悔值法），是后悔值法决策的主要依据，是指某状态下的最大效益\n值与各方案的效益值之差。\n决策者做出决定之后，若不够理想，必有后悔之感。后悔值准\n则就是把每一自然状态对应的最大效益值视为理想目标，把它与该\n状态下的其他效益值之差作为未达到理想目标的后悔值，这样可得\n到一个后悔矩阵。\n求出后悔矩阵中每一行的最大值，这些最大值中的最小者对应\n的方案，即为应选方案。上例中（表4-6），效益矩阵对应的后悔矩\n阵见表4-17。\n\n---\n\n<!-- page 86 -->\n\n![page 86](page_086.jpg)\n\n表4-17 效益矩阵对应的后悔矩阵\n\n#### 方案 状态（S） 最大后\n(Ai) S1 S2 S3 S4 悔值\n\n#### A1 1 3 0 2 3\n\n#### A2 3 3 0 0 3\n\n#### A3 0 0 3 4 4\n\n#### A4 2 2 0 1 2\n\n#### A5 2 2 1 4 4\n因为各个方案的最大后悔值中最小者为2，故选择方案A1。\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n对于不确定型问题，采用不同的决策准则做出的决策往往\n是不同的。为了使决策更准确可靠，最好设法了解各自然状态\n发生的概率，以便将不确定问题转化为风险型问题，提高决策\n的科学性。\nalternativehigh-riskconsequencesuncertainty complexityMAKiNGinterpersonalissues\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n[例4-3]某厂试制一种防噪耳机，新产品成本每件3元，销售价每件5\n元，若产品当天未销售出，每件损失1元，该厂日产量方案共5个，0、\n1000、2000、3000、4000件，试问为使该厂收入最高，试确定采\n用何种生产方案。\n表4-18各种生产方案下的销售量\n\n#### 销售量j\n\n#### 产量方案\n0j1 1000j22000j33000j4 4000j5\nA1:0i1 0 0 0 0 0\n-1000 2000 2000 2000 20001000i2\n-2000 1000 4000 4000 40002000i3\n-3000 0 3000 6000 60003000i4\nAs: -40004000 i5 -1000 2000 5000 8000\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n①采用小中取大准则的收益矩阵（表4-19）\nAn=max{min(a1j),min(a2), min(a3j), min(a4; ),min(as; ) }\n表4-19采用小中取大准则的收益矩阵\n方案A; 1000 2000 3000 4000\n\n#### 最小收\n益期望 0 -1000 -2000 -3000 -4000\n\n#### 值\n因此A=max（0,-1000,-2000,-3000,-4000)=0，收\n益期望值为0所对应的方案为A1，即应停止生产。\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n②采用大中取大准则的收益矩阵（表4-20）\nAn= max{max(a1j),max(a2j) ,max(a3j),max(a4j),max(a5;)\n表4-20采用大中取大准则的收益矩阵\n方案A; 1000 2000 3000 4000\n\n#### 最小收\n益期望 0 2000 4000 6000 8000\n\n#### 值\n因此A，=max（0,2000,4000,6000,8000)=8000，收\n益期望值为8000所对应的方案为A5，即日产4000件。\n\n---\n\n<!-- page 91 -->\n\n![page 91](page_091.jpg)\n\n\n#### ③等可能性原则\n据表中数据可得备选方案期望值：各方案期望值即为各种自然状态可能\n出现结果的算术平均值，五种市场状态所取得收益平均值如下：\n0=(0)S/+(0)S/+(0)S/+(0)S/+(0）S/1:\n\n#### A2:1/5(-\n000=(000)+(000)+(000)+(000)+(00000=（000)+000)+000+0000+000-)\n00=（0009)/+(0009)/+(0000)1+(0)1+(0000-)/:\nA5:1/5(-4000)+1/5(-\n\n#### 最大收益期望\n值:An=max{2=1 }=max（0,1400,2200,2400,2000)=2400对应A\n\n---\n\n<!-- page 92 -->\n\n![page 92](page_092.jpg)\n\n\n#### ④最小机会损失决策准则\n计算每种销售量时，各备选方案的机会损失O；：\nO=事件j的最大收益值-各方案i的可能收益值（表4-21）\n事件1，销售量为0时，\nO11=0-0-0;O21=0-(-1000)=1000 ;O31=0-(-2000)=2000 ;\nO41=0-(-3000)=3000 ;O51=0-(-4000)=4000\n事件2，销售量为1000时，\nO12=2000-0=2000;O22=2000-2000=0;O31=2000-\n1000=1000 ;O42=2000-0=2000 ;O52=2000-(-1000)=3000\n\n---\n\n<!-- page 93 -->\n\n![page 93](page_093.jpg)\n\n\n#### 代\n表4-21最小机会损失决策准则下最大机会损失矩阵\n\n#### 销售量j\n\n#### 产量方 最大机\n案 0j1 1000 2000 3000 4000 会损失\nj2 j3 j4 js0 2000 4000 6000 8000 80001000 1000 0 2000 4000 6000 60002000 2000 1000 0 2000 4000 400030003000 3000 2000 1000 0 2000 （最小）\n4000 4000 3000 2000 1000 1000 4000\n\n---\n\n<!-- page 94 -->\n\n![page 94](page_094.jpg)\n\n四、决策原则和决策程序\n1.决策原则\n决策原则主要包括信息快准全原则、\n预测未来原则、可行性原则、系统性原\n则、对比优选原则和集团决策原则。\n2.决策程序\n决策作为一个过程，通常是通过调查\n研究后，在了解客观实际和预测今后发\n展的基础上，明确提出各种可供选择的\n方案以及各种方案的效应，然后从中选\n定某个最优方案。整个过程分为下列程\n序(表4-22)。\n\n---\n\n<!-- page 95 -->\n\n![page 95](page_095.jpg)\n\n\n#### 表4-22决策程序\n\n#### 序号 决策过程 说明\n1 明确问题 根据提出的问题，找出症结点，明确对问题的认识\n目标是决策所要达到的结果。如果目标不明确，往往\n2 确定目标 造成决策失误。当有多个目标时应分清主次，统筹兼\n顾。明确目标时，要注意目标的先进性与可靠性\n确定目标后，应对状态进行分析和收集信息，建立模\n\n#### 3 制定方案\n\n#### 型，提出实现目标的多种可行方案\n4 方案评估 对提出的多种方案的效果进行评价，尽可能通过科学\n计算，用数量分析的方法比较其优劣和得失\n决策者从总体角度对各种方案的目的性、可行性和时\n\n#### 5 选择方案\n效性进行综合的系统分析，选取使目标最优的方案\n为了保证最优方案的实施，需要制定实施措施，落实\n\n#### 6 组织实施\n\n#### 执行单位，明确具体责任\n在决策实施过程中可能会产生这样或那样偏离目标的\n7 反馈调整 情况，因此必须及时收集决策执行中的\n反馈调整信息，分析既定决策是否可以实现预定目标\n\n---\n\n<!-- page 96 -->\n\n![page 96](page_096.jpg)\n\n\n#### 第六节 环境审计方法\n一、环境审计\n二、环境审计的内容\n三、环境审计方法\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n一、环境审计\n环境审计是对特定项目的环境保护情况，包括组织\n机构、管理、生产及环保设施运转与排污等情况进行系统\n的、有文字记录的、定期的、客观的评定。\n环境审计按范围可分为地区（城市）级的环境审计及\n工厂、工艺、特定污染物等的环境审计。\n按审计的目标可分为提高环境管理效率、有效控制污\n染、提高环保资金使用效率、减少事故等环境审计。\n按审计的目的可分为审查环境执法、废物减量化、实\n施清洁生产等环境审计。\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n\n#### 环境审计是对环境管理的某些方面\n进行检查、检验和核实，目的一般是将\n潜在的、可能出现的环境危险降到最低 审计\n程度。\n“环境审计”也是一种管理工具，它用\n于对环境组织、环境管理和仪器设备是\n否发挥作用进行系统的、定期的和客观\n的评价。一般包括对管理的承诺（前\n提）、环境审计小组的目标（方向）、\n专业能力、环境审计程序、书面报告、\n质量保证和跟踪等环节。\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n二、 环境审计的内容\n1.符合性审计\n主要为环境保护法规的符合性审计，对企业有关环境的\n现状及管理当局所作的努力进行详细的、特定区域的评价，\n以提高符合性，减少因不符合而造成的后果。\n2.环境保护管理系统审计\n确定环境管理系统是否运作良好，是否能处理当前或未\n来的环境风险。\n3.过渡审计\n评价与不动产的获取和剥离有关的风险。企业在购买和\n转让不动产时，需要对其有关环境因素加以审计，以此来降\n低由此带来的风险。\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n4.有害物质的处理、存放及清理的审计\n评价危险原料的处理、存放及清理会产生的全部负债。\n有害物质如果处理、存放和清理不当，会对周边环境造成污\n染，甚至会威胁人类的健康，易带来诉讼、赔偿和罚款，导\n致环境成本上升、经济效益和社会效益下降，必须对其所经\n历的各个环节进行审计。\n5.污染预防审计\n确定减少废物的机会，通过对企业可能发生污染情况的\n审计预测结果，采用一系列有效的措施，减少企业在生产经\n营过程中产生污染的机会。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n6.环境效益审计\n评价由于采取了保护环境的措施而产生的成本及其估算的合\n理性、合法性和真实性，并估计环境治理的效益。由于环保设备\n的价格普遍较高，而其带来的效益又具有潜在的、长期的特性，\n通过环境效益审计，能提高企业的环保意识并在生产经营活动中\n兼顾企业的长远发展。\n7.产品审计\n确定产品是否与环境政策的要求相符合。如果一个企业的产\n品被列为绿色产品，就会吸引众多的消费者，企业将在激烈的竞\n争中取得优势。通过产品审计，企业可以看出自己的产品与环境\n政策要求的差距，并加以改进。\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n三、环境审计方法\n环境审计是审计的一种类型，\n\n#### 常规审计方法对环境审计同样适\n\n#### 用，如在进行财务收支审计和经\n\n#### 审计\n\n#### 济效益审计中运用的：审计检查\n\n#### 法（包括资料检查法、实物检查\n法）；审计调查法（包括查询法、\n观察法、专题调查法）；审计分\n析法、账户分析法、账龄分析法；\n\n#### 逻辑推理分析法、经济活动分析\n法；经济技术分析法、数学分析\n法，抽样审计法等。\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n目前在环境审计专业人才缺乏的情况下如何开展环境审计，我们\n采取了以下几种方式：\n1.将微观审计与宏观分析相结合\n环境审计工作涉及面广、政策性强，要从宏观着眼，把为宏\n观管理服务贯穿于审计工作全过程。在制定审计工作计划时，要\n分析当前环境管理中的主要问题，以资金为主线，以重点环保项\n自为对象，由浅入深选择环境污染最为严重的项自和重点污染源\n治理项目实施审计。将审计中的微观经济现象与有关环境保护宏\n观经济政策、法规、措施相联系，反映问题实质，并提出切实可\n行的意见和建议，及时反馈给政府及有关部门，为宏观决策提供\n依据。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n2.将财务收支审计与经济效益审计相结合\n\n#### 环境审计不仅要对环保资金\n\n#### 的筹集及使用情况、开展财政与\n财务收支的真实性和合法合规性 审计\n\n#### 进行审计，而且更重要的是要根\n\n#### 据国家各项起居室环境指标，测\n\n#### 评被审计单位应承担的环境保护\n\n#### 资金\n责任、环境治理责任及工作绩效，\n\n#### 反映环境保护政策的落实情况\n\n#### 因此，在开展财务收支审计的同\n时，必须开展环境绩效审计。\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n3.将审计人员与环保专业技术人员相结合\n环境审计专业技术性很强，审计人员仅有财务、审计知识是不能\n适应工作需要的，还必须熟悉国家环保法律、法规、制度和宏观经济\n政策，同时还要有综合分析、判断能力，因此，现阶段开展环境审计，\n一方面审计人员要通过学习和实践，尽快提高素质，成为既懂财务又\n懂环保、具有宏观分析问题能力的复合型人才，提高环境审计质量；\n另一方面，可以聘请环保专业技术人员参与审计组，合作开展审计，\n促进审计向纵深方向发展，尽快发挥环境审计的社会功效。\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n目前环境审计刚刚起步，企业环境审计是最基本的，其中企业清\n洁生产审计应用较广泛。清洁生产审计是指对组织产品生产或提供服\n务全过程的重点或优先环节、工序产生的污染进行定量监测，找出高\n物耗、高能耗、高污染的原因，然后有的放矢地提出对策、制定方案，\n减少和防止污染物的产生。清洁生产审计的一个重要内容就是通过提\n高能源、资源利用效率，减少废物产生量，达到环境效益和经济效益\n的和谐统一。清洁生产审计方法详见本书第7章。\n\n---\n\n<!-- page 107 -->\n\n![page 107](page_107.jpg)\n\n\n#### 第七节 环境管理信息系统\n一、环境信息及其系统\n二、环境管理信息系统的设计与评价\n·三、环境决策支持系统的设计与评价\n\n---\n\n<!-- page 108 -->\n\n![page 108](page_108.jpg)\n\n一、环境信息及其系统\n1.环境信息\n环境信息是在环境管理工作中应用的经收集、处理而以特定形\n式存在的环境知识，以数字、字母、图像和音像等多种形式存在。\n环境信息是环境系统受人类活动等外来影响作用后的反馈，是\n人类认知环境状况的来源。因此，环境信息是环境规划与管理系统\n的神经。\n环境信息除具有一般信息的事实性、等级性、传输性、扩散性\n和共享性等基本属性外，还具有时空性、综合性、连续性和随机性\n的特征。\n\n---\n\n<!-- page 109 -->\n\n![page 109](page_109.jpg)\n\n2.环境信息的检索\n环境信息在各种学术刊物和内部资料上均有刊登，环境管理人\n员可充分利用国内外的检索刊物，查阅相关信息。\n\n#### 序号\n\n#### 名称 说明\n全国报刊索 它是全国报刊的一个分册，由上海图书馆编辑出版，\n\n#### 1 引科技版\n以题录形式按中国图书分类法分类编制，分类号为X。\n它是目前国内环境科学技术信息唯一的检索刊物，\n是全国科技信息检索体系的组成部分，采用中、英、德、\n法、日、俄6种文字，报道国内外百种期刊中有关环境科\n学技术的最新文献资料。以文摘和题录形式向广大读者\n\n#### 环境科学文\n2 摘 提供环境信息服务，全年报道量约3600篇，其中文摘约\n占70%，题录约占30%，报道内容具有科学性、技术性、\n动态性、实用性、准确性和系统性。\n\n---\n\n<!-- page 110 -->\n\n![page 110](page_110.jpg)\n\n\n#### 序号\n\n#### 名称 说明\n它由中国环境科学研究院情报研究所编辑，中国环\n境科学出版社出版，以全国环保科技情报网交流的内部\n\n#### 中文科技资\n资料为主要资料来源，集中报道我国有关环境科学的会\n\n#### 3 料目录一环\n议论文、科技成果、出国访问考察、来华技术座谈、学\n\n#### 境科学\n位论文、引进技术成套资料以及中文期刊上译文资料等。\n\n#### 国外科技资\n它由科学技术文献出版社出版，是一种题录检索工\n\n#### 料馆藏目\n具，报道中国科技情报研究所人藏的有关环境污染与保\n\n#### 4 录一环境污\n护方面的科技资料文献。\n\n#### 染与保护\n它是美国生物科学情报服务社编辑出版的英文刊物，\n\n#### 环境污染物\n按类目（水污染、微生物、食品卫生、气体污染、职业卫\n\n#### 对人体健康\n5 影响文摘 生、农药、射线、土壤、物理污染物、植物、动物、微\n粒污染及其化学原因等）编排。\n\n---\n\n<!-- page 111 -->\n\n![page 111](page_111.jpg)\n\n\n#### 序\n\n#### 号 名称 说明\n空气与水保 它收录了世界各国300多种期刊及90种会议文件以及\n护一API文摘 其他出版物中有关空气与水保护方面的文献。\n它收录了美国1000余种期刊、政府文献、研究报告、\n环境文摘 会议记录以及新书中有关环境污染与环境保护研究方面\n7 的文献资料。\n它报道各国出版的400余种环境科学技术期刊的近期\n目次，主题包括人类生态学、空气、土地资源、水资源、\n\n#### 环境期刊文\n8 营养与保健、能源等，并附有主题和作者索引及年终累\n\n#### 献题录\n积索引。\n它报道的主要类目有空气污染、水污染、土壤污染、\n\n#### 9 污染文摘\n海洋污染、噪声污染等。\n\n---\n\n<!-- page 112 -->\n\n![page 112](page_112.jpg)\n\n\n#### 序号\n\n#### 名称 说明\n它主要报道环境公害、水质污染、水质污染控制技\n\n#### 科学技术文\n术、大气污染、大气污染控制技术、废弃物处理、其他\n\n#### 10 献速报一环\n公害、污染物保护、恶臭、农药与残留农药、放射性污\n\n#### 境公害篇\n染、自然保护等类目。\n水研究中心 它摘录了世界各国关于给水、水质分析、污染和废\n通报 水处理、天然水源污染等。\n\n---\n\n<!-- page 113 -->\n\n![page 113](page_113.jpg)\n\n3.环境信息系统\n环境信息系统：\n\n#### 环境信息从产生到应用于环境保\n护工作所构成的系统。\n环境信息系统的构成：\n它由工作人员、设备（计算机、\n网络技术、GIS技术、模型库等）\n及环境原始信息等组成。\n环境信息系统按内容分为：\n\n#### 环境管理信息系统（EMIS）\n\n#### 环境决策支持系统（EDSS）\n\n---\n\n<!-- page 114 -->\n\n![page 114](page_114.jpg)\n\n（1）环境管理信息系统\n环境管理信息系统（EMIS）是以现代数据库技术为核心，\n将环境信息存储在电子计算机中，在计算机软、硬件支持下，\n实现对环境信息的输入、输出、修改、删除、传输、检索和计\n算等各种数据库技术的基本操作，并结合统计数学、优化管理\n分析、制图输出、预测评价模型、规划决策模型等应用软件，\n构成一个复杂而有序的、具有完整功能的技术工程系统。它既\n是各种环境信息的数据库，又是环境管理政策和策略的实验室。\n\n---\n\n<!-- page 115 -->\n\n![page 115](page_115.jpg)\n\n其基本功能包括：①全面准确地查询和检索各种环境信息，系\n统提供环境科研和管理所需要的各种数据和信息并具有统一的格\n式。②分析各种空间数据，利用数学模型进行数据加工，进行区\n域环境质量的现状评价、污染源评价、污染控制方案预测、经济\n发展对环境影响的预测以及区域环境质量控制规划等工作。③决\n策支持，针对不同层次环境管理部门的不同要求，输出各种图件\n和报告，为环境管理工作提供辅助决策。④有效地利用系统本身\n的功能，可降低系统成本，提高效益。\n\n---\n\n<!-- page 116 -->\n\n![page 116](page_116.jpg)\n\n\n#### 收集 录用\n存储 环境信息 以报表、图表、图形等形式输出信\n\n#### 息\n\n#### 加工 处理\n为政府决策者、企业管理者及公众和NGO提供\n\n#### 数据参考\n\n---\n\n<!-- page 117 -->\n\n![page 117](page_117.jpg)\n\n建设项目环境管理的基本目标主要包括：\n①实现基本信息、污染物的预测排放量与实际排放量、区域范围\n“三废”排放分布、区域范围污染物累积负荷等专题图的显示；\n②实现通过地图对建设项目基础数据查询分析结果进行图文互查，\n并针对专题信息能在图上进行任意选取范围进行分析、汇总，生成\n专题图表。\n\n#### 数据采集\n\n#### 地理数据库 移动GIS\n\n#### 服务器\n\n#### 信息发布\n\n---\n\n<!-- page 118 -->\n\n![page 118](page_118.jpg)\n\n\n#### 正安市流南告环撞景\n空气环境质量 统平台 水环境质量\n\n#### AQI指数 45优 首要污染物\n2021-10-15 合平合入口 欧公告 GS统 环吸监用 环乐爱素 行155841 河流23总断面50水源地21\n本月优良天数 废气 废水 污水处理厂 尾气超标 考核目标 2021-09485 458 27 985 考楼日标 012 鹿·12 37 达标斯面 0\n\n#### 轻杂0 中方染0 达标率 0%\n\n#### 染0 -100% 咨控\n空气质量目标考核指标 未达标站点 (0)\n累计优良天数 优良率 日标优良天数 同比\n247天 86% 311 天 -27%\n空气质量预报 2021-09-15 2021-10-15 水质自动监测信息\n46 39 31 流城断阳名际 水淡列\n2942 2021-101213:050\n甘泉贝 朱家沟 2021-10-1505:0006010010Z60Z60660 47\n\n#### 证后监管 40 36 环境执法\n\n#### 许可证发放\n支含业 已整64 点 129 52 1347 28817 未皮321 韵化 256 53 123450\n排为记 2039 始查次数问企业数\n应 275 税款 处罚企业数 处罚金额\n102 实报 280 25602 元 环信恒辉科技 6 2155.706万元\n\n---\n\n<!-- page 119 -->\n\n![page 119](page_119.jpg)\n\n（2）环境决策支持系统\n环境决策支持系统（EnvironmentalDecisionSupportSystems，简称EDSS）是将决策支持系统引I入环境规划、\n管理、决策工作中的产物，对定结构化、未定结构化或不定\n结构化问题进行描述、组织，进而协助人们完成管理决策的\n支持技术。其基本功能是收集、整理、贮存并及时提供本系\n统与本决策有关的各种数据，对环境信息进行加工、处理、\n分析、综合、预测、评价。\n\n#### 科学性\n\n#### 效率\n\n---\n\n<!-- page 120 -->\n\n![page 120](page_120.jpg)\n\n环境决策支持系统通常具有以下几个主要组成部分：\n数据库：存储大量的环境数据，包括环境监测数据、污染源信息、地\n理信息、社会经济数据等。\n模型库：包含各种用于环境预测、模拟和评估的数学模型和算法，例\n如大气扩散模型、水质模型、生态模型等。\n知识库：积累环境领域的专业知识、法规政策、经验案例等，为决策\n提供理论和实践依据。\n人机交互界面：允许决策者输入问题和参数，查看分析结果，并以直\n观的方式展示数据和模型输出。\n决策分析模块：运用数据分析、多准则决策分析、风险评估等方法，\n对不同的决策方案进行比较和评估。\n\n---\n\n<!-- page 121 -->\n\n![page 121](page_121.jpg)\n\n收集、整理、贮存各种环境信息和数据\n主要功能 灵活运用模型方法对环境信息进行加工处理、分析、综合、\n\n#### 预测、评价以提供决策信息\n提供友好的人机界面和模型输出功能；良好的环境信息传输\n\n#### 功能\n\n#### 快速的信息加工速度及响应时间\n具有定性分析和定量研究相结合的特定环境问题的方式\n\n---\n\n<!-- page 122 -->\n\n![page 122](page_122.jpg)\n\n二、环境管理信息系统的设计与评价\n1.信息系统设计的目标、任务和原则\n目标：充分利用先进的GIS技术、数据库技术、网络通信技术、\n分布式计算技术等，建设一个科学、高效的环境应用信息系统\n为环境管理信息系统的开发目标。\n根本任务：逻辑模型→物理模型（功能设计→数据库设计一应用\n设计）的转变。\n设计原则：①实用性（面向需求，功能完善）；②标准性（标准化、\n统一化）；③先进性（紧跟技术潮流）；④动态性（动态调整、与环\n境业务发展相适应）；开放性（后续开发）；6经济性（性价比）；\n?安全性（数据安全，逻辑可靠）。\n\n---\n\n<!-- page 123 -->\n\n![page 123](page_123.jpg)\n\n2.环境管理信息系统的设计与评价\n环境管理信息系统设计过程可分为四个阶段：\n①可行性研究。\n②系统分析。\n③系统设计。\n④系统的实施与评价。\n\n#### 石家庄污染源动态管理系统\n\n#### 系统设置\n\n#### 行业类型 美注度 行政处罚\n\n#### 国控 t22 行政区具\n\n#### 451 59t\n火电行业 35 印行业 35 长安区 29 451\n水范行症 614 65 污水处理厂 614 65 西分比 166\n\n#### 行业美行\n\n---\n\n<!-- page 124 -->\n\n![page 124](page_124.jpg)\n\n环境管理信息系统EMIS的设计过程\n\n#### 终止\n\n#### 不可行 否定 -一一 否定\n提出问题 现行系统调查 明确目标 可行性分析 详细调查 信息流分析 逻辑设计 初步设计 详细设计 程序设计 系统测试 运行维护\n\n#### 审校 审核 审核\n\n#### 验收\n\n#### 修改目标或创造条件 修改 修改\n可行性研究 系统分析 系统设计 系统设计 系统实施与评价\n\n---\n\n<!-- page 125 -->\n\n![page 125](page_125.jpg)\n\n环境管理信息系统各开发程序及内容\n\n#### 阶段名称\n目的或任务 步骤 主要内容 主要成果\n可行性研究的前提：\n\n#### 明确研究的目的、要\n\n#### 可行性研究 (1）提出请求\n为整个工作过 求、方法及评价准则 可性性\n程提供一套必 用户调查：分析现有 报告；\n须遵循的衡量 系统，提出系统选择 项目开发\n标准 (2）可行性研究 方案进行可行性投资 计划\n\n#### 效益分析\n(3）批准 主要审核\n\n---\n\n<!-- page 126 -->\n\n![page 126](page_126.jpg)\n\n云南省地质环境管理信息系统 2017年12月28日周四 好，欢迎用用想环营信系统\n\n#### 8-19℃多云 禁票进出\n\n#### 安全防护管理\n\n#### 地质环境业务数据\n地质灾害 地下水 矿山地质环境 地质遗迹 基础数据\n\n#### 地质环境业务管理\n综合业务数据管理 数据采集系统管理 数据系统管理 政务系统管理 应急支撑管理\n\n---\n\n<!-- page 127 -->\n\n![page 127](page_127.jpg)\n\n\n#### 阶段名称\n目的或任务 步骤 主要内容 主要成果\n系统实施与评价 系统程序；\n\n#### 系统设计完成后就\n各模块程序的编写； 系统测试报\n\n#### 应交付使用，并在\n系统功能和性能的 告；\n\n#### 运行过程中不断完\n(7）建立系 评价报告; 系统使用报\n\n#### 善，不断升级，因\n统调试程序 实施组织管理运行 告；\n\n#### 而需要对其进行评\n\n#### 维护 系统评价验\n\n#### 价\n\n#### 收报告\n\n---\n\n<!-- page 128 -->\n\n![page 128](page_128.jpg)\n\n三、环境决策支持系统的设计与评价\n环境决策支持系统的设计分为制定行动计划、系统分析、总体结\n构设计和系统的实施与评价四个步骤。\n①制定行动计划，可有快速实现方案、分阶段实现方案和完整的\nEDSS方案；②系统分析步骤是EDSS设计的重要步骤，包括确定系\n统的组成要素，划分内在变量，分析各要素间的相互关系，确定\nEDSS的基本结构和特征；③总体结构设计阶段，由用户接口、信息\n子系统、模型子系统和决策支持子系统构成；④提供系统支持决策\n的分析与评价的相互关联的功能子模块，进而完善该系统。\n\n---\n\n<!-- page 129 -->\n\n![page 129](page_129.jpg)\n\n四、中国的环境信息系统建设\n1.网络建设\n国家环境信息网络总体框架是以国家环境信息中心网络系统为中\n枢，省级环境信息中心为网络骨干，以城市环境信息中心为网络基础\n国家级环境信息网络系统以国家环境保护总局信息中心计算机网络系\n统为主体，系统组成还包括国家环境保护总局机关办公自动化网络系\n统、中国环境科学研究院信息网络系统、中国环境监测总站环境监测\n信息网络系统以及国家环境保护总局在京直属单位环境信息网络系统\n等。\n\n---\n\n<!-- page 130 -->\n\n![page 130](page_130.jpg)\n\n2.机构能力建设\n基本形成了由国家级、省级、城市级信息中心组成的机构体系。\n整个组织体系包括国家环境保护总局信息中心、23个省级环境信息\n中心和110个城市环境信息中心。\n3.系统建设\n初步形成以环境统计、污染源管理、环境监测为主要信息源的\n环境信息管理系统网络。形成一系列环境管理应用软件。\n\n---\n\n<!-- page 131 -->\n\n![page 131](page_131.jpg)\n\n\n#### 习题\n1.简述环境现状调查的内容和方法。\n2.简述环境评价的内容和方法。\n3.简述环境目标的组成。\n4.简述环境规划与管理指标体系的组成内容。\n5.简述环境统计的内容及研究和调查方法。\n6.简述社会发展预测的主要方法。\n7.简述经济发展预测的主要方法。\n8.简述环境质量预测的主要方法。\n9.简述环境审计的方法和内容。\n10.简述环境管理信息系统的组成和设计方法。\n\n---\n\n<!-- page 132 -->\n\n![page 132](page_132.jpg)\n\n\n#### 习题\n1.简述我国环境与发展十大对策，并说明各项对策\n包含的主要内容。\n2.试分析环境政策和环境管理制度的相关关系。\n3.请在三类相关政策（产业政策、技术政策、环境\n经济政策）中选择一类，通过查阅资料，收集汇\n总该类政策执行过程中，国家有关部门已颁布的\n各项规定（列出汇总表）。\n4.说明我国环境保护法规体系的构成。\n\n---\n\n<!-- page 133 -->\n\n![page 133](page_133.jpg)\n\n\n#### 习题\n\n### 5.2000年4月29日第九届全国人大常委会第15次会议\n审查通过的《大气污染防治法》是该法的第二次\n修订，请比较该法二次修订的主要内容，并分析\n我国大气污染防治的发展动向。\n6.试比较1996年版《水污染防治法》与1984年版\n《水污染防治法》内容的变化，并分析我国水污染\n防治的发展动向。\n7.试分析《环境影响评价法》规定开展规划的环境\n影响评价的原因和目的。\n\n---\n\n<!-- page 134 -->\n\n![page 134](page_134.jpg)\n\n\n#### 习题\n8.简述八项环境管理制度的含义和相关规定。\n9.举例说明”土地利用规划制度”实施过程对污染严\n\n#### 重城市所采取的补救措施\n10.说明我国环境标准的分类方法，并按污染控制因\n子分类例表归纳常用环境标准目录。\n"}, {"id": "pdf-006", "group": "原始课件 · PDF原文", "title": "006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序", "md": "# 第五章环境规划的基本内容和程序\n\n> 来源: 006-第五章环境规划的基本内容和程序-第五章环境规划的基本内容和程序.pdf\n> 页数: 76\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### GUNIV\n\n## 第五章\n\n#### 环境规划的基本内容和程序\n\n#### 第一节 环境规划的原则和程序\n\n#### 第二节 环境规划目标和指标体系\n\n#### 第三节 环境评价和环境预测\n\n#### 第四节 环境功能区划\n第五节 环境规划方案的设计和决策过程\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 学习要点\n了解环境规划的原则，掌握环境规划的工作程序、环\n境评价和环境预测的主要内容。理解环境功能区划的含义，\n了解环境规划方案的设计、决策过程及实施条件。\n学习重点：环境目标和环境规划的指标体系及环境功\n能区划。\n学习难点：环境规划方案的设计、决策和优化实施。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 第一节 环境规划的原则和程序\n一、环境规划的基本原则\n二、环境规划的工作程序\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 山\n一、 环境规划的基本原则\n\n#### 环境规划是以生态学理论\n\n#### 和经济发展规律为基础，以经\n\n#### 济、社会和环境协调发展的战\n\n#### 略思想为依据，正确处理资源\n\n#### 开发利用、经济活动与环境保\n\n#### 护间的辩证关系，通过制定环\n\n#### 境规划目标、方案和措施，以\n\n#### 实现环境效益与社会效益、经\n济效益相统一。在制定环境规\n划时应遵循以下基本原则：\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n(1)坚持全面规划、合理布局、突出重点、兼顾一般的原则。坚持\n可持续发展，使环境保护与经济发展相协调。\n（2）坚持经济效益、社会效益、环境效益相统一的原则。遵循生态\n规律和经济规律，使有限的资金发挥更大的作用。\n（3）坚持预防为主、防治结合的原则。依靠科技进步，大力发展清\n洁生产和推广三废综合利用，将污染消灭在生产过程中，积极采用\n适宜规模的、先进的、经济的治理技术，保护环境。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n（4）坚持系统性原则。把环境规划对象看作综合体，用系统论的观\n点和系统论的方法进行环境规划。\n（5）坚持实事求是、因地制宜的原则。环境目标应符合国民经济计\n划总要求，要从实际出发，规划措施要切实可行，具有可操作性。\n（6）坚持强化环境管理的原则。运用经济、法律、行政手段促进环\n境保护事业发展，充分体现有中国特色的环境管理思想、制度和措\n施。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n二、环境规划的工作程序\n1.规划的编\n\n#### 制\n（1）接受任务与组织规划编制\n上一级环保部门下达编制规划的任务，提出主要要求、时间进度，\n下一级环保部门组织规划编制组，编制工作计划和规划大纲。也可\n以由政府下达编制规划的任务，给同级环保部门组织规划编制组。\n规划编制组一般分为领导组、协调组和技术组，人员由通晓规划对\n象的专家以及有关规划、计划管理部门的人员组成；由对规划地域\n或领域具有决策权和协调能力的部门领导人担任指导。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 上级环保局\n\n#### 下达任务\n组织规划班子 下级环保局 同级政府\n调查与研究 现状评价 纳入国民经济和社会发展规划\n\n#### 报审协调\n\n#### 编制规划大纲\n\n#### 和工作计划\n\n#### 规划文本编制 布置基层任务\n\n#### 汇总审定规划草案\n\n#### 报批\n\n#### 规划定稿\n\n#### 备案\n\n#### 环境规划的工作程序\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n2.完成规划文本的编制\n环境现状调查与评价 国民经济和社会发展规划\n\n#### 弄清问题\n\n#### 环境规划由专门\n\n#### 环境预测 环保投资能力\n\n#### 组织的技术队伍\n\n#### 确定环境目标\n（规划编制组）承 确定环境目标\n\n#### 计算污染物产生量和削减量\n\n#### 担，这是规划编\n制的主要阶段， 调整产业结构与合理布局 提出污染防治方案和方案优化\n其编制技术要求 制定最小费用规划\n\n#### 超过\n\n#### 是否超过环保投资能力\n程序见右图。\n\n#### 否\n\n#### 是否达到环境目标要求\n\n#### 环境规划文本\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n2.规划的申报与审\n\n#### 批\n\n#### 规划的申报和审批过程是\n\n#### 沟通上下级认识、协调环保部\n\n#### 国民经济和社会发展\n门与其他部门之间关系的过程。\n\n#### 第十四个五年规划\n\n#### 是将规划方案变为实施方案并\n\n#### 和2035年远景目标纲要\n\n#### 纳入国民经济和社会发展规划\n的过程。是环境规划管理工作\n的一项重要制度。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n（1）规划初级申报和审核\n规划编制单位在规划基本编制完成后，将文本报送同级政府和\n上一级环境保护部门初审，同级政府在其职权范围内，可对方案进\n行决策、批准、驳回或提出修改意见；上级环境保护部门在收到申\n报文本后，进行初审，在与有关部门取得协商意见后，对申报文本\n批准或提出修改意见。\n规划的审批应在组织各行业专家进行评审和论证的基础上进行。\n\n#### 最新申报\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n（2）终级申报与审批\n下级环境保护部门在得到初审意见后，对规划进行修改、完\n善或重新编制。若认为初审意见不合理，可提出申辩，对规划进行\n修改或重新编制后，再次申报给同级政府审批和上一级环保部门备\n案。\n同级政府收到申报文本并确认符合要求后，应予迅速批准，\n并将批准后的环境规划付诸实施。在规划实施过程中，若出现新的\n重大问题，确需对环境规划的指标或内容进行补充修改时，必须报\n请原审批机关同意。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n（3）环境规划文本\n①技术档案文本：指将规划过程所收集的背景材料、调查或检\n测所采集的信息、规划编制过程的技术档案或记录进行整理而\n成的背景材料文本。\n②环境规划文本：系指正式的环境规划文本。它由环境规划\n管理部门管理，作为进行规划实施与管理的蓝本。\n③环境规划报审文本：这是正式的环境规划文本的缩编文本\n或简编文本，主要用于申报、审批。\n简编文本内容应包括：自然环境特点，经济和社会简况，前期环境规划\n（或计划）执行简况，规划要解决的主要环境问题，规划目标（时空限定），主要\n措施，主要工程项目及说明，投资预算及来源，主要困难及要求提供的条件等。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n#### 第二节 环境规划目标和指标体系\n一、环境规划目标\n·二、环境规划的指标体系\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 环境规划目标\n1.按环境目标的层次划分为：\n（1）总目标：规划区域环境质量所要达到的要求和状况。\n（2）单项目标：根据环境要素，环境功能和环境特征所确定的环境\n目标。\n（3）环境指标：体现环境目标对单一因子的要求。\n\n#### 力争2025年\n\n#### 森林覆盖率达到24.1%\n\n#### 林业草原保护 “十四五”\n\n#### 发展规划纲要\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n2.按规划内容划分为：\n（1）环境质量目标：表征自然环境要素的质量状况，如大气环境、\n水环境、生态环境质量目标等：\n（2）环境建设目标：反映环境改善程度；\n（3）污染控制目标：是对规划区内主要污染物在一定时空范围内\n的允许排放量所作的限定；\n（4）环境管理目标：环境规划的制订和实施要依靠科学的管理来\n进行，在环境规划编制中应包括组织、协调、监督等各项管理目标\n以及实施环境规划的措施等，例如环境影响评价、“三同时”执行率\n等。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n3.按规划时间划分为：\n短期、中期、长期目标，或具体划分为5年、10年、20年目标等。\n4.按规划空间划分为：\n国家、省（自治区）、城市县、经济区、流域环境目标等。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 环境规划指标体系\n\n#### 环境规划指标是指能直接反映环境\n对象及有关事物，用来共同描述环境规\n划目标内容的数量和质量的特征值。环\n境规划的指标体系则是由一系列相互独\n立、相互联系、相互补充的环境指标构\n\n#### CO2\n成的有机集合。\n\n#### 在环境规划与管理过程中，根据规\n划指标表征对象、作用及在环境规划中\n的重要性和相关性，通常把它们分为环\n境质量指标、污染物总量控制指标、环\n境规划措施与管理指标以及相关性指标。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n表1环境空气污染物基本项目浓度限值\n序号 污染物项目 平均时间 浓度限值 单位\n\n#### 一级 二级\n年平均 20 601 二氧化硫（SO） 24小时平均 50 1501小时平均 150 500 μg/m3\n年平均 40 402 二氧化氮（NO） 24小时平均 80 801小时平均 200 2003 一氧化碳（CO） 24小时平均 4 41小时平均 10 10 mg/m3\n日最大8小时平均 100 1604 臭氧（O） 1小时平均 160 200\n颗粒物（粒径小于等于10um） 年平均 40 705 24小时平均 50 150 μg/m3\n年平均 15 356 颗粒物（粒径小于等于2.5m） 24小时平均 35 75\n表2环境空气污染物其他项目浓度限值\n序号 污染物项目 平均时间 浓度限值 单位\n\n#### 一级 二级\n总悬浮颗粒物（TSP） 年平均 80 2001 24小时平均 120 300\n年平均 50 502 氮氧化物（NO） 24小时平均 100 1001小时平均 250 250 ug/m3\n铅（Pb） 年平均 0.5 0.53 季平均 1 1\n年平均 0.001 0.0014 苯并[a]花（BaP） 24小时平均 0.0025 0.0025\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n2.污染物总量控制指标\n污染物总量控制指标系根据一定地域的环境特点和容量\n来确定，其中又有容量总量控制和目标总量控制两种。\n容量总量控制体现环境的容量要求，是自然约束的反映；\n目标总量控制体现规划的目标要求，是人为约束的反映。\n我国现在执行的指标体系是将二者有机地结合起来，同时\n采用。包括如下：\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n（1）大气污染物宏观总量控制\n①大气污染物（SO2、烟尘、工业粉尘、NOx）总排放量；\n燃烧废气排放量、消烟除尘量；工艺废气排放量、消烟除尘\n量；工艺废气排放量、处理量、工业废气处理量、处理率；\n\n#### 新增废气处理能力\n②大气污染物（SO2、烟尘、工业粉\n\n#### 尘、NOx）去除量和去除率\n③锅炉数量、达标量、达标率；窑炉\n\n#### 数量、达标量、达标率\n④汽车数量、耗油量、NOx排放量\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n（2）水污染宏观总量控制\n①工业用水量和工业用水重复利用率，新鲜水用量\n②废水排放总量；工业废水总量、外排量；生活废水总量\n③工业废水处理量、处理率、达标率、处理回用量和回用率、处排工\n业废水达标量、达标率、新增工业废水处理能力、万元产值工业废水\n排放量。\n④废水中污染物（COD、BOD、重金属等）的产生量、排放量、去除\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n（3）工业固体废物宏观控制\n①工业固体废物（冶炼渣、粉煤灰、炉渣、煤研石、化工渣、尾矿和其他）\n产生量、处置量和处置率；堆存量，累计占地面积，占耕地面积、综合利用\n量、综合利用率；产品利用量、产值、利润；非产品利用量\n②危险废物产生量、处置量、处置率\n（4）乡镇环境保护规划\n①乡镇工业大气污染物排放（产生）量、治理量、治理率和\n\n#### 排放达标率\n②水污染物排放（产生）量、削减量、治理量和治理率排放\n\n#### 达标率\n③固体废物产生量，综合利用量、排放量等\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n3.环境规划措施与管理指标\n\n#### 环境规划措施与管理指标是\n首先达到污染物总量控制指标，\n\n#### 进而达到环境质量指标的支持性\n和保证性指标。这类指标有的由\n\n#### 环保部门规划与管理，有的则属\n于城市总体规划。但这类指标的\n\n#### 完成与否同环境质量的优劣密切\n相关，因而将其列入环境规划中。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n（1）城市环境综合整治\n·燃料气化；建成区居民总户数，使用气体燃料户数，城市气化率\n型煤：城市民用煤量，民用型煤普及率\n·集中供热：“三北”采暖建筑面积，集中供热面积，热化率，热电联\n\n#### 产供热量\n·烟尘控制区：建成区总面积，烟尘控制区面积及覆盖率\n·汽车尾气达标率\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n城市污水量、处理量、处理率、处理厂数及能力（一、二）级和处理量；\n氧化塘数、处理能力及处理量；污水排海量，土地处理量\n·地下水位、水位下降面积、区域水位降深；地面下沉面积、下沉量\n·工业固体废物集中处理厂数、能力、处理量\n·生活垃圾无害化处理量、处理率；机械化清运量、清运率；建成区人口、\n绿地面积、覆盖率；人均绿地面积\n（2）乡镇环境污染控制\n·污染严重的乡镇企业数，关、停、并、转和迁的数目\n?污灌水质\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n（3）水域环境保护\n·功能区：工业废水、生活污水、COD、氨氮纳入水量（湖泊总\n\n#### 磷、总氮纳入量）\n·监测断面：COD、BOD、DO、氨氮或达到地表水水质标准类\n\n#### 别\n（湖泊取COD、氮、磷）\n·海洋功能区划：工业废水和生活污水入海通量\n（4）重点污染源治理\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n（5）自然保护区建设与管理\n·重点保护的频危动植物物种和保存繁育基地数目、名称\n自然保护区类型、数量、面积、占国土面积百分比和新辟建的\n\n#### 自然保护区\n（6）环保投资\n?环保投资总额占国民收入的百分数\n环保投资占基本建设和更新改造资金的比例\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n4.相关性指标\n相关指标主要包括经济指标、社会指标和生态指标三类。\n相关指标大都包含在国民经济和社会发展规划中，都与环境指标有密\n切的联系，对环境质量有深刻影响，但又是环境规划所包容不了的。\n环境规划将其作为相关指标列入，以便更全面地衡量环境规划指标的\n科学性和可行性。对于区域来说，生态类指标也为环境规划所特别关注，\n它们在环境规划中将占有越来越重要的位置。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n4.相关性指标\n（1）经济指标\n国民生产总值：工、农业生产总值及年增长率；部门工业产值\n工业密度：单位占地面积企业数、产值\n（2）社会指标\n人口总量与自然增长率、分布、城市人口\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n（3）生态指标\n①森林覆盖率、人均森林资源量、造林面积\n②草原面积、产量（千克/公顷）、载畜量、人工草场面积\n③耕地保有量、人均量；污灌面积；农药化肥污染土壤面积\n④水资源：水资源总量、调控量、水资源流域面积、水利工程和地\n\n#### 下水开采\n水土流失面积、治理面积、减少流失量\n\n#### 土地沙化面积、沙化控制面积\n\n#### 土地盐渍化面积、改良复垦面积\n⑧农村能源、生物能源占能源的比重，薪柴林建设\n\n#### 9生态农业试点数量及类型\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n#### 第三节 环境评价和环境预测\n一、环境调查与评价\n二、环境预测\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n一、环境调查与评价\n环境调查与评价是环境规划的基础工作，其自的是为了全\n面了解规划区域环境质量现状，了解区域环境特征、环境容量\n和环境承载力，给区域环境质量作出合理的评价并发现区域存\n在的主要环境问题。同时，需要通过评价确定各环境问题的重\n要性和造成环境污染的主要污染源。\n环境调查与评价应特别重视污染源的调查与评价，并将污\n染源按污染物排放总量、“三废”超标排放情况进行排序，从而\n确定污染物总量控制的主要污染物和主要污染来源。\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n1.环境现状调查\n（1）环境信息采集的内容\n①先前的环境规划、计划及其基础资料；\n②统计部门历年的统计资料（经济、社会和环境方面）；\n③有关部门的规划和背景资料；\n④环境科研部门保管的文献资料；\n③环境监测部门的有关资料和历年的环境质量报告书；\n专家系统提供的信息情报；\n为规划编制或专门进行的实地考察、测试所得资料等。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n（2）环境信息采集的方法\n①查阅和收集公开发表的上述文献资料；\n②召开专家和管理干部座谈会，请他们\n撰写有关资料或通过信函调查采集信息；\n③吸收与环境规划有关部门的干部和专\n家参与环境规划编制；\n④依靠当地环境保护委员会或上级协调\n部门疏通信息渠道，取得有关文献和资料；\n·③设立规划研究课题，委托科研单位进\n行关键问题的研究或关键数据的测试、核 农林小气候信息采集系统\n算等。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n2.环境评价\n（1）自然环境评价：自然环境包括地质、气候、水文、植被、地形地貌、\n土壤、特殊价值地区及生态环境等。\n（2）经济、社会现状评价：在对社会调查基础上，开展包括生产力布局现\n状分析、生产力发展水平现状分析、社会人口状况分析、社会意识状况分析\n等内容的区域社会环境现状评价。\n（3）污染评价：突出重大工业污染源评价和污染源综合评价。根据污染类\n型通过单项评价，按污染物排放总量排队，确定主要污染物和主要污染源。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n二、环境预测\n1.环境预测的主要依据\n（1）规划区环境质量评价，是环境预测的基础工作和依据；\n（2）规划区社会经济发展目标；\n（3）城镇发展规划、区域发展规划及能源、交通、电力、水利、\n通讯等行业发展规划。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n2.环境预测的内容\n（1）社会发展和经济发展预测\n（2）污染产生与排放量预测；\n（3）环境质量预测；\n（4）生态环境预测；\n（5）环境容量和资源预测；\n（6）环境资源破坏和环境污染造成的经济损失预测。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n（1）社会发展和经济发展预测\n社会发展预测重点是人口数量预测。\n经济发展预测以经济系统与环境系统之间和系统内部的相互联\n系和变化为核心，重点是能源消耗预测、国民生产总\n值预测、工业总产值预测等，同时对经济布局与结构、交通和\n其他重大经济建设项目作必要的预测与分析。经济发展预测要\n注重选用社会和经济部门（特别是计划部门）的资料和结论。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n（2）污染产生与排放量预测\n污染物宏观总量预测的重点是确定合理的排污系数（如单位产\n品和万元工业产值排污量）和弹性系数（如工业废水排放量与工\n业产值的弹性系数），从而得到相应的污染物产生和排放量。\n主要包括：①大气污染物排放量预测；②废水排放量预测；\n③噪声和废渣污染预测；④农业污染源预测一一土地中农\n药、化肥施用量、积累量，粮食、菜、水果中农药含量；\n?环境污染治理和环保投资预测等。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n（3）环境质量预测\n根据污染物在环境中的扩散、\n迁移和转化规律及相关影响因素，\n\n#### 预测各类污染物在大气、水体、土\n\n#### 壤等环境要素中的总量、浓度及分\n\n#### 布，预测可能出现的新污染种类和\n数量。环境质量预测的要点是确定\n\n#### 排放源与汇之间的输入响应关系\n（剂量反应关系）。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n（4）生态环境预测\n预测主要生态指标的变化情况。主要内容包括：水资源合理开\n发利用情况，城市绿地面积及环境影响，土地利用现状及城市\n发展趋势等。预测分析的基本思路是，首先按原始运行（或无有\n力措施）的下主要生态指标的变化状况，再根据经济发展和城市\n建设规划预测分析主要生态指标的变化，然后综合分析各种状\n况可能引起的生态环境变化，为编制生态环境规划，调整城市\n建设总体规划提供依据。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n（5）环境容量和资源预测\n根据环境功能区划、环境质量标准和环境污染状况预测区\n域环境容量变化情况：根据产业结构和人口数量等因素预测区\n域内资源利用情况和资源支持能力。\n（6）环境资源破坏和环境污染造成的经济损失预测\n主要内容包括：资源不合理开发造成的经济损失；环境污\n染造成的经济损失；环境污染引起的人体健康损失。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 第四节 环境功能区划\n\n#### 、城市环境功能区\n二、环境空气功能区\n●三、地表水环境功能区\n四、声环境功能区\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n环境功能区划是指依据社会经济发展需要和地区在环境结构、环境\n状态和使用功能上的差异，对区域进行的合理划分。环境功能区是指对\n经济和社会发展起特定作用的区域或环境单元，常常是经济、社会与环\n境的综合性功能区。环境功能区划是对环境实现科学规划与管理的一项\n基础工作，它研究环境单元的承载力（环境容量）和环境质量现状的发展\n变化趋势，揭示人类活动与环境间的关系。环境功能不同，对环境质量\n要求和影响程度也不一样。因此，确定合理的环境功能区划，对具有不\n同功能的环境区域或环境单元分类管理，有针对性地制定环境保护目标，\n并分别采取环境保护对策，有利于科学地进行环境规划并提高规划的可\n操作性。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n一、城市环境功能区\n1.工业区 7.水源保护区\n2.居民区 8.文化教育区\n3.商业区 9.高新技术经济开发区\n4.机场、港口、车站等交通 10.农副产品生产基地\n枢纽区 11.污染物处理区（垃圾\n5.风景旅游或文化娱乐区 场、污水处理厂等）\n6.特殊历史纪念地 12.卫星城等。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n二、环境空气功能区\n按照我国《环境空气质量标准》（GB3095-2012）规定，将空气环\n境分为两类区：\n1.一类区为自然保护区、风景名胜区和其他需要特殊保护的区域；\n2.二类区为居住区、商业交通居民混合区、文化区、工业区和农村地\n区。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 中华人民共和国国家环境保护标准\n\n#### HJ522-2009\n地表水环境功能区类别代码 （试行)\nCodes for surface-water environmentalfunction zone categories\n\n---\n\n<!-- page 49 -->\n\n![page 49]
