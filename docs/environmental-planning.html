002-part02-绪论-环境规划与管理/page_121.jpg)  · 四环境规划与管理的理论基础\n- [p122](../002-part02-绪论-环境规划与管理/page_122.jpg)  · 四 环境规划与管理的理论基础\n- [p123](../002-part02-绪论-环境规划与管理/page_123.jpg)  · 四 环境规划与管理的理论基础\n- [p124](../002-part02-绪论-环境规划与管理/page_124.jpg)  · 四环境规划与管理的理论基础\n- [p125](../002-part02-绪论-环境规划与管理/page_125.jpg)  · 四环境规划与管理的理论基础\n- [p126](../002-part02-绪论-环境规划与管理/page_126.jpg)  · 四环境规划与管理的理论基础\n- [p127](../002-part02-绪论-环境规划与管理/page_127.jpg)  · 四环境规划与管理的理论基础\n- [p128](../002-part02-绪论-环境规划与管理/page_128.jpg)  · 四环境规划与管理的理论基础\n- [p129](../002-part02-绪论-环境规划与管理/page_129.jpg)  · 四环境规划与管理的理论基础\n\n<\/details>\n\n<details><summary>展开 129 页图文对照（每图配其识别文本）<\/summary>\n\n**p001** ![](../002-part02-绪论-环境规划与管理/page_001.jpg)\n\n环境规划与管理\n授课教师：王思雨副教授\n联系方式：\neswangsiyu@hotmail.com\n办公地点：生态与环境学院208办公室\n\n---\n\n**p002** ![](../002-part02-绪论-环境规划与管理/page_002.jpg)\n\n第一章\n概述\n第一节 环境规划与管理的基本概念\n第二节 环境规划与管理的产生和发展\n第三节 环境规划与管理的对象和内容\n第四节 环境规划与管理的理论基础\n\n---\n\n**p003** ![](../002-part02-绪论-环境规划与管理/page_003.jpg)\n\n课前回顾\n\n---\n\n**p004** ![](../002-part02-绪论-环境规划与管理/page_004.jpg)\n\n课前回顾\n1.环境管理的含义\n根据国内外学者的研究成果，要比较全面地理解环境管理的含义，应\n该意以下几个基本问题：\n第一，协调发展与环境的关系。\n第二，动用各种手段限制人类损害环境质量的行为。\n第三，环境管理是跨学科领域的新兴综合学科。\n第四，环境管理和任何管理活动一样，也是一个动态过程。\n第五，环境管理需要各国采取协调合作的行动。\n\n---\n\n**p005** ![](../002-part02-绪论-环境规划与管理/page_005.jpg)\n\n课前回顾\n2.环境规划的含义\n》环境规划是国民经济和社会发展的有机组成部分，是环境管理的首要职\n能，是环境决策在时间、空间上的具体安排，是规划管理者对一定时期\n内环境保护目标和措施作出的具体规定，是一种带有指令性的环境保护\n方案。\n》环境规划的目的是在发展经济的同时保护环境，使经济与社会协调发展。\n>环境规划的实质是一种克服人类经济社会活动和环境保护活动盲目和主\n观随意性的科学决策活动。\n\n---\n\n**p006** ![](../002-part02-绪论-环境规划与管理/page_006.jpg)\n\n课前回顾\n3.环境规划与管理的对象\n1.现代系统管理的“五要素论”\n>对于环境规划与管理，其研究对象也应包括人、物、资\n金、信息和时空5个方面：\n(1）人是第一个主要对象。\n(2）物也是重要研究对象。\n\n---\n\n**p007** ![](../002-part02-绪论-环境规划与管理/page_007.jpg)\n\n课前回顾\n3.环境规划与管理的对象\n（3）资金是系统赖以实现其目标的重要物质基础，也是规\n划与管理的研究对象。\n（4）信息是系统的“神经”，信息也是规划与管理的重要\n对象。\n（5）任何管理活动都是在一定的时空条件下进行的，环境\n规划与管理的一个突出特点是时空特性日益突出，则时\n空条件亦应成为重要的研究对象。\n\n---\n\n**p008** ![](../002-part02-绪论-环境规划与管理/page_008.jpg)\n\n课前回顾\n4. 环境规划与管理的手段\n1.行政手段\n根据国家行政法规所赋予的组织和指挥权力，对环境资源\n保护工作实施规划与管理\n2.法律手段\n是环境规划与管理的一种强制性手段\n3.经济手段\n是指利用价值规律，运用价格、税收、信贷等经济杠杆，\n充分发挥价值规律在环境管理过程的杠杆作用。\n\n---\n\n**p009** ![](../002-part02-绪论-环境规划与管理/page_009.jpg)\n\n课前回顾\n4.技术手段\n指借助那些既能提高生产率，又能把对环境污染和生态破坏\n控制到最小限度的工艺技术以及先进的污染治理技术等来达\n到保护环境目标的手段。\n5.宣传教育手段\n是环境管理不可缺少的手段。环境宣传既是普及环境科学知\n识，又是一种思想动员。\n\n---\n\n**p010** ![](../002-part02-绪论-环境规划与管理/page_010.jpg)\n\n课前回顾\n5.环境管理与环境规划的关系\n规划职能是环境管理的首要职能。\n2） 环境目标是环境规划与环境管理的共同核心。\n(3) 环境规划与管理具有共同的理论基础。\n\n---\n\n**p011** ![](../002-part02-绪论-环境规划与管理/page_011.jpg)\n\n课前回顾\n6.环境规划与管理的目的\n环境规划与管理的根本目的就是通过对可持续发展思想的传播，使人类社会\n的组织形式、运行机制以至管理部门和生产部门的决策、计划和个人的日\n常生活等各种活动，符合人与自然和谐相处的原则，并以制度、法律、体\n制和观念的形式体现出来，创建一种可持续的发展模式和消费模式\n\n---\n\n**p012** ![](../002-part02-绪论-环境规划与管理/page_012.jpg)\n\n课前回顾\n7.环境规划与管理的任务\n环境管理的基本任务应该是：转变人类社会的基本观念和\n调整人类社会的行为。\n环境文化的建设是环境规划与管理的一项长期的根本的任\n务。文化决定着人类的行为，只有转变了过去那种视环境\n为征服对象的文化，才能从根本上去解决环境问题。\n\n---\n\n**p013** ![](../002-part02-绪论-环境规划与管理/page_013.jpg)\n\n课前回顾\n人类的社会行为分为政府行为、市场行为和公众行为三种。\n》政府行为是总的国家的管理行为，诸如制定政策、法律、法令、发\n展计划并组织实施等；\n>市场行为是指各种市场主体包括企业和生产者个人在市场规律的支\n配下，进行商品生产和交换的行为；\n》公众行为则是指公众在日常生活中诸如消费、休闲和旅游等方面的\n行为。\n>这三种行为都可能会对环境产生不同程度的影响。\n\n---\n\n**p014** ![](../002-part02-绪论-环境规划与管理/page_014.jpg)\n\n课前回顾\n8.环境规划与管理的作用\n1.促进环境与经济、社会可持续发展\n2.保障环境保护活动纳入国民经济和社会发展计划\n3.实施环境政策、法规和制度的主要途径\n4.实现以较小的投资获取较佳的环境效益\n\n---\n\n**p015** ![](../002-part02-绪论-环境规划与管理/page_015.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之生态学理论\n生态文明建设之可持续发展原理\n生态文明建设之“两山论”原理\n生态文明建设之环境经济学原理\n生态文明建设之系统论原理\n生态文明建设之管理二重性原理\n\n---\n\n**p016** ![](../002-part02-绪论-环境规划与管理/page_016.jpg)\n\n四环境规划与管理的理论基础\n（2）计划类型\n由于人类活动的复杂性与多元性，计划的种类也十分复杂和多样。人\n们根据不同的背景、不同的需要编制出各种各样的计划，常见的分类\n方法见图表。\n分类原则 计划种类 分类原则 计划种类\n长期计划 政策\n按计划的时间界限划分 中期计划 按计划的范围划分 程序\n短期计划 方法\n战略计划\n按计划的约束力划 指令性计划\n按计划制定者层次划分 管理计划\n分 指导性计划\n作业计划\n经济发展计划\n综合计划\n按计划的对象划分 环境保护计划\n局部计划 按计划的性质划分\n土地利用计划\n项目计划 其他\n\n---\n\n**p017** ![](../002-part02-绪论-环境规划与管理/page_017.jpg)\n\n四环境规划与管理的理论基础\n美国环境学家米勒总结的生态学三定律是：\n生态学第一定律：任何行动都不是孤立的，对自然界的\n任何侵犯都具有无数效应，其中许多效应是不可逆的。该定\n律为哈定所提出，可称之为多效应原理或极限性原理；\n生态学第二定律：每一种事物无不与其他事物相互联系\n和相互交融。此定律可称为相互联系原理或生态链原理；\n生态学第三定律：我们生产的任何物质均不应对地球上\n自然的生物地球化循环有任何干扰。此定律可称之为勿干扰\n原理或生物多样性原理\n\n---\n\n**p018** ![](../002-part02-绪论-环境规划与管理/page_018.jpg)\n\n四五 环境规划与管理的理论基础\n我国生态学家马世骏先生提出了生态学五规律：相互制约和相\n互依赖的互生规律、相互补偿和相互协调的共生规律、物质循环转\n化的再生规律、相互适应与选择的协同化规律和物质输入输出的平\n衡规律。\n陈昌笃提出了六条生态学一般规律：物物相关、相生相克、能\n流物复、负载定额、协调稳定和时空有宜。\n\n---\n\n**p019** ![](../002-part02-绪论-环境规划与管理/page_019.jpg)\n\n四环境规划与管理的理论基础\n2012年11月，党的十八大从新的历史起点出发，做出“大力推\n进生态文明建设”的战略决策，从10个方面绘出生态文明建设的宏伟\n蓝图。建设生态文明，是关系人民福祉、关乎民族未来的长远大计。\n面对资源约束趋紧、环境污染严重、生态系统退化的严峻形势，必\n须树立尊重自然、顺应自然、保护自然的生态文明理念，把生态文\n明建设放在突出地位，融入经济建设、政治建设、文化建设、社会\n建设各方面和全过程，努力建设美丽中国，实现中华民族永续发展。\n\n---\n\n**p020** ![](../002-part02-绪论-环境规划与管理/page_020.jpg)\n\n四 环境规划与管理的理论基础\n生态系统的极限性原理：\n生态环境系统中的一切资源都是有限的，对于污染\n和破坏带来的影响，生态环境系统也只有一定限度\n的承受能力。\n如果超过这个限度，就会使自然系统失去平衡稳定\n的能力，引起质量上的衰退，并造成严重的后果。\n人类对环境资源的开发利用，必须维持自然资源的\n再生功能和环境质量的恢复能力，不充许超过生物\n圈的承载能力或容许极限。\n环境容量和环境承载力：\n在进行环境规划与管理时，根据极限性原理，对生态\n环境系统中各因素（水、气、土地等）的功能限度进\n行定义。\n\n---\n\n**p021** ![](../002-part02-绪论-环境规划与管理/page_021.jpg)\n\n四 环境规划与管理的理论基础\n1、环境容量\n环境容量是一个复杂的反映环境净化能力的量，其\n数值应能表征污染物在环境中的物理、化学变化及空\n间机械运动的性质。\n《环境科学大辞典》\n某环境单元给定环境功能区目标和环境质量目标下\n所充许承纳的污染物质的最大数量\n环境容量是反映生态平衡规律，污染物在自然环境\n中的迁移转化规律，以及生物与生态环境之间的物\n质能量交换规律的综合性指标\n环境容量是自然生态环境的基本属性之一，由自然\n生态环境特征和污染物质特征共同决定。\n\n---\n\n**p022** ![](../002-part02-绪论-环境规划与管理/page_022.jpg)\n\n四 环境规划与管理的理论基础\n1、环境容量\n环境容量值大小，与该环境单元本身的组成和结构\n有关，其变化具有明显的地带性规律和地区性差异\n环境容量的准确测量需要较长的研究、监测时间，\n在实际应用中通常采用简化的计算方式。\nM=K+R\n基本环境容量 可变环境容量\n/稀释容量 /自净容量\n由于环境容量的自净机制，可用环境浓度标准值与\n背景值之差，通过一定的输入输出关系转换成排放量，\n即以污染物的充许排放量作为环境容量。\n\n---\n\n**p023** ![](../002-part02-绪论-环境规划与管理/page_023.jpg)\n\n四 环境规划与管理的理论基础\n1、环境容量\nM=K+R\n基本环境容量 可变环境容量\n/稀释容量 /自净容量\n例如：水环境容量\n稀释容量：在给定水域的来水污染物浓度高于\n出水水质目标时，依靠稀释作用达到水质目标\n自净 所能承纳的污染物量\nK 自净容量：由于沉降、生化、吸附等物理、化\n稀释 学和生物作用，给定水域达到水质目标所能自\n净的污染物量\n\n---\n\n**p024** ![](../002-part02-绪论-环境规划与管理/page_024.jpg)\n\n四环境规划与管理的理论基础\n1、环境容量\n环境容量是一种环境资源，但随着社会的快速发展\n绝大部分地区的环境容量已经很小，许多地区污染排\n放量已经远远超过环境容量允许的排放量。\n基于环境容量进行区域污染物排放总量控制是目前较\n为通用的方法\n基于总量控制的城市环境整治规划的模式：\n根据污染源调查结果和已制定的社会经济发展规划，\n调用各种模型预测未来的环境质量；\n根据预测结果和已制定的环境目标，通过浓度、排\n放量转换关系计算环境容量；\n根据环境容量和污染物总削减量，最后得到综合治\n理方案。\n\n---\n\n**p025** ![](../002-part02-绪论-环境规划与管理/page_025.jpg)\n\n四环境规划与管理的理论基础\n1、环境容量\n1996年7月，第四次全国环境保护会议提出《国家环境保护“九五”计\n划和2010年远景目标》，明确“实施污染物排放总量控制计划”。\n1998年，《全国环境保护工作（1998-2002）纲要》，提出了“一控\n双达标” 全国主要污染物实施总量控制。\n2002年1月，《国家环境保护“十五”计划》，明确了“十五”期间努\n力完成控制污染物排放总量等三大任务。\n十一五环境保护规划：到2010年，二氧化硫和化学需氧量排放得到控\n制，重点地区和城市的环境质量有所改善，生态环境恶化趋势基本遏制。\n十二五环境保护规划：到2015年，主要污染物排放总量显著减少：城\n乡饮用水水源地环境安全得到有效保障，水质大幅提高；重金属污染得\n到有效控制，持久性有机污染物、危险化学品、危险废物等污染防治成\n效明显；城镇环境基础设施建设和运行水平得到提升。\n\n---\n\n**p026** ![](../002-part02-绪论-环境规划与管理/page_026.jpg)\n\n四环境规划与管理的理论基础\n1、环境容量\n环境容量应是一个系统性的、与人类社会行为息息\n相关的动态变化量。环境容量的概念表述了环境容纳\n污染物的能力，但这只是环境功能的一部分。\n除此之外，环境还为人类提供了生存和发展所必需\n的资源、能源，为人类提供各种精神财富和文化载体。\n环境对人类社会的支持作用远大于环境容量\n这一概念的内涵。\n\n---\n\n**p027** ![](../002-part02-绪论-环境规划与管理/page_027.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力：\n是指不破坏自然环境的情况下，自然环境能够承载和\n支撑的人类社会活动的强度和总量\n环境承载力原理：\n只有将人类社会各种生存和发展的活动的强度和总量，\n控制在自然环境的承载力范围之内，才能认为这种生存\n与发展活动才具有可持续性。环境承载力是判断一项人\n类活动是否对自然环境构成威胁或破坏的基本标准。\n\n---\n\n**p028** ![](../002-part02-绪论-环境规划与管理/page_028.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力是一个最低标准，是人类活动不能超过的\n界限，一旦超过这个界面，自然环境系统将发生不可\n逆转的破坏，进而对人类的健康生存和发展构成危害。\n科学地确定一个地区、城市\n的环境承载力，确定人类活\n动的环境限制底线，是环境\n管理最重要的基础工作之一\n\n---\n\n**p029** ![](../002-part02-绪论-环境规划与管理/page_029.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n环境承载力是环境系统固有功能的表现，它不仅与环\n境系统本身的结构有关，还与外界（人类社会经济活\n动）的输入输出有关。\n环境承载力的描述\nEBC = f(T,S,B)。 人类经济行为\n的规模与方向\n时间 空间\n\n---\n\n**p030** ![](../002-part02-绪论-环境规划与管理/page_030.jpg)\n\n四 环境规划与管理的理论基础\n2、环境承载力\n人类积极的环保行为可在一定程度上提高环境承载\n力。如人类通过优化自己的活动，可以提高某一区\n域的环境承载力，使其承载更多的人口和发展活动。\n人类可以通过修建污水处理厂，\n废弃物处理中心、绿色造林等\n生态环境保护和建设产业，进\n一步提高环境承载力。这是人\n类环境管理行为合理性的依据\n\n---\n\n**p031** ![](../002-part02-绪论-环境规划与管理/page_031.jpg)\n\n四环境规划与管理的理论基础\n2、环境承载力\n环境承载力指标体系\n环境系统与人类社会经济系统：物质、能量和信息的代谢，可以分为三部分指标：\n资源供给指标。如水资源、土地资源和生物资源的数量、质量和开发利用程度；\n社会影响指标。如经济总量、污染治理投资、公用设施水平和人口密度等；\n污染容纳指标。如污染物的排放量、绿化状况和污染物净化能力等。\n通过环境承载力指标体系，可以间接量化表达某一区域的环境承载量和环境承载力。\n\n---\n\n**p032** ![](../002-part02-绪论-环境规划与管理/page_032.jpg)\n\n四环境规划与管理的理论基础\n2、环境承载力\n环境承载力的特征\n客观性和主观性：客观性体现在一定时期和状态下的环境承载力\n是客观存在的，是可以衡量和评价的；主观性体现在人们对环境\n承载里的评价分析具有主观性。\n区域性和时间性：指不同时期、不同区域的环境承载力是不同的，\n相应的评价指标的选取和量化评价方法也应有所不同。\n动态性和可调控性：指其大小是随着时间、空间和生产力水平的\n变化而变化的。人类可以通过改变经济增长方式、提高技术水平\n等手段来提高区域环境承载力，使其向有利于人类的方向发展。\n\n---\n\n**p033** ![](../002-part02-绪论-环境规划与管理/page_033.jpg)\n\n四 环境规划与管理的理论基础\n环境容量与环境承载力的区别与联系\n环境容量 环境承载力\n区别\n是自然生态环境的基本属性之一 既不是纯粹描述自然环境特征的量\n也不是一个描述人类社会的量\n侧重反映环境系统的自然属性，即内 侧重体现和反映环境系统的社会属性，\n在的自然票赋和性质 即外在的社会票赋和性质\n联系\n在科学技术和社会关系发展的一定阶 一定时期、一定状态下的环境承载力\n段，环境容量具有相对的确定性、有 也是有限的，但可以通过人类环境保\n限性 护行为动态的、可调控的\n\n---\n\n**p034** ![](../002-part02-绪论-环境规划与管理/page_034.jpg)\n\n四环境规划与管理的理论基础\n生态系统的生态链原理\n所谓生态链原理系指按照生态学第二定律“每一种\n事物无不与其他事物相互联系和相互交融”的原理，模\n仿生态系统物质循环和能量流动的规律重构工业（产业）\n系统，推行循环经济模式，研究现代工业系统运行机制\n的耦合思想，是环境规划与管理的重要理论基础。\n1.工业生态学\n2.生态工业园\n\n---\n\n**p035** ![](../002-part02-绪论-环境规划与管理/page_035.jpg)\n\n四环境规划与管理的理论基础\n1、工业生态学\n（1）工业生态学的定义\n工业生态学是”人类在经济、文化和技术不断发展的前提下，\n有目的、合理地去探索和维护可持续发展的方法”，“要求不是孤立而\n是协调地看待产业系统与其周围环境的关系”。\n工业生态学又称产业生态学，是一门研究社会生产活动中自然\n资源从源、流到汇的全代谢过程、组织管理体制以及生产、消费、调\n控行为的动力学机制、控制论方法及其与生命支持系统相互关系的系\n统科学。\n\n---\n\n**p036** ![](../002-part02-绪论-环境规划与管理/page_036.jpg)\n\n四五 环境规划与管理的理论基础\n工业生态学实践者界定的工业的外延非常广泛，涵盖了人类的各种活动，\n其研究范围不仅仅局限在一个企业的围墙之内，而是扩展到人类生存和活动\n对地球造成的各种影响，包括社会对资源的利用，成为循环经济理论产生的\n基础。它认为工业系统中的物质、能源、信息的流动和储存不是孤立的简单\n叠加关系，而是像自然生态系统那样可以循环运行，他们之间相互依赖、相\n互作用、相互影响，形成复杂的、相互连接的网络系统。\n\n---\n\n**p037** ![](../002-part02-绪论-环境规划与管理/page_037.jpg)\n\n四环境规划与管理的理论基础\n工业生态学的思想包含了”从摇篮到坟墓”的全过程管理系统观，即在产\n品的整个生命周期内不应对环境和生态系统造成危害，产品生命周期包括原\n材料采掘、原材料生产、产品制造、产品使用以及产品用后处理。工业代谢\n分析和生命周期评价是目前工业生态学中普遍使用的有效方法。\n工业生态学以生态学的理论观点考察工业代谢过程，亦即从取自环境到\n返回环境的物质转化全过程，研究工业活动和生态环境的相互关系，以研究\n调整、改进当前工业生态链结构的原则和方法，建立新的物质闭路循环，使\n工业生态系统与生物圈兼容并持久生存下去。\n\n---\n\n**p038** ![](../002-part02-绪论-环境规划与管理/page_038.jpg)\n\n四环境规划与管理的理论基础\n（2）特征及趋势\n工业生态学领域开始社群化，目前已经出现了专注于物质流\n分析的分会和专注于生态工业发展的分会两大子群。发达国家占\n据工业生态学领域的主导地位，且欧、美、日三足鼎立的格局日\n益明显。其中，美国强于概念体系、理论构建和全球视野，欧洲\n强于大项自主导和系统实践，日本则精于刻画并看眼于亚洲视角。\n工业生态学的理论基础和学科体系仍然比较模糊，社会物质代谢\n和生态工业发展成为学科的主体构成，但前者偏于还原视角，后\n者理论建构不足。生态工业园区、城市代谢、节能减排与气候变\n化等都成为了工业生态学应用的热点领域，\n\n---\n\n**p039** ![](../002-part02-绪论-环境规划与管理/page_039.jpg)\n\n四环境规划与管理的理论基础\n2、生态工业园\n生态工业园是建立在一块固定地域上的由制造企业和服务企\n业形成的企业社区。在该社区内，各成员单位通过物流或能流传\n递等方式把不同工厂或企业连接起来，形成共享资源和互换副产\n品的产业共生组合，使一家工厂的废弃物或副产品成为另一家工\n厂的原料或能源，模拟自然系统，在产业系统中建立”生产者一消\n费者一分解者”的循环途径。并通过共同管理环境事宜和经济事宜\n来获取更大的环境效益、经济效益和社会效益。整个企业社区能\n获得比单个企业通过个体行为的最优化所能获得的效益之和更大\n的效益。\n\n---\n\n**p040** ![](../002-part02-绪论-环境规划与管理/page_040.jpg)\n\n四环境规划与管理的理论基础\n（2）生态工业园的建设实践\n一般认为，生态工业园的形是工业共生体，丹麦的卡伦堡共生\n体就是工业共生体的成功典范。卡伦堡生态工业园是世界上最早\n也是最著名的生态工业园，其主体企业是发电厂、炼油厂、制药\n厂、石膏板生产厂。以这4个企业为核心，通过贸易方式利用对方\n生产过程中产生的废弃物和副产品，不仅减少了废物产生量和处\n理的费用，还产生了较好的经济效益，形成了经济发展与环境保\n护的良性循环。这是生态工业园发展的形，也是工业生态学的\n第一次实践。\n\n---\n\n**p041** ![](../002-part02-绪论-环境规划与管理/page_041.jpg)\n\n四环境规划与管理的理论基础\n美国是世界上最为积极投身于生态工业园规划和建设的国家。\n在1994年，总统可持续发展理事会指定了4个社区作为生态工业\n园区的示范点，即马里兰州的巴尔的摩、弗吉尼亚州的查尔斯、\n德克萨斯州的布郎斯和田纳西州的恰塔努加。美国的生态工业园，\n涉及生物能源开发、废物处理、清洁工业、固体和液体废物的再\n循环等多种行业多个层次，并且各具特色。\n\n---\n\n**p042** ![](../002-part02-绪论-环境规划与管理/page_042.jpg)\n\n四环境规划与管理的理论基础\n我国的工业园区发展经历了三个阶段，其中第一代园区内主\n要以劳动密集型的”三来一补“型企业为主，技术含量低；第二代\n园区的企业以高新技术应用为特征；第三代园区则是生态工业园，\n其基本功能是解决经济、环境和社会三者协调发展问题。\n2001年8月，我国第一个国家级生态工业示范园区一广西贵\n港国家生态工业（制糖）示范园区由原国家环保总局授牌建设。之后，\n辽宁、江苏、山东、天津、新疆、内蒙古、注江、广东等省、直\n辖市、自治区分别开展了生态工业园区建设的试点，试点不仅覆\n盖制糖、造纸、化工、水泥、冶金等传统行业，也有电子、环保、\n汽车、生物化工等高科技行业\n\n---\n\n**p043** ![](../002-part02-绪论-环境规划与管理/page_043.jpg)\n\n四环境规划与管理的理论基础\n2003年12月国家环保总局把生态工业示范园区（生态工业园\n区）定义为依据清洁生产要求、循环经济理念和工业生态学原理\n而设计建立的一种新型工业园区。它通过物流或能流传递等方式\n把不同工厂或企业连接起来，形成共享资源和互换副产品的产业\n共生组合，使一家工厂的废弃物或副产品成为另一家工厂的原料\n或能源，模拟自然系统，在产业系统中建立“生产者一消费者一分\n解者”的循环途径。\n\n---\n\n**p044** ![](../002-part02-绪论-环境规划与管理/page_044.jpg)\n\n四 环境规划与管理的理论基础\n生物多样性原理 一与自然和谐相处的环境伦理观\n1、生命中心主义\n·生命中心主义的代表人物之一保罗?泰勒在《尊重自然》一\n书中写到：“采取尊重自然的态度，就是把地球自然生态\n系统中的野生动物看做是具有固有价值的东西。“根据他\n的意见，所谓”尊重自然”就是尊重”作为整体的生物共同\n体”，而尊重”生物共同体”就是承认构成共同体的每个动\n植物体的”固有的价值”。并认为，人类不是万物的中心，\n所有生命都应该受到尊重\n\n---\n\n**p045** ![](../002-part02-绪论-环境规划与管理/page_045.jpg)\n\n四 环境规划与管理的理论基础\n提出生命中心主义的环境伦理观，\n其目的是为了保护野生的动物，\n避免被人类伤害。由于人类在组\n成社会、进行生产和发展文化的\n过程中，已经具备了其他生物无\n与伦比的力量和优势，因此，只\n有从价值观上肯定野生动植物也\n像人一样具有它不可剥夺的“权\n利”与“价值”，才能避免人类对\n自然生物的进一步伤害，并使人\n类承担起对自然的伦理责任。\n\n---\n\n**p046** ![](../002-part02-绪论-环境规划与管理/page_046.jpg)\n\n四五 环境规划与管理的理论基础\n2、地球整体主义\n李奥波德提出”大地伦理”，是指”规范人与大地以及人与依存\n于大地的动植物之间关系的伦理规则”，其基本主张是要将人\n“从大地这一共同体的征服者转变成为这一共同体的平凡一员、\n一个构成要素”。\n“大地伦理”的特征是将”共同体”的概念从以往伦理学所研究的\n人类社会共同体的关系扩展到了大地。这里”大地”包括土壤、\n水、植物、动物等，其实是整个自然生态系统。\n\n---\n\n**p047** ![](../002-part02-绪论-环境规划与管理/page_047.jpg)\n\n四环境规划与管理的理论基础\n3、代际均等的环境伦理观\n与生命中心主义及地球整体主义不同，持这种观点的人的立场\n是以人类为中心的。\n它只考虑人类各成员的均等，而将自然环境和其他生命有机体\n看做是人类均等义务，最终都源于我们人类各成员相互间所应\n承担的义务。\n·这一伦理观不同于传统的伦理观之处，是它把人类各成员间的平\n等关系从“代内”扩展到”代际”，认为在享有自然资源与拥有良好\n的环境上，我们的子孙后代与我们当代人具有同等的权利。\n\n---\n\n**p048** ![](../002-part02-绪论-环境规划与管理/page_048.jpg)\n\n四 环境规划与管理的理论基础\n阅读材料一生物多样性\n①什么是生物多样性？\n生物多样性（biologicaldiversity）是指地球上的生物（包括\n动物、植物、微生物）在所有形式、层次和联合体中生命的多样\n化，包括生态系统多样性、物种多样性和基因多样性。生物多\n样性是地球上生命经过几十亿年发展进化的结果，是人类赖以\n生存的物质基础。\n\n---\n\n**p049** ![](../002-part02-绪论-环境规划与管理/page_049.jpg)\n\n四环境规划与管理的理论基础\n如果你学过生物学，你会知道这是一种研究有生命的物体的学科，\n从研究最微小的生命组成部分，到植物和动物。而”多样性”简单来说\n就是”各种各样”的意思。生物多样性包括所有自然世界的资源，包括\n植物、动物、昆虫、微生物和它们生存的生态系统。它同样包括构造\n出生命的重要基石一一染色体、基因和脱氧核糖核酸。\n你也是生物多样性的一部分。生物多样性使生命在这个行星上变\n得可能。没有生物多样性，你也不能在这个行星上生存。就算你可以\n生存下来，你也不可能喜欢这个灰暗的、无生气的、光秃秃的、无聊\n的世界。没有生物多样性，你不会感受到树林带给你的绿意、海洋带\n给你的蓝色，也不会有你呼吸的空气、吃的食物、喝的水。\n\n---\n\n**p050** ![](../002-part02-绪论-环境规划与管理/page_050.jpg)\n\n四环境规划与管理的理论基础\n②为什么生物多样性如此重要？\n生物多样性带给我们无尽美丽的自然世界。生物多样性可以帮\n助清洁我们呼吸的空气以及喝的水。人类还利用生物多样性得到了\n所需的全部食品、许多药物和工业原料。物种为人类提供了食物的\n来源，作为人类基本食物的农作物、家禽和家畜等均源自野生物种。\n野生物种是培育新品种不可缺少的原材料，特别是随着近代遗传工\n程的兴起和发展，物种的保存有着更深远的意义。物种是多种药物\n的来源，随着医学研究的深入，越来越多的物种被发现可作药用。\n\n---\n\n**p051** ![](../002-part02-绪论-环境规划与管理/page_051.jpg)\n\n四环境规划与管理的理论基础\n以上的例子是人们所熟知的直接价值，而间接价值也非同小可：\n物种多样性对科学技术的发展是不可或缺的。仿生学的发展离不开丰富\n而奇异的生物世界。生物多样性是维持生态系统相对平衡的必要条件，某（些）\n物种的消亡可能引起整个系统失衡甚至崩溃。\n生物多样性的间接价值主要与其功能有关：固定太阳能、调节水文、防\n止水土流失、调节气候、吸收分解污染物、贮存营养元素并促进养分循环和\n维持进化过程等方面都与生物多样性间接相关。许多自前认为无足轻重的物\n种，可能有着重要的价值。\n\n---\n\n**p052** ![](../002-part02-绪论-环境规划与管理/page_052.jpg)\n\n四环境规划与管理的理论基础\n③生物多样性现在的状况如何？\n地球上的生物种类非常丰富，自前科学家们估计现存的生物物\n种数量在870万种左右，其中包括777万种动物、29.8万种植物、\n61.1万种真菌、3.64万种原生动物和2.75万种藻类等。然而，这只\n是一个估计值，实际的物种数量可能会更多。不过经人类研究和加\n以利用的只是其中的一小部分。很多物种还没来得及定名就已灭绝。\n据估计，全球原始森林的面积仅占地球表面的2%左右。需要注\n意的是，原始森林的面积正在不断缩小，这对生物多样性和生态系\n统造成了严重威胁。无数的动植物在人类还没认识它们之前就随着\n原始森林的砍伐、污染、围湖填海等原因提前从地球上消失了。\n\n---\n\n**p053** ![](../002-part02-绪论-环境规划与管理/page_053.jpg)\n\n四环境规划与管理的理论基础\n不同类型的生态系统面积锐减，无法再现的基因、物种和生态系统正\n以前所未有的速度消失。如果不立即采取有效措施，人类将面临能否继续\n以其固有方式生活的挑战。生物多样性的研究、保护和持续合理利用待\n加强，刻不容缓。\n1994年12月29日，联合国大会49/119号决议案宣布12月29日为“国\n际生物多样性日”。从2001年起，根据第55届联合国大会第201号决议，\n国际生物多样性日由原来的每年12月29日改为5月22日。这个国际纪念日\n的确立，说明生物多样性问题已经引起各国政府的广泛关注。生物多样性\n保护与持续利用已成为人类与环境领域的中心议题。\n\n---\n\n**p054** ![](../002-part02-绪论-环境规划与管理/page_054.jpg)\n\n四环境规划与管理的理论基础\n④中国采取了哪些措施？\n中国是生物多样性特别丰富的国家，以高等植物为例，中国约有3万\n种，美国约1.8万种，整个欧洲仅1.2万种。\n由于中国是人口最多的国家，对生物多样性具有很大的依赖性。中国\n经济的高速发展和庞大的人口压力给生物多样性造成很大影响，致使中国\n成为生物多样性受到严重威胁的国家。在《濒危野生动植物种国际贸易公\n约》列出的640个世界性濒危物种中，中国就占了约25%，共156种，形\n势十分严峻。\n\n---\n\n**p055** ![](../002-part02-绪论-环境规划与管理/page_055.jpg)\n\n四环境规划与管理的理论基础\n截止到1995年末，全国已建成各级各类自然保护区799处，面\n积达7185万hm2，约占国土面积的7.48%，其中10处自然保护区\n加入”人与生物圈保护网络”，6处被列入《国际重要湿地名录》。到\n1995年底，全国建立珍稀濒危物种繁育基地200多处，国家濒危物\n种进出口管理中心在全国主要口岸城市设立了17个办事处。\n同时还组织实施了对大熊猫、朱、扬子鳄、海南坡鹿、野马、\n麋鹿、高鼻羚羊的”七大拯救工程”。\n面对全国范围内的生物物种危机，这些努力无疑是远远不够的，\n还需要全体国民的重视和对物种栖息地的持续改善\n\n---\n\n**p056** ![](../002-part02-绪论-环境规划与管理/page_056.jpg)\n\n四 环境规划与管理的理论基础\n我们可以做些什么？\n作为普通公民，我们能为生物\n多样性保护做些什么呢？\n最显而易见的是反对、监督、\n制止偷猎、采摘珍稀野生动植物的\n行为，让野生动植物远离我们的餐\n桌。穿着野生动物皮毛服装也是我\n们反对的行为。同时，在发展生产\n的同时，尽可能保护野生动植物的\n栖息地。\n\n---\n\n**p057** ![](../002-part02-绪论-环境规划与管理/page_057.jpg)\n\n四 环境规划与管理的理论基础\n生态文明建设之可持续发展理论\n一、可持续发展的定义\n二、可持续发展的原则\n三、可持续发展研究的主要内容\n\n---\n\n**p058** ![](../002-part02-绪论-环境规划与管理/page_058.jpg)\n\n四环境规划与管理的理论基础\n1、可持续发展的定义\n1987年，在《我们共同的未来》报告中正式使用了“可持续发\n展”的概念，即”既能满足当代人的需要，又不对后代人满足其需要\n的能力构成危害的发展”。\n1992年6月联合国环境与发展会议通过了以可持续发展为核心\n的《里约环境与发展宣言》和《21世纪议程》等重要文件。\n1994年3月，国务院第16次常务会议讨论通过了《中国21世纪\n议程-中国21世纪人口、环境与发展白皮书》，首次把可持续发展战\n略纳入我国经济和社会发展的长远规划。\n1997年把可持续发展战略确定为我国”现代化建设中必须实施\n的战略，与科教兴国战略一起被确定为中国走向21世纪的两大国家\n战略\n\n---\n\n**p059** ![](../002-part02-绪论-环境规划与管理/page_059.jpg)\n\n四环境规划与管理的理论基础\n可持续发展包含需要和限制两层含义，需要是指世界各国人们\n的基本需要，应将此放在特别优先的地位来考虑；限制是指当前的\n技术状况和社会组织对环境满足现在和将来需要的能力施加的限制\n可持续发展理论的形成是以唯物史观为基础的，其直接目的是\n解决生态恶化的困境，寻求克服传统发展模式对生态环境产生负面\n影响的有效途径。可持续发展理论强调把环境保护作为发展进程的\n一个重要组成部分，作为衡量发展质量、发展水平和发展程度的客\n观标准之一。注重环境与经济的协调，人与自然的和谐，认为健康\n的经济发展应建立在生态可持续、社会公正和人民积极参与自身发\n展决策的基础上。\n\n---\n\n**p060** ![](../002-part02-绪论-环境规划与管理/page_060.jpg)\n\n四 环境规划与管理的理论基础\n2、可持续发展的原则\n1.协调原则：社会、经济、环境。\n2.公平原则：自然资源、社会财富\n3.持续原则：当前利益、长远利益\n4.共同原则：协调、公平、持续。\n\n---\n\n**p061** ![](../002-part02-绪论-环境规划与管理/page_061.jpg)\n\n四环境规划与管理的理论基础\n3、可持续发展的主要内容\n1.环境保护与可持续发展\n环境保护是可持续发展的重要方面；可持续发展的核心是发\n展，但要求在严格控制人口、提高人口素质和保护环境、资\n源永续利用的前提下进行经济和社会的发展。环境保护是区\n分可持续发展与传统发展的分水岭和试金石\n现代发展不仅满足于物质和精神消费，还把建设舒适、安全、\n清洁、优美的环境作为实现的重要目标。可持续发展把环境\n保护作为衡量发展质量、发展水平和发展程度的客观标准之\n\n---\n\n**p062** ![](../002-part02-绪论-环境规划与管理/page_062.jpg)\n\n四环境规划与管理的理论基础\n可持续发展要求加快环保新技术研制和普及，只有大量使用\n先进科技才能使单位生产量的能耗、物耗大幅度下降，减轻\n环境的污染负荷。环境保护是可持续发展进程的一个部分，\n可持续发展非常重视环境保护，把环境保护作为它积极追求\n实现的最基本的目的之一。\n可持续发展一方面要求人们在生产时少投入，多产出；另一\n方面要求人们消费时尽可能多利用，少排放。因此，我们必\n须纠正过去单纯靠增加投入、加大消耗实现发展和以牺牲环\n境来增加产出的做法，从而使发展更少的依赖有限的资源，\n更多的与环境容量有机的协调\n\n---\n\n**p063** ![](../002-part02-绪论-环境规划与管理/page_063.jpg)\n\n八 环境规划与管理的理论基础\n2.经济与可持续发展\n人类要走可持续发展之路，经济系统的生态化是必由之路。\n经济生态化核心是经济系统向自然生态系统有选择性的学习\n重新定位经济系统，保持经济系统索取和资源环境供给之间\n协调，经济系统废弃物排放和环境承载力协调。\n构建循环型经济，更是可持续发展的工具和钥匙。\n\n---\n\n**p064** ![](../002-part02-绪论-环境规划与管理/page_064.jpg)\n\n四环境规划与管理的理论基础\n3.社会与可持续发展\n对人口资源的正确估计是可持续发展战略考虑的前提\n之一。要考虑人口的绝对数量与粮食问题、人口老化\n及养老保障、城市化带来的农业人口过剩、妇女问题\n和社会分工、人口素质、教育和社会结构的完善、人\n口信息的开发与利用及家庭结构问题。另外灾害防治\n和环境法制的研究也是可持续发展的重要方面。\n\n---\n\n**p065** ![](../002-part02-绪论-环境规划与管理/page_065.jpg)\n\n四 环境规划与管理的理论基础\n社会发展要和谐发展，和谐发展的核心是科学发展观，即”坚持以\n人为本，树立全面、协调、可持续的发展观，促进经济社会和人\n的全面发展”和”统筹城乡发展、统筹区域发展、统筹经济社会发\n展、统筹人与自然发展、统筹国内发展与对外开放的要求”。和谐\n发展强调”各明其位”、“各得其所”和“各尽所能”。\n\n---\n\n**p066** ![](../002-part02-绪论-环境规划与管理/page_066.jpg)\n\n四环境规划与管理的理论基础\n4.区域的可持续发展\n区域可持续发展的核心就是经济增长点。\n首先其规模应相对地大，才能产生充分的直接效应和间接效\n应;\n其次，应当是增长最快的产业和地区；\n第三，应同其他产业部门之间具有高强度的投入产出关系，\n能够是增长效应被传递分散；\n第四，它应是创新的”朝阳式”产业或企业。新经济增长点\n的作用已被中国经济发展的实际所证实。\n\n---\n\n**p067** ![](../002-part02-绪论-环境规划与管理/page_067.jpg)\n\n四 环境规划与管理的理论基础\n可持续发展的基本思想\n（1）可持续发展并不否定经济增长，尤其\n是不能否定欠发达国家的经济增长，但需\n要重新审视如何实现经济增长\n·经济增长一一主要指GNP或GDP增长是\n一种数量上扩大的范式；\n\n---\n\n**p068** ![](../002-part02-绪论-环境规划与管理/page_068.jpg)\n\n四环境规划与管理的理论基础\n必须正确认识GDP的数量和质量\n·GDP的局限性：不能反映社会成本、社会分配和社会公正\n资源环境代价；不能衡量经济增长的效率、效益和质量\n5岁以下要儿死亡率的下降%） 成人识字率变化(%)\n预期寿命变化（%)\n人均GDP变化(%) 20 人均GDP变化（%) 人均GDP变化（%)\n数据：133个国家（1970-2002年），作者计算\n·只注重经济总量和速度的增长，而不顾资源损失、环境污染、生态破坏，\n有可能造成经济增长了，人民生活质量（HDI）却下降了的局面，经济也不能\n持续增长。\n\n---\n\n**p069** ![](../002-part02-绪论-环境规划与管理/page_069.jpg)\n\n四 环境规划与管理的理论基础\n可持续发展的基本思想\n（2）以提高生活质量为目标，同社会进步相适应\n(3) 承认自然环境的价值，而且这种价值不仅体现在\n环境对经济系统的支撑和服务价值上，也体现在环\n境对生命支持系统的不可缺少的存在价值上\n（4）以自然资源为基础、同环境承载能力相协调\n\"可持续性”可以通过适当的经济手段、技术措施\n和政府干预得以实现\n目的是减少自然资源的耗竭速率，使之低于资源再\n生速率\n\n---\n\n**p070** ![](../002-part02-绪论-环境规划与管理/page_070.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之”两山论“原理\n一、“两山论\"的含义\n二、“两山论\"的发展和生态文明思想\n\n---\n\n**p071** ![](../002-part02-绪论-环境规划与管理/page_071.jpg)\n\n四 环境规划与管理的理论基础\n生态文明建设之”两山论“原理\n习近平总书记多次强调“绿水青山就是金山银山”，\n更进一步指出“树立正确的政绩观，不能只要金山银\n山，不要绿水青山”。“绿水青山就是金山银山\"已经\n成为习近平生态文明思想的重要组成部分，对我国生\n态环境和经济发展产生了深远的影响。\n\n---\n\n**p072** ![](../002-part02-绪论-环境规划与管理/page_072.jpg)\n\n四 环境规划与管理的理论基础\n发展历程\n2005年8月 2013年月 2015年月\n时任浙江省委书 习总书记提出两山论三个阶段 《关于加快推进生态\n记的习近平同志 1.既要绿水青山，也要金山银 文明建设的意见》将\n在浙江安吉考察 山。 “坚持绿水青山就是\n时提出：“绿水 2.宁要绿水青山，不要金山银 金山银山”写进了中\n青山就是金山银 山。 央文件，成为中国生\n山\"的科学论断。 3.绿水青山就是金山银山。 态文明建设的指导思\n想。\n\n---\n\n**p073** ![](../002-part02-绪论-环境规划与管理/page_073.jpg)\n\n四 环境规划与管理的理论基础\n2016年月 2017年10月 2018年月\n联合国环境大会发布 习总书记在全国生态环\n十九大将其写入党代会报告\n了《绿水青山就是金 保大会上提出了六项重\n同时《中国共产党章程（修\n山银山：中国生态文 要原则，其中两山论就\n正案）》在总纲中也增加了\n明战略行动》，为世 是六大重要原则之一，\n两山论这一表述，称为我党\n界可持续发展理念提 为我国生态文明建设指\n的重要执政理念之一。\n供了“中国方案”。 明了方向。\n\n---\n\n**p074** ![](../002-part02-绪论-环境规划与管理/page_074.jpg)\n\n四 环境规划与管理的理论基础\n2016年月 2017年10月 2018年月\n联合国环境大会发布 习总书记在全国生态环\n十九大将其写入党代会报告\n了《绿水青山就是金 保大会上提出了六项重\n同时《中国共产党章程（修\n山银山：中国生态文 要原则，其中两山论就\n正案）》在总纲中也增加了\n明战略行动》，为世 是六大重要原则之一，\n两山论这一表述，称为我党\n界可持续发展理念提 为我国生态文明建设指\n的重要执政理念之一。\n供了“中国方案”。 明了方向。\n\n---\n\n**p075** ![](../002-part02-绪论-环境规划与管理/page_075.jpg)\n\n四 环境规划与管理的理论基础\n2019年6月 2020年03月\n中国的发展绝不会以牺牲环境为代 绿水青山就是金山银山”理念已\n价。我们将秉持绿水青山就是金山 成为全党全社会的共识和行动，成\n银山的发展理念，坚决打赢蓝天、 为新发展理念的重要组成部分。实\n碧水、净土三大保卫战，鼓励发展 践证明，经济发展不能以破坏生态\n绿水环保产业，大力发展可再生能 为代价，生态本身就是经济，保护\n源，促进资源节约和循环利用。 生态就是发展生产力。\n\n---\n\n**p076** ![](../002-part02-绪论-环境规划与管理/page_076.jpg)\n\n四环境规划与管理的理论基础\n绿水青山就是金山银山\n绿水青山 指的是结构和功能良好的生态系统。\n金山银山：指的是满足人类需求的各种财富和福社。\n人类生态系统是人与自然相互依存、相互影响的有机整体，维持人与自\n然和谐健康发展的基本导向是以人的福社为目标，而人的福社既包含了对物\n质财富和精神财富的需求，也包含了对良好生态环境的需求。\n\n---\n\n**p077** ![](../002-part02-绪论-环境规划与管理/page_077.jpg)\n\n四 环境规划与管理的理论基础\n绿水青山就是金山银山\n生动诠释了生态经济的自然资本观\n“绿水青山\"是支撑人类发展的基础，不仅 习近平总书记这样论述\n绿水青山就是\n为人类提供各种物质原料，还创造与维持 金山银山\n了地球生命支持系统，具有重要生态价\n值。\n习近平论大力推进生态文明建设\n如果将生态系统转化为生态经济优势，\n自然资本将会成为国家财富的重要组成\n部分，绿水青山就变成了金山银山。\n\n---\n\n**p078** ![](../002-part02-绪论-环境规划与管理/page_078.jpg)\n\n四 环境规划与管理的理论基础\n绿水青山就是金山银山\n绿水青山就是金山银山 生态文明\n本质 核心思想 核心 根本问题\n回答什么是绿 实现经济发展与 正确处理好经济\n人与自然\n色发展，怎样 生态环境保护互 发展和生态环境\n和谐共处。\n实现绿色发展。 动双赢。 保护的关系。\n\n---\n\n**p079** ![](../002-part02-绪论-环境规划与管理/page_079.jpg)\n\n四环境规划与管理的理论基础\n科学内涵\n“两山?理论所蕴含的绿色发展新理\n念，人类的发展不仅要发展好经济而\n且要保护好生态环境，要努力做到在\n发展经济的同时保护好生态环境，在\n保护生态环境的同时发展好经济。\n\n---\n\n**p080** ![](../002-part02-绪论-环境规划与管理/page_080.jpg)\n\n四环境规划与管理的理论基础\n探索和实践\n党的十八大以来，生态文明建设纳入中国特色\n绿水青山代星\n社会主义“五位一体”总体布局和“四个全面”战略布\n金银山\n局，实行最严格的生态环境保护制度，着力将生态\n文明建设纳入制度化、法制化轨道，使得生态文明\n理念日趋深入人心，绿色发展理念一步步转化为各\n地各部门的切实行动。各地响应号召进行了创新生\n态治理、加强生态文明的探索实践。\n\n---\n\n**p081** ![](../002-part02-绪论-环境规划与管理/page_081.jpg)\n\n四 环境规划与管理的理论基础\n黑河\n以“生态发展”带动“绿色崛起”\n1.开展自然生态修复工作 2.改善环保基础设 3.创造生态产业\n施设备，探索农村 打造绿色增长极。\n生态文明建设，积\n极开展生态乡镇、\n生态村建设。\n\n---\n\n**p082** ![](../002-part02-绪论-环境规划与管理/page_082.jpg)\n\n四 环境规划与管理的理论基础\n福建长汀\n稳步推进水土治理，提升农民收入\n坚持把水土流失治理 因地制宜、分类实施、 水土流失治理与提\n放在突出的战略地位 科学规划、科学治理 升百姓收入同行。\n\n---\n\n**p083** ![](../002-part02-绪论-环境规划与管理/page_083.jpg)\n\n四 环境规划与管理的理论基础\n海南海口\n围绕大环保”模式多措并举走可持续发展之路\n海绵城市示意图\n雨水花园\n构建“大环保”管 多管齐下改善空 用“海绵城市”理念\n理模式，建立完善 气土壤质量，加 治理内河，重视保护\n生态环保机制。 大环境执法力度 湿地生物多样性。\n\n---\n\n**p084** ![](../002-part02-绪论-环境规划与管理/page_084.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之复合生态系统论原理\n一、复合生态系统的功能\n二、复合生态系统的内部矛盾\n三、复合生态系统理论在环境规划与管理中的应用\n\n---\n\n**p085** ![](../002-part02-绪论-环境规划与管理/page_085.jpg)\n\n环境规划与管理的理论基础\n自然子\n·生物和环境\n系统 ·自然物质基础\n复合生态系统：在\n社会子 ·人、产业、社会组织等\n一定空间内生物群落\n·稳定、优质的生活是全\n与非生命环境相互作 系统\n用的统一体。 人类的共同追求\n·产品的供需平衡、资金\n经济子 积累的速率与利润等\n系统 ·社会进步和环境保护的\n必要条件\n\n---\n\n**p086** ![](../002-part02-绪论-环境规划与管理/page_086.jpg)\n\n四环境规划与管理的理论基础\n复合生态系统的功能\n生产 ·为社会提供丰富的物质和信息产品\n·人类提高了自然的生产力，但同时也产出了对自然\n无用甚至有害的产品\n生活 ·为人们提供方便的生活条件和舒适的栖息环境\n·人类不断改善自己的生活水平，但产生的环境问题，\n也给人类生活带来了负面影响\n还原 ·保证畅想自然资源的永续利用和社会、经济、环境\n的协调持续发展\n·这一功能保证了生产和生活两个功能的持续\n·利用生物与生物、生物与环境之间的信息传递为人\n信息传递\n类服务\n·应用现代科学技术，操纵生物的活动\n\n---\n\n**p087** ![](../002-part02-绪论-环境规划与管理/page_087.jpg)\n\n四 环境规划与管理的理论基础\n生产污染\n科技 景观\n通讯 金融 资源利用 植物 能源\n工业 经济系统 贸易 水体 自然系统 矿产\n农业 运输 管理 土地 动物\n决策\n建筑 大气\n人\n类 环\n劳 品 服务 活\n动 境\n旅游 教育 影\n力\n居住 社会系统 文娱 响\n能流和物流\n饮食 医疗 信息流\n供应\n\n---\n\n**p088** ![](../002-part02-绪论-环境规划与管理/page_088.jpg)\n\n四 环境规划与管理的理论基础\n复合生态系统的内部矛盾\n1.要求自然环境相对稳定而实际剧变\n2.自然环境改变的快速性和恢复调节的缓慢性\n人类改造自然的能力越来越强，但恢复\n调节本领还不够\n3.资源有限而人类需求无限；\n4.地球体积、物质有限而人口增长无限；\n需要进行环境规划与管理\n\n---\n\n**p089** ![](../002-part02-绪论-环境规划与管理/page_089.jpg)\n\n环境规划与管理的理论基础\n复合生态系统理论在环境规划与管理中的应用\n不要将现有环境当作纯碎自然环境来规划与管理\n规划要以生态为导向，注重生态保护。\n规划中要注重社会、经济因素，应根据社会经济发\n展变化而相应地调整\n一 复合生态系统中，最活跃的积极因素是人，最强烈\n的破坏因素也是人。\n一复合生态系统是一类特殊的人工生态系统，兼有复\n杂的社会属性和自然属性两方面的内容。\n\n---\n\n**p090** ![](../002-part02-绪论-环境规划与管理/page_090.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之经济学原理\n一、环境经济学的基本观念\n二、环境经济学的基本理论和方法\n\n---\n\n**p091** ![](../002-part02-绪论-环境规划与管理/page_091.jpg)\n\n四环境规划与管理的理论基础\n环境规划与管理的任务是协调环境保护和经济建设的同\n步发展，实现经济效益、社会效益和环境效益的统一。环境\n问题实质上是一个经济问题。为了增强综合国力和提高人民\n生活水平，我国必须实现持续的经济增长，同时又不能破坏\n经济发展所依赖的资源和环境基础。因此，资源、环境和经\n济政策必须相辅相成。随看我国向社会主义市场经济体制的\n转变，在政府的宏观调控下，市场经济机制在规范对环境的\n态度和行为方面将起到越来越重要的作用，经济杠杆作用在\n强化环境管理过程中，也将发挥日益重要的作用。\n\n---\n\n**p092** ![](../002-part02-绪论-环境规划与管理/page_092.jpg)\n\n四 环境规划与管理的理论基础\n环境经济学就是研究合理调节人与自然之间的物质变换，使\n社会经济活动符合自然生态平衡和物质循环规律，不仅能取得近\n期的直接效果，又能取得远期的间接效果。\n建立可持续发展的经济体系、社会体系和保持与之相适应的\n可持续利用的资源和环境基础，是环境经济学研究的主要任务。\nGREEN\n\n---\n\n**p093** ![](../002-part02-绪论-环境规划与管理/page_093.jpg)\n\n四环境规划与管理的理论基础\n（1）环境经济学的基本理论\n为了保障环境资源的持续利用，也必须改变对环境资源无偿\n使用的状况，对环境资源进行计量，实行有偿使用，使社会不经\n济性内在化，使经济活动的环境效应能以经济信息的形式反馈到\n国民经济核算体系中，保证经济决策既考虑直接的近期效果，又\n考虑间接的长远效果，促进经济发展符合自然生态规律的要求。\n具体包括环境经济学理论在可持续发展条件下的修正和应用，完\n善国民经济核算体系，环境资源价值评估等。\n\n---\n\n**p094** ![](../002-part02-绪论-环境规划与管理/page_094.jpg)\n\n四环境规划与管理的理论基础\n（2）社会生产力的合理组织\n合理开发和利用资源，合理规划和组织社会生产力，是保护\n环境最根本、最有效的措施。为此必须以科学发展观为指导，改\n变单纯以GDP衡量经济发展成就的传统方法，把环境质量的改善\n作为经济发展成就的重要内容，使生产和消费的决策同生态学的\n要求协调一致；要研究把环境保护纳入经济发展计划的方法，保\n证基本生产部门和消除污染部门按比例地协调发展；要研究生产\n布局和环境保护的关系，按照经济观点和生态观点相统一的原则，\n拟定各类资源开发利用方案，确定国家或地区的产业结构，以及\n社会生产力的合理布局。\n\n---\n\n**p095** ![](../002-part02-绪论-环境规划与管理/page_095.jpg)\n\n四 环境规划与管理的理论基础\n（3）环境保护的经济效果\n包括环境污染、生态失调的经济\n损失估价的理论和方法，各种生产生\n活废弃物最优治理和利用途径的经济\n循环\n选择，区域环境污染综合防治优化方 经济\n案的经济分析，各种污染物排放标准\n确定的经济准则，各类环境经济数学\n模型的建立等。\n\n---\n\n**p096** ![](../002-part02-绪论-环境规划与管理/page_096.jpg)\n\n四 环境规划与管理的理论基础\n（4）运用经济手段进行环境管理\n经济手段在环境管理中是与行政、法律、教育手段相互配合使用的一\n种方法。它通过税收、财政、信贷等经济杠杆，调节经济活动与环境保护\n之间的关系、污染者与受污染者之间的关系，促使企业和个人的生产和消\n费方式符合可持续发展的需要。当前，更应加强对市场经济条件下环境经\n济政策的研究，建立适合中国国情的环境税收制度、资源有偿使用制度和\n资源定价政策，依靠价值规律和供求关系来强化环境规划与管理。\n环保 创新\n可持续\n实在\n\n---\n\n**p097** ![](../002-part02-绪论-环境规划与管理/page_097.jpg)\n\n四环境规划与管理的理论基础\n2、环境经济学的基本理论与方法\n1.基本理论\n（1）经济效率理论\n意大利社会学家、经济学家帕累托在20\n世纪初从经济学理论出发探讨资源配置\n效率问题，提出了著名的”帕累托最适 v381234191/?vdsource=024b2\n度“理论。 3e8a203cda77162896ddf36a118\n经济效率理论认为，经济效率应该是社会\n经济效率，既不是传统生产力理论中的”产\n出最大化”，也不是传统消费者理论中的\n效用最大化”，而应寻求个人、集体和社\n会之间经济效率的协调与统一。\n\n---\n\n**p098** ![](../002-part02-绪论-环境规划与管理/page_098.jpg)\n\n四环境规划与管理的理论基础\n（2）外部性理论\n价格 MSC\n由马歇尔提出，经庇古等学者深入研究 MC\n后形成的外部性理论，为环境经济学的\n建立和发展奠定了理论基础。分为正外 MEC\n部性（或称外部经济）和负外部性（或 D\n称外部不经济）。 Q1Q 上游林木欧伐量\n图1上游林木砍伐的负外部效应\n·外部性理论认为，在没有市场力的作用下，\n外部性表现为财经独立的两个经济单位（如 价格 MSB\n公司和消费者）的相互作用。并应用一般均\n衡分析法，分析环境问题产生的经济根源， MC\n即生产和消费的外部性和它的影响范围，提\n出解决环境污染这个外部不经济性问题的各\nQ Q1 造林水平\n种方法。 图2上游植树造林的正外部效应\n\n---\n\n**p099** ![](../002-part02-绪论-环境规划与管理/page_099.jpg)\n\n四环境规划与管理的理论基础\n(1）外部经济性(效益，正)\n口环境质量改善；\n口生态系统功能与价值的恢复与提高；\n口提高人体健康水平（或降低健康风险）；\n口资产增值和美学景观享受等。\n(2）外部不经济性（费用，负）\n口环境污染\n口生态破坏（退化）等。\n\n---\n\n**p100** ![](../002-part02-绪论-环境规划与管理/page_100.jpg)\n\n四 环境规划与管理的理论基础\n（3）物质平衡理论\n在20世纪60年代中期，鲍尔丁依据热力学定律，提出了一个最基本的环\n境经济学问题：环境与经济相互作用关系问题。他指出，首先，根据热力学\n第一定律，生产和消费过程产生的废弃物，其物质形态并没有消失，必然存\n在于物质系统之中，因此，在规划经济活动时，必须同时考虑环境吸纳废弃\n物的容量；第二，虽然回收利用可以减少对环境容量的压力，但是根据热力\n学第二定律，不断增加的熵意味着100%的回收利用是不可能的。\n\n---\n\n**p101** ![](../002-part02-绪论-环境规划与管理/page_101.jpg)\n\n四 环境规划与管理的理论基础\n·物质平衡理论的一个现代经济系统由物质加工、能量转换、污染物处理和\n最终消费四个部门（或部分）组成。在这四个部门之间及由这四个部门组成\n的经济系统与自然环境之间，存在着物质流动关系。为了使人类经济步入可\n持续发展的轨道，减少经济系统对自然环境的污染，最根本的办法是提高物\n质及其能量的利用效率和循环使用率，减少自然资源的开采量和使用量，从\n而降低污染物的排放量。循环经济的提出和发展，正是物质平衡理论在可持\n续条件下的实践\n循环\n经济\n\n---\n\n**p102** ![](../002-part02-绪论-环境规划与管理/page_102.jpg)\n\n四 环境规划与管理的理论基础\n·物质平衡理论的一个现代经济系统由物质加工、能量转换、污染物处理和\n最终消费四个部门（或部分）组成。在这四个部门之间及由这四个部门组成\n的经济系统与自然环境之间，存在着物质流动关系。为了使人类经济步入可\n持续发展的轨道，减少经济系统对自然环境的污染，最根本的办法是提高物\n质及其能量的利用效率和循环使用率，减少自然资源的开采量和使用量，从\n而降低污染物的排放量。循环经济的提出和发展，正是物质平衡理论在可持\n续条件下的实践\n循环\n经济\n\n---\n\n**p103** ![](../002-part02-绪论-环境规划与管理/page_103.jpg)\n\n四环境规划与管理的理论基础\n（4）自然环境价值理论\n约翰?克鲁蒂拉提出了“舒适型资源的经济价值理论”。一些稀有的生物物种、\n珍奇的自然景观、重要的生态环境系统，这些资源称为舒适型资源\n保护好舒适型资源，或者将这类资源的使用严格限制在可再生的限度之内是\n十分必要的。舒适型资源具有损坏的单向性，被破坏就意味着永远丧失\n如果承认舒适型资源是不可逆的，那么就应当重新认识舒适型资源的价值构\n成。当代人直接或间接利用舒适型资源获得的经济收益是舒适型资源的”使\n用价值”；当代人为了保证后代人能够利用资源而做出的支付和后代人因此\n而获得的收益，是舒适型资源的”选择价值”；人类不是出于任何功利的考虑，\n只是为了资源的存在而表现出的支付意愿是舒适型资源的“存在价值”，这一\n理论最重要的责献在于为定量评价舒适型资源的经济价值奠定了坚实的理论\n基础。\n\n---\n\n**p104** ![](../002-part02-绪论-环境规划与管理/page_104.jpg)\n\n四环境规划与管理的理论基础\n（5）排污交易权理论\n1960年，科斯提出科斯定理，即”在设计和选择社会格局时，我们应\n当考虑总的效果”，“关键在避免较严重的损害”。著名经济学家戴尔\n期提出的排污交易权理论就是在科斯定理的基础上发展起来的。\n排污交易权理论认为，环境资源是一种商品，政府是所有权，政府可\n以在专家帮助下组织实施排污权交易，通过市场竞争机制，促使外部\n性内部化，达到避免较严重的损害的自的。也就是政府有效地使用其\n对环境资源这个特殊商品的产权，使市场机制在环境资源优化配置和\n外部性内部化问题上发挥最佳作用。这就是著名的排污交易权理论。\n\n---\n\n**p105** ![](../002-part02-绪论-环境规划与管理/page_105.jpg)\n\n四环境规划与管理的理论基础\n2.主要分析方法\n（1）环境退化的宏观经济评估\n?环境退化包括自然资源耗竭和环境质量恶化两部分。环境退\n化的经济评估，主要研究如何确定环境资源价值核算的指标\n体系、核算方法，将环境退化纳入到国民收入核算体系中，\n争取改进现行的国民收入核算体系，在经济增长中考虑环境\n资源的消耗。\n\n---\n\n**p106** ![](../002-part02-绪论-环境规划与管理/page_106.jpg)\n\n四环境规划与管理的理论基础\n（2）环境质量的费用效益分析\n这是环境经济学的核心内容，包括环境资源的价值核算理论\n和方法；环境污染和生态破坏的经济损失评估技术；环境质\n量改善的效益评估；污染控制的费用评估；环境质量影响的\n剂量反应关系；环境规划、政策和标准制定中费用效益分析\n方法的应用；环境效果分析和风险分析等。\n\n---\n\n**p107** ![](../002-part02-绪论-环境规划与管理/page_107.jpg)\n\n四环境规划与管理的理论基础\n（3）环境经济系统的投入产出分析\n?投入产出分析可以用定量方式来描述环境与经济的协调关系，\n可以是宏观的定量描述，将环境保护纳入国民经济综合平衡计\n划；也可以是微观的定量描述，描述一个企业各生产工序间环\n境与经济的投入产出关系。这是建立环境管理最优化模型和循\n环经济发展模式的基本方法。\n（4）环境资源开发项目的经济评价\n在考察费用和效益时要考虑到间接（外部）费用和间接效益\n间接费用和效益的计算要涉及到环境质量费用效益分析技术\n以及资源的机会成本或影子价格计算\n\n---\n\n**p108** ![](../002-part02-绪论-环境规划与管理/page_108.jpg)\n\n四环境规划与管理的理论基础\n生态文明建设之管理二重性原理\n一、管理的二重性特点\n二、管理的职能\n\n---\n\n**p109** ![](../002-part02-绪论-环境规划与管理/page_109.jpg)\n\n四环境规划与管理的理论基础\n1.管理二重性的涵义\n管理作为一种社会活动，必然有其质的特性。管理的本质\n具有二重性，它既有同生产力、社会化大生产相联系的自然属\n性，又有同生产关系、社会制度相联系的社会属性。\n生产力 自然属性\n生产活动\n统一性\n生产关系 社会属性\n\n---\n\n**p110** ![](../002-part02-绪论-环境规划与管理/page_110.jpg)\n\n四环境规划与管理的理论基础\n（1）管理的自然属性\n管理的自然属性表明，管理之所以必要，是由劳动的社会化和生产力发\n展水平所决定的。管理是分工协作的共同劳动得以顺利进行的必要条件。\n管理的自然属性就是管理的技术性，技术性是管理本质的一个重要方面。\n管理是生产力的要素之一，不进行有效的管理，生产就无法顺利地进行，\n更谈不上发展。\n\n---\n\n**p111** ![](../002-part02-绪论-环境规划与管理/page_111.jpg)\n\n四环境规划与管理的理论基础\n（2）管理的社会属性\n管理的社会属性是与生产关系、社会制度的性质紧密相关的。因\n为管理是一种社会活动，管理必须且只能在一定的社会历史条件\n下和一定的社会关系中进行，因而也必然采取一定的社会组织形\n式来执行管理的职能。\n管理学中的组织目标、组织道德、领导作风、激励方式、管理理\n念、人际关系、群体价值观、组织文化等，主要是对人的管理，\n具有较强的意识形态色彩，属于生产关系和社会关系的范畴。\n\n---\n\n**p112** ![](../002-part02-绪论-环境规划与管理/page_112.jpg)\n\n四环境规划与管理的理论基础\n2.自然属性和社会属性的关系\n管理的二重性是相互联系、相互制约的。\n一方面，管理的自然属性不可能孤立存在，总是在一定的社会制\n度和生产关系条件下发挥作用。而管理的社会属性也不可能脱离\n管理的自然属性而存在，否则管理的社会属性就会成为没有内容\n的形式。\n另一方面，两者又是相互制约的。管理的自然属性要求具有一定\n的社会属性的组织形式和生产关系与其适应。同样，管理的社会\n属性也必然对管理的科学技术等方面发生影响或制约作用。\n管理的自然属性和社会属性是两位一体的，不能把它们截然分开。\n就像一辆车的两个轮子，两个轮子一起转动，车辆才能前进\n\n---\n\n**p113** ![](../002-part02-绪论-环境规划与管理/page_113.jpg)\n\n四环境规划与管理的理论基础\n管理过程\n我国的许多学者把管理的自\n然属性称为管理的一般职能，管\n生产力 生产关系\n理的社会属性称为管理的特殊职\n能，而把管理的各项工作称为管\n管理的 管理的\n自然属性 社会属性 理的基本职能。\n管理的一般职能和管理的特\n管理的 管理的\n一般职能 特殊职能 殊职能总是结合在一起，在管理\n的基本职能中体现出来并一起发\n管理的基本职能：计划、组织、控制 挥作用。\n\n---\n\n**p114** ![](../002-part02-绪论-环境规划与管理/page_114.jpg)\n\n四环境规划与管理的理论基础\n二、管理的职能\n前已述及，法约尔将管理分为计划、组织、指挥、协调、控\n制5种职能，而在法约尔管理思想基础上发展起来的管理过程学\n派进一步将管理职能归为计划、组织和控制三大职能，为我们提\n供了一个研究管理核心功能的框架。\n1.计划职能\n2.组织职能\n3.控制职能\n\n---\n\n**p115** ![](../002-part02-绪论-环境规划与管理/page_115.jpg)\n\n四环境规划与管理的理论基础\n1.计划职能\n（1）计划的性质\n计划的目标性。任何组织或个人制定计划都是为了有效地达到某种目\n标。可以说，没有目标的行动计划或多或少是一种盲目的行动。\n计划的首要性。计划是管理的首要职能。管理过程当中的其他职能都\n是为了支持、保证目标的实现。而这些职能只有在计划工作确定了目\n标之后才能进行。\n计划的普遍性。任何管理者或多或少都有某些制定计划的权力和责任\n高层管理者不可能也不必要对自己组织内的一切活动作出确切的说明，\n这也是有效的管理者所必须遵循的一条原则。也就是说，计划不仅仅\n是领导的职责，也是组织成员的普遍职责。\n\n---\n\n**p116** ![](../002-part02-绪论-环境规划与管理/page_116.jpg)\n\n四 环境规划与管理的理论基础\n2.组织职能\n（1）组织的含义\n古典管理学派的定义将组织\n定义为：“组织是为了达到某些特\n定目标经由分工与合作及不同层\n次的权力和责任制度，而构成的\n人的集合。“这个含义具有3层意\n思：①组织必须具有目标；②没\n有分工与合作也不能称其为组织；\n③组织要有不同层次的权力与责\n任制度。\n\n---\n\n**p117** ![](../002-part02-绪论-环境规划与管理/page_117.jpg)\n\n四环境规划与管理的理论基础\n（2）组织环境\n任何组织都是在一定的环境下生存和发展的。环境给组织提供资\n源，吸收组织的产出，同时又给予组织许多约束。\n一个组织要保持持续的发展，它就必须适合其周围的环境。\n组织环境包括许多要素，其中最主要的是人力、物质、资金、气\n候、市场、文化、政府政策和法律。环境总是处于变化之中，有时变\n化剧烈，有时变化缓慢。当环境变到足以阻碍组织的发展时，就必须\n对组织进行调整和改革，以适应环境的变化。\n\n---\n\n**p118** ![](../002-part02-绪论-环境规划与管理/page_118.jpg)\n\n环境规划与管理的理论基础\n3.控制职能\n（1）控制与控制系统\n①控制的含义：\n法约尔认为，控制是监视各\n人是否依照计划、命令及原则执\n行工作。\n孔茨则认为，控制是按照计\n划标准衡量计划的完成情况和纠\n正计划执行中的偏差以确保计划\n目标的实现。\n\n---\n\n**p119** ![](../002-part02-绪论-环境规划与管理/page_119.jpg)\n\n四环境规划与管理的理论基础\n②控制系统\na.控制的目标体系。任何控制活动和行为都是有一定目标取向的，\n无目标的控制是不存在的。\nb.控制的主体。控制系统的主体是各级管理者以及他们所属的职\n能部门。一般而言，中低层管理层执行的主要是例行的、程序性\n的控制，而高层管理者执行的主要是例外的、非程序性的控制。\nc.控制的客体（对象）。控制系统的控制对象是整个组织的活动\n即在控制活动中是把管理活动当作一个总体来控制的，而不是把\n各项活动孤立地看待。只有统一的控制才能使整体协调一致，达\n到整体的优化，实现总的组织目标，否则就会顾此失彼。\n\n---\n\n**p120** ![](../002-part02-绪论-环境规划与管理/page_120.jpg)\n\n四环境规划与管理的理论基础\nd.控制方法、手段和工具。控制的方法有末端控制和源头控制、浓\n度控制和总量控制、分散控制和集中控制、静态控制和动态控制相\n结合的方法。控制的手段采用综合性手段，有法律手段、经济手段、\n行政手段、教育手段等。在现代环境管理系统中，控制的工具主要\n是电子计算机。\ne.控制机构。从纵向看，可分为不同地区、不同层次的控制；从横\n向看，可分为不同性质的专业控制，例如开发建设项目控制、自然\n保护区控制、污染源控制、环境监测控制以及环境监理控制等。\nf.信息控制系统。是控制活动的神经。控制系统的活动是按照所获\n得的信息来进行的。随看当代社会与经济发展的复杂化，信息量日\n趋增大，管理中的信息处理工作也逐渐发展形成了管理信息系统。\n\n---\n\n**p121** ![](../002-part02-绪论-环境规划与管理/page_121.jpg)\n\n四环境规划与管理的理论基础\n③控制的类型\n按照控制职能的需要，可分为五种控制类型。第一，按照控\n制活动的性质可以划分为预防性控制和更正性控制；第二，根据\n控制点位于整个活动过程中的位置划分为预先控制、过程控制和\n事后控制；第三，根据实施控制的来源划分为正式组织控制、群\n体控制和自我控制；第四，根据控制信息的性质划分为反馈控制\n和前馈控制；第五，根据控制所采用的手段划分为直接控制和间\n接控制。\n\n---\n\n**p122** ![](../002-part02-绪论-环境规划与管理/page_122.jpg)\n\n四 环境规划与管理的理论基础\n（2）控制的原则\n控制所牵涉的范围是十分广泛的。\n从总体上看，它既包括对人的控制，也\n包括了对物的控制，这就增加了控制的\n复杂性。为了进行有效的控制，要遵循\n以下原则：①公众参与原则：②系统控\n制的原则；③一致与比较的原则；④预\n防性原则；例外与重点原则；灵活\n性原则；经济合理原则；8反馈原则。\n\n---\n\n**p123** ![](../002-part02-绪论-环境规划与管理/page_123.jpg)\n\n四 环境规划与管理的理论基础\n（2）控制的原则\n控制所牵涉的范围是十分广泛的。\n从总体上看，它既包括对人的控制，也\n包括了对物的控制，这就增加了控制的\n复杂性。为了进行有效的控制，要遵循\n以下原则：①公众参与原则；②系统控\n制的原则；③一致与比较的原则；④预\n防性原则；例外与重点原则；灵活\n性原则；经济合理原则；⑧反馈原则\n\n---\n\n**p124** ![](../002-part02-绪论-环境规划与管理/page_124.jpg)\n\n四环境规划与管理的理论基础\n（3）控制的程序\n①控制的条件：\n任何形式的控制，都有一定的前提条件，这些前提条件是否\n充分，对于控制过程能否顺利展开有很大的影响。这些前提条件\n主要有以下几个方面：一是要有一个科学的、切实可行的计划；\n二是健全组织结构，完善责任制度；控制工作的主要内容，是根\n据各种信息，纠正计划执行中出现的偏差，以确保计划的实现；\n三是做好各种信息资料的收集、整理与分析工作；四是控制要有\n反馈渠道。\n\n---\n\n**p125** ![](../002-part02-绪论-环境规划与管理/page_125.jpg)\n\n四环境规划与管理的理论基础\n②控制的程序：\na.制定标准。制定控制标准是实施控制的前提。一个好的标准应\n符合可行性、稳定性、简明性和一致性的要求；\nb.检查、对照、评价。控制过程的第二个步骤是检查、对照、评\n价实际工作与标准之间的差异。这个过程的工作要求对工作进程\n做深入调查，调查详细程度应与标准相吻合，在调查取得资料数\n据的基础上开展综合性分析评价。分析评价应综合运用统计分析\n系统分析、经济分析等方法。并将分析评价结果及时反馈；\nc.纠正偏差。首先应确定偏差产生的原因，其次制定补救措施。\n\n---\n\n**p126** ![](../002-part02-绪论-环境规划与管理/page_126.jpg)\n\n四环境规划与管理的理论基础\n修订\n控制① 控制③\n计划 执行过程\n制定标准 修正标准\n控制②\n检查、衡量\n控制的程序\n\n---\n\n**p127** ![](../002-part02-绪论-环境规划与管理/page_127.jpg)\n\n四环境规划与管理的理论基础\n（4）反馈控制和前馈控制\n①反馈控制：所谓信息反馈控制就是用过去的情况来指导现在和将\n来。在环境管理中通过制订环境质量标准来实现对环境质量的控制\n方式就是一种反馈控制，而建立环境管理信息系统则是将反控制\n贯穿于管理全过程的基础\n②前馈控制：所谓前馈控制又可称为指导将来的控制，它的具体办\n法是不断利用最新的信息进行预测，把所期望的结果同预测的结果\n进行比较，采取措施使投入和实施活动与期望的结果相吻合。前馈\n控制的着眼点是通过预测被控对象的投入或者过程进行控制，以保\n证获得所期望的产出。这就解决了时滞现象所带来的问题。环境规\n划和环境影响评价是前馈控制方式在环境管理中的具体应用。\n\n---\n\n**p128** ![](../002-part02-绪论-环境规划与管理/page_128.jpg)\n\n四环境规划与管理的理论基础\n干扰\n前馈信息\n输出\n控制器 系统\n控制\n(1)前馈控制方式\n干扰\n控制 输出\n控制器 系统\n反馈信息\n(2)反馈控制方式\n\n---\n\n**p129** ![](../002-part02-绪论-环境规划与管理/page_129.jpg)\n\n四环境规划与管理的理论基础\n什么是管理的二重性特点，试采用管理二重性性质部析我国环境管\n理中存在的主要问题？\n简述计划职能、组织职能和控制职能的含义和作用\n什么是环境容量？什么是环境承载力？试分析两者关系\n简述工业生态学的定义及其内涵\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 1 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 1 节 · 73 页（跨章）\n\n> `001-part02-绪论-环境规划与管理.pdf` · 涉章 [0, 2]\n\n- [p001](../001-part02-绪论-环境规划与管理/page_001.jpg)  · 环境规划与管理\n- [p002](../001-part02-绪论-环境规划与管理/page_002.jpg)  · 》联系方式：\n- [p003](../001-part02-绪论-环境规划与管理/page_003.jpg)  · 教材\n- ...余 70 页, 参 [`001-part02-绪论-环境规划与管理/`](../001-part02-绪论-环境规划与管理/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 0 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论-环境规划与管理\n## 核心概念\n- 环境管理\n- 环境规划\n- 环境容量\n- 环境承载力\n- 可持续发展\n- 两山论\n- 复合生态系统\n- 工业生态学\n- 生态工业园\n- 环境经济学\n## 关键公式 / 模型\n- 环境容量\n- 环境承载力\n- 环境承载力指标体系\n- 帕累托最适度\n- 计划分类模型\n## 高频考点\n- 环境规划与管理五要素：人、物、资金、信息、时空\n- 环境管理五大手段：行政、法律、经济、技术、宣传教育\n- 环境规划vs环境管理关系：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n- 环境容量vs环境承载力：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n- 环境承载力三大特征：客观性与主观性、区域性与时间性、动态性与可调控性\n- 生态学三定律（米勒）：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n- 生态学六规律（陈昌笃）：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n- 可持续发展四原则：协调原则、公平原则、持续原则、共同原则\n- 可持续发展基本思想：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n- 复合生态系统四大矛盾：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n- 三种环境伦理观：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n- 工业园区三代：第一代劳动密集型→第二代高新技术→第三代生态工业园\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论-环境规划与 五\"三大任务→\"十一五\"SO₂和COD控制→\"十二五\"主要污染物减排\n\n### 四、高频考点（速记）\n\n1. **环境规划与管理五要素**：人、物、资金、信息、时空\n2. **环境管理五大手段**：行政、法律、经济、技术、宣传教育\n3. **环境规划vs环境管理关系**：规划是管理的首要职能；环境目标是共同核心；共同理论基础\n4. **环境容量vs环境承载力**：容量侧重自然属性（内在禀赋），承载力侧重社会属性（外在禀赋）；两者均可通过人类环保行为调控\n5. **环境承载力三大特征**：客观性与主观性、区域性与时间性、动态性与可调控性\n6. **生态学三定律（米勒）**：①多效应/极限性原理→②相互联系/生态链原理→③勿干扰/生物多样性原理\n7. **生态学六规律（陈昌笃）**：物物相关、相生相克、能流物复、负载定额、协调稳定、时空有宜\n8. **可持续发展四原则**：协调原则、公平原则、持续原则、共同原则\n9. **可持续发展基本思想**：不否定经济增长但需重新审视；提高生活质量；承认自然环境价值；以自然资源为基础同环境承载力协调\n10. **复合生态系统四大矛盾**：①要求稳定实际剧变→②改变快速恢复缓慢→③资源有限需求无限→④地球有限人口增长无限\n11. **三种环境伦理观**：生命中心主义（泰勒）、地球整体主义/大地伦理（李奥波德）、代际均等伦理观\n12. **工业园区三代**：第一代劳动密集型→第二代高新技术→第三代生态工业园\n\n### 五、思考题 / 自测\n\n- [x] 题：环境容量与环境承载力的区别？ 答：环境容量侧重自然属性（内在禀赋），反映环境净化能力；环境承载力侧重社会属性（外在禀赋），反映环境支撑人类活动的强度和总量\n- [x] 题：环境规划与管理的根本目的是什么？ 答：通过传播可持续发展思想，创建可持续的发展模式和消费模式，使人与自然和谐相处\n- [x] 题：两山论三个阶段？ 答：①既要绿水青山也要金山银山→②宁要绿水青山不要金山银山→③绿水青山就是金山银山\n- [x] 题：复合生态系统的组成与功能？ 答：自然+社会+经济三个子系统；生产、生活、还原、信息传递四大功能\n- [x] 题：环境经济学在环境管理中的经济手段？ 答：税收、财政、信贷等经济杠杆，调节经济活动与环境保护关系\n\n### 六、与前后章之关联\n\n- 承前章：本章为绪论/概述，奠定基本概念和理论基础\n- 启后章：第4章深入综合分析方法，第5-7章为规划与管理实务\n"}, {"id": "ch-04", "group": "章节素材", "title": "第04章 环境规划与管理中的综合分析方法", "md": "# 环境规划与管理 · 第 4 章 · 环境规划与管理中的综合分析方法 · 素材\n\n> 教师: 王思雨 · 学期: 2026春\n> 章下 PDF: 4 个 · 总页: 513\n> 主版: 第 4 节 · 135 页\n\n---\n\n## 主版课件 · 第 4 节\n\n> `004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法.pdf`\n\n<details><summary>展开 135 页图链<\/summary>\n\n- [p001](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_001.jpg)  · 第四章\n- [p002](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_002.jpg)  · 学习要点\n- [p003](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_003.jpg)  · 第一节 环境现状调查与评价\n- [p004](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_004.jpg)  · 环境现状调查与评价的目的是为了掌握和了解某区域环境现状，发现和识\n- [p005](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_005.jpg)  · 一、环境现状调查内容\n- [p006](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_006.jpg)  · （2）社会环境特征和经济社会发展规\n- [p007](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_007.jpg)  · ②区域内相关的社会因素：\n- [p008 n弱区）等。\n\n---\n\n**p006** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_006.jpg)\n\n（2）社会环境特征和经济社会发展规\n划\n①区域相关的经济现状：\na.生产布局现状分析，生产布局是人类生产活动\n存在和发展的空间形式，它对区域环境产生直接和显\n著的影响。\nb.生产力发展水平现状分析，生产力直接反映了\n人与自然环境之间的关系，生产力发展水平则反映了\n人们征服、改造、控制和适应环境的能力。\n\n---\n\n**p007** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_007.jpg)\n\n②区域内相关的社会因素：\na.社会人口状况分析，人通过生产和消费活动同\n环境形成了相互联系、相互作用、相互制约的对立统\n一关系。\nb.社会意识状况分析，规划区内人们的思想、道\n德、哲学、美学、文艺、宗教和风俗等社会意识形态，\n特别是当地人们的环境意识等方面的情况，并分析这\n些社会意识对区域环境所产生的影响。\nc.社会制度和体制、体育等社会概况，分析对区\n域环境所产生的影响。\n\n---\n\n**p008** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_008.jpg)\n\n（3）环境污染因素调查\n突出重大工业污染源调查和污染源综合调查。根据污染类\n型，进行单项调查，按污染物排放总量排队由此确定评价区内的\n主要污染物和主要污染源。\n污染调查还应酌情包括乡镇企业污染评价和生活及面源污染\n分析等。污染调查还应考察现存环境设施运行情况、已有环境工\n程的技术和效益，作为新规划工程项目的设计依据和参考。\n\n---\n\n**p009** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_009.jpg)\n\n2.生态调查\n环境自净能力\n土地开发利用情况\n气象条件\n绿地覆盖率\n人口密度\n经济密度\n建设密度\n能耗密度调查等\n\n---\n\n**p010** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_010.jpg)\n\n3.污染源调查\n工业污染源\n农业污染源\n生活污染源\n交通运输污染源\n噪声污染源\n放射性\n电磁辐射污染源调查等\n\n---\n\n**p011** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_011.jpg)\n\n4、环境质量调查\n环境保护部门及工厂企业历年的环境质量报告和环境监测资料。\n5.环保措施效果调查\n环保设施运行率、达标率和环保措施削减污染物效果以及\n其综合效益进行分析评价。\n6.环境管理现状调查\n包括环境管理机构、环境保护工作人员业务素质、环境政\n策法规实施和环境监督实施情况等。\n\n---\n\n**p012** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_012.jpg)\n\n二、环境现状调查的方法\n1.收集资料法\n应用范围广、收效大，比\n较节省人力、物力和时间。\n环境现状调查时，应首先通过\n此方法获得现有的各种有关资\n料，但此方法只能获得第二手\n资料，而且往往不全面，不能\n完全符合要求，需要其他方法\n补充。\n\n---\n\n**p013** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_013.jpg)\n\n2.现场调查法\n可以针对使用者的需要，直接获得第一手的数据和资料，\n以弥补收集资料法的不足。\n这种方法工作量大，需占用较多的人力、物力和时间，有\n时还可能受季节、仪器设备条件的限制。\n现场调查法能够直接获取真实、准确的环境现状信息，\n但可能受到时间、人力、物力和天气等条件的限制，并且对\n调查人员的专业知识和技能要求较高。\n\n---\n\n**p014** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_014.jpg)\n\n3.遥感的方法\n遥感是一种综合技术，它利用航空器、卫星等远距离探\n测设备获取地球表面信息。通过收集、处理和分析地球表面\n的图像，从而获得关于地球环境、自然资源、人类活动等方\n面的信息。这种技术通常涉及使用特定的传感器装置，在不\n直接接触研究对象的情况下，收集其特征信息，并对这些信\n息进行提取、加工、表达和应用。遥感技术的应用领域非常\n广泛，包括电力、通信、气象、农林、海洋、勘探、摄影、\n防灾减灾等。\n\n---\n\n**p015** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_015.jpg)\n\n三、五 环境评价\n在环境规划中，环境评价的主要内容包括自然环境评\n价、社会经济评价、环境质量评价和污染源评价等4个方\n面。评价是对被评价对象的优劣、好坏作定量或定性的描\n述，一般以定量描述为主。\n\n---\n\n**p016** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_016.jpg)\n\n1.环境评价的主要内\n容\n（1）自然环境评价\n通过自然、社会、经济背景分析及社会、经济与环境的\n相关分析，确定当前主要环境问题及其产生的原因，并确定\n环境区划和评估环境的承载能力。\n自然背景分析会考虑当地的气候条件、地形地貌、土壤\n类型、水资源、植被覆盖等自然因素。社会背景分析则关注\n人口结构、文化传统、教育水平、社会组织形式、生活方式\n等方面。经济背景分析包括产业结构、经济发展水平、经济\n增长模式、资源利用效率等内容。\n\n---\n\n**p017** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_017.jpg)\n\n（2）社会经济评价\n项目 内容\n人口总数、人口密度、人口分布、人口的\n人口评价\n年龄结构和人口的文化素质等。\n产业结构、国民生产总值和人均国民收入、\n经济活动评价\n产品综合能耗、能源利用率等。\n住房、道路、给水设施及供水管网、排水\n城市基础设施\n管网及污水处理设施、能源结构、供热方式、\n评价\n绿地及分布和电话普及率等。\n\n---\n\n**p018** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_018.jpg)\n\n（3）环境质量评价\n环境质量评价是环境规划与\n蓝天 绿色地球\n管理的一项基础工作，其目的是正\n确认识规划区的环境质量现状、环\n境质量的地区差异和环境质量的变\n化趋势。环境质量评价突出超标问\n题，以明确环境污染的时空界域为\n主要环节，指出主要环境问题的原\n因和潜在的环境隐患等。\n\n---\n\n**p019** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_019.jpg)\n\n（4）污染源评价\n突出重大工业污染源评价和污染源综合评价。根据污染类型\n进行单项评价，按污染物等标污染负荷排序，确定评价区的主要\n污染物和主要污染源。\n污染评价还应酌情包括乡镇企业污染评价和生活及面源\n污染分析等。\n农业污染源\n化肥\n其他污染源\n\n---\n\n**p020** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_020.jpg)\n\n2.环境评价的主要方法\n（1）自然环境评价方法：\n①类比分析法：是一种常用的定性和半定量的方法，一般有生态环境\n整体类比、生态因子类比、生态环境问题类比等。\n②列表清单法：将各种生态环境因子分别列在同一表格的行与列里，\n逐点进行分析并以正负号、数字或其他符号表示其性质、强度等。\n③生态图法：即图形叠置法，是把两个以上的生态环境信息叠合在\n一张图上，构成复合图，用以表示生态环境变化的方向和程度。绘\n制生态图的两个基本手段是指标法和重叠法。指标法是用定量或半\n定量的方法对环境主体进行评价、分级，并绘制在地图上。重叠法\n是将各相关要素的图件叠合在一起以获得新的、综合性的结果\n\n---\n\n**p021** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_021.jpg)\n\n④指数法与综合指数法：在生态环境评价中用得最多，必须建\n立表征生态环境因子特性的指标体系和确定评价标准，赋予各\n因子权重，然后建立评价函数曲线，得出综合评价指数值。例\n如用于水环境质量评价的内梅罗指数、用于大气环境质量评价\n的格林大气指数、上海大气质量指数等。\n③景观生态学方法：通过空间结构和功能分析与稳定性分析，\n评价生态环境质量状况。\n生态系统综合评价法：常用层次分析法（AHP法），又称多\n层次权重分析决策法，是一种定性和定量结合的方法。\n\n---\n\n**p022** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_022.jpg)\n\n①生物生产力评价法：用三个基本生物学参数（生物生长\n量、生物量和物种量）来表示，可评价生态环境质量及其\n变化趋势。\n⑧其他评价方法：还有多因子数量分析法、回归分析法、聚\n类分析法、相关分析法、系统分析法等。\n生态环境评价方法正处于蓬勃发展的时期，新的方法还在不\n断出现，但不管采取什么方法，其可靠性最终取决于对生态\n环境的全面认识和深刻理解。获取可靠的资料数据，仔细分\n析生态环境的特点、本质和各要素之间的内在联系，是评价\n成功的关键。\n\n---\n\n**p023** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_023.jpg)\n\n（2）社会经济评价方法\n社会经济评价的关键是选择评价的标准和指标化的方法。由\n于社会经济问题比较复杂，不易形成统一的看法，目前尚无统一\n评价标准，一般是根据研究对象和研究者所选择的总的战略目标，\n结合国内外相关指标体系来确定。\n\n---\n\n**p024** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_024.jpg)\n\n山\n（3）环境质量评价方法\n环境质量评价分为单环境要素评价、单要素综合评价\n和区域环境质量综合评价。评价的方法很多，这里重点介\n绍指数评价方法。某污染物在环境中监测值与标准值的比\n值，称为该污染物的环境质量指数，表示污染物的超过环\n境质量标准的倍数。\ni污染物的环境质量指数；\nP 污染物的监测值；\nCio -i污染物的环境质量标准值。\n\n---\n\n**p025** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_025.jpg)\n\n（4）污染源评价方法\n在确定主要污染物和污染源的评价中多选用排放量和毒性这两\n个指标作为评价主要污染物的指标。在多种污染物比较分析中，在\n数学上可采用标准化法，将不同种类、不同量纲的一组值进行标准\n化，使之可相互比较，主要方法有排毒指数法、环境污染能力潜在\n指数法和等标污染负荷法等。\n\n---\n\n**p026** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_026.jpg)\n\n等标污染负荷法\n项目 公式 备注\n废水中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度值，mg/l;\nCoi i污染物的允许排放浓度标准与C同单位的\nP 数值，无因次量；\nCoi Qi -污废水排放量，m3/d。\n某污染物的等标污\n染负荷(P)\n废气中i污染物的等标 P i污染物的等标污染负荷，t/d；\n污染负荷计算公式： C i污染物的实测浓度平均值，mg/mv3；\nCoi -污染物的允许排放浓度标准与p同单位的\nP;= 数值，无因次量；\nCoi qi 一废气中i污染物的介质排放流量，mv/d。\n某污染源的等标污 污染源中各污染物i=1.2， n的等标污染负荷\n染负荷(P) 之和，为污染源的等标污染负荷。\n\n---\n\n**p027** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_027.jpg)\n\n按调查区域内污染源的等标污染负荷（P-)大\n评价区域的等标污\n染负荷(PT) P=∑P, 小排列，将累计百分比大于80%左右的污染\n= 源列为区域内主要污染源。\n评价区域内某污染 按评价区域内某污染物等标污染负荷（P总）大\nPi=P 小排序，分别计算百分比及累计百分比，将\n物的总等标污染负\n荷(Pi) j=1 累计百分比大于80%左右的污染物列为该区\n域的主要污染物。\n污染物排放量排序是直接评价某种污染物的\n污染源污染负荷 K P ×100% 主要污染源的最简单方法。实施总量控制规\n比(K) P 划时，针对区域总量控制的主要污染物，对\n排放这一主要污染物的污染源进行总量排序。\n区域主要污染物的选择，主要是根据区域的\n主要环境问题，或是根据环境质量评价结果\n污染物的污染负 =Pi ×100% 来确定。\n荷比(K) 针对主要污染物的排放量，首先要有污染源\n排放量清单，然后排序，再选出占污染物总\n量90%以上的污染源，进行总量控制规划。\n\n---\n\n**p028** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_028.jpg)\n\n第二节 环境统计方法\n环境统计\n二、 环境统计的调查方法\n三、环境统计的研究方法\n\n---\n\n**p029** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_029.jpg)\n\n一、环境统计\n环境统计是用数字反映并计量人类活动引起的环境变化和\n环境变化对人类的影响。\n以环境为主要研究对象，研究范围涉及人类赖以生产和生\n活的全部条件，包括影响生态平衡的诸因素及其变化带来的后\n果。环境统计要调查和反映植物、动物、大气、水、土地土壤\n和人类居住区等各个方面的活动和自然现象及其对环境的影响。\n\n---\n\n**p030** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_030.jpg)\n\n1.一般的统计工作程序\n阶段 内容\n全面调查 (报表制度、普查)\n统计调查（基础）：\n非全面调查（重点调查、典型调查、抽样\n收集资料过程\n调查)\n统计表 (把资料综合成统计表)\n统计整理（中间环节）： 统计图 (把资料综合成统计图)\n加工资料过程 整理成各种统计指数（综合指标、回归分\n析、指数、动态数列等)\n统计分析（核心）： 描述性分析（利用指标数据说明问题）\n分析资料过程 推断性分析（各种推断、预测）\n\n---\n\n**p031** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_031.jpg)\n\n2.环境统计的内容\n自然环境：包括空气与气候、水、土地、生态环境。\n特殊环境：包括能源、放射性、有害物质、噪声、自然灾害、野\n生动植物。\n与环境有关的生活条件：包括健康与营养、劳动条件、居住条件、\n娱乐和文化条件、主观评价环境一一民意测验。\n背景材料：包括直接影响环境的背景因素、间接因素、公共事业、\n技术、意识形态的因素、地理的和有关的背景材料。\n改善环境条件的办法：包括立法和实施、环境法的违反和起诉、\n减轻环境的损害、用于环境保护的支出、环境的研究和教育等\n\n---\n\n**p032** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_032.jpg)\n\n3.环境统计的指标体系\n我国现行环境统计指标体系包括七个子系统：\n工业污染与防治\n生活及其他污染与防治 爱护地球·保护环境\n农业污染与防治\n环境污染治理投资\n自然生态环境保护\n环境管理\n·环保系统自身建设\n\n---\n\n**p033** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_033.jpg)\n\n4.中国现行环境统计指标体系框架\n工业污染与防治 企业基本情况 工业污染物排放情况 工业污染治理设施 工业污染治理情况\n生活及其他污染与防治 生活污水排放情况 城市污水处理厂运行情况 生活废气排放情况 城市垃圾处理情况\n农业污染与防治 规模化畜禽养殖场污染排放及治理情况\n环境污染治理投资 污染源治理投资 城市环境基础设施建设投资 环境污染治理投资合计\n自然生态环境保护 自然保护区建设情况 野生动植物保护情况 生态示范区建设情况\n生态功能保护区建设情况 农村环境污染及治理情况\n环境管理 环保法规和标准 环保年度计划 绿色工程规划 环评制度 “三同时”制度\n排污收费制度执行情况 排污申报登记制度及排污许可证制度 限期治理制度\n环境科技工作 环保产业 环保信访工作 人大政协提案 环保档案工作情况\n环保系统自身建设 环保机构 环保人员\n\n---\n\n**p034** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_034.jpg)\n\n5.中国环境统计范围\n② 6\n生态破坏 区域环境 环境系统\n与建设统 污染与防 的自身建\n计 治统计 设统计\n③ 5\n自然资源 区域环境 环境管理\n统计 质量统计 统计\n\n---\n\n**p035** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_035.jpg)\n\n6.环境统计的作用\nGreen Life!\n为环境管理和决策提供依据。\n评价和考核各级政府及环境保\n护部门环境保护的工作情况。\n增加社会公众对环境状况和环\n境保护的了解，提高全民的环\n保护生忘环境\n境意识。\n拥抱绿色生活\n\n---\n\n**p036** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_036.jpg)\n\n7.环境统计专业报表上报流程\n省级上报数据\n总局规划司 相关司\n审核并填报本级数\n专业 省级\n报表 汇总 上报\n空白表 数据\n地级上报数据\n省局规划处 相关处室\n审核并填报本级数\n专业 市级\n报表 汇总 上\n空白表 数据 报\n区县级上报数据\n地市局规划科 相关科室\n审核并填报本级数\n专业 区县级\n报表 汇总 上报\n空白表 数据\n专业报表空白表\n区县级环保局 相关科室\n规划部门\n填报本级数\n\n---\n\n**p037** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_037.jpg)\n\n二、环境统计的调查方法\n1、定期普查：1996年我国进行了全国污染源普查工作。\n2、抽样调查：对重点工业企业污染源实行抽样调查，\n重点污染源年度统计报表。\n3、科学估算：对重点企业及社会生活污染物排放进行\n科学估算。\n4、专项调查：对环境保护工作中有重大意义的进行专\n项调查，如乡镇企业污染调查、畜禽业专项调查、环保\n产业专项调查等。\n\n---\n\n**p038** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_038.jpg)\n\n三、环境统计的研究方法\n1、大量观察法：环境现象的特征与其数量表现有不同\n程度的差异，建立在大量观察基础上的统计结果必然\n具有较好的代表性。\n2、综合分析法：综合分析法是指对大量观察所获资料\n进行整理汇总，计算出总量指标、相对指标、平均指\n标、变异指标等。\n3、归纳推断法：所谓归纳是由个别到一般，由事实\n到概括的推理方法，是统计研究常用的方法。\n\n---\n\n**p039** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_039.jpg)\n\n延伸材料-我国环境统计缺口性指标\n环境统计缺口性指标是指在环境统计中存在的数据缺失\n或不完整的指标。这些指标可能由于以下原因而存在缺口：\n1、数据收集困难：某些环境数据可能难以收集，例如特定\n污染物的排放数据、生态系统的详细信息等。\n2、监测范围有限：环境监测网络可能无法覆盖所有地区或\n环境要素，导致某些区域或指标的数据缺失。\n3、报告和记录不完整：企业或相关部门可能未能完整报告\n或记录环境数据，导致统计数据不全面。\n\n---\n\n**p040** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_040.jpg)\n\n以下是一些可能存在缺口性指标的领域：\n1、危险废物产生和处置：危险废物的产生量、种类、\n处置方式等数据可能存在缺口。\n2、土壤污染：土壤污染的程度、范围和污染物种类等\n信息可能不完整。\n3、生物多样性：生物多样性的详细数据，如物种数量、\n栖息地状况等，可能难以全面获取。\n4、特定污染物排放：一些特定污染物的排放数据，尤\n其是来自小型企业或非重点污染源的排放，可能存在\n缺失。\n\n---\n\n**p041** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_041.jpg)\n\n为了减少环境统计缺口性指标，可以采取以下措施：\n1、完善监测网络：扩大监测范围，提高监测频率，以获取更全面的数据。\n2、加强数据收集和管理：建立健全的数据收集和报告制度，确保数据的准确\n性和完整性。\n3、推动信息共享：促进不同部门和机构之间的数据共享，整合各方资源，填\n补数据空白。\n4、开展专项调查和研究：针对特定的环境问题或指标，进行专项调查和研究，\n以获取更详细的数据。\n需要注意的是，具体的环境统计缺口性指标会因地区、时间和环境问题的不\n同而有所差异。因此，在进行环境统计和分析时，需要充分认识到这些缺口，\n并采取适当的方法来处理和解释数据。同时，持续改进和完善环境统计体系也\n是解决缺口性指标问题的关键。\n\n---\n\n**p042** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_042.jpg)\n\n第三节 社会经济预测方法\n一、社会发展预测\n二、经济发展预测\n\n---\n\n**p043** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_043.jpg)\n\n社会发展预测\n社会发展预测重点是人口预测，是指根据一个国家、一个地区现\n有人口状况及可以预测到的未来发展变化趋势，测算在未来某个时\n间人口的状况，是环境规划与管理的基本参数之一。进行人口预测，\n主要关心的是未来的人口总数。\n社会发展预测也包括规划期内区域内的人口总数、人口密度和\n人口分布等方面的发展变化趋势，人们的可持续发展观念和环境意\n识等各种社会意识的发展变化，人们的生活水平、居住条件、消费\n倾向和对环境污染的承受能力等方面的变化等。\n\n---\n\n**p044** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_044.jpg)\n\n常见的人口预测模型\n项目 公式 说明\n算术级数 N 预测年的人口数量，万人；\nN,=N,+b（t-to)\n法 Nro 基准年的人口数量，万人；\nb 逐年人口增加数（即变动一年\n几何级数 N=N(1+K)（-0)\n法 N的增加数），万人/a；\nt.to 预测年和基准年，a；\n人口自然增长率，是人口出生\n指数增长 N=N2.718K（-to)\n法 to 率与死亡率之差，常表示为人口每年\n净增的干分数。\n\n---\n\n**p045** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_045.jpg)\n\n二、 经济发展预测\n能源消耗指标\n指标名称 说明\n产品综合 包括单位产值综合能耗（总耗能量和产品总产值的比值）\n能耗 和单位产量综合能耗（总耗能量和产品总产量的比值）。\n能源利用率 有效利用的能量和供给的能量的比值。\n规划期内能源消耗量增长速度与年平均经济增长速度之间\n能源消费弹性\n系数 的比值，年平均经济增长速度，可采用工业总产值、工农\n业总产值、社会总产值或国民收入的增长速度等。\n\n---\n\n**p046** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_046.jpg)\n\n能源消耗预测方法\n方法名称 说明\n人均能量 按人民生活中衣食住行对能源的需求来估算生活用能的方法，\n消费法 我国平均每人每年1.14t标准煤。\n能源消费弹性系数e一般为0.4～1.1，由国民经济增长速度，粗\n能源消费 预测能耗的增长速度β=é·α，其中α为工业产值增长速度，以\n弹性系数法 此可进行规划期能耗预测E，=E。（1+β)（-），其中E为预测年的\n能耗量，E为基准年的能耗量，t，t为预测年和基准年。\n\n---\n\n**p047** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_047.jpg)\n\n目前，耗煤量的预测可分为民用耗煤量预测和工业耗煤量\n预测，民用耗煤量预测可用式（4-2）表示：\nEs=As·S (4-\n：中\nEs- -预测年采暖耗煤量，x104t/a;\nA 采暖耗煤系数，t/m2;\nS一一预测年采暖面积，m2。\n\n---\n\n**p048** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_048.jpg)\n\n工业耗煤量预测方法有弹性系数法、回归分析法、灰色预测\n等几种常用的方法。以弹性系数法为例，设工业耗煤量平均增长\n率为α，工业总产值平均增长率为β，工业耗煤量弹性系数C：可用\n式（4-3）表示。\n(Et/E0）t-t0-1 (4-3)\nβ (Mt/M0)t-t0-1\n式中Et一一预测年的工业耗煤量，x104t/a；\nEo一一基准年的工业耗煤量，x104t/a;\nMt一一预测年的工业总产值，x104元/a；\nM。一基准年的工业总产值，x104元/a；\nt，to预测年和基准年，a。\n\n---\n\n**p049** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_049.jpg)\n\n第四节 环境预测方法\n、环境预测\n二、常用预测方法\n·三、环境预测的工作程序\n\n---\n\n**p050** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_050.jpg)\n\n环境预测\n1、内涵\n在环境管理过程中，经常需要对人类活动将可能引起的环境质量\n变化趋势进行预测。环境预测是在调查研究和科学实验的基础上进行\n的，借助于数学、计算理论和信息处理技术等工具，对未来某一时间\n环境质量的变化趋势，进行定性和定量分析。或者说，预测就是根据\n过去和现在来估计未来，是对研究对象的未来发展作出科学推测和估\n计，预测是决策的基础。\n\n---\n\n**p051** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_051.jpg)\n\n把需要进行预测的客观环境看成一个系统，根据一般系统的整\n体性、相关性和动态性等特点，把事物的过去、现在和将来看成一\n个连续的、不断发展变化的辩证统一体，并依据已有资料数据，使\n用预测方法，对未来的环境污染趋势、污染控制对策以及控制污染\n所需的投资趋势等进行评价和估算\n这种围绕系统的环境、技术和价值等未来情况进行预测，主要\n为决策提供必需的未来信息，对环境管理系统开发和提高环境效益\n是十分重要的。\n\n---\n\n**p052** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_052.jpg)\n\n2、分类\n类别 分类子项\n按预测内\n区域环境预测、行业环境预测、专题环境预测\n容划分\n定性预测：对未来发展的定性分析（递增、递减、加快、减缓节奏）；\n定量预测：占有历史和现实数据，运用数学模型预测预测；\n按预测作 定时预测：寻找时间序列上的发展变化规律（过去、现在和今后）：\n用划分 定比预测：定结构比例，例如环保投资结构比例分析（水、气、渣、\n噪);\n评价预测：对预测结果可信度、风险性进行评价\n短期预测：5年内；\n按预测时\n中期预测：5~15年；\n间划分\n长期预测：20年\n\n---\n\n**p053** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_053.jpg)\n\n二、常用预测方法\n1、预测的基本原则\n（1）资料的完整性：预测不同于猜测，猜测是随心所欲，不负\n责任，而预测必须以周密调查和详尽的统计资料为依据。\n（2）数据的准确性：基础数据必须准确完整，预测结果必须给\n出误差分析；由于资料数据、预测技术和预测人员素质三方面的因\n素，预测结果不可能十全十美，误差总会有，但误差有大有小。\n（3）方法的可靠性：对所有方法、模型进行分析、评价和检验。\n（4）结果的可验性：预测应有明了的结论，且这个结论是可以\n检验的。\n\n---\n\n**p054** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_054.jpg)\n\n2、环境预测内容和基本程序\n环境预测是通过已取得的情报资\n料和监测统计数据，对未来未知的环\n境前景进行的估计和推测，也就是把\n环境作为预测对象，置于一定的时间\n和空间中，研究在未来一定时期经济\n社会活动对环境的影响，预测环境要\n素和系统将达到的运动状态及可能出\n现的结果，它是环境决策的依据，也\n是制定环境规划与环境管理的基础。\n\n---\n\n**p055** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_055.jpg)\n\n（1）环境预测的内容\n①能源和资源消耗的增长、土地利用、资源开发的规模和速度、预\n测供求矛盾及其对环境的影响；\n③大气环境、水环境、土壤环境等环境要素污染状况的变化；\n④开发活动可能造成的生态破坏；\n③环境污染与破坏造成的经济损失和对人体健康的损害；\n?主要污染物的削减量\n（2）环境预测的一般程序：①确定预测的目的和任务；②收集和分析\n有关资料；③选择预测方法；④建立预测模型；③进行预测计算；\n?对预测结果的鉴别和分析。\n\n---\n\n**p056** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_056.jpg)\n\n3、环境预测的方法\n根据预测结果一般可分为两类，即定性预测方法和定量预测方法。\n（1）定性预测方法\n定性预测是预测者利用直观的材料，根据掌握的专业知识和丰富\n的实际经验，运用逻辑思维方法对环境变化做出定性的预计推断和环\n境交叉影响分析，它主要包括专家会议法、德尔菲法、主观概率法和\n层次分析法等。\n①专家会议法又称”集合意见法”，是通过专家之间的信息系统，\n引起”思维共振”并产生组合效应，形成宏观智能结构后进行创造性思\n维的方法。这种方法可以排除折衷，对所议的问题通过客观的连续分\n析，找到一组切实可行方案。\n\n---\n\n**p057** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_057.jpg)\n\n②德尔菲法又称“专家调查法”或“函询调查法”，以无记名方式，通过数\n轮函询征求专家意见。好 预测领导小组对每轮的专家意见进行汇兑整理，作为\n参考资料再发给专家，供其分析判断，进一步提出新的论证，并不断修正自\n己的见解，如此循环反复数次，专家意见日趋一致，产生较为可靠结论。\n德尔菲这一名称起源\n于古希腊有关太阳神\n阿波罗的神话，寓意\n阿波罗预卜未来的神\n谕。1946年，兰德公\n司首次用这种方法做\n出成功预测后，这一\n方法被迅速广泛采用。\n\n---\n\n**p058** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_058.jpg)\n\n德尔菲法一般情况下包括设计调查表、发放调查表实施调查、回收调查\n表进行统计处理、将所有调查对象对每项指标权重的平均估计值及本人估计\n值的离差反馈给每个参加调查者并进行第二轮调查和收回调查表进行统计处\n理五个基本步骤，具有不具名（应邀参加者并不了解，克服易受权威人士思\n想和见解的束缚）、反馈性（一般经3~4轮，每轮统计结果反馈给每位参加者\n作为下一轮参考）和预测结果统计性（每一轮采用统计方法处理预测结果，作\n定量处理）等特点。\n\n---\n\n**p059** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_059.jpg)\n\n③主观概率法首选允许专家在预测时可以提出几个估计值，并\n评定备选值出现的可能性；然后计算各个专家预测值的期望值；最\n后，对所有专家预测期望值取平均值，得到预测结果。\n④层次分析法利用递阶层次结构和矩阵方程将思维过程数学化，\n采用1~9标度构造判断矩阵，通过求解矩阵特征向量及最大特征根，\n求得低层因素相对目标层的相对重要性权重值，以决定其影响程度。\n\n---\n\n**p060** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_060.jpg)\n\n（2）定量预测方\n法\n定量预测以运筹学、系统论、\n控制论、系统动态仿真和统计学\n为基础，根据历史数据和资料，\n应用数理统计方法来预测事物的\n未来，或者利用事物发展的因果\n关系来预测事物的来。常用的定\n量预测方法主要有时间序列法、\n逻辑型规律法和环境系统的数学\n模型法等。\n\n---\n\n**p061** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_061.jpg)\n\n①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n**p062** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_062.jpg)\n\n①时间序列法\n时间序列是指同一变量按事件发生的先后顺序排列起来的一组\n观察值或记录值。构成时间序列的要素有两个：一是时间，二是与\n时间相对应的变量水平。\n时间序列法是在时间序列变量分析的基础上，运用一定的数学\n方法建立预测模型，使时间趋势向外延伸，从而预测未来市场的发\n展变化趋势，确定变量预测值，它又叫历史延伸法或外推法。\n\n---\n\n**p063** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_063.jpg)\n\n②逻辑型规律法\n逻辑型规律是自然环境和社会环境中事物发展的基本规律之一\n其基本线形是由一条指数曲线和一条对数曲线平滑衔接组合而成，\n成S型，又称S规律。\n③环境系统的数学模型\n依据科学定律或者数据的统计分析，或者两者兼而有之，包括\n代数方程模型、微分方程模型等。\n\n---\n\n**p064** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_064.jpg)\n\n（3）回归分析法\n回归分析法是通过对历史资料的统计与分析，寻求变量之间相互\n依存的相关关系的一种数量统计方法。\n回归分析法的特点包括：①回归模型中的因变量和自变量之间必\n须有因果关系；②自变量与因变量间必须具有强相关关系，自变量间\n必须具有弱相关关系；③自变量的预测值较准确且易得到；④正确选\n定回归模型的形式；回归模型必须通过各种检验后才能用于预测。\n回归预测法的基本步骤包括：①进行因素分析，确定回归模型的\n自变量；②绘制散点图，构造回归模型的理论形式；③利用最小平方\n法估计模型参数，建立模型；④对建立的回归模型进行检验，检验的\n方法包括S检验和相关检验等；利用检验后的回归模型进行预测。\n\n---\n\n**p065** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_065.jpg)\n\n4、环境预测的常见类型\n（1）大气环境质量预测\n大气环境质量预测是为了了解未\n来一定时期的经济、社会活动对大气\n环境带来的影响，以便采取改善大气\n环境质量的措施。\n主要内容是预测大气环境中污染\n物的含量，常用方法有箱式模型法、\n高斯模型法、线源扩散模式法、面源\n等。\n\n---\n\n**p066** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_066.jpg)\n\n（2）水环境质量预测\n水环境质量预测最基本的问题就是要找出污染排放变化与\n水体控制点处主要污染物含量水平的相关关系，以此预测区域\n（或城市）由于实施经济、社会发展规划而产生的环境影响。\n可选用或建立水质模型，如河流模型，河口、湖泊水库模\n型等均是进行水质预测最常采用的方法。\n\n---\n\n**p067** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_067.jpg)\n\n（3）固体废物环境质量预测\n固体废物对环境影响是多方面的，对这类预测问题，一般\n包括工业固体废物产生量、城市垃圾产生量及固体废物环境影\n响预测等内容。\n固体废物环境影响预测则可采用大气、水影响预测模型\n以及因果关系分析法等。\n\n---\n\n**p068** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_068.jpg)\n\n（4）噪声环境质量预测\n交通噪声预测方法：交通噪声预测方法常用的有多元回归预测，\n即根据用车流量、道路宽度、本底噪声值与交通噪声等效声级之间的\n关系，建立多元回归预测模型\n环境噪声预测方法：环境噪声预测方法常见的主要有两种：一\n种是多元回归预测方法，通过噪声源、本底噪声与噪声等效声级之\n间的关系，建立多元回归预测模型。另一种为灰色预测方法，即根\n据历年环境噪声值，建立灰色预测模型。\n\n---\n\n**p069** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_069.jpg)\n\n三、环境预测的工作程序\n确定预测目的\n准备阶段 确定预测时间\n制定预测计划\n收集预测资料\n收集分析信息\n资料的分析检验\n选择预测方法\n建立预测模型\n预测分析\n进行预测计算\n否\n预测结果检验\n输出预测结果\n输出结果\n提交预测结果\n\n---\n\n**p070** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_070.jpg)\n\n第五节 决策分析方法\n一、决策\n二、决策因素\n三、决策方法\n四、决策原则和决策程序\n\n---\n\n**p071** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_071.jpg)\n\n一、决策\n1、内涵\n决策是人们为了达到一定目标，从若干可能的策略中选取最\n好策略的过程。\n决策分析是研究怎样才能作出科学的决策，是一种为复杂的\n和结果不肯定的决策问题提供旨在改善决策过程的合乎逻辑的系\n统分析方法，它的任务是为决策者提供优的或满意的决策及其可\n能结果的分析，供决策时参考。\n决策问题具有多目标性、决策影响的长期性、后果的不确定\n性、可供选择方案的多样性及决策大多数情况下的一次性等特点。\n\n---\n\n**p072** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_072.jpg)\n\n决策是系统工程的核心，也是管理\n的核心，决策是人类社会的重要活动， 运筹惟喱决胜千里\n贯穿于人类各项活动之中，决策一错，\n全盘皆输。1964年瑞士研制出第一只石\n英电子表，决策者以为市场前途不大，\n未引起重视，敏感的日本人立即从技术\n到市场进行深入调研，结论是大有市场，\n它利用其雄厚电子技术基础，首先推出\n成批产品占领市场，刮起石英技术誉满\n全球的旋风，仅七十年代后5年就挤\n瑞士178家手表厂。\n\n---\n\n**p073** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_073.jpg)\n\n2、分类\n决策问题通常分为确定型和非确定型。其中非确定型决策\n包括风险型决策和不确定型决策。确定型决策是在决策环境完\n全确定的条件下进行的，其选择的结果也是确定的。所谓风险\n型情况下的决策和不确定情况下的决策，都是在决策环境不是\n完全确定的情况下进行的，它们之间的区别在于：前者对于各\n自然状态发生的概率，决策者是可以预先估计或计算出来的；\n而后者对于各自然状态发生的概率，决策者是一无所知的，只\n能靠决策者的主观倾向进行决策。\n\n---\n\n**p074** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_074.jpg)\n\n二、决策因素\n一般的决策问题都包含三个最基本的因素：\n1.自然状态\n“产品销路好”、“产品销路一般”和“产品销路差“都是自然状态，\n是决策者无法控制的因素。\n2.策略\n策略是决策者可以采取的行动方案。采取哪一个策略，完全由决\n策者决定。\n3.益损值\n益损值是不同策略在不同自然状态下的收益值或损失值。\n\n---\n\n**p075** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_075.jpg)\n\n三、决策方法\n1.确定型决策的方法\n确定型决策法适应于处理确定型决策问题，也就是说在自然状态已\n清楚而且完全确定，决策者可以凭借个人的判断，按既定目标及评价准\n则选定行动方案，这样的决策就是确定形决策问题。它有四个主要特征，\n①只有一个确定的自然状态；②存在决策者希望达到的一个明确的目的；\n③存在着可供决策者选择的两个或两个以上的行动方案，而且每种方案\n的最终结果是确定的；④不同的行动方案在确定状态下的收益值或损失\n值可以计算出来。\n确定型决策的方法有很多，例如单纯择优法、模型决策法、排队决\n策法和盈亏平衡分析等。单纯择优法就是可以直接选择最优的决策方案；\n模型决策法是利用一定的数学模型进行计算后，加以择优的方法。\n\n---\n\n**p076** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_076.jpg)\n\n2.非确定型决策的方法\n对于风险型决策问题，其状态的发生或不发生是带有某种概率的，\n这种概率对决策者来讲要承担一定的风险。最大收益期望值决策准则的\n公式见式（4-5），最小机会损失期望值决策准则公式见式（4-6）。\nAn=max(∑=P;a) (4-5)\n式中：\nP;一某状态发生的概率；\na;一状态的期望值。\nA,=min(∑²=,P;0) (4-\n式中：0一状态的损失值。\n\n---\n\n**p077** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_077.jpg)\n\n例4-1某厂开发环保产品，其市场状态E；，发生概率P和各方案\n不同收益a；见表4-15，对各方案A择优决策。\n市场状态E及概率PE良好， E2一般， E3不佳， 收益期望\n方案A;\nP1=0.4 P2=0.5 P3=0.1\naij Oij aij Oij aij OijA1 80 0 50 20 20 30\nA2 60 20 70 0 50 0 PanPO# n nA3 50 30 40 30 20 30\n表4-15最大收益期望值方案决策矩阵（最小机会损失期望值）\n\n---\n\n**p078** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_078.jpg)\n\n解：据式（4-5）\nAn=max{(0.4x80+0.5x50+0.1x20),(0.4X60+0.5x70+0.1x50).\n（0.4x10+0.5x40+0.1x20）}=max{59,64，42）=64选择期望值最大\n的方案A2\n据式(4-6)\nAn=min{(0.4x0+0.5x20+0.1x30),(0.4X20+0.5x0+0.1x0),(0.4x30+0.5x30+0.1x30）}=min{13，8,30}=8选择机会损失最小的方案\n对于不确定型决策问题，不但状态的发生是随机的，而且各状态\n发生的概率也是未知的和无法事先确定的。对于这类问题的决策，主\n要取决于决策者的素质、经验和决策风格等。本书介绍几种比较常见\n的处理不确定型决策问题的决策方法。\n\n---\n\n**p079** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_079.jpg)\n\n（1）等可能性准则\n对于不同的自然状态，如果没有确切理由说明每个自然状态的\n概率，那么只能认为它们发生的机会是相等的，即每一种自然\n状态发生的概率都是1/n。将每一个自然状态的概率定为1/n\n后，就可以用已经介绍过的方法了。\n（2）乐观准则\n按乐观准则决策时，决策者持最乐观的态度，决策时不放弃任\n何一个获得最好结果的机会，愿意以承担一定风险的代价去获\n得最大的利益。\n\n---\n\n**p080** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_080.jpg)\n\n例4-2\n表4-16效益矩阵\n效益矩阵状态SSi S2 S3 S4\n方案AjA1 4 4 6 7\nA2 2 4 6 9\nA3 5 7 3 5\nA4 3 5 6 8\nA5 3 5 5 5\n\n---\n\n**p081** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_081.jpg)\n\n对于A:max（4，4，6，7)=7\n对于A2:max(2，4,6，9)=9\n对于A3:max(5，7，3，5）=7\n对于A4:max（3，5，6，8)=8\n对于As:max（3，5，5，5）=5\n再从选出的5个最大效益值中，挑选一个最大值：即：max（7，9，7，8，\n5)=9，故选方案A2。\n按乐观准则决策，实际是瞄准整个效益矩阵中的最大者。这当然不\n会丧失获得最好结果的机会，但有时也不可避免落到最坏的结局。比如\n本例中选择了A2，若自然状态S4发生，则获得最好结果；而若自然状态\nS发生，则将落到最坏结局。\n\n---\n\n**p082** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_082.jpg)\n\n（3）悲观准则\n悲观法（最大最小准则法或瓦尔德准则法）的决策原则：“小中取大”，\n是当有多种方案可供决策者选择时，先估算出每个方案在每种状态下的\n收益值或收益率，然后把各个方案的最小收益值或收益率单列出来，在\n这组最小收益值或收益率中，选择收益值或收益率最大的那个方案作为\n最佳方案。这种决策方法，在出现不利的情况下，也可使损失减到最小。\n其特点是决策者持最悲观的态度，他总是把事情估计得很不利。\n乐观准则 大中取大\n悲观准则 小中取大\n\n---\n\n**p083** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_083.jpg)\n\n仍以例4-2为例：\n对于A:min（4，4，6，7)=4\n对于A2:min(2，4，6，9)=2\n对于A3:min（5，7，3，5)=3\n对于A4:min（3，5，6，8)=3\n对于As:min（3，5，5，5)=3\n再从选出的5个最小效益值中，挑选一个最大值：\n即:max（4,2，3，3，3）=4\n故选方案A1。\n按悲观准则决策，可能丧失掉获得最好结果的机会。但不管最终\n哪个自然状态发生，决策者都能够避免最坏的结局\n\n---\n\n**p084** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_084.jpg)\n\n(4)折衷准则\n乐观法与悲观法决策的缺点是：\n在决策过程中所损失的信息过多，而\n且决策结果也有很大的片面性。所谓\n折衷，即在乐观与悲观之间折衷。在\n折衷准则中，用乐观系数a表示乐观\n程度（0≤a≤1），而（1-a）就是悲观系\n数，它表示悲观程度。折衷法的特点：\n既不非常乐观，也不非常悲观，而是\n通过一个系数。（0≤a≤1）表示决策者\n对客观条件估计的乐观程度。\n\n---\n\n**p085** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_085.jpg)\n\n上例中，假设a=0.45，则1-a=0.55。折衷效益值C的公式为：\nC;=a·max{a)+(1-a)·min{a}(i=1,2...5)\n对于A1:C=0.45x7+0.55x4=5.35\n对于A2:C2=0.45x9+0.55x2=5.15\n对于A3:C3=0.45x7+0.55x3=4.8\n对于A4:C4=0.45x8+0.55x3=5.25\n对于A5:C=0.45x5+0.55x3=3.9\n再从各个方案的折衷效益值C中选择一个最大值：\n即：max（c}=max(5.35，5.15，4.8，5.25，3.9)=5.35\n其相应方案即所选方案。故选方案A1。\n当乐观系数a取值不同时，选择的方案可能不同。当a=1时，折\n衷准则即成为乐观准则，而当a=0时，折衷准则成为悲观准则。\n\n---\n\n**p086** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_086.jpg)\n\n（5）后悔值准则（最小后悔值准\n则)\n对于非确定型决策问题，为了避免事后遗憾没有选准效益最大\n或损失最小的方案，可以采用后悔值法进行决策。后悔值（最小最大\n后悔值法），是后悔值法决策的主要依据，是指某状态下的最大效益\n值与各方案的效益值之差。\n决策者做出决定之后，若不够理想，必有后悔之感。后悔值准\n则就是把每一自然状态对应的最大效益值视为理想目标，把它与该\n状态下的其他效益值之差作为未达到理想目标的后悔值，这样可得\n到一个后悔矩阵。\n求出后悔矩阵中每一行的最大值，这些最大值中的最小者对应\n的方案，即为应选方案。上例中（表4-6），效益矩阵对应的后悔矩\n阵见表4-17。\n\n---\n\n**p087** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_087.jpg)\n\n表4-17 效益矩阵对应的后悔矩阵\n方案 状态（S） 最大后\n(Ai) S1 S2 S3 S4 悔值\nA1 1 3 0 2 3\nA2 3 3 0 0 3\nA3 0 0 3 4 4\nA4 2 2 0 1 2\nA5 2 2 1 4 4\n因为各个方案的最大后悔值中最小者为2，故选择方案A1。\n\n---\n\n**p088** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_088.jpg)\n\n对于不确定型问题，采用不同的决策准则做出的决策往往\n是不同的。为了使决策更准确可靠，最好设法了解各自然状态\n发生的概率，以便将不确定问题转化为风险型问题，提高决策\n的科学性。\nalternativehigh-riskconsequencesuncertainty complexityMAKiNGinterpersonalissues\n\n---\n\n**p089** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_089.jpg)\n\n[例4-3]某厂试制一种防噪耳机，新产品成本每件3元，销售价每件5\n元，若产品当天未销售出，每件损失1元，该厂日产量方案共5个，0、\n1000、2000、3000、4000件，试问为使该厂收入最高，试确定采\n用何种生产方案。\n表4-18各种生产方案下的销售量\n销售量j\n产量方案\n0j1 1000j22000j33000j4 4000j5\nA1:0i1 0 0 0 0 0\n-1000 2000 2000 2000 20001000i2\n-2000 1000 4000 4000 40002000i3\n-3000 0 3000 6000 60003000i4\nAs: -40004000 i5 -1000 2000 5000 8000\n\n---\n\n**p090** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_090.jpg)\n\n①采用小中取大准则的收益矩阵（表4-19）\nAn=max{min(a1j),min(a2), min(a3j), min(a4; ),min(as; ) }\n表4-19采用小中取大准则的收益矩阵\n方案A; 1000 2000 3000 4000\n最小收\n益期望 0 -1000 -2000 -3000 -4000\n值\n因此A=max（0,-1000,-2000,-3000,-4000)=0，收\n益期望值为0所对应的方案为A1，即应停止生产。\n\n---\n\n**p091** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_091.jpg)\n\n②采用大中取大准则的收益矩阵（表4-20）\nAn= max{max(a1j),max(a2j) ,max(a3j),max(a4j),max(a5;)\n表4-20采用大中取大准则的收益矩阵\n方案A; 1000 2000 3000 4000\n最小收\n益期望 0 2000 4000 6000 8000\n值\n因此A，=max（0,2000,4000,6000,8000)=8000，收\n益期望值为8000所对应的方案为A5，即日产4000件。\n\n---\n\n**p092** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_092.jpg)\n\n③等可能性原则\n据表中数据可得备选方案期望值：各方案期望值即为各种自然状态可能\n出现结果的算术平均值，五种市场状态所取得收益平均值如下：\n0=(0)S/+(0)S/+(0)S/+(0)S/+(0）S/1:\nA2:1/5(-\n000=(000)+(000)+(000)+(000)+(00000=（000)+000)+000+0000+000-)\n00=（0009)/+(0009)/+(0000)1+(0)1+(0000-)/:\nA5:1/5(-4000)+1/5(-\n最大收益期望\n值:An=max{2=1 }=max（0,1400,2200,2400,2000)=2400对应A\n\n---\n\n**p093** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_093.jpg)\n\n④最小机会损失决策准则\n计算每种销售量时，各备选方案的机会损失O；：\nO=事件j的最大收益值-各方案i的可能收益值（表4-21）\n事件1，销售量为0时，\nO11=0-0-0;O21=0-(-1000)=1000 ;O31=0-(-2000)=2000 ;\nO41=0-(-3000)=3000 ;O51=0-(-4000)=4000\n事件2，销售量为1000时，\nO12=2000-0=2000;O22=2000-2000=0;O31=2000-\n1000=1000 ;O42=2000-0=2000 ;O52=2000-(-1000)=3000\n\n---\n\n**p094** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_094.jpg)\n\n代\n表4-21最小机会损失决策准则下最大机会损失矩阵\n销售量j\n产量方 最大机\n案 0j1 1000 2000 3000 4000 会损失\nj2 j3 j4 js0 2000 4000 6000 8000 80001000 1000 0 2000 4000 6000 60002000 2000 1000 0 2000 4000 400030003000 3000 2000 1000 0 2000 （最小）\n4000 4000 3000 2000 1000 1000 4000\n\n---\n\n**p095** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_095.jpg)\n\n四、决策原则和决策程序\n1.决策原则\n决策原则主要包括信息快准全原则、\n预测未来原则、可行性原则、系统性原\n则、对比优选原则和集团决策原则。\n2.决策程序\n决策作为一个过程，通常是通过调查\n研究后，在了解客观实际和预测今后发\n展的基础上，明确提出各种可供选择的\n方案以及各种方案的效应，然后从中选\n定某个最优方案。整个过程分为下列程\n序(表4-22)。\n\n---\n\n**p096** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_096.jpg)\n\n表4-22决策程序\n序号 决策过程 说明\n1 明确问题 根据提出的问题，找出症结点，明确对问题的认识\n目标是决策所要达到的结果。如果目标不明确，往往\n2 确定目标 造成决策失误。当有多个目标时应分清主次，统筹兼\n顾。明确目标时，要注意目标的先进性与可靠性\n确定目标后，应对状态进行分析和收集信息，建立模\n3 制定方案\n型，提出实现目标的多种可行方案\n4 方案评估 对提出的多种方案的效果进行评价，尽可能通过科学\n计算，用数量分析的方法比较其优劣和得失\n决策者从总体角度对各种方案的目的性、可行性和时\n5 选择方案\n效性进行综合的系统分析，选取使目标最优的方案\n为了保证最优方案的实施，需要制定实施措施，落实\n6 组织实施\n执行单位，明确具体责任\n在决策实施过程中可能会产生这样或那样偏离目标的\n7 反馈调整 情况，因此必须及时收集决策执行中的\n反馈调整信息，分析既定决策是否可以实现预定目标\n\n---\n\n**p097** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_097.jpg)\n\n第六节 环境审计方法\n一、环境审计\n二、环境审计的内容\n三、环境审计方法\n\n---\n\n**p098** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_098.jpg)\n\n一、环境审计\n环境审计是对特定项目的环境保护情况，包括组织\n机构、管理、生产及环保设施运转与排污等情况进行系统\n的、有文字记录的、定期的、客观的评定。\n环境审计按范围可分为地区（城市）级的环境审计及\n工厂、工艺、特定污染物等的环境审计。\n按审计的目标可分为提高环境管理效率、有效控制污\n染、提高环保资金使用效率、减少事故等环境审计。\n按审计的目的可分为审查环境执法、废物减量化、实\n施清洁生产等环境审计。\n\n---\n\n**p099** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_099.jpg)\n\n环境审计是对环境管理的某些方面\n进行检查、检验和核实，目的一般是将\n潜在的、可能出现的环境危险降到最低 审计\n程度。\n“环境审计”也是一种管理工具，它用\n于对环境组织、环境管理和仪器设备是\n否发挥作用进行系统的、定期的和客观\n的评价。一般包括对管理的承诺（前\n提）、环境审计小组的目标（方向）、\n专业能力、环境审计程序、书面报告、\n质量保证和跟踪等环节。\n\n---\n\n**p100** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_100.jpg)\n\n二、 环境审计的内容\n1.符合性审计\n主要为环境保护法规的符合性审计，对企业有关环境的\n现状及管理当局所作的努力进行详细的、特定区域的评价，\n以提高符合性，减少因不符合而造成的后果。\n2.环境保护管理系统审计\n确定环境管理系统是否运作良好，是否能处理当前或未\n来的环境风险。\n3.过渡审计\n评价与不动产的获取和剥离有关的风险。企业在购买和\n转让不动产时，需要对其有关环境因素加以审计，以此来降\n低由此带来的风险。\n\n---\n\n**p101** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_101.jpg)\n\n4.有害物质的处理、存放及清理的审计\n评价危险原料的处理、存放及清理会产生的全部负债。\n有害物质如果处理、存放和清理不当，会对周边环境造成污\n染，甚至会威胁人类的健康，易带来诉讼、赔偿和罚款，导\n致环境成本上升、经济效益和社会效益下降，必须对其所经\n历的各个环节进行审计。\n5.污染预防审计\n确定减少废物的机会，通过对企业可能发生污染情况的\n审计预测结果，采用一系列有效的措施，减少企业在生产经\n营过程中产生污染的机会。\n\n---\n\n**p102** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_102.jpg)\n\n6.环境效益审计\n评价由于采取了保护环境的措施而产生的成本及其估算的合\n理性、合法性和真实性，并估计环境治理的效益。由于环保设备\n的价格普遍较高，而其带来的效益又具有潜在的、长期的特性，\n通过环境效益审计，能提高企业的环保意识并在生产经营活动中\n兼顾企业的长远发展。\n7.产品审计\n确定产品是否与环境政策的要求相符合。如果一个企业的产\n品被列为绿色产品，就会吸引众多的消费者，企业将在激烈的竞\n争中取得优势。通过产品审计，企业可以看出自己的产品与环境\n政策要求的差距，并加以改进。\n\n---\n\n**p103** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_103.jpg)\n\n三、环境审计方法\n环境审计是审计的一种类型，\n常规审计方法对环境审计同样适\n用，如在进行财务收支审计和经\n审计\n济效益审计中运用的：审计检查\n法（包括资料检查法、实物检查\n法）；审计调查法（包括查询法、\n观察法、专题调查法）；审计分\n析法、账户分析法、账龄分析法；\n逻辑推理分析法、经济活动分析\n法；经济技术分析法、数学分析\n法，抽样审计法等。\n\n---\n\n**p104** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_104.jpg)\n\n目前在环境审计专业人才缺乏的情况下如何开展环境审计，我们\n采取了以下几种方式：\n1.将微观审计与宏观分析相结合\n环境审计工作涉及面广、政策性强，要从宏观着眼，把为宏\n观管理服务贯穿于审计工作全过程。在制定审计工作计划时，要\n分析当前环境管理中的主要问题，以资金为主线，以重点环保项\n自为对象，由浅入深选择环境污染最为严重的项自和重点污染源\n治理项目实施审计。将审计中的微观经济现象与有关环境保护宏\n观经济政策、法规、措施相联系，反映问题实质，并提出切实可\n行的意见和建议，及时反馈给政府及有关部门，为宏观决策提供\n依据。\n\n---\n\n**p105** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_105.jpg)\n\n2.将财务收支审计与经济效益审计相结合\n环境审计不仅要对环保资金\n的筹集及使用情况、开展财政与\n财务收支的真实性和合法合规性 审计\n进行审计，而且更重要的是要根\n据国家各项起居室环境指标，测\n评被审计单位应承担的环境保护\n资金\n责任、环境治理责任及工作绩效，\n反映环境保护政策的落实情况\n因此，在开展财务收支审计的同\n时，必须开展环境绩效审计。\n\n---\n\n**p106** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_106.jpg)\n\n3.将审计人员与环保专业技术人员相结合\n环境审计专业技术性很强，审计人员仅有财务、审计知识是不能\n适应工作需要的，还必须熟悉国家环保法律、法规、制度和宏观经济\n政策，同时还要有综合分析、判断能力，因此，现阶段开展环境审计，\n一方面审计人员要通过学习和实践，尽快提高素质，成为既懂财务又\n懂环保、具有宏观分析问题能力的复合型人才，提高环境审计质量；\n另一方面，可以聘请环保专业技术人员参与审计组，合作开展审计，\n促进审计向纵深方向发展，尽快发挥环境审计的社会功效。\n\n---\n\n**p107** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_107.jpg)\n\n目前环境审计刚刚起步，企业环境审计是最基本的，其中企业清\n洁生产审计应用较广泛。清洁生产审计是指对组织产品生产或提供服\n务全过程的重点或优先环节、工序产生的污染进行定量监测，找出高\n物耗、高能耗、高污染的原因，然后有的放矢地提出对策、制定方案，\n减少和防止污染物的产生。清洁生产审计的一个重要内容就是通过提\n高能源、资源利用效率，减少废物产生量，达到环境效益和经济效益\n的和谐统一。清洁生产审计方法详见本书第7章。\n\n---\n\n**p108** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_108.jpg)\n\n第七节 环境管理信息系统\n一、环境信息及其系统\n二、环境管理信息系统的设计与评价\n·三、环境决策支持系统的设计与评价\n\n---\n\n**p109** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_109.jpg)\n\n一、环境信息及其系统\n1.环境信息\n环境信息是在环境管理工作中应用的经收集、处理而以特定形\n式存在的环境知识，以数字、字母、图像和音像等多种形式存在。\n环境信息是环境系统受人类活动等外来影响作用后的反馈，是\n人类认知环境状况的来源。因此，环境信息是环境规划与管理系统\n的神经。\n环境信息除具有一般信息的事实性、等级性、传输性、扩散性\n和共享性等基本属性外，还具有时空性、综合性、连续性和随机性\n的特征。\n\n---\n\n**p110** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_110.jpg)\n\n2.环境信息的检索\n环境信息在各种学术刊物和内部资料上均有刊登，环境管理人\n员可充分利用国内外的检索刊物，查阅相关信息。\n序号\n名称 说明\n全国报刊索 它是全国报刊的一个分册，由上海图书馆编辑出版，\n1 引科技版\n以题录形式按中国图书分类法分类编制，分类号为X。\n它是目前国内环境科学技术信息唯一的检索刊物，\n是全国科技信息检索体系的组成部分，采用中、英、德、\n法、日、俄6种文字，报道国内外百种期刊中有关环境科\n学技术的最新文献资料。以文摘和题录形式向广大读者\n环境科学文\n2 摘 提供环境信息服务，全年报道量约3600篇，其中文摘约\n占70%，题录约占30%，报道内容具有科学性、技术性、\n动态性、实用性、准确性和系统性。\n\n---\n\n**p111** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_111.jpg)\n\n序号\n名称 说明\n它由中国环境科学研究院情报研究所编辑，中国环\n境科学出版社出版，以全国环保科技情报网交流的内部\n中文科技资\n资料为主要资料来源，集中报道我国有关环境科学的会\n3 料目录一环\n议论文、科技成果、出国访问考察、来华技术座谈、学\n境科学\n位论文、引进技术成套资料以及中文期刊上译文资料等。\n国外科技资\n它由科学技术文献出版社出版，是一种题录检索工\n料馆藏目\n具，报道中国科技情报研究所人藏的有关环境污染与保\n4 录一环境污\n护方面的科技资料文献。\n染与保护\n它是美国生物科学情报服务社编辑出版的英文刊物，\n环境污染物\n按类目（水污染、微生物、食品卫生、气体污染、职业卫\n对人体健康\n5 影响文摘 生、农药、射线、土壤、物理污染物、植物、动物、微\n粒污染及其化学原因等）编排。\n\n---\n\n**p112** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_112.jpg)\n\n序\n号 名称 说明\n空气与水保 它收录了世界各国300多种期刊及90种会议文件以及\n护一API文摘 其他出版物中有关空气与水保护方面的文献。\n它收录了美国1000余种期刊、政府文献、研究报告、\n环境文摘 会议记录以及新书中有关环境污染与环境保护研究方面\n7 的文献资料。\n它报道各国出版的400余种环境科学技术期刊的近期\n目次，主题包括人类生态学、空气、土地资源、水资源、\n环境期刊文\n8 营养与保健、能源等，并附有主题和作者索引及年终累\n献题录\n积索引。\n它报道的主要类目有空气污染、水污染、土壤污染、\n9 污染文摘\n海洋污染、噪声污染等。\n\n---\n\n**p113** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_113.jpg)\n\n序号\n名称 说明\n它主要报道环境公害、水质污染、水质污染控制技\n科学技术文\n术、大气污染、大气污染控制技术、废弃物处理、其他\n10 献速报一环\n公害、污染物保护、恶臭、农药与残留农药、放射性污\n境公害篇\n染、自然保护等类目。\n水研究中心 它摘录了世界各国关于给水、水质分析、污染和废\n通报 水处理、天然水源污染等。\n\n---\n\n**p114** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_114.jpg)\n\n3.环境信息系统\n环境信息系统：\n环境信息从产生到应用于环境保\n护工作所构成的系统。\n环境信息系统的构成：\n它由工作人员、设备（计算机、\n网络技术、GIS技术、模型库等）\n及环境原始信息等组成。\n环境信息系统按内容分为：\n环境管理信息系统（EMIS）\n环境决策支持系统（EDSS）\n\n---\n\n**p115** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_115.jpg)\n\n（1）环境管理信息系统\n环境管理信息系统（EMIS）是以现代数据库技术为核心，\n将环境信息存储在电子计算机中，在计算机软、硬件支持下，\n实现对环境信息的输入、输出、修改、删除、传输、检索和计\n算等各种数据库技术的基本操作，并结合统计数学、优化管理\n分析、制图输出、预测评价模型、规划决策模型等应用软件，\n构成一个复杂而有序的、具有完整功能的技术工程系统。它既\n是各种环境信息的数据库，又是环境管理政策和策略的实验室。\n\n---\n\n**p116** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_116.jpg)\n\n其基本功能包括：①全面准确地查询和检索各种环境信息，系\n统提供环境科研和管理所需要的各种数据和信息并具有统一的格\n式。②分析各种空间数据，利用数学模型进行数据加工，进行区\n域环境质量的现状评价、污染源评价、污染控制方案预测、经济\n发展对环境影响的预测以及区域环境质量控制规划等工作。③决\n策支持，针对不同层次环境管理部门的不同要求，输出各种图件\n和报告，为环境管理工作提供辅助决策。④有效地利用系统本身\n的功能，可降低系统成本，提高效益。\n\n---\n\n**p117** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_117.jpg)\n\n收集 录用\n存储 环境信息 以报表、图表、图形等形式输出信\n息\n加工 处理\n为政府决策者、企业管理者及公众和NGO提供\n数据参考\n\n---\n\n**p118** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_118.jpg)\n\n建设项目环境管理的基本目标主要包括：\n①实现基本信息、污染物的预测排放量与实际排放量、区域范围\n“三废”排放分布、区域范围污染物累积负荷等专题图的显示；\n②实现通过地图对建设项目基础数据查询分析结果进行图文互查，\n并针对专题信息能在图上进行任意选取范围进行分析、汇总，生成\n专题图表。\n数据采集\n地理数据库 移动GIS\n服务器\n信息发布\n\n---\n\n**p119** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_119.jpg)\n\n正安市流南告环撞景\n空气环境质量 统平台 水环境质量\nAQI指数 45优 首要污染物\n2021-10-15 合平合入口 欧公告 GS统 环吸监用 环乐爱素 行155841 河流23总断面50水源地21\n本月优良天数 废气 废水 污水处理厂 尾气超标 考核目标 2021-09485 458 27 985 考楼日标 012 鹿·12 37 达标斯面 0\n轻杂0 中方染0 达标率 0%\n染0 -100% 咨控\n空气质量目标考核指标 未达标站点 (0)\n累计优良天数 优良率 日标优良天数 同比\n247天 86% 311 天 -27%\n空气质量预报 2021-09-15 2021-10-15 水质自动监测信息\n46 39 31 流城断阳名际 水淡列\n2942 2021-101213:050\n甘泉贝 朱家沟 2021-10-1505:0006010010Z60Z60660 47\n证后监管 40 36 环境执法\n许可证发放\n支含业 已整64 点 129 52 1347 28817 未皮321 韵化 256 53 123450\n排为记 2039 始查次数问企业数\n应 275 税款 处罚企业数 处罚金额\n102 实报 280 25602 元 环信恒辉科技 6 2155.706万元\n\n---\n\n**p120** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_120.jpg)\n\n（2）环境决策支持系统\n环境决策支持系统（EnvironmentalDecisionSupportSystems，简称EDSS）是将决策支持系统引I入环境规划、\n管理、决策工作中的产物，对定结构化、未定结构化或不定\n结构化问题进行描述、组织，进而协助人们完成管理决策的\n支持技术。其基本功能是收集、整理、贮存并及时提供本系\n统与本决策有关的各种数据，对环境信息进行加工、处理、\n分析、综合、预测、评价。\n科学性\n效率\n\n---\n\n**p121** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_121.jpg)\n\n环境决策支持系统通常具有以下几个主要组成部分：\n数据库：存储大量的环境数据，包括环境监测数据、污染源信息、地\n理信息、社会经济数据等。\n模型库：包含各种用于环境预测、模拟和评估的数学模型和算法，例\n如大气扩散模型、水质模型、生态模型等。\n知识库：积累环境领域的专业知识、法规政策、经验案例等，为决策\n提供理论和实践依据。\n人机交互界面：允许决策者输入问题和参数，查看分析结果，并以直\n观的方式展示数据和模型输出。\n决策分析模块：运用数据分析、多准则决策分析、风险评估等方法，\n对不同的决策方案进行比较和评估。\n\n---\n\n**p122** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_122.jpg)\n\n收集、整理、贮存各种环境信息和数据\n主要功能 灵活运用模型方法对环境信息进行加工处理、分析、综合、\n预测、评价以提供决策信息\n提供友好的人机界面和模型输出功能；良好的环境信息传输\n功能\n快速的信息加工速度及响应时间\n具有定性分析和定量研究相结合的特定环境问题的方式\n\n---\n\n**p123** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_123.jpg)\n\n二、环境管理信息系统的设计与评价\n1.信息系统设计的目标、任务和原则\n目标：充分利用先进的GIS技术、数据库技术、网络通信技术、\n分布式计算技术等，建设一个科学、高效的环境应用信息系统\n为环境管理信息系统的开发目标。\n根本任务：逻辑模型→物理模型（功能设计→数据库设计一应用\n设计）的转变。\n设计原则：①实用性（面向需求，功能完善）；②标准性（标准化、\n统一化）；③先进性（紧跟技术潮流）；④动态性（动态调整、与环\n境业务发展相适应）；开放性（后续开发）；6经济性（性价比）；\n?安全性（数据安全，逻辑可靠）。\n\n---\n\n**p124** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_124.jpg)\n\n2.环境管理信息系统的设计与评价\n环境管理信息系统设计过程可分为四个阶段：\n①可行性研究。\n②系统分析。\n③系统设计。\n④系统的实施与评价。\n石家庄污染源动态管理系统\n系统设置\n行业类型 美注度 行政处罚\n国控 t22 行政区具\n451 59t\n火电行业 35 印行业 35 长安区 29 451\n水范行症 614 65 污水处理厂 614 65 西分比 166\n行业美行\n\n---\n\n**p125** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_125.jpg)\n\n环境管理信息系统EMIS的设计过程\n终止\n不可行 否定 -一一 否定\n提出问题 现行系统调查 明确目标 可行性分析 详细调查 信息流分析 逻辑设计 初步设计 详细设计 程序设计 系统测试 运行维护\n审校 审核 审核\n验收\n修改目标或创造条件 修改 修改\n可行性研究 系统分析 系统设计 系统设计 系统实施与评价\n\n---\n\n**p126** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_126.jpg)\n\n环境管理信息系统各开发程序及内容\n阶段名称\n目的或任务 步骤 主要内容 主要成果\n可行性研究的前提：\n明确研究的目的、要\n可行性研究 (1）提出请求\n为整个工作过 求、方法及评价准则 可性性\n程提供一套必 用户调查：分析现有 报告；\n须遵循的衡量 系统，提出系统选择 项目开发\n标准 (2）可行性研究 方案进行可行性投资 计划\n效益分析\n(3）批准 主要审核\n\n---\n\n**p127** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_127.jpg)\n\n云南省地质环境管理信息系统 2017年12月28日周四 好，欢迎用用想环营信系统\n8-19℃多云 禁票进出\n安全防护管理\n地质环境业务数据\n地质灾害 地下水 矿山地质环境 地质遗迹 基础数据\n地质环境业务管理\n综合业务数据管理 数据采集系统管理 数据系统管理 政务系统管理 应急支撑管理\n\n---\n\n**p128** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_128.jpg)\n\n阶段名称\n目的或任务 步骤 主要内容 主要成果\n系统实施与评价 系统程序；\n系统设计完成后就\n各模块程序的编写； 系统测试报\n应交付使用，并在\n系统功能和性能的 告；\n运行过程中不断完\n(7）建立系 评价报告; 系统使用报\n善，不断升级，因\n统调试程序 实施组织管理运行 告；\n而需要对其进行评\n维护 系统评价验\n价\n收报告\n\n---\n\n**p129** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_129.jpg)\n\n三、环境决策支持系统的设计与评价\n环境决策支持系统的设计分为制定行动计划、系统分析、总体结\n构设计和系统的实施与评价四个步骤。\n①制定行动计划，可有快速实现方案、分阶段实现方案和完整的\nEDSS方案；②系统分析步骤是EDSS设计的重要步骤，包括确定系\n统的组成要素，划分内在变量，分析各要素间的相互关系，确定\nEDSS的基本结构和特征；③总体结构设计阶段，由用户接口、信息\n子系统、模型子系统和决策支持子系统构成；④提供系统支持决策\n的分析与评价的相互关联的功能子模块，进而完善该系统。\n\n---\n\n**p130** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_130.jpg)\n\n四、中国的环境信息系统建设\n1.网络建设\n国家环境信息网络总体框架是以国家环境信息中心网络系统为中\n枢，省级环境信息中心为网络骨干，以城市环境信息中心为网络基础\n国家级环境信息网络系统以国家环境保护总局信息中心计算机网络系\n统为主体，系统组成还包括国家环境保护总局机关办公自动化网络系\n统、中国环境科学研究院信息网络系统、中国环境监测总站环境监测\n信息网络系统以及国家环境保护总局在京直属单位环境信息网络系统\n等。\n\n---\n\n**p131** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_131.jpg)\n\n2.机构能力建设\n基本形成了由国家级、省级、城市级信息中心组成的机构体系。\n整个组织体系包括国家环境保护总局信息中心、23个省级环境信息\n中心和110个城市环境信息中心。\n3.系统建设\n初步形成以环境统计、污染源管理、环境监测为主要信息源的\n环境信息管理系统网络。形成一系列环境管理应用软件。\n\n---\n\n**p132** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_132.jpg)\n\n习题\n1.简述环境现状调查的内容和方法。\n2.简述环境评价的内容和方法。\n3.简述环境目标的组成。\n4.简述环境规划与管理指标体系的组成内容。\n5.简述环境统计的内容及研究和调查方法。\n6.简述社会发展预测的主要方法。\n7.简述经济发展预测的主要方法。\n8.简述环境质量预测的主要方法。\n9.简述环境审计的方法和内容。\n10.简述环境管理信息系统的组成和设计方法。\n\n---\n\n**p133** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_133.jpg)\n\n习题\n1.简述我国环境与发展十大对策，并说明各项对策\n包含的主要内容。\n2.试分析环境政策和环境管理制度的相关关系。\n3.请在三类相关政策（产业政策、技术政策、环境\n经济政策）中选择一类，通过查阅资料，收集汇\n总该类政策执行过程中，国家有关部门已颁布的\n各项规定（列出汇总表）。\n4.说明我国环境保护法规体系的构成。\n\n---\n\n**p134** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_134.jpg)\n\n习题\n5.2000年4月29日第九届全国人大常委会第15次会议\n审查通过的《大气污染防治法》是该法的第二次\n修订，请比较该法二次修订的主要内容，并分析\n我国大气污染防治的发展动向。\n6.试比较1996年版《水污染防治法》与1984年版\n《水污染防治法》内容的变化，并分析我国水污染\n防治的发展动向。\n7.试分析《环境影响评价法》规定开展规划的环境\n影响评价的原因和目的。\n\n---\n\n**p135** ![](../004-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法/page_135.jpg)\n\n习题\n8.简述八项环境管理制度的含义和相关规定。\n9.举例说明”土地利用规划制度”实施过程对污染严\n重城市所采取的补救措施\n10.说明我国环境标准的分类方法，并按污染控制因\n子分类例表归纳常用环境标准目录。\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 3 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 4 节 · 118 页\n\n> `004-第四章环境规划与管理中的综合分析方法-环境规划与管理.pdf` · 涉章 [4]\n\n- [p001](../004-第四章环境规划与管理中的综合分析方法-环境规划与管理/page_001.jpg)  · 环境规划与管理\n- [p002](../004-第四章环境规划与管理中的综合分析方法-环境规划与管理/page_002.jpg)  · 第二/三章\n- [p003](../004-第四章环境规划与管理中的综合分析方法-环境规划与管理/page_003.jpg)  · 课前回顾\n- ...余 115 页, 参 [`004-第四章环境规划与管理中的综合分析方法-环境规划与管理/`](../004-第四章环境规划与管理中的综合分析方法-环境规划与管理/)\n\n### 辅 2 · 第 5 节 · 134 页\n\n> `005-第四章环境规划与管理中的综合分析方法-第四章环境规划与管理中的综合分析方法.pdf` · 涉章 [4]\n\n- [p001](../005-第四章环境规划与管理中的综合分析方法-第四章环境规划 效益值之差；选各方案最大后悔值中最小者\n\n### 三、重要案例 / 实验 / 例题\n\n- **例4-1（风险型决策）**：某厂开发环保产品，三种市场状态P₁=0.4/P₂=0.5/P₃=0.1，三方案；最大收益期望值选A₂(=64)，最小机会损失亦选A₂(=8)\n- **例4-2（不确定型决策）**：五方案四状态——乐观选A₂(max=9)、悲观选A₁(max of min=4)、折衷(α=0.45)选A₁(C=5.35)、后悔值选A₄(最小最大后悔值=2)\n- **例4-3（防噪耳机生产）**：5种日产量×5种销售量——小中取大选A₁、大中取大选A₅、等可能性选A₄(2400)、最小机会损失选A₃\n- **石家庄污染源动态管理系统**：EMIS实例\n- **云南省地质环境管理信息系统**：含地质灾害、地下水、矿山地质环境等业务管理\n- **中国环境信息网络**：1个国家中心+23个省级中心+110个城市中心\n\n### 四、高频考点（速记）\n\n1. **环境现状调查三方法**：收集资料法（首选省人力但仅二手）、现场调查法（第一手但量大）、遥感法（远距离综合探测）\n2. **环境现状调查六内容**：环境特征、生态、污染源、环境质量、环保措施效果、环境管理现状\n3. **环境评价四方面**：自然环境、社会经济、环境质量、污染源评价\n4. **自然环境评价八法**：类比分析、列表清单、生态图（指标+重叠）、指数与综合指数、景观生态学、AHP、生物生产力、其他（回归/聚类等）\n5. **污染源评价三法**：排毒指数法、环境污染能力潜在指数法、等标污染负荷法\n6. **环境统计指标体系七子系统**：工业污染防治、生活污染防治、农业污染防治、治理投资、自然生态保护、环境管理、自身建设\n7. **环境统计三研究法**：大量观察法、综合分析法、归纳推断法\n8. **环境预测分类**：按内容（区域/行业/专题）、按作用（定性/定量/定时/定比/评价）、按时间（短期<5/中期5~15/长期20年）\n9. **定性预测四法**：专家会议法、德尔菲法、主观概率法、层次分析法\n10. **定量预测三法**：时间序列法、逻辑型规律法（S规律）、数学模型法\n11. **决策分类**：确定型vs非确定型（风险型—概率已知；不确定型—概率未知）\n12. **决策三要素**：自然状态（不可控）、策略（可控）、益损值\n13. **不确定型决策五准则**：等可能性(1/n)、乐观(大中取大)、悲观(小中取大/Wald)、折衷(α系数)、后悔值(最小最大/Savage)\n14. **决策六原则**：信息快准全、预测未来、可行性、系统性、对比优选、集团决策\n15. **环境审计七内容**：符合性、环保管理系统、过渡、有害物质处理存放清理、污染预防、环境效益、产品审计\n16. **EMIS四功能**：查询检索、空间分析+模型加工、决策支持、降低成本提高效益\n17. **EDSS五组成**：数据库、模型库、知识库、人机交互界面、决策分析模块\n18. **EMIS设计四阶段**：可行性研究→系统分析→系统设计→实施与评价\n19. **EMIS设计七原则**：实用性、标准性、先进性、动态性、开放性、经济性、安全性\n\n### 五、思考题 / 自测\n\n- [x] 题：环境现状调查三种方法优缺点？ 答：①收集资料法—范围广省人力但仅二手不全面；②现场调查法—第一手数据但工作量大受条件限；③遥感法—远距离综合探测技术要求高\n- [x] 题：等标污染负荷法如何确定主要污染源？ 答：按等标污染负荷排序，计算累计百分比，累计>80%的污染源为主要污染源\n- [x] 题：乐观准则vs悲观准则vs折衷准则？ 答：乐观=大中取大（冒险）；悲观=小中取大（保守/Wald准则）；折衷=α·max+(1-α)·min（α=0为悲观，α=1为乐观）\n- [x] 题：风险型决策与不确定型决策区别？ 答：风险型—各自然状态概率可预先估计计算；不确定型—各状态概率一无所知，靠主观倾向决策\n- [x] 题：EMIS与EDSS区别？ 答：EMIS侧重信息存储检索和模型加工，是数据库+应用软件系统；EDSS侧重对结构化/未结构化问题提供决策支持，含数据库+模型库+知识库+决策分析模块\n\n### 六、与前后章之关联\n\n- 承前章：第0/2章奠定基本概念和理论基础（环境容量、环境承载力、可持续发展等），本章提供具体分析方法工具\n- 启后章：第5章环境规划基本内容和程序将运用本章的调查、评价、预测、决策方法；第7章清洁生产审计是环境审计的深入展开\n"}, {"id": "ch-05", "group": "章节素材", "title"
