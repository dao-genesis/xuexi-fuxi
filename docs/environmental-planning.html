 2.0 2.012 氟化物（以F-计） 1. 0 1. 0 1. 0 1.5 1.513 硒 0.01 0.01 0.01 0.02 0.0214 砷 0.05 0.05 0.05 0.1 0.1\n\n#### IV类水河、潮\n\n#### V美水河道\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n\n#### 第四节环境功能区划\n四、声环境功能区\n根据我国《城市区域环境噪声标准》 （GB3096-2008），将城市声学\n环境分为0-4共五类区域：\n0类声环境功能区。指康复疗养区等特别需要安静的区域；\n1类声环境功能区。以居民住宅、医疗卫生、文化教育、科研设\n计、行政办公为主要功能，需要保持安静的区域；\n2类声环境功能区。指以商业金融、集市贸易为主要功能，或者\n居住、商业、工业混杂，需要维持住宅安静的区域；\n3类声环境功能区。指以工业生产、仓储物流为主要功能，需要\n防止工业噪声对周围环境产生严重影响的区域；\n4类声环境功能区。指交通干线道路两侧一定距离之内，需要防\n止交通噪声对周围环境产生严重影响的区域，包括4a类和4b类\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n第五节环境规划方案的设计和决策过程\n\n#### 第五节 环境规划方案的设计和决\n\n#### 策过程\n\n#### 、环境规划方案设计的原则\n\n#### 环境规划方案的设计过程\n三、环境规划方案设计的决策\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n第五节环境规划方案的设计和决策过程\n一、 环境规划方案设计的原则\n（1）因地制宜，紧扣目标：加强目标意识，充分了解环\n境问题和污染状况，明确自身的治理和管理技术，现有设\n备及可能投入的资金及环境污染削减能力和承载力。同时\n在设计中，提出的各种措施和对策一定要考虑是否抓住问\n题实质，能不能实现，是否对准目标等。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n第五节环境规划方案的设计和决策过程\n（2）提高资源利用率为中心：环境污染实质是资源和能\n源的浪费，在规划方案设计中，空气污染综合整治、生态\n保护、总量控制、生产结构与布局规划都要围绕资源利用\n率这个中心。\n（3）遵循国家或地区有关政策法规：要在政策允许范围\n内考虑设计方案，提出对策和措施，避免与之抵触。\n\n#### 杜绝浪费\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n第五节环境规划方案的设计和决策过程\n二、环境规划方案的设计过程\n（1）分析调查评价结果。包括环境质量、污染状况、主要污染物和\n污染源；现有环境承载力、污染削减量、现有资金和技术。从而明\n确环境现状、治理能力和污染综合防治水平。\n（2）分析预测结果。弄清环境存在的主要问题，明确环境现有承\n载能力，削减量和可能的投资、技术支持，从而综合考虑实际存在的\n问题和解决问题的能力。\n（3）详细列出环境规划总目标和各项分目标。以明确现实环境与\n环境目标的差距。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n第五节环境规划方案的设计和决策过程\n(4) 制定环境发展战略和主要任务。从整体上提出环境保护方向、\n重点、主要任务和步骤。\n（5）制定环境规划的措施和对策。运用各种方法制定针对性强的措\n施和对策，如区域环境污染综合防治措施、生态环境保护措施、自\n然资源合理开发利用措施、调整生产力布局措施、土地规划措施、\n城乡建设规划措施和环境管理措施。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n第五节环境规划方案的设计和决策过程\n三、环境规划方案的决策\n决策问题一般可分为确定型决策和随机型决策两类。\n确定型决策是指只存在一种完全确定的自然状态的决策，确定型规划\n方案常采取的决策方法有：线性规划法、非线性规划法、动态规划法、\n环境费用效益分析等方法。\n随机型决策是指各种自然状态都是随机性出现的，如果这种状态出现\n的概率已知或者可以估计，则称之为风险型决策，否则就变成了一个\n非确定型决策问题。风险型规划方案常用的决策方法有：最大可能法、\n期望值法、决策树分析法、贝叶斯决策法和灵敏度分析法；非确定型\n规划方法常用的决策方法有：乐观决策法、悲观决策法、折中决策法\n后悔决策法和等概率决策法。\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### 第六节环境规划的实施\n\n#### 第六节 环境规划的实施\n环境规划的实施，就是按照规划所规定的环境目标和任\n务组织落实，发挥规划的指令性作用，实现经济、社会和环\n境的协调发展。环境规划的实施，涉及各级政府和各有关部\n门，比规划的编制更复杂更困难。环境规划的实施应具备以\n下几个条件：\n1.将环境规划与国民经济和社会发展规划统一起来\n2.环境规划的分解\n3.落实环境保护资金\n4.实行环境保护目标管理\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n#### 第六节环境规划的实施\n1.将环境规划与国民经济和社会发展规划统一起来\n将环境规划纳入国经发展计划是实现环境法制管理的具体行动。\n环境规划任务由环境保护部门和计划部门联合下达，其编制工作要与国\n民经济和社会发展规划的编制同步进行，采取相同的程序，并纳入其中。环\n境规划与国民经济和社会发展规划同时批准下达。\n环保部门应与发改委、市政和建委等部门联系，将大中型污染治理项目\n和生态保护项目列入规划之中，淘汰落后的生产工艺，引进节能新技术，并\n强制重点污染行业实行清洁生产审核。把环境目标考核列入相关政绩考核\n同时切实发挥公众参与作用，让环境保护置于全民监督之下，形成全民参与\n保护环境、人人有责的观念。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n\n#### 第六节环境规划的实施\n2.环境规划的分解\n环境规划按时间跨度可分为长期规划、五年规划和年度规划等。\n按照编制顺序，一般是先编制长期规划，然后编制五年规划，在此\n基础上编制年度规划。长期规划和五年规划一般是对环境目标的长\n远要求，其实现有赖于每年的具体执行情况，年度规划就是落实这\n一目标的基石，各地区、各部门和各单位、行业遵照执行。因此，\n各级政府在分解制定年度国民经济和社会发展规划的同时，也必须\n把年度环境保护规划作为一项重要内容纳入其中\n1.编制年度计划\n2.环境规划目标的空间分解\n3.行业或企业污染治理任务的分解\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n\n#### 第六节环境规划的实施\n2.环境规划的分解\n（1）环境年度规划分解\n①环保计划必须有明确的目标和达到目标的指标体系，包括综合指标\n和形成专项计划书的指标。\n②环保计划必须与环境保护责任目标、城市环境综合整治定量考核、\n限期治理，重大工程建设项目等实际工作相对应，并紧密结合起来，\n并与环境统计、考核工作相协调。\n③环保计划应与城市、区域的经济发展计划相对应，同步编制并纳入\n其中，参与综合平衡。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n\n#### 第六节环境规划的实施\n④环保计划特别是年度计划的指标、任务、措施、资金、考核目标、\n责任承担等，均需定量化和具体化，逐条逐项层层落实，所列环保项\n目应数据齐全，能检测、有资金保证。\n③环保计划要从实际出发，与经济支撑能力相适应，并充分考虑科学\n技术进步的作用。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n\n#### 第六节环境规划的实施\n（2）环境规划目标的空间分解\n\n#### ①宏观质量指标分解：如大气质\n\n#### 量指标、水环境质量指标、噪声\n\n#### 控制指标、固体废弃物综合利用\n\n#### 与处理指标，自然保护或生态保\n护指标等。各类指标的选择应能\n保证地区的环境功能。\n\n#### ②污染物削减指标分解：如主要\n削减的污染物及分期分批削减量，\n主要须完成的治理工程等。\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n\n#### 第六节环境规划的实施\n（3）行业或企业污染治理任务的分解\n①多排放者多削减原则：即根据规划编制过程中\n的污染排序实行分解。\n②重点性原则：即抓住主要影响地区或功能区环\n境质量的行业或企业。实行有重点的分配和有重\n点的负担。\n③经济性原则：即按投资少而污染物削减量大的\n原则实行优化分配，增强规划分解的合理性和可\n行性。\n④依靠科技进步：即注意结合技术改造、工艺改\n革进行分解。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n\n#### 第六节环境规划的实施\n3.落实环境保护资金\n资金是实施环境规划的关键，是制约环境规划目标\n的主要因素之一。环保投资规模一般用占当年GDP的百\n分数表示，我国“十一五”期间环保投资约占当期GDP\n额度的1.35%。\n\n#### 绿色金融\n\n#### GREEN\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n\n#### 第六节环境规划的实施\n根据《国务院关于环境保护工作的决定》 》（国发（1984）\n64号文）的精神，现对环境保护资金渠道明确规定如下：\n（1）一切新建、扩建、改建工程项目（含小型建设项目），必\n须严格执行“三同时”的规定，并把治理污染所需资金纳入固定\n资产投资计划。各级计划、经济、建设和环境保护部门都要在这\n方面严格把关。同时由建设部会同国家计委、农牧渔业部尽快研\n究制定小型企业环境保护法规，报国务院审批颁布实行。\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n\n#### 第六节环境规划的实施\n（2）各级经委、公交部门和地方有关部门及企业所掌握的更新改造\n资金中，每年应拿出7%用于污染治理；污染严重、治理任务重的，\n用于污染治理的资金比例可适当提高。企业留用的更新改造资金，应\n优先用于治理污染。企业的生产发展基金可以用于治理污染。\n集体企业治理污染的资金，应在企业“公积金”、“合作事业基\n金”或更新改造资金中安排解决。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n\n#### 第六节环境规划的实施\n（3）大中城市按规定提取的城市维护费，要用于结合基础设\n施建设进行的综合性环境污染防治工程，如能源结构改造建\n设，污水及有害废弃物处理等。\n（4）企业交纳的排污费要有80%用于企业或主管部门治理\n污染源的补助资金。其余部分由各地环境保护部门掌握，主\n要用于补助环境保护部门监测仪器设备购置、监测业务活动\n经费不足的补贴、地区综合性污染防治措施和示范科研的支\n出，以及宣传教育、技术培训、奖励等方面，不准挪作与环\n境保护无关的其他用途。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n\n#### 第六节环境规划的实施\n（5）工矿企业为防治污染、开展综合利用项目所产产品实\n现的利润，可在投产后五年内不上交，留给企业继续治理污\n染，开展综合利用。\n工矿企业为消除污染、治理“三废”、开展综合利用项\n目的资金，可向银行申请优惠贷款。属于技术改造性质的，\n可向工商银行申请贷款；属于基建性质的，可向建设银行申\n请贷款。\n工矿企业用自筹资金，交纳排污费单位用环境保护补助\n资金治理污染的工程项目，因污染搬迁另建的项目，免征建\n筑税。\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n\n#### 第六节环境规划的实施\n（6）关于防治水污染问题，应根据河流污染的程度和国家\n财力情况，提请列入国家长期计划，有计划有步骤地逐项\n进行治理。\n（7）环境保护部门为建设监测系统、科研院（所）、学校\n以及治理污染的示范工程所需要的基本建设投资，按计划\n管理体制，分别纳入中央和地方的环境保护投资计划。这\n方面的投资数额要逐年有所增加。\n（8）环境保护部门所需科技三项费用和环境保护事业费，\n应由各级科委和财政部门根据需要和财力可能，给予适当\n增加。\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n\n#### 第六节环境规划的实施\n4.实行环境保护目标管理\n为了实现环境保护的规划目标，仅靠一般化的行政管理模式，已\n经不能适应目前环境保护工作的需要。把环境保护规划目标和任务与责\n任制紧密结合起来，实行各级领导的环境保护目标责任制的管理制度，\n是顺利实现规划目标和任务的主要措施。\n环境保护目标责任制是以签订责任书的形式，从各级领导的职责\n范围出发，具体规定他们在任期内的环境保护目标和任务这一基本职责\n从而理顺各地区、各部门和各单位在环境保护方面的关系，使改善环境\n质量的规划目标和任务得到层层落实。实行环境规划目标责任制，有利\n于将纳入国民经济和社会发展规划中的环境保护规划目标和任务具体化\n有利于调动各地区、各部门和各单位的力量共同保护和改善环境。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n\n#### 环境规划编制程序总结\n\n#### 社会经济发展预测\n环境质量、生态、资源预测 编制工作计划 自然生态环境现状\n污染物产生排放预测 环境现状调查 环境质量现状\n环境治理和投资预测 环境预测 社会经济现状\n\n#### 确定环境目标\n\n#### 拟定规划方案\n环境、经济、\n专家支持系统 不优化 社会协调性分 未通过审批\n\n#### 规划方案优化 析\n\n#### 优化\n\n#### 确定规划方案\n\n#### 审批通过\n\n#### 规划方案实施\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n\n#### 习题\n1.简述环境规划的工作程序。\n2.简述环境规划目标与环境规划指标体系间的关系。\n3.说明环境规划指标体系包括哪些方面的内容。\n4.论述环境评价和环境预测的主要内容。\n5.什么是环境功能区划？它的主要类型有哪些？\n6.环境规划方案的设计和决策是怎样进行的？\n7.简述环境规划实施的条件。\n"}, {"id": "pdf-007", "group": "原始课件 · PDF原文", "title": "007-第六章环境规划-第六章环境规划", "md": "# 第六章环境规划\n\n> 来源: 007-第六章环境规划-第六章环境规划.pdf\n> 页数: 115\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第六章\n\n#### 环境规划\n\n#### 第一节 大气环境规划\n\n#### 第二节 水环境规划\n\n#### 第三节 固体废物管理规划\n\n#### 第四节 生态环境规划\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 主观题10分\n假设你要对乌鲁木齐市某工业园区进行规划，请\n\n#### 问该怎么开展工作\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 学习要点\n了解大气环境规划、水环境规划的基本程序和步骤，掌握\n大气环境规划、水环境规划、固体废物管理规划和生态环境规\n划的内容，熟悉大气环境和水环境的污染防治措施，掌握大气\n环境规划、水环境规划和生态环境规划现状调查的内容和方法。\n学习重点：大气环境规划、水环境规划、固体废物管理规划\n和生态环境规划的方法、程序和内容。\n学习难点：大气环境规划、水环境规划、固体废物管理规划\n和生态环境规划的方法。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 6.1大气环境规划\n\n#### 大气环境质量的优劣不仅\n\n#### 直接影响人群健康乃至以人为主\n\n#### 体的城市生态系统，而且关系到\n社会、经济的持续健康发展。为\n\n#### 协调城市社会、经济健康发展与\n\n#### 大气环境保护之间的关系，制定\n\n#### 与社会经济发展相匹配的大气环\n境规划是行之有效的手段。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 6.1大气环境规划\n一、大气环境规划的主要内容与类型\n二、大气环境污染源调查与评价\n三、大气污染预测\n四、大气环境规划目标与指标体系\n五、大气污染物总量控制方法\n六、大气污染防治措施\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n大气环境规划是为了平衡和协调某一区域的大气环境与社会、经济\n之间的关系，以期达到大气环境系统功能的最优化，最大限度地发挥大\n气环境系统组成部分的功能。\n在大气环境规划时，首先对大气环境系统进行系统分析，确定各子系\n统之间的关系；其次对规划期内的主要资源进行需求分析，重点分析城\n市能流过程，从能源的输入、输送、转换、分配和使用各个环节中，找\n出产生污染的主要原因和控制污染的主要途径，从而为确定和实现大气\n\n#### 环境目标提供可靠保证\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n1.大气环境规划的主要内容\n\n#### 10 查清大气环境的主要问题\n查清规划区主要污染源，并预测其发展趋势。\n\n#### 2 ）确定大气环境规划目标\n根据所要解决的主要环境问题和社会经济与大气环境协调发\n展的需求，确定合理的规划目标。\n（3）建立大气环境质量模型\n确定污染源与环境目标之间的关系。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n1.大气环境规划的主要内容\n（4）制定大气污染控制方案\n制定多套包括切实可行的治理措施的方案。\n(5）方案优选\n对多种方案进行环境、经济和社会影响分析，通过决策\n分析，选择最佳方案。\n(6）实施规划方案\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n2.大气环境规划的类型\n大气污染物排放与控制是相互联系而又相对独立的两个阶段，在进\n行大气环境规划时，应将它们一起考虑，才有可能以最小的费用获得最\n大的效益。大气环境规划总体上划分为两类，即大气环境质量规划和\n大气污染控制规划。这两类规划相互联系、相互影响、相互作用构成了\n大气环境规划的全过程。\n（1）大气环境质量规划\n大气环境质量规划是以城市总体规划和大气环境质量标准为依据，\n规定了城市不同功能区主要大气污染物的浓度限值。它是城市大气环\n境管理的基础，也是城市建设总体规划的重要组成部分。大气环境质\n量规划模型主要是建立污染源排放和大气环境质量之间的关系。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n依据《环境空气质量标准》GB3095-2012）：\n1、一类区（自然保护区、风景名胜区和其他需要特殊保护的区域）：\n①S02：年平均浓度限值为20ug/m²，24小时平均浓度限值为50μg/m²，\n1小时平均浓度限值为150ug/m3。②N02：年平均浓度限值为\n40ug/m²，24小时平均浓度限值为80μg/m²，1小时平均浓度限值为\n200μg/m3。③c0：24小时平均浓度限值为4mg/m²，1小时平均浓度\n限值为10mg/m3。④0²：日最大8小时平均浓度限值为100μg/m3，1\n小时平均浓度限值为160ug/m3。PM1o：年平均浓度限值为\n40ug/m²，24小时平均浓度限值为50μg/m3。?PM2.5：年平均浓度限\n值为15pg/m3，24小时平均浓度限值为35μg/m3。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n二类区（居住区、商业交通居民混合区、文化区、工业区和农村地区）：\n①S02：年平均浓度限值为60μg/m3，24小时平均浓度限值为\n150μg/m²，1小时平均浓度限值为500μg/m²。②N02：年平均浓度限\n值为40μg/m²，24小时平均浓度限值为80μg/m3，1小时平均浓度限值\n为200μg/m²。③c0：24小时平均浓度限值为4mg/m²，1小时平均浓\n度限值为10mg/m3。@03：日最大8小时平均浓度限值为160μg/m²，1\n小时平均浓度限值为200μg/m3。?PM1o：年平均浓度限值为70ug/m²，\n24小时平均浓度限值为150μg/m3。?PM2.5：年平均浓度限值为\n35ug/m3，24小时平均浓度限值为75ug/m3。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 一大气环境规划的主要内容和类型\n（2）大气污染控制规划\n大气污染控制规划是指实现大气环境质量的方案。对于新建或污染较\n小的城市，大气污染控制规划可根据城市的性质、发展规模、工业结\n构、产品结构、资源状况、大气污染控制技术等，结合城市总体规划\n中其它专业规划合理布局。对于已经受到污染或部分污染的城市，\n大气污染控制规划的目的则主要是寻求实现城市大气环境质量规划的\n便捷、经济、可行的技术方案和管理方案。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 二大气环境污染源调查与评价\n1.大气污染物与污染源\n大气污染物是指由于人类活动或自然过程排入大气并对人类\n或环境产生有害影响的物质。根据存在的特征可分为气溶胶状\n污染物和气体状态污染物两类，前者主要表现为PM1o、降尘、\nTSP、PM2.5等；后者主要有SO2、NOx，COx、碳氢化合物和卤族\n化合物等。\n大气污染物的发生源或排放装置称为大气污染源。通常又可\n分为工业污染物、生活污染源和交通污染源，前两类污染源统\n称为固定源，交通污染源则称为流动源。另外，按污染源的几\n何形状，可分为点源、线源、面源和体源；按污染源的几何高\n度可分为高架源、中架源和低架源；按污染源排放污染物时间\n的长短，可分为连续源、瞬时源；按污染源排放形式可分为有\n组织排放源和无组织排放源。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n#### 二大气环境污染源调查与评价\n2.大气污染源的调查与分析\n大气污染源调查的目的是弄清规划区\n污染的主要来源，一般按工业污染源、生\n活污染源和交通污染源进行分类和调查。\n如有近期的工业污染源调查资料，一般可\n直接选用，而生活污染源和交通污染源的\n调查则可结合规划区的具体情况进行。但\n是，调查所得的基础资料和数据，必须能\n满足环境污染预测与制定污染综合整治方\n案的需要。主要包括以下几方面：\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 二大气环境污染源调查与评价\n2.大气污染源的调查与分析\n（1）画出污染源分布图\n画出规划区域范围内的大气污染源分布图及类型（点源、面源\n线源），标明污染源的位置、污染排放方式，并列表给出各主\n要参数。\n（2）点源调查统计内容\n排气筒底部中心坐标（一般按国家坐标系）及分布平面图；排\n气筒高度（m）及出口内径（m）；排气筒出口烟气温度（℃）：\n烟气出口速度（m/s）；各主要污染物正常排放量（t/a,t/h或\nkg/h)。\n（3）面源调查统计内容\n将规划区在选定的坐标系内网格化。按网格统计面源的如下参\n数：主要污染物排放量[t/(hkm²)]，面源排放高度（m），面源\n分类。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 二大气环境污染源调查与评价\n3.大气污染源的评价\n通过污染源的评价，确定出该规划区域的主要污染源和主\n要污染物，常采用等标污染负荷法和污染物排放量排序的方法。\n（1）等标污染负荷法：采用等标污染负荷法对区域工业污染\n源进行评价，用等标污染负荷法对污染源及污染物进行评价并\n排序。\n（2）污染物排放量排序：污染物排放量排序是直接评价某种\n污染物的主要污染源的最简单方法。采用总量控制规划法时，\n针对区域总量控制的主要污染物，对排放主要污染物的污染源\n进行总量排序。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 三大气污染预测\n1.大气污染源源强预测\nQi = K;W(1-ni)\n式中：Q；一源强，对瞬时排放源以kg或t计，对连续稳定排放\n源以kg/h或td计；\nK;一某种污染物的排放因子；\nW-燃料的消耗量，对固体燃料以kg或t计，对液体燃料以L\n计，对气体燃料以100m3计，时间单位以h或d计；\nmi一净化设备对污染物的去除效率，%；\ni-污染物的编号。\n2.大气环境质量预测\n常用的预测模型主要有两类：一是箱式模型，二是扩散模型。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 四大气环境规划目标与指标体系\n1.大气环境规划目标\n（1）大气环境质量目标\n大气环境质量目标是基本目标，依地域和功能区有所不同，\n由表征大气环境质量的指标具体体现。\n（2）大气污染物总量控制目标\n是以大气环境功能区环境容量为基础制定的，便于实施和管\n理的目标；通过制定污染物总量控制目标，将污染物控制在功\n能区环境容量的限度内，其余部分作为削减目标或削减量。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n#### 四大气环境规划目标与指标体系\n2.大气环境规划指标体系\n（1）气象气候指标。主要包括气温、气压、风向、风速、风频、日照、\n大气稳定度和混合层高度等。\n（2）大气环境质量指标。主要包括总悬浮颗粒物、飘尘、SO2、降尘、\nNOx，CO、光化学氧化剂、臭氧、氟化物、苯并花和细菌总数等。\n（3）大气污染控制指标。主要包括废气排放总量、SO排放量及回收率、\n烟尘排放量、工业粉尘排放量及回收量、烟尘及粉尘的去除率、CO排放量、\nNOx排放量、光化学氧化剂排放量、烟尘控制区覆盖率、工业尾气达标率和汽\n车尾气达标率等。\n（4）城市环境建设指标。主要包括城市气化率、城市集中供热率、城\n市型煤普及率、城市绿地覆盖率和人均公共绿地等。\n（5）城市社会经济指标。主要包括国民生产总值、人均国民生产总值、\n工业总产值、各行业产值、各行业能耗、生活耗煤量、万元工业产值能耗、\n城市人口数量、分区人口数量、人口密度及分布和人口自然增长率等。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 五大气污染物总量控制方法\n1.A-P值法\n\n#### A值法\nA值法属于地区系数法，只要给出控制区总面积及各功能分区的面积，\n再根据当地总量控制系数A值就能计算出该面积上的总充许排放量。\nA值法是以地面大气环境质量为目标值，使用简便的箱模式而实现的\n具有宏观意义的总量控制；是对以往实行的P值法的修改。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 五大气污染物总量控制方法\n1.A-P值法\n\n#### P值法\nP值法是根据烟囱有效高度估算各污染源的允许排放量。是\n用烟囱高度来控制污染物的排放率，所以P值法是污染物排\n放总量的计算方法，可以运用P值法检验执行浓度控制或总\n量控制标准地区的污染物排放是否超标。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 五大气污染物总量控制方法\n1.A-P值法\n\n#### A-P值法\nA-P值法是指用A值法计算控制区域中充许排放总量\n用修正的P值法分配到每个污染源的一种方法。在A值\n法中只规定了各区域总充许排放量而无法确定每个源的\n允许排放量。而P值法则可以对固定的某个烟筒控制其\n排放总量，但无法对区域内烟筒个数加以限制，即无法\n限制区域排放总量。若将二者结合起来，则可以解决上\n述问题。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n#### 五大气污染物总量控制方法\n2.平权分配法\n平权分配法是基于城市多源模式的一种总量控制方法，它是\n根据多源模式模拟各污染源对控制区域中筛选出来的控制点的\n污染物浓度贡献率，若控制点处的污染物浓度超标，根据各源\n贡献率进行削减，使控制点处的污染物浓度符合相应环境标准\n限值的要求。\n3.优化方法\n优化方法是将大气污染控制对策的环境效益和经济费用结合\n起来的一种方法，它将大气污染总量控制落实到防治对策和防\n治经费上，运用系统工程的理论和原则，制定出大气环境质量\n达标的前提下，治理费用较小的大气污染总量控制方案。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 六大气污染防治措施\n1.全面规划，合理布局\n从区域（或城市）大气环境整体出发，针对该地域内的大气\n环境容量、主要污染问题（如污染类型、程度、范围等）及大\n气环境质量的要求，以改善大气环境质量为目标，综合运用各\n种措施，组合、优化确定大气污染防治方案。\n2.以集中控制为主，降低污染物排放量\n所谓集中控制，就是从区域的整体着眼，采取宏观调控和综\n合防治措施。集中控制不仅能节约资源和能源（如煤、油、气\n等），还便于采取污染防治措施并提高污染物的处理率。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 六大气污染防治措施\n3.强化污染源治理，降低污染物排放\n在注意集中控制的同时，还应研发先进的处理技术，强化污\n染源治理，包括烟尘治理技术、二氧化硫治理技术、氮氧化物\n治理技术等。\n4.综合防治汽车尾气\n研究表明，汽车尾气是大气污染物PM2.5的来源之一。防治\n汽车尾气的主要措施有：①加强立法和管理，建立、健全机动\n车污染防治的法规体系并严格执行；②提高汽油品质并研发新\n型清洁燃料，使机动车达到节能、降耗、减少污染物的排出量\n的目标；③大力发展公共交通事业，倡导绿色出行。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 6.2水环境规划\n\n#### 水环境规划基础\n\n#### 水污染源的调查与评价\n\n#### 水污染物预测\n\n#### 四 水污染控制规划方法\n\n#### 五 水污染综合防治措施\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 一水环境规划基础\n1.水环境规划的内容\n（1）明确水环境的主要问题。包括水量、水质、水资源利用\n等方面，并分析问题的根本原因。\n（2）明确水环境规划目标。从水质与水量两个方面拟定目标\n（3）选定规划方法。最优化法和模拟优化法是常用方法。\n（4）拟定规划措施。调整产业结构与布局，提高水资源利用\n率等。\n（5）方案比选。在评价、优化的基础上，提出供决策选用的\n方案。\n（6）规划实施。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 一水环境规划基础\n2.水功能区划 水环境规划的目标是通过对水\n\n#### 污染物排放的合理组织与控制，保\n\n#### 证水体的水质满足特定功能区的需\n求。水功能区是指为满足水资源开\n\n#### 发和有效保护的需求，根据自然条\n\n#### 件、功能要求、开发利用现状，按\n\n#### 照流域综合规划、水资源保护规划\n\n#### 和经济社会发展的要求，在相应水\n\n#### 域按其主导功能划定并执行相应质\n量标准的特定区域。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n#### 一水环境规划基础\n2.水功能区划一原则\n①优先保护集中式饮用水水源地。\n②不得降低水体现有的水质等级。\n上、下游和区域之间兼顾，适当考虑潜在\n功能要求。\n④与工业合理布局相结合。\n5实用可行，便于管理。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n#### 一水环境规划基础\n2.水功能区划一方法与步骤\n①提出水环境 ②选择相应的 ③现状功能可达性分析\n保护目标 环境质量标准 确定主要人为污染源\n\n#### 负荷分配\n\n#### 工程规划技 ④建立排污量\n\n#### 政策协调 ③污染控制\n\n#### 术和经济综 与水环境质量\n\n#### 行政决策 措施分析\n\n#### 合分析 间的定量关系\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n#### 一水环境规划基础\n2.水功能区划一功能分区\n地表水的水功能区一般分为水功能一级区和水功能二级区\n水功能一级区分为保护区、缓冲区、开发利用区和保留区四\n类。在水功能区一级区中的开发利用区中又划分为七类二级\n区，分别为饮用水源区、工业用水区、农业用水区、渔业用水\n区、景观娱乐用水区、过渡区和排污控制区。水功能区的划\n分是水环境质量标准在具体水域的具体应用，是水环境规划\n的依据。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n#### 一水环境规划基础\n3.水污染控制单元\n水污染控制单元是这样的可操作实体：包括排放源与受纳水\n体两部分；在行政区划的基础上结合水体使用功能和水质目标\n划分；各单元之间污染物类型、分布规律、输入-响应关系等一\n般不同；各控制单元的污染物排放及常规监测资料齐全；解决\n的环境问题不同，控制单元的划分也不同。\n划分水污染控制单元后，应阐明各功能区的相关情况，主要\n内容有：功能说明（属于哪类功能区、执行的水质标准等）、\n水质现状分析、污染源分析、水质预测、技术措施制定、环境\n容量计算等。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n\n#### 一水环境规划基础\n4.水环境容量\n（1）定义与内涵\n水环境容量是指在保证特定水质目标的前提下，所能接受\n的最大污染物的量，一般以水体中能容纳的最大污染物的量来\n衡量。\n最大允许纳污量是指在排污口空间分布及排放方式给定的\n条件下环境单元所允许排放污染物的量。\n也就是说，完全分散的排放方式所对应的污染物容纳量就\n是水环境容量，与其他排放方式相对应的污染物容纳量都称之\n为允许排放量，水环境容量是最大允许纳污量的极限值。\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 一水环境规划基础\n（2）水环境容量的计算\n1、首先进行水环境功能区划，确定水体的水质目标；\n2、根据不同的水环境功能划分为不同的水污染控制单元，并\n对水环境单元进行简化，以便能够利用水质模型进行描述水质的\n变化规律；\n3、然后进行水环境基础资料的调查与收集，包括水文和水污\n染源两方面的内容，例如流量、流速、污水排放量、排放浓度、\n排放方式等；\n4、最后根据水域简化结果选择或建立合适的水质模型，并确\n定模型中所需的各项参数，进行水环境容量的计算。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 一水环境规划基础\n5.允许排放量的分配\n\n#### 两种策略：公平性策略，效率策略\n公平性策略的出发点就是追求各个污染源之间污染物分配的\n公平性，通常认为，等比例削减污染物量属于公平分配之列；\n而效率策略则是追求污染物削减过程达到最高的效率，例如典型\n效率策略目标是区域污水处理费用最小。效率准则的实施，可以\n促进社会经济的发展，而公平原则则有利于保持社会的稳定和安\n定，效率和公平缺一不可。此外，对于水环境管理来说，可操作\n性也是一个不可忽略的方面。分配策略的选择需要从实际条件出\n发，因地制宜。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n#### 一水环境规划基础\n\n#### 水污染物分配策略\n策略类型 公平策略 效率策略 混合策略\n\n#### 均等分摊允许 区域总费用最\n\n#### 排放量 小\n\n#### 分区均匀削减\n等比例削减实 区域削减总量 【在各个污染\n\n#### 际排污量 最小 控制区之间实\n\n#### 施效率策略\n\n#### 按照企业的社 （例如区域总\n策略举例 会贡献（例如 区域总效益最 费用最低），\n\n#### 产值）确定排 大 在污染控制区\n\n#### 污量 内部实施公平\n\n#### 策略（例如等\n\n#### 按照企业对环\n\n#### 比例削减污染\n\n#### 境（例如水质）\n物）】\n\n#### 的影响确定排\n\n#### 污量\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n#### 二水污染源的调查与评价\n\n#### 水污染源调查包括水污染\n物的种类、数量、排放方式、\n\n#### 排放途径及污染源的类型和\n位置等内容，在此基础上，\n\n#### 判断出主要污染物和主要污\n\n#### 染源，为水环境现状评价提\n供依据。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### 二水污染源的调查与评价\n1.水污染源调查\n分为工业水污染源和生活水污染源分别进行调查\n调查的方法主要有收集资料法和现场实测法\n2.水污染源评价\n目的是要确定主要的水污染源和水污染物，提供水环境质量\n水平及成因，为水环境规划提供依据。\n多采用等标污染指数评价法。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 三水污染物预测\n通过对区域经济发展规划的分析，识别区域发展的水环境\n主要污染问题；利用有关资料，根据社会经济发展情况、技术\n经济政策、生活水平，预测不同水平年污（废）水及主要水污染\n物排放量，作为水污染综合整治方案设计的依据。\n对于点源，通过指数增长法或万元产值污染物的排放系数\n或单位产品污染物或废物的排放系数预测排污的发展趋势。对\n于面源，主要采用区域土地属性变化-面源污染源强的关系估算\n法，根据土地利用情况进行预测。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 三水污染物预测\n1.用水量预测\n（1）工业用水量 （2）生活用水量\n\n#### 工业=αG =365x AD\n工业一工业用水量，万 Qt一生活用水量，万t/a;\nA一人口，万人；\nGt一工业产值，万元；\n\n#### Dt一人均生活用水量，t/\nα一万元工业产值用水系数 （人·d）。\n万t/（万元·a）。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n#### 三水污染物预测\n2.废水排放量预测\n（1）工业废水 （2）生活污水\nWti QtiCW = QctWti一工业废水产生量，万 Wtu一生活污水排放量，万\nt/a; t;\nQti一工业用水量,万t/a; Qt一生活用水量，万t;\nct一排水系数。 ct一排水系数。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n#### 三水污染物预测\n3.污染物产生量、排放量预测\n（1）工业污染物 （2）生活污水\nPti =βG, =3.65x Ax Etu tuPti一工业污染物排放量， Ptu一生活污染物产生量，\nt/a; t/a;\nGt一工业产值，万元； A一人口，万人；\nβt一万元工业产值污染物 Em一人均污染负荷，g/(\n排放量,t/（万元·a）。 人·d)。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n#### 四水污染控制规划方法\n1.最优化法\n最优化是指运用数学方法研究对象的优化途径，提供优化\n方案，以便为决策者提供科学决策的依据。评价水污染治理规\n划方法优劣的关键是在达到预定水质目标的前提下，费用是否\n最小，这就涉及最优化问题。水污染控制的最优化问题是在污\n水处理费用并未随着处理技术的改进而提高的背景下提出来的。\n从水污染控制解决问题的不同途径来看，最优化问题主要可分\n为排污口最优化处理、最优化均匀处理、区域最优化处理等。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 四水污染控制规划方法\n（1）排污口最优化处理（水质规划）\n排污口最优化处理是指以每个小区的排放口为基础，在满足\n出水水质的前提下，求解各排放口的污水处理效率的最佳组\n合，目标是各排放口的污水处理费用之和为最低。在进行排\n放口处理最优规划时，各个污水处理厂的处理规模不变，它\n等于各小区收集的污水量。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n\n#### 四水污染控制规划方法\n（2）最优化均匀处理（厂群规划）\n最优化均匀处理是指在区域范围内，在同一污水处理效率的\n条件下，寻求最佳的污水处理厂的位置与规模（包水处理厂\n选址、规模及污水管线布局）的组合，追求全区域的污水处\n理费用最低。在工业发达国家或地区，法律规定所有排入水\n体的污水都必须经过二级处理(物理处理十生化处理)，这是\n均匀处理最优规划的基础。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 四水污染控制规划方法\n（3）区域最优化处理（区域处理最优规划）\n区域最优化处理是排污口最优化处理与最优化均匀处理的综\n合，也就是说，为了使区域污水处理总费用最低，它既要考\n虑污水处理厂最佳位置和数量，又要考虑每座污水处理厂的\n最佳处理效率。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 四水污染控制规划方法\n2.模拟优选法\n即通过规划方案的模拟优选来对水污染控制进行规划。规\n划方案的模拟优选是定性分析与定量计算的结合，先定性确定\n模拟的范围，再进行定量的模拟计算，最后优选确定最佳实用\n方案。\n应用规划模拟方法得到的解，二般不是区域的最优解，其\n好坏程度多数取决于规划人员的经验和能力。因此，应用此方\n法时，尽可能多提出一些初步规划方案，以供筛选。模拟优选\n的工作量往往较大，主要通过计算机完成方案的对比寻优工作。\n但在很多情况下，规划方案的模拟优选是一种更为有效的方法。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 五水污染综合防治措施\n1.减少污染物的排放量\n（1）节约用水\n水资源浪费不仅加剧水资源短缺的矛盾，同时也不可避\n免地产生大量废水，增加水污染治理负担。节约用水、提高\n水的重复利用率是减少水污染物的有效途径之一。\n要全面推进各种节水技术和措施，发展节水型产业。采\n用先进工艺技术，发展工业用水重复和循环使用系统；开展\n城市废水再生回用：调整农业结构，干旱地区减少水稻种植\n面积；实施水权制度，加强水权管理，形成节水机制。同时，\n应加强节水宣传教育，加强人们的节水意识，必要时，利用\n价格机制，控制不必要的用水。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 五水污染综合防治措施\n1.减少污染物的排放量\n\n#### 清洁生产与可持续发展模式图\n（2）推行清洁生产\n\n#### 过程\n调整工业结构，改革生产工艺 经营\n\n#### 经济\n推行清洁生产。根据国家产业政策 清洁\n调整行业结构、产品结构、原料结 生产\n构、规模结构，逐步淘汰或限制耗 能量\n\n#### 水量大、水污染排放量大的行业和\n产品，积极发展对水环境危害小、\n耗水量小的高新技术产业；以无毒 清洁生产\n\n#### 无害原料替代有毒、有害原料，改\n\n#### 革生产工艺等，对产品的整个生命\n周期推行清洁生产。\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 五水污染综合防治措施\n1.减少污染物的排放量\n（3）加强污水处理\n积极推行清洁生产，采取一切措施减少水污染物的产生，也\n难以实现水污染物的零排放，所以，要防治结合，即加强污水\n处理。工业企业还必须加强水污染的治理，尤其是有毒污染物\n必须单独处理或预处理。随着工业布局、城市布局的调整和城\n市下水道管网的建设和完善，可逐步实现城市污水的集中处理，\n使城市污水处理与工业废水治理结合起来。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n\n#### 五水污染综合防治措施\n1.减少污染物的排放量\n（4）控制面源污染\n面源污染主要来自农村，\n\n#### 包括农村人口生活、农业生产\n畜禽养殖等过程产生的污染。\n\n#### 要解决面源污染比解决工业污\n\n#### 染和城市生活污水的难度要大\n\n#### 需要通过综合防治和开展生态\n\n#### 农业示范工程等措施进行控制\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n\n#### 五水污染综合防治措施\n2.合理利用水体自净能力\n（1）人工复氧\n人工复氧是改善河流水质的重要措施之一，它是借助于安\n装增氧器来提高河水中的溶解氧浓度。在溶解氧浓度很低的河\n段使用这项措施尤为有效。\n（2）污水调节\n在河流水量低的时期，用蓄污池把污水暂时蓄存起来，待\n河流水量高时释放，可以更合理地利用河流的自净能力来提高\n河流的水质。污水调节费用主要是建池费用，缺点是占地面积\n大、有可能污染地下水等。国外蓄存的污水大都是经过处理的\n水，避免或减轻了恶臭现象的发生。\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n\n#### 五水污染综合防治措施\n2.合理利用水体自净能力\n（3）河流流量调控\n\n#### 国外对流量调控以及从外流域引\n水冲污的研究较早，并已应用于河流\n的污染控制。世界上很多河流的径流\n量时间上分配不均，在枯水期水质恶\n化，而在高流量期，河流的自净能力\n得不到充分利用。因此，提高河流的\n枯水期流量成为水质控制的一个重要\n措施。实行流量调控可利用现有的水\n利设施，也可新建水利工程。\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n\n### 6.3固体废物管理规划\n一、固体废物概述\n1.定义及特点\n固体废物是指人类在生产建设、日常生活和其他活动中产\n生的，在一定时间和地点无法利用而丢弃的污染环境的固体、\n半固体物质。其概念具有时间性和空间性。一种过程的废物随\n着时空条件的变化，往往可以成为另一过程的原料，所以废物\n又有“放在错误地点的原料”之称。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n\n### 6.3固体废物管理规划\n一、固体废物概述\n2.分类\n（1）城市生活垃圾\n\n#### 城市生活垃圾又称城市固体废\n\n#### 物，它是指在城市居民日常生活中\n\n#### 垃圾分类我们一起来\n\n#### 或城市日常生活提供服务的活动中\n\n#### 产生的固体废物，主要包括居民生\n活垃圾、办公和商业垃圾等。它的\n\n#### 主要特点是成分复杂，有机物含量\n高，其所含化学元素大部分为碳，\n其次是氧、氢、氮、硫等。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n\n### 6.3固体废物管理规划\n一、固体废物概述\n2.分类\n（2）工业固体废弃物\n\n#### 工业固体废物是指在工业、交\n通等生产过程中产生的固体废物，\n\n#### 又称工业废渣或工业垃圾，主要包\n\n#### 括冶金工业固体废物、能源工业固\n体废物、石油化学工业固体废物、\n\n#### 矿业固体废物、轻工业固体废物以\n及其他工业固体废物。不同工业类\n\n#### 型所产生的固体废物种类和性质是\n迥然相异的。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n\n### 6.3固体废物管理规划\n一、固体废物概述\n2.分类\n（3）危险废物\n《中华人民共和国固体废物污染环境防治法》中规定：“危\n险废物是指列入国家危险废物名录或者根据国家规定的危险废\n物鉴别标准和鉴别方法认定的具有危险特性的废物。”\n危险废物的特性，包括急性毒性、易燃性、反应性、腐蚀性、\n浸出毒性和疾病传染性。联合国环境规划署《控制危险废物越\n境转移及其处置巴塞尔公约》列出了\"应加控制的废物类别\n共45类，“须加特别考虑的废物类别”共2类，同时列出了危险\n废物“废物共性的清单”共14种特性。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n\n### 6.3固体废物管理规划\n3.固体废物的危害\n（1）固废的环境影响\n①对大气环境的影响：固体废物中的细微颗粒、粉尘等可随\n风飞扬，其中某些物质的分解和化学反应，还可以不同程度地产\n生毒气或恶臭，造成空气污染。\n②对水环境的影响：随天然降水和地表径流进入江河湖泊或\n随风飘落入水体，会引起地表水污染；渗沥水使地下水污染；直\n接排入河流、湖泊或海洋，又会造成更大的水体污染。\n③对土壤环境的影响：固体废物堆放必然会占用大量的良田\n沃土，有毒废渣的到处流失，对土壤造成严重的污染。\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n\n### 6.3固体废物管理规划\n3.固体废物的危害\n（2）固废对土地资源的影响\n大量固体废物的堆积会占用土地资源。随着我国经济的发展\n和人民生活水平的提高，固体废物的产生量越来越大，其侵占土\n地的问题会变得更加严重，从而进一步加剧了我国人多地少的矛\n盾。\n（3）固废对人体健康的影响\n固体废物中有害物质可通过环境介质一大气、土壤或地下水\n体等直接或间接传至人体，造成健康威胁。例如，化学废物的长\n期暴露，散发出的有毒物质被人吸入后引发的呕吐、头晕甚至中\n毒等症状。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n\n### 6.3固体废物管理规划\n1.固体废物现状调查与评价\n1、生活垃圾现状调查与评价。包括城市概况、生活垃圾产生\n特征、垃圾收集方式、环境卫生体系建设概况、无害处理设施\n建设、回收体系建设、垃圾无害化处理量（率）和回收利用量\n（率）等。\n2、工业固体废物调查。包括工业固体废物中有害物质的种类、\n工业固体废物的种类、产生量、利用量、流向、贮存、处理与\n处置等。\n3、危险废物调查。具体调查内容包括危险废物种类与产生量，\n危险废物的收集、运输、综合利用、贮存和处理处置情况，危\n险废物安全处置率等。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n#### 二固体废物管理规划的内容\n2.固体废弃物产生量预测\n（1）生活垃圾产生量预测\nW =GKo(1+α) △tW一预测年垃圾产生量； G\n预测年人口数；\nKo一基准年人均垃圾产生量；\nα一人均垃圾增长量;\nAt一预测年与基准年之差。\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n#### 二固体废物管理规划的内容\n2.工业固体废弃物产生量预测\n（2）工业固体废物产量预测\n①产值排污系数预测法 DWt一预测工业固体废物年产生量，万ta;\nDW, = W,S W:-预测年工业产值，万元；\nW。一基准年工业总产值，万元/a;\nW, = W。 exp(入△t) St-预测年工业固废产生当量，万t万元；\nSD-基准年固废产生当量，万t万元；\nS =S_e-k△t 入-工业总产值平均增长率，%；\nk-工业固废产生当量衰减系数。\n\n#### ②产品排污系数预测法\n通过主要行业产品预测出的固废产生量除以基准年该类废\n物在主要行业中的产生系数，即为规划年该类废物产生量。\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n#### 二固体废物管理规划的内容\n2.固体废弃物产生量预测\n（3）危险废物预测\nQ周 = AWtW, = W。 exp(2△t)\nQ固－预测危险废物年产生量，ta;\nA-万元产值危险废物产生量，t万元；\nW：一预测年工业产值，万元；\nWo-基准年工业总产值，万元/a；入-工业\n总产值平均增长率，%。\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n\n#### 二固体废物管理规划的内容\n3.固体废物污染防治规划目标与指标体系\n（1）规划原则与目标\n①源头控制优先，促进清洁生产。从源头更新工艺、提高\n原材料利用效率、推广清洁能源使用，引导控制固体废物\n产生，促进清洁生产。\n②因地制宜，因废制宜。立足于规划区域的实际情况，科\n学客观分析固体废物处理处置状况和存在的问题，合理选\n用处理处置技术方法。\n③开展多种途径资源化利用，实施产业化发展。在努力实\n现固体废物减量化目标的同时，切实开展固体废物利用的\n产业化工作，逐步将固体废物污染防治重心前移，进行源\n头削减和产业化利用。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n\n#### 二固体废物管理规划的内容\n3.固体废物污染防治规划目标与指标体系\n（1）规划原则与目标\n④全过程控制管理，防止污染 因淑施术 焚烧\n\n#### 合理利用\n转嫁。对固体废物进行全过程\n\n#### 管理，将生产排放的固体废物\n\n#### 处理纳入到整个生产生命周期\n\n#### 中，严格控制固体废物转移他\n\n#### 原料\n处。 通过：物理.化单、生物.等技术\n\n#### ③集中治理与点源治理相结合\n\n#### 肥\n原则。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n\n#### 二固体废物管理规划的内容\n3.固体废物污染防治规划目标与指标体系\n（2）规划指标\n\n#### 废塑料的 直接再生\n\n#### 综合利用方法\n①生活垃圾无害化处理率、生活 有大概以下\n\n#### 三种\n\n#### 垃圾资源化率、生活垃圾分类收\n集率；\n\n#### ②工业固体废物减量率、工业固\n\n#### 改性再生\n\n#### 体废物综合利用率、工业固体废\n物处置利用率；\n③危险废物处置利用率、城镇医 热能利用\n疗垃圾处理率。\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n\n#### 二固体废物管理规划的内容\n4.固体废物污染防治对策\n(1)生活垃圾防治 (2)工业固废防治 (3)危险废物防治\n①从源头上控制城 ①制定并执行防治 ①确定危险废物的\n工业固体废物污染 名称与种类。\n\n#### 市生活垃圾的产生\n环境的技术政策。\n量。 ②危险废物的减量\n\n#### ②从源头控制，减\n少工业固体废物产 化与资源化。\n\n#### ②统筹安排建设城\n生量调整产业结构，\n乡生活垃圾收集、 ③危险废物的收集、\n减少高资源消耗。 运输与贮存。\n运输和处置设施，\n\n#### ③提高工业固体废\n\n#### ④危险废弃物最终\n开展综合利用。 物的利用率。\n\n#### 处置，焚烧和安全\n④加强安全处置。\n③提出处置方案。 填埋。\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n\n#### 三固体废物管理规划的方法\n1.固废管理规划的编制依据\n固体废物管理的法规、标准及技术政策，包括《固体废物污染\n环境防治法》，《生活垃圾填埋污染控制标准》（GB16889-1997)，\n《生活垃圾烧污染控制标准》（GB18485-2001），《医疗废物管\n理条例》（2003)，《危险废物污染防治技术政策》（2001)，《危险\n废物填理污染控制标准》（GB18598-2001）等。\n2.固废管理规划分析方法\n采用模型，分为预测模型、评估模型、运筹学优化模型等类\n型。进行模拟试验，根据试验来建立预测模型，再进行相应环\n境问题的预测。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n\n#### 三固体废物管理规划的方法\n3.固废处置选址方法\n（1）填埋场与区域的距离\n生活垃圾填理场通过多种途径对区域造成影响，因此，离区\n域距离较远为好。应设在当地夏季主导风向的下风向，在人畜\n居栖点500m以外。\n（2）交通运输条件\n运输距离越近越便利。一般要求距离公路、铁路和河流不超\n过500m。\n（3）环境保护条件\n般要求场地面积及容量能保证使用15-20年，在成本上才合算：\n一般要求距离任何地表水大于100m，垃圾渗出液不排入土地或\n农田，最好不要堆放在河流岸边；尽可能地利用废弃土地或使用\n便宜的土地或荒地；要远离机场，要求距离大于10kmo\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n\n#### 三固体废物管理规划的方法\n3.固废处置选址方法\n（4）场地建设条件\n地形越平坦越好，其坡度应有利于填埋场和其他配套建筑设施\n的布置，不宜选择在地形坡度起伏变化大的地方和低洼汇水处；\n原则上，地形的自然坡度不应大于5%。\n（5）地质环境条件\n场址应选在渗透性弱的松散岩层或坚硬岩层的基础上，填理场\n防渗层的渗透性系数K≤10-7cm/s，并具有一定厚度；地下水位埋\n深大于2m；隔水层黏土厚度越大越好，一般要求大于6m；与供水\n开的距离至少大于300m，远离水源地500m以上。\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n四固体废物管理规划方案的综合评价\n1.土地损失\n\n#### L=Zr=1S,Pi\n式中：L一被堆占土地的经济损失，元；\nS一堆占土地的面积，亩;\nPi一单位土地面积的价格，元/亩；\nn一被堆占土地类型，每个类型土地价格看成是一致的。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n四固体废物管理规划方案的综合评价\n1.土地损失\nLa=Z²=1 S;(△yiC; +△ciy)\n式中：La一被污染土壤引起农作物损失费用，元/年；\nS一污染较严重的土地及受影响的土地面积，亩;\nyi一某农作物主、副产品产量，kg/亩；\n△y一某农作物主、副产品减产量，kg/亩；\nC一某农作物主、副产品价格，元/kg;\n△C一某农作物主、副产品因为污染的价格降低量，元/kgn-农作物种类。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n四固体废物管理规划方案的综合评价\n2.水资源损失\nLw=P。Qlw\n式中L一断水经济损失，元/年；\nP。一影响人口数，人；\nQ一人均生活用水量，m3/年；\nLw一单位供水量经济损失。\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n四固体废物管理规划方案的综合评价\n2.水资源损失\nLw=∑²=1 S;(△y;C;+△cy)\n式中：S一受影响灌溉面积，亩；\ny一主、副产品产量，kg/亩;\n△y一受污染水灌溉后主、副产品减产量,kg/亩；\nCi一某农作物主、副产品价格，元/kg;\n△c;一受污染水灌溉后某农作物主、副产品价格降低量，元/kg;n-\n农作物种类。\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n四固体废物管理规划方案的综合评价\n3.对人群健康影响的经济损失\n农业人口的生命价值可按下式估算：\nBa=TnZ=1 Siyic;+Z=1 BiT;\n式中：Ba一一个农业人口的生命价值，元；\nTn一农业人口有效创收年数，年，一般取45年；\n一某种农作物(包括经济作物);\ny;一某种农作物的单产量，kg/亩或m3/亩;\nCi 一某种农作物的市场价格，元/kg:\nS 平均每个农民种植某种农作物的种植面积，亩；\nB -牧副渔及其他年产值，元；\nT一从事牧副渔的劳动年数，年;\nn，N--分别为作物种类数及牧副渔等其他行业门类数。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n四固体废物管理规划方案的综合评价\n非农业人口创造的价值，按各类行业的职工人均生产力来统计，\n即：\n\n#### Ba=Tn’E²=1 B't\n式中B一非农业人口创造的价值；\nT’一非农业人口有效创收年数，年，一般取35年;\nB'非农业人口年产值，元/年。\n知道农业人口和非农业人口的价值，就可以按照固体废物\n对人体健康的风险进行分析，在已知对死亡概率影响的基础上\n评估对人体健康的损失。\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n\n### 6.4生态环境规划\n一、生态规划概述\n20世纪60年代初，美国宾夕法尼亚大学学者指出生态规划是\n在没有任何有害的情况或多数无害条件下，对土地的某种可能用\n途进行的规划。\n日本一些学者则将生态规划定义为生态学的土地利用规划。\n王祥荣等人提出，生态规划应是以生态学原理和规划原理为\n指导，应用系统科学、环境科学等多学科的手段辨识、模拟和设\n计人工复合生态系统内的各种生态关系，确定资源开发利用与保\n护的生态适宜度，探讨改善系统结构与功能的生态建设对策，促\n进人与环境关系持续协调发展的一种规划方法。\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n\n### 6.4生态环境规划\n一、生态规划概述\n1.概念： 是以生态学原理为指导，应用系统科学、环境科学\n等多学科手段辨识、模拟和设计生态系统内部各种生态关系，确\n定资源开发利用和保护的生态适宜性，探讨改善系统结构和功能\n的生态对策，促进人与环境系统协调、持续发展的规划方法。\n2.生态规划的主要任务\n（1）充分了解自然环境，自然资源的性能，以及自然生态过程特\n点和与人类活动的相互关系。\n（2）使系统的发展立足于具体的社会经济条件和自然资源的潜力\n形成系统社会经济功能与生态环境支持服务功能的互补与协调，\n突出系统优势。\n（3）追求系统总体关系的协调，强调系统发展的高效和持续性，\n改善和提高系统的自我调控和自我发展能力。\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n\n### 6.4生态环境规划\n3.生态规划的主要类型\n（1）按地理空间尺度划分。\n①区域生态规划。主要任务是编制区域自然、社会、经济和生态\n目录；对区域发展的中长期规划制定要点，特别是提出各种不同\n的可供选择的土地利用及基础性公共设施、社会设施、交通运输\n等方案。\n②景观生态规划。主要通过研究景观格局与生态过程及人类活动\n与景观的相互作用在景观生态分析、综合及评价的基础上，提出\n景观最优利用方案和对策与建议。强调空间格局对生态过程的控\n制和影响，通过调整景观格局来维持景观功能的健康和安全。\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n\n### 6.4生态环境规划\n3.生态规划的主要类型\n③生物圈保护区规划。主要目标是保证\n生物圈现有生物多样性的完整性和永续\n利用。在保护区建设规划中，应用生态\n学原理正确处理保护、开发、利用的关\n系，将保护、科研、生产、旅游等多层\n次、多目标规划有机结合，指导保护区\n的建设。\n（2）按地理环境和生存环境划分。有陆\n地生态系统、海洋生态系统、城市生态\n系统，农村生态系统等生态规划。\n（3）按社会科学门类划分。主要有经济\n生态规划、人类生态规划、民族文化生\n态规划等。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n\n### 6.4生态环境规划\n4.生态规划的步骤\n（1）确定规划范围与规划目标：（2）收集资料，并分析资源环\n境条件的性能及其对特定利用方向的适宜性等级；（3）根据规划\n目标，建立资源评价与分级的准则：（4）分析和评价资源对不同\n利用方向的生态适宜性；（5）确定规划方案。\n\n#### 乌衣水镇生态公园\n提划为生态数场 规划为儿童拓满区 限划为公司入口区\n\n#### 规划为有机最网\n(26000m] 制为电年情动区\n\n#### 均为信公司\n\n#### 淘期为人口区\n\n#### 洪江东路\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n内容：①自然环境与自然资源状况调查。\n主要包括：气候气象因素和地理特征因素，例如地形地貌、坡向坡\n位、海拔、经纬度等；自然资源状况，例如水资源、土壤资源、野生\n动植物资源及珍稀濒危物种数量，生物组分的空间分布及在区域空\n间的移动状况，土壤的理化组成和生产能力等；人类开发历史、方\n式和强度；自然灾害及其对环境的干扰破坏情况：生态环境演变的基\n本特征；基础图件收集和编制，主要收集地形图、土地利用现状图、\n植被图和土壤侵蚀图等。\n\n---\n\n<!-- page 83 -->\n\n![page 83](page_083.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n②社会经济状况调查。\n主要内容包括：社会结构情况，例如人口密度、人均资源\n量、人口年龄构成、人口发展状况、生活水平的历史和现状、\n科技和文化水平的历史和现状、规划区域的主要生产方式等；\n经济结构与经济增长方式，例如产业构成的历史和现状及发展、\n自然资源的利用方式和强度。\n\n---\n\n<!-- page 84 -->\n\n![page 84](page_084.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n③生态环境质量状况调查。\n一般而言，生态环境质量状况的调查内容主要包括各种\n生态环境和人工环境现状及问题，但随着调查关注的对象不\n同调查内容有所差异，主要内容包括土地利用情况、植被覆\n盖情况、水资源与水利用情况、生物多样性等。\n\n---\n\n<!-- page 85 -->\n\n![page 85](page_085.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n方法：①实地调查。②历史资料收集。③社会调查。④遥感技术。\n①实地调查。是收集资料的最直接的方法，尤其在小区域、大\n比例尺规划中，实地调查更为重要。往往是弥补历史资料的不\n足与不完善，或对遥感资料的校正；\n②历史资料收集。对历史资料收集，可以为规划者提供探索人\n类活动与区域环境问题之间关系，还可以提供实际调查所不能\n得到的资料。\n\n---\n\n<!-- page 86 -->\n\n![page 86](page_086.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（1）生态调查的内容与方法\n③社会调查。通过社会调查，了解区域内不同阶层的人们对发\n展的要求，所关注的焦点问题，在规划中充分体现公众的愿望。\n同时，通过进行专家咨询、座谈，可将专家的知识与经验结合\n于规划中。\n④应用遥感技术。遥感技术为及时准确获取区域空间特征资料\n提供了十分有效的手段，尤其适用于区域面积较大的生态环境\n调查。\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n①生态过程分析。生态过程是由生态系统类型、组成结构与功能所\n规定的，是生态系统及其功能的宏观表现。自然生态过程所反映的\n自然资源与能流特征、生态格局与动态都是以区域的生态系统功能\n为基础的。同时，在生态规划中，受人类活动影响的生态过程及其\n与自然生态过程的关系是关注的重点。特别是那些与区域发展和环\n境密切相关的生态过程（例如能流、物质循环、水循环、土地承载力、\n景观格局等），应在规划中进行综合分析。\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n②生态潜力分析。狭义的生态潜力指单位面积土地上可能达\n到的第一性生产力(亦称初级生产力），它是一个综合反映区\n域光、温、水、土资源配合的定量指标。它们的组合所允许\n的最大生产力通常是该区域农、林、牧业生态系统生产力的\n上限。广义的生态潜力则指区域内所有生态资源在自然条件\n下的生产和供应能力。通过对生态潜力的分析，与现状利用\n和产出进行对比，可以找到制约发展的主要生态环境要素。\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n③生态格局分析。人类的长期活动，使区域景观结构与功能带有明显的\n人工特征。原来物种丰富的自然植物群落被单一种群的农业和林业生物\n群落所取代，成为大多数区域景观的基质。城镇与农村居住区的广泛分\n布成为控制区域功能的镶嵌体，公路、铁路、人工林带（网）与区域交错\n的自然河道、人工河渠及自然景观残片共同构成了区域的景观格局。城\n镇是区域镶嵌体，又是社会经济中心，它通过发达的交通网络等廊道与\n农村及其他城镇进行物质与能量的交换与转化。残存的自然斑块则对维\n护区域生态条件、保存物种及生物多样性具重要意义。\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n④生态敏感性分析。在生态规划中\n\n#### 必须分析和评价系统各因子对人类\n活动的反应，进行敏感性评价。根\n\n#### 据区域发展和资源开发活动可能对\n\n#### 系统的影响，生态敏感性评价一般\n\n#### 包括水土流失评价、自然灾害风险\n\n#### 评价、特殊价值生态系统和人文景\n观评价、重要集水区评价等。\n\n---\n\n<!-- page 91 -->\n\n![page 91](page_091.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（2）生态分析与评价\n5土地质量与区位评价。对土地质量和区位\n的评价实际就是对复合生态系统的评价与分\n析的综合和归纳。土地质量的评价因用途不\n同而在评价指标、内容、方法上有所不同。\n对于评价指标和属性，可采用因素间相互关\n系构成模型综合为综合指标，也可采用加权\n综合或主成分分析等方法，找出因子间的作\n用关系和相对权重，最终形成土地质量与区\n位评价图。\n\n---\n\n<!-- page 92 -->\n\n![page 92](page_092.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n生态规划的最终目的是提出区域发展的方案与途径。生态决\n策分析就是在生态评价的基础上，根据规划对象的发展与要\n求以及资源环境及社会经济条件，分析与选择经济学与生态\n学合理的发展方案与措施。其内容包括：根据发展目标分析\n资源要求，通过与现状资源的匹配性分析确定初步的方案与\n措施，再运用生态学、经济学等相关学科知识对方案进行分\n析、评价和筛选。\n\n---\n\n<!-- page 93 -->\n\n![page 93](page_093.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n①生态适宜性分析。是生态规划的核心，也是生态规划研究\n最多的方面。目标是根据区域自然资源与环境性能，按照发\n展的需求与资源利用要求，划分资源与环境的适宜性等级。\n自麦克哈格提出生态适宜性图形空间叠置方法以来，许多研\n究者对此进行了深入研究，先后提出了多种生态适宜性的评\n价方法，特别是随着地理信息系统技术的发展，生态适宜性\n分析方法得到进一步发展和完善。\n\n---\n\n<!-- page 94 -->\n\n![page 94](page_094.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n②生态功能区划与土地利用布局。根据区域复合生态系统结\n构及其功能，对于涉及范围较大而又存在明显空间异质性的\n区域，要进行生态功能分区，将区域划分为不同的功能单元，\n研究其结构、特点、环境承载力等问题，为各区提供管理对\n策。区划时综合考虑各区生态环境要素现状、问题、发展趋\n势及生态适宜度，提出合理的分区布局方案。\n\n---\n\n<!-- page 95 -->\n\n![page 95](page_095.jpg)\n\n\n### 6.4生态环境规划\n5.生态规划的主要内容与方法\n（3）决策分析\n③规划方案的制定、评价与选择。\n在前述分析评价的基础上，根据 D 农业匠肤专颂规\n\n#### 农企票\n\n#### 业 乐，业，体 9\n\n#### 发展的目标和要求以及资源环境\n\n#### 的适宜性，制定具体的生态规划\n\n#### 程交化生活 业作之期\n方案。生态规划是由一系列子规 完善绿色生态景观系统\n\n#### 建设多元农业质观体验体系\n\n#### 划构成的，这些规划最终是要以\n\n#### 促进社会经济发展、生态环境条\n\n#### 件改善及区域持续发展能力的增\n强为目的。\n\n---\n\n<!-- page 96 -->\n\n![page 96](page_096.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n城市生态系统是城市居民与周围生物和非生物环境相互作用\n而形成的一类具有一定结构和功能的有机整体，也是人类在改造\n和适应自然环境的基础上建立起来的特殊的人工生态系统。\n（1）城市生态系统的人工主导性。\n城市中的一切设施都是人工制造的，人类活动对城市生态系\n统的发展起着重要的支配作用。与自然生态系统相比，城市生态\n系统的生产者一绿色植物的量很少；消费者主要是人类，而不是\n野生动物；在城市中，分解者--微生物的活动受到抑制，分解功\n能不强。\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（2）城市生态系统的高度集中性和高度开放性。\n城市中人口密集，城市居民所需要的绝大部分食物要从其他\n生态系统人为地输入：城市中的工业、建筑业、交通等都需要大\n量的物质和能量，这些也必须从外界输入，并且迅速地转化成各\n种产品。城市生产和居民生活产生大量的废弃物，绝大部分不能\n靠城市中自然系统的净化能力自然净化和分解，如果不及时进行\n人工处理，就会造成环境污染。\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（3）城市生态系统的不完整性。\n城市生态系统是人工生态系统，数量巨大的消费者（人类）所\n需要大量的食物和能量不能通过系统内部完全解决，而必须从外\n部系统获得；同时，缺少分解者，城市生态系统中产生的大量废\n弃物几乎全部需要通过人工设施来进行处理。因而，造成巨大的\n经济成本和处理的低效性。\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（4）城市生态系统的高度依赖性。\n由于缺少充足的土地和第一性生产者，其自我更新能力与初级生产能力很\n低，而且，城市规模越大，它对外部所提供的能源和物质的接受、消化、转换\n的能力就越强，它需求外部输入的物质种类和数量就越多，其对外部的依赖性\n就越强。\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n1.城市生态系统及其特征\n（5）城市生态系统的脆弱性。\n城市生态系统的人工性和结构与功能的\n不完整性，就决定了城市生态系统低下的自我\n生产、更新、修补和调节的能力。另一方面， ECOSYSTEM\n城市生态系统对外部系统的高依赖性，就决定\n了一旦切断或缺少外部系统的食物、资源、能\n源的持续供应，城市生态系统就会瘫痪和崩溃\n同时，一且发生自然灾害和人为灾害，城市生\n态系统的自我抵抗能力和恢复能力就显得极其\n有限。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n2.城市生态规划与生态城市\n城市生态规划是以生态学的理论为指导，对城市的社会、经\n济、技术和生态环境进行全面的综合规划，以便充分有效和科学\n合理地利用各种资源条件，促进城市生态系统的良性循环，使社\n会经济能够持续稳定地发展，为城市居民创造舒适、优美、清洁、\n安全的生产和生活环境。\n城市生态规划的目标是建设生态城市。生态城市从广义上讲，\n是建立在人类对人与自然关系更深刻认识基础上的新的文化观，\n是按照生态学原则建立起来的社会、经济、自然协调发展的新\n型社会关系，是有效地利用环境资源实现可持续发展的新的生\n产和生活方式。从狭义上讲，就是按照生态学原理进行城市设\n计，建立高效、和谐、健康、可持续发展的人类聚居环境。\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n3.城市生态规划的基本程序\n（1）明确规划范围和目标：由管理决策部门、规划部门及相关部门一起协商讨\n论，明确规划的范围和目标。\n（2）生态要素的调查、评价和预测：根据城市生态规划的内容要求，开展城市\n生态调查，为满足生态适宜性的评价要求，一般要按照规划详尽程度将城市空间\n划分为一定尺度的基本单元，如1km×1km或5km×5km，按单元收集规划区域内\n的自然、社会、人口与经济的资料和数据，并建立数据库。根据调查资料，运用\n多学科的理论和方法对城市资源与生态环境状况、生态过程特征、生态环境敏感\n性和重要性等进行综合分析与评价，预测其发展趋势，从而认识和了解城市生态\n系统发展的生态潜力和制约因素。\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n（3）生态适宜性分析评价：这是城市生态规划的核心，即\n根据城市生态环境特征和区域自然资源条件，参照城市发展\n的要求和资源利用的要求，分析评价各相关资源的生态适宜\n性，然后综合各单项资源的适宜性分析结果，划分资源与生\n态环境的综合适宜性等级和空间分布图。\n（4）制定规划方案与措施：按照生态适宜性评价的结果，\n提出城市生态规划和生态设计的各种方案，包括具体建设项\n目及其配套措施。\n（5）规划方案评价：运用生态学与经济学的有关知识，对\n规划方案及其对城市生态系统的影响和生态环境不可逆转的\n变化进行综合评价。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n（1）城市生态功能分区\n城市生态功能分区主要是根据城市的自然环境条件、社会经济发展基础以\n及城市未来发展定位，对城市不同空间地域进行的主导功能定位。在生态区\n划分的基础上，再根据城市功能及组团式发展要求，划分为不同的生态亚区。\n生态亚区注重城市发展对生态系统结构的影响，反映人类活动和城市发展\n对生态系统和景观结构的干扰程度，不同的生态区采用不同的评价指标划分\n生态亚区。\n依据生态系统的敏感性、生态服务功能类型和城市功能差异等，进一步将\n各生态亚区划分为不同的生态调控单元。\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n（2）城市生态产业发展专项规划\n产业是城市经济发展的载体。根据生态城市和城市可持续发展的要求，\n生态产业发展是未来城市发展的必然方向。城市生态产业规划就是要根据\n循环经济理论和生态学理论，利用清洁生产技术和工艺对传统产业进行改\n造规划，制定新型生态产业发展项目，优化调整、组装与集成城市产业链，\n以及开展城市生态产业园的规划建设等。城市的未来产业发展定位主要是\n生态工业、生态服务业、环保产业、生态农业等方向。\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n4.城市生态规划的主要内容\n(3）城市生态环境整治与生态建设专项\n\n#### 规划\n\n#### 城市生态环境整治与生态建设是城\n市生态规划的重要内容之一。城市生态\n环境建设专项规划包括城市大气环境规\n划、城市水环境规划、城市声环境规划\n\n#### 25 50km\n城市固体废物污染防治规划、城市绿地 图例\n地表水涵养与保护用地 道路防护用地\n\n#### 地下水保护用地 河流防护用地\n系统建设规划以及城市重点生态景观区 生物多样性保护用地 城市绿地\n\n#### 水土保持用地 非生态用地\n保护与建设规划等内容。 北京城市生态规划\n\n---\n\n<!-- page 107 -->\n\n![page 107](page_107.jpg)\n\n\n### 6.4生态环境规划\n4.城市生态规划的主要内容\n（4）城市人居环境建设专项规划\n“人居环境”就城市和建筑的领域来讲，可具体理解为人的居住生\n活环境。人居环境的核心是“人”，因此，在人居环境建设规划中，必\n须以满足“人类居住”需要为目的，必须将人的居住、生活、休憩、交\n通、管理、公共服务、文化等各种复杂的要求在时间和空间中结合起来，\n要将人工建筑环境与自然环境融合起来，要将硬件建设（人居建筑及其\n附属设施）、软件建设（社区管理体制、社区文化)和心件（生理健康、心\n理健康)等结合起来，要将人居建筑的节能、节材、降耗、环保、安全、\n健康、循环、再生、和谐等作为规划目标，要充分体现人文关怀。\n\n---\n\n<!-- page 108 -->\n\n![page 108](page_108.jpg)\n\n\n### 6.4生态环境规划\n二、城市生态规划\n4.城市生态规划的主要内容\n（5）城乡一体化生态建设专项规划\n城市与其周边乡村地区共同构成了城乡复合生态系统，二者之间相\n互作用、相互影响，它们之间不断地进行着物质、能量、信息和资金交\n流。\n城乡一体化，简单地说，就是统筹城乡社会经济发展，推动城市和\n农村协调发展，农村居民和城市居民共享现代文明生活。城乡一体化不\n是城乡一样化，而是通过统一的城乡规划，打破城乡分割的体制和政策，\n加强城乡间的基础设施和社会事业建设，促进城乡间生产要素流动，逐\n步缩小城乡差别，实现城乡经济、社会环境的和谐发展。\n\n---\n\n<!-- page 109 -->\n\n![page 109](page_109.jpg)\n\n\n### 6.4生态环境规划\n三、生态工业园区规划\n1.生态工业园区的概念与类型\n生态工业园区是依据清洁生产要求、循环经济理念和工业生态学\n原理而设计建立的一种新型工业园区。它通过在产业系统中建立\n“生产者一消费者一分解者”的循环途径，寻求物质闭路循环、能\n量多级利用和废物产生的最小化的工业发展形式。\n可分为行业类园区、综合类园区和静脉工业类园区。行业类生态\n园区是以某一类工业行业的一个或几个企业为核心，通过物质和\n能量的集成，在更多同类企业或相关行业企业间建立共生关系而\n形成的生态工业园区。综合类生态工业园区是由不同工业行业的\n企业组成的工业园区，主要指在高新技术产业开发区、经济技术\n开发区等工业园区基础上改造而成的生态工业园。静脉产业类生\n态工业园区是以静脉产业生产（资源再生利用产业）的企业为主\n体的生态工业园区。\n\n---\n\n<!-- page 110 -->\n\n![page 110](page_110.jpg)\n\n\n### 6.4生态环境规划\n三、生态工业园区规划\n2.生态工业园区规划的原则\n“3R\"原则（减量化、再利用、资源化）；适用性原则：可操作性\n原则。\n3.生态工业园区规划的编制依据\n国家和地方环境保护、清洁生产和循环经济方面的相关法律\n法规、国家和地方对生态工业园区的管理政策、国家和地方有关\n园区的发展政策、园区所在区域国民经济和社会发展规划（纲\n要）、园区控制性规划、相关行业清洁生产标准、相关行业中长\n期发展规划、园区所在区域循环经济规划、园区所在区域产业发\n展规划、园区所在区域环境保护规划、园区所在区域土地利用规\n划、园区所在区域交通、电力等基础设施规划以及其他依据材料。\n\n---\n\n<!-- page 111 -->\n\n![page 111](page_111.jpg)\n\n\n### 6.4生态环境规划\n三、生态工业园区规划\n4.生态工业园区规划编制的程序\n（1）确定任务。当地园区管委会或其他园区行政管理部门委托\n具有相应资质或经验的单位编制生态工业园区规划，通过委托\n文件和合同明确规划编制各方责任、要求、工作进度安排、验\n收方式等。\n（2）调查、收集资料。收集编制规划所必需的生态环境、社\n会、经济背景或现状资料，社会经济发展规划、区域总体规划\n和土地利用规划、产业结构、产业发展规划和布局规划、园区\n主导行业发展规划等有关资料，以及与规划有关的社会、经济\n科技、地理、自然、生态、环境污染等方面的有关信息。调查\n范围以拟建设的生态工业园区为主，兼顾对园区发展影响较大\n的周边区域。\n\n---\n\n<!-- page 112 -->\n\n![page 112](page_112.jpg)\n\n\n### 6.4生态环境规划\n4.生态工业园区规划编制的程序\n（3）编制规划大纲。按照国家环\n\n#### 境保护部发布的《生态工业园区\n建设规划编制指南》（HJ/T409-\n2007）要求的规划主要内容编制规\n划大纲。\n（4）编制规划。按照规划大纲的\n\n#### 要求编制生态工业园区规划和技\n术报告。\n\n---\n\n<!-- page 113 -->\n\n![page 113](page_113.jpg)\n\n\n### 6.4生态环境规划\n4.生态工业园区规划编制的程序\n（5）规划论证及公众参与。在规划\n编制过程中应当广泛征求政府有关部\n门的意见和建议，同时通过多种形式\n咨询公众意见，并组织专家论证会对\n规划成果进行论证。\n（6）规划评审。有关部门依据论证\n后的规划大纲组织对规划进行审查，\n规划编制单位根据审查意见对规划进\n行修改、完善后形成规划报批稿。\n\n---\n\n<!-- page 114 -->\n\n![page 114](page_114.jpg)\n\n\n### 6.4生态环境规划\n三、生态工业园区规划\n5.生态工业园区规划编制的内容\n（1）生态工业园区概况和现状分析。\n（2）生态工业园区建设必要性分析。\n（3）生态工业园区建设总体设计。\n（4）园区主要行业生态工业发展规划。\n（5）资源循环利用和污染控制规划。\n（6）重大项目及其投资与效益分析。\n（7）生态工业园区建设保障措施。\n\n---\n\n<!-- page 115 -->\n\n![page 115](page_115.jpg)\n\n\n### 6.4生态环境规划\n\n#### 习题\n1.简述大气环境规划的内容和步骤。\n2.简述大气污染源调查的主要内容。\n3.简述大气污染物总量控制的主要方法及大气污染防治措施。\n4.简述水环境功能区划的原则和方法。\n5.水污染物预测的主要包括哪些内容？\n6.简述水污染综合防治措施。\n7.简述固体废物管理规划的主要内容。\n8.固体废物处置选址的原则有哪些？\n9.简述生态规划的内涵。\n10.简述生态调查的主要内容和方法。\n11.城市生态规划与生态城市之间是什么关系？\n12.城市生态规划的主要内容有哪些？\n13.简述生态工业园区规划的主要内容。\n"}, {"id": "pdf-008-5-8", "group": "原始课件 · PDF原文", "title": "008-5月8日授课-第七章环境管理模式", "md": "# 第七章环境管理模式\n\n> 来源: 008-5月8日授课-第七章环境管理模式.pdf\n> 页数: 106\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### GUNIV\n\n## 第七章\n\n#### 环境管理模式\n第一节 末端控制为基础的传统环境管理模式\n第二节 污染预防为基础的现代环境管理模式\n第三节污染预防环境管理模式的实施\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 学习要点\n\n#### 学习要点\n了解末端控制为基础的传统环境管理模式；理解污染\n预防为基础的环境管理模式的提出和基本内容以及污染预\n防模式实施过程的环境规划管理。\n学习重点：污染预防为基础的环境管理模式。\n学习难点：污染预防模式实施过程的环境规划管理。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 学习要点\n\n#### 第一节 末端控制为基础的传统环\n\n#### 境管理模式\n一、末端控制传统环境管理模式的建立\n二、末端控制传统环境管理模式的实践\n三、末端控制传统环境管理模式的弊端\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n一、末端控制传统环境管理模式的建立\n1.末端控制的含义\n\n#### 未端控制又称末端治理或末\n\n#### 端处理，是指在生产过程的终端\n\n#### 或者是在废弃物排放到自然界之\n\n#### 前，采取一系列措施对其进行物\n\n#### 理、化学或生物过程的处理，以\n减少排放到环境中的废物总量。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n一、末端控制传统环境管理模式的建立\n一座20万kW的燃煤电厂，每关停1d\n的脱硫除尘设备，就可以节约大约20万\n元；莲花味精厂每关停一天污水处理设\n备，大约可节约成本10万元。末端治理\n所需的大量环保投入抵消了经济发展所\n创造的福利。所以，以末端治理为特征\n的经济模式既达不到预期的经济效益、\n社会效益，同样也遏制不了生态环境恶\n化的趋势。也就是说，末端治理经济模\n式，从本质上仍然属于传统经济模式的\n范畴。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n一、末端控制传统环境管理模式的建立\n2.基于末端控制思想的传统环境管理模式的建立\n20世纪70-80年代初，随着制造业的快速发展与技术革新速度的加\n快，人类所依赖的资源与生产的产品范围得到扩大：人工合成的各种化\n学物质被不断的生产与制造，而这些化学物质不能很快或不能为自然系\n统吸纳与循环，因此引1发了严重的环境污染问题；同时制造过程中能源\n与资源消耗大，排放了大量的废弃物，环境的容纳与循环能力不能承载，\n造成环境问题日益突出。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n一、末端控制传统环境管理模式的建立\n随着“污染者负担”原则的提出，\n各国法律都规定了企业对其排放污染\n物的行为必须承担经济责任，凡是污 谁污染谁负责。\n染物的排放量超过了规定的排放标准，\n都需要缴纳超标排污费，造成环境损\n害的，需要承担治理污染的费用并赔\n\n#### 工程施工\n偿相应的损失。在这一阶段，企业面\n对严格的法律、法规、标准、政策，\n企业只能遵循相关的制度约束。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n一、末端控制传统环境管理模式的建立\n为了能够在制度约束的范围内进行经营活动，其环境手段往往是\n在其制造的最后工序或排污口建立各种防治环境污染的设施来处理污\n染，如建污水处理站，安装除尘、脱硫装置等以“过滤器”为代表的\n末端控制装置与设备，为固体废弃物配置焚烧炉或修建填埋厂等方式\n来满足政策与法规对废弃物的排放达到排放标准的要求。这种环境管\n理模式是以“管道控制污染”思想为核心，强调的是对排放物的末端\n管理。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n一、末端控制传统环境管理模式的建立\n未端控制的环境管理模式具有线性经济模式的基本特征：\n①是由“资源-产品-废弃物排放”单方向流程组成的开环式系统；\n②在这种模式中，人们从自然界获取大量的资源和原材料，经过\n生产加工制造出产品，产品在消费使用后被当作废弃物直接丢弃，而\n不是被回收、再利用或重新转化为资源。这种模式依赖于大量的资源\n投入和不断扩大的生产规模来推动经济增长，对资源的消耗速度快\n并且产生大量的废弃物和环境污染，是一种不可持续的经济发展方式。\n\n#### 产品 分销商\n\n#### 销售 用户 使用\n\n#### 供应商 资源\n\n#### 采购 制造\n\n#### 废弃物\n\n#### 污染处理\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n一、末端控制传统环境管理模式的建立\n这种环境管理模式要实现整体经济系统的人与自然的和谐发展要求\n具备几个基本的前提：\n①自然资源的永续与无限性，制造业能永续地从自然系统中便利地得到\n资源与能源；②产品在分销与使用过程中不产生对自然系统构成威胁的\n废弃物；③自然生态系统可以自然化解、吸纳和消除企业通过末端处理\n的废弃物。\n事实上上述三个假设前提均不存在：自然资源不是永续存在的，同\n时是有限的；产品在分销与使用过程中产生了大量的废弃物，如日益受\n到关注的电子垃圾已经对自然环境产生了巨大的环境压力；自然系统自\n然降解、吸纳和消除废弃物的能力是有限的。以管道控制为核心的末端\n控制的环境管理模式不能实现人和自然的和谐发展\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n二、末端控制传统环境管理模式的实践\n1.美国末端控制传统环境管理模式的实践\n美国污染控制政策演变（三次重大演变）\n第一次重大转变 第二次重大转变 第三次重大转变\n1948-1963 20世纪70年代-80年 90年代以来\n\n#### 代\n从忽视污染防治转变 由浓度控制向总量 源头控制提出\n\n#### 为重视 控制转变\n《联邦水污染控制法》 《清洁空气法》 《污染预防法》\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n二、末端控制传统环境管理模式的实践\n据美国1988年有毒物质排放报表资料，每年仍有45.7亿t\n有毒化学品直接排入环境，对环境产生严重的危害。而且随着\n人们对环境质量要求日益提高，污染物控制标准日趋严格，实\n行末端控制导致环境保护工作投资日益增加，美国每年该项投\n\n#### 资达到800亿~900亿美元\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n二、末端控制传统环境管理模式的实践\n2.中国末端控制传统环境管理模式的实践\n我国的环境管理发展历程的前两个阶段充分说明了基于末端控制思\n想的传统环境管理模式在我国的建立和实践过程。\n在第一个阶段实现了思想认识的转变，颁布了《中华人民共和国环\n境保护法（试行）》，认识到了环境保护要依法管理，并开始集中人力\n财力治理了一批重点污染源。\n在第二个阶段确定了环境保护是我国的一项基本国策，提出了“三\n同步、三统一”的大政方针，确立了以强化环境管理为主的“三大政\n策”，形成了以环境影响评价、“三同时”、征收排污费和自然资源补\n偿费、排污许可证、环境保护目标责任、城市环境综合整治定量考核、\n限期治理、污染集中控制等制度为基本内容的环境管理体系\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n二、末端控制传统环境管理模式的实践\n我国在环境污染防治方面的行政控制手段可简要概括为：在经济计\n划方面，法律要求在“宏观决策”层次上应将环境保护纳入国民经济和\n社会发展计划，制定和执行环境保护规则；在“微观技术”层次上将环\n境保护纳入企业管理中；再加上“中观管理”层次上的各种行政管理制\n度和措施，共同构成了我国环境污染防治的行为控制体系。\n\n#### 中国环保\n\n#### YOGACULTURE\n提与环楼的美系，保障经活社会的可持绿当屏历菜取的各种行 私境导补是情人要为前决现货或限在的环旗可群：协调人\n#的急称，其方法和手租有工程核不的、行孩爱理的，#育生\n乐地护是提人类为新认理要成酒在的环#为题，协调人\n你：其方和手核育工校核水的、1收管理作：您有 校济的，直传教自的婷\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 主观题 页10分\n请同学们思考末端控制的弊端有哪些\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n三、末端控制传统环境管理模式的弊端\n（1）末端处理技术常常使污染物从一种环境介质转移到另一种环境\n介质。常用的污染控制技术只解决工艺中产生并受法律约束的第一代\n污染物，而忽视了废弃物处理中或处理后产生的第二代污染问题。\n（2）现行环境保护法规、管理、投资、科技等占支配地位的是单纯\n污染控制，而没有对面临全球系统的环境威胁提出适当的解决办法。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n三、末端控制传统环境管理模式的弊端\n（3）环境问题给世界各国包括发达\n\n#### 工业国家带来了越来越沉重的经济\n负担，控制污染问题之复杂，所需资\n金之巨大远远超出了原先的预料，环\n境问题的解决远比原来设想的要困难\n得多。\n（4）“污染控制”的现行法规体\n\n#### 系和运行机制，导致部分企业（公\n司）养成了一种“污染排放后才控制\n或“达标排放”的思想心态，成为强\n化环境管理，广泛实行污染预防的障\n-5thJune\n碍因子。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n\n#### 第二节 污染预防为基础的现代环\n\n#### 境管理模式\n\n#### 源削减\n\n#### 循环经济\n三、废物减量化\n四、产品生态设计\n五、产品环境标志\n六、产品生命周期评价\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n鉴于基于末端控制的环境管理模式的局限性，20世纪80年代\n中期，欧美国家将环境政策的重点转向以预防为主。可以将污染\n预防概念定义为：在人类活动各种过程中，例如材料、产品的制\n造、使用过程以及服务过程，采取消除或减少污染控制措施，它\n包括不用或少用有害物质，采用无污染或少污染制造技术与工艺\n等，以达到尽可能消除或减少各种(生产、使用)过程产生的废物，\n最大限度地节约和有效利用能源和资源，减少对环境的污染。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n\n#### 美国1990年《污染预防法》\n美国1990年《污染预防法》在很大程度上是象征性的，它的\n实际作用是产生了可以建筑未来污染预防努力的立法框架。\n该法的中心议题是在全国采取措施促进自愿实行污染预防，\n既不需要也不希望采取强制性的污染预防。该法的基本政策是，\n作为环境管理政策体系的最高重点是通过源削减实现污染预防。\n该法第四、五、六、七、八节内容分别是环保局的活动、用\n于各州技术支持项目的基金、源削减技术信息交换所、源削减和\n再循环数据的收集、环保局的报告。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n该法所规定的环保局的责任包括：\n（1）宣传和推动自愿的污染预防；\n（2）收集与分析信息数据，以制定和明确解释综合污染预防计划。\n该法规定环保局必须在局内成立污染预防办公室。该法还要求环\n保局制定污染预防策略，包括下述措施：\n（1）建立测量源削减的标准方法；\n（2）审议环保局的法规，协调环保局与其他联邦机构的活动，促\n进源削减;\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n（3）根据联邦立法建立改进和散发数据的方法；\n（4）成立国家信息交换站和通过拨款计划和技术援助，促进企\n业实行源削减；\n5 确定可计量的源削减目标；\n6 判定并向国会建议消除源削减障碍的方法；\n开发、检验和散发源削减审计程序；\n8 判定利用联邦采购手段，鼓励源削减的机会；\n6 制定年度奖励计划，以表彰执行优异的或革新的源削减计\n划的公司。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n\n#### 美国污染预防政策实施\n(1)1990年成立污染预防办公室，其任务是开发、推广和实施污\n染预防战略。\n(2)环保局内成立环境教育办公室，主要训练环保系统内部成员及\n其他政府机构成员，培训以污染预防为中心内容。\n(3)环保局内成立污染预防信息交流中心(PPIC)，建立了污染预防\n信息交流系统（PIES），为企业提供有关源削减及再循环利用方面\n的信息服务（无偿服务）。还将帮助政府和企业制定污染预防计划\n向计算机网络提供相关资料。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n第二节污染预防为基础的现代环境管理模式\n(4)有毒污染物的预防。有毒污染物是环保工\n作的重点之一。\n(5)制定了“源削减检查计划”(SRRP)。实施\nSRRP的目标是为了评价新颁布的工业标准对\n\n#### AGENCY\n工业界采用源削减措施潜力的影响。\n(6）建立污染预防示范工程。\n(7)其他措施。为实施污染预防，美国环保局\n还制定了一系列措施，如对开展污染预防工\n作的单位提供资助和奖励，并制定了《废物\n削减技术评价计划》（WRITE)，对废物削减技\n术进行评价，制定配套的政策，鼓励排污单\n位增加对污染预防的投资。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 源削减\n\n#### 源削减\n源削减（sourcereduction)\n\n#### 包括减少在回收利用、处理或处置\n\n#### 以前进入废物流或环境中的有害物\n\n#### 质、污染物的数量的活动，以及减\n\n#### 保护环境\n\n#### 少这些有害物质、污染物的排放对\n\n#### 爱护地球\n公众健康和环境危害的活动。\n\n#### 明确指出污染排放后的回收利\n\n#### 用、处理、处置不是源削减，使污\n\n#### 染预防更显示其与过去的污染控制\n有截然的区别。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 、源削减\n源头控制是针对末端控制而提出的一项控制方式，是指在“源\n头”削减或消除污染物，即尽量减少污染物的产生量，实施源削减。\n美国污染预防政策的实质就是推行源头控制，实施源削减。这是一\n种治本的措施，是一种通过原材料替代，革新生产工艺等措施，在\n技术进步的同时控制污染的方法，代表了今后污染控制的方向。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n一、源削减\n两种常用的源削减方法是改变产品和改进工艺。它们减少了产品\n的生命周期和废物处置中废物及制成品的数量和毒性。\n其内容包括设备或技术改造，工艺或程序改革，产品的重新配制\n或重新设计，原料替代，以及改进内务管理、维修、培训或库存控制。\n源削减不会带来任何形式的废物管理(例如，再生利用和处理)。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 、源削减\n\n#### 为了实施源削减计划，美国\n\n#### 采取了包括：信息交换站、研究\n与开发、提供技术帮助/法规说明、\n\n#### 提供现场技术帮助、对工业提供\n\n#### 财政援助、对地方政府提供财政\n\n#### 援助、废物交换、废物审计、举\n\n#### 办研讨班和学习班、召开专业会\n\n#### 议、调查和评价、出版简讯和刊\n\n#### 物、审查预防计划、与学术界合\n\n#### 作，促进污染预防、奖励计划等\n内容的污染预防计划。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n#### 主观题10分\n为什么?\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n二、循环经济\n\n#### 循环经济本质上是一种生态\n\n#### 经济，就是把清洁生产和废弃物\n的综合利用融为一体的经济，它 循环经济\n\n#### 要求运用生态学规律来指导人类\n\n#### 减量化再利用资源化\n社会的经济活动。\n\n#### 按照自然生态系统物质循环\n\n#### 和能量流动规律重构经济系统\n\n#### 使得经济系统和谐地纳入到类似\n\n#### 于自然生态系统的物质循环过程\n中，建立起一种新的经济形态。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n二、循环经济\n自然生态系统中物质循环，能量流动一例如有机碳循环\n\n#### 有机物\n\n#### 二氧化碳 生产者\n\n#### 微生物，其\n\n#### 他生物\n食物碎屑，排泄物，户体 消费者（食物链）\n\n#### 分解者\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n二、循环经济\n生态系统中资源利用的特点：\n\n#### 物质（资源）得到循环利用\n没有废弃物，一个过程的废物是另一个\n\n#### 过程的资源\n\n#### 资源高效转化，能源高效利用\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n二、循环经济\n\n#### 传统经济与循环经济的比较\n\n#### 传统经济 循环经济\n“资源一生产—消费—废弃物 资源—生产—消费—资源\n排放”单向流动的线性经济 （再生）”的反馈式流程\n\n#### 经济增长靠高强度的开采和消\n\n#### 资源重复利用的比例很高，对\n\n#### 费资源以及高强度地破坏生态\n\n#### 生态环境的影响小\n\n#### 环境\n\"三高一低”（高开采、高消 “三低一高” (低开采、\n耗、高排放、低利用) 低消耗、低排放、高利用）\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n二、循环经济\n循环经济倡导的是一种建立在物质不断循环利用基础上的经济\n发展模式，它要求把经济活动组织成一个“资源一生产一消费一资\n源(再生)”的反馈式流程，所有的物质和能源要能在这个不断进行的\n经济循环中得到合理和持久的利用，以把经济活动对自然环境的影\n响降低到尽可能小的程度。\n循环经济是以物质、能量梯次和闭路循环使用为特征，在环境\n资源综合利用、生态设计和可持续消费等融为一体，运用生态学规\n律来指导人类社会的经济活动。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n二、循环经济\n1.循环经济的概念\n（1）循环经济的起源及发展\n循环经济的思想萌芽可以追溯到环境保\n护兴起的20世纪60年代，源于美国经济学\n家波尔丁提出“宇宙飞船理论”，对传统\n工业经济“资源一生产一消费一废弃物排 资源循环利用\n放”的“开环模式”提出了批评。波尔丁\n首先提出“循环经济”一词，指在人、自\n然资源和科学技术的大系统内，在资源投\n入、企业生产、产品消费及其废弃的全过\n程中，把传统的依赖资源消耗的线形增长\n经济，转变为依靠生态型循环利用资源来\n发展经济。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n二、循环经济\n“宇宙飞船理论”是循环经济的早期代表，该理论认为：地球就像在\n太空中飞行的宇宙飞船，要靠不断消耗自身有限的资源而生存，如果不合\n理开发资源、保护环境，就会像宇宙飞船那样走向毁灭。因此，“宇宙飞\n船经济”要求一种新的发展观：第一，必须改变过去那种“增长型”经济\n为“储备型”经济；第二，要改变传统的“消耗型经济”，而代之以休养\n生息的经济；第三，实行福利量的经济，摒弃只注重生产量的经济；第四，\n建立既不会使资源枯竭，又不会造成环境污染和生态破坏、能循环使用各\n种物资的“循环式”经济，以代替过去的“单程式”经济。\n让垃圾变资源！\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n二、循环经济\n(2)循环经济的概念和原则\n循环经济是一种以资源的循环利用为核心，以“减量化、再利\n用、资源化”为原则，以低消耗、低排放、高效率为基本特征，符\n合可持续发展理念的经济增长模式。循环经济的“3R”原则为：\n①减量化原则（Reducing）\n减量化原则要求用较少的原料和能源投入来达到既定的生产目\n的或消费目的，即从经济活动的源头就注意节约资源和减少污染。\n减量化原则针对的是输入端，旨在减少进入生产和消费过程中物质\n和能源流量。对废弃物的产生，是通过预防的方式而不是末端治理\n的方式来加以避免。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n二、循环经济\n\n#### ②再使用原则（Reusing）\n再使用原则要求制造产品和包装容器能够以初始的形式被反复\n使用；要求抵制一次性用品的泛滥。\n③再循环原则（Recycling）\n再循环原则要求生产出来的物品在完成其使用功能后能重新变\n成可以利用的资源，而不是不可恢复的垃圾。\n按照循环经济的思想，再循环有两种情况：一种是原级再循环，\n即废品被循环用来产生同种类型的新产品，例如报纸再生报纸、易\n拉罐再生易拉罐等；另一种是次级再循环，即将废物资源转化成其\n他产品的原料。原级再循环在减少原材料消耗上面达到的效率要比\n次级再循环高得多，是循环经济追求的理想境界。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n二、循环经济\n2.发达国家循环经济的基本模式\n（1)企业内部的循环经济模式（杜邦模式）\n基本特点是通过循环来延长生产链条，减少生产过程中物料和\n能源的使用量，减少废弃物和有毒物质的排放，最大限度地利用可\n再生资源，同时提高产品的耐用性等。\n杜邦公司创造性地把循环经济三原则发展成为与化学工业相结\n合的“3R制造法”，通过放弃使用某些环境有害型化学物质、减少\n些化学物质的使用量以及发明回收本公司产品的新工艺，到2000\n年已经使该公司的总废物减少了1/4，有害废弃物减少了40%，温\n室气体排放量减少了70%。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n二、循环经济\n（2）区域生态工业园区模式（卡伦堡模式）\n基本特征是按照工业生态学的原理，通过企业间的物质集成、能\n量集成和信息集成，形成产业间的代谢和共生耦合关系，使一家工厂\n的废气、废水、废渣、废热成为另一家工厂的原料和能源，建立工业\n生态园区。\n（3）社会层面上废弃物的回收再利用模式（DSD模式）\n回收再利用模式的基本特征是建立废旧物资的回收和再生利用体\n系，实现消费过程中和消费过程后物质与能量的循环。\n德国的废弃物双元回收体系（DSD）是其典型代表，是专门组织回\n收处理包装废弃物的非盈利社会中介组织，1995年由95家产品生产厂\n家、包装物生产厂家、商业企业以及垃圾回收部门联合组成，目前共\n有1.6万家企业加入。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n二、循环经济\n（4）社会循环经济体系\n\n#### 循环型社会是指限制自然资\n源消耗、环境负担最小化的社会。 城市矿产 废弃资源\n\n#### 2000年，日本制定了《促进\n\n#### 废弃\n\n#### 循环社会形成基本法》，提出把\n整个社会建成循环型社会的发展 消费者 材料循环\n目标，与2000年相比，到2010年 使用 利用\n\n#### 要达到三个目标：资源投入产出\n\n#### 产品再 再加工\n\n#### 再市场化\n率提高40%，资源循环利用率提 制造\n\n#### 高40%，废弃物最终处置量减少\n50%。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n二、循环经济\n\n#### 日本循环经济法律体系\n法律层次 法律名称 制定时间（年）\n\n#### 《环境基本法》 1993\n\n#### 基本法 《建立循环型社会\n\n#### 基本法》 2000\n\n#### 《废弃物处理法》 1970\n\n#### 综合性法 《资源有效利用处\n\n#### 理法》 1991\n\n#### 《容器与包装物的 1995\n\n#### 分类收集与循环法》\n\n#### 《特种家用机器循 1998\n\n#### 环法》\n专项法 《建筑材料循环法》 2000\n\n#### 《多氯联苯废弃物\n\n#### 妥善处理特别措施 2001\n\n#### 法》\n\n#### 《车辆再生法》 2002\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n二、循环经济\n3.我国循环经济发展的对策\n①加强宣传教育，牢固确立循环经济理念\n运用各种宣传形式和手段，进一步普及循环经济知识，不断将循环\n经济理念引入人们的日常生产、生活和消费方式中，切实提高公众的资\n源意识、节约意识和环保意识，摒弃传统的发展思维和发展模式。\n在发展思路上彻底改变重开发、轻节约，重速度、轻效益，重外延\n发展、轻内涵发展，片面追求GDP增长，忽视资源和环境的倾向，加快\n增长方式转变速度，切实推进循环经济发展。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n二、循环经济\n②依靠科技创新，加强循环经济技术开发\n科学技术是发展循环经济的重要支撑。通过产学研结合，组织一批\n关键技术攻关，努力突破制约循环经济发展的技术瓶颈。\n加大对循环经济相关科技创新与开发，从资源及能源开发利用、生\n产制造、消费等各个环节，为循环经济发展提供强有力的技术支撑，组\n织开展资源节约和替代、能量梯级利用、绿色再制造等方面的科技攻关，\n研究开发一批经济效益好、资源消耗低、环境污染少的实用技术。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n二、循环经济\n③强化环境管理，构建循环经济指标体系\n企业是经济活动的主体，也是资源消耗、废弃物产生和排放\n的载体，加强企业资源环境管理是发展循环经济的基础。\n企业要树立经济与资源环境协调发展的意识，建立健全资源\n节约管理制度，大力开展资源综合利用，积极推行清洁生产，从\n源头上削减污染，提高资源利用效率。\n④加强组织领导，积极推广示范典型\n加强组织领导是推动循环经济工作的关键，要高度重视，加\n大工作力度，把循环经济贯穿整个经济工作中，摆在重要议事日\n程上。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n二、循环经济\n\n#### 制定相关经济政策，建立促\n\n#### 进循环经济发展的激励机制\n\n#### 除了在法律法规中体现出\n\n#### 对循环经济的扶持外，应制定\n\n#### 相关经济政策，加大对循环经\n济发展的支持力度。例如在税\n\n#### 收减免、引导资金等方面给予\n\n#### 激励政策，对采用清洁生产工\n\n#### 艺和资源循环利用的企业给予\n\n#### 减免税收、财政补贴以及信贷\n优惠政策。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n三、废物减量化\n废物减量化（wasteminimization）也称为废物最少化，指将产\n生的或随后处理、贮存或处置的有害废物量减少到可行的最小程度。\n即由产生者减少有害物的体积和毒性，其中包括削减废物产生\n的活动及废物产生后进行回收利用与减少废物体积和毒性的处理\n处置。“减量化”不一定要鼓励削减废物的生产量和废物本身的毒\n性，而且要求减少需要处置的废物的体积和毒性。\n\n#### 无废城市\n\n#### 让废物变资源\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n三、废物减量化\n废物减量化与末端治理相比，有明显的优越性，如据化工、轻\n工、纺织等十五个企业投资与削减量效益比较，废物减量化比末端\n治理，万元环境投资削减污染物负荷高3倍多。但由于废物的处理\n和回收利用，仍有可能造成对健康、安全和环境的危害，因而废物\n减量化往往是废物管理措施的改进，而不是消除它们。所以“废物\n减量化”仍然是一个与排放后的有害废物处理息息相关的术语，其\n实效性如同末端治理，仍有很大局限性。\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n四、产品生态设计\n2005年7月6日，欧洲议会和欧盟理事会通过了关于用能产\n品生态设计要求的第2005/32/EC号指令（下文简称用能产品生\n态设计指令或EUP指令），并要求成员国于2007年8月11日前使\n遵守该指令所需的国内法律、法规和行政规定生效。\n欧盟这一绿色指令的通过引起了全世界的关注，有学者认为\n它将引起设计领域的一场革命，国内企业特别是家电类出口企业\n的“神经”也因此而高度紧张。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n四、产品生态设计\n1.产品生态设计的定义\n产品设计是一个将人的某种目的或需要转换为一个具体的物理形式\n或工具的过程。产品生态设计（eco-design）旨在改善产品在整个生\n命周期内的环境性能，降低其环境影响，实现从源头上预防污染的目的。\n产品生态设计系指将环境因素纳入设计之中，在产品生命周期的每\n一环节都考虑其可能带来的环境影响，通过设计改进，使产品的环境影\n响降为最低，最终引导产生一个更具有可持续性的生产和消费系统。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n四、产品生态设计\n\n#### 中上\n\n#### 产品生态设计的特点\n（1）从“以人为中心”的产品设计转向既考虑人的需求，又考虑生\n态系统安全的生态设计。\n（2）从产品开发概念阶段，就引进生态环境变量，并与传统的设计因\n子如成本、质量、技术可行性、经济有效性等进行综合考虑。\n（3）将产品的生态环境特性看做是提高产品市场竞争力的一个重要\n因素；在产品开发中考虑生态环境问题，并不是要完全忽略其他因子。\n因为产品的生态特性是包含在产品中的潜在特性，如果仅仅考虑生态\n因子，产品就很难进入市场，产品的潜在生态特性也就无法实现。\n\n---\n\n<!-- page 53 -->\n\n![page 53](page_053.jpg)\n\n四、产品生态设计\n2.产品生态设计战略\n（1）生态产品概念开发战略\n产品生态设计战略首先应考虑的就是生态产品概念开发战略。\n从环保方面考虑，生态设计的最终目标是寻找更优化、更合理的\n方案来持续减少产品对环境的影响，其实现途径见下表：\n\n#### 实现途径 作用 说明\n减少生产商对有形产品非物质化主要包括：产品体\n以非物质产品（如信息）或 的生产和使用，同时也积小型化：产品重量最轻化；\n服务替代有形的产品 减少消费者对有形产品非物质产品替代物质产品；\n的依赖。 减少对物质的使用，减少对\n\n#### 基础设施的利用等\n提高产品的使用效率，实现产品共享的途径：考虑\n提倡产品共享 降低原材料和能源的消开发新的适用于共享的产品；\n耗，降低产品的运输成提高现有共享产品的共享率；\n本。 以提供服务代替提供产品\n\n---\n\n<!-- page 54 -->\n\n![page 54](page_054.jpg)\n\n四、产品生态设计\n（2）易于清洁、维护和维修\n\n#### 产品生态设计应注意产品易于清\n洁、维护和维修以延长产品的使用寿\n命。\n\n#### 生态设计要点：一是清楚标明产\n品如何打开以进行维护和维修；二是\n清楚标明产品的某一部件应以某种特\n殊的方式进行清洁或维护：三是应清\n楚标明产品中需要定期检查的部件；\n四是需要定期更换的部件应易于更换。\n\n---\n\n<!-- page 55 -->\n\n![page 55](page_055.jpg)\n\n四、产品生态设计\n（3）产品的模块化设计\n产品的模块化设计可最大限度地提高产品的可更新性，以\n满足不断变化的用户需求。在模块化设计中，每个模块都具有\n明确的功能、接口和标准规范。这些模块可以独立进行设计、\n生产、测试和维护。通过对模块的选择、组合和配置，可以快\n速创建出满足不同用户需求、具有不同性能和特点的产品。\n具体的策略：为产品预留升级空间，更新已过时或破损的\n部件；将易损件整合为可一次性替换的模块等。\n\n---\n\n<!-- page 56 -->\n\n![page 56](page_056.jpg)\n\n四、产品生态设计\n（4）尽量利用再循环原料及材料\n生态产品设计的一个特点是尽可能利用再循环原料及材料，\n减少原材料在采掘和生产过程中的能耗，最大程度地减少资源消\n耗，降低成本，提高企业经济效益，保护生态环境。企业可以制\n定“回收”计划，对原材料或部件进行再循环。\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n四、产品生态设计\n（5）致力于产品体积的最小化和重量的最轻化\n产品生态设计应致力于产品体积的最小化和质量的最轻化\n以减少原材料及能源的消耗。由于产品质量的减轻，使用的原材\n料减少，相应产生的废物也减少，同时产品运输过程的环境影响\n也减小。产品和其包装体积的减小，使得同一运输工具一次可运\n更多的产品，从而减少能耗和成本。\n总之，产品生态设计减少对外部环境的废物排放，尽可能在\n企业内部乃至整个产业界实现生产一消费和维护一回收一再生产\n的封闭大循环。\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n四、产品生态设计\n3、产品生态管理\n（1）ISO14000环境管理体系是产品生态管理的重要标准\n1993年6月，国际标准化组织（ISO）成立了TC207环境管理\n技术委员会，TC207所制定的国际标准，通称ISO14000系列标准。\nISO14000体系体现了产品生命周期思想，即通过对产品“从摇篮\n到坟墓”的全过程控制，推动全行业乃至全社会环境行为的改善。\nISO14000是一个系列环境管理标准，它包含了面向组织的3项标准：\n环境管理体系（EMS）；环境审核（EA）；环境行为评价（EPE)\n面向环境的3项标准：生命周期评价（LCA）；环境标志（EL）；产\n\n#### 品标准中的环境指标（EAPS）\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n四、产品生态设计\n\n#### 产品生态管理\n产品生态管理涉及产业生态领域中产品的设计、生产、销售、\n维护及回收的各个方面，管理方法也不尽相同。以下表典型的例子\n来说明产品生态管理。\n\n#### 环境问\n\n#### 公司 管理措施 实例说明\n\n#### 题\n①废物管理、节能节水、水质控制、室内\n空气质量以及噪声控制等：②重复利用灌装 常见可再循环物品及\n\n#### 其制成品有：铝（用于制\n产生废 的瓶、布质毛巾和洗衣袋、可洗涤的餐巾\n和可再充电的电池等：③制造商、供应商也 造铝产品，包括罐头），\n\n#### 物多、 高级纸（用于制作纸盒\n水电等 应保证物品的可再循环性：4建立标准程序\n板、薄纱纸、印刷纸、\n能耗大、 对主要能源和水的消耗设备或环节诸如锅 书写纸、报纸、衬里\n旅馆 炉、制冷机、冷却塔和空调设备进行检\n\n#### 空气质 纸板、白账薄纸、有\n量低、 测：要使资源（人员、设备、公用设施）的使 色账簿纸、混合办公\n噪声较 用与时间、季节、占有率、天气的变化匹\n纸、其他混合纸等），\n大等 配：采取具体的节能措施例如按实际负荷\n\n#### 食品和有机材料（可用\n运行制冷机、锅炉、泵和冷却塔设备：按每 于草地与花园的土壤\n日、每周或假日经营来安排采暖、通风和 调节剂\n\n#### 空调系统等\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n四、产品生态设计\n五、产品环境标志\n1.环境标志概述\n环境标志是一种“证明性商标”，它表\n明该产品不仅质量合格，而且在生产、使用、\n处置过程中符合特定的环境保护要求，与同\n类产品相比，具有低毒少害，节约资源等环\n境优势。环境标志认证指由国家权威机构认\n可的第三方认证机构依据环境标志产品标准\n及有关规定，对产品环境性能及生产过程进 中国环保产品认证\n行确认，并以特定的标志图形予以公告，具\n有高度的客观公正性和可信度。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n四、产品生态设计\n发展环境标志的最终目的是保护环境，它通过两个具体步骤\n得以实现：一是通过环境标志向消费者传递一个信息，告诉消费\n者哪些产品有益于环境，并引导消费者购买、使用这类产品；二\n是通过消费者的选择和市场竞争，引导企业自觉调整产品结构，\n采用清洁生产工艺，使企业环保行为遵守法律法规，生产对环境\n有益的产品。\n产品环境标志的目标包括：①为消费者提供准确的信息；\n增强消费者的环境意识；③促进销售；④推动生产模式的转变；\n保护环境。\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n四、产品生态设计\n环境标志培养了消费者的环境意识，强化了消费者对有利于\n环境的产品的选择，促进对环境影响较少的产品的开发，达到了\n减少废物、减少生活垃圾、减少污染的目的。\n对于实施环境标志制度带来的成效可从三个方面加以评估：\n①消费者行为的改变程度；②生产者行为的改变程度；③对环境\n的好处。\n实践表明，实施环境标志制度确实可以提高消费者对产品环\n境影响的关注，瑞典第二大零售店对消费者开展了一次民意测验，\n约有85%的顾客表示愿意为环境清洁产品支付较高的价格。\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n四、产品生态设计\n2.产品环境标志类型\n世界上第一个推行环境标志计划的国家是德国，德国的“蓝天使”环境\n标志。加拿大于1988年开始实行环境标志计划。在1989年开始实施的有北\n欧诸国（丹麦、瑞典、挪威、芬兰和冰岛）、日本和美国；奥地利、葡萄牙\n和法国等欧洲国家按计划于1991年实施。1992年有22个经济合作与发展组\n织（OECD）国家参与这一计划。20世纪90年代初进入广大亚洲国家[如中国\n（1994年）等]，同时扩大到了大洋洲国家。\n保保章 台湾 日本 中 Ecomark 印度 GreenCheice 律资 GreenLabel 新加块\n\n#### 美团 以色列 西蘭 香港\nGrenSal Enviroemt Choice Enviromatt Choice\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n四、产品生态设计\n环境标志计划在不同的国家设计和实施的过程中，出现了不同\n的类型，在ISO14024中将它们分为三类。\n（1）类型I即批准印记型\n这是大多数国家采用的类型，其特点是：①自愿参加；②以准\n则、标准为基础；③包含生命周期的考虑；④有第三方面认证。\n（2）类型工即自我声明型\n其特点在于：①可由制造商、进口商、批发商、零售商或任何\n从中获益的人对产品的环境性能做出自我声明；②这种自我声明可\n在产品上或者在产品的包装上以文字声明、图案、图表等形式来表\n示，也可表示在产品的广告上或者产品名册上；③无需第三方认证。\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n四、产品生态设计\n（3）类型Ⅲ即单项性能认证型\n这些单项性能有：可再循环性、可再\n循环的成分、可再循环的比例，节能、节\n水、减少挥发性有机化合物排放、可持续 环境\n的森林等。目前，美国少数私人认证机构 女\n开展这项工作。由于厂商对它的兴趣有所\n\n#### CHINA\n增加，这一类型的标准还有扩大的趋势。\n因此，在ISO14000系列标准中专门为此\n制定了ISO14025标准。\n与世界上大多数国家一样，我国实施\n的环境标志制度属于类型即批准印记型。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n四、产品生态设计\n3.实施产品环境标志制度的基本方法\n（1)确定授予环境标志的产品类别\n环境标志的产品类别由申请人提出，由主管机构审查确定。分类的\n原则是考虑同类产品应具有相似的使用目的、相当的使用功能并且相互\n间有直接竞争的关系。正确的产品分类对实施标志计划至关重要，不但\n要有充分的科学依据，还要兼顾消费者的利益。一般，优先类别应是针\n对环境危害较大而又有替代的可能、消费者感到重要、工业界乐于支持、\n市场容量大的部分产品。例如，德国产品共分若干个类型，它们是可回\n收利用型、低毒低害物质、低排放型、低噪声型、节水型、节能型、可\n\n#### 生物降解型及其他类型\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n四、产品生态设计\n(2)确定授予标志的标准和尺度\n\n#### 通过产品类别后，就要根据这\n\n#### 些产品生命周期各阶段对环境的影\n响，确定授予标准所应达到的要求。 保护 地球\n\n#### 确定标准的主要手段是所谓“从摇\n篮到坟墓”的产品生命周期分析。\n\n#### 确定标准时还应注意标准应该合理\n明确，并采取通过或不通过的方式，\n\n#### 使申请厂家一目了然，不会劳而无\n功。标准及尺度也要定期修改提高。\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n四、产品生态设计\n（3）制定标准图形\n\n#### 产品环境标志图形的设计既要简洁\n明快，又要含义丰富；既要显示民族特 环境\n色，又要容易为国外消费者所接受。下\n页为中国I型环境标志图。\n我国的1型环境标志图形于1993年\n发布。它由青山、绿水、太阳和10个 CHI\n环组成。其中心结构表示人类赖以生存\n的环境；外围的10个环紧密结合，环环\n相扣，表示公众参与，共同保护；10个\n环的“环”字与环境的“环”同字，寓\n意为“全民联合起来，共同保护我们赖\n以生存的环境”。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n四、产品生态设计\n4.环境标志通用原则\n①环境标志及声明必须是准确的、可验证的、具相关性的和非误\n导性的;\n②用于环境标志及声明的程序和要求的制定、采纳和应用不得以\n制造不必要的国际贸易壁垒为目的；\n③环境标志及声明必须以足够严密、科学的方法学为基础，该方\n法足够彻底、全面，从而能够支持所作的声明，并能获得准确和可再\n现的结果;\n④用来支持环境标志及声明的程序、方法学和准则的信息必须具\n有可得性，并可应所有相关方的要求予以提供；\n③环境标志及声明的制定必须考虑产品生命周期的所有相关因素；\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n四、产品生态设计\n环境标志及声明不得阻碍能够保持环境行为或具有改善环境表现潜\n力的革新;\n①任何与环境标志及声明有关的行政要求或信息需求都必须保持在符\n合适用准则和标准所需的限度；\n⑧环境标志及声明的制定过程应是开放的，有相关方参与，在此过程中\n应做出必要的努力以求得共识；\n@购买方和潜在的购买方必须能从使用环境标志或声明的一方获得与\n该环境标志或声明有关的产品和服务的环境因素信息。\n\n#### 绿色环保标志\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n四、产品生态设计\n5.中国的环境标志制度\n1994年5月17日由国家技术监督局授权国家环境保护局负责设\n立的环境标志产品认证委员会（CCCEL）正式在北京成立，这是代表\n国家对环境标志产品进行认证的唯一的第三方认证机构。我国产品\n环境标志的申请和授予程度比较严格。目前优先开展认证的六类产\n品如下：\n（1)国际履约类：保证我国如期履约，促进各行业CFCs替代，\n保证中国在国际上的声誉。1991年6月，我国签订《蒙特利尔议定\n书》，意味着2000年、2010年分两步替代CFCs制品。\n(2)可再生、回收类：其意义是节约资源、减少垃圾、降低污\n染。这类环境标志产品是各国环境标志产品认证的重点。\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n四、产品生态设计\n③）改善区域环境质量类：主要针对消耗性消费品，特别是使\n用数量巨大，对环境三种介质（水、气、土壤）造成的严重威胁的产\n品。其意义是以市场为导向，为改善区域环境质量提供多种途径。\n（4）改善居室环境质量类：其意义是保护消费者权益，改善居\n室环境质量。主要针对居室环境的两个方面：空气环境和噪声指标。\n（5）保护人体健康类：其意义是推动我国人民生活质量的提高，\n引导消费者逐步淘汰对人体有害的传统产品。\n（6）提高资源、能源利用率类：其意义是节能降耗，提高产品\n的资源、能源综合利用率。\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n四、产品生态设计\n6.中国环境标志国际合作与互认\n中国环境标志开展广泛国际合作，在与国际“生态标志”技术发\n展保持同步的同时，积极开展环境标志互认工作，得到国际社会的高\n度认可。\n在环境标志互认方面：中国环境标志已经并与德国蓝天使、北欧\n白天鹅、日本生态标签、韩国生态标志、澳大利亚环境选择、新西兰\n环境选择、泰国环境标志等国的环境标志机构签订了合作与互认协议。\n在共同标准制订方面：中国环境标志已经与德国蓝天使发布《再\n生鼓粉盒共同标准》，日本生态标签、韩国生态标志发布了《计算机\n共同标准》，目前这两项标准均进入了互认实施阶段。\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n四、产品生态设计\n六、生命周期评价\n1.生命周期评价的定义\n\n#### 生命周期评价（LCA）是对一\n\n#### 原料采集\n\n#### 个产品系统的生命周期中输入、输\n\n#### 回收/报废 原料加工\n出及其潜在环境影响的汇编和评价。\n\n#### 产品\n总体核心是：生命周期评价是 产品使用 生命周期 制造\n对贯穿产品生命周期全过程（即所谓\n\n#### 运输 组装\n从摇篮到坟墓）一从获取原材料、生\n\n#### 包装\n\n#### 产、使用直至最终处置一的环境因\n素及其潜在影响的研究。\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n四、产品生态设计\n2.生命周期评价步骤\nISO于1997年6月颁布了ISO14040标准，成为指导企业界进入\nISO14000环境管理体系的一个国际标准。该标准将生命周期评价分\n为互相联系的、不断重复进行的四个步骤：目的与范围确定、清单分\n析、影响评价和结果解释。\n（1）目标与范围的定义\n该阶段是对LCA研究的目标和范围进行界定，是LCA研究中的第\n一步，也是最关键的部分。目标定义主要说明进行LCA的原因和应用\n意图，范围界定则主要描述所研究产品系统的功能单位、系统边界\n数据分配程序、数据要求及原始数据质量要求等。目标与范围定义直\n接决定了LCA研究的深度和广度。鉴于LCA的重复性，可能需要对研\n究范围进行不断的调整和完善。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n四、产品生态设计\n（2）清单分析\n清单分析是对所研究系统中输入和输出数据建立清单的过程。\n清单分析主要包括数据的收集和计算，以此来量化产品系统中的相\n关输入和输出。首先是根据目标与范围定义阶段所确定的研究范围\n建立生命周期模型，做好数据收集准备。然后进行单元过程数据收\n集，并根据数据收集进行计算汇总得到产品生命周期的清单结果。\n（3）影响评价（核心；难度最大。评价方法和科学体系仍在发展和完\n善，尚没有一种广泛接受的统一方法）\n影响评价的目的是根据清单分析阶段的结果对产品生命周期的\n环境影响进行评价。这一过程将清单数据转化为具体的影响类型和\n指标参数，更便于认识产品生命周期的环境影响。此外，此阶段还\n为生命周期结果解释阶段提供必要的信息。\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n四、产品生态设计\n（4）结果解释\n结果解释是基于清单分析和影响评价的结果识别出产品生命周\n期中的重大问题，并对结果进行评估，包括完整性、敏感性和一致\n性检查，进而给出结论、局限和建议。\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n四、产品生态设计\n3.生命周期评价的应用领域\n应用领域 生命周期评价方法在其中所起的作用\n①通过“从摇篮到坟墓”的分析，识别对环境影响最大的工艺过程\n和产品寿命阶段。\n\n#### 产品系统的生态\n辨识与诊断 ②评估产品（包括新产品）的资源效益，即对能耗、物耗进行全面\n平衡，一方面降低能耗、物耗从而降低产品成本，另一方面，帮助\n设计人员尽可能采用利于环境的原材料和能源。\n产品环境影响 以环境影响最小化为目标，分析比较某一产品系统内的不同方案或\n评价与比较 者对替代产品（或工艺）进行比较。\n生态产品设计 直接将生命周期评价应用于新产品的开发与设计中。\n\n#### 与新产品开发\n再循环工艺设计从产品的设计阶段开始就考虑产品用后的拆卸和资源的回收利用。\n其他 政府和环境管理部门还可以借助生命周期评价进行立法、制定环境\n标准以及设立产品生态标志。\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n第三节污染预防环境管理模式的实施\n第三节 污染预防环境管理模式的实施\n\n#### 、环境规划的时空控制\n\n#### 环境绩效\n三、环境绩效审计\n四、清洁生产与清洁生产审计\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n一、环境规划的时空控制\n污染预防模式实施过程中的环境规划管理，主要是强调环境规划\n实施的动态控制管理，强调环境管理的计划职能，目的是使环境规划\n实施与管理相结合，使规划目标及其变化方向符合社会经济发展规律\n和生态规律，促进我国环境、经济、社会的可持续发展。\n环境规划实施的动态控制管理主要包括环境规划的空间控制、时\n间控制以及时空耦合的全过程控制。\n\n#### 坚决打好衫染防治圾坚战\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n一、环境规划的时空控制\n1.环境规划的空间控制\n环境规划实施的全过程是由一个集中控制机构来执行。在\n集中控制基础上，建立相对独立的几个二级机构，对环境规划\n的数量指标、质量指标进行评估和决策。各个相对独立的二级\n控制机构之间通过信息传递与反馈行为实现横向协调控制，环\n境规划的二级控制机构与总控制机构之间通过环境规划信息的\n传递与反馈实现纵向控制，纵向控制最后通过信息交叉反馈，\n实现环境规划实施的动态全过程控制管理。\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n一、环境规划的时空控制\n2.环境规划的时间控制\n环境规划的时间控制是指环境规划信息反馈时间和反馈\n回路控制。其一为闭路控制，指在规划实施管理中具有完整\n反馈回路的时间控制。管理者根据环境规划实施者反馈的情\n报信息，有效控制和改善规划实施过程；其二为规划过程中\n具有不完整反馈回路的半闭路时间控制。由于环境规划实施\n中大量随机因素干扰，用信息反馈适时调节控制；其三为开\n路控制，即环境规划实施管理，不具备反馈回路控制。在环\n境规划的时间控制中，一般采用闭路、半闭路和开路控制信\n息反馈实施协调控制管理。\n\n---\n\n<!-- page 83 -->\n\n![page 83](page_083.jpg)\n\n一、环境规划的时空控制\n3.时空偶合的全过程控制\n\n#### 这里针对环境规划实施\n\n#### 的空间和时间控制管理无法\n\n#### 沟通的情况下，在二者之间\n\n#### 架起一座信息桥梁，通过信\n\n#### 息反馈、资源共享等协调途\n\n#### 径，化解时空控制管理的冲\n\n#### 突，达到环境规划实施的动\n态控制管理。\n\n---\n\n<!-- page 84 -->\n\n![page 84](page_084.jpg)\n\n二、环境绩效\n二、环境绩效\n1.环境绩效和环境绩效评估\n环境绩效是指一个组织基于其环境方针、目标、指标，控制其\n环境因素所取得的可测量的环境管理体系成效。环境绩效表示环境\n保护的实际成绩和效果，它与“环境形势”、“环境状况”等词有\n接近之处，但也有区别，环境绩效主要是表示与工作努力程度和工\n作质量有关的实际环境后果。应该说，环境绩效是评定环境政策的\n最终标准。\n\n---\n\n<!-- page 85 -->\n\n![page 85](page_085.jpg)\n\n二、环境绩效\n\n#### 环境绩效评估是由独立的考核机构\n或考核人员，对被考核单位或项目的环境\n管理活动进行综合的、系统的审查、分析，\n并按照一定的标准评定环境管理活动的现\n状和潜力，对提高环境管理绩效提出建议，\n促进其改善环境管理、提高环境管理绩效\n的一种评估活动。\nISO14031环境绩效评估于1999年\n10月正式公告。TC207/SC4的工作小组\n为配合ISO14031环境绩效评估标准的公 KP\n告，也汇整了各国不同组织实施环境绩效\n评估的技术案例，制定了ISO/TR14032\n的环境绩效评估报告。\n\n---\n\n<!-- page 86 -->\n\n![page 86](page_086.jpg)\n\n二、环境绩效\n\n#### 环境绩效评估，是持续对组织环境\n绩效进行量测与评估的一种有系统的程\n序。对象则是针对组织的管理系统、操\n作系统，乃至于其周围的环境状况。\n\n#### 组织的环境管理绩效为环境绩效评\n估的工作重点，在考量成本效益下，可\n针对其重要的环境参数，建立持续监督\n的系统，并将评估结果与各利害相关者\n加以沟通。这也呼应了环境管理系统持\n续改善的要求与精神。\n\n---\n\n<!-- page 87 -->\n\n![page 87](page_087.jpg)\n\n二、环境绩效\n2、环境绩效评估目标、内容和方法\n（1）环境绩效评估目标\n环境绩效评估的目标包括根本目标、\n具体目标和分项目标三个层次。\n\n#### 根本目标为：改善环境管理，实现\n可持续发展。具体目标可以概括为：对 FOR\n\n#### 目标\n环境管理各步骤的绩效情况进行考核评\n价，找出影响环境管理绩效的消极因素， BROAOCAST\n提出建设性的考核意见，从而促使环境\n管理工作的高效进行。\n\n---\n\n<!-- page 88 -->\n\n![page 88](page_088.jpg)\n\n二、环境绩效\n根据具体内容的不同，进一步地可以将具体目标分解为四类\n分项目标：①评价环境法规政策的科学性和合理性，帮助法规政\n策部门制定更加科学合理的环境法规与制度；②评价环境管理机\n构的设置和工作效率，揭示其影响工作效率的消极因素，提出改\n进建议；③评价环境规划的科学性和合理性，有助于制定更加科\n学合理的环境规划；④评价环境投资项目的经济性、效率性和效\n果性，为改善环境投资提出建设性意见。\n\n---\n\n<!-- page 89 -->\n\n![page 89](page_089.jpg)\n\n三、环境绩效审计\n三、环境绩效审计\n1.政府环境政策绩效审计\n政府环境政策绩效审计主要是对政府制定的环境政策，包\n括环境经济政策和环境行政控制政策的效果进行评价。评价时\n只考虑政策本身的实施效果，不考虑执行中的影响因素。\n\n---\n\n<!-- page 90 -->\n\n![page 90](page_090.jpg)\n\n三、环境绩效审计\n三、环境绩效审计\n1.政府环境政策绩效审计\n政府环境政策绩效审计主要是对政府制定的环境政策，包\n括环境经济政策和环境行政控制政策的效果进行评价。评价时\n只考虑政策本身的实施效果，不考虑执行中的影响因素。\n\n---\n\n<!-- page 91 -->\n\n![page 91](page_091.jpg)\n\n三、环境绩效审计\n2.政府环境项目效益审计\n进行政府环境项目效益审计首先要了解项目的实施背景、目\n标、计划等内容。如果项目被分解为在不同地区、不同阶段实施，\n还要了解项目分解情况。\n在审计资源有限的情况下，应以是否实现项目目标为重点。\n由于政府环境项目的目标很广泛，财务资料不能满足全面效益成\n本分析的需要，审计人员应灵活使用环境估值方法进行计算。\n\n---\n\n<!-- page 92 -->\n\n![page 92](page_092.jpg)\n\n三、环境绩效审计\n\n#### 有些项目还可以使用对比的方\n\n#### 法，比较项目实施前后的环境质量\n和经济收益。在缺乏被审项目环境\n\n#### 价值数据时，可以引用其他项目的\n\n#### 数值来估算，这种方法被称为“效\n益转移法”。引用的数值可以从环\n\n#### 境管理部门、科研部门，以及国外\n的相关项目取得。不过目前可比的\n数值很少。\n\n#### 由于环境项目的综合效益不可\n\n#### 能在短期内完全体现，应对其实施\n跟踪审计。\n\n---\n\n<!-- page 93 -->\n\n![page 93](page_093.jpg)\n\n三、环境绩效审计\n3.企业环境绩效审计\n目前已经有许多企业公布其环境绩效报告。因为：\n第一，自愿参加欧共体《环境审计制度》，而负有公布其\n环境绩效的义务。\n第二，出于公共经济责任关系、市场竞争和公众利益，而\n自愿公布其环境绩效。\n从长远来看，法律和法规规定将会成为公布环境绩效报告\n的主要原因。\n\n---\n\n<!-- page 94 -->\n\n![page 94](page_094.jpg)\n\n三、环境绩效审计\n环境绩效报告包括以下内容：\n①与组织活动相关的环境法律和法规要求；\n②与组织活动相关的环境因素和对环境的影响；\n③组织的环境管理系统、环境方针和政策；\n④对环境问题计量和披露采用的会计政策；\n③环境目标和指标的定量数据，如散发到空气、土壤和水中\n的废弃物、噪声、废物处理、能源消耗数量、环境事故、环境成\n本（投资和罚金等）和环境收益（能源的节约）等。\n\n---\n\n<!-- page 95 -->\n\n![page 95](page_095.jpg)\n\n三、环境绩效审计\n\n#### 现时环境绩效审计准则虽然\n有很多组织在积极探讨，如国际、\n\n#### 国际维持发展协会商会、世界工业\n\n#### 环境委员会和欧共体环境规划委员\n\n#### 会等，但至今还没有一套公认的准\n则。\n\n#### 由于环境绩效报告通常要披露\n\n#### 有害物质的排放量，需要由专门技\n\n#### 术专家进行符合性测试和实质性测\n\n#### 试，一般要采取多学科联合审计的\n方式。\n\n---\n\n<!-- page 96 -->\n\n![page 96](page_096.jpg)\n\n三、环境绩效审计\n4.我国实施政府环境绩效评估应遵循的原则\n(1)整体性与区域性相结合的原则\n实行政府环境绩效评估，建立科学的评估体系是关键。由于我国地域\n辽阔，地区差别很大，各地资源凛赋和其他条件各不相同，不同层级、不\n同地区的政府绩效指标的设计也要体现其特点。要根据实际情况，以科学\n发展观为指导，建立符合地方各级政府实际的绩效评估指标体系。\n(2)软硬结合原则\n“硬指标”指的是可以量化的指标，“软指标”指难以具体量化的公\n众的满意度。硬指标采取以统计部门上报数据为主要依据的定量测算和评\n估为主，软指标的评估可以通过中介组织的问卷调查等形式获取基本情况\n来进行。\n\n---\n\n<!-- page 97 -->\n\n![page 97](page_097.jpg)\n\n三、环境绩效审计\n(3)公开透明原则\n将评估纳入政府日常工作机制，规范工作标准，加强数据\n整合利用，不单独就评估而评估。以指导为主，监督为辅。比\n如采取典型推广、抽样等办法，而不做大范围普查；委托非政\n府机构评估，充分利用外部评估，有些问题可以只公开数据，\n任由外部评估。\n环境绩效评估的结果只是决策需要的数据，不能与公务员\n个人利益直接挂钩。否则，公务员行为就容易以满足评估数据\n为目的，难以避免隐瞒事故、夸大成效的情况。规范评估程序，\n实行评估回避制度。\n\n---\n\n<!-- page 98 -->\n\n![page 98](page_098.jpg)\n\n三、环境绩效审计\n（4)公众参与原则\n实行内部评估与外部评估相结合，实行评估主体的多元化\n政府作为最大的公共部门，应接受多种评估主体的评价。形成多\n层次政府绩效评估体系。评估的方向也应该是多向的，包括：\n政府部门的自我评价；②自上而下的评估（组织部门与环保部门参\n加)；③自下而上的评估(公众参与)。\n同时深入开展公民评议活动，将管理和服务对象纳入评估体\n系，为科学的环境绩效评估创造环境和条件。\n\n---\n\n<!-- page 99 -->\n\n![page 99](page_099.jpg)\n\n四、清洁生产与清洁生产审计\n四、清洁生产与清洁生产审计\n1.清洁生产\n(1)清洁生产的内涵\n清洁生产是在生产过程、产品寿命和服务领域持续地应用整体预\n防的环境保护战略，增加生态效率，减少对人类和环境的危害。清洁\n生产是一种新的创造性思想，该思想将整体预防的环境战略持续应用\n于生产过程、产品和服务中，以增加生态效率和减少人类及环境的风\n险。\n一对生产过程，节约资源和能源，淘汰有毒有害的原材料和落后\n的工艺及设备，减少所有废弃物的数量、毒性和污染；\n一对产品，要减少产品全生命周期对人类和环境的不利影响；\n一对服务，要将环境因素纳入服务设计和实践中\n\n---\n\n<!-- page 100 -->\n\n![page 100](page_100.jpg)\n\n四、清洁生产与清洁生产审计\n清洁生产通过应用专门技术，改进工艺、设备和改变管理态度\n来实现。清洁生产的本质：①“预防为主”的方针；②环境效益与\n经济效益的高度统一；③持续改进：相对的、不断的过程；④系统\n性：防止污染物转移。\n清洁生产实现途：产品替代(毒性、污染)；能源、材料替代(毒\n性、污染)；工艺、设备替代(消耗、效率、污染)； (最大化)提升利\n用限度(能源、原材料、厂内物料循环)；强化管理，减少费(跑、冒、\n滴、漏、物料流失)；控制排放(净化处理、综合利、变废为宝)。\n\n---\n\n<!-- page 101 -->\n\n![page 101](page_101.jpg)\n\n四、清洁生产与清洁生产审计\n(2)清洁生产的理论基础\n清洁生产涵盖有深厚的理论基础，\n其实质是最优化理论。在生产过程中，\n物料按平衡原理相互转换，生产过程\n中产生的废弃物越多，则物料消耗就\n越大，废弃物是由物料转化而来的。\n清洁生产实际上是如何满足特定条件\n\n#### 清洁生产\n下物料消耗最少，产品产出率最高。\n这一问题的理论基础是数学上的最优\n化理论，即废弃物最少量化可表示为\n目标函数，求解在各种约束条件下的\n最优解的问题。\n\n---\n\n<!-- page 102 -->\n\n![page 102](page_102.jpg)\n\n四、清洁生产与清洁生产审计\n(3)清洁生产的内容\n清洁的能源：常规能源的清洁利用；可再生能源的利用；新能\n源的开发；各种节能技术等。\n清洁的生产过程：不用、少用有毒的原料和辅助材料；无废、\n少废的工艺；无污染的高效设备；无毒、低毒的中间产品；减少生\n产过程中的各种危险因素；节约资源，少用昂贵和稀有资源；物料\n的再循环利用；利用二次资源作原材料；完善的管理等。\n清洁的产品：在贮运、使用中和使用后无危害人体健康和生态\n环境的产品；合理使用其功能和寿命期；合理包装；易于回收、复\n用和再生；易降解、易处置等。\n清洁的服务：在一切服务中都要贯彻清洁生产的思想和要求\n\n---\n\n<!-- page 103 -->\n\n![page 103](page_103.jpg)\n\n四、清洁生产与清洁生产审计\n2.清洁生产审计\n清洁生产审计，是对组织现存的和计划进行的生产、服务以及相关\n活动中，污染来源、废物产生原因以及整体解决方案，进行持续的、系\n统的、规范的分析、评估、策划、实施、保持和改进的过程(程序)。\n清洁生产审计是组织进行清洁生产的重要前提，也是其关键和核心。\n旨在不断寻求、制定、实施能够低费高效地减少能源、水、原材料的使\n用，消除和/或减少产品、过程中有毒物质的使用，减少各种废弃物排放\n及其毒性，提高资源利用效率的方案，从而持续改进组织的环境。\n（1)清洁生产审计的目的和特点\n通过清洁生产审计判定生产过程中不合理的废物流和物、能耗，分\n析其原因，提出削减方案并组织实施，从而减少废弃物的产生和排放\n达到实现本轮清洁生产目标。\n\n---\n\n<!-- page 104 -->\n\n![page 104](page_104.jpg)\n\n四、清洁生产与清洁生产审计\n清洁生产审计具有以下特点：\n①鲜明的目的性。它的目的是消除、减少废弃物的产生，它特别强调节\n能、减耗、减污的一致；\n②完整的系统性。以生产过程为主体，考虑到影响废弃物产生的各个方\n面设计一套发现问题、分析问题、解决问题、持续实施的完整体系；\n③突出预防性。针对“末端治理”，特别强调要在生产全过程和产品生\n命周期及服务范畴中做到预防污染。这一思想贯穿于审计的全过程；\n④符合经济性。生产全过程各个环节都从预防出发减少废弃物的产生，\n提高生产效率，降低成本，多出产品，少用资源、能源，减少末端治理\n的投资和运行费用；\n③强调持续性。无论是审计重点选择，还是方案滚动实施均体现了从点\n到面、逐步改进的持续性原则；\n\n---\n\n<!-- page 105 -->\n\n![page 105](page_105.jpg)\n\n四、清洁生产与清洁生产审计\n注重可操作性。每一个步骤均能与企业的实际情况相结合。\n在审计程序上是规范的，在方案实施上是灵活的，当企业的\n经济等条件有限时，可先实施无、低费方案，积累资金创造\n条件，逐步实施中、高费方案。\n\n#### GREEN\n\n---\n\n<!-- page 106 -->\n\n![page 106](page_106.jpg)\n\n\n#### 作业\n1.何谓末端控制？其主要特征是什么？\n2.我国在计划经济体制下形成的以污染物“末端处理\n为主要特征的行政控制手段与发达国家的“命令-控制”\n措施有无显著区别，若有显著区别，具体表现在哪些方面？\n3.试客观评价末端控制传统环境管理模式实践的作用。\n4.何谓污染预防，它与末端控制的根本区别是什么？\n5.实施污染预防环境管理模式的主要途径有哪些？\n6.污染预防环境管理模式的基本内容有哪些？\n7.污染预防环境管理模式实施中可能存在的困难有哪些？\n8.何谓目标管理？并简述其基本思想、特点及实施步骤。\n"}, {"id": "pages", "group": "原始课件 · 页图", "title": "课件原文 · 逐页（真实截图）", "md": "# 原始课件 · 页图（真实 PDF 页面）\n\n> 下列为雨课堂课件原始页面渲染；大讲已均匀采样关键页。点击讲次标题展开，单击图片可看大图。\n\n<details class=\"pdf-lesson\" open>\n<summary>001-第十章 环境监管-第十章 环境监管 · 60 页<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-planning/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L01_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L01_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L01_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L01_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L01_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L01_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planning/L01_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-planning/L01_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-planni
