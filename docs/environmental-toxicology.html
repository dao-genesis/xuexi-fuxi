<script id="course-data" type="application/json">{"slug": "environmental-toxicology", "title": "环境毒理学", "folder": "环境毒理学", "meta": {"teacher": "森巴提·叶尔肯", "term": "2026春", "pdf": 15, "chapters": 7}, "defaultSection": "chap-1", "sections": [{"id": "chap-1", "group": "章节精讲", "title": "第1章 · 绪论与基本概念", "md": "# 第1章 · 绪论与基本概念\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点\n\n#### 一、核心概念（名词解释）\n\n- [x] **环境毒理学（environmental toxicology）**：研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。\n- [x] **环境污染物**：由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。\n- [x] **一次污染物（原生污染物）**：由污染源直接排入环境，其物理和化学性状未发生变化的污染物。\n- [x] **二次污染物**：一次污染物之间或与正常大气组分发生化学反应（含光化学反应）而产生的新污染物，常比一次污染物危害更严重。\n- [x] **优先污染物（Priority Pollutant）**：在众多污染物中筛选出的潜在危险大的作为优先研究和控制对象的污染物，亦称优先控制污染物。针对有毒有机化学污染物、生物难降解性物质、具有生物积累性、三致性（致畸、致癌、致突变）的污染物。\n- [x] **外源化学物（xenobiotic）**：不是人体组成成分，也非人体所需营养物质，但可通过一定途径与人体接触并从环境中进入人体，产生一定生物学作用的物质。\n- [x] **新型污染物**：在环境中出现时间相对较短，或过去未被广泛关注但逐渐被认识到对生态环境和人体健康具有潜在危害的污染物。特点：持久性、生物累积性、潜在危害大、来源广泛。包括持久性有机污染物、内分泌干扰物、抗生素、微型塑料等。\n- [x] **环境毒理效应/环境健康毒理效应**：环境污染物对人类健康的效应，属于\"健康毒理效应\"的范畴。\n\n#### 二、关键公式 / 模型\n\n- **Paracelsus 剂量定律**：\"所有物质都是毒物，没有物质不是毒物，唯一的区别是它们的剂量\"——抛开剂量谈毒性都是耍流氓。这是毒理学最根本的原理。\n- **环境污染分类模型**：按污染物性质→化学污染、物理污染、生物污染；按污染物形态→废气、废水、固体废弃物、噪声、辐射污染。\n- **环境毒理学研究方法体系**：体内试验（in vivo）+ 体外试验（in vitro）+ 流行病学调查，三个层次互补。\n\n#### 三、重要案例 / 实验 / 例题\n\n- **八大公害事件**（必考）：\n  1. 1930 马斯河谷事件（SO₂/氟化物/粉尘，死亡60人）\n  2. 1948 多诺拉城事件（SO₂/金属粉尘，死亡17人）\n  3. 1956 伦敦烟雾事件（SO₂/烟尘，4000余人死亡）\n  4. 1943 洛杉矶光化学烟雾事件（光化学烟尘，半数人患红眼病）\n  5. 1955 富山县痛痛病事件（镉，患病258人死128人）\n  6. 1953 水俣病/新泻事件（甲基汞，患病2000余人死352人）\n  7. 1968 米糠油事件（多氯联苯，中毒1684人死30余人）\n  8. 1960 四日市哮喘事件（SO₂/烟尘/石油化工废气，患病800余人死36人）\n- **毒理学发展史关键人物**：Paracelsus（提出毒物是化学物+剂量定律）、Orifila（现代毒理学奠基人）、Bernard（开创动物受控实验）。\n- **中国水中优先控制污染物黑名单**：卤代烃、苯系物、氯代苯类、多氯联苯类、酚类、硝基苯类、苯胺类、多环芳烃、酞酸酯类、农药、丙烯腈、亚硝胺类、氰化物、重金属及其化合物。\n\n#### 四、高频考点（速记）\n\n1. 环境毒理学定义三要素：**环境污染物**（特别是化学污染物）→ **人类健康** → **毒性作用及机理**\n2. 环境化学污染物是**种类最多、污染最严重、分布最广、危害最严重**的，是环境毒理学**主要研究对象**，简称环境化学物\n3. 污染源四类：**工业、农业、交通运输、生活**\n4. 环境污染四大特点：**影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难**\n5. 环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n6. 研究方法：**体内试验**（整体动物实验：急性/亚慢性/慢性毒性）+ **体外试验**（器官/组织/细胞/亚细胞/分子水平）+ **流行病学调查**\n7. 环境毒理学应用三领域：**环境监测**（现场生物监测+环境样品生物测试）、**环境风险评价**（建设项目+化学物品）、**环境健康危险度评价**\n8. 发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境毒理学的研究对象是什么？ 答：B.环境污染物（包括物理性、化学性、生物性及新型污染物，以环境化学物为主）\n- [x] 题：环境污染的特点？ 答：ABCD全选——影响范围大、作用时间长、浓度低/情况复杂、污染容易治理难\n- [x] 题：一次污染物与二次污染物的区别？ 答：一次污染物直接排放、性状未变；二次污染物是一次污染物经化学反应（含光化学反应）产生的新污染物，危害通常更严重\n- [x] 题：为什么环境化学污染物是环境毒理学的主要研究对象？ 答：种类最多、污染最严重、分布最广、对人类健康危害最严重\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论，奠定基本概念框架\n- 启后章：第2章\"污染物在环境中的迁移和转化\"深入讨论污染物在环境中的行为；第3-4章讨论毒作用及影响因素；第5章讨论实验方法；第6-7章讨论安全评价与致癌物\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第1章<br/>绪论与基本概念))\n    核心概念\n      环境毒理学（environmental toxicology）\n      环境污染物\n      一次污染物（原生污染物）\n      二次污染物\n      优先污染物（Priority Pollutant）\n      外源化学物（xenobiotic）\n      新型污染物\n      环境毒理效应/环境健康毒理效应\n    关键公式 / 模型\n      Paracelsus 剂量定律\n      环境污染分类模型\n      环境毒理学研究方法体系\n    高频考点\n      环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康…\n      环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环…\n      污染源四类：工业、农业、交通运输、生活\n      环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、…\n      环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③…\n      研究方法：体内试验（整体动物实验：急性/亚慢性/慢性毒性）+ 体外…\n      环境毒理学应用三领域：环境监测（现场生物监测+环境样品生物测试）、…\n      发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（…\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L22_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p014.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p014.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p021.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p021.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p027.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p027.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p034.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 原理示意 · 环境毒理学研究方法体系\n\n```mermaid\nflowchart LR\n    A[\"环境污染物<br/>(以化学污染物为主)\"] --> B[\"体内试验 in vivo<br/>整体动物 急性/亚慢性/慢性\"]\n    A --> C[\"体外试验 in vitro<br/>器官/组织/细胞/分子\"]\n    A --> D[\"流行病学调查<br/>人群暴露与效应\"]\n    B --> E[\"毒性作用及其机理\"]\n    C --> E\n    D --> E\n```\n\n#### 例题 1-1（名词解释）\n**题**：解释\"环境毒理学\"与\"外源化学物\"。\n**参考答案**：\n- **环境毒理学（environmental toxicology）**：研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学，也称\"环境健康毒理学\"。\n- **外源化学物（xenobiotic）**：不是人体组成成分，也非人体所需营养物质，但可通过一定途径与人体接触并从环境中进入人体、产生一定生物学作用的物质。\n\n#### 例题 1-2（简答）\n**题**：一次污染物与二次污染物有何区别？\n**参考答案**：\n- **一次污染物（原生污染物）**：由污染源直接排入环境、其物理和化学性状未发生变化的污染物。\n- **二次污染物**：一次污染物之间或与正常大气组分发生化学反应（含光化学反应）而产生的新污染物，常比一次污染物危害更严重。\n\n#### 例题 1-3（简答）\n**题**：为什么说环境化学污染物是环境毒理学的主要研究对象？\n**参考答案**：环境化学污染物**种类最多、污染最严重、分布最广、对人类健康危害最严重**，故为环境毒理学的主要研究对象，简称环境化学物。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 环境毒理学（environmental toxicology）？\n\n<details><summary>参考答案<\/summary>\n\n研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。\n\n<\/details>\n\n**Q2（名词解释）** 环境污染物？\n\n<details><summary>参考答案<\/summary>\n\n由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。\n\n<\/details>\n\n**Q3（名词解释）** 一次污染物（原生污染物）？\n\n<details><summary>参考答案<\/summary>\n\n由污染源直接排入环境，其物理和化学性状未发生变化的污染物。\n\n<\/details>\n\n**Q4（名词解释）** 二次污染物？\n\n<details><summary>参考答案<\/summary>\n\n一次污染物之间或与正常大气组分发生化学反应（含光化学反应）而产生的新污染物，常比一次污染物危害更严重。\n\n<\/details>\n\n**Q5（名词解释）** 优先污染物（Priority Pollutant）？\n\n<details><summary>参考答案<\/summary>\n\n在众多污染物中筛选出的潜在危险大的作为优先研究和控制对象的污染物，亦称优先控制污染物。针对有毒有机化学污染物、生物难降解性物质、具有生物积累性、三致性（致畸、致癌、致突变）的污染物。\n\n<\/details>\n\n**Q6（名词解释）** 外源化学物（xenobiotic）？\n\n<details><summary>参考答案<\/summary>\n\n不是人体组成成分，也非人体所需营养物质，但可通过一定途径与人体接触并从环境中进入人体，产生一定生物学作用的物质。\n\n<\/details>\n\n**Q7（名词解释）** 新型污染物？\n\n<details><summary>参考答案<\/summary>\n\n在环境中出现时间相对较短，或过去未被广泛关注但逐渐被认识到对生态环境和人体健康具有潜在危害的污染物。特点：持久性、生物累积性、潜在危害大、来源广泛。包括持久性有机污染物、内分泌干扰物、抗生素、微型塑料等。\n\n<\/details>\n\n**Q8（名词解释）** 环境毒理效应/环境健康毒理效应？\n\n<details><summary>参考答案<\/summary>\n\n环境污染物对人类健康的效应，属于\"健康毒理效应\"的范畴。\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康 → 毒性作用及机理\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康 → 毒性作用及机理\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环境毒理学主要研究对象，简称环境化学物\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环境毒理学主要研究对象，简称环境化学物\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：污染源四类：工业、农业、交通运输、生活\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：污染源四类：工业、农业、交通运输、生活\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：研究方法：体内试验（整体动物实验：急性/亚慢性/慢性毒性）+ 体外试验（器官/组织/细胞/亚细胞/分子水平）+ 流行病学调查\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：研究方法：体内试验（整体动物实验：急性/亚慢性/慢性毒性）+ 体外试验（器官/组织/细胞/亚细胞/分子水平）+ 流行病学调查\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：环境毒理学应用三领域：环境监测（现场生物监测+环境样品生物测试）、环境风险评价（建设项目+化学物品）、环境健康危险度评价\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：环境毒理学应用三领域：环境监测（现场生物监测+环境样品生物测试）、环境风险评价（建设项目+化学物品）、环境健康危险度评价\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- 题：环境毒理学的研究对象是什么？ 答：B.环境污染物（包括物理性、化学性、生物性及新型污染物，以环境化学物为主）\n- 题：环境污染的特点？ 答：ABCD全选——影响范围大、作用时间长、浓度低/情况复杂、污染容易治理难\n- 题：一次污染物与二次污染物的区别？ 答：一次污染物直接排放、性状未变；二次污染物是一次污染物经化学反应（含光化学反应）产生的新污染物，危害通常更严重\n- 题：为什么环境化学污染物是环境毒理学的主要研究对象？ 答：种类最多、污染最严重、分布最广、对人类健康危害最严重\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。\n  - <details><summary>答案<\/summary> 环境毒理学（environmental toxicology） <\/details>\n- ____：由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。\n  - <details><summary>答案<\/summary> 环境污染物 <\/details>\n- ____：由污染源直接排入环境，其物理和化学性状未发生变化的污染物。\n  - <details><summary>答案<\/summary> 一次污染物（原生污染物） <\/details>\n- ____：一次污染物之间或与正常大气组分发生化学反应（含光化学反应）而产生的新污染物，常比一次污染物危害更严重。\n  - <details><summary>答案<\/summary> 二次污染物 <\/details>\n- ____：在众多污染物中筛选出的潜在危险大的作为优先研究和控制对象的污染物，亦称优先控制污染物。针对有毒有机化学污染物、生物难降解性物质、具有生物积累性、三致性（致畸、致癌、致突变）的污染物。\n  - <details><summary>答案<\/summary> 优先污染物（Priority Pollutant） <\/details>\n- ____：不是人体组成成分，也非人体所需营养物质，但可通过一定途径与人体接触并从环境中进入人体，产生一定生物学作用的物质。\n  - <details><summary>答案<\/summary> 外源化学物（xenobiotic） <\/details>\n- ____：在环境中出现时间相对较短，或过去未被广泛关注但逐渐被认识到对生态环境和人体健康具有潜在危害的污染物。特点：持久性、生物累积性、潜在危害大、来源广泛。包括持久性有机污染物、内分泌干扰物、抗生素、微型塑料等。\n  - <details><summary>答案<\/summary> 新型污染物 <\/details>\n- ____：环境污染物对人类健康的效应，属于\"健康毒理效应\"的范畴。\n  - <details><summary>答案<\/summary> 环境毒理效应/环境健康毒理效应 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 40 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L22_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/p /environmental-toxicology/L22_p033.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p033.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p034.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p035.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p036.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p036.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p037.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p037.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p038.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p038.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p039.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p039.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L22_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L22_p040.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-2", "group": "章节精讲", "title": "第2章 · 污染物在环境中的迁移和转化", "md": "# 第2章 · 污染物在环境中的迁移和转化\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点\n\n#### 一、核心概念（名词解释）\n\n- [x] **污染物迁移**：污染物在环境中发生的空间位置相对改变的过程\n- [x] **污染物转化**：污染物在环境中通过物理、化学或生物学作用改变形态或转变为另一种物质的过程\n- [x] **机械性迁移**：通过气（扩散+气流搬运）、水、重力等物理作用使污染物空间位移\n- [x] **物理-化学性迁移**：通过风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原等物化作用实现迁移\n- [x] **生物性迁移**：污染物通过生物体吸附、吸收、代谢或死亡等过程发生的迁移，表现为生物浓缩、生物积累、生物放大\n- [x] **生物浓缩/生物富集（bioconcentration）**：生物体内污染物浓度超出环境中浓度的现象\n- [x] **生物积累（bioaccumulation）**：同一生物随生长发育，浓缩系数不断增大\n- [x] **生物放大（biomagnification）**：同一食物链上，污染物浓度随营养级提高而逐步增大\n- [x] **逆温现象**：对流层中上层暖下层冷，大气稳定度高，对流弱，污染物难扩散（秋冬北方雾霾成因之一）\n- [x] **干沉降与湿沉降**：大气颗粒物消除过程，按是否需降水冲刷分为干沉降和湿沉降\n\n#### 二、关键公式 / 模型\n\n- **BCF（生物富集系数）** = 生物体内浓度(mg/kg) / 环境中浓度(mg/kg)\n- **BAF（生物积累系数）** = 发育后阶段体内浓度 / 发育前阶段体内浓度\n- **BMF（生物放大系数）** = 较高营养级浓度 / 较低营养级浓度\n- **迁移三类型**：机械性 → 物理-化学性 → 生物性（递进）\n- **转化三类型**：物理转化 → 化学转化 → 生物转化\n\n#### 三、重要案例 / 实验 / 例题\n\n- **汞的迁移转化**：Hg进入环境→水体大气扩散→形态变化→Hg⁺/甲基汞/二甲基汞（甲基汞致水俣病）\n- **DDT生物放大**：水中0.000003ppm→浮游生物0.04→小鱼0.5→大鱼2→食鱼鸟25ppm，放大一千万倍\n- **洛杉矶光化学烟雾**：NOx+碳氢化物→光化学烟雾（二次污染物典型）\n- **酸雨形成**：SO₂→氧化→SO₃→水→H₂SO₄/硫酸盐→酸雨酸雾\n\n#### 四、高频考点（速记）\n\n1. 迁移三类型：**机械性**（气/水/重力）、**物理-化学性**（6种作用）、**生物性**（浓缩/积累/放大）\n2. 气的机械性迁移三扩散：**风力、气流、湍流**\n3. 物理-化学性迁移六作用：**风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原**\n4. 逆温：**下冷上暖**→稳定度高→对流弱→**难扩散**\n5. 生物浓缩vs积累vs放大：**浓缩**（体内>环境，同一时间）、**积累**（同一生物随时间增大）、**放大**（食物链随营养级增大）\n6. 转化三类型：**物理**（蒸发/渗透/凝聚/吸附/放射性蜕变）、**化学**（水解/氧化还原/络合/光化学）、**生物**（微生物/植物/动物降解）\n7. 大气化学转化核心：**光化学氧化**（NOx+烃→光化学烟雾）和**催化氧化**（SO₂→SO₃→酸雨）\n8. 微生物降解农药方式：①农药作唯一碳源/能源/氮源 ②共代谢作用；途径：脱卤、脱烃、水解、氧化、还原、环裂解、缩合\n\n#### 五、思考题 / 自测\n\n- [x] 题：污染物迁移方式包括？ 答：ABC——机械性、物理-化学性、生物性（无\"随机迁移\"）\n- [x] 题：气的机械性迁移=扩散+气流搬运？ 答：A.✓\n- [x] 题：逆温发生后大气稳定度低？ 答：B.×（逆温时稳定度**高**，对流弱）\n- [x] 题：无机化合物常见迁移方式？ 答：ABC——吸附-解吸、氧化-还原、络合和螯合（生化分解属有机）\n- [x] 题：属于二次污染物的是？ 答：C.光化学烟雾（NOx、SO₂、CO均为一次污染物）\n\n#### 六、与前后章之关联\n\n- 承前章：第1章定义了污染物基本概念，本章深入讨论其在环境中的行为\n- 启后章：第3章讨论污染物进入生物体内的毒作用机制；第4章讨论毒作用影响因素；迁移转化是毒作用的前提\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第2章<br/>污染物在环境中的迁移和转化))\n    核心概念\n      污染物迁移\n      污染物转化\n      机械性迁移\n      物理-化学性迁移\n      生物性迁移\n      生物浓缩/生物富集（bioconcentration）\n      生物积累（bioaccumulation）\n      生物放大（biomagnification）\n      逆温现象\n      干沉降与湿沉降\n    关键公式 / 模型\n      BCF（生物富集系数）\n      BAF（生物积累系数）\n      BMF（生物放大系数）\n      迁移三类型\n      转化三类型\n    高频考点\n      迁移三类型：机械性（气/水/重力）、物理-化学性（6种作用）、生物…\n      气的机械性迁移三扩散：风力、气流、湍流\n 例题 2-2（计算 · 生物富集系数 BCF）\n**题**：某有机污染物在水中浓度 $C_w=0.5\\ \\mathrm{\\mu g/L}$，鱼体内浓度 $C_b=2500\\ \\mathrm{\\mu g/kg}$。求生物富集系数 BCF（设 $1\\ \\mathrm{L}$ 水 $\\approx 1\\ \\mathrm{kg}$）。\n**解**：$BCF=\\dfrac{C_b}{C_w}=\\dfrac{2500}{0.5}=5000$。\n\n$$\\boxed{BCF=5000\\ (\\text{属高富集物质，}BCF>1000)}$$\n> 提示：BCF 越大，沿食物链**生物放大**风险越高，脂溶性强、难降解物（如 DDT、PCBs）尤甚。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 污染物迁移？\n\n<details><summary>参考答案<\/summary>\n\n污染物在环境中发生的空间位置相对改变的过程\n\n<\/details>\n\n**Q2（名词解释）** 污染物转化？\n\n<details><summary>参考答案<\/summary>\n\n污染物在环境中通过物理、化学或生物学作用改变形态或转变为另一种物质的过程\n\n<\/details>\n\n**Q3（名词解释）** 机械性迁移？\n\n<details><summary>参考答案<\/summary>\n\n通过气（扩散+气流搬运）、水、重力等物理作用使污染物空间位移\n\n<\/details>\n\n**Q4（名词解释）** 物理-化学性迁移？\n\n<details><summary>参考答案<\/summary>\n\n通过风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原等物化作用实现迁移\n\n<\/details>\n\n**Q5（名词解释）** 生物性迁移？\n\n<details><summary>参考答案<\/summary>\n\n污染物通过生物体吸附、吸收、代谢或死亡等过程发生的迁移，表现为生物浓缩、生物积累、生物放大\n\n<\/details>\n\n**Q6（名词解释）** 生物浓缩/生物富集（bioconcentration）？\n\n<details><summary>参考答案<\/summary>\n\n生物体内污染物浓度超出环境中浓度的现象\n\n<\/details>\n\n**Q7（名词解释）** 生物积累（bioaccumulation）？\n\n<details><summary>参考答案<\/summary>\n\n同一生物随生长发育，浓缩系数不断增大\n\n<\/details>\n\n**Q8（名词解释）** 生物放大（biomagnification）？\n\n<details><summary>参考答案<\/summary>\n\n同一食物链上，污染物浓度随营养级提高而逐步增大\n\n<\/details>\n\n**Q9（名词解释）** 逆温现象？\n\n<details><summary>参考答案<\/summary>\n\n对流层中上层暖下层冷，大气稳定度高，对流弱，污染物难扩散（秋冬北方雾霾成因之一）\n\n<\/details>\n\n**Q10（名词解释）** 干沉降与湿沉降？\n\n<details><summary>参考答案<\/summary>\n\n大气颗粒物消除过程，按是否需降水冲刷分为干沉降和湿沉降\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：迁移三类型：机械性（气/水/重力）、物理-化学性（6种作用）、生物性（浓缩/积累/放大）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：迁移三类型：机械性（气/水/重力）、物理-化学性（6种作用）、生物性（浓缩/积累/放大）\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：气的机械性迁移三扩散：风力、气流、湍流\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：气的机械性迁移三扩散：风力、气流、湍流\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：物理-化学性迁移六作用：风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：物理-化学性迁移六作用：风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：逆温：下冷上暖→稳定度高→对流弱→难扩散\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：逆温：下冷上暖→稳定度高→对流弱→难扩散\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：生物浓缩vs积累vs放大：浓缩（体内>环境，同一时间）、积累（同一生物随时间增大）、放大（食物链随营养级增大）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生物浓缩vs积累vs放大：浓缩（体内>环境，同一时间）、积累（同一生物随时间增大）、放大（食物链随营养级增大）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：转化三类型：物理（蒸发/渗透/凝聚/吸附/放射性蜕变）、化学（水解/氧化还原/络合/光化学）、生物（微生物/植物/动物降解）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：转化三类型：物理（蒸发/渗透/凝聚/吸附/放射性蜕变）、化学（水解/氧化还原/络合/光化学）、生物（微生物/植物/动物降解）\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：大气化学转化核心：光化学氧化（NOx+烃→光化学烟雾）和催化氧化（SO₂→SO₃→酸雨）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：大气化学转化核心：光化学氧化（NOx+烃→光化学烟雾）和催化氧化（SO₂→SO₃→酸雨）\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：微生物降解农药方式：①农药作唯一碳源/能源/氮源 ②共代谢作用；途径：脱卤、脱烃、水解、氧化、还原、环裂解、缩合\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：微生物降解农药方式：①农药作唯一碳源/能源/氮源 ②共代谢作用；途径：脱卤、脱烃、水解、氧化、还原、环裂解、缩合\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- 题：污染物迁移方式包括？ 答：ABC——机械性、物理-化学性、生物性（无\"随机迁移\"）\n- 题：气的机械性迁移=扩散+气流搬运？ 答：A.✓\n- 题：逆温发生后大气稳定度低？ 答：B.×（逆温时稳定度**高**，对流弱）\n- 题：无机化合物常见迁移方式？ 答：ABC——吸附-解吸、氧化-还原、络合和螯合（生化分解属有机）\n- 题：属于二次污染物的是？ 答：C.光化学烟雾（NOx、SO₂、CO均为一次污染物）\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：污染物在环境中发生的空间位置相对改变的过程\n  - <details><summary>答案<\/summary> 污染物迁移 <\/details>\n- ____：污染物在环境中通过物理、化学或生物学作用改变形态或转变为另一种物质的过程\n  - <details><summary>答案<\/summary> 污染物转化 <\/details>\n- ____：通过气（扩散+气流搬运）、水、重力等物理作用使污染物空间位移\n  - <details><summary>答案<\/summary> 机械性迁移 <\/details>\n- ____：通过风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原等物化作用实现迁移\n  - <details><summary>答案<\/summary> 物理-化学性迁移 <\/details>\n- ____：污染物通过生物体吸附、吸收、代谢或死亡等过程发生的迁移，表现为生物浓缩、生物积累、生物放大\n  - <details><summary>答案<\/summary> 生物性迁移 <\/details>\n- ____：生物体内污染物浓度超出环境中浓度的现象\n  - <details><summary>答案<\/summary> 生物浓缩/生物富集（bioconcentration） <\/details>\n- ____：同一生物随生长发育，浓缩系数不断增大\n  - <details><summary>答案<\/summary> 生物积累（bioaccumulation） <\/details>\n- ____：同一食物链上，污染物浓度随营养级提高而逐步增大\n  - <details><summary>答案<\/summary> 生物放大（biomagnification） <\/details>\n- ____：对流层中上层暖下层冷，大气稳定度高，对流弱，污染物难扩散（秋冬北方雾霾成因之一）\n  - <details><summary>答案<\/summary> 逆温现象 <\/details>\n- ____：大气颗粒物消除过程，按是否需降水冲刷分为干沉降和湿沉降\n  - <details><summary>答案<\/summary> 干沉降与湿沉降 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 35 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L21_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_ rget=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p020.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p020.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p021.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p021.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p022.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p023.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p023.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p024.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p024.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p025.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p025.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p026.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p026.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p027.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p027.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p028.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p028.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p029.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p029.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p030.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p030.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p031.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p032.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p032.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p033.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p033.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p034.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L21_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L21_p035.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-3", "group": "章节精讲", "title": "第3章 · 污染物的生物转运与生物转化", "md": "# 第3章 · 污染物的生物转运与生物转化\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点\n\n#### 一、核心概念（名词解释）\n\n- [x] **生物转运**：环境污染物经各种途径和方式同生物体接触而被吸收、分布和排泄等过程的总称（反复通过生物膜）\n- [x] **生物转化/代谢转化**：化学物在组织细胞中发生的结构和性质的变化过程\n- [x] **被动扩散（简单扩散）**：物质从高浓度→低浓度透过生物膜，纯物理过程，不耗能\n- [x] **滤过**：水溶性毒物随水分子经生物膜孔状结构透过，动力为流体静压差和渗透压差\n- [x] **主动转运**：载体参与下逆浓度梯度转运，需耗能，有选择性、容量限制、竞争性抑制\n- [x] **易化扩散**：载体介导顺浓度梯度转运，不耗能，不能逆浓度\n- [x] **膜动转运**：颗粒物/大分子通过膜变形移动摄入（胞吞/胞吐）\n- [x] **吸收**：污染物通过接触部位透过生物膜进入血液循环的过程\n- [x] **分布**：毒物进入血液后通过血流分布全身的过程\n- [x] **屏障**：血脑屏障、胎盘屏障等阻碍外源化学物转运的体内特殊结构\n- [x] **贮存库**：毒物与血浆蛋白/组织成分结合积聚的特定部位（血浆蛋白、肝肾、脂肪、骨骼）\n- [x] **肝肠循环**：脂溶性毒物在小肠被重吸收经门静脉回肝再随胆汁分泌，延长半衰期、加大毒性\n- [x] **毒物动力学**：运用数学方法定量研究毒物吸收、分布、排泄和代谢转化随时间动态变化的规律\n\n#### 二、关键公式 / 模型\n\n- **一级动力学消除**：dD/dt = -KD，D = D₀·e^(-kt)，lgD = lgD₀ - kt/2.303\n- **半衰期**：T₁/₂ = 0.693/K\n- **表观分布容积**：Vd = D/c（Vd大→分布广/组织吸收多/血浆浓度低；Vd小→分布少/血浆浓度高）\n- **消除速率常数**：K = (dD/dt)/D（K越大消除越快）\n- **清除率**：CL = 消除速度/血浆浓度 = (dD/dt)/c\n- **一室模型**：毒物进入机体后立即均匀分布到所有组织达到平衡\n- **二室模型**：中央室（血流丰富迅速平衡）+ 周边室（血流量少穿透慢），大多数毒物符合\n- **非线性动力学**：剂量加大出现饱和现象的速率过程\n\n#### 三、重要案例 / 实验 / 例题\n\n- **尘肺**：呼吸道吸收颗粒物致毒——>10μm被鼻阻挡，2.5-10μm上呼吸道沉积，<2.5μm附着肺泡\n- **清华铊中毒事件**：消化道吸收致毒，铊为银白色稀有金属，影响中枢神经/肠胃/肾脏\n- **儿童铅中毒**：皮肤吸收致毒，铅来源包括家装、饮水、文具、汽车尾气、食品\n- **DDT代谢产物DDE**：竞争性置换与蛋白结合的胆红素→游离胆红素升高→黄疸\n- **铅骨骼贮存**：铅贮存于骨骼有保护作用，但缺钙/pH下降/溶骨时铅释放→慢性中毒\n- **氟骨症/骨肉瘤**：氟化物/放射性锶与骨基质结合贮存致病\n\n#### 四、高频考点（速记）\n\n1. 生物转运四方式：**被动扩散**（不耗能，顺浓度）、**滤过**（水溶性）、**特殊转运**（主动+易化）、**膜动转运**（胞吞/胞吐）\n2. 被动扩散影响因素：**浓度梯度**、**脂/水分配系数**、**电离状态与pH**、**蛋白结合亲和力**\n3. 主动转运五特点：**逆浓度梯度**、**耗能**、**需载体**、**有选择性**、**有容量限制+竞争性抑制**\n4. 三种吸收途径：**呼吸道**（肺泡被动扩散/颗粒大小决定沉积部位）、**消化道**（主要在小肠）、**皮肤**（穿透相+吸收相两阶段）\n5. 四大贮存库：**血浆蛋白**（可逆非共价结合）、**肝肾**（配体蛋白/金属硫蛋白）、**脂肪**（有机氯农药等脂溶性）、**骨骼**（氟/铅/锶与骨基质结合）\n6. 贮存库双重意义：**急性保护**（降低靶器官浓度）+ **慢性危害**（贮存库释放致慢性中毒）\n7. 排泄四途径：**肾脏**（滤过+重吸收+主动分泌）、**肝胆**（肝肠循环延长半衰期）、**呼吸道**（简单扩散，取决于分压差和血气分配系数）、**其他**（乳汁/唾液/汗腺/头发指甲）\n8. 动力学模型：**一室**（均匀分布）、**二室**（中央+周边，大多数毒物）、**非线性**（饱和现象）\n\n#### 五、思考题 / 自测\n\n- [x] 题：毒物在体内的贮藏库包括？ 答：骨骼、脂肪、肝肾（不含肠胃）\n- [x] 题：一级动力学消除k=0.3465h⁻¹，c₀=100mg/L，说法错误的是？ 答：C（lgc对t作图斜率为-k/2.303而非-k）\n- [x] 题：被动扩散vs主动转运区别？ 答：被动扩散顺浓度、不耗能、无载体；主动转运逆浓度、耗能、需载体、有选择性\n- [x] 题：肝肠循环的毒理学意义？ 答：延长毒物在体内停留时间和半衰期，毒性加大\n\n#### 六、与前后章之关联\n\n- 承前章：第2章讨论污染物在环境中的迁移转化，本章转入生物体内（吸收→分布→代谢→排泄）\n- 启后章：第4章讨论毒作用及影响因素，本章的吸收分布代谢排泄是毒作用的前提和基础\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第3章<br/>污染物的生物转运与生物转化))\n    核心概念\n      生物转运\n      生物转化/代谢转化\n      被动扩散（简单扩散）\n      滤过\n      主动转运\n      易化扩散\n      膜动转运\n      吸收\n      分布\n      屏障\n      贮存库\n      肝肠循环\n      毒物动力学\n    关键公式 / 模型\n      一级动力学消除\n      半衰期\n      表观分布容积\n      消除速率常数\n      清除率\n      一室模型\n      二室模型\n      非线性动力学\n    高频考点\n      生物转运四方式：被动扩散（不耗能，顺浓 *生物转化（代谢转化）**：化学物在组织细胞中发生的**结构和性质的变化**过程。\n\n#### 例题 3-2（名词解释）\n**题**：解释生物转化的 I 相与 II 相反应；什么是\"代谢活化\"？\n**参考答案**：\n- **I 相反应**：**氧化、还原、水解**，向分子引入或暴露 $-OH$、$-NH_2$、$-COOH$ 等极性基团（主力为肝微粒体 **细胞色素 P450** 系统）。\n- **II 相反应**：**结合反应**（与葡萄糖醛酸、硫酸、谷胱甘肽等结合），显著增大**水溶性**，利于排泄、通常降低毒性。\n- **代谢活化**：少数外源化合物经生物转化后**毒性反而增强**（生成活性中间体，如苯并芘经 P450 活化为致癌的环氧化物），称代谢活化（生物活化）。\n\n#### 例题 3-3（计算 · 毒物动力学）\n**题**：某毒物符合一室一级消除模型，消除速率常数 $K=0.0693\\ \\mathrm{h^{-1}}$。求其生物半衰期 $T_{1/2}$。\n**解**：$T_{1/2}=\\dfrac{0.693}{K}=\\dfrac{0.693}{0.0693}=10\\ \\mathrm{h}$。\n\n$$\\boxed{T_{1/2}=10\\ \\mathrm{h}}$$\n> 提示：$T_{1/2}$ 越长，毒物在体内蓄积、滞留越久；表观分布容积 $V_d=D/c$，$V_d$ 越大说明分布越广、血浆浓度越低。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 生物转运？\n\n<details><summary>参考答案<\/summary>\n\n环境污染物经各种途径和方式同生物体接触而被吸收、分布和排泄等过程的总称（反复通过生物膜）\n\n<\/details>\n\n**Q2（名词解释）** 生物转化/代谢转化？\n\n<details><summary>参考答案<\/summary>\n\n化学物在组织细胞中发生的结构和性质的变化过程\n\n<\/details>\n\n**Q3（名词解释）** 被动扩散（简单扩散）？\n\n<details><summary>参考答案<\/summary>\n\n物质从高浓度→低浓度透过生物膜，纯物理过程，不耗能\n\n<\/details>\n\n**Q4（名词解释）** 滤过？\n\n<details><summary>参考答案<\/summary>\n\n水溶性毒物随水分子经生物膜孔状结构透过，动力为流体静压差和渗透压差\n\n<\/details>\n\n**Q5（名词解释）** 主动转运？\n\n<details><summary>参考答案<\/summary>\n\n载体参与下逆浓度梯度转运，需耗能，有选择性、容量限制、竞争性抑制\n\n<\/details>\n\n**Q6（名词解释）** 易化扩散？\n\n<details><summary>参考答案<\/summary>\n\n载体介导顺浓度梯度转运，不耗能，不能逆浓度\n\n<\/details>\n\n**Q7（名词解释）** 膜动转运？\n\n<details><summary>参考答案<\/summary>\n\n颗粒物/大分子通过膜变形移动摄入（胞吞/胞吐）\n\n<\/details>\n\n**Q8（名词解释）** 吸收？\n\n<details><summary>参考答案<\/summary>\n\n污染物通过接触部位透过生物膜进入血液循环的过程\n\n<\/details>\n\n**Q9（名词解释）** 分布？\n\n<details><summary>参考答案<\/summary>\n\n毒物进入血液后通过血流分布全身的过程\n\n<\/details>\n\n**Q10（名词解释）** 屏障？\n\n<details><summary>参考答案<\/summary>\n\n血脑屏障、胎盘屏障等阻碍外源化学物转运的体内特殊结构\n\n<\/details>\n\n**Q11（名词解释）** 贮存库？\n\n<details><summary>参考答案<\/summary>\n\n毒物与血浆蛋白/组织成分结合积聚的特定部位（血浆蛋白、肝肾、脂肪、骨骼）\n\n<\/details>\n\n**Q12（名词解释）** 肝肠循环？\n\n<details><summary>参考答案<\/summary>\n\n脂溶性毒物在小肠被重吸收经门静脉回肝再随胆汁分泌，延长半衰期、加大毒性\n\n<\/details>\n\n**Q13（名词解释）** 毒物动力学？\n\n<details><summary>参考答案<\/summary>\n\n运用数学方法定量研究毒物吸收、分布、排泄和代谢转化随时间动态变化的规律\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：生物转运四方式：被动扩散（不耗能，顺浓度）、滤过（水溶性）、特殊转运（主动+易化）、膜动转运（胞吞/胞吐）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：生物转运四方式：被动扩散（不耗能，顺浓度）、滤过（水溶性）、特殊转运（主动+易化）、膜动转运（胞吞/胞吐）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：被动扩散影响因素：浓度梯度、脂/水分配系数、电离状态与pH、蛋白结合亲和力\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：被动扩散影响因素：浓度梯度、脂/水分配系数、电离状态与pH、蛋白结合亲和力\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：主动转运五特点：逆浓度梯度、耗能、需载体、有选择性、有容量限制+竞争性抑制\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：主动转运五特点：逆浓度梯度、耗能、需载体、有选择性、有容量限制+竞争性抑制\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：三种吸收途径：呼吸道（肺泡被动扩散/颗粒大小决定沉积部位）、消化道（主要在小肠）、皮肤（穿透相+吸收相两阶段）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：三种吸收途径：呼吸道（肺泡被动扩散/颗粒大小决定沉积部位）、消化道（主要在小肠）、皮肤（穿透相+吸收相两阶段）\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：四大贮存库：血浆蛋白（可逆非共价结合）、肝肾（配体蛋白/金属硫蛋白）、脂肪（有机氯农药等脂溶性）、骨骼（氟/铅/锶与骨基质结合）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：四大贮存库：血浆蛋白（可逆非共价结合）、肝肾（配体蛋白/金属硫蛋白）、脂肪（有机氯农药等脂溶性）、骨骼（氟/铅/锶与骨基质结合）\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：贮存库双重意义：急性保护（降低靶器官浓度）+ 慢性危害（贮存库释放致慢性中毒）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：贮存库双重意义：急性保护（降低靶器官浓度）+ 慢性危害（贮存库释放致慢性中毒）\n\n<\/details>\n\n**Q20（考点·闭卷默写）** 请展开论述：排泄四途径：肾脏（滤过+重吸收+主动分泌）、肝胆（肝肠循环延长半衰期）、呼吸道（简单扩散，取决于分压差和血气分配系数）、其他（乳汁/唾液/汗腺/头发指甲）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：排泄四途径：肾脏（滤过+重吸收+主动分泌）、肝胆（肝肠循环延长半衰期）、呼吸道（简单扩散，取决于分压差和血气分配系数）、其他（乳汁/唾液/汗腺/头发指甲）\n\n<\/details>\n\n**Q21（考点·闭卷默写）** 请展开论述：动力学模型：一室（均匀分布）、二室（中央+周边，大多数毒物）、非线性（饱和现象）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：动力学模型：一室（均匀分布）、二室（中央+周边，大多数毒物）、非线性（饱和现象）\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- 题：毒物在体内的贮藏库包括？ 答：骨骼、脂肪、肝肾（不含肠胃）\n- 题：一级动力学消除k=0.3465h⁻¹，c₀=100mg/L，说法错误的是？ 答：C（lgc对t作图斜率为-k/2.303而非-k）\n- 题：被动扩散vs主动转运区别？ 答：被动扩散顺浓度、不耗能、无载体；主动转运逆浓度、耗能、需载体、有选择性\n- 题：肝肠循环的毒理学意义？ 答：延长毒物在体内停留时间和半衰期，毒性加大\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：环境污染物经各种途径和方式同生物体接触而被吸收、分布和排泄等过程的总称（反复通过生物膜）\n  - <details><summary>答案<\/summary> 生物转运 <\/details>\n- ____：化学物在组织细胞中发生的结构和性质的变化过程\n  - <details><summary>答案<\/summary> 生物转化/代谢转化 <\/details>\n- ____：物质从高浓度→低浓度透过生物膜，纯物理过程，不耗能\n  - <details><summary>答案<\/summary> 被动扩散（简单扩散） <\/details>\n- ____：水溶性毒物随水分子经生物膜孔状结构透过，动力为流体静压差和渗透压差\n  - <details><summary>答案<\/summary> 滤过 <\/details>\n- ____：载体参与下逆浓度梯度转运，需耗能，有选择性、容量限制、竞争性抑制\n  - <details><summary>答案<\/summary> 主动转运 <\/details>\n- ____：载体介导顺浓度梯度转运，不耗能，不能逆浓度\n  - <details><summary>答案<\/summary> 易化扩散 <\/details>\n- ____：颗粒物/大分子通过膜变形移动摄入（胞吞/胞吐）\n  - <details><summary>答案<\/summary> 膜动转运 <\/details>\n- ____：污染物通过接触部位透过生物膜进入血液循环的过程\n  - <details><summary>答案<\/summary> 吸收 <\/details>\n- ____：毒物进入血液后通过血流分布全身的过程\n  - <details><summary>答案<\/summary> 分布 <\/details>\n- ____：血脑屏障、胎盘屏障等阻碍外源化学物转运的体内特殊结构\n  - <details><summary>答案<\/summary> 屏障 <\/details>\n- ____：毒物与血浆蛋白/组织成分结合积聚的特定部位（血浆蛋白、肝肾、脂肪、骨骼）\n  - <details><summary>答案<\/summary> 贮存库 <\/details>\n- ____：脂溶性毒物在小肠被重吸收经门静脉回肝再随胆汁分泌，延长半衰期、加大毒性\n  - <details><summary>答案<\/summary> 肝肠循环 <\/details>\n- ____：运用数学方法定量研究毒物吸收、分布、排泄和代谢转化随时间动态变化的规律\n  - <details><summary>答案<\/summary> 毒物动力学 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 136 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L18_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L18_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L18_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L18_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L18_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L18_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L18_p0 t=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p029.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p029.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p030.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p030.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p031.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p032.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p032.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p033.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p033.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p034.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L20_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L20_p035.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-4", "group": "章节精讲", "title": "第4章 · 环境污染物的毒作用及其影响因素", "md": "# 第4章 · 环境污染物的毒作用及其影响因素\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点\n\n#### 一、核心概念（名词解释）\n\n- [x] **急性毒性**：机体一次接触或24h内多次接触某一化学物所引起的毒性效应（包括死亡）\n- [x] **LD₅₀/LC₅₀**：半数致死量/半数致死浓度，使半数试验动物死亡的毒物剂量/浓度，数值越小毒性越强\n- [x] **亚慢性毒性**：机体在相当于1/20左右生命期间，少量、反复接触有害因素引起的损害作用\n- [x] **慢性毒性**：机体长期（>生命期10%）、少量、反复接触外源化学物所引起的毒性效应\n- [x] **蓄积作用**：外源化学物连续进入机体，吸收速度/总量超过代谢转化排除总量，化学物在体内增加并贮留\n- [x] **物质蓄积**：可用化学方法测得体内污染物或代谢物量逐渐积累增多\n- [x] **功能蓄积**：污染物反复作用机体引起结构和功能变化逐渐累积加重，但测不出该物质（如有机磷化合物）\n- [x] **蓄积系数K**：K = ∑LD₅₀(n) / LD₅₀(1)，多次染毒与一次染毒毒性效应之比\n- [x] **致突变作用**：遗传物质发生的可改变生殖或体细胞遗传信息并产生新表型效应的改变\n- [x] **基因突变（点突变）**：DNA在分子水平上碱基对组成或排列顺序改变，包括碱基置换（转换/颠换）和移码突变\n- [x] **染色体畸变**：可用显微镜直接观察到的染色体结构（裂隙、缺失、异位、重排、插入）和数目（整倍体/非整倍体）改变\n- [x] **致畸作用**：致畸物通过母体作用于胚胎引起胎儿畸形的现象；器官形成期最敏感\n- [x] **化学致癌物**：诱发肿瘤的化学物质；人类肿瘤80-85%与化学因素有关\n- [x] **肿瘤形成三阶段**：引发阶段（正常细胞→癌前细胞）→促长阶段（癌细胞增殖→肿块）→进展阶段（恶性前型→恶性型）\n\n#### 二、关键公式 / 模型\n\n- **LD₅₀**：半数致死量（mg/kg），数值越小毒性越强\n- **蓄积系数**：K = ∑LD₅₀(n) / LD₅₀(1)\n  - K<1 高度蓄积 | 1~3 明显蓄积 | 3~5 中度蓄积 | >5 轻度蓄积\n- **蓄积系数测定法**：固定剂量法、剂量定期递增染毒法、剂量固定20天蓄积法\n- **生物半减期法**：T₁/₂越长→越不易消除→蓄积可能性越大\n- **肿瘤发生率** = 试验终了时患肿瘤动物总数 / 有效动物总数 × 100%\n- **致癌试验结果判定四条**（任一条有显著性+剂量反应关系=阳性）：\n  1. 受试组出现对照组没有的肿瘤类型\n  2. 受试组肿瘤发生率高于对照组\n  3. 受试组平均肿瘤数高于对照组\n  4. 受试组肿瘤潜伏期短于对照组\n\n#### 三、重要案例 / 实验 / 例题\n\n- **马兜铃酸致癌致肾炎**：急性（短时间大量→急性肾衰）、慢性（持续小剂量→进行性损害）、肾小管功能障碍型（间断小量→肾小管酸中毒），同毒物不同染毒时间/剂量→不同毒性\n- **反应停（沙利度胺）致畸**：导致近万名短肢畸形儿诞生，对兔和人致畸但对其他哺乳动物不致畸→种属差异\n- **风疹病毒致畸**：第4周→无脑儿/脊髓裂，第5周→无肢畸形，6-9周→牙畸形→不同发育阶段敏感性不同\n- **高放射本底地区**：中国阳江6.4mSv/年、印度喀拉拉邦10-20mSv/年、伊朗拉姆萨尔71mSv/年\n- **Ames试验**：细菌回复突变试验，利用突变型微生物与被检化学物接触，若致突变则回复野生型（TA98/TA100等菌株）\n- **微核试验**：染色体/染色单体受突变形成无着丝点短片或纺锤体损伤遗留胞质，简便快速可靠\n\n#### 四、高频考点（速记）\n\n1. **一般毒性vs特殊毒性**：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育\n2. **急性毒性试验**：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n3. **亚慢性毒性**：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n4. **慢性毒性**：染毒3-24月甚至终生，常与致癌试验合并进行\n5. **蓄积作用两种**：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两者同时存在互为基础\n6. **蓄积系数K分级**：<1高度 | 1~3明显 | 3~5中度 | >5轻度\n7. **基因突变两类**：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+移码突变（插入/缺失非3倍数碱基→密码阅读框移位）\n8. **染色体畸变**：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整倍体/非整倍体如2n+1三体）\n9. **致突变后果**：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细胞突变→影响后代（遗传病/显性致死/基因库）\n10. **致畸试验要点**：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30~1/2 LD₅₀，分娩前1-2天解剖\n11. **致癌三学说**：体细胞突变学说、分化障碍学说、癌基因学说\n12. **致癌试验**：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟人体接触途径\n\n#### 五、思考题 / 自测\n\n- [x] 题：LD₅₀数值越小毒性如何？ 答：毒性越强\n- [x] 题：物质蓄积vs功能蓄积区别？ 答：物质蓄积可用化学方法测出体内量；功能蓄积测不出物质但功能累积加重（如有机磷）\n- [x] 题：蓄积系数K=2属于什么蓄积？ 答：明显蓄积（1~3范围）\n- [x] 题：基因突变中转换vs颠换？ 答：转换=同类碱基互换（嘧啶↔嘧啶/嘌呤↔嘌呤）；颠换=异类碱基互换（嘌呤↔嘧啶）\n- [x] 题：致畸敏感期是什么？ 答：器官形成期\n- [x] 题：Ames试验原理？ 答：突变型细菌与被检物接触→若致突变则回复突变成野生型\n\n#### 六、与前后章之关联\n\n- 承前章：第3章讨论生物转运（吸收/分布/代谢/排泄），本章在此基础上评价毒作用大小和类型\n- 启后章：第5章为环境毒理学常用实验方法，本章的毒作用评价方法是实验设计的理论基础\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第4章<br/>环境污染物的毒作用及其影响因素))\n    核心概念\n      急性毒性\n      LD₅₀/LC₅₀\n      亚慢性毒性\n      慢性毒性\n      蓄积作用\n      物质蓄积\n      功能蓄积\n      蓄积系数K\n      致突变作用\n      基因突变（点突变）\n      染色体畸变\n      致畸作用\n      化学致癌物\n      肿瘤形成三阶段\n    关键公式 / 模型\n      LD₅₀\n      蓄积系数\n      蓄积系数测定法\n      生物半减期法\n      肿瘤发生率\n      致癌试验结果判定四条\n    高频考点\n      一般毒性vs特殊毒性：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/…\n      急性毒性试验：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n      亚慢性毒性：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n      慢性毒性：染毒3-24月甚至终生，常与致癌试验合并进行\n      蓄积作用两种：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两…\n      蓄积系数K分级：＜1高度 ｜ 1~3明显 ｜ 3~5中度 ｜ ＞5…\n      基因突变两类：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+…\n      染色体畸变：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整…\n      致突变后果：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细…\n      致畸试验要点：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30…\n      致癌三学说：体细胞突变学说、分化障碍学说、癌基因学说\n      致癌试验：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟…\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L14_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L14_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L14_p049.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L14_p049.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L15_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L15_p011.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L15_p046.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L15_p046.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L16_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L16_p031.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p016.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 原理示意 · 剂量–反应关系\n\n```mermaid\nflowchart LR\n    A[\"接触剂量\"] --> B[\"吸收剂量\"]\n    B --> C[\"靶器官剂量\"]\n    C --> D[\"生物学效应\"]\n    D --> E[\"剂量-反应/剂量-效应曲线 (常为S形)\"]\n    E --> F[\"求半数效应剂量 LD50 / LC50\"]\n```\n\n#### 例题 4-1（名词解释）\n**题**：解释 LD₅₀、阈剂量、最大无作用剂量（NOAEL）。\n**参考答案**：\n- **LD₅₀（半数致死剂量）**：引起一群受试动物**半数（50%）死亡**所需的剂量，单位 $\\mathrm{mg/kg}$；数值越小，**急性毒性越强**。\n- **阈剂量（最小有作用剂量 LOAEL）**：能引起机体**可观察到的有害效应**的最低剂量。\n- **最大无作用剂量（NOAEL）**：在规定条件下，**未观察到任何有害效应**的最高剂量，是制定安全限值的基础。\n\n#### 例题 4-2（简答）\n**题**：剂量–效应关系与剂量–反应关系有何区别？\n**参考答案**：\n- **剂量–效应关系**：剂量与**个体（或器官）某一量化效应强度**（如酶活性、体重变化）的关系，纵轴是**计量资料**。\n- **剂量–反应关系**：剂量与**群体中出现某一质反应的个体比例**（如死亡率%）的关系，纵轴是**计数/百分率**，曲线常呈 **S 形**。\n\n#### 例题 4-3（名词解释）\n**题**：什么是\"三致作用\"？三者的关系如何？\n**参考答案**：指外源化合物的**致突变、致癌、致畸**作用。\n- **致突变**：引起遗传物质 DNA 结构或数量改变；\n- **致癌**：诱发细胞恶性转化形成肿瘤；\n- **致畸**：作用于胚胎发育导致后代畸形。\n关系：**致突变常是致癌、致畸的分子基础**（体细胞突变→致癌；生殖细胞/胚胎期突变→致畸或遗传损害），故三者机制相互关联。\n\n#### 例题 4-4（简答）\n**题**：影响化学物质毒性的主要因素有哪些？\n**参考答案**：① **化学物质因素**（结构、理化性质、纯度、脂/水溶性）；② **机体因素**（种属、性别、年龄、营养与健康、遗传与个体差异）；③ **接触条件**（剂量、途径、期限与频率）；④ **环境因素**（温度、湿度）；⑤ **联合作用**（相加、协同、拮抗、独立）。\n\n#### 例题 4-5（计算 · 联合毒性判别）\n**题**：A、B 两毒物按等毒性配比混合，实测联合毒性指数 $K=\\dfrac{\\text{预期等效剂量}}{\\text{实测等效剂量}}=2.0$。判断联合作用类型。\n**解**：以相加作用为基准（$K\\approx1$）：\n- $K>1$（实测毒性 **强于** 相加预期）→ **协同作用**；\n- $K<1$ → **拮抗作用**；\n- $K\\approx1$ → **相加作用**。\n本题 $K=2.0>1$。\n\n$$\\boxed{K=2.0>1\\ \\Rightarrow\\ \\text{协同作用（毒性增强）}}$$\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 急性毒性？\n\n<details><summary>参考答案<\/summary>\n\n机体一次接触或24h内多次接触某一化学物所引起的毒性效应（包括死亡）\n\n<\/details>\n\n**Q2（名词解释）** LD₅₀/LC₅₀？\n\n<details><summary>参考答案<\/summary>\n\n半数致死量/半数致死浓度，使半数试验动物死亡的毒物剂量/浓度，数值越小毒性越强\n\n<\/details>\n\n**Q3（名词解释）** 亚慢性毒性？\n\n<details><summary>参考答案<\/summary>\n\n机体在相当于1/20左右生命期间，少量、反复接触有害因素引起的损害作用\n\n<\/details>\n\n**Q4（名词解释）** 慢性毒性？\n\n<details><summary>参考答案<\/summary>\n\n机体长期（>生命期10%）、少量、反复接触外源化学物所引起的毒性效应\n\n<\/details>\n\n**Q5（名词解释）** 蓄积作用？\n\n<details><summary>参考答案<\/summary>\n\n外源化学物连续进入机体，吸收速度/总量超过代谢转化排除总量，化学物在体内增加并贮留\n\n<\/details>\n\n**Q6（名词解释）** 物质蓄积？\n\n<details><summary>参考答案<\/summary>\n\n可用化学方法测得体内污染物或代谢物量逐渐积累增多\n\n<\/details>\n\n**Q7（名词解释）** 功能蓄积？\n\n<details><summary>参考答案<\/summary>\n\n污染物反复作用机体引起结构和功能变化逐渐累积加重，但测不出该物质（如有机磷化合物）\n\n<\/details>\n\n**Q8（名词解释）** 蓄积系数K？\n\n<details><summary>参考答案<\/summary>\n\nK = ∑LD₅₀(n) / LD₅₀(1)，多次染毒与一次染毒毒性效应之比\n\n<\/details>\n\n**Q9（名词解释）** 致突变作用？\n\n<details><summary>参考答案<\/summary>\n\n遗传物质发生的可改变生殖或体细胞遗传信息并产生新表型效应的改变\n\n<\/details>\n\n**Q10（名词解释）** 基因突变（点突变）？\n\n<details><summary>参考答案<\/summary>\n\nDNA在分子水平上碱基对组成或排列顺序改变，包括碱基置换（转换/颠换）和移码突变\n\n<\/details>\n\n**Q11（名词解释）** 染色体畸变？\n\n<details><summary>参考答案<\/summary>\n\n可用显微镜直接观察到的染色体结构（裂隙、缺失、异位、重排、插入）和数目（整倍体/非整倍体）改变\n\n<\/details>\n\n**Q12（名词解释）** 致畸作用？\n\n<details><summary>参考答案<\/summary>\n\n致畸物通过母体作用于胚胎引起胎儿畸形的现象；器官形成期最敏感\n\n<\/details>\n\n**Q13（名词解释）** 化学致癌物？\n\n<details><summary>参考答案<\/summary>\n\n诱发肿瘤的化学物质；人类肿瘤80-85%与化学因素有关\n\n<\/details>\n\n**Q14（名词解释）** 肿瘤形成三阶段？\n\n<details><summary>参考答案<\/summary>\n\n引发阶段（正常细胞→癌前细胞）→促长阶段（癌细胞增殖→肿块）→进展阶段（恶性前型→恶性型）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：一般毒性vs特殊毒性：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：一般毒性vs特殊毒性：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：急性毒性试验：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：急性毒性试验：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：亚慢性毒性：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：亚慢性毒性：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：慢性毒性：染毒3-24月甚至终生，常与致癌试验合并进行\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：慢性毒性：染毒3-24月甚至终生，常与致癌试验合并进行\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：蓄积作用两种：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两者同时存在互为基础\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：蓄积作用两种：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两者同时存在互为基础\n\n<\/details>\n\n**Q20（考点·闭卷默写）** 请展开论述：蓄积系数K分级：<1高度 | 1~3明显 | 3~5中度 | >5轻度\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：蓄积系数K分级：<1高度 | 1~3明显 | 3~5中度 | >5轻度\n\n<\/details>\n\n**Q21（考点·闭卷默写）** 请展开论述：基因突变两类：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+移码突变（插入/缺失非3倍数碱基→密码阅读框移位）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：基因突变两类：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+移码突变（插入/缺失非3倍数碱基→密码阅读框移位）\n\n<\/details>\n\n**Q22（考点·闭卷默写）** 请展开论述：染色体畸变：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整倍体/非整倍体如2n+1三体）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：染色体畸变：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整倍体/非整倍体如2n+1三体）\n\n<\/details>\n\n**Q23（考点·闭卷默写）** 请展开论述：致突变后果：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细胞突变→影响后代（遗传病/显性致死/基因库）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致突变后果：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细胞突变→影响后代（遗传病/显性致死/基因库）\n\n<\/details>\n\n**Q24（考点·闭卷默写）** 请展开论述：致畸试验要点：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30~1/2 LD₅₀，分娩前1-2天解剖\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致畸试验要点：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30~1/2 LD₅₀，分娩前1-2天解剖\n\n<\/details>\n\n**Q25（考点·闭卷默写）** 请展开论述：致癌三学说：体细胞突变学说、分化障碍学说、癌基因学说\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致癌三学说：体细胞突变学说、分化障碍学说、癌基因学说\n\n<\/details>\n\n**Q26（考点·闭卷默写）** 请展开论述：致癌试验：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟人体接触途径\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致癌试验：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟人体接触途径\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- 题：LD₅₀数值越小毒性如何？ 答：毒性越强\n- 题：物质蓄积vs功能蓄积区别？ 答：物质蓄积可用化学方法测出体内量；功能蓄积测不出物质但功能累积加重（如有机磷）\n- 题：蓄积系数K=2属于什么蓄积？ 答：明显蓄积（1~3范围）\n- 题：基因突变中转换vs颠换？ 答：转换=同类碱基互换（嘧啶↔嘧啶/嘌呤↔嘌呤）；颠换=异类碱基互换（嘌呤↔嘧啶）\n- 题：致畸敏感期是什么？ 答：器官形成期\n- 题：Ames试验原理？ 答：突变型细菌与被检物接触→若致突变则回复突变成野生型\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：机体一次接触或24h内多次接触某一化学物所引起的毒性效应（包括死亡）\n  - <details><summary>答案<\/summary> 急性毒性 <\/details>\n- ____：半数致死量/半数致死浓度，使半数试验动物死亡的毒物剂量/浓度，数值越小毒性越强\n  - <details><summary>答案<\/summary> LD₅₀/LC₅₀ <\/details>\n- ____：机体在相当于1/20左右生命期间，少量、反复接触有害因素引起的损害作用\n  - <details><summary>答案<\/summary> 亚慢性毒性 <\/details>\n- ____：机体长期（>生命期10%）、少量、反复接触外源化学物所引起的毒性效应\n  - <details><summary>答案<\/summary> 慢性毒性 <\/details>\n- ____：外源化学物连续进入机体，吸收速度/总量超过代谢转化排除总量，化学物在体内增加并贮留\n  - <details><summary>答案<\/summary> 蓄积作用 <\/details>\n- ____：可用化学方法测得体内污染物或代谢物量逐渐积累增多\n  - <details><summary>答案<\/summary> 物质蓄积 <\/details>\n- ____：污染物反复作用机体引起结构和功能变化逐渐累积加重，但测不出该物质（如有机磷化合物）\n  - <details><summary>答案<\/summary> 功能蓄积 <\/details>\n- ____：K = ∑LD₅₀(n) / LD₅₀(1)，多次染毒与一次染毒毒性效应之比\n  - <details><summary>答案<\/summary> 蓄积系数K <\/details>\n- ____：遗传物质发生的可改变生殖或体细胞遗传信息并产生新表型效应的改变\n  - <details><summary>答案<\/summary> 致突变作用 <\/details>\n- ____：DNA在分子水平上碱基对组成或排列顺序改变，包括碱基置换（转换/颠换）和移码突变\n  - <details><summary>答案<\/summary> 基因突变（点突变） <\/details>\n- ____：可用显微镜直接观察到的染色体结构（裂隙、缺失、异位、重排、插入）和数目（整倍体/非整倍体）改变\n  - <details><summary>答案<\/summary> 染色体畸变 <\/details>\n- ____：致畸物通过母体作用于胚胎引起胎儿畸形的现象；器官形成期最敏感\n  - <details><summary>答案<\/summary> 致畸作用 <\/details>\n- ____：诱发肿瘤的化学物质；人类肿瘤80-85%与化学因素有关\n  - <details><summary>答案<\/summary> 化学致癌物 <\/details>\n- ____：引发阶段（正常细胞→癌前细胞）→促长阶段（癌细胞增殖→肿块）→进展阶段（恶性前型→恶性型）\n  - <details><summary>答案<\/summary> 肿瘤形成三阶段 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 210 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L14_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L14_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L14_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L14_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L14_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading= assets/pdf/environmental-toxicology/L17_p032.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p032.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p033.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p033.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p034.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p035.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p036.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p036.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p037.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p037.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p038.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p038.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p039.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p039.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p040.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p041.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p041.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p042.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p042.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p043.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p043.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p044.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p044.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p045.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p045.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p046.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p046.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p047.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p047.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p048.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p048.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p049.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p049.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L17_p050.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L17_p050.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-5", "group": "章节精讲", "title": "第5章 · 环境毒理学常用实验方法", "md": "# 第5章 · 环境毒理学常用实验方法\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 已填\n\n> 本章为方法学之章——分系统介绍四类经典毒性试验（急性 / 亚慢性 / 慢性 / 特殊）+ 三致试验。\n\n#### 一、按接触期之四类毒性试验\n\n| 试验 | 接触期 | 主要目的 | 关键指标 |\n|------|--------|---------|---------|\n| **急性毒性** | 一次或 24 h 内多次 | 测 **LD₅₀** / LC₅₀，定毒性分级 | LD₅₀、症状、靶器官 |\n| **亚急性** | 1~3 月（不超 1/10 寿命） | 蓄积性、靶器官、剂量反应 | NOAEL、LOAEL |\n| **亚慢性** | 3~6 月 | 长期低剂量效应、剂量-反应关系 | NOAEL、慢性进程预测 |\n| **慢性毒性** | ≥ 6 月或终生 | 致癌、生殖发育影响、最终 NOAEL | 终身暴露效应 |\n\n#### 二、急性毒性试验（重点）\n\n##### 1. LD₅₀ 测定方法\n- **概率单位法（Bliss 法）**：经典，剂量取对数，反应率换概率单位，最小二乘法回归，求 LD₅₀\n- **改良寇氏法（Karber 法）**：简便，相邻剂量组之间反应率差除以剂量差累积\n- **霍恩法（Horn 法）**：少动物量测定，3 ~ 4 个剂量组各 4 ~ 5 只\n- **上下法（OECD 425）**：现代节约动物之法\n\n##### 2. 毒性分级标准（GB 15193 / WHO）\n| 级 | 大鼠经口 LD₅₀ (mg/kg) |\n|----|---------------------|\n| 极毒 | < 1 |\n| 剧毒 | 1 ~ 50 |\n| 中等毒 | 51 ~ 500 |\n| 低毒 | 501 ~ 5000 |\n| 微毒 | > 5000 |\n\n##### 3. 实验设计要点\n- 受试动物：大鼠 / 小鼠为主（雌雄各半），同窝同龄\n- 剂量组：5 ~ 6 组，几何级数排列\n- 染毒途径：与人接触途径相符（经口 / 吸入 / 皮肤 / 注射）\n- 观察期：14 d，记录死亡时间、症状、解剖\n\n#### 三、蓄积毒性试验（联第 1 章·蓄积系数）\n\n**蓄积系数 K_acc 法**：\n$$K_{acc} = \\frac{\\text{多次染毒累积致 50% 死亡之总剂量}}{\\text{单次 LD}_{50}}$$\n\n| K_acc | 蓄积程度 |\n|------:|---------|\n| < 1 | 高度 |\n| 1~3 | 明显 |\n| 3~5 | 中等 |\n| > 5 | 轻度 |\n\n#### 四、致突变试验（**Ames 试验**为最经典）\n\n##### Ames 试验（鼠伤寒沙门菌回复突变）\n- **原理**：组氨酸缺陷型菌株（his⁻）在不含 His 之培养基中不能生长；致突变物诱发回复突变（his⁻ → his⁺）→ 菌落数增多\n- **菌株**：TA97/TA98/TA100/TA102 等（覆盖移码与碱基置换）\n- **+S9 mix**：加大鼠肝匀浆 S9（含 P450）模拟体内代谢活化（间接致突变物需此）\n- **优点**：快速、便宜、对约 90% 化学致癌物敏感\n- **结论**：菌落数 ≥ 2 倍自发对照 → 阳性\n\n##### 染色体畸变试验\n- **CHO/V79 细胞**或骨髓细胞，看染色体断裂、易位、倒位等\n- **微核试验**：骨髓多染红细胞中微核率↑ → 阳性\n\n##### **SCE（姐妹染色单体交换）试验**\n- 用 BrdU 标记，染色显影，看交换数\n- 灵敏度高，但易混淆与异常\n\n##### **彗星试验（Comet Assay / 单细胞凝胶电泳）**\n- 单细胞 DNA 损伤检测：损伤 DNA 在电泳中拖出彗星状尾巴\n- 量化：尾长、尾矩\n\n##### 显性致死试验\n- 雄性动物染毒后与雌交配，统计胚胎死亡率→生殖细胞致突变\n\n#### 五、致癌试验\n\n- **长期动物致癌试验**：终生（大鼠 ~24 月，小鼠 ~18 月）；至少 50 雌 50 雄/组；3 个剂量 + 对照\n- **短期致癌试验**：转基因小鼠（Tg.AC、p53⁺/⁻）/ 启动-促进试验\n- **细胞转化试验**：BALB/c 3T3、SHE 细胞观察灶性增殖\n- **结论判定**：肿瘤发生率显著高于对照、靶器官明确、剂量-反应关系存在\n\n#### 六、致畸试验（生殖发育毒性）\n\n- **3 段法**：\n  - 段Ⅰ：生育力与早期胚胎发育\n  - **段Ⅱ：致畸敏感期试验**（孕 6~15 d 染毒，此期器官形成）\n  - 段Ⅲ：围产期与哺乳期\n- **指标**：着床数、活胎/死胎/吸收胎、胎重、外观/内脏/骨骼畸形率\n- **历史教训**：**反应停（沙利度胺）→ 海豹儿** —— 致畸学之起点\n\n#### 七、生态毒理学试验\n\n- **急性致死**：鱼类（斑马鱼）96 h LC₅₀；大型溞 48 h EC₅₀\n- **生物富集系数（BCF）**：参第 2 章\n- **微生物毒性**：发光菌（Vibrio fischeri）抑光率 → Microtox 法\n\n#### 八、高频考点（速记）\n\n1. LD₅₀ 测定经典法：**概率单位法、改良寇氏法、霍恩法、上下法**\n2. 急性毒性观察期 = **14 d**\n3. 毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n4. **Ames 试验**：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n5. Ames 阳性判定：菌落数 ≥ **2 倍**自发对照\n6. 微核试验靶细胞：**骨髓多染红细胞**\n7. 彗星试验测：**单细胞 DNA 损伤**（断裂）\n8. 致畸敏感期：孕 **6~15 d**（器官形成期）\n9. 反应停 → **海豹儿**（致畸学起点）\n10. 鱼类急性毒性：**96 h LC₅₀**；大型溞：**48 h EC₅₀**\n\n#### 九、典型思考题\n\n**Q1**：Ames 试验的原理及为何加 S9？  \nA：用组氨酸缺陷型沙门菌，在不含 His 之培养基中不能生长。受试物若致 his⁻ → his⁺ 回复突变，菌落数显著增多。S9 为大鼠肝匀浆上清，含 P450 等代谢酶，模拟体内 I 相代谢——许多致突变物为前致突变物，需代谢活化。\n\n**Q2**：写出常用四致试验。  \nA：**致突变**（Ames、SCE、微核、彗星）、**致畸**（3 段法）、**致癌**（长期动物试验、转化试验）、**致敏**（豚鼠最大化试验、局部淋巴结试验）。\n\n**Q3**：为何长期慢性毒性试验需 ≥ 6 月？  \nA：慢性效应（致癌、生殖、累积损伤）需长期低剂量暴露才显现；6 月以上方能涵盖大鼠 / 小鼠之大部分寿命，便于观察终生效应及制定 NOAEL 用于 RfD 推算。\n\n#### 十、与前后章之关联\n\n- **承第 4 章**（毒作用）：本章为前章毒作用类型对应之实验法\n- **启第 6 章**（安全性评价）：本章测得之 NOAEL/LD₅₀ 是危险度评价之原始数据\n- **启第 7 章**（致癌物）：致癌试验为评定化学致癌物之核心法\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第5章<br/>环境毒理学常用实验方法))\n    按接触期之四类毒性试验\n      急性毒性\n      LD₅₀\n      亚急性\n      亚慢性\n      慢性毒性\n    急性毒性试验\n      概率单位法（Bliss 法）\n      改良寇氏法（Karber 法）\n      霍恩法（Horn 法）\n      上下法（OECD 425）\n    蓄积毒性试验\n      蓄积系数 K_acc 法\n    致突变试验\n      原理\n      菌株\n      +S9 mix\n      优点\n      结论\n      CHO/V79 细胞\n      微核试验\n      SCE（姐妹染色单体交换）试验\n      彗星试验（Comet Assay / 单细胞凝胶电泳）\n    致癌试验\n      长期动物致癌试验\n      短期致癌试验\n      细胞转化试验\n      结论判定\n    致畸试验\n      3 段法\n      段Ⅱ：致畸敏感期试验\n      指标\n      历史教训\n      反应停（沙利度胺）→ 海豹儿\n    生态毒理学试验\n      急性致死\n      生物富集系数（BCF）\n      微生物毒性\n    高频考点\n      LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法\n      急性毒性观察期 = 14 d\n      毒性分级：极毒 ＜ 1 mg/kg ＜ 剧毒 ＜ 50 ＜ 中等…\n      Ames 试验：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n      Ames 阳性判定：菌落数 ≥ 2 倍自发对照\n      微核试验靶细胞：骨髓多染红细胞\n      彗星试验测：单细胞 DNA 损伤（断裂）\n      致畸敏感期：孕 6~15 d（器官形成期）\n      反应停 → 海豹儿（致畸学起点）\n      鱼类急性毒性：96 h LC₅₀；大型溞：48 h EC₅₀\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L11_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L11_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L11_p027.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L11_p027.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L12_p019.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L12_p019.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L12_p056.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L12_p056.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p046.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p046.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 流程示意 · 毒性测试与终点\n\n```mermaid\nflowchart LR\n    A[\"急性毒性试验\"] --> A1[\"求 LD50 / LC50 (毒性分级)\"]\n    B[\"蓄积毒性试验\"] --> B1[\"蓄积系数 K=∑剂量(累)/LD50(急)\"]\n    C[\"亚慢性/慢性试验\"] --> C1[\"求 NOAEL / LOAEL\"]\n    D[\"致突变试验 (Ames等)\"] --> D1[\"遗传毒性筛查\"]\n```\n\n#### 例题 5-1（计算 · 蓄积系数）\n**题**：某物质一次染毒 $LD_{50(急)}=100\\ \\mathrm{mg/kg}$；多次小剂量累积致半数死亡的总量 $\\sum LD_{50}=300\\ \\mathrm{mg/kg}$。求蓄积系数 $K$ 并判断蓄积性。\n**解**：$K=\\dfrac{\\sum LD_{50}}{LD_{50(急)}}=\\dfrac{300}{100}=3$。判别标准（引自刘毓谷教材）：$K<1$ 高度蓄积，$1\\sim3$ 明显蓄积，$3\\sim5$ 中度蓄积，$>5$ 轻度蓄积。$K=3$ 落入 $3\\sim5$ 区间。\n\n$$\\boxed{K=3\\ \\Rightarrow\\ \\text{中度蓄积}}$$\n\n#### 例题 5-2（简答）\n**题**：Ames 试验的原理是什么？用于检测何种毒性？\n**参考答案**：Ames 试验以**鼠伤寒沙门氏菌组氨酸缺陷型突变株**为指示菌：受试物若有**致突变性**，可使菌株发生**回复突变**，恢复自行合成组氨酸的能力而在缺组氨酸培养基上生长成菌落，菌落数显著增多即为阳性。常加**S9 肝匀浆**模拟体内代谢活化。主要用于**致突变**（间接预测致癌）的快速筛查。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（考点·闭卷默写）** 请展开论述：LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法\n\n<\/details>\n\n**Q2（考点·闭卷默写）** 请展开论述：急性毒性观察期 = 14 d\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：急性毒性观察期 = 14 d\n\n<\/details>\n\n**Q3（考点·闭卷默写）** 请展开论述：毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n\n<\/details>\n\n**Q4（考点·闭卷默写）** 请展开论述：Ames 试验：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：Ames 试验：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n\n<\/details>\n\n**Q5（考点·闭卷默写）** 请展开论述：Ames 阳性判定：菌落数 ≥ 2 倍自发对照\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：Ames 阳性判定：菌落数 ≥ 2 倍自发对照\n\n<\/details>\n\n**Q6（考点·闭卷默写）** 请展开论述：微核试验靶细胞：骨髓多染红细胞\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：微核试验靶细胞：骨髓多染红细胞\n\n<\/details>\n\n**Q7（考点·闭卷默写）** 请展开论述：彗星试验测：单细胞 DNA 损伤（断裂）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：彗星试验测：单细胞 DNA 损伤（断裂）\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：致畸敏感期：孕 6~15 d（器官形成期）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致畸敏感期：孕 6~15 d（器官形成期）\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：反应停 → 海豹儿（致畸学起点）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：反应停 → 海豹儿（致畸学起点）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：鱼类急性毒性：96 h LC₅₀；大型溞：48 h EC₅₀\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：鱼类急性毒性：96 h LC₅₀；大型溞：48 h EC₅₀\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n**Q1**：Ames 试验的原理及为何加 S9？  \nA：用组氨酸缺陷型沙门菌，在不含 His 之培养基中不能生长。受试物若致 his⁻ → his⁺ 回复突变，菌落数显著增多。S9 为大鼠肝匀浆上清，含 P450 等代谢酶，模拟体内 I 相代谢——许多致突变物为前致突变物，需代谢活化。\n\n**Q2**：写出常用四致试验。  \nA：**致突变**（Ames、SCE、微核、彗星）、**致畸**（3 段法）、**致癌**（长期动物试验、转化试验）、**致敏**（豚鼠最大化试验、局部淋巴结试验）。\n\n**Q3**：为何长期慢性毒性试验需 ≥ 6 月？  \nA：慢性效应（致癌、生殖、累积损伤）需长期低剂量暴露才显现；6 月以上方能涵盖大鼠 / 小鼠之大部分寿命，便于观察终生效应及制定 NOAEL 用于 RfD 推算。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：测定 LD₅₀ 的三种经典方法\n  - <details><summary>答案<\/summary> 寇氏法（Karber）、霍恩法（Horn）、上下法（序贯法） <\/details>\n- ____：急性毒性试验的常规观察期\n  - <details><summary>答案<\/summary> 14 d（2 周） <\/details>\n- ____（经口 LD₅₀, mg/kg）：剧毒 / 高毒 / 中等毒 / 低毒 / 微毒的分界\n  - <details><summary>答案<\/summary> <1 剧毒 ＜50 高毒 ＜500 中等毒 ＜5000 低毒 ≥5000 微毒 <\/details>\n- ____：蓄积试验所求指标及公式\n  - <details><summary>答案<\/summary> 蓄积系数 K = ED₅₀(累积) / LD₅₀(一次)；K 越小蓄积性越强 <\/details>\n- ____：亚慢性 / 慢性试验求得的两个关键剂量阈值\n  - <details><summary>答案<\/summary> NOAEL（最大无作用剂量）与 LOAEL（最小有作用剂量） <\/details>\n- ____：Ames 试验的指示菌与活化系统\n  - <details><summary>答案<\/summary> 鼠伤寒沙门菌组氨酸缺陷型(His⁻) 回复突变 + S9 体外代谢活化 <\/details>\n- ____：Ames 试验阳性判定标准\n  - <details><summary>答案<\/summary> 回变菌落数 ≥ 2 倍自发对照，且呈剂量-反应关系 <\/details>\n- ____：微核试验的常用靶细胞\n  - <details><summary>答案<\/summary> 骨髓嗜多染红细胞（PCE） <\/details>\n- ____：彗星试验（单细胞凝胶电泳）检测的损伤类型\n  - <details><summary>答案<\/summary> 单细胞 DNA 链断裂损伤 <\/details>\n- ____：致畸作用最敏感的发育阶段\n  - <details><summary>答案<\/summary> 器官形成期（着床后、啮齿类约孕 6~15 d） <\/details>\n- ____：环境毒理学\"三致\"效应\n  - <details><summary>答案<\/summary> 致突变、致癌、致畸 <\/details>\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 160 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L11_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L11_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L11_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L11_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L11_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L11_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L11_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loadin ntal-toxicology/L13_p070.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p070.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p071.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p071.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p072.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p072.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p074.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p074.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p075.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p075.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p077.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p077.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p078.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p078.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p079.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p079.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p081.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p081.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L13_p082.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L13_p082.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-6", "group": "章节精讲", "title": "第6章 · 环境化学物的安全性和健康危险度评价", "md": "# 第6章 · 环境化学物的安全性和健康危险度评价\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 已填\n\n> 本章为决策章——把第 1~5 章之毒理学数据转化为**安全标准**与**风险结论**。\n> 核心两套体系：**安全性评价**（4 阶段）与**健康危险度评价**（NAS 4 步法）。\n\n#### 一、核心概念（名词解释）\n\n- **安全性评价（Safety Evaluation）**：依据毒理学试验结果，结合人群暴露资料，评定化学物在一定接触水平下对人体健康**是否安全**之过程\n- **危险度评价（Risk Assessment）**：定量估测某接触水平下某化学物**致害人群健康之概率与程度**之过程\n- **危险度（Risk）**：在特定条件下接触某物，发生有害效应之**概率**（单位时间、人群、效应）\n- **可接受危险度（Acceptable Risk）**：社会愿接受之最大危险水平。一般定为终生致癌危险 **10⁻⁶ ~ 10⁻⁴**\n- **参考剂量（RfD, Reference Dose）**：人群（含敏感人群）终生暴露而**不致明显有害效应**之每日允许摄入量\n- **每日允许摄入量（ADI, Acceptable Daily Intake）**：与 RfD 类似，多用于食品添加剂/农残\n- **不确定系数 UF**：从动物外推至人、个体差异、亚慢性外推至慢性等之安全裕度，常 100~1000\n\n#### 二、安全性评价 · **四阶段法**（中国/WHO 体系）\n\n| 阶段 | 项目 | 目的 |\n|-----|------|------|\n| **第Ⅰ阶段·急性毒性试验** | LD₅₀、皮肤/眼黏膜刺激、致敏 | 初筛，分级 |\n| **第Ⅱ阶段·遗传毒理学+30 d 喂养** | Ames、微核、染色体畸变；亚急性毒性 | 是否进下一步 |\n| **第Ⅲ阶段·亚慢性毒性+生殖+代谢** | 90 d 喂养、致畸、代谢动力学 | 找 NOAEL，估 ADI |\n| **第Ⅳ阶段·慢性毒性+致癌试验** | 终生暴露、致癌长期试验 | 终极 NOAEL，是否致癌 |\n\n> 阶段递进：每阶段阳性 → 慎重决策；阴性 → 进下阶段；新化学物原则上需走完Ⅲ或Ⅳ。\n\n#### 三、健康危险度评价 · **NAS 四步法**（核心考点）\n\n```\n① 危害识别（Hazard Identification）\n   └ 此化学物是否致害？ 致何种害？\n       依据：动物试验、流行病学、构效关系（QSAR）、Ames 等\n       结论：定性（\"是\"/\"否\"/\"可能\"）\n\n② 剂量-反应关系评价（Dose-Response Assessment）\n   └ 多大剂量致多大害？\n       非致癌：从 NOAEL → RfD = NOAEL / UF\n       致癌：低剂量外推（线性、Q*、BMD 法）\n\n③ 暴露评价（Exposure Assessment）\n   └ 人群实际接触多少？\n       计算每日摄入量 ADD = (C × IR × ED) / (BW × AT)\n       涉介质（空气/水/食物/土）、人群（普通/敏感/职业）\n\n④ 危险表征（Risk Characterization）\n   └ 综合①②③，给定量结论\n       非致癌：HQ = ADD / RfD（HQ < 1 安全；> 1 有风险）\n       致癌：终生超额致癌危险 = ADD × SF（SF = 致癌斜率因子）\n```\n\n#### 四、关键公式（必背）\n\n##### 1. 非致癌物\n$$RfD = \\frac{NOAEL}{UF \\times MF}$$\n- UF：不确定系数（10×10×10×10 ≤ 10000，常见 100~1000）\n- MF：修正因子（1~10）\n- **危险商 HQ = ADD / RfD**：HQ ≤ 1 安全；> 1 风险升\n\n##### 2. 暴露剂量\n$$ADD = \\frac{C \\times IR \\times EF \\times ED}{BW \\times AT}$$\n- C：环境浓度；IR：摄入率；EF：暴露频率（d/y）；ED：暴露年限（y）\n- BW：体重；AT：平均时间（非致癌取 ED×365；致癌取 70×365）\n\n##### 3. 致癌物\n$$\\text{终生超额致癌危险 } R = ADD \\times SF$$\n- SF（致癌斜率因子）：单位剂量致癌概率\n- R = 10⁻⁶（百万分之一）通常视为可接受上限\n\n#### 五、不确定系数 UF 之常用值\n\n| 因子 | 倍数 | 含义 |\n|------|----:|------|\n| **种间差异**（动物→人） | ×10 | 人比动物可能更敏感 |\n| **种内差异**（人个体） | ×10 | 敏感人群（婴幼儿、孕妇、病人）|\n| **亚慢性→慢性** | ×10 | 数据来自亚慢性试验时 |\n| **LOAEL→NOAEL** | ×10 | 无 NOAEL 仅有 LOAEL 时 |\n| **数据库不全** | ×3 | 关键试验缺时 |\n\n> 常用合并：默认 UF = 100（种间×种内）；缺数据时叠加，最大可 ≤ 10000\n\n#### 六、致癌物之低剂量外推\n\n- **线性多阶段模型（LMS）**：US EPA 默认，假设无阈值\n- **基准剂量法（BMD, Benchmark Dose）**：拟合剂量-反应曲线，取 BMD₁₀ 之置信下限作起点\n- **PBPK 模型**：基于生理药代动力学外推\n\n#### 七、高频考点（速记）\n\n1. 安全性评价**四阶段法**：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌\n2. 危险度评价 **NAS 四步法**：危害识别 → 剂量反应 → 暴露评价 → 危险表征\n3. **RfD = NOAEL / UF**（必背）\n4. **HQ = ADD / RfD**：≤1 安全；>1 危\n5. 致癌危险 **R = ADD × SF**\n6. 可接受致癌危险：**10⁻⁶ ~ 10⁻⁴**\n7. UF 常用：种间 ×10，种内 ×10 → 默认 100\n8. ADD 公式中 BW 为体重，AT 为平均时间\n9. NOAEL 是定 RfD 之**关键参数**\n10. 致癌物原则上**无安全阈值**（LMS 假设）\n\n#### 八、典型思考题\n\n**Q1**：写出 NAS 危险度评价四步法及各步之核心问题。  \nA：\n- ① **危害识别**：此化学物是否致害？哪种害？（定性）\n- ② **剂量-反应关系评价**：多大剂量致多大害？（非致癌取 NOAEL，致癌做低剂量外推）\n- ③ **暴露评价**：人群实际接触多少？（计算 ADD）\n- ④ **危险表征**：综合上三步给定量结论（非致癌 HQ；致癌 R = ADD × SF）\n\n**Q2**：为何制定 RfD 要除以不确定系数 UF？  \nA：① 动物试验数据外推至人需考虑**种间差异**（×10）；② 人群个体差异（含敏感人群）（×10）；③ 试验时长不足、数据缺失等需额外修正。除以 UF 留出**安全裕度**保护人群。\n\n**Q3**：HQ = 1.5 意味着什么？应否管控？  \nA：HQ = ADD/RfD = 1.5 > 1，表明实际暴露已**超过参考剂量**之 1.5 倍，长期暴露有致害风险。应：① 核实暴露评估（C/IR 等）；② 加强源头管控（减污或换品）；③ 重点保护敏感人群。\n\n**Q4**：可接受致癌危险水平为何取 10⁻⁶ ~ 10⁻⁴？  \nA：10⁻⁶ 即百万人中一人因此致癌，被视为**可忽略风险**；10⁻⁴ 是**职业暴露**等情境之上限。两值是社会与科学折衷之结果，不同国家略异。\n\n#### 九、与前后章之关联\n\n- **承第 5 章**（实验方法）：本章用前章测得之 LD₅₀/NOAEL/致突变性等\n- **承第 4 章**（剂量-反应）：暴露评价中之剂量-反应关系正出此\n- **启第 7 章**（致癌物）：本章框架在化学致癌物之具体应用\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第6章<br/>环境化学物的安全性和健康危险度评价))\n    核心概念\n      安全性评价（Safety Evaluation）\n      是否安全\n      危险度评价（Risk Assessment）\n      致害人群健康之概率与程度\n      危险度（Risk）\n      概率\n      可接受危险度（Acceptable Risk）\n      10⁻⁶ ~ 10⁻⁴\n      参考剂量（RfD, Reference Dose）\n      不致明显有害效应\n      每日允许摄入量（ADI, Acceptable Daily Int…\n      不确定系数 UF\n    安全性评价 · 四阶段法\n      第Ⅰ阶段·急性毒性试验\n      第Ⅱ阶段·遗传毒理学+30 d 喂养\n      第Ⅲ阶段·亚慢性毒性+生殖+代谢\n      第Ⅳ阶段·慢性毒性+致癌试验\n    关键公式\n      危险商 HQ = ADD / RfD\n    不确定系数 UF 之常用值\n      种间差异\n      种内差异\n      亚慢性→慢性\n      LOAEL→NOAEL\n      数据库不全\n    致癌物之低剂量外推\n      线性多阶段模型（LMS）\n      基准剂量法（BMD, Benchmark Dose）\n      PBPK 模型\n    高频考点\n      安全性评价四阶段法：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性…\n      危险度评价 NAS 四步法：危害识别 → 剂量反应 → 暴露评价…\n      RfD = NOAEL / UF（必背）\n      HQ = ADD / RfD：≤1 安全；＞1 危\n      致癌危险 R = ADD × SF\n      可接受致癌危险：10⁻⁶ ~ 10⁻⁴\n      UF 常用：种间 ×10，种内 ×10 → 默认 100\n      ADD 公式中 BW 为体重，AT 为平均时间\n      NOAEL 是定 RfD 之关键参数\n      致癌物原则上无安全阈值（LMS 假设）\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L09_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L09_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L09_p016.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L09_p016.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L09_p031.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L09_p031.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p022.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p037.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p037.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 流程示意 · 健康危险度评价四步法\n\n```mermaid\nflowchart LR\n    A[\"1 危害鉴定<br/>定性: 是否有害\"] --> B[\"2 剂量-反应评定<br/>求 RfD/斜率因子SF\"]\n    B --> C[\"3 暴露评价<br/>求日均暴露量 ADD\"]\n    C --> D[\"4 危险度表征<br/>致癌风险/非致癌HQ\"]\n```\n\n#### 例题 6-1（计算 · 安全限值 ADI）\n**题**：某农药动物实验得 $\\mathrm{NOAEL}=10\\ \\mathrm{mg/(kg\\cdot d)}$，取安全系数 $SF=100$。求每日允许摄入量 ADI；若成人体重 $60\\ \\mathrm{kg}$，求每日允许总摄入量。\n**解**：\n1. $\\mathrm{ADI}=\\dfrac{\\mathrm{NOAEL}}{SF}=\\dfrac{10}{100}=0.1\\ \\mathrm{mg/(kg\\cdot d)}$。\n2. 每日允许总量 $=\\mathrm{ADI}\\times BW=0.1\\times 60=6\\ \\mathrm{mg/d}$。\n\n$$\\boxed{\\mathrm{ADI}=0.1\\ \\mathrm{mg/(kg\\cdot d)},\\quad 每日允许总摄入\\approx 6\\ \\mathrm{mg/d}}$$\n\n#### 例题 6-2（计算 · 致癌风险）\n**题**：某致癌物经口斜率因子 $SF=0.5\\ \\mathrm{(mg/(kg\\cdot d))^{-1}}$，人群终生日均暴露量 $ADD=2\\times10^{-5}\\ \\mathrm{mg/(kg\\cdot d)}$。求终生超额致癌风险 $R$，并对照可接受水平（$10^{-6}\\!\\sim\\!10^{-4}$）判断。\n**解**：低剂量近似 $R=SF\\times ADD=0.5\\times 2\\times10^{-5}=1\\times10^{-5}$。\n\n$$\\boxed{R=1\\times10^{-5}\\ \\in[10^{-6},10^{-4}]\\ \\text{(处于可接受区间内)}}$$\n\n#### 例题 6-3（计算 · 非致癌危害商 HQ）\n**题**：某非致癌物参考剂量 $RfD=0.02\\ \\mathrm{mg/(kg\\cdot d)}$，实际日均暴露量 $ADD=0.05\\ \\mathrm{mg/(kg\\cdot d)}$。求危害商 $HQ$ 并判断风险。\n**解**：$HQ=\\dfrac{ADD}{RfD}=\\dfrac{0.05}{0.02}=2.5$。$HQ>1$ 表示暴露超过参考剂量，**存在非致癌健康风险**。\n\n$$\\boxed{HQ=2.5>1\\ \\Rightarrow\\ \\text{有非致癌风险，需采取控制措施}}$$\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 安全性评价（Safety Evaluation）？\n\n<details><summary>参考答案<\/summary>\n\n依据毒理学试验结果，结合人群暴露资料，评定化学物在一定接触水平下对人体健康是否安全之过程\n\n<\/details>\n\n**Q2（名词解释）** 危险度评价（Risk Assessment）？\n\n<details><summary>参考答案<\/summary>\n\n定量估测某接触水平下某化学物致害人群健康之概率与程度之过程\n\n<\/details>\n\n**Q3（名词解释）** 危险度（Risk）？\n\n<details><summary>参考答案<\/summary>\n\n在特定条件下接触某物，发生有害效应之概率（单位时间、人群、效应）\n\n<\/details>\n\n**Q4（名词解释）** 可接受危险度（Acceptable Risk）？\n\n<details><summary>参考答案<\/summary>\n\n社会愿接受之最大危险水平。一般定为终生致癌危险 10⁻⁶ ~ 10⁻⁴\n\n<\/details>\n\n**Q5（名词解释）** 参考剂量（RfD, Reference Dose）？\n\n<details><summary>参考答案<\/summary>\n\n人群（含敏感人群）终生暴露而不致明显有害效应之每日允许摄入量\n\n<\/details>\n\n**Q6（名词解释）** 每日允许摄入量（ADI, Acceptable Daily Intake）？\n\n<details><summary>参考答案<\/summary>\n\n与 RfD 类似，多用于食品添加剂/农残\n\n<\/details>\n\n**Q7（名词解释）** 不确定系数 UF？\n\n<details><summary>参考答案<\/summary>\n\n从动物外推至人、个体差异、亚慢性外推至慢性等之安全裕度，常 100~1000\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：安全性评价四阶段法：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：安全性评价四阶段法：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：危险度评价 NAS 四步法：危害识别 → 剂量反应 → 暴露评价 → 危险表征\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：危险度评价 NAS 四步法：危害识别 → 剂量反应 → 暴露评价 → 危险表征\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：RfD = NOAEL / UF（必背）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：RfD = NOAEL / UF（必背）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：HQ = ADD / RfD：≤1 安全；>1 危\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：HQ = ADD / RfD：≤1 安全；>1 危\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：致癌危险 R = ADD × SF\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致癌危险 R = ADD × SF\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：可接受致癌危险：10⁻⁶ ~ 10⁻⁴\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：可接受致癌危险：10⁻⁶ ~ 10⁻⁴\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：UF 常用：种间 ×10，种内 ×10 → 默认 100\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：UF 常用：种间 ×10，种内 ×10 → 默认 100\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：ADD 公式中 BW 为体重，AT 为平均时间\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：ADD 公式中 BW 为体重，AT 为平均时间\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：NOAEL 是定 RfD 之关键参数\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：NOAEL 是定 RfD 之关键参数\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：致癌物原则上无安全阈值（LMS 假设）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：致癌物原则上无安全阈值（LMS 假设）\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n**Q1**：写出 NAS 危险度评价四步法及各步之核心问题。  \nA：\n- ① **危害识别**：此化学物是否致害？哪种害？（定性）\n- ② **剂量-反应关系评价**：多大剂量致多大害？（非致癌取 NOAEL，致癌做低剂量外推）\n- ③ **暴露评价**：人群实际接触多少？（计算 ADD）\n- ④ **危险表征**：综合上三步给定量结论（非致癌 HQ；致癌 R = ADD × SF）\n\n**Q2**：为何制定 RfD 要除以不确定系数 UF？  \nA：① 动物试验数据外推至人需考虑**种间差异**（×10）；② 人群个体差异（含敏感人群）（×10）；③ 试验时长不足、数据缺失等需额外修正。除以 UF 留出**安全裕度**保护人群。\n\n**Q3**：HQ = 1.5 意味着什么？应否管控？  \nA：HQ = ADD/RfD = 1.5 > 1，表明实际暴露已**超过参考剂量**之 1.5 倍，长期暴露有致害风险。应：① 核实暴露评估（C/IR 等）；② 加强源头管控（减污或换品）；③ 重点保护敏感人群。\n\n**Q4**：可接受致癌危险水平为何取 10⁻⁶ ~ 10⁻⁴？  \nA：10⁻⁶ 即百万人中一人因此致癌，被视为**可忽略风险**；10⁻⁴ 是**职业暴露**等情境之上限。两值是社会与科学折衷之结果，不同国家略异。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：依据毒理学试验结果，结合人群暴露资料，评定化学物在一定接触水平下对人体健康是否安全之过程\n  - <details><summary>答案<\/summary> 安全性评价（Safety Evaluation） <\/details>\n- ____：定量估测某接触水平下某化学物致害人群健康之概率与程度之过程\n  - <details><summary>答案<\/summary> 危险度评价（Risk Assessment） <\/details>\n- ____：在特定条件下接触某物，发生有害效应之概率（单位时间、人群、效应）\n  - <details><summary>答案<\/summary> 危险度（Risk） <\/details>\n- ____：社会愿接受之最大危险水平。一般定为终生致癌危险 10⁻⁶ ~ 10⁻⁴\n  - <details><summary>答案<\/summary> 可接受危险度（Acceptable Risk） <\/details>\n- ____：人群（含敏感人群）终生暴露而不致明显有害效应之每日允许摄入量\n  - <details><summary>答案<\/summary> 参考剂量（RfD, Reference Dose） <\/details>\n- ____：与 RfD 类似，多用于食品添加剂/农残\n  - <details><summary>答案<\/summary> 每日允许摄入量（ADI, Acceptable Daily Intake） <\/details>\n- ____：从动物外推至人、个体差异、亚慢性外推至慢性等之安全裕度，常 100~1000\n  - <details><summary>答案<\/summary> 不确定系数 UF <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 91 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L09_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L09_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L09_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L09_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L09_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L09_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L09_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pd
