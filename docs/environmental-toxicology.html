n#### 图1.组氨酸营养缺陷实验\n\n---\n\n<!-- page 57 -->\n\n![page 57](page_057.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 致突变作用的评价\n\n#### 常用的致突变试验方法\n\n#### ②微核试验\n微核：染色体或染色单体收到突变作用的影响想，形成无着丝点的短片，或者纺锤\n体受到损伤失去染色体，在细胞分裂的后期无法随着纺锤丝到达两级而遗留在细胞\n质中，形成N个规则的小体，这些小体的嗜染性同细胞核相似但比主核小的多。\n\n#### Micronucleus\n简便、\n快速、\n\n#### 可靠\n\n---\n\n<!-- page 58 -->\n\n![page 58](page_058.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 致突变作用的评价\n\n#### 常用的致突变试验方法\n\n#### ③染色体畸变试验\n基本原理：利用显微镜直接观察，生物体细胞受致突变物作用后，染\n\n#### 色体发生数目和结构改变的情况\n\n---\n\n<!-- page 59 -->\n\n![page 59](page_059.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 致突变作用的评价\n\n#### 常用的致突变试验方法\n\n#### ④显性致突变试验\n\n#### 检测生殖细胞染色体的突变\n\n#### 如染色体断裂所导致的缺失或重复\n如染色体重排形成的不平衡染色体的分离或不分离，即非整倍体\n注意：干扰因素多、灵敏性不够高、可校正体外实验或其他系统所得到的阳性\n结果，在实际工作中，为了得到更准确的结论，往往需要做一组致死突变试验\n在安全毒理学评价程序中，致死突变试验要求对上述四种试验中的任意三项进\n行实验，最后再根据结果进行判定，得出实验结论。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 短肢畸形\n反应停导致近万名畸形儿的诞生，因此世界上开始大规模的研究致畸药物\n发现不少药物具有不同程度的致畸作用，如抗生素类，性激素类药物。\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n把凡是在一定剂量下，能通过母体对胚胎正常反应过程造成干扰，引起胚\n胎发育障碍而导致子代出生后，发生畸形的物质称为致畸物或致畸原\n把致畸物通过母体作用于胚胎而引起胎儿畸形的现象称为致畸作用\n评定外来化学物是否具有致畸作用的试验称为致畸试验\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n胚胎于致畸物发生接触时，因为发育阶段不同，导致敏感性不同\n器官形成期中胚胎对致畸物最为敏感，因此称为敏感期或危险期\n同一致畸物与胚胎接触时，因胚胎发育阶段不同，引起不同的致畸;\n风疹病毒，孕妇在不同时期感染，可引起不同的先天畸形;\n妊娠第四周感染可引起无脑儿或脊髓裂\n\n#### 妊娠第五周感染可引起无肢畸形\n\n#### 妊娠6-9周感染可引起牙畸形\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n\n#### 致畸作用表现出明显的种属差异\n不同种属的动物对致畸物的代谢过程和本身胎盘结构均不同，从而导致不\n\n#### 同种系的动物表现出不同的敏感性\n反应停对兔子和人有致畸作用，但对其他的哺乳动物不能引起致畸\n\n---\n\n<!-- page 64 -->\n\n![page 64](page_064.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n\n#### 现实生物中引起的致畸作用\n物理因素中的电离辐射（x光射片）\n\n#### 生物因素中病毒的感染\n\n#### 天然条件下的出生缺陷\n水硬度有关的中枢系统畸形的发生；\n\n#### 水气象有关的胎儿畸形\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n\n#### 化学因素（甲基汞、环境激素）\n\n---\n\n<!-- page 65 -->\n\n![page 65](page_065.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n\n#### 现实生物中引起的致畸作用\n\n#### 天然条件下的出生缺陷\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n高放射本底地区的辐射主要来自地壳中的铀、针、钾－40等放射性核素，以及宇宙射线。例如：\n·中国阳江：年有效剂量约6.4mSv（全球平均为2.4mSv），主要由地表射线和氢气贡献。\n·印度喀拉拉邦：沿海地区因独居石砂矿（富含铀、针）导致辐射水平达10-20mSv/年。\n·伊朗拉姆萨尔：部分居民区室内氢浓度高达31，000Bq/m²，年有效剂量达71mSv。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n用于检测某些环境污染物能否通过妊娠母体引起胚胎畸形的一种动物实验方法。\n\n#### 致畸试验步骤\n\n#### 代谢过程要与人类相近\n\n#### 受试生物的选择\n胎盘与人类胚胎构造相似（包括胚胎的层数和厚度）\n\n#### 体型小\n动物试验选取原则 易繁殖 多采用大鼠、小鼠和家兔实验动物\n\n#### 价格低廉\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n剂量分组：通常根据试验目的和要求决定\n）只做有无致畸作用的定性检测，则剂量组较少；\n若还需要探讨毒性作用的靶器官，则剂量组增多；\n在正式试验前要先做预实验，用于确定实验所需试验剂量范围\n若未做预实验，则一般以1/30-1/2的LD5o为最高剂量组，\n1/30-1/100LD50为低剂量组，\n按等比例差在高低剂量组之间插入中间剂量组\n5以交配后确定已受精的雌性动物为计数对象（鼠类：15-20只；家兔：7-8只）\n6在进行实验时，除了各试验组外，还应同时设立阴性和阳性对照组\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n剂量分组：通常根据试验目的和要求决定\n7实验处理上，需要先将性成熟但为交配过的雌鼠和雄鼠同笼过夜，确定雌鼠受\n孕后，推算孕龄，在胚胎的“敏感期”进行受试物暴露\n致畸实验常用的终点指标：暴露完之后的解部，观察\n实验动物的解剖时间为分娩前1-2天为宜，对胚胎的外部骨骼和内脏进行检查，\n并且通过多方面分析致畸试验结果。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n2.环境化学物特殊毒性及其评价\n\n#### 恶性肿瘤怎么产生的\n：框在点击“”时会进行转换，用时则会变为可点击的视频。框移位和\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌\n恶性的肿瘤，严重威胁人类健康的主要疾病之一；\n人类肿瘤80-90%与环境因素有关，包括物理、化学、生物因素；\n病因分析，人类肿瘤80-85%与化学因素有关\n把诱发肿瘤的化学物质称为化学致癌物\n（①有机化学物，②天然化学物，③无机化学物，4合成化学物）\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌\n肿瘤形成过程：\n1引发阶段：指正常细胞在化学致癌物直接或间接作用下转变为癌前细胞的过程\n2促长阶段：经过引发的癌细胞不断增殖，直至形成临床上可被检出的肿块过程\n③进展阶段：指引发细胞群进一步的表型改变；包括恶性前型转变为恶性型细胞等过程\n毒性方面化学致癌物的致癌作用与一般毒性作用在许多方面有一定的相似之处\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌物在体内也进行生物转化，但同时也有其自身的特点\n1化学致癌物引起的生物学效应，具有持久性和迟发性\n②在动物实验中，当剂量相等时，多次给予受试物比一次给予所产生的效应更大\n③从机理来看致癌作用和宿主细胞的遗传物质或其他细胞大分子的相互作用有关\n致癌作用的本质是致癌物通过DNA加合物形成、氧化损伤或\n表观遗传调控，引发体细胞突变并破坏细胞生长调控网络。这\n一过程具有剂量依赖性和时间依赖性\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ①体细胞突变学说\n\n#### 化学\n\n#### 突变\n致癌因素 物理 体细胞((DNA) →致癌\n\n#### 生物\n\n#### 致癌形成的基础是体细胞发生突变\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ②分化障碍学说\n\n#### 干扰 分化\n致癌因素 细胞 ?紊乱 癌变\n\n#### 增殖\n细胞癌变只需要细胞分化过程有关的基因调控过程受致癌因素感染，\n\n#### 使细胞分化和增殖发生素乱\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ③癌基因学说\n正常情况下，癌基因处于阻遏状态，只有当细胞内有关的调节机\n制遭到破坏的情况下，癌基因才能表达，导致癌变形成肿瘤;\n不同的致癌学只是侧重点不同，互有交叉，可能是在致癌作用的不同阶段\n所起作用不同而已。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n致癌试验是一种特殊的慢性毒性试验，目的是检验环境污染物或其代谢物是否具\n\n#### 有致癌或诱发肿瘤作用\n致癌试验重要方法：完整的哺乳动物长期试验\n一些短期快速筛检试验方法：满足大量外来化合物进行致癌试验\n1哺乳动物细胞体外转化法：有无致癌性的重要方法\n2优点：周期短、经济、方便、能直接与靶细胞作用\n当一种化学物已经通过短期试验证明其具有潜在致癌性或者其化学结构与某种已\n知致癌物十分近似，又在人类社会中具有实际应用价值时，应进行长期动物诱癌\n\n#### 实验\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 诱癌动物试验与慢性试验类似\n首选啮齿类动物为受试生物：具有诱发肿瘤的感受性强、生物周期短、繁殖快、\n费用低等优点。\n\n#### 存在问题\n1高剂量的动物诱癌试验结果与人类实际接触的“低剂量“致癌物不同\n2其次人体和动物体内代谢酶系统存在着差别\n③动物“自发”肿瘤率在不同动物种系之间差别很大，人与动物之间可能也存在很大差别\n因此动物试验的结果不能完全代表人体的生物学改变\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 剂量分组及染毒途径和期限\n设置对照组、最大耐受剂量和两个中间剂量（共4组）\n设置对照组、最大耐受剂量和半数最大耐受剂量（共3组）\n\n#### 每组雌雄动物各74只\n体重变化不应超过平均体重的±20%\n\n#### 染毒途径要模拟人体接触途径\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 观察指标\n\n#### ①一般情况\n试验头三个月每周称一次动物体重，以后每两周称一次。\n消化道染毒时应计算食物或饮水消耗量\n每天观察两次动物，发现死亡、垂死的和临床异常的动物，应详细记载。\n试验第15个月时每组雌雄动物各处死10只，其余在第24个月处死，详细尸检\n和病理检查，同时进行血液生化检查\n\n#### ②肿瘤发生情况\n记录肿瘤出现时间、部位、大小、数目、外形、硬度和发展情况\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 观察指标\n\n#### ③病理学检查\n·作完整的尸体解剖，检查所有器官组织。\n\n#### 4肿瘤发生率\n肿瘤发生率三天 试验终了时患肿瘤动物总数\n有效动物总数（最早出现肿瘤时的存活动物总数） X100%\n\n#### 5潜伏期\n以各试验组第一例肿瘤发现的时间作潜伏期。\n\n#### 6平均肿瘤数\n一个器官出现多个肿瘤或多个器官出现肿瘤，都可使平均肿瘤数增加，此数表示肿瘤的多\n发性。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 结果判定\n①肿瘤只发生在受试组动物，对照组无肿瘤，或受试组出现对照组没有的肿瘤类型\n2受试组与对照组动物均发生肿瘤，但受试组发生率高\n\n#### ③受试组的平均肿瘤数高于对照组\n4受试组与对照组的肿瘤发生率虽无显著差异，但受试组肿瘤发生的潜伏期短。\n上述四条中，通过统计学分析，任何一条有显著性差异并存在剂量反应关系是即\n\n#### 可认为受试物的致癌试验为阳性\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n2.环境化学物特殊毒性及其评价\n\n#### 谢谢\n"}, {"id": "pdf-008-3", "group": "原始课件 · PDF原文", "title": "008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素", "md": "# 第四章 环境污染物的毒作用及其影响因素\n\n> 来源: 008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素.pdf\n> 页数: 50\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第四章 环境污染物的毒作\n\n#### 用及其影响因素\n\n#### 2026年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n主要内容：\n\n#### 第一节：环境污染物的毒作用\n\n#### 第二节：毒作用机制\n\n#### 第三节：影响毒作用的因素\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n2009年2月20日，因自来水水源受到酚类化合物污染，江苏盐城大面积断水近67\n小时，20万市民生活受到影响，占该市市区人口的五分之二。据调查，制造这起\n污染事件的竟是被评为当地标兵企业的盐城新化工厂，该厂为减少治污成本，居\n然趁大雨天偷排了30吨化工废水，最终污染了水源地。事后，该厂两名负责人因\n投放危险物质罪”分别被判处10年和6年有期徒刑，这也是我国首次以这一罪\n名对环境污染事件作出刑事处罚。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n>2015年年底开始，江苏省常州市外国语学校先后有641名学生被送到医院进行检\n查，有493人出现皮炎、湿疹、支气管炎、血液指标异常、白细胞减少等异常症\n状，个别的还被查出了淋巴癌、白血病等恶性疾病。学校紧邻三家化工厂，常隆\n化工、长宇化工和华达化工，生产像克百威、灭多威、异丙威、氰基萘酚等剧毒\n类产品，将有毒废水直接排出厂外，将危险废物偷偷埋到了地下，对环境带来了\n很大隐患。\n>更令人震惊的是，该地块地下水和土壤中的氯苯浓度分别超标达94799倍和\n78899倍，相当于一枚“生态炸弹”，按规定，此地块上不应有长期居住人群。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n山东章丘危废倾倒案：非法处置危废致多人死亡\n张林德、陈继新租赁山东省章丘市普集镇上皋村已废弃的明皋2号煤矿井院落，专\n门收集、倾倒危险废物。2015年10月21日凌晨2时许，张林德、陈继新雇用车号\n为鲁CB6590的罐车运输化工废液向煤矿井内倾倒时，张林德、陈继新、罐车司\n机和押运员共4人中毒死亡。\n山东省环保厅在接到举报后立即派出应急处置指导组赶赴现场指导应急处置工作。\n济南、章丘市政府迅速启动应急预案。截至2016年1月21日，全面完成对受污染\n区域的惟幕注浆，共计打孔106个，污染区域已经实现全封闭。此案共牵出7家违\n法化工企业。涉嫌犯罪的山东省内5家化工企业，已有10名企业相关负责人被刑\n事拘留、取保候审或执行逮捕，案件累计对25名涉案嫌疑人采取刑事强制措施，\n其中12人已被批准逮捕，3人在逃。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 第一节：环境污染物的毒作用\n\n#### >毒物、毒性及中毒\n\n#### >毒作用及其分类\n\n#### >损害作用及非损害作用\n\n#### >效应和反应\n>剂量-效应关系和剂量-反应关系\n\n#### >表示毒性的常用参数\n\n#### >毒作用带\n\n#### >毒性单位与分级\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 4.1环境污染物的毒作用\n1.毒物 (Toxicant)\n按一定条件接触后，以较小的剂量作用机体\n就能引起生理、生化功能或正常组织结构的器质\n性病理改变，甚至引起死亡的化学物质。\n2.毒性 (Toxicity)\n化学物质能引起机体损害的性质和能力。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 4.1环境污染物的毒作用\n3.中毒（toxication）\n外源性化学物质引起机体病理性功能改变或\n器质性病变的现象。\n根据污染物的暴露特点和中毒发生发展的快\n慢，分为急性中毒、亚慢(急)性中毒和慢性中毒。\n根据毒作用强度和性质判定环境污染物的毒\n性大小。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 4.1环境污染物的毒作用\n4.毒作用 (toxic effect)\n又称毒效应或毒性效应。指化学物质对机体所致的不良\n或有害的生物学变化，故又称不良效应、损伤作用或损害作\n用。\n毒作用与毒性的区别？\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 毒作用分类\n>按毒作用发生的部位：局部、全身；\n按毒作用损伤恢复情况：可逆、不可逆；\n>按毒作用引|发时间的快慢：速发性、迟发性\n\n#### 过敏反应\n\n#### >特异体质反应\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 损害作用与非损害作用\n>损害作用：机体发生的不可逆/可逆但超出正常生理调节范\n围的变化。\n>非损害作用：特点是不引起生物机体形态、生长发育和寿\n命的改变，机体可以通过自身调节恢复的轻微变化。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 损害作用与非损害作用\n：框在点击“”时会进行转换，用时则会变为\n可点击的视题。框移位和\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 4.1环境污染物的毒作用\n剂量：给予机体的或机体接触的外源化学物质的数量。\n效应：表示一定剂量外来化合物与机体接触后可引起\n的生物学变化，能用计量资料表达其强度，是属量效应。\n反应：表示接触某一化学物质的群体出现某种效应的\n个体数在群体中所占的比率。属于计数资料，没有强度\n差别，不能以具体数值表示，是属质效应。\n\n#### 剂量-效应VS剂量-反应\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 4.1环境污染物的毒作用\n2.剂量-效应关系和剂量-反应关系曲线\n剂量-效应关系和剂量-反应关系均可用曲线表示，即以表示\n效应强度的计量单位或表示反应的百分率或比值为纵坐标，以剂量\n为横坐标绘制散点图所得曲线。\n（1）直线型\n（2）抛物线型\n（3）S形曲线\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 剂量-反应曲线图\n\n#### 100 100\n\n#### 反应强度（%）\n\n#### 死亡率（%）\n\n#### 剂量 剂量\n（1）直线型 （2）抛物线型\n\n#### 死亡率（概率单位）\n\n#### 死亡率（%）\n\n#### 对数剂量 对数剂量\n（3）S形曲线 （4）概率-对数剂量直线\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 表示毒性的常用参数\n致死剂量（Lethaldose，LD2.最小有作用剂量 （MEL）\n3.最大无作用剂量（MNEL4.急性毒作用带(Zac)\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 4.1环境污染物的毒作用\n1.半数致死剂量LD5o或浓度LC50\n绝对致死量 半数致死量 最小致死量 最大耐受量\n(LD100) (TT) (MLD) (MTD)\n）半数致死量 （LD5o）又称致死中量，\n指引1起一群个体50%死亡所需剂量\n(mg/kg)或浓度（LC5o）（mg/m3和\nmg/L）。\n\n#### 最重要判断毒物毒性大小的基础\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 4.1环境污染物的毒作用\n2.半数效应剂量\n致死剂量 半数效应 最小有作用最大无作用急性毒作\n(LD) 剂量(ED5o) 剂量(MEL) 剂量(MNEL）用带(Zac)\n·半数效应剂量(EDso)指外源化学物在一定\n的时间内按一定的方式与机体接触，引起机\n体某项生物效应发生50%改变所需的剂量。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 4.1环境污染物的毒作用\n3.最小有作用剂量\n半数效应 最小有作用最大无作用急性毒作\n\n#### 致死剂量\n剂量(ED5so) 剂量(MEL)\n(LD) 剂量(MNEL）用带(Zac)\n·最小有作用剂量：指能使机体发生某种异\n常变化所需最小剂量，即能使机体开始出现\n毒性反应的最低剂量。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 4.1环境污染物的毒作用\n4.急性毒作用带 (Zac)\n致死剂量 半数效应最小有作用最大无作用 急性毒作\n(LD) 剂量(ED5o) 剂量（MEL） 剂量（MNEL） 用带(za)\n·急性毒作用带：指半数致死剂量与急性阀剂量\n的比值。Zac值小说明化学物质从产生轻微损害到\n导致急性死亡的剂量范围窄，引起死亡的危险性\n大；反之说明引起死亡的危险性小。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 4.2毒性作用的机理\n分子水平：\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰细胞内钙稳态\n\n#### 自由基对生物大分子的氧化损伤\n\n#### 毒物与生物大分子共价结合\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰正常受体-配体的相互作用\n受体学说：认为膜上存在受体，它是一种大分子蛋白质能\n对特定生物活性物质具有识别能力并可选择性地与其结合\n\n#### 生物膜\n配 受 反 离子或分子传输 生物效应\n\n#### 应体 酶的灭活或激活\n\n#### 体 体 神经递质或激素释放\n\n#### 识别换能 VIIA 放大\n图4-5受体与配体相互结合模式（引自Cooper等，1982）\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰正常受体-配体的相互作用\n受体(receptor)是组织细胞的生物\n\n#### 大分子，激素或金属离子与配体\n(ligand)相结合，形成配体-受体复\n\n#### IRS1 IRS1\n合物，引起毒性效应。\n·环境污染物尤其是神经毒物和内分泌干扰物，通过\n千扰正常受体－配体相互作用，引起毒性。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 生物膜破坏\n，化学毒物对生物膜的成分造成影响；\n十六烧基吡啶 hydrophobictail\n化学毒物对生物膜上的酶活性造成影响； /ridinium benzalkoni\n\n#### 化学毒物对膜生物物理性质的影响\ncetylpyridinium QUA\n对膜通透性的影响;\n对膜流动性的影响；\n对膜表面电荷的影响。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 生物膜破坏--关键分子机制\n\n#### 受体-配体干扰 (重点）\n\n#### 正常情况：配体受体结合\n受到干扰：毒物占据受体位置，信号中断\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞钙稳态的影响损伤\n钙离子是集体的第二信使之一，在细胞功能的调节中起重\n要作用，如神经传导、肌肉收缩、细胞增殖和分化、细胞\n形态发生、细胞衰老等。\n\n#### 内10-7~10-8mol/L\n\n#### 细胞\n\n#### 外10-mol/L\n\n#### 与CAM结合 神经转导\nCa2+ cAMP作用 肌肉收缩\n\n#### 激活PKC 细胞分化和增值\n\n#### 离子通道开放 细胞分泌\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞钙稳态的影响损伤\nVOCCa2+结合蛋白 Ca2+泵\n\n#### ROC. 肌质网\n\n#### Na+-Ca2+载体\n线粮体[Ca2+]i:10-7mol/L\n\n#### [Ca²]e:10-mol/L\n硝基酚、醌、过氧化物、醛类、二恶英、卤化链烷、链\n烯和Cd2+、Pb2+、Hg2+等重金属离子均能干扰细胞内钙稳\n态，从而引起细胞损伤或死亡。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 自由基对生物大分子的氧化损伤\n\n#### 脂质过氧化对生物膜的损伤\n1.蛋白变性\n\n#### 自由基 2.细胞膜流动性\n3.酶活性\n4.细胞肿胀和溶解\n\n#### /自由基性质环境毒物\n5.致突变，染色体断裂\n√环境毒物与多不饱和！\n6.致畸胎\n\n#### 脂肪酸的作用产物\n\n#### 毒物代谢物\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 自由基对生物大分子的氧化损伤\n对组织器官的细胞有选择性致死毒性\n\n#### 体细胞 细胞突变和癌变\n\n#### DNA损伤和\n\n#### 染色体异常\n\n#### 生殖细胞\n\n#### 遗传性疾病\n\n#### 致畸作用\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 毒物与大分子共价结合\n共价结合学说：认为外源性化学物质和其他活性代谢产物\n与机体的重要生物大分子如蛋白质、核酸、酶和膜脂质等\n进行共价结合，改变生物大分子的化学结构与生物学功能，\n从而引起一系列病理、生理变化，是细胞损害的重要机制\n\n#### 之一\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 毒物与大分子供价结合\n\n#### 细胞毒性和死亡\n\n#### 过敏反应\n\n#### 蛋白质 致癌作用\n\n#### 抑制酶活性\n\n#### 环境毒物及 共价结合\n\n#### 代谢产物\n\n#### 细胞毒性\n\n#### 影响DNA-蛋白质\n\n#### 核酸 相互作用\n\n#### 致突变作用\n\n#### 加合物 激活癌基因\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n一、毒物因素\n（一）结构与毒性\n研究外源化学物的结构与毒性之间的关系，\n有助于通过比较来预测新化合物的生物活性、\n作用机理和安全限量范围。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n1.化学结构与毒作用性质\n\n#### 结构有 毒作用性质\n\n#### 受体匹配性 阻断信号/干扰功能\n\n#### 不稳定、易断裂 氧化损伤\n\n#### 活泼基团 不可逆结合损伤\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 化学结构与毒性大小\n(1）同系物的碳原子数\n碳氢化合物（烷、醇、酮等）：\n当碳原子数在2~7之间时：\n\n#### 随C数的增加毒性增加\n·超过一定限度(7~9个）后：\n\n#### 随C数的增加毒性下降\n，当碳原子数相同时：\n直链的>支链的；成环的>不成环的\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 化学结构与毒性大小\n(2) 卤素取代\n·化学分子结构式中增加卤素，可使分子极性增\n加，更易与酶系统结合，从而毒性增强\n肝脏毒性：CCL>CHC1>CH2CL>CHC1\n麻醉作用：CHCI>CH2C1>CHCI>CH4\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n### 4.3.1环境化学物的结构与性质\n（3）构型\n同分异构体：一般对位>邻位>间位\n·旋光异构：由于受体或酶一般只能与一种旋光\n异构体结合而产生生物效应，故同一化合物的\n\n#### 不同旋光异构体的毒性不同\nL-异构体易与酶、受体结合，具有生物活性，\n\n#### D-异构体则反之\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n#### 化学结构与毒性大小\n(4）分子饱和度\n·分子中不饱和键增多可使化学物活性增大，毒\n\n#### 性增强\n对眼角膜的刺激作用：丙烯醛>丙醛 丁烯醛>丁醛\n\n#### 丙烯醛 丙醛 丁烯醛 丁醛\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### 理化性质与毒性\n1.水溶性\n\n#### 毒物在水中溶解度越大，毒性越大\n2.脂溶性\n脂溶性物质易在脂肪中蓄积，侵犯神经系统\n3.挥发度和蒸气压\n化学物凡是容易挥发或蒸气压大者，都容易\n污染空气，病抑郁经呼吸道吸入机体。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n### 4.3.2影响毒性的机体因素\n种属和个体差异 水生生物测试表明，对于化学污染\n物，节肢动物一般比鱼类更敏感，\n\n#### 鱼类比两栖幼体类更敏感\n\n#### 性别与激素\n\n#### 影响机体对环境化学\n\n#### 年龄\n\n#### 物的敏感性和耐受性\n\n#### 营养与健康状况\n\n#### 生物节律\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n### 4.3.3影响毒性的非生物因素\n\n#### 气温\n\n#### 环境因素\n\n#### 气压\n\n#### pH和碱度\n酸性较强（pH<5）条件下，氢离子会对水生生物产生危害；\npH也会影响溶液中亲脂性那部分金属形态的生物可利用性\n\n#### 盐度\n盐度对痕量金属在生物相中富集的影响会受到生物因素\n\n#### 和化学因素的影响\n\n#### 硬度\n硬度会影响有机表面活性剂的毒性，降低金属的毒性\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n### 4.3.4环境化学物的联合毒性作用\n两种或两种以上的化学物同时或短期内先后作\n用于机体所产生的综合毒性作用，称为化学物的联\n合毒性作用。\n\n#### 相加作用\n\n#### 联合作用\n\n#### 协同作用\n\n#### 拮抗作用\n\n#### 独立作用\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n（一）联合毒性作用类型\n相加作用：化学结构相似、靶器官和靶分子相同、\n作用机理类似的多种环境化学物，同时作用于机体所\n产生的生物学作用的总强度是各自单独作用的总和。\n\n#### 1+1=2\n\n#### 丙稀腈、乙晴\n\n#### 大部分刺激性气体的刺激\n具有麻痹作用的化合物对机体的刺激\n两种有机磷农药对胆碱酯酶的抑制作用\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n（一）联合毒性作用类型\n协同作用：两种以上环境化学物同时作用于机体，所\n产生毒性作用强度超过各化学物单独作用强度的总和。\n与促进吸收、延迟排出、干扰体内代谢过程有关。\n\n#### 1+1>2\n\n#### 马拉硫磷、苯硫磷\n\n#### 由于苯硫磷对促进肝脏降解\n\n#### 马拉硫磷的酯酶有抑制作用\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n（一）联合毒性作用类型\n增强作用：\n，一种环境化学物本身对机体并无毒性，但能使\n同时进入机体的另一种环境污染物的毒性增强。\n·无毒化合物通过影响另一种化合物的代谢活化、\n吸收和排除有关。\n\n#### 1+1>2\n\n#### 异丙醇、四氯化碳\n\n#### 异丙醇对肝脏无毒，当与四氯化碳\n\n#### 同时进入机体时，可使四氯化碳毒\n\n#### 性大于单独作用时毒性\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n（一）联合毒性作用类型\n拮抗作用：两种环境化学物同时作用于机体时，\n其中一种化学物可干扰另一种化学物的生物学作\n用，或两种化学物相互干扰，使混合物的毒作用\n强度低于各自单独作用的强度之和。\n\n#### 1+1<2\n\n#### A细胞 B细胞\n\n#### 胰岛素、胰高血糖素 功能拮抗\n\n#### 硫代硫酸钠、氰化物 化学拮抗\n两种物质混合发生化学反应，\n\n#### 生成毒性较小的硫氰酸盐 D细胞\n（A细胞产生胰高血糖素B细胞产\n\n#### 生胰岛素D细胞产生生长抑素）\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n（一）联合毒性作用类型\n独立作用：两种或两种以上的环境化合物作用于\n机体，各自的作用方式、途径、受体和靶器官不\n同，彼此互不影响，仅表现为各自的毒作用。\n\n#### 乙醇、氯乙烯\n乙醇引起线粒体脂质过氧化，而氯乙烯\n引起微粒体脂质过氧化，彼此无明显影响\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 联合作用类型评价方法\n1.联合作用系数法\n\n#### 混合物的预期LD50\n\n#### 联合作用系数（K）=\n\n#### 混合物实测LD50\n混合物的预期LD5值的计算公式：\n\n#### 1 b n\n混合物的预期LDso值A的LDsoB的LDso N的LDsoa，b....n，分别为各化合物在混合物中所占的质量比例\nK值<0.4拮抗作用0.4-2.5相加作用>2.5协同作用\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 联合作用类型评价方法\n2.等效应线图法\n\n#### 甲化学物（mg/kg) 上限\n\n#### at拮抗作用\n\n#### LD50\n\n#### 下限\n\n#### 相加作用\n\n#### 协国作用\n\n#### 下限 LD50 上限\n\n#### 乙化学物（mg/kg）\n·本法只能评定两个化合物的联合作用，其原理是在试验条件和接触途径\n相同情况下分别求出受试的甲、乙两种化合物的LD及其95%可信限\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 最小有作用剂量是\n一种化合物按一定方式与人接触，出现了亚临床症状的最小剂量\n一种化合物按一定方式与人接触造成显微镜下可观察到的损伤\n\n#### 的最小剂量\n一种化合物按一定方式与人接触引起免疫功能减低的最小剂量\n一种化合物按一定时间内，按一定方式与机体接触，使某项指\n\n#### 标开始出现异常变化的最低剂量\n\n#### 提交\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 最大无作用剂量是\n未能观察到任何对机体损害作用的最低剂量\n未能观察到任何对机体损害作用的最高剂量\n人类终身摄入该化合物未引起任何损害作用的剂量\n一种化合物在环境中存在而不引起生物体的损害的剂量\n\n#### 提交\n"}, {"id": "pdf-009", "group": "原始课件 · PDF原文", "title": "009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法", "md": "# 第五章 环境毒理学常用实验方法\n\n> 来源: 009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法.pdf\n> 页数: 82\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n\n#### ①基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n\n#### 只限于染色体上特定位点，故\n\n#### DNA CATCATCA\n\n#### 翻译模板\nHis His H HisHHis His\n\n#### 碱基置换 编码的氨基酸\n\n#### 碱基A丢失\nCATCATCAHis HHisHHis Leu\n基因突变 编码合成的蛋白质发生改变\nDNA序列插入或缺失除了三对以外的一对或几对碱基，而引\n\n#### 移码突变 起密码编组的突变\n按照三联密码连续阅读的原则就会出现损伤部位以后整个遗\n传密码顺序完全改变，从而形成错误的密码，并转译成为不\n\n#### 正常的氨基酸，细胞由此出现突变\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n## 第五章环境毒理学常用实验方法\n本章将讨论以下内容：\n\n### 5.1概述\n\n### 5.2环境化学物等一般毒性试验\n\n### 5.3致畸、致癌、致突变等毒性试验\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 5.1 概述\n\n#### 毒理学研究的主要手段\n\n#### 动物实验\n借助于动物模型模拟人体接触环境化学品的各种\n条件，观察实验动物的毒性反应，再外推到人\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 概述\n\n#### 毒理学研究的主要手段\n\n#### 体内实验 动物实验 体外实验\n采用整体动物、动物器官、组织及细胞等进行\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 概述\n一、实验动物的选择\n\n#### 人工培育 科学研究\n控制其携带微生物、遗传背景明确，来源清楚。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 概述\n1.物种的选择--－基本原则\n对外源的毒性反应及代谢特点与人类接近的物种\n\n#### 自然寿命不太长的物种\n\n#### 易于饲养和实验操作的物种\n\n#### 经济并易于获得的物种\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 概述\n1.物种的选择--－常用动物\n选用两个物种进行试验、评价毒性反应的物种差异\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 概述\n2.品系的选择\n品系 用计划交配的方法获得的起源于共同祖先的一群动物。\n具有共同的遗传来源、相似的外貌特征、独特的生物\n\n#### 同一品系\n\n#### 学特性及稳定的遗传性能\n类别 遗传特性 繁殖方式 应用场景\n近交系动物 基因高度纯 连续兄妹/亲 遗传研究、\n\n#### 近交系动物 合 子交配\n\n#### 药物测试\n突变系动物 疾病模型、\n根据实验需要 携带特定基 选择性交配或基\n\n#### 突变系动物 基因功能研\n\n#### 因突变 因编辑 究\n\n#### 杂交群动物\nF1代杂合 干细胞研究、\n\n#### 杂交群动物 两个近交系杂交\n\n#### 封闭群动物 子 免疫实验\n\n#### 遗传多样性 毒理学、行\n\n#### 封闭群动物 群体内随机交配\n\n#### 高 为学研究\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 概述\n3.微生物控制的选择\n为确保实验结果的真实性、可靠性和增加可比性、可\n\n#### 微生物控制\n重复性及科学性。\n应对实验动物携带的微生物控制，根据对动物微生物\n\n#### 实验动物分类\n控制的净化水平，我国将实验动物分为无菌动物、悉\n生动物、无特定病原体动物和清洁动物。\n等级 微生物控制 饲养环境 应用场景\n无菌动物 完全无微生物 无菌隔离器 微生物组、免疫机制研究\n悉生动物 已知特定微生物 无菌隔离器 特定菌群功能研究\nSPF动物 排除特定病原体 屏障环境 生物医学研究、疫苗开发\n清洁动物 排除常见病原体 普通屏障环境 基础实验、教学\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n年龄 毒理学试验选用的实验动物的年龄取决于实验\n\n#### 的类型\n\n#### 成年动物 急性试验\n年幼或初断乳动物 亚慢性、慢性试验\n实际工作中常以动物的体重粗略的判断动物的年龄\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n性别 同物种、同品系但不同性别的实验动物对化学\n\n#### 物毒性的敏感程度有差别\n\n#### 无特殊要求 应选用雄两种性别\n已知不同性别敏感程度物 选择敏感的性别\n如实验中发现性别差异，应对实验结果分别统计分析\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n毒理学试验一般应选用未产未孕的雌性动物\n生理状态 除进行与生殖有关的试验时需有计划地合笼交\n配外，雌雄动物应分笼饲养。\n毒理学试验应选用健康的动物。一般在试验前\n健康状态 检疫观察5-7天。对于大动物的亚慢性和慢性试\n验，还应进行血液学和血液生化学检查，剔除\n异常动物。\n如对狗进行试验，应该常规驱除肠道寄生虫\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 概述\n二、常用的染毒方法\n\n#### 使动物通过一定的途径接触毒物\n根据试验的目的并结合人体的实际接触方\n\n#### 染毒\n式、毒物的多少、理化性质以及设备条件\n等来决定。\n主要染毒途径：经口、经皮肤及经呼吸道吸入\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n#### 概述\n1.经口染毒\n\n#### 采用灌胃、吞服胶囊和饲喂的方式\n灌胃前需要禁食；\n灌胃 灌胃针从口角进入，针头轻压舌根，引起小\n鼠吞咽反射；\n进入食道后，继续入针时应无阻力。针头到\n达胃部后推动注射器，推入需要的计量\n竖直拔出针头，完成灌胃操作。\n注意： 若感到阻力或动物挣扎时，应该立即停止进针或将针拔出；\n参考给药量：小鼠0.1ml/10g体重，最大不超过0.5ml/10g体重\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 概述\n1.经口染毒\n\n#### 采用灌胃、吞服胶囊和饲喂的方式\n\n#### 迫使实验动物吞服胶囊\n\n#### 吞服胶囊 该方法计量准确\n\n#### 适合不合实验动物“口味”的药物\n饲喂 要求受试物占饲料的比例小于5%。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 概述\n2.经呼吸道染毒\n\n#### 静式吸入染毒和动式吸入染毒\n将实验动物置于密闭的染毒柜中，加入易挥\n\n#### 静式吸入\n发的液态或气态受试物达到一定的浓度。\n动式吸入 采用机械通风装置，使实验动物在氧和二氧\n化碳分压较为恒定、受试化学物浓度也较为\n\n#### 稳定的环境中进行\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 概述\n3.经皮肤染毒\n液态、气态、粉尘都有可能与皮肤接触\n研究化合物经皮肤吸收的毒性作用，及化合物对接触化合物\n皮肤的局部作用，均需使用经皮肤染毒的方式\n动物的被毛有碍于与化学物的直接接触，因此，\n在经皮肤染毒前需要去除染毒部位的被毛\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 概述\n4.其他方式\n根据试验目的和要求以及染毒物质的性状，还可选用腹腔注\n射、皮下注射、静脉注射等。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n\n#### 动物血液采集\n检查血液，可了解受试物对血液系统的作用，反应受试物对各\n器官系统功能及受试物代谢过程的影响。\n\n#### 实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n\n#### 小鼠 0.10 0800\n大鼠 1.00 2.005.00 10,00\n免猴 10.00 40.0015,00 60.00\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n小鼠、大鼠：\n所需血量不多时，可采用尾尖采血和眼眶静脉丛采血\n\n#### 用血量较多时，可采用心脏采血法\n对采血后拟处死的动物，可采用断头采血法。\n\n#### 实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n\n#### 小鼠 0.10 0.30\n\n#### 大鼠 1.00 2.00\n\n#### 鼠 5.00 10.00\n免 10.00 40.0015,00 60.00\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n对豚鼠：可采用耳缘剪口采血和心脏采血\n对家兔：·可采用耳静脉采血，是家兔最为常用的取血\n\n#### 法之一\n常作多次反复取血用，故保护耳缘静脉，防\n止发生栓塞。\n需血量较多少，也可采用心脏采血。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n2.动物尿液、粪便的收集\n对尿液、粪便的分析，可了解受试物的吸收代谢的特点\n采用特制的容器（代谢笼）进行尿液、粪便的收集。\n必须保证粪便和尿液分开，以防止相互混合\n常用的粪尿分离收集器，其类型有玻璃、塘瓷、瓷器等制\n\n#### 品，可根据实验室条件适当选用\n\n#### 样品应在新鲜时进行检验\n实验期间膳食成分应一致，且须在特定时间内收集样品\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n#### 概述\n四、实验动物处死方法\n\n#### 处死要求\n尽量快速，不是动物集体发生与毒理试验无关的病理变化、\n\n#### 操作简便为原则\n\n#### 处死方法\n（1) 脱颈椎法：适用于对小动物（大、小白鼠）处死。\n(2) 断头法：适用于大、小白鼠处死。\n（3）麻醉法：置于有麻醉剂（氯仿或乙醚）的密闭容器内，使动物麻醉\n致死。大动物则须用注射麻醉剂法进行。\n（4）空气栓塞法：用注射器向动物静脉内迅速注人一定量的空气，使动\n物血管内形成大量气栓而致死。适用于大动物的处死。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 概述\n五、实验动物的解剖检查\n\n#### 病理形态学检查\n，对试验动物进行大体解部，观察各脏器有无异常\n\n#### 准备\n复查动物的编号、实验组别、称体重，进行一般的体表状况的观察。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 概述\n五、实验动物的解剖检查\n\n#### 实质器官\n观察脏器的颜色、形状大小等情况。切面有无外翻，各结\n构层次是否清晰等。\n\n#### 空腔器官\n\n#### 观察其内容物的量和性质等变化\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n\n### 5.2环境化学物一般毒性及其评价\n一般毒性：\n包括急性毒性、亚慢性毒性和慢性毒性、蓄积毒性等\n特殊毒性：\n致畸、致癌、致突变、生殖、发育毒性\n毒物作用时间的长短是决定其毒性效应的主要因素之一\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n\n### 5.2环境化学物一般毒性及其评价\n\n#### 案例\n近年来，马兜铃酸致癌致肾炎的新闻引起了人们的热议。临床上\n将马兜铃酸肾病分为三种类型：急性马兜铃酸肾病、慢性马兜铃酸肾病\n以及肾小管功能障碍型马兜铃酸肾病。\n急性马兜铃酸肾病：多由在较短的时间内，大量服用含有马兜铃酸的药物\n所致，临床表现主要为少尿或非少尿性急性肾功能衰竭。\n慢性马兜铃酸肾病：多由持续或间断小剂量服用含马兜铃酸药物所致，肾\n功能呈进行性损害。\n肾小管功能障碍型马兜铃酸肾病：通常在间断小量服用含马兜铃酸药物后\n数月出现症状，主要表现为肾小管性酸中毒等。由此可见，同样的毒物根\n据其染毒时间的长短和剂量大小的不同，可能导致不同的毒性作用\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n一、急性毒性\n急性毒性是指机体一次接触或24小时内多次接触某一化学物所引1起的\n毒性效应，包括死亡效应。\n一次·经口或经注射染毒则为操作时瞬间染毒；\n经呼吸道或经皮肤染毒则为特定期间内持续接触化学物的过程\n多次·毒性过低或一次染毒剂量受生物体容量限制，需要给予实验动\n物较大剂量时，可以在24h内多次染毒\n目的：\n是测定半数致死量（或浓度，LDso或LC5o），急性中毒國剂量（或浓度)。\n另外：急性毒性研究可为亚慢性、慢性毒性研究及其他毒理试验染毒剂\n量的设计和观察指标的选择提供依据，为毒性作用机制研究提供线索。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n\n#### 半数致死量（LD5o）的测定\n急性毒性大小常用LD表示；\n指的是半数试验动物死亡所使用的毒物剂量；\n\n#### 若使用的是溶液，则用LC50\nLDs或LCs是急性有关指标中重要的参数；\nLD50（LC5o）可能于毒性分级;\n毒性大小比较的依据；\nLD5o（mg/kg）、LC5o（mg/kg），数值越小毒性越强。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n\n#### 急性毒性试验的一般操作流程\n·成年健康的小鼠\n\n#### 选择受试生物：·\n雌、雄各半;\n若待测化学物对性别有敏感性，则根据需求调整雌雄比例\n染毒方式和染毒计量的选择：\n·事先查阅文献，根据毒物结构和理化性质寻找类似化学物的毒性资料\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n\n#### 急性毒性试验的一般操作流程\n染毒剂量：\n·取类似物种，染毒途径相同的LDso作为参考中值\n·以大剂量间隔染毒，找出相应的致死剂量范围（在少量动物上试验）\n·在这几个剂量范围设定几个试验组，进行正式实验。\n观察周期：\n·一般为14天（两周）\n依据受试动物测试相关规定确定观察周期\n对已知的速杀性药物，可缩短观察时间\n具体观察时间，应在试验报告及结果表示中说明，如7d的LD50\n根据观察期内动物的总死亡情况，计算LD50\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n\n#### 半数致死剂量的影响因素\n?实验动物的饲养环境和营养因素\n\n#### 实验人员操作的熟练程度\n\n#### 受试化学物的浓度和稀释倍数\n同一外源化学物，同一品系动物；同样接触途径测定的LD50只值会有2-3倍差异\n虽然半数致死剂量是急性毒性试验最为重要的毒性指标，在试验过程中，\n同样可以观察体重变化、中毒症状，对死亡个体进行病理检查等进一步确\n定污染物的毒性作用方式。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---亚慢性毒性试验\n在通常情况下啊，人类对环境污染物接触的水平较低，不至于发生急性中毒，\n却会在长期反复接触中慢性中毒。\n\n#### 亚慢性毒性\n又称亚急性毒性，机体在相当于1/20左右生命期间，少量、反复接触有\n害化学和生物因素引起的损害作用。\n\n#### 亚慢性毒性试验\n又称亚急性毒性试验，受试动物在1/20左右生命周期，每日、反复、多\n次接触受试物的毒性试验。\n\n#### 举例：大鼠生命为2年（24月）\n\n#### 需染毒：1~2个月\n\n#### 1/20即1～2个月\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---慢性毒性试验\n\n#### 慢性毒性\n机体长期、少量、反复接触外源化学物所应期的毒性效应，接触期限一\n般为大于生命期的10%；\n\n#### 慢性毒性试验\n试验动物长期接触低剂量外来化学物，产生的生物学效应的试验称为慢\n性试验;\n特点：\n耗费的人力、物力和时间比较大，亚慢性毒性试验常作为慢性毒性试验\n的预备或筛选试验，必要时才进行慢性毒性试验\n染毒期长达2年或终生染毒的慢性毒性试验，常和致癌试验合并进行\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n两种试验在试验设计和方法上除染毒期限有所不同，其他基本相同\n\n#### 受试动物\n受试动物的种属、品系，应该是在急性毒性试验中，已被确定为对受试物\n\n#### 敏感的动物\n一般要求选择两种受试动物：啮齿类、非齿齿类动物各一类\n\n#### 性别为雌雄各半\n建议选用年幼、初断奶的动物为试验对象，以便更全面了解受试物的毒效\n\n#### 应\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒剂量的选择\n一般应设置2个剂量组和1个对照组\n高剂量组：要能引起明显的中毒反应，不会让很多动物死亡\n\n#### 低剂量组：不引起任何中毒反应\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒途径\n应尽量模拟人类接触受试化学物的方式\n慢性、亚慢性毒性研究的染毒途径一致\n经胃肠道染毒时，毒物最好采用胃饲法\n受试化学物有异味或易水解时，也可采用灌胃方法染毒\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒期限\n根据受试物的种类和试验动物的物种而定\n\n#### 亚慢性毒性一般染毒1-3个月\n慢性毒性一般染毒3-24个月，甚至终生染毒\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 试验设计、观察指标\n（1）一般性指标\n敏感的综合性指标，综合反映毒物对机体的毒作用（外见体征；粪便性状；\n食物利用率；体重变化）\n（2）试验室检查\n\n#### 包括血液学检查、肝功能、肾功能\n（3）病理组织学检查\n试验结束后，要及时解剖死亡的动物，肉眼观察大体病理变化，若有改变\n则需要做组织病理学检查，对于存活的动物也要做解部检查，必要时做组\n\n#### 织病理学检查\n（4）特异性指标\n根据受试物的毒性资料，试验中的观察和受试物结构等增加其他指标的检查\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 试验设计、观察指标\n根据亚慢性毒性试验的结果，可以确定受试物的主要作用，靶器官对最大\n无作用水平和最大剂量做出初步估计，为进一步开展慢性毒性试验提供依据\n\n#### 慢性毒性试验\n对受试物在低剂量长时间接触机体时引起的毒性作用有更深入的了解\n可以依据敏感观察指标出现异常的最小阀剂量\n找出该受试物慢性毒性作用的最大无作用剂量\n为受试物能否应用或为制定在环境中卫生标准提供重要的参考依据\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 蓄积作用的基本概念\n1）定义：\n当外源化学物连续进入机体，且吸收速度或总量超过代谢转化排除的总量\n或速度时，化学物质很有可能在体内增加并贮留，称为化学物的蓄积作用。\n化学物质容易蓄积的部位称为储存库；\n\n#### 常见的储存库包括\n\n#### 血浆蛋白\n\n#### 脂肪组织\n\n#### 肝肾\n\n#### 骨骼\n\n#### 大多数蓄积作用都会产生蓄积毒性\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 2）蓄积毒性作用\n低于中毒剂量的外源化学物反复与机体接触一定时间后致使机体出现中\n毒作用;\n\n#### 3）环境污染物体内蓄积过程\n\n#### 物质蓄积\n·可用化学方法测得体内污染物或代谢物\n污染物不断进入机体内，其吸收量大于排出量，使其在体内的量逐渐积累增多\n\n#### 功能蓄积\n不断进入机体内的污染物，反复作用机体，引起机体一定结构和功能变化，\n并逐渐累积加重，最后导致出现损害作用；\n测不出该物质，例有机磷化合物。\n物质蓄积和功能蓄积是相对而言，同时存在又互为基础，在史籍中难以严格区别\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n定义：以生物效应为指标，用蓄积系数（k）评价蓄积作用，将多次染毒\n\n#### 与一次染毒毒性效应进行比较\n优点：方法简便，是评价蓄积作用的常用方法；\n缺点：无法区别物质蓄积还是功能蓄积\n∑LD50(n）—→多次染毒使半数动物出现效应的总剂量\n\n#### 蓄积系数（K）=\n表5-1蓄积作用强度分级（引自刘毓谷，环境毒理学教材，1987）\n\n#### 蓄积系数（K） 蓄积作用强度\n\n#### <1 高度蓄积\n\n#### 1~3 明显蓄积\n\n#### 3~5 中度蓄积\n\n#### >5 轻度蓄积\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法（固定剂量法、剂量定期递增染毒法、剂量固定的20\n天蓄积法)\n\n#### 固定剂量法\n使用大鼠或小鼠，通过经口灌胃、腹腔注射、染毒。试验周期为25-100天\n先求出LD5o-->选取相同条件的至少40只试验动物\n随机分为染毒组和对照组两组（每组至少20只，雌雄各半）\n每天以固定剂量在相同时间和相同途径对试验组进行染毒\n\n#### 观察并记录动物死亡数\n当试验组一半动物死亡时即可终止试验 若接触剂量依据蓄积到\n计算累积的总的接触剂量(LDso(n) 5*LD5o的剂量，那么即便死\n\n#### 亡数未超过半数，仍要终止\n根据公式计算K值 试验，此时K>5，表明蓄积作\n\n#### 用不明显\n\n#### 依据蓄积毒性强度分析进行评价\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n\n#### 确定蓄积系数常用的方法\n\n#### 剂量定期递增染毒法\n大体上与固定剂量法一致，不一样的是试验开始时染毒组需要按0.1LDso剂量进行染毒\n\n#### 以4天为一期\n\n#### 按一定比例增加染毒剂量\n\n#### 试验期最长28天\n注：试验期间需要定期（4天）一次给动物称重，按照实测体重调整染毒剂量\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n\n#### 确定蓄积系数常用的方法\n\n#### 剂量固定的20天蓄积法\n\n#### 口给予蓄积系数的原理设计\n口通常采用经口灌胃的染毒方式 1/20 LD501/10 LD50\n口将毒物随机分为5组（阴性对照*1，实验组*4）\n\n#### 1/5  LD50\n·每组10只，雌雄各半 1/2LD50\n·每天染毒一次，连续20天\n\n#### 口观察每组雌雄合计的死亡动物数\n口试验结束后，根据各实验组的死亡数对受试物的蓄积数强弱进行评定\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n2）生物半减期法：\n定义：用毒物动力学原理描述毒物在机体内蓄积作用的方法\n简称T1/2：外来化合物通过机体的生物转运和转化作用被消除一半所需要的\n\n#### 时间\n生物半减期越长的物质，越不容易消除；发生蓄积作用的可能性就越大\n由于测定外来化学物在体内的生物半减期过程较为复杂，自实际观测中，\n常常间接的通过测定其血液、尿液或器官组织中的浓度（或量）降低一半\n所需的时间，用以代表该物质的生物半减期，根据测得的生物半减期的长\n短，来确定受试物的蓄积作用。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n1）定义：\n遗传物质发生的可改变生殖或体细胞中的遗传信息，并产生新的表型效应\n的改变。\n2）基本类型：\n自发突变：自然条件下发生，频率很低；\n诱发突变：人为的或受各种因素诱发产生\n环境突变/环境诱变作用：有物理、化学、生物作用（紫外线、X射线，化学\n诱变剂，黄曲霉素等都可诱发突变）\n突变基础：根据DNA突变的大小，将突变分为两大类\n1基因突变（例如：红色花的后带变成蓝色）\n\n#### ②染色体畸变\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n\n#### 1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n\n#### 碱基置换 代的过程\n\n#### 置换又分为转换和颠换两种形式\n\n#### 基因突变\n转换：DNA多核苷酸链上同类碱基之间的取代，即密啶\n移码突变 被嘧啶，嘌呤被嘌呤取代\n\n#### 突变 G\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n\n#### ①基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n\n#### 碱基置换 代的过程\n\n#### 置换又分为转换和颠换两种形式\n\n#### 基因突变\n颠换：不同类碱基之间的取代，即嘌呤被嘧啶或密啶被\n\n#### 移码突变 嘌呤取代\n\n#### 突变\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n\n#### 2染色体畸变\n与碱基突变不同的是，染色体畸变可用显微镜直 065.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n\n#### 现实生物中引起的致畸作用\n\n#### 天然条件下的出生缺陷\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n高放射本底地区的辐射主要来自地壳中的铀、针、钾－40等放射性核素，以及宇宙射线。例如：\n·中国阳江：年有效剂量约6.4mSv（全球平均为2.4mSv），主要由地表射线和氢气贡献。\n·印度喀拉拉邦：沿海地区因独居石砂矿（富含铀、针）导致辐射水平达10-20mSv/年。\n·伊朗拉姆萨尔：部分居民区室内氢浓度高达31，000Bq/m²，年有效剂量达71mSv。\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n用于检测某些环境污染物能否通过妊娠母体引起胚胎畸形的一种动物实验方法。\n\n#### 致畸试验步骤\n\n#### 代谢过程要与人类相近\n\n#### 受试生物的选择\n胎盘与人类胚胎构造相似（包括胚胎的层数和厚度）\n\n#### 体型小\n动物试验选取原则 易繁殖 多采用大鼠、小鼠和家兔实验动物\n\n#### 价格低廉\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n剂量分组：通常根据试验目的和要求决定\n）只做有无致畸作用的定性检测，则剂量组较少；\n若还需要探讨毒性作用的靶器官，则剂量组增多；\n在正式试验前要先做预实验，用于确定实验所需试验剂量范围\n若未做预实验，则一般以1/30-1/2的LD5o为最高剂量组，\n1/30-1/100LD50为低剂量组，\n按等比例差在高低剂量组之间插入中间剂量组\n5以交配后确定已受精的雌性动物为计数对象（鼠类：15-20只；家兔：7-8只）\n6在进行实验时，除了各试验组外，还应同时设立阴性和阳性对照组\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n剂量分组：通常根据试验目的和要求决定\n7实验处理上，需要先将性成熟但未交配过的雌鼠和雄鼠同笼过夜，确定雌鼠受\n孕后，推算孕龄，在胚胎的“敏感期”进行受试物暴露\n致畸实验常用的终点指标：暴露完之后的解部，观察\n实验动物的解剖时间为分娩前1-2天为宜，对胚胎的外部骨骼和内脏进行检查，\n并且通过多方面分析致畸试验结果。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n2.环境化学物特殊毒性及其评价\n\n#### 恶性肿瘤怎么产生的\n：框在点击“”时会进行转换，用时则会变为可点击的视频。框移位和\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌\n恶性的肿瘤，严重威胁人类健康的主要疾病之一；\n人类肿瘤80-90%与环境因素有关，包括物理、化学、生物因素；\n病因分析，人类肿瘤80-85%与化学因素有关\n把诱发肿瘤的化学物质称为化学致癌物\n（①有机化学物，②天然化学物，③无机化学物，4合成化学物）\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌\n肿瘤形成过程：\n1引发阶段：指正常细胞在化学致癌物直接或间接作用下转变为癌前细胞的过程\n2促长阶段：经过引发的癌细胞不断增殖，直至形成临床上可被检出的肿块过程\n③进展阶段：指引发细胞群进一步的表型改变；包括恶性前型转变为恶性型细胞等过程\n毒性方面化学致癌物的致癌作用与一般毒性作用在许多方面有一定的相似之处\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌物在体内也进行生物转化，但同时也有其自身的特点\n1化学致癌物引起的生物学效应，具有持久性和迟发性\n②在动物实验中，当剂量相等时，多次给予受试物比一次给予所产生的效应更大\n③从机理来看致癌作用和宿主细胞的遗传物质或其他细胞大分子的相互作用有关\n致癌作用的本质是致癌物通过DNA加合物形成、氧化损伤或\n表观遗传调控，引发体细胞突变并破坏细胞生长调控网络。这\n一过程具有剂量依赖性和时间依赖性\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ①体细胞突变学说\n\n#### 化学\n\n#### 突变\n致癌因素 物理 体细胞((DNA) →致癌\n\n#### 生物\n\n#### 致癌形成的基础是体细胞发生突变\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ②分化障碍学说\n\n#### 干扰 分化\n致癌因素 细胞 ?紊乱 癌变\n\n#### 增殖\n细胞癌变只需要细胞分化过程有关的基因调控过程受致癌因素感染，\n\n#### 使细胞分化和增殖发生素乱\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ③癌基因学说\n正常情况下，癌基因处于阻遏状态，只有当细胞内有关的调节机\n制遭到破坏的情况下，癌基因才能表达，导致癌变形成肿瘤;\n不同的致癌学只是侧重点不同，互有交叉，可能是在致癌作用的不同阶段\n所起作用不同而已。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n致癌试验是一种特殊的慢性毒性试验，目的是检验环境污染物或其代谢物是否具\n\n#### 有致癌或诱发肿瘤作用\n致癌试验重要方法：完整的哺乳动物长期试验\n一些短期快速筛检试验方法：满足大量外来化合物进行致癌试验\n1哺乳动物细胞体外转化法：有无致癌性的重要方法\n2优点：周期短、经济、方便、能直接与靶细胞作用\n当一种化学物已经通过短期试验证明其具有潜在致癌性或者其化学结构与某种已\n知致癌物十分近似，又在人类社会中具有实际应用价值时，应进行长期动物诱癌\n\n#### 实验\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 诱癌动物试验与慢性试验类似\n首选啮齿类动物为受试生物：具有诱发肿瘤的感受性强、生物周期短、繁殖快、\n费用低等优点。\n\n#### 存在问题\n1高剂量的动物诱癌试验结果与人类实际接触的“低剂量“致癌物不同\n2其次人体和动物体内代谢酶系统存在着差别\n③动物“自发”肿瘤率在不同动物种系之间差别很大，人与动物之间可能也存在很大差别\n因此动物试验的结果不能完全代表人体的生物学改变\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 剂量分组及染毒途径和期限\n设置对照组、最大耐受剂量和两个中间剂量（共4组）\n设置对照组、最大耐受剂量和半数最大耐受剂量（共3组）\n\n#### 每组雌雄动物各74只\n体重变化不应超过平均体重的±20%\n\n#### 染毒途径要模拟人体接触途径\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 观察指标\n\n#### ①一般情况\n试验头三个月每周称一次动物体重，以后每两周称一次。\n消化道染毒时应计算食物或饮水消耗量\n每天观察两次动物，发现死亡、垂死的和临床异常的动物，应详细记载。\n试验第15个月时每组雌雄动物各处死10只，其余在第24个月处死，详细尸检\n和病理检查，同时进行血液生化检查\n\n#### ②肿瘤发生情况\n记录肿瘤出现时间、部位、大小、数目、外形、硬度和发展情况\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 观察指标\n\n#### ③病理学检查\n·作完整的尸体解剖，检查所有器官组织。\n\n#### 4肿瘤发生率\n肿瘤发生率三天 试验终了时患肿瘤动物总数\n有效动物总数（最早出现肿瘤时的存活动物总数） X100%\n\n#### 5潜伏期\n以各试验组第一例肿瘤发现的时间作潜伏期。\n\n#### 6平均肿瘤数\n一个器官出现多个肿瘤或多个器官出现肿瘤，都可使平均肿瘤数增加，此数表示肿瘤的多\n发性。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 结果判定\n①肿瘤只发生在受试组动物，对照组无肿瘤，或受试组出现对照组没有的肿瘤类型\n2受试组与对照组动物均发生肿瘤，但受试组发生率高\n\n#### ③受试组的平均肿瘤数高于对照组\n4受试组与对照组的肿瘤发生率虽无显著差异，但受试组肿瘤发生的潜伏期短。\n上述四条中，通过统计学分析，任何一条有显著性差异并存在剂量反应关系是即\n\n#### 可认为受试物的致癌试验为阳性\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n2.环境化学物特殊毒性及其评价\n\n#### 谢谢\n"}, {"id": "pdf-010-2-6", "group": "原始课件 · PDF原文", "title": "010-第五章 环境毒理学常用实验方法（2）-6-第六章环境化学物的安全性和健康危险度评价", "md": "# 6-第六章环境化学物的安全性和健康危险度评价\n\n> 来源: 010-第五章 环境毒理学常用实验方法（2）-6-第六章环境化学物的安全性和健康危险度评价.pdf\n> 页数: 40\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第六章环境化学物的安全性\n\n#### 和健康危险度评价\n\n#### 第一节化学物的安全性评价\n一、基本概念\n二、安全性评价的内容\n三、国内外的化学物安全性评价法规\n\n#### 第二节环境健康危险度评价\n一、概述\n二、环境健康危险度评价的基本步骤\n三、环境健康危险度评价的新课题\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 引言\n\n#### 化学物数量：超过1000万种\n\n#### 投入生产和使用：约10万种\n每年近千种新化学物质投入生产和使用\n以前不要做什么试验，好东西上市。\n青霉素上市好，磺胺上市好！\n反应停上市坏了！\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 反应停\n\n#### thalidomide\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 国产品牌信不过 外国大牌不靠谱\n\n#### 港媒爆霸王\n\n#### SK-II\n\n#### 含致癌物\n\n#### 企业受冲击\n\n#### 退货接待\n\n#### 霸王 亏5.5亿\n\n#### BAWAN\n\n#### 新 药粉\n\n#### 升级配方\n事件湾：“含毒门”让王如何再称动 事件湾：SK-I等四大品牌被查违禁物质\n倩碧、欧莱雅等化妆品在加拿大被检出含6\n\n#### 种毒物\n\n#### more no more\n无泪配方 tears 无租配方 tearsJohnsons\" golimorababy baby\n\n#### 强生物儿工\n净含量200ml NT 净含量200ml\n\n---\n\n< 。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n（二）安全性评价的程序\n安全性评价首先是对化学物进行毒性鉴定，通过一系列\n的毒理学试验测试该化学物对实验动物的毒作用包括特殊毒\n性作用，从而评价和预测该化学物对人体可能造成的危害。\n\n#### >急性毒性试验\n\n#### >致突变试验\n>亚慢性毒性、生殖与发育毒性、代谢试验\n\n#### >慢性毒性试验和致癌试验\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n1.第一阶段（急性毒性试验）\n主要根据人体可能的暴露途径，选择经口、经皮、经呼吸道的\n染毒途径进行急性毒性试验，获得LD5o或LC50°\n农药等有可能与皮肤或眼接触的化学物需进行皮肤刺激试验、\n眼刺激试验和皮肤变态反应试验。\n对呼吸道有刺激作用的化学物还应进行吸入刺激阀浓度试验\n\n#### 农药第一阶段：急性毒性试验\n\n#### 染毒方式\n\n#### 皮肤 呼吸道\n\n#### 皮肤\n\n#### 眼睛\n皮肤刺激试验 眼刺激试验 皮肤变态反应试验 吸入刺激阀浓度试验\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n2.第二阶段（致突变试验）\n一般包括：\n①原核细胞基因突变实验，如Ames试验\n②真核细胞染色体畸变试验，如微核试验\n如实验结果为阳性，可在DNA修复合成试验、显性致死\n试验、果蝇伴性隐性致死试验和体外细胞转化等试验中\n再选两项进行最后的综合评价。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 发生畸变的染色体\n\n#### 一正常染色体\n\n#### 微核试验结果\n\n#### 微核（MN）\n\n#### 染色体畸变试验\n\n#### 成熟的红细胞（NCE）\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n3.第三阶段（亚慢性毒性试验、致畸试验、\n\n#### 生殖试验和代谢试验）\n亚慢性毒性试验：①一般要求进行90天，②用于了解\n较长期反复染毒受试化学物后对动物的毒作用性质和\n靶器官，③评估对人体健康可能引起的潜在危害，④\n估计最大无作用剂量，5并为慢性毒性试验和致癌性\n试验设计提供参考依据。\n致畸试验用于确定受试物的胚胎毒作用以及对胎仔的\n致畸作用。\n生殖试验一般要求进行两代，以判断受试物对生殖过\n程的影响。\n代谢试验是了解化学物在体内的吸收、分布和排泄特\n点，有无蓄积性以及毒作用的可能靶器官和组织。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n4.第四阶段（慢性毒性试验和致癌试验）\n这两项试验常结合进行。慢性毒性试验的目\n的在于确定化学物的最大无作用剂量，并综合上\n述试验的结果对受试物的安全性作出评价，进而\n提出人体安全的摄入量水平。\n致癌试验用于确定受试物对实验动物的致癌\n性。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n（三）安全性评价试验的选用原则\n根据受试物的种类来选择相应的程序，如农药、食品、化妆品和药物的毒理学\n安全评价一般分为4-5个阶段：\n\n#### ①根据受污的种类选择相应的程序\n\n#### ②遵循分阶段试验的原则\n③首创的化学物质一般选择第三到第四阶段的项目进行测试\n④与国内已获批准生产的化学品属同类化学品的，可先进行急性毒性试验和一项\n致突变试验。如试验结果与国内同类化学品一致，可不继续进行试验。\n③凡将两种以上的化学品混配成新的制剂时，除必须按相应要求对其成分分别进\n行试验外，还应进行急性联合毒性试验，如有明显的协同作用，则根据具体情\n况对该制剂进行必要的其它毒性试验。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n（四）安全性评价结果评价时应注\n\n#### 意的问题\n由于种属以及实验设计等的差异，在对毒理学\n安全性评价的结果进行解释时，应尽可能考虑多方\n面的影响因素，作出客观的结论。\n口为安全起见，在无确切资料的情况下，一般常把人看\n做最敏感的种属。\n口尽可能的收集受试物对人体毒性作用的资料。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n（四）安全性评价结果评价时应注\n\n#### 意的问题\n\n#### 实验设计的科学性\n\n#### 试验方法的标准化\n\n#### 熟悉毒理学试验方法的特点\n\n#### 评价结论的高度综合性\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n三、常用的化学物安全性毒理学评价程序简介\n\n#### 以农药安全性毒理学评价程序为例\n\n#### 主要内容与适用范围\n本程序规定了农药安全性毒理学评价的原则、项目及要求。本程\n序适用于在我国申请登记及需要进行安全性评价的各类农药。\n\n#### 评价总则\n\n#### 1）准备工作、了解应用情况\n\n#### 2）农药试验样品的选择\n\n#### 3）农药试验样品的要求\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n三、常用的化学物安全性毒理学评价程序简介\n\n#### 以农药安全性毒理学评价程序为例\n\n#### 毒理学评价项目\n\n#### 四个阶段\n\n#### 评价项目基本要求及结果评定\n\n#### 1）目的\n\n#### 2）受试动物\n\n#### 3）方法\n\n#### 4）结果评定\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 第二节 环境健康危险度评价\n一、概述\n人们在日常生活中自觉或不自觉地通过食物、空气和\n水等接触各种物理性、化学性或生物性的有害因子。这些\n因子是否会对健康造成危害，如果有危害，其严重性和发\n生的概率如何，环境健康危险度评价就是为满足人们的这\n些需求而产生的。\n环境健康危险度评价是保护公众免受环境化学物质的\n危害以及为危险管理提供重要科学依据的最合适的方法。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 基本概念\n\n#### 风险（risk）\n又叫危险度，指接触一种有害因素后出现不良作用的预期频率，\n是个体或特定群体因接触某种剂量或浓度的化学物质导致有害效\n应出现的概率。\n无可见有害作用剂量（NoObservedAdverseEffectLevel，\nNOAEL)\n在规定试验条件下，用现有的技术手段或检测指标未观察到任何\n与受试样品有关的毒性作用的最大染毒剂量或浓度。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 基本概念\n最低可见有害作用剂量（LowestObservedAdverseEffectLevel\n，LOAEL)\n在规定的暴露条件下，通过试验和观察，一种物质引起机体（人\n活试验动物）某种有害作用的最低剂量或浓度。\n环境健康风险评价（Environmenthealthriskassessment）\n环境健康风险评价是以风险度作为评价指标，把环境污染物与人\n体健康联系起来，定量描述污染对人体产生健康危害的风险。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 基本概念\n1有國值化合物（Thresholdcompound）\n指大于某一值的所有剂量都可以诱导出致癌反应的化合物。\n无國值化合物（NoThresholdcompound）\n在大于零的剂量暴露下，均可能发生有害效应的化合物，又称为\n零值化合物。其剂量-反应曲线的演唱线通过坐标原点，为直线\n型，即认为这类化合物无安全剂量。主要为遗传毒性致癌物。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n二、环境健康危险度评价的基本步骤\n\n#### 1危害鉴定\n受评化学物质是否对健康有害？\n\n#### 流行病学资料·动物实验资料\n\n#### 体外实验资料·构效关系资料\n\n#### 2剂量反应关系评定 3暴露评价\n不同暴露水平下有害效应的 不同情况下的实际和预计暴\n发生如何？ 露如何？\n·收集定量的毒性资料 ·暴露人群\n·建立剂量反应关系 ·暴露途径\n由动物实验数据向人外推 ·暴露的程度\n\n#### 4危险特征分析\n有害效应在人群发生的概率如何？\n·估计有害效应发生的可能性\n·评价各阶段的不确定性因素\n·对健康危险评定作总结\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n（一）危害鉴定\n危害鉴定（hazardidentification）属于定性的危\n险度评价，它要回答是否有证据表明受评化学物质\n会对暴露人群的健康产生危害的问题。流行病学研\n究、病例报告、临床研究以及动物实验研究可提供\n这方面的信息。\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n（二）剂量-反应关系评定\n剂量-反应关系评定（dose-response assessment)\n是通过人群研究或动物实验的资料，确定适合于人\n的剂量-反应曲线，并由此计算出评估危险人群在\n某种暴露剂量下的危险度的基准值。\n非致癌物的剂量反应关系评定：一般采用NOAEL\n法推导出参考剂量或可接受的日摄入量；\n致癌物的剂量反应关系评定：通过一些数学模型外\n推低剂量范围内的剂量--反应关系....\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n（三）暴露评价\n暴露评价（exposureassessment）是健康危险\n度评价中的关键步骤。通过暴露评价可以测量或估计人\n群对某一化学物质暴露的强度、频率和持续时间，也可\n以预测新型化学物质进入环境后可能造成的暴露水平。\n一般可通过测定环境中有害物质的水平（即外暴露量）\n初步了解人群的暴露情况。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n为降低评价中的一些不确定因素，较准确地对\n暴露水平作出判断，可通过测量内暴露剂量和生物\n有效剂量，如分析血、尿、头发或其它生物材料中\n的化学物质或其代谢产物，掌握有害物质实际进入\n或作用于人体的量。\n这些指标的最大优点是它们可减少在估计不同\n途径暴露时的许多假定因素，消除不同环境介质对\n生物利用度的影响。\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n吸入暴露：估计污染物经呼吸道进入人体的量时\n，首先要了解它们在空气中的浓度。确定空气中\n污染物浓度的直接方法是进行实际测定，但有时\n往往得不到实际的资料而要进行估算。\n食入毒性：估计污染物经消化道的吸收量时，应\n考虑污染物在各种介质中的含量，每日食品、水\n的摄入量以及消化道实际的吸收系数。\n皮肤接触暴露：为了估计污染物经皮肤的吸收量\n，需要了解污染物在土壤或灰尘中的浓度、暴露\n皮肤的面积、皮肤的吸收系数以及暴露的期间等\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n（四）危险表征分析\n危险表征分析（riskcharacterization）是定量危\n险度评价的最后一步，也是危险管理的第一步。它\n通过综合暴露评价和剂量一反应关系评定的结果，\n分析判断人群受到某种危害的可能性大小，并对其\n可信程度或不确定性加以阐述，最终以正规的文件\n形式提供给危险管理人员，作为他们进行危险决策\n的依据。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n#### 危险特征分析主要步骤\n11.对前三阶段的结果进行综合分析\n口危险度评价者应判断各阶段的实验动物资料与人有无关\n联，各阶段之间是否协调一致，有无矛盾之处。\n口还应对暴露评价和剂量反应关系评定阶段得出的许多估\n计值的假设进行总结和讨论。\n口健康危险度评价每一阶段可信度的大小直接关系到最终\n评价结果的可信程度(表6-2)。\n口在分析过程中，应注意一些重要资料或数据是否充足，\n依据是否可靠。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n表6-2影响健康危险度评价的一些因素\n\n#### 因素 说明\n低剂量外推 外推过程中产生的不确定因素很多，是影响健康危险度评\n\n#### 价的主要环节\n人群变异 使用标准的暴露参数会低估对易感人群的实际危险度，而\n过分考虑易感人群会高估人群整体的危险度。\n暴露变异 使用模型或实际测量都不能完全反映实际的暴露情况\n多种暴露的 一般危险度评价时往往只针对一种暴露因子，很少考虑同\n\n#### 同时存在 时存在的其他暴露因子\n种属差异 一般假定人是最敏感的种属，因此会高估实际的危险度\n统计学处理 统计学上有意义并不意味着有生物学意义，反之亦然。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n2.危险度分析\n口定量危险度分析可以针对一种或多种化学物质进行，有\n时还需要对暴露人群总的危险作出评估。\n·在致癌物的危险度评价中，常常要将不同长短的暴露\n期间转换为终生暴露时间后再进行评估。\n·对于非致癌物的短期暴露影响，可采用将短期暴露量\n与RD（致癌强度系数）进行比较的方法。如果二者\n的比值小于1，可以认为该化学物质的危险度较小。\n口对于化学物质某种途径暴露的危险度评价，一般最好采\n用来源于同一暴露途径的资料。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n3.评定结果的书面总结\n口环境健康危险度评价的结果最终以书面报告的形式\n交给危险管理者。\n口在书面报告中，特别要对作出估计的依据及有关材\n料进行详细的分析，并指出评估中的不足之处。\n口在报告中还可采用一些危险度的表示方法以便于危\n险管理者做出判断。\n口有大量文献为依据且经周密分析的总结报告将有助\n于危险管理者做出更为正确的决策，使最终的管理\n措施不仅可行有效，而且公众接受性也较强。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 谢谢\n"}, {"id": "pdf-010-2", "group": "原始课件 · PDF原文", "title": "010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法", "md": "# 第五章 环境毒理学常用实验方法\n\n> 来源: 010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法.pdf\n> 页数: 82\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 环境毒理学\n授课人：森巴提?叶尔肯\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n## 第五章环境毒理学常用实验方法\n本章将讨论以下内容：\n\n### 5.1概述\n\n### 5.2环境化学物等一般毒性试验\n\n### 5.3致畸、致癌、致突变等毒性试验\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 5.1 概述\n\n#### 毒理学研究的主要手段\n\n#### 动物实验\n借助于动物模型模拟人体接触环境化学品的各种\n条件，观察实验动物的毒性反应，再外推到人\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 概述\n\n#### 毒理学研究的主要手段\n\n#### 体内实验 动物实验 体外实验\n采用整体动物、动物器官、组织及细胞等进行\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 概述\n一、实验动物的选择\n\n#### 人工培育 科学研究\n控制其携带微生物、遗传背景明确，来源清楚。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 概述\n1.物种的选择--－基本原则\n对外源的毒性反应及代谢特点与人类接近的物种\n\n#### 自然寿命不太长的物种\n\n#### 易于饲养和实验操作的物种\n\n#### 经济并易于获得的物种\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 概述\n1.物种的选择--－常用动物\n选用两个物种进行试验、评价毒性反应的物种差异\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 概述\n2.品系的选择\n品系 用计划交配的方法获得的起源于共同祖先的一群动物。\n具有共同的遗传来源、相似的外貌特征、独特的生物\n\n#### 同一品系\n\n#### 学特性及稳定的遗传性能\n类别 遗传特性 繁殖方式 应用场景\n近交系动物 基因高度纯 连续兄妹/亲 遗传研究、\n\n#### 近交系动物 合 子交配\n\n#### 药物测试\n突变系动物 疾病模型、\n根据实验需要 携带特定基 选择性交配或基\n\n#### 突变系动物 基因功能研\n\n#### 因突变 因编辑 究\n\n#### 杂交群动物\nF1代杂合 干细胞研究、\n\n#### 杂交群动物 两个近交系杂交\n\n#### 封闭群动物 子 免疫实验\n\n#### 遗传多样性 毒理学、行\n\n#### 封闭群动物 群体内随机交配\n\n#### 高 为学研究\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 概述\n3.微生物控制的选择\n为确保实验结果的真实性、可靠性和增加可比性、可\n\n#### 微生物控制\n重复性及科学性。\n应对实验动物携带的微生物控制，根据对动物微生物\n\n#### 实验动物分类\n控制的净化水平，我国将实验动物分为无菌动物、悉\n生动物、无特定病原体动物和清洁动物。\n等级 微生物控制 饲养环境 应用场景\n无菌动物 完全无微生物 无菌隔离器 微生物组、免疫机制研究\n悉生动物 已知特定微生物 无菌隔离器 特定菌群功能研究\nSPF动物 排除特定病原体 屏障环境 生物医学研究、疫苗开发\n清洁动物 排除常见病原体 普通屏障环境 基础实验、教学\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n年龄 毒理学试验选用的实验动物的年龄取决于实验\n\n#### 的类型\n\n#### 成年动物 急性试验\n年幼或初断乳动物 亚慢性、慢性试验\n实际工作中常以动物的体重粗略的判断动物的年龄\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n性别 同物种、同品系但不同性别的实验动物对化学\n\n#### 物毒性的敏感程度有差别\n\n#### 无特殊要求 应选用雄两种性别\n已知不同性别敏感程度物 选择敏感的性别\n如实验中发现性别差异，应对实验结果分别统计分析\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n毒理学试验一般应选用未产未孕的雌性动物\n生理状态 除进行与生殖有关的试验时需有计划地合笼交\n配外，雌雄动物应分笼饲养。\n毒理学试验应选用健康的动物。一般在试验前\n健康状态 检疫观察5-7天。对于大动物的亚慢性和慢性试\n验，还应进行血液学和血液生化学检查，剔除\n异常动物。\n如对狗进行试验，应该常规驱除肠道寄生虫\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 概述\n二、常用的染毒方法\n\n#### 使动物通过一定的途径接触毒物\n根据试验的目的并结合人体的实际接触方\n\n#### 染毒\n式、毒物的多少、理化性质以及设备条件\n等来决定。\n主要染毒途径：经口、经皮肤及经呼吸道吸入\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n#### 概述\n1.经口染毒\n\n#### 采用灌胃、吞服胶囊和饲喂的方式\n灌胃前需要禁食；\n灌胃 灌胃针从口角进入，针头轻压舌根，引起小\n鼠吞咽反射；\n进入食道后，继续入针时应无阻力。针头到\n达胃部后推动注射器，推入需要的计量\n竖直拔出针头，完成灌胃操作。\n注意： 若感到阻力或动物挣扎时，应该立即停止进针或将针拔出；\n参考给药量：小鼠0.1ml/10g体重，最大不超过0.5ml/10g体重\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 概述\n1.经口染毒\n\n#### 采用灌胃、吞服胶囊和饲喂的方式\n\n#### 迫使实验动物吞服胶囊\n\n#### 吞服胶囊 该方法计量准确\n\n#### 适合不合实验动物“口味”的药物\n饲喂 要求受试物占饲料的比例小于5%。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 概述\n2.经呼吸道染毒\n\n#### 静式吸入染毒和动式吸入染毒\n将实验动物置于密闭的染毒柜中，加入易挥\n\n#### 静式吸入\n发的液态或气态受试物达到一定的浓度。\n动式吸入 采用机械通风装置，使实验动物在氧和二氧\n化碳分压较为恒定、受试化学物浓度也较为\n\n#### 稳定的环境中进行\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 概述\n3.经皮肤染毒\n液态、气态、粉尘都有可能与皮肤接触\n研究化合物经皮肤吸收的毒性作用，及化合物对接触化合物\n皮肤的局部作用，均需使用经皮肤染毒的方式\n动物的被毛有碍于与化学物的直接接触，因此，\n在经皮肤染毒前需要去除染毒部位的被毛\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 概述\n4.其他方式\n根据试验目的和要求以及染毒物质的性状，还可选用腹腔注\n射、皮下注射、静脉注射等。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n\n#### 动物血液采集\n检查血液，可了解受试物对血液系统的作用，反应受试物对各\n器官系统功能及受试物代谢过程的影响。\n\n#### 实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n\n#### 小鼠 0.10 0800\n大鼠 1.00 2.005.00 10,00\n免猴 10.00 40.0015,00 60.00\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n小鼠、大鼠：\n所需血量不多时，可采用尾尖采血和眼眶静脉丛采血\n\n#### 用血量较多时，可采用心脏采血法\n对采血后拟处死的动物，可采用断头采血法。\n\n#### 实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n\n#### 小鼠 0.10 0.30\n\n#### 大鼠 1.00 2.00\n\n#### 鼠 5.00 10.00\n免 10.00 40.0015,00 60.00\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n对豚鼠：可采用耳缘剪口采血和心脏采血\n对家兔：·可采用耳静脉采血，是家兔最为常用的取血\n\n#### 法之一\n常作多次反复取血用，故保护耳缘静脉，防\n止发生栓塞。\n需血量较多少，也可采用心脏采血。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n2.动物尿液、粪便的收集\n对尿液、粪便的分析，可了解受试物的吸收代谢的特点\n采用特制的容器（代谢笼）进行尿液、粪便的收集。\n必须保证粪便和尿液分开，以防止相互混合\n常用的粪尿分离收集器，其类型有玻璃、塘瓷、瓷器等制\n\n#### 品，可根据实验室条件适当选用\n\n#### 样品应在新鲜时进行检验\n实验期间膳食成分应一致，且须在特定时间内收集样品\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n#### 概述\n四、实验动物处死方法\n\n#### 处死要求\n尽量快速，不是动物集体发生与毒理试验无关的病理变化、\n\n#### 操作简便为原则\n\n#### 处死方法\n（1) 脱颈椎法：适用于对小动物（大、小白鼠）处死。\n(2) 断头法：适用于大、小白鼠处死。\n（3）麻醉法：置于有麻醉剂（氯仿或乙醚）的密闭容器内，使动物麻醉\n致死。大动物则须用注射麻醉剂法进行。\n（4）空气栓塞法：用注射器向动物静脉内迅速注人一定量的空气，使动\n物血管内形成大量气栓而致死。适用于大动物的处死。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 概述\n五、实验动物的解剖检查\n\n#### 病理形态学检查\n，对试验动物进行大体解部，观察各脏器有无异常\n\n#### 准备\n复查动物的编号、实验组别、称体重，进行一般的体表状况的观察。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 概述\n五、实验动物的解剖检查\n\n#### 实质器官\n观察脏器的颜色、形状大小等情况。切面有无外翻，各结\n构层次是否清晰等。\n\n#### 空腔器官\n\n#### 观察其内容物的量和性质等变化\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n\n### 5.2环境化学物一般毒性及其评价\n一般毒性：\n包括急性毒性、亚慢性毒性和慢性毒性、蓄积毒性等\n特殊毒性：\n致畸、致癌、致突变、生殖、发育毒性\n毒物作用时间的长短是决定其毒性效应的主要因素之一\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n\n### 5.2环境化学物一般毒性及其评价\n\n#### 案例\n近年来，马兜铃酸致癌致肾炎的新闻引起了人们的热议。临床上\n将马兜铃酸肾病分为三种类型：急性马兜铃酸肾病、慢性马兜铃酸肾病\n以及肾小管功能障碍型马兜铃酸肾病。\n急性马兜铃酸肾病：多由在较短的时间内，大量服用含有马兜铃酸的药物\n所致，临床表现主要为少尿或非少尿性急性肾功能衰竭。\n慢性马兜铃酸肾病：多由持续或间断小剂量服用含马兜铃酸药物所致，肾\n功能呈进行性损害。\n肾小管功能障碍型马兜铃酸肾病：通常在间断小量服用含马兜铃酸药物后\n数月出现症状，主要表现为肾小管性酸中毒等。由此可见，同样的毒物根\n据其染毒时间的长短和剂量大小的不同，可能导致不同的毒性作用\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n一、急性毒性\n急性毒性是指机体一次接触或24小时内多次接触某一化学物所引1起的\n毒性效应，包括死亡效应。\n一次·经口或经注射染毒则为操作时瞬间染毒；\n经呼吸道或经皮肤染毒则为特定期间内持续接触化学物的过程\n多次·毒性过低或一次染毒剂量受生物体容量限制，需要给予实验动\n物较大剂量时，可以在24h内多次染毒\n目的：\n是测定半数致死量（或浓度，LDso或LC5o），急性中毒國剂量（或浓度)。\n另外：急性毒性研究可为亚慢性、慢性毒性研究及其他毒理试验染毒剂\n量的设计和观察指标的选择提供依据，为毒性作用机制研究提供线索。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n\n#### 半数致死量（LD5o）的测定\n急性毒性大小常用LD表示；\n指的是半数试验动物死亡所使用的毒物剂量；\n\n#### 若使用的是溶液，则用LC50\nLDs或LCs是急性有关指标中重要的参数；\nLD50（LC5o）可能于毒性分级;\n毒性大小比较的依据；\nLD5o（mg/kg）、LC5o（mg/kg），数值越小毒性越强。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n\n#### 急性毒性试验的一般操作流程\n·成年健康的小鼠\n\n#### 选择受试生物：·\n雌、雄各半;\n若待测化学物对性别有敏感性，则根据需求调整雌雄比例\n染毒方式和染毒计量的选择：\n·事先查阅文献，根据毒物结构和理化性质寻找类似化学物的毒性资料\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n\n#### 急性毒性试验的一般操作流程\n染毒剂量：\n·取类似物种，染毒途径相同的LDso作为参考中值\n·以大剂量间隔染毒，找出相应的致死剂量范围（在少量动物上试验）\n·在这几个剂量范围设定几个试验组，进行正式实验。\n观察周期：\n·一般为14天（两周）\n依据受试动物测试相关规定确定观察周期\n对已知的速杀性药物，可缩短观察时间\n具体观察时间，应在试验报告及结果表示中说明，如7d的LD50\n根据观察期内动物的总死亡情况，计算LD50\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n\n#### 半数致死剂量的影响因素\n?实验动物的饲养环境和营养因素\n\n#### 实验人员操作的熟练程度\n\n#### 受试化学物的浓度和稀释倍数\n同一外源化学物，同一品系动物；同样接触途径测定的LD50只值会有2-3倍差异\n虽然半数致死剂量是急性毒性试验最为重要的毒性指标，在试验过程中，\n同样可以观察体重变化、中毒症状，对死亡个体进行病理检查等进一步确\n定污染物的毒性作用方式。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---亚慢性毒性试验\n在通常情况下啊，人类对环境污染物接触的水平较低，不至于发生急性中毒，\n却会在长期反复接触中慢性中毒。\n\n#### 亚慢性毒性\n又称亚急性毒性，机体在相当于1/20左右生命期间，少量、反复接触有\n害化学和生物因素引起的损害作用。\n\n#### 亚慢性毒性试验\n又称亚急性毒性试验，受试动物在1/20左右生命周期，每日、反复、多\n次接触受试物的毒性试验。\n\n#### 举例：大鼠生命为2年（24月）\n\n#### 需染毒：1~2个月\n\n#### 1/20即1～2个月\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---慢性毒性试验\n\n#### 慢性毒性\n机体长期、少量、反复接触外源化学物所应期的毒性效应，接触期限一\n般为大于生命期的10%；\n\n#### 慢性毒性试验\n试验动物长期接触低剂量外来化学物，产生的生物学效应的试验称为慢\n性试验;\n特点：\n耗费的人力、物力和时间比较大，亚慢性毒性试验常作为慢性毒性试验\n的预备或筛选试验，必要时才进行慢性毒性试验\n染毒期长达2年或终生染毒的慢性毒性试验，常和致癌试验合并进行\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n两种试验在试验设计和方法上除染毒期限有所不同，其他基本相同\n\n#### 受试动物\n受试动物的种属、品系，应该是在急性毒性试验中，已被确定为对受试物\n\n#### 敏感的动物\n一般要求选择两种受试动物：啮齿类、非齿齿类动物各一类\n\n#### 性别为雌雄各半\n建议选用年幼、初断奶的动物为试验对象，以便更全面了解受试物的毒效\n\n#### 应\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒剂量的选择\n一般应设置2个剂量组和1个对照组\n高剂量组：要能引起明显的中毒反应，不会让很多动物死亡\n\n#### 低剂量组：不引起任何中毒反应\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒途径\n应尽量模拟人类接触受试化学物的方式\n慢性、亚慢性毒性研究的染毒途径一致\n经胃肠道染毒时，毒物最好采用胃饲法\n受试化学物有异味或易水解时，也可采用灌胃方法染毒\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒期限\n根据受试物的种类和试验动物的物种而定\n\n#### 亚慢性毒性一般染毒1-3个月\n慢性毒性一般染毒3-24个月，甚至终生染毒\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 试验设计、观察指标\n（1）一般性指标\n敏感的综合性指标，综合反映毒物对机体的毒作用（外见体征；粪便性状；\n食物利用率；体重变化）\n（2）试验室检查\n\n#### 包括血液学检查、肝功能、肾功能\n（3）病理组织学检查\n试验结束后，要及时解剖死亡的动物，肉眼观察大体病理变化，若有改变\n则需要做组织病理学检查，对于存活的动物也要做解部检查，必要时做组\n\n#### 织病理学检查\n（4）特异性指标\n根据受试物的毒性资料，试验中的观察和受试物结构等增加其他指标的检查\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 试验设计、观察指标\n根据亚慢性毒性试验的结果，可以确定受试物的主要作用，靶器官对最大\n无作用水平和最大剂量做出初步估计，为进一步开展慢性毒性试验提供依据\n\n#### 慢性毒性试验\n对受试物在低剂量长时间接触机体时引起的毒性作用有更深入的了解\n可以依据敏感观察指标出现异常的最小阀剂量\n找出该受试物慢性毒性作用的最大无作用剂量\n为受试物能否应用或为制定在环境中卫生标准提供重要的参考依据\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 蓄积作用的基本概念\n1）定义：\n当外源化学物连续进入机体，且吸收速度或总量超过代谢转化排除的总量\n或速度时，化学物质很有可能在体内增加并贮留，称为化学物的蓄积作用。\n化学物质容易蓄积的部位称为储存库；\n\n#### 常见的储存库包括\n\n#### 血浆蛋白\n\n#### 脂肪组织\n\n#### 肝肾\n\n#### 骨骼\n\n#### 大多数蓄积作用都会产生蓄积毒性\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 2）蓄积毒性作用\n低于中毒剂量的外源化学物反复与机体接触一定时间后致使机体出现中\n毒作用;\n\n#### 3）环境污染物体内蓄积过程\n\n#### 物质蓄积\n·可用化学方法测得体内污染物或代谢物\n污染物不断进入机体内，其吸收量大于排出量，使其在体内的量逐渐积累增多\n\n#### 功能蓄积\n不断进入机体内的污染物，反复作用机体，引起机体一定结构和功能变化，\n并逐渐累积加重，最后导致出现损害作用；\n测不出该物质，例有机磷化合物。\n物质蓄积和功能蓄积是相对而言，同时存在又互为基础，在史籍中难以严格区别\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n定义：以生物效应为指标，用蓄积系数（k）评价蓄积作用，将多次染毒\n\n#### 与一次染毒毒性效应进行比较\n优点：方法简便，是评价蓄积作用的常用方法；\n缺点：无法区别物质蓄积还是功能蓄积\n∑LD50(n）—→多次染毒使半数动物出现效应的总剂量\n\n#### 蓄积系数（K）=\n表5-1蓄积作用强度分级（引自刘毓谷，环境毒理学教材，1987）\n\n#### 蓄积系数（K） 蓄积作用强度\n\n#### <1 高度蓄积\n\n#### 1~3 明显蓄积\n\n#### 3~5 中度蓄积\n\n#### >5 轻度蓄积\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法（固定剂量法、剂量定期递增染毒法、剂量固定的20\n天蓄积法)\n\n#### 固定剂量法\n使用大鼠或小鼠，通过经口灌胃、腹腔注射、染毒。试验周期为25-100天\n先求出LD5o-->选取相同条件的至少40只试验动物\n随机分为染毒组和对照组两组（每组至少20只，雌雄各半）\n每天以固定剂量在相同时间和相同途径对试验组进行染毒\n\n#### 观察并记录动物死亡数\n当试验组一半动物死亡时即可终止试验 若接触剂量依据蓄积到\n计算累积的总的接触剂量(LDso(n) 5*LD5o的剂量，那么即便死\n\n#### 亡数未超过半数，仍要终止\n根据公式计算K值 试验，此时K>5，表明蓄积作\n\n#### 用不明显\n\n#### 依据蓄积毒性强度分析进行评价\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n\n#### 确定蓄积系数常用的方法\n\n#### 剂量定期递增染毒法\n大体上与固定剂量法一致，不一样的是试验开始时染毒组需要按0.1LDso剂量进行 \n\n#### 致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n\n#### 现实生物中引起的致畸作用\n物理因素中的电离辐射（x光射片）\n\n#### 生物因素中病毒的感染\n\n#### 天然条件下的出生缺陷\n水硬度有关的中枢系统畸形的发生；\n\n#### 水气象有关的胎儿畸形\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n\n#### 化学因素（甲基汞、环境激素）\n\n---\n\n<!-- page 66 -->\n\n![page 66](page_066.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n用于检测某些环境污染物能否通过妊娠母体引起胚胎畸形的一种动物实验方法。\n\n#### 致畸试验步骤\n\n#### 代谢过程要与人类相近\n\n#### 受试生物的选择\n胎盘与人类胚胎构造相似（包括胚胎的层数和厚度）\n\n#### 体型小\n动物试验选取原则 易繁殖 多采用大鼠、小鼠和家兔实验动物\n\n#### 价格低廉\n\n---\n\n<!-- page 67 -->\n\n![page 67](page_067.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n剂量分组：通常根据试验目的和要求决定\n）只做有无致畸作用的定性检测，则剂量组较少；\n若还需要探讨毒性作用的靶器官，则剂量组增多；\n在正式试验前要先做预实验，用于确定实验所需试验剂量范围\n若未做预实验，则一般以1/30-1/2的LD5o为最高剂量组，\n1/100-1/30LDso为低剂量组，\n按等比例差在高低剂量组之间插入中间剂量组\n5以交配后确定已受精的雌性动物为计数对象（鼠类：15-20只；家兔：7-8只）\n6在进行实验时，除了各试验组外，还应同时设立阴性和阳性对照组\n\n---\n\n<!-- page 68 -->\n\n![page 68](page_068.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 试验操作\n\n#### 致畸试验\n剂量分组：通常根据试验目的和要求决定\n7实验处理上，需要先将性成熟但未交配过的雌鼠和雄鼠同笼过夜，确定雌鼠受\n孕后，推算孕龄，在胚胎的“敏感期”进行受试物暴露\n致畸实验常用的终点指标：暴露完之后的解部，观察\n实验动物的解剖时间为分娩前1-2天为宜，对胚胎的外部骨骼和内脏进行检查，\n并且通过多方面分析致畸试验结果。\n\n---\n\n<!-- page 69 -->\n\n![page 69](page_069.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌\n恶性的肿瘤，严重威胁人类健康的主要疾病之一；\n人类肿瘤80-90%与环境因素有关，包括物理、化学、生物因素；\n病因分析，人类肿瘤80-85%与化学因素有关\n把诱发肿瘤的化学物质称为化学致癌物\n（①有机化学物，②天然化学物，③无机化学物，4合成化学物）\n\n---\n\n<!-- page 70 -->\n\n![page 70](page_070.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌\n肿瘤形成过程：\n1引发阶段：指正常细胞在化学致癌物直接或间接作用下转变为癌前细胞的过程\n2促长阶段：经过引发的癌细胞不断增殖，直至形成临床上可被检出的肿块过程\n③进展阶段：指引发细胞群进一步的表型改变；包括恶性前型转变为恶性型细胞等过程\n毒性方面化学致癌物的致癌作用与一般毒性作用在许多方面有一定的相似之处\n\n---\n\n<!-- page 71 -->\n\n![page 71](page_071.jpg)\n\n2.环境化学物特殊毒性及其评价\n\n#### 恶性肿瘤怎么产生的\n：框在点击“”时会进行转换，用时则会变为可点击的视频。框移位和\n\n---\n\n<!-- page 72 -->\n\n![page 72](page_072.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌物在体内也进行生物转化，但同时也有其自身的特点\n1化学致癌物引起的生物学效应，具有持久性和迟发性\n②在动物实验中，当剂量相等时，多次给予受试物比一次给予所产生的效应更大\n③从机理来看致癌作用和宿主细胞的遗传物质或其他细胞大分子的相互作用有关\n致癌作用的本质是致癌物通过DNA加合物形成、氧化损伤或\n表观遗传调控，引发体细胞突变并破坏细胞生长调控网络。这\n一过程具有剂量依赖性和时间依赖性\n\n---\n\n<!-- page 73 -->\n\n![page 73](page_073.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ①体细胞突变学说\n\n#### 化学\n\n#### 突变\n致癌因素 物理 体细胞((DNA) →致癌\n\n#### 生物\n\n#### 致癌形成的基础是体细胞发生突变\n\n---\n\n<!-- page 74 -->\n\n![page 74](page_074.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ②分化障碍学说\n\n#### 干扰 分化\n致癌因素 细胞 ?紊乱 癌变\n\n#### 增殖\n细胞癌变只需要细胞分化过程有关的基因调控过程受致癌因素感染，\n\n#### 使细胞分化和增殖发生素乱\n\n---\n\n<!-- page 75 -->\n\n![page 75](page_075.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n\n#### ③癌基因学说\n正常情况下，癌基因处于阻遏状态，只有当细胞内有关的调节机\n制遭到破坏的情况下，癌基因才能表达，导致癌变形成肿瘤;\n不同的致癌学只是侧重点不同，互有交叉，可能是在致癌作用的不同阶段\n所起作用不同而已。\n\n---\n\n<!-- page 76 -->\n\n![page 76](page_076.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n致癌试验是一种特殊的慢性毒性试验，目的是检验环境污染物或其代谢物是否具\n\n#### 有致癌或诱发肿瘤作用\n致癌试验重要方法：完整的哺乳动物长期试验\n一些短期快速筛检试验方法：满足大量外来化合物进行致癌试验\n1哺乳动物细胞体外转化法：有无致癌性的重要方法\n2优点：周期短、经济、方便、能直接与靶细胞作用\n当一种化学物已经通过短期试验证明其具有潜在致癌性或者其化学结构与某种已\n知致癌物十分近似，又在人类社会中具有实际应用价值时，应进行长期动物诱癌\n\n#### 实验\n\n---\n\n<!-- page 77 -->\n\n![page 77](page_077.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 诱癌动物试验与慢性试验类似\n首选啮齿类动物为受试生物：具有诱发肿瘤的感受性强、生物周期短、繁殖快、\n费用低等优点。\n\n#### 存在问题\n1高剂量的动物诱癌试验结果与人类实际接触的“低剂量“致癌物不同\n2其次人体和动物体内代谢酶系统存在着差别\n③动物“自发”肿瘤率在不同动物种系之间差别很大，人与动物之间可能也存在很大差别\n因此动物试验的结果不能完全代表人体的生物学改变\n\n---\n\n<!-- page 78 -->\n\n![page 78](page_078.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 剂量分组及染毒途径和期限\n设置对照组、最大耐受剂量和两个中间剂量（共4组）\n设置对照组、最大耐受剂量和半数最大耐受剂量（共3组）\n\n#### 每组雌雄动物各74只\n体重变化不应超过平均体重的±20%\n\n#### 染毒途径要模拟人体接触途径\n\n---\n\n<!-- page 79 -->\n\n![page 79](page_079.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 观察指标\n\n#### ①一般情况\n试验头三个月每周称一次动物体重，以后每两周称一次。\n消化道染毒时应计算食物或饮水消耗量\n每天观察两次动物，发现死亡、垂死的和临床异常的动物，应详细记载。\n试验第15个月时每组雌雄动物各处死10只，其余在第24个月处死，详细尸检\n和病理检查，同时进行血液生化检查\n\n#### ②肿瘤发生情况\n记录肿瘤出现时间、部位、大小、数目、外形、硬度和发展情况\n\n---\n\n<!-- page 80 -->\n\n![page 80](page_080.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 观察指标\n\n#### ③病理学检查\n·作完整的尸体解剖，检查所有器官组织。\n\n#### 4肿瘤发生率\n肿瘤发生率三天 试验终了时患肿瘤动物总数\n有效动物总数（最早出现肿瘤时的存活动物总数） X100%\n\n#### 5潜伏期\n以各试验组第一例肿瘤发现的时间作潜伏期。\n\n#### 6平均肿瘤数\n一个器官出现多个肿瘤或多个器官出现肿瘤，都可使平均肿瘤数增加，此数表示肿瘤的多\n发性。\n\n---\n\n<!-- page 81 -->\n\n![page 81](page_081.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n\n#### 基本概念\n\n#### 致癌试验\n\n#### 结果判定\n①肿瘤只发生在受试组动物，对照组无肿瘤，或受试组出现对照组没有的肿瘤类型\n2受试组与对照组动物均发生肿瘤，但受试组发生率高\n\n#### ③受试组的平均肿瘤数高于对照组\n4受试组与对照组的肿瘤发生率虽无显著差异，但受试组肿瘤发生的潜伏期短。\n上述四条中，通过统计学分析，任何一条有显著性差异并存在剂量反应关系是即\n\n#### 可认为受试物的致癌试验为阳性\n\n---\n\n<!-- page 82 -->\n\n![page 82](page_082.jpg)\n\n2.环境化学物特殊毒性及其评价\n\n#### 谢谢\n"}, {"id": "pdf-011-6-6", "group": "原始课件 · PDF原文", "title": "011-6-第六章环境化学物的安全性和健康危险度评价-6-第六章环境化学物的安全性和健康危险度评价", "md": "# 第六章环境化学物的安全性和健康危险度评价-6-第六章环境化学物的安全性和健康危险度评价\n\n> 来源: 011-6-第六章环境化学物的安全性和健康危险度评价-6-第六章环境化学物的安全性和健康危险度评价.pdf\n> 页数: 39\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第六章环境化学物的安全性\n\n#### 和健康危险度评价\n\n#### 第一节化学物的安全性评价\n一、基本概念\n二、安全性评价的内容\n三、国内外的化学物安全性评价法规\n\n#### 第二节环境健康危险度评价\n一、概述\n二、环境健康危险度评价的基本步骤\n三、环境健康危险度评价的新课题\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 引言\n\n#### 化学物数量：超过1000万种\n\n#### 投入生产和使用：约10万种\n每年近千种新化学物质投入生产和使用\n以前不要做什么试验，好东西上市。\n青霉素上市好，磺胺上市好！\n反应停上市坏了！\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 反应停\n\n#### thalidomide\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 国产品牌信不过 外国大牌不靠谱\n\n#### 港媒爆霸王\n\n#### SK-II\n\n#### 含致癌物\n\n#### 企业受冲击\n\n#### 退货接待\n\n#### 霸王 亏5.5亿\n\n#### BAWAN\n\n#### 新 药粉\n\n#### 升级配方\n事件湾：“含毒门”让王如何再称动 事件湾：SK-I等四大品牌被查违禁物质\n倩碧、欧莱雅等化妆品在加拿大被检出含6\n\n#### 种毒物\n\n#### more no more\n无泪配方 tears 无租配方 tearsJohnsons\" golimorababy baby\n\n#### 强生物儿工\n净含量200ml NT 净含量200ml\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n调查：23%美白祛斑化妆品汞超标最高超国标4万倍\n\n#### 你们的化妆品 可能.\n让我没有变白，反 你抹得不够厚！\n 化学物对实验动物的毒作用包括特殊毒\n性作用，从而评价和预测该化学物对人体可能造成的危害。\n\n#### >急性毒性试验\n\n#### >致突变试验\n>亚慢性毒性、生殖与发育毒性、代谢试验\n\n#### >慢性毒性试验和致癌试验\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n1.第一阶段（急性毒性试验）\n主要根据人体可能的暴露途径，选择经口、经皮、经呼吸道的\n染毒途径进行急性毒性试验，获得LD5o或LC50°\n农药等有可能与皮肤或眼接触的化学物需进行皮肤刺激试验、\n眼刺激试验和皮肤变态反应试验。\n对呼吸道有刺激作用的化学物还应进行吸入刺激阀浓度试验\n\n#### 农药第一阶段：急性毒性试验\n\n#### 染毒方式\n\n#### 皮肤 呼吸道\n\n#### 皮肤\n\n#### 眼睛\n皮肤刺激试验 眼刺激试验 皮肤变态反应试验 吸入刺激阀浓度试验\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n2.第二阶段（致突变试验）\n一般包括：\n①原核细胞基因突变实验，如Ames试验\n②真核细胞染色体畸变试验，如微核试验\n如实验结果为阳性，可在DNA修复合成试验、显性致死\n试验、果蝇伴性隐性致死试验和体外细胞转化等试验中\n再选两项进行最后的综合评价。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 发生畸变的染色体\n\n#### 一正常染色体\n\n#### 微核试验结果\n\n#### 微核（MN）\n\n#### 染色体畸变试验\n\n#### 成熟的红细胞（NCE）\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n3.第三阶段（亚慢性毒性试验、致畸试验、\n\n#### 生殖试验和代谢试验）\n亚慢性毒性试验：①一般要求进行90天，②用于了解\n较长期反复染毒受试化学物后对动物的毒作用性质和\n靶器官，③评估对人体健康可能引起的潜在危害，④\n估计最大无作用剂量，5并为慢性毒性试验和致癌性\n试验设计提供参考依据。\n致畸试验用于确定受试物的胚胎毒作用以及对胎仔的\n致畸作用。\n生殖试验一般要求进行两代，以判断受试物对生殖过\n程的影响。\n代谢试验是了解化学物在体内的吸收、分布和排泄特\n点，有无蓄积性以及毒作用的可能靶器官和组织。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n4.第四阶段（慢性毒性试验和致癌试验）\n这两项试验常结合进行。慢性毒性试验的目\n的在于确定化学物的最大无作用剂量，并综合上\n述试验的结果对受试物的安全性作出评价，进而\n提出人体安全的摄入量水平。\n致癌试验用于确定受试物对实验动物的致癌\n性。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n（三）安全性评价试验的选用原则\n根据受试物的种类来选择相应的程序，如农药、食品、化妆品和药物的毒理学\n安全评价一般分为4-5个阶段：\n\n#### ①根据受污的种类选择相应的程序\n\n#### ②遵循分阶段试验的原则\n③首创的化学物质一般选择第三到第四阶段的项目进行测试\n④与国内已获批准生产的化学品属同类化学品的，可先进行急性毒性试验和一项\n致突变试验。如试验结果与国内同类化学品一致，可不继续进行试验。\n③凡将两种以上的化学品混配成新的制剂时，除必须按相应要求对其成分分别进\n行试验外，还应进行急性联合毒性试验，如有明显的协同作用，则根据具体情\n况对该制剂进行必要的其它毒性试验。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n（四）安全性评价结果评价时应注\n\n#### 意的问题\n由于种属以及实验设计等的差异，在对毒理学\n安全性评价的结果进行解释时，应尽可能考虑多方\n面的影响因素，作出客观的结论。\n口为安全起见，在无确切资料的情况下，一般常把人看\n做最敏感的种属。\n口尽可能的收集受试物对人体毒性作用的资料。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n（四）安全性评价结果评价时应注\n\n#### 意的问题\n\n#### 实验设计的科学性\n\n#### 试验方法的标准化\n\n#### 熟悉毒理学试验方法的特点\n\n#### 评价结论的高度综合性\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n三、常用的化学物安全性毒理学评价程序简介\n\n#### 以农药安全性毒理学评价程序为例\n\n#### 主要内容与适用范围\n本程序规定了农药安全性毒理学评价的原则、项目及要求。本程\n序适用于在我国申请登记及需要进行安全性评价的各类农药。\n\n#### 评价总则\n\n#### 1）准备工作、了解应用情况\n\n#### 2）农药试验样品的选择\n\n#### 3）农药试验样品的要求\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n三、常用的化学物安全性毒理学评价程序简介\n\n#### 以农药安全性毒理学评价程序为例\n\n#### 毒理学评价项目\n\n#### 四个阶段\n\n#### 评价项目基本要求及结果评定\n\n#### 1）目的\n\n#### 2）受试动物\n\n#### 3）方法\n\n#### 4）结果评定\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 第二节 环境健康危险度评价\n一、概述\n人们在日常生活中自觉或不自觉地通过食物、空气和\n水等接触各种物理性、化学性或生物性的有害因子。这些\n因子是否会对健康造成危害，如果有危害，其严重性和发\n生的概率如何，环境健康危险度评价就是为满足人们的这\n些需求而产生的。\n环境健康危险度评价是保护公众免受环境化学物质的\n危害以及为危险管理提供重要科学依据的最合适的方法。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 基本概念\n\n#### 风险（risk）\n又叫危险度，指接触一种有害因素后出现不良作用的预期频率，\n是个体或特定群体因接触某种剂量或浓度的化学物质导致有害效\n应出现的概率。\n无可见有害作用剂量（NoObservedAdverseEffectLevel，\nNOAEL)\n在规定试验条件下，用现有的技术手段或检测指标未观察到任何\n与受试样品有关的毒性作用的最大染毒剂量或浓度。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 基本概念\n最低可见有害作用剂量（LowestObservedAdverseEffectLevel\n，LOAEL)\n在规定的暴露条件下，通过试验和观察，一种物质引起机体（人\n活试验动物）某种有害作用的最低剂量或浓度。\n环境健康风险评价（Environmenthealthriskassessment）\n环境健康风险评价是以风险度作为评价指标，把环境污染物与人\n体健康联系起来，定量描述污染对人体产生健康危害的风险。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 基本概念\n1有國值化合物（Thresholdcompound）\n指大于某一值的所有剂量都可以诱导出致癌反应的化合物。\n无闯值化合物（NoThresholdcompound）\n在大于零的剂量暴露下，均可能发生有害效应的化合物，又称为\n零值化合物。其剂量-反应曲线的演唱线通过坐标原点，为直线\n型，即认为这类化合物无安全剂量。主要为遗传毒性致癌物。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n二、环境健康危险度评价的基本步骤\n\n#### 1危害鉴定\n受评化学物质是否对健康有害？\n\n#### 流行病学资料·动物实验资料\n\n#### 体外实验资料·构效关系资料\n\n#### 2剂量反应关系评定 3暴露评价\n不同暴露水平下有害效应的 不同情况下的实际和预计暴\n发生如何？ 露如何？\n·收集定量的毒性资料 ·暴露人群\n·建立剂量反应关系 ·暴露途径\n由动物实验数据向人外推 ·暴露的程度\n\n#### 4危险特征分析\n有害效应在人群发生的概率如何？\n·估计有害效应发生的可能性\n·评价各阶段的不确定性因素\n·对健康危险评定作总结\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n（一）危害鉴定\n危害鉴定（hazardidentification）属于定性的危\n险度评价，它要回答是否有证据表明受评化学物质\n会对暴露人群的健康产生危害的问题。流行病学研\n究、病例报告、临床研究以及动物实验研究可提供\n这方面的信息。\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n（二）剂量-反应关系评定\n剂量-反应关系评定（dose-response assessment)\n是通过人群研究或动物实验的资料，确定适合于人\n的剂量-反应曲线，并由此计算出评估危险人群在\n某种暴露剂量下的危险度的基准值。\n非致癌物的剂量反应关系评定：一般采用NOAEL\n法推导出参考剂量或可接受的日摄入量；\n致癌物的剂量反应关系评定：通过一些数学模型外\n推低剂量范围内的剂量--反应关系....\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n（三）暴露评价\n暴露评价（exposureassessment）是健康危险\n度评价中的关键步骤。通过暴露评价可以测量或估计人\n群对某一化学物质暴露的强度、频率和持续时间，也可\n以预测新型化学物质进入环境后可能造成的暴露水平。\n一般可通过测定环境中有害物质的水平（即外暴露量）\n初步了解人群的暴露情况。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n为降低评价中的一些不确定因素，较准确地对\n暴露水平作出判断，可通过测量内暴露剂量和生物\n有效剂量，如分析血、尿、头发或其它生物材料中\n的化学物质或其代谢产物，掌握有害物质实际进入\n或作用于人体的量。\n这些指标的最大优点是它们可减少在估计不同\n途径暴露时的许多假定因素，消除不同环境介质对\n生物利用度的影响。\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n（四）危险表征分析\n危险表征分析（riskcharacterization）是定量危\n险度评价的最后一步，也是危险管理的第一步。它\n通过综合暴露评价和剂量一反应关系评定的结果，\n分析判断人群受到某种危害的可能性大小，并对其\n可信程度或不确定性加以阐述，最终以正规的文件\n形式提供给危险管理人员，作为他们进行危险决策\n的依据。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 危险特征分析主要步骤\n11.对前三阶段的结果进行综合分析\n口危险度评价者应判断各阶段的实验动物资料与人有无关\n联，各阶段之间是否协调一致，有无矛盾之处。\n口还应对暴露评价和剂量反应关系评定阶段得出的许多估\n计值的假设进行总结和讨论。\n口健康危险度评价每一阶段可信度的大小直接关系到最终\n评价结果的可信程度(表6-2)。\n口在分析过程中，应注意一些重要资料或数据是否充足，\n依据是否可靠。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n表6-2影响健康危险度评价的一些因素\n\n#### 因素 说明\n低剂量外推 外推过程中产生的不确定因素很多，是影响健康危险度评\n\n#### 价的主要环节\n人群变异 使用标准的暴露参数会低估对易感人群的实际危险度，而\n过分考虑易感人群会高估人群整体的危险度。\n暴露变异 使用模型或实际测量都不能完全反映实际的暴露情况\n多种暴露的 一般危险度评价时往往只针对一种暴露因子，很少考虑同\n\n#### 同时存在 时存在的其他暴露因子\n种属差异 一般假定人是最敏感的种属，因此会高估实际的危险度\n统计学处理 统计学上有意义并不意味着有生物学意义，反之亦然。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n2.危险度分析\n口定量危险度分析可以针对一种或多种化学物质进行，有\n时还需要对暴露人群总的危险作出评估。\n·在致癌物的危险度评价中，常常要将不同长短的暴露\n期间转换为终生暴露时间后再进行评估。\n·对于非致癌物的短期暴露影响，可采用将短期暴露量\n与RD（致癌强度系数）进行比较的方法。如果二者\n的比值小于1，可以认为该化学物质的危险度较小。\n口对于化学物质某种途径暴露的危险度评价，一般最好采\n用来源于同一暴露途径的资料。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n3.评定结果的书面总结\n口环境健康危险度评价的结果最终以书面报告的形式\n交给危险管理者。\n口在书面报告中，特别要对作出估计的依据及有关材\n料进行详细的分析，并指出评估中的不足之处。\n口在报告中还可采用一些危险度的表示方法以便于危\n险管理者做出判断。\n口有大量文献为依据且经周密分析的总结报告将有助\n于危险管理者做出更为正确的决策，使最终的管理\n措施不仅可行有效，而且公众接受性也较强。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 谢谢\n"}, {"id": "pdf-011-6", "group": "原始课件 · PDF原文", "title": "011-6-第六章环境化学物的安全性和健康危险度评价-第七章 常见化学致癌物的环境毒理学", "md": "# 第六章环境化学物的安全性和健康危险度评价-第七章 常见化学致癌物的环境毒理学\n\n> 来源: 011-6-第六章环境化学物的安全性和健康危险度评价-第七章 常见化学致癌物的环境毒理学.pdf\n> 页数: 52\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第七章 常见化学致癌\n\n#### 物的环境毒理学\n\n#### 2025年4月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 主要内容\n\n#### 多环芳烃类\n\n#### 芳香胺类化合物\n\n#### N-亚硝基化合物\n\n#### 烷化剂\n\n#### 黄曲霉毒素\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n2022年3月至4月，全国多省市公示\n不合格化妆品共计82批次，面膜、染\n\n#### 发膏为不合格产品“重灾区\n在82批次不合格化妆品中，26批次为面膜，占31.7%。不合格项\n目大部分是菌落总数超标问题，包括霉菌和酵母菌总数超标。\n染发类产品，本轮抽检不合格化妆品里，24批次为染发膏，占\n29.3%。大部分抽检不合格染发膏的问题在于，被检测出标签\n（批件）未标识对苯二胺、间氨基苯酚、间苯二酚等成分。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n抽检发现女装致癌物超标2多倍，服\n装为什么致癌物超标？\n深圳市安若依电子商务有限公司生产的时尚女装，被检出一种名为“联苯\n胺”的可致癌芳香胺染料超标，而且超标非常严重。检测工程师表示，该\n产品的可致癌芳香胺染料实测高达540毫克每千克，超标27倍，这意味着致\n癌染料具有较高浓度，对人体健康带来的安全风险也更高。\n东莞市曼邦电子商务有限公司生产的牛仔马甲，也被检出可致癌芳香胺染\n料含量超过标准数值，达到30毫克每千克。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 投票量 最多可选1项\n买化妆品你会注意查看化妆品的配料表吗？\n\n#### 完全不看，因为看不懂\nB 看一下，但不是看配料表，看生产日期或保质期\n\n#### 会看，知道哪些成分的作用是什么\n会看，对化妆品配料表有一定的了解\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 第一节多环芳烃类\n最早认识：\n\n#### 数量最多：致癌物中占1/3以上\n\n#### 分布最广\n\n#### 与人类关系密切\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n什么是多环芳烃 （PAHS)\nPAHs（多环芳烃，一种致癌物质）：多环芳烃是分子中含\n有两个以上的苯环的炭氢化合物，包括茶、蒽、菲等150\n余种化合物。英文全称为PolycyclicAromaticHydrocarbons\n简称PAHs。\n性状：纯的PAH通常是无色，白色，或浅黄绿色的固体\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 多环芳烃的来源\n\n#### 自然源：生物合成，火山爆发等\n人为源：\n1.家庭及生活炉灶，工业锅炉等产生烟灰，占51%。\n2.各种产生和使用焦油的工业过程，如炼焦、石油热裂、煤焦油提炼、\n柏油铺路等，占20%。\n3.各种人为原因的露天焚烧和失火、抽烟等，占27%。\n4.各种机车车辆及内然机排出的废气，占0.9%。\n5.各种碳水化合物、氨基酸和酯肪酸在700C热解过程均有苯并（A）蒽\n产生，地面水中的BAP除了工业排污外，主要来自洗刷大气的雨水。\n在日常生活中，多环芳烃进人人体的最直接的途径是香烟烟雾和食\n品的吸食。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n多环芳香烃（PAHs)可能存在的材料\n木炭，原油，木馏油，焦油 (天然)\n药物，染料，塑料，橡胶，农药 (人为)\n润滑油，脱膜剂，电容电解液，矿物油，柏油 (人为)\n杀虫剂、杀菌剂、蚊香、吸烟、汽油阻凝剂(人为)\n\n#### 其它\n多环芳香烃（PAHs)可能存在的产品\n\n#### 塑料手柄\n\n#### 塑料包装箱\n\n#### 橡胶手柄\n\n#### 有异味塑料、橡胶产品\n\n#### 电子电气设备中的塑料橡胶制件\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 食品中多环芳烃的污染来源\n①食品在用煤、炭和植物燃料烘烤或熏制时直接受到污染；\n②食品成分在高温烹调加工时发生热解或热聚反应所形成，这是食品\n中多环芳烃的主要来源；\n③植物性食品可吸收土壤、水和大气中污染的多环芳烃；\n④食品加工中受机油和食品包装材料等的污染，在柏油路上晒粮食使\n粮食受到污染；\n5污染的水可使水产品受到污染；\n植物和微生物可合成微量多环芳烃。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n某些食品中3，4-苯并花含量（MG/KG）\n\n#### 食品 3，4-苯并花含量\n\n#### 烟熏鱼 1~10\n\n#### 冰岛式熏肉 23~107\n\n#### 火褪、香肠 0.02~14.6\n\n#### 烤牛排 8.0（美）\n鲜鱼、青花鱼 9.7（日)\n\n#### 沙丁鱼 6.5（意大利）\n\n#### 雪鱼 15（格陵兰）\n\n#### 贻贝 40~50（格陵兰）\n\n#### 菠菜 7.4\n\n#### 甘蓝 12.6~48.1\n\n#### 苹果 0.1~0.5\n\n#### 茶叶 3.9~21.3\n\n#### 大豆 3.1\n\n#### 精制植物油 0.4~36\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 序号 中文名 简称\n1 萘 Nap2 烯 AcPy3 Acp4 Flu5 菲 PA6 葱 Ant7 荧葱 FL8 Pyr9 苯并（a）蒽 BaA10 屈 CHR11 苯并（b）荧蒽 BbF12 苯并（k）荧蒽 BkF13 苯并（a）芘 BaP14 苯（1,2,3-cd）花 IND15 苯并（a,n）葱 DBA16 苯并（ghi）花（二萘嵌苯） Bghip\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n按其化学结构特点可以分为三类：\n(1)苯环类\n(2)苏、荧蒽及胆蒽类；\n(3)杂环类\n其中，（1）、（2）类为苯环类多环芳烃\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\nNaphthalin(CtoHe) Acenaphtylen(C2He)Acenaphthen(C2H1o) Fluoren(C13H1o)\nPhenanthren(C14H1o) Anthracen(C14H1o) Fluoranthen(CteH1o)*\nPyren(C18H10) Benz(a)anthracen(CteH12) Chrysen(Ct8H12)\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\nBenzo(b)fluoranthen(C2oH12)* Benzo（k)fluoranthen(C2oH12)* Benzo（a)pyren(C2oH12)*\nDibenz（a,h)anthracen(C22H14) Benzo(ghi)perylen(C22H12)* Indeno（1,2,3-cd）pyren（C22H12）*\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 苯环类\n\n#### 1）二环芳香烃不致癌\n2）三环以上的多环芳香烃有致癌性。三环芳烃的两异构体蒽和菲\n都无致癌性。但它们的某些甲基衍生物有致癌性。\n3）四环芳香烃有六个异构体，实验证明只有3，4-苯并菲有中等\n强度的致癌性，1，2-苯并葱具有极弱的致癌性。它们的甲基衍\n生物中2-甲基-3，4-苯并菲是强致癌物。1，2-苯并蒽的许多甲基、\n烷基及多种其他取代基的衍生物都有一定的致癌性，如9，10-二\n甲基-1，2-苯并葱是目前已知致癌性多环芳香烃中作用最快、活\n性最大的皮肤致癌物之一。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 苯环类\n4）五环芳香烃，五环芳香烃有十五个异构体，其中五个有致癌性。3，4-苯并\n花为特强致癌物，1，2，5，6-二苯并蒽为强致癌物，1，2，3，4-二苯并菲\n为中强致癌物，1，2，7，8-二苯并蒽和1，2，5，6-二苯并菲为弱致癌物。\n5）六环芳香烃，六环芳香烃的异构体比五环芳香烃的更多，但进行过致癌\n实验的仅十多种。其中3，4，8，9-二苯并花是强致癌物，1，2，3，4-二苯\n并花致癌性很强，3，4，9，10-二苯并花及1，2，3，4-二苯并花的7-甲基\n衍生物也有明显致癌作用，其余六环芳香烃无致癌作用或仅有弱的致癌性。\n\n#### 6）七环以上的芳香烃研究得较少\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 、荧蒽及胆蒽类\n本身无致癌性，但其某些衍生物具有致癌性。\n例如，1，2，5，6-二苯并、1，2，1，8-二苯并和1，2，3，4-二苯并\n等已被证实具有一定的致癌性，如可使小鼠发生皮肤癌。2，3-苯并蒽\n和7，8-苯并葱具有强致癌作用，对小鼠皮肤的致癌作用仅次于3，4-苯并\n花。\n\n#### 胆葱类\n胆葱具有较强的致癌性，它的许多甲基及其他烷基衍生物也具有较强的\n致癌性。例如3-甲基胆蒽是极强的致癌物，可致小鼠皮肤、宫颈、肺癌等\n癌症。在肠道，由细菌作用脱氧胆酸可转化为甲基胆蒽这一化学致癌物可\n能对人体有致癌作用。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n#### 杂环类\n多环芳烃的环中碳原子被氮、氧、硫等原子取代而成的化合物为杂\n环多环芳香烃。杂环类多芳香烃中有一些化合物具有一定的致癌性。如\n苯并吖啶、二苯并吖啶、咔唑。如苯并吖淀：葱分子环中10位的碳原子\n被氮原子取代的化合物为吖淀。苯并（A）吖啶、苯并（C）吖啶均无致\n癌性，它们的某些甲基衍生物却有致癌性。例如，8，10，12-三甲基苯\n并（A）吖啶和9，10，12-三甲基苯并（A）吖啶均为强致癌物，7，9-二\n甲基苯并（C）吖啶和7，10-二甲基苯并（C）吖啶均为极强的致癌物。\n后二者的致癌力比3-甲基胆葱还强。二苯并吖啶：二苯并吖啶中研究\n较多的有三个异构体，医学教育网搜集整理即二苯并（A，H）吖啶、及\n二苯并（C，H）吖啶，三者均有致癌性。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n香烟烟雾中多环芳香烃致癌物及其含量\n多环芳香烃 含量（ug/10支） 致癌活性\n3，4-苯并花 0.12~0.04 皮肤涂抹诱发皮肤癌\n苯并（b）荧蒽 0.01~0.02 仅次于3，4-苯并花的致癌作用\n苯并（j）荧蒽 0.06 皮肤涂抹诱发皮肤癌及乳头状瘤\n二苯并（a,h）葱 0.005~0.04 不同途径、数种试验表明有局部和全\n\n#### 身致癌作用\n二苯并（a,h）吖啶 0.001 涂抹及皮下注射都有致癌作用\n二苯并（a,j）吖淀 0.027~0.1 涂抹及皮下注射都有致癌作用\n7-H-二苯并（c,g）味唑 0.007 有局部及全身致癌作用\n苯并（e）芘 0.02~0.2 致癌活性比3，4-苯比弱\n二苯并（a,i）花 0.0002~0.1 皮肤涂抹及皮下注射都有致癌作用\n苯并（a,h）花 微量 皮肤涂抹入皮下注射都有致癌作用\n\n#### 屈 0.006~0.6 皮肤癌\n葫并芘 0.04~0.2 全能致癌物\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 单选题1分\n\n#### 以下哪种多环芳烃是不致癌的\n\n#### 六环芳烃\n\n#### 七环芳烃\n\n#### 三环芳烃\n\n#### 二环芳烃\n\n#### 提交\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n三.多环芳烃的致癌作用\n1.结构与致癌活性\n（1）K区理论 苯并[a]葱\nK区：易与核酸、蛋白质反应→致癌\n\n#### 苯并[a]蕙\nL区：对致癌反应起拮抗作用的区域\n\n#### 图7-1多环芳烃类的K区和L区\n苯并（A）蒽：L区活泼=不致癌；第7、12位被甲基取代，L区\n\n#### 不活泼>致癌\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n（2）湾区理论\n湾区理论由JERINA等于七十年代提出。\n多环芳香烃分子的末端环与分子的其他环\n形成的凹形结构为分子的湾区。形成湾区 湾区\n的末端环为湾区的角环。\n\n#### 湾区环氧化→环氧化物→氧环打开\n\n#### K区\n>正碳离子=与嘌呤环的N共价结合 苯并[a]芘\n\n#### DNA损伤\n湾区正碳离子稳定性越高一致癌性越强\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n湾区理论认为湾区的角环在代谢活化过程中对致\n癌性能起关键作用。代谢活化过程中湾区的角环\n形成的环氧化物是多环芳香烃的最终致癌形式，\n由湾区的环氧化物进一步形成湾区正碳离子。湾\n区正碳离子可与细胞内大分子结合，使细胞癌变。\n湾区正碳离子稳定性愈高，致癌性愈强。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n芳烃环氧化酶 芳烃水化酶HO H07.8-ePoxB(a)P 7.8-dioLB(a)PB(a)P\n\n#### 芳烃环 N-2鸟嘌呤-苯并花\n氧化酶 HOHOH H dRHO7.8-dioL-9.10-ep0x HHB(a)P HQHOHN-6腺嘌呤-苯并花\n\n#### HOHOH\n\n#### 苯并花与碱基的叠合物\n图7-2苯并（a）花可能的致癌机理（引自朱世能，1986）\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n（3）双区理论\n我国学者戴乾圆于1979年总结分析了致癌机理的“K区理论”和“湾区理论”后，\n用计算机证明多环芳烃分子显示致癌活性的必要和充分条件是分子中存在两个\n亲电活性区域，提出了“多环芳烃致癌性能的定量分子轨道模型----双区理\n论”。双区理论又称双官能亲电理论。用于阐明或预言分子结构与致癌活性之\n间关系的一种理论。\n对已有致癌活性数据的全部多环芳烃母体，系统地进行了微扰分子轨道（PMO）计\n算，包括湾区碳原子和K区碳原子的离域能，多环芳烃各个位置上的活性指数\n等，根据近代多环芳烃代谢研究资料，通过数据处理得出。\n双区理论认为：多环芳烃在体内致癌的关键步骤应是DNA互补碱对间的横\n向交联。此理论现已推广应用于烷基多环芳烃、非交变烃、偶氮染料、\n芳香胺等有机化合物的致癌活性预测。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n双区理论要点：\n（1）多环芳烃致癌作用的必要条件是其结构中要有两个，且只需两个\n活性区域（即双区），也即是致癌剂在代谢过程中产生的两个亲电活性\n中心。\n（2）有利于致癌潜力的两个亲电烷化中心的最优距离为0.28一0.30NM，\n若两个中心远远偏离这一距离，则该多环芳烃将丧失致癌活性。由于\nDIVA互补碱对间以氢键结合的成对负性原子间的距离，正好为0.28一\n0.30NM，因此，戴乾圆指出：DNA互补碱对间的共价交联，是启动细胞\n癌变的关键步骤，并将此种认识定名为双区理论。\n（3）用多环芳烃分子中两个活性区亲电正碳原子的离域能作参数，提\n出了高精度的结构致癌活性关系的定量公式：\n10gK=4.75/△E,△E22-0.05/2nE2\n（活化项） （脱毒项）\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n2.多环芳烃类物质的致癌机理\n（1)多环芳香烃的代谢活化\n英国BOYLAND从1930年起研究芳香烃代谢与致癌作用问题，他\n认为芳香烃首先经过环氧化过程才能有致癌能力。\n(2)多环芳香烃与DNA、RNA及蛋白质的结合\n3，4-苯并花，经代谢活化后的终致癌物为7，8-二氢二醇-9，10-\n环氧苯并（A）花，分子中的环氧环打开后，10位氧为亲电子中心，\n可与DNA和RNA碱基的亲核部位以共价键结合。根据研究得知3，4-\n苯并花的代谢活化终致癌物主要是与鸟嘌呤的2-氨基结合。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n三.多环芳烃在环境中的迁移转化行为及降解作用\n1.多环芳烃在环境中的迁移转化\n\n#### 多环芳烃\n\n#### 大气\ 胺的致癌作用\n1.芳香胺的化学结构与致癌活性\n（1）氨基位于多环芳烃中相当于萘的2位和联苯的对位上的化合物，均有较强致癌性：\n（2）氨基位于萘的1位或联苯的间位上的化合物，有弱活性；\n（3）芳香环上氨基的对位或邻位上的氢被甲基、甲氧基、氟或氯取代的化合物，致\n癌性增强。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\nNHCOCH2-秦胺 2-乙酰氨基笏\n\n#### 联苯胺 4一氨基联苯\n\n#### 2-萘胺、联苯胺：膀胱癌，肝癌\n2-乙酰氨基：肝癌、膀胱癌、乳腺癌\n\n#### 4氨基联苯：膀胱癌\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n2.芳香胺的致癌机理\n芳香胺是间接致癌物质，先需经过代谢活化，其活化过程如下：\n（1）氨基中的氮发生羟化，然后经重排形成邻位羟基化衍生物；\n（2）羟化后的活化产物发生酯化，主要是硫酯化。酯化后的产物是水溶\n性的，此时排到尿液中，储存于膀胱内，因而膀胱就成了靶器官；\n（3）酯化后的活化产物与核酸中的碱基作用，使细胞的DNA发生结构与\n功能的改变。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### N一亚硝基化合物\nN—亚硝基化合物（N—NITROSO—COMPOUND）是一类很强的化学致癌物，\n其化学通式为：\n亚硝胺：R、R为烷基、芳基或杂环\n\n#### N-N=O\n\n#### 亚硝酰胺：R为烷基，R为酰基\n目前，已知的N一亚硝基化合物有300余种，其中经动物实验证明具有致癌作\n用的约占90%。主要导致：食道癌、肝癌、胃癌、膀胱癌。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\nN一亚硝基化合物是引起人类恶性肿瘤的一类重要的致癌物质，他之所以比其他致癌物\n质更引人注意，原因在于：\n（1）这类物质在人类生活环境中的量虽不大，但却广泛存在；\n2 易于在环境中形成，不仅可以在环境中外源性合成，还可以在生物体内进行内源\n性合成；\n（3）对从水生动物到人类的大多数动物都有致癌性，亦具有明显的致突变性和致畸性\n（4）能诱发多种器官的肿瘤，有些N一亚硝基化合物能通过胎盘影响子代或二代发生\n肿瘤，并能产生遗传致畸的作用。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n橡胶、切削、轧钢、处理胺类的工业\nI-亚硝基化合物的来源 人和动物体内生物合成\n\n#### 食品加工过程中合成\n1.工业生产及应用\n现代工业上生产及应用N一亚硝基化合物较少，主要用于染料、橡胶、\n皮革、制药和电气工业，有的用作实验试剂。N一二甲基亚硝胺还可用于合成\n火箭的动力燃料。\n2.环境中及体内合成\nN一亚硝基化合物由亚硝酸及胺或酰胺化合形成，化合作用可在环境及人\n体内进行。N一亚硝胺的化合反应为：\n\n#### NH+IINO N-NO+HO\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n3.食品中的来源\n前体物：亚硝酸盐、胺类，硝酸盐可被硝基还原剂转化为亚硝酸盐，\n故也是前体物。\n（1）蔬菜中的硝酸盐和亚硝酸盐\n\n#### 微生物\n氮（土壤、肥料） 硝酸盐、 植物体内\n\n#### 一氨 氨基酸和蛋白质\n\n#### 酶 光合作用\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n#### 特点\nA.新鲜蔬菜中硝酸盐含量与作物种类、栽培条件和\n光照等因素有关。\nB.蔬菜在储藏或腌制过程中，亚硝酸盐含量会增加\n硝酸盐在微生物的硝基还原酶作用下转化为亚硝\n酸盐）。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n（2）动物性食品中的硝酸盐和亚硝酸盐\n古老方法：腌制鱼、肉时添加硝酸盐，细菌作用下转化为亚硝酸\n盐，达到防腐和着色（红色）双重目的。\n现代方法：直接使用亚硝酸盐代替硝酸盐作为肉制品加工的着色\n剂。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n（3）食品中的胺类（胺可以看作是氨（NH3）分子中的氢原子被烃基\n取代所生成的化合物。）\n食品腐败变质过程中蛋白质的分解产物。\n医药、农药和化工生产大量使用胺类物质，通过环境污染造成食\n品污染胺类。\n仲胺合成N一亚硝基化合物的能力最强。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n·鱼、肉制品中的N一亚硝基化合物\n\n#### ■腌制、烘烤\n\n#### 油煎、油炸 胺类\n\n#### 腐败变质 +\n\n#### 亚硝酸\n\n#### 盐\n\n#### N一亚硝基化合物\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n二、N—亚硝基化合物的毒性\n1.急性毒性\n各种N一亚硝基化合物的急性毒性有很大的差异，多数为低毒或中等毒，少数为剧毒。\n对称性烷基亚硝胺，其碳原子数目越多，毒性越小。\n2.致癌作用：动物实验结果\n能诱发各种实验动物的肿瘤：大鼠、小鼠、地鼠、豚鼠、兔、猪、狗等。\n能诱发多种组织器官的肿瘤：致癌靶器官以肝、食管和胃为主，其它器官也可发生。\n多途径致癌：呼吸道吸入，消化道摄入，皮下注射，皮肤接触性等。\n通过胎盘屏障引起子代致癌。\n亚硝酰胺为直接致癌物。亚硝酰胺类化合物水解生成烷基偶氮羟基化物（R一N=N一OH），对接触部位\n直接致癌。\n亚硝胺为间接致癌物。亚硝胺需在体内肝脏微粒体细胞色素P450代谢为烷基偶氮羟基化物，进而致癌。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 新事大\n\n#### Umive\n二.M-亚硝基化合物的致癌作用\n\n#### 河南林县：食道癌高发区\n酸菜汤浓缩液、酸菜提取液→成功诱发\n\n#### 大鼠食道癌\n\n#### 江苏启东县：肝癌高发区\n采集59份腌菜：\n\n#### 病人家腌菜亚硝胺检出率100%\n\n#### 非病人家腌菜亚硝胺检出率60%\n腌菜提取液饲喂大鼠=85%诱发肝癌\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n3.致畸作用\n亚硝酰胺有一定的致畸作用，如甲基亚硝基脲可致胎鼠的脑、眼、肋骨\n和脊柱的畸形。\n亚硝胺的致畸作用较弱。\n4.致突变作用\n亚硝酰胺具有直接的致突变作用。\n亚硝胺需经肝脏微粒体混合功能氧化酶系统代谢活化才有致突变作用。\n致癌作用和致突变性没有相关性。\n致突变作用强弱与致癌作用强弱也没有相关性。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n三、N一亚硝基化合物的致癌作用\n1.化学结构与靶器官\nN一亚硝基化合物可因化学结构的不同而有不同的靶器官，而引起不同部位的肿瘤。\nN一亚硝基化合物的R1和R2对称时，如二甲基或二乙基亚硝胺，在大鼠通常引起肝癌，\n二丁基亚硝酸胺引起膀胱癌，二戊基亚硝酸胺引起肺癌；\nR1和R2不对称时，尤以其中一个为甲基者，如甲基戊基亚硝胺或甲基苯基亚硝胺，经常\n引起食管癌；\n含有环仲胺基的亚硝胺，如亚硝基哌啶、二硝基哌嗪等亦引起食管癌。\n特定结构的N一亚硝基化合物的致癌活性。因此，这些N一亚硝基化合物对某些特定的器\n官具有亲和性。\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n2.N—亚硝基化合物的致癌特点\n亚硝胺仅在代谢活跃的组织有致癌作用，\n亚硝酰胺可任意分布在所有组织中，能在许多不同的器官引起肿瘤。\nN一亚硝基化合物的致癌活性强，致癌剂量远远小于芳香胺及偶氮染料。\n它能通过胎盘对子代动物产生致癌作用，还可通过母动物的乳汁传递给子代动物。\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n3.致癌机理\n亚硝胺的化学性质比较稳定，对器官和组织的细胞并没有直接的致突变作用。它\n一般要代谢转化，通过微粒体羟化酶，使一侧烷基的A一碳羟化，生成甲醛和甲基\n亚硝胺，后者再转化为重氮羟化物，最后分解成烷基正离子，使核酸烷基化，此\n作用多数发生在鸟嘌呤的7位氮上，生成7一烷基鸟嘌呤。\n核酸的烷基化改变了细胞的遗传性，使体内蛋白质合成受到干扰，这是组织破坏\n和致癌作用的前奏。\n亚硝酰胺不需活化而直接致癌，这是因为它在生理PH条件下性质不稳定，分解后\n产生与亚硝胺经活化产生的相同中间体而具致癌作用。\n\n---\n\n<!-- page 52 -->\n\n![page 52](page_052.jpg)\n\n\n#### 谢谢观赏\n"}, {"id": "pages",
