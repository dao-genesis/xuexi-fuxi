出。\n毒物经各种途径排出时，可能对局部组织产生毒性作用，如镉，\n汞可损害近曲肾小管，汞可引发口腔炎，β萘胺可致膀胱癌。\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n### 3.3污染物代谢动力学\n\n#### 毒物动力学\n是运用数学方法，定量的研究毒物的吸收，分布，排泄和代谢转化随时间动态变\n化的规律和过程。\n\n#### 毒物动力学模型\n1.线性动力学模型\n2.非线性动力学模型\n3.生理性毒理动力学\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 室的概念\n其含义是将机体视作一个系统，按照动力学特点分成若干个部分，每个部分称为室。\n室的划分取决于毒物转运速率是否近似。\n当毒物在体内转运速率高，体内分布迅速达到平衡，可将机体视为一室模型。\n如毒物在体内不同部位或器官的转运速率不同，则血流丰富的并能迅速与血液中毒\n物达到平衡的部位或器官，与血液一起被称为中央室；而血流量少，穿透速率慢，\n不能立即与血液中毒物达到平衡的器官，被认为是周边室。大多数毒物在机体中的\n转运复合二室模型。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n\n#### 毒物在体内消长的指数曲线\n毒物在体内的消除随时间而变化的曲线，在大多数情况下呈指数曲线的形式。大\n多数情况下消除速度与毒物量（D）或毒物浓度（c）的一次方成正比，即遵循一\n级动力学过程：\ndD/dt=-KD,D=D0·e(-kt)\nIgD=lgD0-kt/2.303\nlgc=lgc0-kt/2.303\n将剂量D或（浓度c）的对数对t作图，得到一条直线。\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 主要参数\n表观分布容积Vd=D/cVd越大，表明毒物分布越广泛，越易被组织吸收，或毒物与生物高分子有大量结合，造成血浆浓度低；\n反之，Vd越小，表明毒物分布少，不易被组织吸收，此时血浆中毒物浓度高。\n生物半衰期：指毒物在体内含量（浓度）减少一半所需时间。\n\n#### T1/2=0.693/K\n消除速率常数，表示单位时间内毒物消除的数量与体内数量的比例常数K=（dD/dt)/D，k越大，反\n映消除越快。\n消除率，是单位时间毒物消除量与血浆中毒物浓度的比值。消除率反映了血浆消除毒物的能力。\nCl=消除速度/血浆浓度=（dD/dt)/c\n其中D：体内毒物量，C：血浆中毒物浓度\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 一室模型\n一室模型是把机体看做由一个室组成，即假设毒物进入机体后立即均匀的分分布到所\n有组织，达到平衡。\n在一室模型中，毒物在体内的小虎速度与进入机体的毒物浓度成正比，即复合以及速\n率过程。\n\n#### CV Ke\n\n#### 图1-20 0一室模型示意图\n（图中K.为消除速率常数，D为给药剂\n量，C为血药浓度，V为表观分布容积，\n\n#### CV为体内药量）\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 二室模型\n二室模型将机体分为二个室，即中心室和周边室。毒物进入机体后，迅速在中心\n室分布，然后经较长时间才在周边室达到平衡。\n二室之间的可逆转运速率与血液流量，膜通透性，毒物对组织的亲和力及在血浆\n/组织分配系数有关。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 非线性动力学模型\n一室模型和二室模型都假设毒物被机体吸收的初速度与计量成比例，\n物质从血浆和体液向组织转移率也与其浓度成比例，即复合一级速率\n过程。而且组织吸收物质是无限的，因此也称线性动力学模型。\n实际上很多物质的吸收过程并不是直线，也不是永无止境的，而且计\n量加大可出现饱和现象。这种有饱和现象的速率过程称为非线性动力\n学。\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 谢谢\n"}, {"id": "pdf-004-3", "group": "原始课件 · PDF原文", "title": "004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化", "md": "# 第二章 污染物在环境中的迁移和转化\n\n> 来源: 004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化.pdf\n> 页数: 35\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 环境毒理学\n授课人：森巴提?叶尔肯\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n本章将讨论以下内容：\n\n### 2.1概述\n\n### 2.2环境污染物的迁移\n\n### 2.3环境污染物的转化\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 2.1概述\n当污染物进入环境介质后，会在多种因素的作用下在环境中\n不断迁移、转化。污染物在环境中发生的各种变化过程称为污\n染物的迁移和转化。\n\n#### 环境条件\n\n#### 迁移 转化\n\n#### 物质基础\n\n#### 新的、具有理化特征的\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 2.1概述\n例如汞，当汞通过各种途径进入环境后，它不但在水体、大\n气中扩散，而且它存在的形态也会不断发生变化，在不同的\n因素作用下中形成Hg+、甲基汞和二甲基汞等形态。\n\n#### 大气 水体\n\n#### 漂浮\n\n#### 沉降\n\n#### 农药\n\n#### 随雨水部分落入\n\n#### 小部分\n\n#### 大部分\n\n#### 作物\n\n#### 世界环境 土壤\n\n#### 风和洋流 食物链\n\n#### DDT 极地 企鹅\n\n#### 水生生物的携带 饮水\n意义：研究污染物在环境中的迁移和转化对于阐明人类\n或其他生物在环境中接触污染物的真实情况，有效地防治环\n境污染，保护生态环境，保障人类健康都是很有必要的。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 2.2环境污染物的迁移\n污染物的迁移 (transportofpollutants)就\n是指污染物在环境中发生的空间位置的相对改变的\n过程。\n\n#### 气的机械性迁移作用\n\n#### 水的机械性迁移作用\n\n#### 机械性迁移\n\n#### 迁移方式 物理化学性迁移\n\n#### 重力的机械性迁移作用\n\n#### 生物性迁移\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 2.2环境污染物的迁移\n（一）气的机械性迁移作用\n\n#### 扩散+气流搬运\n\n#### 1．扩散迁移\n大气圈按垂直分布可分为五层：对流层、平流层、中间\n层、暖层和散逸层。不同层次对污染物的扩散作用不同。\n大气重直分层 483KM 散逸层\n(1)风力扩散\n\n#### 棋具\n(2)气流扩散\n\n#### 中间层\n(3)湍流扩散\n\n#### 臭氧层 平流层\n\n#### 对流层\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 2.2环境污染物的迁移\n\n#### 影响大气污染物扩散的因素\n正常晴朗大气（下眼上冷） 什么天气会使污染 逆温大气（下冷上暖）\n①大气稳定度 NO. 污染物洁动规小\n在对流层内，气温随海拔高度的增加 PM2.5\n\n#### PM10\n而逐渐降低，因此一般情况下，上层空气冷\n而下层暖，下层暖空气有受热膨胀上升的趋\n势，此时大气在垂直方向不稳定，对流显著\n有利于污染物的气流扩散，进而引发风力扩 Z/m 100\n散和湍流扩散逆温现象：上层空气暖而下层\n冷的现象。大气稳定度高，对流作用大为减 稳状态（波浪形\n弱，污染物无法随空气运动扩散秋冬季节中\n国北方的雾霾 .98 中稳状态（锥形）\n\n#### ②地理地势 0.98\n\n#### 稳定状态（扇形）\n高耸的山脉会阻滞空气流动，降低风\n速，改变风向。城市中的高层建筑区，如未\n\n### 0.98 下层稳定上层不稳定（屋脊形）\n设计合路通道，气流只能在高层建筑间的小 100K\n范围内产生涡流，污染物也无法迅速扩散，\n\n#### 下层不稳上层稳定（重烟形）\n只能停滞在该地段，引发污染的加剧。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 2.2环境污染物的迁移\n2.干沉降和湿沉降\n\n#### 酸化污染物\n\n#### 湿沉降\n\n#### 千沉降\n\n#### 自然来源\n沉降是由于分散相和分散介质的密度不同，分散相粒子在\n力场（重力场或离心力场）作用下发生的定向运动。沉降是\n大气颗粒物主要消除过程之一，按照沉降过程是否需要降水\n冲刷，又可分为干沉降和湿沉降。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 2.2环境污染物的迁移\n（二）水的机械性迁移作用\n水的机械性迁移作用能够使污染物在不同环境介\n质中发生迁移。\n\n#### 水流\n\n#### 降水\n（三）重力的机械迁移作用\n重力的机械迁移作用是指污染物及其搬运载体在\n\n#### 重力作用下的迁移运动\n除了上述三种机械迁移作用之外，在社会生产和物\n质流通过程中，各种人为的机械搬运污染物的行为已成为\n污染物迁移的重要方式之一。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 2.2环境污染物的迁移\n二、物理-化学性迁移\n物理-化学性迁移是指元素及其化合物在环境中\n物理化学作用所实现的迁移。\n\n#### 吸附-解吸、溶解（或絮凝）-沉\n无机化合物 淀、氧化-还原、水解、络合和\n\n#### 鳌合等作用\n\n#### 除以上的作用外，还可通过化学\n有机化合物 分解、光化学分解、生化分解和\n\n#### 聚合作用等\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 2.2环境污染物的迁移\n（一）风化淋溶作用\n环境中的水在重力作用下运动时，可以通过水\n解作用将岩石、矿物中的化学元素溶入到水中的过\n程，称为风化淋溶作用。\n\n#### 产生\n\n#### 游离态的元素离子\n疾病的发病率和由于环境中风化淋溶作用所导致的某\n种元素过多或缺乏有着密切联系。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 2.2环境污染物的迁移\n（二）溶解挥发作用\n\n#### 大气中的SO2\n溶解作用是一切可溶性污染物污染环 吸收\n境的一种基本方式。例如在大气环境中 降水 烧 燃烧\n\n#### 生产者 摄入 消费者\n二氧化硫等酸性气体遇到水蒸气就会发 吸收\n\n#### 动植物遗体、排出物\n生溶解，形成硫酸及亚硫酸，然后在冷\n\n#### 土壤、水中 火山\n却后形成酸性降水。 分解者 化石\n\n#### 的SO2 爆发 燃料\n（三）酸碱作用\n环境pH的变化也可以影响污染物的迁移过程。前面提到的酸性降水，\n不仅会造成建筑物的腐蚀和皮肤黏膜的刺激性损伤，而且还会加速环境\n中岩石、矿物风化淋溶的速度。另外，酸性降水还可促使土壤中铝的活\n化。当大量的三价铝进入土壤溶液或河流湖泊等水体，便会对树木与水\n生生物产生毒作用。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 2.2环境污染物的迁移\n（四）络合作用\n当污染物在环境中迁移时，经常和其他离子、离子\n团或有机大分子络合，而改变污染物的迁移能力和归属\n（五） 吸附作用\n环境中一些物质可以物理或化学吸附某些污染物，\n然后污染物会随之发生迁移。\n\n#### 氧化-还原作用\nCr20²-+ H20 2Cr02- + 2H+\n\n#### 还原剂 氧化剂\nCr²++30H-==Cr（OH) OH- CrO2+2H20\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 2.2环境污染物的迁移\n三、生物性迁移\n生物性迁移是指污染物通过生物体的吸附、吸收、\n代谢或死亡等过程发生的迁移。\n\n#### 生物浓缩\n\n#### 表现形式 生物积累\n\n#### 生物放大\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 2.2环境污染物的迁移\n（一）生物浓缩\n生物浓缩是指生物体从环境中蓄积某种污染物，\n从而出现生物体中浓度超出环境中浓度的现象，又被\n称为生物富集。\n生物富集系数（bioconcentrationfactor，BCF）\n生物体内污染物的浓度（mg/kg）\n环境中污染物的浓度（mg/kg)\n阐明污染物在环境中的生物迁移规律，评价和预\n测污染物进入环境后可能产生的危害，以及确定污染\n物的环境容量进而制订环境标准。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 2.2环境污染物的迁移\n（二）生物积累（bioaccumulation）\n生物积累是指生物个体随着其生长发育的不同阶段\n从环境中蓄积某种污染物，从而使浓缩系数不断增大的\n一种现象。\n生物积累系数（bioaccumulationfactor，BAF）=\n某一生物个体生长发育较后阶段体内蓄积污染物的浓度（mg/kg）\n同一生物个体生长发育较前阶段体内蓄积污染物的浓度（mg/kg）\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 2.2环境污染物的迁移\n\n#### 生物积累和生物富集的区别\n生物积累：指生物从环境中不断摄取并积累某种物质，使该\n物质在生物体内的浓度随时间增加而增加的过程\n·生物富集：又称生物浓缩，是指生物机体或处于同一营养级\n上的许多生物种群，从周围环境中蓄积某种元素或难分解化\n合物，使生物体内该物质的浓度超过环境中的浓度的现象。\n它强调的是生物体内物质浓度与环境中物质浓度的对比关系\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 2.2环境污染物的迁移\n（三）生物放大\n生物放大是指在生态系统的同一食物链上，生物体\n内某种污染物的浓度随着营养级的提高而逐步增大的一\n种现象。\n生物放大系数 (biomagnification factor, BMF)\n较高营养级生物体内污染物的浓度 (mg/kg)\n较低营养级生物体内污染物的浓度 (mg/kg)\n\n#### DDT浓度被放大了一千万倍\n0milliontimses ncrease ofDDTin fish-eating bird25ppmDDTinlargefish 2ppm 大鱼\n小鱼 DDTin0.5ppmzooplankton DDTin 浮游生物\n0.04ppm0.000003ppms DDTinwater 水中\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 2.3环境污染物的转化\n污染物的转化是指污染物在环境中，通过物理\n化学或生物学的作用来改变形态或者转变为一种物质的\n过程，\n一次污染物通常指由污染源直接排入环境的污染\n物，而在环境中发生各种反应从而转化形成的污染物被\n称为二次污染物。\n太阳 氧原子 污染物浓度（mL/m）\n\n#### 臭氧\n\n#### 氧化氮 0.4\n\n#### 外线 醛类\n\n#### 过氧硝\n\n#### 酸乙酰 0.3\n\n#### 空气中的氧 非甲烷烃\n\n### 0.2 醛\n\n#### 光化学烟雾\n\n### 0.1 NO0:004:008:0012:0016:0020:00（时）\n\n#### 图1 图2\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 2.3环境污染物的转化\n一般地，污染物的转化过程主要取决于其本身的理\n化性质以及所处的环境条件。\n\n#### 物理转化\n\n#### 转化形式 化学转化\n\n#### 生物转化\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 2.3环境污染物的转化\n一、物理转化作用\n\n#### 蒸发\n\n#### 污染物的分子微观形态发生\n\n#### 渗透\n\n#### 了改变，其空间位置也存在变化\n凝聚 因而，通常认为污染物的物理转化\n吸附 与其迁移运动之间存在较为密切的\n伴随关系。\n\n#### 放射性元素的蜕变\n二、化学转化作用\n化学转化作用指污染物通过各种化学反应过程发生\n的转化。\n\n#### 水解反应\n\n#### 氧化还原反应\n\n#### 络合反应\n\n#### 光化学反应\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 2.3环境污染物的转化\n（一）大气中的化学转化\n在大气中，污染物的化学转化主要包括光化学氧化\n和催化氧化。\n\n#### 美国“洛杉矶光化学烟雾事件”\n\n#### 光化学氧化作用\n\n#### 氮氧化物和碳氢化物 光化学烟雾\n\n#### 硫酸雾\n光化学氧化作用 水，硫酸或硫酸盐\n\n#### SO2 SO3 ·酸雨酸雾\n\n#### 催化氧化作用\ncard.all&vd_source=4885c3ef5914fc7de7efe1fb94dce7e7\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 2.3环境污染物的转化\n\n#### 羟基自由基（OH·）\n\n#### 在气态污染物\n的催化氧化降解 硝酸盐自由基（NO3·)\n\n#### 中起重要作用\n超氧自由基（O2·)\n大多数气态污染物在光化学反应过程中能够产生\n羟基从而发生降解。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 2.3环境污染物的转化\n（二）水体中的化学转化\n在水体中，污染物的化学转化主要以氧化还原反应和络\n合水解反应为主。\n溢入海洋水面的油膜，也会在太阳光的作用下发生光化学氧\n化，每平方千米海面每天被氧化的石油烃最高值可达2吨之多。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 2.3环境污染物的转化\n（三）土壤中的化学转化\n污染物在土壤中的转化及其行为的影响因素也非常\n多。其中土壤中固、液、气三相的分布是控制污染物运\n动和微生物活动的重要因素。\n\n#### 固、液、气三相的分布\n\n#### pH\n\n#### 污染物转化的条件 温度\n\n#### 湿度\n\n#### 通气状况\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 2.3环境污染物的转化\n三、生物转化和生物降解作用\n生物转化和生物降解作用是指外源污染物在机\n体内经多种酶的催化作用所发生的代谢转化过程。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 2.3环境污染物的转化\n（一） 微生物对污染物的转化和降解\nNO21.微生物降解农药的方式：\n（1）将农药作为唯一碳源和能 NO2\n\n#### 源，或者作为唯一的氨源物质\n分子式：C13H18F3Ns04\n（2）共代谢作用 氟乐灵\n\n#### 脱卤作用、脱烃作用，对酰胺及脂\n\n#### 的水解、氧化作用、还原作用，以\n\n#### 及环裂解、缩合等方式\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 2.3环境污染物的转化\n2.微生物对重金属的转化和降解\n（1）可以改变重金属在环境中存在的状态，会\n使化学物毒性增强，还可以浓缩重金属，并通\n\n#### 过食物链进行积累\n(2） 微生物也可以直接和间接地去除环境中的\n\n#### 重金属，从而有助于改善环境\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 2.3环境污染物的转化\n（二）植物对污染物的转化和降解\n\n#### 挥发、蒸腾\n1.植物对污染物的转化和降解 挥发、蒸腾\n\n#### 汞、硒\n\n#### 沉积\n\n#### 甲醛、SO2和苯等\n\n#### 植物体内\n酚 酚糖贰 →二氧化碳和水 重金属\n\n#### 放射性核业 根际代谢物\n\n#### 植物体内 TCE/PCE\n\n#### 氰化物 丝氨酸等氨基酸类物质\n\n#### 代谢物\n\n#### 水稻 金属、有机物\n苯并[a]芘 二氧化碳和有机酸 和放射性核素\n\n#### 无机物 有机物\n2.植物根系与其根际微生物微生态系统的降解转化 重金属\n\n#### 放射性核素 TCE(三氣乙烯）\n\n#### PCE（29氧乙）\n有机氯农药 +其他有机氯化物 土壤和沉积物\n\n#### 稳定\n（三） 动物对污染物的转化和降解\n\n#### 肝脏和肝外组织细胞中各种酶\n\n#### 污染物 →转化和降解\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n1.各种污染物在环境中的迁移方式主要包括（）多选\nA.机械性迁移\n\n#### B．物理化学性迁移\nC.生物性迁移\nD.随机迁移\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n2.气的机械性迁移作用指污染物在大气中的扩散和被气流搬\n运，包括污染物在大气中的扩散作用\nB.×\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n3.逆温现象发生在大气中的对流层，发生后大气稳定度低\n对流作用大为减弱，污染物无法随空气运动扩散。\nB.×\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n4.以下那些是无机化合物的常见迁移方式（）多选\nA.吸附-解析\nB.氧化-还原\nC.络合和鳌合\nD.生化分解\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n5.以下属于二次污染物的是（）单选\nA.氟氧化物\n\n#### B．二氧化硫\nC.光化学烟雾\nD.一氧化碳\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n## 第二章污染物在环境中的迁移和转化\n定义：污染物在环境中空间位置相对改变的过程\n污染物迁移概述 迁移原因：自身理化性质和环境因素共同作用\n迁移影响：改变局部环境污染物浓度、种类和综合毒性\n机械性迁移：气、水、重力的机械性迁移及人为搬运\n迁移的主要类型 物理－化学性迁移：风化淋溶、溶解挥发等六种作用\n生物性迁移：生物浓缩、积累、放大及其系数表示\n定义：通过物理、化学或生物作用改变形态或物质种类\n污染物转化概述 转化类型：物理、化学、生物转化三种类型\n转化意义：改变污染物毒性和存在形态，影响环境和生物\n物理转化作用：蒸发、渗透等过程实现转化，与迁移伴随\n转化的具体过程 化学转化作用：大气、水体、王壤中分别有不同反应\n生物转化和降解作用：微生物、植物、动物对污染物的转化降解\n"}, {"id": "pdf-005-3-2-3", "group": "原始课件 · PDF原文", "title": "005-3环境毒理学 第三章（2）-3环境毒理学 第三章", "md": "# 3环境毒理学 第三章\n\n> 来源: 005-3环境毒理学 第三章（2）-3环境毒理学 第三章.pdf\n> 页数: 51\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第三章污染物的生物转运与生物转化\n\n#### 2025年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 主要内容\n\n### 3.1污染物的生物转化\n\n### 3.3污染物的代谢动力学\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 机体对化学毒物的处置\n\n#### 吸收 分布 代谢 排泄\n\n#### 生物转运\n指环境污染物经各种途径和方式同生物体接触而被吸\n收、分布和排泄等过程的总称。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n化学物的吸收，分布，和排泄都有类似的机理，都是反复通过生\n\n#### 物膜的过程，统称为生物转运\n化学物在组织细胞中发生的结构和性质的变化过程，称为生物转\n化或代谢转化。\n环境化学物对机体毒性作用的大小和部位，与其在体内的吸收，\n分布，代谢和排泄过程有密切关系。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 污染物在体内的吸收、分布和排泄\n\n#### 环境污染物\n\n#### 摄入 吸入 接触\n\n#### 吸收 胃肠道 肺脏 皮肤\n\n#### 分布\n\n#### 肝脏 组织（贮存）\n\n#### 血液和淋巴\n\n#### 胆汁 靶器官（损害）\n\n#### 肾脏 肺脏 分泌腺\n\n#### 排泄 排泄\n\n#### 粪便 尿 呼出气 分泌物\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n生物膜的基本结构和物质的跨膜转运\n\n#### 糖蛋白\n\n#### 生物膜的机构和功能\n\n#### 确分子\n\n#### 细胞膜主要由也静态的脂质双分子\n层和蛋白质组成，也会有少量糖形成\n糖脂和糖蛋白。\n\n#### 磷双分子层\n\n#### 蛋白质分子\n\n#### 生物晨的结构模型示意图\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n33.337..all\n：框在点击“”时会进行转换，用时则会变为可点击的视\n频。框移位和\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 毒物通过生物膜的转运方式\n物质的跨膜运输trans-membranetransport\n污染物通过多次透过生物膜来完成生物转运过程，其透过生物\n膜的机理即生物转运机理。\n\n#### 生物转运机理可概括为\n1.被动扩散（简单扩散，自由扩散）\n2. 滤过\n3. 特殊转运，包含主动转运和协助扩散\n4.膜动转运\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n被动扩散passivediffusion（简单扩散，自由扩散）\n\n#### 被动扩散的物质只能从浓度较\n\n#### 高的部位透过生物膜转运到浓\n度较低的部位。\n\n#### 被动扩散的特点是在转运过程\n\n#### 中生物膜不具有主动性，是一\n\n#### 种纯物理过程，不需要消耗代\n谢能。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 简单扩散的影响因素\n\n#### 生物膜两侧的化学物质浓度梯度\n浓度差越大，扩散越快。\n\n#### 毒物在脂质中的溶解度\n脂/水分配系数越大，越容易在脂肪中溶解，也越易透过\n生物膜。\n外源化合物的离解或电离状态和体液pH的高低\n离子型的化合物不易透过生物膜的脂质结构区。\n\n#### 脂溶性物质同蛋白结合的亲和力\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 滤过 infiltration\n入球小动脉 出球小动脉 指水溶性毒物随同大量水分子经生物\n膜的孔状结构而透过生物膜的过程。\n凡分子大小和电荷与膜上孔状结构相\n适应的毒物皆可随同水分子透过生物\n膜而被转运。\n滤过的动力来自生物膜两侧的流体静\n压梯度差和渗透压梯度差。\n\n#### 血压 内压渗透\n\n#### w.bioon.com\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n特殊转运 specialtransport\n有些外源化学物，由于脂溶性低或者分子量过大，不能通过简单扩散\n或滤过作用进行跨膜转运，它们必须借助于一定的载体系统才能完成\n转运过程。特殊转运又称载体转运。\n根据是否有能量消耗分为 物质运输\n1.主动转运（主动运输） 通道蛋白 转运蛋白\n\n#### 脂双层 浓度梯度\n2.易化扩散（载体扩散，顺浓度转运，不消耗能量）\n单纯扩散通道蛋白介导 转运蛋白介导 的物质运输\n\n#### 的物质运输\n\n#### 被动运输 主动运输\n（依靠跨膜蛋白进行的细胞内外物质交换）\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n主动转运activetransport\n在载体或运载系统参与下，化学物质逆浓度梯度由低\n浓度处向高浓度处转运以透过生物膜的过程。\n\n#### 其主要特点\n化学物质逆浓度梯度转运，需消耗一定能量。\n需要有载体的参与。\n3 载体对转运的化学物有选择性。\n载体有容量限制。\n5. 如果两种化学物机构相似，转运载体相同，则出现\n竞争性抑制。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n易化扩散facilitateddiffusion\n膜上蛋白质载体特异性地与某种化学毒物 外|细胞膜 内\n结合后，其分子内部发生构型变化而形成\n适合该物质透过的通道而进入体内。\n与主动转运的不同之处在于，不能逆浓度\n梯度将被转运的物质由浓度低转运到浓度 载体\n高的部位。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 细胞外\n\n#### 细胞内\n\n#### 膜动转运\n颗粒物和大分子物质的转运常伴有膜的运动，称为膜动转\n运。\n由于生物膜具有可塑性和流动性，因此，对颗粒状物质和\n液粒，细胞可通过细胞膜的变形移动和收缩，把它们包围\n起来最后摄入细胞内，这就是吞噬作用和胞吐作用。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 膜动转运\n\n#### 胞吞作用\n\n#### 膜动转运\n\n#### 胞吐作用\n\n#### 质膜 细胞外\n\n#### 细胞质\n\n#### 细胞内\n\n#### 细胞核\n\n#### A吞噬作用 图3-13胞吐作用\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 3.1.2吸收\n吸收：指污染物通过自接触部位透过体内生物膜进入血液\n循环的过程。\n\n#### 三种主要的吸收方式\n\n#### 呼吸道吸收\n\n#### 消化道吸收\n\n#### 皮肤吸收\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 呼吸道吸收 两种主要吸收机理\n1.以气体和蒸汽存在的污染物，到达肺泡后主要经过\n被动扩散，通过呼吸道吸收进入血液。\n\n#### 粒径10微米以上\n2.以气溶胶和颗粒状存在的污染物，其吸收的方式和\n的颗粒物，会被挡 部位取决于颗粒大小。\n在人的鼻子外面 2.5微米到10微\n日常发电 支 米之间的颗粒物 >>10um被阻挡在鼻外\n\n#### 管能进入上呼吸道\n>>2.5-10um的颗粒，上呼吸道沉积\n\n#### 部分可通过痰液\n等排出体外 ><2.5um，附着在肺泡上\n\n#### 肺部防部\n工业生产 附着于呼吸道内表面的颗粒归宿：\n1.进入血液\n2.进入消化道\n汽车尾气 3.进入淋巴腺随淋巴进入血液\n4.长期滞留于肺泡内，引起病变。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n肺泡中气态污染物的吸收的影响因素\n分压差和血/气分配系数。污染物在肺泡气和血液中的分差越大\n越有利于吸收；血/气分配系数越大，吸收越多。\n溶解度和相对分子量。非脂溶性污染物通过亲水通道被吸收，\n而亲脂性污染物的吸收取决于其脂/水分配系数。\n肺泡通气量和血液流量比值。比值越大，越有利于污染物的吸\n收。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 呼吸道吸收致毒举例-尘肺\n\n#### 太乐久出养生网\n\n#### 煤工尘肺\n\n#### Ⅱ期\n\n#### 尘肺灌洗流出液\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 消化道吸收\n饮水和食物中的污染物主要通过消化道吸收。\n消化道的任何部位具有吸收，但其主要作用\n肝和原象 的是小肠。\n污染物很少通过口腔黏膜被吸收，在胃里主\n要通过简单扩散吸收。\n胃肠道上皮细胞也可通过吞噬和胞饮作用吸\n收颗粒状或液滴状污染物。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 消化道吸收污染物的影响因素\n消化道内的多种酶类和菌丛可转化某些污染物，改变其物化性质和毒性。\n如小肠内细菌可将硝基苯转化为可疑致癌物质苯胺。\n胃肠道内容物的种类和数量，排空时间及蠕动状态也会影响对污染物的\n吸收。如胃肠蠕动减弱，排空时间延长可增加对污染物的吸收。\n污染物的溶解度和分散度也是影响吸收的因素。脂溶性的污染物较水溶\n性污染物更易被消化道吸收。\n消化道的酸碱度。有机酸或有机碱的分子态较电离状态更易被吸收。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n消化道吸收致毒举例一清华学生中毒事件\n\n#### 脱发 Cpl\n\n#### 一种秘有金属元 头痛 头晕\n\n#### 素，银白色，质 抽摄 失眠\n\n#### 软，轮和轮的氧 休克 视力减退\n\n#### 化物都有毒 呕吐\n\n#### 轮中毒 食欲减退\n·如果饮用了被铭\n\n#### 污染的水或吸入\n\n#### 了含轮化合物的\n\n#### 粉尘，就会引起 恶心 全身无力\n·使人的中枢神经 轮中毒\n\n#### 系统、肠胃系统\n\n#### 及肾脏等部位发\n\n#### 生病变\n\n#### 症状 纹痛 手指震\n\n#### 急性中\n\n#### 慢性中毒\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 皮肤吸收\n皮肤吸收指污染物透过皮肤而进入血液的过程。\n污染物经皮肤吸收主要通过两条途径\n①毒物-角质层-透明层-颗粒层-生发层和基膜-真皮。\n表皮 ②通过汗腺，皮脂腺，和毛囊，绕过表皮屏障进入真皮。\n真皮 污染物经皮肤吸收经过两个阶段\n\n#### ①第一阶段，穿透相\n毒物透过表皮进入真皮。其穿透的速度与脂溶性呈正比，脂溶\n\n#### 毛囊 汗腺\n神经 性越大其穿透能力越强。非脂溶性的污染物则不易通过。通\n\n#### 皮下脂肪 皮脂腺\n过汗腺，皮脂腺，和毛囊，绕过表皮屏障进入真皮。\n皮肤结构示意图 ②第二阶段，吸收相\n毒物由真皮进入乳头层毛细血管。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 影响皮肤吸收的因素\n皮肤完整度，如酸碱或机械损伤皮肤屏\n\n#### 容易經皮毒的部位\n障后毒物渗透性增加。 身体各处吸收化学物质的速度 頭部3.5倍 以手臂内侧为基准，作为吸收化学物质的速度为\n\n#### 额頭6倍\n皮肤所在部不同部位，如背部和性器官 下巴3倍\n\n#### 背部17倍\n的皮肤对毒物的吸收速度快于其他部位的\n\n#### 胶下3.6倍\n皮肤。\n\n#### 手臂内侧1\n化合物的物理化学性质，如扩散能力， 手心.8倍\n与角质层的亲和力等。 性器官42倍\n皮肤接触条件，如接触面积，接触时间，\n皮肤温度等。 脚後跟0.14倍\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 皮肤吸收致毒举例一儿童铅中毒\n\n#### 铅毒一无处不在\n\n#### 皮中毒 翼位性皮膚炎\n\n#### 家装材行\n\n#### 饮水\n\n#### 在#，##，口，首等\n\n#### ICHOOL （孔排）\n\n#### 学习文具\n\n#### 富贵手\n\n#### 過敏性皮膚炎\n\n#### 工业气\n\n#### 含锁用品 次车尾气\n\n#### 食品\n（加，文品、便，花）\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 3.1.3分布\n毒物进入血液后，通过血流分布全身。研究毒物的\n分布变化规律，有利于探讨毒物的作用部位和作用\n机理。 皮肤屏障功能\n化学物在体内组织器官的起始分布取决于血流量 ——隔离与保护\n防止有害物质入侵，使人体在变化不\n定的外环境中保持内环境的相对恒定\n最终分布取决于化合物与组织器官的亲和力 一维持机体的各种正常功能\n调控外来物质的经皮吸收以及皮肤水分蒸发\n导致环境化学物在体内分布不均匀的另一重要因素\n是体内特定部位存在的对外元化学物转运有阻碍作\n\n#### 用的屏障\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 屏障作用\n击的视频。框移位和\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 3.1.3分布\n\n#### 脑\n\n#### 肺砷\n\n#### 铅汞\n\n#### 屏障\n\n#### >血脑屏障\n\n#### 肝 肾\n\n#### >胎盘屏障 铅砷锅 铅砷镐\n\n#### 结合与贮存 消化\n\n#### >血浆蛋白贮存 肌肉\n\n#### 骨骼 砷\n\n#### >肝肾积累\n\n#### 镉\n\n#### >脂肪组织贮存\n\n#### >骨骼组织贮存\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n●贮存库：\n贮存库分类：\n进入血液的环境化学物大部分与血浆蛋 血浆蛋白贮存库\n白或体内各组织成分结合，积聚在特定 毒物在肝，肾中的积累\n部位，该部位称为此化学物质的贮存库 脂肪组织作为贮存库\n\n#### 骨骼组织作为贮存库\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n#### 血浆蛋白作为贮存库\n进入血液的毒物可与血液中蛋白质结合，与蛋白结合的毒物不易透过细胞\n膜进入靶器官而产生毒性作用，对毒物的分布，转化和排泄有影响。\n毒物与蛋白结合大部分是可逆的非共价键结合，结合的毒物也可以被解离\n出来，随血液循环进行分布或再分布。从而使血浆成为毒物的贮存库。\n例子：\n金属离子与蛋白质的可逆非共价键结合。\nDDT的代谢产物DDE能竞争性置换已与蛋白结合的胆红素，使其在血中游\n离，造成黄痘。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n#### 毒物在肝肾中的积累\n肝和肾含有特殊结合蛋白，能将与血浆蛋白结合的毒物可与许多毒物结合夺取\n过来，因此肝和肾也可认为是毒物的贮存库。\n肝和肾既是毒物的贮存场所，又是代谢转化和排泄的重要器官。\n如肝细胞中的配体蛋白能与多种有机酸，有机阴离子，偶氮染料等毒物结合，\n使这些物质进入肝脏。\n如肝和肾中含有金属硫蛋白，能与锌和镉等重金属结合而起解毒的作用。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n\n#### 脂肪作为贮存库\n许多有机毒物是脂溶性，易被吸收并贮存在体内脂肪中而不呈现\n生物学活性。如有机氯农药DDT六六六和有机汞农药等。\n毒物在脂肪中的贮存可降低其在靶器官中的浓度。体脂多者毒性\n较体脂少者小，脂肪迅速消耗时血液中毒物浓度会升高而显现毒\n性。\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 骨骼组织作为贮存库\n骨骼组织中某些成分与毒物有特殊的亲和力，是骨骼称为这些物\n质贮存沉积的场所。\n如氟化物，铅和锶能与骨基质结合而贮存其中。骨中氟增多会引\n起氟骨症，放射性的锶会引起骨肉瘤等。\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 毒物在体内贮存的毒理学意义\nV急性中毒的保护作用，贮存库使毒物在体液中的浓度迅速降低，减少了到达靶器官\n的毒物量。\n/贮存库也可称为体内提供毒物来源，具有慢性致毒的潜在危害。\n例子：\n如铅中毒作用部位是软组织，铅贮存于骨骼中有保护作用，但在缺钙，体液pH\n下降或溶骨条件下，骨内贮存的铅会释放进入血液引起慢性中毒。\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n#### 多选题1分\n以下哪些是毒物在体内的贮藏库？\n\n#### 骨骼\n\n#### 脂肪\n\n#### 肠胃\n\n#### 肝肾\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n### 3.1.4排泄\n指毒物母体化学物及其代谢产物向机体外转运的过程，是机体物质代谢全过程的\n最后一个环节。\n排泄方式：\n\n#### 经肾排出\n\n#### 经肝胆排泄\n\n#### 经呼吸道排出\n\n#### 经其它途径排出\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### Xinjiang\n\n#### 经肾排出\n肾脏是排出毒物的极为有效的器官：\n\n#### 肾小球滤过\n肾小球毛细血管内皮细胞有较大的膜孔，可滤过分子量<69000的物质。\n而与血浆蛋白的毒物则不能通过。\n\n#### 肾小管重吸收\n肾小球滤过液进入肾小管，解离的，极性亲水毒物不被重吸收，直接随\n尿液排出；而未解离，非极性亲脂性毒物可通过肾小管上皮细胞重吸收\n回到血液中。\n\n#### 肾小管主动分泌\n某有机阴离子和有机阳离子可通过近曲肾小管细胞主动分泌到尿中而被\n排出。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n#### 经肝胆排出\n\n#### 进入肝肠循环\n\n#### 胆固醇\n脂溶性的毒物在小肠被重吸收，并经门静脉重新\n\n#### 胆盐\n回到肝脏，再次随胆汁分泌，即形成肝肠循环。肝\n肠循环会延长毒物在体内停留时间，半衰期延长， 门静肽\n\n#### 胆囊 十二指肠\n毒性加大。\n\n#### 直接排除体外\n高度极性的化合物在小肠内不易被吸收，就随同 结肠\n\n#### 图6-15胆盐的肝肠循环\n胆汁混入粪便排出。\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n#### 经呼吸道排出\n肺脏排出毒物主要通过简单扩散的方式完成，排出的速度取决于\n肺泡壁两侧有毒气体的分压差和血气分配系数。\n不溶解的颗粒物吸入肺脏后，可以通过肺泡及细支气管，支气管\n等清除系统，将其从深部肺组织移至咽部，随痰咳出或吞入消化\n道。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n#### 其他途径排出\n毒物可以经乳腺随乳汁排出。如有机碱类和亲脂性毒物，易从\n血浆扩散到乳腺中。\n毒物也可经唾液腺，汗腺排出。如I，Br，F，Hg等。\n重金属毒物也可经头发或指甲排出。\n毒物经各种途径排出时，可能对局部组织产生毒性作用，如镉，\n汞可损害近曲肾小管，汞可引发口腔炎，β萘胺可致膀胱癌。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n### 3.3污染物代谢动力学\n\n#### 毒物动力学\n是运用数学方法，定量的研究毒物的吸收，分布，排泄和代谢转化随时间动态变\n化的规律和过程。\n\n#### 毒物动力学模型\n1.线性动力学模型\n2.非线性动力学模型\n3.生理性毒理动力学\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n#### 室的概念\n其含义是将机体视作一个系统，按照动力学特点分成若干个部分，每个部分称为室。\n室的划分取决于毒物转运速率是否近似。\n当毒物在体内转运速率高，体内分布迅速达到平衡，可将机体视为一室模型。\n如毒物在体内不同部位或器官的转运速率不同，则血流丰富的并能迅速与血液中毒\n物达到平衡的部位或器官，与血液一起被称为中央室；而血流量少，穿透速率慢，\n不能立即与血液中毒物达到平衡的器官，被认为是周边室。大多数毒物在机体中的\n转运复合二室模型。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n#### 毒物在体内消长的指数曲线\n毒物在体内的消除随时间而变化的曲线，在大多数情况下呈指数曲线的形式。大\n多数情况下消除速度与毒物量（D）或毒物浓度（c）的一次方成正比，即遵循一\n级动力学过程：\ndD/dt=-KD,D=D0·e(-kt)\nIgD=lgD0-kt/2.303\nlgc=lgc0-kt/2.303\n将剂量D或（浓度c）的对数对t作图，得到一条直线。\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n\n#### 主要参数\n表观分布容积Vd=D/cVd越大，表明毒物分布越广泛，越易被组织吸收，或毒物与生物高分子有大量结合，造成血浆浓度低；\n反之，Vd越小，表明毒物分布少，不易被组织吸收，此时血浆中毒物浓度高。\n生物半衰期：指毒物在体内含量（浓度）减少一半所需时间。\n\n#### T1/2=0.693/K\n消除速率常数，表示单位时间内毒物消除的数量与体内数量的比例常数K=（dD/dt）/D，k越大，反\n映消除越快。\n消除率，是单位时间毒物消除量与血浆中毒物浓度的比值。消除率反映了血浆消除毒物的能力。\ncl=消除速度/血浆浓度=（dD/dt）/c\n其中D：体内毒物量，C：血浆中毒物浓度\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 一室模型\n一室模型是把机体看做由一个室组成，即假设毒物进入机体后立即均匀的分分布到所\n有组织，达到平衡。\n在一室模型中，毒物在体内的小虎速度与进入机体的毒物浓度成正比，即复合以及速\n率过程。\n\n#### CV Ke\n\n#### 图1-20 0一室模型示意图\n（图中K.为消除速率常数，D为给药剂\n量，C为血药浓度，V为表观分布容积，\n\n#### CV为体内药量）\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 二室模型\n二室模型将机体分为二个室，即中心室和周边室。毒物进入机体后，迅速在中心\n室分布，然后经较长时间才在周边室达到平衡。\n二室之间的可逆转运速率与血液流量，膜通透性，毒物对组织的亲和力及在血浆\n/组织分配系数有关。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 非线性动力学模型\n一室模型和二室模型都假设毒物被机体吸收的初速度与计量成比例，\n物质从血浆和体液向组织转移率也与其浓度成比例，即复合一级速率\n过程。而且组织吸收物质是无限的，因此也称线性动力学模型。\n实际上很多物质的吸收过程并不是直线，也不是永无止境的，而且计\n量加大可出现饱和现象。这种有饱和现象的速率过程称为非线性动力\n学。\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n某毒物在体内遵循一级动力学消除，其消除速率常数k=0.3465h-1。若初始血药浓度co=100mg/L，下\n\n#### 列说法错误的是（）\nA.该毒物的半衰期为2小时\nB.4小时后，体内剩余血药浓度为25mg/LC.以1gc对时间t作图，得到的直线斜率为-0.3465\nD.该毒物的消除速度与当前体内毒物浓度成正比\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 其指数形式为D=\n2.将毒物浓度c的对数对时间t作图，若得到一条 则可判断该毒物遵循一级动力学消除；此时直线方\n\n#### 程为lgc=\n3.一级动力学消除中，消除速率常数k与半衰期t1/2的换算公式为t1/2=\n\n---\n\n<!-- page 51 -->\n\n![page 51](page_051.jpg)\n\n\n#### 谢谢\n"}, {"id": "pdf-006", "group": "原始课件 · PDF原文", "title": "006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素", "md": "# 第四章 环境污染物的毒作用及其影响因素\n\n> 来源: 006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素.pdf\n> 页数: 50\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第四章 环境污染物的毒作\n\n#### 用及其影响因素\n\n#### 2026年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n主要内容：\n\n#### 第一节：环境污染物的毒作用\n\n#### 第二节：毒作用机制\n\n#### 第三节：影响毒作用的因素\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n## 第四章\n2009年2月20日，因自来水水源受到酚类化合物污染，江苏盐城大面积断水近67\n小时，20万市民生活受到影响，占该市市区人口的五分之二。据调查，制造这起\n污染事件的竟是被评为当地标兵企业的盐城新化工厂，该厂为减少治污成本，居\n然趁大雨天偷排了30吨化工废水，最终污染了水源地。事后，该厂两名负责人因\n投放危险物质罪”分别被判处10年和6年有期徒刑，这也是我国首次以这一罪\n名对环境污染事件作出刑事处罚。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n## 第四章\n>2015年年底开始，江苏省常州市外国语学校先后有641名学生被送到医院进行检\n查，有493人出现皮炎、湿疹、支气管炎、血液指标异常、白细胞减少等异常症\n状，个别的还被查出了淋巴癌、白血病等恶性疾病。学校紧邻三家化工厂，常隆\n化工、长宇化工和华达化工，生产像克百威、灭多威、异丙威、氰基萘酚等剧毒\n类产品，将有毒废水直接排出厂外，将危险废物偷偷埋到了地下，对环境带来了\n很大隐患。\n更令人震惊的是，该地块地下水和土壤中的氯苯浓度分别超标达94799倍和\n78899倍，相当于一枚“生态炸弹”，按规定，此地块上不应有长期居住人群。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 第一节：环境污染物的毒作用\n\n#### >毒物、毒性及中毒\n\n#### >毒作用及其分类\n\n#### >损害作用及非损害作用\n\n#### >效应和反应\n>剂量-效应关系和剂量-反应关系\n\n#### >表示毒性的常用参数\n\n#### >毒作用带\n\n#### >毒性单位与分级\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 4.1环境污染物的毒作用\n1.毒物 (Toxicant)\n按一定条件接触后，以较小的剂量作用机体\n就能引起生理、生化功能或正常组织结构的器质\n性病理改变，甚至引起死亡的化学物质。\n2.毒性 (Toxicity)\n化学物质能引起机体损害的性质和能力。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 4.1环境污染物的毒作用\n3.中毒（toxication）\n外源性化学物质引起机体病理性功能改变或\n器质性病变的现象。\n根据污染物的暴露特点和中毒发生发展的快\n慢，分为急性中毒、亚慢(急)性中毒和慢性中毒。\n根据毒作用强度和性质判定环境污染物的毒\n性大小。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 4.1环境污染物的毒作用\n4.毒作用 (toxic effect)\n又称毒效应或毒性效应。指化学物质对机体所致的不良\n或有害的生物学变化，故又称不良效应、损伤作用或损害作\n用。\n毒作用与毒性的区别？\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 毒作用分类\n>按毒作用发生的部位：局部、全身；\n按毒作用损伤恢复情况：可逆、不可逆；\n>按毒作用引|发时间的快慢：速发性、迟发性\n\n#### 过敏反应\n\n#### >特异体质反应\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 损害作用与非损害作用\n>损害作用：机体发生的不可逆/可逆但超出正常生理调节范\n围的变化。\n>非损害作用：特点是不引起生物机体形态、生长发育和寿\n命的改变，机体可以通过自身调节恢复的轻微变化。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 损害作用与非损害作用\n：框在点击“”时会进行转换，用时则会变为\n可点击的视题。框移位和\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 4.1环境污染物的毒作用\n剂量：给予机体的或机体接触的外源化学物质的数量。\n效应：表示一定剂量外来化合物与机体接触后可引起\n的生物学变化，能用计量资料表达其强度，是属量效应。\n反应：表示接触某一化学物质的群体出现某种效应的\n个体数在群体中所占的比率。属于计数资料，没有强度\n差别，不能以具体数值表示，是属质效应。\n\n#### 剂量-效应VS剂量-反应\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 4.1环境污染物的毒作用\n2.剂量-效应关系和剂量-反应关系曲线\n剂量-效应关系和剂量-反应关系均可用曲线表示，即以表示\n效应强度的计量单位或表示反应的百分率或比值为纵坐标，以剂量\n为横坐标绘制散点图所得曲线。\n（1）直线型\n（2）抛物线型\n（3）S形曲线\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 剂量-反应曲线图\n\n#### 100 100\n\n#### 反应强度（%）\n\n#### 死亡率（%）\n\n#### 剂量 剂量\n（1）直线型 （2）抛物线型\n\n#### 死亡率（概率单位）\n\n#### 死亡率（%）\n\n#### 对数剂量 对数剂量\n（3）S形曲线 （4）概率-对数剂量直线\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 表示毒性的常用参数\n致死剂量（Lethaldose，LD2.最小有作用剂量 （MEL）\n3.最大无作用剂量（MNEL4.急性毒作用带(Zac)\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 4.1环境污染物的毒作用\n1.半数致死剂量LD5o或浓度LC50\n绝对致死量 半数致死量 最小致死量 最大耐受量\n(LD100) (TT) (MLD) (MTD)\n）半数致死量 （LD5o）又称致死中量，\n指引1起一群个体50%死亡所需剂量\n(mg/kg)或浓度（LC5o）（mg/m3和\nmg/L）。\n\n#### 最重要判断毒物毒性大小的基础\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 4.1环境污染物的毒作用\n2.半数效应剂量\n致死剂量 半数效应 最小有作用最大无作用急性毒作\n(LD) 剂量(ED5o) 剂量(MEL) 剂量(MNEL）用带(Zac)\n·半数效应剂量(EDso)指外源化学物在一定\n的时间内按一定的方式与机体接触，引起机\n体某项生物效应发生50%改变所需的剂量。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 4.1环境污染物的毒作用\n3.最小有作用剂量\n半数效应 最小有作用最大无作用急性毒作\n\n#### 致死剂量\n剂量(ED5so) 剂量(MEL)\n(LD) 剂量(MNEL）用带(Zac)\n·最小有作用剂量：指能使机体发生某种异\n常变化所需最小剂量，即能使机体开始出现\n毒性反应的最低剂量。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 4.1环境污染物的毒作用\n4.急性毒作用带 (Zac)\n致死剂量 半数效应最小有作用最大无作用 急性毒作\n(LD) 剂量(ED5o) 剂量（MEL） 剂量（MNEL） 用带(za)\n·急性毒作用带：指半数致死剂量与急性阀剂量\n的比值。Zac值小说明化学物质从产生轻微损害到\n导致急性死亡的剂量范围窄，引起死亡的危险性\n大；反之说明引起死亡的危险性小。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 4.2毒性作用的机理\n分子水平：\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰细胞内钙稳态\n\n#### 自由基对生物大分子的氧化损伤\n\n#### 毒物与生物大分子共价结合\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰正常受体-配体的相互作用\n受体学说：认为膜上存在受体，它是一种大分子蛋白质能\n对特定生物活性物质具有识别能力并可选择性地与其结合\n\n#### 生物膜\n配 受 反 离子或分子传输 生物效应\n\n#### 应体 酶的灭活或激活\n\n#### 体 体 神经递质或激素释放\n\n#### 识别换能 VIIA 放大\n图4-5受体与配体相互结合模式（引自Cooper等，1982）\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰正常受体-配体的相互作用\n受体(receptor)是组织细胞的生物\n\n#### 大分子，激素或金属离子与配体\n(ligand)相结合，形成配体-受体复\n\n#### IRS1 IRS1\n合物，引起毒性效应。\n·环境污染物尤其是神经毒物和内分泌干扰物，通过\n千扰正常受体－配体相互作用，引起毒性。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 生物膜破坏\n，化学毒物对生物膜的成分造成影响；\n十六烧基吡啶 hydrophobictail\n化学毒物对生物膜上的酶活性造成影响； /ridinium benzalkoni\n\n#### 化学毒物对膜生物物理性质的影响\ncetylpyridinium QUA\n对膜通透性的影响;\n对膜流动性的影响；\n对膜表面电荷的影响。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 生物膜破坏--关键分子机制\n\n#### 受体-配体干扰 (重点）\n\n#### 正常情况：配体受体结合\n受到干扰：毒物占据受体位置，信号中断\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞钙稳态的影响损伤\n钙离子是集体的第二信使之一，在细胞功能的调节中起重\n要作用，如神经传导、肌肉收缩、细胞增殖和分化、细胞\n形态发生、细胞衰老等。\n\n#### 内10-7~10-8mol/L\n\n#### 细胞\n\n#### 外10-mol/L\n\n#### 与CAM结合 神经转导\nCa2+ cAMP作用 肌肉收缩\n\n#### 激活PKC 细胞分化和增值\n\n#### 离子通道开放 细胞分泌\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞钙稳态的影响损伤\nVOCCa2+结合蛋白 Ca2+泵\n\n#### ROC. 肌质网\n\n#### Na+-Ca2+载体\n线粮体[Ca2+]i:10-7mol/L\n\n#### [Ca²]e:10-mol/L\n硝基酚、醌、过氧化物、醛类、二恶英、卤化链烷、链\n烯和Cd2+、Pb2+、Hg2+等重金属离子均能干扰细胞内钙稳\n态，从而引起细胞损伤或死亡。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 自由基对生物大分子的氧化损伤\n\n#### 脂质过氧化对生物膜的损伤\n1.蛋白变性\n\n#### 自由基 2.细胞膜流动性\n3.酶活性\n4.细胞肿胀和溶解\n\n#### /自由基性质环境毒物\n5.致突变，染色体断裂\n√环境毒物与多不饱和！\n6.致畸胎\n\n#### 脂肪酸的作用产物\n\n#### 毒物代谢物\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 自由基对生物大分子的氧化损伤\n对组织器官的细胞有选择性致死毒性\n\n#### 体细胞 细胞突变和癌变\n\n#### DNA损伤和\n\n#### 染色体异常\n\n#### 生殖细胞\n\n#### 遗传性疾病\n\n#### 致畸作用\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 毒物与大分子共价结合\n共价结合学说：认为外源性化学物质和其他活性代谢产物\n与机体的重要生物大分子如蛋白质、核酸、酶和膜脂质等\n进行共价结合，改变生物大分子的化学结构与生物学功能，\n从而引起一系列病理、生理变化，是细胞损害的重要机制\n\n#### 之一\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 毒物与大分子供价结合\n\n#### 细胞毒性和死亡\n\n#### 过敏反应\n\n#### 蛋白质 致癌作用\n\n#### 抑制酶活性\n\n#### 环境毒物及 共价结合\n\n#### 代谢产物\n\n#### 细胞毒性\n\n#### 影响DNA-蛋白质\n\n#### 核酸 相互作用\n\n#### 致突变作用\n\n#### 加合物 激活癌基因\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n### 4.3.1环境化学物的结构与性质\n\n#### 结构与毒性\n研究外源化学物的结构与毒性之间的关系，\n有助于通过比较来预测新化合物的生物活性、\n作用机理和安全限量范围。\n同系物的碳原子数、烃基、分子饱和度、\n卤素取代、羟基、酸基和酯基、胺基、构型及\n有机磷化合物结构与毒性密切相关。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n#### 化学结构与毒性大小\n(1）同系物的碳原子数\n碳氢化合物（烷、醇、酮等）：\n当碳原子数在2~7之间时：\n\n#### 随C数的增加毒性增加\n·超过一定限度(7~9个）后：\n\n#### 随C数的增加毒性下降\n，当碳原子数相同时：\n直链的>支链的；成环的>不成环的\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n\n#### 化学结构与毒性大小\n(2)烃基\n，在非烃类化合物分子中引入烃基，可使化合物\n脂溶性增高，易于透过生物膜，从而毒性增强\n·烃基结构也可增加毒物分子的空间位阻，从而\n\n#### 使毒性增加或减小\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 化学结构与毒性大小\n(3)分子饱和度\n·分子中不饱和键增多可使化学物活性增大，毒\n\n#### 性增强\n对眼角膜的刺激作用：丙烯醛>丙醛 丁烯醛>丁醛\n\n#### 丙烯醛 丙醛 丁烯醛 丁醛\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 化学结构与毒性大小\n(4) 卤素取代\n·化学分子结构式中增加卤素，可使分子极性增\n加，更易与酶系统结合，从而毒性增强\n肝脏毒性：CCL>CHC1>CH2CL>CHCI\n麻醉作用：CHCI>CH2C1>CHCI>CH4\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n### 4.3.1环境化学物的结构与性质\n（5）构型\n同分异构体：一般对位>邻位>间位\n·旋光异构：由于受体或酶一般只能与一种旋光\n异构体结合而产生生物效应，故同一化合物的\n\n#### 不同旋光异构体的毒性不同\nL-异构体易与酶、受体结合，具有生物活性，\n\n#### D-异构体则反之\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n#### 理化性质与毒性\n1.水溶性\n\n#### 毒物在水中溶解度越大，毒性越大\n2.脂溶性\n脂溶性物质易在脂肪中蓄积，侵犯神经系统\n3.挥发度和蒸气压\n化学物凡是容易挥发或蒸气压大者，都容易\n污染空气，病抑郁经呼吸道吸入机体。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n### 4.3.2影响毒性的机体因素\n种属和个体差异 水生生物测试表明，对于化学污染\n物，节肢动物一般比鱼类更敏感，\n\n#### 鱼类比两栖幼体类更敏感\n\n#### 性别与激素\n\n#### 影响机体对环境化学\n\n#### 年龄\n\n#### 物的敏感性和耐受性\n\n#### 营养与健康状况\n\n#### 生物节律\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n### 4.3.3影响毒性的非生物因素\n\n#### 气温\n\n#### 环境因素\n\n#### 气压\n\n#### pH和碱度\n酸性较强（pH<5）条件下，氢离子会对水生生物产生危害；\npH也会影响溶液中亲脂性那部分金属形态的生物可利用性\n\n#### 盐度\n盐度对痕量金属在生物相中富集的影响会受到生物因素\n\n#### 和化学因素的影响\n\n#### 硬度\n硬度会影响有机表面活性剂的毒性，降低金属的毒性\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n### 4.3.4环境化学物的联合毒性作用\n两种或两种以上的化学物同时或短期内先后作\n用于机体所产生的综合毒性作用，称为化学物的联\n合毒性作用。\n\n#### 相加作用\n\n#### 联合作用\n\n#### 协同作用\n\n#### 拮抗作用\n\n#### 独立作用\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n（一）联合毒性作用类型\n相加作用：化学结构相似、靶器官和靶分子相同、\n作用机理类似的多种环境化学物，同时作用于机体所\n产生的生物学作用的总强度是各自单独作用的总和。\n\n#### 1+1=2\n\n#### 丙稀腈、乙晴\n\n#### 大部分刺激性气体的刺激\n具有麻痹作用的化合物对机体的刺激\n两种有机磷农药对胆碱酯酶的抑制作用\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n（一）联合毒性作用类型\n协同作用：两种以上环境化学物同时作用于机体，所\n产生毒性作用强度超过各化学物单独作用强度的总和。\n与促进吸收、延迟排出、干扰体内代谢过程有关。\n\n#### 1+1>2\n\n#### 马拉硫磷、苯硫磷\n\n#### 由于苯硫磷对促进肝脏降解\n\n#### 马拉硫磷的酯酶有抑制作用\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n（一）联合毒性作用类型\n增强作用：\n，一种环境化学物本身对机体并无毒性，但能使\n同时进入机体的另一种环境污染物的毒性增强。\n·无毒化合物通过影响另一种化合物的代谢活化、\n吸收和排除有关。\n\n#### 1+1>2\n\n#### 异丙醇、四氯化碳\n\n#### 异丙醇对肝脏无毒，当与四氯化碳\n\n#### 同时进入机体时，可使四氯化碳毒\n\n#### 性大于单独作用时毒性\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n（一）联合毒性作用类型\n拮抗作用：两种环境化学物同时作用于机体时，\n其中一种化学物可干扰另一种化学物的生物学作\n用，或两种化学物相互干扰，使混合物的毒作用\n强度低于各自单独作用的强度之和。\n\n#### 1+1<2\n\n#### A细胞 B细胞\n\n#### 胰岛素、胰高血糖素 功能拮抗\n\n#### 硫代硫酸钠、氰化物 化学拮抗\n两种物质混合发生化学反应，\n\n#### 生成毒性较小的硫氰酸盐 D细胞\n（A细胞产生胰高血糖素B细胞产\n\n#### 生胰岛素D细胞产生生长抑素）\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n（一）联合毒性作用类型\n独立作用：两种或两种以上的环境化合物作用于\n机体，各自的作用方式、途径、受体和靶器官不\n同，彼此互不影响，仅表现为各自的毒作用。\n\n#### 乙醇、氯乙烯\n乙醇引起线粒体脂质过氧化，而氯乙烯\n引起微粒体脂质过氧化，彼此无明显影响\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n#### 联合作用类型评价方法\n1.联合作用系数法\n\n#### 混合物的预期LD50\n\n#### 联合作用系数（K）=\n\n#### 混合物实测LD50\n混合物的预期LD5值的计算公式：\n\n#### 1 b n\n混合物的预期LDso值A的LDsoB的LDso N的LDsoa，b....n，分别为各化合物在混合物中所占的质量比例\nK值<0.4拮抗作用0.4-2.5相加作用>2.5协同作用\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 联合作用类型评价方法\n2.等效应线图法\n甲化学物（mg/kg) 上限 at拮抗作用\n\n#### LD50\n\n#### 相加作用\n\n#### 下限\n\n#### 协国作用\n\n#### 上限 LD50 下限\n\n#### 乙化学物（mg/kg）\n·本法只能评定两个化合物的联合作用，其原理是在试验条件和接触途径\n相同情况下分别求出受试的甲、乙两种化合物的LD及其95%可信限\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 多选题1分\n影响外源环境化学物毒性的结构与性质主要有：同系物的碳原子\n数、烃基、卤素取代、羟基、胺基及有机磷化合物结构与毒性密\n切相关。\n\n#### 分子饱和度\n\n#### 酸基和酯基\n\n#### 构型\n\n#### 硫代基\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n#### 单选题1份\n\n#### 最小有作用剂量是\n一种化合物按一定方式与人接触，出现了亚临床症状的最小剂量\n一种化合物按一定方式与人接触造成显微镜下可观察到的损伤\n\n#### 的最小剂量\n一种化合物按一定方式与人接触引起免疫功能减低的最小剂量\n一种化合物按一定时间内，按一定方式与机体接触，使某项指\n\n#### 标开始出现异常变化的最低剂量\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n#### 单选题1分\n\n#### 最大无作用剂量是\n未能观察到任何对机体损害作用的最低剂量\n未能观察到任何对机体损害作用的最高剂量\n人类终身摄入该化合物未引起任何损害作用的剂量\n一种化合物在环境中存在而不引起生物体的损害的剂量\n"}, {"id": "pdf-007-2", "group": "原始课件 · PDF原文", "title": "007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素", "md": "# 第四章 环境污染物的毒作用及其影响因素\n\n> 来源: 007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素.pdf\n> 页数: 50\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n## 第四章 环境污染物的毒作\n\n#### 用及其影响因素\n\n#### 2026年3月\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n主要内容：\n\n#### 第一节：环境污染物的毒作用\n\n#### 第二节：毒作用机制\n\n#### 第三节：影响毒作用的因素\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n2009年2月20日，因自来水水源受到酚类化合物污染，江苏盐城大面积断水近67\n小时，20万市民生活受到影响，占该市市区人口的五分之二。据调查，制造这起\n污染事件的竟是被评为当地标兵企业的盐城新化工厂，该厂为减少治污成本，居\n然趁大雨天偷排了30吨化工废水，最终污染了水源地。事后，该厂两名负责人因\n投放危险物质罪”分别被判处10年和6年有期徒刑，这也是我国首次以这一罪\n名对环境污染事件作出刑事处罚。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n>2015年年底开始，江苏省常州市外国语学校先后有641名学生被送到医院进行检\n查，有493人出现皮炎、湿疹、支气管炎、血液指标异常、白细胞减少等异常症\n状，个别的还被查出了淋巴癌、白血病等恶性疾病。学校紧邻三家化工厂，常隆\n化工、长宇化工和华达化工，生产像克百威、灭多威、异丙威、氰基萘酚等剧毒\n类产品，将有毒废水直接排出厂外，将危险废物偷偷埋到了地下，对环境带来了\n很大隐患。\n>更令人震惊的是，该地块地下水和土壤中的氯苯浓度分别超标达94799倍和\n78899倍，相当于一枚“生态炸弹”，按规定，此地块上不应有长期居住人群。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n山东章丘危废倾倒案：非法处置危废致多人死亡\n张林德、陈继新租赁山东省章丘市普集镇上皋村已废弃的明皋2号煤矿井院落，专\n门收集、倾倒危险废物。2015年10月21日凌晨2时许，张林德、陈继新雇用车号\n为鲁CB6590的罐车运输化工废液向煤矿井内倾倒时，张林德、陈继新、罐车司\n机和押运员共4人中毒死亡。\n山东省环保厅在接到举报后立即派出应急处置指导组赶赴现场指导应急处置工作。\n济南、章丘市政府迅速启动应急预案。截至2016年1月21日，全面完成对受污染\n区域的惟幕注浆，共计打孔106个，污染区域已经实现全封闭。此案共牵出7家违\n法化工企业。涉嫌犯罪的山东省内5家化工企业，已有10名企业相关负责人被刑\n事拘留、取保候审或执行逮捕，案件累计对25名涉案嫌疑人采取刑事强制措施，\n其中12人已被批准逮捕，3人在逃。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 第一节：环境污染物的毒作用\n\n#### >毒物、毒性及中毒\n\n#### >毒作用及其分类\n\n#### >损害作用及非损害作用\n\n#### >效应和反应\n>剂量-效应关系和剂量-反应关系\n\n#### >表示毒性的常用参数\n\n#### >毒作用带\n\n#### >毒性单位与分级\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 4.1环境污染物的毒作用\n1.毒物 (Toxicant)\n按一定条件接触后，以较小的剂量作用机体\n就能引起生理、生化功能或正常组织结构的器质\n性病理改变，甚至引起死亡的化学物质。\n2.毒性 (Toxicity)\n化学物质能引起机体损害的性质和能力。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 4.1环境污染物的毒作用\n3.中毒（toxication）\n外源性化学物质引起机体病理性功能改变或\n器质性病变的现象。\n根据污染物的暴露特点和中毒发生发展的快\n慢，分为急性中毒、亚慢(急)性中毒和慢性中毒。\n根据毒作用强度和性质判定环境污染物的毒\n性大小。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 4.1环境污染物的毒作用\n4.毒作用 (toxic effect)\n又称毒效应或毒性效应。指化学物质对机体所致的不良\n或有害的生物学变化，故又称不良效应、损伤作用或损害作\n用。\n毒作用与毒性的区别？\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 毒作用分类\n>按毒作用发生的部位：局部、全身；\n按毒作用损伤恢复情况：可逆、不可逆；\n>按毒作用引|发时间的快慢：速发性、迟发性\n\n#### 过敏反应\n\n#### >特异体质反应\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 损害作用与非损害作用\n>损害作用：机体发生的不可逆/可逆但超出正常生理调节范\n围的变化。\n>非损害作用：特点是不引起生物机体形态、生长发育和寿\n命的改变，机体可以通过自身调节恢复的轻微变化。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 损害作用与非损害作用\n：框在点击“”时会进行转换，用时则会变为\n可点击的视题。框移位和\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 4.1环境污染物的毒作用\n剂量：给予机体的或机体接触的外源化学物质的数量。\n效应：表示一定剂量外来化合物与机体接触后可引起\n的生物学变化，能用计量资料表达其强度，是属量效应。\n反应：表示接触某一化学物质的群体出现某种效应的\n个体数在群体中所占的比率。属于计数资料，没有强度\n差别，不能以具体数值表示，是属质效应。\n\n#### 剂量-效应VS剂量-反应\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 4.1环境污染物的毒作用\n2.剂量-效应关系和剂量-反应关系曲线\n剂量-效应关系和剂量-反应关系均可用曲线表示，即以表示\n效应强度的计量单位或表示反应的百分率或比值为纵坐标，以剂量\n为横坐标绘制散点图所得曲线。\n（1）直线型\n（2）抛物线型\n（3）S形曲线\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 剂量-反应曲线图\n\n#### 100 100\n\n#### 反应强度（%）\n\n#### 死亡率（%）\n\n#### 剂量 剂量\n（1）直线型 （2）抛物线型\n\n#### 死亡率（概率单位）\n\n#### 死亡率（%）\n\n#### 对数剂量 对数剂量\n（3）S形曲线 （4）概率-对数剂量直线\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 表示毒性的常用参数\n致死剂量（Lethaldose，LD2.最小有作用剂量 （MEL）\n3.最大无作用剂量（MNEL4.急性毒作用带(Zac)\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 4.1环境污染物的毒作用\n1.半数致死剂量LD5o或浓度LC50\n绝对致死量 半数致死量 最小致死量 最大耐受量\n(LD100) (TT) (MLD) (MTD)\n）半数致死量 （LD5o）又称致死中量，\n指引1起一群个体50%死亡所需剂量\n(mg/kg)或浓度（LC5o）（mg/m3和\nmg/L）。\n\n#### 最重要判断毒物毒性大小的基础\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 4.1环境污染物的毒作用\n2.半数效应剂量\n致死剂量 半数效应 最小有作用最大无作用急性毒作\n(LD) 剂量(ED5o) 剂量(MEL) 剂量(MNEL）用带(Zac)\n·半数效应剂量(EDso)指外源化学物在一定\n的时间内按一定的方式与机体接触，引起机\n体某项生物效应发生50%改变所需的剂量。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 4.1环境污染物的毒作用\n3.最小有作用剂量\n半数效应 最小有作用最大无作用急性毒作\n\n#### 致死剂量\n剂量(ED5so) 剂量(MEL)\n(LD) 剂量(MNEL）用带(Zac)\n·最小有作用剂量：指能使机体发生某种异\n常变化所需最小剂量，即能使机体开始出现\n毒性反应的最低剂量。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 4.1环境污染物的毒作用\n4.急性毒作用带 (Zac)\n致死剂量 半数效应最小有作用最大无作用 急性毒作\n(LD) 剂量(ED5o) 剂量（MEL） 剂量（MNEL） 用带(za)\n·急性毒作用带：指半数致死剂量与急性阀剂量\n的比值。Zac值小说明化学物质从产生轻微损害到\n导致急性死亡的剂量范围窄，引起死亡的危险性\n大；反之说明引起死亡的危险性小。\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 4.2毒性作用的机理\n分子水平：\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰细胞内钙稳态\n\n#### 自由基对生物大分子的氧化损伤\n\n#### 毒物与生物大分子共价结合\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰正常受体-配体的相互作用\n受体学说：认为膜上存在受体，它是一种大分子蛋白质能\n对特定生物活性物质具有识别能力并可选择性地与其结合\n\n#### 生物膜\n配 受 反 离子或分子传输 生物效应\n\n#### 应体 酶的灭活或激活\n\n#### 体 体 神经递质或激素释放\n\n#### 识别换能 VIIA 放大\n图4-5受体与配体相互结合模式（引自Cooper等，1982）\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞膜损伤\n\n#### 干扰正常受体-配体的相互作用\n受体(receptor)是组织细胞的生物\n\n#### 大分子，激素或金属离子与配体\n(ligand)相结合，形成配体-受体复\n\n#### IRS1 IRS1\n合物，引起毒性效应。\n·环境污染物尤其是神经毒物和内分泌干扰物，通过\n千扰正常受体－配体相互作用，引起毒性。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 生物膜破坏\n，化学毒物对生物膜的成分造成影响；\n十六烧基吡啶 hydrophobictail\n化学毒物对生物膜上的酶活性造成影响； /ridinium benzalkoni\n\n#### 化学毒物对膜生物物理性质的影响\ncetylpyridinium QUA\n对膜通透性的影响;\n对膜流动性的影响；\n对膜表面电荷的影响。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 生物膜破坏--关键分子机制\n\n#### 受体-配体干扰 (重点）\n\n#### 正常情况：配体受体结合\n受到干扰：毒物占据受体位置，信号中断\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞钙稳态的影响损伤\n钙离子是集体的第二信使之一，在细胞功能的调节中起重\n要作用，如神经传导、肌肉收缩、细胞增殖和分化、细胞\n形态发生、细胞衰老等。\n\n#### 内10-7~10-8mol/L\n\n#### 细胞\n\n#### 外10-mol/L\n\n#### 与CAM结合 神经转导\nCa2+ cAMP作用 肌肉收缩\n\n#### 激活PKC 细胞分化和增值\n\n#### 离子通道开放 细胞分泌\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 化学毒物对细胞钙稳态的影响损伤\nVOCCa2+结合蛋白 Ca2+泵\n\n#### ROC. 肌质网\n\n#### Na+-Ca2+载体\n线粮体[Ca2+]i:10-7mol/L\n\n#### [Ca²]e:10-mol/L\n硝基酚、醌、过氧化物、醛类、二恶英、卤化链烷、链\n烯和Cd2+、Pb2+、Hg2+等重金属离子均能干扰细胞内钙稳\n态，从而引起细胞损伤或死亡。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 自由基对生物大分子的氧化损伤\n\n#### 脂质过氧化对生物膜的损伤\n1.蛋白变性\n\n#### 自由基 2.细胞膜流动性\n3.酶活性\n4.细胞肿胀和溶解\n\n#### /自由基性质环境毒物\n5.致突变，染色体断裂\n√环境毒物与多不饱和！\n6.致畸胎\n\n#### 脂肪酸的作用产物\n\n#### 毒物代谢物\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 自由基对生物大分子的氧化损伤\n对组织器官的细胞有选择性致死毒性\n\n#### 体细胞 细胞突变和癌变\n\n#### DNA损伤和\n\n#### 染色体异常\n\n#### 生殖细胞\n\n#### 遗传性疾病\n\n#### 致畸作用\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 毒物与大分子共价结合\n共价结合学说：认为外源性化学物质和其他活性代谢产物\n与机体的重要生物大分子如蛋白质、核酸、酶和膜脂质等\n进行共价结合，改变生物大分子的化学结构与生物学功能，\n从而引起一系列病理、生理变化，是细胞损害的重要机制\n\n#### 之一\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n### 4.2毒性作用的机理\n\n#### 毒物与大分子供价结合\n\n#### 细胞毒性和死亡\n\n#### 过敏反应\n\n#### 蛋白质 致癌作用\n\n#### 抑制酶活性\n\n#### 环境毒物及 共价结合\n\n#### 代谢产物\n\n#### 细胞毒性\n\n#### 影响DNA-蛋白质\n\n#### 核酸 相互作用\n\n#### 致突变作用\n\n#### 加合物 激活癌基因\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n一、毒物因素\n（一）结构与毒性\n研究外源化学物的结构与毒性之间的关系，\n有助于通过比较来预测新化合物的生物活性、\n作用机理和安全限量范围。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n1.化学结构与毒作用性质\n\n#### 结构有 毒作用性质\n\n#### 受体匹配性 阻断信号/干扰功能\n\n#### 不稳定、易断裂 氧化损伤\n\n#### 活泼基团 不可逆结合损伤\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n\n#### 化学结构与毒性大小\n(1）同系物的碳原子数\n碳氢化合物（烷、醇、酮等）：\n当碳原子数在2~7之间时：\n\n#### 随C数的增加毒性增加\n·超过一定限度(7~9个）后：\n\n#### 随C数的增加毒性下降\n，当碳原子数相同时：\n直链的>支链的；成环的>不成环的\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n\n#### 化学结构与毒性大小\n(2) 卤素取代\n·化学分子结构式中增加卤素，可使分子极性增\n加，更易与酶系统结合，从而毒性增强\n肝脏毒性：CCL>CHC1>CH2CL>CHC1\n麻醉作用：CHCI>CH2C1>CHCI>CH4\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n### 4.3.1环境化学物的结构与性质\n（3）构型\n同分异构体：一般对位>邻位>间位\n·旋光异构：由于受体或酶一般只能与一种旋光\n异构体结合而产生生物效应，故同一化合物的\n\n#### 不同旋光异构体的毒性不同\nL-异构体易与酶、受体结合，具有生物活性，\n\n#### D-异构体则反之\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n#### 化学结构与毒性大小\n(4）分子饱和度\n·分子中不饱和键增多可使化学物活性增大，毒\n\n#### 性增强\n对眼角膜的刺激作用：丙烯醛>丙醛 丁烯醛>丁醛\n\n#### 丙烯醛 丙醛 丁烯醛 丁醛\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n#### 理化性质与毒性\n1.水溶性\n\n#### 毒物在水中溶解度越大，毒性越大\n2.脂溶性\n脂溶性物质易在脂肪中蓄积，侵犯神经系统\n3.挥发度和蒸气压\n化学物凡是容易挥发或蒸气压大者，都容易\n污染空气，病抑郁经呼吸道吸入机体。\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n### 4.3.2影响毒性的机体因素\n种属和个体差异 水生生物测试表明，对于化学污染\n物，节肢动物一般比鱼类更敏感，\n\n#### 鱼类比两栖幼体类更敏感\n\n#### 性别与激素\n\n#### 影响机体对环境化学\n\n#### 年龄\n\n#### 物的敏感性和耐受性\n\n#### 营养与健康状况\n\n#### 生物节律\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n### 4.3.3影响毒性的非生物因素\n\n#### 气温\n\n#### 环境因素\n\n#### 气压\n\n#### pH和碱度\n酸性较强（pH<5）条件下，氢离子会对水生生物产生危害；\npH也会影响溶液中亲脂性那部分金属形态的生物可利用性\n\n#### 盐度\n盐度对痕量金属在生物相中富集的影响会受到生物因素\n\n#### 和化学因素的影响\n\n#### 硬度\n硬度会影响有机表面活性剂的毒性，降低金属的毒性\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n### 4.3.4环境化学物的联合毒性作用\n两种或两种以上的化学物同时或短期内先后作\n用于机体所产生的综合毒性作用，称为化学物的联\n合毒性作用。\n\n#### 相加作用\n\n#### 联合作用\n\n#### 协同作用\n\n#### 拮抗作用\n\n#### 独立作用\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n（一）联合毒性作用类型\n相加作用：化学结构相似、靶器官和靶分子相同、\n作用机理类似的多种环境化学物，同时作用于机体所\n产生的生物学作用的总强度是各自单独作用的总和。\n\n#### 1+1=2\n\n#### 丙稀腈、乙晴\n\n#### 大部分刺激性气体的刺激\n具有麻痹作用的化合物对机体的刺激\n两种有机磷农药对胆碱酯酶的抑制作用\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n（一）联合毒性作用类型\n协同作用：两种以上环境化学物同时作用于机体，所\n产生毒性作用强度超过各化学物单独作用强度的总和。\n与促进吸收、延迟排出、干扰体内代谢过程有关。\n\n#### 1+1>2\n\n#### 马拉硫磷、苯硫磷\n\n#### 由于苯硫磷对促进肝脏降解\n\n#### 马拉硫磷的酯酶有抑制作用\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n（一）联合毒性作用类型\n增强作用：\n，一种环境化学物本身对机体并无毒性，但能使\n同时进入机体的另一种环境污染物的毒性增强。\n·无毒化合物通过影响另一种化合物的代谢活化、\n吸收和排除有关。\n\n#### 1+1>2\n\n#### 异丙醇、四氯化碳\n\n#### 异丙醇对肝脏无毒，当与四氯化碳\n\n#### 同时进入机体时，可使四氯化碳毒\n\n#### 性大于单独作用时毒性\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n（一）联合毒性作用类型\n拮抗作用：两种环境化学物同时作用于机体时，\n其中一种化学物可干扰另一种化学物的生物学作\n用，或两种化学物相互干扰，使混合物的毒作用\n强度低于各自单独作用的强度之和。\n\n#### 1+1<2\n\n#### A细胞 B细胞\n\n#### 胰岛素、胰高血糖素 功能拮抗\n\n#### 硫代硫酸钠、氰化物 化学拮抗\n两种物质混合发生化学反应，\n\n#### 生成毒性较小的硫氰酸盐 D细胞\n（A细胞产生胰高血糖素B细胞产\n\n#### 生胰岛素D细胞产生生长抑素）\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n（一）联合毒性作用类型\n独立作用：两种或两种以上的环境化合物作用于\n机体，各自的作用方式、途径、受体和靶器官不\n同，彼此互不影响，仅表现为各自的毒作用。\n\n#### 乙醇、氯乙烯\n乙醇引起线粒体脂质过氧化，而氯乙烯\n引起微粒体脂质过氧化，彼此无明显影响\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n#### 联合作用类型评价方法\n1.联合作用系数法\n\n#### 混合物的预期LD50\n\n#### 联合作用系数（K）=\n\n#### 混合物实测LD50\n混合物的预期LD5值的计算公式：\n\n#### 1 b n\n混合物的预期LDso值A的LDsoB的LDso N的LDsoa，b....n，分别为各化合物在混合物中所占的质量比例\nK值<0.4拮抗作用0.4-2.5相加作用>2.5协同作用\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n\n#### 联合作用类型评价方法\n2.等效应线图法\n甲化学物（mg/kg) 上限 at拮抗作用\n\n#### LD50\n\n#### 相加作用\n\n#### 下限\n\n#### 协国作用\n\n#### 上限 LD50 下限\n\n#### 乙化学物（mg/kg）\n·本法只能评定两个化合物的联合作用，其原理是在试验条件和接触途径\n相同情况下分别求出受试的甲、乙两种化合物的LD及其95%可信限\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 最小有作用剂量是\n一种化合物按一定方式与人接触，出现了亚临床症状的最小剂量\n一种化合物按一定方式与人接触造成显微镜下可观察到的损伤\n\n#### 的最小剂量\n一种化合物按一定方式与人接触引起免疫功能减低的最小剂量\n一种化合物按一定时间内，按一定方式与机体接触，使某项指\n\n#### 标开始出现异常变化的最低剂量\n\n#### 提交\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n\n### 4.1环境污染物的毒作用\n\n#### 最大无作用剂量是\n未能观察到任何对机体损害作用的最低剂量\n未能观察到任何对机体损害作用的最高剂量\n人类终身摄入该化合物未引起任何损害作用的剂量\n一种化合物在环境中存在而不引起生物体的损害的剂量\n\n#### 提交\n"}, {"id": "pdf-008-3", "group": "原始课件 · PDF原文", "title": "008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法", "md": "# 第五章 环境毒理学常用实验方法\n\n> 来源: 008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法.pdf\n> 页数: 82\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 环境毒理学\n授课人：森巴提?叶尔肯\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n## 第五章环境毒理学常用实验方法\n本章将讨论以下内容：\n\n### 5.1概述\n\n### 5.2环境化学物等一般毒性试验\n\n### 5.3致畸、致癌、致突变等毒性试验\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 5.1 概述\n\n#### 毒理学研究的主要手段\n\n#### 动物实验\n借助于动物模型模拟人体接触环境化学品的各种\n条件，观察实验动物的毒性反应，再外推到人\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 概述\n\n#### 毒理学研究的主要手段\n\n#### 体内实验 动物实验 体外实验\n采用整体动物、动物器官、组织及细胞等进行\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n#### 概述\n一、实验动物的选择\n\n#### 人工培育 科学研究\n控制其携带微生物、遗传背景明确，来源清楚。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 概述\n1.物种的选择--－基本原则\n对外源的毒性反应及代谢特点与人类接近的物种\n\n#### 自然寿命不太长的物种\n\n#### 易于饲养和实验操作的物种\n\n#### 经济并易于获得的物种\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 概述\n1.物种的选择--－常用动物\n选用两个物种进行试验、评价毒性反应的物种差异\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n#### 概述\n2.品系的选择\n品系 用计划交配的方法获得的起源于共同祖先的一群动物。\n具有共同的遗传来源、相似的外貌特征、独特的生物\n\n#### 同一品系\n\n#### 学特性及稳定的遗传性能\n类别 遗传特性 繁殖方式 应用场景\n近交系动物 基因高度纯 连续兄妹/亲 遗传研究、\n\n#### 近交系动物 合 子交配\n\n#### 药物测试\n突变系动物 疾病模型、\n根据实验需要 携带特定基 选择性交配或基\n\n#### 突变系动物 基因功能研\n\n#### 因突变 因编辑 究\n\n#### 杂交群动物\nF1代杂合 干细胞研究、\n\n#### 杂交群动物 两个近交系杂交\n\n#### 封闭群动物 子 免疫实验\n\n#### 遗传多样性 毒理学、行\n\n#### 封闭群动物 群体内随机交配\n\n#### 高 为学研究\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 概述\n3.微生物控制的选择\n为确保实验结果的真实性、可靠性和增加可比性、可\n\n#### 微生物控制\n重复性及科学性。\n应对实验动物携带的微生物控制，根据对动物微生物\n\n#### 实验动物分类\n控制的净化水平，我国将实验动物分为无菌动物、悉\n生动物、无特定病原体动物和清洁动物。\n等级 微生物控制 饲养环境 应用场景\n无菌动物 完全无微生物 无菌隔离器 微生物组、免疫机制研究\n悉生动物 已知特定微生物 无菌隔离器 特定菌群功能研究\nSPF动物 排除特定病原体 屏障环境 生物医学研究、疫苗开发\n清洁动物 排除常见病原体 普通屏障环境 基础实验、教学\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n年龄 毒理学试验选用的实验动物的年龄取决于实验\n\n#### 的类型\n\n#### 成年动物 急性试验\n年幼或初断乳动物 亚慢性、慢性试验\n实际工作中常以动物的体重粗略的判断动物的年龄\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n性别 同物种、同品系但不同性别的实验动物对化学\n\n#### 物毒性的敏感程度有差别\n\n#### 无特殊要求 应选用雄两种性别\n已知不同性别敏感程度物 选择敏感的性别\n如实验中发现性别差异，应对实验结果分别统计分析\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n#### 概述\n4.个体选择\n\n#### 实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n毒理学试验一般应选用未产未孕的雌性动物\n生理状态 除进行与生殖有关的试验时需有计划地合笼交\n配外，雌雄动物应分笼饲养。\n毒理学试验应选用健康的动物。一般在试验前\n健康状态 检疫观察5-7天。对于大动物的亚慢性和慢性试\n验，还应进行血液学和血液生化学检查，剔除\n异常动物。\n如对狗进行试验，应该常规驱除肠道寄生虫\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n#### 概述\n二、常用的染毒方法\n\n#### 使动物通过一定的途径接触毒物\n根据试验的目的并结合人体的实际接触方\n\n#### 染毒\n式、毒物的多少、理化性质以及设备条件\n等来决定。\n主要染毒途径：经口、经皮肤及经呼吸道吸入\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n#### 概述\n1.经口染毒\n\n#### 采用灌胃、吞服胶囊和饲喂的方式\n灌胃前需要禁食；\n灌胃 灌胃针从口角进入，针头轻压舌根，引起小\n鼠吞咽反射；\n进入食道后，继续入针时应无阻力。针头到\n达胃部后推动注射器，推入需要的计量\n竖直拔出针头，完成灌胃操作。\n注意： 若感到阻力或动物挣扎时，应该立即停止进针或将针拔出；\n参考给药量：小鼠0.1ml/10g体重，最大不超过0.5ml/10g体重\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n#### 概述\n1.经口染毒\n\n#### 采用灌胃、吞服胶囊和饲喂的方式\n\n#### 迫使实验动物吞服胶囊\n\n#### 吞服胶囊 该方法计量准确\n\n#### 适合不合实验动物“口味”的药物\n饲喂 要求受试物占饲料的比例小于5%。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n#### 概述\n2.经呼吸道染毒\n\n#### 静式吸入染毒和动式吸入染毒\n将实验动物置于密闭的染毒柜中，加入易挥\n\n#### 静式吸入\n发的液态或气态受试物达到一定的浓度。\n动式吸入 采用机械通风装置，使实验动物在氧和二氧\n化碳分压较为恒定、受试化学物浓度也较为\n\n#### 稳定的环境中进行\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n#### 概述\n3.经皮肤染毒\n液态、气态、粉尘都有可能与皮肤接触\n研究化合物经皮肤吸收的毒性作用，及化合物对接触化合物\n皮肤的局部作用，均需使用经皮肤染毒的方式\n动物的被毛有碍于与化学物的直接接触，因此，\n在经皮肤染毒前需要去除染毒部位的被毛\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n#### 概述\n4.其他方式\n根据试验目的和要求以及染毒物质的性状，还可选用腹腔注\n射、皮下注射、静脉注射等。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n\n#### 动物血液采集\n检查血液，可了解受试物对血液系统的作用，反应受试物对各\n器官系统功能及受试物代谢过程的影响。\n\n#### 实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n\n#### 小鼠 0.10 0800\n大鼠 1.00 2.005.00 10,00\n免猴 10.00 40.0015,00 60.00\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n小鼠、大鼠：\n所需血量不多时，可采用尾尖采血和眼眶静脉丛采血\n\n#### 用血量较多时，可采用心脏采血法\n对采血后拟处死的动物，可采用断头采血法。\n\n#### 实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n\n#### 小鼠 0.10 0.30\n\n#### 大鼠 1.00 2.00\n\n#### 鼠 5.00 10.00\n免 10.00 40.0015,00 60.00\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n对豚鼠：可采用耳缘剪口采血和心脏采血\n对家兔：·可采用耳静脉采血，是家兔最为常用的取血\n\n#### 法之一\n常作多次反复取血用，故保护耳缘静脉，防\n止发生栓塞。\n需血量较多少，也可采用心脏采血。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n#### 概述\n三、实验动物生物材料的收集方法\n2.动物尿液、粪便的收集\n对尿液、粪便的分析，可了解受试物的吸收代谢的特点\n采用特制的容器（代谢笼）进行尿液、粪便的收集。\n必须保证粪便和尿液分开，以防止相互混合\n常用的粪尿分离收集器，其类型有玻璃、塘瓷、瓷器等制\n\n#### 品，可根据实验室条件适当选用\n\n#### 样品应在新鲜时进行检验\n实验期间膳食成分应一致，且须在特定时间内收集样品\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n#### 概述\n四、实验动物处死方法\n\n#### 处死要求\n尽量快速，不是动物集体发生与毒理试验无关的病理变化、\n\n#### 操作简便为原则\n\n#### 处死方法\n（1) 脱颈椎法：适用于对小动物（大、小白鼠）处死。\n(2) 断头法：适用于大、小白鼠处死。\n（3）麻醉法：置于有麻醉剂（氯仿或乙醚）的密闭容器内，使动物麻醉\n致死。大动物则须用注射麻醉剂法进行。\n（4）空气栓塞法：用注射器向动物静脉内迅速注人一定量的空气，使动\n物血管内形成大量气栓而致死。适用于大动物的处死。\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n#### 概述\n五、实验动物的解剖检查\n\n#### 病理形态学检查\n，对试验动物进行大体解部，观察各脏器有无异常\n\n#### 准备\n复查动物的编号、实验组别、称体重，进行一般的体表状况的观察。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n#### 概述\n五、实验动物的解剖检查\n\n#### 实质器官\n观察脏器的颜色、形状大小等情况。切面有无外翻，各结\n构层次是否清晰等。\n\n#### 空腔器官\n\n#### 观察其内容物的量和性质等变化\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n\n### 5.2环境化学物一般毒性及其评价\n一般毒性：\n包括急性毒性、亚慢性毒性和慢性毒性、蓄积毒性等\n特殊毒性：\n致畸、致癌、致突变、生殖、发育毒性\n毒物作用时间的长短是决定其毒性效应的主要因素之一\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n\n### 5.2环境化学物一般毒性及其评价\n\n#### 案例\n近年来，马兜铃酸致癌致肾炎的新闻引起了人们的热议。临床上\n将马兜铃酸肾病分为三种类型：急性马兜铃酸肾病、慢性马兜铃酸肾病\n以及肾小管功能障碍型马兜铃酸肾病。\n急性马兜铃酸肾病：多由在较短的时间内，大量服用含有马兜铃酸的药物\n所致，临床表现主要为少尿或非少尿性急性肾功能衰竭。\n慢性马兜铃酸肾病：多由持续或间断小剂量服用含马兜铃酸药物所致，肾\n功能呈进行性损害。\n肾小管功能障碍型马兜铃酸肾病：通常在间断小量服用含马兜铃酸药物后\n数月出现症状，主要表现为肾小管性酸中毒等。由此可见，同样的毒物根\n据其染毒时间的长短和剂量大小的不同，可能导致不同的毒性作用\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n#### 环境化学物一般毒性及其评价\n一、急性毒性\n急性毒性是指机体一次接触或24小时内多次接触某一化学物所引1起的\n毒性效应，包括死亡效应。\n一次·经口或经注射染毒则为操作时瞬间染毒；\n经呼吸道或经皮肤染毒则为特定期间内持续接触化学物的过程\n多次·毒性过低或一次染毒剂量受生物体容量限制，需要给予实验动\n物较大剂量时，可以在24h内多次染毒\n目的：\n是测定半数致死量（或浓度，LDso或LC5o），急性中毒國剂量（或浓度)。\n另外：急性毒性研究可为亚慢性、慢性毒性研究及其他毒理试验染毒剂\n量的设计和观察指标的选择提供依据，为毒性作用机制研究提供线索。\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n\n#### 半数致死量（LD5o）的测定\n急性毒性大小常用LD表示；\n指的是半数试验动物死亡所使用的毒物剂量；\n\n#### 若使用的是溶液，则用LC50\nLDs或LCs是急性有关指标中重要的参数；\nLD5o（LC5o）可能于毒性分级;\n毒性大小比较的依据；\nLD5o（mg/kg）、LCso（mg/kg），数值越小毒性越强。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n\n#### 急性毒性试验的一般操作流程\n·成年健康的小鼠\n\n#### 选择受试生物：·\n雌、雄各半;\n若待测化学物对性别有名感性，则根据需求调整雌雄比例\n染毒方式和染毒计量的选择：\n·事先查阅文献，根据毒物结构和理化性质寻找类似化学物的毒性资料\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n\n#### 急性毒性试验的一般操作流程\n染毒剂量：\n·取类似物种，染毒途径相同的LDso作为参考中值\n·以大剂量间隔染毒，找出相应的致死剂量范围（在少量动物上试验）\n·在这几个剂量范围设定几个试验组，进行正式实验。\n观察周期：\n·一般为14天（两周）\n依据受试动物测试相关规定确定观察周期\n对已知的速杀性药物，可缩短观察时间\n具体观察时间，应在试验报告及结果表示中说明，如7d的LD50\n根据观察期内动物的总死亡情况，计算LD50\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n\n#### 半数致死剂量的影响因素\n?实验动物的饲养环境和营养因素\n\n#### 实验人员操作的熟练程度\n\n#### 受试化学物的浓度和稀释倍数\n同一外源化学物，同一品系动物；同样接触途径测定的LD50只值会有2-3倍差异\n虽然半数致死剂量是急性毒性试验最为重要的毒性指标，在试验过程中，\n同样可以观察体重变化、中毒症状，对死亡个体进行病理检查等进一步确\n定污染物的毒性作用方式。\n\n---\n\n<!-- page 33 -->\n\n![page 33](page_033.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---亚慢性毒性试验\n在通常情况下啊，人类对环境污染物接触的水平较低，不至于发生急性中毒，\n却会在长期反复接触中慢性中毒。\n\n#### 亚慢性毒性\n又称亚急性毒性，机体在相当于1/20左右生命期间，少量、反复接触有\n害化学和生物因素引起的损害作用。\n\n#### 亚慢性毒性试验\n又称亚急性毒性试验，受试动物在1/20左右生命周期，每日、反复、多\n次接触受试物的毒性试验。\n\n#### 举例：大鼠生命为2年（24月）\n\n#### 需染毒：1~2个月\n\n#### 1/20即1～2个月\n\n---\n\n<!-- page 34 -->\n\n![page 34](page_034.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---慢性毒性试验\n\n#### 慢性毒性\n机体长期、少量、反复接触外源化学物所应期的毒性效应，接触期限一\n般为大于生命期的10%；\n\n#### 慢性毒性试验\n试验动物长期接触低剂量外来化学物，产生的生物学效应的试验称为慢\n性试验;\n特点：\n耗费的人力、物力和时间比较大，亚慢性毒性试验常作为慢性毒性试验\n的预备或筛选试验，必要时才进行慢性毒性试验\n染毒期长达2年或终生染毒的慢性毒性试验，常和致癌试验合并进行\n\n---\n\n<!-- page 35 -->\n\n![page 35](page_035.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n两种试验在试验设计和方法上除染毒期限有所不同，其他基本相同\n\n#### 受试动物\n受试动物的种属、品系，应该是在急性毒性试验中，已被确定为对受试物\n\n#### 敏感的动物\n一般要求选择两种受试动物：啮齿类、非齿齿类动物各一类\n\n#### 性别为雌雄各半\n建议选用年幼、初断奶的动物为试验对象，以便更全面了解受试物的毒效\n\n#### 应\n\n---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒剂量的选择\n一般应设置2个剂量组和1个对照组\n高剂量组：要能引起明显的中毒反应，不会让很多动物死亡\n\n#### 低剂量组：不引起任何中毒反应\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒途径\n应尽量模拟人类接触受试化学物的方式\n慢性、亚慢性毒性研究的染毒途径一致\n经胃肠道染毒时，毒物最好采用胃饲法\n受试化学物有异味或易水解时，也可采用灌胃方法染毒\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 染毒期限\n根据受试物的种类和试验动物的物种而定\n\n#### 亚慢性毒性一般染毒1-3个月\n慢性毒性一般染毒3-24个月，甚至终生染毒\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 试验设计、观察指标\n（1）一般性指标\n敏感的综合性指标，综合反映毒物对机体的毒作用（外见体征；粪便性状；\n食物利用率；体重变化）\n（2）试验室检查\n\n#### 包括血液学检查、肝功能、肾功能\n（3）病理组织学检查\n试验结束后，要及时解剖死亡的动物，肉眼观察大体病理变化，若有改变\n则需要做组织病理学检查，对于存活的动物也要做解部检查，必要时做组\n\n#### 织病理学检查\n（4）特异性指标\n根据受试物的毒性资料，试验中的观察和受试物结构等增加其他指标的检查\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n\n#### 试验设计、观察指标\n根据亚慢性毒性试验的结果，可以确定受试物的主要作用，靶器官对最大\n无作用水平和最大剂量做出初步估计，为进一步开展慢性毒性试验提供依据\n\n#### 慢性毒性试验\n对受试物在低剂量长时间接触机体时引起的毒性作用有更深入的了解\n可以依据敏感观察指标出现异常的最小阀剂量\n找出该受试物慢性毒性作用的最大无作用剂量\n为受试物能否应用或为制定在环境中卫生标准提供重要的参考依据\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 蓄积作用的基本概念\n1）定义：\n当外源化学物连续进入机体，且吸收速度或总量超过代谢转化排除的总量\n或速度时，化学物质很有可能在体内增加并贮留，称为化学物的蓄积作用。\n化学物质容易蓄积的部位称为储存库；\n\n#### 常见的储存库包括\n\n#### 血浆蛋白\n\n#### 脂肪组织\n\n#### 肝肾\n\n#### 骨骼\n\n#### 大多数蓄积作用都会产生蓄积毒性\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 2）蓄积毒性作用\n低于中毒剂量的外源化学物反复与机体接触一定时间后致使机体出现中\n毒作用;\n\n#### 3）环境污染物体内蓄积过程\n\n#### 物质蓄积\n·可用化学方法测得体内污染物或代谢物\n污染物不断进入机体内，其吸收量大于排出量，使其在体内的量逐渐积累增多\n\n#### 功能蓄积\n不断进入机体内的污染物，反复作用机体，引起机体一定结构和功能变化，\n并逐渐累积加重，最后导致出现损害作用；\n测不出该物质，例有机磷化合物。\n物质蓄积和功能蓄积是相对而言，同时存在又互为基础，在史籍中难以严格区别\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n定义：以生物效应为指标，用蓄积系数（k）评价蓄积作用，将多次染毒\n\n#### 与一次染毒毒性效应进行比较\n优点：方法简便，是评价蓄积作用的常用方法；\n缺点：无法区别物质蓄积还是功能蓄积\n∑LD50(n）—→多次染毒使半数动物出现效应的总剂量\n\n#### 蓄积系数（K）=\n表5-1蓄积作用强度分级（引自刘毓谷，环境毒理学教材，1987）\n\n#### 蓄积系数（K） 蓄积作用强度\n\n#### <1 高度蓄积\n\n#### 1~3 明显蓄积\n\n#### 3~5 中度蓄积\n\n#### >5 轻度蓄积\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法（固定剂量法、剂量定期递增染毒法、剂量固定的20\n天蓄积法)\n\n#### 固定剂量法\n使用大鼠或小鼠，通过经口灌胃、腹腔注射、染毒。试验周期为25-100天\n先求出LD5o-->选取相同条件的至少40只试验动物\n随机分为染毒组和对照组两组（每组至少20只，雌雄各半）\n每天以固定剂量在相同时间和相同途径对试验组进行染毒\n\n#### 观察并记录动物死亡数\n当试验组一半动物死亡时即可终止试验 若接触剂量依据蓄积到\n计算累积的总的接触剂量(LDso(n) 5*LD5o的剂量，那么即便死\n\n#### 亡数未超过半数，仍要终止\n根据公式计算K值 试验，此时K>5，表明蓄积作\n\n#### 用不明显\n\n#### 依据蓄积毒性强度分析进行评价\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n\n#### 确定蓄积系数常用的方法\n\n#### 剂量定期递增染毒法\n大体上与固定剂量法一致，不一样的是试验开始时染毒组需要按0.1LDso剂量进行染毒\n\n#### 以4天为一期\n\n#### 按一定比例增加染毒剂量\n\n#### 试验期最长28天\n注：试验期间需要定期（4天）一次给动物称重，按照实测体重调整染毒剂量\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n蓄积系数法：\n\n#### 确定蓄积系数常用的方法\n\n#### 剂量固定的20天蓄积法\n\n#### 口给予蓄积系数的原理设计\n口通常采用经口灌胃的染毒方式 1/20 LD501/10 LD50\n口将毒物随机分为5组（阴性对照*1，对照组*4）\n\n#### 1/5  LD50\n·每组10只，雌雄各半 1/2LD50\n·每天染毒一次，连续20天\n\n#### 口观察每组雌雄合计的死亡动物数\n口试验结束后，根据各实验组的死亡数对受试物的蓄积数强弱进行评定\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n\n#### 评价蓄积毒性的试验方法\n2）生物半减期法：\n定义：用毒物动力学原理描述毒物在机体内蓄积作用的方法\n简称T1/2：外来化合物通过机体的生物转运和转化作用被消除一半所需要的\n\n#### 时间\n生物半减期越长的物质，越不容易消除；发生蓄积作用的可能性就越大\n由于测定外来化学物在体内的生物半减期过程较为复杂，自实际观测中，\n常常间接的通过测定其血液、尿液或器官组织中的浓度（或量）降低一半\n所需的时间，用以代表该物质的生物半减期，根据测得的生物半减期的长\n短，来确定受试物的蓄积作用。\n\n---\n\n<!-- page 48 -->\n\n![page 48](page_048.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n1）定义：\n遗传物质发生的可改变生殖或体细胞中的遗传信息，并产生新的表型效应\n的改变。\n2）基本类型：\n自发突变：自然条件下发生，频率很低；\n诱发突变：人为的或受各种因素诱发产生\n环境突变/环境诱变作用：有物理、化学、生物作用（紫外线、X射线，化\n学诱变剂，黄曲霉素等都可诱发突变）\n突变基础：根据DNA突变的大小，将突变分为两大类\n1基因突变（例如：红色花的后带变成蓝色）\n\n#### ②染色体畸变\n\n---\n\n<!-- page 49 -->\n\n![page 49](page_049.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n\n#### 1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n\n#### 碱基置换 代的过程\n\n#### 置换又分为转换和颠换两种形式\n\n#### 基因突变\n转换：DNA多核苷酸链上同类碱基之间的取代，即密啶\n移码突变 被嘧啶，嘌呤被嘌呤取代\n\n#### AA 突变\n\n---\n\n<!-- page 50 -->\n\n![page 50](page_050.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n\n#### 突变基本类型及定义\n\n#### 1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n\n#### 碱基置换 代的过程\n\n####
