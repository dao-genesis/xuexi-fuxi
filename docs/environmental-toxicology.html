n<a href=\"assets/pdf/environmental-toxicology/L10_p039.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p039.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p040.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p041.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p041.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p042.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p042.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p043.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p043.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p044.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p044.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p045.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p045.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p046.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p046.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p047.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p047.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p048.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p048.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p049.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p049.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p050.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p050.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p051.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p051.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L10_p052.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L10_p052.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-7", "group": "章节精讲", "title": "第7章 · 常见化学致癌物的环境毒理学", "md": "# 第7章 · 常见化学致癌物的环境毒理学\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · 已填\n\n> 本章为应用章——把前 6 章之框架应用于具体之常见环境致癌物，含其来源、机制、靶器官、人群证据。\n\n#### 一、核心概念（名词解释）\n\n- **化学致癌作用（Chemical Carcinogenesis）**：化学物诱发**正常细胞转化为肿瘤细胞**之过程\n- **致癌物（Carcinogen）**：能引起或诱发动物或人类肿瘤之化学物\n- **直接致癌物**：本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体）\n- **间接致癌物（前致癌物）**：本身无活性，需经体内代谢活化后致癌（**多环芳烃 / 黄曲霉毒素 / 苯并芘** 等大多数为此）\n- **促癌剂**：本身不致癌，但能促进已转化细胞增殖（如佛波酯 TPA、糖精）\n- **化学致癌三阶段**：**启动 → 促进 → 进展**（initiation → promotion → progression）\n\n#### 二、化学致癌之**三阶段学说**（必背）\n\n```\n① 启动期（initiation）  \n   └ 致癌物与 DNA 共价结合 → 不可逆突变  \n   └ 单一暴露即可，剂量-反应明确，需 DNA 复制固定突变\n\n② 促进期（promotion）\n   └ 已转化细胞克隆性增殖\n   └ 长期反复暴露，可逆，有阈值\n   └ 促癌剂作用于此（不诱发突变）\n\n③ 进展期（progression）\n   └ 细胞获得侵袭、转移能力\n   └ 不可逆，染色体异常加剧\n```\n\n#### 三、致癌物分类\n\n##### 1. IARC（国际癌症研究中心）四类分级（重点）\n\n| 类别 | 含义 | 典型例 |\n|------|------|--------|\n| **1 类** | 对人**确证**致癌 | 苯并芘、黄曲霉 B₁、苯、镉、镍、砷、石棉、烟草、福尔马林、X 射线 |\n| **2A 类** | 对人**很可能**致癌（人证据有限+动物充分） | 丙烯酰胺、铅化合物、红肉、夜班工作 |\n| **2B 类** | 对人**可能**致癌（人证据有限+动物有限） | 汽油、电焊烟、咖啡（已移出）|\n| **3 类** | 现有证据**不能分类** | 咖啡因、糖精（已移出）|\n| ~~4 类~~ | 对人**很可能不**致癌（已废，原仅 caprolactam）| —— |\n\n> 2019 年起 IARC 实际只用 1/2A/2B/3 四类。\n\n##### 2. 按化学结构与作用机制\n- **遗传毒性致癌物**：直接损伤 DNA（多环芳烃、亚硝胺、烷化剂、芳香胺）\n- **非遗传毒性致癌物**：不损 DNA，通过促增殖、抑凋亡等致癌（雌激素、TPA、TCDD 二噁英）\n\n#### 四、典型致癌物（重点逐一）\n\n##### ① 多环芳烃 PAHs（**苯并[a]芘 BaP** 为代表）\n- **来源**：化石燃料不完全燃烧、烧烤焦糊食物、汽车尾气、烟草烟雾\n- **代谢活化**：BaP → 7,8-环氧化物 → 7,8-二氢二醇 → **7,8-二氢二醇-9,10-环氧化物（BPDE）**——终致癌物\n- **机制**：BPDE 共价结合 DNA 鸟嘌呤 N7 / N²，致 G→T 颠换突变\n- **靶器官**：肺、皮肤、膀胱\n- **流行病学**：吸烟与肺癌；烧烤工人\n\n##### ② 亚硝胺类（NDMA、NDEA 等）\n- **来源**：腌制食品（咸鱼、香肠）、烟草、橡胶工业；体内**亚硝酸盐 + 仲胺** → 内源生成\n- **代谢活化**：CYP 羟化 → α-羟基亚硝胺 → 重氮甲烷 → **甲基化 DNA**（O⁶-甲基鸟嘌呤）\n- **靶器官**：肝（NDMA、NDEA）、食管、胃\n- **流行病学**：林县食管癌高发与膳食硝酸盐相关\n- **预防**：维生素 C 抑制亚硝胺生成\n\n##### ③ 黄曲霉毒素 AFB₁（**最强已知致癌物之一**）\n- **来源**：黄曲霉污染之**花生、玉米、谷物**（高温高湿）\n- **代谢活化**：CYP1A2/3A4 → AFB₁-8,9-环氧化物 → 共价结合 DNA 鸟嘌呤\n- **靶器官**：**肝**（肝细胞癌主要原因之一，特别在 HBV 阳性者协同致癌）\n- **流行病学**：广西、江苏沿海肝癌高发与 AFB₁ 暴露相关\n\n##### ④ 重金属\n| 金属 | 主要靶癌 | 来源 |\n|------|---------|------|\n| **砷 As** | 皮肤、肺、膀胱（IARC 1）| 饮水（孟加拉、内蒙古）、农药 |\n| **镉 Cd** | 肺、前列腺（IARC 1）| 电池、镀锌、烟草 |\n| **镍 Ni** | 肺、鼻咽（IARC 1）| 镍精炼、不锈钢 |\n| **铬 Cr⁶⁺** | 肺（IARC 1，仅 Cr⁶⁺）| 电镀、皮革鞣制 |\n| **铅 Pb** | 多部位（2A）| 汽油、油漆、电池 |\n\n##### ⑤ 芳香胺类\n- **联苯胺、β-萘胺、4-氨基联苯**：染料工业 → **膀胱癌**（经典职业癌）\n- **代谢**：N-羟化 → N-葡糖醛酸结合 → 尿中水解释放 → 膀胱上皮致癌\n\n##### ⑥ 苯（benzene）\n- **来源**：石油化工、汽油、油漆、橡胶\n- **代谢**：苯酚 / 邻苯二酚 / 对苯二酚 / 反丁烯二醛 → 骨髓毒\n- **靶器官**：**骨髓** → 再生障碍性贫血、**白血病**（AML）\n- IARC 1 类\n\n##### ⑦ 氯乙烯（VCM）\n- **来源**：PVC 生产\n- **代谢**：环氧氯乙烷 → 共价结合 DNA\n- **靶器官**：**肝血管肉瘤**（Liver angiosarcoma，特征性肿瘤）\n\n##### ⑧ 二噁英 TCDD\n- **来源**：垃圾焚烧、氯酚生产副产物（越战橙剂）\n- **机制**：通过 **AhR 受体**致癌（非遗传毒性、有阈值）\n- IARC 1 类\n\n##### ⑨ 石棉（asbestos）\n- **类型**：温石棉（白）、青石棉（蓝）、铁石棉\n- **靶**：肺癌、**间皮瘤**（特征性）\n- **协同**：与吸烟协同致肺癌（参第 4 章联合作用）\n\n#### 五、化学致癌之机制要点\n\n1. **共价结合 DNA**（终致癌物 + DNA 加合物）\n2. **DNA 修复缺陷**（错配未修复 → 突变固定）\n3. **致癌基因激活**（如 ras、myc）\n4. **抑癌基因失活**（如 p53、Rb）\n5. **表观遗传**（甲基化异常 / miRNA 失调）\n6. **促增殖、抗凋亡**（非遗传毒性）\n\n#### 六、高频考点（速记）\n\n1. 化学致癌**三阶段**：**启动 → 促进 → 进展**\n2. **直接致癌物**不需代谢活化；**间接致癌物**需 P450 活化\n3. **苯并[a]芘** → BPDE → 与 DNA 鸟嘌呤共价结合\n4. **黄曲霉毒素 B₁** 主致**肝癌**，与 HBV 协同\n5. **亚硝胺** 来源：腌制食品 + 体内合成；**Vc 抑制**其生成\n6. **苯** → **骨髓** → AML（白血病）\n7. **氯乙烯** → **肝血管肉瘤**（特征性）\n8. **β-萘胺、联苯胺** → **膀胱癌**（职业）\n9. **石棉 + 吸烟 → 肺癌**（协同，第 4 章经典案例）\n10. IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线、烟草\n\n#### 七、典型思考题\n\n**Q1**：写出化学致癌之三阶段及各阶段特点。  \nA：① **启动**：致癌物共价结合 DNA → 不可逆突变；单一暴露即可；需 DNA 复制固定。② **促进**：已转化细胞克隆增殖；可逆；有阈值；促癌剂作用于此。③ **进展**：获侵袭、转移能力；染色体异常累积；不可逆。\n\n**Q2**：苯并[a]芘致癌之代谢活化路径？  \nA：BaP → CYP1A1 氧化 → 7,8-环氧化物 → 环氧水解酶 → 7,8-二氢二醇 → CYP 再氧化 → **BPDE（7,8-二氢二醇-9,10-环氧化物）**。BPDE 共价结合 DNA 鸟嘌呤 N²，致 G→T 颠换。这是间接致癌物代谢活化的经典例。\n\n**Q3**：为何说黄曲霉 B₁ 是\"中国肝癌\"之重要因子？  \nA：① AFB₁ 经 CYP 活化为 8,9-环氧化物，共价结合 p53 第 249 位密码子致 G→T 颠换（特征性突变）；② 在我国南方湿热地区粮食易污染；③ HBV 感染广泛——HBV 与 AFB₁ 协同致肝癌，OR 显著高于单一因素。\n\n**Q4**：为何 IARC 已废 4 类？  \nA：4 类（很可能不致癌）只有一种化学物（己内酰胺）入选过，实践中因数据不足难证\"不致癌\"，分类无操作意义。2019 年起仅保留 1/2A/2B/3 四类。\n\n#### 八、与前章之关联\n\n- **承第 3 章**（生物转化）：间接致癌物之 I 相代谢活化是本章核心机制\n- **承第 4 章**（联合作用）：石棉 + 烟草、AFB₁ + HBV 皆典型协同案例\n- **承第 5 章**（实验方法）：致癌评定依靠 Ames、致癌长期试验、流行病学\n- **承第 6 章**（危险度评价）：致癌物之**低剂量外推**与 SF 计算正用于本章物质\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((第7章<br/>常见化学致癌物的环境毒理学))\n    核心概念\n      化学致癌作用（Chemical Carcinogenesis）\n      正常细胞转化为肿瘤细胞\n      致癌物（Carcinogen）\n      直接致癌物\n      间接致癌物（前致癌物）\n      多环芳烃 / 黄曲霉毒素 / 苯并芘\n      促癌剂\n      化学致癌三阶段\n      启动 → 促进 → 进展\n    致癌物分类\n      1 类\n      确证\n      2A 类\n      很可能\n      2B 类\n      可能\n      3 类\n      不能分类\n      很可能不\n      遗传毒性致癌物\n      非遗传毒性致癌物\n    典型致癌物\n      苯并【a】芘 BaP\n      来源\n      代谢活化\n      7,8-二氢二醇-9,10-环氧化物（BPDE）\n      机制\n      靶器官\n      流行病学\n      亚硝酸盐 + 仲胺\n      甲基化 DNA\n      预防\n      最强已知致癌物之一\n      花生、玉米、谷物\n      肝\n      砷 As\n    化学致癌之机制要点\n      共价结合 DNA\n      DNA 修复缺陷\n      致癌基因激活\n      抑癌基因失活\n      表观遗传\n      促增殖、抗凋亡\n    高频考点\n      化学致癌三阶段：启动 → 促进 → 进展\n      直接致癌物不需代谢活化；间接致癌物需 P450 活化\n      苯并【a】芘 → BPDE → 与 DNA 鸟嘌呤共价结合\n      黄曲霉毒素 B₁ 主致肝癌，与 HBV 协同\n      亚硝胺 来源：腌制食品 + 体内合成；Vc 抑制其生成\n      苯 → 骨髓 → AML（白血病）\n      氯乙烯 → 肝血管肉瘤（特征性）\n      β-萘胺、联苯胺 → 膀胱癌（职业）\n      石棉 + 吸烟 → 肺癌（协同，第 4 章经典案例）\n      IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线…\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n### 本章核心课件原页（点击看大图）\n\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L04_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L04_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L04_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L04_p035.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L04_p070.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L04_p070.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L06_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L06_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L06_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L06_p040.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L07_p017.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L07_p017.jpg\" alt=\"\"><\/a>\n<\/div>\n\n\n#### 例题 7-1（简答）\n**题**：常见化学致癌物可分为哪几类？举例说明\"间接致癌物\"。\n**参考答案**：按作用方式分**直接致癌物**（无需代谢活化即可致癌，如某些烷化剂）、**间接致癌物（前致癌物）**（须经体内代谢活化为终致癌物，如**苯并[a]芘**经 P450 活化、**黄曲霉毒素 B₁**、亚硝胺类）、**促癌物**（本身不致癌但促进肿瘤发展，如 TPA、苯巴比妥）。间接致癌物的典型代表是**苯并[a]芘**：经代谢活化生成二氢二醇环氧化物，与 DNA 共价结合形成加合物而引发突变。\n\n---\n\n> **正言若反**：参数不离机制，机制不离剂量，剂量不离原始 PDF 课件之图表数据。本篇为\"算得出、答得上\"的一层；遇疑，回归「最终复习资料」与逐页 PDF 原文核对实验条件与单位。\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 化学致癌作用（Chemical Carcinogenesis）？\n\n<details><summary>参考答案<\/summary>\n\n化学物诱发正常细胞转化为肿瘤细胞之过程\n\n<\/details>\n\n**Q2（名词解释）** 致癌物（Carcinogen）？\n\n<details><summary>参考答案<\/summary>\n\n能引起或诱发动物或人类肿瘤之化学物\n\n<\/details>\n\n**Q3（名词解释）** 直接致癌物？\n\n<details><summary>参考答案<\/summary>\n\n本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体）\n\n<\/details>\n\n**Q4（名词解释）** 间接致癌物（前致癌物）？\n\n<details><summary>参考答案<\/summary>\n\n本身无活性，需经体内代谢活化后致癌（多环芳烃 / 黄曲霉毒素 / 苯并芘 等大多数为此）\n\n<\/details>\n\n**Q5（名词解释）** 促癌剂？\n\n<details><summary>参考答案<\/summary>\n\n本身不致癌，但能促进已转化细胞增殖（如佛波酯 TPA、糖精）\n\n<\/details>\n\n**Q6（名词解释）** 化学致癌三阶段？\n\n<details><summary>参考答案<\/summary>\n\n启动 → 促进 → 进展（initiation → promotion → progression）\n\n<\/details>\n\n**Q7（考点·闭卷默写）** 请展开论述：化学致癌三阶段：启动 → 促进 → 进展\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：化学致癌三阶段：启动 → 促进 → 进展\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：直接致癌物不需代谢活化；间接致癌物需 P450 活化\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：直接致癌物不需代谢活化；间接致癌物需 P450 活化\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：苯并[a]芘 → BPDE → 与 DNA 鸟嘌呤共价结合\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：苯并[a]芘 → BPDE → 与 DNA 鸟嘌呤共价结合\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：黄曲霉毒素 B₁ 主致肝癌，与 HBV 协同\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：黄曲霉毒素 B₁ 主致肝癌，与 HBV 协同\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：亚硝胺 来源：腌制食品 + 体内合成；Vc 抑制其生成\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：亚硝胺 来源：腌制食品 + 体内合成；Vc 抑制其生成\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：苯 → 骨髓 → AML（白血病）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：苯 → 骨髓 → AML（白血病）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：氯乙烯 → 肝血管肉瘤（特征性）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：氯乙烯 → 肝血管肉瘤（特征性）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：β-萘胺、联苯胺 → 膀胱癌（职业）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：β-萘胺、联苯胺 → 膀胱癌（职业）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：石棉 + 吸烟 → 肺癌（协同，第 4 章经典案例）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：石棉 + 吸烟 → 肺癌（协同，第 4 章经典案例）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线、烟草\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线、烟草\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n**Q1**：写出化学致癌之三阶段及各阶段特点。  \nA：① **启动**：致癌物共价结合 DNA → 不可逆突变；单一暴露即可；需 DNA 复制固定。② **促进**：已转化细胞克隆增殖；可逆；有阈值；促癌剂作用于此。③ **进展**：获侵袭、转移能力；染色体异常累积；不可逆。\n\n**Q2**：苯并[a]芘致癌之代谢活化路径？  \nA：BaP → CYP1A1 氧化 → 7,8-环氧化物 → 环氧水解酶 → 7,8-二氢二醇 → CYP 再氧化 → **BPDE（7,8-二氢二醇-9,10-环氧化物）**。BPDE 共价结合 DNA 鸟嘌呤 N²，致 G→T 颠换。这是间接致癌物代谢活化的经典例。\n\n**Q3**：为何说黄曲霉 B₁ 是\"中国肝癌\"之重要因子？  \nA：① AFB₁ 经 CYP 活化为 8,9-环氧化物，共价结合 p53 第 249 位密码子致 G→T 颠换（特征性突变）；② 在我国南方湿热地区粮食易污染；③ HBV 感染广泛——HBV 与 AFB₁ 协同致肝癌，OR 显著高于单一因素。\n\n**Q4**：为何 IARC 已废 4 类？  \nA：4 类（很可能不致癌）只有一种化学物（己内酰胺）入选过，实践中因数据不足难证\"不致癌\"，分类无操作意义。2019 年起仅保留 1/2A/2B/3 四类。\n\n<\/details>\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：化学物诱发正常细胞转化为肿瘤细胞之过程\n  - <details><summary>答案<\/summary> 化学致癌作用（Chemical Carcinogenesis） <\/details>\n- ____：能引起或诱发动物或人类肿瘤之化学物\n  - <details><summary>答案<\/summary> 致癌物（Carcinogen） <\/details>\n- ____：本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体）\n  - <details><summary>答案<\/summary> 直接致癌物 <\/details>\n- ____：本身无活性，需经体内代谢活化后致癌（多环芳烃 / 黄曲霉毒素 / 苯并芘 等大多数为此）\n  - <details><summary>答案<\/summary> 间接致癌物（前致癌物） <\/details>\n- ____：本身不致癌，但能促进已转化细胞增殖（如佛波酯 TPA、糖精）\n  - <details><summary>答案<\/summary> 促癌剂 <\/details>\n- ____：启动 → 促进 → 进展（initiation → promotion → progression）\n  - <details><summary>答案<\/summary> 化学致癌三阶段 <\/details>\n\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 177 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/environmental-toxicology/L04_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L04_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L04_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L04_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L04_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L04_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L04_p005.jpg\" target=\"_blan =\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L08_p022.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L08_p022.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L08_p023.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L08_p023.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L08_p024.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L08_p024.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L08_p025.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L08_p025.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L08_p026.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L08_p026.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/environmental-toxicology/L08_p027.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/environmental-toxicology/L08_p027.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "exam-期末速查", "group": "考前精华", "title": "期末速查", "md": "# 环境毒理学 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 7/7 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 1 | 绪论 | 环境毒理学（environmental toxicology）：研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。；环境污染物：由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。；一次污染物（原生污染物）：由污染源直接排入环境，其物理和化学性状未发生变化的污染物。 | Paracelsus 剂量定律：\"所有物质都是毒物，没有物质不是毒物，唯一的区别是它们的剂量\"——抛开剂量谈毒性都是耍流氓。这是毒理学最根本的原理。；环境污染分类模型：按污染物性质→化学污染、物理污染、生物污染；按污染物形态→废气、废水、固体废弃物、噪声、辐射污染。；环境毒理学研究方法体系：体内试验（in vivo）+ 体外试验（in vitro）+ 流行病学调查，三个层次互补。 | 环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康 → 毒性作用及机理；环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环境毒理学主要研究对象，简称环境化学物；污染源四类：工业、农业、交通运输、生活 |\n| 2 | 污染物在环境中的迁移和转化 | 污染物迁移：污染物在环境中发生的空间位置相对改变的过程；污染物转化：污染物在环境中通过物理、化学或生物学作用改变形态或转变为另一种物质的过程；机械性迁移：通过气（扩散+气流搬运）、水、重力等物理作用使污染物空间位移 | BCF（生物富集系数） = 生物体内浓度(mg/kg) / 环境中浓度(mg/kg)；BAF（生物积累系数） = 发育后阶段体内浓度 / 发育前阶段体内浓度；BMF（生物放大系数） = 较高营养级浓度 / 较低营养级浓度 | 迁移三类型：机械性（气/水/重力）、物理-化学性（6种作用）、生物性（浓缩/积累/放大）；气的机械性迁移三扩散：风力、气流、湍流；物理-化学性迁移六作用：风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原 |\n| 3 | 污染物的生物转运与生物转化 | 生物转运：环境污染物经各种途径和方式同生物体接触而被吸收、分布和排泄等过程的总称（反复通过生物膜）；生物转化/代谢转化：化学物在组织细胞中发生的结构和性质的变化过程；被动扩散（简单扩散）：物质从高浓度→低浓度透过生物膜，纯物理过程，不耗能 | 一级动力学消除：dD/dt = -KD，D = D₀·e^(-kt)，lgD = lgD₀ - kt/2.303；半衰期：T₁/₂ = 0.693/K；表观分布容积：Vd = D/c（Vd大→分布广/组织吸收多/血浆浓度低；Vd小→分布少/血浆浓度高） | 生物转运四方式：被动扩散（不耗能，顺浓度）、滤过（水溶性）、特殊转运（主动+易化）、膜动转运（胞吞/胞吐）；被动扩散影响因素：浓度梯度、脂/水分配系数、电离状态与pH、蛋白结合亲和力；主动转运五特点：逆浓度梯度、耗能、需载体、有选择性、有容量限制+竞争性抑制 |\n| 4 | 环境污染物的毒作用及其影响因素 | 急性毒性：机体一次接触或24h内多次接触某一化学物所引起的毒性效应（包括死亡）；LD₅₀/LC₅₀：半数致死量/半数致死浓度，使半数试验动物死亡的毒物剂量/浓度，数值越小毒性越强；亚慢性毒性：机体在相当于1/20左右生命期间，少量、反复接触有害因素引起的损害作用 | LD₅₀：半数致死量（mg/kg），数值越小毒性越强；蓄积系数：K = ∑LD₅₀(n) / LD₅₀(1)；K<1 高度蓄积  /  1~3 明显蓄积  /  3~5 中度蓄积  /  >5 轻度蓄积 | 一般毒性vs特殊毒性：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育；急性毒性试验：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半；亚慢性毒性：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组 |\n| 5 | 环境毒理学常用实验方法 | 动物染毒途径：经口（灌胃）、经皮肤、经呼吸道吸入；实验动物采血法（小鼠/大鼠尾静脉、豚鼠耳缘剪口、家兔耳静脉）；LD₅₀ 测定与急性毒性试验设计 | LD₅₀ 测定法：概率单位法 / 改良寇氏法（Karber）/ 霍恩法（Horn）/ 上下法；灌胃参考量：小鼠 0.1 mL/10 g 体重（最大 ≤ 0.5 mL/10 g） | LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法；急性毒性观察期 = 14 d；毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微 |\n| 6 | 环境化学物的安全性和健康危险度评价 | 安全性评价（Safety Evaluation）：依据毒理学试验结果，结合人群暴露资料，评定化学物在一定接触水平下对人体健康是否安全之过程；危险度评价（Risk Assessment）：定量估测某接触水平下某化学物致害人群健康之概率与程度之过程；危险度（Risk）：在特定条件下接触某物，发生有害效应之概率（单位时间、人群、效应） | UF：不确定系数（10×10×10×10 ≤ 10000，常见 100~1000）；MF：修正因子（1~10）；危险商 HQ = ADD / RfD：HQ ≤ 1 安全；> 1 风险升 | 安全性评价四阶段法：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌；危险度评价 NAS 四步法：危害识别 → 剂量反应 → 暴露评价 → 危险表征；RfD = NOAEL / UF（必背） |\n| 7 | 常见化学致癌物的环境毒理学 | 化学致癌作用（Chemical Carcinogenesis）：化学物诱发正常细胞转化为肿瘤细胞之过程；致癌物（Carcinogen）：能引起或诱发动物或人类肿瘤之化学物；直接致癌物：本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体） | —（本章以致癌机制与分类为主；致癌风险 R = SF × ADD 见第六章危险度评价） | 化学致癌三阶段：启动 → 促进 → 进展；直接致癌物不需代谢活化；间接致癌物需 P450 活化；苯并[a]芘 → BPDE → 与 DNA 鸟嘌呤共价结合 |\n\n\n## 名词速对（≤30）\n\n| 术语 | 释义 | 章 |\n| ---- | ---- | ---: |\n| 环境毒理学（environmental toxicology） | 研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。 | 1 |\n| 环境污染物 | 由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。 | 1 |\n| 一次污染物（原生污染物） | 由污染源直接排入环境，其物理和化学性状未发生变化的污染物。 | 1 |\n| 污染物迁移 | 污染物在环境中发生的空间位置相对改变的过程 | 2 |\n| 污染物转化 | 污染物在环境中通过物理、化学或生物学作用改变形态或转变为另一种物质的过程 | 2 |\n| 机械性迁移 | 通过气（扩散+气流搬运）、水、重力等物理作用使污染物空间位移 | 2 |\n| 生物转运 | 环境污染物经各种途径和方式同生物体接触而被吸收、分布和排泄等过程的总称（反复通过生物膜） | 3 |\n| 生物转化/代谢转化 | 化学物在组织细胞中发生的结构和性质的变化过程 | 3 |\n| 被动扩散（简单扩散） | 物质从高浓度→低浓度透过生物膜，纯物理过程，不耗能 | 3 |\n| 急性毒性 | 机体一次接触或24h内多次接触某一化学物所引起的毒性效应（包括死亡） | 4 |\n| LD₅₀/LC₅₀ | 半数致死量/半数致死浓度，使半数试验动物死亡的毒物剂量/浓度，数值越小毒性越强 | 4 |\n| 亚慢性毒性 | 机体在相当于1/20左右生命期间，少量、反复接触有害因素引起的损害作用 | 4 |\n| 安全性评价（Safety Evaluation） | 依据毒理学试验结果，结合人群暴露资料，评定化学物在一定接触水平下对人体健康是否安全之过程 | 6 |\n| 危险度评价（Risk Assessment） | 定量估测某接触水平下某化学物致害人群健康之概率与程度之过程 | 6 |\n| 危险度（Risk） | 在特定条件下接触某物，发生有害效应之概率（单位时间、人群、效应） | 6 |\n| 化学致癌作用（Chemical Carcinogenesis） | 化学物诱发正常细胞转化为肿瘤细胞之过程 | 7 |\n| 致癌物（Carcinogen） | 能引起或诱发动物或人类肿瘤之化学物 | 7 |\n| 直接致癌物 | 本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体） | 7 |"}, {"id": "web-02", "group": "考前精华", "title": "名词解释与简答速查", "md": "# 环境毒理学 · 名词解释与简答速查\n\n> 考前速背层：核心名词（含单位/数值要点）+ 高频简答得分要点。配合「章节精讲」与「期末速查」使用。\n\n---\n\n## 一 · 核心名词解释（按章）\n\n### 第1章 · 基本概念\n\n- **环境毒理学**：研究环境污染物（尤其化学污染物）对人群或人体健康的毒害作用及其机理的科学。\n- **生态毒理学**：研究环境污染物对非人类生物（动物、植物、微生物）及其生态系统危害及规律的科学（与环境毒理学并列、独立）。\n- **毒物**：在一定条件下，较小剂量即可引起机体功能性或器质性损害的化学物质。\n- **毒性**：化学物引起机体损害的能力；与剂量、接触途径与时间有关。\n- **剂量–效应关系**：剂量与个体（器官）某一**量化效应强度**的关系（计量资料）。\n- **剂量–反应关系**：剂量与群体中出现某一**质反应的个体比例**（如死亡率）的关系，曲线常呈 S 形。\n- **LD₅₀（半数致死剂量）**：使一群受试动物半数（50%）死亡的剂量，单位 mg/kg；值越小急性毒性越强。\n- **LC₅₀（半数致死浓度）**：经呼吸道染毒使受试动物半数死亡的浓度。\n- **阈剂量（LOAEL，最小有作用剂量）**：能引起机体可观察到的有害效应的最低剂量。\n- **最大无作用剂量（NOAEL）**：在规定条件下未观察到任何有害效应的最高剂量；制定安全限值的基础。\n- **每日允许摄入量（ADI）**：人终生每日摄入而不引起可觉察健康危害的量，ADI = NOAEL / 安全系数。\n- **最高容许浓度（MAC）**：环境介质中污染物不引起危害的限量浓度。\n\n### 第2章 · 生物转运与转化\n\n- **生物转运**：化学物在体内吸收、分布、排泄等通过生物膜的过程（不改变化学结构）。\n- **简单扩散**：顺浓度梯度、不耗能、不需载体的被动转运（脂溶性、非解离态物质主要方式）。\n- **主动转运**：逆浓度梯度、耗能、需载体、有饱和与竞争性抑制的转运。\n- **生物转化**：外源化学物在体内经酶催化发生结构改变的代谢过程（I 相 + II 相）。\n- **I 相反应**：氧化、还原、水解，引入/暴露极性基团（主力为肝微粒体细胞色素 P450）。\n- **II 相反应**：结合反应（葡萄糖醛酸、硫酸、谷胱甘肽等），增大水溶性、利于排泄。\n- **代谢活化（生物活化）**：化学物经生物转化后毒性反而增强（生成活性中间体）。\n- **生物富集**：生物直接从环境介质摄取并蓄积污染物，使体内浓度高于环境。\n- **生物放大**：污染物沿食物链逐营养级传递，高营养级体内浓度显著升高。\n- **生物富集系数 BCF**：生物体内浓度 / 环境介质浓度。\n\n### 第3章 · 毒作用及机制\n\n- **靶器官**：化学物直接发挥毒作用的器官。\n- **生物标志物**：可测量的、反映机体与外源化学物相互作用的指标（暴露/效应/易感性标志物）。\n- **三致作用**：致突变、致癌、致畸。\n- **致突变作用**：引起遗传物质 DNA 结构或数量改变的作用。\n- **致癌作用**：诱发细胞恶性转化、形成肿瘤的作用。\n- **致畸作用**：作用于胚胎发育、导致后代畸形的作用。\n- **联合作用**：两种及以上化学物同时/先后作用于机体的综合效应（相加、协同、拮抗、独立）。\n\n### 第5–6章 · 试验方法与危险度\n\n- **蓄积作用**：反复多次染毒，化学物或其效应在体内逐渐累积。\n- **蓄积系数 K**：K = ∑LD₅₀(n) / LD₅₀(1)（∑LD₅₀(n) 为多次染毒使半数动物出现效应的总剂量）；K<1 高度蓄积，1~3 明显蓄积，3~5 中度蓄积，>5 轻度蓄积。\n- **Ames 试验**：用鼠伤寒沙门氏菌组氨酸缺陷型菌株检测回复突变，筛查致突变性（常加 S9 模拟代谢活化）。\n- **健康危险度评价**：定量评估暴露于环境有害因素导致健康损害概率的过程（四步法）。\n- **参考剂量 RfD**：非致癌物终生暴露不致明显有害效应的日均剂量。\n- **危害商 HQ**：HQ = ADD / RfD；>1 提示存在非致癌风险。\n\n---\n\n## 二 · 高频简答 · 得分要点\n\n### Q1 影响简单扩散的主要因素\n① 膜两侧浓度梯度（差越大越快）；② 物质脂/水分配系数（脂溶性越强越易）；③ 物质解离度（非解离态易透过，受 pH 与 pKa 影响）；④ 分子量与极性（小分子、非极性易）；⑤ 膜面积与厚度。\n\n### Q2 联合毒性作用类型及评定\n**类型**：相加作用（≈各自之和）、协同作用（>之和）、拮抗作用（<之和）、独立作用。\n**评定**：以相加为基准，用联合作用系数 K（实测/预期）判断：K≈1 相加，K>1 协同，K<1 拮抗；或用等效线图（isobologram）法。\n\n### Q3 化学致癌的多阶段学说\n① **引发阶段**：致癌物使细胞 DNA 发生不可逆突变，形成引发细胞（快、不可逆）；② **促长阶段**：促癌物促进引发细胞克隆扩增（可逆、有阈、需持续作用）；③ **进展阶段**：良性向恶性转化，出现侵袭与转移能力（基因组不稳定）。\n\n### Q4 致突变作用的机理\n① 碱基置换（转换/颠换）；② 移码突变（碱基插入/缺失）；③ 大段损伤（缺失、重复、倒位、易位）；④ 染色体数目改变（整倍体/非整倍体）；⑤ DNA 加合物与交联、氧化损伤。\n\n### Q5 健康危险度评价四步\n① **危害鉴定**（定性：是否有害、何种效应）；② **剂量–反应评定**（求 RfD 或致癌斜率因子 SF）；③ **暴露评价**（求日均暴露量 ADD、暴露人群与途径）；④ **危险度表征**（致癌风险 R=SF×ADD；非致癌 HQ=ADD/RfD，对照可接受水平 10⁻⁶~10⁻⁴）。\n\n### Q6 亚慢性/慢性毒性试验观察指标\n① 一般指标（体重、food intake、外观行为、死亡）；② 血液学与血生化；③ 脏器系数与病理（组织学）；④ 特异性/功能指标（酶活、激素）；⑤ 求 NOAEL / LOAEL，为制定安全限值提供依据。\n\n### Q7 试验动物选择原则\n① 对受试物敏感、反应与人接近；② 易获得、经济、易饲养与操作；③ 遗传背景清楚、个体差异小（品系纯）；④ 通常用两种属（一种啮齿类如大鼠/小鼠，一种非啮齿类）。\n\n---\n\n## 三 · 易错辨析\n\n| 易混对 | 关键区别 |\n|---|---|\n| 剂量–效应 vs 剂量–反应 | 前者纵轴效应强度（个体/计量）；后者纵轴反应比例（群体/计数，S 形） |\n| LD₅₀ vs 阈剂量 | LD₅₀ 致死性、半数死亡；阈剂量是最低可观察有害效应剂量 |\n| 生物转运 vs 生物转化 | 转运不改结构（过膜）；转化改变结构（代谢） |\n| 生物富集 vs 生物放大 | 富集=直接从介质摄取；放大=沿食物链逐级升高 |\n| 代谢解毒 vs 代谢活化 | 多数转化降低毒性（解毒）；少数生成活性中间体（活化，毒性增强） |\n| 协同 vs 相加 | 协同>各自之和；相加≈之和 |\n\n---\n\n> 速查为术，机理为道。背得准、辨得清、算得出，期末与考研皆可从容。"}, {"id": "web-01", "group": "考前精华", "title": "期末真题题型与高频考点", "md": "# 环境毒理学 · 期末真题题型与高频考点\n\n> 汇编自公开教材（孟紫强《环境毒理学》第三版 · 高等教育出版社）、中国大学 MOOC 单元测验、人人文库/百度文库流传的高校期末与考研复习题，以及同类院校试卷规律。\n> **说明**：本篇为**题型规律 + 高频考点梳理**，非某年某校真题原卷；标注 `[规律推断]` 者为据出题习惯推断，复习以本校讲义与考纲为准。\n\n---\n\n## 一 · 课程与教材基本信息\n\n| 项 | 内容 |\n|---|---|\n| 课程别名 | 环境污染与健康 |\n| 主流教材 | 孟紫强《环境毒理学》（第三版，高等教育出版社，\"十五\"国家级规划教材；一、二版名《环境毒理学基础》） |\n| 学科定位 | 研究环境污染物（尤其化学污染物）对**人群/人体健康**的毒害作用及其机理；与\"生态毒理学\"（研究对非人类生物及生态系统的危害）为两个独立学科（孟紫强 2006 年界定） |\n| 主线 | 以环境污染物的**毒性及其对健康的危害**为主线：吸收→分布→代谢转化→排泄→毒作用→危险度评价 |\n\n---\n\n## 二 · 期末考试题型分布（规律）\n\n| 题型 | 分值区间 | 题量 | 备注 |\n|---|---|---|---|\n| 名词解释 | 15–25 分 | 5–8 题 | 概念精准、单位/数值要点 |\n| 填空 / 选择 | 10–20 分 | 若干 | 基础概念辨析 |\n| 简答题 | 30–40 分 | 4–6 题 | 占比最大，分点作答 |\n| 论述 / 综合 | 15–25 分 | 1–2 题 | 机制 + 联系实际 |\n| 计算题 | 0–15 分 | 0–2 题 | LD₅₀ 分级、蓄积系数、ADI、危险度 |\n\n> 偏理科/工科培养方案常含**计算题**（剂量参数、危险度）；偏医学/卫生培养方案侧重**机理论述**。\n\n---\n\n## 三 · 高频考点梯队\n\n### 第一梯队（几乎必考）\n\n1. 环境毒理学的概念、研究对象、任务与内容；与生态毒理学的关系\n2. 剂量–效应关系 vs 剂量–反应关系；S 形曲线\n3. 毒性参数：LD₅₀/LC₅₀、阈剂量（LOAEL）、最大无作用剂量（NOAEL）、ADI、MAC\n4. 生物转运（简单扩散、主动转运、易化扩散、膜动转运）与影响简单扩散的因素\n5. 生物转化 I 相（氧化/还原/水解）与 II 相（结合）反应；**代谢活化**\n6. 联合毒性作用类型（相加、协同、拮抗、独立）及评定\n7. 三致作用（致突变、致癌、致畸）及其相互关系\n8. 化学致癌多阶段学说（引发→促长→进展）\n9. 健康危险度评价四步法（危害鉴定→剂量反应→暴露评价→危险度表征）\n\n### 第二梯队（高频）\n\n10. 影响毒作用的因素（化学物、机体、接触条件、环境、联合作用）\n11. 急性 / 亚慢性 / 慢性毒性试验的目的与观察指标\n12. 蓄积作用与蓄积系数 K 的分级\n13. 致突变试验组合（Ames 试验、微核试验、染色体畸变、SCE）及 S9 活化意义\n14. 生物富集、生物积累、生物放大（BCF）\n15. 自由基与活性氧（ROS）的氧化损伤\n16. 安全性评价程序（四阶段）\n\n### 第三梯队（中频）\n\n17. 试验动物选择原则\n18. 生物膜结构与功能\n19. 内分泌干扰物（环境激素）概念与典型代表\n20. 典型污染物毒性：重金属（Pb/Hg/Cd/As）、苯并[a]芘、二噁英、有机磷农药\n\n---\n\n## 四 · 典型简答题清单（高校期末/考研流传整理）\n\n> 下列题目高频出现于各校复习资料；标 ★ 者多被标\"必考\"。建议逐题用各章「章节精讲」作答并自测。\n\n1. 试述环境毒理学的研究对象、任务及内容。\n2. 简述环境毒理学的主要研究方法（体内/体外/分子）。\n3. 简述生物膜的结构和功能。★\n4. 环境化学物通过生物膜的方式；详述影响简单扩散的主要因素。★\n5. 阐述主动转运及其特点。\n6. 试述人体对环境化学物吸收的途径及其影响因素。\n7. 按引起机体死亡率不同划分的常用致死剂量概念（LD₀/LD₅₀/LD₁₀₀/LD₈₄等）。\n8. 试述毒性作用及联合毒性作用的类型。\n9. 简述联合毒性作用的类型、含义及评定方法。★\n10. 列举外源化学物对组织细胞毒性作用的机理。\n11. 简述环境化学物对机体毒性作用的影响因素。★\n12. 常用试验动物有哪些？选择试验动物的原则是什么？\n13. 简述经典急性致死性毒性试验的设计原则和基本要求。\n14. 简述急性、亚慢性、慢性毒性试验的目的。\n15. 亚慢性、慢性毒性试验的观察指标主要有哪些？★\n16. 简述致突变作用的不良后果。\n17. 简述致突变试验组合应用的原因和原则。\n18. 试阐述化学致癌的多阶段学说的三个阶段。★\n19. 列举常用的致突变试验。\n20. 简述致突变的作用机理。★\n21. 简述（健康）安全性评价的程序。\n22. 简述健康危险度评价的步骤与各步要点。★\n\n---\n\n## 五 · 论述/综合题方向（规律推断）\n\n- `[规律推断]` 结合实例论述某类污染物（如重金属/持久性有机污染物 POPs）在体内的迁移转化与毒作用机制。\n- `[规律推断]` 论述化学致癌的过程与机制，并说明致突变、致癌、致畸的内在联系。\n- `[规律推断]` 以某环境健康事件（如水俣病、痛痛病、慢性砷中毒）为例，分析污染物—暴露—健康损害链，并提出防控对策。\n- `[规律推断]` 论述健康危险度评价的方法体系及其在环境管理/标准制定中的作用。\n\n---\n\n## 六 · 备考策略\n\n1. **概念先行**：名词解释占分稳定，先把毒性参数（LD₅₀/NOAEL/ADI/MAC/RfD）与三致、联合作用等核心概念背准（含单位与判别阈值）。\n2. **机理串线**：以\"吸收→分布→生物转化→排泄→毒作用→危险度\"为主轴，把各章串成一条因果链，便于论述题展开。\n3. **会算会判**：掌握 LD₅₀ 毒性分级、蓄积系数 K 分级、ADI=NOAEL/SF、致癌风险 R=SF×ADD、危害商 HQ=ADD/RfD 的计算与判别（见各章「例题详解」）。\n4. **典型物质卡片化**：苯并[a]芘、黄曲霉毒素 B₁、二噁英、Pb/Hg/Cd/As、有机磷——各做一张\"毒性—机制—靶器官—防控\"速记卡。\n5. **真题导向**：以第四节简答清单为题库自测（提取练习 + 间隔重复），优先攻克 ★ 题。\n\n---\n\n> 取之于公开资料，归之于本校考纲。**正言若反**：题型会变，机理不变——把机理学透，任何题型皆可应。"}, {"id": "exam-期末模拟卷", "group": "考前精华", "title": "期末模拟卷", "md": "# 环境毒理学 · 期末模拟卷\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 自《最终复习资料》自举而生，仅作复习自测。\n> 出题时刻：2026-06-12 16:04:17\n\n---\n\n## 一、单项选择题（共 10 题）\n\n**1.** “所有物质都是毒物，剂量决定其是否有毒”这一毒理学基本思想由谁提出\n  - A. Paracelsus（帕拉塞尔苏斯）\n  - B. Orfila\n  - C. 达尔文\n  - D. 巴斯德\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：Paracelsus 提出剂量决定毒性，是毒理学奠基思想。\n\n<\/details>\n\n**2.** 环境毒理学的主要研究对象是\n  - A. 天然存在的所有物质\n  - B. 环境污染物对人体及生物的损害作用及其机理\n  - C. 仅药物\n  - D. 仅放射性物质\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：环境毒理学研究环境污染物对人群健康及生态的毒性作用与机理。\n\n<\/details>\n\n**3.** 评价急性毒性常用的指标是\n  - A. LD₅₀（半数致死剂量）\n  - B. pH\n  - C. BOD\n  - D. 溶解氧\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：LD₅₀ 为引起半数受试动物死亡的剂量，是急性毒性的核心指标。\n\n<\/details>\n\n**4.** 检测化学物致突变性的经典短期试验是\n  - A. Ames 试验（鼠伤寒沙门氏菌回复突变试验）\n  - B. 急性经口试验\n  - C. 皮肤刺激试验\n  - D. 溶解度试验\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：Ames 试验利用组氨酸缺陷型菌株回复突变检测致突变物。\n\n<\/details>\n\n**5.** Ames 试验中加入 S9 混合液的目的是\n  - A. 增加菌株数量\n  - B. 模拟哺乳动物体内代谢活化，检出需代谢活化的致突变物\n  - C. 调节 pH\n  - D. 灭菌\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：S9 含肝微粒体酶（P450），可将间接致突变物活化。\n\n<\/details>\n\n**6.** 污染物经食物链逐级累积、浓度沿营养级升高的现象称为\n  - A. 生物富集\n  - B. 生物放大\n  - C. 生物降解\n  - D. 生物转化\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：生物放大指污染物沿食物链营养级升高而浓度增大。\n\n<\/details>\n\n**7.** 外源化学物在体内经吸收、分布、代谢、排泄的过程研究属于\n  - A. 毒物动力学（toxicokinetics）\n  - B. 毒物效应动力学\n  - C. 流行病学\n  - D. 统计学\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：ADME 过程为毒物动力学研究内容。\n\n<\/details>\n\n**8.** 下列关于剂量—反应关系的描述正确的是\n  - A. 反应随剂量增加而无规律变化\n  - B. 一般随剂量增加反应程度或发生率升高，可呈 S 形曲线\n  - C. 与剂量无关\n  - D. 剂量越大反应越小\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：剂量—反应关系是毒理学定量评价的基础，常呈 S 形。\n\n<\/details>\n\n**9.** 健康危险度评价的四个步骤通常为\n  - A. 危害鉴定、剂量—反应评定、暴露评价、危险度表征\n  - B. 采样、化验、上报、归档\n  - C. 立项、施工、验收、运行\n  - D. 调查、问卷、统计、发表\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：危险度评价四步法是化学物风险管理的核心框架。\n\n<\/details>\n\n**10.** “反应停（沙利度胺）事件”导致的“海豹儿”属于何种毒性\n  - A. 致畸（teratogenicity）\n  - B. 急性中毒\n  - C. 致敏\n  - D. 腐蚀\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：反应停为典型致畸物，造成胎儿肢体畸形。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 毒理学的核心思想可概括为：剂量决定 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**毒性（一切物质皆毒，唯剂量定其毒否）**\n\n<\/details>\n\n**2.** 急性毒性试验中，引起半数受试动物死亡的剂量记为 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**LD₅₀（半数致死剂量）**\n\n<\/details>\n\n**3.** 致突变试验中的“三致”指致突变、致癌和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**致畸**\n\n<\/details>\n\n**4.** 外源化学物在体内的处置包括吸收、分布、代谢（生物转化）和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**排泄**\n\n<\/details>\n\n**5.** 污染物在单一生物体内浓度高于环境介质的现象称为生物 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**富集（生物浓缩）**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 半数致死剂量（LD₅₀）\n\n<details><summary>📝 参考答案<\/summary>\n\n答：在规定条件下引起一组受试动物半数（50%）死亡所需的剂量，是衡量化学物急性毒性大小的常用定量指标，数值越小毒性越大。\n\n<\/details>\n\n**2.** 生物放大\n\n<details><summary>📝 参考答案<\/summary>\n\n答：某些难降解污染物沿食物链由低营养级向高营养级传递时，其在生物体内的浓度逐级升高的现象，如汞、有机氯农药在食物链顶端富集。\n\n<\/details>\n\n**3.** 致畸作用\n\n<details><summary>📝 参考答案<\/summary>\n\n答：外源化学物在胚胎发育的致畸敏感期作用于母体，干扰胚胎正常发育，导致出生缺陷（形态结构畸形）的毒性作用，如反应停致海豹肢畸形。\n\n<\/details>\n\n**4.** 健康危险度评价\n\n<details><summary>📝 参考答案<\/summary>\n\n答：运用危害鉴定、剂量—反应评定、暴露评价与危险度表征四步，对人群因接触环境有害因素而产生健康损害的概率与程度进行定量估计的过程。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述环境毒理学的主要任务。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：①研究环境污染物对机体的损害作用及其机理；②探索早期、敏感的损害观察指标；③定量评价污染物的健康影响，为制定卫生标准与环境基准提供依据；④为环境污染防治与风险管理服务。\n\n<\/details>\n\n**2.** 简述 Ames 试验的原理及加入 S9 的意义。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：原理：利用组氨酸缺陷型（his⁻）鼠伤寒沙门氏菌，在无组氨酸培养基上不能生长，致突变物可诱发其回复突变（his⁺）而恢复生长，据回变菌落数判断致突变性。加入 S9 肝微粒体酶系可模拟哺乳动物体内代谢活化，检出需经代谢方显活性的间接致突变物。\n\n<\/details>\n\n**3.** 简述剂量—反应关系及其在毒性评价中的意义。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：剂量—反应关系指化学物剂量与机体反应程度或发生率之间的规律性联系，常呈 S 形曲线。它是判断因果、确定阈值（如 NOAEL/LOAEL）、推导参考剂量与制定卫生标准的定量基础。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试述外源化学物在体内的毒物动力学过程（ADME），并说明各环节如何影响其毒性表现。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①吸收：经消化道、呼吸道、皮肤进入血液，吸收速率与途径影响达到靶部位的速度与剂量；②分布：随血液到各组织器官，受血流、亲和力、屏障（血脑/胎盘屏障）影响，决定靶器官蓄积；③代谢（生物转化）：经肝 P450 等酶系Ⅰ相、Ⅱ相反应，多数被解毒，部分被活化为毒性更强的中间产物（代谢活化）；④排泄：经肾、胆汁、呼吸等排出，排泄慢者易蓄积。综合而言，ADME 决定靶部位的有效剂量与作用时间，进而决定毒性的强弱、靶器官与可逆性；代谢活化与排泄能力是个体差异与种属差异的重要原因。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "pages", "group": "原始课件", "title": "全部课件原页 · 逐讲", "md": "# 原始课件 · 页图（真实 PDF 页面）\n\n> 下列为雨课堂课件原始页面渲染；大讲已均匀采样关键页。点击讲次标题展开，单击图片可看大图。\n\n<details class=\"pdf-lesson\" open>\n<summary>001-农药的环境毒理学-农药的环境毒理学 · 56 页<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"
