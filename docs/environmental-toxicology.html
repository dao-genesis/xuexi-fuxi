境毒理学常用实验方法.md](./_第05章_环境毒理学常用实验方法.md) |\n| 6 | 环境化学物的安全性和健康危险度评价 | 52 | 0 | ✓ | ✓ | [_第06章_环境化学物的安全性和健康危险度评价.md](./_第06章_环境化学物的安全性和健康危险度评价.md) |\n| 7 | 常见化学致癌物的环境毒理学 | 52 | 0 | ✓ | ✓ | [_第07章_常见化学致癌物的环境毒理学.md](./_第07章_常见化学致癌物的环境毒理学.md) |\n\n## 二 · 全章综合汇编\n\n### 第 1 章 · 绪论\n\n> 素材：[_第01章_绪论.md](./_第01章_绪论.md) · 主版 40 页\n\n#### 一、核心概念（名词解释）\n\n- [x] **环境毒理学（environmental toxicology）**：研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。\n- [x] **环境污染物**：由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。\n- [x] **一次污染物（原生污染物）**：由污染源直接排入环境，其物理和化学性状未发生变化的污染物。\n- [x] **二次污染物**：一次污染物之间或与正常大气组分发生化学反应（含光化学反应）而产生的新污染物，常比一次污染物危害更严重。\n- [x] **优先污染物（Priority Pollutant）**：在众多污染物中筛选出的潜在危险大的作为优先研究和控制对象的污染物，亦称优先控制污染物。针对有毒有机化学污染物、生物难降解性物质、具有生物积累性、三致性（致畸、致癌、致突变）的污染物。\n- [x] **外源化学物（xenobiotic）**：不是人体组成成分，也非人体所需营养物质，但可通过一定途径与人体接触并从环境中进入人体，产生一定生物学作用的物质。\n- [x] **新型污染物**：在环境中出现时间相对较短，或过去未被广泛关注但逐渐被认识到对生态环境和人体健康具有潜在危害的污染物。特点：持久性、生物累积性、潜在危害大、来源广泛。包括持久性有机污染物、内分泌干扰物、抗生素、微型塑料等。\n- [x] **环境毒理效应/环境健康毒理效应**：环境污染物对人类健康的效应，属于\"健康毒理效应\"的范畴。\n\n#### 二、关键公式 / 模型\n\n- **Paracelsus 剂量定律**：\"所有物质都是毒物，没有物质不是毒物，唯一的区别是它们的剂量\"——抛开剂量谈毒性都是耍流氓。这是毒理学最根本的原理。\n- **环境污染分类模型**：按污染物性质→化学污染、物理污染、生物污染；按污染物形态→废气、废水、固体废弃物、噪声、辐射污染。\n- **环境毒理学研究方法体系**：体内试验（in vivo）+ 体外试验（in vitro）+ 流行病学调查，三个层次互补。\n\n#### 三、重要案例 / 实验 / 例题\n\n- **八大公害事件**（必考）：\n  1. 1930 马斯河谷事件（SO₂/氟化物/粉尘，死亡60人）\n  2. 1948 多诺拉城事件（SO₂/金属粉尘，死亡17人）\n  3. 1956 伦敦烟雾事件（SO₂/烟尘，4000余人死亡）\n  4. 1943 洛杉矶光化学烟雾事件（光化学烟尘，半数人患红眼病）\n  5. 1955 富山县痛痛病事件（镉，患病258人死128人）\n  6. 1953 水俣病/新泻事件（甲基汞，患病2000余人死352人）\n  7. 1968 米糠油事件（多氯联苯，中毒1684人死30余人）\n  8. 1960 四日市哮喘事件（SO₂/烟尘/石油化工废气，患病800余人死36人）\n- **毒理学发展史关键人物**：Paracelsus（提出毒物是化学物+剂量定律）、Orifila（现代毒理学奠基人）、Bernard（开创动物受控实验）。\n- **中国水中优先控制污染物黑名单**：卤代烃、苯系物、氯代苯类、多氯联苯类、酚类、硝基苯类、苯胺类、多环芳烃、酞酸酯类、农药、丙烯腈、亚硝胺类、氰化物、重金属及其化合物。\n\n#### 四、高频考点（速记）\n\n1. 环境毒理学定义三要素：**环境污染物**（特别是化学污染物）→ **人类健康** → **毒性作用及机理**\n2. 环境化学污染物是**种类最多、污染最严重、分布最广、危害最严重**的，是环境毒理学**主要研究对象**，简称环境化学物\n3. 污染源四类：**工业、农业、交通运输、生活**\n4. 环境污染四大特点：**影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难**\n5. 环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n6. 研究方法：**体内试验**（整体动物实验：急性/亚慢性/慢性毒性）+ **体外试验**（器官/组织/细胞/亚细胞/分子水平）+ **流行病学调查**\n7. 环境毒理学应用三领域：**环境监测**（现场生物监测+环境样品生物测试）、**环境风险评价**（建设项目+化学物品）、**环境健康危险度评价**\n8. 发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n\n#### 五、思考题 / 自测\n\n- [x] 题：环境毒理学的研究对象是什么？ 答：B.环境污染物（包括物理性、化学性、生物性及新型污染物，以环境化学物为主）\n- [x] 题：环境污染的特点？ 答：ABCD全选——影响范围大、作用时间长、浓度低/情况复杂、污染容易治理难\n- [x] 题：一次污染物与二次污染物的区别？ 答：一次污染物直接排放、性状未变；二次污染物是一次污染物经化学反应（含光化学反应）产生的新污染物，危害通常更严重\n- [x] 题：为什么环境化学污染物是环境毒理学的主要研究对象？ 答：种类最多、污染最严重、分布最广、对人类健康危害最严重\n\n#### 六、与前后章之关联\n\n- 承前章：本章为绪论，奠定基本概念框架\n- 启后章：第2章\"污染物在环境中的迁移和转化\"深入讨论污染物在环境中的行为；第3-4章讨论毒作用及影响因素；第5章讨论实验方法；第6-7章讨论安全评价与致癌物\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论\n## 核心概念\n- 环境毒理学（environmental toxicology）\n- 环境污染物\n- 一次污染物（原生污染物）\n- 二次污染物\n- 优先污染物（Priority Pollutant）\n- 外源化学物（xenobiotic）\n- 新型污染物\n- 环境毒理效应/环境健康毒理效应\n## 关键公式 / 模型\n- Paracelsus 剂量定律\n- 环境污染分类模型\n- 环境毒理学研究方法体系\n## 高频考点\n- 环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康 → 毒性作用及机理\n- 环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环境毒理学主要研究对象，简称环境化学物\n- 污染源四类：工业、农业、交通运输、生活\n- 环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难\n- 环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n- 研究方法：体内试验（整体动物实验：急性/亚慢性/慢性毒性）+ 体外试验（器官/组织/细胞/亚细胞/分子水平）+ 流行病学\n- 环境毒理学应用三领域：环境监测（现场生物监测+环境样品生物测试）、环境风险评价（建设项目+化学物品）、环境健康危险度评价\n- 发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论))\n    核心概念\n      环境毒理学（environmental toxicology）\n      环境污染物\n      一次污染物（原生污染物）\n      二次污染物\n      优先污染物（Priority Pollutant）\n      外源化学物（xenobiotic）\n      新型污染物\n      环境毒理效应/环境健康毒理效应\n    关键公式 / 模型\n      Paracelsus 剂量定律\n      环境污染分类模型\n      环境毒理学研究方法体系\n    高频考点\n      环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康…\n      环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环…\n      污染源四类：工业、农业、交通运输、生活\n      环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、…\n      环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③…\n      研究方法：体 讨论其在环境中的行为\n- 启后章：第3章讨论污染物进入生物体内的毒作用机制；第4章讨论毒作用影响因素；迁移转化是毒作用的前提\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 污染物在环境中的迁移和转化\n## 核心概念\n- 污染物迁移\n- 污染物转化\n- 机械性迁移\n- 物理-化学性迁移\n- 生物性迁移\n- 生物浓缩/生物富集（bioconcentration）\n- 生物积累（bioaccumulation）\n- 生物放大（biomagnification）\n- 逆温现象\n- 干沉降与湿沉降\n## 关键公式 / 模型\n- BCF（生物富集系数）\n- BAF（生物积累系数）\n- BMF（生物放大系数）\n- 迁移三类型\n- 转化三类型\n## 高频考点\n- 迁移三类型：机械性（气/水/重力）、物理-化学性（6种作用）、生物性（浓缩/积累/放大）\n- 气的机械性迁移三扩散：风力、气流、湍流\n- 物理-化学性迁移六作用：风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原\n- 逆温：下冷上暖→稳定度高→对流弱→难扩散\n- 生物浓缩vs积累vs放大：浓缩（体内>环境，同一时间）、积累（同一生物随时间增大）、放大（食物链随营养级增大）\n- 转化三类型：物理（蒸发/渗透/凝聚/吸附/放射性蜕变）、化学（水解/氧化还原/络合/光化学）、生物（微生物/植物/动物降\n- 大气化学转化核心：光化学氧化（NOx+烃→光化学烟雾）和催化氧化（SO₂→SO₃→酸雨）\n- 微生物降解农药方式：①农药作唯一碳源/能源/氮源 ②共代谢作用；途径：脱卤、脱烃、水解、氧化、还原、环裂解、缩合\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((污染物在环境中的迁移和转化))\n    核心概念\n      污染物迁移\n      污染物转化\n      机械性迁移\n      物理-化学性迁移\n      生物性迁移\n      生物浓缩/生物富集（bioconcentration）\n      生物积累（bioaccumulation）\n      生物放大（biomagnification）\n      逆温现象\n      干沉降与湿沉降\n    关键公式 / 模型\n      BCF（生物富集系数）\n      BAF（生物积累系数）\n      BMF（生物放大系数）\n      迁移三类型\n      转化三类型\n    高频考点\n      迁移三类型：机械性（气/水/重力）、物理-化学性（6种作用）、生物…\n      气的机械性迁移三扩散：风力、气流、湍流\n      物理-化学性迁移六作用：风化淋溶、溶解挥发、酸碱、络合、吸附、氧化…\n      逆温：下冷上暖→稳定度高→对流弱→难扩散\n      生物浓缩vs积累vs放大：浓缩（体内＞环境，同一时间）、积累（同一…\n      转化三类型：物理（蒸发/渗透/凝聚/吸附/放射性蜕变）、化学（水解…\n      大气化学转化核心：光化学氧化（NOx+烃→光化学烟雾）和催化氧化（…\n      微生物降解农药方式：①农药作唯一碳源/能源/氮源 ②共代谢作用；途…\n```\n\n<\/details>\n\n---\n\n### 第 3 章 · 环境毒理学 第三章\n\n> 素材：[_第03章_环境毒理学_第三章.md](./_第03章_环境毒理学_第三章.md) · 主版 51 页\n\n#### 一、核心概念（名词解释）\n\n- [x] **生物转运**：环境污染物经各种途径和方式同生物体接触而被吸收、分布和排泄等过程的总称（反复通过生物膜）\n- [x] **生物转化/代谢转化**：化学物在组织细胞中发生的结构和性质的变化过程\n- [x] **被动扩散（简单扩散）**：物质从高浓度→低浓度透过生物膜，纯物理过程，不耗能\n- [x] **滤过**：水溶性毒物随水分子经生物膜孔状结构透过，动力为流体静压差和渗透压差\n- [x] **主动转运**：载体参与下逆浓度梯度转运，需耗能，有选择性、容量限制、竞争性抑制\n- [x] **易化扩散**：载体介导顺浓度梯度转运，不耗能，不能逆浓度\n- [x] **膜动转运**：颗粒物/大分子通过膜变形移动摄入（胞吞/胞吐）\n- [x] **吸收**：污染物通过接触部位透过生物膜进入血液循环的过程\n- [x] **分布**：毒物进入血液后通过血流分布全身的过程\n- [x] **屏障**：血脑屏障、胎盘屏障等阻碍外源化学物转运的体内特殊结构\n- [x] **贮存库**：毒物与血浆蛋白/组织成分结合积聚的特定部位（血浆蛋白、肝肾、脂肪、骨骼）\n- [x] **肝肠循环**：脂溶性毒物在小肠被重吸收经门静脉回肝再随胆汁分泌，延长半衰期、加大毒性\n- [x] **毒物动力学**：运用数学方法定量研究毒物吸收、分布、排泄和代谢转化随时间动态变化的规律\n\n#### 二、关键公式 / 模型\n\n- **一级动力学消除**：dD/dt = -KD，D = D₀·e^(-kt)，lgD = lgD₀ - kt/2.303\n- **半衰期**：T₁/₂ = 0.693/K\n- **表观分布容积**：Vd = D/c（Vd大→分布广/组织吸收多/血浆浓度低；Vd小→分布少/血浆浓度高）\n- **消除速率常数**：K = (dD/dt)/D（K越大消除越快）\n- **清除率**：CL = 消除速度/血浆浓度 = (dD/dt)/c\n- **一室模型**：毒物进入机体后立即均匀分布到所有组织达到平衡\n- **二室模型**：中央室（血流丰富迅速平衡）+ 周边室（血流量少穿透慢），大多数毒物符合\n- **非线性动力学**：剂量加大出现饱和现象的速率过程\n\n#### 三、重要案例 / 实验 / 例题\n\n- **尘肺**：呼吸道吸收颗粒物致毒——>10μm被鼻阻挡，2.5-10μm上呼吸道沉积，<2.5μm附着肺泡\n- **清华铊中毒事件**：消化道吸收致毒，铊为银白色稀有金属，影响中枢神经/肠胃/肾脏\n- **儿童铅中毒**：皮肤吸收致毒，铅来源包括家装、饮水、文具、汽车尾气、食品\n- **DDT代谢产物DDE**：竞争性置换与蛋白结合的胆红素→游离胆红素升高→黄疸\n- **铅骨骼贮存**：铅贮存于骨骼有保护作用，但缺钙/pH下降/溶骨时铅释放→慢性中毒\n- **氟骨症/骨肉瘤**：氟化物/放射性锶与骨基质结合贮存致病\n\n#### 四、高频考点（速记）\n\n1. 生物转运四方式：**被动扩散**（不耗能，顺浓度）、**滤过**（水溶性）、**特殊转运**（主动+易化）、**膜动转运**（胞吞/胞吐）\n2. 被动扩散影响因素：**浓度梯度**、**脂/水分配系数**、**电离状态与pH**、**蛋白结合亲和力**\n3. 主动转运五特点：**逆浓度梯度**、**耗能**、**需载体**、**有选择性**、**有容量限制+竞争性抑制**\n4. 三种吸收途径：**呼吸道**（肺泡被动扩散/颗粒大小决定沉积部位）、**消化道**（主要在小肠）、**皮肤**（穿透相+吸收相两阶段）\n5. 四大贮存库：**血浆蛋白**（可逆非共价结合）、**肝肾**（配体蛋白/金属硫蛋白）、**脂肪**（有机氯农药等脂溶性）、**骨骼**（氟/铅/锶与骨基质结合）\n6. 贮存库双重意义：**急性保护**（降低靶器官浓度）+ **慢性危害**（贮存库释放致慢性中毒）\n7. 排泄四途径：**肾脏**（滤过+重吸收+主动分泌）、**肝胆**（肝肠循环延长半衰期）、**呼吸道**（简单扩散，取决于分压差和血气分配系数）、**其他**（乳汁/唾液/汗腺/头发指甲）\n8. 动力学模型：**一室**（均匀分布）、**二室**（中央+周边，大多数毒物）、**非线性**（饱和现象）\n\n#### 五、思考题 / 自测\n\n- [x] 题：毒物在体内的贮藏库包括？ 答：骨骼、脂肪、肝肾（不含肠胃）\n- [x] 题：一级动力学消除k=0.3465h⁻¹，c₀=100mg/L，说法错误的是？ 答：C（lgc对t作图斜率为-k/2.303而非-k）\n- [x] 题：被动扩散vs主动转运区别？ 答：被动扩散顺浓度、不耗能、无载体；主动转运逆浓度、耗能、需载体、有选择性\n- [x] 题：肝肠循环的毒理学意义？ 答：延长毒物在体内停留时间和半衰期，毒性加大\n\n#### 六、与前后章之关联\n\n- 承前章：第2章讨论污染物在环境中的迁移转化，本章转入生物体内（吸收→分布→代谢→排泄）\n- 启后章：第4章讨论毒作用及影响因素，本章的吸收分布代谢排泄是毒作用的前提和基础\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境毒理学 第三章\n## 核心概念\n- 生物转运\n- 生物转化/代谢转化\ 移码突变\n- [x] **染色体畸变**：可用显微镜直接观察到的染色体结构（裂隙、缺失、异位、重排、插入）和数目（整倍体/非整倍体）改变\n- [x] **致畸作用**：致畸物通过母体作用于胚胎引起胎儿畸形的现象；器官形成期最敏感\n- [x] **化学致癌物**：诱发肿瘤的化学物质；人类肿瘤80-85%与化学因素有关\n- [x] **肿瘤形成三阶段**：引发阶段（正常细胞→癌前细胞）→促长阶段（癌细胞增殖→肿块）→进展阶段（恶性前型→恶性型）\n\n#### 二、关键公式 / 模型\n\n- **LD₅₀**：半数致死量（mg/kg），数值越小毒性越强\n- **蓄积系数**：K = ∑LD₅₀(n) / LD₅₀(1)\n  - K<1 高度蓄积 | 1~3 明显蓄积 | 3~5 中度蓄积 | >5 轻度蓄积\n- **蓄积系数测定法**：固定剂量法、剂量定期递增染毒法、剂量固定20天蓄积法\n- **生物半减期法**：T₁/₂越长→越不易消除→蓄积可能性越大\n- **肿瘤发生率** = 试验终了时患肿瘤动物总数 / 有效动物总数 × 100%\n- **致癌试验结果判定四条**（任一条有显著性+剂量反应关系=阳性）：\n  1. 受试组出现对照组没有的肿瘤类型\n  2. 受试组肿瘤发生率高于对照组\n  3. 受试组平均肿瘤数高于对照组\n  4. 受试组肿瘤潜伏期短于对照组\n\n#### 三、重要案例 / 实验 / 例题\n\n- **马兜铃酸致癌致肾炎**：急性（短时间大量→急性肾衰）、慢性（持续小剂量→进行性损害）、肾小管功能障碍型（间断小量→肾小管酸中毒），同毒物不同染毒时间/剂量→不同毒性\n- **反应停（沙利度胺）致畸**：导致近万名短肢畸形儿诞生，对兔和人致畸但对其他哺乳动物不致畸→种属差异\n- **风疹病毒致畸**：第4周→无脑儿/脊髓裂，第5周→无肢畸形，6-9周→牙畸形→不同发育阶段敏感性不同\n- **高放射本底地区**：中国阳江6.4mSv/年、印度喀拉拉邦10-20mSv/年、伊朗拉姆萨尔71mSv/年\n- **Ames试验**：细菌回复突变试验，利用突变型微生物与被检化学物接触，若致突变则回复野生型（TA98/TA100等菌株）\n- **微核试验**：染色体/染色单体受突变形成无着丝点短片或纺锤体损伤遗留胞质，简便快速可靠\n\n#### 四、高频考点（速记）\n\n1. **一般毒性vs特殊毒性**：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育\n2. **急性毒性试验**：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n3. **亚慢性毒性**：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n4. **慢性毒性**：染毒3-24月甚至终生，常与致癌试验合并进行\n5. **蓄积作用两种**：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两者同时存在互为基础\n6. **蓄积系数K分级**：<1高度 | 1~3明显 | 3~5中度 | >5轻度\n7. **基因突变两类**：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+移码突变（插入/缺失非3倍数碱基→密码阅读框移位）\n8. **染色体畸变**：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整倍体/非整倍体如2n+1三体）\n9. **致突变后果**：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细胞突变→影响后代（遗传病/显性致死/基因库）\n10. **致畸试验要点**：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30~1/2 LD₅₀，分娩前1-2天解剖\n11. **致癌三学说**：体细胞突变学说、分化障碍学说、癌基因学说\n12. **致癌试验**：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟人体接触途径\n\n#### 五、思考题 / 自测\n\n- [x] 题：LD₅₀数值越小毒性如何？ 答：毒性越强\n- [x] 题：物质蓄积vs功能蓄积区别？ 答：物质蓄积可用化学方法测出体内量；功能蓄积测不出物质但功能累积加重（如有机磷）\n- [x] 题：蓄积系数K=2属于什么蓄积？ 答：明显蓄积（1~3范围）\n- [x] 题：基因突变中转换vs颠换？ 答：转换=同类碱基互换（嘧啶↔嘧啶/嘌呤↔嘌呤）；颠换=异类碱基互换（嘌呤↔嘧啶）\n- [x] 题：致畸敏感期是什么？ 答：器官形成期\n- [x] 题：Ames试验原理？ 答：突变型细菌与被检物接触→若致突变则回复突变成野生型\n\n#### 六、与前后章之关联\n\n- 承前章：第3章讨论生物转运（吸收/分布/代谢/排泄），本章在此基础上评价毒作用大小和类型\n- 启后章：第5章为环境毒理学常用实验方法，本章的毒作用评价方法是实验设计的理论基础\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境污染物的毒作用及其影响因素\n## 核心概念\n- 急性毒性\n- LD₅₀/LC₅₀\n- 亚慢性毒性\n- 慢性毒性\n- 蓄积作用\n- 物质蓄积\n- 功能蓄积\n- 蓄积系数K\n- 致突变作用\n- 基因突变（点突变）\n- 染色体畸变\n- 致畸作用\n- 化学致癌物\n- 肿瘤形成三阶段\n## 关键公式 / 模型\n- LD₅₀\n- 蓄积系数\n- 蓄积系数测定法\n- 生物半减期法\n- 肿瘤发生率\n- 致癌试验结果判定四条\n## 高频考点\n- 一般毒性vs特殊毒性：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育\n- 急性毒性试验：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n- 亚慢性毒性：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n- 慢性毒性：染毒3-24月甚至终生，常与致癌试验合并进行\n- 蓄积作用两种：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两者同时存在互为基础\n- 蓄积系数K分级：<1高度 | 1~3明显 | 3~5中度 | >5轻度\n- 基因突变两类：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+移码突变（插入/缺失非3倍数碱基→密码阅读框移位）\n- 染色体畸变：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整倍体/非整倍体如2n+1三体）\n- 致突变后果：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细胞突变→影响后代（遗传病/显性致死/基因库）\n- 致畸试验要点：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30~1/2 LD₅₀，分娩前1-2天解剖\n- 致癌三学说：体细胞突变学说、分化障碍学说、癌基因学说\n- 致癌试验：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟人体接触途径\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境污染物的毒作用及其影响因素))\n    核心概念\n      急性毒性\n      LD₅₀/LC₅₀\n      亚慢性毒性\n      慢性毒性\n      蓄积作用\n      物质蓄积\n      功能蓄积\n      蓄积系数K\n      致突变作用\n      基因突变（点突变）\n      染色体畸变\n      致畸作用\n      化学致癌物\n      肿瘤形成三阶段\n    关键公式 / 模型\n      LD₅₀\n      蓄积系数\n      蓄积系数测定法\n      生物半减期法\n      肿瘤发生率\n      致癌试验结果判定四条\n    高频考点\n      一般毒性vs特殊毒性：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/…\n      急性毒性试验：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n      亚慢性毒性：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n      慢性毒性：染毒3-24月甚至终生，常与致癌试验合并进行\n      蓄积作用两种：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两…\n      蓄积系数K分级：＜1高度 ｜ 1~3明显 ｜ 3~5中度 ｜ ＞5…\n      基因突变两类：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+…\n      染色体畸变：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整…\n      致突变后果：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细…\n      致畸试验要点：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30…\n      致癌三学说：体细胞突变学说、分化障碍学说、癌基因学说\n      致癌试验：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟…\n```\n\n<\/details>\n\n---\n\n### 第 5 章 · 环境毒理学常用实验方法\n\n> 素材：[_第05章_环境毒理学常用实验方法.md](./_第05章_环境毒理学常用实验方法.md) · 主版 82 页\n\n> 本章为方法学之章——分系统介绍四类经典毒性试验（急性 / 亚慢性 / 慢性 / 特殊）+ 三致试验。\n\n#### 一、按接触期之四类毒性试验\n\n| 试验 | 接触期 | 主要目的 | 关键指标 |\n|------|--------|---------|---------|\n| **急性毒性** | 一次或 24 h 内多次 | 测 **LD₅₀** / LC₅₀，定毒性分级 | LD₅₀、症状、靶器官 |\n| **亚急性** | 1~3 月（不超 1/10 寿命） | 蓄积性、靶器官、剂量反应 | NOAEL、LOAEL |\n| **亚慢性** | 3~6 月 | 长期低剂量效应、剂量-反应关系 | NOAEL、慢性进程预测 |\n| **慢性毒性** | ≥ 6 月或终生 | 致癌、生殖发育影响、最终 NOAEL | 终身暴露效应 |\n\n#### 二、急性毒性试验（重点）\n\n##### 1. LD₅₀ 测定方法\n- **概率单位法（Bliss 法）**：经典，剂量取对数，反应率换概率单位，最小二乘法回归，求 LD₅₀\n- **改良寇氏法（Karber 法）**：简便，相邻剂量组之间反应率差除以剂量差累积\n- **霍恩法（Horn 法）**：少动物量测定，3 ~ 4 个剂量组各 4 ~ 5 只\n- **上下法（OECD 425）**：现代节约动物之法\n\n##### 2. 毒性分级标准（GB 15193 / WHO）\n| 级 | 大鼠经口 LD₅₀ (mg/kg) |\n|----|---------------------|\n| 极毒 | < 1 |\n| 剧毒 | 1 ~ 50 |\n| 中等毒 | 51 ~ 500 |\n| 低毒 | 501 ~ 5000 |\n| 微毒 | > 5000 |\n\n##### 3. 实验设计要点\n- 受试动物：大鼠 / 小鼠为主（雌雄各半），同窝同龄\n- 剂量组：5 ~ 6 组，几何级数排列\n- 染毒途径：与人接触途径相符（经口 / 吸入 / 皮肤 / 注射）\n- 观察期：14 d，记录死亡时间、症状、解剖\n\n#### 三、蓄积毒性试验（联第 1 章·蓄积系数）\n\n**蓄积系数 K_acc 法**：\n$$K_{acc} = \\frac{\\text{多次染毒累积致 50% 死亡之总剂量}}{\\text{单次 LD}_{50}}$$\n\n| K_acc | 蓄积程度 |\n|------:|---------|\n| < 1 | 高度 |\n| 1~3 | 明显 |\n| 3~5 | 中等 |\n| > 5 | 轻度 |\n\n#### 四、致突变试验（**Ames 试验**为最经典）\n\n##### Ames 试验（鼠伤寒沙门菌回复突变）\n- **原理**：组氨酸缺陷型菌株（his⁻）在不含 His 之培养基中不能生长；致突变物诱发回复突变（his⁻ → his⁺）→ 菌落数增多\n- **菌株**：TA97/TA98/TA100/TA102 等（覆盖移码与碱基置换）\n- **+S9 mix**：加大鼠肝匀浆 S9（含 P450）模拟体内代谢活化（间接致突变物需此）\n- **优点**：快速、便宜、对约 90% 化学致癌物敏感\n- **结论**：菌落数 ≥ 2 倍自发对照 → 阳性\n\n##### 染色体畸变试验\n- **CHO/V79 细胞**或骨髓细胞，看染色体断裂、易位、倒位等\n- **微核试验**：骨髓多染红细胞中微核率↑ → 阳性\n\n##### **SCE（姐妹染色单体交换）试验**\n- 用 BrdU 标记，染色显影，看交换数\n- 灵敏度高，但易混淆与异常\n\n##### **彗星试验（Comet Assay / 单细胞凝胶电泳）**\n- 单细胞 DNA 损伤检测：损伤 DNA 在电泳中拖出彗星状尾巴\n- 量化：尾长、尾矩\n\n##### 显性致死试验\n- 雄性动物染毒后与雌交配，统计胚胎死亡率→生殖细胞致突变\n\n#### 五、致癌试验\n\n- **长期动物致癌试验**：终生（大鼠 ~24 月，小鼠 ~18 月）；至少 50 雌 50 雄/组；3 个剂量 + 对照\n- **短期致癌试验**：转基因小鼠（Tg.AC、p53⁺/⁻）/ 启动-促进试验\n- **细胞转化试验**：BALB/c 3T3、SHE 细胞观察灶性增殖\n- **结论判定**：肿瘤发生率显著高于对照、靶器官明确、剂量-反应关系存在\n\n#### 六、致畸试验（生殖发育毒性）\n\n- **3 段法**：\n  - 段Ⅰ：生育力与早期胚胎发育\n  - **段Ⅱ：致畸敏感期试验**（孕 6~15 d 染毒，此期器官形成）\n  - 段Ⅲ：围产期与哺乳期\n- **指标**：着床数、活胎/死胎/吸收胎、胎重、外观/内脏/骨骼畸形率\n- **历史教训**：**反应停（沙利度胺）→ 海豹儿** —— 致畸学之起点\n\n#### 七、生态毒理学试验\n\n- **急性致死**：鱼类（斑马鱼）96 h LC₅₀；大型溞 48 h EC₅₀\n- **生物富集系数（BCF）**：参第 2 章\n- **微生物毒性**：发光菌（Vibrio fischeri）抑光率 → Microtox 法\n\n#### 八、高频考点（速记）\n\n1. LD₅₀ 测定经典法：**概率单位法、改良寇氏法、霍恩法、上下法**\n2. 急性毒性观察期 = **14 d**\n3. 毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n4. **Ames 试验**：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n5. Ames 阳性判定：菌落数 ≥ **2 倍**自发对照\n6. 微核试验靶细胞：**骨髓多染红细胞**\n7. 彗星试验测：**单细胞 DNA 损伤**（断裂）\n8. 致畸敏感期：孕 **6~15 d**（器官形成期）\n9. 反应停 → **海豹儿**（致畸学起点）\n10. 鱼类急性毒性：**96 h LC₅₀**；大型溞：**48 h EC₅₀**\n\n#### 九、典型思考题\n\n**Q1**：Ames 试验的原理及为何加 S9？  \nA：用组氨酸缺陷型沙门菌，在不含 His 之培养基中不能生长。受试物若致 his⁻ → his⁺ 回复突变，菌落数显著增多。S9 为大鼠肝匀浆上清，含 P450 等代谢酶，模拟体内 I 相代谢——许多致突变物为前致突变物，需代谢活化。\n\n**Q2**：写出常用四致试验。  \nA：**致突变**（Ames、SCE、微核、彗星）、**致畸**（3 段法）、**致癌**（长期动物试验、转化试验）、**致敏**（豚鼠最大化试验、局部淋巴结试验）。\n\n**Q3**：为何长期慢性毒性试验需 ≥ 6 月？  \nA：慢性效应（致癌、生殖、累积损伤）需长期低剂量暴露才显现；6 月以上方能涵盖大鼠 / 小鼠之大部分寿命，便于观察终生效应及制定 NOAEL 用于 RfD 推算。\n\n#### 十、与前后章之关联\n\n- **承第 4 章**（毒作用）：本章为前章毒作用类型对应之实验法\n- **启第 6 章**（安全性评价）：本章测得之 NOAEL/LD₅₀ 是危险度评价之原始数据\n- **启第 7 章**（致癌物）：致癌试验为评定化学致癌物之核心法\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境毒理学常用实验方法\n## 按接触期之四类毒性试验\n- 急性毒性\n- LD₅₀\n- 亚急性\n- 亚慢性\n- 慢性毒性\n## 急性毒性试验\n- 概率单位法（Bliss 法）\n- 改良寇氏法（Karber 法）\n- 霍恩法（Horn 法）\n- 上下法（OECD 425）\n## 蓄积毒性试验\n- 蓄积系数 K_acc 法\n## 致突变试验\n- 原理\n- 菌株\n- +S9 mix\n- 优点\n- 结论\n- CHO/V79 细胞\n- 微核试验\n- SCE（姐妹染色单体交换）试验\n- 彗星试验（Comet Assay / 单细胞凝胶电泳）\n## 致癌试验\n- 长期动物致癌试验\n- 短期致癌试验\n- 细胞转化试验\n- 结论判定\n## 致畸试验\n- 3 段法\n- 段Ⅱ：致畸敏感期试验\n- 指标\n- 历史教训\n- 反应停（沙利度胺）→ 海豹儿\n## 生态毒理学试验\n- 急性致死\n- 生物富集系数（BCF）\n- 微生物毒性\n## 高频考点\n- LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法\n- 急性毒性观察期 = 14 d\n- 毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n- Ames 试验：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n- Ames 阳性判定：菌落数 ≥ 2 倍自发对照\n- 微核试验靶细胞：骨髓多染红细胞\n- 彗星试验测：单细胞 DNA 损伤（断裂）\n- 致畸敏感期：孕 6~15 d（器官形成期）\n- 反应停 → 海豹儿（致畸学起点）\n- 鱼类急性毒性：96 h LC₅₀；大型溞：48 h EC₅₀\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n 。\n\n#### 三、健康危险度评价 · **NAS 四步法**（核心考点）\n\n```\n① 危害识别（Hazard Identification）\n   └ 此化学物是否致害？ 致何种害？\n       依据：动物试验、流行病学、构效关系（QSAR）、Ames 等\n       结论：定性（\"是\"/\"否\"/\"可能\"）\n\n② 剂量-反应关系评价（Dose-Response Assessment）\n   └ 多大剂量致多大害？\n       非致癌：从 NOAEL → RfD = NOAEL / UF\n       致癌：低剂量外推（线性、Q*、BMD 法）\n\n③ 暴露评价（Exposure Assessment）\n   └ 人群实际接触多少？\n       计算每日摄入量 ADD = (C × IR × ED) / (BW × AT)\n       涉介质（空气/水/食物/土）、人群（普通/敏感/职业）\n\n④ 危险表征（Risk Characterization）\n   └ 综合①②③，给定量结论\n       非致癌：HQ = ADD / RfD（HQ < 1 安全；> 1 有风险）\n       致癌：终生超额致癌危险 = ADD × SF（SF = 致癌斜率因子）\n```\n\n#### 四、关键公式（必背）\n\n##### 1. 非致癌物\n$$RfD = \\frac{NOAEL}{UF \\times MF}$$\n- UF：不确定系数（10×10×10×10 ≤ 10000，常见 100~1000）\n- MF：修正因子（1~10）\n- **危险商 HQ = ADD / RfD**：HQ ≤ 1 安全；> 1 风险升\n\n##### 2. 暴露剂量\n$$ADD = \\frac{C \\times IR \\times EF \\times ED}{BW \\times AT}$$\n- C：环境浓度；IR：摄入率；EF：暴露频率（d/y）；ED：暴露年限（y）\n- BW：体重；AT：平均时间（非致癌取 ED×365；致癌取 70×365）\n\n##### 3. 致癌物\n$$\\text{终生超额致癌危险 } R = ADD \\times SF$$\n- SF（致癌斜率因子）：单位剂量致癌概率\n- R = 10⁻⁶（百万分之一）通常视为可接受上限\n\n#### 五、不确定系数 UF 之常用值\n\n| 因子 | 倍数 | 含义 |\n|------|----:|------|\n| **种间差异**（动物→人） | ×10 | 人比动物可能更敏感 |\n| **种内差异**（人个体） | ×10 | 敏感人群（婴幼儿、孕妇、病人）|\n| **亚慢性→慢性** | ×10 | 数据来自亚慢性试验时 |\n| **LOAEL→NOAEL** | ×10 | 无 NOAEL 仅有 LOAEL 时 |\n| **数据库不全** | ×3 | 关键试验缺时 |\n\n> 常用合并：默认 UF = 100（种间×种内）；缺数据时叠加，最大可 ≤ 10000\n\n#### 六、致癌物之低剂量外推\n\n- **线性多阶段模型（LMS）**：US EPA 默认，假设无阈值\n- **基准剂量法（BMD, Benchmark Dose）**：拟合剂量-反应曲线，取 BMD₁₀ 之置信下限作起点\n- **PBPK 模型**：基于生理药代动力学外推\n\n#### 七、高频考点（速记）\n\n1. 安全性评价**四阶段法**：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌\n2. 危险度评价 **NAS 四步法**：危害识别 → 剂量反应 → 暴露评价 → 危险表征\n3. **RfD = NOAEL / UF**（必背）\n4. **HQ = ADD / RfD**：≤1 安全；>1 危\n5. 致癌危险 **R = ADD × SF**\n6. 可接受致癌危险：**10⁻⁶ ~ 10⁻⁴**\n7. UF 常用：种间 ×10，种内 ×10 → 默认 100\n8. ADD 公式中 BW 为体重，AT 为平均时间\n9. NOAEL 是定 RfD 之**关键参数**\n10. 致癌物原则上**无安全阈值**（LMS 假设）\n\n#### 八、典型思考题\n\n**Q1**：写出 NAS 危险度评价四步法及各步之核心问题。  \nA：\n- ① **危害识别**：此化学物是否致害？哪种害？（定性）\n- ② **剂量-反应关系评价**：多大剂量致多大害？（非致癌取 NOAEL，致癌做低剂量外推）\n- ③ **暴露评价**：人群实际接触多少？（计算 ADD）\n- ④ **危险表征**：综合上三步给定量结论（非致癌 HQ；致癌 R = ADD × SF）\n\n**Q2**：为何制定 RfD 要除以不确定系数 UF？  \nA：① 动物试验数据外推至人需考虑**种间差异**（×10）；② 人群个体差异（含敏感人群）（×10）；③ 试验时长不足、数据缺失等需额外修正。除以 UF 留出**安全裕度**保护人群。\n\n**Q3**：HQ = 1.5 意味着什么？应否管控？  \nA：HQ = ADD/RfD = 1.5 > 1，表明实际暴露已**超过参考剂量**之 1.5 倍，长期暴露有致害风险。应：① 核实暴露评估（C/IR 等）；② 加强源头管控（减污或换品）；③ 重点保护敏感人群。\n\n**Q4**：可接受致癌危险水平为何取 10⁻⁶ ~ 10⁻⁴？  \nA：10⁻⁶ 即百万人中一人因此致癌，被视为**可忽略风险**；10⁻⁴ 是**职业暴露**等情境之上限。两值是社会与科学折衷之结果，不同国家略异。\n\n#### 九、与前后章之关联\n\n- **承第 5 章**（实验方法）：本章用前章测得之 LD₅₀/NOAEL/致突变性等\n- **承第 4 章**（剂量-反应）：暴露评价中之剂量-反应关系正出此\n- **启第 7 章**（致癌物）：本章框架在化学致癌物之具体应用\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境化学物的安全性和健康危险度评价\n## 核心概念\n- 安全性评价（Safety Evaluation）\n- 是否安全\n- 危险度评价（Risk Assessment）\n- 致害人群健康之概率与程度\n- 危险度（Risk）\n- 概率\n- 可接受危险度（Acceptable Risk）\n- 10⁻⁶ ~ 10⁻⁴\n- 参考剂量（RfD, Reference Dose）\n- 不致明显有害效应\n- 每日允许摄入量（ADI, Acceptable Daily Intake）\n- 不确定系数 UF\n## 安全性评价 · 四阶段法\n- 第Ⅰ阶段·急性毒性试验\n- 第Ⅱ阶段·遗传毒理学+30 d 喂养\n- 第Ⅲ阶段·亚慢性毒性+生殖+代谢\n- 第Ⅳ阶段·慢性毒性+致癌试验\n## 关键公式\n- 危险商 HQ = ADD / RfD\n## 不确定系数 UF 之常用值\n- 种间差异\n- 种内差异\n- 亚慢性→慢性\n- LOAEL→NOAEL\n- 数据库不全\n## 致癌物之低剂量外推\n- 线性多阶段模型（LMS）\n- 基准剂量法（BMD, Benchmark Dose）\n- PBPK 模型\n## 高频考点\n- 安全性评价四阶段法：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌\n- 危险度评价 NAS 四步法：危害识别 → 剂量反应 → 暴露评价 → 危险表征\n- RfD = NOAEL / UF（必背）\n- HQ = ADD / RfD：≤1 安全；>1 危\n- 致癌危险 R = ADD × SF\n- 可接受致癌危险：10⁻⁶ ~ 10⁻⁴\n- UF 常用：种间 ×10，种内 ×10 → 默认 100\n- ADD 公式中 BW 为体重，AT 为平均时间\n- NOAEL 是定 RfD 之关键参数\n- 致癌物原则上无安全阈值（LMS 假设）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((环境化学物的安全性和健康危险度评价))\n    核心概念\n      安全性评价（Safety Evaluation）\n      是否安全\n      危险度评价（Risk Assessment）\n      致害人群健康之概率与程度\n      危险度（Risk）\n      概率\n      可接受危险度（Acceptable Risk）\n      10⁻⁶ ~ 10⁻⁴\n      参考剂量（RfD, Reference Dose）\n      不致明显有害效应\n      每日允许摄入量（ADI, Acceptable Daily Int…\n      不确定系数 UF\n    安全性评价 · 四阶段法\n      第Ⅰ阶段·急性毒性试验\n      第Ⅱ阶段·遗传毒理学+30 d 喂养\n      第Ⅲ阶段·亚慢性毒性+生殖+代谢\n      第Ⅳ阶段· **7,8-二氢二醇-9,10-环氧化物（BPDE）**——终致癌物\n- **机制**：BPDE 共价结合 DNA 鸟嘌呤 N7 / N²，致 G→T 颠换突变\n- **靶器官**：肺、皮肤、膀胱\n- **流行病学**：吸烟与肺癌；烧烤工人\n\n##### ② 亚硝胺类（NDMA、NDEA 等）\n- **来源**：腌制食品（咸鱼、香肠）、烟草、橡胶工业；体内**亚硝酸盐 + 仲胺** → 内源生成\n- **代谢活化**：CYP 羟化 → α-羟基亚硝胺 → 重氮甲烷 → **甲基化 DNA**（O⁶-甲基鸟嘌呤）\n- **靶器官**：肝（NDMA、NDEA）、食管、胃\n- **流行病学**：林县食管癌高发与膳食硝酸盐相关\n- **预防**：维生素 C 抑制亚硝胺生成\n\n##### ③ 黄曲霉毒素 AFB₁（**最强已知致癌物之一**）\n- **来源**：黄曲霉污染之**花生、玉米、谷物**（高温高湿）\n- **代谢活化**：CYP1A2/3A4 → AFB₁-8,9-环氧化物 → 共价结合 DNA 鸟嘌呤\n- **靶器官**：**肝**（肝细胞癌主要原因之一，特别在 HBV 阳性者协同致癌）\n- **流行病学**：广西、江苏沿海肝癌高发与 AFB₁ 暴露相关\n\n##### ④ 重金属\n| 金属 | 主要靶癌 | 来源 |\n|------|---------|------|\n| **砷 As** | 皮肤、肺、膀胱（IARC 1）| 饮水（孟加拉、内蒙古）、农药 |\n| **镉 Cd** | 肺、前列腺（IARC 1）| 电池、镀锌、烟草 |\n| **镍 Ni** | 肺、鼻咽（IARC 1）| 镍精炼、不锈钢 |\n| **铬 Cr⁶⁺** | 肺（IARC 1，仅 Cr⁶⁺）| 电镀、皮革鞣制 |\n| **铅 Pb** | 多部位（2A）| 汽油、油漆、电池 |\n\n##### ⑤ 芳香胺类\n- **联苯胺、β-萘胺、4-氨基联苯**：染料工业 → **膀胱癌**（经典职业癌）\n- **代谢**：N-羟化 → N-葡糖醛酸结合 → 尿中水解释放 → 膀胱上皮致癌\n\n##### ⑥ 苯（benzene）\n- **来源**：石油化工、汽油、油漆、橡胶\n- **代谢**：苯酚 / 邻苯二酚 / 对苯二酚 / 反丁烯二醛 → 骨髓毒\n- **靶器官**：**骨髓** → 再生障碍性贫血、**白血病**（AML）\n- IARC 1 类\n\n##### ⑦ 氯乙烯（VCM）\n- **来源**：PVC 生产\n- **代谢**：环氧氯乙烷 → 共价结合 DNA\n- **靶器官**：**肝血管肉瘤**（Liver angiosarcoma，特征性肿瘤）\n\n##### ⑧ 二噁英 TCDD\n- **来源**：垃圾焚烧、氯酚生产副产物（越战橙剂）\n- **机制**：通过 **AhR 受体**致癌（非遗传毒性、有阈值）\n- IARC 1 类\n\n##### ⑨ 石棉（asbestos）\n- **类型**：温石棉（白）、青石棉（蓝）、铁石棉\n- **靶**：肺癌、**间皮瘤**（特征性）\n- **协同**：与吸烟协同致肺癌（参第 4 章联合作用）\n\n#### 五、化学致癌之机制要点\n\n1. **共价结合 DNA**（终致癌物 + DNA 加合物）\n2. **DNA 修复缺陷**（错配未修复 → 突变固定）\n3. **致癌基因激活**（如 ras、myc）\n4. **抑癌基因失活**（如 p53、Rb）\n5. **表观遗传**（甲基化异常 / miRNA 失调）\n6. **促增殖、抗凋亡**（非遗传毒性）\n\n#### 六、高频考点（速记）\n\n1. 化学致癌**三阶段**：**启动 → 促进 → 进展**\n2. **直接致癌物**不需代谢活化；**间接致癌物**需 P450 活化\n3. **苯并[a]芘** → BPDE → 与 DNA 鸟嘌呤共价结合\n4. **黄曲霉毒素 B₁** 主致**肝癌**，与 HBV 协同\n5. **亚硝胺** 来源：腌制食品 + 体内合成；**Vc 抑制**其生成\n6. **苯** → **骨髓** → AML（白血病）\n7. **氯乙烯** → **肝血管肉瘤**（特征性）\n8. **β-萘胺、联苯胺** → **膀胱癌**（职业）\n9. **石棉 + 吸烟 → 肺癌**（协同，第 4 章经典案例）\n10. IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线、烟草\n\n#### 七、典型思考题\n\n**Q1**：写出化学致癌之三阶段及各阶段特点。  \nA：① **启动**：致癌物共价结合 DNA → 不可逆突变；单一暴露即可；需 DNA 复制固定。② **促进**：已转化细胞克隆增殖；可逆；有阈值；促癌剂作用于此。③ **进展**：获侵袭、转移能力；染色体异常累积；不可逆。\n\n**Q2**：苯并[a]芘致癌之代谢活化路径？  \nA：BaP → CYP1A1 氧化 → 7,8-环氧化物 → 环氧水解酶 → 7,8-二氢二醇 → CYP 再氧化 → **BPDE（7,8-二氢二醇-9,10-环氧化物）**。BPDE 共价结合 DNA 鸟嘌呤 N²，致 G→T 颠换。这是间接致癌物代谢活化的经典例。\n\n**Q3**：为何说黄曲霉 B₁ 是\"中国肝癌\"之重要因子？  \nA：① AFB₁ 经 CYP 活化为 8,9-环氧化物，共价结合 p53 第 249 位密码子致 G→T 颠换（特征性突变）；② 在我国南方湿热地区粮食易污染；③ HBV 感染广泛——HBV 与 AFB₁ 协同致肝癌，OR 显著高于单一因素。\n\n**Q4**：为何 IARC 已废 4 类？  \nA：4 类（很可能不致癌）只有一种化学物（己内酰胺）入选过，实践中因数据不足难证\"不致癌\"，分类无操作意义。2019 年起仅保留 1/2A/2B/3 四类。\n\n#### 八、与前章之关联\n\n- **承第 3 章**（生物转化）：间接致癌物之 I 相代谢活化是本章核心机制\n- **承第 4 章**（联合作用）：石棉 + 烟草、AFB₁ + HBV 皆典型协同案例\n- **承第 5 章**（实验方法）：致癌评定依靠 Ames、致癌长期试验、流行病学\n- **承第 6 章**（危险度评价）：致癌物之**低剂量外推**与 SF 计算正用于本章物质\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 常见化学致癌物的环境毒理学\n## 核心概念\n- 化学致癌作用（Chemical Carcinogenesis）\n- 正常细胞转化为肿瘤细胞\n- 致癌物（Carcinogen）\n- 直接致癌物\n- 间接致癌物（前致癌物）\n- 多环芳烃 / 黄曲霉毒素 / 苯并芘\n- 促癌剂\n- 化学致癌三阶段\n- 启动 → 促进 → 进展\n## 致癌物分类\n- 1 类\n- 确证\n- 2A 类\n- 很可能\n- 2B 类\n- 可能\n- 3 类\n- 不能分类\n- 很可能不\n- 遗传毒性致癌物\n- 非遗传毒性致癌物\n## 典型致癌物\n- 苯并[a]芘 BaP\n- 来源\n- 代谢活化\n- 7,8-二氢二醇-9,10-环氧化物（BPDE）\n- 机制\n- 靶器官\n- 流行病学\n- 亚硝酸盐 + 仲胺\n- 甲基化 DNA\n- 预防\n- 最强已知致癌物之一\n- 花生、玉米、谷物\n- 肝\n- 砷 As\n## 化学致癌之机制要点\n- 共价结合 DNA\n- DNA 修复缺陷\n- 致癌基因激活\n- 抑癌基因失活\n- 表观遗传\n- 促增殖、抗凋亡\n## 高频考点\n- 化学致癌三阶段：启动 → 促进 → 进展\n- 直接致癌物不需代谢活化；间接致癌物需 P450 活化\n- 苯并[a]芘 → BPDE → 与 DNA 鸟嘌呤共价结合\n- 黄曲霉毒素 B₁ 主致肝癌，与 HBV 协同\n- 亚硝胺 来源：腌制食品 + 体内合成；Vc 抑制其生成\n- 苯 → 骨髓 → AML（白血病）\n- 氯乙烯 → 肝血管肉瘤（特征性）\n- β-萘胺、联苯胺 → 膀胱癌（职业）\n- 石棉 + 吸烟 → 肺癌（协同，第 4 章经典案例）\n- IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线、烟草\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((常见化学致癌物的环境毒理学))\n    核心概念\n      化学致癌作用（Chemical Carcinogenesis）\n      正常细胞转化为肿瘤细胞\n      致癌物（Carcinogen）\n      直接致癌物\n      间接致癌物（前致癌物）\n      多环芳烃 / 黄曲霉毒素 / 苯并芘\n      促癌剂\n      化学致癌三阶段\n      启动 → 促进 → 进展\n    致癌物分类\n      1 类\n      确证\n      2A 类\n      很可能\n n> 尚未填充。可运行：\n\n```bash\npython 课件_道喂.py -c 环境毒理学 --章 2 --在线 --拼网格\npython 期末复习_总枢.py -f 环境毒理学 --only 汇编,全图\n```\n\n### 第 3 章 · 环境毒理学 第三章\n\n> 素材源：[_第03章_环境毒理学_第三章.md](./_第03章_环境毒理学_第三章.md)\n\n> 尚未填充。可运行：\n\n```bash\npython 课件_道喂.py -c 环境毒理学 --章 3 --在线 --拼网格\npython 期末复习_总枢.py -f 环境毒理学 --only 汇编,全图\n```\n\n### 第 4 章 · 环境污染物的毒作用及其影响因素\n\n> 素材源：[_第04章_环境污染物的毒作用及其影响因素.md](./_第04章_环境污染物的毒作用及其影响因素.md)\n\n> 尚未填充。可运行：\n\n```bash\npython 课件_道喂.py -c 环境毒理学 --章 4 --在线 --拼网格\npython 期末复习_总枢.py -f 环境毒理学 --only 汇编,全图\n```\n\n### 第 5 章 · 环境毒理学常用实验方法\n\n> 素材源：[_第05章_环境毒理学常用实验方法.md](./_第05章_环境毒理学常用实验方法.md)\n\n> 本章为方法学之章——分系统介绍四类经典毒性试验（急性 / 亚慢性 / 慢性 / 特殊）+ 三致试验。\n\n#### 一、按接触期之四类毒性试验\n\n| 试验 | 接触期 | 主要目的 | 关键指标 |\n|------|--------|---------|---------|\n| **急性毒性** | 一次或 24 h 内多次 | 测 **LD₅₀** / LC₅₀，定毒性分级 | LD₅₀、症状、靶器官 |\n| **亚急性** | 1~3 月（不超 1/10 寿命） | 蓄积性、靶器官、剂量反应 | NOAEL、LOAEL |\n| **亚慢性** | 3~6 月 | 长期低剂量效应、剂量-反应关系 | NOAEL、慢性进程预测 |\n| **慢性毒性** | ≥ 6 月或终生 | 致癌、生殖发育影响、最终 NOAEL | 终身暴露效应 |\n\n#### 二、急性毒性试验（重点）\n\n##### 1. LD₅₀ 测定方法\n- **概率单位法（Bliss 法）**：经典，剂量取对数，反应率换概率单位，最小二乘法回归，求 LD₅₀\n- **改良寇氏法（Karber 法）**：简便，相邻剂量组之间反应率差除以剂量差累积\n- **霍恩法（Horn 法）**：少动物量测定，3 ~ 4 个剂量组各 4 ~ 5 只\n- **上下法（OECD 425）**：现代节约动物之法\n\n##### 2. 毒性分级标准（GB 15193 / WHO）\n| 级 | 大鼠经口 LD₅₀ (mg/kg) |\n|----|---------------------|\n| 极毒 | < 1 |\n| 剧毒 | 1 ~ 50 |\n| 中等毒 | 51 ~ 500 |\n| 低毒 | 501 ~ 5000 |\n| 微毒 | > 5000 |\n\n##### 3. 实验设计要点\n- 受试动物：大鼠 / 小鼠为主（雌雄各半），同窝同龄\n- 剂量组：5 ~ 6 组，几何级数排列\n- 染毒途径：与人接触途径相符（经口 / 吸入 / 皮肤 / 注射）\n- 观察期：14 d，记录死亡时间、症状、解剖\n\n#### 三、蓄积毒性试验（联第 1 章·蓄积系数）\n\n**蓄积系数 K_acc 法**：\n$$K_{acc} = \\frac{\\text{多次染毒累积致 50% 死亡之总剂量}}{\\text{单次 LD}_{50}}$$\n\n| K_acc | 蓄积程度 |\n|------:|---------|\n| < 1 | 高度 |\n| 1~3 | 明显 |\n| 3~5 | 中等 |\n| > 5 | 轻度 |\n\n#### 四、致突变试验（**Ames 试验**为最经典）\n\n##### Ames 试验（鼠伤寒沙门菌回复突变）\n- **原理**：组氨酸缺陷型菌株（his⁻）在不含 His 之培养基中不能生长；致突变物诱发回复突变（his⁻ → his⁺）→ 菌落数增多\n- **菌株**：TA97/TA98/TA100/TA102 等（覆盖移码与碱基置换）\n- **+S9 mix**：加大鼠肝匀浆 S9（含 P450）模拟体内代谢活化（间接致突变物需此）\n- **优点**：快速、便宜、对约 90% 化学致癌物敏感\n- **结论**：菌落数 ≥ 2 倍自发对照 → 阳性\n\n##### 染色体畸变试验\n- **CHO/V79 细胞**或骨髓细胞，看染色体断裂、易位、倒位等\n- **微核试验**：骨髓多染红细胞中微核率↑ → 阳性\n\n##### **SCE（姐妹染色单体交换）试验**\n- 用 BrdU 标记，染色显影，看交换数\n- 灵敏度高，但易混淆与异常\n\n##### **彗星试验（Comet Assay / 单细胞凝胶电泳）**\n- 单细胞 DNA 损伤检测：损伤 DNA 在电泳中拖出彗星状尾巴\n- 量化：尾长、尾矩\n\n##### 显性致死试验\n- 雄性动物染毒后与雌交配，统计胚胎死亡率→生殖细胞致突变\n\n#### 五、致癌试验\n\n- **长期动物致癌试验**：终生（大鼠 ~24 月，小鼠 ~18 月）；至少 50 雌 50 雄/组；3 个剂量 + 对照\n- **短期致癌试验**：转基因小鼠（Tg.AC、p53⁺/⁻）/ 启动-促进试验\n- **细胞转化试验**：BALB/c 3T3、SHE 细胞观察灶性增殖\n- **结论判定**：肿瘤发生率显著高于对照、靶器官明确、剂量-反应关系存在\n\n#### 六、致畸试验（生殖发育毒性）\n\n- **3 段法**：\n  - 段Ⅰ：生育力与早期胚胎发育\n  - **段Ⅱ：致畸敏感期试验**（孕 6~15 d 染毒，此期器官形成）\n  - 段Ⅲ：围产期与哺乳期\n- **指标**：着床数、活胎/死胎/吸收胎、胎重、外观/内脏/骨骼畸形率\n- **历史教训**：**反应停（沙利度胺）→ 海豹儿** —— 致畸学之起点\n\n#### 七、生态毒理学试验\n\n- **急性致死**：鱼类（斑马鱼）96 h LC₅₀；大型溞 48 h EC₅₀\n- **生物富集系数（BCF）**：参第 2 章\n- **微生物毒性**：发光菌（Vibrio fischeri）抑光率 → Microtox 法\n\n#### 八、高频考点（速记）\n\n1. LD₅₀ 测定经典法：**概率单位法、改良寇氏法、霍恩法、上下法**\n2. 急性毒性观察期 = **14 d**\n3. 毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n4. **Ames 试验**：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n5. Ames 阳性判定：菌落数 ≥ **2 倍**自发对照\n6. 微核试验靶细胞：**骨髓多染红细胞**\n7. 彗星试验测：**单细胞 DNA 损伤**（断裂）\n8. 致畸敏感期：孕 **6~15 d**（器官形成期）\n9. 反应停 → **海豹儿**（致畸学起点）\n10. 鱼类急性毒性：**96 h LC₅₀**；大型溞：**48 h EC₅₀**\n\n#### 九、典型思考题\n\n**Q1**：Ames 试验的原理及为何加 S9？  \nA：用组氨酸缺陷型沙门菌，在不含 His 之培养基中不能生长。受试物若致 his⁻ → his⁺ 回复突变，菌落数显著增多。S9 为大鼠肝匀浆上清，含 P450 等代谢酶，模拟体内 I 相代谢——许多致突变物为前致突变物，需代谢活化。\n\n**Q2**：写出常用四致试验。  \nA：**致突变**（Ames、SCE、微核、彗星）、**致畸**（3 段法）、**致癌**（长期动物试验、转化试验）、**致敏**（豚鼠最大化试验、局部淋巴结试验）。\n\n**Q3**：为何长期慢性毒性试验需 ≥ 6 月？  \nA：慢性效应（致癌、生殖、累积损伤）需长期低剂量暴露才显现；6 月以上方能涵盖大鼠 / 小鼠之大部分寿命，便于观察终生效应及制定 NOAEL 用于 RfD 推算。\n\n#### 十、与前后章之关联\n\n- **承第 4 章**（毒作用）：本章为前章毒作用类型对应之实验法\n- **启第 6 章**（安全性评价）：本章测得之 NOAEL/LD₅₀ 是危险度评价之原始数据\n- **启第 7 章**（致癌物）：致癌试验为评定化学致癌物之核心法\n\n### 第 6 章 · 环境化学物的安全性和健康危险度评价\n\n> 素材源：[_第06章_环境化学物的安全性和健康危险度评价.md](./_第06章_环境化学物的安全性和健康危险度评价.md)\n\n> 本章为决策章——把第 1~5 章之毒理学数据转化为**安全标准**与**风险结论**。\n> 核心两套体系：**安全性评价**（4 阶段）与**健康危险度评价**（NAS 4 步法）。\n\n#### 一、核心概念（名词解释）\n\n- **安全性评价（Safety Evaluation）**：依据毒理学试验结果，结合人群暴露资料，评定化学物在一定接触水平下对人体健康**是否安全**之过程\n- **危险度评价（Risk Assessment）**：定量估测某接触水平下某化学物**致害人群健康之概率与程度**之过程\n- **危险度（Risk）**：在特定条件下接触某物，发生有害效应之**概率**（单位时间、人群、效应）\n- **可接受危险度（Acceptable Risk）**：社会愿接受之最大危险水平。一般定为终生致癌危险 **10⁻⁶ ~ 10⁻⁴**\n- **参考剂量（RfD, Reference Dose）**：人群（含敏感人群）终生暴露而**不致明显有害效应**之每日允许摄入量\n- **每日允许摄入量（ADI, Acceptable Daily Intake）**：与 RfD 类似，多用于食品添加剂/农残\n- **不确定系数 UF**：从动物外推至人、个体差异、亚慢性外推至慢性等之安全裕度，常 100~1000\n\n#### 二、安全性评价 · **四阶段法**（中国/WHO 体系）\n\n| 阶段 | 项目 | 目的 |\n|-----|------|------|\n| **第Ⅰ阶段·急性毒性试验** | LD₅₀、皮肤/眼黏膜刺激、致敏 | 初筛，分级 |\n| **第Ⅱ阶段·遗传毒理学+30 d 喂养** | Ames、微核、染色体畸变；亚急性毒性 | 是否进下一步 |\n| **第Ⅲ阶段·亚慢性毒性+生殖+代谢** | 90 d 喂养、致畸、代谢动力学 | 找 NOAEL，估 ADI |\n| **第Ⅳ阶段·慢性毒性+致癌试验** | 终生暴露、致癌长期试验 | 终极 NOAEL，是否致癌 |\n\n> 阶段递进：每阶段阳性 → 慎重决策；阴性 → 进下阶段；新化学物原则上需走完Ⅲ或Ⅳ。\n\n#### 三、健康危险度评价 · **NAS 四步法**（核心考点）\n\n```\n① 危害识别（Hazard Identification）\n   └ 此化学物是否致害？ 致何种害？\n       依据：动物试验、流行病学、构效关系（QSAR）、Ames 等\n       结论：定性（\"是\"/\"否\"/\"可能\"）\n\n② 剂量-反应关系评价（Dose-Response Assessment）\n   └ 多大剂量致多大害？\n       非致癌：从 NOAEL → RfD = NOAEL / UF\n       致癌：低剂量外推（线性、Q*、BMD 法）\n\n③ 暴露评价（Exposure Assessment）\n   └ 人群实际接触多少？\n       计算每日摄入量 ADD = (C × IR × ED) / (BW × AT)\n       涉介质（空气/水/食物/土）、人群（普通/敏感/职业）\n\n④ 危险表征（Risk Characterization）\n   └ 综合①②③，给定量结论\n       非致癌：HQ = ADD / RfD（HQ < 1 安全；> 1 有风险）\n       致癌：终生超额致癌危险 = ADD × SF（SF = 致癌斜率因子）\n```\n\n#### 四、关键公式（必背）\n\n##### 1. 非致癌物\n$$RfD = \\frac{NOAEL}{UF \\times MF}$$\n- UF：不确定系数（10×10×10×10 ≤ 10000，常见 100~1000）\n- MF：修正因子（1~10）\n- **危险商 HQ = ADD / RfD**：HQ ≤ 1 安全；> 1 风险升\n\n##### 2. 暴露剂量\n$$ADD = \\frac{C \\times IR \\times EF \\times ED}{BW \\times AT}$$\n- C：环境浓度；IR：摄入率；EF：暴露频率（d/y）；ED：暴露年限（y）\n- BW：体重；AT：平均时间（非致癌取 ED×365；致癌取 70×365）\n\n##### 3. 致癌物\n$$\\text{终生超额致癌危险 } R = ADD \\times SF$$\n- SF（致癌斜率因子）：单位剂量致癌概率\n- R = 10⁻⁶（百万分之一）通常视为可接受上限\n\n#### 五、不确定系数 UF 之常用值\n\n| 因子 | 倍数 | 含义 |\n|------|----:|------|\n| **种间差异**（动物→人） | ×10 | 人比动物可能更敏感 |\n| **种内差异**（人个体） | ×10 | 敏感人群（婴幼儿、孕妇、病人）|\n| **亚慢性→慢性** | ×10 | 数据来自亚慢性试验时 |\n| **LOAEL→NOAEL** | ×10 | 无 NOAEL 仅有 LOAEL 时 |\n| **数据库不全** | ×3 | 关键试验缺时 |\n\n> 常用合并：默认 UF = 100（种间×种内）；缺数据时叠加，最大可 ≤ 10000\n\n#### 六、致癌物之低剂量外推\n\n- **线性多阶段模型（LMS）**：US EPA 默认，假设无阈值\n- **基准剂量法（BMD, Benchmark Dose）**：拟合剂量-反应曲线，取 BMD₁₀ 之置信下限作起点\n- **PBPK 模型**：基于生理药代动力学外推\n\n#### 七、高频考点（速记）\n\n1. 安全性评价**四阶段法**：急性 → 遗传+亚急 → 亚慢+生殖 → 慢性+致癌\n2. 危险度评价 **NAS 四步法**：危害识别 → 剂量反应 → 暴露评价 → 危险表征\n3. **RfD = NOAEL / UF**（必背）\n4. **HQ = ADD / RfD**：≤1 安全；>1 危\n5. 致癌危险 **R = ADD × SF**\n6. 可接受致癌危险：**10⁻⁶ ~ 10⁻⁴**\n7. UF 常用：种间 ×10，种内 ×10 → 默认 100\n8. ADD 公式中 BW 为体重，AT 为平均时间\n9. NOAEL 是定 RfD 之**关键参数**\n10. 致癌物原则上**无安全阈值**（LMS 假设）\n\n#### 八、典型思考题\n\n**Q1**：写出 NAS 危险度评价四步法及各步之核心问题。  \nA：\n- ① **危害识别**：此化学物是否致害？哪种害？（定性）\n- ② **剂量-反应关系评价**：多大剂量致多大害？（非致癌取 NOAEL，致癌做低剂量外推）\n- ③ **暴露评价**：人群实际接触多少？（计算 ADD）\n- ④ **危险表征**：综合上三步给定量结论（非致癌 HQ；致癌 R = ADD × SF）\n\n**Q2**：为何制定 RfD 要除以不确定系数 UF？  \nA：① 动物试验数据外推至人需考虑**种间差异**（×10）；② 人群个体差异（含敏感人群）（×10）；③ 试验时长不足、数据缺失等需额外修正。除以 UF 留出**安全裕度**保护人群。\n\n**Q3**：HQ = 1.5 意味着什么？应否管控？  \nA：HQ = ADD/RfD = 1.5 > 1，表明实际暴露已**超过参考剂量**之 1.5 倍，长期暴露有致害风险。应：① 核实暴露评估（C/IR 等）；② 加强源头管控（减污或换品）；③ 重点保护敏感人群。\n\n**Q4**：可接受致癌危险水平为何取 10⁻⁶ ~ 10⁻⁴？  \nA：10⁻⁶ 即百万人中一人因此致癌，被视为**可忽略风险**；10⁻⁴ 是**职业暴露**等情境之上限。两值是社会与科学折衷之结果，不同国家略异。\n\n#### 九、与前后章之关联\n\n- **承第 5 章**（实验方法）：本章用前章测得之 LD₅₀/NOAEL/致突变性等\n- **承第 4 章**（剂量-反应）：暴露评价中之剂量-反应关系正出此\n- **启第 7 章**（致癌物）：本章框架在化学致癌物之具体应用\n\n### 第 7 章 · 常见化学致癌物的环境毒理学\n\n> 素材源：[_第07章_常见化学致癌物的环境毒理学.md](./_第07章_常见化学致癌物的环境毒理学.md)\n\n> 本章为应用章——把前 6 章之框架应用于具体之常见环境致癌物，含其来源、机制、靶器官、人群证据。\n\n#### 一、核心概念（名词解释）\n\n- **化学致癌作用（Chemical Carcinogenesis）**：化学物诱发**正常细胞转化为肿瘤细胞**之过程\n- **致癌物（Carcinogen）**：能引起或诱发动物或人类肿瘤之化学物\n- **直接致癌物**：本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体）\n- **间接致癌物（前致癌物）**：本身无活性，需经体内代谢活化后致癌（**多环芳烃 / 黄曲霉毒素 / 苯并芘** 等大多数为此）\n- **促癌剂**：本身不致癌，但能促进已转化细胞增殖（如佛波酯 TPA、糖精）\n- **化学致癌三阶段**：**启动 → 促进 → 进展**（initiation → promotion → progression）\n\n#### 二、化学致癌之**三阶段学说**（必背）\n\n```\n① 启动期（initiation）  \n   └ 致癌物与 DNA 共价结合 → 不可逆突变  \n   └ 单一暴露即可，剂量-反应明确，需 DNA 复制固定突变\n\n② 促进期（promotion）\n   └ 已转化细胞克隆性增殖\n   └ 长期反复暴露，可逆，有阈值\n   └ 促癌剂作用于此（不诱发突变）\n\n③ 进展期（progression）\n   └ 细胞获得侵袭、转移能力\n   └ 不可逆，染色体异常加剧\n```\n\n#### 三、致癌物分类\n\n##### 1. IARC（国际癌症研究中心）四类分级（重点）\n\n| 类别 | 含义 | 典型例 |\n|------|------|--------|\n| **1 类** | 对人**确证**致癌 | 苯并芘、黄曲霉 B₁、苯、镉、镍、砷、石棉、烟草、福尔马林、X 射线 |\n| **2A 类** | 对人**很可能**致癌（人证据有限+动物充分） | 丙烯酰胺、铅化合物、红肉、夜班工作 |\n| **2B 类** | 对人**可能**致癌（人证据有限+动物有限） | 汽油、电焊烟、咖啡（已移出）|\n| **3 类** | 现有证据**不能分类** | 咖啡因、糖精（已移出）|\n| ~~4 类~~ | 对人**很可能不**致癌（已废，原仅 caprolactam）| —— |\n\n> 2019 年起 IARC 实际只用 1/2A/2B/3 四类。\n\n##### 2. 按化学结构与作用机制\n- **遗传毒性致癌物**：直接损伤 DNA（多环芳烃、亚硝胺、烷化剂、芳香胺）\n- **非遗传毒性致癌物**：不损 DNA，通过促增殖、抑凋亡等致癌（雌激素、TPA、TCDD 二噁英）\n\n#### 四、典型致癌物（重点逐一）\n\n##### ① 多环芳烃 PAHs（**苯并[a]芘 BaP** 为代表）\n- **来源**：化石燃料不完全燃烧、烧烤焦糊食物、汽车尾气、烟草烟雾\n- **代谢活化**：BaP → 7,8-环氧化物 → 7,8-二氢二醇 → **7,8-二氢二醇-9,10-环氧化物（BPDE）**——终致癌物\n- **机制**：BPDE 共价结合 DNA 鸟嘌呤 N7 / N²，致 G→T 颠换突变\n- **靶器官**：肺、皮肤、膀胱\n- **流行病学**：吸烟与肺癌；烧烤工人\n\n##### ② 亚硝胺类（NDMA、NDEA 等）\n- **来源**：腌制食品（咸鱼、香肠）、烟草、橡胶工业；体内**亚硝酸盐 + 仲胺** → 内源生成\n- **代谢活化**：CYP 羟化 → α-羟基亚硝胺 → 重氮甲烷 → **甲基化 DNA**（O⁶-甲基鸟嘌呤）\n- **靶器官**：肝（NDMA、NDEA）、食管、胃\n- **流行病学**：林县食管癌高发与膳食硝酸盐相关\n- **预防**：维生素 C 抑制亚硝胺生成\n\n##### ③ 黄曲霉毒素 AFB₁（**最强已知致癌物之一**）\n- **来源**：黄曲霉污染之**花生、玉米、谷物**（高温高湿）\n- **代谢活化**：CYP1A2/3A4 → AFB₁-8,9-环氧化物 → 共价结合 DNA 鸟嘌呤\n- **靶器官**：**肝**（肝细胞癌主要原因之一，特别在 HBV 阳性者协同致癌）\n- **流行病学**：广西、江苏沿海肝癌高发与 AFB₁ 暴露相关\n\n##### ④ 重金属\n| 金属 | 主要靶癌 | 来源 |\n|------|---------|------|\n| **砷 As** | 皮肤、肺、膀胱（IARC 1）| 饮水（孟加拉、内蒙古）、农药 |\n| **镉 Cd** | 肺、前列腺（IARC 1）| 电池、镀锌、烟草 |\n| **镍 Ni** | 肺、鼻咽（IARC 1）| 镍精炼、不锈钢 |\n| **铬 Cr⁶⁺** | 肺（IARC 1，仅 Cr⁶⁺）| 电镀、皮革鞣制 |\n| **铅 Pb** | 多部位（2A）| 汽油、油漆、电池 |\n\n##### ⑤ 芳香胺类\n- **联苯胺、β-萘胺、4-氨基联苯**：染料工业 → **膀胱癌**（经典职业癌）\n- **代谢**：N-羟化 → N-葡糖醛酸结合 → 尿中水解释放 → 膀胱上皮致癌\n\n##### ⑥ 苯（benzene）\n- **来源**：石油化工、汽油、油漆、橡胶\n- **代谢**：苯酚 / 邻苯二酚 / 对苯二酚 / 反丁烯二醛 → 骨髓毒\n- **靶器官**：**骨髓** → 再生障碍性贫血、**白血病**（AML）\n- IARC 1 类\n\n##### ⑦ 氯乙烯（VCM）\n- **来源**：PVC 生产\n- **代谢**：环氧氯乙烷 → 共价结合 DNA\n- **靶器官**：**肝血管肉瘤**（Liver angiosarcoma，特征性肿瘤）\n\n##### ⑧ 二噁英 TCDD\n- **来源**：垃圾焚烧、氯酚生产副产物（越战橙剂）\n- **机制**：通过 **AhR 受体**致癌（非遗传毒性、有阈值）\n- IARC 1 类\n\n##### ⑨ 石棉（asbestos）\n- **类型**：温石棉（白）、青石棉（蓝）、铁石棉\n- **靶**：肺癌、**间皮瘤**（特征性）\n- **协同**：与吸烟协同致肺癌（参第 4 章联合作用）\n\n#### 五、化学致癌之机制要点\n\n1. **共价结合 DNA**（终致癌物 + DNA 加合物）\n2. **DNA 修复缺陷**（错配未修复 → 突变固定）\n3. **致癌基因激活**（如 ras、myc）\n4. **抑癌基因失活**（如 p53、Rb）\n5. **表观遗传**（甲基化异常 / miRNA 失调）\n6. **促增殖、抗凋亡**（非遗传毒性）\n\n#### 六、高频考点（速记）\n\n1. 化学致癌**三阶段**：**启动 → 促进 → 进展**\n2. **直接致癌物**不需代谢活化；**间接致癌物**需 P450 活化\n3. **苯并[a]芘** → BPDE → 与 DNA 鸟嘌呤共价结合\n4. **黄曲霉毒素 B₁** 主致**肝癌**，与 HBV 协同\n5. **亚硝胺** 来源：腌制食品 + 体内合成；**Vc 抑制**其生成\n6. **苯** → **骨髓** → AML（白血病）\n7. **氯乙烯** → **肝血管肉瘤**（特征性）\n8. **β-萘胺、联苯胺** → **膀胱癌**（职业）\n9. **石棉 + 吸烟 → 肺癌**（协同，第 4 章经典案例）\n10. IARC 1 类：苯、苯并芘、AFB₁、镉、镍、砷、石棉、X 射线、烟草\n\n#### 七、典型思考题\n\n**Q1**：写出化学致癌之三阶段及各阶段特点。  \nA：① **启动**：致癌物共价结合 DNA → 不可逆突变；单一暴露即可；需 DNA 复制固定。② **促进**：已转化细胞克隆增殖；可逆；有阈值；促癌剂作用于此。③ **进展**：获侵袭、转移能力；染色体异常累积；不可逆。\n\n**Q2**：苯并[a]芘致癌之代谢活化路径？  \nA：BaP → CYP1A1 氧化 → 7,8-环氧化物 → 环氧水解酶 → 7,8-二氢二醇 → CYP 再氧化 → **BPDE（7,8-二氢二醇-9,10-环氧化物）**。BPDE 共价结合 DNA 鸟嘌呤 N²，致 G→T 颠换。这是间接致癌物代谢活化的经典例。\n\n**Q3**：为何说黄曲霉 B₁ 是\"中国肝癌\"之重要因子？  \nA：① AFB₁ 经 CYP 活化为 8,9-环氧化物，共价结合 p53 第 249 位密码子致 G→T 颠换（特征性突变）；② 在我国南方湿热地区粮食易污染；③ HBV 感染广泛——HBV 与 AFB₁ 协同致肝癌，OR 显著高于单一因素。\n\n**Q4**：为何 IARC 已废 4 类？  \nA：4 类（很可能不致癌）只有一种化学物（己内酰胺）入选过，实践中因数据不足难证\"不致癌\"，分类无操作意义。2019 年起仅保留 1/2A/2B/3 四类。\n\n#### 八、与前章之关联\n\n- **承第 3 章**（生物转化）：间接致癌物之 I 相代谢活化是本章核心机制\n- **承第 4 章**（联合作用）：石棉 + 烟草、AFB₁ + HBV 皆典型协同案例\n- **承第 5 章**（实验方法）：致癌评定依靠 Ames、致癌长期试验、流行病学\n- **承第 6 章**（危险度评价）：致癌物之**低剂量外推**与 SF 计算正用于本章物质\n\n---\n\n> 正言若反：最终资料不离底层图像；凡疑处，复归章节素材与原始 PDF。\n"}, {"id": "rr-e2bac107", "group": "复习资料", "title": "期末速查", "md": "# 环境毒理学 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 3/7 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 1 | 绪论 |  |  |  |\n| 2 | 污染物在环境中的迁移和转化 |  |  |  |\n| 3 | 环境毒理学 第三章 |  |  |  |\n| 4 | 环境污染物的毒作用及其影响因素 |  |  |  |\n| 5 | 环境毒理学常用实验方法 |  |  | LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法；急性毒性观察期 = 14 d；毒性分级：极毒 < 1 mg/kg < 剧 NOAEL / UF（必背）\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 7 章 · 常见化学致癌物的环境毒理学\n\n> 主版 52 页 · 第 11 节 · [详细素材](./_第07章_常见化学致癌物的环境毒理学.md)\n\n**核心三问**：\n\n- **是什么** ── 化学致癌作用（Chemical Carcinogenesis）：化学物诱发正常细胞转化为肿瘤细胞之过程；致癌物（Carcinogen）：能引起或诱发动物或人类肿瘤之化学物；直接致癌物：本身即活性形式，不需代谢活化（如烷化剂、亚硝胺活性中间体）\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 化学致癌三阶段：启动 → 促进 → 进展；直接致癌物不需代谢活化；间接致癌物需 P450 活化；苯并[a]芘 → BPDE → 与 DNA 鸟嘌呤共价结合\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 四 · 章际交叉（同一课件涉两章）\n\n- 第 2 章  ⇄  第 3 章\n- 第 4 章  ⇄  第 5 章\n- 第 5 章  ⇄  第 6 章\n- 第 6 章  ⇄  第 7 章\n\n## 五 · 非教学性内容（仅记，期末不考）\n\n- 青春逐梦，共赴改革新征程 (29 页)\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 第 1 章 · 绪论\n- [ ] 第 2 章 · 污染物在环境中的迁移和转化\n- [ ] 第 3 章 · 环境毒理学 第三章\n- [ ] 第 4 章 · 环境污染物的毒作用及其影响因素\n- [ ] 第 5 章 · 环境毒理学常用实验方法\n- [ ] 第 6 章 · 环境化学物的安全性和健康危险度评价\n- [ ] 第 7 章 · 常见化学致癌物的环境毒理学\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练\n"}, {"id": "rr-5c38534a", "group": "复习资料", "title": "环境毒理学 第三章 完全复习", "md": "# 环境毒理学 第三章 · 污染物的生物转运与生物转化\n\n> 新疆大学 · 2025年3月 · 完全复习资料\n\n---\n\n## 全章结构\n\n```\n第三章\n├── 3.1 污染物的生物转运\n│   ├── 3.1.1 生物膜与跨膜转运机理\n│   ├── 3.1.2 吸收 (呼吸道/消化道/皮肤)\n│   ├── 3.1.3 分布 (屏障/贮存库)\n│   └── 3.1.4 排泄 (肾/肝胆/呼吸道/其他)\n└── 3.3 污染物代谢动力学\n    ├── 室的概念 (一室/二室)\n    ├── 一级动力学公式\n    ├── 主要参数 (Vd/T½/K/Cl)\n    └── 非线性动力学\n```\n\n---\n\n## 一、核心概念\n\n### 生物转运 vs 生物转化\n\n| 概念 | 定义 | 本质 |\n|------|------|------|\n| **生物转运** | 污染物经各种途径同生物体接触而被**吸收、分布和排泄**的总称 | 反复通过生物膜（位置变化） |\n| **生物转化** | 化学物在组织细胞中发生的**结构和性质的变化**，又称代谢转化 | 化学结构变化 |\n\n### 机体处置毒物四步\n\n**吸收 → 分布 → 代谢 → 排泄**\n\n环境化学物对机体毒性作用的大小和部位，与其在体内的吸收、分布、代谢和排泄过程有密切关系。\n\n---\n\n## 二、跨膜转运机理 (3.1.1)\n\n### 生物膜结构\n细胞膜主要由**脂质双分子层**和**蛋白质**组成，也有少量糖形成糖脂和糖蛋白。\n\n### 四种转运方式对比\n\n| 特征 | 被动扩散 | 滤过 | 主动转运 | 易化扩散 | 膜动转运 |\n|------|--------|------|--------|--------|--------|\n| 浓度梯度 | 顺 | 顺压差 | **逆** | 顺 | — |\n| 能量消耗 | 否 | 否 | **是** | 否 | 是 |\n| 载体 | 否 | 否 | 是 | 是 | 否 |\n| 选择性 | 低 | 分子大小 | 高 | 高 | — |\n| 竞争抑制 | 否 | 否 | 是 | 是 | — |\n\n### ① 被动扩散 (passive diffusion)\n- 物质只能从浓度**高→低**透过生物膜\n- **纯物理过程，不消耗代谢能，膜不具有主动性**\n- 影响因素：浓度梯度差 / 脂/水分配系数 / 离解状态和pH / 蛋白结合亲和力\n\n### ② 滤过 (infiltration)\n- 水溶性毒物随水分子经生物膜**孔状结构**透过\n- 动力：流体静压梯度差 + 渗透压梯度差\n\n### ③ 特殊转运 (载体转运)\n适用于脂溶性低或分子量过大的化学物。\n\n**主动转运** (active transport)：逆浓度梯度，消耗能量，需载体，有选择性，有容量限制，可竞争性抑制（5大特点）\n\n**易化扩散** (facilitated diffusion)：载体介导但**顺浓度，不消耗能量**，不能逆浓度梯度\n\n### ④ 膜动转运\n- 颗粒物和大分子物质，利用膜的可塑性和流动性\n- **胞吞作用**（外→内）和 **胞吐作用**（内→外）\n\n---\n\n## 三、吸收 (3.1.2)\n\n**定义：** 污染物通过接触部位透过体内生物膜**进入血液循环**的过程。\n\n### 3.1 呼吸道吸收\n- 气体/蒸汽→肺泡→**被动扩散**→血液\n- 颗粒物按粒径沉积：>10μm阻挡鼻外 / 2.5-10μm上呼吸道 / **<2.5μm附着肺泡**\n- 颗粒归宿：①进入血液 ②进入消化道 ③进入淋巴腺 ④长期滞留引起病变\n- 影响因素：分压差和血/气分配系数 / 溶解度和分子量 / 肺泡通气量与血液流量比值\n- 案例：**尘肺**\n\n### 3.2 消化道吸收\n- 主要吸收部位是**小肠**，胃里主要通过**简单扩散**\n- 影响因素：酶类和菌丛 / 内容物种类数量 / 溶解度和分散度 / 酸碱度（分子态>电离态）\n- 案例：**清华学生铊中毒**\n\n### 3.3 皮肤吸收\n- 途径①：毒物→角质层→透明层→颗粒层→生发层→基膜→真皮\n- 途径②：通过汗腺、皮脂腺、毛囊绕过表皮进入真皮\n- 两阶段：**穿透相**（速度与脂溶性正比）→ **吸收相**（真皮→毛细血管）\n- 影响因素：皮肤完整度 / 部位（背部>手臂）/ 化合物物化性质 / 接触条件\n- 案例：**儿童铅中毒**\n\n---\n\n## 四、分布 (3.1.3)\n\n- 起始分布取决于**血流量**，最终分布取决于与组织器官的**亲和力**\n\n### 屏障\n- **血脑屏障** / **胎盘屏障**\n\n### 四大贮存库\n\n| 贮存库 | 要点 |\n|--------|------|\n| **血浆蛋白** | 与蛋白结合的毒物不易透过细胞膜→保护；可逆非共价键结合→可解离再分布。例：DDE竞争置换胆红素→黄疸 |\n| **肝肾** | 含特殊结合蛋白，能夺取血浆蛋白结合的毒物；配体蛋白结合有机酸；金属硫蛋白结合Zn/Cd起解毒作用 |\n| **脂肪组织** | 脂溶性毒物贮存（DDT/六六六/有机汞）。降低靶器官浓度，但脂肪消耗时毒物释放→毒性显现 |\n| **骨骼组织** | 氟化物/铅/锶与骨基质结合。氟→氟骨症，锶→骨肉瘤 |\n\n### 贮存的毒理学意义（双刃剑）\n- **保护**：急性中毒时降低体液毒物浓度，减少到达靶器官的量\n- **危害**：慢性毒物来源。例：铅贮存于骨骼→缺钙/pH下降时释放→慢性中毒\n\n> **练习答案：** 毒物贮藏库→**ABD**（骨骼、脂肪、肝肾），肠胃不是贮存库\n\n---\n\n## 五、排泄 (3.1.4)\n\n**定义：** 毒物母体化学物及其代谢产物向机体外转运的过程，是代谢的**最后一个环节**。\n\n### 5.1 经肾排出\n- **肾小球滤过**：可滤过分子量<69000的物质，与血浆蛋白结合的不能通过\n- **肾小管重吸收**：极性亲水→不被重吸收→随尿排出；非极性亲脂→重吸收回血液\n- **肾小管主动分泌**：有机阴/阳离子主动分泌到尿中\n\n### 5.2 经肝胆排出\n- **肝肠循环**：脂溶性毒物→小肠重吸收→门静脉→回到肝脏→再随胆汁分泌→循环。延长体内停留时间，半衰期延长，毒性加大\n- **直接排出**：高度极性化合物不易被小肠吸收→随胆汁混入粪便排出\n\n### 5.3 经呼吸道排出\n- 主要通过**简单扩散**，速度取决于分压差和血气分配系数\n- 颗粒物通过清除系统→咽部→咳出或吞入消化道\n\n### 5.4 其他途径\n- 乳腺（有机碱/亲脂性毒物）/ 唾液腺汗腺（I/Br/F/Hg）/ 头发指甲（重金属）\n- 排出时局部毒性：镉→损害近曲肾小管 / 汞→口腔炎 / β-萘胺→膀胱癌\n\n---\n\n## 六、代谢动力学 (3.3)\n\n### 6.1 毒物动力学\n运用数学方法，定量研究毒物的吸收、分布、排泄和代谢转化随时间动态变化的规律。\n\n### 6.2 室的概念\n- **一室模型**：转运速率高→体内分布迅速达到平衡→视为一室\n- **二室模型**：**中央室**（血流丰富，迅速平衡）+ **周边室**（血流少，穿透慢）。大多数毒物复合二室模型\n\n### 6.3 一级动力学核心公式\n\n| 公式 | 含义 |\n|------|------|\n| dD/dt = −KD | 消除速度与体内毒物量成正比 |\n| D = D₀·e^(−kt) | 毒物量随时间指数衰减 |\n| lgD = lgD₀ − kt/2.303 | 对数-时间直线 |\n| lgc = lgc₀ − kt/2.303 | 浓度对数-时间直线 |\n\n**判断方法：** lgc对t作图得直线→一级动力学消除。**斜率 = −k/2.303**（不是−k！）\n\n### 6.4 四个主要参数\n\n| 参数 | 公式 | 意义 |\n|------|------|------|\n| **表观分布容积 Vd** | D/c | Vd大→分布广、组织吸收多、血浆浓度低 |\n| **生物半衰期 T₁/₂** | 0.693/K | 体内毒物量减少一半所需时间 |\n| **消除速率常数 K** | (dD/dt)/D | K越大→消除越快 |\n| **消除率 Cl** | (dD/dt)/c | 反映血浆消除毒物的能力 |\n\n### 6.5 非线性动力学\n线性模型假设吸收无限、速率与浓度成正比。实际上计量加大→出现**饱和现象**→非线性动力学。\n\n---\n\n## 七、课堂练习题详解\n\n### 题1（多选·p36）\n> 以下哪些是毒物在体内的贮藏库？A.骨骼 B.脂肪 C.肠胃 D.肝肾\n\n**答案：ABD** — 肠胃是吸收排泄通道，不是贮存库。\n\n### 题2（选择·p49）\n> k=0.3465 h⁻¹，c₀=100 mg/L，下列说法**错误**的是？\n\n- A. 半衰期为2小时 → T½=0.693/0.3465=2h ✓\n- B. 4小时后浓度为25mg/L → c=100×e^(−0.3465×4)=100×0.25=25 ✓\n- **C. lgc对t直线斜率为−0.3465** → 实际斜率=−k/2.303=−0.1504 ✗ **答案选C**\n- D. 消除速度与当前浓度成正比 → 一级动力学特征 ✓\n\n### 题3（填空·p50）\n1. 一级动力学微分方程：**dD/dt = −KD**，指数形式：**D = D₀·e^(−kt)**\n2. lgc对t得到一条**直线**→一级动力学；直线方程：**lgc = lgc₀ − kt/2.303**\n3. 消除速率常数k与半衰期换算：**T₁/₂ = 0.693/k**\n\n---\n\n## 八、高频考点速记\n\n1. 被动扩散是毒物跨膜转运**最主要**的方式\n2. 主动转运五大特点：逆浓度/消耗能量/需载体/有选择性/竞争性抑制\n3. 颗粒物<2.5μm→沉积在**肺泡**\n4. 消化道吸收主要部位→**小肠**\n5. 皮肤吸收穿透速度与**脂溶性正比**\n6. 起始分布取决于**血流量**，最终分布取决于**亲和力**\n7. 四大贮存库：血浆蛋白/肝肾/脂肪/骨骼\n8. 贮存库双刃剑：急性保护 vs 慢性危害\n9. **肝肠循环**延长毒物体内停留时间→半衰期延长→毒性加大\n10. lgc-t直线斜率 = **−k/2.303**（不是−k）\n11. T₁/₂ = **0.693/K**\n12. Vd = **D/c**\n"}, {"id": "rr-4b11f5e0", "group": "复习资料", "title": "环境毒理学 考题答案 完整版", "md": "# 环境毒理学 · 考题完整答案\n\n> 综合本地第三章复习资料 + 网络毒理学权威资源整理  \n> 覆盖图片中全部 8 道标记题目\n\n---\n\n## 第一题 · 名词解释（共 12 项）\n\n### (1) 毒物（Toxicant / Poison）\n在一定条件下，**较低剂量**即可对机体造成**功能性或器质性损伤**的外源化学物。  \n> 强调\"一定条件\"和\"较低剂量\"——剂量是毒物概念的核心，任何物质剂量足够大均可有毒，剂量足够小均无毒。\n\n### (2) 毒素（Toxin）\n由**生物体**（动物、植物、微生物）产生的具有毒性的化学物质。  \n与\"毒物\"区别：毒素专指生物来源（如蛇毒、肉毒素、黄曲霉毒素）；毒物则泛指一切有毒化学物（含人工合成）。\n\n### (3) 最大无作用剂量（NOAEL，No Observed Adverse Effect Level）\n又称**阈下剂量**。在规定实验条件下，用现有技术手段观察，**未发现任何有害效应**的最大染毒剂量或浓度。  \n是制定环境卫生标准的重要依据。\n\n### (4) 最小有作用剂量（LOAEL，Lowest Observed Adverse Effect Level）\n又称**阈剂量**（Threshold Dose）。化学物引起受试生物**出现可观察到有害效应**的最低剂量。  \nLOAEL > NOAEL；两者之间即为毒性阈值区间。\n\n### (5) 蓄积作用（Accumulation）\n外源化合物**反复、连续进入机体**，当吸收速度或总量超过代谢转化与排出速度或总量时，化学物在体内逐渐增多或贮留的现象。  \n分为两类：\n- **物质蓄积**：化学物本身在体内浓度逐渐增加\n- **功能蓄积（损伤蓄积）**：化学物本身未见积累，但其引起的**损伤效应不断累积**（如有机磷对神经系统的累积损伤）\n\n### (6) 蓄积系数（Accumulation Coefficient，K_acc）\n评价化学物蓄积性大小的指标。  \n\n$$K_{acc} = \\frac{\\text{多次染毒引起某效应（如半数致死）的累积剂量}}{\\text{一次染毒引起同等效应的剂量（LD}_{50}\\text{）}}$$\n\n| K_acc 值 | 蓄积程度 |\n|---------|---------|\n| < 1 | 高度蓄积 |\n| 1～3 | 明显蓄积 |\n| 3～5 | 中等蓄积 |\n| > 5 | 轻度蓄积 |\n\n**K_acc 越小，蓄积性越强，毒性危害越大。**\n\n### (7) 效应（Effect）与反应（Response）的区别\n\n| | 效应 (Effect) | 反应 (Response) |\n|---|---|---|\n| 对象 | **个体** | **群体**（有/无） |\n| 表现 | 量化指标（酶活性、血压变化等） | 阳性率/发生率（%） |\n| 曲线 | 剂量-效应曲线 | 剂量-反应曲线（S形）|\n| 例子 | 血铅浓度升高多少 | 多少%动物死亡 |\n\n### (8) 联合作用（Joint Action / Combined Effect）\n**同时或先后接触两种或两种以上**外源化学物，对机体产生的综合毒性效应。  \n按结果分为：相加作用、协同作用、独立作用、拮抗作用（详见下）。\n\n### (9) 协同作用（Synergism）\n两种或两种以上化学物联合作用于机体，所产生的毒作用**大于**各化学物单独毒性效应的**总和**。  \n即：联合毒性 > 各组分毒性之和  \n经典例子：**吸烟 + 石棉暴露 → 肺癌风险远超两者相加**\n\n### (10) 拮抗作用（Antagonism）\n两种或两种以上化学物联合作用于机体，所产生的毒作用**低于**各化学物单独毒性效应的**总和**。  \n即：联合毒性 < 各组分毒性之和  \n分类：功能拮抗 / 化学拮抗 / 配置拮抗 / 受体拮抗  \n例：乙醇可拮抗甲醇毒性（竞争代谢酶）\n\n### (11) 相加作用（Additive Action）\n两种或两种以上化学物联合作用，总效应**等于**各化学物单独作用效应的**算术总和**。  \n即：联合毒性 = A毒性 + B毒性  \n常见于作用机制相似、靶部位相同的化学物。\n\n### (12) 独立作用（Independent Action）\n多种化学物各自对机体产生**不同效应**，作用途径、机制及部位各不相同，彼此之间**无明显相互影响**。  \n结果：总效应不超过其中毒性最强者的效应，不发生简单加和。\n\n---\n\n## 第二题 · 影响化学物毒性的因素有哪些？\n\n影响毒性大小的因素分为**五大类**：\n\n### ① 化学物本身的因素\n- **化学结构**：取代基类型、位置、数量影响毒性（如卤素取代→毒性增加）\n- **理化性质**：脂溶性高→易吸收→毒性大；挥发性高→吸入风险大；分散度大→表面积大→吸收快\n- **纯度**：杂质可能增强或干扰毒性\n\n### ② 剂量与接触条件\n- **剂量**：决定毒性发生与否及强度（\"剂量决定毒性\"）\n- **接触途径**：毒性强度排序一般为：静脉注射 > 腹腔注射 > 皮下注射 > 口服 > 皮肤\n- **接触时间与频率**：累积剂量与蓄积效应\n\n### ③ 机体因素（宿主因素）\n- **种属与个体差异**：遗传背景不同，代谢酶活性不同\n- **年龄**：新生儿/幼年→代谢酶不完善，老年→器官功能减退，均较成年更敏感\n- **性别**：激素影响代谢酶，部分毒物对雌/雄有差异\n- **营养状态**：缺乏蛋白质→白蛋白少→游离毒物多→毒性增强\n- **健康状况**：肝肾疾病→代谢排泄障碍→毒性加重\n\n### ④ 环境因素\n- **温度**：高温→皮肤血管扩张→吸收加快\n- **湿度**：影响化学物的挥发与皮肤渗透\n- **气压**：高海拔→低氧→对呼吸道毒物更敏感\n\n### ⑤ 化学物的联合作用\n- 同时接触多种化学物时，相互作用（协同/拮抗/相加/独立）改变实际毒性（见第一题）\n\n---\n\n## 第三题 · 剂量-效应关系与剂量-反应关系的区别\n\n### 定义\n\n| | 剂量-效应关系（Dose-Effect Relationship） | 剂量-反应关系（Dose-Response Relationship） |\n|---|---|---|\n| **对象** | **个体**机体 | **群体**（实验动物组） |\n| **纵坐标** | 毒效应**强度**（酶活性/血压值等，量化） | 出现某效应的**频率/百分比**（%，质化） |\n| **效应类型** | 量效应（graded effect） | 质效应（quantal effect） |\n| **曲线形状** | 双曲线或直线 | 非对称 S 形曲线（对数正态分布） |\n\n### 区别要点\n1. **个体 vs 群体**：效应→一只动物的指标变化；反应→一组动物中有多少百分比出现阳性结果\n2. **连续量 vs 有/无**：效应可以是任意数值；反应是\"死/活\"、\"有/无\"的二元判断\n3. **曲线转化**：将 S 形反应曲线纵坐标换成概率单位（Probit），横坐标取对数 → 直线，方便计算 LD₅₀\n\n### 两者联系\n两者均能定量描述毒物的毒性，是制定**安全剂量标准**的核心依据。LD₅₀ 来自剂量-反应关系。\n\n---\n\n## 第四题 · 物质蓄积与功能蓄积（损伤蓄积）的区别\n\n### 物质蓄积（Material Accumulation）\n- **定义**：反复接触后，化学物**本身**在体内的浓度或总量不断增加\n- **机制**：吸收速度 > 排泄速度，或化学物与组织结合稳定\n- **检测**：可直接测定体内该化学物含量\n- **例**：铅→蓄积于骨骼；DDT→蓄积于脂肪；镉→蓄积于肾脏\n\n### 功能蓄积（Functional / Damage Accumulation）\n- **定义**：化学物本身检测不到显著积累，但其**毒性效应/损伤**不断累积\n- **机制**：化学物代谢较快，体内浓度不高，但每次接触造成的功能损害不可完全修复\n- **检测**：体内化学物含量正常，但组织功能/形态已受损\n- **例**：有机磷抑制胆碱酯酶，每次抑制量虽少，但多次后总抑制率达到中毒水平\n\n### 毒理学意义\n功能蓄积比物质蓄积更隐蔽，**难以通过体内化学物浓度监测预警**，是慢性职业中毒的重要机制。\n\n---\n\n## 第五题 · 蓄积系数法判断联合作用类型\n\n### 方法：联合作用系数（Combination Index，CI 法）\n\n对于两种化学物 A 和 B：\n\n$$CI = \\frac{d_A}{D_A} + \\frac{d_B}{D_B}$$\n\n- $d_A$、$d_B$：联合用药时 A、B 各自产生相同效应所需剂量\n- $D_A$、$D_B$：A、B 单独产生相同效应的剂量\n\n| CI 值 | 联合作用类型 |\n|------|------------|\n| CI = 1 | 相加作用 |\n| CI < 1 | 协同作用（毒性增强） |\n| CI > 1 | 拮抗作用（毒性减弱） |\n\n### 方法二：等效线图（Isobologram）\n以 A 的剂量为横轴，B 的剂量为纵轴，连接各自产生 50% 效应的点→等效线。  \n- 实测点**落在等效线下方** → 协同  \n- **落在等效线上** → 相加  \n- **落在等效线上方** → 拮抗  \n\n---\n\n## 第六题 · 什么是联合作用？各类型特点及判断标准\n\n### 定义\n同时或先后接触**两种及以上**外源化学物，其综合毒性效应称为联合作用。\n\n### 四种类型详解\n\n| 类型 | 关系 | 公式 | 机制特点 | 实例 |\n|------|------|------|---------|------|\n| **相加作用** | 联合 = Σ单独 | CI = 1 | 相似作用机制，同一靶部位 | 苯+甲苯（均抑制中枢神经） |\n| **协同作用** | 联合 > Σ单独 | CI < 1 | 一种促进另一种的吸收/代谢激活/靶点敏化 | 吸烟+石棉→肺癌 |\n| **拮抗作用** | 联合 < Σ单独 | CI > 1 | 竞争受体/化学中和/代谢竞争/功能对抗 | 阿托品拮抗有机磷（竞争受体） |\n| **独立作用** | 各自独立，无叠加 | — | 作用机制/靶器官完全不同 | 苯（骨髓毒）+一氧化碳（血红蛋白） |\n\n### 增强作用（Potentiation）—— 特殊类型\n一种本身**无毒或低毒**的物质，与另一种毒物同用时**使后者毒性显著增强**。  \n例：异丙醇本身毒性低，与四氯化碳同用→肝毒性剧增。\n\n---\n\n## 第七题 · 生物转运与生物转化的区别\n\n### 生物转运（Biotransport）\n- **定义**：化学物经各种途径被机体**吸收、分布和排泄**的总称，属于位置的转移\n- **本质**：反复穿越生物膜，**化学结构不变**\n- **三步**：吸收（进入血液）→ 分布（随血流到组织）→ 排泄（由体内排出）\n\n### 生物转化（Biotransformation，代谢转化）\n- **定义**：化学物在体内发生**化学结构和理化性质的变化**\n- **本质**：化学结构改变，产生代谢产物（可能解毒，也可能活化增毒）\n- **主要场所**：肝脏（内质网的细胞色素P450系统）\n\n### 区别对比\n\n| | 生物转运 | 生物转化 |\n|---|---|---|\n| 变化类型 | 位置变化 | 化学结构变化 |\n| 化学物本身 | 不变 | 转变为新物质 |\n| 主要过程 | 吸收/分布/排泄 | 氧化/还原/水解/结合 |\n| 结果 | 毒物转运至靶部位或排出 | 活化（增毒）或解毒 |\n\n### 两相反应（生物转化的两阶段）\n- **I 相反应**（功能化反应）：氧化、还原、水解 → 引入活性基团（-OH、-NH₂）\n- **II 相反应**（结合反应）：与内源性分子结合（葡萄糖醛酸、硫酸等）→ 增大极性 → 易于排泄\n\n---\n\n## 第八题 · 毒物在体内的排泄途径及毒理学意义\n\n### 主要排泄途径\n\n#### ① 经肾脏排泄（最重要途径）\n三种机制：\n1. **肾小球滤过**：分子量 < 69000 的物质可通过；与血浆蛋白结合的毒物**不能通过**\n2. **肾小管重吸收**：非极性脂溶性物质→被重吸收回血液（延长毒物停留）；极性亲水→随尿排出\n3. **肾小管主动分泌**：有机阴/阳离子主动泵入尿液\n- **毒理学意义**：排泄时损害肾小管（如镉→近曲肾小管损伤）\n\n#### ② 经肝胆排泄（第二重要途径）\n- 极性大的化合物及结合型代谢物随胆汁入肠道\n- **肝肠循环**：脂溶性毒物在小肠重吸收→门静脉→回肝→再次随胆汁分泌→反复循环  \n  → **延长毒物在体内的停留时间，半衰期延长，毒性加大**\n- 例：甲基汞、铅、砷等在肝胆中蓄积\n\n#### ③ 经呼吸道排泄\n- 气态/挥发性毒物通过简单扩散由肺泡排出\n- 速率取决于**分压差和血/气分配系数**\n- 分配系数小的毒物→排出快（如苯、乙醚）\n\n#### ④ 其他排泄途径\n| 途径 | 排泄的化学物 | 毒理学意义 |\n|------|------------|-----------|\n| 乳腺 | 有机碱、亲脂性毒物（DDT、多氯联苯） | 母乳→婴儿暴露 |\n| 唾液/汗腺 | I⁻、Br⁻、F⁻、Hg | 口腔炎（汞）|\n| 头发/指甲 | 重金属（砷、汞、铅、镉） | 法医鉴定依据 |\n| 皮脂腺 | 脂溶性物质 | |\n\n### 排泄的毒理学意义\n1. 排泄是毒物**消除**的重要途径，排泄加快→毒性降低\n2. 排泄过程中毒物经过的器官可能受损（肾脏、肝脏、肠黏膜）\n3. 粪便、尿液、头发中的毒物含量可作为**生物监测指标**\n4. 肝肠循环延长半衰期，是慢性中毒的重要机制\n\n---\n\n## 附：高频考点速查表\n\n| 考点 | 核心记忆 |\n|------|---------|\n| 蓄积系数 K < 1 | 高度蓄积 |\n| LD₅₀ 越小 | 毒性越**大** |\n| 协同作用 | 联合 > 各自之和 |\n| 拮抗作用 | 联合 < 各自之和 |\n| 相加作用 | 联合 = 各自之和 |\n| 肝肠循环 | 半衰期↑，毒性↑ |\n| 被动扩散 | 最主要跨膜方式，不消耗能量，顺浓度 |\n| 主动转运五特点 | 逆浓度/耗能/需载体/有选择性/竞争抑制 |\n| 肾小球滤过 | 结合白蛋白的毒物**不能**通过 |\n| I 相反应 | 氧化还原水解（功能化） |\n| II 相反应 | 结合反应（解毒为主） |\n| lgc-t 斜率 | −k/2.303（非 −k！） |\n| T₁/₂ = | 0.693/K |\n| Vd = | 总药量/血药浓度 |\n\n---\n\n*整合来源：本地第三章完全复习资料 + 国家标准 WS/T 10011.4 毒理学术语 + 环境卫生学名词标准 + 多所高校毒理学课件*\n"}, {"id": "deepdive", "group": "例题精解 · 深化", "title": "核心例题 · 详解 · 图示", "md": "# 环境毒理学 · 核心例题精解 · 图示深化\n\n> 本篇为**深化层**：在「最终复习资料」之上，逐章给出**名词解释 / 简答 / 计算例题 + 参考答案**，并配**思维导图 / 机制示意图**（mermaid 矢量图，非纯文字）。\n> 毒理计算遵循\"先判指标 → 列公式 → 代入数据 → 得值与毒性分级\"四步。\n\n---\n\n## 全课知识结构 · 思维导图\n\n```mermaid\nmindmap\n  root((环境毒理学))\n    第1章 绪论\n      环境毒理学的概念与任务\n      毒物毒性与中毒\n      剂量与剂量反应关系\n      毒性参数 LD50 LC50 阈值\n      安全限值 ADI MAC\n    第2章 迁移与转化\n      污染物在环境中的迁移\n      生物转运 吸收分布排泄\n      生物转化 I相 II相反应\n      生物富集与放大\n      代谢活化与解毒\n    第3章 毒作用及机制\n      毒作用类型与分类\n      靶器官与损伤\n      自由基与氧化损伤\n      三致作用 致癌致畸致突变\n      影响毒性的因素\n```\n\n---\n\n## 第 1 章 · 绪论与基本概念\n\n### 原理示意 · 剂量–反应关系\n\n```mermaid\nflowchart LR\n    A[\"接触剂量\"] --> B[\"吸收剂量\"]\n    B --> C[\"靶器官剂量\"]\n    C --> D[\"生物学效应\"]\n    D --> E[\"剂量-反应/剂量-效应曲线 (常为S形)\"]\n    E --> F[\"求半数效应剂量 LD50 / LC50\"]\n```\n\n### 例题 1-1（名词解释）\n**题**：解释 LD₅₀、阈剂量、最大无作用剂量（NOAEL）。\n**参考答案**：\n- **LD₅₀（半数致死剂量）**：引起一群受试动物**半数（50%）死亡**所需的剂量，单位 $\\mathrm{mg/kg}$；数值越小，**急性毒性越强**。\n- **阈剂量（最小有作用剂量 LOAEL）**：能引起机体**可观察到的有害效应**的最低剂量。\n- **最大无作用剂量（NOAEL）**：在规定条件下，**未观察到任何有害效应**的最高剂量，是制定安全限值的基础。\n\n### 例题 1-2（简答）\n**题**：剂量–效应关系与剂量–反应关系有何区别？\n**参考答案**：\n- **剂量–效应关系**：剂量与**个体（或器官）某一量化效应强度**（如酶活性、体重变化）的关系，纵轴是**计量资料**。\n- **剂量–反应关系**：剂量与**群体中出现某一质反应的个体比例**（如死亡率%）的关系，纵轴是**计数/百分率**，曲线常呈 **S 形**。\n\n### 例题 1-3（计算 · 安全限值）\n**题**：某农药动物实验得 $\\mathrm{NOAEL}=10\\ \\mathrm{mg/(kg\\cdot d)}$，取安全系数 $SF=100$。求每日允许摄入量 ADI；若成人体重 $60\\ \\mathrm{kg}$，求每日允许总摄入量。\n**解**：\n1. $\\mathrm{ADI}=\\dfrac{\\mathrm{NOAEL}}{SF}=\\dfrac{10}{100}=0.1\\ \\mathrm{mg/(kg\\cdot d)}$。\n2. 每日允许总量 $=\\mathrm{ADI}\\times BW=0.1\\times 60=6\\ \\mathrm{mg/d}$。\n\n$$\\boxed{\\mathrm{ADI}=0.1\\ \\mathrm{mg/(kg\\cdot d)},\\quad 每日允许总摄入\\approx 6\\ \\mathrm{mg/d}}$$\n\n---\n\n## 第 2 章 · 污染物在环境中（机体内）的迁移与转化\n\n### 原理示意 · 生物转运与生物转化\n\n```mermaid\nflowchart TD\n    A[\"污染物进入机体\"] --> B[\"吸收 (消化道/呼吸道/皮肤)\"]\n    B --> C[\"分布 (血液-组织)\"]\n    C --> D[\"生物转化 肝脏为主\"]\n    D --> D1[\"I相反应 氧化还原水解 引入极性基团\"]\n    D --> D2[\"II相反应 结合反应 增大水溶性\"]\n    D1 --> E[\"代谢活化 毒性增强 或 解毒\"]\n    D2 --> F[\"排泄 肾/胆汁/肺\"]\n```\n\n### 例题 2-1（名词解释）\n**题**：解释生物转化的 I 相与 II 相反应；什么是\"代谢活化\"？\n**参考答案**：\n- **I 相反应**：**氧化、还原、水解**，向分子引入或暴露 $-OH$、$-NH_2$、$-COOH$ 等极性基团（主力为肝微粒体 **细胞色素 P450** 系统）。\n- **II 相反应**：**结合反应**（与葡萄糖醛酸、硫酸、谷胱甘肽等结合），显著增大**水溶性**，利于排泄、通常降低毒性。\n- **代谢活化**：少数外源化合物经生物转化后**毒性反而增强**（生成活性中间体，如苯并芘经 P450 活化为致癌的环氧化物），称代谢活化（生物活化）。\n\n### 例题 2-2（计算 · 生物富集系数 BCF）\n**题**：某有机污染物在水中浓度 $C_w=0.5\\ \\mathrm{\\mu g/L}$，鱼体内浓度 $C_b=2500\\ \\mathrm{\\mu g/kg}$。求生物富集系数 BCF（设 $1\\ \\mathrm{L}$ 水 $\\approx 1\\ \\mathrm{kg}$）。\n**解**：$BCF=\\dfrac{C_b}{C_w}=\\dfrac{2500}{0.5}=5000$。\n\n$$\\boxed{BCF=5000\\ (\\text{属高富集物质，}BCF>1000)}$$\n> 提示：BCF 越大，沿食物链**生物放大**风险越高，脂溶性强、难降解物（如 DDT、PCBs）尤甚。\n\n### 例题 2-3（简答）\n**题**：什么是生物富集、生物积累与生物放大？\n**参考答案**：\n- **生物富集**：生物**直接从环境介质**（水/土）中摄取并蓄积污染物，使体内浓度高于环境。\n- **生物积累**：生物在**整个生长期**内通过环境与食物**持续蓄积**，浓度随时间升高。\n- **生物放大**：污染物沿**食物链/食物网**逐营养级传递，**高营养级生物体内浓度显著高于低营养级**。\n\n---\n\n## 第 3 章 · 毒作用及其机制\n\n### 原理示意 · 自由基氧化损伤链\n\n```mermaid\nflowchart LR\n    A[\"外源化合物代谢\"] --> B[\"产生活性氧 ROS / 自由基\"]\n    B --> C[\"脂质过氧化 (膜损伤)\"]\n    B --> D[\"蛋白质氧化 (酶失活)\"]\n    B --> E[\"DNA 氧化损伤 (突变/致癌)\"]\n    C --> F[\"细胞结构功能障碍\"]\n    D --> F\n    E --> G[\"三致效应\"]\n```\n\n### 例题 3-1（名词解释）\n**题**：什么是\"三致作用\"？三者的关系如何？\n**参考答案**：指外源化合物的**致突变（致畸前提）、致癌、致畸**作用。\n- **致突变**：引起遗传物质 DNA 结构或数量改变；\n- **致癌**：诱发细胞恶性转化形成肿瘤；\n- **致畸**：作用于胚胎发育导致后代畸形。\n关系：**致突变常是致癌、致畸的分子基础**（体细胞突变→致癌；生殖细胞/胚胎期突变→致畸或遗传损害），故三者机制相互关联。\n\n### 例题 3-2（简答）\n**题**：影响化学物质毒性的主要因素有哪些？\n**参考答案**：① **化学物质因素**（结构、理化性质、纯度、脂/水溶性）；② **机体因素**（种属、性别、年龄、营养与健康、遗传与个体差异）；③ **接触条件**（剂量、途径、期限与频率）；④ **环境因素**（温度、湿度）；⑤ **联合作用**（相加、协同、拮抗、独立）。\n\n### 例题 3-3（计算 · 联合毒性判别）\n**题**：A、B 两毒物单独 LD₅₀ 分别为 $200$、$300\\ \\mathrm{mg/kg}$。混合后实测混合物 LD₅₀ 使等毒性配比下\"相加预期\"明显偏离：实测联合毒性指数 $K=\\dfrac{\\text{预期等效剂量}}{\\text{实测等效剂量}}=2.0$。判断联合作用类型。\n**解**：以相加作用为基准（$K\\approx1$）：\n- $K>1$（实测毒性 **强于** 相加预期）→ **协同作用**；\n- $K<1$ → **拮抗作用**；\n- $K\\approx1$ → **相加作用**。\n本题 $K=2.0>1$。\n\n$$\\boxed{K=2.0>1\\ \\Rightarrow\\ \\text{协同作用（毒性增强）}}$$\n\n---\n\n## 第 4–5 章 · 毒作用影响因素与常用实验方法\n\n### 流程示意 · 毒性测试与终点\n\n```mermaid\nflowchart LR\n    A[\"急性毒性试验\"] --> A1[\"求 LD50 / LC50 (毒性分级)\"]\n    B[\"蓄积毒性试验\"] --> B1[\"蓄积系数 K=ED50(慢)/ED50(急)\"]\n    C[\"亚慢性/慢性试验\"] --> C1[\"求 NOAEL / LOAEL\"]\n    D[\"致突变试验 (Ames等)\"] --> D1[\"遗传毒性筛查\"]\n```\n\n### 例题 4-1（计算 · 蓄积系数）\n**题**：某物质一次染毒 $LD_{50(急)}=100\\ \\mathrm{mg/kg}$；多次小剂量累积致半数死亡的总量 $ED_{50(累)}=300\\ \\mathrm{mg/kg}$。求蓄积系数 $K$ 并判断蓄积性。\n**解**：$K=\\dfrac{ED_{50(累)}}{LD_{50(急)}}=\\dfrac{300}{100}=3$。判别标准：$K<1$ 高度蓄积，$1\\le K<3$ 中等，$3\\le K<5$ 轻度，$K\\ge5$ 蓄积不明显。\n\n$$\\boxed{K=3\\ \\Rightarrow\\ \\text{轻度蓄积（处于轻度下限）}}$$\n\n### 例题 5-1（简答）\n**题**：Ames 试验的原理是什么？用于检测何种毒性？\n**参考答案**：Ames 试验以**鼠伤寒沙门氏菌组氨酸缺陷型突变株**为指示菌：受试物若有**致突变性**，可使菌株发生**回复突变**，恢复自行合成组氨酸的能力而在缺组氨酸培养基上生长成菌落，菌落数显著增多即为阳性。常加**S9 肝匀浆**模拟体内代谢活化。主要用于**致突变**（间接预测致癌）的快速筛查。\n\n---\n\n## 第 6–7 章 · 健康危险度评价与致癌物\n\n### 流程示意 · 健康危险度评价四步法\n\n```mermaid\nflowchart LR\n    A[\"1 危害鉴定<br/>定性: 是否有害\"] --> B[\"2 剂量-反应评定<br/>求 RfD/斜率因子SF\"]\n    B --> C[\"3 暴露评价<br/>求日均暴露量 ADD\"]\n    C --> D[\"4 危险度表征<br/>致癌风险/非致癌HQ\"]\n```\n\n### 例题 6-1（计算 · 致癌风险）\n**题**：某致癌物经口斜率因子 $SF=0.5\\ \\mathrm{(mg/(kg\\cdot d))^{-1}}$，人群终生日均暴露量 $ADD=2\\times10^{-5}\\ \\mathrm{mg/(kg\\cdot d)}$。求终生超额致癌风险 $R$，并对照可接受水平（$10^{-6}\\!\\sim\\!10^{-4}$）判断。\n**解**：低剂量近似 $R=SF\\times ADD=0.5\\times 2\\times10^{-5}=1\\times10^{-5}$。\n\n$$\\boxed{R=1\\times10^{-5}\\ \\in[10^{-6},10^{-4}]\\ \\text{(处于可接受区间内)}}$$\n\n### 例题 6-2（计算 · 非致癌危害商 HQ）\n**题**：某非致癌物参考剂量 $RfD=0.02\\ \\mathrm{mg/(kg\\cdot d)}$，实际日均暴露量 $ADD=0.05\\ \\mathrm{mg/(kg\\cdot d)}$。求危害商 $HQ$ 并判断风险。\n**解**：$HQ=\\dfrac{ADD}{RfD}=\\dfrac{0.05}{0.02}=2.5$。$HQ>1$ 表示暴露超过参考剂量，**存在非致癌健康风险**。\n\n$$\\boxed{HQ=2.5>1\\ \\Rightarrow\\ \\text{有非致癌风险，需采取控制措施}}$$\n\n### 例题 7-1（简答）\n**题**：常见化学致癌物可分为哪几类？举例说明\"间接致癌物\"。\n**参考答案**：按作用方式分**直接致癌物**（无需代谢活化即可致癌，如某些烷化剂）、**间接致癌物（前致癌物）**（须经体内代谢活化为终致癌物，如**苯并[a]芘**经 P450 活化、**黄曲霉毒素 B₁**、亚硝胺类）、**促癌物**（本身不致癌但促进肿瘤发展，如 TPA、苯巴比妥）。间接致癌物的典型代表是**苯并[a]芘**：经代谢活化生成二氢二醇环氧化物，与 DNA 共价结合形成加合物而引发突变。\n\n---\n\n> **正言若反**：参数不离机制，机制不离剂量，剂量不离原始 PDF 课件之图表数据。本篇为\"算得出、答得上\"的一层；遇疑，回归「最终复习资料」与逐页 PDF 原文核对实验条件与单位。\n"}, {"id": "ch-01", "group": "章节素材", "title": "第01章 绪论", "md": "# 环境毒理学 · 第 1 章 · 绪论 · 素材\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 章下 PDF: 1 个 · 总页: 40\n> 主版: 第 2 节 · 40 页\n\n---\n\n## 主版课件 · 第 2 节\n\n> `002-第一章绪论-第一章绪论.pdf`\n\n<details><summary>展开 40 页图链<\/summary>\n\n- [p001](../002-第一章绪论-第一章绪论/page_001.jpg)  · 环境毒理学\n- [p002](../002-第一章绪论-第一章绪论/page_002.jpg)  · 考核方式\n- [p003](../002-第一章绪论-第一章绪论/page_003.jpg)  · 基本概念\n- [p004](../002-第一章绪论-第一章绪论/page_004.jpg)  · 从上述本课程的内容可知，环境毒理学不仅是一门基础\n- [p005](../002-第一章绪论-第一章绪论/page_005.jpg)  · 第一章绪论\n- [p006](../002-第一章绪论-第一章绪论/page_006.jpg)  · 1.1环境毒理学及其发展\n- [p007](../002-第一章绪论-第一章绪论/page_007.jpg)  · 1.1环境毒理学及其发展\n- [p008](../002-第一章绪论-第一章绪论/page_008.jpg)  · 1.1环境毒理学及其发展\n- [p009](../002-第一章绪论-第一章绪论/page_009.jpg)  · 1.1环境毒理学及其发展\n- [p010](../002-第一章绪论-第一章绪论/page_010.jpg)  · 1.1环境毒理学及其发展\n- [p011](../002-第一章绪论-第一章绪论/page_011.jpg)  · 1.1环境毒理学及其发展\n- [p012](../002-第一章绪论-第一章绪论/page_012.jpg)  · 1.1环境毒理学及其发展\n- [p013](../002-第一章绪论-第一章绪论/page_013.jpg)  · 1.1环境毒理学及其发展\n- [p014](../002-第一章绪论-第一章绪论/page_014.jpg)  · 1.1环境毒理学及其发展\n- [p015](../002-第一章绪论-第一章绪论/page_015.jpg)  · 1.1环境毒理学及其发展\n- [p016](../002-第一章绪论-第一章绪论/page_016.jpg)  · 1.1环境毒理学及其发展\n- [p017](../002-第一章绪论-第一章绪论/page_017.jpg)  · 1.1环境毒理学及其发展\n- [p018](../002-第一章绪论-第一章绪论/page_018.jpg)  · 1.1环境毒理学及其发展\n- [p019](../002-第一章绪论-第一章绪论/page_019.jpg)  · 1.1环境毒理学及其发展\n- [p020](../002-第一章绪论-第一章绪论/page_020.jpg)  · 1.1环境毒理学及其发展\n- [p021](../002-第一章绪论-第一章绪论/page_021.jpg)  · 1.1环境毒理学及其发展\n- [p022](../002-第一章绪论-第一章绪论/page_022.jpg)  · 1.1环境毒理学及其发展\n- [p023](../ \n\n**p007** ![](../002-第一章绪论-第一章绪论/page_007.jpg)\n\n1.1环境毒理学及其发展\n环境毒理学的概念\n环境毒理学（environmentaltoxicology）是研究环境物理性、\n化学性和生物污染物，特别是环境化学性污染物对人类健康的\n毒性作用及其机理的科学。\n环境毒理学不仅要研究环境污染物对人类个体健康的毒性\n作用，更要研究污染物对人群健康的毒性作用及其防治对策，\n还要研究化学物通过人类的食物网对人类健康造成危害及其防\n护。\n\n---\n\n**p008** ![](../002-第一章绪论-第一章绪论/page_008.jpg)\n\n1.1环境毒理学及其发展\n环境毒理学的概念\n环境毒理学也称为“环境健康毒理学” (toxicologyinenvironmentalhealth，或者environmentalhealthtoxicology）。\n环境污染物对人类健康的效应称为：“环境毒理效应”或\n“环境健康毒理效应”属于“健康毒理效应”的范畴。\n\n---\n\n**p009** ![](../002-第一章绪论-第一章绪论/page_009.jpg)\n\n1.1环境毒理学及其发展\n我国环境污染比较严重，雾霾、水体富营养化、土壤重金属等\n污染对环境中的生物尤其对人体造成损害\n环境毒理学是研究环境污染物，特别是化学污染物对生物有机\n体，尤其是人体的损害作用及其机理的学科。\n1.研究环境污染物对生物个体的损害作用\n2.研究污染物对生物群体、生态系统甚至特定环境下的整个生\n物社会的损害作用及其防治对策\n\n---\n\n**p010** ![](../002-第一章绪论-第一章绪论/page_010.jpg)\n\n1.1环境毒理学及其发展\n环境毒理学的概念一环境污染物\n环境污染物是指由于人为的或自然的原因进入环境并使环\n境的正常组成和性质发生改变、直接或间接有害于人类与其他\n生物的物质。\n环境污染物的种类繁多，包括物理性、化学性和生物性污\n染物，可分为：人为的和自然的两大类。其中，由于人类生产\n和生活活动造成的人为污染物是主要的。\n\n---\n\n**p011** ![](../002-第一章绪论-第一章绪论/page_011.jpg)\n\n1.1环境毒理学及其发展\n污染物（Pollutant）-生产性污染物和生活污染物\n生产性污染物：指在工业生产、农业生产等各种生产活动过\n程中产生的对环境和人体健康有害的物质。\n（工、农业废水、废气、废渣）\n生活污染物：指在人们日常生活活动中产生的污染物，主要\n来源于居民的生活消费、市政设施运行等过程。\n（生活垃圾、生活污水）\n\n---\n\n**p012** ![](../002-第一章绪论-第一章绪论/page_012.jpg)\n\n1.1环境毒理学及其发展\n污染物（Pollutant）-一次污染物和二次污染物\n一次污染物：又称“原生污染物”，是指由污染源直接排\n入环境，其物理和化学性状未发生变化的污染物。\n二次污染物：指进人大气的一次污染物之间相互作用或一次\n污染物与正常大气组分发生化学反应，以及在太阳辐射线的\n参与下引起光化学反应而产生的新的污染物\n二次污染物常比一次污染物对环境和人体的\n危害更为严重。\n\n---\n\n**p013** ![](../002-第一章绪论-第一章绪论/page_013.jpg)\n\n1.1环境毒理学及其发展\n污染物（Pollutant）-优先污染物（PriorityPollutant）\n指在众多的污染物中筛选出的潜在危险大的作为优先研究\n和控制对象的污染物，亦称优先控制污染物。\n主要针对下列污染物：有毒有机化学污染物、生物难降解性\n物质、具有生物积累性、三致性（致畸、致癌、致突变）的污\n染物、残留水平高、毒性大\n中国：中国水中优先控制污染物黑名单包括卤代烃如二氯甲烷、三氯甲烷等；苯\n系物如苯、甲苯等；氯代苯类如氯苯、邻二氯苯等；多氯联苯类；酚类如苯酚、间\n甲酚等；硝基苯类如硝基苯、对硝基苯等；苯胺类：多环芳烃如萘、苯并花等；酞\n酸酯类如酞酸二甲酯、酞酸二丁酯等；农药如六六六、敌敌畏等；丙烯晴；亚硝胺\n类如N-亚硝基二乙胺等；氰化物；重金属及其化合物。\n\n---\n\n**p014** ![](../002-第一章绪论-第一章绪论/page_014.jpg)\n\n1.1环境毒理学及其发展\n环境污染的分类\n废气污染\n生物污染\n废水污染\n按污染物性质√化学污染 按污染物形态√固体废弃物污染\n物理污染 噪声污染\n辐射污染\n物理性污染物：电离辐射、电磁辐射、光污染及噪声污染等。\n生物性污染物：细菌、病毒、寄生虫及生物毒素等。\n化学性污染物：工业化学品、农用化学品、食品添加剂及日用化学\n环境化学污染物是环境污染物中种类最多、污染最严重、分布最广、对人类\n健康危害最严重的物质，所以环境化学污染物是环境毒理学的主要研究对象，也\n称为环境化学物。\n\n---\n\n**p015** ![](../002-第一章绪论-第一章绪论/page_015.jpg)\n\n1.1环境毒理学及其发展\n污染物的自然来源（NaturalSource）：自\n然界向环境排放，如：活动的火山或矿床；\n污染物的人为来源（ArtificialSource）：\n来自人类活动，影响范围广、危害大，如工\n业三废\n农业 交通 工业\n\n---\n\n**p016** ![](../002-第一章绪论-第一章绪论/page_016.jpg)\n\n1.1环境毒理学及其发展\n污染源（PollutionSource）\n工业污染源\n农业污染源\n交通运输污染源\n生活污染源\n\n---\n\n**p017** ![](../002-第一章绪论-第一章绪论/page_017.jpg)\n\n1.1环境毒理学及其发展\nUnvenin\n据统计，2009年美国化学学会美国化学文摘社（CAS）登记的化学污染物质\n已达5000万中。\n据估计当今已有10万余种化学污染物质进入了生态系统，其中常用化学污染\n物质有7万余种。\n这些化学污染物质在给我们的生活带来方便的同时，也对生态环境及人类健\n康构成了严重的威胁。\n\n---\n\n**p018** ![](../002-第一章绪论-第一章绪论/page_018.jpg)\n\n1.1环境毒理学及其发展\n关于环境毒理学概念中的环境：\n环境毒理学研究的“环境”是人类环境。人类环境（或人类的环境）是指以\n人类为主体的外部环境，即围绕人类的所有生物的和非生物的因素所组成的环境\n它与人类的生存和健康密切相关。\n\n---\n\n**p019** ![](../002-第一章绪论-第一章绪论/page_019.jpg)\n\n1.1环境毒理学及其发展\nUnvenin\n环境污染的特点：\n·影响范围大\n·作用时间长\n污染物浓度低、情况复杂\n污染容易、治理难\n\n---\n\n**p020** ![](../002-第一章绪论-第一章绪论/page_020.jpg)\n\n1.1环境毒理学及其发展\n环境毒理学就是研究环境毒性对人类健康的毒性作用及其机\n理的科学。\n\n---\n\n**p021** ![](../002-第一章绪论-第一章绪论/page_021.jpg)\n\n1.1环境毒理学及其发展\n环境毒理学的发展\n汉朝刘安所著《淮南子·修务训》中记载：\n神农乃始教民，尝百草之滋味，一日而遇七十毒\n汉末《神农木草经》中：\n共记载了365种药物，并将药物按其功用分为上品、中\n品和下品三类，上品药是指无毒，可以久服的药物，中品\n药是指防治一般疾病的药物，下品药指有毒的药物，不可\n久服。\n明朝《本草纲目》中：\n有关于铅危害的描述：“铅生山穴之间，其气毒人，\n若连月不出，则皮肤萎黄，腹胀不能食，多致病而死。”\n\n---\n\n**p022** ![](../002-第一章绪论-第一章绪论/page_022.jpg)\n\n1.1环境毒理学及其发展\n占希腊医生Dioscorrides（公元50-100年）把毒物分成\n植物毒素、动物毒素和金属毒物三大类，并尝试用催吐药\n来治疗中毒，用腐蚀剂和杯吸法来治疗毒蛇咬伤。\n瑞士医生Paracelsus（1499-1541）对近代毒理学的产\n生和发展做出了杰出贡献，主要包括：\n①提出了毒物是化学物的概念；\n②提出了检测生物体对化学物的反应需进行实验观察\n和研究的科学方法；\n③强调了治疗作用和毒性作用的区别；\n④提出了“所有物质都是毒物，没有物质不是毒物，\n唯一的区别是它们的剂量”的学术观点。\n\n---\n\n**p023** ![](../002-第一章绪论-第一章绪论/page_023.jpg)\n\n1.1环境毒理学及其发展\nAll substances are poisons, there isnone which is nota poison. The rightdose differentiates a poison andremedy.\nNo substance isa poisonby itself.Itisthe dosethatmakesasubstanceapoison. Parcelsus\n所有物质都是毒物，没有不是毒物的物\n质，唯有剂量使之区分为毒物还是药物。\n物质本身不是并非毒物，主要是剂量才\n使一个物质变成毒物。 抛开剂量谈毒性都是要流氓\n\n---\n\n**p024** ![](../002-第一章绪论-第一章绪论/page_024.jpg)\n\n1.1环境毒理学及其发展\n18世纪西班牙化学家和生理学家MattienOrifila（1787-1853）是现代毒理学的奠\n基人，他提出了毒理学的定义，并把当\n时认为有毒的物质用数千只狗进行试验，\n系统地观察了化学物质和生物体间的关\n系，以及将这些化学品从体内排除和用\n解毒药处理的机制。\n生理学家ClaudeBernard（1813-1878）\n开创了利用动物受控实验以探索毒作用\n机制的实验室研究方法。\n\n---\n\n**p025** ![](../002-第一章绪论-第一章绪论/page_025.jpg)\n\n1.1环境毒理学及其发展\n现代毒理学的分支学科\n按照知识结构：理论毒理学、实验毒理学\n从生物学角度：昆虫毒理学、动物毒理学、\n植物毒理学、微生物毒理学等\n从应用领域和行业角度：环境毒理学、地\n理毒理学、工业毒理学、农业毒理学、食\n品毒理学、药物毒理学、放射毒理学等\n\n---\n\n**p026** ![](../002-第一章绪论-第一章绪论/page_026.jpg)\n\n1.1环境毒理学及其发展\n表1-1八大公害事件\n时间 地点 主要污染物 中毒人数\n1930 马斯河谷 SO2/氟化物/粉尘 死亡60人\n1948 多诺拉城 SO2、金属粉尘 死亡17人\n1956 伦敦 SO2、烟尘 4000余人死亡\n1943 洛杉矶 光化学烟尘 全市1/2人患红眼病\n400余人死亡\n1955 富山县 镉 患病258人，死128人\n1953 水、新泻 甲基汞 患病2000余人，死352人\n1968 日本安知 多氯联苯 中毒1684人，死30余人\n1960 日本四日 SO2、烟尘、 患病800余人，死36人\n石油化工废气\n环境污染及其危害推动了环境毒理学的诞生\n\n---\n\n**p027** ![](../002-第一章绪论-第一章绪论/page_027.jpg)\n\n1.1环境毒理学及其发展\n环境毒理学\n生态毒理学 在本课程中，倾向于不将两者分开\n现代环境毒理学实验对象包括啮齿类动物、鸟类、鱼类等生\n态系统的组成成分。\n环境污染物的人体暴露评价\n食物链上其他物种的暴露情况\n化学污染物通过食物链的传递在不同营养层次生物产生的效\n应\n现代环境毒理学和生态毒理学研究的区别日益模糊\n\n---\n\n**p028** ![](../002-第一章绪论-第一章绪论/page_028.jpg)\n\n1.2环境毒理学的研究对象、主要任务和内容\n一、环境毒理学的研究对象\n环境毒理学的研究对象是对各种生物特别是对人体产生危\n害的各种环境污染物，包括物理性、化学性、生物性及新型污\n污染物，其中以环境化学物为主要研究对象。\n抗生素\n持久性有机污染物 内分泌干扰物 抗生 微型科\n新型污染物：指那些在环境中出现时间相对较短，或者过去未被广泛关注\n但随着经济社会发展和科学研究深入，逐渐被认识到对生态环境和人体健康\n具有潜在危害的污染物。\n新型污污染物特定：持久性、生物累积性、潜在危害大、来源广泛。\n\n---\n\n**p029** ![](../002-第一章绪论-第一章绪论/page_029.jpg)\n\n1.2环境毒理学的研究对象、主要任务和内容\n一、环境毒理学的研究对象\n外源化学物（xenobiotic）不是人体的组成成分，也非人体\n所需的营养物质或维持正常生理功能所必须得物质，但他们可\n通过一定的途径与人体接触并从环境中进入人体，从而产生一\n定的生物学作用。\n\n---\n\n**p030** ![](../002-第一章绪论-第一章绪论/page_030.jpg)\n\n1.2环境毒理学的研究对象、主要任务和内容\n二、环境毒理学的主要任务\n研究环境污染物及其在环境中的降解和转化产物对机体造\n成的损害和作用机理。\n探索环境污染物对人体健康报害的早期观察指标。\n定量评定有毒环境污染物对机体的影响，为制定环境卫生\n标准提供依据。\n环境毒理学的最终任务是保护包括人类在内的各种生物的\n生存和持续健康的发展。\n\n---\n\n**p031** ![](../002-第一章绪论-第一章绪论/page_031.jpg)\n\n1.2环境毒理学的研究对象、主要任务和内容\n三、环境毒理学的主要研究内容\n环境毒理学的概念、基础理论\n环境污染物及其在环境中的降解和转化产物对机体相互作\n用的一般规律，包括毒物在体内的吸收、分布和排泄等生\n物转运和生物转化过程，剂量与作用的关系，毒物化学结\n构和毒性及影响毒作用的因素。\n③环境污染物毒性评定方法。\n重要的环境污染物和有害独立因素对机体的危害及其作用\n机理。\n\n---\n\n**p032** ![](../002-第一章绪论-第一章绪论/page_032.jpg)\n\n1.3环境毒理学的研究方法\n环境毒理学的研究法\n环境毒理学的研究方法随研究目的和对象的不同而异。以模\n式动物、模式植物、模式微生物，尤其常以哺乳类动物、培养的\n哺乳动物细胞为主要研究模式生物，进行体内研究和体外试验。\n二、常用研究方法 动物试验\n整体动物试验 体外试验\n(in vivo) (in vitro)\n（一）动物试验\n般毒性 特殊毒性 微生物 哺乳动物\n试验 试验 试验 试验\n临床观察 急性毒性 致突变 致突变 器官水平\n亚慢性毒性 致癌 组织水平\n慢性毒性 致畸 细胞水平 亚细胞水平\n（三）流行病学调查 分子水平\n\n---\n\n**p033** ![](../002-第一章绪论-第一章绪论/page_033.jpg)\n\n1.3环境毒理学的研究方法\n1.体内试验\n体内试验多在整体动物中进行，也称整体动物实验。按\n人体可能接触的剂量和途径使实验动物在一定时间内接触环\n境污染物，然后观察动物出现的形态和功能的变化。\n一般采用的实验动物有大鼠、小鼠、家\n兔、豚鼠、仓鼠、狗、猴等哺乳类动物。\n仓鼠\n小鼠 大鼠\n狗\n家兔 脉鼠\n整体动物实验不仅可以反映环境污染物的综合生物学\n效应，还可以反映在动物整体状态下环境污染物引起的各\n种不同生物学效应。\n\n---\n\n**p034** ![](../002-第一章绪论-第一章绪论/page_034.jpg)\n\n1.3环境毒理学的研究方法\n2.体外试验\n又分为器官水平、组织水平、细胞水平、亚细胞水平、分子水平试验。\n器官水平：利用器官灌流技术，将化学物经过血管流经特定的脏器，观察\n环境污染物在脏器内的代谢转化和毒性作用。\n细胞水平：将某种脏器从体内取出再制成原代游离细胞，进行环境污染物\n对细胞毒性作用的研究。采用离心技术，将细胞器或组分分离纯化，研究环境\n污染物对这些亚细胞组分的毒性作用。\n从人或动物的组织 切片中取下小片样品\n蛋白酶酶解，消化 组织中的胶原纤维和\n细胞外的其他成分， 获得单个的成纤维\n细胞县浮液\n千二氧化碳培养箱 中保温培养\n转入特殊培养液中 进行原代培养\n将原代细胞 分要到多个扁形瓶中\n进行继代培养 体外原代细胞试验 体外细胞株试验\n\n---\n\n**p035** ![](../002-第一章绪论-第一章绪论/page_035.jpg)\n\n1.3环境毒理学的研究方法\n二、环境毒理学的实际应用\n（一）环境毒理学在环境监测中的应用\n1.现场环境的生物监测\n2.环境样品的生物测试\n（二）环境毒理学在环境风险评价方面的应用\n1.在建设项目环境风险评价中的应用\n2.在化学物品的环境风险评价中的应用\n（三）环境毒理学在环境健康危险度评价各个阶段的应用\n（可用于环境疾病病因的探讨，如水误病、痛痛病等）\n\n---\n\n**p036** ![](../002-第一章绪论-第一章绪论/page_036.jpg)\n\n1.4环境毒理学的发展趋势\n研究更加深入\n体外细胞、分子水平的毒性测试与人体志愿者试验相结合的\n新模式。\n二、研究水平进一步提高\n环境毒理学的研究方法和手段大大提高。\n三、多种方法相结合评价化学物毒性\n环境毒理学工作者必将担负起保护生态平衡、保障人类健康\n的使命，为保护和建设人类的地球家园做出贡献。\n\n---\n\n**p037** ![](../002-第一章绪论-第一章绪论/page_037.jpg)\n\n第一章绪论\n1.环境毒理学的研究对象是？\nA.细菌\nB.环境污染物\nC.病毒\nD.人群\n\n---\n\n**p038** ![](../002-第一章绪论-第一章绪论/page_038.jpg)\n\n第一章绪论\n2.环境污染的特点是什么？\nA.影响范围大\nB.作用时间长\nC.污染物浓度低、情况复杂\nD.污染容易、治理难\n\n---\n\n**p039** ![](../002-第一章绪论-第一章绪论/page_039.jpg)\n\n第一章绪论\n3.环境化学污染物简称环境化学物？\n\n---\n\n**p040** ![](../002-第一章绪论-第一章绪论/page_040.jpg)\n\n第一章绪论\n定义：利用毒理学方法研究环境中有毒化学物质对人体健康影响及规律\n环境毒理学的基本概念 发展历程：起源于古代对毒物的认识，20世纪60年代成为独立学科\n学科地位：是环境科学和生态毒理学重要组成部分\n研究对象：化学、物理、生物类环境污染物\n研究对象、任务和内容 主要任务：研究损害和机理、探索早期指标、评定影响井确定关系\n主要内容：包括基础理论、相互作用规律、毒性评定方法等\n研究方法：动物试验（体内、体外）与流行病学调查结合\n研究方法及应用 在环境监测中的应用：现场生物监测和环境样品生物测试\n在风险评价中的应用：建设项目、化学物品风险评价等方面\n研究层面深入：应用替代体系、基因引入技术等深入研究\n发展趋势 研究水平提高：引入多学科方法，应用生物标记物等技术\n多种方法结合：建立新方法，多种方法结合评价化学物毒性\n\n---\n\n<\/details>\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 绪论\n## 核心概念\n- 环境毒理学（environmental toxicology）\n- 环境污染物\n- 一次污染物（原生污染物）\n- 二次污染物\n- 优先污染物（Priority Pollutant）\n- 外源化学物（xenobiotic）\n- 新型污染物\n- 环境毒理效应/环境健康毒理效应\n## 关键公式 / 模型\n- Paracelsus 剂量定律\n- 环境污染分类模型\n- 环境毒理学研究方法体系\n## 高频考点\n- 环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康 → 毒性作用及机理\n- 环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环境毒理学主要研究对象，简称环境化学物\n- 污染源四类：工业、农业、交通运输、生活\n- 环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难\n- 环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n- 研究方法：体内试验（整体动物实验：急性/亚慢性/慢性毒性）+ 体外试验（器官/组织/细胞/亚细胞/分子水平）+ 流行病学\n- 环境毒理学应用三领域：环境监测（现场生物监测+环境样品生物测试）、环境风险评价（建设项目+化学物品）、环境健康危险度评价\n- 发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((绪论))\n    核心概念\n      环境毒理学（environmental toxicology）\n      环境污染物\n      一次污染物（原生污染物）\n      二次污染物\n      优先污染物（Priority Pollutant）\n      外源化学物（xenobiotic）\n      新型污染物\n      环境毒理效应/环境健康毒理效应\n    关键公式 / 模型\n      Paracelsus 剂量定律\n      环境污染分类模型\n      环境毒理学研究方法体系\n    高频考点\n      环境毒理学定义三要素：环境污染物（特别是化学污染物）→ 人类健康…\n      环境化学污染物是种类最多、污染最严重、分布最广、危害最严重的，是环…\n      污染源四类：工业、农业、交通运输、生活\n      环境污染四大特点：影响范围大、作用时间长、污染物浓度低/情况复杂、…\n      环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③…\n      研究方法：体内试验（整体动物实验：急性/亚慢性/慢性毒性）+ 体外…\n      环境毒理学应用三领域：环境监测（现场生物监测+环境样品生物测试）、…\n      发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（…\n```\n\n## 复习要点\n\n### 一、核心概念（名词解释）\n\n- [x] **环境毒理学（environmental toxicology）**：研究环境物理性、化学性和生物污染物，特别是环境化学性污染物对人类健康的毒性作用及其机理的科学。也称\"环境健康毒理学\"。\n- [x] **环境污染物**：由于人为或自然原因进入环境并使环境的正常组成和性质发生改变、直接或间接有害于人类与其他生物的物质。\n- [x] **一次污染物（原生污染物）**：由污染源直接排入环境，其物理和化学性状未发生变化的污染物。\n- [x] **二次污染物**：一次污染物之间或与正常大气组分发生化学反应（含光化学反应）而产生的新污染物，常比一次污染物危害更严重。\n- [x] **优先污染物（Priority Pollutant）**：在众多污染物中筛选出的潜在危险大的作为优先研究和控制对象的污染物，亦称优先控制污染物。针对有毒有机化学污染物、生物难降解性物质、具有生物积累性、三致性（致畸、致癌、致突变）的污染物。\n- [x] **外源化学物（xenobiotic）**：不是人体组成成分，也非人体所需营养物质，但可通过一定途径与人体接触并从环境中进入人体，产生一定生物学作用的物质。\n- [x] **新型污染物**：在环境中出现时间相对较短，或过去未被广泛关注但逐渐被认识到对生态环境和人体健康具有潜在危害的污染物。特点：持久性、生物累积性、潜在危害大、来源广泛。包括持久性有机污染物、内分泌干扰物、抗生素、微型塑料等。\n- [x] **环境毒理效应/环境健康毒理效应**：环境污染物对人类健康的效应，属于\"健康毒理效应\"的范畴。\n\n### 二、关键公式 / 模型\n\n- **Paracelsus 剂量定律**：\"所有物质都是毒物，没有物质不是毒物，唯一的区别是它们的剂量\"——抛开剂量谈毒性都是耍流氓。这是毒理学最根本的原理。\n- **环境污染分类模型**：按污染物性质→化学污染、物理污染、生物污染；按污染物形态→废气、废水、固体废弃物、噪声、辐射污染。\n- **环境毒理学研究方法体系**：体内试验（in vivo）+ 体外试验（in vitro）+ 流行病学调查，三个层次互补。\n\n### 三、重要案例 / 实验 / 例题\n\n- **八大公害事件**（必考）：\n  1. 1930 马斯河谷事件（SO₂/氟化物/粉尘，死亡60人）\n  2. 1948 多诺拉城事件（SO₂/金属粉尘，死亡17人）\n  3. 1956 伦敦烟雾事件（SO₂/烟尘，4000余人死亡）\n  4. 1943 洛杉矶光化学烟雾事件（光化学烟尘，半数人患红眼病）\n  5. 1955 富山县痛痛病事件（镉，患病258人死128人）\n  6. 1953 水俣病/新泻事件（甲基汞，患病2000余人死352人）\n  7. 1968 米糠油事件（多氯联苯，中毒1684人死30余人）\n  8. 1960 四日市哮喘事件（SO₂/烟尘/石油化工废气，患病800余人死36人）\n- **毒理学发展史关键人物**：Paracelsus（提出毒物是化学物+剂量定律）、Orifila（现代毒理学奠基人）、Bernard（开创动物受控实验）。\n- **中国水中优先控制污染物黑名单**：卤代烃、苯系物、氯代苯类、多氯联苯类、酚类、硝基苯类、苯胺类、多环芳烃、酞酸酯类、农药、丙烯腈、亚硝胺类、氰化物、重金属及其化合物。\n\n### 四、高频考点（速记）\n\n1. 环境毒理学定义三要素：**环境污染物**（特别是化学污染物）→ **人类健康** → **毒性作用及机理**\n2. 环境化学污染物是**种类最多、污染最严重、分布最广、危害最严重**的，是环境毒理学**主要研究对象**，简称环境化学物\n3. 污染源四类：**工业、农业、交通运输、生活**\n4. 环境污染四大特点：**影响范围大、作用时间长、污染物浓度低/情况复杂、污染容易治理难**\n5. 环境毒理学三大任务：①研究污染物损害及机理 ②探索早期观察指标 ③定量评定影响（为制定卫生标准提供依据）\n6. 研究方法：**体内试验**（整体动物实验：急性/亚慢性/慢性毒性）+ **体外试验**（器官/组织/细胞/亚细胞/分子水平）+ **流行病学调查**\n7. 环境毒理学应用三领域：**环境监测**（现场生物监测+环境样品生物测试）、**环境风险评价**（建设项目+化学物品）、**环境健康危险度评价**\n8. 发展趋势三方向：研究更深入（体外+人体志愿者结合）、研究水平提高（生物标记物等）、多种方法结合评价\n\n### 五、思考题 / 自测\n\n- [x] 题：环境毒理学的研究对象是什么？ 答：B.环境污染物（包括物理性、化学性、生物性及新型污染物，以环境化学物为主）\n- [x] 题：环境污染的特点？ 答：ABCD全选——影响范围大、作用时间长、浓度低/情况复杂、污染容易治理难\n- [x] 题：一次污染物与二次污染物的区别？ 答：一次污染物直接排放、性状未变；二次污染物是一次污染物经化学反应（含光化学反应）产生的新污染物，危害通常更严重\n- [x] 题：为什么环境化学污染物是环境毒理学的主要研究对象？ 答：种类最多、污染最严重、分布最广、对人类健康危害最严重\n\n### 六、与前后章之关联\n\n- 承前章：本章为绪论，奠定基本概念框架\n- 启后章：第2章\"污染物在环境中的迁移和转化\"深入讨论污染物在环境中的行为；第3-4章讨论毒作用及影响因素；第5章讨论实验方法；第6-7章讨论安全评价与致癌物\n"}, {"id": "ch-02", "group": "章节素材", "title": "第02章 污染物在环境中的迁移和转化", "md": "# 环境毒理学 · 第 2 章 · 污染物在环境中的迁移和转化 · 素材\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 70\n> 主版: 第 4 节 · 35 页\n\n---\n\n## 主版课件 · 第 4 节\n\n> `004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化.pdf`\n\n<details><summary>展开 35 页图链<\/summary>\n\n- [p001](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_001.jpg)  · 环境毒理学\n- [p002](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_002.jpg)  · 第二章污染物在环境中的迁移和转化\n- [p003](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_003.jpg)  · 2.1概述\n- [p004](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_004.jpg)  · 2.1概述\n- [p005](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_005.jpg)  · 2.2环境污染物的迁移\n- [p006](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_006.jpg)  · 2.2环境污染物的迁移\n- [p007](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_007.jpg)  · 2.2环境污染物的迁移\n- [p008](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_008.jpg)  · 2.2环境污染物的迁移\n- [p009](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_009.jpg)  · 2.2环境污染物的迁移\n- [p010](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_010.jpg)  · 2.2环境污染物的迁移\n- [p011](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_011.jpg)  · 2.2环境污染物的迁移\n- [p012](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_012.jpg)  · 2.2环境污染物的迁移\n- [p013](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_013.jpg)  · 2.2环境污染物的迁移\n- [p014](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_014.jpg)  · 2.2环境污染物的迁移\n- [p015](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_015.jpg)  · 2.2环境污染物的迁移\n- [p016](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_016.jpg)  · 2.2环境污染物的迁移\n- [p017](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_017.jpg)  · 2.2环境污染物的迁移\n- [p018](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_018.jpg)  · 2.2环境污染物的迁移\n- [p019](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_019.jpg)  · 2.3环境污染物的转化\n- [p020](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_020.jpg)  · 2.3环境污染物的转化\n- [p021](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_021.jpg) nsportofpollutants)就\n是指污染物在环境中发生的空间位置的相对改变的\n过程。\n气的机械性迁移作用\n水的机械性迁移作用\n机械性迁移\n迁移方式 物理化学性迁移\n重力的机械性迁移作用\n生物性迁移\n\n---\n\n**p006** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_006.jpg)\n\n2.2环境污染物的迁移\n（一）气的机械性迁移作用\n扩散+气流搬运\n1．扩散迁移\n大气圈按垂直分布可分为五层：对流层、平流层、中间\n层、暖层和散逸层。不同层次对污染物的扩散作用不同。\n大气重直分层 483KM 散逸层\n(1)风力扩散\n棋具\n(2)气流扩散\n中间层\n(3)湍流扩散\n臭氧层 平流层\n对流层\n\n---\n\n**p007** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_007.jpg)\n\n2.2环境污染物的迁移\n影响大气污染物扩散的因素\n正常晴朗大气（下眼上冷） 什么天气会使污染 逆温大气（下冷上暖）\n①大气稳定度 NO. 污染物洁动规小\n在对流层内，气温随海拔高度的增加 PM2.5\nPM10\n而逐渐降低，因此一般情况下，上层空气冷\n而下层暖，下层暖空气有受热膨胀上升的趋\n势，此时大气在垂直方向不稳定，对流显著\n有利于污染物的气流扩散，进而引发风力扩 Z/m 100\n散和湍流扩散逆温现象：上层空气暖而下层\n冷的现象。大气稳定度高，对流作用大为减 稳状态（波浪形\n弱，污染物无法随空气运动扩散秋冬季节中\n国北方的雾霾 .98 中稳状态（锥形）\n②地理地势 0.98\n稳定状态（扇形）\n高耸的山脉会阻滞空气流动，降低风\n速，改变风向。城市中的高层建筑区，如未\n0.98 下层稳定上层不稳定（屋脊形）\n设计合路通道，气流只能在高层建筑间的小 100K\n范围内产生涡流，污染物也无法迅速扩散，\n下层不稳上层稳定（重烟形）\n只能停滞在该地段，引发污染的加剧。\n\n---\n\n**p008** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_008.jpg)\n\n2.2环境污染物的迁移\n2.干沉降和湿沉降\n酸化污染物\n湿沉降\n千沉降\n自然来源\n沉降是由于分散相和分散介质的密度不同，分散相粒子在\n力场（重力场或离心力场）作用下发生的定向运动。沉降是\n大气颗粒物主要消除过程之一，按照沉降过程是否需要降水\n冲刷，又可分为干沉降和湿沉降。\n\n---\n\n**p009** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_009.jpg)\n\n2.2环境污染物的迁移\n（二）水的机械性迁移作用\n水的机械性迁移作用能够使污染物在不同环境介\n质中发生迁移。\n水流\n降水\n（三）重力的机械迁移作用\n重力的机械迁移作用是指污染物及其搬运载体在\n重力作用下的迁移运动\n除了上述三种机械迁移作用之外，在社会生产和物\n质流通过程中，各种人为的机械搬运污染物的行为已成为\n污染物迁移的重要方式之一。\n\n---\n\n**p010** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_010.jpg)\n\n2.2环境污染物的迁移\n二、物理-化学性迁移\n物理-化学性迁移是指元素及其化合物在环境中\n物理化学作用所实现的迁移。\n吸附-解吸、溶解（或絮凝）-沉\n无机化合物 淀、氧化-还原、水解、络合和\n鳌合等作用\n除以上的作用外，还可通过化学\n有机化合物 分解、光化学分解、生化分解和\n聚合作用等\n\n---\n\n**p011** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_011.jpg)\n\n2.2环境污染物的迁移\n（一）风化淋溶作用\n环境中的水在重力作用下运动时，可以通过水\n解作用将岩石、矿物中的化学元素溶入到水中的过\n程，称为风化淋溶作用。\n产生\n游离态的元素离子\n疾病的发病率和由于环境中风化淋溶作用所导致的某\n种元素过多或缺乏有着密切联系。\n\n---\n\n**p012** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_012.jpg)\n\n2.2环境污染物的迁移\n（二）溶解挥发作用\n大气中的SO2\n溶解作用是一切可溶性污染物污染环 吸收\n境的一种基本方式。例如在大气环境中 降水 烧 燃烧\n生产者 摄入 消费者\n二氧化硫等酸性气体遇到水蒸气就会发 吸收\n动植物遗体、排出物\n生溶解，形成硫酸及亚硫酸，然后在冷\n土壤、水中 火山\n却后形成酸性降水。 分解者 化石\n的SO2 爆发 燃料\n（三）酸碱作用\n环境pH的变化也可以影响污染物的迁移过程。前面提到的酸性降水，\n不仅会造成建筑物的腐蚀和皮肤黏膜的刺激性损伤，而且还会加速环境\n中岩石、矿物风化淋溶的速度。另外，酸性降水还可促使土壤中铝的活\n化。当大量的三价铝进入土壤溶液或河流湖泊等水体，便会对树木与水\n生生物产生毒作用。\n\n---\n\n**p013** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_013.jpg)\n\n2.2环境污染物的迁移\n（四）络合作用\n当污染物在环境中迁移时，经常和其他离子、离子\n团或有机大分子络合，而改变污染物的迁移能力和归属\n（五） 吸附作用\n环境中一些物质可以物理或化学吸附某些污染物，\n然后污染物会随之发生迁移。\n氧化-还原作用\nCr20²-+ H20 2Cr02- + 2H+\n还原剂 氧化剂\nCr²++30H-==Cr（OH) OH- CrO2+2H20\n\n---\n\n**p014** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_014.jpg)\n\n2.2环境污染物的迁移\n三、生物性迁移\n生物性迁移是指污染物通过生物体的吸附、吸收、\n代谢或死亡等过程发生的迁移。\n生物浓缩\n表现形式 生物积累\n生物放大\n\n---\n\n**p015** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_015.jpg)\n\n2.2环境污染物的迁移\n（一）生物浓缩\n生物浓缩是指生物体从环境中蓄积某种污染物，\n从而出现生物体中浓度超出环境中浓度的现象，又被\n称为生物富集。\n生物富集系数（bioconcentrationfactor，BCF）\n生物体内污染物的浓度（mg/kg）\n环境中污染物的浓度（mg/kg)\n阐明污染物在环境中的生物迁移规律，评价和预\n测污染物进入环境后可能产生的危害，以及确定污染\n物的环境容量进而制订环境标准。\n\n---\n\n**p016** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_016.jpg)\n\n2.2环境污染物的迁移\n（二）生物积累（bioaccumulation）\n生物积累是指生物个体随着其生长发育的不同阶段\n从环境中蓄积某种污染物，从而使浓缩系数不断增大的\n一种现象。\n生物积累系数（bioaccumulationfactor，BAF）=\n某一生物个体生长发育较后阶段体内蓄积污染物的浓度（mg/kg）\n同一生物个体生长发育较前阶段体内蓄积污染物的浓度（mg/kg）\n\n---\n\n**p017** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_017.jpg)\n\n2.2环境污染物的迁移\n生物积累和生物富集的区别\n生物积累：指生物从环境中不断摄取并积累某种物质，使该\n物质在生物体内的浓度随时间增加而增加的过程\n·生物富集：又称生物浓缩，是指生物机体或处于同一营养级\n上的许多生物种群，从周围环境中蓄积某种元素或难分解化\n合物，使生物体内该物质的浓度超过环境中的浓度的现象。\n它强调的是生物体内物质浓度与环境中物质浓度的对比关系\n\n---\n\n**p018** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_018.jpg)\n\n2.2环境污染物的迁移\n（三）生物放大\n生物放大是指在生态系统的同一食物链上，生物体\n内某种污染物的浓度随着营养级的提高而逐步增大的一\n种现象。\n生物放大系数 (biomagnification factor, BMF)\n较高营养级生物体内污染物的浓度 (mg/kg)\n较低营养级生物体内污染物的浓度 (mg/kg)\nDDT浓度被放大了一千万倍\n0milliontimses ncrease ofDDTin fish-eating bird25ppmDDTinlargefish 2ppm 大鱼\n小鱼 DDTin0.5ppmzooplankton DDTin 浮游生物\n0.04ppm0.000003ppms DDTinwater 水中\n\n---\n\n**p019** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_019.jpg)\n\n2.3环境污染物的转化\n污染物的转化是指污染物在环境中，通过物理\n化学或生物学的作用来改变形态或者转变为一种物质的\n过程，\n一次污染物通常指由污染源直接排入环境的污染\n物，而在环境中发生各种反应从而转化形成的污染物被\n称为二次污染物。\n太阳 氧原子 污染物浓度（mL/m）\n臭氧\n氧化氮 0.4\n外线 醛类\n过氧硝\n酸乙酰 0.3\n空气中的氧 非甲烷烃\n0.2 醛\n光化学烟雾\n0.1 NO0:004:008:0012:0016:0020:00（时）\n图1 图2\n\n---\n\n**p020** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_020.jpg)\n\n2.3环境污染物的转化\n一般地，污染物的转化过程主要取决于其本身的理\n化性质以及所处的环境条件。\n物理转化\n转化形式 化学转化\n生物转化\n\n---\n\n**p021** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_021.jpg)\n\n2.3环境污染物的转化\n一、物理转化作用\n蒸发\n污染物的分子微观形态发生\n渗透\n了改变，其空间位置也存在变化\n凝聚 因而，通常认为污染物的物理转化\n吸附 与其迁移运动之间存在较为密切的\n伴随关系。\n放射性元素的蜕变\n二、化学转化作用\n化学转化作用指污染物通过各种化学反应过程发生\n的转化。\n水解反应\n氧化还原反应\n络合反应\n光化学反应\n\n---\n\n**p022** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_022.jpg)\n\n2.3环境污染物的转化\n（一）大气中的化学转化\n在大气中，污染物的化学转化主要包括光化学氧化\n和催化氧化。\n美国“洛杉矶光化学烟雾事件”\n光化学氧化作用\n氮氧化物和碳氢化物 光化学烟雾\n硫酸雾\n光化学氧化作用 水，硫酸或硫酸盐\nSO2 SO3 ·酸雨酸雾\n催化氧化作用\ncard.all&vd_source=4885c3ef5914fc7de7efe1fb94dce7e7\n\n---\n\n**p023** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_023.jpg)\n\n2.3环境污染物的转化\n羟基自由基（OH·）\n在气态污染物\n的催化氧化降解 硝酸盐自由基（NO3·)\n中起重要作用\n超氧自由基（O2·)\n大多数气态污染物在光化学反应过程中能够产生\n羟基从而发生降解。\n\n---\n\n**p024** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_024.jpg)\n\n2.3环境污染物的转化\n（二）水体中的化学转化\n在水体中，污染物的化学转化主要以氧化还原反应和络\n合水解反应为主。\n溢入海洋水面的油膜，也会在太阳光的作用下发生光化学氧\n化，每平方千米海面每天被氧化的石油烃最高值可达2吨之多。\n\n---\n\n**p025** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_025.jpg)\n\n2.3环境污染物的转化\n（三）土壤中的化学转化\n污染物在土壤中的转化及其行为的影响因素也非常\n多。其中土壤中固、液、气三相的分布是控制污染物运\n动和微生物活动的重要因素。\n固、液、气三相的分布\npH\n污染物转化的条件 温度\n湿度\n通气状况\n\n---\n\n**p026** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_026.jpg)\n\n2.3环境污染物的转化\n三、生物转化和生物降解作用\n生物转化和生物降解作用是指外源污染物在机\n体内经多种酶的催化作用所发生的代谢转化过程。\n\n---\n\n**p027** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_027.jpg)\n\n2.3环境污染物的转化\n（一） 微生物对污染物的转化和降解\nNO21.微生物降解农药的方式：\n（1）将农药作为唯一碳源和能 NO2\n源，或者作为唯一的氨源物质\n分子式：C13H18F3Ns04\n（2）共代谢作用 氟乐灵\n脱卤作用、脱烃作用，对酰胺及脂\n的水解、氧化作用、还原作用，以\n及环裂解、缩合等方式\n\n---\n\n**p028** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_028.jpg)\n\n2.3环境污染物的转化\n2.微生物对重金属的转化和降解\n（1）可以改变重金属在环境中存在的状态，会\n使化学物毒性增强，还可以浓缩重金属，并通\n过食物链进行积累\n(2） 微生物也可以直接和间接地去除环境中的\n重金属，从而有助于改善环境\n\n---\n\n**p029** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_029.jpg)\n\n2.3环境污染物的转化\n（二）植物对污染物的转化和降解\n挥发、蒸腾\n1.植物对污染物的转化和降解 挥发、蒸腾\n汞、硒\n沉积\n甲醛、SO2和苯等\n植物体内\n酚 酚糖贰 →二氧化碳和水 重金属\n放射性核业 根际代谢物\n植物体内 TCE/PCE\n氰化物 丝氨酸等氨基酸类物质\n代谢物\n水稻 金属、有机物\n苯并[a]芘 二氧化碳和有机酸 和放射性核素\n无机物 有机物\n2.植物根系与其根际微生物微生态系统的降解转化 重金属\n放射性核素 TCE(三氣乙烯）\nPCE（29氧乙）\n有机氯农药 +其他有机氯化物 土壤和沉积物\n稳定\n（三） 动物对污染物的转化和降解\n肝脏和肝外组织细胞中各种酶\n污染物 →转化和降解\n\n---\n\n**p030** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_030.jpg)\n\n第二章污染物在环境中的迁移和转化\n1.各种污染物在环境中的迁移方式主要包括（）多选\nA.机械性迁移\nB．物理化学性迁移\nC.生物性迁移\nD.随机迁移\n\n---\n\n**p031** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_031.jpg)\n\n第二章污染物在环境中的迁移和转化\n2.气的机械性迁移作用指污染物在大气中的扩散和被气流搬\n运，包括污染物在大气中的扩散作用\nB.×\n\n---\n\n**p032** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_032.jpg)\n\n第二章污染物在环境中的迁移和转化\n3.逆温现象发生在大气中的对流层，发生后大气稳定度低\n对流作用大为减弱，污染物无法随空气运动扩散。\nB.×\n\n---\n\n**p033** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_033.jpg)\n\n第二章污染物在环境中的迁移和转化\n4.以下那些是无机化合物的常见迁移方式（）多选\nA.吸附-解析\nB.氧化-还原\nC.络合和鳌合\nD.生化分解\n\n---\n\n**p034** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_034.jpg)\n\n第二章污染物在环境中的迁移和转化\n5.以下属于二次污染物的是（）单选\nA.氟氧化物\nB．二氧化硫\nC.光化学烟雾\nD.一氧化碳\n\n---\n\n**p035** ![](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_035.jpg)\n\n第二章污染物在环境中的迁移和转化\n定义：污染物在环境中空间位置相对改变的过程\n污染物迁移概述 迁移原因：自身理化性质和环境因素共同作用\n迁移影响：改变局部环境污染物浓度、种类和综合毒性\n机械性迁移：气、水、重力的机械性迁移及人为搬运\n迁移的主要类型 物理－化学性迁移：风化淋溶、溶解挥发等六种作用\n生物性迁移：生物浓缩、积累、放大及其系数表示\n定义：通过物理、化学或生物作用改变形态或物质种类\n污染物转化概述 转化类型：物理、化学、生物转化三种类型\n转化意义：改变污染物毒性和存在形态，影响环境和生物\n物理转化作用：蒸发、渗透等过程实现转化，与迁移伴随\n转化的具体过程 化学转化作用：大气、水体、王壤中分别有不同反应\n生物转化和降解作用：微生物、植物、动物对污染物的转化降解\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 1 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 3 节 · 35 页\n\n> `003-第二章 污染物在环境中的迁移和转化-第二章 污染物在环境中的迁移和转化.pdf` · 涉章 [2]\n\n- [p001](../003-第二章 污染物在环境中的迁移和转化-第二章 污染物在环境中的迁移和转化/page_001.jpg)  · 环境毒理学\n- [p002](../003-第二章 污染物在环境中的迁移和转化-第二章 污染物在环境中的迁移和转化/page_002.jpg)  · 第二章污染物在环境中的迁移和转化\n- [p003](../003-第二章 污染物 mulation）**：同一生物随生长发育，浓缩系数不断增大\n- [x] **生物放大（biomagnification）**：同一食物链上，污染物浓度随营养级提高而逐步增大\n- [x] **逆温现象**：对流层中上层暖下层冷，大气稳定度高，对流弱，污染物难扩散（秋冬北方雾霾成因之一）\n- [x] **干沉降与湿沉降**：大气颗粒物消除过程，按是否需降水冲刷分为干沉降和湿沉降\n\n### 二、关键公式 / 模型\n\n- **BCF（生物富集系数）** = 生物体内浓度(mg/kg) / 环境中浓度(mg/kg)\n- **BAF（生物积累系数）** = 发育后阶段体内浓度 / 发育前阶段体内浓度\n- **BMF（生物放大系数）** = 较高营养级浓度 / 较低营养级浓度\n- **迁移三类型**：机械性 → 物理-化学性 → 生物性（递进）\n- **转化三类型**：物理转化 → 化学转化 → 生物转化\n\n### 三、重要案例 / 实验 / 例题\n\n- **汞的迁移转化**：Hg进入环境→水体大气扩散→形态变化→Hg⁺/甲基汞/二甲基汞（甲基汞致水俣病）\n- **DDT生物放大**：水中0.000003ppm→浮游生物0.04→小鱼0.5→大鱼2→食鱼鸟25ppm，放大一千万倍\n- **洛杉矶光化学烟雾**：NOx+碳氢化物→光化学烟雾（二次污染物典型）\n- **酸雨形成**：SO₂→氧化→SO₃→水→H₂SO₄/硫酸盐→酸雨酸雾\n\n### 四、高频考点（速记）\n\n1. 迁移三类型：**机械性**（气/水/重力）、**物理-化学性**（6种作用）、**生物性**（浓缩/积累/放大）\n2. 气的机械性迁移三扩散：**风力、气流、湍流**\n3. 物理-化学性迁移六作用：**风化淋溶、溶解挥发、酸碱、络合、吸附、氧化-还原**\n4. 逆温：**下冷上暖**→稳定度高→对流弱→**难扩散**\n5. 生物浓缩vs积累vs放大：**浓缩**（体内>环境，同一时间）、**积累**（同一生物随时间增大）、**放大**（食物链随营养级增大）\n6. 转化三类型：**物理**（蒸发/渗透/凝聚/吸附/放射性蜕变）、**化学**（水解/氧化还原/络合/光化学）、**生物**（微生物/植物/动物降解）\n7. 大气化学转化核心：**光化学氧化**（NOx+烃→光化学烟雾）和**催化氧化**（SO₂→SO₃→酸雨）\n8. 微生物降解农药方式：①农药作唯一碳源/能源/氮源 ②共代谢作用；途径：脱卤、脱烃、水解、氧化、还原、环裂解、缩合\n\n### 五、思考题 / 自测\n\n- [x] 题：污染物迁移方式包括？ 答：ABC——机械性、物理-化学性、生物性（无\"随机迁移\"）\n- [x] 题：气的机械性迁移=扩散+气流搬运？ 答：A.✓\n- [x] 题：逆温发生后大气稳定度低？ 答：B.×（逆温时稳定度**高**，对流弱）\n- [x] 题：无机化合物常见迁移方式？ 答：ABC——吸附-解吸、氧化-还原、络合和螯合（生化分解属有机）\n- [x] 题：属于二次污染物的是？ 答：C.光化学烟雾（NOx、SO₂、CO均为一次污染物）\n\n### 六、与前后章之关联\n\n- 承前章：第1章定义了污染物基本概念，本章深入讨论其在环境中的行为\n- 启后章：第3章讨论污染物进入生物体内的毒作用机制；第4章讨论毒作用影响因素；迁移转化是毒作用的前提\n"}, {"id": "ch-03", "group": "章节素材", "title": "第03章 环境毒理学 第三章", "md": "# 环境毒理学 · 第 3 章 · 环境毒理学 第三章 · 素材\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 章下 PDF: 3 个 · 总页: 136\n> 主版: 第 5 节 · 51 页\n\n---\n\n## 主版课件 · 第 5 节\n\n> `005-3环境毒理学 第三章（2）-3环境毒理学 第三章.pdf`\n\n<details><summary>展开 51 页图链<\/summary>\n\n- [p001](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_001.jpg)  · 第三章污染物的生物转运与生物转化\n- [p002](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_002.jpg)  · 主要内容\n- [p003](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_003.jpg)  · 机体对化学毒物的处置\n- [p004](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/p
