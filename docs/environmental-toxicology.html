![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_005.jpg)\n\n污染物在体内的吸收、分布和排泄\n环境污染物\n摄入 吸入 接触\n吸收 胃肠道 肺脏 皮肤\n分布\n肝脏 组织（贮存）\n血液和淋巴\n胆汁 靶器官（损害）\n肾脏 肺脏 分泌腺\n排泄 排泄\n粪便 尿 呼出气 分泌物\n\n---\n\n**p006** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_006.jpg)\n\n生物膜的基本结构和物质的跨膜转运\n糖蛋白\n生物膜的机构和功能\n确分子\n细胞膜主要由也静态的脂质双分子\n层和蛋白质组成，也会有少量糖形成\n糖脂和糖蛋白。\n磷双分子层\n蛋白质分子\n生物晨的结构模型示意图\n\n---\n\n**p007** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_007.jpg)\n\n33.337..all\n：框在点击“”时会进行转换，用时则会变为可点击的视\n频。框移位和\n\n---\n\n**p008** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_008.jpg)\n\n毒物通过生物膜的转运方式\n物质的跨膜运输trans-membranetransport\n污染物通过多次透过生物膜来完成生物转运过程，其透过生物\n膜的机理即生物转运机理。\n生物转运机理可概括为\n1.被动扩散（简单扩散，自由扩散）\n2. 滤过\n3. 特殊转运，包含主动转运和协助扩散\n4.膜动转运\n\n---\n\n**p009** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_009.jpg)\n\n被动扩散passivediffusion（简单扩散，自由扩散）\n被动扩散的物质只能从浓度较\n高的部位透过生物膜转运到浓\n度较低的部位。\n被动扩散的特点是在转运过程\n中生物膜不具有主动性，是一\n种纯物理过程，不需要消耗代\n谢能。\n\n---\n\n**p010** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_010.jpg)\n\n简单扩散的影响因素\n生物膜两侧的化学物质浓度梯度\n浓度差越大，扩散越快。\n毒物在脂质中的溶解度\n脂/水分配系数越大，越容易在脂肪中溶解，也越易透过\n生物膜。\n外源化合物的离解或电离状态和体液pH的高低\n离子型的化合物不易透过生物膜的脂质结构区。\n脂溶性物质同蛋白结合的亲和力\n\n---\n\n**p011** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_011.jpg)\n\n滤过 infiltration\n入球小动脉 出球小动脉 指水溶性毒物随同大量水分子经生物\n膜的孔状结构而透过生物膜的过程。\n凡分子大小和电荷与膜上孔状结构相\n适应的毒物皆可随同水分子透过生物\n膜而被转运。\n滤过的动力来自生物膜两侧的流体静\n压梯度差和渗透压梯度差。\n血压 内压渗透\nw.bioon.com\n\n---\n\n**p012** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_012.jpg)\n\n特殊转运 specialtransport\n有些外源化学物，由于脂溶性低或者分子量过大，不能通过简单扩散\n或滤过作用进行跨膜转运，它们必须借助于一定的载体系统才能完成\n转运过程。特殊转运又称载体转运。\n根据是否有能量消耗分为 物质运输\n1.主动转运（主动运输） 通道蛋白 转运蛋白\n脂双层 浓度梯度\n2.易化扩散（载体扩散，顺浓度转运，不消耗能量）\n单纯扩散通道蛋白介导 转运蛋白介导 的物质运输\n的物质运输\n被动运输 主动运输\n（依靠跨膜蛋白进行的细胞内外物质交换）\n\n---\n\n**p013** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_013.jpg)\n\n主动转运activetransport\n在载体或运载系统参与下，化学物质逆浓度梯度由低\n浓度处向高浓度处转运以透过生物膜的过程。\n其主要特点\n化学物质逆浓度梯度转运，需消耗一定能量。\n需要有载体的参与。\n3 载体对转运的化学物有选择性。\n载体有容量限制。\n5. 如果两种化学物机构相似，转运载体相同，则出现\n竞争性抑制。\n\n---\n\n**p014** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_014.jpg)\n\n易化扩散facilitateddiffusion\n膜上蛋白质载体特异性地与某种化学毒物 外|细胞膜 内\n结合后，其分子内部发生构型变化而形成\n适合该物质透过的通道而进入体内。\n与主动转运的不同之处在于，不能逆浓度\n梯度将被转运的物质由浓度低转运到浓度 载体\n高的部位。\n\n---\n\n**p015** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_015.jpg)\n\n细胞外\n细胞内\n膜动转运\n颗粒物和大分子物质的转运常伴有膜的运动，称为膜动转\n运。\n由于生物膜具有可塑性和流动性，因此，对颗粒状物质和\n液粒，细胞可通过细胞膜的变形移动和收缩，把它们包围\n起来最后摄入细胞内，这就是吞噬作用和胞吐作用。\n\n---\n\n**p016** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_016.jpg)\n\n膜动转运\n胞吞作用\n膜动转运\n胞吐作用\n质膜 细胞外\n细胞质\n细胞内\n细胞核\nA吞噬作用 图3-13胞吐作用\n\n---\n\n**p017** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_017.jpg)\n\n3.1.2吸收\n吸收：指污染物通过自接触部位透过体内生物膜进入血液\n循环的过程。\n三种主要的吸收方式\n呼吸道吸收\n消化道吸收\n皮肤吸收\n\n---\n\n**p018** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_018.jpg)\n\n呼吸道吸收 两种主要吸收机理\n1.以气体和蒸汽存在的污染物，到达肺泡后主要经过\n被动扩散，通过呼吸道吸收进入血液。\n粒径10微米以上\n2.以气溶胶和颗粒状存在的污染物，其吸收的方式和\n的颗粒物，会被挡 部位取决于颗粒大小。\n在人的鼻子外面 2.5微米到10微\n日常发电 支 米之间的颗粒物 >>10um被阻挡在鼻外\n管能进入上呼吸道\n>>2.5-10um的颗粒，上呼吸道沉积\n部分可通过痰液\n等排出体外 ><2.5um，附着在肺泡上\n肺部防部\n工业生产 附着于呼吸道内表面的颗粒归宿：\n1.进入血液\n2.进入消化道\n汽车尾气 3.进入淋巴腺随淋巴进入血液\n4.长期滞留于肺泡内，引起病变。\n\n---\n\n**p019** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_019.jpg)\n\n肺泡中气态污染物的吸收的影响因素\n分压差和血/气分配系数。污染物在肺泡气和血液中的分差越大\n越有利于吸收；血/气分配系数越大，吸收越多。\n溶解度和相对分子量。非脂溶性污染物通过亲水通道被吸收，\n而亲脂性污染物的吸收取决于其脂/水分配系数。\n肺泡通气量和血液流量比值。比值越大，越有利于污染物的吸\n收。\n\n---\n\n**p020** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_020.jpg)\n\n呼吸道吸收致毒举例-尘肺\n太乐久出养生网\n煤工尘肺\nⅡ期\n尘肺灌洗流出液\n\n---\n\n**p021** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_021.jpg)\n\n消化道吸收\n饮水和食物中的污染物主要通过消化道吸收。\n消化道的任何部位具有吸收，但其主要作用\n肝和原象 的是小肠。\n污染物很少通过口腔黏膜被吸收，在胃里主\n要通过简单扩散吸收。\n胃肠道上皮细胞也可通过吞噬和胞饮作用吸\n收颗粒状或液滴状污染物。\n\n---\n\n**p022** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_022.jpg)\n\n消化道吸收污染物的影响因素\n消化道内的多种酶类和菌丛可转化某些污染物，改变其物化性质和毒性。\n如小肠内细菌可将硝基苯转化为可疑致癌物质苯胺。\n胃肠道内容物的种类和数量，排空时间及蠕动状态也会影响对污染物的\n吸收。如胃肠蠕动减弱，排空时间延长可增加对污染物的吸收。\n污染物的溶解度和分散度也是影响吸收的因素。脂溶性的污染物较水溶\n性污染物更易被消化道吸收。\n消化道的酸碱度。有机酸或有机碱的分子态较电离状态更易被吸收。\n\n---\n\n**p023** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_023.jpg)\n\n消化道吸收致毒举例一清华学生中毒事件\n脱发 Cpl\n一种秘有金属元 头痛 头晕\n素，银白色，质 抽摄 失眠\n软，轮和轮的氧 休克 视力减退\n化物都有毒 呕吐\n轮中毒 食欲减退\n·如果饮用了被铭\n污染的水或吸入\n了含轮化合物的\n粉尘，就会引起 恶心 全身无力\n·使人的中枢神经 轮中毒\n系统、肠胃系统\n及肾脏等部位发\n生病变\n症状 纹痛 手指震\n急性中\n慢性中毒\n\n---\n\n**p024** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_024.jpg)\n\n皮肤吸收\n皮肤吸收指污染物透过皮肤而进入血液的过程。\n污染物经皮肤吸收主要通过两条途径\n①毒物-角质层-透明层-颗粒层-生发层和基膜-真皮。\n表皮 ②通过汗腺，皮脂腺，和毛囊，绕过表皮屏障进入真皮。\n真皮 污染物经皮肤吸收经过两个阶段\n①第一阶段，穿透相\n毒物透过表皮进入真皮。其穿透的速度与脂溶性呈正比，脂溶\n毛囊 汗腺\n神经 性越大其穿透能力越强。非脂溶性的污染物则不易通过。通\n皮下脂肪 皮脂腺\n过汗腺，皮脂腺，和毛囊，绕过表皮屏障进入真皮。\n皮肤结构示意图 ②第二阶段，吸收相\n毒物由真皮进入乳头层毛细血管。\n\n---\n\n**p025** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_025.jpg)\n\n影响皮肤吸收的因素\n皮肤完整度，如酸碱或机械损伤皮肤屏\n容易經皮毒的部位\n障后毒物渗透性增加。 身体各处吸收化学物质的速度 頭部3.5倍 以手臂内侧为基准，作为吸收化学物质的速度为\n额頭6倍\n皮肤所在部不同部位，如背部和性器官 下巴3倍\n背部17倍\n的皮肤对毒物的吸收速度快于其他部位的\n胶下3.6倍\n皮肤。\n手臂内侧1\n化合物的物理化学性质，如扩散能力， 手心.8倍\n与角质层的亲和力等。 性器官42倍\n皮肤接触条件，如接触面积，接触时间，\n皮肤温度等。 脚後跟0.14倍\n\n---\n\n**p026** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_026.jpg)\n\n皮肤吸收致毒举例一儿童铅中毒\n铅毒一无处不在\n皮中毒 翼位性皮膚炎\n家装材行\n饮水\n在#，##，口，首等\nICHOOL （孔排）\n学习文具\n富贵手\n過敏性皮膚炎\n工业气\n含锁用品 次车尾气\n食品\n（加，文品、便，花）\n\n---\n\n**p027** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_027.jpg)\n\n3.1.3分布\n毒物进入血液后，通过血流分布全身。研究毒物的\n分布变化规律，有利于探讨毒物的作用部位和作用\n机理。 皮肤屏障功能\n化学物在体内组织器官的起始分布取决于血流量 ——隔离与保护\n防止有害物质入侵，使人体在变化不\n定的外环境中保持内环境的相对恒定\n最终分布取决于化合物与组织器官的亲和力 一维持机体的各种正常功能\n调控外来物质的经皮吸收以及皮肤水分蒸发\n导致环境化学物在体内分布不均匀的另一重要因素\n是体内特定部位存在的对外元化学物转运有阻碍作\n用的屏障\n\n---\n\n**p028** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_028.jpg)\n\n屏障作用\nm=333.337..all\n击的视频。框移位和\n\n---\n\n**p029** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_029.jpg)\n\n3.1.3分布\n脑\n肺砷\n铅汞\n屏障\n>血脑屏障\n肝 肾\n>胎盘屏障 铅砷锅 铅砷镐\n结合与贮存 消化\n>血浆蛋白贮存 肌肉\n骨骼 砷\n>肝肾积累\n镉\n>脂肪组织贮存\n>骨骼组织贮存\n\n---\n\n**p030** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_030.jpg)\n\n●贮存库：\n贮存库分类：\n进入血液的环境化学物大部分与血浆蛋 血浆蛋白贮存库\n白或体内各组织成分结合，积聚在特定 毒物在肝，肾中的积累\n部位，该部位称为此化学物质的贮存库 脂肪组织作为贮存库\n骨骼组织作为贮存库\n\n---\n\n**p031** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_031.jpg)\n\n血浆蛋白作为贮存库\n进入血液的毒物可与血液中蛋白质结合，与蛋白结合的毒物不易透过细胞\n膜进入靶器官而产生毒性作用，对毒物的分布，转化和排泄有影响。\n毒物与蛋白结合大部分是可逆的非共价键结合，结合的毒物也可以被解离\n出来，随血液循环进行分布或再分布。从而使血浆成为毒物的贮存库。\n例子：\n金属离子与蛋白质的可逆非共价键结合。\nDDT的代谢产物DDE能竞争性置换已与蛋白结合的胆红素，使其在血中游\n离，造成黄痘。\n\n---\n\n**p032** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_032.jpg)\n\n毒物在肝肾中的积累\n肝和肾含有特殊结合蛋白，能将与血浆蛋白结合的毒物可与许多毒物结合夺取\n过来，因此肝和肾也可认为是毒物的贮存库。\n肝和肾既是毒物的贮存场所，又是代谢转化和排泄的重要器官。\n如肝细胞中的配体蛋白能与多种有机酸，有机阴离子，偶氮染料等毒物结合，\n使这些物质进入肝脏。\n如肝和肾中含有金属硫蛋白，能与锌和镉等重金属结合而起解毒的作用。\n\n---\n\n**p033** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_033.jpg)\n\n脂肪作为贮存库\n许多有机毒物是脂溶性，易被吸收并贮存在体内脂肪中而不呈现\n生物学活性。如有机氯农药DDT六六六和有机汞农药等。\n毒物在脂肪中的贮存可降低其在靶器官中的浓度。体脂多者毒性\n较体脂少者小，脂肪迅速消耗时血液中毒物浓度会升高而显现毒\n性。\n\n---\n\n**p034** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_034.jpg)\n\n骨骼组织作为贮存库\n骨骼组织中某些成分与毒物有特殊的亲和力，是骨骼称为这些物\n质贮存沉积的场所。\n如氟化物，铅和锶能与骨基质结合而贮存其中。骨中氟增多会引\n起氟骨症，放射性的锶会引起骨肉瘤等。\n\n---\n\n**p035** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_035.jpg)\n\n毒物在体内贮存的毒理学意义\nV急性中毒的保护作用，贮存库使毒物在体液中的浓度迅速降低，减少了到达靶器官\n的毒物量。\n/贮存库也可称为体内提供毒物来源，具有慢性致毒的潜在危害。\n例子：\n如铅中毒作用部位是软组织，铅贮存于骨骼中有保护作用，但在缺钙，体液pH\n下降或溶骨条件下，骨内贮存的铅会释放进入血液引起慢性中毒。\n\n---\n\n**p036** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_036.jpg)\n\n多选题1分\n以下哪些是毒物在体内的贮藏库？\n骨骼\n脂肪\n肠胃\n肝肾\n\n---\n\n**p037** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_037.jpg)\n\n3.1.4排泄\n指毒物母体化学物及其代谢产物向机体外转运的过程，是机体物质代谢全过程的\n最后一个环节。\n排泄方式：\n经肾排出\n经肝胆排泄\n经呼吸道排出\n经其它途径排出\n\n---\n\n**p038** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_038.jpg)\n\nXinjiang\n经肾排出\n肾脏是排出毒物的极为有效的器官：\n肾小球滤过\n肾小球毛细血管内皮细胞有较大的膜孔，可滤过分子量<69000的物质。\n而与血浆蛋白的毒物则不能通过。\n肾小管重吸收\n肾小球滤过液进入肾小管，解离的，极性亲水毒物不被重吸收，直接随\n尿液排出；而未解离，非极性亲脂性毒物可通过肾小管上皮细胞重吸收\n回到血液中。\n肾小管主动分泌\n某有机阴离子和有机阳离子可通过近曲肾小管细胞主动分泌到尿中而被\n排出。\n\n---\n\n**p039** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_039.jpg)\n\n经肝胆排出\n进入肝肠循环\n胆固醇\n脂溶性的毒物在小肠被重吸收，并经门静脉重新\n胆盐\n回到肝脏，再次随胆汁分泌，即形成肝肠循环。肝\n肠循环会延长毒物在体内停留时间，半衰期延长， 门静肽\n胆囊 十二指肠\n毒性加大。\n直接排除体外\n高度极性的化合物在小肠内不易被吸收，就随同 结肠\n图6-15胆盐的肝肠循环\n胆汁混入粪便排出。\n\n---\n\n**p040** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_040.jpg)\n\n经呼吸道排出\n肺脏排出毒物主要通过简单扩散的方式完成，排出的速度取决于\n肺泡壁两侧有毒气体的分压差和血气分配系数。\n不溶解的颗粒物吸入肺脏后，可以通过肺泡及细支气管，支气管\n等清除系统，将其从深部肺组织移至咽部，随痰咳出或吞入消化\n道。\n\n---\n\n**p041** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_041.jpg)\n\n其他途径排出\n毒物可以经乳腺随乳汁排出。如有机碱类和亲脂性毒物，易从\n血浆扩散到乳腺中。\n毒物也可经唾液腺，汗腺排出。如I，Br，F，Hg等。\n重金属毒物也可经头发或指甲排出。\n毒物经各种途径排出时，可能对局部组织产生毒性作用，如镉，\n汞可损害近曲肾小管，汞可引发口腔炎，β萘胺可致膀胱癌。\n\n---\n\n**p042** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_042.jpg)\n\n3.3污染物代谢动力学\n毒物动力学\n是运用数学方法，定量的研究毒物的吸收，分布，排泄和代谢转化随时间动态变\n化的规律和过程。\n毒物动力学模型\n1.线性动力学模型\n2.非线性动力学模型\n3.生理性毒理动力学\n\n---\n\n**p043** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_043.jpg)\n\n室的概念\n其含义是将机体视作一个系统，按照动力学特点分成若干个部分，每个部分称为室。\n室的划分取决于毒物转运速率是否近似。\n当毒物在体内转运速率高，体内分布迅速达到平衡，可将机体视为一室模型。\n如毒物在体内不同部位或器官的转运速率不同，则血流丰富的并能迅速与血液中毒\n物达到平衡的部位或器官，与血液一起被称为中央室；而血流量少，穿透速率慢，\n不能立即与血液中毒物达到平衡的器官，被认为是周边室。大多数毒物在机体中的\n转运复合二室模型。\n\n---\n\n**p044** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_044.jpg)\n\n毒物在体内消长的指数曲线\n毒物在体内的消除随时间而变化的曲线，在大多数情况下呈指数曲线的形式。大\n多数情况下消除速度与毒物量（D）或毒物浓度（c）的一次方成正比，即遵循一\n级动力学过程：\ndD/dt=-KD,D=D0·e(-kt)\nIgD=lgD0-kt/2.303\nlgc=lgc0-kt/2.303\n将剂量D或（浓度c）的对数对t作图，得到一条直线。\n\n---\n\n**p045** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_045.jpg)\n\n主要参数\n表观分布容积Vd=D/cVd越大，表明毒物分布越广泛，越易被组织吸收，或毒物与生物高分子有大量结合，造成血浆浓度低；\n反之，Vd越小，表明毒物分布少，不易被组织吸收，此时血浆中毒物浓度高。\n生物半衰期：指毒物在体内含量（浓度）减少一半所需时间。\nT1/2=0.693/K\n消除速率常数，表示单位时间内毒物消除的数量与体内数量的比例常数K=（dD/dt）/D，k越大，反\n映消除越快。\n消除率，是单位时间毒物消除量与血浆中毒物浓度的比值。消除率反映了血浆消除毒物的能力。\ncl=消除速度/血浆浓度=（dD/dt）/c\n其中D：体内毒物量，C：血浆中毒物浓度\n\n---\n\n**p046** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_046.jpg)\n\n一室模型\n一室模型是把机体看做由一个室组成，即假设毒物进入机体后立即均匀的分分布到所\n有组织，达到平衡。\n在一室模型中，毒物在体内的小虎速度与进入机体的毒物浓度成正比，即复合以及速\n率过程。\nCV Ke\n图1-20 0一室模型示意图\n（图中K.为消除速率常数，D为给药剂\n量，C为血药浓度，V为表观分布容积，\nCV为体内药量）\n\n---\n\n**p047** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_047.jpg)\n\n二室模型\n二室模型将机体分为二个室，即中心室和周边室。毒物进入机体后，迅速在中心\n室分布，然后经较长时间才在周边室达到平衡。\n二室之间的可逆转运速率与血液流量，膜通透性，毒物对组织的亲和力及在血浆\n/组织分配系数有关。\n\n---\n\n**p048** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_048.jpg)\n\n非线性动力学模型\n一室模型和二室模型都假设毒物被机体吸收的初速度与计量成比例，\n物质从血浆和体液向组织转移率也与其浓度成比例，即复合一级速率\n过程。而且组织吸收物质是无限的，因此也称线性动力学模型。\n实际上很多物质的吸收过程并不是直线，也不是永无止境的，而且计\n量加大可出现饱和现象。这种有饱和现象的速率过程称为非线性动力\n学。\n\n---\n\n**p049** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_049.jpg)\n\n某毒物在体内遵循一级动力学消除，其消除速率常数k=0.3465h-1。若初始血药浓度co=100mg/L，下\n列说法错误的是（）\nA.该毒物的半衰期为2小时\nB.4小时后，体内剩余血药浓度为25mg/LC.以1gc对时间t作图，得到的直线斜率为-0.3465\nD.该毒物的消除速度与当前体内毒物浓度成正比\n\n---\n\n**p050** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_050.jpg)\n\n其指数形式为D=\n2.将毒物浓度c的对数对时间t作图，若得到一条 则可判断该毒物遵循一级动力学消除；此时直线方\n程为lgc=\n3.一级动力学消除中，消除速率常数k与半衰期t1/2的换算公式为t1/2=\n\n---\n\n**p051** ![](../005-3环境毒理学 第三章（2）-3环境毒理学 第三章/page_051.jpg)\n\n谢谢\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 2 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 4 节 · 50 页\n\n> `004-3环境毒理学 第三章-3环境毒理学 第三章.pdf` · 涉章 [3]\n\n- [p001](../004-3环境毒理学 第三章-3环境毒理学 第三章/page_001.jpg)  · 第三章污染物的生物转运与生物转化\n- [p002](../004-3环境毒理学 第三章-3环境毒理学 第三章/page_002.jpg)  · 主要内容\n- [p003](../004-3环境毒理学 第三章-3环境毒理学 第三章/page_003.jpg)  · 机体对化学毒物的处置\n- ...余 47 页, 参 [`004-3环境毒理学 第三章-3环境毒理学 第三章/`](../004-3环境毒理学 第三章-3环境毒理学 第三章/)\n\n### 辅 2 · 第 4 节 · 35 页（跨章）\n\n> `004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化.pdf` · 涉章 [2, 3]\n\n- [p001](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_001.jpg)  · 环境毒理学\n- [p002](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_002.jpg)  · 第二章污染物在环境中的迁移和转化\n- [p003](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/page_003.jpg)  · 2.1概述\n- ...余 32 页, 参 [`004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/`](../004-3环境毒理学 第三章-第二章 污染物在环境中的迁移和转化/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 2 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境毒理学 第三章\n## 核心概念\n- 生物转运\n- 生物转化/代谢转化\n- 被动扩散（简单扩散）\n- 滤过\n- 主动转运\n- 易化扩散\n- 膜动转运\n- 吸收\n- 分布\n- 屏障\n- 贮存库\n- 肝肠循环\n- 毒物动力学\n## 关键公式 / 模型\n- 一级动力学消除\n- 半衰期\n- 表观分布容积\n- 消除速率常数\n- 清除率\n- 一室模型\n- 二室模型\n- 非线性动力学\n## 高频考点\n- 生物转运四方式：被动扩散（不耗能，顺浓度）、滤过（水溶性）、特殊转运（主动+易化）、膜动转运（胞吞/胞吐）\n- 被动扩散影响因素：浓度梯度、脂/水分配系数、电离状态与pH、蛋白结合亲和力\n- 主动转运五特点：逆浓度梯度、耗能、需载体、有选择性、有容量限制+竞争性抑制\n- 三种吸收途径：呼吸道（肺泡被动扩散/颗粒大小决定沉积部位）、消化道（主要在小肠）、皮肤（穿透相+吸收相两阶段）\n- 四大贮存库：血浆蛋白（可逆非共价结合）、肝肾（配体蛋白/金属硫蛋白）、脂肪（有机氯农药等脂溶性）、骨骼（氟/铅/锶与骨基\n- 贮存库双重意义：急性保护（降低靶器官浓度）+ 慢性危害（贮存库释放致慢性中毒）\n- 排泄四途径：肾脏（滤过+重吸收+主动分泌）、肝胆（肝肠循环延长半衰期）、呼吸道（简单扩散，取决于分压差和血气分配系数）、\n- 动力学模型：一室（均匀分布）、二室（中央+周边，大多数毒物）、非线性（饱和现象）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n` *（不耗能，顺浓度）、**滤过**（水溶性）、**特殊转运**（主动+易化）、**膜动转运**（胞吞/胞吐）\n2. 被动扩散影响因素：**浓度梯度**、**脂/水分配系数**、**电离状态与pH**、**蛋白结合亲和力**\n3. 主动转运五特点：**逆浓度梯度**、**耗能**、**需载体**、**有选择性**、**有容量限制+竞争性抑制**\n4. 三种吸收途径：**呼吸道**（肺泡被动扩散/颗粒大小决定沉积部位）、**消化道**（主要在小肠）、**皮肤**（穿透相+吸收相两阶段）\n5. 四大贮存库：**血浆蛋白**（可逆非共价结合）、**肝肾**（配体蛋白/金属硫蛋白）、**脂肪**（有机氯农药等脂溶性）、**骨骼**（氟/铅/锶与骨基质结合）\n6. 贮存库双重意义：**急性保护**（降低靶器官浓度）+ **慢性危害**（贮存库释放致慢性中毒）\n7. 排泄四途径：**肾脏**（滤过+重吸收+主动分泌）、**肝胆**（肝肠循环延长半衰期）、**呼吸道**（简单扩散，取决于分压差和血气分配系数）、**其他**（乳汁/唾液/汗腺/头发指甲）\n8. 动力学模型：**一室**（均匀分布）、**二室**（中央+周边，大多数毒物）、**非线性**（饱和现象）\n\n### 五、思考题 / 自测\n\n- [x] 题：毒物在体内的贮藏库包括？ 答：骨骼、脂肪、肝肾（不含肠胃）\n- [x] 题：一级动力学消除k=0.3465h⁻¹，c₀=100mg/L，说法错误的是？ 答：C（lgc对t作图斜率为-k/2.303而非-k）\n- [x] 题：被动扩散vs主动转运区别？ 答：被动扩散顺浓度、不耗能、无载体；主动转运逆浓度、耗能、需载体、有选择性\n- [x] 题：肝肠循环的毒理学意义？ 答：延长毒物在体内停留时间和半衰期，毒性加大\n\n### 六、与前后章之关联\n\n- 承前章：第2章讨论污染物在环境中的迁移转化，本章转入生物体内（吸收→分布→代谢→排泄）\n- 启后章：第4章讨论毒作用及影响因素，本章的吸收分布代谢排泄是毒作用的前提和基础\n"}, {"id": "ch-04", "group": "章节素材", "title": "第04章 环境污染物的毒作用及其影响因素", "md": "# 环境毒理学 · 第 4 章 · 环境污染物的毒作用及其影响因素 · 素材\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 章下 PDF: 4 个 · 总页: 232\n> 主版: 第 8 节 · 82 页\n\n---\n\n## 主版课件 · 第 8 节\n\n> `008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法.pdf`\n\n<details><summary>展开 82 页图链<\/summary>\n\n- [p001](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_001.jpg)  · 环境毒理学\n- [p002](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_002.jpg)  · 第五章环境毒理学常用实验方法\n- [p003](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_003.jpg)  · 5.1 概述\n- [p004](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_004.jpg)  · 概述\n- [p005](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_005.jpg)  · 概述\n- [p006](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_006.jpg)  · 概述\n- [p007](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_007.jpg)  · 概述\n- [p008](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_008.jpg)  · 概述\n- [p009](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_009.jpg)  · 概述\n- [p010](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_010.jpg)  · 概述\n- [p011](../008-第四 物特殊毒性及其评价\n- [p081](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_081.jpg)  · 2.环境化学物特殊毒性及其评价\n- [p082](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_082.jpg)  · 2.环境化学物特殊毒性及其评价\n\n<\/details>\n\n<details><summary>展开 82 页图文对照（每图配其识别文本）<\/summary>\n\n**p001** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_001.jpg)\n\n环境毒理学\n授课人：森巴提?叶尔肯\n\n---\n\n**p002** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_002.jpg)\n\n第五章环境毒理学常用实验方法\n本章将讨论以下内容：\n5.1概述\n5.2环境化学物等一般毒性试验\n5.3致畸、致癌、致突变等毒性试验\n\n---\n\n**p003** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_003.jpg)\n\n5.1 概述\n毒理学研究的主要手段\n动物实验\n借助于动物模型模拟人体接触环境化学品的各种\n条件，观察实验动物的毒性反应，再外推到人\n\n---\n\n**p004** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_004.jpg)\n\n概述\n毒理学研究的主要手段\n体内实验 动物实验 体外实验\n采用整体动物、动物器官、组织及细胞等进行\n\n---\n\n**p005** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_005.jpg)\n\n概述\n一、实验动物的选择\n人工培育 科学研究\n控制其携带微生物、遗传背景明确，来源清楚。\n\n---\n\n**p006** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_006.jpg)\n\n概述\n1.物种的选择--－基本原则\n对外源的毒性反应及代谢特点与人类接近的物种\n自然寿命不太长的物种\n易于饲养和实验操作的物种\n经济并易于获得的物种\n\n---\n\n**p007** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_007.jpg)\n\n概述\n1.物种的选择--－常用动物\n选用两个物种进行试验、评价毒性反应的物种差异\n\n---\n\n**p008** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_008.jpg)\n\n概述\n2.品系的选择\n品系 用计划交配的方法获得的起源于共同祖先的一群动物。\n具有共同的遗传来源、相似的外貌特征、独特的生物\n同一品系\n学特性及稳定的遗传性能\n类别 遗传特性 繁殖方式 应用场景\n近交系动物 基因高度纯 连续兄妹/亲 遗传研究、\n近交系动物 合 子交配\n药物测试\n突变系动物 疾病模型、\n根据实验需要 携带特定基 选择性交配或基\n突变系动物 基因功能研\n因突变 因编辑 究\n杂交群动物\nF1代杂合 干细胞研究、\n杂交群动物 两个近交系杂交\n封闭群动物 子 免疫实验\n遗传多样性 毒理学、行\n封闭群动物 群体内随机交配\n高 为学研究\n\n---\n\n**p009** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_009.jpg)\n\n概述\n3.微生物控制的选择\n为确保实验结果的真实性、可靠性和增加可比性、可\n微生物控制\n重复性及科学性。\n应对实验动物携带的微生物控制，根据对动物微生物\n实验动物分类\n控制的净化水平，我国将实验动物分为无菌动物、悉\n生动物、无特定病原体动物和清洁动物。\n等级 微生物控制 饲养环境 应用场景\n无菌动物 完全无微生物 无菌隔离器 微生物组、免疫机制研究\n悉生动物 已知特定微生物 无菌隔离器 特定菌群功能研究\nSPF动物 排除特定病原体 屏障环境 生物医学研究、疫苗开发\n清洁动物 排除常见病原体 普通屏障环境 基础实验、教学\n\n---\n\n**p010** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_010.jpg)\n\n概述\n4.个体选择\n实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n年龄 毒理学试验选用的实验动物的年龄取决于实验\n的类型\n成年动物 急性试验\n年幼或初断乳动物 亚慢性、慢性试验\n实际工作中常以动物的体重粗略的判断动物的年龄\n\n---\n\n**p011** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_011.jpg)\n\n概述\n4.个体选择\n实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n性别 同物种、同品系但不同性别的实验动物对化学\n物毒性的敏感程度有差别\n无特殊要求 应选用雄两种性别\n已知不同性别敏感程度物 选择敏感的性别\n如实验中发现性别差异，应对实验结果分别统计分析\n\n---\n\n**p012** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_012.jpg)\n\n概述\n4.个体选择\n实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n毒理学试验一般应选用未产未孕的雌性动物\n生理状态 除进行与生殖有关的试验时需有计划地合笼交\n配外，雌雄动物应分笼饲养。\n毒理学试验应选用健康的动物。一般在试验前\n健康状态 检疫观察5-7天。对于大动物的亚慢性和慢性试\n验，还应进行血液学和血液生化学检查，剔除\n异常动物。\n如对狗进行试验，应该常规驱除肠道寄生虫\n\n---\n\n**p013** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_013.jpg)\n\n概述\n二、常用的染毒方法\n使动物通过一定的途径接触毒物\n根据试验的目的并结合人体的实际接触方\n染毒\n式、毒物的多少、理化性质以及设备条件\n等来决定。\n主要染毒途径：经口、经皮肤及经呼吸道吸入\n\n---\n\n**p014** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_014.jpg)\n\n概述\n1.经口染毒\n采用灌胃、吞服胶囊和饲喂的方式\n灌胃前需要禁食；\n灌胃 灌胃针从口角进入，针头轻压舌根，引起小\n鼠吞咽反射；\n进入食道后，继续入针时应无阻力。针头到\n达胃部后推动注射器，推入需要的计量\n竖直拔出针头，完成灌胃操作。\n注意： 若感到阻力或动物挣扎时，应该立即停止进针或将针拔出；\n参考给药量：小鼠0.1ml/10g体重，最大不超过0.5ml/10g体重\n\n---\n\n**p015** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_015.jpg)\n\n概述\n1.经口染毒\n采用灌胃、吞服胶囊和饲喂的方式\n迫使实验动物吞服胶囊\n吞服胶囊 该方法计量准确\n适合不合实验动物“口味”的药物\n饲喂 要求受试物占饲料的比例小于5%。\n\n---\n\n**p016** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_016.jpg)\n\n概述\n2.经呼吸道染毒\n静式吸入染毒和动式吸入染毒\n将实验动物置于密闭的染毒柜中，加入易挥\n静式吸入\n发的液态或气态受试物达到一定的浓度。\n动式吸入 采用机械通风装置，使实验动物在氧和二氧\n化碳分压较为恒定、受试化学物浓度也较为\n稳定的环境中进行\n\n---\n\n**p017** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_017.jpg)\n\n概述\n3.经皮肤染毒\n液态、气态、粉尘都有可能与皮肤接触\n研究化合物经皮肤吸收的毒性作用，及化合物对接触化合物\n皮肤的局部作用，均需使用经皮肤染毒的方式\n动物的被毛有碍于与化学物的直接接触，因此，\n在经皮肤染毒前需要去除染毒部位的被毛\n\n---\n\n**p018** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_018.jpg)\n\n概述\n4.其他方式\n根据试验目的和要求以及染毒物质的性状，还可选用腹腔注\n射、皮下注射、静脉注射等。\n\n---\n\n**p019** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_019.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n动物血液采集\n检查血液，可了解受试物对血液系统的作用，反应受试物对各\n器官系统功能及受试物代谢过程的影响。\n实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n小鼠 0.10 0800\n大鼠 1.00 2.005.00 10,00\n免猴 10.00 40.0015,00 60.00\n\n---\n\n**p020** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_020.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n小鼠、大鼠：\n所需血量不多时，可采用尾尖采血和眼眶静脉丛采血\n用血量较多时，可采用心脏采血法\n对采血后拟处死的动物，可采用断头采血法。\n实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n小鼠 0.10 0.30\n大鼠 1.00 2.00\n鼠 5.00 10.00\n免 10.00 40.0015,00 60.00\n\n---\n\n**p021** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_021.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n对豚鼠：可采用耳缘剪口采血和心脏采血\n对家兔：·可采用耳静脉采血，是家兔最为常用的取血\n法之一\n常作多次反复取血用，故保护耳缘静脉，防\n止发生栓塞。\n需血量较多少，也可采用心脏采血。\n\n---\n\n**p022** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_022.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n2.动物尿液、粪便的收集\n对尿液、粪便的分析，可了解受试物的吸收代谢的特点\n采用特制的容器（代谢笼）进行尿液、粪便的收集。\n必须保证粪便和尿液分开，以防止相互混合\n常用的粪尿分离收集器，其类型有玻璃、塘瓷、瓷器等制\n品，可根据实验室条件适当选用\n样品应在新鲜时进行检验\n实验期间膳食成分应一致，且须在特定时间内收集样品\n\n---\n\n**p023** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_023.jpg)\n\n概述\n四、实验动物处死方法\n处死要求\n尽量快速，不是动物集体发生与毒理试验无关的病理变化、\n操作简便为原则\n处死方法\n（1) 脱颈椎法：适用于对小动物（大、小白鼠）处死。\n(2) 断头法：适用于大、小白鼠处死。\n（3）麻醉法：置于有麻醉剂（氯仿或乙醚）的密闭容器内，使动物麻醉\n致死。大动物则须用注射麻醉剂法进行。\n（4）空气栓塞法：用注射器向动物静脉内迅速注人一定量的空气，使动\n物血管内形成大量气栓而致死。适用于大动物的处死。\n\n---\n\n**p024** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_024.jpg)\n\n概述\n五、实验动物的解剖检查\n病理形态学检查\n，对试验动物进行大体解部，观察各脏器有无异常\n准备\n复查动物的编号、实验组别、称体重，进行一般的体表状况的观察。\n\n---\n\n**p025** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_025.jpg)\n\n概述\n五、实验动物的解剖检查\n实质器官\n观察脏器的颜色、形状大小等情况。切面有无外翻，各结\n构层次是否清晰等。\n空腔器官\n观察其内容物的量和性质等变化\n\n---\n\n**p026** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_026.jpg)\n\n环境化学物一般毒性及其评价\n5.2环境化学物一般毒性及其评价\n一般毒性：\n包括急性毒性、亚慢性毒性和慢性毒性、蓄积毒性等\n特殊毒性：\n致畸、致癌、致突变、生殖、发育毒性\n毒物作用时间的长短是决定其毒性效应的主要因素之一\n\n---\n\n**p027** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_027.jpg)\n\n环境化学物一般毒性及其评价\n5.2环境化学物一般毒性及其评价\n案例\n近年来，马兜铃酸致癌致肾炎的新闻引起了人们的热议。临床上\n将马兜铃酸肾病分为三种类型：急性马兜铃酸肾病、慢性马兜铃酸肾病\n以及肾小管功能障碍型马兜铃酸肾病。\n急性马兜铃酸肾病：多由在较短的时间内，大量服用含有马兜铃酸的药物\n所致，临床表现主要为少尿或非少尿性急性肾功能衰竭。\n慢性马兜铃酸肾病：多由持续或间断小剂量服用含马兜铃酸药物所致，肾\n功能呈进行性损害。\n肾小管功能障碍型马兜铃酸肾病：通常在间断小量服用含马兜铃酸药物后\n数月出现症状，主要表现为肾小管性酸中毒等。由此可见，同样的毒物根\n据其染毒时间的长短和剂量大小的不同，可能导致不同的毒性作用\n\n---\n\n**p028** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_028.jpg)\n\n环境化学物一般毒性及其评价\n一、急性毒性\n急性毒性是指机体一次接触或24小时内多次接触某一化学物所引1起的\n毒性效应，包括死亡效应。\n一次·经口或经注射染毒则为操作时瞬间染毒；\n经呼吸道或经皮肤染毒则为特定期间内持续接触化学物的过程\n多次·毒性过低或一次染毒剂量受生物体容量限制，需要给予实验动\n物较大剂量时，可以在24h内多次染毒\n目的：\n是测定半数致死量（或浓度，LDso或LC5o），急性中毒國剂量（或浓度)。\n另外：急性毒性研究可为亚慢性、慢性毒性研究及其他毒理试验染毒剂\n量的设计和观察指标的选择提供依据，为毒性作用机制研究提供线索。\n\n---\n\n**p029** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_029.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n半数致死量（LD5o）的测定\n急性毒性大小常用LD表示；\n指的是半数试验动物死亡所使用的毒物剂量；\n若使用的是溶液，则用LC50\nLDs或LCs是急性有关指标中重要的参数；\nLD5o（LC5o）可能于毒性分级;\n毒性大小比较的依据；\nLD5o（mg/kg）、LCso（mg/kg），数值越小毒性越强。\n\n---\n\n**p030** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_030.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n急性毒性试验的一般操作流程\n·成年健康的小鼠\n选择受试生物：·\n雌、雄各半;\n若待测化学物对性别有名感性，则根据需求调整雌雄比例\n染毒方式和染毒计量的选择：\n·事先查阅文献，根据毒物结构和理化性质寻找类似化学物的毒性资料\n\n---\n\n**p031** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_031.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n急性毒性试验的一般操作流程\n染毒剂量：\n·取类似物种，染毒途径相同的LDso作为参考中值\n·以大剂量间隔染毒，找出相应的致死剂量范围（在少量动物上试验）\n·在这几个剂量范围设定几个试验组，进行正式实验。\n观察周期：\n·一般为14天（两周）\n依据受试动物测试相关规定确定观察周期\n对已知的速杀性药物，可缩短观察时间\n具体观察时间，应在试验报告及结果表示中说明，如7d的LD50\n根据观察期内动物的总死亡情况，计算LD50\n\n---\n\n**p032** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_032.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n半数致死剂量的影响因素\n?实验动物的饲养环境和营养因素\n实验人员操作的熟练程度\n受试化学物的浓度和稀释倍数\n同一外源化学物，同一品系动物；同样接触途径测定的LD50只值会有2-3倍差异\n虽然半数致死剂量是急性毒性试验最为重要的毒性指标，在试验过程中，\n同样可以观察体重变化、中毒症状，对死亡个体进行病理检查等进一步确\n定污染物的毒性作用方式。\n\n---\n\n**p033** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_033.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---亚慢性毒性试验\n在通常情况下啊，人类对环境污染物接触的水平较低，不至于发生急性中毒，\n却会在长期反复接触中慢性中毒。\n亚慢性毒性\n又称亚急性毒性，机体在相当于1/20左右生命期间，少量、反复接触有\n害化学和生物因素引起的损害作用。\n亚慢性毒性试验\n又称亚急性毒性试验，受试动物在1/20左右生命周期，每日、反复、多\n次接触受试物的毒性试验。\n举例：大鼠生命为2年（24月）\n需染毒：1~2个月\n1/20即1～2个月\n\n---\n\n**p034** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_034.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---慢性毒性试验\n慢性毒性\n机体长期、少量、反复接触外源化学物所应期的毒性效应，接触期限一\n般为大于生命期的10%；\n慢性毒性试验\n试验动物长期接触低剂量外来化学物，产生的生物学效应的试验称为慢\n性试验;\n特点：\n耗费的人力、物力和时间比较大，亚慢性毒性试验常作为慢性毒性试验\n的预备或筛选试验，必要时才进行慢性毒性试验\n染毒期长达2年或终生染毒的慢性毒性试验，常和致癌试验合并进行\n\n---\n\n**p035** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_035.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n两种试验在试验设计和方法上除染毒期限有所不同，其他基本相同\n受试动物\n受试动物的种属、品系，应该是在急性毒性试验中，已被确定为对受试物\n敏感的动物\n一般要求选择两种受试动物：啮齿类、非齿齿类动物各一类\n性别为雌雄各半\n建议选用年幼、初断奶的动物为试验对象，以便更全面了解受试物的毒效\n应\n\n---\n\n**p036** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_036.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n染毒剂量的选择\n一般应设置2个剂量组和1个对照组\n高剂量组：要能引起明显的中毒反应，不会让很多动物死亡\n低剂量组：不引起任何中毒反应\n\n---\n\n**p037** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_037.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n染毒途径\n应尽量模拟人类接触受试化学物的方式\n慢性、亚慢性毒性研究的染毒途径一致\n经胃肠道染毒时，毒物最好采用胃饲法\n受试化学物有异味或易水解时，也可采用灌胃方法染毒\n\n---\n\n**p038** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_038.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n染毒期限\n根据受试物的种类和试验动物的物种而定\n亚慢性毒性一般染毒1-3个月\n慢性毒性一般染毒3-24个月，甚至终生染毒\n\n---\n\n**p039** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_039.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n试验设计、观察指标\n（1）一般性指标\n敏感的综合性指标，综合反映毒物对机体的毒作用（外见体征；粪便性状；\n食物利用率；体重变化）\n（2）试验室检查\n包括血液学检查、肝功能、肾功能\n（3）病理组织学检查\n试验结束后，要及时解剖死亡的动物，肉眼观察大体病理变化，若有改变\n则需要做组织病理学检查，对于存活的动物也要做解部检查，必要时做组\n织病理学检查\n（4）特异性指标\n根据受试物的毒性资料，试验中的观察和受试物结构等增加其他指标的检查\n\n---\n\n**p040** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_040.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n试验设计、观察指标\n根据亚慢性毒性试验的结果，可以确定受试物的主要作用，靶器官对最大\n无作用水平和最大剂量做出初步估计，为进一步开展慢性毒性试验提供依据\n慢性毒性试验\n对受试物在低剂量长时间接触机体时引起的毒性作用有更深入的了解\n可以依据敏感观察指标出现异常的最小阀剂量\n找出该受试物慢性毒性作用的最大无作用剂量\n为受试物能否应用或为制定在环境中卫生标准提供重要的参考依据\n\n---\n\n**p041** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_041.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n蓄积作用的基本概念\n1）定义：\n当外源化学物连续进入机体，且吸收速度或总量超过代谢转化排除的总量\n或速度时，化学物质很有可能在体内增加并贮留，称为化学物的蓄积作用。\n化学物质容易蓄积的部位称为储存库；\n常见的储存库包括\n血浆蛋白\n脂肪组织\n肝肾\n骨骼\n大多数蓄积作用都会产生蓄积毒性\n\n---\n\n**p042** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_042.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n2）蓄积毒性作用\n低于中毒剂量的外源化学物反复与机体接触一定时间后致使机体出现中\n毒作用;\n3）环境污染物体内蓄积过程\n物质蓄积\n·可用化学方法测得体内污染物或代谢物\n污染物不断进入机体内，其吸收量大于排出量，使其在体内的量逐渐积累增多\n功能蓄积\n不断进入机体内的污染物，反复作用机体，引起机体一定结构和功能变化，\n并逐渐累积加重，最后导致出现损害作用；\n测不出该物质，例有机磷化合物。\n物质蓄积和功能蓄积是相对而言，同时存在又互为基础，在史籍中难以严格区别\n\n---\n\n**p043** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_043.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n定义：以生物效应为指标，用蓄积系数（k）评价蓄积作用，将多次染毒\n与一次染毒毒性效应进行比较\n优点：方法简便，是评价蓄积作用的常用方法；\n缺点：无法区别物质蓄积还是功能蓄积\n∑LD50(n）—→多次染毒使半数动物出现效应的总剂量\n蓄积系数（K）=\n表5-1蓄积作用强度分级（引自刘毓谷，环境毒理学教材，1987）\n蓄积系数（K） 蓄积作用强度\n<1 高度蓄积\n1~3 明显蓄积\n3~5 中度蓄积\n>5 轻度蓄积\n\n---\n\n**p044** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_044.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法（固定剂量法、剂量定期递增染毒法、剂量固定的20\n天蓄积法)\n固定剂量法\n使用大鼠或小鼠，通过经口灌胃、腹腔注射、染毒。试验周期为25-100天\n先求出LD5o-->选取相同条件的至少40只试验动物\n随机分为染毒组和对照组两组（每组至少20只，雌雄各半）\n每天以固定剂量在相同时间和相同途径对试验组进行染毒\n观察并记录动物死亡数\n当试验组一半动物死亡时即可终止试验 若接触剂量依据蓄积到\n计算累积的总的接触剂量(LDso(n) 5*LD5o的剂量，那么即便死\n亡数未超过半数，仍要终止\n根据公式计算K值 试验，此时K>5，表明蓄积作\n用不明显\n依据蓄积毒性强度分析进行评价\n\n---\n\n**p045** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_045.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法\n剂量定期递增染毒法\n大体上与固定剂量法一致，不一样的是试验开始时染毒组需要按0.1LDso剂量进行染毒\n以4天为一期\n按一定比例增加染毒剂量\n试验期最长28天\n注：试验期间需要定期（4天）一次给动物称重，按照实测体重调整染毒剂量\n\n---\n\n**p046** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_046.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法\n剂量固定的20天蓄积法\n口给予蓄积系数的原理设计\n口通常采用经口灌胃的染毒方式 1/20 LD501/10 LD50\n口将毒物随机分为5组（阴性对照*1，对照组*4）\n1/5  LD50\n·每组10只，雌雄各半 1/2LD50\n·每天染毒一次，连续20天\n口观察每组雌雄合计的死亡动物数\n口试验结束后，根据各实验组的死亡数对受试物的蓄积数强弱进行评定\n\n---\n\n**p047** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_047.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n2）生物半减期法：\n定义：用毒物动力学原理描述毒物在机体内蓄积作用的方法\n简称T1/2：外来化合物通过机体的生物转运和转化作用被消除一半所需要的\n时间\n生物半减期越长的物质，越不容易消除；发生蓄积作用的可能性就越大\n由于测定外来化学物在体内的生物半减期过程较为复杂，自实际观测中，\n常常间接的通过测定其血液、尿液或器官组织中的浓度（或量）降低一半\n所需的时间，用以代表该物质的生物半减期，根据测得的生物半减期的长\n短，来确定受试物的蓄积作用。\n\n---\n\n**p048** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_048.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n1）定义：\n遗传物质发生的可改变生殖或体细胞中的遗传信息，并产生新的表型效应\n的改变。\n2）基本类型：\n自发突变：自然条件下发生，频率很低；\n诱发突变：人为的或受各种因素诱发产生\n环境突变/环境诱变作用：有物理、化学、生物作用（紫外线、X射线，化\n学诱变剂，黄曲霉素等都可诱发突变）\n突变基础：根据DNA突变的大小，将突变分为两大类\n1基因突变（例如：红色花的后带变成蓝色）\n②染色体畸变\n\n---\n\n**p049** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_049.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n碱基置换 代的过程\n置换又分为转换和颠换两种形式\n基因突变\n转换：DNA多核苷酸链上同类碱基之间的取代，即密啶\n移码突变 被嘧啶，嘌呤被嘌呤取代\nAA 突变\n\n---\n\n**p050** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_050.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n碱基置换 代的过程\n置换又分为转换和颠换两种形式\n基因突变\n颠换：不同类碱基之间的取代，即嘌呤被嘧啶或嘧啶被\n移码突变 嘌呤取代\nGAA 突变\n\n---\n\n**p051** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_051.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故\nDNA —CATCATCA ATC\n翻译模板\nHis\n编码的氨基酸\n碱基置换 碱基A丢失\nCATCATCA CATCAHisHHisHHis ne1\n编码合成的蛋白质发生改变\n基因突变\nDNA序列插入或缺失除了三对以外的一对或几对碱基，而引\n移码突变 起密码编组的突变\n按照三联密码连续阅读的原则就会出现损伤部位以后整个遗\n传密码顺序完全改变，从而形成错误的密码，并转译成为不\n正常的氨基酸，细胞由此出现突变\n\n---\n\n**p052** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_052.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n2染色体畸变\n与碱基突变不同的是，染色体畸变可用显微镜直接观察到染色体结构和数目的改变\n进入 导致\n化学突变物 细胞中的染色体 染色体损伤或破坏\n染色体结构的畸变\n染色体在致突变作用物下的畸变\n染色体数目的畸变\n\n---\n\n**p053** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_053.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n2染色体畸变\n染色体结构的畸变\n染色体在职突变作用物下的畸变\n染色体数目的畸变\n染色体结构的畸变：裂隙、缺失、异位、重排、插入\n染色体数目的畸变：1整倍的改变，称为整倍体即二倍体、三倍体或多倍体；\n②非整组的单个或者多个染色体的增减（非整倍体）\n染色体数目为2n+1,2n+2,2n-1,2n-2，对应的称为三体、四体、单体、缺体\n\n---\n\n**p054** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_054.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的后果\n肿瘤\n化学致突变对人类健康的影响与其作用的靶细胞有关 畸胎\n体细胞发生突变时：只影响接触致突变物的个体，不影响下一代 高血压\n动脉硬化\n生殖细胞发生突变时会对后代变生影响\n细胞老化\n影响后代\n遗传性疾病\n显性致死 生殖细胞突变 影响人类基因库\n生育能力障碍 影响遗传负荷\n例如：唐纳氏综合征，多Y综合征\n\n---\n\n**p055** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_055.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n致突变试验用于实现对致突变作用的评价\n致突变试验是为了确定某种环境污染物对生物体是否具有致突变作用所进行的试验\n包括基于表型改变检测基因及小的缺失\n通过细胞学的方法观察大的染色体损伤\n基因点突变试验\n致突变试验方法根据终点反应不同 染色体畸变试验\nDNA损伤试验\n受试生物选择：微生物、哺乳动物、昆虫、植物等\n\n---\n\n**p056** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_056.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n1D基因点突变试验：细菌回复突变试验又称Ames试验\n基本原理：利用一种突变型微生物菌株，与被检的化学物质接触，如果这\n个化学物有致突变性，则会使细菌回复成野生状态，即可回复突变\nTA100、TA102均符合Ames实验要求。\nTA100 TA100\n沙门氏菌、大肠杆菌\nTA98 TA102\nTA98 TA102\nTA97 TA97\n图1.组氨酸营养缺陷实验\n\n---\n\n**p057** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_057.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n②微核试验\n微核：染色体或染色单体收到突变作用的影响想，形成无着丝点的短片，或者纺锤\n体受到损伤失去染色体，在细胞分裂的后期无法随着纺锤丝到达两级而遗留在细胞\n质中，形成N个规则的小体，这些小体的嗜染性同细胞核相似但比主核小的多。\nMicronucleus\n简便、\n快速、\n可靠\n\n---\n\n**p058** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_058.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n③染色体畸变试验\n基本原理：利用显微镜直接观察，生物体细胞受致突变物作用后，染\n色体发生数目和结构改变的情况\n\n---\n\n**p059** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_059.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n④显性致突变试验\n检测生殖细胞染色体的突变\n如染色体断裂所导致的缺失或重复\n如染色体重排形成的不平衡染色体的分离或不分离，即非整倍体\n注意：干扰因素多、灵敏性不够高、可校正体外实验或其他系统所得到的阳性\n结果，在实际工作中，为了得到更准确的结论，往往需要做一组致死突变试验\n在安全毒理学评价程序中，致死突变试验要求对上述四种试验中的任意三项进\n行实验，最后再根据结果进行判定，得出实验结论。\n\n---\n\n**p060** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_060.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n短肢畸形\n反应停导致近万名畸形儿的诞生，因此世界上开始大规模的研究致畸药物\n发现不少药物具有不同程度的致畸作用，如抗生素类，性激素类药物。\n\n---\n\n**p061** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_061.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n把凡是在一定剂量下，能通过母体对胚胎正常反应过程造成干扰，引起胚\n胎发育障碍而导致子代出生后，发生畸形的物质称为致畸物或致畸原\n把致畸物通过母体作用于胚胎而引起胎儿畸形的现象称为致畸作用\n评定外来化学物是否具有致畸作用的试验称为致畸试验\n\n---\n\n**p062** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_062.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n胚胎于致畸物发生接触时，因为发育阶段不同，导致敏感性不同\n器官形成期中胚胎对致畸物最为敏感，因此称为敏感期或危险期\n同一致畸物与胚胎接触时，因胚胎发育阶段不同，引起不同的致畸;\n风疹病毒，孕妇在不同时期感染，可引起不同的先天畸形;\n妊娠第四周感染可引起无脑儿或脊髓裂\n妊娠第五周感染可引起无肢畸形\n妊娠6-9周感染可引起牙畸形\n\n---\n\n**p063** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_063.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n致畸作用表现出明显的种属差异\n不同种属的动物对致畸物的代谢过程和本身胎盘结构均不同，从而导致不\n同种系的动物表现出不同的敏感性\n反应停对兔子和人有致畸作用，但对其他的哺乳动物不能引起致畸\n\n---\n\n**p064** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_064.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n现实生物中引起的致畸作用\n物理因素中的电离辐射（x光射片）\n生物因素中病毒的感染\n天然条件下的出生缺陷\n水硬度有关的中枢系统畸形的发生；\n水气象有关的胎儿畸形\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n化学因素（甲基汞、环境激素）\n\n---\n\n**p065** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_065.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n现实生物中引起的致畸作用\n天然条件下的出生缺陷\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n高放射本底地区的辐射主要来自地壳中的铀、针、钾－40等放射性核素，以及宇宙射线。例如：\n·中国阳江：年有效剂量约6.4mSv（全球平均为2.4mSv），主要由地表射线和氢气贡献。\n·印度喀拉拉邦：沿海地区因独居石砂矿（富含铀、针）导致辐射水平达10-20mSv/年。\n·伊朗拉姆萨尔：部分居民区室内氢浓度高达31，000Bq/m²，年有效剂量达71mSv。\n\n---\n\n**p066** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_066.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n试验操作\n致畸试验\n用于检测某些环境污染物能否通过妊娠母体引起胚胎畸形的一种动物实验方法。\n致畸试验步骤\n代谢过程要与人类相近\n受试生物的选择\n胎盘与人类胚胎构造相似（包括胚胎的层数和厚度）\n体型小\n动物试验选取原则 易繁殖 多采用大鼠、小鼠和家兔实验动物\n价格低廉\n\n---\n\n**p067** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_067.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n试验操作\n致畸试验\n剂量分组：通常根据试验目的和要求决定\n）只做有无致畸作用的定性检测，则剂量组较少；\n若还需要探讨毒性作用的靶器官，则剂量组增多；\n在正式试验前要先做预实验，用于确定实验所需试验剂量范围\n若未做预实验，则一般以1/30-1/2的LD5o为最高剂量组，\n1/30-1/100LD50为低剂量组，\n按等比例差在高低剂量组之间插入中间剂量组\n5以交配后确定已受精的雌性动物为计数对象（鼠类：15-20只；家兔：7-8只）\n6在进行实验时，除了各试验组外，还应同时设立阴性和阳性对照组\n\n---\n\n**p068** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_068.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n试验操作\n致畸试验\n剂量分组：通常根据试验目的和要求决定\n7实验处理上，需要先将性成熟但为交配过的雌鼠和雄鼠同笼过夜，确定雌鼠受\n孕后，推算孕龄，在胚胎的“敏感期”进行受试物暴露\n致畸实验常用的终点指标：暴露完之后的解部，观察\n实验动物的解剖时间为分娩前1-2天为宜，对胚胎的外部骨骼和内脏进行检查，\n并且通过多方面分析致畸试验结果。\n\n---\n\n**p069** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_069.jpg)\n\n2.环境化学物特殊毒性及其评价\n恶性肿瘤怎么产生的\n：框在点击“”时会进行转换，用时则会变为可点击的视频。框移位和\n\n---\n\n**p070** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_070.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌\n恶性的肿瘤，严重威胁人类健康的主要疾病之一；\n人类肿瘤80-90%与环境因素有关，包括物理、化学、生物因素；\n病因分析，人类肿瘤80-85%与化学因素有关\n把诱发肿瘤的化学物质称为化学致癌物\n（①有机化学物，②天然化学物，③无机化学物，4合成化学物）\n\n---\n\n**p071** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_071.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌\n肿瘤形成过程：\n1引发阶段：指正常细胞在化学致癌物直接或间接作用下转变为癌前细胞的过程\n2促长阶段：经过引发的癌细胞不断增殖，直至形成临床上可被检出的肿块过程\n③进展阶段：指引发细胞群进一步的表型改变；包括恶性前型转变为恶性型细胞等过程\n毒性方面化学致癌物的致癌作用与一般毒性作用在许多方面有一定的相似之处\n\n---\n\n**p072** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_072.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌物在体内也进行生物转化，但同时也有其自身的特点\n1化学致癌物引起的生物学效应，具有持久性和迟发性\n②在动物实验中，当剂量相等时，多次给予受试物比一次给予所产生的效应更大\n③从机理来看致癌作用和宿主细胞的遗传物质或其他细胞大分子的相互作用有关\n致癌作用的本质是致癌物通过DNA加合物形成、氧化损伤或\n表观遗传调控，引发体细胞突变并破坏细胞生长调控网络。这\n一过程具有剂量依赖性和时间依赖性\n\n---\n\n**p073** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_073.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n①体细胞突变学说\n化学\n突变\n致癌因素 物理 体细胞((DNA) →致癌\n生物\n致癌形成的基础是体细胞发生突变\n\n---\n\n**p074** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_074.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n②分化障碍学说\n干扰 分化\n致癌因素 细胞 ?紊乱 癌变\n增殖\n细胞癌变只需要细胞分化过程有关的基因调控过程受致癌因素感染，\n使细胞分化和增殖发生素乱\n\n---\n\n**p075** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_075.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n③癌基因学说\n正常情况下，癌基因处于阻遏状态，只有当细胞内有关的调节机\n制遭到破坏的情况下，癌基因才能表达，导致癌变形成肿瘤;\n不同的致癌学只是侧重点不同，互有交叉，可能是在致癌作用的不同阶段\n所起作用不同而已。\n\n---\n\n**p076** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_076.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n致癌试验是一种特殊的慢性毒性试验，目的是检验环境污染物或其代谢物是否具\n有致癌或诱发肿瘤作用\n致癌试验重要方法：完整的哺乳动物长期试验\n一些短期快速筛检试验方法：满足大量外来化合物进行致癌试验\n1哺乳动物细胞体外转化法：有无致癌性的重要方法\n2优点：周期短、经济、方便、能直接与靶细胞作用\n当一种化学物已经通过短期试验证明其具有潜在致癌性或者其化学结构与某种已\n知致癌物十分近似，又在人类社会中具有实际应用价值时，应进行长期动物诱癌\n实验\n\n---\n\n**p077** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_077.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n诱癌动物试验与慢性试验类似\n首选啮齿类动物为受试生物：具有诱发肿瘤的感受性强、生物周期短、繁殖快、\n费用低等优点。\n存在问题\n1高剂量的动物诱癌试验结果与人类实际接触的“低剂量“致癌物不同\n2其次人体和动物体内代谢酶系统存在着差别\n③动物“自发”肿瘤率在不同动物种系之间差别很大，人与动物之间可能也存在很大差别\n因此动物试验的结果不能完全代表人体的生物学改变\n\n---\n\n**p078** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_078.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n剂量分组及染毒途径和期限\n设置对照组、最大耐受剂量和两个中间剂量（共4组）\n设置对照组、最大耐受剂量和半数最大耐受剂量（共3组）\n每组雌雄动物各74只\n体重变化不应超过平均体重的±20%\n染毒途径要模拟人体接触途径\n\n---\n\n**p079** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_079.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n观察指标\n①一般情况\n试验头三个月每周称一次动物体重，以后每两周称一次。\n消化道染毒时应计算食物或饮水消耗量\n每天观察两次动物，发现死亡、垂死的和临床异常的动物，应详细记载。\n试验第15个月时每组雌雄动物各处死10只，其余在第24个月处死，详细尸检\n和病理检查，同时进行血液生化检查\n②肿瘤发生情况\n记录肿瘤出现时间、部位、大小、数目、外形、硬度和发展情况\n\n---\n\n**p080** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_080.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n观察指标\n③病理学检查\n·作完整的尸体解剖，检查所有器官组织。\n4肿瘤发生率\n肿瘤发生率三天 试验终了时患肿瘤动物总数\n有效动物总数（最早出现肿瘤时的存活动物总数） X100%\n5潜伏期\n以各试验组第一例肿瘤发现的时间作潜伏期。\n6平均肿瘤数\n一个器官出现多个肿瘤或多个器官出现肿瘤，都可使平均肿瘤数增加，此数表示肿瘤的多\n发性。\n\n---\n\n**p081** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_081.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n结果判定\n①肿瘤只发生在受试组动物，对照组无肿瘤，或受试组出现对照组没有的肿瘤类型\n2受试组与对照组动物均发生肿瘤，但受试组发生率高\n③受试组的平均肿瘤数高于对照组\n4受试组与对照组的肿瘤发生率虽无显著差异，但受试组肿瘤发生的潜伏期短。\n上述四条中，通过统计学分析，任何一条有显著性差异并存在剂量反应关系是即\n可认为受试物的致癌试验为阳性\n\n---\n\n**p082** ![](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_082.jpg)\n\n2.环境化学物特殊毒性及其评价\n谢谢\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 3 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 6 节 · 50 页\n\n> `006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素.pdf` · 涉章 [4]\n\n- [p001](../006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素/page_001.jpg)  · 第四章 环境污染物的毒作\n- [p002](../006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素/page_002.jpg)  · 主要内容：\n- [p003](../006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素/page_003.jpg)  · 第四章\n- ...余 47 页, 参 [`006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素/`](../006-第四章 环境污染物的毒作用及其影响因素-第四章 环境污染物的毒作用及其影响因素/)\n\n### 辅 2 · 第 7 节 · 50 页\n\n> `007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素.pdf` · 涉章 [4]\n\n- [p001](../007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素/page_001.jpg)  · 第四章 环境污染物的毒作\n- [p002](../007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素/page_002.jpg)  · 主要内容：\n- [p003](../007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素/page_003.jpg)  · 2009年2月20日，因自来水水源受到酚类化合物污染，江苏盐城大面积断水近67\n- ...余 47 页, 参 [`007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素/`](../007-第四章 环境污染物的毒作用及其影响因素（2）-第四章 环境污染物的毒作用及其影响因素/)\n\n### 辅 3 · 第 8 节 · 50 页\n\n> `008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素.pdf` · 涉章 [4]\n\n- [p001](../008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素/page_001.jpg)  · 第四章 环境污染物的毒作\n- [p002](../008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素/page_002.jpg)  · 主要内容：\n- [p003](../008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素/page_003.jpg)  · 2009年2月20日，因自来水水源受到酚类化合物污染，江苏盐城大面积断水近67\n- ...余 47 页, 参 [`008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素/`](../008-第四章 环境污染物的毒作用及其影响因素（3）-第四章 环境污染物的毒作用及其影响因素/)\n\n## 跨章节备注\n\n此章之课件亦覆盖 第 5 章, 复习时宜与彼章互参。\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 环境污染物的毒作用及其影响因素\n## 核心概念\ 能蓄积**：污染物反复作用机体引起结构和功能变化逐渐累积加重，但测不出该物质（如有机磷化合物）\n- [x] **蓄积系数K**：K = ∑LD₅₀(n) / LD₅₀(1)，多次染毒与一次染毒毒性效应之比\n- [x] **致突变作用**：遗传物质发生的可改变生殖或体细胞遗传信息并产生新表型效应的改变\n- [x] **基因突变（点突变）**：DNA在分子水平上碱基对组成或排列顺序改变，包括碱基置换（转换/颠换）和移码突变\n- [x] **染色体畸变**：可用显微镜直接观察到的染色体结构（裂隙、缺失、异位、重排、插入）和数目（整倍体/非整倍体）改变\n- [x] **致畸作用**：致畸物通过母体作用于胚胎引起胎儿畸形的现象；器官形成期最敏感\n- [x] **化学致癌物**：诱发肿瘤的化学物质；人类肿瘤80-85%与化学因素有关\n- [x] **肿瘤形成三阶段**：引发阶段（正常细胞→癌前细胞）→促长阶段（癌细胞增殖→肿块）→进展阶段（恶性前型→恶性型）\n\n### 二、关键公式 / 模型\n\n- **LD₅₀**：半数致死量（mg/kg），数值越小毒性越强\n- **蓄积系数**：K = ∑LD₅₀(n) / LD₅₀(1)\n  - K<1 高度蓄积 | 1~3 明显蓄积 | 3~5 中度蓄积 | >5 轻度蓄积\n- **蓄积系数测定法**：固定剂量法、剂量定期递增染毒法、剂量固定20天蓄积法\n- **生物半减期法**：T₁/₂越长→越不易消除→蓄积可能性越大\n- **肿瘤发生率** = 试验终了时患肿瘤动物总数 / 有效动物总数 × 100%\n- **致癌试验结果判定四条**（任一条有显著性+剂量反应关系=阳性）：\n  1. 受试组出现对照组没有的肿瘤类型\n  2. 受试组肿瘤发生率高于对照组\n  3. 受试组平均肿瘤数高于对照组\n  4. 受试组肿瘤潜伏期短于对照组\n\n### 三、重要案例 / 实验 / 例题\n\n- **马兜铃酸致癌致肾炎**：急性（短时间大量→急性肾衰）、慢性（持续小剂量→进行性损害）、肾小管功能障碍型（间断小量→肾小管酸中毒），同毒物不同染毒时间/剂量→不同毒性\n- **反应停（沙利度胺）致畸**：导致近万名短肢畸形儿诞生，对兔和人致畸但对其他哺乳动物不致畸→种属差异\n- **风疹病毒致畸**：第4周→无脑儿/脊髓裂，第5周→无肢畸形，6-9周→牙畸形→不同发育阶段敏感性不同\n- **高放射本底地区**：中国阳江6.4mSv/年、印度喀拉拉邦10-20mSv/年、伊朗拉姆萨尔71mSv/年\n- **Ames试验**：细菌回复突变试验，利用突变型微生物与被检化学物接触，若致突变则回复野生型（TA98/TA100等菌株）\n- **微核试验**：染色体/染色单体受突变形成无着丝点短片或纺锤体损伤遗留胞质，简便快速可靠\n\n### 四、高频考点（速记）\n\n1. **一般毒性vs特殊毒性**：一般=急性/亚慢性/慢性/蓄积；特殊=致畸/致癌/致突变/生殖/发育\n2. **急性毒性试验**：测定LD₅₀，观察期一般14天，选成年健康小鼠雌雄各半\n3. **亚慢性毒性**：染毒1-3个月，选年幼初断奶动物，2剂量组+1对照组\n4. **慢性毒性**：染毒3-24月甚至终生，常与致癌试验合并进行\n5. **蓄积作用两种**：物质蓄积（可测出）+功能蓄积（测不出，如有机磷），两者同时存在互为基础\n6. **蓄积系数K分级**：<1高度 | 1~3明显 | 3~5中度 | >5轻度\n7. **基因突变两类**：碱基置换（转换=同类碱基互换，颠换=异类碱基互换）+移码突变（插入/缺失非3倍数碱基→密码阅读框移位）\n8. **染色体畸变**：结构畸变（裂隙/缺失/异位/重排/插入）+数目畸变（整倍体/非整倍体如2n+1三体）\n9. **致突变后果**：体细胞突变→只影响个体（肿瘤/畸胎/高血压等）；生殖细胞突变→影响后代（遗传病/显性致死/基因库）\n10. **致畸试验要点**：器官形成期为敏感期，选大鼠/小鼠/家兔，剂量1/30~1/2 LD₅₀，分娩前1-2天解剖\n11. **致癌三学说**：体细胞突变学说、分化障碍学说、癌基因学说\n12. **致癌试验**：设4组（对照+最大耐受+2中间），每组雌雄各74只，模拟人体接触途径\n\n### 五、思考题 / 自测\n\n- [x] 题：LD₅₀数值越小毒性如何？ 答：毒性越强\n- [x] 题：物质蓄积vs功能蓄积区别？ 答：物质蓄积可用化学方法测出体内量；功能蓄积测不出物质但功能累积加重（如有机磷）\n- [x] 题：蓄积系数K=2属于什么蓄积？ 答：明显蓄积（1~3范围）\n- [x] 题：基因突变中转换vs颠换？ 答：转换=同类碱基互换（嘧啶↔嘧啶/嘌呤↔嘌呤）；颠换=异类碱基互换（嘌呤↔嘧啶）\n- [x] 题：致畸敏感期是什么？ 答：器官形成期\n- [x] 题：Ames试验原理？ 答：突变型细菌与被检物接触→若致突变则回复突变成野生型\n\n### 六、与前后章之关联\n\n- 承前章：第3章讨论生物转运（吸收/分布/代谢/排泄），本章在此基础上评价毒作用大小和类型\n- 启后章：第5章为环境毒理学常用实验方法，本章的毒作用评价方法是实验设计的理论基础\n"}, {"id": "ch-05", "group": "章节素材", "title": "第05章 环境毒理学常用实验方法", "md": "# 环境毒理学 · 第 5 章 · 环境毒理学常用实验方法 · 素材\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 章下 PDF: 4 个 · 总页: 286\n> 主版: 第 10 节 · 82 页\n\n---\n\n## 主版课件 · 第 10 节\n\n> `010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法.pdf`\n\n<details><summary>展开 82 页图链<\/summary>\n\n- [p001](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_001.jpg)  · 环境毒理学\n- [p002](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_002.jpg)  · 第五章环境毒理学常用实验方法\n- [p003](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_003.jpg)  · 5.1 概述\n- [p004](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_004.jpg)  · 概述\n- [p005](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_005.jpg)  · 概述\n- [p006](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_006.jpg)  · 概述\n- [p007](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_007.jpg)  · 概述\n- [p008](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_008.jpg)  · 概述\n- [p009](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_009.jpg)  · 概述\n- [p010](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_010.jpg)  · 概述\n- [p011](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_011.jpg)  · 概述\n- [p012](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_012.jpg)  · 概述\n- [p013](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_013.jpg)  · 概述\n- [p014](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_014.jpg)  · 概述\n- [p015](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_015.jpg)  · 概述\n- [p016](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_016.jpg)  · 概述\n- [p017](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_017.jpg)  · 概述\n- [p018](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_018.jpg)  · 概述\n- [p019](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_019.jpg)  · 概述\n- [p020](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_020.jpg)  · 概 ge_006.jpg)\n\n概述\n1.物种的选择--－基本原则\n对外源的毒性反应及代谢特点与人类接近的物种\n自然寿命不太长的物种\n易于饲养和实验操作的物种\n经济并易于获得的物种\n\n---\n\n**p007** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_007.jpg)\n\n概述\n1.物种的选择--－常用动物\n选用两个物种进行试验、评价毒性反应的物种差异\n\n---\n\n**p008** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_008.jpg)\n\n概述\n2.品系的选择\n品系 用计划交配的方法获得的起源于共同祖先的一群动物。\n具有共同的遗传来源、相似的外貌特征、独特的生物\n同一品系\n学特性及稳定的遗传性能\n类别 遗传特性 繁殖方式 应用场景\n近交系动物 基因高度纯 连续兄妹/亲 遗传研究、\n近交系动物 合 子交配\n药物测试\n突变系动物 疾病模型、\n根据实验需要 携带特定基 选择性交配或基\n突变系动物 基因功能研\n因突变 因编辑 究\n杂交群动物\nF1代杂合 干细胞研究、\n杂交群动物 两个近交系杂交\n封闭群动物 子 免疫实验\n遗传多样性 毒理学、行\n封闭群动物 群体内随机交配\n高 为学研究\n\n---\n\n**p009** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_009.jpg)\n\n概述\n3.微生物控制的选择\n为确保实验结果的真实性、可靠性和增加可比性、可\n微生物控制\n重复性及科学性。\n应对实验动物携带的微生物控制，根据对动物微生物\n实验动物分类\n控制的净化水平，我国将实验动物分为无菌动物、悉\n生动物、无特定病原体动物和清洁动物。\n等级 微生物控制 饲养环境 应用场景\n无菌动物 完全无微生物 无菌隔离器 微生物组、免疫机制研究\n悉生动物 已知特定微生物 无菌隔离器 特定菌群功能研究\nSPF动物 排除特定病原体 屏障环境 生物医学研究、疫苗开发\n清洁动物 排除常见病原体 普通屏障环境 基础实验、教学\n\n---\n\n**p010** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_010.jpg)\n\n概述\n4.个体选择\n实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n年龄 毒理学试验选用的实验动物的年龄取决于实验\n的类型\n成年动物 急性试验\n年幼或初断乳动物 亚慢性、慢性试验\n实际工作中常以动物的体重粗略的判断动物的年龄\n\n---\n\n**p011** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_011.jpg)\n\n概述\n4.个体选择\n实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n性别 同物种、同品系但不同性别的实验动物对化学\n物毒性的敏感程度有差别\n无特殊要求 应选用雄两种性别\n已知不同性别敏感程度物 选择敏感的性别\n如实验中发现性别差异，应对实验结果分别统计分析\n\n---\n\n**p012** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_012.jpg)\n\n概述\n4.个体选择\n实验动物对毒物的反应存在差异\n选择实验动物时，需要考虑实验动物的年龄、性别、 生理状态和\n健康状态等。\n毒理学试验一般应选用未产未孕的雌性动物\n生理状态 除进行与生殖有关的试验时需有计划地合笼交\n配外，雌雄动物应分笼饲养。\n毒理学试验应选用健康的动物。一般在试验前\n健康状态 检疫观察5-7天。对于大动物的亚慢性和慢性试\n验，还应进行血液学和血液生化学检查，剔除\n异常动物。\n如对狗进行试验，应该常规驱除肠道寄生虫\n\n---\n\n**p013** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_013.jpg)\n\n概述\n二、常用的染毒方法\n使动物通过一定的途径接触毒物\n根据试验的目的并结合人体的实际接触方\n染毒\n式、毒物的多少、理化性质以及设备条件\n等来决定。\n主要染毒途径：经口、经皮肤及经呼吸道吸入\n\n---\n\n**p014** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_014.jpg)\n\n概述\n1.经口染毒\n采用灌胃、吞服胶囊和饲喂的方式\n灌胃前需要禁食；\n灌胃 灌胃针从口角进入，针头轻压舌根，引起小\n鼠吞咽反射；\n进入食道后，继续入针时应无阻力。针头到\n达胃部后推动注射器，推入需要的计量\n竖直拔出针头，完成灌胃操作。\n注意： 若感到阻力或动物挣扎时，应该立即停止进针或将针拔出；\n参考给药量：小鼠0.1ml/10g体重，最大不超过0.5ml/10g体重\n\n---\n\n**p015** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_015.jpg)\n\n概述\n1.经口染毒\n采用灌胃、吞服胶囊和饲喂的方式\n迫使实验动物吞服胶囊\n吞服胶囊 该方法计量准确\n适合不合实验动物“口味”的药物\n饲喂 要求受试物占饲料的比例小于5%。\n\n---\n\n**p016** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_016.jpg)\n\n概述\n2.经呼吸道染毒\n静式吸入染毒和动式吸入染毒\n将实验动物置于密闭的染毒柜中，加入易挥\n静式吸入\n发的液态或气态受试物达到一定的浓度。\n动式吸入 采用机械通风装置，使实验动物在氧和二氧\n化碳分压较为恒定、受试化学物浓度也较为\n稳定的环境中进行\n\n---\n\n**p017** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_017.jpg)\n\n概述\n3.经皮肤染毒\n液态、气态、粉尘都有可能与皮肤接触\n研究化合物经皮肤吸收的毒性作用，及化合物对接触化合物\n皮肤的局部作用，均需使用经皮肤染毒的方式\n动物的被毛有碍于与化学物的直接接触，因此，\n在经皮肤染毒前需要去除染毒部位的被毛\n\n---\n\n**p018** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_018.jpg)\n\n概述\n4.其他方式\n根据试验目的和要求以及染毒物质的性状，还可选用腹腔注\n射、皮下注射、静脉注射等。\n\n---\n\n**p019** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_019.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n动物血液采集\n检查血液，可了解受试物对血液系统的作用，反应受试物对各\n器官系统功能及受试物代谢过程的影响。\n实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n小鼠 0.10 0800\n大鼠 1.00 2.005.00 10,00\n免猴 10.00 40.0015,00 60.00\n\n---\n\n**p020** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_020.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n小鼠、大鼠：\n所需血量不多时，可采用尾尖采血和眼眶静脉丛采血\n用血量较多时，可采用心脏采血法\n对采血后拟处死的动物，可采用断头采血法。\n实验动物采血量\n动物品种 最大安全采血量（mL） 最小致死采血量（mL）\n小鼠 0.10 0.30\n大鼠 1.00 2.00\n鼠 5.00 10.00\n免 10.00 40.0015,00 60.00\n\n---\n\n**p021** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_021.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n1.动物血液采集\n对豚鼠：可采用耳缘剪口采血和心脏采血\n对家兔：·可采用耳静脉采血，是家兔最为常用的取血\n法之一\n常作多次反复取血用，故保护耳缘静脉，防\n止发生栓塞。\n需血量较多少，也可采用心脏采血。\n\n---\n\n**p022** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_022.jpg)\n\n概述\n三、实验动物生物材料的收集方法\n2.动物尿液、粪便的收集\n对尿液、粪便的分析，可了解受试物的吸收代谢的特点\n采用特制的容器（代谢笼）进行尿液、粪便的收集。\n必须保证粪便和尿液分开，以防止相互混合\n常用的粪尿分离收集器，其类型有玻璃、塘瓷、瓷器等制\n品，可根据实验室条件适当选用\n样品应在新鲜时进行检验\n实验期间膳食成分应一致，且须在特定时间内收集样品\n\n---\n\n**p023** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_023.jpg)\n\n概述\n四、实验动物处死方法\n处死要求\n尽量快速，不是动物集体发生与毒理试验无关的病理变化、\n操作简便为原则\n处死方法\n（1) 脱颈椎法：适用于对小动物（大、小白鼠）处死。\n(2) 断头法：适用于大、小白鼠处死。\n（3）麻醉法：置于有麻醉剂（氯仿或乙醚）的密闭容器内，使动物麻醉\n致死。大动物则须用注射麻醉剂法进行。\n（4）空气栓塞法：用注射器向动物静脉内迅速注人一定量的空气，使动\n物血管内形成大量气栓而致死。适用于大动物的处死。\n\n---\n\n**p024** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_024.jpg)\n\n概述\n五、实验动物的解剖检查\n病理形态学检查\n，对试验动物进行大体解部，观察各脏器有无异常\n准备\n复查动物的编号、实验组别、称体重，进行一般的体表状况的观察。\n\n---\n\n**p025** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_025.jpg)\n\n概述\n五、实验动物的解剖检查\n实质器官\n观察脏器的颜色、形状大小等情况。切面有无外翻，各结\n构层次是否清晰等。\n空腔器官\n观察其内容物的量和性质等变化\n\n---\n\n**p026** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_026.jpg)\n\n环境化学物一般毒性及其评价\n5.2环境化学物一般毒性及其评价\n一般毒性：\n包括急性毒性、亚慢性毒性和慢性毒性、蓄积毒性等\n特殊毒性：\n致畸、致癌、致突变、生殖、发育毒性\n毒物作用时间的长短是决定其毒性效应的主要因素之一\n\n---\n\n**p027** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_027.jpg)\n\n环境化学物一般毒性及其评价\n5.2环境化学物一般毒性及其评价\n案例\n近年来，马兜铃酸致癌致肾炎的新闻引起了人们的热议。临床上\n将马兜铃酸肾病分为三种类型：急性马兜铃酸肾病、慢性马兜铃酸肾病\n以及肾小管功能障碍型马兜铃酸肾病。\n急性马兜铃酸肾病：多由在较短的时间内，大量服用含有马兜铃酸的药物\n所致，临床表现主要为少尿或非少尿性急性肾功能衰竭。\n慢性马兜铃酸肾病：多由持续或间断小剂量服用含马兜铃酸药物所致，肾\n功能呈进行性损害。\n肾小管功能障碍型马兜铃酸肾病：通常在间断小量服用含马兜铃酸药物后\n数月出现症状，主要表现为肾小管性酸中毒等。由此可见，同样的毒物根\n据其染毒时间的长短和剂量大小的不同，可能导致不同的毒性作用\n\n---\n\n**p028** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_028.jpg)\n\n环境化学物一般毒性及其评价\n一、急性毒性\n急性毒性是指机体一次接触或24小时内多次接触某一化学物所引1起的\n毒性效应，包括死亡效应。\n一次·经口或经注射染毒则为操作时瞬间染毒；\n经呼吸道或经皮肤染毒则为特定期间内持续接触化学物的过程\n多次·毒性过低或一次染毒剂量受生物体容量限制，需要给予实验动\n物较大剂量时，可以在24h内多次染毒\n目的：\n是测定半数致死量（或浓度，LDso或LC5o），急性中毒國剂量（或浓度)。\n另外：急性毒性研究可为亚慢性、慢性毒性研究及其他毒理试验染毒剂\n量的设计和观察指标的选择提供依据，为毒性作用机制研究提供线索。\n\n---\n\n**p029** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_029.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n半数致死量（LD5o）的测定\n急性毒性大小常用LD表示；\n指的是半数试验动物死亡所使用的毒物剂量；\n若使用的是溶液，则用LC50\nLDs或LCs是急性有关指标中重要的参数；\nLD50（LC5o）可能于毒性分级;\n毒性大小比较的依据；\nLD5o（mg/kg）、LC5o（mg/kg），数值越小毒性越强。\n\n---\n\n**p030** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_030.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n急性毒性试验的一般操作流程\n·成年健康的小鼠\n选择受试生物：·\n雌、雄各半;\n若待测化学物对性别有敏感性，则根据需求调整雌雄比例\n染毒方式和染毒计量的选择：\n·事先查阅文献，根据毒物结构和理化性质寻找类似化学物的毒性资料\n\n---\n\n**p031** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_031.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验---哺乳动物的急性毒性实验：\n急性毒性试验的一般操作流程\n染毒剂量：\n·取类似物种，染毒途径相同的LDso作为参考中值\n·以大剂量间隔染毒，找出相应的致死剂量范围（在少量动物上试验）\n·在这几个剂量范围设定几个试验组，进行正式实验。\n观察周期：\n·一般为14天（两周）\n依据受试动物测试相关规定确定观察周期\n对已知的速杀性药物，可缩短观察时间\n具体观察时间，应在试验报告及结果表示中说明，如7d的LD50\n根据观察期内动物的总死亡情况，计算LD50\n\n---\n\n**p032** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_032.jpg)\n\n1.环境化学物一般毒性及其评价\n一、急性毒性试验 ---哺乳动物的急性毒性实验：\n半数致死剂量的影响因素\n?实验动物的饲养环境和营养因素\n实验人员操作的熟练程度\n受试化学物的浓度和稀释倍数\n同一外源化学物，同一品系动物；同样接触途径测定的LD50只值会有2-3倍差异\n虽然半数致死剂量是急性毒性试验最为重要的毒性指标，在试验过程中，\n同样可以观察体重变化、中毒症状，对死亡个体进行病理检查等进一步确\n定污染物的毒性作用方式。\n\n---\n\n**p033** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_033.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---亚慢性毒性试验\n在通常情况下啊，人类对环境污染物接触的水平较低，不至于发生急性中毒，\n却会在长期反复接触中慢性中毒。\n亚慢性毒性\n又称亚急性毒性，机体在相当于1/20左右生命期间，少量、反复接触有\n害化学和生物因素引起的损害作用。\n亚慢性毒性试验\n又称亚急性毒性试验，受试动物在1/20左右生命周期，每日、反复、多\n次接触受试物的毒性试验。\n举例：大鼠生命为2年（24月）\n需染毒：1~2个月\n1/20即1～2个月\n\n---\n\n**p034** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_034.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验 ---慢性毒性试验\n慢性毒性\n机体长期、少量、反复接触外源化学物所应期的毒性效应，接触期限一\n般为大于生命期的10%；\n慢性毒性试验\n试验动物长期接触低剂量外来化学物，产生的生物学效应的试验称为慢\n性试验;\n特点：\n耗费的人力、物力和时间比较大，亚慢性毒性试验常作为慢性毒性试验\n的预备或筛选试验，必要时才进行慢性毒性试验\n染毒期长达2年或终生染毒的慢性毒性试验，常和致癌试验合并进行\n\n---\n\n**p035** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_035.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n两种试验在试验设计和方法上除染毒期限有所不同，其他基本相同\n受试动物\n受试动物的种属、品系，应该是在急性毒性试验中，已被确定为对受试物\n敏感的动物\n一般要求选择两种受试动物：啮齿类、非齿齿类动物各一类\n性别为雌雄各半\n建议选用年幼、初断奶的动物为试验对象，以便更全面了解受试物的毒效\n应\n\n---\n\n**p036** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_036.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n染毒剂量的选择\n一般应设置2个剂量组和1个对照组\n高剂量组：要能引起明显的中毒反应，不会让很多动物死亡\n低剂量组：不引起任何中毒反应\n\n---\n\n**p037** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_037.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n染毒途径\n应尽量模拟人类接触受试化学物的方式\n慢性、亚慢性毒性研究的染毒途径一致\n经胃肠道染毒时，毒物最好采用胃饲法\n受试化学物有异味或易水解时，也可采用灌胃方法染毒\n\n---\n\n**p038** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_038.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n染毒期限\n根据受试物的种类和试验动物的物种而定\n亚慢性毒性一般染毒1-3个月\n慢性毒性一般染毒3-24个月，甚至终生染毒\n\n---\n\n**p039** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_039.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n试验设计、观察指标\n（1）一般性指标\n敏感的综合性指标，综合反映毒物对机体的毒作用（外见体征；粪便性状；\n食物利用率；体重变化）\n（2）试验室检查\n包括血液学检查、肝功能、肾功能\n（3）病理组织学检查\n试验结束后，要及时解剖死亡的动物，肉眼观察大体病理变化，若有改变\n则需要做组织病理学检查，对于存活的动物也要做解部检查，必要时做组\n织病理学检查\n（4）特异性指标\n根据受试物的毒性资料，试验中的观察和受试物结构等增加其他指标的检查\n\n---\n\n**p040** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_040.jpg)\n\n1.环境化学物一般毒性及其评价\n二、亚慢性和慢性毒性实验---亚慢性和慢性毒性及其对应试验\n试验设计、观察指标\n根据亚慢性毒性试验的结果，可以确定受试物的主要作用，靶器官对最大\n无作用水平和最大剂量做出初步估计，为进一步开展慢性毒性试验提供依据\n慢性毒性试验\n对受试物在低剂量长时间接触机体时引起的毒性作用有更深入的了解\n可以依据敏感观察指标出现异常的最小阀剂量\n找出该受试物慢性毒性作用的最大无作用剂量\n为受试物能否应用或为制定在环境中卫生标准提供重要的参考依据\n\n---\n\n**p041** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_041.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n蓄积作用的基本概念\n1）定义：\n当外源化学物连续进入机体，且吸收速度或总量超过代谢转化排除的总量\n或速度时，化学物质很有可能在体内增加并贮留，称为化学物的蓄积作用。\n化学物质容易蓄积的部位称为储存库；\n常见的储存库包括\n血浆蛋白\n脂肪组织\n肝肾\n骨骼\n大多数蓄积作用都会产生蓄积毒性\n\n---\n\n**p042** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_042.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n2）蓄积毒性作用\n低于中毒剂量的外源化学物反复与机体接触一定时间后致使机体出现中\n毒作用;\n3）环境污染物体内蓄积过程\n物质蓄积\n·可用化学方法测得体内污染物或代谢物\n污染物不断进入机体内，其吸收量大于排出量，使其在体内的量逐渐积累增多\n功能蓄积\n不断进入机体内的污染物，反复作用机体，引起机体一定结构和功能变化，\n并逐渐累积加重，最后导致出现损害作用；\n测不出该物质，例有机磷化合物。\n物质蓄积和功能蓄积是相对而言，同时存在又互为基础，在史籍中难以严格区别\n\n---\n\n**p043** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_043.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n定义：以生物效应为指标，用蓄积系数（k）评价蓄积作用，将多次染毒\n与一次染毒毒性效应进行比较\n优点：方法简便，是评价蓄积作用的常用方法；\n缺点：无法区别物质蓄积还是功能蓄积\n∑LD50(n）—→多次染毒使半数动物出现效应的总剂量\n蓄积系数（K）=\n表5-1蓄积作用强度分级（引自刘毓谷，环境毒理学教材，1987）\n蓄积系数（K） 蓄积作用强度\n<1 高度蓄积\n1~3 明显蓄积\n3~5 中度蓄积\n>5 轻度蓄积\n\n---\n\n**p044** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_044.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法（固定剂量法、剂量定期递增染毒法、剂量固定的20\n天蓄积法)\n固定剂量法\n使用大鼠或小鼠，通过经口灌胃、腹腔注射、染毒。试验周期为25-100天\n先求出LD5o-->选取相同条件的至少40只试验动物\n随机分为染毒组和对照组两组（每组至少20只，雌雄各半）\n每天以固定剂量在相同时间和相同途径对试验组进行染毒\n观察并记录动物死亡数\n当试验组一半动物死亡时即可终止试验 若接触剂量依据蓄积到\n计算累积的总的接触剂量(LDso(n) 5*LD5o的剂量，那么即便死\n亡数未超过半数，仍要终止\n根据公式计算K值 试验，此时K>5，表明蓄积作\n用不明显\n依据蓄积毒性强度分析进行评价\n\n---\n\n**p045** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_045.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法\n剂量定期递增染毒法\n大体上与固定剂量法一致，不一样的是试验开始时染毒组需要按0.1LDso剂量进行染毒\n以4天为一期\n按一定比例增加染毒剂量\n试验期最长28天\n注：试验期间需要定期（4天）一次给动物称重，按照实测体重调整染毒剂量\n\n---\n\n**p046** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_046.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n蓄积系数法：\n确定蓄积系数常用的方法\n剂量固定的20天蓄积法\n口给予蓄积系数的原理设计\n口通常采用经口灌胃的染毒方式 1/20 LD501/10 LD50\n口将毒物随机分为5组（阴性对照*1，实验组*4）\n1/5  LD50\n·每组10只，雌雄各半 1/2LD50\n·每天染毒一次，连续20天\n口观察每组雌雄合计的死亡动物数\n口试验结束后，根据各实验组的死亡数对受试物的蓄积数强弱进行评定\n\n---\n\n**p047** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_047.jpg)\n\n1.环境化学物一般毒性及其评价\n三、蓄积毒性试验\n评价蓄积毒性的试验方法\n2）生物半减期法：\n定义：用毒物动力学原理描述毒物在机体内蓄积作用的方法\n简称T1/2：外来化合物通过机体的生物转运和转化作用被消除一半所需要的\n时间\n生物半减期越长的物质，越不容易消除；发生蓄积作用的可能性就越大\n由于测定外来化学物在体内的生物半减期过程较为复杂，自实际观测中，\n常常间接的通过测定其血液、尿液或器官组织中的浓度（或量）降低一半\n所需的时间，用以代表该物质的生物半减期，根据测得的生物半减期的长\n短，来确定受试物的蓄积作用。\n\n---\n\n**p048** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_048.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n1）定义：\n遗传物质发生的可改变生殖或体细胞中的遗传信息，并产生新的表型效应\n的改变。\n2）基本类型：\n自发突变：自然条件下发生，频率很低；\n诱发突变：人为的或受各种因素诱发产生\n环境突变/环境诱变作用：有物理、化学、生物作用（紫外线、X射线，化学\n诱变剂，黄曲霉素等都可诱发突变）\n突变基础：根据DNA突变的大小，将突变分为两大类\n1基因突变（例如：红色花的后带变成蓝色）\n②染色体畸变\n\n---\n\n**p049** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_049.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n1基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n碱基置换 代的过程\n置换又分为转换和颠换两种形式\n基因突变\n转换：DNA多核苷酸链上同类碱基之间的取代，即密啶\n移码突变 被嘧啶，嘌呤被嘌呤取代\n突变 G\n\n---\n\n**p050** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_050.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n①基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故又称为点突变\nDNA多核苷酸链上某个碱基对被另一个碱基对所取\n碱基置换 代的过程\n置换又分为转换和颠换两种形式\n基因突变\n颠换：不同类碱基之间的取代，即嘌呤被嘧啶或密啶被\n移码突变 嘌呤取代\n突变\n\n---\n\n**p051** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_051.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n①基因突变\nDNA在分子水平上发生的碱基对组成或排列顺序的改变\n只限于染色体上特定位点，故\nDNA CATCATCA\n翻译模板\nHis His H HisHHis His\n碱基置换 编码的氨基酸\n碱基A丢失\nCATCATCAHis HHisHHis Leu\n基因突变 编码合成的蛋白质发生改变\nDNA序列插入或缺失除了三对以外的一对或几对碱基，而引\n移码突变 起密码编组的突变\n按照三联密码连续阅读的原则就会出现损伤部位以后整个遗\n传密码顺序完全改变，从而形成错误的密码，并转译成为不\n正常的氨基酸，细胞由此出现突变\n\n---\n\n**p052** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_052.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n2染色体畸变\n与碱基突变不同的是，染色体畸变可用显微镜直接观察到染色体结构和数目的改变\n进入 导致\n化学突变物 细胞中的染色体 染色体损伤或破坏\n染色体结构的畸变\n染色体在致突变作用物下的畸变\n染色体数目的畸变\n\n---\n\n**p053** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_053.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n2染色体畸变\n染色体结构的畸变\n染色体在职突变作用物下的畸变\n染色体数目的畸变\n染色体结构的畸变：裂隙、缺失、异位、重排、插入\n染色体数目的畸变：1整倍的改变，称为整倍体即二倍体、三倍体或多倍体；\n②非整组的单个或者多个染色体的增减（非整倍体）\n染色体数目为2n+1,2n+2,2n-1,2n-2，对应的称为三体、四体、单体、缺体\n\n---\n\n**p054** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_054.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n突变基本类型及定义\n②染色体*→\n染色体结构畸变：裂隙、缺失、异位、重排、插入\n染 p-arm（短臂) 着丝粒\n正常染色体\nq-arm(短臂) q-arm（长臂）\n裂隙 缺失 异位 重排/倒位 插入\nCHROMOSOMALGAP DELETION TRANSLOCATION INVERSION INSERTION\n染色体\n染色体类 裂隙 2345 432 432 体;\n（明显的细小 345\n染色质未完全 间隙/裂纹，\n断开） 缺失\n（染色体片段丢失，\n长度变短）\n异位 重排/倒位 插入\n（片段在染色体间交换） （片段序列顺倒） （插入额外片段）\n染色体数目为2n+1,2n+2,2n-1,2n-2，对应的称为三体、四体、单体、缺体\n\n---\n\n**p055** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_055.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的后果\n肿瘤\n化学致突变对人类健康的影响与其作用的靶细胞有关 畸胎\n体细胞发生突变时：只影响接触致突变物的个体，不影响下一代 高血压\n动脉硬化\n生殖细胞发生突变时会对后代变生影响\n细胞老化\n影响后代\n遗传性疾病\n显性致死 生殖细胞突变 影响人类基因库\n生育能力障碍 影响遗传负荷\n例如：唐纳氏综合征，多Y综合征\n\n---\n\n**p056** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_056.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n致突变试验用于实现对致突变作用的评价\n致突变试验是为了确定某种环境污染物对生物体是否具有致突变作用所进行的试验\n包括基于表型改变检测基因及小的缺失\n通过细胞学的方法观察大的染色体损伤\n基因点突变试验\n致突变试验方法根据终点反应不同 染色体畸变试验\nDNA损伤试验\n受试生物选择：微生物、哺乳动物、昆虫、植物等\n\n---\n\n**p057** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_057.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n1）基因点突变试验：哺乳动物微粒体酶试验法又称Ames试验\n基本原理：利用一种突变型微生物菌株，与被检的化学物质接触，如果这\n个化学物有致突变性，则会使细菌恢复成野生状态，即可回复突变\nTA100、TA102均符合Ames实验要求。\nTA100 TA100\n沙门氏菌、大肠杆菌\nTA98 TA102\nTA98 TA102\nTA97 TA97\n图1.组氨酸营养缺陷实验\n\n---\n\n**p058** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_058.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n2染色体畸变试验\n基本原理：利用显微镜直接观察，生物体细胞受致突变物作用后，染\n色体发生数目和结构改变的情况\n\n---\n\n**p059** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_059.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n③微核试验\n微核：染色体或染色单体收到突变作用的影响，形成无着丝点的短片，或者纺锤体\n受到损伤失去染色体，在细胞分裂的后期无法随着纺锤丝到达两级而遗留在细胞质\n中，形成N个规则的小体，这些小体的嗜染性同细胞核相似但比主核小的多。\nMicronucleus 利用微核率的变化\n来检测诱变物\n简便、\n快速、\n可靠\n\n---\n\n**p060** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_060.jpg)\n\n2.环境化学物特殊毒性及其评价\n一、致突变试验\n致突变作用的评价\n常用的致突变试验方法\n④显性致突变试验\n检测生殖细胞染色体的突变\n如染色体断裂所导致的缺失或重复\n如染色体重排形成的不平衡染色体的分离或不分离，即非整倍体\n注意：干扰因素多、灵敏性不够高、可校正体外实验或其他系统所得到的阳性\n结果，在实际工作中，为了得到更准确的结论，往往需要做一组致死突变试验\n在安全毒理学评价程序中，致死突变试验要求对上述四种试验中的任意三项进\n行实验，最后再根据结果进行判定，得出实验结论。\n\n---\n\n**p061** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_061.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n短肢畸形\n反应停导致近万名畸形儿的诞生，因此世界上开始大规模的研究致畸药物\n发现不少药物具有不同程度的致畸作用，如抗生素类，性激素类药物。\n\n---\n\n**p062** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_062.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n把凡是在一定剂量下，能通过母体对胚胎正常反应过程造成干扰，引起胚\n胎发育障碍而导致子代出生后，发生畸形的物质称为致畸物或致畸原\n把致畸物通过母体作用于胚胎而引起胎儿畸形的现象称为致畸作用\n评定外来化学物是否具有致畸作用的试验称为致畸试验\n\n---\n\n**p063** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_063.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n胚胎于致畸物发生接触时，因为发育阶段不同，导致敏感性不同\n器官形成期中胚胎对致畸物最为敏感，因此称为敏感期或危险期\n同一致畸物与胚胎接触时，因胚胎发育阶段不同，引起不同的致畸；\n风疹病毒，孕妇在不同时期感染，可引起不同的先天畸形;\n妊娠第四周感染可引起无脑儿或脊髓裂\n妊娠第五周感染可引起无肢畸形\n妊娠6-9周感染可引起牙畸形\n\n---\n\n**p064** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_064.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n致畸作用表现出明显的种属差异\n不同种属的动物对致畸物的代谢过程和本身胎盘结构均不同，从而导致不\n同种系的动物表现出不同的敏感性\n反应停对兔子和人有致畸作用，但对其他的哺乳动物不能引起致畸\n\n---\n\n**p065** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_065.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致畸作用\n致畸作用也是毒作用的一种表现，具有一定的毒理学特点\n现实生物中引起的致畸作用\n物理因素中的电离辐射（x光射片）\n生物因素中病毒的感染\n天然条件下的出生缺陷\n水硬度有关的中枢系统畸形的发生；\n水气象有关的胎儿畸形\n高放射本底地区与畸形率（天然辐射水平显著高于全球平均水平的区域）\n化学因素（甲基汞、环境激素）\n\n---\n\n**p066** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_066.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n试验操作\n致畸试验\n用于检测某些环境污染物能否通过妊娠母体引起胚胎畸形的一种动物实验方法。\n致畸试验步骤\n代谢过程要与人类相近\n受试生物的选择\n胎盘与人类胚胎构造相似（包括胚胎的层数和厚度）\n体型小\n动物试验选取原则 易繁殖 多采用大鼠、小鼠和家兔实验动物\n价格低廉\n\n---\n\n**p067** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_067.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n试验操作\n致畸试验\n剂量分组：通常根据试验目的和要求决定\n）只做有无致畸作用的定性检测，则剂量组较少；\n若还需要探讨毒性作用的靶器官，则剂量组增多；\n在正式试验前要先做预实验，用于确定实验所需试验剂量范围\n若未做预实验，则一般以1/30-1/2的LD5o为最高剂量组，\n1/100-1/30LDso为低剂量组，\n按等比例差在高低剂量组之间插入中间剂量组\n5以交配后确定已受精的雌性动物为计数对象（鼠类：15-20只；家兔：7-8只）\n6在进行实验时，除了各试验组外，还应同时设立阴性和阳性对照组\n\n---\n\n**p068** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_068.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n试验操作\n致畸试验\n剂量分组：通常根据试验目的和要求决定\n7实验处理上，需要先将性成熟但未交配过的雌鼠和雄鼠同笼过夜，确定雌鼠受\n孕后，推算孕龄，在胚胎的“敏感期”进行受试物暴露\n致畸实验常用的终点指标：暴露完之后的解部，观察\n实验动物的解剖时间为分娩前1-2天为宜，对胚胎的外部骨骼和内脏进行检查，\n并且通过多方面分析致畸试验结果。\n\n---\n\n**p069** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_069.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌\n恶性的肿瘤，严重威胁人类健康的主要疾病之一；\n人类肿瘤80-90%与环境因素有关，包括物理、化学、生物因素；\n病因分析，人类肿瘤80-85%与化学因素有关\n把诱发肿瘤的化学物质称为化学致癌物\n（①有机化学物，②天然化学物，③无机化学物，4合成化学物）\n\n---\n\n**p070** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_070.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌\n肿瘤形成过程：\n1引发阶段：指正常细胞在化学致癌物直接或间接作用下转变为癌前细胞的过程\n2促长阶段：经过引发的癌细胞不断增殖，直至形成临床上可被检出的肿块过程\n③进展阶段：指引发细胞群进一步的表型改变；包括恶性前型转变为恶性型细胞等过程\n毒性方面化学致癌物的致癌作用与一般毒性作用在许多方面有一定的相似之处\n\n---\n\n**p071** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_071.jpg)\n\n2.环境化学物特殊毒性及其评价\n恶性肿瘤怎么产生的\n：框在点击“”时会进行转换，用时则会变为可点击的视频。框移位和\n\n---\n\n**p072** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_072.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌物在体内也进行生物转化，但同时也有其自身的特点\n1化学致癌物引起的生物学效应，具有持久性和迟发性\n②在动物实验中，当剂量相等时，多次给予受试物比一次给予所产生的效应更大\n③从机理来看致癌作用和宿主细胞的遗传物质或其他细胞大分子的相互作用有关\n致癌作用的本质是致癌物通过DNA加合物形成、氧化损伤或\n表观遗传调控，引发体细胞突变并破坏细胞生长调控网络。这\n一过程具有剂量依赖性和时间依赖性\n\n---\n\n**p073** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_073.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n①体细胞突变学说\n化学\n突变\n致癌因素 物理 体细胞((DNA) →致癌\n生物\n致癌形成的基础是体细胞发生突变\n\n---\n\n**p074** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_074.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n②分化障碍学说\n干扰 分化\n致癌因素 细胞 ?紊乱 癌变\n增殖\n细胞癌变只需要细胞分化过程有关的基因调控过程受致癌因素感染，\n使细胞分化和增殖发生素乱\n\n---\n\n**p075** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_075.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌作用\n化学致癌机理，目前尚未完全明了，因此出现不同角度研究的多种致癌学说\n③癌基因学说\n正常情况下，癌基因处于阻遏状态，只有当细胞内有关的调节机\n制遭到破坏的情况下，癌基因才能表达，导致癌变形成肿瘤;\n不同的致癌学只是侧重点不同，互有交叉，可能是在致癌作用的不同阶段\n所起作用不同而已。\n\n---\n\n**p076** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_076.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n致癌试验是一种特殊的慢性毒性试验，目的是检验环境污染物或其代谢物是否具\n有致癌或诱发肿瘤作用\n致癌试验重要方法：完整的哺乳动物长期试验\n一些短期快速筛检试验方法：满足大量外来化合物进行致癌试验\n1哺乳动物细胞体外转化法：有无致癌性的重要方法\n2优点：周期短、经济、方便、能直接与靶细胞作用\n当一种化学物已经通过短期试验证明其具有潜在致癌性或者其化学结构与某种已\n知致癌物十分近似，又在人类社会中具有实际应用价值时，应进行长期动物诱癌\n实验\n\n---\n\n**p077** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_077.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n诱癌动物试验与慢性试验类似\n首选啮齿类动物为受试生物：具有诱发肿瘤的感受性强、生物周期短、繁殖快、\n费用低等优点。\n存在问题\n1高剂量的动物诱癌试验结果与人类实际接触的“低剂量“致癌物不同\n2其次人体和动物体内代谢酶系统存在着差别\n③动物“自发”肿瘤率在不同动物种系之间差别很大，人与动物之间可能也存在很大差别\n因此动物试验的结果不能完全代表人体的生物学改变\n\n---\n\n**p078** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_078.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n剂量分组及染毒途径和期限\n设置对照组、最大耐受剂量和两个中间剂量（共4组）\n设置对照组、最大耐受剂量和半数最大耐受剂量（共3组）\n每组雌雄动物各74只\n体重变化不应超过平均体重的±20%\n染毒途径要模拟人体接触途径\n\n---\n\n**p079** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_079.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n观察指标\n①一般情况\n试验头三个月每周称一次动物体重，以后每两周称一次。\n消化道染毒时应计算食物或饮水消耗量\n每天观察两次动物，发现死亡、垂死的和临床异常的动物，应详细记载。\n试验第15个月时每组雌雄动物各处死10只，其余在第24个月处死，详细尸检\n和病理检查，同时进行血液生化检查\n②肿瘤发生情况\n记录肿瘤出现时间、部位、大小、数目、外形、硬度和发展情况\n\n---\n\n**p080** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_080.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n观察指标\n③病理学检查\n·作完整的尸体解剖，检查所有器官组织。\n4肿瘤发生率\n肿瘤发生率三天 试验终了时患肿瘤动物总数\n有效动物总数（最早出现肿瘤时的存活动物总数） X100%\n5潜伏期\n以各试验组第一例肿瘤发现的时间作潜伏期。\n6平均肿瘤数\n一个器官出现多个肿瘤或多个器官出现肿瘤，都可使平均肿瘤数增加，此数表示肿瘤的多\n发性。\n\n---\n\n**p081** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_081.jpg)\n\n2.环境化学物特殊毒性及其评价\n二、致畸、致癌试验\n基本概念\n致癌试验\n结果判定\n①肿瘤只发生在受试组动物，对照组无肿瘤，或受试组出现对照组没有的肿瘤类型\n2受试组与对照组动物均发生肿瘤，但受试组发生率高\n③受试组的平均肿瘤数高于对照组\n4受试组与对照组的肿瘤发生率虽无显著差异，但受试组肿瘤发生的潜伏期短。\n上述四条中，通过统计学分析，任何一条有显著性差异并存在剂量反应关系是即\n可认为受试物的致癌试验为阳性\n\n---\n\n**p082** ![](../010-第五章 环境毒理学常用实验方法（2）-第五章 环境毒理学常用实验方法/page_082.jpg)\n\n2.环境化学物特殊毒性及其评价\n谢谢\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 3 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 8 节 · 82 页（跨章）\n\n> `008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法.pdf` · 涉章 [4, 5]\n\n- [p001](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_001.jpg)  · 环境毒理学\n- [p002](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_002.jpg)  · 第五章环境毒理学常用实验方法\n- [p003](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/page_003.jpg)  · 5.1 概述\n- ...余 79 页, 参 [`008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/`](../008-第四章 环境污染物的毒作用及其影响因素（3）-第五章 环境毒理学常用实验方法/)\n\n### 辅 2 · 第 9 节 · 82 页\n\n> `009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法.pdf` · 涉章 [5]\n\n- [p001](../009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法/page_001.jpg)  · 2.环境化学物特殊毒性及其评价\n- [p002](../009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法/page_002.jpg)  · 第五章环境毒理学常用实验方法\n- [p003](../009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法/page_003.jpg)  · 5.1 概述\n- ...余 79 页, 参 [`009-第五章 环境毒理学常用实验方法-第五章 环境毒理学常用实验方法/`](../009-第五章 环境毒理学常用实验方法-第五章 环境毒 物富集系数（BCF）\n      微生物毒性\n    高频考点\n      LD₅₀ 测定经典法：概率单位法、改良寇氏法、霍恩法、上下法\n      急性毒性观察期 = 14 d\n      毒性分级：极毒 ＜ 1 mg/kg ＜ 剧毒 ＜ 50 ＜ 中等…\n      Ames 试验：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n      Ames 阳性判定：菌落数 ≥ 2 倍自发对照\n      微核试验靶细胞：骨髓多染红细胞\n      彗星试验测：单细胞 DNA 损伤（断裂）\n      致畸敏感期：孕 6~15 d（器官形成期）\n      反应停 → 海豹儿（致畸学起点）\n      鱼类急性毒性：96 h LC₅₀；大型溞：48 h EC₅₀\n```\n\n## 复习要点 · 已填\n\n> 本章为方法学之章——分系统介绍四类经典毒性试验（急性 / 亚慢性 / 慢性 / 特殊）+ 三致试验。\n\n### 一、按接触期之四类毒性试验\n\n| 试验 | 接触期 | 主要目的 | 关键指标 |\n|------|--------|---------|---------|\n| **急性毒性** | 一次或 24 h 内多次 | 测 **LD₅₀** / LC₅₀，定毒性分级 | LD₅₀、症状、靶器官 |\n| **亚急性** | 1~3 月（不超 1/10 寿命） | 蓄积性、靶器官、剂量反应 | NOAEL、LOAEL |\n| **亚慢性** | 3~6 月 | 长期低剂量效应、剂量-反应关系 | NOAEL、慢性进程预测 |\n| **慢性毒性** | ≥ 6 月或终生 | 致癌、生殖发育影响、最终 NOAEL | 终身暴露效应 |\n\n### 二、急性毒性试验（重点）\n\n#### 1. LD₅₀ 测定方法\n- **概率单位法（Bliss 法）**：经典，剂量取对数，反应率换概率单位，最小二乘法回归，求 LD₅₀\n- **改良寇氏法（Karber 法）**：简便，相邻剂量组之间反应率差除以剂量差累积\n- **霍恩法（Horn 法）**：少动物量测定，3 ~ 4 个剂量组各 4 ~ 5 只\n- **上下法（OECD 425）**：现代节约动物之法\n\n#### 2. 毒性分级标准（GB 15193 / WHO）\n| 级 | 大鼠经口 LD₅₀ (mg/kg) |\n|----|---------------------|\n| 极毒 | < 1 |\n| 剧毒 | 1 ~ 50 |\n| 中等毒 | 51 ~ 500 |\n| 低毒 | 501 ~ 5000 |\n| 微毒 | > 5000 |\n\n#### 3. 实验设计要点\n- 受试动物：大鼠 / 小鼠为主（雌雄各半），同窝同龄\n- 剂量组：5 ~ 6 组，几何级数排列\n- 染毒途径：与人接触途径相符（经口 / 吸入 / 皮肤 / 注射）\n- 观察期：14 d，记录死亡时间、症状、解剖\n\n### 三、蓄积毒性试验（联第 1 章·蓄积系数）\n\n**蓄积系数 K_acc 法**：\n$$K_{acc} = \\frac{\\text{多次染毒累积致 50% 死亡之总剂量}}{\\text{单次 LD}_{50}}$$\n\n| K_acc | 蓄积程度 |\n|------:|---------|\n| < 1 | 高度 |\n| 1~3 | 明显 |\n| 3~5 | 中等 |\n| > 5 | 轻度 |\n\n### 四、致突变试验（**Ames 试验**为最经典）\n\n#### Ames 试验（鼠伤寒沙门菌回复突变）\n- **原理**：组氨酸缺陷型菌株（his⁻）在不含 His 之培养基中不能生长；致突变物诱发回复突变（his⁻ → his⁺）→ 菌落数增多\n- **菌株**：TA97/TA98/TA100/TA102 等（覆盖移码与碱基置换）\n- **+S9 mix**：加大鼠肝匀浆 S9（含 P450）模拟体内代谢活化（间接致突变物需此）\n- **优点**：快速、便宜、对约 90% 化学致癌物敏感\n- **结论**：菌落数 ≥ 2 倍自发对照 → 阳性\n\n#### 染色体畸变试验\n- **CHO/V79 细胞**或骨髓细胞，看染色体断裂、易位、倒位等\n- **微核试验**：骨髓多染红细胞中微核率↑ → 阳性\n\n#### **SCE（姐妹染色单体交换）试验**\n- 用 BrdU 标记，染色显影，看交换数\n- 灵敏度高，但易混淆与异常\n\n#### **彗星试验（Comet Assay / 单细胞凝胶电泳）**\n- 单细胞 DNA 损伤检测：损伤 DNA 在电泳中拖出彗星状尾巴\n- 量化：尾长、尾矩\n\n#### 显性致死试验\n- 雄性动物染毒后与雌交配，统计胚胎死亡率→生殖细胞致突变\n\n### 五、致癌试验\n\n- **长期动物致癌试验**：终生（大鼠 ~24 月，小鼠 ~18 月）；至少 50 雌 50 雄/组；3 个剂量 + 对照\n- **短期致癌试验**：转基因小鼠（Tg.AC、p53⁺/⁻）/ 启动-促进试验\n- **细胞转化试验**：BALB/c 3T3、SHE 细胞观察灶性增殖\n- **结论判定**：肿瘤发生率显著高于对照、靶器官明确、剂量-反应关系存在\n\n### 六、致畸试验（生殖发育毒性）\n\n- **3 段法**：\n  - 段Ⅰ：生育力与早期胚胎发育\n  - **段Ⅱ：致畸敏感期试验**（孕 6~15 d 染毒，此期器官形成）\n  - 段Ⅲ：围产期与哺乳期\n- **指标**：着床数、活胎/死胎/吸收胎、胎重、外观/内脏/骨骼畸形率\n- **历史教训**：**反应停（沙利度胺）→ 海豹儿** —— 致畸学之起点\n\n### 七、生态毒理学试验\n\n- **急性致死**：鱼类（斑马鱼）96 h LC₅₀；大型溞 48 h EC₅₀\n- **生物富集系数（BCF）**：参第 2 章\n- **微生物毒性**：发光菌（Vibrio fischeri）抑光率 → Microtox 法\n\n### 八、高频考点（速记）\n\n1. LD₅₀ 测定经典法：**概率单位法、改良寇氏法、霍恩法、上下法**\n2. 急性毒性观察期 = **14 d**\n3. 毒性分级：极毒 < 1 mg/kg < 剧毒 < 50 < 中等 < 500 < 低 < 5000 < 微\n4. **Ames 试验**：组氨酸缺陷沙门菌回复突变，加 S9 模拟代谢活化\n5. Ames 阳性判定：菌落数 ≥ **2 倍**自发对照\n6. 微核试验靶细胞：**骨髓多染红细胞**\n7. 彗星试验测：**单细胞 DNA 损伤**（断裂）\n8. 致畸敏感期：孕 **6~15 d**（器官形成期）\n9. 反应停 → **海豹儿**（致畸学起点）\n10. 鱼类急性毒性：**96 h LC₅₀**；大型溞：**48 h EC₅₀**\n\n### 九、典型思考题\n\n**Q1**：Ames 试验的原理及为何加 S9？  \nA：用组氨酸缺陷型沙门菌，在不含 His 之培养基中不能生长。受试物若致 his⁻ → his⁺ 回复突变，菌落数显著增多。S9 为大鼠肝匀浆上清，含 P450 等代谢酶，模拟体内 I 相代谢——许多致突变物为前致突变物，需代谢活化。\n\n**Q2**：写出常用四致试验。  \nA：**致突变**（Ames、SCE、微核、彗星）、**致畸**（3 段法）、**致癌**（长期动物试验、转化试验）、**致敏**（豚鼠最大化试验、局部淋巴结试验）。\n\n**Q3**：为何长期慢性毒性试验需 ≥ 6 月？  \nA：慢性效应（致癌、生殖、累积损伤）需长期低剂量暴露才显现；6 月以上方能涵盖大鼠 / 小鼠之大部分寿命，便于观察终生效应及制定 NOAEL 用于 RfD 推算。\n\n### 十、与前后章之关联\n\n- **承第 4 章**（毒作用）：本章为前章毒作用类型对应之实验法\n- **启第 6 章**（安全性评价）：本章测得之 NOAEL/LD₅₀ 是危险度评价之原始数据\n- **启第 7 章**（致癌物）：致癌试验为评定化学致癌物之核心法\n"}, {"id": "ch-06", "group": "章节素材", "title": "第06章 环境化学物的安全性和健康危险度评价", "md": "# 环境毒理学 · 第 6 章 · 环境化学物的安全性和健康危险度评价 · 素材\n\n> 教师: 森巴提·叶尔肯 · 学期: 2026春\n> 章下 PDF: 3 个 · 总页: 131\n> 主版: 第 11 节 · 52 页\n\n---\n\n## 主版课件 · 第 11 节\n\n> `011-6-第六章环境化学物的安全性和健康危险度评价-第七章 常见化学致癌物的环境毒理学.pdf`\n\n<details><summary>展开 52 页图链<\/summary>\n\n- [p001](../011-6-第六章环境化学物的安全性和健康危险度评价-第七章 常见化学致癌物的环境毒理学/page_001.jpg)  · 第七章 常见化学致癌\n- [p002](../011-6-第六章环境化学物的安全性和健康危险度评价-第七章 常见化学致癌物的环境毒理学/page_002.jpg)  · 主要内容\n- [p003](../011-
