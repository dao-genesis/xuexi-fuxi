质量力、表面力）\n作业：\nP14页，复习思考题：1-6、1-10\n\n#### P15页，习题：1-3\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n## 第一章作业-复习题\n1-6.流体的粘性与哪些因素有关它们随温度是如何变化的？\n答：流体的粘性与流体种类、温度、压力有关。\n随温度增加，液体的粘性减小、气体的粘性增加\n1-10.作用在流体上的力可以分为哪两类？ 两者有何区别？\n答：作用在流体上的力可分为质量里和表面力。\n区别：质量力为非接触力，表面力为接触力；质量力与\n质量成正比；表面力与面积成正比。\n\n---\n\n<!-- page 63 -->\n\n![page 63](page_063.jpg)\n\n\n## 第一章作业-习题\n1-3.一平板在油面上作水平运动，如图所示。已知平板运动速\n度V=1m/s，板与固定边界的距离8=5mm，油的粘度\nu=0.1Pa·s，求作用在平板单位面积的粘滞阻力。\n解：假设板间流体流速分布是线性的，则板间\n流体速度梯度为：duV 1m / s\n\n#### =200s-1\n\n#### dy 5×10-3m\n由牛顿内摩擦定律 =1 可得作用在单位面平板的粘滞阻力：\n= 0. 1Pa· s x 200s = 20Pa\n"}, {"id": "pdf-001", "group": "原始课件 · PDF原文", "title": "001-开学第一课-国之重器与流体力学", "md": "# 国之重器与流体力学\n\n> 来源: 001-开学第一课-国之重器与流体力学.pdf\n> 页数: 13\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 国之重器与流体力学\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 、航空航天领域\n二、航海与深海探测领域\n三、水利工程领域\n四、油气、交通领域\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n1、运载火箭\n中国自行研制的长征运载火箭起步于20世纪60年代，\n1970年4月24日“长征一号”运载火箭首次发射“东方红一\n号”卫星成功。\n经过半个多世纪的发展，长征火箭具备发射低、中、高 中国载人航天\n\n#### 中国航天· 中国航天·5\n不同地球轨道不同类型卫星及载人飞船的能力，并具备\n无人深空探测能力。低地球轨道运载能力达到25吨，太\n阳同步轨道运载能力达到15吨。\n复合材料整流罩 S200分离系统 一二级级间段 国体助推器\n\n### 43.3米 复合材料设备舱 L110分离系统 25.7米\n\n### 3.2米\n\n#### 4米\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n2、载人航天\n1999年11月20日，我国第一艘无人实验飞船 神舟飞船结构示意\n“神舟一号”在酒泉卫星发射中心发射升空， 原型参考：《兵器知识》杂志\n这是我国航天史上的一座里程碑；2003年10\n月15日，我国自行研制的神舟五号载人飞船 姿态控制发动机 烧蚀防热涂层\n\n#### 海事天线\n在酒泉卫星发射中心发射成功，这是我国进 伞包 燃料储箱\n行的首次载人航天飞行；2022年4月16日，太 伞舱盖\n\n#### 返回舱 推进舱\n空三人组返回地球，标志着中国空间站构建 轨道舱\n第一阶段关键技术验证圆满成功。\n运载火箭与载人航天器的设计与飞行是一个\n系统工程，其核心是解决推进、气动、结构、\n\n#### GPS天线\n控制等多学科交叉的复杂力学问题。\n\n#### 设备储箱\n\n#### 姿态控制发动机\n\n#### 太阳能电池帆板\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n3、洲际导弹\n我国于60年代初开始研制战略导弹，1966年10月27日成\n功地进行了导弹核武器试验，此后又发展了中程、远程\n和洲际导弹。拥有洲际导弹的意义： DF-51\n>洲际导弹是一个国家核大国地位的主要支撑，洲际导\n弹能够对全球重要目标实施核打击。\n>拥有洲际导弹能够有效遏制强敌对中国实施核威，\n洲际导弹是核打击能力的最直接体现。\n洲际导弹对维护我国国家安全具有特别重要的意义，\n一旦我国安全面临重大危险，洲际导弹是维护国家安全\n的“杀手”。\n>我国拥有洲际导弹对于维护世界和平同样发挥着重要\n作用，有了洲际导弹，就会有更多的发言权，有利于维 东风51列装\n护世界的安宁与和平。\n\n#### 中国核威摄力迈入世界顶尖行列\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n4、C919大飞机工程\n发展大型客机项目，让我国的大飞机飞上蓝\n天，是国家的意志，也是全国人民的意志\nC919大飞机工程是我国航空工业发展史上\n的里程碑，深刻影响着国家科技、经济、产\n业和战略格局：\n打破国际垄断，形成“ABC”新格局。\n实现国家意志与民族梦想，大型客机研制\n是国家综合实力的象征。\n撬动万亿级产业链，创造巨大市场价值，\n提升经济性与竞争力。\n攻克百项关键核心技术，带动了流体力学、\n固体力学、计算数学等基础学科的发展；\n建立自主研制体系，为后续型号研发奠定\n了坚实基础。\n保障航空安全与供应链自主。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n二、航海与深海探测领域\n1、核潜艇\n1958年6月27日，时任主管科技工作的副总\n理聂荣臻元帅向党中央呈报了《关于开展研\n制导弹原子潜艇的报告》，开启了我国核潜\n艇的铸造之路。1974年8月1日中国自己研制\n的第一艘鱼雷攻击型核潜艇正式编入海军部\n队；1983年8月我国第一艘弹道导弹核潜艇\n加入海军战斗序列；开发有091型、093型\n095型、096型核潜艇。我国发展核潜艇的意\n义：\n构建可靠二次核打击能力，强化国家战略\n威镊。\n>支撑远洋作战与航母编队，拓展国家利益\n纵深。\n>维护海上生命线，保障国家发展利益。\n>推动国防科技与工业体系升级。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n二、舟 航海与深海探测领域\n2、航空母舰\n1999年，中国购买了瓦良格号。2011年8月\n10日，中国航母平台进行出海航行试航。\n2012年9月25日，001型航母正式交付中国海\n军，命名为“辽宁舰”。2019年12月17日，中\n国第一艘国产航母命名为“山东舰”。2022年\n6月17日，第三艘航空母舰下水，命名为“福\n建舰”，是中国完全自主设计建造的首艘弹\n射型航空母舰。2025年11月5日，福建舰入 @强国有我China\n列。我国发展航空母舰的意义：\n\n#### 巩固国家海上实力\n\n#### 提高国家地位和国际影响力\n\n#### 适应国家防御需要\n\n#### 促进产业发展\n\n#### 提高军队现代化水平\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n#### 航海与深海探测领域\n3、深海载人潜水器 7062米创世界纪录！\n2002年，我国启动“蛟龙号”载人深潜器的自行设 蛟龙号潜海7062米\n计、自主集成研制工作。2007年9月，“蛟龙号”\n完成组装。2009年8月，“蛟龙号”先后组织开展\n海试工作。从2009年至2012年，“蛟龙号”接连取\n得1000米级、3000米级、5000米级和7000米级海\n试成功，最大下潜深度达7062米，标志着中国深\n海潜水器技术的成熟。\n奋斗者号，于2016年立项，是中国自主研发的万\n米载人潜水器。2020年10月27日，奋斗者号在马\n里亚纳海沟成功下潜突破1万米达到10058米，创\n造了中国载人深潜的新纪录。11月10日8时12分，\n奋斗者号在马里亚纳海沟成功坐底，坐底深度\n10909米，刷新中国载人深潜的新纪录。\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n三、水力工程与设施\n1、引额济克工程\n\n#### 哈萨克丘陵 阿尔泰\n\n#### 河斯齐尔额\n\n#### 萨吾尔山\n\n#### 巴尔喀什湖\n\n#### 地图帝\n\n#### 准格尔盆地\n\n#### 河型伊 吉尔班通古特沙漠\n\n#### 伊塞克湖\n\n#### 阿克苏河 地图帝\n略什喝尔河 塔里木河 孔雀河 哈顺戈壁\n\n#### 帕米尔 塔克拉玛干沙漠 罗布泊\n\n#### 高原 塔里木盆地 库木塔格沙漠\n叶尔羌河 地图帝 阿尔金 地图帝\n\n#### 柴达木盆地\n\n#### 山脉 昆仑山脉\n\n#### 昆\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n四、油气、交通领域\n1、西气东输管线\n2000年2月国务院第一次会议批准启\n动“西气东输”工程，是仅次于长江\n\n#### 西气东输二线工程\n三峡工程的重大投资项目。累计输送\n天然气5500亿m3，折合标煤7.1亿t， 霍尔果斯\n\n#### 吐鲁番 乌鲁木齐\n可减少S02排放1399.2万吨、粉尘 西气东输三线工程\n\n### 3.98亿t和8.04亿tC02。\n\n#### 西气东输一线工程 北京\n\n#### >一线：新疆一甘肃一宁夏一陕西\n山西—河南—安徽—江苏—上海 中卫 精边。\n\n#### 太原 济南\n>二线：新疆一甘肃一宁夏一陕西 州\n河南一湖北一江西一广东 D 南京 西气东输一线\n\n#### 西安 枣阳 西气东输二线\n>三线：新疆、甘肃、宁夏、陕西 合肥 西气东渝三线\n河南、湖北、湖南、江西、福建、广 武汉南品 杭州\n\n#### 长沙 吉安\n\n#### 东 福州\n>四线：乌恰县伊尔克什坦，途经轮\n\n#### 南、吐鲁番、终至宁夏中卫\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n四、油气、交通领域\n1、天山隧道\n天山胜利隧道是乌尉高速公路项目控制性工程天\n山胜利隧道创造了“世界最长的高速公路隧 不山胜利德通\n道”“高速公路竖井深度世界第一”两项世界级\n纪录。隧道施工采用“三洞十四竖井”施工方案，\n其中服务隧道采用TBM工法，为中国高速公路隧\n道首次应用。天山胜利隧道及其所在的乌尉高\n速公路全线通车，缩短南北疆之间的通车时间，\n穿越天山仅需约20分钟，乌鲁木齐与重要城市库\n尔勒的车程将自7个多小时缩短至约3小时；有利\n于促进南北疆人员往来和商品物资流通，促进旅\n游业和相关产业发展，促进民族文化交融、民族\n团结、经济社会繁荣稳定。\n探访乌尉高速公路天山胜利隧道建设现场\n\n#### 动画演示天山内部如何打隧道\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n感谢聆听！\n"}, {"id": "pdf-001", "group": "原始课件 · PDF原文", "title": "001-开学第一课-开学第一课", "md": "# 开学第一课\n\n> 来源: 001-开学第一课-开学第一课.pdf\n> 页数: 24\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 开学第一课\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 主要内容\n一、爱国科学家先进事迹\n三、学习工作体会\n四、科学研究点滴\n五、共勉\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n一、爱国科学家先进事迹\n钱学森，出生于上海，祖籍浙江省杭州市，著名航天科\n治协商会议第六届、七届、八届全国委员会副主席，中\n国航天事业奠基人。\n生考试，以航空专业第一名的成绩被录取，开始涉足航\n空工程领域。在力学大师冯·卡门教授指导下，研究空\n气动力学中的压缩效应，成果卓著。\n艰难回国：受到移民局的限制和联邦调查局特务的监视，\n滞留达5年之久至1955年8月，在我国政府交涉下，离开\n美国回国。回国后献身国防事业、推进了中国航天事业\n发展。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n一、爱国科学家先进事迹\n黄大年，战略科学家，地球物理学家，生前系吉林大\n黄大年长期从事海洋和航空移动平台探测技术研究工\n作，探测地下油气和矿产资源以及地下和水下军事目\n标。2017年追授“全国优秀教师”，中共中央总书记、\n国家主席、中央军委主席习近平做出指示，发出向黄\n大年同志学习的号召，追授“时代楷模”、“至诚报\n国归侨楷模”、“吉林省特等劳动模范”，追授“全\n国五一劳动奖章”、“全国优秀共产党员”。2024年9\n月13日，获得“人民教育家”国家荣誉称号。\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n一、爱国科学家先进事迹\n钱七虎院士，防护工程专家，获国家最高科学技术奖、“八一勋\n章”、“全国道德模范”等称号。钱七虎院士致力于防护工程和\n技术研究，为中国防护工程发展作出开拓性、历史性贡献。\n科学家精神的精髓：追求真理、献身科学、严谨治学、敢为人先。\n新时代如何传承科学家精神：将个人理想融入国家科技强国战略，\n在服务大局中实现人生价值；坚定理想信念，以社会主义核心价\n值观引领科研实践；严守科研诚信底线，坚决抵制学术不端行为。\n新时代如何培育科学家精神：最重要的就是要不断学习，在实践\n中锤炼科学家精神。主动学习英雄楷模的品格，特别是学习英雄\n烈士、老一辈革命家、老一辈科学家的精神，树立和坚定自已的\n远大理想和革命人生观。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n#### 专业：矿山通风与安全\n时间：1988.09-1992.07\n硕士：西安科技大学 XI'AN FSCIENCEANDTECHNOLOGY 服务社会，报效祖国，为中华民族的伟大复兴而努力奋斗！\n\n#### 专业：矿业工程\n时间：2006.03-2008.06\n时间：2008.09-2012.06 CHINA FMININGANDTECHNOLOGY （2022新校训：\n\n#### 崇德尚学）\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n#### 第五轮 第四轮\n2022年 实现历史性突破 评估结果 学校代码及名称\n2004年 获批博士后科研流动站\n\n#### 1999年 获批陕西省重点学科\n\n#### 一级学科：安全科学与工程学科\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n侯运广教授（1916～1984），男，汉族，安徽无为人，1948年参加革命工\n铁矿助理工程师，1944年1月任西康技艺专科学校矿冶科讲师，1946年8月\n运广教授曾从事煤炭教育工作达40余年，专长煤矿开采，尤其对矿井通风\n全技术及工程学科的奠基人。\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n士生导师。在煤矿现场工作12年后于八十年代赴美留学8年，1988年\n算研究，是美国矿业局“矿井火灾通风动态模拟”研究项目的主要完\n成者，开发了MFIRE软件系统，实现了矿井火灾条件下任意复杂风网\n内通风参数的动态预测，在世界范围内得到成功推广与应用。\n1988年获得博士学位后，心系母校与祖国，毅然回国，从事矿井、高\n层建筑与地下民用建筑火灾通风理论与实践研究，是我国矿井智能通\n风最早的提出者与实践者。主持完成的“地下民用建筑火灾烟气流动\n规律研究”填补了国内空白，获国家科技进步奖。\n工程学科的奠基人之一。\n\n#### 安天下生产之事，全报效祖国之梦\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n事、中国煤炭劳动保护学会灭火防治专业委员会副主任、中国煤炭劳\n动保护学会通风专业委员会副主任。曾先后被评为全国教育系统劳动\n模范、全国师德先进个人，是国家杰出青年基金获得者、长江学者奖\n励计划特聘教授、国家首批新世纪“百千万”国家级人才入选者，享\n受政府特殊津贴。2005年6月14日，他作为重点监控国有煤矿企业的专\n家在前往甘肃窑街煤电公司进行安全技术“会诊”工作途中，因车祸\n不幸殉职，为我国煤矿安全事业献出了宝贵生命，年仅46岁。\n\n#### 学者的风范\n\n#### 军人的作风\n\n#### 工人的品质\n\n#### 教党[2005]28号\n会灭火防治专业委员会副主任 徐精彩同志生前是西安科材技 中国煤炭劳动保护学会通风专业委员会副主任。 授 中国煤炭劳动保护 曾先后被评为\n聘教授 全国效育系统劳动换范 国家首批新世纪 金国币额先进个人： “百羊方 国家级人 是国家杰出青年基金获得者、 才入选者 享登政府特殊津贴 长江学者奖励计划特 2005年6月14日\n作途中 他作为重点监控国有煤矿企业的专家在前往甘肃窑街煤电有限责任公司进行安全技术 因车祸不幸狗职， 为我国牌矿 年仅46岁 会诊\n08/11387655971s.shtml)\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n尔自治区有突出贡献优秀专家、国家享受政府特贴专家。原新疆大\n学副校长、教育部绿洲生态重点实验室主任、干旱半干旱区可持续\n发展国际研究中心（中国）主任、教育部西部资源环境网上合作研究\n中心新疆分中心主任。2006年3月14日，因病去世，年仅43岁。\n1992年她被评为自治区优秀班主任；1997年和2002年两次获“全国\n宝钢优秀教师奖”；1998年获得“教育部霍英东青年基金奖”；\n1999年被教育部评定为“教育部骨干教师”，同年当选为第四届\n同年获得“自治区先进工作者”称号；2001年获第七届“中国青年\n科技奖”，同年获得“自治区有突出贡献优秀专家”称号；2002年\n获得“中国十大杰出青年提名奖”；2003年获“首届新疆青年科技\n大杰出女性提名奖”、“新疆十大杰出女性”。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n师、党委副书记。主要研究领域：公共安全、地铁安全科学与工程、\n地下工程安全、煤田火灾、古人类用火可能性等。2013年入选科技\n部“创新人才推进计划”中青年科技创新领军人才，2014年获得国\n家杰出青年科学基金资助。\n2023年6月，开设清华特色思政课《沙漠里的课堂》，旨在通过对我\n国西部沙漠地区先进科学技术成果及重大工程开展一系列校内学习、\n现场授课、课外调研等教学环节，聚焦于提升学生对我国西北边疆\n的了解，引导青年一代铸牢中华民族共同体意识，在教学实践中培\n养科学思维、厚植家国情怀、涵养进取品格、增强斗争精神。\n课程接：\n3677ef996b42c06a9b653de34cd7&chksm=ead1497c94cd4a9a7fd849147ae70e03a944110bf39276702a75bcd03482de7e579717f6b594&mpshare=1&scene=23&srcid=0918qGcyE9HlABQXLf4r76Vg&sharershareinfo=3d2ccefbfc55b54f3b2f516c91a6cbee&sharershareinfofirst\n=3d2ccefbfc55b54f3b2f516c91a6cbee#rd\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n三、学习工作体会\n1992.07-2016.06：新疆自治区煤炭科学研究所\n2019.08-2020.01：德国莱布尼兹应用地球物理研究所\n主要工作：\n1）技术咨询服务（1992.07-2016.06） 安全 环境 生态\n2）科学研究（1992.07-至今）\n3）研究生培养（2010.09-至今） 事故 污染物 生物\n俄家俄聚乙烯泄露 福岛核油露 墨西哥湾石油泄露\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n三、学习工作体会\n技术咨询服务：需要熟悉生产工艺与环节，熟悉行业规范、规程、规定等，提出技\n术可行、经济合理的解决方案。\n\n#### 露天矿山 井工碗山 火区治理\n科学研究：聚焦行业共性、基础性问题，凝练科学问题，谋划解决思路；拓展国际\n合作与交流。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n四、科学研究点滴\n凝练的研究领域：\n脆弱生态区煤炭资源开采生态环境影响机制与控制\n\n#### 安全\n聚焦的研究方向：\n\n#### 煤火灾害防控及其环境影响\n煤炭开采地下水扰动响应机制及其生态环境效应\n3）废弃矿山生态环境风险评估、修复与资源化利用 环境\n\n#### 4）矿区碳源碳汇与碳中和路径\n\n#### 生态\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n四、科学研究点滴\n研究方向一：煤火灾害及其环境影响\n\n#### 全球煤火分布\n\n#### 汉区地表梨院\n\n#### 及冒气规象\n\n#### 煤火发生、演化机理\n\n#### 煤火探测、监测与早期预警\n\n#### 高效灭火材料与方法\n\n#### 煤火环境影响与火区生态修复\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n四、科学研究点滴\n研究方向一：煤火灾害及其环境影响\n240x1400 (58%)\nControlofUndergroundCoal Fireand itsProf.Zeng QiangSchoolofEcology and Environment,Xinji ,China Email:zengqiang@xju.edu.cnFebruary26,2026\nD Magdalena Mis...\nFDanaz Cbncai Mz-n DaruzWieda\n作为召集人，组织“CoalFiresandFossilDavidTratt MarvinMoroeng FuelFires”闭门研讨会，邀请煤火领域国际\n知名学者对全球尺度煤火治理合作开展了研\n 物理性质-《流体力学》 第一章 流体及其主要物理性质", "md": "# 《流体力学》 第一章 流体及其主要物理性质\n\n> 来源: 002-《流体力学》 第一章 流体及其主要物理性质-《流体力学》 第一章 流体及其主要物理性质.pdf\n> 页数: 62\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n### 1.5流体的粘性\n四、理想流体与粘性流体概念\n理想流体：动力粘性系数为零的流体。\n粘性流体：动力粘性系数不为零的流体\n实际流体均为粘性流体，粘性是流体的属性，不存在纯粹的\n理想流体。\n工程应用中根据问题角度与粘性大小考虑是否忽略粘性：\n1）粘性力与其他力比较较小，可忽略粘性力；\n2）粘性力虽不是很小，但对所研究问题影响小（如绕流升\n力），可忽略粘性力。\n理想流体理论虽成功解决某些问题，但解释不了绕流阻力等\n问题。\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n### 1.1本章主要内容\n\n### 1.1流体的定义\n\n### 1.2流体力学的任务与发展简史\n\n### 1.3连续介质模型\n\n### 1.4流体的密度\n\n### 1.5 流体的粘性\n\n### 1.6流体的可压缩性\n\n### 1.7作用在流体上的力\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 1.1流体的定义\n一、流体与人类活动\n外部环境：\n地球表面75%被水覆盖；\n地球上方厚达17000m空气；\n\n#### 城市供暖、供排水系统等公共设施\n飞机、汽车等交通工具；\n水电、风能、潮汐能等。\n内部环境：\n人体血液循环、肺部气血循环等。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 1.1 流体的定义\n\n#### 二 流体的定义\n可将自然界所有物质的存在状态分为固体和流体。流体\n是具有流动性的物质。 流动性指在任何微小切应力持续作用下\n会连续变形的特性 形状 体积 压力 拉力 剪切力\n\n#### 固体\n\n#### 液体\n\n#### 气体\n\n#### D D D\"\n(a固体 (b流体\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 1.1流体的定义\n三、 液体与气体的区别\n气体的流动性更好：\n\n#### + 气体\n\n#### 液体\n气体的可压缩性更大：\n原因：\n\n#### 空气\n气体的分子间距大 容易压缩；气体分子间的吸引力小\n分子可自由运动，易流动。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n一、流体力学的任务\n研究流体运动规律及其应用的一门学科，分类为：\n理论流体力学：倾向于严谨的数学推导。\n工程流体力学：流体力学理论在工程中的实际应用。\n水力学：倾向于研究水流的流动规律。\n60年代以前：研究流体的动量传递问题；研究流体的运\n动规律及其与固体、液体或大气界面之间的相互作用力问题\n60年代以后：研究解决能源、环境保护、化工与石油等\n领域的流体力学问题，多学科交互融合。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、 流体力学的发展简史\n两三干以前，通过孔口出流的原理发明了刻漏、铜壶\n滴漏 （西汉时期的计时工具）。\n\n#### 漏：指带孔的壶\n\n#### 刻：指附有刻度的浮箭\n\n#### 滴漏：由水滴规律制造\n\n#### 刻漏 滴\n\n#### 漏\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、 流体力学的发展简史\n公元前250年，修建了都江堰、郑国渠和灵渠等水利工程\n都江堰工程：\n\n#### 壹旅游\n\n#### 宝瓶口：将岷江江水分流部\n\n#### 鱼嘴\n分进入成都平原，防洪、减旱；\n\n#### 鱼嘴：东部地势较西部高江\n\n#### 水难以流入宝瓶口，进行二期鱼\n\n#### 江\n嘴工程；\n\n#### 宝瓶口\n\n#### 飞沙堰：丰水期内江造成径\n流大及泥沙淤 \n\n### 1.5流体的粘性\n\n#### 流体粘性的定义\n该层流体文带动下一层流体向右运动；\n\n#### 流体上\n\n#### 牛顿平板试验\n以上下两层间流体微元作研究对象，流\n体微元上面受到了上层流体向右的剪切力作 C u=U no-slip condition\n用，下面受到了下层流体向左的剪切力作用 u+u\n。在剪切力作用下，流体微元发生变形。剪 h u p2\n切变形产生的力的方向与上层流体和下层流 T2\n体加载给流体微元的切向力相反。 B u=0 no-slipcondition\n复来。 本质上， 粘性是流体抵抗剪切变形（相对运动）的一种属性\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n### 1.5流体的粘性\n二、流体粘性的产生原因\n液体：相邻两分子间距离一般是分子引力与斥力平衡的距离\n当相邻分子偏离平衡距离时，如果距离增大表现为引力，减小表\n\n#### 现为斤力\n右图：静止时分子间处于平衡距离， 不\n表现有力的存在；当上层流体向右运动时\n下两层流体相邻两层分子间距离增加\n分子间引1力增加；对上层流体，分子间引1力\n向左，阻碍上层流体向右运动；对下层流体\n，分子间引力向右，拉动下层流体向右运动\n机制：流体微元剪切变形一分子间距离增加一分子间引力增\n加一阻止分子间距离改变。内摩擦抵抗变形宏观表现流体的粘性。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n### 1.5流体的粘性\n二、流体粘性的产生原因\n气体：分子间距较大，分子间引力可忽略，分子无时无刻作\n无规则热运动。\n右图：上层流体向右速度为u+Au， u+△u\n层流体向右速度为u；由于气体无规则运动\n上、下流体交界面有气体分子穿过。穿\n过交界面的分子与上下层气体分子存在动量交换：在下层区域从\n上层来的具有较大向右速度的分子把动量交换给下层速度较低的\n分子，动量交换产生的作用力向右，推动下层分子向右运动；在\n上层区域从下层来的具有较小向右速度的分子与上层分子发生动\n量交换，动量交换产生的作用力向左，阻碍上层流体向右运动。\n机制：分子热运动一不同层间分子动量交换一气体的粘性力。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n由粘性产生机理，粘性的宏观表现为层之间的切应力；\n层间的粘性应力可视为层间摩擦力。层间摩擦力大小等于多少？\n影响因素有哪些？\nu=U no-slipcondition\n由牛顿平板实验，由于流体粘性 u+△u\n与板界面处流体速度近似与板的运动\n速度相同，即满足无滑移边界条件 B u=0 无滑移条件\n则上板界面处流体速度为U，下板界面处流体速度为0。上板\n界面流体受平板向右的切应力，板则受到向左的切应力，两作\n用力平衡。单位面积流体切应力=F/A\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n牛顿平板实验上下板间距很小，切应力与U/h成正比：\n为动力粘性系数，近似为常数，其值与流体种类有关。\n平板实验结果推广到任意层段流体：\n右图：在y方向存在x方向流体速度 ap(np+n\n差，层间存在相互运动。由牛顿实验结\n果得：\nn=1 ，切应力与速度梯度成正比，与速度无关。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n粘性应力分布与流体速度分布：\n牛顿平板实验满足下述实验条件：1）平板作匀速运动；\n平板间流体也作匀速运动；2）在 在流体运动方向没有压差，即\n平板间流体在运动方向等压。\n\n#### 牛顿平板试验\n取平板间任一流体微元，作受 u=U no-slipcondition\n力分析。忽略重力影响，流体微元 u+△u T1\n所受合力为Fu=0 no-slip condition\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n分析流体微元F由以下力构成：\n\n#### 牛顿平板试验\n\n#### 、上面流体因速度大于流体微元速\nF C u=Uno-slip condition\n度带动流体向右运动的 向应力 (切应力)\n表面应力是微元空间位置与时间的函数，可积分求得。\n\n---\n\n<!-- page 60 -->\n\n![page 60](page_060.jpg)\n\n\n#### 本章小结\n\n#### 流体的定义\n\n#### 连续介质模型假说\n流体的粘性 (理想流体、粘性流体、牛顿流体）\n流体的可压缩性 （可压缩性流体、不可压缩性流体）\n\n#### 流体的作用力（质量力、表面力）\n作业：\nP14页，复习思考题：1-6、1-10\n\n#### P15页，习题：1-3\n\n---\n\n<!-- page 61 -->\n\n![page 61](page_061.jpg)\n\n\n## 第一章作业-复习题\n1-6.流体的粘性与哪些因素有关它们随温度是如何变化的？\n答：流体的粘性与流体种类、温度、压力有关。\n随温度增加，液体的粘性减小、气体的粘性增加\n1-10.作用在流体上的力可以分为哪两类？ 两者有何区别？\n答：作用在流体上的力可分为质量里和表面力。\n区别：质量力为非接触力，表面力为接触力；质量力与\n质量成正比；表面力与面积成正比。\n\n---\n\n<!-- page 62 -->\n\n![page 62](page_062.jpg)\n\n\n## 第一章作业-习题\n1-3.一平板在油面上作水平运动，如图所示。已知平板运动速\n度V=1m/s，板与固定边界的距离8=5mm，油的粘度\nu=0.1Pa·s，求作用在平板单位面积的粘滞阻力。\n解：假设板间流体流速分布是线性的，则板间\n流体速度梯度为：duV 1m / s\n\n#### =200s-1\n\n#### dy 5×10-3m\n由牛顿内摩擦定律 =1 可得作用在单位面平板的粘滞阻力：\n= 0. 1Pa· s x 200s = 20Pa\n"}, {"id": "pdf-003", "group": "原始课件 · PDF原文", "title": "003-《流体力学》 第二章 流体静力学-《流体力学》 第二章 流体静力学", "md": "# 《流体力学》 第二章 流体静力学\n\n> 来源: 003-《流体力学》 第二章 流体静力学-《流体力学》 第二章 流体静力学.pdf\n> 页数: 41\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 《流体力学》\n\n## 第二章流体静力学\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 本章主要内容\n\n### 2.1流体静压强\n\n### 2.2静止流体平衡微分方程\n\n### 2.3重力场中静止流体内压强分布\n\n### 2.4压强测量\n\n### 2.5相对静止流体平衡问题\n\n### 2.6作用在平面上的流体静压力\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 2.1流体静压强\n一、流体静压强的定义\n流体静止时，质点间无相对运动，流体内无剪切变形，不存\n在剪切应力。\n取流体微团，外表面S，只存在法向应力\n（压力）△P，其作用于面积微元AS。当S无\n线缩小趋于一个几何点时，假设为B点，作用\n于B点的就是静止流体内部的压强-静压强：\n△Pp = lim 垂直作用面，指向流体内部\n\n#### △S→0S\n\n#### 流体内侧\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 2.1流体静压强\n二、流体静压强的特性\n流体静压强特点：静止流体内部，任意一点处静压强大\n小与其作用面方位无关，只是作用点位置的函数。\n推证：如图，静止流体内取任意微元\n四面体OABC，三个棱边沿三个坐标轴方\n向，边长分别为dx，dy，dz，截面外法线方向 dz\n为n，假设流体平均密度为，所受单位质\n量力为，则作用在微元的质量力为：\n\n#### f.p.dxdydz\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 2.1流体静压强\n二、流体静压强的特性\n表面力：静止流体， 流体微元所受表面力无切向力，只\n有法向压力。假设微元个面压强分别为P，P，P 则各面受\n到的压力分别为：\nBOC面: dydzAOC面: dxdzABO面：\n\n#### p dxdyABC面:\n\n#### Pn·A P:\n\n#### x方向微元体受力 气压强的测量\n大气压强随当地经纬度、海拔高度及季节时间而变化。\n如图，大气压强可用水银气压计测量：\n封闭端水银柱与封闭空间内水银蒸汽\n压之和与自由水银页面大气压相等。通常\n忽略水银蒸汽压-水银柱自身重力产生的压\n\n#### 强等于大气压强\n\n#### B 水银\n1标准大气压是温度为0℃，纬度45°\n\n#### 晴天时海平面上的大气压强\n1atm=760mmHg=10.33mH.O\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 2.4压强测量\n二、大气压强的测量\n单管测压计：\n\n#### 如图，单管测压计由一细长玻璃管\n组成，玻璃管一段连接被测容器，另一\n端与大气相通，则A点压强为：\n\n#### PAm = pgh\n\n#### 单管测压计只能测量液体压强，被\n测压强不能太大，被测压强必须高于当\n地大气压强。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 2.4压强测量\n二、大气压强的测量\nU型管测压计：为克服单管测压计不足\n工程上常用U型测压计。\n如图，U型管左端连接被测容器，右端\n与大气相通 (1) hPam=PP=P+pghP=PP-p2gh=0 hPAm=P2gh-Pigh\n特点：测量范围大；可测量气体压强；\n\n#### 指示液\n可测量真空压强；指示液不能与被测液掺混\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 2.4压强测量\n二、大气压强的测量\n倾斜测压计（微压计）：对微小压强\n可用倾斜测压计测量。\n如图，左支管为铅垂直管，与被测容\n器连接，右支管与水平面成日角，则：\nPAm=p2glsinθ-pghhsinθ\n倾斜管放大了测量距离，提高了读数\n与测量精度。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 2.5相对静止流体平衡问题\n一、非惯性系相对静止问题\n相对静止：坐标系取在盛有液体并与流体一起运动的容\n器上，该坐标系为非惯性坐标系。从该坐标系看，流体处于静\n止的平衡状态。受力分析：\n流体质点间无相对运动，无切向力 ax/g\n\n#### 惯性力\n2） 流体表面表面力只有压力；\n3） 流体还受质量力作用。 力方向\n\n#### 质量力\n\n#### 合力方向\n除重力外，还有流体因运动产生的惯性力：g-a--Vp=0\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 2.5相对静止流体平衡问题\n\n#### 二 匀加速问题\n如图，容器在水平面作匀加速运动。取非惯性坐标系固\n连容器，x轴正方向与运动方向一致，y轴垂直纸面，z轴垂真\n向上为正方向，原点敢在首由液面。坐标系本身相对地面真有\n加速度 。受力分析：\n质量力分量为：\n平衡微分方程为：f=-a f=0 f=-gop 压力梯度与惯性力平衡\n\n#### 惯性力方向\n\n#### op 压力梯度为零，压强不变\n\n#### 力方向\n\n#### 压力梯度与重力平衡 质量力\n\n#### OZ 合力方向\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 2.5相对静止流体平衡问题\n\n#### 匀加速问题\n等压面：压强处处相等、，压强梯度为零的面。 本例中，\n质量力方向斜向下，等压面为与之垂直的一系列斜面。\n\n#### 由平衡微分方程，通过将压强梯度\n沿坐标方向积岔 ，直原点位于自由液面\n其压强为当地大气压强，得压强分布 ax/g\n公式：\n\n#### p=Pa+pg\n\n#### 淹深\n液体内部表压强随淹深增加而增大。淹深取决于惯性力\n与重力的比值。\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 2.5相对静止流体平衡问题\n三、 等角速度问题\n现分析另一种相对运动流体平衡问题-等角速度问题\n如图，盛有液体容器绕铅锤轴z以角\n速度?作等角速度旋转运动。取非惯性坐\n标系固连容器与容器一起旋转，z轴取旋\n转轴，x、y轴位于水平面，坐标原点取自 @2r2\n由液面与z轴交点。因旋转运动单位质量 2g\n流体所受离心力为：rw，其各坐标轴分量： 惯性力方向\n\ ---\n\n<!-- page 36 -->\n\n![page 36](page_036.jpg)\n\n\n## 第二章作业-复习题\n2-1.什么是流体静压强？流体静压强有哪两个特性？\n答：流体静压强：静止流体内的压应力称为流体静压强。\n流体静压强特性：\n1）.静压强作用的垂向性：流体静压强总是沿着作用面的\n内法线方向。\n2）静压强的各向等值性：某一固定点上流体静压强大小\n与作用面方位无关，是位置的标量函数。\n\n---\n\n<!-- page 37 -->\n\n![page 37](page_037.jpg)\n\n\n## 第二章作业-复习题\n2-2.流体平衡微分方程的形式及其物理意义是什么？\n\n#### 答：流体平衡微分方程：了-1\n物理意义：反映了静止流体中压强梯度与单位质量力的\n相互关系-力平衡。\n\n---\n\n<!-- page 38 -->\n\n![page 38](page_038.jpg)\n\n\n## 第二章作业-复习题\n2-10.什么是位置水头、压强水头、测压管水头？它们具有什\n么样的能量意义？\n位置水头z：表示流体具有一定高度而产生的压强大小；\n压强水头p/pg：表示流体中某点在该点压强作用下液体\n沿测压管上升的高度；\n\n#### 测压管水头z+卫\n\n---\n\n<!-- page 39 -->\n\n![page 39](page_039.jpg)\n\n\n## 第二章作业-复习题\n2-10.什么是位置水头、压强水头、测压管水头？它们具有什\n么样的能量意义？\n答：能量意义：\n位置水头表示相应点单位质量液体所具有的位置势能，\n即液体克服重力从基准线移动至该点具有的能量。\n压强水头表示单位质量液体具有的压力能，该压力能使\n液体克服重力做功达到pg 高度。\n测压管水头为单位质量流体的总能量\n\n---\n\n<!-- page 40 -->\n\n![page 40](page_040.jpg)\n\n\n## 第二章作业-习题\n2-2.一封闭水箱如图所示，金属测压计测得的压强值为\np=4.9kPa（相对压强），测压计中心比A点高z=0.5m，而A点在\n液面以下h=1.5m。求液面的绝对压强和相对压强\n解：设Pabso为液面的绝对压强，A点的绝对\n压强可写为：Ph+pgh=P+pgz+P Po\n\n#### 日\n液面绝对压强：\nPato = P+pgz+P-pgh\n= 0. 98×10° + 9.8×1000×(0. 5 -1. 5) + 4.9×10² = 93. 1kPa\n液面相对压强：P=Ph。-P=93100-98000=-4900Pa\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n## 第二章作业-习题\n2-6.如图所示密闭容器，上层为空气，中层为密度为\n的原油，下层为密度为1250kg/m²！ 的甘油，测压管中的甘油表面\n高程为9.14m，求压力表G的读数。\n解：表压：P=P-P！ 则:P=P+P 9140\n\n#### 空气\n以甘油与原油界面为平衡面，则： 7620\nP + Pg(7.62 -3. 6) = P + Pg(9. 14 -3.6) 原油\nP +Pg(7.62 -3.66) = Pg(9. 14 -3. 6) 甘油\nP = 1250 ×9.8(9. 14 - 3. 66) - 834 ×9.8(7.62 - 3. 66) = 34. 76kPa\n"}, {"id": "pdf-004-2", "group": "原始课件 · PDF原文", "title": "004-《流体力学》 第二章 流体静力学（2）-《流体力学》 第二章 流体静力学", "md": "# 《流体力学》 第二章 流体静力学\n\n> 来源: 004-《流体力学》 第二章 流体静力学（2）-《流体力学》 第二章 流体静力学.pdf\n> 页数: 41\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 《流体力学》\n\n## 第二章流体静力学\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 本章主要内容\n\n### 2.1流体静压强\n\n### 2.2静止流体平衡微分方程\n\n### 2.3重力场中静止流体内压强分布\n\n### 2.4压强测量\n\n### 2.5相对静止流体平衡问题\n\n### 2.6作用在平面上的流体静压力\n\n---\n\n<! \n\n#### 万碗水压机\n工作原理：工作水来源于低压容器和 1901年\n水箱，其压强为大气压强。低压水进入高\n压水泵，经吸取加压后进入高压容器。再\n利用空气压缩机加压，推动其流入主缸和\n升降缸，加压后的水的压强大约为350个\n大气压。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 2.3重力场中静止流体内的压强分布\n四、压强基本方程的能量意义\n由重力场中静止流体压强基本方程：\n对其积分得：\n\n#### p=-pgz+Cpg\n即：同一种静止流体任意点+卫 为常数。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 2.3重力场中静止流体内的压强分布\n四、压强基本方程的能量意义\n\n#### 式中： pg\n\n#### ：为位势头或位置水头，表示流\n体具有一定高度而产生的压强大小；\n\n#### ：为测压管高度或压强水头，表\n示液体中某点在该点压强作用下液体沿\n测压管上升的高度。 基准线\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 2.3重力场中静止流体内的压强分布\n四、压强基本方程的能量意义\n如图，A、B点位置水头、测压水头各不相同，但相对基\n准线，各点两项之和总相等-称之为测压管水头。\n由右图，各点位置水头表示相应点单\n位质量液体所具有的位置势能，即液体克\n服重力从基准线移动至该点具有的能量\n压强水头表示单位质量液体具有的压力能\n，该压力能使液体克服重力做功达到高\n度。z+卫 为单位质量流体的总能量 基\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 2.3重力场中静止流体内的压强分布\n五、 可压缩流体压强分布\n对于可压缩流体，由于流体密度不为常数，需要考虑流\n体密度随压强变化而产生的变化。对于理想气体，经历等温过\n程时，其压强分布可由压强分布基本方程与等温过程气体状态\n方程积分求得：\ndz -pg dp pdz RT pgp=pRT。\n积分得：\ng(22-21) 理想气体压强分布方程\nP2=pexpRT。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 2.4压强测量\n一、绝对压强、计示压强与真空压强\n实际应用中，需要对流体压强进 基准\n行测量。测量压强时先选择一个基准 绝对真空\n\n#### 当地大气压强\n，基准不同，测量值不同。\n绝对压强P 计示压强Pm真空压强P\n以绝对真空为基准测得的为绝对 （表压强）\n压强；以当地大气压强为基准测得的\n为计示压强。乡 绝对压强总为正值，计 计示压强1（表压强）\n\n#### 压强 当地大气压强\n示压强有正有负，若为负值，取其绝 计示压强2（真空压强）\n\n#### 绝对压强1\n\n#### 绝对压强2\n\n#### 对值称为真空压强\n\n#### 绝对零压强 LLLLLL\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 2.4压强测量\n二、大气压强的测量\n大气压强随当地经纬度、海拔高度及季节时间而变化。\n如图，大气压强可用水银气压计测量：\n封闭端水银柱与封闭空间内水银蒸汽\n压之和与自由水银页面大气压相等。通常\n忽略水银蒸汽压-水银柱自身重力产生的压\n\n#### 强等于大气压强\n\n#### B 水银\n1标准大气压是温度为0℃，纬度45°\n\n#### 晴天时海平面上的大气压强\n1atm=760mmHg=10.33mH.O\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 2.4压强测量\n二、大气压强的测量\n单管测压计：\n\n#### 如图，单管测压计由一细长玻璃管\n组成，玻璃管一段连接被测容器，另一\n端与大气相通，则A点压强为：\n\n#### PAm = pgh\n\n#### 单管测压计只能测量液体压强，被\n测压强不能太大，被测压强必须高于当\n地大气压强。\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 2.4压强测量\n二、大气压强的测量\nU型管测压计：为克服单管测压计不足\n工程上常用U型测压计。\n 可用手机运动App记录跑步过程类比，运动App可记录\n什么时间、什么位置、跑多少步及消耗的能量等信息，只要查\n看沿程跑步信息，即可描述整个跑步过程。\n在流体力学中，观察者跟随流体质点运动， 描述流体质\n点运动规律。直角坐标系中，在时间t=0时，每个质点均真有\n一组唯一的坐标.（x=a,y=bz=c），那么流体质点初始坐标\n（a,b,c）可以用来作为不同质点的区分标志\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 3.1描述流体运动的两种方法\n一、拉格朗日方法\n流体运动中，每个流体质点（a，b，c）其运动坐标随时间t\n有一定变化规律，不同质点变化规律不尽相同。运动过程中，\n每个流体质点位置矢量是其初始位置和时间的函数。设初始时\n间某质点标记为（a，b，c），则该质点的物理量为：\nn=n(a,b,c,t) a，b，c，t为拉格朗日变量\n固定初始位置坐标（a,b,c），时间t为变量。得到某一\n确定流体质点随时间运动规律：F（a，b，c,t)） 固定时间t，变\n化不同位置a,b，c，得到同一时刻不同质点位置分布规律。对\n流体质点位置矢量对时间求导(a,b,c,t) o²r(a,b,c,t)\n\n#### 10 Ot²\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 3.1描述流体运动的两种方法\n一、拉格朗日方法\n在初始时刻，紧密毗邻的具有不同初始坐标 （a,b,c）的\n无数流体质点组成了一个具有确定流体质点、确定流体参数的\n质点系。运动过程中，质点系各个质点位移、速度、加速度等\n不尽相同。\n经过时间t后，随流体质点运动，质点系位置、边界形状\n包围空间的大小均发生变化，但该质点系在流通过程中仍然是\n具有流动参数的物质实体-系统，即某一确定流体质点的集合。\n特点：与外界无质量交换；随流体质点运动而运动；边\n界形状、包围空间大小随流体质点运动变化；拉格朗日方法概\n念。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 3.1描述流体运动的两种方法\n\n#### 二 欧拉方法\n研究流体运动时，可以通过对流场内固定空间位置的参\n数进行研究-欧拉方法。流动空间充满连续流体质点，每个质\n点具有一定物理量，流动空间内则形成物理量连续分布的场\n每个流体质点在确定时刻，占据确定位置，从而具有确定物理\n量。\n欧拉法：以数学场论为基础，着眼于仁\n场的分布规律的流体运动描述方法。\n用运动场跑圈计时类比：固定空间位置\n\n#### 观测流体质点运动规律的方法\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 3.1描述流体运动的两种方法\n二、欧拉方法\n欧拉方法中，用空间位置坐标x，yz和时间变量t描述流场\n中流体运动规律，即描述空间某点流体运动物理量随时间变化\n规律及由某点到另一点时该物理量的变化。空间位置为\n（x,yz），则物理量空间分布r:) ，x,y,z,t为欧拉变\n数。\n固定点观察到的是不同流体质点的变化，无法直接观测\n和记录同一质点之前和之后的详细历史，无法像拉格朗日方法\n那样直接给出每个质点的位置随时间的变化\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 3.1 描述流体运动的两种方法\n\n#### 欧拉方法\n固定点可测出不同时刻经过该点的流体质点速度，因此\n采用速度矢量描述空间一点流体运动的变化：\nV=V(x,y,Z,t)\n其他状态函数：\nP=P（x,y,Z,t)\nT=T(x,y,z,t)\n固定空间坐标x,yz，时间t为变量，得到空间某点物理量\n随时间的变化。\n固定时间t，变化不同空间位置，得到某时刻物理量在空\n间的分布规律。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 3.1描述流体运动的两种方法\n\n#### 欧拉方法\n控制体：指流场某一确定的空间区域 其相对于坐标系\n具有固定位置。控制体的边界面称为控制面。流体质点可按自\n身运动规律穿越控制面自由出入控制体。\n特点：\n\n#### 1 控制面上可与外界有质量交换\n2) 控制体空间位置相对于参照系\n不变;\n3）控制体边界形状、 包围空间大\n小是确定的（如教室）；\n4）欧拉方法下的概念CV、CS。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 3.1描述流体运动的两种方法\n二、 欧拉方法\n欧拉方法较拉格朗日方法更常用，原因在于：固定空间\n点物理量在实际操作中易于测量；实际问题求解需要；朗格朗\n\n#### 日方法描述质点特征复杂\n拉格朗日方法-流体质点-系统。位置矢量是流体质点初\n始位置坐标的函数，不是空间位置坐标点的函数，不是场。\n欧拉方法-确定的空间质点-控制体。各物理量是空间位\n置点和时间的函数，得到的是各物理量在场上的分布。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-定常流与非定常流\n定常流动：流场内每一点上物理量不随时间变化而改变\n称为定常场，对应的流动为定常流动；否则，称为非定常场，\n\n#### 对应的流动为非定常流动\nn=n(x,y,z)\n如右上图，若注入的水量等于排出的水量\n液面下各处压强不随时间变化而改变-定常流\n如右下图，随排水过程进行，液面不断下\n降，液面下各点随时间变化而改变-非定常流。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-定常流与非定常流\n\n#### 如右图飞机风洞实验，固定不动时\n飞机周围绕流流场参数随时间稳定不变\n定常流；俯仰、扭转时飞机周围流场参\n数随时间变化-非定常流。\n定常流-非定常流转化：如下图，将坐\n标系固定在海洋平面，由于船舶行驶过程\n的扰动，海洋呈现非定常流动；若坐标系\n\n#### 固定在船舶，周围流场视为定常流\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-均匀流与非均匀流\n均匀场：某时刻流场内各空间点上物理量一样，称为均\n匀场，对应的流动为均匀流；否则，为非均匀场，对应的流动\n\n#### 为非均匀流\n均匀场中各空间点物理量可能随时间变化而改变，但不\n随空间位置变化而改变 on On on =0 ，或(t)\nOx Oy900000000000 汽轮机 赛车周\n70000060000000000 内压强场 围流场\n400000300000200000100000\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-均匀流与非均匀流\n流体力学中，依据流动物理量与坐标依赖关系将流动分\n为一维、二维、三维流动。如速度场是三个空间坐标和时间的\n函数称为非定常三维流动。\n工程上把三维流动简化为二维或一维流动：\n\n#### 长均匀圆管内任一截面流速均匀\n分布，速度为r的函数-一维流动。\n\n#### 渐扩通道，z方向无限长，垂直z\n轴任意平面速度场相同，是×，y的函数。\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n二、 迹线\n迹线-就是流体质点在空间运动时描绘的迹线（流星，足\n\n#### 球）\n如流体质点的空间坐标为x,y,z，则流体质点速度可计算\n\n#### 为： dz\n=u(x,y,2,t), =v（x,y,z,t), =w(x,y,z,t)\n\n#### dt dt\n积分上述方程，用t=0时x=Xo，\n程：y=y(xyo20t)\nZ=2(x0yo,2ot)\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n二、迹线\n例题：设一流场，其 其=欧，v拉-y表，w达式\n为 ，求t=0时过M（-1,-1)点的迹线。\n解：由题干，得：\ndy =v(x,y，z,t)=-y+t dz =w(x,y,z,t)=0\n\n#### dt dt\n积分,x=Ce-t-1 y=Ce-'+t-1\n代入t=0时，x=-1，y=-1，得：\n\n#### x+y=-2 (迹线方程）\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n三、流线\n流线：某一瞬时流场中一条假想曲线， 学》 第三章 流体运动基础", "md": "# 《流体力学》 第三章 流体运动基础\n\n> 来源: 007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础.pdf\n> 页数: 48\n\n---\n\n<!-- page 1 -->\n\n![page 1](page_001.jpg)\n\n\n#### 《流体力学》\n\n## 第三章流体运动基础\n\n---\n\n<!-- page 2 -->\n\n![page 2](page_002.jpg)\n\n\n#### 第1-第2章主要内容小结\n\n## 第1章流体及其物理性质\n连续介质假设：特征体积，流体质点。\n2) 流体粘性：粘性产生原因，牛顿内摩擦定律 du3） 作用在流体上的力：质量力，表面力。\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n#### 第1-第2章主要内容小结\n\n## 第2章流体静力学\n流体的静压强：与方位无关，是位置的函数。\n2) 流体平衡微分方程： f--Vp=0\n（欧拉平衡方程）\n\n#### 3） 帕斯卡定律：F=\n4 重力场静止流体压强基本方程、几何意义、能量意义：\n-pg +Zdz pg5）压强测量：绝对压强，计示压强。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n#### 本章主要内容\n\n### 3.1描述流体运动的两种方法\n\n### 3.2流场、迹线、流线、染色线\n\n### 3.3流管等基本流动概念\n\n### 3.4流体微团的运动与变形\n\n### 3.5物质导数\n\n### 3.6微分形式的连续方程\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 3.1描述流体运动的两种方法\n一、拉格朗日方法\n跟踪流体质点-拉格朗日方法：着眼于流体质点 设法描\n述出每个质点自始自终的规律，即位置随时间的变化规律。知\n道所有流体质点规律，则整个流体的运动获态即可清楚\n可用手机运动App记录跑步过程类比，运动App可记录\n什么时间、什么位置、跑多少步及消耗的能量等信息，只要查\n看沿程跑步信息，即可描述整个跑步过程。\n在流体力学中，观察者跟随流体质点运动， 描述流体质\n点运动规律。直角坐标系中，在时间t=0时，每个质点均真有\n一组唯一的坐标.（x=a,y=bz=c），那么流体质点初始坐标\n（a,b,c）可以用来作为不同质点的区分标志\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 3.1描述流体运动的两种方法\n一、拉格朗日方法\n流体运动中，每个流体质点（a，b，c）其运动坐标随时间t\n有一定变化规律，不同质点变化规律不尽相同。运动过程中，\n每个流体质点位置矢量是其初始位置和时间的函数。设初始时\n间某质点标记为（a，b，c），则该质点的物理量为：\nn=n(a,b,c,t) a，b，c，t为拉格朗日变量\n固定初始位置坐标（a,b,c），时间t为变量。得到某一\n确定流体质点随时间运动规律：F（a，b，c,t)） 固定时间t，变\n化不同位置a,b，c，得到同一时刻不同质点位置分布规律。对\n流体质点位置矢量对时间求导(a,b,c,t) o²r(a,b,c,t)\n\n#### 10 Ot²\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 3.1描述流体运动的两种方法\n一、拉格朗日方法\n在初始时刻，紧密毗邻的具有不同初始坐标 （a,b,c）的\n无数流体质点组成了一个具有确定流体质点、确定流体参数的\n质点系。运动过程中，质点系各个质点位移、速度、加速度等\n不尽相同。\n经过时间t后，随流体质点运动，质点系位置、边界形状\n包围空间的大小均发生变化，但该质点系在流通过程中仍然是\n具有流动参数的物质实体-系统，即某一确定流体质点的集合。\n特点：与外界无质量交换；随流体质点运动而运动；边\n界形状、包围空间大小随流体质点运动变化；拉格朗日方法概\n念。\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 3.1描述流体运动的两种方法\n\n#### 二 欧拉方法\n研究流体运动时，可以通过对流场内固定空间位置的参\n数进行研究-欧拉方法。流动空间充满连续流体质点，每个质\n点具有一定物理量，流动空间内则形成物理量连续分布的场\n每个流体质点在确定时刻，占据确定位置，从而具有确定物理\n量。\n欧拉法：以数学场论为基础，着眼于仁\n场的分布规律的流体运动描述方法。\n用运动场跑圈计时类比：固定空间位置\n\n#### 观测流体质点运动规律的方法\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 3.1描述流体运动的两种方法\n二、欧拉方法\n欧拉方法中，用空间位置坐标x，yz和时间变量t描述流场\n中流体运动规律，即描述空间某点流体运动物理量随时间变化\n规律及由某点到另一点时该物理量的变化。空间位置为\n（x,yz），则物理量空间分布r:) ，x,y,z,t为欧拉变\n数。\n固定点观察到的是不同流体质点的变化，无法直接观测\n和记录同一质点之前和之后的详细历史，无法像拉格朗日方法\n那样直接给出每个质点的位置随时间的变化\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 3.1 描述流体运动的两种方法\n\n#### 欧拉方法\n固定点可测出不同时刻经过该点的流体质点速度，因此\n采用速度矢量描述空间一点流体运动的变化：\nV=V(x,y,Z,t)\n其他状态函数：\nP=P（x,y,Z,t)\nT=T(x,y,z,t)\n固定空间坐标x,yz，时间t为变量，得到空间某点物理量\n随时间的变化。\n固定时间t，变化不同空间位置，得到某时刻物理量在空\n间的分布规律。\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 3.1描述流体运动的两种方法\n\n#### 欧拉方法\n控制体：指流场某一确定的空间区域 其相对于坐标系\n具有固定位置。控制体的边界面称为控制面。流体质点可按自\n身运动规律穿越控制面自由出入控制体。\n特点：\n\n#### 1 控制面上可与外界有质量交换\n2) 控制体空间位置相对于参照系\n不变;\n3）控制体边界形状、 包围空间大\n小是确定的（如教室）；\n4）欧拉方法下的概念CV、CS。\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 3.1描述流体运动的两种方法\n二、 欧拉方法\n欧拉方法较拉格朗日方法更常用，原因在于：固定空间\n点物理量在实际操作中易于测量；实际问题求解需要；朗格朗\n\n#### 日方法描述质点特征复杂\n拉格朗日方法-流体质点-系统。位置矢量是流体质点初\n始位置坐标的函数，不是空间位置坐标点的函数，不是场。\n欧拉方法-确定的空间质点-控制体。各物理量是空间位\n置点和时间的函数，得到的是各物理量在场上的分布。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-定常流与非定常流\n定常流动：流场内每一点上物理量不随时间变化而改变\n称为定常场，对应的流动为定常流动；否则，称为非定常场，\n\n#### 对应的流动为非定常流动\nn=n(x,y,z)\n如右上图，若注入的水量等于排出的水量\n液面下各处压强不随时间变化而改变-定常流\n如右下图，随排水过程进行，液面不断下\n降，液面下各点随时间变化而改变-非定常流。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-定常流与非定常流\n\n#### 如右图飞机风洞实验，固定不动时\n飞机周围绕流流场参数随时间稳定不变\n定常流；俯仰、扭转时飞机周围流场参\n数随时间变化-非定常流。\n定常流-非定常流转化：如下图，将坐\n标系固定在海洋平面，由于船舶行驶过程\n的扰动，海洋呈现非定常流动；若坐标系\n\n#### 固定在船舶，周围流场视为定常流\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 3.2流场、迹线、流线、染色线\n一、流场-均匀流与非均匀流\n均匀场：某时刻流场内各空间点上物理量一样，称为均\n匀场，对应的流动为均匀流；否则，为非均匀场，对应的流动\n\n#### 为非均匀流\n均匀场中各空间点物理量可能随时间变化而改变，但不\n随空间位置变化而改变 on On on =0 ，或(t)\nOx Oy900000000000 汽轮机 赛车周\n70000060000000000 内压强场 -6和阀门段7-8，流道边界在这些部位上变\n化较急剧，结果是局部水头损失。\n\n#### 总水头线\n\n#### 测管水头线\n\n#### 3 女 5 6\n\n#### 图5-1管道流动的水头损失\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 5.1 层流与素流的概念\n1924-20245.1.1雷诺实验\n常见流动中，质点运动有很强的不规则性，甚至没有确定性。按质点轨迹的规则性，流\n动分为层流和紊流两种形态，它们的性质截然不同，能量损失规律差别很大。\n1883年，英国物理学家雷诺以实验证明了两种流态的存在，确定了流态的判别方法及其\n与水头损失的关系。\n（1）实验装置\n·A为水箱，实验过程中水箱内的水位保持恒定；\nB为水平玻璃管，为了避免进口扰动，玻璃管管端做成圆滑喇叭\n口形状；\nC为阀门，用以调节水平玻璃管中水的流速；\nD为颜色水容器，里面装有与水密度相近的有色液体； BE为颜色水注入针管，颜色水通过此管注入玻璃管中；\nF为颜色水阀门，为了减少干扰，应适当调节阀门F的开度，使 (a)\n颜色水注入针管E中的流速与玻璃管B内注入点处的流速接近。 图5-2雷诺实验\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 5.1 层流与素流的概念\n继续开大阀门C增加流速。\n可以观察到：颜色水线迅速加大波动和断裂，随后颜色水完全掺混到水流中去，形成很\n多漩涡体，如图5-2d所示。\n这种现象表明：此时管内流体质点运动轨迹杂乱无章，各层流体质点剧烈掺混，这种流\n动状态称为流。素流流场中存在很多旋涡的运动，这些旋涡不断地产生、发展与消亡，结\n果是固定点上瞬时流速的大小和方向都随时间随机地变化。\n(a) (d)\n图5-2雷诺实验 流速达某一定值时一流 12\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 5.1 层流与素流的概念\n（3）实验结果分析处理\n为了分析不同流态沿程水头损失的变化规律，在雷诺实验的玻璃管中，选取过流断面1和2，并各\n自安装一根玻璃管，则1、2断面间的伯努利方程方程可以表达为\nP1aV² p2 a2V2 +hwZ1+ 2g =Z2+ 2ggp gp\n因为该管道为等直径直管，管流为均匀流，所以有\nV=V2，a=α21、2断面间只有沿程水头损失，没有局部水头损失，h=h，化简上式，得到\n\n#### hf=(21+ 22+P2\n\n#### db gp\n该式表明：均匀流两断面间的沿程水头损失，等于两断面的测压管水头差。因为玻璃管水平放置，\n\n#### 有=22，上式可以进一步简化为\n\n#### P1_P2\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 5.1 层流与素流的概念\n上式表明均匀流两断面间的沿程水头损失，等于两断面测压管中的液面高差，即两根测压管中的\n液面高差为两断面间的沿程水头损失。\n通过阀门调节流速，测定不同断面平均流速V时，相应的沿程水头损失h，可以得到h一V的\n关系曲线，将实验点（V，h）在双对数坐标上绘出，如图5-2e所示。\n\n#### 水头损失可以表达为：h=kVm\n在双对数坐标下，直线方程为：lgh=lgk+mlgV\n式中lgk为截距；m为直线的斜率。\n①图中c点的V值用V表示。在ac段上V<V，流动为层流流态， 过渡流态\nlgh～lgV呈斜率为1.0的直线关系，即h=kVo，说明h与V成正比。 层流 素流\n②ef段为素流流态，斜率为1.75~2.0，即h=kV1.75~2.0，说明h与 lgVV1.75~2.0成正比，当V值较大时h与V2成比例。 图5-2雷诺实验\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 5.1 层流与素流的概念\n它表明Re。不随流体性质、管径或流速而变。如果仿照V，将上临界流速写成V=Ree，因\n为V值取决于外界扰动的程度，Re不是一个常数，而是在范围Re=12000~40000内变化。理论\n态仍可以继续维持下去。实际流动中总存在某些扰动，上临界流速V没有实际意义。\n为了很方便地判别流态，雷诺首次引进量纲一的参数\nVdRe= (5 -3)\n\n#### V\n称为雷诺数，而且把V=V。时的Re值称临界雷诺数。\nRec=- (5 -4)\n\n#### V\n用临界雷诺数作为流态判别标准，应用上十 !-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 5.3 素流流动的特征\n1924-20245.3.2流的模化方法\n运动要素的脉动是流的固有属性。流运动是一种非常复杂的不规则运动，想要精确地描述、\n预测瞬时流速或瞬时压强随时间、空间的变化规律是非常困难的。\n模化方法是指采用简化模型替代实际流动。流的基本特征是有一个在时间和空间上随机分布的\n脉动流场叠加到本为平滑和平稳的流场上。所以对于素流的各种物理量采用取统计平均的处理方\n法，把瞬时物理量看成平均量与脉动量之和。\n统计平均的方法有多种：对时间、对空间、对集合都可以取平均。到目前为止，流体工程设计、\n研究中通常采用时间平均法（简称时均法）来研究素流运动。\n时间平均法将紊流运动看做是两种流动的叠加：瞬时流动=时间平均流动+脉动流动\n设f表示瞬时流速分量或瞬时压强。按时均法，f的时段T平均值可写成\nfdt (5-30)\n称为时均值或时均分量。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 5.3 素流流动的特征\nf'=f-f (5 -31)\n并且称f'为脉动值或脉动分量。\n根据上面两式，容易定义：时均流速U=（u,v，w），脉动流速u'=（u'，v，w'），时均压强p，脉\n动压强p'。取时间平均后，流速和压强的时均部面会变得较光滑。\n平均模化法使得素流研究转变成分别寻求平均场与脉动场的变化规律，瞬时流场是平均场与脉动\n场叠加的结果，例如图5-6b中管流，有u（r）=u（r）+u'（r)。\n脉动分量的均方根值是衡量脉动幅度的参数。脉动流速均方根值\n+1 1/2 + 1/2 t+T 1/2\nu'²dt v'2dt w'2dt (5-32)\n反映了各向脉动强度，一般地有u≠v’≠w'；p'的均方根值p'是压强脉动强弱的度量。为了\n衡量紊动的相对强弱，令U=|Ul，定义\n(u+D2+w2) (5-33)\n其中I称为素动强度，k称为素动动能或简称素动能。\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 5.3 素流流动的特征\n\n#### 大1924-2024\n口 平均运算具有三个基本性质：\n(1)平均值的重复平均运算保持值不变，即（F）=f。\n（2）脉动值的平均值为零，即\n(f)= f'dt fdt fdt=f-（f）=0 (5-34)\n故有（u)=（v）=（p）=0。\n(3）脉动量u'、v'和p'相互制约，并非相互独立，一般地有：u'v≠u'·v'，up'≠u'·p'。\n口 依据平均运算的基本性质，可推出紊流单位质量流体的动能为U²/2+k，其中，U²/2是平均场\n的动能，k是单位质量流体流速脉动引起的额外动能。\n鉴于流脉动的固有性，严格而论素流总是非恒定的。工程设计更关心流时均场，按时均分量\n是否随时间变化来划分紊流的恒定流与非恒定流。\n瞬时紊流场各点的流向没有确定性，瞬时流线没有什么意义。紊流场的流线是指，表示时均流速\n方向的曲线。明确了流线含义后，均匀流和渐变流等概念及总流能量方程、总流动量方程等，可\n直接推广到紊流时均场。为了简便，后文中将略去时均符号，u、p等用于表示时均值。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 5.3 素流流动的特征\n大1924-20245.3.3素流的几种类型\n坐标而变（但没有要求时均场也不变）。当脉动量统计值不随方向而变时（例如u=v'=w），\n称为各向同性。\n口同时满足均匀性和各向同性的素流称均匀同性素流。由于数学处理方便，均匀同性素流在理论研\n究中占重要地位。风洞或水洞的试验段位于整流格栅或蜂窝器的下游，流场接近均匀同性。\n口存在时均流速梯度的紊流称剪切紊流，主要有壁面紊流和自由剪切紊流两类。\n在流道固壁边界摩擦的作用下，在壁面紊流中形成剪切层，壁面附近的流动\n结构与远处差别很大。管道流动、室内空气流动和受到地面作用的大气流动 剪切面\n等均属于此类。若流场内部存在剪切层，称自由剪切紊流。例如，管道射入\n下游水库时，射流周界是剪切面，剪切面失稳断裂后会发展成旋涡体。 图5-7淹没射流的自由剪切面\n口充分发展紊流是一类重要的流动。在管道进口，时均流速和脉动量统计值均会沿程变化。抵达某\n断面后，当u和p等统计值沿程不再变化时称紊流的充分发展状态。长直流道均匀流属于充分\n发展紊流。 38\n"}, {"id": "pdf-016", "group": " d2 Pgd2\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 5.3素流流动的特征\n\n#### 紊流的形成\n层流转变为素流的条件：涡体的形成和形成后的涡体脱离原流层掺入邻\n近流层是层流转变为素流的两个必要条件。\n涡体的形成：\n一是流体有粘性：对于选定流层，速度\n快的流层加于它的切应力是顺流向的，速度\na (b)\n慢的流层加于它的切应力是逆流向的，故所 E升力\n受切应力有构成力矩、促成涡体产生的倾向；\n涡体)\n二是流体的波动：外界微小扰动或来流\n中残存扰动，流层出现局部波动。波峰附近 (c) (d)\n由于流线间距变化，上部微小流束过流断面减小， 流速增大，\n向横向压力，其使波峰愈凸、波容愈凹，波幅增大，形成涡体（c）。\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 5.3素流流动的特征\n\n#### 素流的形成\n涡体形成后，涡体附近流速分布发生改变_（d）：原流速较快流层\n运动方向与涡体旋转方向一致；运动较慢流层运动方向与涡体旋转方向\n箱反。\n流速较快流层流速增大，压强减小，\n流速较慢流层流速减小，压强增大，导致\n涡体两边产生压差，形成横向升力，推动 (a) (b)\n\n#### E升力\n涡体脱离原流层，掺入流速较快的流层。\n因惯性作用，涡体有保持其本身运动\n方向的倾向；流体有粘性，约束流体运动。 (c) (d)\n促使涡体横向运动的惯性力超过粘性力时，涡体脱离原流层掺入\n流速快的新流层，变为素流。 （雷诺数达到一定数值）\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 5.3素流流动的特征\n二、素流的脉动与时均性\n流的基本特征是运动过程中流体质点不断相互掺混，使流体质\n点的流速、压强等运动要素发生脉动现象。\n素流脉动产生的原因来自涡体的涡旋 ux\n运动与主流运动的叠加。\n脉动描述的时均模化方法：\n设表示瞬时流速分量或瞬时压强，其 ux u\n在时段T的平均值为：\n= f=f+ftf'=f-ff称为时均分量f称为脉动分量。 研究平均场、脉动场变化规律。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 5.3素流流动的特征\n三、系 紊流的近壁特征\n近壁层：固壁面附近粘性起作用的流区，素流时均流速剖面与能量损失\n取决于该区状态。\n\n#### 近壁区与壁面远区的差异： 轴线\n1）壁面的法向约束使近壁质点法 素流流核\n\n#### 素流区\n向脉动受到抑制。\n\n#### 2）质点粘附固壁面，使切向流速\n在壁法向变化梯度大。 缓冲层\n结果：壁面上存在粘性作用占主导 粘性底层\n的贴壁薄层-粘性底层。 （a）水力光滑壁面 (b）完全粗糙壁面\n粘性底层外素流流核区存在大量涡体，涡体横向运动的动量交换是流层\n间切应力主要莱源；粘性底层与流核区之间为缓冲层，发生层流向紊流的转\n换。\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 5.3紊流流动的特征\n三、素流的近壁特征\n粘性底层是层流运动，其速度分布规律符合层流速度分布规律：\n=(u)n pgJ pgJ （ro+r)（ro-r)≈ pgJ pgJ\n-r（ro-r)= roy4u 4u 2μ 2μ\n由切应力分布： y=r。-rto=pg 2\n得：\n\n#### 由摩阻流速定义\n得：\npu n puu （粘性底层速度分布近似为直线分\n\n#### 布) n n\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 5.3素流流动的特征\n三、 素流的近壁特征\n粘性底层厚度很小 忽略过渡层，则图中b点同时满足粘性底层的\n流速分布规律与流核心的流速分布规律，联立方程可求得粘性底层厚\n度。\n根据尼古拉斯有压圆管实验资料，图中①、\n\n#### 湖流核心\n③分别为粘性底层、过渡层和素流核心的实\n验曲线。曲线①、③的交点可视为粘性底层到素\n流区的转变点，此处：\nyu* =1.064 yu* ~11.6\ng y = 0。=11.6\n\n#### 由： V *n32.8d\n* R。√π\n图中红点对应理论厚度，蓝点对应实际厚度。\n\n---\n\n<!-- page 21 -->\n\n![page 2
