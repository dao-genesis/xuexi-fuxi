位 N/m³。  *（要：与密度差一个 g）*\n- **粘性**：流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n- **牛顿内摩擦定律**：切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n- **动力粘度 μ 与运动粘度 ν**：μ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n- **牛顿流体与非牛顿流体**：切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n- **压缩性与膨胀性**：压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n- **质量力与表面力**：质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `ρ = dm/dV` | 密度定义，单位 kg/m³ |\n| `γ = ρg` | 重度（容重），单位 N/m³ |\n| `τ = μ·(du/dy)` | 牛顿内摩擦定律，切应力正比于速度梯度 |\n| `ν = μ/ρ` | 运动粘度，单位 m²/s |\n| `κ = -(1/V)(dV/dp), K = 1/κ` | 体积压缩系数与体积弹性模量 |\n| `α_V = (1/V)(dV/dT)` | 体积膨胀系数 |\n\n#### 三、重要案例 / 例题\n\n- 20℃ 时水的动力粘度 μ≈1.005×10⁻³ Pa·s，密度 ρ≈998 kg/m³。\n- 平行平板间线性流动：du/dy=U/h，由牛顿内摩擦定律算切应力 τ=μU/h。\n- 蜂蜜与水：粘度相差数千倍，直观说明粘性差异。\n\n#### 四、高频考点（速记）\n\n1. 流体定义：任意微小剪切力即连续变形\n2. 连续介质假设的含义与意义\n3. 牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n4. 动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n5. 粘度随温度变化：液体随温升而减小，气体随温升而增大\n6. 牛顿流体与非牛顿流体判别\n7. 密度、重度、相对密度概念与单位\n8. 压缩性、膨胀性与体积弹性模量\n9. 质量力与表面力的分类\n\n#### 五、思考题 / 自测\n\n- **Q**：为什么说静止流体不能承受剪切力？\n  **A**：静止流体中任何微小剪切力都会引起连续变形，故静止时切应力必为零，只能承受法向压应力。\n\n- **Q**：动力粘度与运动粘度有何区别与联系？\n  **A**：μ 直接反映流体粘性大小（Pa·s）；ν=μ/ρ 把密度（惯性）一并考虑（m²/s），常用于雷诺数等运动学分析。\n\n- **Q**：为什么液体与气体的粘度随温度变化规律相反？\n  **A**：液体粘性主要来自分子间引力，升温引力减弱故 μ 降低；气体粘性主要来自分子动量交换，升温热运动加剧故 μ 升高。\n\n\n#### 六、与前后章之关联\n\n- **承前**：全课起点，建立流体的连续介质模型与基本物性参数。\n- **启后**：粘性是第 5 章沿程损失与第 4 章 N-S 方程之源；密度、压强为第 2 章静力学之基。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体及其主要物理性质\n## 核心概念\n- 流体\n- 连续介质假设\n- 流体质点\n- 密度 ρ\n- 重度（容重）γ\n- 粘性\n- 牛顿内摩擦定律\n- 动力粘度 μ 与运动粘度 ν\n- 牛顿流体与非牛顿流体\n- 压缩性与膨胀性\n- 质量力与表面力\n## 关键公式 / 模型\n- ρ = dm/dV\n- γ = ρg\n- τ = μ·(du/dy)\n- ν = μ/ρ\n- κ = -(1/V)(dV/dp), K = 1/κ\n- α_V = (1/V)(dV/dT)\n## 高频考点\n- 流体定义：任意微小剪切力即连续变形\n- 连续介质假设的含义与意义\n- 牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n- 动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n- 粘度随温度变化：液体随温升而减小，气体随温升而增大\n- 牛顿流体与非牛顿流体判别\n- 密度、重度、相对密度概念与单位\n- 压缩性、膨胀性与体积弹性模量\n- 质量力与表面力的分类\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体及其主要物理性质))\n    核心概念\n      流体\n      连续介质假设\n      流体质点\n      密度 ρ\n      重度（容重）γ\n      粘性\n      牛顿内摩擦定律\n      动力粘度 μ 与运动粘度 ν\n      牛顿流体与非牛顿流体\n      压缩性与膨胀性\n      质量力与表面力\n    关键公式 / 模型\n      ρ = dm/dV\n      γ = ρg\n      τ = μ·（du/dy）\n      ν = μ/ρ\n      κ = -（1/V）（dV/dp）, K = 1/κ\n      α_V = （1/V）（dV/dT）\n    高频考点\n      流体定义：任意微小剪切力即连续变形\n      连续介质假设的含义与意义\n      牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n      动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n      粘度随温度变化：液体随温升而减小，气体随温升而增大\n      牛顿流体与非牛顿流体判别\n      密度、重度、相对密度概念与单位\n      压缩性、膨胀性与体积弹性模量\n      质量力与表面力的分类\n```\n\n<\/details>\n\n---\n\n### 第 2 章 · 流体静力学\n\n> 素材：[_第02章_流体静力学.md](./_第02章_流体静力学.md) · 主版 41 页\n\n#### 一、核心概念\n\n- **流体静压强**：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n- **静压强两特性**：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n- **静止流体平衡微分方程（欧拉平衡方程）**：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n- **水静力学基本方程**：重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n- **测压管水头**：z+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n- **绝对压强、相对压强、真空度**：以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n- **相对静止**：流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n- **平面上的静水总压力**：P=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `∇p = ρf` | 静止流体平衡微分方程（欧拉平衡方程） |\n| `p = p₀ + ρgh` | 重力场水静力学基本方程 |\n| `z + p/(ρg) = C` | 测压管水头守恒 |\n| `P = ρg·h_c·A` | 作用在平面上的静水总压力，h_c 为形心淹深 |\n| `y_D = y_c + I_c/(y_c·A)` | 压力中心位置，恒在形心之下 |\n| `z = ω²r²/(2g)` | 等角速度旋转时自由液面（抛物面） |\n\n#### 三、重要案例 / 例题\n\n- U 形水银压差计测量管道两点压强差。\n- 矩形闸门所受静水总压力大小及压力中心位置计算。\n- 等角速度旋转容器内自由液面呈旋转抛物面。\n\n#### 四、高频考点（速记）\n\n1. 静压强的两个基本特性\n2. 水静力学基本方程及其几何、能量意义\n3. 绝对压强、相对压强、真空度的关系\n4. 等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n5. 测压管水头守恒\n6. 平面静水总压力大小与压力中心计算\n7. 相对静止（等加速、旋转）的压强分布\n8. U 形管、压差计读数计算\n\n#### 五、思考题 / 自测\n\n- **Q**：为什么静压强具有各向同性？\n  **A**：对微元四面体作受力平衡分析，忽略高阶小量（质量力）后可证任一点各方向压强大小相等。\n\n- **Q**：压力中心为何总在形心之下？\n  **A**：压强随深度线性增大，下部受压更大使合力作用点下移，由 y_D=y_c+I_c/(y_c·A)>y_c 可知。\n\n- **Q**：相对静止与绝对静止有何区别？\n  **A**：相对静止时流体相对容器不动但整体有加速度，须把惯性力计入质量力，等压面不再水平（如旋转呈抛物面）。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 1 章密度、压强、质量力等概念。\n- **启后**：压强概念贯穿第 4 章伯努利方程；平衡方程是第 4 章欧拉运动方程在静止时的特例。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体静力学\n## 核心概念\n- 流体静压强\n- 静压强两特性\n- 静止流体平衡微分方程（欧拉平衡方程）\n- 水静力学基本方程\n- 测压管水头\n- 绝对压强、相对压强、真空度\n- 相对静止\n- 平面上的静水总压力\n## 关键公式 / 模型\n- ∇p = ρf\n- p = p₀ + ρgh\n- z + p/(ρg) = C\n- P = ρg·h_c·A\n- y_D = y_c + I_c/(y_c·A)\n- z = ω²r²/(2g)\n## 高频考点\n- 静压强的两个基本特性\n- 水静力学基本方程及其几何、能量意义\n- 绝对压强、相对压强、真空度的关系\n- 等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n- 测压管水头守恒\n- 平面静水总压力大小与压力中心计算\n- 相对静止（等加速、旋转）的压强分布\n- U 形管、压差计读数计算\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体静力学))\n    核心概念\n      流体静压强\n      静压强两特性\n      静止流体平衡微分方程（欧拉平衡方程）\n      水静力学基本方程\n      测压管水头\n      绝对压强、相对压强、真空度\n      相对静止\n      平面上的静水总压力\n    关键公式 / 模型\n      ∇p = ρf\n      p = p₀ + ρgh\n      z + p/（ρg） = C\n      P = ρg·h_c·A\n      y_D = y_c + I_c/（y_c·A）\n      z = ω²r²/（2g）\n    高频考点\n      静压强的两个基本特性\n      水静力学基本方程及其几何、能量意义\n      绝对压强、相对压强、真空度的关系\n      等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n      测压管水头守恒\n      平面静水总压力大小与压力中心计算\n      相对静止（等加速、旋转）的压强分布\n      U 形管、压差计读数计算\n```\n\n<\/details>\n\n---\n\n### 第 3 章 · 流体运动基础\n\n> 素材：[_第03章_流体运动基础.md](./_第03章_流体运动基础.md) · 主版 48 页\n\n#### 一、核心概念\n\n- **拉格朗日法**：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n- **欧拉法**：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n- **迹线**：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n- **流线**：某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n- **染色线（脉线）**：相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n- **过流断面、湿周、水力半径**：过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n- **流体微团运动分解**：亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n- **物质导数（随体导数）**：D/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n- **连续方程（微分形式）**：质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `dx/u = dy/v = dz/w` | 流线微分方程 |\n| `D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/∂z` | 物质导数（当地+迁移） |\n| `∂ρ/∂t + ∇·(ρV) = 0` | 微分形式连续方程 |\n| `∇·V = 0` | 不可压缩流体连续方程 |\n| `ω_z = ½(∂v/∂x − ∂u/∂y)` | 流体微团绕 z 轴的旋转角速度 |\n| `R = A/χ` | 水力半径，A 过流面积，χ 湿周 |\n\n#### 三、重要案例 / 例题\n\n- 由给定速度场判别定常/非定常、均匀/非均匀流。\n- 由速度场求加速度，分清当地加速度与迁移加速度。\n- 计算旋度判别有旋流与无旋流。\n\n#### 四、高频考点（速记）\n\n1. 拉格朗日法与欧拉法的区别\n2. 迹线、流线、染色线的定义与区别；恒定流三者重合\n3. 流线不相交、不转折的性质\n4. 物质导数的组成（当地导数+迁移导数）\n5. 流体微团运动的四个分量\n6. 有旋流与无旋流的判别（旋度）\n7. 微分形式连续方程及不可压缩简化\n8. 过流断面、湿周、水力半径概念\n\n#### 五、思考题 / 自测\n\n- **Q**：定常流中迁移加速度为何可不为零？\n  **A**：定常流 ∂/∂t=0，但质点流经空间不同点速度仍可改变，(V·∇)V≠0，故有迁移加速度（如收缩管中加速）。\n\n- **Q**：流线与迹线何时重合？\n  **A**：在恒定（定常）流场中，流线形状不随时间变化，质点沿流线运动，二者重合。\n\n- **Q**：如何判别流动是否有旋？\n  **A**：计算速度场旋度 ∇×V，若处处为零则为无旋（有势）流，否则为有旋流。\n\n\n#### 六、与前后章之关联\n\n- **承前**：在第 1 章连续介质、第 2 章场概念基础上建立运动描述方法。\n- **启后**：连续方程与运动学概念为第 4 章动力学方程（伯努利、动量、N-S）奠定基础。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体运动基础\n## 核心概念\n- 拉格朗日法\n- 欧拉法\n- 迹线\n- 流线\n- 染色线（脉线）\n- 过流断面、湿周、水力半径\n- 流体微团运动分解\n- 物质导数（随体导数）\n- 连续方程（微分形式）\n## 关键公式 / 模型\n- dx/u = dy/v = dz/w\n- D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/∂z\n- ∂ρ/∂t + ∇·(ρV) = 0\n- ∇·V = 0\n- ω_z = ½(∂v/∂x − ∂u/∂y)\n- R = A/χ\n## 高频考点\n- 拉格朗日法与欧拉法的区别\n- 迹线、流线、染色线的定义与区别；恒定流三者重合\n- 流线不相交、不转折的性质\n- 物质导数的组成（当地导数+迁移导数）\n- 流体微团运动的四个分量\n- 有旋流与无旋流的判别（旋度）\n- 微分形式连续方程及不可压缩简化\n- 过流断面、湿周、水力半径概念\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体运动基础))\n    核心概念\n      拉格朗日法\n      欧拉法\n      迹线\n      流线\n      染色线（脉线）\n      过流断面、湿周、水力半径\n      流体微团运动分解\n      物质导数（随体导数）\n      连续方程（微分形式）\n    关键公式 / 模型\n      dx/u = dy/v = dz/w\n      D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/…\n      ∂ρ/∂t + ∇·（ρV） = 0\n      ∇·V = 0\n      ω_z = ½（∂v/∂x − ∂u/∂y）\n      R = A/χ\n    高频考点\n      拉格朗日法与欧拉法的区别\n      迹线、流线、染色线的定义与区别；恒定流三者重合\n      流线不相交、不转折的性质\n      物质导数的组成（当地导数+迁移导数）\n      流体微团运动的四个分量\n      有旋流与无旋流的判别（旋度）\n      微分形式连续方程及不可压缩简化\n      过流断面、湿周、水力半径概念\n```\n\n<\/details>\n\n---\n\n### 第 4 章 · 流体动力学基础\n\n> 素材：[_第04章_流体动力学基础.md](./_第04章_流体动力学基础.md) · 主版 56 页\n\n#### 一、核心概念\n\n- **欧拉运动方程**：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n- **伯努利方程（沿流线）**：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n- **缓变流（渐变流）**：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n- **总流伯努利方程**：z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n- **动能修正系数 α**：用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n- **动量方程（总流）**：ΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n- **纳维-斯托克斯（N-S）方程**：粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `DV/Dt = f − (1/ρ)∇p` | 理想流体欧拉运动方程 |\n| `z + p/(ρg) + V²/(2g) = C` | 沿流线伯努利方程（理想流） |\n| `z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w` | 总流伯努利方程（实际流） |\n| `ΣF = ρQ(β₂V₂ − β₁V₁)` | 总流动量方程 |\n| `DV/Dt = f − (1/ρ)∇p + ν∇²V` | 纳维-斯托克斯方程 |\n| `Q = vA` | 流量连续关系 |\n\n#### 三、重要案例 / 例题\n\n- 文丘里流量计、毕托管测速：伯努利方程的典型应用。\n- 孔口出流 v=√(2gH)（托里拆利公式）。\n- 水流对弯管、喷嘴的冲击力：动量方程求解。\n\n#### 四、高频考点（速记）\n\n1. 伯努利方程三项水头的物理意义与适用条件\n2. 理想流与实际流伯努利方程的区别（h_w、α）\n3. 总流伯努利方程列写步骤与基准面、断面选取\n4. 动量方程应用与动量修正系数 β\n5. 缓变流断面的选取条件\n6. 毕托管、文丘里、孔口出流的计算\n7. N-S 方程各项物理意义（粘性项 ν∇²V）\n8. 欧拉方程与 N-S 方程的关系（令 ν=0）\n\n#### 五、思考题 / 自测\n\n- **Q**：伯努利方程的适用条件有哪些？\n  **A**：理想流体（或忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n- **Q**：总流伯努利方程为何要引入 α 与 h_w？\n  **A**：实际断面流速分布不均，需用动能修正系数 α 修正动能项；粘性导致机械能沿程损失 h_w，故较理想方程多此两项。\n\n- **Q**：动量方程与伯努利方程各解决什么问题？\n  **A**：伯努利方程（能量）求压强与流速关系；动量方程求流体与边界间的作用力，二者常联立求解。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 3 章连续方程与物质导数；欧拉运动方程是第 2 章平衡方程的运动推广。\n- **启后**：水头损失 h_w（沿程+局部）的计算在第 5 章展开；N-S 方程是粘性流动分析的基础。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体动力学基础\n## 核心概念\n- 欧拉运动方程\n- 伯努利方程（沿流线）\n- 缓变流（渐变流）\n- 总流伯努利方程\n- 动能修正系数 α\n- 动量方程（总流）\n- 纳维-斯托克斯（N-S）方程\n## 关键公式 / 模型\n- DV/Dt = f − (1/ρ)∇p\n- z + p/(ρg) + V²/(2g) = C\n- z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w\n- ΣF = ρQ(β₂V₂ − β₁V₁)\n- DV/Dt = f − (1/ρ)∇p + ν∇²V\n- Q = vA\n## 高频考点\n- 伯努利方程三项水头的物理意义与适用条件\n- 理想流与实际流伯努利方程的区别（h_w、α）\n- 总流伯努利方程列写步骤与基准面、断面选取\n- 动量方程应用与动量修正系数 β\n- 缓变流断面的选取条件\n- 毕托管、文丘里、孔口出流的计算\n- N-S 方程各项物理意义（粘性项 ν∇²V）\n- 欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体动力学基础))\n    核心概念\n      欧拉运动方程\n      伯努利方程（沿流线）\n      缓变流（渐变流）\n      总流伯努利方程\n      动能修正系数 α\n      动量方程（总流）\n      纳维-斯托克斯（N-S）方程\n    关键公式 / 模型\n      DV/Dt = f − （1/ρ）∇p\n      z + p/（ρg） + V²/（2g） = C\n      z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/…\n      ΣF = ρQ（β₂V₂ − β₁V₁）\n      DV/Dt = f − （1/ρ）∇p + ν∇²V\n      Q = vA\n    高频考点\n      伯努利方程三项水头的物理意义与适用条件\n      理想流与实际流伯努利方程的区别（h_w、α）\n      总流伯努利方程列写步骤与基准面、断面选取\n      动量方程应用与动量修正系数 β\n      缓变流断面的选取条件\n      毕托管、文丘里、孔口出流的计算\n      N-S 方程各项物理意义（粘性项 ν∇²V）\n      欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n<\/details>\n\n---\n\n### 第 5 章 · 层流、紊流及其能量损失\n\n> 素材：[_第05章_层流、紊流及其能量损失.md](./_第05章_层流、紊流及其能量损失.md) · 主版 42 页\n\n#### 一、核心概念\n\n- **层流**：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n- **紊流（湍流）**：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n- **雷诺数 Re**：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n- **沿程水头损失 h_f**：沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n- **沿程阻力系数 λ**：层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n- **局部水头损失 h_j**：管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n- **雷诺应力与混合长度**：紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n- **层流底层与水力光滑/粗糙管**：紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Re = vd/ν = ρvd/μ` | 雷诺数，判别流态 |\n| `h_f = λ(L/d)(v²/2g)` | 达西-魏斯巴赫沿程损失公式 |\n| `λ = 64/Re` | 圆管层流沿程阻力系数 |\n| `h_j = ζ(v²/2g)` | 局部水头损失 |\n| `u = u_max[1 − (r/R)²]` | 圆管层流速度抛物线分布 |\n| `h_w = Σh_f + Σh_j` | 总水头损失（沿程+局部叠加） |\n\n#### 三、重要案例 / 例题\n\n- 雷诺实验：通过染色线观察层流向紊流的转捩，确定临界雷诺数。\n- 圆管层流（哈根-泊肃叶流）：流量与压降、粘度的关系。\n- 突然扩大局部损失：包达公式 h_j=(v₁−v₂)²/(2g)。\n\n#### 四、高频考点（速记）\n\n1. 层流与紊流的本质区别及判别（Re 与临界值）\n2. 雷诺数的物理意义（惯性力/粘性力）\n3. 达西公式与沿程阻力系数 λ 的确定\n4. 局部损失系数 ζ 与典型管件取值\n5. 圆管层流速度分布与 u_max=2v 的关系\n6. 紊流时均化、雷诺应力、混合长度\n7. 层流底层、水力光滑管与粗糙管概念\n8. 总水头损失叠加 h_w=Σh_f+Σh_j\n\n#### 五、思考题 / 自测\n\n- **Q**：雷诺数的物理意义及临界值是什么？\n  **A**：Re 表征惯性力与粘性力之比；圆管下临界 Re≈2300，Re<2300 为层流，更大时转为紊流。\n\n- **Q**：为什么紊流的沿程损失比层流大？\n  **A**：紊流脉动产生附加雷诺切应力，能量耗散显著增强，且 λ 对壁面粗糙度敏感，故损失大于层流。\n\n- **Q**：圆管层流中平均流速与最大流速是什么关系？\n  **A**：速度按抛物线分布，平均流速 v=½u_max，即最大流速是平均流速的 2 倍。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 1 章粘性概念与第 4 章总流伯努利方程中的水头损失项 h_w。\n- **启后**：全课收尾，沿程与局部损失计算直接服务于管路水力计算等工程实践。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 层流 紊流及其能量损失\n## 核心概念\n- 层流\n- 紊流（湍流）\n- 雷诺数 Re\n- 沿程水头损失 h_f\n- 沿程阻力系数 λ\n- 局部水头损失 h_j\n- 雷诺应力与混合长度\n- 层流底层与水力光滑/粗糙管\n## 关键公式 / 模型\n- Re = vd/ν = ρvd/μ\n- h_f = λ(L/d)(v²/2g)\n- λ = 64/Re\n- h_j = ζ(v²/2g)\n- u = u_max[1 − (r/R)²]\n- h_w = Σh_f + Σh_j\n## 高频考点\n- 层流与紊流的本质区别及判别（Re 与临界值）\n- 雷诺数的物理意义（惯性力/粘性力）\n- 达西公式与沿程阻力系数 λ 的确定\n- 局部损失系数 ζ 与典型管件取值\n- 圆管层流速度分布与 u_max=2v 的关系\n- 紊流时均化、雷诺应力、混合长度\n- 层流底层、水力光滑管与粗糙管概念\n- 总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((层流 紊流及其能量损失))\n    核心概念\n      层流\n      紊流（湍流）\n      雷诺数 Re\n      沿程水头损失 h_f\n      沿程阻力系数 λ\n      局部水头损失 h_j\n      雷诺应力与混合长度\n      层流底层与水力光滑/粗糙管\n    关键公式 / 模型\n      Re = vd/ν = ρvd/μ\n      h_f = λ（L/d）（v²/2g）\n      λ = 64/Re\n      h_j = ζ（v²/2g）\n      u = u_max【1 − （r/R）²】\n      h_w = Σh_f + Σh_j\n    高频考点\n      层流与紊流的本质区别及判别（Re 与临界值）\n      雷诺数的物理意义（惯性力/粘性力）\n      达西公式与沿程阻力系数 λ 的确定\n      局部损失系数 ζ 与典型管件取值\n      圆管层流速度分布与 u_max=2v 的关系\n      紊流时均化、雷诺应力、混合长度\n      层流底层、水力光滑管与粗糙管概念\n      总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n<\/details>\n\n---\n\n\n> **正言若反**：最终资料不离底层图像；凡疑处，复归章节素材与原始 PDF。\n> 每章之链：原始 PDF → `02_解析成果/<PDF_stem>/page_*.jpg` → 章节素材 md → 本资料。\n"}, {"id": "ch-01", "group": "章节素材", "title": "第01章 流体 力学：倾向于研究水流的流动规律。\n60年代以前：研究流体的动量传递问题；研究流体的运\n动规律及其与固体、液体或大气界面之间的相互作用力问题\n60年代以后：研究解决能源、环境保护、化工与石油等\n领域的流体力学问题，多学科交互融合。\n\n---\n\n**p007** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_007.jpg)\n\n1.2流体力学的任务与发展简史\n二、 流体力学的发展简史\n两三干以前，通过孔口出流的原理发明了刻漏、铜壶\n滴漏 （西汉时期的计时工具）。\n漏：指带孔的壶\n刻：指附有刻度的浮箭\n滴漏：由水滴规律制造\n刻漏 滴\n漏\n\n---\n\n**p008** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_008.jpg)\n\n1.2流体力学的任务与发展简史\n二、 流体力学的发展简史\n公元前250年，修建了都江堰、郑国渠和灵渠等水利工程\n都江堰工程：\n壹旅游\n宝瓶口：将岷江江水分流部\n鱼嘴\n分进入成都平原，防洪、减旱；\n鱼嘴：东部地势较西部高江\n水难以流入宝瓶口，进行二期鱼\n江\n嘴工程；\n宝瓶口\n飞沙堰：丰水期内江造成径\n流大及泥沙淤积，修建飞沙堰。\n只有内江水可以进入成者\n\n---\n\n**p009** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_009.jpg)\n\n1.2流体力学的任务与发展简史\n二 流体力学的发展简史\n灌溉：鱼嘴分水内江， 内江河床低，外江河床高，枯水\n期有6成水量进入内江，用于灌溉。\n壹旅 喜旅游\n外江 内江\n宝瓶口\n\n---\n\n**p010** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_010.jpg)\n\n1.2流体力学的任务与发展简史\n二 流体力学的发展简史\n泄洪：宝瓶口狭窄，丰水期、 洪水期宝瓶口水面水位怡\n高，高于飞沙堰的水量通过飞沙堰分流至外江。\n喜旅游 壹旅荐\n宝瓶口\n江 玉垒\n飞沙堰\n宝瓶口\n飞沙堰人\n水面就会上升，当水面超过旁边的飞沙堰时\n\n---\n\n**p011** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_011.jpg)\n\n1.2流体力学的任务与发展简史\n二 流体力学的发展简史\n排沙：弯道环流原理，澄澈的表层水流向凹地，浑浊的\n底层水流向凸地，大量泥沙流向外江；狭窄的宝瓶口和离堆作\n用在飞沙堰附近形成漩涡，大量沙石甩出飞沙堰。剩余沙石在\n对面回水区沉淀，河工每年淘出。\n壹旅游 壹旅游\n外江 内江\n宝瓶口\n\n---\n\n**p012** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_012.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n创建期：\n西汉司马迁的《史记?河渠书》， “于蜀，蜀守冰凿离堆\n辟沫水之害，穿二江成都之中。此渠皆可行舟；有余则用概浸\n百姓飨（xiang）其利。至于所过，往往引l其水益用概田畴之\n渠，以万亿计，然莫足数也。\n所谓“凿离堆”，指开凿都江堰的宝瓶口工程。都江堰\n在创建之初，只有分水鱼嘴和宝瓶口两个工程。\n\n---\n\n**p013** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_013.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n逐步完善期 （汉代至唐代）：\n北魏时期的 《水经注》“李冰作大堰于此，壅江作，\n有左右口，谓之（jian）期，入郸江、检江，以行舟”。\n《新唐书·地理志》记载：导江“有侍郎堰，其东百丈堰\n弓江水以溉彭、益田，龙朔中筑。又有小堰，长安初筑。\n唐代都江堰灌区不仅延伸至成都平原南部甚至岷江中游\n而且灌区的管理组织体系和管理制度进一步完善，形成了严格\n的岁修制度。\n\n---\n\n**p014** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_014.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n成熟期 （宋元明清）：两宋时期，有关都江堰的文字记\n载可知都江堰主体工程包括象鼻、离堆、侍郎堰、支水和摄水\n等，其中“象鼻”指的就是鱼嘴，“离堆”即宝瓶口，“侍郎\n堰”指具有泄洪和排沙功能的飞沙堰，“支水”和“摄水”等\n辅助设施大致相当于导流堤、拦河低堰等。至此，拥有分水、\n导流、引引水和溢洪排沙综合功能的工程体系的形成，标志着都\n江堰作为一项综合性的水利工程进入了成熟期。\n\n---\n\n**p015** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_015.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n承前启后期（20世纪30年代-80年代）\n1935年，都江堪鱼嘴首先改用混凝土浇筑，鱼嘴成为都\n江堰水利工程中第一个传统工程结构与现代水工结构的结合物。\n飞沙堰、鱼尾、金刚堤等工程设施陆续用混凝土浇筑，意味着\n现代水利技术、建筑材料与古老的水利工程型式在都江堰这一\n水利工程上结合，都江堰成为一处古老与现代、多种技术集于\n一身的持续发展的水利工程\n都江堰：古老的灌溉、泄洪、排沙水利工程\n\n---\n\n**p016** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_016.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n从世界上看，流体力学发展经历了不同时期：\n公元前250年\n文艺复兴时期\n16世纪初\n17世纪，工业革命开始，科学迅速发展\n18世纪-19世纪\n19世纪末至20世纪中叶\n20世纪中叶至今\n\n---\n\n**p017** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_017.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n公元前250年：希腊的阿基米德提出了“论浮体” 古代\n文艺复兴时期，16世纪初，达芬奇倡导用实验方法了解\n水流形态（《论水的流动和水的测量》）；意大利伽利略的比萨\n斜塔实验：轻重不同的物体，从同一高度坠落，加速度一样，\n它们将同时着地\n托里拆利用实验测出了大气压强，给出了孔口泄流公式\n法国帕斯卡提出液体中压力传递的定律：不可压缩静止流体中\n点受外力产生压强增值后，此压强增值瞬时间传至静正流\n体各点。\n\n---\n\n**p018** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_018.jpg)\n\n1.2流体力学的任务与发展简史\n二 流体力学的发展简史\n17世纪，工业革命开始：英国牛顿在大量实验观察基础\nF 提出了牛顿三大运动定律和方有引1力定律；发明了微积分\n-表达物理量的瞬时变化；提出了粘性流体内摩擦定律；形成\n了牛顿力学。\n第一定律 Gmm2 万有\n引力 dtF= dm v+m duF=μAdt 第二定律 dy 内摩\n擦定律\n第三定律\n\n---\n\n**p019** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_019.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1730年，法国工程师皮托发明了测量流量的皮托管；\n1738年，瑞士数学家伯努利将牛顿力学与流体物性、压\n强概念结合，推导出不可压缩理想流体运动的能量方程-伯努\n利方程。\npV pV\n-+pgz2=P+ -+pgZ\n不可压缩无粘流动沿流线的机械能转化与守恒定律。\n\n---\n\n**p020** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_020.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1752年，法国达朗贝尔研究阻力时通过达朗贝尔谬\n（悖论），发现无粘性理想流体的局限性，促进了对粘性流体的\n研究，首先提出了连续性方程。\n理论预测：在不可压缩、无粘性、非旋转的理想流体中，\n一个物体以恒定速度运动时，所受的阻力为零\n现实观察：实际物体（如飞机、球体）在流体（如空气或水）\n中运动时，明显受到阻力，这一矛盾为“达朗贝尔悖论\n脖论源于理论中忽略流体粘性\n\n---\n\n**p021** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_021.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1753年，瑞士的欧拉提出了流体的连续性假设；提出了\n描述流体的欧拉方法；建立了理想流体运动微分方程；研究理\n想流体无旋运动，提出速度势的概念。\n1783年，法国的拉格朗日提出描述流体运动的拉格朗日\n方法；引引进了流函数概念。\n1823年，法国的纳维和英国的斯托克斯建立了粘性流体\n运动微分方程-N-S方程，提供了研究实际流体运动的基础。\n\n---\n\n**p022** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_022.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1822年，傅里叶和菲克与牛顿内摩擦定律相对应，提出\n了傅里叶热传导公式和菲克第一定律，为研究流体的传质、传\n热问题提供了依据\ndT （热传导）\n热 dxJ=-D （质量传递）\nr=H （牛顿内磨搽定律）\n\n---\n\n**p023** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_023.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n实验水力学发展：\n法国的谢才通过大量实验提出明渠流量计算公式：\nQ=W·C√R·J\n意大利文丘里发明了文丘里流量计\n\n---\n\n**p024** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_024.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n实验水力学发展：\n法国的达西 （地下水渗流）、德国的魏斯巴赫 (流体阻\n力）、英国的曼宁 （明渠断面平均流速） 等实验水利学研究成\n果仍在应用。\n局限性：不能解决复杂的工程问题；古典流体力学与实\n验水力学长期分离。\n\n---\n\n**p025** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_025.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n19世纪末-20世纪中叶：\n古典流体力学与实验水力学结合，形成现代流体力学\n1882年，英国的雷诺首先阐明了相似原理，促进了理论\n和实验的结合；进行了圆管实验，发现了流体流动的两种流态：\n层流和湍流（流），提出了判别标准-雷诺数。\nTurbulent dpuregion R=\nBufferlayer uViscous sublayerNotto ScaleLaminar Transition Turbulent\n\n---\n\n**p026** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_026.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n19世纪末-20世纪中叶：\n引入了湍流应力（雷诺应力），采用时均方法建立了不\n可压缩实际流体的瑞流运动方程 （雷诺方程），为瑞流理论研\n究提供了基础。\n1892年，1904年，英国的瑞利首次提出用量纲分析求流\n动相似准则，促进了理论分析和实验研究相结合。\n1887年，奥地利的马赫对可压缩气体研究作出了重要贡\n献，后人将表征可压缩性的系数定义为马赫数 （流动速度与当\n地音速之比）。\n\n---\n\n**p027** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_027.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n19世纪末-20世纪中叶：\n1904年，德国普朗特创立了边界层理论，为解决边界复\n杂的实际流体运动开辟了途径。\n1921年，匈牙利的冯卡门导出边界层的动量积分方程\n可解决一些壁面边界层问题。\n1932年，德莱顿用热线流速计成功测量到湍流的脉动流\n速。\n1933年，德国尼古拉兹测定了人工粗造管道，补充了边\n界层理论，推导了湍流半经验公式\n\n---\n\n**p028** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_028.jpg)\n\n1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n20世纪中叶至今：\n1946年，第一台电子计算机研制成功，使得数值计算方\n法解决流体力学问题成为可能并迅速发展。\n100 A2175\n典型的数值模拟软件：\nFLUENTCOMSOLT-H-M-C （多物理场耦合）\nThermo-Hydro-Mechanical-Chemical\n\n---\n\n**p029** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_029.jpg)\n\n1.3连续介质假设\n一、问题提出\n从分子物理学：构成流体的物质实体是大量分子，大量\n分子处于离散状态且做热运动。\n流体力学研究的问题是流体的宏观平衡与运动规律，其\n描述均为宏观物理量（速度、压强、密度、力、温度），其定\n义基于分子微观性质的统计平均。因而存在两个问题：\n1）流体力学关注的宏观问题并不关注实际物质的微观状\n态和行为-研究问题与研究对象脱节。\n2）实际构成流体最小物质实体是大量离散分子，流体力\n学宏观问题研究需借助数学微积分，变量须是连续函数。\n\n---\n\n**p030** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_030.jpg)\n\n1.3连续介质假设\n二、连续介质假设\n为解决上述问题，需要对流体的物质实体进行模型化-连\n续介质模型假设，主要对流体物质最小实体进行模化。\n引I入特征体积AV*概念，特征体积的定义需要满足一定\n条件：基于特征体积所包含的分子的统计平均得到的宏观变量\n值是稳定的。如何达到或满足这个条件？\n以与特征体积尺度有关系的流体的宏观变量-密度为例加\n以说明：\n\n---\n\n**p031** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_031.jpg)\n\n1.3连续介质假设\n二、连续介质假设\np(kg/m)\n如右图小圆圈所示，其包含\n100 小尺度宏观变\n量的不稳定性 大尺度宏观变量的\n的分子量较少，特征体积边界处 不稳定性\n有分子进出，其数量与特征体积 p=1kg/m² 100\np=1.1\n内总分子数量级相当，导致统计 p=1.2 10 0.01\np=1.3\n平均得到的密度值波动剧烈\n相反，蓝色特征体积比较大 4V* 特征体积\n宏观物理量密度在空间上受温度影响其分布也是变化的 1-\n1.3），即特征体积取得太大时，其宏观变量值是不确定的。\n\n---\n\n**p032** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_032.jpg)\n\n1.3连续介质假设\n二、连续介质假设\n基于上述现象，微观上，特征体尺度要保证基于统计平\n均的宏观量的确定性主要在于和流体分子自由程的尺度比较；\n宏观上，特征体尺度的确定在于其内部宏观变量的变化相对于\n研究问题尺度上该变化是否可以忽略。由此得到定义特征体积\n必须满足：\n在宏观上充分小一特征尺度<<流动问题特征长度\n（数学上可近似为一没有维度的点）\n在微观上充分大一特征尺度>>分子平均自由程\n（保证特征体包含大量分子，统计平均宏观变量值稳定）\n\n---\n\n**p033** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_033.jpg)\n\n1.3连续介质假设\n二、连续介质假设\n流体质点：特征体所包含的流体分子集合称为流体质点\n流体质点 fluidparticle\n微小特征体，包含大量分子，具有确定的宏观统\n计特性\n从空间上：分子平均自由程<<流体质点尺度<<流动问\n题特征长度；\n从时间上：微观性质统计平均后可得到稳定值的时间<统\n计平均时间<<流动问题的特征时间。\n\n---\n\n**p034** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_034.jpg)\n\n1.3连续介质假设\n二、连续介质假设\n流体力学连续介质模型假设：\n1）假设组成流体最小物质实体是质点\n不是流体分子；\n2)1 假设流体是由无限多流体质点连绵不断组成 质点间\n无间隙。流体是连续的，流体宏观变量分布也是连续的。\n适用条件：针对所研究问题，流体质点是否可定义，分\n子自由程是否远小于特征尺寸。\n不适用：大气边缘稀薄气体的飞行器；微小通道内流体\n的流动问题。\n\n---\n\n**p035** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_035.jpg)\n\n1.4流体的密度\n一、密度的定义\n密度是流体的重要属性，对流体的运动特性具有重要影\n响。\n流体质点的密度等于特征体包含的流体分子的质量与特\n征体体积之比其数学定义：\np= limv→△vVdV\n相对密度：工程上将某液体的密度与4℃水的密度\n（1000kg/m3）的比值称为相对密度：\n\n---\n\n**p036** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_036.jpg)\n\n1.4流体的密度\n二、引起密度变化的参数\n流体密度是压强与温度的函数=（x,y，=），压强与温度的\n变化引起密度的变化：\n+pde opdT dp -op/edp+ oplPdTop OT op OT\n右式压力系数项：Ev= 0p / p\n（体积模量/压缩系数）\n右式温度系数项：β= （热膨胀系数）\n\n---\n\n**p037** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_037.jpg)\n\n1.4流体的密度\n例题1-1：由于温室效应，地球表面平均温度升高。海洋受热\n后，海水膨胀导致海平面升高。设海洋平均水深3800m，平\n均热膨胀系数为1.6*10-4K-1度。试计算海洋水温增加1K时引\n起的海平面上升高度。\n△h=hβT=3800×1.6×10-4×1=0.608m\n\n---\n\n**p038** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_038.jpg)\n\n1.5流体的粘性\n一、 、流体粘性的定义\n对流体流动最具影响的属性有流体的粘性和可压缩性。什么\n是粘性？粘性的定义是什么？实验（牛顿），如下图：\n图中上下两个无限长平板，平\n板间为流体，下平板固定不动。在 u=Uto时刻，上平板施加向右的力F，在 u+△uF作用下，上平板以速度u匀速向右 h\n运动，平板间的流体一起向右运动\nB u=0\n，在垂直方向自上而下流体的速度越来越小。\n为什么平板间与平板没有接触的流体会发生运动？-流体粘性\n\n---\n\n**p039** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_039.jpg)\n\n1.5流体的粘性\n流体粘性的定义\n该层流体文带动下一层流体向右运动；\n流体上\n牛顿平板试验\n以上下两层间流体微元作研究对象，流\n体微元上面受到了上层流体向右的剪切力作 C u=U no-slip condition\n用，下面受到了下层流体向左的剪切力作用 u+u\n。在剪切力作用下，流体微元发生变形。剪 h u p2\n切变形产生的力的方向与上层流体和下层流 T2\n体加载给流体微元的切向力相反。 B u=0 no-slipcondition\n现来。 本质上+ 粘性是流体抵抗剪切变形（相对运动）的一种属性\n\n---\n\n**p040** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_040.jpg)\n\n1.5流体的粘性\n二、流体粘性的产生原因\n液体：相邻两分子间距离一般是分子引力与斥力平衡的距离\n当相邻分子偏离平衡距离时，如果距离增大表现为引力，减小表\n现为斤力\n右图：静止时分子间处于平衡距离， 不\n表现有力的存在；当上层流体向右运动时\n下两层流体相邻两层分子间距离增加\n分子间引1力增加；对上层流体，分子间引1力\n向左，阻碍上层流体向右运动；对下层流体\n，分子间引力向右，拉动下层流体向右运动\n机制：流体微元剪切变形一分子间距离增加一分子间引力增\n加一阻止分子间距离改变。内摩擦抵抗变形宏观表现流体的粘性。\n\n---\n\n**p041** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_041.jpg)\n\n1.5流体的粘性\n二、流体粘性的产生原因\n气体：分子间距较大，分子间引力可忽略，分子无时无刻作\n无规则热运动。\n右图：上层流体向右速度为u+Au， u+△u\n层流体向右速度为u；由于气体无规则运动\n上、下流体交界面有气体分子穿过。穿\n过交界面的分子与上下层气体分子存在动量交换：在下层区域从\n上层来的具有较大向右速度的分子把动量交换给下层速度较低的\n分子，动量交换产生的作用力向右，推动下层分子向右运动；在\n上层区域从下层来的具有较小向右速度的分子与上层分子发生动\n量交换，动量交换产生的作用力向左，阻碍上层流体向右运动。\n机制：分子热运动一不同层间分子动量交换一气体的粘性力。\n\n---\n\n**p042** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_042.jpg)\n\n1.5流体的粘性\n三、牛顿内摩擦定律\n由粘性产生机理，粘性的宏观表现为层之间的切应力；\n层间的粘性应力可视为层间摩擦力。层间摩擦力大小等于多少？\n影响因素有哪些？\nu=U no-slipcondition\n由牛顿平板实验，由于流体粘性 u+△u\n与板界面处流体速度近似与板的运动\n速度相同，即满足无滑移边界条件 B u=0 无滑移条件\n则上板界面处流体速度为U，下板界面处流体速度为0。上板\n界面流体受平板向右的切应力，板则受到向左的切应力，两作\n用力平衡。单位面积流体切应力=F/A\n\n---\n\n**p043** ![](../001-开学第一课-《流体力学》 第一章 流体及其主要物理性质/page_043.jpg)\n\n1.5流体的粘性\n三、牛顿内摩擦定律\n牛顿平板实验上下板间距很小，切应力与U/h成正比：\n为动力 压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n- **质量力与表面力**：质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `ρ = dm/dV` | 密度定义，单位 kg/m³ |\n| `γ = ρg` | 重度（容重），单位 N/m³ |\n| `τ = μ·(du/dy)` | 牛顿内摩擦定律，切应力正比于速度梯度 |\n| `ν = μ/ρ` | 运动粘度，单位 m²/s |\n| `κ = -(1/V)(dV/dp), K = 1/κ` | 体积压缩系数与体积弹性模量 |\n| `α_V = (1/V)(dV/dT)` | 体积膨胀系数 |\n\n### 三、重要案例 / 例题\n\n- 20℃ 时水的动力粘度 μ≈1.005×10⁻³ Pa·s，密度 ρ≈998 kg/m³。\n- 平行平板间线性流动：du/dy=U/h，由牛顿内摩擦定律算切应力 τ=μU/h。\n- 蜂蜜与水：粘度相差数千倍，直观说明粘性差异。\n\n### 四、高频考点（速记）\n\n1. 流体定义：任意微小剪切力即连续变形\n2. 连续介质假设的含义与意义\n3. 牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n4. 动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n5. 粘度随温度变化：液体随温升而减小，气体随温升而增大\n6. 牛顿流体与非牛顿流体判别\n7. 密度、重度、相对密度概念与单位\n8. 压缩性、膨胀性与体积弹性模量\n9. 质量力与表面力的分类\n\n### 五、思考题 / 自测\n\n- **Q**：为什么说静止流体不能承受剪切力？\n  **A**：静止流体中任何微小剪切力都会引起连续变形，故静止时切应力必为零，只能承受法向压应力。\n\n- **Q**：动力粘度与运动粘度有何区别与联系？\n  **A**：μ 直接反映流体粘性大小（Pa·s）；ν=μ/ρ 把密度（惯性）一并考虑（m²/s），常用于雷诺数等运动学分析。\n\n- **Q**：为什么液体与气体的粘度随温度变化规律相反？\n  **A**：液体粘性主要来自分子间引力，升温引力减弱故 μ 降低；气体粘性主要来自分子动量交换，升温热运动加剧故 μ 升高。\n\n\n### 六、与前后章之关联\n\n- **承前**：全课起点，建立流体的连续介质模型与基本物性参数。\n- **启后**：粘性是第 5 章沿程损失与第 4 章 N-S 方程之源；密度、压强为第 2 章静力学之基。\n\n"}, {"id": "ch-02", "group": "章节素材", "title": "第02章 流体静力学", "md": "# 流体力学 · 第 2 章 · 流体静力学 · 素材\n\n> 教师: 曾强 · 学期: 2026春\n> 章下 PDF: 3 个 · 总页: 123\n> 主版: 第 5 节 · 41 页\n\n---\n\n## 主版课件 · 第 5 节\n\n> `005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学.pdf`\n\n<details><summary>展开 41 页图链<\/summary>\n\n- [p001](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_001.jpg)  · 《流体力学》\n- [p002](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_002.jpg)  · 本章主要内容\n- [p003](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_003.jpg)  · 2.1流体静压强\n- [p004](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_004.jpg)  · 2.1流体静压强\n- [p005](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_005.jpg)  · 2.1流体静压强\n- [p006](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_006.jpg)  · 2.1流体静压强\n- [p007](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_007.jpg)  · 2.1流体静压强\n- 第二章 流体静力学/page_035.jpg)\n\n本章小节\n流体静压强\n静止流体平衡微分方程\n重力场中静止流体内压强分布\n压强测量\n作用在平面上的流体静压力\n作业：\nP42页，复习思考题：2-1、2-2、2-10\nP33页，习题：2-2、2-6\n\n---\n\n**p036** ![](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_036.jpg)\n\n第二章作业-复习题\n2-1.什么是流体静压强？流体静压强有哪两个特性？\n答：流体静压强：静止流体内的压应力称为流体静压强。\n流体静压强特性：\n1）.静压强作用的垂向性：流体静压强总是沿着作用面的\n内法线方向。\n2）静压强的各向等值性：某一固定点上流体静压强大小\n与作用面方位无关，是位置的标量函数。\n\n---\n\n**p037** ![](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_037.jpg)\n\n第二章作业-复习题\n2-2.流体平衡微分方程的形式及其物理意义是什么？\n答：流体平衡微分方程：了-1\n物理意义：反映了静止流体中压强梯度与单位质量力的\n相互关系-力平衡。\n\n---\n\n**p038** ![](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_038.jpg)\n\n第二章作业-复习题\n2-10.什么是位置水头、压强水头、测压管水头？它们具有什\n么样的能量意义？\npg\n位置水头z：表示流体具有一定高度而产生的压强大小；\n压强水头p/pg：表示流体中某点在该点压强作用下液体\n沿测压管上升的高度；\n测压管水头z+卫\npg\n\n---\n\n**p039** ![](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_039.jpg)\n\n第二章作业-复习题\n2-10.什么是位置水头、压强水头、测压管水头？它们具有什\n么样的能量意义？\n答：能量意义：\n位置水头表示相应点单位质量液体所具有的位置势能，\n即液体克服重力从基准线移动至该点具有的能量。\n压强水头表示单位质量液体具有的压力能，该压力能使\n液体克服重力做功达到pg 高度。\n测压管水头为单位质量流体的总能量\n\n---\n\n**p040** ![](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_040.jpg)\n\n第二章作业-习题\n2-2.一封闭水箱如图所示，金属测压计测得的压强值为\np=4.9kPa（相对压强），测压计中心比A点高z=0.5m，而A点在\n液面以下h=1.5m。求液面的绝对压强和相对压强\n解：设Pabso为液面的绝对压强，A点的绝对\n压强可写为：Ph+pgh=P+pgz+P Po\n日\n液面绝对压强：\nPato = P+pgz+P-pgh\n= 0. 98×10° + 9.8×1000×(0. 5 -1. 5) + 4.9×10² = 93. 1kPa\n液面相对压强：P=Ph。-P=93100-98000=-4900Pa\n\n---\n\n**p041** ![](../005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学/page_041.jpg)\n\n第二章作业-习题\n2-6.如图所示密闭容器，上层为空气，中层为密度为\n的原油，下层为密度为1250kg/m²！ 的甘油，测压管中的甘油表面\n高程为9.14m，求压力表G的读数。\n解：表压：P=P-P！ 则:P=P+P 9140\n空气\n以甘油与原油界面为平衡面，则： 7620\nP + Pg(7.62 -3. 6) = P + Pg(9. 14 -3.6) 原油\nP +Pg(7.62 -3.66) = Pg(9. 14 -3. 6) 甘油\nP = 1250 ×9.8(9. 14 - 3. 66) - 834 ×9.8(7.62 - 3. 66) = 34. 76kPa\n\n---\n\n<\/details>\n\n## 辅版课件\n\n> 共 2 个辅版（同章不同次/不同侧重）。每辅版仅列前 3 页之链，余者参 主版 即可。\n\n### 辅 1 · 第 3 节 · 41 页\n\n> `003-《流体力学》 第二章 流体静力学-《流体力学》 第二章 流体静力学.pdf` · 涉章 [2]\n\n- [p001](../003-《流体力学》 第二章 流体静力学-《流体力学》 第二章 流体静力学/page_001.jpg)  · 《流 ：重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n- **测压管水头**：z+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n- **绝对压强、相对压强、真空度**：以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n- **相对静止**：流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n- **平面上的静水总压力**：P=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `∇p = ρf` | 静止流体平衡微分方程（欧拉平衡方程） |\n| `p = p₀ + ρgh` | 重力场水静力学基本方程 |\n| `z + p/(ρg) = C` | 测压管水头守恒 |\n| `P = ρg·h_c·A` | 作用在平面上的静水总压力，h_c 为形心淹深 |\n| `y_D = y_c + I_c/(y_c·A)` | 压力中心位置，恒在形心之下 |\n| `z = ω²r²/(2g)` | 等角速度旋转时自由液面（抛物面） |\n\n### 三、重要案例 / 例题\n\n- U 形水银压差计测量管道两点压强差。\n- 矩形闸门所受静水总压力大小及压力中心位置计算。\n- 等角速度旋转容器内自由液面呈旋转抛物面。\n\n### 四、高频考点（速记）\n\n1. 静压强的两个基本特性\n2. 水静力学基本方程及其几何、能量意义\n3. 绝对压强、相对压强、真空度的关系\n4. 等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n5. 测压管水头守恒\n6. 平面静水总压力大小与压力中心计算\n7. 相对静止（等加速、旋转）的压强分布\n8. U 形管、压差计读数计算\n\n### 五、思考题 / 自测\n\n- **Q**：为什么静压强具有各向同性？\n  **A**：对微元四面体作受力平衡分析，忽略高阶小量（质量力）后可证任一点各方向压强大小相等。\n\n- **Q**：压力中心为何总在形心之下？\n  **A**：压强随深度线性增大，下部受压更大使合力作用点下移，由 y_D=y_c+I_c/(y_c·A)>y_c 可知。\n\n- **Q**：相对静止与绝对静止有何区别？\n  **A**：相对静止时流体相对容器不动但整体有加速度，须把惯性力计入质量力，等压面不再水平（如旋转呈抛物面）。\n\n\n### 六、与前后章之关联\n\n- **承前**：运用第 1 章密度、压强、质量力等概念。\n- **启后**：压强概念贯穿第 4 章伯努利方程；平衡方程是第 4 章欧拉运动方程在静止时的特例。\n\n"}, {"id": "ch-03", "group": "章节素材", "title": "第03章 流体运动基础", "md": "# 流体力学 · 第 3 章 · 流体运动基础 · 素材\n\n> 教师: 曾强 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 96\n> 主版: 第 7 节 · 48 页\n\n---\n\n## 主版课件 · 第 7 节\n\n> `007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础.pdf`\n\n<details><summary>展开 48 页图链<\/summary>\n\n- [p001](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_001.jpg)  · 《流体力学》\n- [p002](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_002.jpg)  · 第1-第2章主要内容小结\n- [p003](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_003.jpg)  · 第1-第2章主要内容小结\n- [p004](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_004.jpg)  · 本章主要内容\n- [p005](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_005.jpg)  · 3.1描述流体运动的两种方法\n- [p006](../007-《 变量t描述流场\n中流体运动规律，即描述空间某点流体运动物理量随时间变化\n规律及由某点到另一点时该物理量的变化。空间位置为\n（x,yz），则物理量空间分布r:) ，x,y,z,t为欧拉变\n数。\n固定点观察到的是不同流体质点的变化，无法直接观测\n和记录同一质点之前和之后的详细历史，无法像拉格朗日方法\n那样直接给出每个质点的位置随时间的变化\n\n---\n\n**p010** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_010.jpg)\n\n3.1 描述流体运动的两种方法\n欧拉方法\n固定点可测出不同时刻经过该点的流体质点速度，因此\n采用速度矢量描述空间一点流体运动的变化：\nV=V(x,y,Z,t)\n其他状态函数：\nP=P（x,y,Z,t)\nT=T(x,y,z,t)\n固定空间坐标x,yz，时间t为变量，得到空间某点物理量\n随时间的变化。\n固定时间t，变化不同空间位置，得到某时刻物理量在空\n间的分布规律。\n\n---\n\n**p011** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_011.jpg)\n\n3.1描述流体运动的两种方法\n欧拉方法\n控制体：指流场某一确定的空间区域 其相对于坐标系\n具有固定位置。控制体的边界面称为控制面。流体质点可按自\n身运动规律穿越控制面自由出入控制体。\n特点：\n1 控制面上可与外界有质量交换\n2) 控制体空间位置相对于参照系\n不变;\n3）控制体边界形状、 包围空间大\n小是确定的（如教室）；\n4）欧拉方法下的概念CV、CS。\n\n---\n\n**p012** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_012.jpg)\n\n3.1描述流体运动的两种方法\n二、 欧拉方法\n欧拉方法较拉格朗日方法更常用，原因在于：固定空间\n点物理量在实际操作中易于测量；实际问题求解需要；朗格朗\n日方法描述质点特征复杂\n拉格朗日方法-流体质点-系统。位置矢量是流体质点初\n始位置坐标的函数，不是空间位置坐标点的函数，不是场。\n欧拉方法-确定的空间质点-控制体。各物理量是空间位\n置点和时间的函数，得到的是各物理量在场上的分布。\n\n---\n\n**p013** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_013.jpg)\n\n3.2流场、迹线、流线、染色线\n一、流场-定常流与非定常流\n定常流动：流场内每一点上物理量不随时间变化而改变\n称为定常场，对应的流动为定常流动；否则，称为非定常场，\n对应的流动为非定常流动\nn=n(x,y,z)\n如右上图，若注入的水量等于排出的水量\n液面下各处压强不随时间变化而改变-定常流\n如右下图，随排水过程进行，液面不断下\n降，液面下各点随时间变化而改变-非定常流。\n\n---\n\n**p014** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_014.jpg)\n\n3.2流场、迹线、流线、染色线\n一、流场-定常流与非定常流\n如右图飞机风洞实验，固定不动时\n飞机周围绕流流场参数随时间稳定不变\n定常流；俯仰、扭转时飞机周围流场参\n数随时间变化-非定常流。\n定常流-非定常流转化：如下图，将坐\n标系固定在海洋平面，由于船舶行驶过程\n的扰动，海洋呈现非定常流动；若坐标系\n固定在船舶，周围流场视为定常流\n\n---\n\n**p015** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_015.jpg)\n\n3.2流场、迹线、流线、染色线\n一、流场-均匀流与非均匀流\n均匀场：某时刻流场内各空间点上物理量一样，称为均\n匀场，对应的流动为均匀流；否则，为非均匀场，对应的流动\n为非均匀流\n均匀场中各空间点物理量可能随时间变化而改变，但不\n随空间位置变化而改变 on On on =0 ，或(t)\nOx Oy900000000000 汽轮机 赛车周\n70000060000000000 内压强场 围流场\n400000300000200000100000\n\n---\n\n**p016** ![](../007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础/page_016.jpg)\n\n3.2流场、迹线、流线、染色线\n一、流场-均匀流与非均匀流\n流体力   核心概念\n      拉格朗日法\n      欧拉法\n      迹线\n      流线\n      染色线（脉线）\n      过流断面、湿周、水力半径\n      流体微团运动分解\n      物质导数（随体导数）\n      连续方程（微分形式）\n    关键公式 / 模型\n      dx/u = dy/v = dz/w\n      D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/…\n      ∂ρ/∂t + ∇·（ρV） = 0\n      ∇·V = 0\n      ω_z = ½（∂v/∂x − ∂u/∂y）\n      R = A/χ\n    高频考点\n      拉格朗日法与欧拉法的区别\n      迹线、流线、染色线的定义与区别；恒定流三者重合\n      流线不相交、不转折的性质\n      物质导数的组成（当地导数+迁移导数）\n      流体微团运动的四个分量\n      有旋流与无旋流的判别（旋度）\n      微分形式连续方程及不可压缩简化\n      过流断面、湿周、水力半径概念\n```\n\n## 复习要点 · LLM 协填\n\n### 一、核心概念\n\n- **拉格朗日法**：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n- **欧拉法**：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n- **迹线**：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n- **流线**：某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n- **染色线（脉线）**：相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n- **过流断面、湿周、水力半径**：过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n- **流体微团运动分解**：亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n- **物质导数（随体导数）**：D/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n- **连续方程（微分形式）**：质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `dx/u = dy/v = dz/w` | 流线微分方程 |\n| `D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/∂z` | 物质导数（当地+迁移） |\n| `∂ρ/∂t + ∇·(ρV) = 0` | 微分形式连续方程 |\n| `∇·V = 0` | 不可压缩流体连续方程 |\n| `ω_z = ½(∂v/∂x − ∂u/∂y)` | 流体微团绕 z 轴的旋转角速度 |\n| `R = A/χ` | 水力半径，A 过流面积，χ 湿周 |\n\n### 三、重要案例 / 例题\n\n- 由给定速度场判别定常/非定常、均匀/非均匀流。\n- 由速度场求加速度，分清当地加速度与迁移加速度。\n- 计算旋度判别有旋流与无旋流。\n\n### 四、高频考点（速记）\n\n1. 拉格朗日法与欧拉法的区别\n2. 迹线、流线、染色线的定义与区别；恒定流三者重合\n3. 流线不相交、不转折的性质\n4. 物质导数的组成（当地导数+迁移导数）\n5. 流体微团运动的四个分量\n6. 有旋流与无旋流的判别（旋度）\n7. 微分形式连续方程及不可压缩简化\n8. 过流断面、湿周、水力半径概念\n\n### 五、思考题 / 自测\n\n- **Q**：定常流中迁移加速度为何可不为零？\n  **A**：定常流 ∂/∂t=0，但质点流经空间不同点速度仍可改变，(V·∇)V≠0，故有迁移加速度（如收缩管中加速）。\n\n- **Q**：流线与迹线何时重合？\n  **A**：在恒定（定常）流场中，流线形状不随时间变化，质点沿流线运动，二者重合。\n\n- **Q**：如何判别流动是否有旋？\n  **A**：计算速度场旋度 ∇×V，若处处为零则为无旋（有势）流，否则为有旋流。\n\n\n### 六、与前后章之关联\n\n- **承前**：在第 1 章连续介质、第 2 章场概念基础上建立运动描述方法。\n- **启后**：连续方程与运动学概念为第 4 章动力学方程（伯努利、动量、N-S）奠定基础 ## 辅 2 · 第 10 节 · 56 页\n\n> `010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础.pdf` · 涉章 [4]\n\n- [p001](../010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础/page_001.jpg)  · 《流体力学》\n- [p002](../010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础/page_002.jpg)  · 本章主要内容\n- [p003](../010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础/page_003.jpg)  · 4.1 欧拉运动方程\n- ...余 53 页, 参 [`010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础/`](../010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础/)\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体动力学基础\n## 核心概念\n- 欧拉运动方程\n- 伯努利方程（沿流线）\n- 缓变流（渐变流）\n- 总流伯努利方程\n- 动能修正系数 α\n- 动量方程（总流）\n- 纳维-斯托克斯（N-S）方程\n## 关键公式 / 模型\n- DV/Dt = f − (1/ρ)∇p\n- z + p/(ρg) + V²/(2g) = C\n- z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w\n- ΣF = ρQ(β₂V₂ − β₁V₁)\n- DV/Dt = f − (1/ρ)∇p + ν∇²V\n- Q = vA\n## 高频考点\n- 伯努利方程三项水头的物理意义与适用条件\n- 理想流与实际流伯努利方程的区别（h_w、α）\n- 总流伯努利方程列写步骤与基准面、断面选取\n- 动量方程应用与动量修正系数 β\n- 缓变流断面的选取条件\n- 毕托管、文丘里、孔口出流的计算\n- N-S 方程各项物理意义（粘性项 ν∇²V）\n- 欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体动力学基础))\n    核心概念\n      欧拉运动方程\n      伯努利方程（沿流线）\n      缓变流（渐变流）\n      总流伯努利方程\n      动能修正系数 α\n      动量方程（总流）\n      纳维-斯托克斯（N-S）方程\n    关键公式 / 模型\n      DV/Dt = f − （1/ρ）∇p\n      z + p/（ρg） + V²/（2g） = C\n      z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/…\n      ΣF = ρQ（β₂V₂ − β₁V₁）\n      DV/Dt = f − （1/ρ）∇p + ν∇²V\n      Q = vA\n    高频考点\n      伯努利方程三项水头的物理意义与适用条件\n      理想流与实际流伯努利方程的区别（h_w、α）\n      总流伯努利方程列写步骤与基准面、断面选取\n      动量方程应用与动量修正系数 β\n      缓变流断面的选取条件\n      毕托管、文丘里、孔口出流的计算\n      N-S 方程各项物理意义（粘性项 ν∇²V）\n      欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n## 复习要点 · LLM 协填\n\n### 一、核心概念\n\n- **欧拉运动方程**：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n- **伯努利方程（沿流线）**：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n- **缓变流（渐变流）**：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n- **总流伯努利方程**：z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n- **动能修正系数 α**：用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n- **动量方程（总流）**：ΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n- **纳维-斯托克斯（N-S）方程**：粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `DV/Dt = f − (1/ρ)∇p` | 理想流体欧拉运动方程 |\n| `z + p/(ρg) + V²/(2g) = C` | 沿流线伯努利方程（理想流） |\n| `z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w` | 总流伯努利方程（实际流） |\n| `ΣF = ρQ(β₂V₂ − β₁V₁)` | 总流动量方程 |\n| `DV/Dt = f − (1/ρ)∇p + ν∇²V` | 纳维-斯托克斯方程 |\n| `Q = vA` | 流量连续关系 |\n\n### 三、重要案例 / 例题\n\n- 文丘里流量计、毕托管测速：伯努利方程的典型应用。\n- 孔口出流 v=√(2gH)（托里拆利公式）。\n- 水流对弯管、喷嘴的冲击力：动量方程求解。\n\n### 四、高频考点（速记）\n\n1. 伯努利方程三项水头的物理意义与适用条件\n2. 理想流与实际流伯努利方程的区别（h_w、α）\n3. 总流伯努利方程列写步骤与基准面、断面选取\n4. 动量方程应用与动量修正系数 β\n5. 缓变流断面的选取条件\n6. 毕托管、文丘里、孔口出流的计算\n7. N-S 方程各项物理意义（粘性项 ν∇²V）\n8. 欧拉方程与 N-S 方程的关系（令 ν=0）\n\n### 五、思考题 / 自测\n\n- **Q**：伯努利方程的适用条件有哪些？\n  **A**：理想流体（或忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n- **Q**：总流伯努利方程为何要引入 α 与 h_w？\n  **A**：实际断面流速分布不均，需用动能修正系数 α 修正动能项；粘性导致机械能沿程损失 h_w，故较理想方程多此两项。\n\n- **Q**：动量方程与伯努利方程各解决什么问题？\n  **A**：伯努利方程（能量）求压强与流速关系；动量方程求流体与边界间的作用力，二者常联立求解。\n\n\n### 六、与前后章之关联\n\n- **承前**：运用第 3 章连续方程与物质导数；欧拉运动方程是第 2 章平衡方程的运动推广。\n- **启后**：水头损失 h_w（沿程+局部）的计算在第 5 章展开；N-S 方程是粘性流动分析的基础。\n\n"}, {"id": "ch-05", "group": "章节素材", "title": "第05章 层流、紊流及其能量损失", "md": "# 流体力学 · 第 5 章 · 层流、紊流及其能量损失 · 素材\n\n> 教师: 曾强 · 学期: 2026春\n> 章下 PDF: 2 个 · 总页: 69\n> 主版: 第 16 节 · 42 页\n\n---\n\n## 主版课件 · 第 16 节\n\n> `016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失.pdf`\n\n<details><summary>展开 42 页图链<\/summary>\n\n- [p001](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_001.jpg)  · 《流体力学》\n- [p002](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_002.jpg)  · 本章主要内容\n- [p003](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_003.jpg)  · 5.1层流与素流的概念\n- [p004](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_004.jpg)  · 5.1层流与素流的概念\n- [p005](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_005.jpg)  · 5.1层流与素流的概念\n- [p006](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流 离原流层掺入\n流速快的新流层，变为素流。 （雷诺数达到一定数值）\n\n---\n\n**p017** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_017.jpg)\n\n5.3素流流动的特征\n二、素流的脉动与时均性\n流的基本特征是运动过程中流体质点不断相互掺混，使流体质\n点的流速、压强等运动要素发生脉动现象。\n素流脉动产生的原因来自涡体的涡旋 ux\n运动与主流运动的叠加。\n脉动描述的时均模化方法：\n设表示瞬时流速分量或瞬时压强，其 ux u\n在时段T的平均值为：\n= f=f+ftf'=f-ff称为时均分量f称为脉动分量。 研究平均场、脉动场变化规律。\n\n---\n\n**p018** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_018.jpg)\n\n5.3素流流动的特征\n三、系 紊流的近壁特征\n近壁层：固壁面附近粘性起作用的流区，素流时均流速剖面与能量损失\n取决于该区状态。\n近壁区与壁面远区的差异： 轴线\n1）壁面的法向约束使近壁质点法 素流流核\n素流区\n向脉动受到抑制。\n2）质点粘附固壁面，使切向流速\n在壁法向变化梯度大。 缓冲层\n结果：壁面上存在粘性作用占主导 粘性底层\n的贴壁薄层-粘性底层。 （a）水力光滑壁面 (b）完全粗糙壁面\n粘性底层外素流流核区存在大量涡体，涡体横向运动的动量交换是流层\n间切应力主要莱源；粘性底层与流核区之间为缓冲层，发生层流向紊流的转\n换。\n\n---\n\n**p019** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_019.jpg)\n\n5.3紊流流动的特征\n三、素流的近壁特征\n粘性底层是层流运动，其速度分布规律符合层流速度分布规律：\n=(u)n pgJ pgJ （ro+r)（ro-r)≈ pgJ pgJ\n-r（ro-r)= roy4u 4u 2μ 2μ\n由切应力分布： y=r。-rto=pg 2\n得：\n由摩阻流速定义\n得：\npu n puu （粘性底层速度分布近似为直线分\n布) n n\n\n---\n\n**p020** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_020.jpg)\n\n5.3素流流动的特征\n三、 素流的近壁特征\n粘性底层厚度很小 忽略过渡层，则图中b点同时满足粘性底层的\n流速分布规律与流核心的流速分布规律，联立方程可求得粘性底层厚\n度。\n根据尼古拉斯有压圆管实验资料，图中①、\n湖流核心\n③分别为粘性底层、过渡层和素流核心的实\n验曲线。曲线①、③的交点可视为粘性底层到素\n流区的转变点，此处：\nyu* =1.064 yu* ~11.6\ng y = 0。=11.6\n由： V *n32.8d\n* R。√π\n图中红点对应理论厚度，蓝点对应实际厚度。\n\n---\n\n**p021** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_021.jpg)\n\n5.3素流流动的特征\n三、素流的近壁特征\n32.8d\n由粘性底层理论厚度计算公式：。\n可知：管径一定时，雷诺数增大， 粘性理论厚度将减小。\n由尼古拉斯实验曲线，考虑过渡层时粘性底\nyu= 0.7\n层实际厚度可由图中 g 计算： 3530\nyu* 25\n\n---\n\n**p022** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_022.jpg)\n\n5.3素流流动的特征\n三、素流的近壁特征\n由尼古拉斯实验曲线，对过渡层与素流核心区的转变点（即图中\n绿点），对应有：\nyu* = 1.864\nVyu* ~70 R~70\nV70v =148°\n\n---\n\n**p023** ![](../016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失/page_023.jpg)\n\n5.3素流流动的特征\n四、固壁面类型\n粗糙度：粗糙体突出壁面的几何高度称为绝对粗糙度。根据管道\n粗糙度与管道粘性底层实际厚度相对关系，确定管道壁面类型：\n1）水力光滑壁面\nR<5 <0°(<0.40。\n光滑管，素流的光滑区。\n2）完全粗糙壁面\nR*>70 >140。(△<68。)\n粗糙 -流体力学第五章/)\n\n---\n\n## 思维导图 · LLM 生成\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 层流 紊流及其能量损失\n## 核心概念\n- 层流\n- 紊流（湍流）\n- 雷诺数 Re\n- 沿程水头损失 h_f\n- 沿程阻力系数 λ\n- 局部水头损失 h_j\n- 雷诺应力与混合长度\n- 层流底层与水力光滑/粗糙管\n## 关键公式 / 模型\n- Re = vd/ν = ρvd/μ\n- h_f = λ(L/d)(v²/2g)\n- λ = 64/Re\n- h_j = ζ(v²/2g)\n- u = u_max[1 − (r/R)²]\n- h_w = Σh_f + Σh_j\n## 高频考点\n- 层流与紊流的本质区别及判别（Re 与临界值）\n- 雷诺数的物理意义（惯性力/粘性力）\n- 达西公式与沿程阻力系数 λ 的确定\n- 局部损失系数 ζ 与典型管件取值\n- 圆管层流速度分布与 u_max=2v 的关系\n- 紊流时均化、雷诺应力、混合长度\n- 层流底层、水力光滑管与粗糙管概念\n- 总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((层流 紊流及其能量损失))\n    核心概念\n      层流\n      紊流（湍流）\n      雷诺数 Re\n      沿程水头损失 h_f\n      沿程阻力系数 λ\n      局部水头损失 h_j\n      雷诺应力与混合长度\n      层流底层与水力光滑/粗糙管\n    关键公式 / 模型\n      Re = vd/ν = ρvd/μ\n      h_f = λ（L/d）（v²/2g）\n      λ = 64/Re\n      h_j = ζ（v²/2g）\n      u = u_max【1 − （r/R）²】\n      h_w = Σh_f + Σh_j\n    高频考点\n      层流与紊流的本质区别及判别（Re 与临界值）\n      雷诺数的物理意义（惯性力/粘性力）\n      达西公式与沿程阻力系数 λ 的确定\n      局部损失系数 ζ 与典型管件取值\n      圆管层流速度分布与 u_max=2v 的关系\n      紊流时均化、雷诺应力、混合长度\n      层流底层、水力光滑管与粗糙管概念\n      总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n## 复习要点 · LLM 协填\n\n### 一、核心概念\n\n- **层流**：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n- **紊流（湍流）**：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n- **雷诺数 Re**：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n- **沿程水头损失 h_f**：沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n- **沿程阻力系数 λ**：层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n- **局部水头损失 h_j**：管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n- **雷诺应力与混合长度**：紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n- **层流底层与水力光滑/粗糙管**：紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n\n### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Re = vd/ν = ρvd/μ` | 雷诺数，判别流态 |\n| `h_f = λ(L/d)(v²/2g)` | 达西-魏斯巴赫沿程损失公式 |\n| `λ = 64/Re` | 圆管层流沿程阻力系数 |\n| `h_j = ζ(v²/2g)` | 局部水头损失 |\n| `u = u_max[1 − (r/R)²]` | 圆管层流速度抛物线分布 |\n| `h_w = Σh_f + Σh_j` | 总水头损失（沿程+局部叠加） |\n\n### 三、重要案例 / 例题\n\n- 雷诺实验：通过染色线观察层流向紊流的转捩，确定临界雷诺数。\n- 圆管层流（哈根-泊肃叶流）：流量与压降、粘度的关系。\n- 突然扩大局部损失：包达公式 h_j=(v₁−v₂)²/(2g)。\n\n### 四、高频考点（速记）\n\n1. 层流与紊流的本质区别及判别（Re 与临界值）\n2. 雷诺数的物理意义（惯性力/粘性力）\n3. 达西公式与沿程阻力系数 λ 的确定\n4. 局部损失系数 ζ 与典型管件取值\n5. 圆管层流速度分布与 u_max=2v 的关系\n6. 紊流时均化、雷诺应力、混合长度\n7. 层流底层、水力光滑管与粗糙管概念\n8. 总水头损失叠加 h_w=Σh_f+Σh_j\n\n### 五、思考题 / 自测\n\n- **Q**：雷诺数的物理意义及临界值是什么？\n  **A**：Re 表征惯性力与粘性力之比；圆管下临界 Re≈2300，Re<2300 为层流，更大时转为紊流。\n\n- **Q**：为什么紊流的沿程损失比层流大？\n  **A**：紊流脉动产生附加雷诺切应力，能量耗散显著增强，且 λ 对壁面粗糙度敏感，故损失大于层流。\n\n- **Q**：圆管层流中平均流速与最大流速是什么关系？\n  **A**：速度按抛物线分布，平均流速 v=½u_max，即最大流速是平均流速的 2 倍。\n\n\n### 六、与前后章之关联\n\n- **承前**：运用第 1 章粘性概念与第 4 章总流伯努利方程中的水头损失项 h_w。\n- **启后**：全课收尾，沿程与局部损失计算直接服务于管路水力计算等工程实践。\n\n"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 流体力学 · 期末复习骨架\n\n> 教师: 曾强 · 学期: 2026春\n> 共 14 PDF · 617 页 · 5 章节\n> 已填复习要点：5/5 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 第 1 章 | 流体及其主要物理性质 | 63 | [_第01章_流体及其主要物理性质.md](./_第01章_流体及其主要物理性质.md) |\n| 第 2 章 | 流体静力学 | 41 | [_第02章_流体静力学.md](./_第02章_流体静力学.md) |\n| 第 3 章 | 流体运动基础 | 48 | [_第03章_流体运动基础.md](./_第03章_流体运动基础.md) |\n| 第 4 章 | 流体动力学基础 | 56 | [_第04章_流体动力学基础.md](./_第04章_流体动力学基础.md) |\n| 第 5 章 | 层流、紊流及其能量损失 | 42 | [_第05章_层流、紊流及其能量损失.md](./_第05章_层流、紊流及其能量损失.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 250，密度 **中**，建议复习期 5-7 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 第 1 章 · 流体及其主要物理性质\n\n> 主版 63 页 · 第 1 节 · [详细素材](./_第01章_流体及其主要物理性质.md)\n\n**核心三问**：\n\n- **是什么** ── 流体：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*；连续介质假设：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*；流体质点：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 流体定义：任意微小剪切力即连续变形；连续介质假设的含义与意义；牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 2 章 · 流体静力学\n\n> 主版 41 页 · 第 5 节 · [详细素材](./_第02章_流体静力学.md)\n\n**核心三问**：\n\n- **是什么** ── 流体静压强：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*；静压强两特性：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*；静止流体平衡微分方程（欧拉平衡方程）：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 静压强的两个基本特性；水静力学基本方程及其几何、能量意义；绝对压强、相对压强、真空度的关系\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 3 章 · 流体运动基础\n\n> 主版 48 页 · 第 7 节 · [详细素材](./_第03章_流体运动基础.md)\n\n**核心三问**：\n\n- **是什么** ── 拉格朗日法：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*；欧拉法：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*；迹线：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 拉格朗日法与欧拉法的区别；迹线、流线、染色线的定义与区别；恒定流三者重合；流线不相交、不转折的性质\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 流体动力学基础\n\n> 主版 56 页 · 第 12 节 · [详细素材](./_第04章_流体动力学基础.md)\n\n**核心三问**：\n\n- **是什么** ── 欧拉运动方程：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*；伯努利方程（沿流线）：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*；缓变流（渐变流）：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 伯努利方程三项水头的物理意义与适用条件；理想流与实际流伯努利方程的区别（h_w、α）；总流伯努利方程列写步骤与基准面、断面选取\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 5 章 · 层流、紊流及其能量损失\n\n> 主版 42 页 · 第 16 节 · [详细素材](./_第05章_层流、紊流及其能量损失.md)\n\n**核心三问**：\n\n- **是什么** ── 层流：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*；紊流（湍流）：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*；雷诺数 Re：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 层流与紊流的本质区别及判别（Re 与临界值）；雷诺数的物理意义（惯性力/粘性力）；达西公式与沿程阻力系数 λ 的确定\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 五 · 非教学性内容（仅记，期末不考）\n\n- 开学第一课 (13 页)\n- 开学第一课 (24 页)\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 第 1 章 · 流体及其主要物理性质\n- [ ] 第 2 章 · 流体静力学\n- [ ] 第 3 章 · 流体运动基础\n- [ ] 第 4 章 · 流体动力学基础\n- [ ] 第 5 章 · 层流、紊流及其能量损失\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练\n"}, {"id": "exam-期末速查", "group": "期末冲刺", "title": "期末速查", "md": "# 流体力学 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 5/5 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 1 | 流体及其主要物理性质 A. 连续方程\n  - B. 伯努利方程 z+p/(ρg)+V²/(2g)=C\n  - C. 动量方程\n  - D. 傅里叶定律\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：伯努利方程是机械能守恒沿流线的表达。\n\n<\/details>\n\n**8.** 总流伯努利方程相比理想流多出 α 与 h_w 两项，其原因是\n  - A. 断面流速分布不均需 α 修正动能、粘性导致水头损失 h_w\n  - B. 流体可压缩\n  - C. 流动非定常\n  - D. 重力变化\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：α 为动能修正系数，h_w 为机械能沿程损失。\n\n<\/details>\n\n**9.** 判别管流为层流还是紊流的准则数是\n  - A. 弗劳德数 Fr\n  - B. 雷诺数 Re\n  - C. 马赫数 Ma\n  - D. 欧拉数 Eu\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：圆管临界雷诺数约 2300，Re<2300 为层流。\n\n<\/details>\n\n**10.** 圆管层流沿程水头损失与平均流速的关系是\n  - A. 与流速一次方成正比\n  - B. 与流速平方成正比\n  - C. 与流速无关\n  - D. 与流速立方成正比\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：层流 h_f∝v（泊肃叶定律）；紊流粗糙区 h_f∝v²。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 流体的两个基本物性参数是密度 ρ 和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**粘性（动力粘度 μ）**\n\n<\/details>\n\n**2.** 运动粘度 ν 与动力粘度 μ、密度 ρ 的关系为 ν=___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**μ/ρ**\n\n<\/details>\n\n**3.** 测量小段速度常用毕托管，测量管道流量常用 ___ 流量计。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**文丘里**\n\n<\/details>\n\n**4.** 圆管流动的临界雷诺数约为 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**2300**\n\n<\/details>\n\n**5.** 沿程水头损失的计算公式为达西公式 h_f=λ(l/d)·___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**v²/(2g)**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 连续介质假设\n\n<details><summary>📝 参考答案<\/summary>\n\n答：把流体视为由无数流体质点连续无间隙充满空间的介质，使密度、压强、速度等成为时空的连续函数，便于用连续函数与微分方程描述流动。\n\n<\/details>\n\n**2.** 动能修正系数 α\n\n<details><summary>📝 参考答案<\/summary>\n\n答：用断面平均流速计算的动能与按真实流速分布计算的动能之比，α≥1；层流 α=2，紊流 α≈1.05。\n\n<\/details>\n\n**3.** 缓变流（渐变流）\n\n<details><summary>📝 参考答案<\/summary>\n\n答：流线近乎平行、曲率与夹角都很小的流动，过流断面近似为平面且其上压强按静压规律分布，是选取计算断面的前提。\n\n<\/details>\n\n**4.** 水头损失\n\n<details><summary>📝 参考答案<\/summary>\n\n答：实际流体因粘性做功而损失的单位重量流体机械能，分沿程损失 h_f 与局部损失 h_j 两类，总和为 h_w。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述伯努利方程的适用条件。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：理想流体（或可忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n<\/details>\n\n**2.** 层流与紊流的本质区别是什么？如何判别？\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：层流各流层互不掺混、质点沿平行轨迹运动；紊流质点随机脉动、强烈掺混。以雷诺数 Re=vd/ν 判别，圆管 Re<2300 为层流，Re 较大为紊流。\n\n<\/details>\n\n**3.** 总流动量方程能解决什么问题？写出基本形式。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：求流体与边界间的相互作用力（如水流对弯管、喷嘴的冲击力）。形式 ΣF=ρQ(β₂V₂−β₁V₁)，β 为动量修正系数。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试以伯努利方程与动量方程为主线，论述如何分析一段变径弯管中流体对管壁的作用力，并说明两方程各自的作用与联立思路。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①以伯努利方程（能量守恒）联立连续方程 Q=v₁A₁=v₂A₂，求出进出口断面的压强与流速关系；②取控制体，列总流动量方程 ΣF=ρQ(β₂V₂−β₁V₁)，外力含两断面压力 p₁A₁、p₂A₂、重力与管壁反作用力 R；③将能量方程求得的压强代入动量方程，解出管壁对流体的作用力，再由牛顿第三定律得流体对管壁的力。要点：能量方程定压强流速，动量方程定作用力，二者必须联立；注意动量、动能修正系数与方向投影。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "study-00", "group": "学习系统", "title": "00 备考总纲", "md": "# 流体力学 · 期末备考总纲\n\n> 教师：曾强 · 学期：2026春\n> 生成于 2026-06-12 · 目标考试日 **2026-07-03**（共 21 天）\n> 章数：5 · 已填要点：5 章\n\n> *为学者日益，闻道者日损。* —— 复习非求多读，而求记牢；记牢之法，已有实证。\n\n---\n\n## 一 · 复习之道（实证为据）\n\n> 据 Dunlosky et al. 2013（《Psychological Science in the Public Interest》）与 Carpenter, Pan & Butler 2022（《Nature Reviews Psychology》）：\n\n| 技法 | 效用 | 怎么做 |\n|---|---|---|\n| **提取练习**（自测/默写） | **高** | 合上书，先答 `自测题库.md`，再对照——别只重读 |\n| **间隔重复**（分散练习） | **高** | 按下方日历，隔日/隔周回提取，别考前突击一次 |\n| 交错练习 | 中 | 按下方“交错刷题序”混章做题，别一章刷到底 |\n| 自我解释 / 追问“为什么” | 中 | 每个考点问自己“为什么成立、与上一章何关” |\n| 双重编码（图像） | 中 | 看/画每章思维导图，文字配图记 |\n| 高亮 · 重读 · 摘抄 | **低** | 感觉努力实则低效，不作为主手段 |\n\n## 二 · 三段备考（先懂 → 后测 → 终模考）\n\n- **一轮·通读理解**（2026-06-12 → 2026-06-22 · 11 天）：逐章通读图文 + 画/看思维导图，求懂而非背\n- **二轮·提取自测**（2026-06-23 → 2026-06-29 · 7 天）：闭卷做自测题与填空卡，错题标记\n- **三轮·模考查漏**（2026-06-30 → 2026-07-03 · 4 天）：限时模拟卷 + 错点专项 + 易错点重背\n\n## 三 · 间隔重复日历（首学 + 1/3/7/14 天回提取）\n\n| 日期 | 当日任务 |\n|---|---|\n| 2026-06-12 | 📖 首学：第 1 章 流体及其主要物理性质 |\n| 2026-06-13 | 🔁 提取复习：第 1 章 流体及其主要物理性质 |\n| 2026-06-14 | 📖 首学：第 2 章 流体静力学 |\n| 2026-06-15 | 🔁 提取复习：第 1 章 流体及其主要物理性质<br>🔁 提取复习：第 2 章 流体静力学 |\n| 2026-06-16 | 📖 首学：第 3 章 流体运动基础 |\n| 2026-06-17 | 🔁 提取复习：第 2 章 流体静力学<br>🔁 提取复习：第 3 章 流体运动基础 |\n| 2026-06-18 | 📖 首学：第 4 章 流体动力学基础 |\n| 2026-06-19 | 🔁 提取复习：第 1 章 流体及其主要物理性质<br>🔁 提取复习：第 3 章 流体运动基础<br>🔁 提取复习：第 4 章 流体动力学基础 |\n| 2026-06-20 | 📖 首学：第 5 章 层流、紊流及其能量损失 |\n| 2026-06-21 | 🔁 提取复习：第 2 章 流体静力学<br>🔁 提取复习：第 4 章 流体动力学基础<br>🔁 提取复习：第 5 章 层流、紊流及其能量损失 |\n| 2026-06-23 | 🔁 提取复习：第 3 章 流体运动基础<br>🔁 提取复习：第 5 章 层流、紊流及其能量损失 |\n| 2026-06-25 | 🔁 提取复习：第 4 章 流体动力学基础 |\n| 2026-06-26 | 🔁 提取复习：第 1 章 流体及其主要物理性质 |\n| 2026-06-27 | 🔁 提取复习：第 5 章 层流、紊流及其能量损失 |\n| 2026-06-28 | 🔁 提取复习：第 2 章 流体静力学 |\n| 2026-06-30 | 🔁 提取复习：第 3 章 流体运动基础 |\n| 2026-07-02 | 🔁 提取复习：第 4 章 流体动力学基础<br>🔁 提取复习：第 5 章 层流、紊流及其能量损失 |\n\n> 📖 = 首次学习（求懂）；🔁 = 闭卷提取复习（求牢）。错过某日，顺延即可，勿弃。\n\n## 四 · 交错刷题序（三轮 · 混章不连刷）\n\n1. 第 1 章 流体及其主要物理性质 → 第 2 章 流体静力学 → 第 3 章 流体运动基础 → 第 4 章 流体动力学基础 → 第 5 章 层流、紊流及其能量损失\n2. 第 2 章 流体静力学 → 第 3 章 流体运动基础 → 第 4 章 流体动力学基础 → 第 5 章 层流、紊流及其能量损失 → 第 1 章 流体及其主要物理性质\n3. 第 3 章 流体运动基础 → 第 4 章 流体动力学基础 → 第 5 章 层流、紊流及其能量损失 → 第 1 章 流体及其主要物理性质 → 第 2 章 流体静力学\n\n## 五 · 每日提取清单（贴在桌前）\n\n- [ ] 今日“首学”章：通读图文 + 看思维导图（求懂）\n- [ ] 今日“回提取”章：**闭卷**做 `自测题库.md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表\n"}, {"id": "study-a7ba9845", "group": "学习系统", "title": "自测题库", "md": "# 流体力学 · 自测题库（闭卷提取）\n\n> 共 84 道结构化提取题（不含思考题与脚手架）。\n\n> **用法**：先合上书答，再展开“参考答案”对照。**提取**比重读有效得多。\n> 答错/卡壳处，回 `_综合复习资料.md` 对应章精看，并标入次日复习。\n\n---\n\n## 第 1 章 · 流体及其主要物理性质\n\n**Q1（名词解释）** 流体？\n\n<details><summary>参考答案<\/summary>\n\n在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*\n\n<\/details>\n\n**Q2（名词解释）** 连续介质假设？\n\n<details><summary>参考答案<\/summary>\n\n把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*\n\n<\/details>\n\n**Q3（名词解释）** 流体质点？\n\n<details><summary>参考答案<\/summary>\n\n宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n\n<\/details>\n\n**Q4（名词解释）** 密度 ρ？\n\n<details><summary>参考答案<\/summary>\n\n单位体积流体所具有的质量，ρ=dm/dV，单位 kg/m³。  *（要：水约 1000 kg/m³）*\n\n<\/details>\n\n**Q5（名词解释）** 重度（容重）γ？\n\n<details><summary>参考答案<\/summary>\n\n单位体积流体所受的重力，γ=ρg，单位 N/m³。  *（要：与密度差一个 g）*\n\n<\/details>\n\n**Q6（名词解释）** 粘性？\n\n<details><summary>参考答案<\/summary>\n\n流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n\n<\/details>\n\n**Q7（名词解释）** 牛顿内摩擦定律？\n\n<details><summary>参考答案<\/summary>\n\n切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n\n<\/details>\n\n**Q8（名词解释）** 动力粘度 μ 与运动粘度 ν？\n\n<details><summary>参考答案<\/summary>\n\nμ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n\n<\/details>\n\n**Q9（名词解释）** 牛顿流体与非牛顿流体？\n\n<details><summary>参考答案<\/summary>\n\n切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n\n<\/details>\n\n**Q10（名词解释）** 压缩性与膨胀性？\n\n<details><summary>参考答案<\/summary>\n\n压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n\n<\/details>\n\n**Q11（名词解释）** 质量力与表面力？\n\n<details><summary>参考答案<\/summary>\n\n质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：流体定义：任意微小剪切力即连续变形\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：流体定义：任意微小剪切力即连续变形\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：连续介质假设的含义与意义\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：连续介质假设的含义与意义\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：粘度随温度变化：液体随温升而减小，气体随温升而增大\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：粘度随温度变化：液体随温升而减小，气体随温升而增大\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：牛顿流体与非牛顿流体判别\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：牛顿流体与非牛顿流体判别\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：密度、重度、相对密度概念与单位\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：密度、重度、相对密度概念与单位\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：压缩性、膨胀性与体积弹性模量\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：压缩性、膨胀性与体积弹性模量\n\n<\/details>\n\n**Q20（考点·闭卷默写）** 请展开论述：质量力与表面力的分类\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：质量力与表面力的分类\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：为什么说静止流体不能承受剪切力？\n  **A**：静止流体中任何微小剪切力都会引起连续变形，故静止时切应力必为零，只能承受法向压应力。\n\n- **Q**：动力粘度与运动粘度有何区别与联系？\n  **A**：μ 直接反映流体粘性大小（Pa·s）；ν=μ/ρ 把密度（惯性）一并考虑（m²/s），常用于雷诺数等运动学分析。\n\n- **Q**：为什么液体与气体的粘度随温度变化规律相反？\n  **A**：液体粘性主要来自分子间引力，升温引力减弱故 μ 降低；气体粘性主要来自分子动量交换，升温热运动加剧故 μ 升高。\n\n<\/details>\n\n## 第 2 章 · 流体静力学\n\n**Q1（名词解释）** 流体静压强？\n\n<details><summary>参考答案<\/summary>\n\n静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n\n<\/details>\n\n**Q2（名词解释）** 静压强两特性？\n\n<details><summary>参考答案<\/summary>\n\n①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n\n<\/details>\n\n**Q3（名词解释）** 静止流体平衡微分方程（欧拉平衡方程）？\n\n<details><summary>参考答案<\/summary>\n\n单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n\n<\/details>\n\n**Q4（名词解释）** 水静力学基本方程？\n\n<details><summary>参考答案<\/summary>\n\n重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n\n<\/details>\n\n**Q5（名词解释）** 测压管水头？\n\n<details><summary>参考答案<\/summary>\n\nz+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n\n<\/details>\n\n**Q6（名词解释）** 绝对压强、相对压强、真空度？\n\n<details><summary>参考答案<\/summary>\n\n以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n\n<\/details>\n\n**Q7（名词解释）** 相对静止？\n\n<details><summary>参考答案<\/summary>\n\n流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n\n<\/details>\n\n**Q8（名词解释）** 平面上的静水总压力？\n\n<details><summary>参考答案<\/summary>\n\nP=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：静压强的两个基本特性\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：静压强的两个基本特性\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：水静力学基本方程及其几何、能量意义\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：水静力学基本方程及其几何、能量意义\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：绝对压强、相对压强、真空度的关系\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：绝对压强、相对压强、真空度的关系\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：测压管水头守恒\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：测压管水头守恒\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：平面静水总压力大小与压力中心计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：平面静水总压力大小与压力中心计算\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：相对静止（等加速、旋转）的压强分布\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：相对静止（等加速、旋转）的压强分布\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：U 形管、压差计读数计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：U 形管、压差计读数计算\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：为什么静压强具有各向同性？\n  **A**：对微元四面体作受力平衡分析，忽略高阶小量（质量力）后可证任一点各方向压强大小相等。\n\n- **Q**：压力中心为何总在形心之下？\n  **A**：压强随深度线性增大，下部受压更大使合力作用点下移，由 y_D=y_c+I_c/(y_c·A)>y_c 可知。\n\n- **Q**：相对静止与绝对静止有何区别？\n  **A**：相对静止时流体相对容器不动但整体有加速度，须把惯性力计入质量力，等压面不再水平（如旋转呈抛物面）。\n\n<\/details>\n\n## 第 3 章 · 流体运动基础\n\n**Q1（名词解释）** 拉格朗日法？\n\n<details><summary>参考答案<\/summary>\n\n跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n\n<\/details>\n\n**Q2（名词解释）** 欧拉法？\n\n<details><summary>参考答案<\/summary>\n\n着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n\n<\/details>\n\n**Q3（名词解释）** 迹线？\n\n<details><summary>参考答案<\/summary>\n\n单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n\n<\/details>\n\n**Q4（名词解释）** 流线？\n\n<details><summary>参考答案<\/summary>\n\n某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n\n<\/details>\n\n**Q5（名词解释）** 染色线（脉线）？\n\n<details><summary>参考答案<\/summary>\n\n相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n\n<\/details>\n\n**Q6（名词解释）** 过流断面、湿周、水力半径？\n\n<details><summary>参考答案<\/summary>\n\n过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n\n<\/details>\n\n**Q7（名词解释）** 流体微团运动分解？\n\n<details><summary>参考答案<\/summary>\n\n亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n\n<\/details>\n\n**Q8（名词解释）** 物质导数（随体导数）？\n\n<details><summary>参考答案<\/summary>\n\nD/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n\n<\/details>\n\n**Q9（名词解释）** 连续方程（微分形式）？\n\n<details><summary>参考答案<\/summary>\n\n质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：拉格朗日法与欧拉法的区别\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：拉格朗日法与欧拉法的区别\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：迹线、流线、染色线的定义与区别；恒定流三者重合\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：迹线、流线、染色线的定义与区别；恒定流三者重合\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：流线不相交、不转折的性质\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：流线不相交、不转折的性质\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：物质导数的组成（当地导数+迁移导数）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：物质导数的组成（当地导数+迁移导数）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：流体微团运动的四个分量\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：流体微团运动的四个分量\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：有旋流与无旋流的判别（旋度）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：有旋流与无旋流的判别（旋度）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：微分形式连续方程及不可压缩简化\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：微分形式连续方程及不可压缩简化\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：过流断面、湿周、水力半径概念\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：过流断面、湿周、水力半径概念\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：定常流中迁移加速度为何可不为零？\n  **A**：定常流 ∂/∂t=0，但质点流经空间不同点速度仍可改变，(V·∇)V≠0，故有迁移加速度（如收缩管中加速）。\n\n- **Q**：流线与迹线何时重合？\n  **A**：在恒定（定常）流场中，流线形状不随时间变化，质点沿流线运动，二者重合。\n\n- **Q**：如何判别流动是否有旋？\n  **A**：计算速度场旋度 ∇×V，若处处为零则为无旋（有势）流，否则为有旋流。\n\n<\/details>\n\n## 第 4 章 · 流体动力学基础\n\n**Q1（名词解释）** 欧拉运动方程？\n\n<details><summary>参考答案<\/summary>\n\n理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n\n<\/details>\n\n**Q2（名词解释）** 伯努利方程（沿流线）？\n\n<details><summary>参考答案<\/summary>\n\n理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n\n<\/details>\n\n**Q3（名词解释）** 缓变流（渐变流）？\n\n<details><summary>参考答案<\/summary>\n\n流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n\n<\/details>\n\n**Q4（名词解释）** 总流伯努利方程？\n\n<details><summary>参考答案<\/summary>\n\nz₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n\n<\/details>\n\n**Q5（名词解释）** 动能修正系数 α？\n\n<details><summary>参考答案<\/summary>\n\n用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n\n<\/details>\n\n**Q6（名词解释）** 动量方程（总流）？\n\n<details><summary>参考答案<\/summary>\n\nΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n\n<\/details>\n\n**Q7（名词解释）** 纳维-斯托克斯（N-S）方程？\n\n<details><summary>参考答案<\/summary>\n\n粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：伯努利方程三项水头的物理意义与适用条件\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：伯努利方程三项水头的物理意义与适用条件\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：理想流与实际流伯努利方程的区别（h_w、α）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：理想流与实际流伯努利方程的区别（h_w、α）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：总流伯努利方程列写步骤与基准面、断面选取\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：总流伯努利方程列写步骤与基准面、断面选取\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：动量方程应用与动量修正系数 β\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：动量方程应用与动量修正系数 β\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：缓变流断面的选取条件\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：缓变流断面的选取条件\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：毕托管、文丘里、孔口出流的计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：毕托管、文丘里、孔口出流的计算\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：N-S 方程各项物理意义（粘性项 ν∇²V）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：N-S 方程各项物理意义（粘性项 ν∇²V）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：欧拉方程与 N-S 方程的关系（令 ν=0）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：欧拉方程与 N-S 方程的关系（令 ν=0）\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：伯努利方程的适用条件有哪些？\n  **A**：理想流体（或忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n- **Q**：总流伯努利方程为何要引入 α 与 h_w？\n  **A**：实际断面流速分布不均，需用动能修正系数 α 修正动能项；粘性导致机械能沿程损失 h_w，故较理想方程多此两项。\n\n- **Q**：动量方程与伯努利方程各解决什么问题？\n  **A**：伯努利方程（能量）求压强与流速关系；动量方程求流体与边界间的作用力，二者常联立求解。\n\n<\/details>\n\n## 第 5 章 · 层流、紊流及其能量损失\n\n**Q1（名词解释）** 层流？\n\n<details><summary>参考答案<\/summary>\n\n流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n\n<\/details>\n\n**Q2（名词解释）** 紊流（湍流）？\n\n<details><summary>参考答案<\/summary>\n\n流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n\n<\/details>\n\n**Q3（名词解释）** 雷诺数 Re？\n\n<details><summary>参考答案<\/summary>\n\nRe=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n\n<\/details>\n\n**Q4（名词解释）** 沿程水头损失 h_f？\n\n<details><summary>参考答案<\/summary>\n\n沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n\n<\/details>\n\n**Q5（名词解释）** 沿程阻力系数 λ？\n\n<details><summary>参考答案<\/summary>\n\n层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n\n<\/details>\n\n**Q6（名词解释）** 局部水头损失 h_j？\n\n<details><summary>参考答案<\/summary>\n\n管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n\n<\/details>\n\n**Q7（名词解释）** 雷诺应力与混合长度？\n\n<details><summary>参考答案<\/summary>\n\n紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n\n<\/details>\n\n**Q8（名词解释）** 层流底层与水力光滑/粗糙管？\n\n<details><summary>参考答案<\/summary>\n\n紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：层流与紊流的本质区别及判别（Re 与临界值）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：层流与紊流的本质区别及判别（Re 与临界值）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：雷诺数的物理意义（惯性力/粘性力）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：雷诺数的物理意义（惯性力/粘性力）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：达西公式与沿程阻力系数 λ 的确定\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：达西公式与沿程阻力系数 λ 的确定\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：局部损失系数 ζ 与典型管件取值\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：局部损失系数 ζ 与典型管件取值\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：圆管层流速度分布与 u_max=2v 的关系\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：圆管层流速度分布与 u_max=2v 的关系\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：紊流时均化、雷诺应力、混合长度\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：紊流时均化、雷诺应力、混合长度\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：层流底层、水力光滑管与粗糙管概念\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：层流底层、水力光滑管与粗糙管概念\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：总水头损失叠加 h_w=Σh_f+Σh_j\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：总水头损失叠加 h_w=Σh_f+Σh_j\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：雷诺数的物理意义及临界值是什么？\n  **A**：Re 表征惯性力与粘性力之比；圆管下临界 Re≈2300，Re<2300 为层流，更大时转为紊流。\n\n- **Q**：为什么紊流的沿程损失比层流大？\n  **A**：紊流脉动产生附加雷诺切应力，能量耗散显著增强，且 λ 对壁面粗糙度敏感，故损失大于层流。\n\n- **Q**：圆管层流中平均流速与最大流速是什么关系？\n  **A**：速度按抛物线分布，平均流速 v=½u_max，即最大流速是平均流速的 2 倍。\n\n<\/details>\n"}, {"id": "study-8d66dc1d", "group": "学习系统", "title": "速记卡", "md": "# 流体力学 · 速记卡（填空 · 间隔重复）\n\n> 共 43 张卡。\n\n> 碎片时间用：看正面回忆背面，答不出的打 ✗，按间隔重复优先复习。\n\n---\n\n## 第 1 章 · 流体及其主要物理性质\n\n- ____：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*\n  - <details><summary>答案<\/summary> 流体 <\/details>\n- ____：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*\n  - <details><summary>答案<\/summary> 连续介质假设 <\/details>\n- ____：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n  - <details><summary>答案<\/summary> 流体质点 <\/details>\n- ____：单位体积流体所具有的质量，ρ=dm/dV，单位 kg/m³。  *（要：水约 1000 kg/m³）*\n  - <details><summary>答案<\/summary> 密度 ρ <\/details>\n- ____：单位体积流体所受的重力，γ=ρg，单位 N/m³。  *（要：与密度差一个 g）*\n  - <details><summary>答案<\/summary> 重度（容重）γ <\/details>\n- ____：流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n  - <details><summary>答案<\/summary> 粘性 <\/details>\n- ____：切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n  - <details><summary>答案<\/summary> 牛顿内摩擦定律 <\/details>\n- ____：μ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n  - <details><summary>答案<\/summary> 动力粘度 μ 与运动粘度 ν <\/details>\n- ____：切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n  - <details><summary>答案<\/summary> 牛顿流体与非牛顿流体 <\/details>\n- ____：压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n  - <details><summary>答案<\/summary> 压缩性与膨胀性 <\/details>\n- ____：质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n  - <details><summary>答案<\/summary> 质量力与表面力 <\/details>\n\n## 第 2 章 · 流体静力学\n\n- ____：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n  - <details><summary>答案<\/summary> 流体静压强 <\/details>\n- ____：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n  - <details><summary>答案<\/summary> 静压强两特性 <\/details>\n- ____：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n  - <details><summary>答案<\/summary> 静止流体平衡微分方程（欧拉平衡方程） <\/details>\n- ____：重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n  - <details><summary>答案<\/summary> 水静力学基本方程 <\/details>\n- ____：z+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n  - <details><summary>答案<\/summary> 测压管水头 <\/details>\n- ____：以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n  - <details><summary>答案<\/summary> 绝对压强、相对压强、真空度 <\/details>\n- ____：流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n  - <details><summary>答案<\/summary> 相对静止 <\/details>\n- ____：P=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n  - <details><summary>答案<\/summary> 平面上的静水总压力 <\/details>\n\n## 第 3 章 · 流体运动基础\n\n- ____：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n  - <details><summary>答案<\/summary> 拉格朗日法 <\/details>\n- ____：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n  - <details><summary>答案<\/summary> 欧拉法 <\/details>\n- ____：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n  - <details><summary>答案<\/summary> 迹线 <\/details>\n- ____：某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n  - <details><summary>答案<\/summary> 流线 <\/details>\n- ____：相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n  - <details><summary>答案<\/summary> 染色线（脉线） <\/details>\n- ____：过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n  - <details><summary>答案<\/summary> 过流断面、湿周、水力半径 <\/details>\n- ____：亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n  - <details><summary>答案<\/summary> 流体微团运动分解 <\/details>\n- ____：D/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n  - <details><summary>答案<\/summary> 物质导数（随体导数） <\/details>\n- ____：质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n  - <details><summary>答案<\/summary> 连续方程（微分形式） <\/details>\n\n## 第 4 章 · 流体动力学基础\n\n- ____：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n  - <details><summary>答案<\/summary> 欧拉运动方程 <\/details>\n- ____：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n  - <details><summary>答案<\/summary> 伯努利方程（沿流线） <\/details>\n- ____：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n  - <details><summary>答案<\/summary> 缓变流（渐变流） <\/details>\n- ____：z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n  - <details><summary>答案<\/summary> 总流伯努利方程 <\/details>\n- ____：用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n  - <details><summary>答案<\/summary> 动能修正系数 α <\/details>\n- ____：ΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n  - <details><summary>答案<\/summary> 动量方程（总流） <\/details>\n- ____：粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n  - <details><summary>答案<\/summary> 纳维-斯托克斯（N-S）方程 <\/details>\n\n## 第 5 章 · 层流、紊流及其能量损失\n\n- ____：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n  - <details><summary>答案<\/summary> 层流 <\/details>\n- ____：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n  - <details><summary>答案<\/summary> 紊流（湍流） <\/details>\n- ____：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n  - <details><summary>答案<\/summary> 雷诺数 Re <\/details>\n- ____：沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n  - <details><summary>答案<\/summary> 沿程水头损失 h_f <\/details>\n- ____：层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n  - <details><summary>答案<\/summary> 沿程阻力系数 λ <\/details>\n- ____：管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n  - <details><summary>答案<\/summary> 局部水头损失 h_j <\/details>\n- ____：紊流脉 n### 1.2流体力学的任务与发展简史\n\n### 1.3连续介质模型\n\n### 1.4流体的密度\n\n### 1.5 流体的粘性\n\n### 1.6流体的可压缩性\n\n### 1.7作用在流体上的力\n\n---\n\n<!-- page 3 -->\n\n![page 3](page_003.jpg)\n\n\n### 1.1流体的定义\n一、流体与人类活动\n外部环境：\n地球表面75%被水覆盖；\n地球上方厚达17000m空气；\n\n#### 城市供暖、供排水系统等公共设施\n飞机、汽车等交通工具；\n水电、风能、潮汐能等。\n内部环境：\n人体血液循环、肺部气血循环等。\n\n---\n\n<!-- page 4 -->\n\n![page 4](page_004.jpg)\n\n\n### 1.1 流体的定义\n\n#### 二 流体的定义\n可将自然界所有物质的存在状态分为固体和流体。流体\n是具有流动性的物质。 流动性指在任何微小切应力持续作用下\n会连续变形的特性 形状 体积 压力 拉力 剪切力\n\n#### 固体\n\n#### 液体\n\n#### 气体\n\n#### D D D\"\n(a固体 (b流体\n\n---\n\n<!-- page 5 -->\n\n![page 5](page_005.jpg)\n\n\n### 1.1流体的定义\n三、 液体与气体的区别\n气体的流动性更好：\n\n#### + 气体\n\n#### 液体\n气体的可压缩性更大：\n原因：\n\n#### 空气\n气体的分子间距大 容易压缩；气体分子间的吸引力小\n分子可自由运动，易流动。\n\n---\n\n<!-- page 6 -->\n\n![page 6](page_006.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n一、流体力学的任务\n研究流体运动规律及其应用的一门学科，分类为：\n理论流体力学：倾向于严谨的数学推导。\n工程流体力学：流体力学理论在工程中的实际应用。\n水力学：倾向于研究水流的流动规律。\n60年代以前：研究流体的动量传递问题；研究流体的运\n动规律及其与固体、液体或大气界面之间的相互作用力问题\n60年代以后：研究解决能源、环境保护、化工与石油等\n领域的流体力学问题，多学科交互融合。\n\n---\n\n<!-- page 7 -->\n\n![page 7](page_007.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、 流体力学的发展简史\n两三干以前，通过孔口出流的原理发明了刻漏、铜壶\n滴漏 （西汉时期的计时工具）。\n\n#### 漏：指带孔的壶\n\n#### 刻：指附有刻度的浮箭\n\n#### 滴漏：由水滴规律制造\n\n#### 刻漏 滴\n\n#### 漏\n\n---\n\n<!-- page 8 -->\n\n![page 8](page_008.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、 流体力学的发展简史\n公元前250年，修建了都江堰、郑国渠和灵渠等水利工程\n都江堰工程：\n\n#### 壹旅游\n\n#### 宝瓶口：将岷江江水分流部\n\n#### 鱼嘴\n分进入成都平原，防洪、减旱；\n\n#### 鱼嘴：东部地势较西部高江\n\n#### 水难以流入宝瓶口，进行二期鱼\n\n#### 江\n嘴工程；\n\n#### 宝瓶口\n\n#### 飞沙堰：丰水期内江造成径\n流大及泥沙淤积，修建飞沙堰。\n\n#### 只有内江水可以进入成者\n\n---\n\n<!-- page 9 -->\n\n![page 9](page_009.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n\n#### 二 流体力学的发展简史\n灌溉：鱼嘴分水内江， 内江河床低，外江河床高，枯水\n期有6成水量进入内江，用于灌溉。\n\n#### 壹旅 喜旅游\n\n#### 外江 内江\n\n#### 宝瓶口\n\n---\n\n<!-- page 10 -->\n\n![page 10](page_010.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n\n#### 二 流体力学的发展简史\n泄洪：宝瓶口狭窄，丰水期、 洪水期宝瓶口水面水位怡\n高，高于飞沙堰的水量通过飞沙堰分流至外江。\n\n#### 喜旅游 壹旅荐\n\n#### 宝瓶口\n\n#### 江 玉垒\n\n#### 飞沙堰\n\n#### 宝瓶口\n\n#### 飞沙堰人\n水面就会上升，当水面超过旁边的飞沙堰时\n\n---\n\n<!-- page 11 -->\n\n![page 11](page_011.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n\n#### 二 流体力学的发展简史\n排沙：弯道环流原理，澄澈的表层水流向凹地，浑浊的\n底层水流向凸地，大量泥沙流向外江；狭窄的宝瓶口和离堆作\n用在飞沙堰附近形成漩涡，大量沙石甩出飞沙堰。剩余沙石在\n对面回水区沉淀，河工每年淘出。\n\n#### 壹旅游 壹旅游\n\n#### 外江 内江\n\n#### 宝瓶口\n\n---\n\n<!-- page 12 -->\n\n![page 12](page_012.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n创建期：\n西汉司马迁的《史记?河渠书》， “于蜀，蜀守冰凿离堆\n辟沫水之害，穿二江成都之中。此渠皆可行舟；有余则用概浸\n百姓飨（xiang）其利。至于所过，往往引l其水益用概田畴之\n渠，以万亿计，然莫足数也。\n所谓“凿离堆”，指开凿都江堰的宝瓶口工程。都江堰\n在创建之初，只有分水鱼嘴和宝瓶口两个工程。\n\n---\n\n<!-- page 13 -->\n\n![page 13](page_013.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n逐步完善期 （汉代至唐代）：\n北魏时期的 《水经注》“李冰作大堰于此，壅江作，\n有左右口，谓之（jian）期，入郸江、检江，以行舟”。\n《新唐书·地理志》记载：导江“有侍郎堰，其东百丈堰\n弓江水以溉彭、益田，龙朔中筑。又有小堰，长安初筑。\n唐代都江堰灌区不仅延伸至成都平原南部甚至岷江中游\n而且灌区的管理组织体系和管理制度进一步完善，形成了严格\n的岁修制度。\n\n---\n\n<!-- page 14 -->\n\n![page 14](page_014.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n成熟期 （宋元明清）：两宋时期，有关都江堰的文字记\n载可知都江堰主体工程包括象鼻、离堆、侍郎堰、支水和摄水\n等，其中“象鼻”指的就是鱼嘴，“离堆”即宝瓶口，“侍郎\n堰”指具有泄洪和排沙功能的飞沙堰，“支水”和“摄水”等\n辅助设施大致相当于导流堤、拦河低堰等。至此，拥有分水、\n导流、引引水和溢洪排沙综合功能的工程体系的形成，标志着都\n江堰作为一项综合性的水利工程进入了成熟期。\n\n---\n\n<!-- page 15 -->\n\n![page 15](page_015.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n承前启后期（20世纪30年代-80年代）\n1935年，都江堪鱼嘴首先改用混凝土浇筑，鱼嘴成为都\n江堰水利工程中第一个传统工程结构与现代水工结构的结合物。\n飞沙堰、鱼尾、金刚堤等工程设施陆续用混凝土浇筑，意味着\n现代水利技术、建筑材料与古老的水利工程型式在都江堰这一\n水利工程上结合，都江堰成为一处古老与现代、多种技术集于\n\n#### 一身的持续发展的水利工程\n都江堰：古老的灌溉、泄洪、排沙水利工程\n\n---\n\n<!-- page 16 -->\n\n![page 16](page_016.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n从世界上看，流体力学发展经历了不同时期：\n\n#### 公元前250年\n\n#### 文艺复兴时期\n\n#### 16世纪初\n17世纪，工业革命开始，科学迅速发展\n\n#### 18世纪-19世纪\n\n#### 19世纪末至20世纪中叶\n\n#### 20世纪中叶至今\n\n---\n\n<!-- page 17 -->\n\n![page 17](page_017.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n公元前250年：希腊的阿基米德提出了“论浮体” 古代\n文艺复兴时期，16世纪初，达芬奇倡导用实验方法了解\n水流形态（《论水的流动和水的测量》）；意大利伽利略的比萨\n斜塔实验：轻重不同的物体，从同一高度坠落，加速度一样，\n\n#### 它们将同时着地\n托里拆利用实验测出了大气压强，给出了孔口泄流公式\n法国帕斯卡提出液体中压力传递的定律：不可压缩静止流体中\n点受外力产生压强增值后，此压强增值瞬时间传至静正流\n体各点。\n\n---\n\n<!-- page 18 -->\n\n![page 18](page_018.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n\n#### 二 流体力学的发展简史\n17世纪，工业革命开始：英国牛顿在大量实验观察基础\nF 提出了牛顿三大运动定律和方有引1力定律；发明了微积分\n-表达物理量的瞬时变化；提出了粘性流体内摩擦定律；形成\n了牛顿力学。\n\n#### 第一定律 Gmm2 万有\n引力 dtF= dm v+m duF=μAdt 第二定律 dy 内摩\n\n#### 擦定律\n\n#### 第三定律\n\n---\n\n<!-- page 19 -->\n\n![page 19](page_019.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1730年，法国工程师皮托发明了测量流量的皮托管；\n1738年，瑞士数学家伯努利将牛顿力学与流体物性、压\n强概念结合，推导出不可压缩理想流体运动的能量方程-伯努\n利方程。\n\n#### pV pV\n-+pgz2=P+ -+pgZ\n不可压缩无粘流动沿流线的机械能转化与守恒定律。\n\n---\n\n<!-- page 20 -->\n\n![page 20](page_020.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1752年，法国达朗贝尔研究阻力时通过达朗贝尔谬\n（悖论），发现无粘性理想流体的局限性，促进了对粘性流体的\n研究，首先提出了连续性方程。\n理论预测：在不可压缩、无粘性、非旋转的理想流体中，\n一个物体以恒定速度运动时，所受的阻力为零\n现实观察：实际物体（如飞机、球体）在流体（如空气或水）\n中运动时，明显受到阻力，这一矛盾为“达朗贝尔悖论\n\n#### 脖论源于理论中忽略流体粘性\n\n---\n\n<!-- page 21 -->\n\n![page 21](page_021.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1753年，瑞士的欧拉提出了流体的连续性假设；提出了\n描述流体的欧拉方法；建立了理想流体运动微分方程；研究理\n想流体无旋运动，提出速度势的概念。\n1783年，法国的拉格朗日提出描述流体运动的拉格朗日\n方法；引引进了流函数概念。\n1823年，法国的纳维和英国的斯托克斯建立了粘性流体\n运动微分方程-N-S方程，提供了研究实际流体运动的基础。\n\n---\n\n<!-- page 22 -->\n\n![page 22](page_022.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n1822年，傅里叶和菲克与牛顿内摩擦定律相对应，提出\n了傅里叶热传导公式和菲克第一定律，为研究流体的传质、传\n\n#### 热问题提供了依据\n\n#### dT （热传导）\n\n#### 热 dxJ=-D （质量传递）\n\n#### r=H （牛顿内磨搽定律）\n\n---\n\n<!-- page 23 -->\n\n![page 23](page_023.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n实验水力学发展：\n法国的谢才通过大量实验提出明渠流量计算公式：\n\n#### Q=W·C√R·J\n\n#### 意大利文丘里发明了文丘里流量计\n\n---\n\n<!-- page 24 -->\n\n![page 24](page_024.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n18世纪-19世纪：\n实验水力学发展：\n法国的达西 （地下水渗流）、德国的魏斯巴赫 (流体阻\n力）、英国的曼宁 （明渠断面平均流速） 等实验水利学研究成\n果仍在应用。\n局限性：不能解决复杂的工程问题；古典流体力学与实\n验水力学长期分离。\n\n---\n\n<!-- page 25 -->\n\n![page 25](page_025.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n19世纪末-20世纪中叶：\n古典流体力学与实验水力学结合，形成现代流体力学\n1882年，英国的雷诺首先阐明了相似原理，促进了理论\n和实验的结合；进行了圆管实验，发现了流体流动的两种流态：\n层流和湍流（流），提出了判别标准-雷诺数。\nTurbulent dpuregion R=\nBufferlayer uViscous sublayerNotto ScaleLaminar Transition Turbulent\n\n---\n\n<!-- page 26 -->\n\n![page 26](page_026.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n19世纪末-20世纪中叶：\n引入了湍流应力（雷诺应力），采用时均方法建立了不\n可压缩实际流体的瑞流运动方程 （雷诺方程），为瑞流理论研\n究提供了基础。\n1892年，1904年，英国的瑞利首次提出用量纲分析求流\n动相似准则，促进了理论分析和实验研究相结合。\n1887年，奥地利的马赫对可压缩气体研究作出了重要贡\n献，后人将表征可压缩性的系数定义为马赫数 （流动速度与当\n地音速之比）。\n\n---\n\n<!-- page 27 -->\n\n![page 27](page_027.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n19世纪末-20世纪中叶：\n1904年，德国普朗特创立了边界层理论，为解决边界复\n杂的实际流体运动开辟了途径。\n1921年，匈牙利的冯卡门导出边界层的动量积分方程\n可解决一些壁面边界层问题。\n1932年，德莱顿用热线流速计成功测量到湍流的脉动流\n速。\n1933年，德国尼古拉兹测定了人工粗造管道，补充了边\n\n#### 界层理论，推导了湍流半经验公式\n\n---\n\n<!-- page 28 -->\n\n![page 28](page_028.jpg)\n\n\n### 1.2流体力学的任务与发展简史\n二、流体力学的发展简史\n20世纪中叶至今：\n1946年，第一台电子计算机研制成功，使得数值计算方\n法解决流体力学问题成为可能并迅速发展。\n\n#### 100 A2175\n典型的数值模拟软件：\nFLUENTCOMSOLT-H-M-C （多物理场耦合）\nThermo-Hydro-Mechanical-Chemical\n\n---\n\n<!-- page 29 -->\n\n![page 29](page_029.jpg)\n\n\n### 1.3连续介质假设\n一、问题提出\n从分子物理学：构成流体的物质实体是大量分子，大量\n分子处于离散状态且做热运动。\n流体力学研究的问题是流体的宏观平衡与运动规律，其\n描述均为宏观物理量（速度、压强、密度、力、温度），其定\n义基于分子微观性质的统计平均。因而存在两个问题：\n1）流体力学关注的宏观问题并不关注实际物质的微观状\n态和行为-研究问题与研究对象脱节。\n2）实际构成流体最小物质实体是大量离散分子，流体力\n学宏观问题研究需借助数学微积分，变量须是连续函数。\n\n---\n\n<!-- page 30 -->\n\n![page 30](page_030.jpg)\n\n\n### 1.3连续介质假设\n二、连续介质假设\n为解决上述问题，需要对流体的物质实体进行模型化-连\n续介质模型假设，主要对流体物质最小实体进行模化。\n引I入特征体积AV*概念，特征体积的定义需要满足一定\n条件：基于特征体积所包含的分子的统计平均得到的宏观变量\n值是稳定的。如何达到或满足这个条件？\n以与特征体积尺度有关系的流体的宏观变量-密度为例加\n以说明：\n\n---\n\n<!-- page 31 -->\n\n![page 31](page_031.jpg)\n\n\n### 1.3连续介质假设\n二、连续介质假设\np(kg/m)\n\n#### 如右图小圆圈所示，其包含\n\n#### 100 小尺度宏观变\n\n#### 量的不稳定性 大尺度宏观变量的\n的分子量较少，特征体积边界处 不稳定性\n有分子进出，其数量与特征体积 p=1kg/m² 100\n\n#### p=1.1\n内总分子数量级相当，导致统计 p=1.2 10 0.01\n\n#### p=1.3\n\n#### 平均得到的密度值波动剧烈\n相反，蓝色特征体积比较大 4V* 特征体积\n宏观物理量密度在空间上受温度影响其分布也是变化的 1-\n1.3），即特征体积取得太大时，其宏观变量值是不确定的。\n\n---\n\n<!-- page 32 -->\n\n![page 32](page_032.jpg)\n\n\n### 1.3连续介质假设\n二、连续介质假设\n基于上述现象，微观上，特征体尺度要保证基于统计平\n均的宏观量的确定性主要在于和流体分子自由程的尺度比较；\n宏观上，特征体尺度的确定在于其内部宏观变量的变化相对于\n研究问题尺度上该变化是否可以忽略。由此得到定义特征体积\n必须满足：\n在宏观上充分小一特征尺度<<流动问题特征长度\n（数学上可近似为一没有维度的点）\n在微观上充分大一特征尺度>>分子平均自由程\n（保证特征体包含大量分子，统计平均宏观变量值稳定）\n\n---\n\n<!-- page 33 -->\n\n 距离增加\n分子间引1力增加；对上层流体，分子间引1力\n向左，阻碍上层流体向右运动；对下层流体\n，分子间引力向右，拉动下层流体向右运动\n机制：流体微元剪切变形一分子间距离增加一分子间引力增\n加一阻止分子间距离改变。内摩擦抵抗变形宏观表现流体的粘性。\n\n---\n\n<!-- page 41 -->\n\n![page 41](page_041.jpg)\n\n\n### 1.5流体的粘性\n二、流体粘性的产生原因\n气体：分子间距较大，分子间引力可忽略，分子无时无刻作\n无规则热运动。\n右图：上层流体向右速度为u+Au， u+△u\n层流体向右速度为u；由于气体无规则运动\n上、下流体交界面有气体分子穿过。穿\n过交界面的分子与上下层气体分子存在动量交换：在下层区域从\n上层来的具有较大向右速度的分子把动量交换给下层速度较低的\n分子，动量交换产生的作用力向右，推动下层分子向右运动；在\n上层区域从下层来的具有较小向右速度的分子与上层分子发生动\n量交换，动量交换产生的作用力向左，阻碍上层流体向右运动。\n机制：分子热运动一不同层间分子动量交换一气体的粘性力。\n\n---\n\n<!-- page 42 -->\n\n![page 42](page_042.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n由粘性产生机理，粘性的宏观表现为层之间的切应力；\n层间的粘性应力可视为层间摩擦力。层间摩擦力大小等于多少？\n影响因素有哪些？\nu=U no-slipcondition\n由牛顿平板实验，由于流体粘性 u+△u\n与板界面处流体速度近似与板的运动\n速度相同，即满足无滑移边界条件 B u=0 无滑移条件\n则上板界面处流体速度为U，下板界面处流体速度为0。上板\n界面流体受平板向右的切应力，板则受到向左的切应力，两作\n用力平衡。单位面积流体切应力=F/A\n\n---\n\n<!-- page 43 -->\n\n![page 43](page_043.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n牛顿平板实验上下板间距很小，切应力与U/h成正比：\n为动力粘性系数，近似为常数，其值与流体种类有关。\n平板实验结果推广到任意层段流体：\n右图：在y方向存在x方向流体速度 ap(np+n\n差，层间存在相互运动。由牛顿实验结\n果得：\nn=1 ，切应力与速度梯度成正比，与速度无关。\n\n---\n\n<!-- page 44 -->\n\n![page 44](page_044.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n粘性应力分布与流体速度分布：\n牛顿平板实验满足下述实验条件：1）平板作匀速运动；\n平板间流体也作匀速运动；2）在 在流体运动方向没有压差，即\n平板间流体在运动方向等压。\n\n#### 牛顿平板试验\n取平板间任一流体微元，作受 u=U no-slipcondition\n力分析。忽略重力影响，流体微元 u+△u T1\n所受合力为Fu=0 no-slip condition\n\n---\n\n<!-- page 45 -->\n\n![page 45](page_045.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n分析流体微元F由以下力构成：\n\n#### 牛顿平板试验\n\n#### 、上面流体因速度大于流体微元速\nF C u=Uno-slip condition\n度带动流体向右运动的粘性应力； u+△u Ti\n下面流体因速度小于流体微元速 h pi p2\n度阻碍流体微元向右运动的粘性应力；\nB u=0no-slip condition\n左边流体对流体微元的压力；\n右边流体对流体微元的压力 由实验条件？=P2\n\n#### 则： t=t=t=const\n∑F=p△y-p2y+△x-tx=0\n\n---\n\n<!-- page 46 -->\n\n![page 46](page_046.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n流体速度分布：\n由牛顿摩擦定律 得 ，对速度在y（0，h）\n范围内积分得：=ky+C y由0,u=0;y=h,u=U ，得速\n度分布公式：\n结论：在牛顿实验条件下（匀速，等压），平板间流体\n粘性切应力为常数；平板间流体流速在y方向呈线性分布。\n实际流体流动方向不是等压，y方向速度不是线性分布。\n\n---\n\n<!-- page 47 -->\n\n![page 47](page_047.jpg)\n\n\n### 1.5流体的粘性\n三、牛顿内摩擦定律\n由相对运动得到流体内摩擦定律：=
