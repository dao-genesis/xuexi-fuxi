<script id="course-data" type="application/json">{"slug": "fluid-mechanics", "title": "流体力学", "folder": "流体力学", "meta": {"teacher": "曾强", "term": "2026春", "pdf": 14, "chapters": 7}, "defaultSection": "chap-1", "sections": [{"id": "chap-1", "group": "章节精讲", "title": "第1章 · 流体及其主要物性", "md": "# 第1章 · 流体及其主要物性\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · LLM 协填\n\n#### 一、核心概念\n\n- **流体**：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*\n- **连续介质假设**：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*\n- **流体质点**：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n- **密度 ρ**：单位体积流体所具有的质量，ρ=dm/dV，单位 kg/m³。  *（要：水约 1000 kg/m³）*\n- **重度（容重）γ**：单位体积流体所受的重力，γ=ρg，单位 N/m³。  *（要：与密度差一个 g）*\n- **粘性**：流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n- **牛顿内摩擦定律**：切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n- **动力粘度 μ 与运动粘度 ν**：μ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n- **牛顿流体与非牛顿流体**：切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n- **压缩性与膨胀性**：压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n- **质量力与表面力**：质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `ρ = dm/dV` | 密度定义，单位 kg/m³ |\n| `γ = ρg` | 重度（容重），单位 N/m³ |\n| `τ = μ·(du/dy)` | 牛顿内摩擦定律，切应力正比于速度梯度 |\n| `ν = μ/ρ` | 运动粘度，单位 m²/s |\n| `κ = -(1/V)(dV/dp), K = 1/κ` | 体积压缩系数与体积弹性模量 |\n| `α_V = (1/V)(dV/dT)` | 体积膨胀系数 |\n\n#### 三、重要案例 / 例题\n\n- 20℃ 时水的动力粘度 μ≈1.005×10⁻³ Pa·s，密度 ρ≈998 kg/m³。\n- 平行平板间线性流动：du/dy=U/h，由牛顿内摩擦定律算切应力 τ=μU/h。\n- 蜂蜜与水：粘度相差数千倍，直观说明粘性差异。\n\n#### 四、高频考点（速记）\n\n1. 流体定义：任意微小剪切力即连续变形\n2. 连续介质假设的含义与意义\n3. 牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n4. 动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n5. 粘度随温度变化：液体随温升而减小，气体随温升而增大\n6. 牛顿流体与非牛顿流体判别\n7. 密度、重度、相对密度概念与单位\n8. 压缩性、膨胀性与体积弹性模量\n9. 质量力与表面力的分类\n\n#### 五、思考题 / 自测\n\n- **Q**：为什么说静止流体不能承受剪切力？\n  **A**：静止流体中任何微小剪切力都会引起连续变形，故静止时切应力必为零，只能承受法向压应力。\n\n- **Q**：动力粘度与运动粘度有何区别与联系？\n  **A**：μ 直接反映流体粘性大小（Pa·s）；ν=μ/ρ 把密度（惯性）一并考虑（m²/s），常用于雷诺数等运动学分析。\n\n- **Q**：为什么液体与气体的粘度随温度变化规律相反？\n  **A**：液体粘性主要来自分子间引力，升温引力减弱故 μ 降低；气体粘性主要来自分子动量交换，升温热运动加剧故 μ 升高。\n\n\n#### 六、与前后章之关联\n\n- **承前**：全课起点，建立流体的连续介质模型与基本物性参数。\n- **启后**：粘性是第 5 章沿程损失与第 4 章 N-S 方程之源；密度、压强为第 2 章静力学之基。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((流体及其主要物理性质))\n    核心概念\n      流体\n      连续介质假设\n      流体质点\n      密度 ρ\n      重度（容重）γ\n      粘性\n      牛顿内摩擦定律\n      动力粘度 μ 与运动粘度 ν\n      牛顿流体与非牛顿流体\n      压缩性与膨胀性\n      质量力与表面力\n    关键公式 / 模型\n      ρ = dm/dV\n      γ = ρg\n      τ = μ·（du/dy）\n      ν = μ/ρ\n      κ = -（1/V）（dV/dp）, K = 1/κ\n      α_V = （1/V）（dV/dT）\n    高频考点\n      流体定义：任意微小剪切力即连续变形\n      连续介质假设的含义与意义\n      牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n      动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n      粘度随温度变化：液体随温升而减小，气体随温升而增大\n      牛顿流体与非牛顿流体判别\n      密度、重度、相对密度概念与单位\n      压缩性、膨胀性与体积弹性模量\n      质量力与表面力的分类\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![连续介质假设](assets/pdf/fluid-mechanics/L15_p031.jpg)\n*▲ 原页 · 连续介质假设：把流体看成连续充满空间、无空隙的介质，物理量（ρ、p、v）成为空间与时间的连续函数——这是全部场论分析的前提。*\n\n![流体的密度](assets/pdf/fluid-mechanics/L15_p035.jpg)\n*▲ 原页 · 密度定义 $\\rho=\\lim_{\\Delta V\\to\\Delta V'}\\Delta m/\\Delta V$ 与水的密度随温度变化（4 ℃ 时最大）。*\n\n![牛顿内摩擦定律·速度分布](assets/pdf/fluid-mechanics/L15_p044.jpg)\n*▲ 原页 · 牛顿内摩擦定律：平行平板间流体被上板带动，速度沿法向线性分布 $u=Uy/h$，切应力 $\\tau=\\mu\\,du/dy$。* 例题 1-1 即据此页。\n\n![粘度的流变曲线](assets/pdf/fluid-mechanics/L15_p049.jpg)\n*▲ 原页 · 牛顿流体 vs 非牛顿流体的 $\\tau\\sim du/dy$ 流变曲线，及粘度随温度的变化（液体降温升、气体升温升）。*\n\n![流体的压缩性与膨胀性](assets/pdf/fluid-mechanics/L15_p051.jpg)\n*▲ 原页 · 压缩性：体积弹性模量 $K$ 的定义与水的近似不可压缩性。* 例题 1-3 即据此页。\n\n#### 核心公式速记\n\n- 重度 $\\gamma=\\rho g$；运动粘度 $\\nu=\\mu/\\rho$。\n- 牛顿内摩擦定律 $\\tau=\\mu\\dfrac{du}{dy}$，拉力 $F=\\tau A=\\mu\\dfrac{U}{h}A$。\n- 体积弹性模量 $K=-\\dfrac{\\Delta p}{\\Delta V/V}=\\rho\\dfrac{dp}{d\\rho}$；体积膨胀系数 $\\alpha_V=\\dfrac{1}{V}\\dfrac{\\partial V}{\\partial T}$。\n\n#### 原理示意 · 牛顿内摩擦\n\n```mermaid\nflowchart LR\n    A[\"上板以速度 U 运动\"] -->|带动| B[\"流体分层 速度线性分布 u=Uy/h\"]\n    B --> C[\"层间速度梯度 du/dy = U/h\"]\n    C --> D[\"切应力 τ = μ·du/dy\"]\n    D --> E[\"所需拉力 F = τ·A = μUA/h\"]\n```\n\n#### 例题 1-1（粘性·平行平板）\n\n**题**：两平行平板间距 $h=2\\ \\text{mm}$，充满动力粘度 $\\mu=0.8\\ \\mathrm{Pa\\cdot s}$ 的油。上板以 $U=1.5\\ \\text{m/s}$ 匀速平移，下板固定，板面积 $A=0.5\\ \\text{m}^2$。求维持上板运动所需的力 $F$。\n\n**解**：\n1. 类型：粘性切应力（牛顿内摩擦定律），平板间速度近似线性分布。\n2. 速度梯度 $\\dfrac{du}{dy}=\\dfrac{U}{h}=\\dfrac{1.5}{0.002}=750\\ \\text{s}^{-1}$。\n3. 切应力 $\\tau=\\mu\\dfrac{du}{dy}=0.8\\times 750=600\\ \\text{Pa}$。\n4. 所需力 $F=\\tau A=600\\times 0.5=300\\ \\text{N}$。\n\n$$\\boxed{F=\\mu\\,\\frac{U}{h}\\,A=300\\ \\text{N}}$$\n\n#### 例题 1-2（运动粘度·单位换算）\n\n**题**：某液体密度 $\\rho=850\\ \\text{kg/m}^3$，运动粘度 $\\nu=4\\times10^{-5}\\ \\text{m}^2/\\text{s}$。求其动力粘度 $\\mu$。\n\n**解**：由 $\\nu=\\dfrac{\\mu}{\\rho}\\Rightarrow \\mu=\\rho\\nu=850\\times4\\times10^{-5}=0.034\\ \\mathrm{Pa\\cdot s}$。\n\n$$\\boxed{\\mu=\\rho\\nu=3.4\\times10^{-2}\\ \\mathrm{Pa\\cdot s}}$$\n\n> 校核：$1\\ \\mathrm{Pa\\cdot s}=1\\ \\mathrm{kg/(m\\cdot s)}$，$\\mathrm{kg/m^3}\\times\\mathrm{m^2/s}=\\mathrm{kg/(m\\cdot s)}$ ✓\n\n#### 例题 1-3（体积弹性模量）\n\n**题**：水的体积弹性模量 $K=2.1\\times10^{9}\\ \\text{Pa}$。压强升高 $\\Delta p=5\\ \\text{MPa}$ 时，体积相对变化 $\\Delta V/V$ 为多少？\n\n**解**：由 $K=-\\dfrac{\\Delta p}{\\Delta V/V}\\Rightarrow \\dfrac{\\Delta V}{V}=-\\dfrac{\\Delta p}{K}=-\\dfrac{5\\times10^{6}}{2.1\\times10^{9}}\\approx-2.4\\times10^{-3}$。\n\n$$\\boxed{\\Delta V/V\\approx-0.24\\%}$$ 说明水可近似视为不可压缩。\n\n#### 例题 1-4（圆筒间隙·旋转粘性力矩）★ 新增\n\n**题**：内圆筒半径 $r=0.1\\ \\text{m}$、高 $L=0.2\\ \\text{m}$，与外筒间隙 $\\delta=1\\ \\text{mm}$ 充满 $\\mu=0.1\\ \\mathrm{Pa\\cdot s}$ 的油。内筒以角速度 $\\omega=10\\ \\text{rad/s}$ 旋转。求所需扭矩 $M$（间隙小，速度线性分布）。\n\n**解**：\n1. 筒壁线速度 $U=\\omega r=10\\times0.1=1\\ \\text{m/s}$，间隙内 $du/dy\\approx U/\\delta=1/0.001=1000\\ \\text{s}^{-1}$。\n2. 切应力 $\\tau=\\mu\\,du/dy=0.1\\times1000=100\\ \\text{Pa}$。\n3. 侧面积 $A=2\\pi r L=2\\pi\\times0.1\\times0.2=0.1257\\ \\text{m}^2$，切向力 $F=\\tau A=12.57\\ \\text{N}$。\n4. 扭矩 $M=F\\cdot r=12.57\\times0.1=1.26\\ \\mathrm{N\\cdot m}$。\n\n$$\\boxed{M=\\mu\\frac{\\omega r}{\\delta}\\,(2\\pi r L)\\,r\\approx1.26\\ \\mathrm{N\\cdot m}}$$\n\n#### 易错点 · 第 1 章\n\n- **动力粘度 $\\mu$ 与运动粘度 $\\nu$ 勿混**：$\\nu=\\mu/\\rho$，单位 $\\mathrm{m^2/s}$。\n- 牛顿内摩擦 $\\tau$ 与**速度梯度**成正比，与速度本身无关；与压强无关。\n- 液体粘度随温度**升高而降低**，气体相反。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 流体？\n\n<details><summary>参考答案<\/summary>\n\n在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*\n\n<\/details>\n\n**Q2（名词解释）** 连续介质假设？\n\n<details><summary>参考答案<\/summary>\n\n把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*\n\n<\/details>\n\n**Q3（名词解释）** 流体质点？\n\n<details><summary>参考答案<\/summary>\n\n宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n\n<\/details>\n\n**Q4（名词解释）** 密度 ρ？\n\n<details><summary>参考答案<\/summary>\n\n单位体积流体所具有的质量，ρ=dm/dV，单位 kg/m³。  *（要：水约 1000 kg/m³）*\n\n<\/details>\n\n**Q5（名词解释）** 重度（容重）γ？\n\n<details><summary>参考答案<\/summary>\n\n单位体积流体所受的重力，γ=ρg，单位 N/m³。  *（要：与密度差一个 g）*\n\n<\/details>\n\n**Q6（名词解释）** 粘性？\n\n<details><summary>参考答案<\/summary>\n\n流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n\n<\/details>\n\n**Q7（名词解释）** 牛顿内摩擦定律？\n\n<details><summary>参考答案<\/summary>\n\n切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n\n<\/details>\n\n**Q8（名词解释）** 动力粘度 μ 与运动粘度 ν？\n\n<details><summary>参考答案<\/summary>\n\nμ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n\n<\/details>\n\n**Q9（名词解释）** 牛顿流体与非牛顿流体？\n\n<details><summary>参考答案<\/summary>\n\n切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n\n<\/details>\n\n**Q10（名词解释）** 压缩性与膨胀性？\n\n<details><summary>参考答案<\/summary>\n\n压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n\n<\/details>\n\n**Q11（名词解释）** 质量力与表面力？\n\n<details><summary>参考答案<\/summary>\n\n质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：流体定义：任意微小剪切力即连续变形\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：流体定义：任意微小剪切力即连续变形\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：连续介质假设的含义与意义\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：连续介质假设的含义与意义\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：粘度随温度变化：液体随温升而减小，气体随温升而增大\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：粘度随温度变化：液体随温升而减小，气体随温升而增大\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：牛顿流体与非牛顿流体判别\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：牛顿流体与非牛顿流体判别\n\n<\/details>\n\n**Q18（考点·闭卷默写）** 请展开论述：密度、重度、相对密度概念与单位\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：密度、重度、相对密度概念与单位\n\n<\/details>\n\n**Q19（考点·闭卷默写）** 请展开论述：压缩性、膨胀性与体积弹性模量\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：压缩性、膨胀性与体积弹性模量\n\n<\/details>\n\n**Q20（考点·闭卷默写）** 请展开论述：质量力与表面力的分类\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：质量力与表面力的分类\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：为什么说静止流体不能承受剪切力？\n  **A**：静止流体中任何微小剪切力都会引起连续变形，故静止时切应力必为零，只能承受法向压应力。\n\n- **Q**：动力粘度与运动粘度有何区别与联系？\n  **A**：μ 直接反映流体粘性大小（Pa·s）；ν=μ/ρ 把密度（惯性）一并考虑（m²/s），常用于雷诺数等运动学分析。\n\n- **Q**：为什么液体与气体的粘度随温度变化规律相反？\n  **A**：液体粘性主要来自分子间引力，升温引力减弱故 μ 降低；气体粘性主要来自分子动量交换，升温热运动加剧故 μ 升高。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*\n  - <details><summary>答案<\/summary> 流体 <\/details>\n- ____：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*\n  - <details><summary>答案<\/summary> 连续介质假设 <\/details>\n- ____：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n  - <details><summary>答案<\/summary> 流体质点 <\/details>\n- ____：单位体积流体所具有的质量，ρ=dm/dV，单位 kg/m³。  *（要：水约 1000 kg/m³）*\n  - <details><summary>答案<\/summary> 密度 ρ <\/details>\n- ____：单位体积流体所受的重力，γ=ρg，单位 N/m³。  *（要：与密度差一个 g）*\n  - <details><summary>答案<\/summary> 重度（容重）γ <\/details>\n- ____：流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n  - <details><summary>答案<\/summary> 粘性 <\/details>\n- ____：切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n  - <details><summary>答案<\/summary> 牛顿内摩擦定律 <\/details>\n- ____：μ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n  - <details><summary>答案<\/summary> 动力粘度 μ 与运动粘度 ν <\/details>\n- ____：切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n  - <details><summary>答案<\/summary> 牛顿流体与非牛顿流体 <\/details>\n- ____：压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n  - <details><summary>答案<\/summary> 压缩性与膨胀性 <\/details>\n- ____：质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n  - <details><summary>答案<\/summary> 质量力与表面力 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 120 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L15_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L15_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L15_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L15_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L15_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L15_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L15_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L15_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L15_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L15_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L15_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L15_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L15_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p055.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p055.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p056.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p056.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p057.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p057.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p058.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p058.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p059.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p059.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p060.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p060.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p061.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p061.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p062.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p062.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L16_p063.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L16_p063.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-2", "group": "章节精讲", "title": "第2章 · 流体静力学", "md": "# 第2章 · 流体静力学\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · LLM 协填\n\n#### 一、核心概念\n\n- **流体静压强**：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n- **静压强两特性**：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n- **静止流体平衡微分方程（欧拉平衡方程）**：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n- **水静力学基本方程**：重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n- **测压管水头**：z+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n- **绝对压强、相对压强、真空度**：以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n- **相对静止**：流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n- **平面上的静水总压力**：P=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `∇p = ρf` | 静止流体平衡微分方程（欧拉平衡方程） |\n| `p = p₀ + ρgh` | 重力场水静力学基本方程 |\n| `z + p/(ρg) = C` | 测压管水头守恒 |\n| `P = ρg·h_c·A` | 作用在平面上的静水总压力，h_c 为形心淹深 |\n| `y_D = y_c + I_c/(y_c·A)` | 压力中心位置，恒在形心之下 |\n| `z = ω²r²/(2g)` | 等角速度旋转时自由液面（抛物面） |\n\n#### 三、重要案例 / 例题\n\n- U 形水银压差计测量管道两点压强差。\n- 矩形闸门所受静水总压力大小及压力中心位置计算。\n- 等角速度旋转容器内自由液面呈旋转抛物面。\n\n#### 四、高频考点（速记）\n\n1. 静压强的两个基本特性\n2. 水静力学基本方程及其几何、能量意义\n3. 绝对压强、相对压强、真空度的关系\n4. 等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n5. 测压管水头守恒\n6. 平面静水总压力大小与压力中心计算\n7. 相对静止（等加速、旋转）的压强分布\n8. U 形管、压差计读数计算\n\n#### 五、思考题 / 自测\n\n- **Q**：为什么静压强具有各向同性？\n  **A**：对微元四面体作受力平衡分析，忽略高阶小量（质量力）后可证任一点各方向压强大小相等。\n\n- **Q**：压力中心为何总在形心之下？\n  **A**：压强随深度线性增大，下部受压更大使合力作用点下移，由 y_D=y_c+I_c/(y_c·A)>y_c 可知。\n\n- **Q**：相对静止与绝对静止有何区别？\n  **A**：相对静止时流体相对容器不动但整体有加速度，须把惯性力计入质量力，等压面不再水平（如旋转呈抛物面）。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 1 章密度、压强、质量力等概念。\n- **启后**：压强概念贯穿第 4 章伯努利方程；平衡方程是第 4 章欧拉运动方程在静止时的特例。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((流体静力学))\n    核心概念\n      流体静压强\n      静压强两特性\n      静止流体平衡微分方程（欧拉平衡方程）\n      水静力学基本方程\n      测压管水头\n      绝对压强、相对压强、真空度\n      相对静止\n      平面上的静水总压力\n    关键公式 / 模型\n      ∇p = ρf\n      p = p₀ + ρgh\n      z + p/（ρg） = C\n      P = ρg·h_c·A\n      y_D = y_c + I_c/（y_c·A）\n      z = ω²r²/（2g）\n    高频考点\n      静压强的两个基本特性\n      水静力学基本方程及其几何、能量意义\n      绝对压强、相对压强、真空度的关系\n      等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n      测压管水头守恒\n      平面静水总压力大小与压力中心计算\n      相对静止（等加速、旋转）的压强分布\n      U 形管、压差计读数计算\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![静压强各向同性](assets/pdf/fluid-mechanics/L14_p005.jpg)\n*▲ 原页 · 静压强特性：取微元四面体证明任一点静压强「各向同性」（$p_x=p_y=p_z=p_n$），与作用面方位无关。*\n\n![欧拉平衡微分方程](assets/pdf/fluid-mechanics/L14_p009.jpg)\n*▲ 原页 · 静止流体平衡微分方程（欧拉平衡方程）$\\dfrac{1}{\\rho}\\nabla p=\\vec f$ 的微元推导。*\n\n![测压管水头·能量意义](assets/pdf/fluid-mechanics/L14_p017.jpg)\n*▲ 原页 · 测压管水头 $z+p/\\gamma=\\text{const}$ 的几何意义（位置水头+压强水头）与能量意义（单位重量流体的势能）。*\n\n![压强测量·U形压差计](assets/pdf/fluid-mechanics/L14_p023.jpg)\n*▲ 原页 · U 形管测压计/压差计：用等压面法沿同种连续静止流体列方程。* 例题 2-3 即据此页。\n\n![平面静水总压力·压力中心](assets/pdf/fluid-mechanics/L14_p030.jpg)\n*▲ 原页 · 平面静水总压力 $P=\\rho g h_c A$ 与压力中心 $y_D=y_c+I_c/(y_c A)$（含形心惯性矩 $I_c$）。* 例题 2-2 即据此页。\n\n![相对静止·等角速旋转](assets/pdf/fluid-mechanics/L14_p028.jpg)\n*▲ 原页 · 相对静止：等角速度旋转容器，自由液面为「旋转抛物面」，等压面随之弯曲。*\n\n#### 核心公式速记\n\n- 水静力学基本方程 $p=p_0+\\rho g h$；测压管水头 $z+\\dfrac{p}{\\gamma}=\\text{const}$。\n- 等压面法（U 形管）：沿同种连续静止流体，同高度处压强相等。\n- 平面总压力 $P=\\rho g h_c A=p_c A$；压力中心 $y_D=y_c+\\dfrac{I_c}{y_c A}$（矩形 $I_c=\\dfrac{ba^3}{12}$）。\n- 等加速直线运动等压面斜率 $\\tan\\theta=-a/g$；等角速旋转 $z=\\dfrac{\\omega^2 r^2}{2g}+\\text{C}$。\n\n#### 原理示意 · U 形压差计\n\n```mermaid\nflowchart TB\n    P1[\"管道 A 点 压强 pA\"] --- L[\"左液面\"]\n    P2[\"管道 B 点 压强 pB\"] --- R[\"右液面\"]\n    L -->|水银柱高差 Δh| R\n    R --> EQ[\"等压面法: 沿同种连续静止流体列等压面\"]\n    EQ --> RES[\"pA - pB = (ρ_hg - ρ)gΔh\"]\n```\n\n#### 例题 2-1（水静力学基本方程）\n\n**题**：开口水箱中，水面下 $h=3.5\\ \\text{m}$ 处的相对压强（表压）为多少？($\\rho=1000\\ \\text{kg/m}^3$, $g=9.8\\ \\text{m/s}^2$)\n\n**解**：相对压强 $p=\\rho g h=1000\\times9.8\\times3.5=34300\\ \\text{Pa}$。\n\n$$\\boxed{p=\\rho g h=34.3\\ \\text{kPa}}$$\n\n#### 例题 2-2（平面静水总压力 + 压力中心）\n\n**题**：竖直矩形闸门宽 $b=2\\ \\text{m}$、高 $a=3\\ \\text{m}$，顶边与水面齐平。求作用于闸门的静水总压力 $P$ 及压力中心位置 $y_D$。\n\n**解**：\n1. 形心淹深 $h_c=y_c=\\dfrac{a}{2}=1.5\\ \\text{m}$，面积 $A=ab=6\\ \\text{m}^2$。\n2. 总压力 $P=\\rho g h_c A=1000\\times9.8\\times1.5\\times6=88200\\ \\text{N}=88.2\\ \\text{kN}$。\n3. 矩形对形心轴惯性矩 $I_c=\\dfrac{b a^3}{12}=\\dfrac{2\\times3^3}{12}=4.5\\ \\text{m}^4$。\n4. 压力中心 $y_D=y_c+\\dfrac{I_c}{y_c A}=1.5+\\dfrac{4.5}{1.5\\times6}=1.5+0.5=2.0\\ \\text{m}$。\n\n$$\\boxed{P=88.2\\ \\text{kN},\\quad y_D=2.0\\ \\text{m}\\ (\\text{距水面，位于形心之下})}$$\n\n#### 例题 2-3（U 形水银压差计）\n\n**题**：水管中 A、B 两点接 U 形水银压差计，水银面高差 $\\Delta h=0.25\\ \\text{m}$。水 $\\rho=1000$、水银 $\\rho_{Hg}=13600\\ \\text{kg/m}^3$。求 $p_A-p_B$（两测点等高）。\n\n**解**：沿等压面法，$p_A-p_B=(\\rho_{Hg}-\\rho)g\\Delta h=(13600-1000)\\times9.8\\times0.25=30870\\ \\text{Pa}$。\n\n$$\\boxed{p_A-p_B\\approx30.9\\ \\text{kPa}}$$\n\n#### 例题 2-4（等加速直线运动·自由液面）★ 新增\n\n**题**：盛水敞口容器以水平加速度 $a=2.45\\ \\text{m/s}^2$ 向右运动。求自由液面与水平面的夹角 $\\theta$。\n\n**解**：相对静止时质量力为重力 $g$ 与惯性力 $-a$ 的合力，自由液面垂直于合力，故 $\\tan\\theta=\\dfrac{a}{g}=\\dfrac{2.45}{9.8}=0.25$。\n\n$$\\boxed{\\theta=\\arctan(a/g)=\\arctan0.25\\approx14.0^\\circ}$$\n\n#### 易错点 · 第 2 章\n\n- 总压力用**形心淹深** $h_c$ 算大小，但作用点（压力中心）在形心**之下** $y_D>y_c$。\n- U 形管必须找**同种、连续、静止**流体的等压面才能跨接。\n- 表压 = 绝对压 − 大气压；真空度 = 大气压 − 绝对压。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 流体静压强？\n\n<details><summary>参考答案<\/summary>\n\n静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n\n<\/details>\n\n**Q2（名词解释）** 静压强两特性？\n\n<details><summary>参考答案<\/summary>\n\n①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n\n<\/details>\n\n**Q3（名词解释）** 静止流体平衡微分方程（欧拉平衡方程）？\n\n<details><summary>参考答案<\/summary>\n\n单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n\n<\/details>\n\n**Q4（名词解释）** 水静力学基本方程？\n\n<details><summary>参考答案<\/summary>\n\n重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n\n<\/details>\n\n**Q5（名词解释）** 测压管水头？\n\n<details><summary>参考答案<\/summary>\n\nz+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n\n<\/details>\n\n**Q6（名词解释）** 绝对压强、相对压强、真空度？\n\n<details><summary>参考答案<\/summary>\n\n以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n\n<\/details>\n\n**Q7（名词解释）** 相对静止？\n\n<details><summary>参考答案<\/summary>\n\n流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n\n<\/details>\n\n**Q8（名词解释）** 平面上的静水总压力？\n\n<details><summary>参考答案<\/summary>\n\nP=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：静压强的两个基本特性\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：静压强的两个基本特性\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：水静力学基本方程及其几何、能量意义\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：水静力学基本方程及其几何、能量意义\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：绝对压强、相对压强、真空度的关系\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：绝对压强、相对压强、真空度的关系\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：测压管水头守恒\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：测压管水头守恒\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：平面静水总压力大小与压力中心计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：平面静水总压力大小与压力中心计算\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：相对静止（等加速、旋转）的压强分布\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：相对静止（等加速、旋转）的压强分布\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：U 形管、压差计读数计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：U 形管、压差计读数计算\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：为什么静压强具有各向同性？\n  **A**：对微元四面体作受力平衡分析，忽略高阶小量（质量力）后可证任一点各方向压强大小相等。\n\n- **Q**：压力中心为何总在形心之下？\n  **A**：压强随深度线性增大，下部受压更大使合力作用点下移，由 y_D=y_c+I_c/(y_c·A)>y_c 可知。\n\n- **Q**：相对静止与绝对静止有何区别？\n  **A**：相对静止时流体相对容器不动但整体有加速度，须把惯性力计入质量力，等压面不再水平（如旋转呈抛物面）。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n  - <details><summary>答案<\/summary> 流体静压强 <\/details>\n- ____：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n  - <details><summary>答案<\/summary> 静压强两特性 <\/details>\n- ____：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n  - <details><summary>答案<\/summary> 静止流体平衡微分方程（欧拉平衡方程） <\/details>\n- ____：重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n  - <details><summary>答案<\/summary> 水静力学基本方程 <\/details>\n- ____：z+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n  - <details><summary>答案<\/summary> 测压管水头 <\/details>\n- ____：以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n  - <details><summary>答案<\/summary> 绝对压强、相对压强、真空度 <\/details>\n- ____：流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n  - <details><summary>答案<\/summary> 相对静止 <\/details>\n- ____：P=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n  - <details><summary>答案<\/summary> 平面上的静水总压力 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 123 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L12_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L12_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L12_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pd 拉法**：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n- **迹线**：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n- **流线**：某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n- **染色线（脉线）**：相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n- **过流断面、湿周、水力半径**：过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n- **流体微团运动分解**：亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n- **物质导数（随体导数）**：D/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n- **连续方程（微分形式）**：质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `dx/u = dy/v = dz/w` | 流线微分方程 |\n| `D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/∂z` | 物质导数（当地+迁移） |\n| `∂ρ/∂t + ∇·(ρV) = 0` | 微分形式连续方程 |\n| `∇·V = 0` | 不可压缩流体连续方程 |\n| `ω_z = ½(∂v/∂x − ∂u/∂y)` | 流体微团绕 z 轴的旋转角速度 |\n| `R = A/χ` | 水力半径，A 过流面积，χ 湿周 |\n\n#### 三、重要案例 / 例题\n\n- 由给定速度场判别定常/非定常、均匀/非均匀流。\n- 由速度场求加速度，分清当地加速度与迁移加速度。\n- 计算旋度判别有旋流与无旋流。\n\n#### 四、高频考点（速记）\n\n1. 拉格朗日法与欧拉法的区别\n2. 迹线、流线、染色线的定义与区别；恒定流三者重合\n3. 流线不相交、不转折的性质\n4. 物质导数的组成（当地导数+迁移导数）\n5. 流体微团运动的四个分量\n6. 有旋流与无旋流的判别（旋度）\n7. 微分形式连续方程及不可压缩简化\n8. 过流断面、湿周、水力半径概念\n\n#### 五、思考题 / 自测\n\n- **Q**：定常流中迁移加速度为何可不为零？\n  **A**：定常流 ∂/∂t=0，但质点流经空间不同点速度仍可改变，(V·∇)V≠0，故有迁移加速度（如收缩管中加速）。\n\n- **Q**：流线与迹线何时重合？\n  **A**：在恒定（定常）流场中，流线形状不随时间变化，质点沿流线运动，二者重合。\n\n- **Q**：如何判别流动是否有旋？\n  **A**：计算速度场旋度 ∇×V，若处处为零则为无旋（有势）流，否则为有旋流。\n\n\n#### 六、与前后章之关联\n\n- **承前**：在第 1 章连续介质、第 2 章场概念基础上建立运动描述方法。\n- **启后**：连续方程与运动学概念为第 4 章动力学方程（伯努利、动量、N-S）奠定基础。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((流体运动基础))\n    核心概念\n      拉格朗日法\n      欧拉法\n      迹线\n      流线\n      染色线（脉线）\n      过流断面、湿周、水力半径\n      流体微团运动分解\n      物质导数（随体导数）\n      连续方程（微分形式）\n    关键公式 / 模型\n      dx/u = dy/v = dz/w\n      D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/…\n      ∂ρ/∂t + ∇·（ρV） = 0\n      ∇·V = 0\n      ω_z = ½（∂v/∂x − ∂u/∂y）\n      R = A/χ\n    高频考点\n      拉格朗日法与欧拉法的区别\n      迹线、流线、染色线的定义与区别；恒定流三者重合\n      流线不相交、不转折的性质\n      物质导数的组成（当地导数+迁移导数）\n      流体微团运动的四个分量\n      有旋流与无旋流的判别（旋度）\n      微分形式连续方程及不可压缩简化\n      过流断面、湿周、水力半径概念\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![流线可视化](assets/pdf/fluid-mechanics/L11_p015.jpg)\n*▲ 原页 · 流线/迹线/脉线的可视化（含 CFD 渲染）：流线是某瞬时处处与速度相切的曲线。*\n\n![流线特性·奇点驻点](assets/pdf/fluid-mechanics/L11_p021.jpg)\n*▲ 原页 · 流线一般不相交（驻点、奇点除外），不能突然转折；流线密集处流速大。*\n\n![流管·流束·总流](assets/pdf/fluid-mechanics/L11_p023.jpg)\n*▲ 原页 · 流管/流束/总流/过流断面概念，及流量 $Q=\\int_A u\\,dA=vA$ 与断面平均流速 $v$。*\n\n![流体微团运动与变形](assets/pdf/fluid-mechanics/L11_p030.jpg)\n*▲ 原页 · 流体微团的平移、线变形、角变形与旋转——亥姆霍兹速度分解。*\n\n![连续方程·微元控制体](assets/pdf/fluid-mechanics/L11_p043.jpg)\n*▲ 原页 · 连续性方程的微元控制体推导：不可压缩流 $\\nabla\\cdot\\vec v=0$。* 例题 3-2 即据此页。\n\n#### 核心公式速记\n\n- 物质导数 $\\dfrac{D\\phi}{Dt}=\\underbrace{\\dfrac{\\partial\\phi}{\\partial t}}_{\\text{当地}}+\\underbrace{(\\vec v\\cdot\\nabla)\\phi}_{\\text{迁移}}$。\n- 加速度 $a_x=\\dfrac{\\partial u}{\\partial t}+u\\dfrac{\\partial u}{\\partial x}+v\\dfrac{\\partial u}{\\partial y}+w\\dfrac{\\partial u}{\\partial z}$。\n- 不可压缩连续方程 $\\dfrac{\\partial u}{\\partial x}+\\dfrac{\\partial v}{\\partial y}+\\dfrac{\\partial w}{\\partial z}=0$；总流连续 $v_1A_1=v_2A_2$。\n- 涡量 $\\omega_z=\\dfrac12\\left(\\dfrac{\\partial v}{\\partial x}-\\dfrac{\\partial u}{\\partial y}\\right)$；$\\omega=0$ 为无旋流。\n\n#### 例题 3-1（由速度场求加速度）\n\n**题**：定常流速度场 $u=2x$, $v=-2y$（单位 SI）。求点 $(1,1)$ 处的加速度。\n\n**解**：定常流 $\\partial/\\partial t=0$，只有迁移加速度。\n$$a_x=u\\frac{\\partial u}{\\partial x}+v\\frac{\\partial u}{\\partial y}=2x\\cdot2+(-2y)\\cdot0=4x$$\n$$a_y=u\\frac{\\partial v}{\\partial x}+v\\frac{\\partial v}{\\partial y}=0+(-2y)(-2)=4y$$\n在 $(1,1)$：$a_x=4$, $a_y=4\\ \\text{m/s}^2$，合加速度 $|a|=\\sqrt{4^2+4^2}=4\\sqrt2\\approx5.66\\ \\text{m/s}^2$。\n\n$$\\boxed{a=(4,4)\\ \\text{m/s}^2,\\ |a|\\approx5.66\\ \\text{m/s}^2}$$\n\n#### 例题 3-2（连续方程判定）\n\n**题**：不可压缩流动 $u=3x$, $v=ay$。求常数 $a$ 使流动满足连续性。\n\n**解**：不可压缩连续方程 $\\dfrac{\\partial u}{\\partial x}+\\dfrac{\\partial v}{\\partial y}=0\\Rightarrow 3+a=0\\Rightarrow a=-3$。\n\n$$\\boxed{a=-3}$$\n\n#### 例题 3-3（有旋/无旋判别）\n\n**题**：判断 $u=2y$, $v=0$ 的流动是否有旋。\n\n**解**：$\\omega_z=\\dfrac12\\left(\\dfrac{\\partial v}{\\partial x}-\\dfrac{\\partial u}{\\partial y}\\right)=\\dfrac12(0-2)=-1\\neq0$，**有旋流**（简单剪切流动含旋转）。\n\n$$\\boxed{\\omega_z=-1\\ \\text{rad/s}\\neq0\\Rightarrow\\text{有旋}}$$\n\n#### 例题 3-4（总流连续方程·变径管）★ 新增\n\n**题**：管道由 $d_1=0.2\\ \\text{m}$ 渐缩到 $d_2=0.1\\ \\text{m}$，进口流速 $v_1=1.5\\ \\text{m/s}$。求出口流速 $v_2$ 与流量 $Q$。\n\n**解**：\n1. 连续方程 $v_1A_1=v_2A_2\\Rightarrow v_2=v_1\\left(\\dfrac{d_1}{d_2}\\right)^2=1.5\\times(2)^2=6\\ \\text{m/s}$。\n2. 流量 $Q=v_1A_1=1.5\\times\\dfrac{\\pi}{4}(0.2)^2=1.5\\times0.0314=0.0471\\ \\text{m}^3/\\text{s}$。\n\n$$\\boxed{v_2=6\\ \\text{m/s},\\quad Q\\approx47.1\\ \\text{L/s}}$$\n\n#### 易错点 · 第 3 章\n\n- **流线**（同一瞬时各点切线）≠ **迹线**（同一质点轨迹）；定常流时二者重合。\n- 加速度含**当地 + 迁移**两项，定常流当地项为零但迁移项不一定为零。\n- 连续方程对不可压缩定常流恒成立，与是否有粘性无关。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 拉格朗日法？\n\n<details><summary>参考答案<\/summary>\n\n跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n\n<\/details>\n\n**Q2（名词解释）** 欧拉法？\n\n<details><summary>参考答案<\/summary>\n\n着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n\n<\/details>\n\n**Q3（名词解释）** 迹线？\n\n<details><summary>参考答案<\/summary>\n\n单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n\n<\/details>\n\n**Q4（名词解释）** 流线？\n\n<details><summary>参考答案<\/summary>\n\n某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n\n<\/details>\n\n**Q5（名词解释）** 染色线（脉线）？\n\n<details><summary>参考答案<\/summary>\n\n相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n\n<\/details>\n\n**Q6（名词解释）** 过流断面、湿周、水力半径？\n\n<details><summary>参考答案<\/summary>\n\n过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n\n<\/details>\n\n**Q7（名词解释）** 流体微团运动分解？\n\n<details><summary>参考答案<\/summary>\n\n亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n\n<\/details>\n\n**Q8（名词解释）** 物质导数（随体导数）？\n\n<details><summary>参考答案<\/summary>\n\nD/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n\n<\/details>\n\n**Q9（名词解释）** 连续方程（微分形式）？\n\n<details><summary>参考答案<\/summary>\n\n质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：拉格朗日法与欧拉法的区别\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：拉格朗日法与欧拉法的区别\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：迹线、流线、染色线的定义与区别；恒定流三者重合\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：迹线、流线、染色线的定义与区别；恒定流三者重合\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：流线不相交、不转折的性质\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：流线不相交、不转折的性质\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：物质导数的组成（当地导数+迁移导数）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：物质导数的组成（当地导数+迁移导数）\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：流体微团运动的四个分量\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：流体微团运动的四个分量\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：有旋流与无旋流的判别（旋度）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：有旋流与无旋流的判别（旋度）\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：微分形式连续方程及不可压缩简化\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：微分形式连续方程及不可压缩简化\n\n<\/details>\n\n**Q17（考点·闭卷默写）** 请展开论述：过流断面、湿周、水力半径概念\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：过流断面、湿周、水力半径概念\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：定常流中迁移加速度为何可不为零？\n  **A**：定常流 ∂/∂t=0，但质点流经空间不同点速度仍可改变，(V·∇)V≠0，故有迁移加速度（如收缩管中加速）。\n\n- **Q**：流线与迹线何时重合？\n  **A**：在恒定（定常）流场中，流线形状不随时间变化，质点沿流线运动，二者重合。\n\n- **Q**：如何判别流动是否有旋？\n  **A**：计算速度场旋度 ∇×V，若处处为零则为无旋（有势）流，否则为有旋流。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n  - <details><summary>答案<\/summary> 拉格朗日法 <\/details>\n- ____：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n  - <details><summary>答案<\/summary> 欧拉法 <\/details>\n- ____：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n  - <details><summary>答案<\/summary> 迹线 <\/details>\n- ____：某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n  - <details><summary>答案<\/summary> 流线 <\/details>\n- ____：相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n  - <details><summary>答案<\/summary> 染色线（脉线） <\/details>\n- ____：过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n  - <details><summary>答案<\/summary> 过流断面、湿周、水力半径 <\/details>\n- ____：亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n  - <details><summary>答案<\/summary> 流体微团运动分解 <\/details>\n- ____：D/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n  - <details><summary>答案<\/summary> 物质导数（随体导数） <\/details>\n- ____：质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n  - <details><summary>答案<\/summary> 连续方程（微分形式） <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 96 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L10_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L10_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L10_p0 hanics/L11_p042.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L11_p043.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L11_p043.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L11_p044.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L11_p044.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L11_p045.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L11_p045.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L11_p046.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L11_p046.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L11_p047.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L11_p047.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L11_p048.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L11_p048.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-4", "group": "章节精讲", "title": "第4章 · 流体动力学基础", "md": "# 第4章 · 流体动力学基础\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · LLM 协填\n\n#### 一、核心概念\n\n- **欧拉运动方程**：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n- **伯努利方程（沿流线）**：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n- **缓变流（渐变流）**：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n- **总流伯努利方程**：z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n- **动能修正系数 α**：用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n- **动量方程（总流）**：ΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n- **纳维-斯托克斯（N-S）方程**：粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `DV/Dt = f − (1/ρ)∇p` | 理想流体欧拉运动方程 |\n| `z + p/(ρg) + V²/(2g) = C` | 沿流线伯努利方程（理想流） |\n| `z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w` | 总流伯努利方程（实际流） |\n| `ΣF = ρQ(β₂V₂ − β₁V₁)` | 总流动量方程 |\n| `DV/Dt = f − (1/ρ)∇p + ν∇²V` | 纳维-斯托克斯方程 |\n| `Q = vA` | 流量连续关系 |\n\n#### 三、重要案例 / 例题\n\n- 文丘里流量计、毕托管测速：伯努利方程的典型应用。\n- 孔口出流 v=√(2gH)（托里拆利公式）。\n- 水流对弯管、喷嘴的冲击力：动量方程求解。\n\n#### 四、高频考点（速记）\n\n1. 伯努利方程三项水头的物理意义与适用条件\n2. 理想流与实际流伯努利方程的区别（h_w、α）\n3. 总流伯努利方程列写步骤与基准面、断面选取\n4. 动量方程应用与动量修正系数 β\n5. 缓变流断面的选取条件\n6. 毕托管、文丘里、孔口出流的计算\n7. N-S 方程各项物理意义（粘性项 ν∇²V）\n8. 欧拉方程与 N-S 方程的关系（令 ν=0）\n\n#### 五、思考题 / 自测\n\n- **Q**：伯努利方程的适用条件有哪些？\n  **A**：理想流体（或忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n- **Q**：总流伯努利方程为何要引入 α 与 h_w？\n  **A**：实际断面流速分布不均，需用动能修正系数 α 修正动能项；粘性导致机械能沿程损失 h_w，故较理想方程多此两项。\n\n- **Q**：动量方程与伯努利方程各解决什么问题？\n  **A**：伯努利方程（能量）求压强与流速关系；动量方程求流体与边界间的作用力，二者常联立求解。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 3 章连续方程与物质导数；欧拉运动方程是第 2 章平衡方程的运动推广。\n- **启后**：水头损失 h_w（沿程+局部）的计算在第 5 章展开；N-S 方程是粘性流动分析的基础。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((流体动力学基础))\n    核心概念\n      欧拉运动方程\n      伯努利方程（沿流线）\n      缓变流（渐变流）\n      总流伯努利方程\n      动能修正系数 α\n      动量方程（总流）\n      纳维-斯托克斯（N-S）方程\n    关键公式 / 模型\n      DV/Dt = f − （1/ρ）∇p\n      z + p/（ρg） + V²/（2g） = C\n      z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/…\n      ΣF = ρQ（β₂V₂ − β₁V₁）\n      DV/Dt = f − （1/ρ）∇p + ν∇²V\n      Q = vA\n    高频考点\n      伯努利方程三项水头的物理意义与适用条件\n      理想流与实际流伯努利方程的区别（h_w、α）\n      总流伯努利方程列写步骤与基准面、断面选取\n      动量方程应用与动量修正系数 β\n      缓变流断面的选取条件\n      毕托管、文丘里、孔口出流的计算\n      N-S 方程各项物理意义（粘性项 ν∇²V）\n      欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![欧拉运动方程·微元体受力](assets/pdf/fluid-mechanics/L09_p006.jpg)\n*▲ 原页 · 理想流体欧拉运动方程：微元体受质量力与压强合力，$\\vec f-\\dfrac1\\rho\\nabla p=\\dfrac{D\\vec v}{Dt}$。*\n\n![伯努利方程·三种水头](assets/pdf/fluid-mechanics/L09_p016.jpg)\n*▲ 原页 · 沿流线伯努利方程 $z+\\dfrac{p}{\\gamma}+\\dfrac{v^2}{2g}=\\text{const}$，三种水头（位置/压强/速度）互换的能量意义。*\n\n![总流伯努利·渐变流断面](assets/pdf/fluid-mechanics/L09_p022.jpg)\n*▲ 原页 · 总流伯努利方程：在**渐变流**断面间列 $z_1+\\dfrac{p_1}{\\gamma}+\\dfrac{\\alpha_1 v_1^2}{2g}=z_2+\\dfrac{p_2}{\\gamma}+\\dfrac{\\alpha_2 v_2^2}{2g}+h_w$。*\n\n![伯努利应用·皮托管文丘里](assets/pdf/fluid-mechanics/L09_p033.jpg)\n*▲ 原页 · 伯努利方程应用：皮托管测点速、文丘里管/孔板测流量。*\n\n![动量方程·弯管受力](assets/pdf/fluid-mechanics/L09_p040.jpg)\n*▲ 原页 · 总流动量方程 $\\sum\\vec F=\\rho Q(\\beta_2\\vec v_2-\\beta_1\\vec v_1)$，用于求弯管、喷嘴等的受力。* 例题 4-3 即据此页。\n\n![纳维-斯托克斯方程](assets/pdf/fluid-mechanics/L09_p052.jpg)\n*▲ 原页 · 实际（粘性）流体的纳维-斯托克斯方程 $\\rho\\dfrac{D\\vec v}{Dt}=\\rho\\vec f-\\nabla p+\\mu\\nabla^2\\vec v$。*\n\n#### 核心公式速记\n\n- 理想流伯努利（沿流线）$z+\\dfrac{p}{\\gamma}+\\dfrac{v^2}{2g}=\\text{const}$。\n- 实际总流伯努利 $z_1+\\dfrac{p_1}{\\gamma}+\\dfrac{\\alpha_1 v_1^2}{2g}=z_2+\\dfrac{p_2}{\\gamma}+\\dfrac{\\alpha_2 v_2^2}{2g}+h_w$。\n- 托里拆利孔口出流 $v=\\sqrt{2gH}$；皮托管 $v=\\sqrt{2g\\Delta h}$。\n- 总流动量方程 $\\sum\\vec F=\\rho Q(\\beta_2\\vec v_2-\\beta_1\\vec v_1)$。\n\n#### 原理示意 · 伯努利能量守恒\n\n```mermaid\nflowchart LR\n    A[\"断面1: z1 + p1/γ + v1²/2g\"] -->|理想流 无损失| B[\"断面2: z2 + p2/γ + v2²/2g\"]\n    A -.->|实际流 有损失 hw| C[\"断面2 + hw\"]\n    B --> D[\"位置/压强/速度 三种水头互换\"]\n```\n\n#### 例题 4-1（文丘里 / 伯努利 + 连续）\n\n**题**：水平文丘里管，进口直径 $d_1=0.1\\ \\text{m}$、喉部 $d_2=0.05\\ \\text{m}$。进口流速 $v_1=2\\ \\text{m/s}$。求进口与喉部的压强差 $p_1-p_2$（理想流）。\n\n**解**：\n1. 连续方程：$v_2=v_1\\left(\\dfrac{d_1}{d_2}\\right)^2=2\\times(2)^2=8\\ \\text{m/s}$。\n2. 水平管 $z_1=z_2$，伯努利：$\\dfrac{p_1-p_2}{\\rho}=\\dfrac{v_2^2-v_1^2}{2}=\\dfrac{8^2-2^2}{2}=30\\ \\text{J/kg}$。\n3. $p_1-p_2=\\rho\\times30=1000\\times30=30000\\ \\text{Pa}$。\n\n$$\\boxed{p_1-p_2=\\tfrac12\\rho(v_2^2-v_1^2)=30\\ \\text{kPa}}$$\n\n#### 例题 4-2（托里拆利·孔口出流）\n\n**题**：水箱液面距小孔中心 $H=1.8\\ \\text{m}$，求理想出流速度 $v$。\n\n**解**：自由液面与孔口处均为大气压，伯努利化简得 $v=\\sqrt{2gH}=\\sqrt{2\\times9.8\\times1.8}=\\sqrt{35.28}\\approx5.94\\ \\text{m/s}$。\n\n$$\\boxed{v=\\sqrt{2gH}\\approx5.94\\ \\text{m/s}}$$\n\n#### 例题 4-3（动量方程·弯管受力）\n\n**题**：水平 $90^\\circ$ 弯管，管径不变，流量 $Q=0.02\\ \\text{m}^3/\\text{s}$，管内流速 $v=4\\ \\text{m/s}$，表压近似为 0（仅求动量项）。求水流对弯管的合力大小（取 $\\beta=1$）。\n\n**解**：\n1. 进口动量沿 $x$：$\\dot M_x=\\rho Q v=1000\\times0.02\\times4=80\\ \\text{N}$。\n2. 出口动量沿 $y$，大小同为 $80\\ \\text{N}$。\n3. 对管的作用力与流体受力反向，合力 $R=\\sqrt{(\\rho Qv)^2+(\\rho Qv)^2}=80\\sqrt2\\approx113\\ \\text{N}$。\n\n$$\\boxed{R=\\sqrt2\\,\\rho Q v\\approx113\\ \\text{N},\\ \\text{方向沿弯管角平分线指向外侧}}$$\n\n#### 例题 4-4（皮托管测流速）★ 新增\n\n**题**：皮托管插入水流，测得驻点（全压）与静压的水柱高差 $\\Delta h=0.20\\ \\text{m}$。求该点流速 $v$。\n\n**解**：由驻点伯努利 $\\dfrac{p_s-p}{\\gamma}=\\dfrac{v^2}{2g}=\\Delta h\\Rightarrow v=\\sqrt{2g\\Delta h}=\\sqrt{2\\times9.8\\times0.20}=\\sqrt{3.92}\\approx1.98\\ \\text{m/s}$。\n\n$$\\boxed{v=\\sqrt{2g\\Delta h}\\approx1.98\\ \\text{m/s}}$$\n\n#### 易错点 · 第 4 章\n\n- 伯努利方程要求**沿同一流线 / 渐变流断面、不可压缩、定常**；实际流别忘加水头损失 $h_w$。\n- 动量方程是**矢量式**，先定坐标正向，受力含压力、重力、约束反力。\n- 动能修正系数 $\\alpha$（层流 2、紊流≈1）、动量修正系数 $\\beta$ 勿混。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 欧拉运动方程？\n\n<details><summary>参考答案<\/summary>\n\n理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n\n<\/details>\n\n**Q2（名词解释）** 伯努利方程（沿流线）？\n\n<details><summary>参考答案<\/summary>\n\n理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n\n<\/details>\n\n**Q3（名词解释）** 缓变流（渐变流）？\n\n<details><summary>参考答案<\/summary>\n\n流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n\n<\/details>\n\n**Q4（名词解释）** 总流伯努利方程？\n\n<details><summary>参考答案<\/summary>\n\nz₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n\n<\/details>\n\n**Q5（名词解释）** 动能修正系数 α？\n\n<details><summary>参考答案<\/summary>\n\n用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n\n<\/details>\n\n**Q6（名词解释）** 动量方程（总流）？\n\n<details><summary>参考答案<\/summary>\n\nΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n\n<\/details>\n\n**Q7（名词解释）** 纳维-斯托克斯（N-S）方程？\n\n<details><summary>参考答案<\/summary>\n\n粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n\n<\/details>\n\n**Q8（考点·闭卷默写）** 请展开论述：伯努利方程三项水头的物理意义与适用条件\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：伯努利方程三项水头的物理意义与适用条件\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：理想流与实际流伯努利方程的区别（h_w、α）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：理想流与实际流伯努利方程的区别（h_w、α）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：总流伯努利方程列写步骤与基准面、断面选取\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：总流伯努利方程列写步骤与基准面、断面选取\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：动量方程应用与动量修正系数 β\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：动量方程应用与动量修正系数 β\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：缓变流断面的选取条件\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：缓变流断面的选取条件\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：毕托管、文丘里、孔口出流的计算\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：毕托管、文丘里、孔口出流的计算\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：N-S 方程各项物理意义（粘性项 ν∇²V）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：N-S 方程各项物理意义（粘性项 ν∇²V）\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：欧拉方程与 N-S 方程的关系（令 ν=0）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：欧拉方程与 N-S 方程的关系（令 ν=0）\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：伯努利方程的适用条件有哪些？\n  **A**：理想流体（或忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n- **Q**：总流伯努利方程为何要引入 α 与 h_w？\n  **A**：实际断面流速分布不均，需用动能修正系数 α 修正动能项；粘性导致机械能沿程损失 h_w，故较理想方程多此两项。\n\n- **Q**：动量方程与伯努利方程各解决什么问题？\n  **A**：伯努利方程（能量）求压强与流速关系；动量方程求流体与边界间的作用力，二者常联立求解。\n\n<\/details>\n\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n  - <details><summary>答案<\/summary> 欧拉运动方程 <\/details>\n- ____：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n  - <details><summary>答案<\/summary> 伯努利方程（沿流线） <\/details>\n- ____：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n  - <details><summary>答案<\/summary> 缓变流（渐变流） <\/details>\n- ____：z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n  - <details><summary>答案<\/summary> 总流伯努利方程 <\/details>\n- ____：用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n  - <details><summary>答案<\/summary> 动能修正系数 α <\/details>\n- ____：ΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n  - <details><summary>答案<\/summary> 动量方程（总流） <\/details>\n- ____：粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n  - <details><summary>答案<\/summary> 纳维-斯托克斯（N-S）方程 <\/details>\n\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 167 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L07_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L07_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L07_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"l et=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p038.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p039.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p039.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p040.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p041.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p041.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p042.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p042.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p043.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p043.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p044.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p044.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p045.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p045.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p046.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p046.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p047.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p047.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p048.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p048.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p049.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p049.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p050.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p050.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p051.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p051.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p052.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p052.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p053.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p053.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p054.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p054.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L09_p055.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L09_p055.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-5", "group": "章节精讲", "title": "第5章 · 层流、紊流及其能量损失", "md": "# 第5章 · 层流、紊流及其能量损失\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、知识精讲 · 核心概念 / 公式 / 考点\n\n### 复习要点 · LLM 协填\n\n#### 一、核心概念\n\n- **层流**：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n- **紊流（湍流）**：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n- **雷诺数 Re**：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n- **沿程水头损失 h_f**：沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n- **沿程阻力系数 λ**：层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n- **局部水头损失 h_j**：管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n- **雷诺应力与混合长度**：紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n- **层流底层与水力光滑/粗糙管**：紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Re = vd/ν = ρvd/μ` | 雷诺数，判别流态 |\n| `h_f = λ(L/d)(v²/2g)` | 达西-魏斯巴赫沿程损失公式 |\n| `λ = 64/Re` | 圆管层流沿程阻力系数 |\n| `h_j = ζ(v²/2g)` | 局部水头损失 |\n| `u = u_max[1 − (r/R)²]` | 圆管层流速度抛物线分布 |\n| `h_w = Σh_f + Σh_j` | 总水头损失（沿程+局部叠加） |\n\n#### 三、重要案例 / 例题\n\n- 雷诺实验：通过染色线观察层流向紊流的转捩，确定临界雷诺数。\n- 圆管层流（哈根-泊肃叶流）：流量与压降、粘度的关系。\n- 突然扩大局部损失：包达公式 h_j=(v₁−v₂)²/(2g)。\n\n#### 四、高频考点（速记）\n\n1. 层流与紊流的本质区别及判别（Re 与临界值）\n2. 雷诺数的物理意义（惯性力/粘性力）\n3. 达西公式与沿程阻力系数 λ 的确定\n4. 局部损失系数 ζ 与典型管件取值\n5. 圆管层流速度分布与 u_max=2v 的关系\n6. 紊流时均化、雷诺应力、混合长度\n7. 层流底层、水力光滑管与粗糙管概念\n8. 总水头损失叠加 h_w=Σh_f+Σh_j\n\n#### 五、思考题 / 自测\n\n- **Q**：雷诺数的物理意义及临界值是什么？\n  **A**：Re 表征惯性力与粘性力之比；圆管下临界 Re≈2300，Re<2300 为层流，更大时转为紊流。\n\n- **Q**：为什么紊流的沿程损失比层流大？\n  **A**：紊流脉动产生附加雷诺切应力，能量耗散显著增强，且 λ 对壁面粗糙度敏感，故损失大于层流。\n\n- **Q**：圆管层流中平均流速与最大流速是什么关系？\n  **A**：速度按抛物线分布，平均流速 v=½u_max，即最大流速是平均流速的 2 倍。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 1 章粘性概念与第 4 章总流伯努利方程中的水头损失项 h_w。\n- **启后**：全课收尾，沿程与局部损失计算直接服务于管路水力计算等工程实践。\n\n\n### 本章知识结构图\n\n```mermaid\nmindmap\n  root((层流 紊流及其能量损失))\n    核心概念\n      层流\n      紊流（湍流）\n      雷诺数 Re\n      沿程水头损失 h_f\n      沿程阻力系数 λ\n      局部水头损失 h_j\n      雷诺应力与混合长度\n      层流底层与水力光滑/粗糙管\n    关键公式 / 模型\n      Re = vd/ν = ρvd/μ\n      h_f = λ（L/d）（v²/2g）\n      λ = 64/Re\n      h_j = ζ（v²/2g）\n      u = u_max【1 − （r/R）²】\n      h_w = Σh_f + Σh_j\n    高频考点\n      层流与紊流的本质区别及判别（Re 与临界值）\n      雷诺数的物理意义（惯性力/粘性力）\n      达西公式与沿程阻力系数 λ 的确定\n      局部损失系数 ζ 与典型管件取值\n      圆管层流速度分布与 u_max=2v 的关系\n      紊流时均化、雷诺应力、混合长度\n      层流底层、水力光滑管与粗糙管概念\n      总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n## 二、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![雷诺实验](assets/pdf/fluid-mechanics/L05_p004.jpg)\n*▲ 原页 · 雷诺实验装置：染色线在层流时为直线、紊流时弥散，揭示流态由 $Re$ 判别。*\n\n![圆管层流速度分布](assets/pdf/fluid-mechanics/L05_p013.jpg)\n*▲ 原页 · 圆管层流的**抛物线**速度分布 $u=u_{max}[1-(r/R)^2]$，平均流速 $v=\\tfrac12 u_{max}$。* 例题 5-3 即据此页。\n\n![穆迪图](assets/pdf/fluid-mechanics/L05_p028.jpg)\n*▲ 原页 · 穆迪图（Moody chart）：沿程阻力系数 $\\lambda=f(Re,\\ \\varepsilon/d)$ 的查图工具，紊流区据此取 $\\lambda$。*\n\n![局部损失·突然扩大](assets/pdf/fluid-mechanics/L05_p033.jpg)\n*▲ 原页 · 局部损失：突然扩大/缩小、弯头、阀门等处 $h_j=\\zeta\\dfrac{v^2}{2g}$，突扩波达公式 $h_j=\\dfrac{(v_1-v_2)^2}{2g}$。*\n\n#### 核心公式速记\n\n- 雷诺数 $Re=\\dfrac{vd}{\\nu}$：圆管 $Re<2300$ 层流，$Re>4000$ 紊流。\n- 沿程损失（达西-魏斯巴赫）$h_f=\\lambda\\dfrac{L}{d}\\dfrac{v^2}{2g}$；层流 $\\lambda=\\dfrac{64}{Re}$。\n- 局部损失 $h_j=\\zeta\\dfrac{v^2}{2g}$；总损失 $h_w=\\sum h_f+\\sum h_j$。\n- 圆管层流 $u=u_{max}[1-(r/R)^2]$，$v=\\tfrac12 u_{max}$，$\\alpha=2$。\n\n#### 原理示意 · 流态判别与损失\n\n```mermaid\nflowchart TB\n    RE[\"雷诺数 Re = vd/ν\"] -->|Re < 2300| LAM[\"层流: 染色线为直线<br/>λ = 64/Re\"]\n    RE -->|Re > 4000| TUR[\"紊流: 染色线弥散<br/>λ=f(Re, 相对粗糙度) 查穆迪图\"]\n    LAM --> HF[\"沿程损失 hf = λ(L/d)(v²/2g)\"]\n    TUR --> HF\n    HF --> HW[\"总损失 hw = Σhf + Σhj\"]\n    HJ[\"局部损失 hj = ζ v²/2g\"] --> HW\n```\n\n#### 例题 5-1（流态判别）\n\n**题**：圆管 $d=0.05\\ \\text{m}$，水流速 $v=0.04\\ \\text{m/s}$，运动粘度 $\\nu=1.0\\times10^{-6}\\ \\text{m}^2/\\text{s}$。判别流态。\n\n**解**：$Re=\\dfrac{vd}{\\nu}=\\dfrac{0.04\\times0.05}{1.0\\times10^{-6}}=2000<2300$，为**层流**。\n\n$$\\boxed{Re=2000<2300\\Rightarrow\\text{层流}}$$\n\n#### 例题 5-2（达西公式·沿程损失）\n\n**题**：上例中管长 $L=20\\ \\text{m}$，求沿程水头损失 $h_f$。\n\n**解**：\n1. 层流 $\\lambda=\\dfrac{64}{Re}=\\dfrac{64}{2000}=0.032$。\n2. $h_f=\\lambda\\dfrac{L}{d}\\dfrac{v^2}{2g}=0.032\\times\\dfrac{20}{0.05}\\times\\dfrac{0.04^2}{2\\times9.8}$。\n3. $=0.032\\times400\\times\\dfrac{0.0016}{19.6}=12.8\\times8.16\\times10^{-5}\\approx1.04\\times10^{-3}\\ \\text{m}$。\n\n$$\\boxed{h_f\\approx1.0\\times10^{-3}\\ \\text{m}=1.0\\ \\text{mm 水柱}}$$\n\n#### 例题 5-3（圆管层流·最大与平均流速）\n\n**题**：圆管层流速度分布 $u=u_{max}\\left[1-(r/R)^2\\right]$。证明平均流速 $v=\\tfrac12 u_{max}$，并由上题 $v=0.04$ 求 $u_{max}$。\n\n**解**：\n$$v=\\frac{1}{\\pi R^2}\\int_0^R u_{max}\\Big[1-\\frac{r^2}{R^2}\\Big]2\\pi r\\,dr=\\frac{2u_{max}}{R^2}\\int_0^R\\Big(r-\\frac{r^3}{R^2}\\Big)dr=\\frac{2u_{max}}{R^2}\\Big(\\frac{R^2}{2}-\\frac{R^2}{4}\\Big)=\\frac{u_{max}}{2}$$\n故 $u_{max}=2v=2\\times0.04=0.08\\ \\text{m/s}$。\n\n$$\\boxed{v=\\tfrac12u_{max},\\quad u_{max}=0.08\\ \\text{m/s}}$$\n\n#### 例题 5-4（局部损失·突然扩大）★ 新增\n\n**题**：水管由 $v_1=3\\ \\text{m/s}$ 突然扩大到 $v_2=1.2\\ \\text{m/s}$。求突扩局部水头损失 $h_j$（波达公式）。\n\n**解**：$h_j=\\dfrac{(v_1-v_2)^2}{2g}=\\dfrac{(3-1.2)^2}{2\\times9.8}=\\dfrac{1.8^2}{19.6}=\\dfrac{3.24}{19.6}\\approx0.165\\ \\text{m}$。\n\n$$\\boxed{h_j=\\frac{(v_1-v_2)^2}{2g}\\approx0.17\\ \\text{m 水柱}}$$\n\n#### 易错点 · 第 5 章\n\n- 判别流态用**圆管临界 $Re_c\\approx2300$**；非圆管用水力半径 $R=A/\\chi$，$Re=vR/\\nu$（临界约 500）。\n- 层流 $\\lambda=64/Re$ 仅适用层流；紊流必须查**穆迪图**或经验公式。\n- 沿程损失沿管长**均匀累积**，局部损失集中在断面突变处。\n\n---\n\n\n\n## 三、自测题 · 练习\n\n\n**Q1（名词解释）** 层流？\n\n<details><summary>参考答案<\/summary>\n\n流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n\n<\/details>\n\n**Q2（名词解释）** 紊流（湍流）？\n\n<details><summary>参考答案<\/summary>\n\n流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n\n<\/details>\n\n**Q3（名词解释）** 雷诺数 Re？\n\n<details><summary>参考答案<\/summary>\n\nRe=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n\n<\/details>\n\n**Q4（名词解释）** 沿程水头损失 h_f？\n\n<details><summary>参考答案<\/summary>\n\n沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n\n<\/details>\n\n**Q5（名词解释）** 沿程阻力系数 λ？\n\n<details><summary>参考答案<\/summary>\n\n层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n\n<\/details>\n\n**Q6（名词解释）** 局部水头损失 h_j？\n\n<details><summary>参考答案<\/summary>\n\n管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n\n<\/details>\n\n**Q7（名词解释）** 雷诺应力与混合长度？\n\n<details><summary>参考答案<\/summary>\n\n紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n\n<\/details>\n\n**Q8（名词解释）** 层流底层与水力光滑/粗糙管？\n\n<details><summary>参考答案<\/summary>\n\n紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n\n<\/details>\n\n**Q9（考点·闭卷默写）** 请展开论述：层流与紊流的本质区别及判别（Re 与临界值）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：层流与紊流的本质区别及判别（Re 与临界值）\n\n<\/details>\n\n**Q10（考点·闭卷默写）** 请展开论述：雷诺数的物理意义（惯性力/粘性力）\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：雷诺数的物理意义（惯性力/粘性力）\n\n<\/details>\n\n**Q11（考点·闭卷默写）** 请展开论述：达西公式与沿程阻力系数 λ 的确定\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：达西公式与沿程阻力系数 λ 的确定\n\n<\/details>\n\n**Q12（考点·闭卷默写）** 请展开论述：局部损失系数 ζ 与典型管件取值\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：局部损失系数 ζ 与典型管件取值\n\n<\/details>\n\n**Q13（考点·闭卷默写）** 请展开论述：圆管层流速度分布与 u_max=2v 的关系\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：圆管层流速度分布与 u_max=2v 的关系\n\n<\/details>\n\n**Q14（考点·闭卷默写）** 请展开论述：紊流时均化、雷诺应力、混合长度\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：紊流时均化、雷诺应力、混合长度\n\n<\/details>\n\n**Q15（考点·闭卷默写）** 请展开论述：层流底层、水力光滑管与粗糙管概念\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：层流底层、水力光滑管与粗糙管概念\n\n<\/details>\n\n**Q16（考点·闭卷默写）** 请展开论述：总水头损失叠加 h_w=Σh_f+Σh_j\n\n<details><summary>提示 / 要点<\/summary>\n\n对照本章“高频考点 / 核心概念”作答；要点：总水头损失叠加 h_w=Σh_f+Σh_j\n\n<\/details>\n\n**思考题（综合应用）**\n\n<details><summary>题与参考答案<\/summary>\n\n- **Q**：雷诺数的物理意义及临界值是什么？\n  **A**：Re 表征惯性力与粘性力之比；圆管下临界 Re≈2300，Re<2300 为层流，更大时转为紊流。\n\n- **Q**：为什么紊流的沿程损失比层流大？\n  **A**：紊流脉动产生附加雷诺切应力，能量耗散显著增强，且 λ 对壁面粗糙度敏感，故损失大于层流。\n\n- **Q**：圆管层流中平均流速与最大流速是什么关系？\n  **A**：速度按抛物线分布，平均流速 v=½u_max，即最大流速是平均流速的 2 倍。\n\n<\/details>\n\n\n## 四、速记卡 · 知识点速查\n\n\n- ____：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n  - <details><summary>答案<\/summary> 层流 <\/details>\n- ____：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n  - <details><summary>答案<\/summary> 紊流（湍流） <\/details>\n- ____：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n  - <details><summary>答案<\/summary> 雷诺数 Re <\/details>\n- ____：沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n  - <details><summary>答案<\/summary> 沿程水头损失 h_f <\/details>\n- ____：层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n  - <details><summary>答案<\/summary> 沿程阻力系数 λ <\/details>\n- ____：管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n  - <details><summary>答案<\/summary> 局部水头损失 h_j <\/details>\n- ____：紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n  - <details><summary>答案<\/summary> 雷诺应力与混合长度 <\/details>\n- ____：紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n  - <details><summary>答案<\/summary> 层流底层与水力光滑/粗糙管 <\/details>\n\n\n## 五、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 69 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L05_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L05_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L05_p011.jpg\" alt=\"\"><\/a> nics/L06_p027.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-6", "group": "章节精讲", "title": "第6章 · 孔口、管嘴流动与有压管流", "md": "# 第6章 · 孔口、管嘴流动与有压管流\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![孔口出流·自由与淹没](assets/pdf/fluid-mechanics/L03_p006.jpg)\n*▲ 原页 · 孔口出流分类：自由出流（出流入大气）与淹没出流（出流入下游液体），收缩断面与流速系数 $\\varphi$、流量系数 $\\mu$。*\n\n![管嘴出流类型](assets/pdf/fluid-mechanics/L03_p011.jpg)\n*▲ 原页 · 圆柱形、收缩形、扩张形等管嘴出流类型及其流量系数差异（圆柱外伸管嘴因真空增大流量）。*\n\n![有压管流·串联并联](assets/pdf/fluid-mechanics/L03_p019.jpg)\n*▲ 原页 · 串联管道（流量相同、损失叠加）与并联管道（损失相同、流量分配）的水力计算。*\n\n![管网·枝状环状](assets/pdf/fluid-mechanics/L03_p023.jpg)\n*▲ 原页 · 枝状管网与环状管网概述：节点流量平衡、环路水头平衡。*\n\n#### 核心公式速记\n\n- 孔口自由出流 $Q=\\mu A\\sqrt{2gH}$（$\\mu$ 流量系数，薄壁圆孔约 0.62）。\n- 孔口淹没出流 $Q=\\mu A\\sqrt{2g\\Delta H}$（$\\Delta H$ 为上下游水位差）。\n- 圆柱形外管嘴 $Q=\\mu_n A\\sqrt{2gH}$，$\\mu_n\\approx0.82>\\mu_{\\text{孔口}}$。\n- 长管（忽略局部与流速水头）$H=h_f=\\lambda\\dfrac{L}{d}\\dfrac{v^2}{2g}$；短管需计全部损失与流速水头。\n\n#### 原理示意 · 出流与管路类型\n\n```mermaid\nflowchart TB\n    O[\"出流/管路问题\"] --> A[\"孔口出流\"]\n    O --> B[\"管嘴出流\"]\n    O --> C[\"有压管流\"]\n    A --> A1[\"自由 Q=μA√(2gH)\"]\n    A --> A2[\"淹没 Q=μA√(2gΔH)\"]\n    B --> B1[\"圆柱外管嘴 μ≈0.82 有真空\"]\n    C --> C1[\"短管: 计全部损失+流速水头\"]\n    C --> C2[\"长管: 只计沿程损失\"]\n    C --> C3[\"串联/并联/管网\"]\n```\n\n#### 例题 6-1（薄壁孔口自由出流）\n\n**题**：水箱壁上薄壁圆孔，面积 $A=20\\ \\text{cm}^2$，孔心淹深 $H=2\\ \\text{m}$，流量系数 $\\mu=0.62$。求出流流量 $Q$。\n\n**解**：\n1. $A=20\\ \\text{cm}^2=2\\times10^{-3}\\ \\text{m}^2$，$\\sqrt{2gH}=\\sqrt{2\\times9.8\\times2}=\\sqrt{39.2}=6.26\\ \\text{m/s}$。\n2. $Q=\\mu A\\sqrt{2gH}=0.62\\times2\\times10^{-3}\\times6.26=7.76\\times10^{-3}\\ \\text{m}^3/\\text{s}$。\n\n$$\\boxed{Q=\\mu A\\sqrt{2gH}\\approx7.8\\ \\text{L/s}}$$\n\n#### 例题 6-2（长管沿程损失·定水头出流）\n\n**题**：长直管道 $L=500\\ \\text{m}$、$d=0.2\\ \\text{m}$、$\\lambda=0.025$，上下游水位差 $H=10\\ \\text{m}$（按长管，忽略局部损失与流速水头）。求管中流速 $v$ 与流量 $Q$。\n\n**解**：\n1. 长管 $H=\\lambda\\dfrac{L}{d}\\dfrac{v^2}{2g}\\Rightarrow v=\\sqrt{\\dfrac{2gH}{\\lambda L/d}}=\\sqrt{\\dfrac{2\\times9.8\\times10}{0.025\\times500/0.2}}$。\n2. $\\lambda L/d=0.025\\times2500=62.5$；$v=\\sqrt{\\dfrac{196}{62.5}}=\\sqrt{3.136}\\approx1.77\\ \\text{m/s}$。\n3. $Q=vA=1.77\\times\\dfrac{\\pi}{4}(0.2)^2=1.77\\times0.0314\\approx0.0556\\ \\text{m}^3/\\text{s}$。\n\n$$\\boxed{v\\approx1.77\\ \\text{m/s},\\quad Q\\approx55.6\\ \\text{L/s}}$$\n\n#### 易错点 · 第 6 章\n\n- 自由出流用淹深 $H$，淹没出流用上下游**水位差** $\\Delta H$。\n- 短管 vs 长管：长管忽略局部损失与流速水头，短管全计。\n- 并联管段**水头损失相等**，总流量为各段之和；串联管段**流量相等**，损失叠加。\n\n---\n\n\n\n## 二、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 90 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L03_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L03_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L03_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/ /pdf/fluid-mechanics/L04_p033.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p033.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p034.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p034.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p035.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p035.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p036.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p036.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p037.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p037.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p038.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p038.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p039.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p039.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p040.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p040.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p041.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p041.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p042.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p042.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p043.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p043.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p044.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p044.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L04_p045.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L04_p045.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "chap-7", "group": "章节精讲", "title": "第7章 · 明渠流动", "md": "# 第7章 · 明渠流动\n\n\n\n> 一章打通 ▸ 知识精讲（图文）· 例题详解 · 自测练习 · 速记知识点 · 课件原页全图\n\n\n\n## 一、核心 PDF 原页 · 图文精讲 + 例题详解\n\n\n#### 核心 PDF 原页（图文结合）\n\n![明渠断面类型](assets/pdf/fluid-mechanics/L01_p005.jpg)\n*▲ 原页 · 明渠（有自由表面、靠重力驱动）的棱柱体渠道断面：矩形、梯形等，水面宽 $B$、过流面积 $A$、湿周 $\\chi$、水力半径 $R=A/\\chi$。*\n\n![谢才公式](assets/pdf/fluid-mechanics/L01_p011.jpg)\n*▲ 原页 · 明渠均匀流基本公式——谢才公式 $v=C\\sqrt{Ri}$，$Q=AC\\sqrt{Ri}$，谢才系数 $C=\\dfrac{1}{n}R^{1/6}$（曼宁）。*\n\n![水力最优断面](assets/pdf/fluid-mechanics/L01_p012.jpg)\n*▲ 原页 · 水力最优断面：过流面积一定时湿周最小（水力半径最大）→ 输水能力最大；梯形最优 $\\beta=2(\\sqrt{1+m^2}-m)$。*\n\n![明渠水流流态判别](assets/pdf/fluid-mechanics/L01_p028.jpg)\n*▲ 原页 · 明渠流态：缓流/急流/临界流由弗劳德数 $Fr=v/\\sqrt{gh}$ 判别（$Fr<1$ 缓流，$>1$ 急流）。*\n\n#### 核心公式速记\n\n- 水力半径 $R=\\dfrac{A}{\\chi}$（$\\chi$ 湿周）。\n- 谢才公式 $v=C\\sqrt{Ri}$，流量 $Q=AC\\sqrt{Ri}$；曼宁 $C=\\dfrac{1}{n}R^{1/6}$。\n- 弗劳德数 $Fr=\\dfrac{v}{\\sqrt{gh}}$：$Fr<1$ 缓流、$Fr=1$ 临界流、$Fr>1$ 急流。\n\n#### 例题 7-1（矩形明渠·谢才公式求流量）\n\n**题**：矩形渠宽 $b=2\\ \\text{m}$、水深 $h=1\\ \\text{m}$、底坡 $i=0.0004$、粗糙系数 $n=0.025$。求流量 $Q$。\n\n**解**：\n1. 过流面积 $A=bh=2\\times1=2\\ \\text{m}^2$，湿周 $\\chi=b+2h=2+2=4\\ \\text{m}$，水力半径 $R=A/\\chi=2/4=0.5\\ \\text{m}$。\n2. 谢才系数 $C=\\dfrac{1}{n}R^{1/6}=\\dfrac{1}{0.025}\\times0.5^{1/6}=40\\times0.891=35.6\\ \\text{m}^{1/2}/\\text{s}$。\n3. $v=C\\sqrt{Ri}=35.6\\times\\sqrt{0.5\\times0.0004}=35.6\\times\\sqrt{2\\times10^{-4}}=35.6\\times0.01414=0.503\\ \\text{m/s}$。\n4. $Q=vA=0.503\\times2=1.01\\ \\text{m}^3/\\text{s}$。\n\n$$\\boxed{Q=AC\\sqrt{Ri}\\approx1.0\\ \\text{m}^3/\\text{s}}$$\n\n#### 例题 7-2（流态判别·弗劳德数）\n\n**题**：上例渠中 $v=0.503\\ \\text{m/s}$、$h=1\\ \\text{m}$。判别流态。\n\n**解**：$Fr=\\dfrac{v}{\\sqrt{gh}}=\\dfrac{0.503}{\\sqrt{9.8\\times1}}=\\dfrac{0.503}{3.13}=0.161<1$，为**缓流**。\n\n$$\\boxed{Fr\\approx0.16<1\\Rightarrow\\text{缓流}}$$\n\n#### 易错点 · 第 7 章\n\n- 明渠**有自由表面**、靠重力驱动；有压管流无自由表面、靠压差驱动。\n- 水力半径 $R=A/\\chi$，湿周只算**与水接触**的周界（不含自由水面）。\n- 弗劳德数判别缓急流：缓流受下游控制，急流受上游控制。\n\n---\n\n### 期末综合大题 · 串联多章\n\n**题**：水从大水箱经一段长管流入大气。水箱水面距管道出口高差 $H=8\\ \\text{m}$，管长 $L=50\\ \\text{m}$、$d=0.1\\ \\text{m}$、$\\lambda=0.03$，进口局部损失系数 $\\zeta_1=0.5$、出口 $\\zeta_2=1.0$。求管中流速 $v$ 与流量 $Q$。\n\n**解**（伯努利 + 损失，断面取水面 1 与出口 2）：\n1. 列总流伯努利：$H=\\dfrac{v^2}{2g}+h_w$，其中出口动能 $\\dfrac{v^2}{2g}$、$h_w=\\left(\\lambda\\dfrac{L}{d}+\\zeta_1+\\zeta_2\\right)\\dfrac{v^2}{2g}$。\n   （注：出口 $\\zeta_2=1.0$ 项即代表出口动能损失，故合并写）\n2. $H=\\left(\\lambda\\dfrac{L}{d}+\\zeta_1+1.0\\right)\\dfrac{v^2}{2g}$。\n3. $\\lambda\\dfrac{L}{d}=0.03\\times\\dfrac{50}{0.1}=15$；系数和 $=15+0.5+1.0=16.5$。\n4. $v=\\sqrt{\\dfrac{2gH}{16.5}}=\\sqrt{\\dfrac{2\\times9.8\\times8}{16.5}}=\\sqrt{\\dfrac{156.8}{16.5}}=\\sqrt{9.50}\\approx3.08\\ \\text{m/s}$。\n5. $Q=vA=3.08\\times\\dfrac{\\pi}{4}(0.1)^2=3.08\\times7.85\\times10^{-3}\\approx0.0242\\ \\text{m}^3/\\text{s}$。\n\n$$\\boxed{v\\approx3.08\\ \\text{m/s},\\quad Q\\approx24.2\\ \\text{L/s}}$$\n\n---\n\n### 期末速记口诀\n\n- **物性**：粘度看梯度（$\\tau=\\mu\\,du/dy$），运动粘度除密度（$\\nu=\\mu/\\rho$）。\n- **静力**：压强各向同，形心算总压，压心在下方。\n- **运动**：流线切速度，连续 $vA$ 守，加速分当地与迁移。\n- **动力**：能量伯努利（三水头），受力动量定理（矢量），实际别忘水头损失。\n- **损失**：先算 $Re$ 判流态，沿程达西查穆迪，局部 $\\zeta\\,v^2/2g$。\n- **管流**：自由淹深、淹没水位差；长管只沿程、短管全都算。\n- **明渠**：谢才 $C\\sqrt{Ri}$，最优湿周小，缓急看 $Fr$。\n\n---\n\n> **正言若反**：例题不离公式，公式不离概念，概念不离原始 PDF 之图。本篇为\"用得上\"的一层；图已直插，遇疑回归「原始课件 · 页图」与各章素材、综合复习资料。\n\n\n## 二、本章课件原页 · 全图\n\n<details class=\"pdf-lesson\">\n<summary>本章课件原页 · 共 44 页（点击展开）<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p002.jpg\" alt=
