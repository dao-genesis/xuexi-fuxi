\" src=\"assets/pdf/fluid-mechanics/L02_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p007.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p008.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p008.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p009.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p009.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p010.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p010.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L02_p011.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L02_p011.jpg\" alt=\"\"><\/a>\n<\/div><\/details>"}, {"id": "review-综合复习资料", "group": "总览资料", "title": "综合复习资料（图文 + 思维导图）", "md": "# 流体力学 · 综合复习资料\n\n> 教师: 曾强 · 学期: 2026春\n> 链路：原始 PDF → 页图集（多图提取）→ 章节图谱 → LLM 协填要点 → 思维导图 → **本资料**\n> 完成度：复习要点 **5/5** 章 · 嵌入子图 **0** 张 · 思维导图 **5/5** 章\n\n---\n\n## 一 · 章级入口\n\n| 章 | 标题 | 主版页 | 子图 | 要点 | 图谱 | 素材 |\n| ---: | ---- | -----: | ---: | :--: | :--: | ---- |\n| 1 | 流体及其主要物理性质 | 63 | 0 | ✓ | ✓ | [_第01章_流体及其主要物理性质.md](./_第01章_流体及其主要物理性质.md) |\n| 2 | 流体静力学 | 41 | 0 | ✓ | ✓ | [_第02章_流体静力学.md](./_第02章_流体静力学.md) |\n| 3 | 流体运动基础 | 48 | 0 | ✓ | ✓ | [_第03章_流体运动基础.md](./_第03章_流体运动基础.md) |\n| 4 | 流体动力学基础 | 56 | 0 | ✓ | ✓ | [_第04章_流体动力学基础.md](./_第04章_流体动力学基础.md) |\n| 5 | 层流、紊流及其能量损失 | 42 | 0 | ✓ | ✓ | [_第05章_层流、紊流及其能量损失.md](./_第05章_层流、紊流及其能量损失.md) |\n\n## 二 · 全章综合汇编\n\n### 第 1 章 · 流体及其主要物理性质\n\n> 素材：[_第01章_流体及其主要物理性质.md](./_第01章_流体及其主要物理性质.md) · 主版 63 页\n\n#### 一、核心概念\n\n- **流体**：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*\n- **连续介质假设**：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*\n- **流体质点**：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n- **密度 ρ**：单位体积流体所具有的质量，ρ=dm/dV，单位 kg/m³。  *（要：水约 1000 kg/m³）*\n- **重度（容重）γ**：单位体积流体所受的重力，γ=ρg，单位 N/m³。  *（要：与密度差一个 g）*\n- **粘性**：流体内部相邻流层间产生内摩擦、阻碍相对运动的性质。  *（要：只有流体运动时才表现，静止时不显现）*\n- **牛顿内摩擦定律**：切应力与速度梯度成正比：τ=μ·du/dy。  *（要：粘性流体切应力的本构关系）*\n- **动力粘度 μ 与运动粘度 ν**：μ 反映流体粘性大小（Pa·s）；ν=μ/ρ 综合考虑惯性（m²/s）。  *（要：ν 用于雷诺数等运动学分析）*\n- **牛顿流体与非牛顿流体**：切应力与速度梯度呈线性关系者为牛顿流体（如水、空气），否则为非牛顿流体。  *（要：判别看 τ~du/dy 是否线性过原点）*\n- **压缩性与膨胀性**：压缩性：体积随压强增大而减小；膨胀性：体积随温度升高而增大。  *（要：液体常视为不可压缩）*\n- **质量力与表面力**：质量力作用于流体全部质量（重力、惯性力）；表面力作用于流体表面（压力、切力）。  *（要：受力分析的两大类）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `ρ = dm/dV` | 密度定义，单位 kg/m³ |\n| `γ = ρg` | 重度（容重），单位 N/m³ |\n| `τ = μ·(du/dy)` | 牛顿内摩擦定律，切应力正比于速度梯度 |\n| `ν = μ/ρ` | 运动粘度，单位 m²/s |\n| `κ = -(1/V)(dV/dp), K = 1/κ` | 体积压缩系数与体积弹性模量 |\n| `α_V = (1/V)(dV/dT)` | 体积膨胀系数 |\n\n#### 三、重要案例 / 例题\n\n- 20℃ 时水的动力粘度 μ≈1.005×10⁻³ Pa·s，密度 ρ≈998 kg/m³。\n- 平行平板间线性流动：du/dy=U/h，由牛顿内摩擦定律算切应力 τ=μU/h。\n- 蜂蜜与水：粘度相差数千倍，直观说明粘性差异。\n\n#### 四、高频考点（速记）\n\n1. 流体定义：任意微小剪切力即连续变形\n2. 连续介质假设的含义与意义\n3. 牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n4. 动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n5. 粘度随温度变化：液体随温升而减小，气体随温升而增大\n6. 牛顿流体与非牛顿流体判别\n7. 密度、重度、相对密度概念与单位\n8. 压缩性、膨胀性与体积弹性模量\n9. 质量力与表面力的分类\n\n#### 五、思考题 / 自测\n\n- **Q**：为什么说静止流体不能承受剪切力？\n  **A**：静止流体中任何微小剪切力都会引起连续变形，故静止时切应力必为零，只能承受法向压应力。\n\n- **Q**：动力粘度与运动粘度有何区别与联系？\n  **A**：μ 直接反映流体粘性大小（Pa·s）；ν=μ/ρ 把密度（惯性）一并考虑（m²/s），常用于雷诺数等运动学分析。\n\n- **Q**：为什么液体与气体的粘度随温度变化规律相反？\n  **A**：液体粘性主要来自分子间引力，升温引力减弱故 μ 降低；气体粘性主要来自分子动量交换，升温热运动加剧故 μ 升高。\n\n\n#### 六、与前后章之关联\n\n- **承前**：全课起点，建立流体的连续介质模型与基本物性参数。\n- **启后**：粘性是第 5 章沿程损失与第 4 章 N-S 方程之源；密度、压强为第 2 章静力学之基。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体及其主要物理性质\n## 核心概念\n- 流体\n- 连续介质假设\n- 流体质点\n- 密度 ρ\n- 重度（容重）γ\n- 粘性\n- 牛顿内摩擦定律\n- 动力粘度 μ 与运动粘度 ν\n- 牛顿流体与非牛顿流体\n- 压缩性与膨胀性\n- 质量力与表面力\n## 关键公式 / 模型\n- ρ = dm/dV\n- γ = ρg\n- τ = μ·(du/dy)\n- ν = μ/ρ\n- κ = -(1/V)(dV/dp), K = 1/κ\n- α_V = (1/V)(dV/dT)\n## 高频考点\n- 流体定义：任意微小剪切力即连续变形\n- 连续介质假设的含义与意义\n- 牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n- 动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n- 粘度随温度变化：液体随温升而减小，气体随温升而增大\n- 牛顿流体与非牛顿流体判别\n- 密度、重度、相对密度概念与单位\n- 压缩性、膨胀性与体积弹性模量\n- 质量力与表面力的分类\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体及其主要物理性质))\n    核心概念\n      流体\n      连续介质假设\n      流体质点\n      密度 ρ\n      重度（容重）γ\n      粘性\n      牛顿内摩擦定律\n      动力粘度 μ 与运动粘度 ν\n      牛顿流体与非牛顿流体\n      压缩性与膨胀性\n      质量力与表面力\n    关键公式 / 模型\n      ρ = dm/dV\n      γ = ρg\n      τ = μ·（du/dy）\n      ν = μ/ρ\n      κ = -（1/V）（dV/dp）, K = 1/κ\n      α_V = （1/V）（dV/dT）\n    高频考点\n      流体定义：任意微小剪切力即连续变形\n      连续介质假设的含义与意义\n      牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n      动力粘度 μ 与运动粘度 ν 的区别及换算 ν=μ/ρ\n      粘度随温度变化：液体随温升而减小，气体随温升而增大\n      牛顿流体与非牛顿流体判别\n      密度、重度、相对密度概念与单位\n      压缩性、膨胀性与体积弹性模量\n      质量力与表面力的分类\n```\n\n<\/details>\n\n---\n\n### 第 2 章 · 流体静力学\n\n> 素材：[_第02章_流体静力学.md](./_第02章_流体静力学.md) · 主版 41 页\n\n#### 一、核心概念\n\n- **流体静压强**：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*\n- **静压强两特性**：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*\n- **静止流体平衡微分方程（欧拉平衡方程）**：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n- **水静力学基本方程**：重力场中 p=p₀+ρgh，压强随深度线性增加。  *（要：等压面为水平面）*\n- **测压管水头**：z+p/(ρg)=常数，位置水头与压强水头之和守恒。  *（要：几何意义与能量意义）*\n- **绝对压强、相对压强、真空度**：以绝对真空为零点为绝对压强；以当地大气压为零点为相对压强（表压）；相对压强为负时其绝对值为真空度。  *（要：p_abs=p_atm+p_相对）*\n- **相对静止**：流体相对容器无相对运动但整体有加速度（等加速直线、等角速度旋转）。  *（要：需把惯性力计入质量力，等压面不再水平）*\n- **平面上的静水总压力**：P=ρg·h_c·A，作用点（压力中心）位于形心之下。  *（要：y_D=y_c+I_c/(y_c·A)）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `∇p = ρf` | 静止流体平衡微分方程（欧拉平衡方程） |\n| `p = p₀ + ρgh` | 重力场水静力学基本方程 |\n| `z + p/(ρg) = C` | 测压管水头守恒 |\n| `P = ρg·h_c·A` | 作用在平面上的静水总压力，h_c 为形心淹深 |\n| `y_D = y_c + I_c/(y_c·A)` | 压力中心位置，恒在形心之下 |\n| `z = ω²r²/(2g)` | 等角速度旋转时自由液面（抛物面） |\n\n#### 三、重要案例 / 例题\n\n- U 形水银压差计测量管道两点压强差。\n- 矩形闸门所受静水总压力大小及压力中心位置计算。\n- 等角速度旋转容器内自由液面呈旋转抛物面。\n\n#### 四、高频考点（速记）\n\n1. 静压强的两个基本特性\n2. 水静力学基本方程及其几何、能量意义\n3. 绝对压强、相对压强、真空度的关系\n4. 等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n5. 测压管水头守恒\n6. 平面静水总压力大小与压力中心计算\n7. 相对静止（等加速、旋转）的压强分布\n8. U 形管、压差计读数计算\n\n#### 五、思考题 / 自测\n\n- **Q**：为什么静压强具有各向同性？\n  **A**：对微元四面体作受力平衡分析，忽略高阶小量（质量力）后可证任一点各方向压强大小相等。\n\n- **Q**：压力中心为何总在形心之下？\n  **A**：压强随深度线性增大，下部受压更大使合力作用点下移，由 y_D=y_c+I_c/(y_c·A)>y_c 可知。\n\n- **Q**：相对静止与绝对静止有何区别？\n  **A**：相对静止时流体相对容器不动但整体有加速度，须把惯性力计入质量力，等压面不再水平（如旋转呈抛物面）。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 1 章密度、压强、质量力等概念。\n- **启后**：压强概念贯穿第 4 章伯努利方程；平衡方程是第 4 章欧拉运动方程在静止时的特例。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体静力学\n## 核心概念\n- 流体静压强\n- 静压强两特性\n- 静止流体平衡微分方程（欧拉平衡方程）\n- 水静力学基本方程\n- 测压管水头\n- 绝对压强、相对压强、真空度\n- 相对静止\n- 平面上的静水总压力\n## 关键公式 / 模型\n- ∇p = ρf\n- p = p₀ + ρgh\n- z + p/(ρg) = C\n- P = ρg·h_c·A\n- y_D = y_c + I_c/(y_c·A)\n- z = ω²r²/(2g)\n## 高频考点\n- 静压强的两个基本特性\n- 水静力学基本方程及其几何、能量意义\n- 绝对压强、相对压强、真空度的关系\n- 等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n- 测压管水头守恒\n- 平面静水总压力大小与压力中心计算\n- 相对静止（等加速、旋转）的压强分布\n- U 形管、压差计读数计算\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体静力学))\n    核心概念\n      流体静压强\n      静压强两特性\n      静止流体平衡微分方程（欧拉平衡方程）\n      水静力学基本方程\n      测压管水头\n      绝对压强、相对压强、真空度\n      相对静止\n      平面上的静水总压力\n    关键公式 / 模型\n      ∇p = ρf\n      p = p₀ + ρgh\n      z + p/（ρg） = C\n      P = ρg·h_c·A\n      y_D = y_c + I_c/（y_c·A）\n      z = ω²r²/（2g）\n    高频考点\n      静压强的两个基本特性\n      水静力学基本方程及其几何、能量意义\n      绝对压强、相对压强、真空度的关系\n      等压面成立条件（连通、同种、连续、静止、质量力仅重力）\n      测压管水头守恒\n      平面静水总压力大小与压力中心计算\n      相对静止（等加速、旋转）的压强分布\n      U 形管、压差计读数计算\n```\n\n<\/details>\n\n---\n\n### 第 3 章 · 流体运动基础\n\n> 素材：[_第03章_流体运动基础.md](./_第03章_流体运动基础.md) · 主版 48 页\n\n#### 一、核心概念\n\n- **拉格朗日法**：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*\n- **欧拉法**：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*\n- **迹线**：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n- **流线**：某时刻流场中处处与速度矢量相切的曲线。  *（要：恒定流时迹线与流线重合，流线不相交、不转折）*\n- **染色线（脉线）**：相继通过同一空间点的所有质点在某时刻连成的线。  *（要：实验观察用）*\n- **过流断面、湿周、水力半径**：过流断面与流速垂直；湿周为断面上与流体接触的固壁周长；水力半径 R=A/χ。  *（要：总流几何参数）*\n- **流体微团运动分解**：亥姆霍兹速度分解定理：微团运动=平移+旋转+线变形+角变形。  *（要：四种基本运动）*\n- **物质导数（随体导数）**：D/Dt=∂/∂t+(V·∇)，含当地导数（时变）与迁移导数（位变）。  *（要：随质点运动的变化率）*\n- **连续方程（微分形式）**：质量守恒：∂ρ/∂t+∇·(ρV)=0；不可压缩时 ∇·V=0。  *（要：任何流动都满足）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `dx/u = dy/v = dz/w` | 流线微分方程 |\n| `D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/∂z` | 物质导数（当地+迁移） |\n| `∂ρ/∂t + ∇·(ρV) = 0` | 微分形式连续方程 |\n| `∇·V = 0` | 不可压缩流体连续方程 |\n| `ω_z = ½(∂v/∂x − ∂u/∂y)` | 流体微团绕 z 轴的旋转角速度 |\n| `R = A/χ` | 水力半径，A 过流面积，χ 湿周 |\n\n#### 三、重要案例 / 例题\n\n- 由给定速度场判别定常/非定常、均匀/非均匀流。\n- 由速度场求加速度，分清当地加速度与迁移加速度。\n- 计算旋度判别有旋流与无旋流。\n\n#### 四、高频考点（速记）\n\n1. 拉格朗日法与欧拉法的区别\n2. 迹线、流线、染色线的定义与区别；恒定流三者重合\n3. 流线不相交、不转折的性质\n4. 物质导数的组成（当地导数+迁移导数）\n5. 流体微团运动的四个分量\n6. 有旋流与无旋流的判别（旋度）\n7. 微分形式连续方程及不可压缩简化\n8. 过流断面、湿周、水力半径概念\n\n#### 五、思考题 / 自测\n\n- **Q**：定常流中迁移加速度为何可不为零？\n  **A**：定常流 ∂/∂t=0，但质点流经空间不同点速度仍可改变，(V·∇)V≠0，故有迁移加速度（如收缩管中加速）。\n\n- **Q**：流线与迹线何时重合？\n  **A**：在恒定（定常）流场中，流线形状不随时间变化，质点沿流线运动，二者重合。\n\n- **Q**：如何判别流动是否有旋？\n  **A**：计算速度场旋度 ∇×V，若处处为零则为无旋（有势）流，否则为有旋流。\n\n\n#### 六、与前后章之关联\n\n- **承前**：在第 1 章连续介质、第 2 章场概念基础上建立运动描述方法。\n- **启后**：连续方程与运动学概念为第 4 章动力学方程（伯努利、动量、N-S）奠定基础。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体运动基础\n## 核心概念\n- 拉格朗日法\n- 欧拉法\n- 迹线\n- 流线\n- 染色线（脉线）\n- 过流断面、湿周、水力半径\n- 流体微团运动分解\n- 物质导数（随体导数）\n- 连续方程（微分形式）\n## 关键公式 / 模型\n- dx/u = dy/v = dz/w\n- D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/∂z\n- ∂ρ/∂t + ∇·(ρV) = 0\n- ∇·V = 0\n- ω_z = ½(∂v/∂x − ∂u/∂y)\n- R = A/χ\n## 高频考点\n- 拉格朗日法与欧拉法的区别\n- 迹线、流线、染色线的定义与区别；恒定流三者重合\n- 流线不相交、不转折的性质\n- 物质导数的组成（当地导数+迁移导数）\n- 流体微团运动的四个分量\n- 有旋流与无旋流的判别（旋度）\n- 微分形式连续方程及不可压缩简化\n- 过流断面、湿周、水力半径概念\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体运动基础))\n    核心概念\n      拉格朗日法\n      欧拉法\n      迹线\n      流线\n      染色线（脉线）\n      过流断面、湿周、水力半径\n      流体微团运动分解\n      物质导数（随体导数）\n      连续方程（微分形式）\n    关键公式 / 模型\n      dx/u = dy/v = dz/w\n      D/Dt = ∂/∂t + u∂/∂x + v∂/∂y + w∂/…\n      ∂ρ/∂t + ∇·（ρV） = 0\n      ∇·V = 0\n      ω_z = ½（∂v/∂x − ∂u/∂y）\n      R = A/χ\n    高频考点\n      拉格朗日法与欧拉法的区别\n      迹线、流线、染色线的定义与区别；恒定流三者重合\n      流线不相交、不转折的性质\n      物质导数的组成（当地导数+迁移导数）\n      流体微团运动的四个分量\n      有旋流与无旋流的判别（旋度）\n      微分形式连续方程及不可压缩简化\n      过流断面、湿周、水力半径概念\n```\n\n<\/details>\n\n---\n\n### 第 4 章 · 流体动力学基础\n\n> 素材：[_第04章_流体动力学基础.md](./_第04章_流体动力学基础.md) · 主版 56 页\n\n#### 一、核心概念\n\n- **欧拉运动方程**：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*\n- **伯努利方程（沿流线）**：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*\n- **缓变流（渐变流）**：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n- **总流伯努利方程**：z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w。  *（要：含动能修正系数 α 与水头损失 h_w）*\n- **动能修正系数 α**：用断面平均流速计算动能与真实动能之比的修正系数，α≥1。  *（要：层流 α=2，紊流 α≈1.05）*\n- **动量方程（总流）**：ΣF=ρQ(β₂V₂−β₁V₁)，求流体对边界的作用力。  *（要：β 为动量修正系数）*\n- **纳维-斯托克斯（N-S）方程**：粘性不可压缩流体运动方程：DV/Dt=f−(1/ρ)∇p+ν∇²V。  *（要：比欧拉方程多粘性项 ν∇²V）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `DV/Dt = f − (1/ρ)∇p` | 理想流体欧拉运动方程 |\n| `z + p/(ρg) + V²/(2g) = C` | 沿流线伯努利方程（理想流） |\n| `z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w` | 总流伯努利方程（实际流） |\n| `ΣF = ρQ(β₂V₂ − β₁V₁)` | 总流动量方程 |\n| `DV/Dt = f − (1/ρ)∇p + ν∇²V` | 纳维-斯托克斯方程 |\n| `Q = vA` | 流量连续关系 |\n\n#### 三、重要案例 / 例题\n\n- 文丘里流量计、毕托管测速：伯努利方程的典型应用。\n- 孔口出流 v=√(2gH)（托里拆利公式）。\n- 水流对弯管、喷嘴的冲击力：动量方程求解。\n\n#### 四、高频考点（速记）\n\n1. 伯努利方程三项水头的物理意义与适用条件\n2. 理想流与实际流伯努利方程的区别（h_w、α）\n3. 总流伯努利方程列写步骤与基准面、断面选取\n4. 动量方程应用与动量修正系数 β\n5. 缓变流断面的选取条件\n6. 毕托管、文丘里、孔口出流的计算\n7. N-S 方程各项物理意义（粘性项 ν∇²V）\n8. 欧拉方程与 N-S 方程的关系（令 ν=0）\n\n#### 五、思考题 / 自测\n\n- **Q**：伯努利方程的适用条件有哪些？\n  **A**：理想流体（或忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n- **Q**：总流伯努利方程为何要引入 α 与 h_w？\n  **A**：实际断面流速分布不均，需用动能修正系数 α 修正动能项；粘性导致机械能沿程损失 h_w，故较理想方程多此两项。\n\n- **Q**：动量方程与伯努利方程各解决什么问题？\n  **A**：伯努利方程（能量）求压强与流速关系；动量方程求流体与边界间的作用力，二者常联立求解。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 3 章连续方程与物质导数；欧拉运动方程是第 2 章平衡方程的运动推广。\n- **启后**：水头损失 h_w（沿程+局部）的计算在第 5 章展开；N-S 方程是粘性流动分析的基础。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 流体动力学基础\n## 核心概念\n- 欧拉运动方程\n- 伯努利方程（沿流线）\n- 缓变流（渐变流）\n- 总流伯努利方程\n- 动能修正系数 α\n- 动量方程（总流）\n- 纳维-斯托克斯（N-S）方程\n## 关键公式 / 模型\n- DV/Dt = f − (1/ρ)∇p\n- z + p/(ρg) + V²/(2g) = C\n- z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/2g + h_w\n- ΣF = ρQ(β₂V₂ − β₁V₁)\n- DV/Dt = f − (1/ρ)∇p + ν∇²V\n- Q = vA\n## 高频考点\n- 伯努利方程三项水头的物理意义与适用条件\n- 理想流与实际流伯努利方程的区别（h_w、α）\n- 总流伯努利方程列写步骤与基准面、断面选取\n- 动量方程应用与动量修正系数 β\n- 缓变流断面的选取条件\n- 毕托管、文丘里、孔口出流的计算\n- N-S 方程各项物理意义（粘性项 ν∇²V）\n- 欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((流体动力学基础))\n    核心概念\n      欧拉运动方程\n      伯努利方程（沿流线）\n      缓变流（渐变流）\n      总流伯努利方程\n      动能修正系数 α\n      动量方程（总流）\n      纳维-斯托克斯（N-S）方程\n    关键公式 / 模型\n      DV/Dt = f − （1/ρ）∇p\n      z + p/（ρg） + V²/（2g） = C\n      z₁+p₁/γ+α₁v₁²/2g = z₂+p₂/γ+α₂v₂²/…\n      ΣF = ρQ（β₂V₂ − β₁V₁）\n      DV/Dt = f − （1/ρ）∇p + ν∇²V\n      Q = vA\n    高频考点\n      伯努利方程三项水头的物理意义与适用条件\n      理想流与实际流伯努利方程的区别（h_w、α）\n      总流伯努利方程列写步骤与基准面、断面选取\n      动量方程应用与动量修正系数 β\n      缓变流断面的选取条件\n      毕托管、文丘里、孔口出流的计算\n      N-S 方程各项物理意义（粘性项 ν∇²V）\n      欧拉方程与 N-S 方程的关系（令 ν=0）\n```\n\n<\/details>\n\n---\n\n### 第 5 章 · 层流、紊流及其能量损失\n\n> 素材：[_第05章_层流、紊流及其能量损失.md](./_第05章_层流、紊流及其能量损失.md) · 主版 42 页\n\n#### 一、核心概念\n\n- **层流**：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*\n- **紊流（湍流）**：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*\n- **雷诺数 Re**：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n- **沿程水头损失 h_f**：沿等直径管路因粘性沿程产生的能量损失，h_f=λ(L/d)(v²/2g)（达西公式）。  *（要：与管长成正比）*\n- **沿程阻力系数 λ**：层流 λ=64/Re；紊流与 Re 及相对粗糙度有关（穆迪图）。  *（要：层流只与 Re 有关）*\n- **局部水头损失 h_j**：管件、断面突变处产生的能量损失，h_j=ζ(v²/2g)。  *（要：ζ 为局部阻力系数）*\n- **雷诺应力与混合长度**：紊流脉动产生的附加（时均）切应力即雷诺应力；普朗特混合长度理论用于描述其大小。  *（要：紊流损失大于层流之因）*\n- **层流底层与水力光滑/粗糙管**：紧贴壁面的极薄层流层为层流底层；其厚度与壁面粗糙凸起相对大小决定水力光滑或粗糙。  *（要：决定 λ 的取值规律）*\n\n#### 二、关键公式 / 模型\n\n| 公式 | 含义 |\n|------|------|\n| `Re = vd/ν = ρvd/μ` | 雷诺数，判别流态 |\n| `h_f = λ(L/d)(v²/2g)` | 达西-魏斯巴赫沿程损失公式 |\n| `λ = 64/Re` | 圆管层流沿程阻力系数 |\n| `h_j = ζ(v²/2g)` | 局部水头损失 |\n| `u = u_max[1 − (r/R)²]` | 圆管层流速度抛物线分布 |\n| `h_w = Σh_f + Σh_j` | 总水头损失（沿程+局部叠加） |\n\n#### 三、重要案例 / 例题\n\n- 雷诺实验：通过染色线观察层流向紊流的转捩，确定临界雷诺数。\n- 圆管层流（哈根-泊肃叶流）：流量与压降、粘度的关系。\n- 突然扩大局部损失：包达公式 h_j=(v₁−v₂)²/(2g)。\n\n#### 四、高频考点（速记）\n\n1. 层流与紊流的本质区别及判别（Re 与临界值）\n2. 雷诺数的物理意义（惯性力/粘性力）\n3. 达西公式与沿程阻力系数 λ 的确定\n4. 局部损失系数 ζ 与典型管件取值\n5. 圆管层流速度分布与 u_max=2v 的关系\n6. 紊流时均化、雷诺应力、混合长度\n7. 层流底层、水力光滑管与粗糙管概念\n8. 总水头损失叠加 h_w=Σh_f+Σh_j\n\n#### 五、思考题 / 自测\n\n- **Q**：雷诺数的物理意义及临界值是什么？\n  **A**：Re 表征惯性力与粘性力之比；圆管下临界 Re≈2300，Re<2300 为层流，更大时转为紊流。\n\n- **Q**：为什么紊流的沿程损失比层流大？\n  **A**：紊流脉动产生附加雷诺切应力，能量耗散显著增强，且 λ 对壁面粗糙度敏感，故损失大于层流。\n\n- **Q**：圆管层流中平均流速与最大流速是什么关系？\n  **A**：速度按抛物线分布，平均流速 v=½u_max，即最大流速是平均流速的 2 倍。\n\n\n#### 六、与前后章之关联\n\n- **承前**：运用第 1 章粘性概念与第 4 章总流伯努利方程中的水头损失项 h_w。\n- **启后**：全课收尾，沿程与局部损失计算直接服务于管路水力计算等工程实践。\n\n<details><summary>🧠 思维导图（markmap / mermaid）<\/summary>\n\n### Markmap（Typora / markmap.js / Obsidian 可渲染）\n\n```markmap\n# 层流 紊流及其能量损失\n## 核心概念\n- 层流\n- 紊流（湍流）\n- 雷诺数 Re\n- 沿程水头损失 h_f\n- 沿程阻力系数 λ\n- 局部水头损失 h_j\n- 雷诺应力与混合长度\n- 层流底层与水力光滑/粗糙管\n## 关键公式 / 模型\n- Re = vd/ν = ρvd/μ\n- h_f = λ(L/d)(v²/2g)\n- λ = 64/Re\n- h_j = ζ(v²/2g)\n- u = u_max[1 − (r/R)²]\n- h_w = Σh_f + Σh_j\n## 高频考点\n- 层流与紊流的本质区别及判别（Re 与临界值）\n- 雷诺数的物理意义（惯性力/粘性力）\n- 达西公式与沿程阻力系数 λ 的确定\n- 局部损失系数 ζ 与典型管件取值\n- 圆管层流速度分布与 u_max=2v 的关系\n- 紊流时均化、雷诺应力、混合长度\n- 层流底层、水力光滑管与粗糙管概念\n- 总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n### Mermaid（GitHub Markdown 可渲染）\n\n```mermaid\nmindmap\n  root((层流 紊流及其能量损失))\n    核心概念\n      层流\n      紊流（湍流）\n      雷诺数 Re\n      沿程水头损失 h_f\n      沿程阻力系数 λ\n      局部水头损失 h_j\n      雷诺应力与混合长度\n      层流底层与水力光滑/粗糙管\n    关键公式 / 模型\n      Re = vd/ν = ρvd/μ\n      h_f = λ（L/d）（v²/2g）\n      λ = 64/Re\n      h_j = ζ（v²/2g）\n      u = u_max【1 − （r/R）²】\n      h_w = Σh_f + Σh_j\n    高频考点\n      层流与紊流的本质区别及判别（Re 与临界值）\n      雷诺数的物理意义（惯性力/粘性力）\n      达西公式与沿程阻力系数 λ 的确定\n      局部损失系数 ζ 与典型管件取值\n      圆管层流速度分布与 u_max=2v 的关系\n      紊流时均化、雷诺应力、混合长度\n      层流底层、水力光滑管与粗糙管概念\n      总水头损失叠加 h_w=Σh_f+Σh_j\n```\n\n<\/details>\n\n---\n\n\n> **正言若反**：最终资料不离底层图像；凡疑处，复归章节素材与原始 PDF。\n> 每章之链：原始 PDF → `02_解析成果/<PDF_stem>/page_*.jpg` → 章节素材 md → 本资料。\n"}, {"id": "graph", "group": "总览资料", "title": "知识图谱 · 章节图谱", "md": "# 流体力学 · 章节图谱\n\n> 教师: 曾强 · 学期: 2026春  \n> PDF: 14, 页: 617, 识别章节: 5 个\n> 章节号: 1, 2, 3, 4, 5\n\n## 总览\n\n| 章节 | 标题 | 主版页数 | PDF 数 |\n|------|------|---------:|------:|\n| 第 1 章 | 流体及其主要物理性质 | 63 | 2 |\n| 第 2 章 | 流体静力学 | 41 | 3 |\n| 第 3 章 | 流体运动基础 | 48 | 2 |\n| 第 4 章 | 流体动力学基础 | 56 | 3 |\n| 第 5 章 | 层流、紊流及其能量损失 | 42 | 2 |\n| — | （非教学）2 个 | — | — |\n\n## 各章节详细\n\n### 第 1 章 · 流体及其主要物理性质\n\n- [**主**] 第 1 节 · 63 页  `001-开学第一课-《流体力学》 第一章 流体及其主要物理性质`\n- [辅] 第 2 节 · 62 页  `002-《流体力学》 第一章 流体及其主要物理性质-《流体力学》 第一章 流体及其主要物理性质`\n\n### 第 2 章 · 流体静力学\n\n- [辅] 第 3 节 · 41 页  `003-《流体力学》 第二章 流体静力学-《流体力学》 第二章 流体静力学`\n- [辅] 第 4 节 · 41 页  `004-《流体力学》 第二章 流体静力学（2）-《流体力学》 第二章 流体静力学`\n- [**主**] 第 5 节 · 41 页  `005-《流体力学》 第二章 流体静力学（3）-《流体力学》 第二章 流体静力学`\n\n### 第 3 章 · 流体运动基础\n\n- [辅] 第 6 节 · 48 页  `006-《流体力学》 第三章 流体运动基础-《流体力学》 第三章 流体运动基础`\n- [**主**] 第 7 节 · 48 页  `007-《流体力学》 第三章 流体运动基础（2）-《流体力学》 第三章 流体运动基础`\n\n### 第 4 章 · 流体动力学基础\n\n- [辅] 第 8 节 · 55 页  `008-《流体力学》 第四章 流体动力学基础-《流体力学》 第四章 流体动力学基础`\n- [辅] 第 10 节 · 56 页  `010-《流体力学》 第四章 流体动力学基础（2）-《流体力学》 第四章 流体动力学基础`\n- [**主**] 第 12 节 · 56 页  `012-《流体力学》 第四章 流体动力学基础（3）-《流体力学》 第四章 流体动力学基础`\n\n### 第 5 章 · 层流、紊流及其能量损失\n\n- [辅] 第 15 节 · 27 页  `015-流体力学第五章-流体力学第五章`\n- [**主**] 第 16 节 · 42 页  `016-《流体力学》 第五章 层流、紊流及其能量损失-《流体力学》 第五章 层流、紊流及其能量损失`\n\n## 非教学性课件\n\n- 第 1 节 · 13 页 · 开学第一课\n- 第 1 节 · 24 页 · 开学第一课\n"}, {"id": "study-00", "group": "总览资料", "title": "00 备考总纲", "md": "# 流体力学 · 期末备考总纲\n\n> 教师：曾强 · 学期：2026春\n> 生成于 2026-06-12 · 目标考试日 **2026-07-03**（共 21 天）\n> 章数：5 · 已填要点：5 章\n\n> *为学者日益，闻道 体静力学\n\n## 五 · 每日提取清单（贴在桌前）\n\n- [ ] 今日“首学”章：通读图文 + 看思维导图（求懂）\n- [ ] 今日“回提取”章：**闭卷**做 `自测题库.md` 对应题，再对照订正\n- [ ] 过一遍 `速记卡.md`（答不出的标记，明日优先）\n- [ ] 把每个考点用“一句话”向自己解释“为什么”（自我解释）\n\n## 六 · 元认知自查（别被“熟悉感”骗了）\n\n> *知不知，尚矣；不知不知，病矣。*\n\n- “读过了”≠“答得出”。判断标准只有一个：**合上书能否复述/默写**。\n- 越是“看着眼熟”的内容越危险——优先去**自测**它，而非重读它。\n- 每轮自测后，把答错/卡壳的章节，提前到下一日的“回提取”。\n\n## 七 · 配套材料\n\n- `自测题库.md` —— 闭卷提取题（按章 · 答案默藏）\n- `速记卡.md` —— 填空卡（适合碎片时间 + 间隔重复）\n- `../_素材/_综合复习资料.md` —— 图文 + 思维导图全本\n- `../_素材/_期末速查.md` —— 一页速查表\n"}, {"id": "exam-期末骨架", "group": "期末冲刺", "title": "期末骨架", "md": "# 流体力学 · 期末复习骨架\n\n> 教师: 曾强 · 学期: 2026春\n> 共 14 PDF · 617 页 · 5 章节\n> 已填复习要点：5/5 章\n\n---\n\n## 一 · 目录与素材链\n\n| 章节 | 标题 | 主版页数 | 素材文件 |\n| ---- | ---- | -------: | -------- |\n| 第 1 章 | 流体及其主要物理性质 | 63 | [_第01章_流体及其主要物理性质.md](./_第01章_流体及其主要物理性质.md) |\n| 第 2 章 | 流体静力学 | 41 | [_第02章_流体静力学.md](./_第02章_流体静力学.md) |\n| 第 3 章 | 流体运动基础 | 48 | [_第03章_流体运动基础.md](./_第03章_流体运动基础.md) |\n| 第 4 章 | 流体动力学基础 | 56 | [_第04章_流体动力学基础.md](./_第04章_流体动力学基础.md) |\n| 第 5 章 | 层流、紊流及其能量损失 | 42 | [_第05章_层流、紊流及其能量损失.md](./_第05章_层流、紊流及其能量损失.md) |\n\n## 二 · 复习路径\n\n- 课件主版总页数 250，密度 **中**，建议复习期 5-7 日\n- 推荐三轮法：\n  1. **通览**（约 30%）：逐章浏览主版，知大略，标疑点\n  2. **填表**（约 50%）：每章节素材 md 之占位由 LLM 协填，自校\n  3. **速记**（约 20%）：本骨架之速查表 + 易错点反复\n\n## 三 · 各章速记卡\n\n### 第 1 章 · 流体及其主要物理性质\n\n> 主版 63 页 · 第 1 节 · [详细素材](./_第01章_流体及其主要物理性质.md)\n\n**核心三问**：\n\n- **是什么** ── 流体：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*；连续介质假设：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*；流体质点：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 流体定义：任意微小剪切力即连续变形；连续介质假设的含义与意义；牛顿内摩擦定律 τ=μ·du/dy 各量物理意义与单位\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 2 章 · 流体静力学\n\n> 主版 41 页 · 第 5 节 · [详细素材](./_第02章_流体静力学.md)\n\n**核心三问**：\n\n- **是什么** ── 流体静压强：静止流体中单位面积上所受的法向压力，方向沿作用面内法线。  *（要：静止时只有压应力）*；静压强两特性：①方向垂直并指向受压面；②同一点上各方向压强大小相等（各向同性）。  *（要：考试常考的两条基本性质）*；静止流体平衡微分方程（欧拉平衡方程）：单位质量流体所受质量力与压强梯度平衡：f=(1/ρ)∇p。  *（要：静力学的普遍方程）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 静压强的两个基本特性；水静力学基本方程及其几何、能量意义；绝对压强、相对压强、真空度的关系\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 3 章 · 流体运动基础\n\n> 主版 48 页 · 第 7 节 · [详细素材](./_第03章_流体运动基础.md)\n\n**核心三问**：\n\n- **是什么** ── 拉格朗日法：跟踪每个流体质点，以其初始位置为标识描述其运动轨迹与物理量随时间变化。  *（要：着眼质点）*；欧拉法：着眼空间固定点，描述流场各点物理量随时空的变化（场的方法）。  *（要：工程上最常用）*；迹线：单个流体质点在一段时间内运动的轨迹线。  *（要：拉格朗日观点）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 拉格朗日法与欧拉法的区别；迹线、流线、染色线的定义与区别；恒定流三者重合；流线不相交、不转折的性质\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 4 章 · 流体动力学基础\n\n> 主版 56 页 · 第 12 节 · [详细素材](./_第04章_流体动力学基础.md)\n\n**核心三问**：\n\n- **是什么** ── 欧拉运动方程：理想流体（无粘）的动力学微分方程：DV/Dt=f−(1/ρ)∇p。  *（要：忽略粘性）*；伯努利方程（沿流线）：理想不可压缩定常流沿流线 z+p/(ρg)+V²/(2g)=C。  *（要：三项为位置、压强、速度水头，机械能守恒）*；缓变流（渐变流）：流线近乎平行、曲率与夹角很小的流动，过流断面上压强近似按静压分布。  *（要：选断面的前提）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 伯努利方程三项水头的物理意义与适用条件；理想流与实际流伯努利方程的区别（h_w、α）；总流伯努利方程列写步骤与基准面、断面选取\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n### 第 5 章 · 层流、紊流及其能量损失\n\n> 主版 42 页 · 第 16 节 · [详细素材](./_第05章_层流、紊流及其能量损失.md)\n\n**核心三问**：\n\n- **是什么** ── 层流：流体分层有序流动、各层互不掺混的流态，发生在雷诺数较小时。  *（要：雷诺实验中染色线为直线）*；紊流（湍流）：流体质点存在不规则脉动、相互剧烈掺混的流态，发生在雷诺数较大时。  *（要：染色线弥散）*；雷诺数 Re：Re=ρvd/μ=vd/ν，惯性力与粘性力之比，用于判别流态。  *（要：圆管下临界 Re≈2300）*\n- **怎么算** ── 待填：见详细素材\n- **考什么** ── 层流与紊流的本质区别及判别（Re 与临界值）；雷诺数的物理意义（惯性力/粘性力）；达西公式与沿程阻力系数 λ 的确定\n\n**易错 / 易混**：\n- 待复核课件原图与教师强调处\n\n## 五 · 非教学性内容（仅记，期末不考）\n\n- 开学第一课 (13 页)\n- 开学第一课 (24 页)\n\n---\n\n## 自评清单（复习完打勾）\n\n- [ ] 第 1 章 · 流体及其主要物理性质\n- [ ] 第 2 章 · 流体静力学\n- [ ] 第 3 章 · 流体运动基础\n- [ ] 第 4 章 · 流体动力学基础\n- [ ] 第 5 章 · 层流、紊流及其能量损失\n- [ ] 跨章交叉点皆通\n- [ ] 期末速查表已成\n- [ ] 三套真题/模拟题已练\n"}, {"id": "exam-期末速查", "group": "期末冲刺", "title": "期末速查", "md": "# 流体力学 · 期末速查表\n\n> 一页之表，含各章关键概念、公式、考点。已吸纳 5/5 章复习要点。\n\n| 章 | 标题 | 核心概念（≤3） | 关键公式 / 模型 | 高频考点 |\n| ---: | ---- | -------------- | ---------------- | -------- |\n| 1 | 流体及其主要物理性质 | 流体：在任意微小剪切力作用下都会连续变形（流动）的物质，是气体与液体的统称。  *（要：静止流体不能承受剪切力，只能承受压力）*；连续介质假设：把流体看作由无数流体质点连续、无间隙地充满所占空间的介质，使各物理量成为时空的连续函数。  *（要：宏观处理微观，是流体力学的建模基础）*；流体质点：宏观上足够小、微观上仍含大量分子的流体微团。  *（要：连续介质的基本单元）* |  | 流体定义：任意微小剪切力即连续变形；连续介质假设的含义与意义；牛顿内摩擦定律 动能、粘性导致水头损失 h_w\n  - B. 流体可压缩\n  - C. 流动非定常\n  - D. 重力变化\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：α 为动能修正系数，h_w 为机械能沿程损失。\n\n<\/details>\n\n**9.** 判别管流为层流还是紊流的准则数是\n  - A. 弗劳德数 Fr\n  - B. 雷诺数 Re\n  - C. 马赫数 Ma\n  - D. 欧拉数 Eu\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**B**  　解析：圆管临界雷诺数约 2300，Re<2300 为层流。\n\n<\/details>\n\n**10.** 圆管层流沿程水头损失与平均流速的关系是\n  - A. 与流速一次方成正比\n  - B. 与流速平方成正比\n  - C. 与流速无关\n  - D. 与流速立方成正比\n\n<details><summary>📝 参考答案（先闭卷作答，再展开对照）<\/summary>\n\n答：**A**  　解析：层流 h_f∝v（泊肃叶定律）；紊流粗糙区 h_f∝v²。\n\n<\/details>\n\n## 二、填空题（共 5 题）\n\n**1.** 流体的两个基本物性参数是密度 ρ 和 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**粘性（动力粘度 μ）**\n\n<\/details>\n\n**2.** 运动粘度 ν 与动力粘度 μ、密度 ρ 的关系为 ν=___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**μ/ρ**\n\n<\/details>\n\n**3.** 测量小段速度常用毕托管，测量管道流量常用 ___ 流量计。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**文丘里**\n\n<\/details>\n\n**4.** 圆管流动的临界雷诺数约为 ___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**2300**\n\n<\/details>\n\n**5.** 沿程水头损失的计算公式为达西公式 h_f=λ(l/d)·___。\n\n<details><summary>📝 参考答案<\/summary>\n\n答：**v²/(2g)**\n\n<\/details>\n\n## 三、名词解释（共 4 题）\n\n**1.** 连续介质假设\n\n<details><summary>📝 参考答案<\/summary>\n\n答：把流体视为由无数流体质点连续无间隙充满空间的介质，使密度、压强、速度等成为时空的连续函数，便于用连续函数与微分方程描述流动。\n\n<\/details>\n\n**2.** 动能修正系数 α\n\n<details><summary>📝 参考答案<\/summary>\n\n答：用断面平均流速计算的动能与按真实流速分布计算的动能之比，α≥1；层流 α=2，紊流 α≈1.05。\n\n<\/details>\n\n**3.** 缓变流（渐变流）\n\n<details><summary>📝 参考答案<\/summary>\n\n答：流线近乎平行、曲率与夹角都很小的流动，过流断面近似为平面且其上压强按静压规律分布，是选取计算断面的前提。\n\n<\/details>\n\n**4.** 水头损失\n\n<details><summary>📝 参考答案<\/summary>\n\n答：实际流体因粘性做功而损失的单位重量流体机械能，分沿程损失 h_f 与局部损失 h_j 两类，总和为 h_w。\n\n<\/details>\n\n## 四、简答题（共 3 题）\n\n**1.** 简述伯努利方程的适用条件。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：理想流体（或可忽略粘性）、不可压缩、定常流动、沿同一流线（无旋时可推广到全流场）、质量力仅为重力。\n\n<\/details>\n\n**2.** 层流与紊流的本质区别是什么？如何判别？\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：层流各流层互不掺混、质点沿平行轨迹运动；紊流质点随机脉动、强烈掺混。以雷诺数 Re=vd/ν 判别，圆管 Re<2300 为层流，Re 较大为紊流。\n\n<\/details>\n\n**3.** 总流动量方程能解决什么问题？写出基本形式。\n\n<details><summary>📝 参考答案（答要点）<\/summary>\n\n答要点：求流体与边界间的相互作用力（如水流对弯管、喷嘴的冲击力）。形式 ΣF=ρQ(β₂V₂−β₁V₁)，β 为动量修正系数。\n\n<\/details>\n\n## 五、论述题（共 1 题）\n\n**1.** 试以伯努利方程与动量方程为主线，论述如何分析一段变径弯管中流体对管壁的作用力，并说明两方程各自的作用与联立思路。\n\n<details><summary>📝 参考答案（答框架）<\/summary>\n\n答框架：①以伯努利方程（能量守恒）联立连续方程 Q=v₁A₁=v₂A₂，求出进出口断面的压强与流速关系；②取控制体，列总流动量方程 ΣF=ρQ(β₂V₂−β₁V₁)，外力含两断面压力 p₁A₁、p₂A₂、重力与管壁反作用力 R；③将能量方程求得的压强代入动量方程，解出管壁对流体的作用力，再由牛顿第三定律得流体对管壁的力。要点：能量方程定压强流速，动量方程定作用力，二者必须联立；注意动量、动能修正系数与方向投影。\n\n<\/details>\n\n---\n\n> 正言若反：模拟卷宜与原图、章 md 互参，方知所考之实。"}, {"id": "pages", "group": "原始课件", "title": "全部课件原页 · 逐讲", "md": "# 原始课件 · 页图（真实 PDF 页面）\n\n> 下列为雨课堂课件原始页面渲染；大讲已均匀采样关键页。点击讲次标题展开，单击图片可看大图。\n\n<details class=\"pdf-lesson\" open>\n<summary>001-《流体力学》 第七章 明渠流动-《流体力学》 第七章 明渠流动 · 33 页<\/summary>\n<div class=\"pdf-gallery\">\n<a href=\"assets/pdf/fluid-mechanics/L01_p001.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p001.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p002.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p002.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p003.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p003.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p004.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p004.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p005.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p005.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p006.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-mechanics/L01_p006.jpg\" alt=\"\"><\/a>\n<a href=\"assets/pdf/fluid-mechanics/L01_p007.jpg\" target=\"_blank\" rel=\"noopener\"><img loading=\"lazy\" src=\"assets/pdf/fluid-
