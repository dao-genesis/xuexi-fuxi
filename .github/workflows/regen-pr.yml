name: Auto Regenerate Docs (PR)

# 自动化 PR：手动触发或定时，重生成 docs/，若有变更则自动开 PR。
# 用于源 markdown / 生成器更新后，免手工跑生成器与建 PR。

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'  # 每周日 18:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 重生成 docs/
        run: python 复习板块_生成.py
      - name: 若有变更则开 PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(docs): 自动重生成复习站点"
          title: "chore(docs): 自动重生成复习站点 docs/"
          body: |
            本 PR 由 GitHub Actions 自动生成。

            触发后运行 `python 复习板块_生成.py` 重生成 `docs/`，
            若产物与仓库现状有差异则提交并开此 PR。
          branch: auto/regen-docs
          base: main
          delete-branch: true
          add-paths: docs

      - name: 尝试开启 auto-merge（需仓库已允许）
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash
